front:
  text: 雍熈樂府卷之四
  hash: sha256:c41658456eb6ddd12e13bfe4688c368334b68939f2520f1340f2d6436416393a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_004-1a}
body:
  text: 仙吕宫􅀧絳唇洪武天開聖恩寛大民安泰新造樓臺髙接雲霄外混江龍諸般児堪愛画簷前箇立招牌樓名児御筆頒賜酒旗児官降安排盡都是四海八方来逺客萬州千縣㑹英才廣有百味珎饈賣朝朝歡樂日日和諧油葫蘆􅋨仙樓每日神仙来画彩梅妍樓粧􅀧得最竒㢤淡粉樓粉淡了多人買翠栁樓栁翠随凨擺謳歌樓歌慢酒細釅樂民樓端的民安泰則見那人攘攘閙垓垓天下樂上的鼓腹樓中且放懐酒量児寛似海更有那集賢樓多俊才鶴鳴樓驚九天􅁿烟樓雲􅂻埋便似空中降下来那吒令有那夥女色擺列着對排有那夥女色穿羅鞋綉鞋有那夥女色挿金􅁫玉􅁫端的是栁葉眉芙蓉額杏臉􅊝臉鵲踏枝這樓上勝蓬菜賽陽􅄗有酒凨流有色咊諧這兩般児千金盡難買想青春不再囘来􅀉生草端的是心􅂻快喜滿腮唱的舞的多嬌態吹的弹的堪人愛来的去的如車載便􅀅我家私賣了待何如金銀使盡了無妨碍尾聲􅀟眼􅋨糢糊行出樓䑓外正遇着多情捻色俺咊他曽赴天台他道是前度劉郎今又来則見他精彩迎腮􅀅人来錯愛倩人児扶䇿過芲街􅀧絳唇春景花信風微燕􅅺雨霽韶光麗暖日遲遲醖醸出逰春意混江龍艶陽天氣遍園林無處不芳菲栁條嬝娜杏錦離披翠草和烟雏燕語碧桃凝露彩鸞棲芍藥粉鉛華淺試海棠絲絳蠟低垂翠檻暖香舍荳􅞦畫䦨暗雪噴荼䕷小􅈳嵌金錢石竹矮屏攅錦帶玫瑰花撲撲一片錦糢糊暖融融三月春光媚芳塵滚滚香霧霏霏油葫蘆四十里紅香錦繡圍風日羙香車寳馬趂晴暉雕輪􅁿碾莎茵細玉鞭亂拂楊花墜恰轉過甃花磚萬字堦早来到步金沙九曲堤立東風似覺非人世􅁍疑是乗彩鳳下瑶池天下樂十二樓䑓擁翠微髙低簾半垂一處處啓紗窓列銀屏錦繡幃花香度閗草亭栁隂籠拾翠溪有丹青難下筆那吒令蝴蝶児對飛過葡萄架西逰蜂児競起落薔薇􅈳􅂻黄鶯児􅅍啼在櫻桃􅀣底鴛鴦戯緑水濵鸚鵡語金籠内一聲聲似殢嬌痴鵲踏枝錦香堆翠紅圍􅅻過了元夜花朝又早是禁烟寒食㸔如此風光景致儘逰人樂意忘歸􅀉生草泛曲水蘭舟􅃞簇香風彩仗移錦標􅀵㸔罷鞦韆戯翆鬟迎齊奏笙歌沸玳筵開准僃鸞凰配夜長􅂸向月中歸春􅀷莫惜花前醉么小隊按霓裳舞新腔歌金縷低随花傍栁春明媚調絲品竹仙音沸烹龍炮鳳珎饈僃瑶䑓飛下玉天仙蓬壷幻出風流地后庭花酒痕香手帕児濕花枝重䯼髻児低酒酔後情偏􅀬花􅀷處眼欲迷覷吳􅁎風流佳麗粉酥胸白雪肌黛烟描新月眉寳􅁫横雲鬂堆栁腰纎玉一圍啓朱唇皓齒齊蕩湘裙蓮歩遲青歌児呀嬌靨咲秋波秋波生媚安排着雨雲雨雲情意翆䄂香温手共携画閤蘭閨綉枕羅幃琴瑟相宜鸞鳳于飛是一對羙滿好夫妻風流配賺尾賞花時㝷芳意問甚費千金一刻縱有逰絲百尺飛碧天􅁁難繋春暉到明日緑暗紅稀不忍聴空林呌的子䂓常則是􅀍流鶯喚起更做到殢紅粧不睡大古是惜花人愛月夜眠遲􅀧絳唇麗情天霽雲開月華精彩南樓外行過庭堦我潜立在湖山側混江龍今夜箇百無方碍洗乾坤風露淨塵埃冷清清風揺翆竹白零零露滴蒼苔風力􅂃寒侵金縷衣露華凉氷透綉羅鞋􅁿移蓮歩慢轉雕欄簾篩月影燈晃書齋又不敢呼名道姓我則索躡足潜踪悄聲児獨立在窓児外想着俺懐児中受用怕甚麽臉児上搶白油葫蘆我着這瘦聳聳香肩􅀅門扇児挨你試猜止不過月明千里故人来則我這後園中晚謁文章伯你不肯秦樓夜訪金釵客外面児模様好就里㝡為事歹我不比你窮酸般胡諞教均恠不放叅􅂃閉定㸔書齋天下樂却做了十謁朱門九不開書齋好幽㢤不曾有俗客来􅀅幃屏㡬扇児窓下擺戀蝴蝶床榻児窄夢梅花􅁓帳児矮秀才呵你正是成人好不自在村里迓古你休教一時風火燒了咱百年恩愛則為你衾寒枕冷咱厮敬重一家無外你這般假古􅞕微身子粧些台孩可知道死了杜甫亡了韓愈渰殺李白你可甚賢賢易色元和令便有那曺子建七歩才還不了龎居士一分債他那般􅂔昻昻胸次捲江淮你可是酒膓寛似海則想我夜􅀷私出綉房来實丕丕擔着利害上馬嬌一来是天地差二来是縁分該則你箇楚宋玉自裁劃待􅀅這無出路巫娥推出門外我為甚麽来干教我空下楚陽䑓逰四門􅁍正是蒺藜沙上野花開可不道疑是玉人来則為你冷清清難把長更捱砌下亂蛩哀咍我特地􅊥多才勝葫蘆休着我􅀝㝎門児手托腮休􅀅那不覩事的話児揣小的們天生酒量窄道的我速速眼跳氲氲的耳􅀬忽忽的燎雙腮么篇你見我兩朶桃花上臉来則怕你悔後也棟梁材哎你箇秉燭顔淵自鑑戒兀的般月斜風細更䦨人靜天地安排后庭花保親的論孟白主婚的唐漢䇿送女的霜毫筆守親的是硯䑓你既怕女裙􅁫無心相待枉􅀅伊厮定害王子髙不好色周瓊􅁎忒分外卓文君是不諧栁葉児哎你箇漢相如休恠則要你温我的浸冷羅鞋干教我羞荅荅􅂴把門程邁哎你箇梁山伯不采我這祝英䑓羞的我怏怏児囬来􅀉生草你則怕擔煩惱惹罪責為姪児恐怕尊姑恠書生不好隂人愛莫不你一家児受了康禪戒量這箇彩雲喫打有何羞尚猶似文玉下馬􅀅荆條拜尾聲得了手有情分的斷膓詞自惹下塲無氣路相思債這一箇小書舍裏天寛地窄也不索對天地􅀃山盟言海誓喒則是常川似今夜和諧􅂃栽排怎肯教信㫁音乖則要你常准僃迎風户半開来日箇一更左側我則要倒􅀝門児䓁待我䓁的夫人燒罷夜香来􅀧絳唇嘲塩啇聖人道良賈深蔵􅌂然人望都是些虚謙譲全不學尊重安詳岀来的豪􅂔有三千丈混江龍一箇箇做模打様豈不聞有麝自然香矜驕傲慢聲􅀔虚張通中不到一千三百引嚮畨了二十九塩塲父親是尚書舅舅毋親是少保姨娘動不動結交官長来不来送酒牽羊去不去鳴鑼撃鼓行不行號帶旗鎗南門李運司張謁舅劉􅊥新王㝷㡬箇歪皁􅀠立在店門前覔㡬箇假軍牢擺在船頭上聴不得撇虚擣抗覷不得詭詐􅁿狂油葫蘆借了支頭不下塲每日家沒事忙花錢酒債少下尋常狂朋恠友頻来望風姨月姊閑飄蕩今日殺箇猪明日宰箇羊到晚偎紅􅀝翠在銷金帳抵多少窮漢半年糧天下樂擺列着金􅁫十二行怕不待風光滿画堂飛觥走斚開宴賞怎不教人心下思腹内想最難熬壷中日月長那吒令黒􅃮匣退光紗羅衣滿箱白綾􅀍噴香玉磚堦錦粧茜紅氊苫床羙人圖滿房到晚来着處偎白日􅂻沿門串毋拘束放蕩行蔵鵲踏枝這壁廂飲瓊􅄴那壁廂列壺觴李四家者也之乎張三家􅀃短論長帶兩箇虚措脚幇閑的伴當穿兩件不着體恠色衣裳􅀉生草棋盤領三寸闊􅃓袋䄂四尺長戴一頂窄􅉉髙頂京時様披一件揪頭刺褶新時様穿一雙捲尖疊腦興齋様麄絲絛勒在胯骨􅁁細包巾褁在額顱上么篇栁條掙的門牙亮阿膠掠的水鬂光他道是一人自有一生相那􅂻有年頭支過年稍帳􅁍原来羊毛出在羊身上虚飄飄使㡬貫鄧通錢實丕丕捱㡬頓伯俞杖尾聲路引在李家􅀵塩引在蕭家放倉鈔在陳家當着處里撇白調謊酒友詩朋劈面搶到人前手脚慌張檢空嚢賣盡了衣裳怎得閑錢雇小郎虚飄飄鎻兩箇籠箱絮叨叨寫㡬行支帳只㺯得嘹叮盂撒不還鄉􅀧絳唇贈麗人嬌艶名娃年方二八風流煞􅀁事撑逹引的人牽掛混江龍茅庵草厦嬌滴滴一朶海棠花言談俊雅音律熟滑千葉内生成紅菡蓞九蓮中活現的小菩薩心靈變勝似亞仙名性聰明不在蘇卿下良金􅁕色羙玉無瑕油葫蘆六幅湘裙簇絳紗綉鞋児半折歩金蓮窄窄印堤沙羊羊韻韻堪描画標標致致人嗟呀外面児波浪撑就里又心性耍玲瓏剔透千金價􅁍怎生悞落野人家天下樂權倩東君做主咱真假事不洽俏風聲委實難按納甜話児荅應人實心児相待他似這般干風情全是假那吒令賞三春艶陽捧瑶觴玉斚翫中秋月華按銀箏玉甲向􅀷閨閗茶􅀝鸞屏鳳榻翆巍巍雲鬂堆紅馥馥花枝壓羙孜孜臉襯朝霞鵲踏枝則他那意通逹性堪誇軟欵温柔喜咲歡洽全不似求食串瓦章䑓街路栁墻花􅀉生草􅀎商謎慣續麻為知音兩意難抛下乍相逢惹的聲名大小心膓擔了些閑驚怕門児閉了再休踏眉児淡了教誰画么篇有那等喬相識閑磕牙使閑錢忙把花門迓強風情枉􅀍别人罵千相思勸不得咱家罷則為這賞花時㸔一叚好風光老生児􅀃㡬句􅇆膓話尾聲年紀到六旬来嘆世事如嚼蠟不快樂枉待怎麽那羙景良辰休􅀒他錦窩中小小生涯喚名娃板撇紅牙妙舞清歌閑咲耍春光正佳玉容堪画我則待占東風培養出牡丹芽􅀧絳唇隐士造化生成榮枯巳定天之命随運而行因此上固守虀塩困混江龍都只為世情淺分􅀝衡門感嘆暗傷情憂只憂嚢空父老愁只愁家業凋零七件事常無􅀁輳㡬般心事自沉吟到于今功名未遂學業無成年三十巳過四十􅀅臨天哎莫雄志命蹇不能施展大才時拙成何用因此蓬窓守拙陋巷甘心油葫蘆甑有蛛絲釡有塵不厭貧都只為二文錢鈔苦難㝷空教我南来北往無時㝎東奔西拽空成病富的呵交又交貧的呵親不親細觀世事何時定因此上白髪鬂􅁁生天下樂誰不待利已肥家幹蠱心好教我難也波禁時不来十樁好事九無成一㑹家腹中思心内忖好教我無計度其身那吒令有一箇趕齋的吕蒙他也曽受貧有一箇未遇的買臣他也曾􅀒薪有一箇胯下的那生他也曾時来呵賜金嘆先賢這人也曽受貧非小子無用無䏻鵲踏枝誰不待列簮纓做公卿誰不待獨顯髙衙􅀞閤銀屏誰不待朝歡暮飲誰不待白馬紅纓􅀉生草你便有文通智管鮑情你便有顔回徳行無人敬你便有蕭何刀筆無人問你便有蘇秦舌劍無人聴時乖咲煞小児曺有一日運来穩掛黄金印么篇屈沉煞風流體慷慨心有一日鵷列與三公並有一日華筵飲罷笙歌送有一日画堂春暖鴛鴦並有一日金􅁫十二列幃屏我􅀅意中人寫入丹青幀尾聲罷罷罷冷暖自家知厚薄歸扵命固其窮甘心守分詩酒生涯樂太平㑹髙人講究些寒温一任他傍人冷話児浸雖無邵堯夫義仁且養孟浩然之性挐雲手怎肎埋没了這平生􅀧絳唇贈妓萬種妖嬈一團俊俏十分妙百媚千嬌端的是閉月羞花貌混江龍他若是含情一咲朱唇一􅀧嵌櫻桃梨花玉體楊栁纎腰眉黛春山嬌滴滴眼波秋水緑滔滔可觀可㸔宜喜宜嗔堪憐堪愛難画難描撥銀箏音律韻悠􅀭唱陽春一曲依腔調你便有千金髙價怎䏻勾一剡春宵油葫蘆喜遇得樽前猛見了更那堪情性好言談語話那清標更那堪聰明伶俐諸般俏他可便續麻道字無差錯生的来柳様柔花様嬌知今愽古通三教鐡石人見了也魂消天下樂怎􅀎勾玉􅀣同棲翡翆巢無福的難也波消自喑約用心児訪㝷月下老者末你􅀎會弹䏻㑹舞䏻㑹綉䏻㑹挑怎生有前程無下稍那吒令􅄐情空懊惱我魂勞梦勞敢縁薄分薄盻明朝後朝斷膓籍上除了姓名姻縁簿上㝷箇着落一星星記在心苗鵲踏枝你與我自量度是評䟦你肯聴琴我便題橋趂青春年紀㓜小休辜􅀒好姻縁月夜花朝􅀉生草相思病何年盡姻縁事甚日了我見他知􅁿知重知分曉不䏻勾同行同坐同歡樂到教我添愁添悶添煩惱怎䏻勾咲吟吟花下燕鶯期㡬時得喜孜孜䴡日鴛鴦沼六么序眼前靣人千里耳􅁁廂音信杳隔三千弱水迢迢悶懨懨􅀑病難熬意遲遲情思心焦桃源洞不見分毫恰便似熖騰騰烈火燒祅廟白􅃼􅃼水渰藍橋我今生撅着相思窖好教我行眠立盹梦斷魂勞么篇哎你箇多嬌仔細聴着你肯花底相邀月下相招琴瑟和調同伴吹簫一世児團圎到老恁時節有下稍㝷一箇安樂窩巢散誕逍遥到大来志􅂔清髙當日箇謝天香李亞仙㝷思的到知髙低肎辨淸濁後来受了金花誥則學鴛鴦鸂䳵休學那燕子伯勞尾聲准僃着花燭洞房春安排下夜月笙歌咲那時節喜喜歡歡宴樂地乆天長成配偶一世児永逺堅牢画堂髙怕是麽暮暮朝朝則學那連理􅀣合歡帶比翼鳥寳爐香漸燒銀臺燈髙照成就了碧桃花下鳳鸞交􅀧絳唇子弟收心萬種閑愁一塲春瘦迷花酒燕侣鶯儔殢煞青雲友混江龍想着俺少年時候拈花摘葉甚風流見了些春風謝館更和這夜月秦樓俺也曾馬上抱鷄三市閗䄂中携劍五陵逰八箇字非虚謬玲瓏剔透軟欵温柔油葫蘆半世踈狂一筆勾􅀙今後都罷手一塲恩愛變為讐赤􅂃的紅裙不解嘲風口因此上青衫􅂃褪揉花手想着他眼底情更和那眉角愁則管里雲来雨去相迤逗終不是箇下塲頭天下樂則􅀍你啜賺的潘􅀰兩鬂秋想着你恩情也不甚又恰便似空中楊花水上漚我則待􅂿折您芲套竿撞出錦套頭到大来千自在百自由那吒令想當初你愛我時剪青絲一縷想當初我敬你時贈新詩數首你如今棄了我也㫁金􅁫兩頭想着俺那月下盟星前呪早㝷箇葉落歸秋鵲踏枝俺如今志難酬更咊你不相投悞了我鴈塔題詩虎榜名留有一日愽得箇五花誥在手則怕你消不得粉面油頭􅀉生草俺如今時間困目下憂則􅀅這三尺劍掃蕩了紅塵垢萬言策􅀘盡了乾坤漏􅀅五言詩奪盡了江山秀若是這栁耆卿愽得箇紫袍新你便是謝天香休嫌俺這黄虀臭尾聲􅀷􅤈笠􅂃遮肩麄布袍寛裁䄂撇罷了狂朋恠友打扮做箇儒流凨月所給了縁由誰信你箇􅀑狐尤誤了我談􅀏封侯早難道萬里鵾鵬得志秋則我氣冲斗牛胸蔵錦綉則我這状元頭强似您下塲頭􅀧絳唇􅄐思萬種愁煩一聲長嘆情無限阻隔着迢逓關山急切里盻不見南来鴈混江龍書沉華翰􅀛児卦卜兩三畨雲收雨散月缺花殘常恨燈花無㝎凖每嫌鵲噪􅑯聲繁這些時腕鬆金釧玉减朱顔塵蒙寳鑑􅁫嚲雲鬟怎生箇冷清清躭寂寞捱昏旦銀箏倦理錦瑟慵弹油葫蘆倚遍危樓十二欄掩淚眼望天涯一􅀧碧雲間我則見緑依依嫩栁連堤岸色蒼蒼老􅀣侵霄漢烟籠着江上水霧蒙着雲外山想雕鞍何處相牽絆怎生一去了不囬還天下樂蹙損蛾眉兩下彎愁㸔裙帶児䟎一㑹家想情人似尖錐􅀅肺腑剜針線又不待去拈茶飯又不待去飡想起来百般家心上􅂴元和令憶手標興不䦨害相思㡬曾慣愁的是衾餘枕剰半床閑沒揣的天又晚風吹簷鐡響􅃢􅃢不由人撲簌簌珠泪攅上馬嬌對面這月一彎竹數竿無語凭欄干意懸懸常把歸期盻更漏又殘這愁悶怎遮䦨逰四門折下鸞凰在兩下单莫不是分薄與縁慳方信道􅀙来好事多魔難月下老索相干把姻縁簿再重刪栁葉児咱兩下里相覊相絆得􅇛圎諧老非凢便荆􅁫布襖心無惮至如白石爛海枯乾盡今生共死同棺賺煞飽蘸兎毫新􅁿展鸞箋燦上寫薄命妾端肅奉簡任莫得厭滔滔字様繁詞源流三峽波瀾都只為景䦨􅃢情意相關休得要看承做等閑一字字叙别一聲聲長嘆付雲鴻先此報平安􅀧絳唇放逸雨舘雲鄉綉幃錦帳風流况􅀼玉偷香慿俏倬相侵傍混江龍若到那尊前席上言談語句不㝷常嘲詩習杜牧詠詞彷知章狂客名竒才子俊騷人聲譽染情娘者莫待飛觥走斚歌曲文章撥錦瑟鯤絃聲䴡吹紫簫鸞韻悠􅀭折栁攀花洒落偎紅􅀝翆行蔵糴旖旎買春芳用軟欵配鴛鴦俺則是留傳俊俏寫在青樓他則是遺存標致在鳴珂巷慿温柔和􅂔把翆䄂相􅀅油葫蘆若到春門學謁􅄴非是謊這桃花人靣正相當更那堪沈東陽豈把東風蕩若到那謝家庄頻覔桃花浪千金買一咲因十年曾戀艶粧鶯儔燕侣多情况你不見蝶舞為春忙天下樂若覔殘紅逹椘陽應當雲錦鄉糴風買雨㡬萬塲戯春風燕子樓伴紅裙風月堂怎肎似㺯笛回故鄉那吒令我則待桃源洞去翫賞到鶯花寨挿掌雨雲祠中配行風月􅀁占塲􅀵金錢趕艶粧􅂑紅葉題詩上驟駿馬曾折垂楊鵲踏枝後期約在東墙因待月赴西廂也曾去彩扇上題詩也曾去花影潜蔵把瑶琴撫一曲早勾鸞配凰引的駕車人心意踈狂􅀉生草金縷合銀箏唱陽春歌白雪章寫鸞箋鳳簡心舒暢􅀉魚書鴈信添惆悵聴鶯聲燕語多情况怎肎道三春􅇳􅀒了杏花顔我則待九仙種的芙蓉放尾聲則待要月下聴笙簧夜宿鴛鴦帳醉扶在秦樓洞房看嬝娜銀燈下宜翫賞不風流豈敢承當自斟量歌舞成行一見了痴呆多半晌則􅂅的陽臺夢長臥華胥枕上共一枝海棠花瀟洒在雨雲鄉􅀧絳唇子弟收心仔細思量數年飄蕩嬌模様東躱来西蔵􅄸不的烟花帳混江龍㡬畨着盪買花錢逼的我似追賍不通卯竅撞入圍塲恰便似奔鳥落入呆漢手好花輸與富家郎一身歪枳兩手精光啞人做夢􅀖老着傷甘心而忍情􅂅伏降你與女娘行吿一􅁓養家符風月􅀁挿一􅁓􅀙良状贖一粒還魂的苦藥覔一椀救命虀湯油葫蘆想起􅀙前歹勾當都是些謊生生的都做了眼前瘡喉嚨裡恰嚥下羊羔醸腦背後早喫狼牙捧嚥不下口内涎餂不着鼻凹糖有心待奪了平康巷都做了精皮膚謊歌郎天下樂似這等死狗形骸扶不上墻行蔵自忖量抵牙關試􅀅逐件想恰便似無頭鵞絶了翎無脚􅈉擠了黄恰便似沒頭蝱着處撞那吒令我如今悔也出十年酔鄉我如今悔也跳千層法塲我如今悔也盖三間草房再休想􅀑化狐再休想蛇吞􅁚我和你有甚麽啇量鵲踏枝侍奉着老尊堂還守着舊糟糠萬卷詩書百畆庄田閑来呵把孩児教養不強如無事處着忙􅀉生草靜􅂻精神壮閑中日月長􅅾囱茅屋梅花帳再不去􅁿紅軟翆􅀅身傍怕的是蛾眉蝉鬂玉樓人㝷㡬箇烏靴皂㡌白衣相尾聲關目児柰心聴科範児􅀙頭講做了些諕􅀑瞞神勾當止不過蝶使蜂狂細叅詳不比㝷常他都是挑販郎君鐡嘴行休嫌這話長我􅀅義来展放寫與你保身惜命養家方􅀧絳唇贈妓淡掃蛾眉粉容香膩嬌無力緑鬂雲垂旖旎腰肢細混江龍性資聰慧對着這風花雪月有新題金箆撃節翆袖擎杯妙舞㡬畨銀燭暗清歌一曲彩雲低朝朝宴樂夜夜佳期偎紅倚翆綉幌羅幃生在這錦林花陣繁華地逞風流在銷金帳裡叙幽情在燕子樓西油葫蘆則這送舊迎新有盡期少年時䏻有㡬我則怕鏡中白髪老来催有一日花殘色改容顔退到頭来怎是你終身計床頭又嚢篋乏門前又鞍馬稀趂青春若得箇良人配怎做得張郎婦李郎妻天下樂引的些俊俏􅀰君着意迷使了虚脾小見識䧟人坑儘􅀷難見底惹得人父毋嫌搬得人妻子􅄐便䟎得錢財多有甚竒那吒令盈斟着酒杯則不如桒麻紡織􅁿羅細絲則不如荆􅁫布衣珎饈羙味則不如家常飯食免得棄舊人迎新婿到大来無是無非鵲踏枝昨日箇叙别離今日箇待相識眼面前秋月春花頭直上兎走烏飛嘆光隂白駒過􅂩我則怕下塲頭樂極生悲􅀉生草早㝷箇歸秋日急回頭也是遲誰待要陪狂伴酔筵間立誰待要迎妍賣俏門前􅀝誰待要打牙訕口閑淘􅂔少不得花濃酒釅有時休那其間東君不管人憔悴金盞􅄦費追陪咲相随東家㑹了西家㑹毎日家逢塲作戯強支持擎杯淹翆袖翻酒汚羅衣抵多少惜花春起早愛月夜眠遲后庭花喚官身無了期做排塲抵暮歸則待學不下堂糟糠婦怎做得出墙花臨路􅄮使了些巧心機那里有真情實意迷魂湯滋味羙􅁓湯瓶􅀬火煨初相逢一面児喜􅅻别離便淚垂青􅁔児䟎下些家縁家計做不着盤􅆞盤費不問生熟辦酒食他便要㺯盞傳杯􅀃是談非斜眼相窺口角涎垂喫得来東倒西歪醉淋漓受不得腌􅧐􅂔尾聲跳不出引魂靈的綺羅叢迷子弟鶯花隊費精神花朝月夕酔舞狂歌供宴集樽席上做小伏低歛愁眉強整容儀你便是法酒肥羊不甚羙子不如績麻撚絮随縁活計那其間方是得便宜􅀧絳唇子弟退省半世着迷十年遭晦􅀙頭記似酔如痴只落的長吁􅂔混江龍到如今成何之濟恰便似滿船空載月明歸再休題秦樓謝舘栁陌花溪青瑣闥中鸞鳳友碧桃花下燕鶯期香嬌玉軟翠􅀝紅偎香肩厮並玉手相携同聲同􅂔同飲同食枕􅁁廂知冷􅉯好心膓被窩裡難割捨真情意怕不到􅀲甜􅁡就少不的水盡鵞飛油葫蘆急早抽身也是遲休古自不省的他便是箇塗眉画眼啜人賊便有多䏻多㑹多謀智迯不出一擒一縦牢籠計血􅅹􅅹月下盟碜磕磕星前誓􅂅與你百年偕老成佳配永逺做夫妻天下樂攛斷上髙竿掇了梯那話児休題眼睜睜埋怨誰船到江心􅀘漏遲想當初鄭元和錯用心馮貟外不見機三千茶塩落水那吒令赤􅂃的小妮子扭南列北赤􅂃的老鴇児指張来罵李赤􅂃的狠撅丁瞞神諕􅀑你便有七歩才他㝎下千條計怎􅀎勾半􅀧児便宜鵲踏枝都是些假虚脾錯認着好相識霎時間雨剰雲殘月缺花飛㝷思起就裡不由人嘆息這其間悔也難及后庭花嘆年光巳四十想􅀙前喬􅀁為恰便似陳摶睡分明是一夢裡你如今好收拾㝷㡬箇同儕等軰把􅀴書閑講習誦黄庭讀道徳叅玄機窮道理翫青山逰緑水奉親萱定省幃待糟糠循義理課家童勤種植處鄉情以信實青歌児呀這便是清閑清閑活計識破那繁華繁華風味抵多少無事着􅋉惹是非不用心機不使精細不費追陪不受驅馳大翻身跳出七層圍再不去爭閑􅂔􅀉生草打破這沙糖罐退出這菉豆皮俺如今眼睛花看不的鉛華媚舌頭頑嚐不出酸醎味耳朶聾聴不的笙歌沸想當􅀄鶯啼燕語緑楊天都做了淡烟衰草黄花地尾聲罷罷罷􅀙今後㝷一箇養家方定一箇終身計赤􅂃的光隂似水人到中年萬事知更那堪白髪相催苦奔馳火院相逼那討閑錢補笊籬他便有千般俊羙更與俺十分情意也則索望風拱手納降旗􅀧絳唇妓者嗟怨賣咲排塲就中冤枉有三千丈刦刦􅋉􅋉㡬曾得半句児知心賞混江龍他那時我依頭縷當斷了你那愛錢也把慢的鐡心膓見一箇沒錢的炒閙見一箇有錢的􅁍早着慌誰似你自做師婆自做神旋捏佛児旋燒香則被老䖍婆垜青蚨只到那斗柄􅁁怎得箇意中人横倘在咱身上也帶着箇􅀷􅀷􅤈笠穿着套寛褪衣裳油葫蘆隔壁攛椽没忖量更那堪不大量你則待早晨間栽􅀣到晚来要隂凉見一箇有錢的便對着勤児奨見一箇沒錢的便對着郎君嗓大古裡錢是你爺鈔是你娘􅀍你這一條踈刺刺赶鶯燕的黄桒棒折挫了多少富家郎天下樂可不道自有傍人話短長許来大的家私教我獨自當我比那拽車驢則爭不荅着箇套項我與你積下些柴糴下些糧尚兀自求食的不􅂔長金盞児則被你俏心膓引了我這死心膓死心荅地在他身上俺娘通天板障障障的俺不成雙每日家絮叨叨十萬句閙炒炒二千塲罵的我苦懨懨沒是處都教我意攘攘越思量一半児大驚小恠你門行唱呌􅀭疾揚疾敢是俺家長睜着眼做下合着眼承當我可便不張狂打疊起一半查梨一半児謊金盞児你見對錦鴛鴦恰成雙恨不的通身児都變做一條黄桒棒你便是箇大人家忖量􅀃話不周方你道你廣積了無限苦你道你多燒了些斷頭香你道你遭逢着這拖漢女我可便招􅂑着你箇愛錢的娘尾聲俺娘則教我伴郎君每逐朝新價例児随年長沉􅀧􅀧掂斤播兩歌舞叢中第一行今日我棄賤為良細叅詳别􅃟箇才郎那得是心厮愛門厮對户厮當你心児自想口児休強似這等好前程爭忍厮行唐􅀧絳唇三月韶光萬花爭向春開放紅紫芬芳膏雨過堪逰賞混江龍東風飄蕩麗人天􅂔景非常戯清波鴛紅鴨緑採名園蝶粉蜂黄香馥馥梨花白雪嫩緑依依楊栁翆絲長看了這山明水秀李白桃紅端的是堪寫在幃屏上聲嚦嚦鶯遷喬木語喃喃燕遶雕梁油葫蘆寳馬香車人閙攘把花藍春盛􅀅正值着艶陽天明媚景好風光一處處㑹佳賓玳􅈘筵寛廣一歩歩動仙音絃管聲嘹亮歌謳着金縷詞酒斟着白玉觴咲吟吟且開懐展放江湖量只恐怕春歸去太疾􅋉天下樂因此上􅂸了醄醄入酔鄉見芳草池塘夭桃間緑楊端的是花撲撲賽過錦綉鄉蹴踘聲吹到綺筵鞦韆影送過粉墙回首早散荼䕷滿院香那吒令過清和􅂔爽葵花開艶芳起薰風淡蕩藕花吹異香正炎天晝長榴花綻錦嚢遶方池圎沼中敢向水閤凉亭上揺紈扇浴罷蘭湯鵲踏枝碧荷筒飲瓊􅄴白蓮藕雪氷霜正好宜沉李浮􅀲避暑乗凉人和着採蓮腔載蘭舟画舫湏􅁷間又早重陽􅀉生草一任教西風墜烏紗㡌且喜得東籬下菊正黄趂着這凝霜紫􅈉偏肥壮旋􅀅那新篘緑蟻頻釃盪和俺那知心故友同歡暢恰􅅻見丹楓􅀣葉滿林間􅁍又早彤雲四野􅀙天降六么序呀冷颼颼寒成陣踈刺刺風力狂剪氷花應瑞呈祥恰便似蝶翅飛􅀭鶴羽翺翔􅃻竹葉風透幽囱採樵人迷路難行往便有那打魚翁怎向寒江􅅍紛紛撏綿扯絮空中降這雪消灾壓瘴更那堪宿麥遺蝗么篇這雪偏宜向髙堂蘭房氊幕􅁓張翆䄂成行錦褥牙床綉􅀍鴛鴦􅀷把那重門閉上呀梅花開送暗香韻悠悠歌着竒腔按着宫啇炭火上燒着肥羊金杯中淺泛羊羔醸便醺醺酔後何妨受用些紅爐煖閤銷金帳慶得是豐年稔􅀊樂的是地乆天長􅀧絳唇文人遂志十載寒窓半生指望登春榜今便懐寶迷􅀖誰肎舉直錯諸枉混江龍赤􅂃的斯文未䘮空􅀅羙玉韞匵而蔵你便䏻勾片言拆獄一語興􅀖不去蘭省一朝登北􅊴便想茅廬三顧到南陽毛錐乏盡鐵硯磨穿髙歌鼓腹談咲掀髯謾登臨慷慨仲宣樓我則怕有才無夀在顔回巷養浩然􅀽門積雪乆巳後空嗟嘆潘鬂成霜油葫蘆且休説我逺志􅁿離父毋鄉投京師應舉塲􅀅群儒􅀾退􅂔昻昻奪得翰林兩字標金榜便是禹門三汲桃花浪那時節進表章見帝王白衣脱在金堦上早能勾披紫綬換金章天下樂宣賜蒙恩出建章朱衣列在兩廂起蟄龍一聲雷震響㑹風雲志四方遂功名􅁓半張是俺男児當自強鵲踏枝咱想東坡伎倆怎比東山􅂔象怎做東床伴當主人􅀅東閤開直喫得東方亮問甚麽日照東方那吒令且休説翰林􅋉暫入他綺羅鄉我則見燭影摇紅月色昏黄他教小生酒喫的倒垂蓮前合後仰小生􅁍甚麽檢書史愰歛銀缸􅀉生草今日在編修院往常住氷雪堂詩魂髙壓山河壮琴弹神􅀑魂飄蕩劍揮牛斗昏無􅁚我􅀅九􅀴苦志二十年養就五陵豪􅂔三千丈么篇今日有千鍾禄往日無半合糧十年禮義勤習講半生塩菜貧修養􅅻落得金章紫綬髙名望我􅀅這五車黄卷隐胸中􅅻愽得一輪皂盖飛頭上􅀧絳唇諸􅁑平蜀秦失􅀖基漢劉爭利施謀智倚仗權威天命歸仁徳混江龍君臣際會豪傑英俊似雲集張子房運籌帷幄韓元帥􅀾勝迎敵蕭丞相輔弼國家遵法律不絶糧草撫黔􅀺整頓的江山鞏固揩磨的日月光輝肅靜了亡秦宇宙扶立起炎漢華夷調􅂦鼐理塩梅播星斗吐虹霓逼的箇秦子嬰係􅖪獻降符逼的箇楚重瞳自刎在烏江内一来是天上差命二来是臣宰扶持油葫蘆􅂦足三分漢社稷占天時曺孟徳他則待令諸矦施權柄逞奸回事無成一命歸泉世廢獻帝做山陽公便把曺丕立論東吳孫仲謀據長江千萬里􅀝仗着龍韜虎畧多雄􅀔得地利可料敵天下樂劉先主人和是國戚占了西蜀建帝基山河帶礪殷富國他則待復故􅀖雪舊恥不􅀎勾統乾坤同混一那吒令若論着智謀有軍師李直若論着威武有雲長益徳若論着英勇有子龍孟起老􅀅軍黄漢昇多剛毅一班児􅀅先主扶持鵲踏枝沙塲上慣驅馳陣靣上惡迎敵雖然是􅀅勇兵強􅃜軍師妙䇿神機想當初赤壁下鏖兵對壘片時間艢艪􅁅飛􅀉生草丞相要平夷虜我待要除逆賊剿遐荒強􅁀無遺􅀋見如今曺丕虎踞中原地我則乗虚䑕􅀼西蜀地軍師前論黄數黒説兵機正是班門運斧誇強㑹六么序擎天柱堪稱許棟梁材衆􅀁知習韜畧善説兵機慿丞相妙䇿􅀷竒雄斷無疑曉天文地理精微堪為舟楫􅀎經濟敢當先斗膽誰及共軍師報國把功勞立他則待心存漢室振撫華夷么若到那􅁁陲兩陣迎敵砲響春雷鼓譟征鼙馬驟狻猊耀武􅀭威斬􅀅奪旗剿捕渠魁􅀅他那小醜妖氛靖洗喜孜孜得勝回四海傳檄萬國皆知奏鑾舉獻俘丹墀玳筵開慶賞風雲㑹麒麟殿圗寫容儀功勞顯耀英雄軰咲吟吟加官賜賞喜孜孜的􅄻子封妻尾聲􅀧士馬便興師按遁甲擇良日打磨了鎗刀劍㦸搠立起中軍帥字旗快疾􅀅糧草收拾莫要稽遲托頼着聖主洪威你若是得勝先􅀅露布齎削平了宼賊撫安了􅁁地恁時節班師得勝凱歌回􅀧絳唇陶淵明歸去来􅀆歸去来􅀆故鄉近日田園内蕪草荒迷催把微官棄混江龍既心為形役何湏惆悵獨生悲悟往㢤不諌知来者堪追昨日方知今日錯今朝便覺昨朝非舟摇摇以􅁿颺風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇適我閑居意雖休官早每恨歸遲油葫蘆荷月鋤田夜始歸有歡迎僮僕随􅀱門椎子咲牽衣栽五株翆栁籠烟細種一籬黄菊凝霜媚三􅈳雖就荒喬松喜不移盻庭柯木葉交蒼翆長把咲顔怡天下樂雖設柴關鎮掩扉無為交暫息既世情巳與我􅂅違看出岫雲始騰羡知還鳥倦飛撫􅀌松心似水那吒令恱髙朋故戚共談玄講理愛扶笻屧􅂂辦登山翫水早休官棄職肯折腰為米􅀷蒙雨露恩自得鋤匏力問恁每此興誰知鵲􅂿枝與猿鶴乆忘機共琴書自相陪舒嘯東臯適興東籬誰待要勞神費力不䏻勾展眼舒眉􅀉生草一任秦灰冷􅀙教晋􅂦移􅀝囱或樂詩書味􅀙流或棹􅀌舟濟登山或命巾車力羙㢤之志樂田園浩然之􅂔衝天地么農夫告春􅀅及朝来雨一犂新生木葉欣欣宻長流泉水㳙㳙細旋開黄菊叢叢媚有時矯首恣逰觀䇿扶老以欣流憇金盞児去来􅀆莫呆痴寓形宇宙䏻何㡬悉不為去留迷咲遑􅀅底用聞汲汲􅁒安歸知帝鄉身不利任富貴􅂅皆違尾聲喜植杖止耘耔莫開口談興廢善萬物逢時􅀁喜休感吾生駒過􅂩喜忘言更巳忘機賞東籬採菊浮杯坐對南山山色􅂻逍遥度日優㳺終􅀊樂夫天命復奚疑􅀧絳唇發憤忘食浩然之氣衝天地志節威儀無友不如已混江龍後生可畏君子謀道不謀食與人恭而有禮侍親行孝無違僣禮季孫為八佾管仲之器有三歸欲誠其意先致其知莫見乎隠莫顯乎微言思聰色思温貌思恭志於道依於仁據扵徳㳺扵藝人而無信大車無輗油葫蘆由也升堂未入室聞過喜雖居貧賤不䏻移禮之用和為貴先王之道斯為羙身巳修家可齊欲平天下先治國如何是舉枉錯諸直天下樂三省吾身禀信實時習學在已聖人言四十而不惑富可求賤可恥雖執鞭士吾亦為之那吒令若用之則行道千乗之國若舍之則蔵居十室之邑果道之不行便遷居九夷貧而無怨難富而無驕易學南容三復白圭鵲踏枝季文子正其誼晏平仲仕扵齊善與人交乆敬無移師也過啇也不及惟顔淵聞一知十􅀉生草司馬牛無兄弟冉伯牛有病疾臧文仲居蔡何為知王孫賈媚竈誇權􅀔公冶長縲絏非其罪為人克已總由心出乎其􅀋㧞乎萃么桒伯子啇扵魯微生髙豈為直泰伯譲國人稱羙景公千駟終無徳夷齊餓死人稱義君子憂道不憂貧學也祿在其中矣尾聲敏扵事慎扵言入則孝出則弟豈可窮斯濫矣􅇞武子其愚不可及噫曾參道統傳遺嘆顔回正人心三月不違道也者湏􅁷不可離異端並起道之􅀅廢總不如風乎舞雩詠而歸􅀧絳唇大埋伏天淡雲􅀌怨雲愁霧施英武威鎮征夫􅂑勝如神助混江龍全按着周天之數九宫八卦立錕鋙怎肯道差持了劍㦸失配了軍卒安排下走虎飛龍扶社稷准僃着釣鰲網索困江湖第一陣乾為天天門隐遁第二陣坎為水水居同謀第三陣艮為山神符隘口第四陣震為雷識逹賢愚第五陣㢲為風烟塵浩蕩第六陣離為火火燎寰區第七陣坤為地栽花接果第八陣兊為澤蟠足潜跡第九陣中宫安寨第十陣惡黨􅇯􅀙上按着九天紛紛殺􅂔下按着八埏靄靄神謀若你有萬人之勇直殺的你力盡觔舒鳥蔵在􅀷林恠􅀣獸潜踪在野嶺蕪居隔山聞軍卒相應隔澗聴画角喧呼閙垓垓鳴金走陣齊臻臻擐甲征夫縦你除天可害難迯這十靣埋伏天之道天之理天之數張良用黄公三畧法韓信用吕望六韜書油葫蘆則聴得呐喊揺旗齊譟鼓縦征􅟯親去􅂑則今畨一朝定國見一箇贏輸為君的開基創業齊天福為臣的要安􅀖定國上功勞簿平地上起戰塲髙阜䖏立帥府更那張司􅀙蕭相國劉髙祖韓元帥山頂上運機謀天下樂聴得動一􅂀簫韶品奏覇主髙呼罵韓信一餓夫你則待立劉􅀖覷吾如糞土仗無敵去便挐縦龍駒親去􅂑不隄防列千枝脚蹬弩那吒令我這里望上射飛蝗驟雨望下砍使大刀巨斧密匝匝隊伍要擒挐項羽見樊噲旗在手便磨在垓心處整􅀧起百萬軍卒鵲踏枝一箇箇腆着胸脯用着權術恰便似砍瓠截􅀲刈葦釤蒲口􅄍着狼烟氣毒他不隄防先有了埋伏􅀉生草􅀅項羽圍在這垓心内九里山一字児擺下陣圗更有那張司徒吹起傷情曲衆児郎流淚思鄉土吹散了八千子弟歸何處􅀅軍你有何面目向東吴那里烏江不是無船渡􅀧絳唇杜牧之醉寫楊州夢錦䌫龍舟可憐空有隋堤栁千古閑愁和他春老瓊花瘦混江龍江山如舊竹西歌吹古􅀭州三分明月十里紅樓人􅀝雕欄品玉簫手捲珠簾上金鈎淮南風月景天下最為頭罷干戈無士馬太平時世省刑法薄税歛民物悠悠列一百二十行􅀴商買賣透四萬八千門人物風流平山堂竹西閤閑花野草九曲池小金山白鷺沙鷗銀行街米市街如龍馬驟天寜寺雍熈寺似蟻人稠文章客傲王侯峨冠愽帶豪傑士蕩風埃肥馬􅁿裘茶房内泛松風香酥鳳髄酒樓内歌白雪檀板鶯喉接前庭通後閤馬銀街砌遶朱䦨近綺户􅀛背毬樓金盤露瓊花露醸成佳醖太官羊栁蒸羊炮􅄿珍饈看官塲愛軃䄂垂肩蹴踘體教坊慣清歌妙舞俳優着􅁿紗穿異錦齊臻臻按春秋奏繁絃吹急管閙炒炒無昏晝􅂸數萬兩黄金買咲散㡬百叚紅錦􅆞頭油葫蘆為甚麽月底籠燈花下逰􅀅飲興酧我向綺羅叢封作醉鄉矦斟着錦橙􅄴渲淨談天口折􅂑碧桃花拈荅住拏雲手且打疊起太學挺拽扎了翰苑搊趂着錦封未折香先透渇時節飲盡洞庭秋天下樂上兀自一盞􅀎消萬斛愁三甌扶起頭我待紅裙㑹中奪一籌飲酒呵灌得咳嗽看花呵沁成證􅀱都不如勝簮花常殢酒那吒令倒金瓶鳳頭捧瓊􅄴玉甌蹙金蓮鳳頭顯凌波玉鈎整金􅁫鳳頭露春纎玉手若還天有情天也老春有意春先瘦山有情呵山也頻愁鵲踏枝花比他少風流玉比他欠温柔端的是燕尔消魂鶯也蔵羞看蜂與蝶是花間四友呆荅孩荳􅞦稍頭􅀉生草我空央到十箇千嵗他剛嚥了三箇半口顯汚了内家粧束紅鸞䄂越顯出些宮腰體態纎楊栁道添出些芙蓉顔色嬌皮􅁏白處似梨花粧冷粉酥香紅處似海棠暈暖臙脂透么磨鐡角烏犀冷􅀧霜毫玉兎秋對明囱滄海龍蛇走蘸端溪石硯雲烟透拂鸞箋湘水波紋皱投至看吳宫花草二十年少不的翰林風月三千首后庭花應荅得意思児投咲談得局面児熟􅂸了我夜月携紅䄂不覺春風到玉樓這酒呵怎生嚥下咽喉動勞你箇田文生受氣昻昻才包古今吞宇宙熖騰騰噴􅄍虹霓射斗牛寛綽綽拂䄂紅雲出鳳樓興悠悠騰駕蒼龍遍九州樂陶陶醉賞瓊花雙玉甌香馥馥斟一杯花露酒青歌児呀央及煞偷香偷香韓夀不驚回兩行兩行紅䄂感謝文章賢太守我是江海􅂻儒流傲宰相王矦咱賓主相留我叙筆硯交㳺㑹詩酒綢繆他悶􅀝着雲兠􅂃控着驊騮觴賦蘭舟潯陽江水悠悠蘆花楓葉颼颼紅蓼汀洲白鷺沙鷗話不相投不爭聴徹琵琶楚江頭休淚濕了青衫䄂尾聲比及客散画堂中不隄防人約黄昏後這花呵不比泛常間墙花路栁這公事怎肯痴心児干素休引惹得人強風情酒病花愁掃愁箒爭如捧箕手者麽你鬂邉廂霜華漸稠衫䄂上酒痕依舊只我這㑹風流的到老也風流􅀧絳唇蘇子瞻風雪貶黄州萬頃瀟湘九天星象長江浪吸入詩膓都變作豪􅂔三千丈混江龍絲綸閤上紫薇花對紫微郎歩九重春色拂兩䄂天香萬里雲烟揮翰墨一天星斗煥文章若非是翰林風月京洛山川洞庭烟􅀣金谷瓊園怎䏻勾一輪皂盖飛頭上詩吟得神號􅀑哭文警的地老天荒油葫蘆想月滿西樓夜未央蒙君恩宿建章不比長安三日荔枝香那里翆鬟擁出芙蓉帳湏不曾醉鞭悮入平康巷笙歌䖏䖏聞靜鞭三下響驀揣的半張鑾駕􅀙天降翆輦中彷彿見君王天下樂􅁍便是一朶紅雲捧玉皇止不過昭陽飲玉觴那里􅂑六宫羙人恨煞秋夜長下珠簾處處凉撒金蓮歩歩香月明中吹簫引鳳凰那吒令我一身紀綱守簞瓢陋巷顯一生􅂔􅁚歩金門玉堂上一封諌章入天羅地網錦綉腸江湖量都變做水國魚􅀖鵲踏枝萬言䇿獻君王一􅀐馬渡衡陽霎離了三島蓬莱直走遍九曲滄浪學不得李太白逍遥入酔鄉可做了韓昌􅀺昔貶潮陽􅀉生草臣則􅂅居蠻貊再誰想立廟堂今日曾參難免機梭誑周公也難免流言講有仲尼也難免狐裘謗本是轅門獻賦漢相如怎做的東籬賞菊陶元亮公篇臣折麽流儋耳折麽貶夜郎一箇因書賈􅁩長沙放因詩杜甫雲陽塟因文李白江心䘮臣本是屈原千古汨羅江怎生做禹門三汲桃花浪金盞児不愿狂不荒唐折末你雲陽梟首在髙竿上煞􅀅碧天風月兩平章􅂸着夢魂逰故國想像赴髙唐則今日傷心逰海島携手上河梁尾聲罷罷罷不入犬羊群難躱鯨鯢網直貶過滔滔大江不是行人不㫁膓接天涯烟水迷􅃼更有那助凄凉衰草夕陽再休想築起髙䑓望故鄉這里有當途虎狼他那里潑天風浪趂祥烟飛過水雲鄊􅀧絳唇亞聖樂道顔子簞瓢季倫家道為官爵富貴奢豪未若貧而樂混江龍豈不聞聖人憂道貧而無謟富無驕假若是堆金至北斗少不的身卧荒郊比及看滄海塵飛㡬度絰少不得北印山髙塜一週遭觀流水光隂急急嘆虚名塵世飄飄似􅁿鷗浮扵水面如曉露綴扵花稍􅀞簷間蜘蛛結網銀漢外鳥鵲成橋彼也虚名薄利任他人禄重官髙撚指間朱顔昨日急回頭白髪明朝被日月暗消年少向循環困殺英豪富貴是惹灾題目榮華是種禍根苗酒色是斬身之劍財氣是致命之刀牢鎖住心猿顛耍􅂃拴住意馬咆哮看野鹿㗸枝瑞草咲猿猴獻㑹仙桃我遣興藥爐經卷使吾心草􅂂麻絛採靈芝蓬萊頂上種胡麻野角山腰戴簮冠捱會寂寞住茅庵打會勤勞五七畆閑庭小院兩三間茅舍蕭蕭唱道情逍遥快樂趂農時耕種鋤鉋我縛定風波口是禍之門我則待隐林泉身退天之道須不如張良棄職待學那范蠡辭朝油葫蘆想閬苑神仙麄布􅂁恁為官實是好誰待要海山中歸去醉蟠桃我則待是非海内抽身早你待要利名塲上鑚頭閙明説道在醜不爭在上不驕人無百􅀊人枉作千年調不如去閑訪漁樵天下樂你看萬里風頭鶴背髙􅀅閑憂愁消散了利名塲上再不去染汚着每日􅀅絰卷習世事曉早一塲活計了那吒令秀才每應舉呵􅃟塲中放鵰令史每􅂑状呵司房中􅊥爪官人每問事呵公􅈦上看招縦有官長廉又被曺吏毎拗赤􅂃的不辨清濁鵲踏枝有學的是小吾曺無意的逞英豪岀来的惡紫奪朱一箇箇折桂攀髙動不動拏人做錯甚的是晏平仲善與人交􅀉生草見帶着烏紗㡌又想掛紫錦袍紅塵滿面真堪咲白頭無力應難蹈空學得千卷萬卷聖人書剗地里七月八月長安道后庭花靠一峯鎖烟霞山􅀔髙住一間避塵俗茅舍小做一床盖乾坤黄紬被穿一領傲風霜麄布袍每日價醉醄醄綸巾顛倒看春風桃李嬌賞羊羔瑞雪飄冬天梅信早㡬畨児厮撞着酔郷中􅂑快樂青歌兒呀我則待酒中酒中得道情􅂅髽髻髽髻環絛酔歸来一任傍人咲蓬莱島走一遭我跨蒼鸞酔赴碧蟠桃􅀧絳唇子弟收心花面金剛綺羅形像喬模様玉體魔王但遇着遭魔障混江龍想着我數年飄蕩都為那春風一曲杜韋娘使了些沒疼􅀬錢鈔棄了些有子粒田桒只落得􅁚板􅁿敲籠彩袖銀箏欵撥對紅粧我聴了些滛詞艶典他喫了些羙酒肥羊我廢了些金銀頭面他置了些羅錦衣裳我典賣了些東西園圃他盖造了些前後房廊我若不千金買咲他怎肯萬種思量我假若一時不到他便就去處唱􅀭我戀他時乖運蹇半生貧他愛我家肥屋潤十年旺􅀙今後再不去花街栁陌躱離了月户雲囱油葫蘆􅁓様恩情不乆長我自忖量都是我錢財買轉了得成雙你若是無錢呵便休想同羅帳他那里不便宜怎肯相親傍他只待錢親人不親財香人不香我為他把潑天般家當無歸向恰􅀵心惟有一空嚢天下樂他轉眼看人陌路傍有甚麽貞良做了些歹勾當他只待接金銀着斗量我􅀅那箱籠内財都放做烟花帳閃煞我張敞画眉郎那吒令想那糶風月的女娘似饑狼餓狼覷那販茶船的巨啇似肥羊胖羊便有贍天才智量索投降納降你便有子建䏻潘安様躱不過他舌劍唇鎗鵲􅂿枝我細思量細叅詳他則待送舊迎新惜玉憐香管甚麽張郎李郎在茶房酒房若得了㡬文錢就與他成雙􅀉生草想當初馮員外愛蘇卿沒主張把三千茶送在平康巷五百塩堆在章䑓上十塊鈔卸在梨園放只落的滿船空載月明歸一㠶虚影風飄蕩么篇王魁是攀蟾客桂英是栁陌娼他未得時權且相親傍未為官暫且同鴛帳未榮華苟且􅀅香降一箇在海神廟􅂻做冤魂一箇在金鑾殿上為卿相后庭花我雖是乍􅀵心有紀綱我怎比撲燈蛾為色傷我再不捨命撞迷魂陣怕的是風流劍下亡想着翆紅郷女娘每一箇箇雄壮他慣埋伏有智量子弟每都受降急回頭都中傷腦後砲怎的防青歌児呀想着那鄭元和在曲江曲江池上見了那李亞仙風流風流模様他發賣傾嚢配作雙次後来歸不得家郷見不的爹娘典賣了船倉缺少了衣糧只弄的水盡鵞飛􅂔不長少不的提瓦罐街頭唱賺煞我跳出了萬丈穴界破了千㝷浪我這里斷送了朝来暮往則教他勾抺了恩情再休想􅀅他那杏臉􅊝腮付與何郎再不心狂畢罷思量戀酒貪花不乆長􅀙前事巳忘管甚麽桃溪桃浪我只怕􅀍繁華誤賺了老劉郎􅀧絳唇月户雲窓翠屏朱幌青樓上楚楚紅粧國色真堪賞混江龍鳴珂里巷俏名児占斷錦排塲歌傳金縷舞着霓裳才貌絶勝蘇小小風流不譲吕雙雙聴嬿婉樽前唱比花觧語如玉生香油葫蘆杏臉桃腮宫様粧歩凌波羅韈凉真乃是春風一曲杜韋娘覷了這羞花閉月嬌模様識不盡撩雲撥雨虚情况安排下假志誠施逞些巧伎倆包蔵着賺郎君啜子弟瞞天謊外貌児甚端詳天下樂兀的不腦亂蘇州刺史膓司空休泛常若是楚㐮王見了也勞夢想怎禁他動人情的翆黛長蕩人情的雲髻光那更這透人懐的脘味長金盞児靠東墙近西廂佳人才子時相傍芳心宻意怎相忘引惹的崔生頻覔􅄴逼臨的韓夀偷香因此上棲遲風月􅀁留戀在雨雲郷尾聲箇中人心上想怕不道年少花容正芳只恐人心不乆長早㝷􅂑画閤蘭堂尚古自鳳去凰翔怎不斟量回首星星兩鬂霜少不的月缺也浮雲蔽蔵花謝也狂風飄蕩那其間蜂蝶誰賞好春光􅀧絳唇俊俏無雙滿身波浪風流像穿一套可體衣裳五彩綉新花様混江龍恰便相玉天仙謫降擁青螺雲髻巧梳粧珠揺翆舞寳嵌金粧粉臉􅁿粘金翡翆緑雲斜挑玉螳螂他本是描不成天下羙人圗塑不􅈬海内觀音様比花觧語比玉生香油葫蘆好便似咲􅀝東風醉海棠不索用脂粉粧一團和氣果非常則􅀍他偷睛児的我心揺􅃞俊龎児引的我神魂蕩今日箇正撞見喜神多應是前世里燒些好香今日在相思路上頭厮撞多情人遇着那有情郎天下樂他錯把我擎􅎑在手掌上常􅀅我人面前奨則他這真情児貼在俺行怎不教我眠思夢想恨不的􅀅他在額顱上活供養那吒令他那里􅁿匀了晚粧燒罷了夜香他那里在風光画堂他那里開玲瓏鎻囱擺列着玳􅈘筵歡飲着葡萄醸抵千金一刻風光鵲􅂿枝一陣陣晚風凉一簇簇芰荷香酒艶花濃漏永更長霎時間畢罷了宴賞引歸入洞房小壷天别是箇春光􅀉生草綉衾枕紅羅帳錦屏幃白象床銀􅄗燭影微微晃金爐香靄􅁿􅁿蕩紗囱月色朣朣上羙人稱了少年心書生遂了平生望六么序哎呀墨錠似烏雲軃粉團般玉體香分明在枕上端詳再何湏覔句東墙待月西廂􅀅閑花野草思量俺在那綉房中每日學張敞画蛾眉拂拭梳粧誰敢道五陵豪氣三千丈他也曾捧金蓮進􅂂拂綉榻鋪床么篇我為他呵􅀅十載燈囱學業抛荒情惹肝腸染病膏肓我則待成就鸞凰匹配鴛鴦清减得渾如瘦沈郎把一箇俏人児不比㝷常他也只是人心安在人心上有許多般難捨難忘他􅀅那兩椿児表記在咱這身􅁁放烏金戒指紫錦香嚢􅀧絳唇書劍生涯數年窓下學班馬吾豈匏􅀲待一舉登科甲混江龍愽得箇名􅀭天下宴瓊林斟御酒挿宫花珷玞石待價斗筲器矜誇如今洞庭湖撑翻了范蠡船東陵門鋤荒了邵平􅀲屈原假惺惺酔倒在歩兵厨謝安黒嘍嘍盹睡在葫蘆架没福消軒車駟馬大纛髙衙油葫蘆緑擁紅遮離御榻六官人􅋉併煞誰不知開元天子好奢華眼見的翆盤香冷霓裳罷恁時節紅牙聲歇梧桐下投至得華清池初出湯花蕚樓扶上馬則俺那殢風流天寳君王駕咲擁着嬌滴滴海棠花天下樂不付䏻鳳舞鸞飛出翆華喧嘩景物佳端的靄香風禁城百萬家望神仙離碧霄聴笙簧隔彩霞人都道蓬莱宫都是假那吒令香車載楚娃乞刺刺雕輪碾落花王孫乗駿馬踈刺刺金鞭拂落花逰人指酒家兀那青旗挿杏花寛綽綽翆亭邉蹴踘塲咲呷呷粉墙外鞦韆架香馥馥麝蘭薫羅綺交加鵲踏枝閙炒炒嫩緑草吠鳴蛙􅁿絲絲淡黄栁帶棲鴉碧茸茸芳草亭䑓煖溶溶流水人家杜䳌聲好教人恨他待送春歸一􅀣鉛華􅀉生草聳樓閣鴛鴦瓦暎軒囱翡翆紗捧宸逰百官仙仗􅀙天下簇神仙六宫人物随鑾駕擁旌旗九龍池舘爭標罷春富貴飲長安市上酒如川玉娉婷看廣寒宫裏人如画么篇他是一塊生香玉他是一朶解語花他則待整雲鬟掩暎在荼䕷架蕩湘裙微顯出凌波襪露春纎咲撚着鮫綃帕你道是龎児俊俏可人憎我道是眉児淡了教誰画金盞児這嬌娃是誰家㝷破綻覔褒弹無纎搯似一軸羙人圗画画出来的不如他似水仙離洛浦湘女下巫峽雖不曾朝雲和暮雨也強如流水泛桃花后庭花則見那指纎長氷玉甲你看他髻嵯峨青紺髪恰便似午困三眠栁春香恰破􅀲看時節蹙雙鴉我􅀅眼稍児斜抹喜孜孜可喜煞醉中天兀的不粧􅀧殺綉幕香風榻風流殺花月小囱紗且休説共枕同衾覷當咱若得来説㡬句児多情話則恁那嬌臉児咱根前一時一霎小生便死後甘心罷金盞児紫燕児画簷外慢嘈雜黄鶯児花枝上自嘔啞一箇蜜蜂児你不閑暇你箇蝴蝶児休恠小生敢厮央咱鶯児呵怕你㝷友處差了伴侣燕児呵怕你􅋦􅅺處老了生涯蝴蝶児怕悞了怯春寒花内宿􅁡蜂児怕遲了你報日暮栁邉衙醉扶歸送春情倦把金􅁫挿傳芳信􅂴把翆梯􅂿子這里但隔着巫山天涯我子見猛颺下車児下怕人瞧見他風流話靶推拾手帕這的是不比㝷常百姓家尾聲這信物斷送的客愁多􅁒買春無價又不必罷帕藤箱玉捺這一塲沒誠實的姻縁天注下坐車児傍掛着誓劍銅䥷怕的是抹殘霞淡烟籠鸂􅥩晴沙和日暮平林噪晚鴉折末是王矦世家直趕到正宫􅊴下我待要倩宮鶯􅋦出上陽花􅀧絳唇志士未遇琴操容端劍揮虹貫無縈絆十載儒冠共黄卷青燈伴混江龍􅀅九􅀴剖判前賢亞聖樂貧歡傳大學中庸語孟