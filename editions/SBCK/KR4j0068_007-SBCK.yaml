front:
  text: 雍熈樂府卷之七
  hash: sha256:a3b7f44c3fd4bb04f7c49d53b67c6943029f6a0f2bd1e24f6040232ee0b6a041
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_007-1a}
body:
  text: 中吕宫粉蝶兒祝太平錦繡封􅆠喜豐登太平景象托吾皇聖徳汪洋輿情歡天心順萬方㱕向四海来王撫華夷盡皆歡暢南好事近佳節欲回陽律􅀿黄鍾迎祥南極昨夜夀星靄靄生光瑶池閬􅁐衆羣仙跨鳳齊臨降賀吾皇萬夀佳辰祝遐齡永逺無􅆠北普天樂天性孝慈全仁徳寛洪量常依六徳不失三綱恩威信義和禮樂恭謙譲治􅀦齊家無偏向更施仁發政温良洪福浩大皇基永固聖夀延長南好事近時當盛世喜非常􅀺民樂業安康賢臣良相攄忠爕理隂陽民安物阜荷皇恩天下全生飬喜孜孜四序和調咲吟吟萬􅀖瞻仰北上小楼你子㸔那金堦殿傍瓊樓閤上一朶祥雲千條瑞氣五色毫光呈瑞祥表聖昌天垂佳貺都子為聖人徳慶雲特降南撲燈蛾華筵開玳瑁金盃泛瓊􅄴羙孜孜嬝娜纎腰舞嬌滳滳玉鬟齊唱香馥馥膳排異品齊臻臻同和着新腔和普天下臣民進禮感吾皇聖恩廣大勝陶唐北上小楼笙歌韻聒耳鳴管絃聲不住響則聴的􅀞鼓聲喧玉􅅇音清錦箏攸揚遶􅀞梁滿玉堂仙音嘹喨更過如九重天上南撲燈蛾巍巍皇恩浩蕩攸攸聖徳大廣撫治的學校興威懾的華夏寧皆賴聖君賢相四夷稽首萬萬里重譯梯航和普天下臣民進禮感吾皇聖恩廣大勝陶唐餘音􅀺民鼓腹咸擊壌惟􅂅皇圗帝業昌祝聖夀綿延天地長粉蝶兒太平訪道山􅀔崔嵬映紅霞縷金鋪翠作伴的茶藥琴碁春来到百花香夏值着荷花噴秋風擺梧桐飄墜冬景堪宜剪鵝毛亂飄祥瑞酔春風四季景堪題仙家叅道理俺那􅂻延長益夀托皇基都来進禮禮聖主寛恩賢臣忠孝因此上􅀺民安治普天樂㸔一帯嶺雲飛在十二瑶池内俺那􅂻祥雲冉冉緑草萋萋採靈芝下玉梯朝金􅇅乗鸞背俺那􅂻四望雲山純鋪着翆勝蓬莱閬􅁐瑶池俺那􅂻山圍着緑水水流在澗溪香馥馥花遶踈籬十二月穿的是麻􅂁草􅂂怎䏻勾着緑穿緋伴的是山猿野鶴更和這松竹寒梅採的是不老長生藥劑俺則待歩歩相随堯民歌呀我則待引着鶴􅀐着鹿逍遥散􅃝乗興過去赴瑶池我則待靠着山臨着水小小低低盖一座茅廬索清竒不強如亂紛紛急攘攘蜂衙蟻陣受驅馳則不如跟着貧道打簡子摑着愚鼓無憂無慮争也波知仙家造化機我其實叅透了玄中義耍孩兒玩白雲酔了重還酔直睡到紅日三竿未起學来時耳聴野猿啼悶来時􅀏出柴扉㝷漁樵閑客知心友共賞翫春光飲數杯正遇着昇平世遍乾坤民安􅀦泰齊祝聖夀天齊二煞鉄拐李顯神通口吐雲韓湘子勝仙花手内提藍彩和手執檀扳虚空􅂻吕洞賔白雲影裏懸真像曹􅀦舅紫霧叢中挑着笟張四郎便把輪竿執張果老四蹄蹇衛有一箇􅀎修行辦道鍾離尾聲有一箇騙東洋採靈芝朱鶴傍西湖靠灘頭金線􅀛老人星都赴在瑶池内有徳行純陽度脫你粉蝶兒踏雪尋栂葭管飛􅁅㸔梅稍綰回春意這梅臘前開年後芳菲傍深山臨淺水暗香風細獨占花魁他子是洞天中一家清致酔春風他無那艶色出紅粧常子是素容明玉軆氷霜標格鉄心腸端的是羙羙他子是一味􅀌髙十分清秀全無那半星兒柔媚紅綉鞋恰長至一陽天氣早踈林繁蕋芳菲他有那玉骨氷肌傲寒威雪中凝素魄風􅂻散金􅅋薦酸魁第一石榴花我見他玉容和月閗爭輝越素淡越合宜他不施鉛粉自清竒端詳了玉質堪詠堪題他比着玉天仙少一口元陽氣共髙人逹士相知與松竹曽結下深盟誓一任他風雪徧山溪閗鵪鶉他子有鉄石心腸改不了氷霜氣質雖種在􅁃嶺坡前飄落在含章殿􅂻不是我因他便着迷若􅀅這草木比試數着百卉開花誰似他三冬綻蕋上小楼似飲了香醪數杯似服了丹砂一粒因此上引惹春風􅀧染春霜照耀春暉非是他蕩􅃞春心旖旎春情包蔵春意只因是賞花魁玉容沉酔么這花有千瓣堆百葉圍常子是絳蕚深攅銀縷重鎪金蕋難窺一任他雪片欺風力摧鱗鱗相砌凍不着護芳心一團和氣普天樂緑雲苞青敷蒂他比那㝷常花木品􅀋􅀹竒他在那蕋珠宫居翆樓却怎生幻玉質来人世素色清香春風細小窓前雪月偏宜傳神在􅀘之􅀞筆留情在師雄夢􅂻移恨在和靖齋西滿庭芳􅀌村小溪氷魂冷淡月魄凄迷東君一任先春意開落随伊色不入朝陽艶質香􅀙教凍雪離披這一叚􅀌髙􅀔有誰人㑹記只除是風月此情知耍孩兒這梅山林􅁐囿皆標致不比那其他艶質百花頭上占春魁夀陽粧富室偏宜常子是清香滿院因風至痩影横窓􅀍月移論古今多竒蹟􅁱仙道有夀春梅福惜花人是天寳梅妃二煞這牡丹天香􅀦色嬌這梅花氷姿玉骨羙他兩箇得乾坤清秀中和氣牡丹占風光濃艶宜懽賞梅花有雪月精神好品題兩件兒皆佳麗牡丹呵獨榮春景梅花呵先占春魁尾聲我子待逞豪吟詩百篇賞梅花酒數盃品藻的神仙丰采花王貴紅紫鄊中占第一粉蝶兒村田樂白酒黄雞正是俺庄農每賞樂天氣那問他塵是塵非俺閑時樂忙時做子管俺一年四季到春来下種耕犁到夏来五榖成穗到秋来収滿盈倉到冬来飽食榮貴酔春凨年年􅀊􅀊五榖豊只􅂅俺老庄家收成喜喜見如今雨順風調萬民樂業只喫的瓦盆􅁁如泥沉酔普天樂酔如泥豊年􅀊俺在家富貴新酒活魚忙時種巳畆田閑時􅇛圓㑹只喫的醺醺酔卧斜陽頭枕耕犂牧童弄􅅇村歌唱起衆田家喜樂太平日粉蝶兒不做周方埋怨殺法聡和尚借與我半間兒客舍僧房與我那可憎才居止處門兒相向雖不䏻勾􅀼玉偷香且􅀅這盻行雲眼睛兒打當酔春風徃常時見傅粉的委實羞􅀞眉的都是謊多情人一見有情娘着小生心兒􅂻痒痒迱逗的腸慌㫁送的眼亂引惹的心忙迎仙客我子見頭似雪鬂如霜面如童少年得内飬貌堂堂聲朗朗頭直上只少箇圎光恰便似揑塑僧伽像石榴花大師一一問行蔵小生仔細訴􅂨腸自来西洛是吾鄊宦逰在四方􅀉居在咸陽先人拜禮部尚書多名望五旬上因病身亡平生正直無偏向止留下四海一空嚢閗鵪鶉俺先人甚的是渾俗和光衠一味風清月朗小生無意去求官有心来聴講量着俺窮秀才人情􅁓半張又沒甚七青八黄儘着你説短論長一任教掂斤播兩上小楼小生特来見訪大師何湏謙譲這錢難買柴薪不勾齋粮且備茶湯你若是有主張對艶粧􅀅言詞説上我􅀅你衆和尚死生難忘么也不要香積厨枯木堂逺着南軒離着東墙靠着西廂近主廊過耳房都皆停當是必你再休題長老方丈脱布衫大人家舉止端詳全無那半􅀧兒䡖狂大師行深深拜了啓朱唇語言的當小梁州可喜娘龎兒淺淡粧穿一套縞素衣裳胡伶六老不㝷常偷晴望眼挫􅂻抺張郎么若共他多情小姐同鴛帳怎捨的疊􅀍鋪床􅀅小姐央夫人怏若不令許放我親自寫與􅀙良快活三崔家女艶粧莫不是演撒上老潔郎既不沙却怎睃越恁頭上放毫光打扮的特来晃朝天子過的主廊引入洞房好事􅀙天降好模好様特莽撞煩惱怎麽唐三蔵偌大箇宅司可怎別無一箇兒郎使得梅香来􅀃勾當你在我行口強硬抵着頭皮兒撞四􅁁静人間天上㸔鶯鶯強如做道塲輭玉温香休道是相侵傍若䏻勾湯他一湯到與人消災障哨篇聴説罷心懐悒怏把一天愁都撮在眉尖上説夫人潔操氷霜不招呼誰敢􅂺入中堂自思想比及你心兒􅂻畏惧老母親威嚴你不合臨去也回頭望待不颺教人怎颺赤緊的情粘肺腑意惹肝腸若今生難得有情人也是我前世􅂻燒了㫁頭香我得時節手掌兒􅂻竒擎心坎兒上温存眼皮兒上供飬耍孩兒當􅀄那巫山逺隔如天様聴説罷又在巫山那廂業身軀雖是立在廻廊魂靈兒巳在他行本待要安排心事傳幽客我子怕泄漏春光與乃堂夫人怕女孩春心蕩恠黄鶯作對怨粉蝶成􅀟五煞小姐年紀小性氣剛張郎倘得相侵傍乍相逢厭見何郎粉㸔邂逅偷􅀅韓夀香􅅻到得風流况成就了㑹温存的嬌婿怕甚麽􅀎拘束的親娘四煞夫人忒慮過小生空妄想郎才女貌合相訪休直待眉兒淡了思張敞春色飄零憶阮郎非是咱自誇奨小姐有徳行容貌小生有恭儉温良三煞想着他眉兒淺淺描臉兒淡淡粧粉香膩玉搽胭項翆裙鴛綉金蓮小紅䄂鸞銷玉笋長不想呵其實強你撆下一天丰韻我拾得萬種思量二煞院宇深枕簟凉一燈􅀌影揺書幌縦然酬得今生志着甚支吾此夜長睡不着如翻掌少可有一萬聲長吁短嘆五千遍倒枕搥床尾聲嬌羞花解語温柔玉有香我和他乍相逢記不得嬌模様我子索手抵着牙兒慢慢的想粉蝶兒半萬賊兵捲浮雲片時掃盡俺一家兒死􅂻逃生舒心的列山靈陳水陸張君瑞合當欽敬當日箇􅀁望無成誰承望一封書到為媒證酔春風今日箇東閣玳筵開索強如西廂和月等薄衾单枕有人温早則不冷冷受用􅁕寳􅂦香濃綉􅄕風細緑囱人静脱布衫幽僻䖏可有人行􅀧蒼苔白露零零隔囱兒咳􅎳了一聲他那􅂻啓朱唇急来荅應小梁州則見他义手忙􅀅禮數迎我這􅂻萬福先生烏紗小㡌耀人明白襴浄角帶傲黄鞓么衣􅃣濟楚龎兒俊可知道引動俺鶯鶯據相貌慿才䏻我􅀙来心硬一見了也留情上小楼請字兒不曽出聲去字兒連忙荅應可早鶯鶯根前姐姐呼之喏喏連聲秀才每聞道請恰便聴􅀅軍嚴令更和那五臓神􅂅随鞭鐙么第一来為壓驚第二来因謝承不請街坊不㑹親隣不受人情避衆僧請老兄和鶯鶯匹娉子見他歡天喜地謹依来命滿庭芳来廻顧影文魔秀士風欠酸丁下工夫􅀅額顱十分挣遅和疾擦倒蒼蠅光油油耀花人眼睛酸溜螫的人牙疼茶飯巳安排㝎淘下陳倉米数升煠下七八碗軟蔓菁快活三喒人一事精百事精一無成百無成世間草木本無情猶有相兼並朝天子休道是這生年紀兒後生恰學害相思病天生聡俊打扮的素浄奈夜夜成􅀌另才子多情佳人薄倖兀的不擔閤了人性命誰無一箇信行誰無一箇志誠恁兩箇今夜晚親折證四􅁁静今宵歡慶軟弱鶯鶯可曽慣經欵欵䡖䡖燈下交鴛頸端詳了可憎好煞人無乾浄耍孩兒俺那􅂻落紅滿地胭脂冷休辜􅀒了良辰羙景夫人遣妾莫消停請先生勿得推稱俺那􅂻准俻着鴛鴦夜月銷金帳孔雀春風軟玉屏樂奏着合歡令有鳳簫象板錦瑟鸞笙四煞聘財㫁不争婚姻事有成新婚燕尓安排定你明愽得跨鳳乖鸞客我到晚来臥㸔牽牛織女星休傒倖不要你半絲兒紅線成就了一世前程三煞慿着你㓕宼功舉􅀅􅀎兩般兒功効如紅㝎為甚俺鶯娘心下十分順都只為君瑞胸中百萬兵越顯的文風盛受用􅁕珠圍翆遶結果了黄卷靑燈二煞夫人只一家老兄無伴等為嫌繁冗㝷幽静請你箇有恩有義閑中客廻避了無是無非囱下僧夫人命道􅁕下莫教推托和賤妾即便随行尾聲先生休作謙夫人專意等常言道恭敬不如􅀙命休使得梅香再来請粉蝶兒風静􅄕閑透紗囱麝蘭香散啓朱扉揺嚮􅀟環絳臺髙金荷小銀缸猶燦比及􅀅暖帳䡖弹先掲起梅紅羅軟簾偷看酔春凨我見他􅁫軃玉斜横髻偏雲亂挽日髙猶自不明眸暢好是􅂴􅂴半晌抬身㡬回搔耳一聲長嘆普天樂晚粧殘烏雲軃䡖勻了粉臉亂挽了雲鬟他􅀅那緘帖兒拈把粧盒兒按折封皮孜孜㸔顛来倒去不害心煩厭的又早扢皺了黛眉忽的不低垂了粉頸氲的又早改變了朱顔快活三分明是你的過犯沒来由把俺催殘使卑人顛倒惡心煩你不慣誰曽慣朝天子張生近間面顔痩得来實難㸔不思量茶飯怕待動惮曉夜􅀅佳期盻廢寢忘飡黄昏淸旦每日家望東墙掩淚眼這病患要安則除是出㡬􅀧兒風流汗四􅁁静怕人調犯早共晚夫人行見些兒破綻你我何安問甚遭危難攛㫁的上杆掇了梯兒㸔脱布衫小孩兒家口無摭攔一迷􅂻言語催殘比似你使性子休思量秀才做多少好人家風範小梁州他為你夢􅂻成􅀟覺後單廢寢忘飡羅衣不耐五更寒愁無限􅄫寞淚欄杆么辰勾常把佳期盻􅀅一箇角門兒世不曽牢拴子願恁做夫妻無危難我向那筵席頭上整扮做一箇縫了口的撮合山石榴花今日箇晚粧楼上杏花殘猶自怯衣单那一片􅃪琴心清露月明間昨宵向晚不怕春寒㡬乎險􅀍先生􅄿那其間豈不胡顔為你箇不酸不醋風魔漢隔墙兒險化做望夫山閗鵪鶉用心兒待撥雨撩雲好意兒傳書􅀉簡既不肯捜自已狂為子待要覔别人破綻我似那受艾焙權時忍這畨暢好是艱對人前巧語花言背地􅂻愁眉淚眼上小楼這是先生命慳非是紅娘違慢簡帖兒是你的招服他的勾頭我的公案若不是覷面顔厮顧盻擔饒䡖慢争些兒把咱施犯么􅀙今後相㑹少見面難月暗西廂鳳去秦楼雲歛巫山你也赸我也赸先生休訕早尋箇酒䦨人散滿庭芳你休要呆􅂻撒奸你子待恩情羙滿骨肉摧殘老夫人手執着檀棍摩挲着㸔粗麻線怎透針關他子待拄着拐幇閑鑚懶縫合唇送暖偷寒消息兒蹅着犯怎禁那甜話兒􅉯䟎好教我兩下􅂻做人難耍孩兒㡬曽見􅀉書的倒瞞魚鴈小則小心腸兒轉關寫着道西廂待月等更䦨跳東墙女字􅁁干詩句􅂻包籠着三粳棗簡帖兒埋伏着九里山着緊䖏􅀅人慢㑹雲雨閙中􅂑静􅀉音書忙􅂻偷閑二煞􅁓光明玉板字香噴麝蘭行兒􅁁湮透非是春汗一簡情淚紅猶濕滿􅁓春心墨未乾􅀙今後休疑難放心波玉堂學士穏情􅂑金雀丫鬟三煞他人行别様親俺根前􅂑次㸔更做道孟光接了梁鴻案別人行甜言羙語三冬暖我根前惡語傷人六月寒我為頭兒㸔㸔你箇􅄐魂倩女怎發付擲果潘安四煞隔墙芲又低迎風戶半拴偷香手叚今畨按怕墙髙怎把龍門跳嫌芲宻難􅀅仙桂攀放心去休辭惮你若不去呵望穿他盈盈秋水蹙損了淡淡春山尾聲你雖是去了兩遭我敢道不似這畨你兩箇隔墙酧和都胡􅋲證果在今畨這一簡粉蝶兒􅀙到京師思量心旦夕如是向心頭横倘着鶯兒請良醫㸔診罷一星星説是本意推辤則􅀍他察虚實不湏㸔視酔春凨他道是醫雜症有方術治相思無藥餌鶯鶯知我害相思我甘心兒死死四海無家一身客􅀉半年􅀅至迎仙客疑恠這噪花枝靈鵲兒垂簾幕喜蛛兒正應着短檠上夜来燈爆時若不是㫁膓詞决定是㫁膓詩寫時節雨淚如􅁝既不是可怎生般淚珠兒滳濕了封皮上字上小楼這的是堪為字史當為欵置瑞的有栁骨顔筋張旭張顛獻之義之此一時彼一時佳人才思俺鶯鶯世間無二么篇俺做那經呪般持符籙般使髙似金章重似金帛貴似金資這面上僉箇押字使箇令史差箇勾使則是一張忙不及印赴期的咨示滿庭芳怎不教張生愛你堪與那針工出色女教為師㡬千般用意針針是可索㝷思長共短乂無箇様子窄和寛想像腰肢好共歹無人試想當􅀄做時用殺小心兒白鶴子他着我閉門學禁止留意譜聲時調飬聖賢心洗蕩巢由耳又繊長如竹笋細白似葱枝温潤有清香瑩潔無瑕疵又􅀟枝曽栖鳳凰淚􅀧兒濕胭脂當時舜帝慟娥媓今日㳤女思君子又手中一葉綿燈下㡬回􅁝表出腹中愁果稱心間事又針脚細似蟣子絲帛膩似鵞脂既知禮不胡行􅂅􅁕下當如此快活三冷清清客店兒風細細雨􅁝􅁝雨兒零風兒細夢回時多少傷心事朝天子四肢不􅀎動止盻不到蒲東寺小夫人見時别有甚閑傳示我是箇浪子官人風流學士怎肯戴殘芲折舊枝想當􅀄自兹到此甚的是閑傳示賀聖朝少甚宰相人家招婿嬌姿其間或有箇人似你那􅂻􅂑温柔這般才思鶯鶯的意兒怎不教人夢想眠思耍孩兒向書房中傾倒箇藤箱子向箱子􅂻面鋪㡬張􅁓放時節用意􅂑包袱休教那藤刺兒抓住了綿􅁝髙抬在衣架上又怕吹了顔色亂穣在包袱中又怕挫了褶兒當如此切湏愛護勿得因而二煞恰新㛰􅅻燕尓為功名来到此長安憶念蒲東寺昨宵愛春風􅊝李芲􅄏夜今日愁秋雨梧桐葉落時愁如是身遥心趂坐想行思三煞這天髙地厚情直到海枯石爛時此時作念何時止直到燭灰眼下􅅻無淚蚕老心中罷却絲我不比逰蕩輕薄子輕夫婦的琴瑟折鸞鳯的雄雌四煞不聞黄犬音難傳紅葉詩驛長不遇梅花使􅀌身去􅀦三千里一日㱕心十二時凭䦨視聴江聲浩蕩㸔山色參差尾聲憂則憂我在病中喜則喜你来到此􅄬至得引人䰟卓氏音書至險􅀅這害􅀑病相如盻望死粉蝶兒警世百􅀊人稀勸知音少争閑氣想當􅀄楚漢争鋒范増􅀎樊噲勇盡埋土内早㝷箇林下棲遲每日家酔醺醺醒而復醉酔春凨只喫的月上栁稍頭困眠花􅀣底那時節萬事盡都忘其實的羙羙八句詩才兩隻琴手㡬盤碁􅀔紅綉鞋凹凸嶺閑觀鶴戯﨑嶇澗且聴猿啼小茅菴躱了些是和非你道是官榮貴俺説是不便宜眼見些英雄漢都做了􅀑上小楼似不的張良范蠡比不的崇陽蘓軾更有那譚馬丘劉王孫鍾吕湘子希夷張子陽白玉蟾許由之軰這一夥樂陶陶夀同天地么坐岩穴翫水涯臥山頭逰洞裏他只與牧童相伴樵子相友道士相随講一㑹歎一㑹周秦興廢索強如閙垓垓苦爭名利耍孩兒齊梁晋宋豪傑軰都丧在邙山土底鄧通餓死錢山堆富石崇難免輪􅅆丁么劍下思前恨韓信宫中悔後遲􅄣不如劉伶酔無榮無辱無是無非四煞近松隂檢史書向蒲團參道理棄虚名豈愛蝇頭利只求夀躋􅀯山逺不戀金堆北斗齊把浮華今日方知㑹安排下芒鞋竹笠准俻着䔧杖蓑衣三煞閑来時撫會琴悶来時下㑹碁柴門咲傲三公位􅅻觀綠鬂朱顔子旋踵蒼髯白髪垂那時􅅻想長生計風光易過死限難推二煞你便有賽王祥孝順兒比迎春莭義妻無常大限難移替不若俺常吟遣興詩千首且飲消愁酒數盃好光隂一日無一日如梭􅇠走似箭烏飛尾聲十年九載功一朝三品職金魚玉帶多榮貴􅄣是黄梁一夢裏粉蝶兒春思小立徘徊問東君有