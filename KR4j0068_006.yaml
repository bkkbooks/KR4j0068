我心間無事人都道我面帶驚疑人怎知今年瘦似去年時不覺的􅥋了金釧不覺的瘦了腰肢寬掩過這湘裙五六指耍孩兒止不過二十三四西風了却黃花事減了精神瘦了龎兒憔悴時病身軀恰似繭中絲人都道我不宜時滴溜溜臍下常疼痛冷定定三關閉了脈息到不的五七年上絶了事人又道是退胞老鴇那里取花酒鶯兒三煞天可憐有一時煙花簿上除名字脫了這沾花惹草長衫子穿一件繡鳳描鸞大襖兒遂了我心間事丢了這翆花包髻帶一箇帔子冠兒二煞當家也會當使奴也會使更添了兩箇夫人字向碧紗囱下描些花樣也強如白玉階前舞柘技逐朝的事收拾些針線伴些箇書匱箱兒一煞撇了這不值錢的煙花市免見些不養家的浪漢子棄了這巴家私心性循行止早離了樽前席上歌春唱情碩做布襖荆叉無憚辭都道我收心的是做了箇無憂愁的婦女守著箇有疼熱的男兒尾聲到冬來燒取箇熱炕兒到夏來住取箇涼院子俺夫妻每説取箇家常事到大來無是無非快活死粉蝶兒擬淵明歸去來兮笑人生苦貪名利我豈肯陷迷途惆悵獨悲假若做公卿居宰輔剗地心勞形役量這些來小去官職枉消磨了浩然之氣醉春風想聚散若浮雲嘆光隂如過隙不如聞早賦歸歟暢是一箇美美棄職歸農杜門修道早子死心塔地紅繡鞋泛逺水舟搖搖以輕揚送征帆風飄飄而吹衣望煙水平蕪把我去程迷問征夫詢逺近瞻衡日熹微盻柴桑歸興急滿庭芳再休想折腰為米落得箇心間似水酒醉如泥樂醄醄並不管家和計都分付與稚子山妻栽五栁間居隱迹撫孤松小院徘徊問因宜把功名棄豈不見張良范蠡這兩箇多大得便宜上小樓我則待逐朝每日無拘無繫我則待從事西疇寄傲南囱把酒東籬三徑􅈬荒松菊猶存規模不廢䇿扶老尚堪流憩么引壷觴以自酌盻庭柯以自怡有酒盈尊門設常關景幽人寂或命巾車或棹孤舟從容逰戲比著箇彭澤縣較淡中有味耍孩兒溪泉流出消涓細木向陽欣欣弄碧登東臯舒嘯對斜暉有兩般兒景物稀竒覷無心出岫雲如畫見有意投林鳥倦飛草堂小堪容膝説親戚之情話樂琴書以忘機么篇或尋丘壑觀清致或自臨清流品題我為甚絶交逰待與世相違雖是我傲羲皇本性難移想人間富貴非吾碩望帝里迢遙不可期巳往事都休記度晚景樂夫天命其餘更復奚疑尾聲辭功名則待逺是非守田園是我有見識間悠悠無半點為官意一任駟馬髙車聘不起粉蝶兒蘇卿訴苦江景瀟踈更那堪楚天秋暮占西風栁敗荷枯立夕陽空凝佇江鄉古渡水接天隅眼瀰漫晚山煙樹醉春風寂寞日偏長别離人最苦把一封正家書改做假休書馮魁不覩將我來娶娶知他是身跳龍門首登虎榜想這故人何處紅繡鞋往常時冬里臥芙蓉禋褥夏里鋪藤席紗厨但出門換套兒好衣服不應馮魁茶貟外茶貟外鈔姨夫我則想俏雙生為伴侣迎仙客見一座古寺宇蓋造得非常俗見一箇僧人念經搯著數珠待道是小闍梨却元來是老院主俺是箇檀越門徒問長老何方去石榴花看了那可人江景壁間圗粧點費工夫比及江天暮雪見寒儒盻平沙趂宿落鴈無書空隨得逺浦帆歸去漁村落照船歸住煙寺晚鐘夕陽暮洞庭秋月照人孤閗鵪鶉愁多似山市晴嵐淚多似瀟湘夜雨少一箇心上才郎多一箇腳頭丈夫每日家茶不茶飯不飯百沒是處教我那里告訴最髙的離恨天堂最低的相思地獄普天樂腹中愁詩中句問甚麼失題落韻跨馬騎驢想著那得意時著情處筆尖題到傷心處不由人短嘆長吁囑付你僧人記取蘇卿休與知它雙漸何如上小樓怕不待開些肺腑都向詩中分付我這里行想行思行寫行讀雨淚如珠都是些道不出寫不出憂愁思慮忍不住放聲啼哭么他怎知我嫁人我知他應過舉畨做了魚沉鴈杳瓶墜簮折信斷音踈咫尺地半載餘一字無雙郎何處我則索隨他販茶船去十二月無福效同儔並侣有分受枕剩衾餘想起來相思最苦空教人好夢全無劈飛了清歌妙舞受了些寂寞蕭踈堯民歌閃的人鳳凰臺上月兒孤趂帆風勢下東吳我這里安桅舉棹泛江湖到不如沉醉羅幃倩人扶躊躇躊躇天邉鴈兒無遙望把佳期誤耎孩兒這厮不通今古通啇賈是販賣俺愁人的客旅守著這厮愁悶怎消除真乃是牛馬而襟𥚑斗筲之器成何用糞土之墻不可杇想俺愛錢娘喬為做不分些好弱不辨賢愚三煞娘呵你好下的好下的􅑯狠毒忒狠毒全沒些子母情腸肚則好教三千場失火邅天震一萬處疔瘡生背疽怎不教我心中怒你在錢堆受用撇我在水面上邅荼二煞我上船時如上木驢下倉時如下地府靠桅杆似靠將軍柱一箇隨風倒柁船牢獄趂浪逐波乘轞車伴著這魋人物便如冤魂般相纒日影般相逐一煞他正是馮魁酒正濃蘇卿愁起𥘉下船來行到無人處我比娥皇女哭舜添斑竹比曺娥女哭江少一套孝服則怕他瞧破俺離情緒推眼疾偷掩痛泪佯呵欠帶幾聲長吁尾聲比我這泪珠兒何日乾愁眉甚日舒將普天下煩惱收拾聚也不似得蘇卿半日苦粉蝶兒集曲名題秋怨雙鴈兒聲悲景蕭蕭楚江秋意勝陽關刮地風吹滿庭芳梧桐樹金蕉葉墜慶東原金菊香滴滴金惟那更醉西湖乾荷葉失翆醉春風我一半兒情感玉花秋一半兒憶王孫歸塞北我這應天長久不斷怨别離對秋風怨憶憶折倒的風流體尫羸紅衫兒寬褪翆裙腰難繫迎仙客都不念奴嬌望逺行忘了初相見在武陵溪罵玉郎有上稍沒末尾瘦削了栁絲玉芙蓉花面皮這翆眉兒攣刺捱這等相思會紅繡鞋上小樓憑闌人立青山口日上平西子聽得喬木鵲踏枝呌聲疾莫不倘秀才餘音至夜行船阮郎歸元來是牧羊關烏夜啼石榴花常記得賞花時節看花回上京馬醉扶歸歸來囱半月兒低真箇醉矣栁青娘虞美人扶只困騰騰上馬嬌無力步步