翡翆裙鬆綽了縷帶鮫綃襻得勝令自從那花底唱陽關栁下送征鞍經了些夜月孤幃靜望不見天涯一鴈還看看業眼兒熬清旦澘澘泪珠兒落夜闌甜水令常記的白雪輕謳金杯滿泛紅牙低按私語燭花殘到如今好夢全無佳期易阻相思成患平白的廢寢忘餐折桂令望藍橋逺似三山煙水迷茫道路艱難瓶墜簮折風酸月苦雨澀雲慳長攙攙連理樹柔條盡剷磣可可比目魚活水將乾他性格姦頑不寄平安章臺栁恣意留連蟾宫桂未許躋攀隨煞怕的是無情歲月相催儧容易去何年重返賈充宅韓掾見應難天台路劉郎到來晚新水令憶楊妃翆鸞無路到南柯玉簫間彩雲零落慵斟和泪酒懶聽斷腸歌卿呵你問今日如何更愁似夜來箇駐馬聽不為那楊栁情多怯暮雨渾同人裊娜梧桐葉墮蕩西風特似命輕薄荒墳空對馬嵬坡珠簾巳間朝元閣恨無聊看玉容何處添寂寞落梅風他俺行隨機應變他行乞命兒活怎下的活支煞的眼前折挫那的是寡人承謝它把箇無投奔的帝王饒過鴈兒落你早則斷絶了心上火你早則剪除了宫中禍你早則掀騰了枕畔情俺早拋持了舌尖上唾得勝令切齒恨干戈無心選嬪娥恨望終朝盡悲啼半夜過常和妃子同衾臥我也難和别人擁𬒳窩殿前歡這煩惱怎消磨想溫泉直恁是非多却甚風恬浪靜人亡過好不分箇清濁一尺水二尺波閙穰穰空惹箇雄紏紏威風大則近的三千粉黛却近不得百二山河七煞尾不問羯鼓習天樂空驚虎旅鳴宵臥太平歌憶當時偶然潼關破日夜和奪不免的幸西蜀劒嶺嵳峩海棠正暖東風馬頭前蹙損雙蛾黃塵埋綺羅兩鬢巳成皤俺也曽香腮偎定芙蓉蕚朱唇溫柔櫻桃顆川撥棹當夜對銀河女牛星恰會合正人態柔和伴月影婆娑俏分金叉鈿盒望博箇死生緣無間闊鴛鴦煞尾近􅌐山冉冉隂雲磨暗華清慘慘寒煙鎖神思昏沉鬼病纏縛唱道薄幸堪憎看承的人小可這無主倚的君王雖然想著那好處及多卿呵也合夢兒看將節來探覷著我新水令祿山憶楊妃舞腰寬褪弊貂衣害得人死臨侵一絲兩氣你那里雲作垜繡成堆每日家眼迷奚全不想洗兒會駐馬聽想今日别離少半是君王多半是你你舊時標息九分來消瘦一分肥秋風空使景狼藉青天不管人憔悴光隂雖去急俺歸心更緊似西風日落梅風往常時胖得來無把背如今瘦得來􅑯恁地想繡幃中一畨家喬勢具濃時最嫌的是肥財皮若是再相逢早得百無阻滯鴈兒落再幾時偷斟鸚鵡杯再幾時重配鸞凰對再幾時同偎孔雀屏再幾時共擁鴛鴦𬒳得勝令恨别鳥替人悲思鄉馬頻嘶寄信魚難到傳情鴈不歸别離夜月人千里相偎春風玉一圍七煞胡笳韻起聞知醉玉簫聲斷尋無迹太平歌琵琶曲盡彈絶淚嘆零落棲遲觸目總堪傷逈野荒陂誰知你在那神仙化樂天宫內遣俺入煙邊塞周廽何日銷金帳底得赴隔年期三煞俺無緣赴穩私情龍虎風雲會有分擁離愁金鼓旌旗隊川撥棹恰到日平西對長安一嘆息見霜草凄迷煙樹依稀望不盡千山萬水恨不得上青霄登玉梯鴛鴦尾煞彩雲縱赴槐安國早黃塵依舊陽關曲見目下縈損枕上禁持唱道有始無終多虛少實據任無心成佳配白甚驅馳把似一就休來夢兒裡新水令閨情雙峯毛舜臣作碧紗囱外曉鶯啼斷腸聲擾人春睡魔軍才待遣病鬼又相欺展轉追逼嘗盡惡滋味駐馬聽點檢芳菲花落花開紅雨洗安排憔悴樹頭樹底緑雲垂戈矛難敵恨鋒機參芩不輔愁腸胃恨和愁甚道理百般的不準人央及鴈兒落擔閣了迎風待月期錯誤了捉雨拿雲計闌珊了憐香惜玉心翻悔了赫鬼瞞神誓得勝令呀這些時消瘦不勝衣憂悶竟忘食護短嫌人問著迷只自知歡嬉往常間語話甜如蜜别離近新來恩情冷似石川撥棹我則索強支持狠相思透骨髓這些時蹙損蛾眉減削香肌獨守孤幃靜掩深閨咫尺間關山萬里又一春虛度矣七弟兄一會家暗疑痛悲受岑寂這早晚雕鞍寶馬在誰家繫到頭美滿且休題臨行囑付全不記梅花酒呀知他是虛共實憶素手相携曽熱臉相偎更寸步相隨連枝樹該並活比翼鳥定同棲不承望輕棄擲去箭也怎攔回覆水也怎收拾斷梗無再生時破甑無再完日收江南呀為甚麼王孫一去不思歸天涯芳草怨萋萋把生綃一幅寫還題幾度價泪垂畫中人不似舊崔徽新水令念逺燒痕回緑遍天涯憶王孫去時殘臘愁垂簷外雨憂損鏡中花掘土摶沙感事自驚訝駐馬聽望眼巴巴春陌香塵迷去馬夢魂颯颯曉囱初日閙啼鴉千聲作念湊嗟呀一絲情景留牽挂許歸期全是假秀才每説謊天來大喬牌兒繡雙飛線腳差描並宿筆尖怕牡丹亭間却鞦韆架好春光誰共耍落梅風肌消玉臉褪霞怎打熬九秋三夏𬒳薄賺的孤又寡辜負了小喬初嫁鳫兒落誰攔截巫女峽誰改變崔徽畫誰糊突漢上襟誰扯破秋雲帕得勝令身似井中蛙命似釡中蝦難把猿心鎖空將鵑泪灑情雜下不的題著他名兒罵性猾恨不的揪住他身子打甜水令馬上墻頭月底星前囱間簾下容易得歡洽案舉齊眉帶綰同心叉留結髮那曽有一點兒褻狎折桂令好姻緣兩意相答你本是秋水無塵我本是美玉無瑕十字為媒又不圗紅定黃茶我不學普救寺幽期調發你怎犯海神祠負意折罰生也因他死也因他恩愛人兒歡喜冤家錦上花想著他錦繡充腸諸餘俊雅山海填胸所事撑逹花下低頭風吹帽紗月底潛蹤露濕羅襪朱絃續有時寶劒配無價求似神仙信似菩蕯才得相逢撲絮納瓜恰早分離瓶沉珠撒清江引一聲去也沒亂殺少幾句叮嚀話説歸甚日歸待罷何時罷夢兒中見他剛半霎離亭宴歇拍煞狂風飄散鴛鴦瓦嚴霜冷透鸞凰榻好教我如癡似啞佳期絶往來後約無慿凖前語皆欺詐空傳紅葉詩枉卜金錢卦凄涼日加燕驚飛張氏樓犬吠斷韓生宅虎攔住蕭郎駕悶隨秋夜長情逐春氷化待他見咱算他那狠罪過有千樁害的我這瘦骨頭沒一把新水令祿山夢楊妃駕著五雲軒飛上月宫來別是重境界却便似春氷籠宇宙秋水滿樓臺虛説一座閬苑蓬萊便有也難賽凨入松瑞簾丹桂冷凨篩掃盡纖埃水晶簾晃珍珠額迸寒光玉砌瑶階為惜中秋夜色微雨淨天街万花方三臺忽然金闕門開奏樂聲一派素娥仙𬒮兩邊排莫將舞袖輕擡雖無百寶粧腰帶趂霓裳節輳和諧帝王默記心懷見精神有情無奈尾廣寒一見神仙態把六宫中許多恩愛都撇在九霄雲外新水令十美人慶賞牡丹園牡丹亭上日遲遲博山銅篆香凨細栁垂金瑣暗花壓玉闌低睡足羅幃斜倚朱扉整頓春衣巧畫蛾眉恰出香閨是誰人將俺名題喚一聲玉天仙有何意慶宣和欵撒金蓮步懶移翆擁紅堆我這裡忙揭朱簾問是誰却元來是你是你喬牌兒相别才數日迅指又重會瑤池金母群仙隊飲瓊將斟玉液鴻門奏凱歌這一箇出銅光的酸似虀這一箇傲雪冷的甜如蜜這一箇辟麝香辣味多這一箇生淡脆的先春意想著那天生物不偏欹兼美惡得春暉這便是荆棘同蘭葸瓊瑤伴瓦石想人事何疑有君子便有那憸邪輩將天理相推有忠良便有那諂諛的甜水令俺拜謝深恩仰荷光榮恭承嘉意看歌舞樂聲齊向玳瑁筵前散滿天香飄然衣𬒮髙擎著獻夀金杯天香引髙擎著獻夀金杯奏的是錦瑟鸞笙鳯管龍笛玉盎蟠桃金盂火棗寶鼎交梨萬萬春福如海比千千年夀與山齊縹眇衣佇立丹墀拂綽香塵獻舞瑤池川撥棹愛的是值春暉暖融融凨日美音樂相隨羯鼓頻催喜遇生日慶會筵席膏雨纖微養花天氣更遇著主人殷勤種植是于俺正合宜七弟兄更有舞的唱的看花的賞名園每日醺醺醉有歡有喜有相知無憂無慮無縈繫梅花酒似今日快樂期正中國雍熙值采鳯來儀看祥瑞雲集五榖收百姓喜八表靜四夷歸牡丹花茂盛得荷主人會栽培滋飬的樹豐肥保護的不折虧能接換善分移收江南因此上牡丹嬌艷逞芳菲感主人雨露四時齊駐紅顔久逺壯宫闈俺這裡謝的十美人青簡內永標題尾謝天仙賜與多嬌媚生長在名園上國增美艷向三春永合歡樂千紀新水令堵察善良聽樓頭畫鼓打三更繡圍中枕餘衾剩明朗朗囱外月昏慘慘榻前燈空倚幃屏簷間鐵好難聽駐馬聽盻殺我也璫璫玎玎你便是再出世的陳摶也睡不成度一宵如同百嵗捱一朝勝似三春金爐香盡酒𥘉醒孤眠那怕心腸硬誰慣經相思最是難熬的症喬牌兒一會家睡不著獨自箇寢非干是咱薄幸沒來由簮折瓶墜井將鴛鴦兩下分雁兒落常想著花前携手行月下肩相並羅衾翻浪紅玉腕相交㝎德勝令眉黛逺山青桃臉嵌朱唇楊栁腰肢瘦青螺髻挽雲天生下精神十指纖纖嫩描不就丹青比觀音少淨瓶川撥棹不由我淚盈盈聽長空孤鴈聲暫出門庭聽我叮嚀自别多情雁兒我其實捱不過衾寒枕冷相思病疾漸沉七弟兄雁兒你却是怎生暫停聽我訴離情一封書與你牢拴㝎快疾忙飛過蓼花汀那人家寢睡長門靜梅花酒你與我呀呀呀呌幾聲驚起那人聽説起咱姓名他自有人相通從別後不見影閃得人喪了魂靈羅幃中愁怎禁只為他挂心情朝忘餐淚如傾曲慵唱酒慵斟收江南雁也可鄰見今宵獨自冷清清你與我疾回疾轉莫消停山遙水逺殺勞神趂天色未明只休要等間尋便宿沙汀尾你是必休辭雲濃凨力緊我這裡盻伊醫治相思病傳示與俺可意情人休辜負海誓山盟唱道性命也似看承心肝兒般欽敬準備你鵬程我這裡獨守慢慢的等新水令鳯凰臺上憶吹簫似錢塘夢魂𥘉覺花月友鳯鸞交半世踈狂總做了一場懊駐馬聽黃詔奢豪桑木劍熬乏古㝎刀雙郎傘薄𥿄糊鍬撅了點剛鍬怕不待爭鋒取債戀多嬌又索書名畫字尋人保枉徒勞供錢買笑教人笑落梅凨姨夫閙咱便曉君子不奪人之好他攬㝎磨杆兒誇俊俏推不動磨杆兒上自吊步步嬌積攢下三十兩通行雅青鈔買取箇大笠子粗麻罩每日粧甚麼眼見的和契丹交雖是不凨騷不到的著圈套甜水令佳人有意郎君俏郎君無鈔鶯花惱如今的惜花人㺯巧指不過美話兒排虛科兒套實心兒少想著月下情星前約是則是花木瓜兒看好李亜仙負心的疾鄭元和下畨的早
