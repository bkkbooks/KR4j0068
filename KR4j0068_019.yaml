front:
  text: 雍熙樂府卷之十九
  hash: sha256:af550fe155cf3c8e0b2903149bad9c1ee1b2271fde2a80ab14ab721243117c88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_019-1a}
body:
  text: 雜曲滿庭芳西廂十詠張生俊雅諸餘可愛所事堪誇吟詩和句在西廂下引動嬌娃一封書戰退了眼前士馬七絃琴匹配上宿世冤家登科罷香車駟馬夫婦享榮華鶯鶯女娘竒花嫩蕊軟玉溫香天生俊俏嬌模樣聰慧非常待月處心懷粉郎燒香時詩訴衷腸成就了凨流况時殊事往千古説西廂紅娘艷質能傳芳信善做良媒偷寒送暖將婚􅊚配使盡心機你教他操瑶琴包含看道理寫花箋引惹出佳期配合就鴛鴦會非你做美焉得做夫妻夫人不乖想當日遭危受困怎生得脫難逃災謝張生計策把賊兵敗情碩要配與裙叉既然你悔親盟宜離院宅誰教你拜兄妹請入書齋他私自成歡愛非干事鶯鶯不才單注著天地巧安排法聰老髠慈悲為本方便為門一堂經勾引的成秦晉于理合尊守戒行持心敬謹主婚􅊚用意殷勤間評論似這等寬柔上人當可報深恩將軍杜確能通虎略善曉龍韜全慿威武居津要名播唐朝則為那一封書飛星到了霎時間五千人凨捲雲濤除殘虐如斯俊豪不枉了做知交鄭恆太魯須知淑女怎配愚夫當日箇軍圍普救誰扶助多虧了君瑞呈書你則待逞其志馮河暴虎他怎肯從其心似水如魚傷時務你專一架虛枉自敗凨俗孫虎恃強不思燕雀怎配鸞凰硬圍普救驅兵將敗壞綱常你只待虜嬌姿朝歡暮賞他怎肯順賊徒共枕同床半霎兒將身喪這厮心術不良斬首正相當多才漢卿廣知故事洞曉新聲移宫換羽真堪聽義理兼明一句句包藏著媚景一篇篇醖釀出深情無疵病不俗易省萬載播芳名聰明實甫胸藏錦繡口吐璣珠清新樂府真無數壓盡其餘翻騰就尤雲殢雨顯豁出寄柬傳書多佳趣超今越古堪與後人述又西廂十詠張生不才學成錦繡喪與裙叉嘲凨詠月西廂待眼去眉來寫封書文學似海害場病形體如柴險把聲名壞全不想賢賢易色㺯甚麼秀才乖鶯鶯鬼精麝蘭半勻花月娉婷結絲蘿不用媒和證眼角傳情聽瑤琴宵奔夜行燒夜香膽戰心驚家不幸枉著你齊齊整整㺯出箇醜名聲夫人不良孤兒寡婦幼女新喪不將靈柩去安葬暴露在僧房做水陸搜尋出禍殃改婚􅊚敗壞盡綱常可不道消魔障惹的那蜂喧蝶攘不賢惠老尊堂紅娘快訕傳書寄柬送暖偷寒星前月下把鶯鶯賺使碎心肝伺候到更深夜闌㺯得那月缺花殘粧科犯左難右難做了箇撮合山夫人你聽我為官長門戶先生西房既許成匹聘巳有賢聲我怎敢和他同眠到明止不過趕空兒半夜三更或推些病潛潛等等躡足鷺鷥行嘲人懼內納寵春泉作將軍不仁擅離信地難保黎民怎做的于家為國扶危困輕舉三軍輸時節滅了已身贏時節好了别人圗甚麼言而信沒來由閗狠何處顯功勳髠郎法聰不諳經典不理禪宗為媒作證虛迎送圗受些羊酒花紅不爭將崔小姐窩藏著㺯影險把箇普救寺燒的精空強兵動枉施英勇捨命去爭鋒鄭恆發昏不應撞死怎得招魂曠夫怨女何須論成甚人倫立志氣別尋箇主婚仗家凨另選箇名門可不道名聲俊沒來自殞越顯的小哥村漢卿不髙不明性理專㺯凨騷平地裏褒貶出村和俏賣㺯你才學瞞天謊説來不小拔舌罪死後難饒著人道虛空架橋枉自筆如刀王家好忙沽名吊譽續短添長别人肉貼在你腮頰上賣狗懸羊既沒有朱文公肚腸又沒有程夫子行藏忒狂蕩用心一場上不的廟和堂滿庭芳閨房十事一葫蘆看生見長香醪許納粟粒難藏可人一種凨流像嫩蕊鵝黃腰瘦似春凨緑楊體輕如白玉玗璫雖無量天成氣象壓盡錦香囊二剪子雙鋒並聳無塵似水有嘴如蚊多情夫指輕分動想像成功只與金針競爭偏和銀鑷相從堪珍重花間萬種何用樹頭凨三鑷子秋毫厭爾春榆破甲連理分枝金鈴口吻那能似吞吐尤時樊素嵓封皓齒小蠻輕束腰肢關心事菱花鏡裡不放鬢狂絲四罐兒諸餘異種有懷可測無物堪客寬洪笑殺玻璃甕到底成空蓋偃荷翻曉凨索垂貫日晴虹雖無用紅遮翆擁樂亦在其中五瓶兒壷中緑醑杯斟鸚鵡索拽銀絲空懸著緑膽渾相似造物宜時席上難溫玉指瓶中填墜長絲芳春至東凨殢死無任插花枝六盒兒脂膏易滿虛心未足空腹無寬故教銀索相牽絆恐失鴛鴦渾似齊分索暖别離復對合歡堪為伴香溫玉軟人共永團圎七針筒韜光晦迹胸中有物囊裡藏錐剖開混沌三才內吐出虹霓一寸鋼腸難比十分快性誰及多鋒利些兒繡氣成就四時衣八獐牙雙鰲破甲光勻麝粉色潤氷花並頭不讓金刀叉粧點鉛華背似犀梳半插面如珊掠微凹西廂下黃昏妬殺明月吐新芽九虎爪英魂杳冥仍留古迹尚播威名蘭湯暖浴垢塵淨不染餘腥狐兔抽頭早嗔犬羊側目先驚何須命桃花扇影席上自生凨十牙杖清香滿腹四方志小一寸心虛此身不厭頻拘束世味難踈不尖著肉自出暫時韞櫝藏諸開懷處春纎半屈花蕊上蜂鬚滿庭芳富貴貧窮陳糧滿倉財盈聚寶羅綺千箱終朝受用應時饌細酒肥羊笑欣欣擎擡過盞喜孜孜舉案流觴寬弘量樽前玩賞開宴出紅粧心廣體胖腰金衣紫氣宇軒昻威儀濟楚多名望德厚仁寬扶社稷賢才棟梁保山河永逺安康包公量承恩受賞爵祿秉忠良身貧可憐多憂多恥少語無言雖貧怎肯將身賤禮義和謙新朋來清茶消遣舊友至間話何妨休輕量非吾腼腆窮達任皇天敝巾破裳形骸臞秀容貌堂堂靈輒不遇桑間飯每誦詩篇住半間無扉草菴臥一枕楊栁夕陽休輕量炎涼莫管否泰任循環滿庭芳京口感懷殘花剩栁摧垣廢屋新塜荒丘海門天塹還依舊滚滚東流鐵甕城橫刺虎口金山寺髙顯鰲頭夕陽候吟登舵樓和淚望揚州二武林感舊錢家故址東吳霸業南渡京師縱橫四百八十寺不似當時隨處寫坡翁舊詩何人吊逋老荒祠傷情思西湖若此何處比西施三贈余光明黃庭合成青龍制伏白虎馴寧金丹養就還元性日月分明傳妙用神仙勝境積隂功海宇聲名真靈應杏林橘井久視樂長生四寄何齋長端肅奉柬相違咫尺似隔關山少成歡會多離間直恁艱難平地裡情踈意懶暫時間書廢琴間時頻盻歸期早晚先報此平安五嘲人義蹇休懷故人難尋東道誰念斯文南枝昨夜傳芳信大地回春雪兒飄深深閉門魚兒膾旋旋開樽黃昏近黑嘍便盹且伴睡魔神六西湖感興笙歌醉鄊綺羅絢綵粉黛吹香湖凨鼓起波千丈瀲灔春光亂紛紛逰人蕩漿閙攘攘潮子撑航情懷放花簮酒賞時值暖天長七嘲薦非才荒蕪舊隱瘦田破屋流水間門吾生甘守黃􅐽運何病何貧管城子誰行記本孟嘗君舉甚賢人年將盡梅花笑哂添一歲老三分八送宗叔仕居官體統何憂倉廩不得長盈寮屬和協休嫌衆同盡微忠勸農桑將供歲用莫偷安坐看民窮歸家頌清白古凨才是大宗翁滿庭芳春逰芳􅋄地春逰美哉名園佳圃會賞吾儕花紅栁緑堪人愛蝶笑蜂猜臉桃花三分酒色吐珠璣七步竒才踈狂態天寬地窄沉醉恰歸來二夏賞緑荷池炎天景佳脫巾露頂幔罩輕紗乘涼池閣無休暇滿眼繁華楊栁堤金樽玉斚荷花池沉李浮瓜歌笙罷天寬地狹沉醉恰歸家三秋飲黃花酒秋天景竒金凨玉露白雁南飛長堤髙栁吟蟬蛻菊桂芬菲玩月樓直侵北極賞花亭正對東籬花簮墜天幃地席沉醉恰扶歸四冬吟白雪詩三冬景殊雪花絮滚梅蕊香浮氊簾低簇寒威布暖閣紅爐光爛燦凝合玉宇明滳溜凍徹氷壷吟詩處天遮地阻沉醉玉人扶滿庭芳凨月凨塵艷娃堪題堪詠堪羡堪誇朱唇檀口些娘大臉襯桃花理氷絃纎纎銀甲步香塵窄窄刀麻天生下溫柔典雅端的玉無瑕凨情熱沾巫雲暗結楚雨偷淹錦場花洞春光占眼角眉尖鴛鴦帳春來夢甜鳯凰衾老後情忺平康院鶯花簿上凨月擔兒擔鸞笙鳯簫銀筝欵按象板輕敲幾年忘却間情調夢斷魂勞重整頓鴛鴦配交再安排翡翆窩巢知音樂拈花㺯草凨月擔兒挑凨流事耽湘裙晚皺紅袖春淹梨園世不著虛賺陳馬曽諳三生話百年夢甜半生狂一縷涎饞重新看鶯花陌上凨月擔兒擔喜春來馬致逺六藝一禮夙興夜寐尊師行動止渾絶浮浪名身潛詩禮且陶情栁溪中人世小蓬瀛二樂宫啇律吕隨時奏散慮焚香理素琴人和神恱在佳音不關心玉漏滴殘淋三射古來射席觀其德今向樽前自樂心醉橫壷矢臥蓑隂且間身醒踏月明吟四御昔馳鐵騎經燕趙往復奔騰穩似船今朝兩鬢巳成斑機自參牛背得身安五書筆尖落𥿄生雲霧掃出龍蛇驚四筵蠻書寫畢動君顔酒中仙一恁醉長安六數盈虛妙自胸中蓄萬事幽傳一掌間不如長醉酒爐邊是非潛終日樂堯年喜春來初見繡簾兒外初相見嬌眼頻將恩愛傳滿懷心事總難言天那天教我幾時圎二同行騰騰共入蘭房內困困相偎不暫離昭君怪道會較遲凝眸視猶自眼前飛三小酌金杯頻勸瓊花釀玉斚氷調荔枝漿洛神西子閗濃粧推窗望月色轉回廊四沐浴烏雲斜挽摘花鈿素手相將入蘭堂鴛鴦同浴碧池塘桐槽放拂面麝蘭香五並枕星星俊眼橫鋪俏馥馥香腮出落嬌纎纎一搦楚宮腰羅襪小無福也難消六交歡情郎耳邊低低道渾身春透兩心樂情濃不厭顫聲嬌投到了斜月上花稍七言盟鴛鴦作對關前世翡翆成雙約有期無緣若罷美夫妻除夢裡驚散各東西八曉起鄰笛吹徹五更歌日色蒼蒼映碧波佳人微笑問郎呵睡甚麼再樂些兒箇九梳粧腰肢楊栁凨前瘦腮頰桃花鏡裡羞嬌紅嫩緑付溫柔梳粧後仙子下瀛州十敘别一杯别酒強挣捱兩意綢繆解不開長安得志早歸來休只待野草蔽庭階喜春來遣興湖山遣興還詩債杖履尋芳釋悶懷村醪滿酌勸吾儕杯莫側聽和喜春來雲鬟霧鬢鞦韆院翆袖湘裙鼓吹船錦屏花帳六橋邊真閬苑人醉杏花天三月天外無消息八字峰前不暫離日長人困晚粧宜鸞鏡裡和影一雙飛金杯滿酌桃花釀玉斚重斟桂蕊漿湘妃西子淡濃粧移畫舫來趂芰荷香喜春來離思玉鞭楊栁春凨陌繡轂梨花夜月階楚雲湘雨夢陽臺休分外花栁暗塵埃兩行帶草連真字四句尤雲殢雨詩東凨吹與那人兒他見時知我害相思情傳骨髓難措洗愁灌肌膚怎受持相思離苦總成疾我共你相見一時醫雲慳雨澀歡娛儉雁杳魚沉鬱悶添舊愁新恨兩眉攢掩淚眼誰問病懨懨喜春來憶美湘裙半露金蓮辦錦袖輕舒玉笋纎粉面宜貼翆花鈿可喜娘爭笑色妍妍不能歡會空偷看費煞心腸受用眼一回相見一畨難數步間如隔萬重山一時口強心難強半霎恩情怎敢忘人前強道不思量却是難都在我心腸蜂蝶困歇梨花夢鶯燕飛迎栁絮凨強移蓮步出簾櫳心緒冗羞見落花紅喜春來妓情無錢難買蘇卿俏有鈔能驅倩女魂粉營花寨緊關門咱受窘坡撇見錢親元和還徹煙花債亜仙消殘陌栁懷爻槌瓦罐串花街鴇兒乖只道去休來輕歌慢舞梨花院皓齒湘裙栁陌闌王孫公子買幽歡有餘錢醉臥麗人天有錢得飲葡萄釀無鈔難嘗荔枝漿古來多少淡濃粧死偎纏結果落空拳喜春來道情扁舟雖小乾坤大活計雖貧受用多世情日月暗消磨青鏡睃黑髮早斑皤今朝有酒今朝醉且盡樽前有限杯回頭滄海盡塵飛日月疾白髮故人稀皮縫執袋腰間挂草結芒鞋腳底踏黃􅐽淡飯一甌茶散誕煞腳到處為家塵寰跳出無牽挂意馬心猿自捉拏藥爐丹竈是生涯得清暇白雪長黃芽喜春來盻望鴛鴦失配誰驚散燕子無雙飛興闌粧頭倚做望夫山凝淚眼無語憑闌干恓惶淚濕鴛鴦枕慘愴香消翡翆衾惱人砌畔促織吟驚夜寢鄰院搗寒砧庭槐破夢秋凨撼妾淚聮珠夜雨攙朝雲無計出湘潭休問俺司馬淚青衫眼橫秋水雙波溜眉聳春山八字愁別來誰伴上粧樓如轉首葉樹忽驚秋喜春來春逰芳草地踏青間玩心神泰杖竹歌謳好快哉天台路上遇嬌態桃溪畔洞