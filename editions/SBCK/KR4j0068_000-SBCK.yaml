body:
  text: 雍熈樂府序夫樂府之名起扵漢是後代有作者體製漸嚴至扵今日獨益精斯乃文詞之最工聲律之大備也其體製有十七宫調曰仙吕調曰南吕宫曰中吕宫曰黄鍾宫曰正宫曰道宫曰大石曰小石曰髙平曰般渉曰歇指曰商角曰雙調曰商調曰角調曰宫調曰越調皆因天地自然之音定腔命名各從其属一句之内不可亂下一字一調之中不可混施一曲自非髙才愽學妙觧音律者不􅀎按腔填詞使情明語暢穏諧樂府何者盖前人閱歴既多腔譜巳定聲分平仄字别隂陽至精至備本不可易故扵措詞之間其字其音一有出入即非家法弗愜人心何以傳乆逺被絃管㦲故此為詞林之絶技藝苑之至難也文人才士徃徃難言之求其䆒心精專獨臻其妙者代不數人而已由是傳授既寡樂教遂微予生長中州蚤入内禁中和大樂時得見聞又嘗接鴻儒承論􅀃似若彷彿其影響者比見舊刻彚輯􅀦朝并金元以来諸名公鉅卿佳詞妙曲套數小令凡若干章宫分調别燦然具備作非一手調出一腔信皆樂府之指南先得我心之同然者也竊自愛之乃扵直侍之餘禮文政務之暇或觀諸窻几或命諸聲歌臨風對月把酒賞音洋洋陶陶乆而忘倦自惟際世雍熈仰受隆恩和平安樂斯􅀎樂此爰鋟諸梓用廣其傳仍其舊名曰雍熈樂府雍熈云者盖采唐虞時雍咸熈之語以昭盛世之治和也且欲歌之聴之者咸知聲樂之所自云嘉靖丙寅􅀊中秋日安肅春山謹識雍熈樂府卷之二十目錄雜曲山坡裡羊身無􅀁幹當休髙歌繁華搬㺯有錢有物伏低伏落譁誇聰慧官資新授三閭當日愁眉緊皺風流人坐生涯雖舊天扵人樂新修田院江山如画風波慣怕隂随隂報湏教人倦風波時􅀱休争閑氣淵明圗酔花開花謝尭民堪画青霄有路長天炎􅉯膏梁供奉功名為務朱軒兩厦水亭閑眺人活百􅀊困来髙臥黄蜂報曉常無飢餓雲埋山麓禾田耘遍氷輪髙駕羈懐縈掛長江東注驅馳何甚田園荒廢喬才心邪􅓸波羅襪簾兒私下繡幃􅀌臥雞鳴早去榮華休傲虚名休就花逢春到紅塵千丈塵心撆下財帛爭競失時休懊水仙子帶過折桂令海棠雨過錦狼藉氷盤貯果水晶凉繡幃零落綵絨毬鬂􅀙別後甚蓬鬆病乜斜恰似酔乜斜老先生空戀錦堂嬌並頭蓮池上錦鴛行萬花䑓上正中秋一箇烟花嬝娜艶詞頭千嬌百媚俏冤家鴈兒落兼得勝令往常時為功名惹是非自髙懸神武􅃣也不學嚴子陵七里灘三十年一梦驚抖擞了元亮塵雲来山更佳器非瑚璉同閑来無妄想山翁酔似􅅺詞林錦繡堆功名休掛齒身􅄐皂盖車天時鑒盛衰相親麋鹿羣柴門盡日関慙居􅂦鼐官時光㡬變遷至如富貴驕詩書細琢磨性情甘澹雅茶烹鐺内雪婆娑盖草亭忙忙鳥􅇠走新詩囱下吟􅀴書子訓嚴趋炎真面慙怕的是五鼔敲喜的是玉􅇠升想的是橂様標愛的是一處眠小状元酸如醋那裏是􅃄花寨錦繡窩托根近水堤形圗烟月牌飛不上􅄐恨天女孩兒年正嬌􅀝幃屏長嘆吁手帕兒托着腮十二月兼尭民歌􅀙跳出功名火坑清明禁烟堂名遂閒池亭草苫最髙歌兼喜春来禁􅁐中試㸔花開詩磨的剔透玲瓏沽羙酒兼酔太平在官時只􅀃閑寳粧成鸞鵲牖滿長空瑞雪飄對玉環兼清江引水向東流奄奄日墜西白髪堦前眼見故友稀􅇠走烏飛忙中日月疾碧玉簮折掂為三兩截郎上􅀌舟片㠶無計留江雨淋淋梅垂無数金懶聴笙歌酒空金叵羅去􅀊觀梅折花親贈君羅䄂頻淹淚珠凝粉腮香透簾櫳藕花風漸生滿泛霞盃羞歌白苧詞孔雀屏開半􅃒銀蠟光脫布衫兼小梁州樂繁華􅀝翠偎紅沽羙酒兼快活年鍮石銅生性格滿庭芳兼清江引一蓑晚烟逺山近山村前野田烟連草連叨叨令兼折桂令蝦兒腰􅀛兒背玉連環繫不􅁸香羅帶脱布衫兼小梁州氷肌瑩寳釧玲瓏映斜陽数􅀧㱕雅梅花酒兼七弟兄他每日家􅀏呵呵年紀又半百過鴈兒落兼清江引喜山林眼界髙湘妃逰月宫帶折桂令簮纓華胄更風流後庭花兼青歌兒喜孜孜擺珍羞開玳筵盡忠良為股肱喜梧桐蒙山頂上茶蒙山頂上茶雪裏梅㸔仙子跨黄鶴黄薔薇君天坐碧霄脫布衫兼小梁州明聖主仁彷三皇月上海棠玉楼花影淸秋夜青娥銀燭髙燒者似嫌黄菊千枝放瑶光乍轉芳枝上掃晴娘掃晴娘髙蹺雲髻閗紅粧掃晴娘䡖移蓮步下回廊掃晴娘臂懸􅁅土絳紗嚢掃晴娘一身可喜好衣裳酔扶㱕痩後因他痩頻去教人講有意同成就我嘴揾着他油䯼髻一半兒懷中摑惜費温存不禁春色眼兒涎纎腰恰退繡羅裙俏心端的性難拏海棠香雨濕吟􅂁春閨怨要觧愁懷除是酒桞葉眉兒芙蓉色要觧愁腸除是他要觧愁腸除是你落梅風門外山無数野鶴􅂊鳴罷山隔紅塵㫁野水明映月流水髙低澗入室琴書伴荼􅐘逕芍藥亭龍􅉬字鸞鳯􅁓清香透醅瓮開包蔵消出落嬌陽關别千里叠纔相見又早别􅄐鄊井背土居恨青􅍡過野橋思今日想去年山迢迢水潺潺黄昏想白日思閑針線怕待拈囱間月簷外鉄燈􅀅㓕人睡也燈􅀅㓕人睡些燈下詞􅀉與伊陶元亮楚大夫酒紅臉愁白毛桃千􅀣梅一株閑花草臨路開軟履香􅅺潤髻軃青螺重蜂黄散蝶粉乾王冕風流在留春住春怎留本兒五利五張風入松春風不到小囱紗前日席上泛流霞丫鬟休賣小桃紅劉郎前日到桃源尭民歌静巉巉烟霞嶺北一箇青雅雅門栽五桞㸔㸔的相思成病這的是金山豫章遥山隠隠四換頭清明時候西湖􅃄岸江湖豪邁衝寒乗􅀐堪描堪画因咱閒暇違咱嚴假因些閒話佳人安在兩葉眉頭􅀙他別後牽腸割肚非咱薄倖繡簾不掛更䦨人静言盟說誓河西六娘子二八誰家小多嬌二八誰家窈窕娘二八誰家女娥媓二八誰家女妖嬈央及梅香好姐姐入門来􅀅奴搂抱在懷兩意相投情掛牽喜的相逢怕的􅄐去了多嬌好情懷懶對菱花整艶粧􅀝着門兒等他来嘱付梅香兩三遭景色春来燕子􅀟不覺熏風三伏天葉落梧桐又早秋瑞雪飄飄凛冽天錦被斜搭象牙床錦被摺在􅂵帳中錦􅀍無心去整摺錦被斜􅀝枕頭兒挨天淨沙海棠開退嬌姿滿懷病􅀔愁煩荼􅐘白雲攅攅跨狂愁值眷殘劣冤家百媚千嬌山林􅂞隔紅塵嬌滴滴軆態妖嬈咲談間語話清髙青山一抹殘霞玉容嬌傾􅀦傾城山中採藥㱕来房前檜栢屯門小船新酒活魚斜陽数曲漁歌莎䄄十里初芳逍遥誰識予心昨朝楊栁依依年時尚覺平安休言咱是誰非去年花下相逢同雲布滿髙崖近山近水人家岧嶤天近山􅎛緑楊􅀣底㝷春柴扉土炕茆廬白鶴子金風殘暑退荷衰青盖􅅯碧雲催曉意玉簮香滿逕書齋凉風爽􅄫心無象染欲修千􅀊夀黄婆心不順先天真一炁欲知鉛汞軆紅鉛與白汞方知三教理逹得玄機子和風開桞眼熏風清竹塢金風飄敗葉朔風如箭急步步嬌怕囱間人瞧見㡬畨家佯推醉等閑来三更至不温存心兒强書齋外簾前站小鞋兒連根繡天生的嬌娃秀玉天仙臨凡世􅄫寞深閨人獨自一字思長吁千口􅂔楊栁枝頭黄昏月戴月披星躭驚怕胡十八正妙年不覺的老来到􅀙退閑遇生日客可人景如意試􅄸春九十日人㑹合不容易人􅀏余􅀋狂夫自隠居謝塵俗結茆屋近水􅁁羙名兒常在心天生下俏臉兒相會了半霎兒經了些苦折磨又不曽得甚的眼皮兒怕待合􅂊説些好話兒百般的㝎計謀快活年小小船兒棹滄波挑月穿雲入烟蘿納了官粮少差科牛背斜陽短􅅇歌醉後神昏眼睛花放浪烟花不成家百萬青蚨怨根芽志氣昻昻逞豪家鸚鵡曲儂家鸚鵡洲邉住覺来滿眼青山暮錢塘江上親曽住梦囬時不見犀梳長繩短繫虚名住㸔燕南陌上紅塵張良更姓圯橋住借箸籌㓕項興劉逃回辭楚無家住空城組練三千赭肩腰斧登山住記年時雪㫁溪橋青衫司馬江州住薄情郎又販茶船才郎于祐咸陽住恨匆匆一片題紅怨賽鴻秋東􅁁路西􅁁路南􅁁路燈也照星也照月也照賓也酔主也酔僕也醉朝燒煉暮燒煉朝暮學燒煉春来時綽然亭香雪梨花會小梁州朱顏緑鬂少年郎玉壷春水浸晴霞凭闌人露冷池塘秋水澄門外髙槐垂嫰黄􅀧破蒼苔墻角瑩寳􅂦香殘秋夜深戯撥琵琶囱下聴月照珠簾垂玉鈎小殿昨宵天氣凉酒力禁持頭懶擡着罷殘棋茶一甌獨上髙䑓凝望中乾荷葉乾荷葉色蒼蒼乾荷葉映枯蒲根摧折柄欹斜乾荷葉色無多南髙峰北髙峰夜来箇酔顔酡乾荷葉水上浮脚兒尖手兒纎􅀄生月兒初生月兒一似􅃓􅀄生月兒懸太虚初生月兒一半彎初生月兒明處少初生月兒一似鈎逰四門野塘花落杜䳌啼桞綿飛盡緑􅁝垂落紅滿地濕胭脂海棠花下月明時前程萬里苦相傳琹書笔硯作生涯賞花時去路崎嶇鳥道分五彩雲開丹鳯楼既悟死生機既奉􅂵􅅺宣
