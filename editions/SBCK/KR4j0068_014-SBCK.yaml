front:
  text: 雍熈樂府卷之十四
  hash: sha256:7c62fb00c29671762f489ca3d6bf67e510fe605e194f83c6e87aed8ebc542335
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_014-1a}
body:
  text: 商調集賢賔皇都八景大明朝萬方聲教羙受天命建皇極禮樂興立綱陳紀賞罰明庻績咸熈攝偏􅀖一統車書掌中原萬里華夷聖明君至仁行道德股肱臣調􅂦塩梅凨雲齊慶㑹日月燦光輝八寳粧德凨􅀍四夷際遇昇平世航海梯山重譯来朝㑹龍庭輳集稱臣納禮方物進獻多華麗白象金獅麒麟呈祥禎祥迭至鳯来儀玳瑁紋犀翡翆陳詞拜跪皆歡忭敬仰着天顔拱帝基攄誠慕義􅀙此盡㱕依聖恩施仁恵寰宇歡騰祝夀基梧葉児烽燧息無征戍􅀦朝安罷􅀾敵懸酒斾捲征旗農物辦耕牛臥士卒閑􅀾馬嘶四海内樂雍熈聴擊壤歌讃喜侍香金童嘉氣彩霞飛繚繞都城映曉日龍楼鳯池金燦爛蓬莱圗裏歌康衢士庶咸集動歡聲快樂逰嬉仰賴着仁明治羙民豐物熈溥沾生意太平年萬載應昌期賀聖朝壮觀皇都八景堪題翫晴雪西山霽薊門外烟雨飛瓊島春雲月殿清竒太液池秋風蕩緑漪菡蓞香飄萬頃玻璃水紅花金臺夕照掛斜暉錦屏幃居庸疊翆潺灣峻嶺􅀔崔嵬更相宜玉泉虹墜恰亦似洞天福地勝如那閬苑瑶池蘆溝皓月色輝輝也囉哩哩青哥児幸逢着豐年豐年稔􅀊端的是鞏固鞏固洪基見如今雨順凨調和􅂔羙普天下南北東西瞻仰着京畿朝賀􅊮幃聖主垂衣禮和樂備列文武公卿舞蹈揚塵頌聲齊祝萬萬􅀊當今帝尾聲錦乾坤江山麗聖恩寛厚撫黔􅀺但願皇圖天地齊集賢賔忠臣輔􅀦殿頭官恰􅂊傳宣􅃙俺老臣入宫闈不曽歇一時半刻連宣到兩次三囬俺這􅂻鞠躬躬象簡當􅇩寛綽綽紫􅂁簇地按下俺這紗幞頭更􅀅這玉束帶整齊登輦輅直叩丹墀不聴的静鞭三下響那􅂻也文武兩班齊逍遥樂又不在長朝殿內朝陽宫􅂻多管在望思䑓上坐地每日家子是哭哭啼啼你不合信䜛言父子相􅄐可不道事要􅀁思免勞後悔他並不知我暗蔵着苗裔我今日舉荐儲君怕甚麽泄漏了天機梧葉兒君王恱逹着這聖主機咱正是白髪故人稀遥望見盤龍椅怎敢道免拜禮誰敢失了尊卑我這􅂻舞蹈􅀭塵三叩畢老㣲臣拜舞罷山呼萬􅀊金菊香見如今毁􅀅兵噐為農噐不動征旗掛酒旗省刑罰薄税歛賊盗息路不拾遺普天下四海樂雍熈醋葫蘆那老兒他道是女配了夫兒娶了妻則他那有錢有物有東西則他那親兒親女都来這􅂻慶八十那老兒歡天喜地􅀝仗他有官有禄有承龍么老㣲臣有官呵􅊞與誰有家􅀻誰做主意無挨無靠無親戚淚淹淹盡􅀅袍䄂濕不由我啼天哭地􅀟眸中兩淚似扒推金菊香老㣲臣身死靠着誰誰是我拖麻拽布的做了箇秦不収魏不管忠孝􅀑若到寒食誰與我燒一陌􅁓錢􅁅村里迓鼓餓的我黒乾憔悴早難道飽食飽食終日深山內胡尋亂喫他每都􅶭􅀣皮也無那珍羞百味渴飲澗水飢飡榆􅀣採蕨薇也不是聖主孫君王嗣也不是太子妃也做得過首陽山伯夷叔齊元和令小儲君腹内飢委實的捱不得􅀅一箇李延年剮割的血淋漓與儲君胡亂喫李延年剮皮割肉代粮食做的箇損別人安自巳上馬嬌怎當那肚􅂻飢又無那身上衣天也做三口兒苦相随正寒天臘月在深山內凍的似痴捱不過這天􅂔逰四門則他那撲頭撲面雪芲飛凍􅂢了病身軆踅天踅地寒凨起常好是命􅀅危㡬口兒悲含恨有誰知勝葫蘆閤不住撲簌簌腮􅁁淚珠垂三口兒痛傷悲埋怨俺尊君􅑯下的教別人㫁送了苗裔教別人欺瞞了尊位教別人傾䧟了漢華夷尾聲今日􅀅社稷扶聖明主賽堯年正好捧金盃穩坐着盤龍亢金飛鳯椅他正是君臣慶㑹輔佐着山河日月衮龍衣集賢賔端陽走驃􅀐萬方寍仰賀明聖􅀦民鼓腹樂雍熈㓕五毒青蒲似劍納千祥緑艾如旗感吾皇大徳寛仁因此上內宰扶持則􅀅這稀聞罕見的驃􅀐習擁旌幢緊驟狻猊鑼鳴如霹􅆮鼓響似轟雷逍遥樂人人爭􅂔箇箇嚴威堪圗在􅀞􅂻我則見銕桶週圍志昻昂各逞雄威簇擁定萬里威凨百丈旗大開門比併髙低拖白練争先閗巧忽的見鐙􅂻蔵身又閃上揭鞍換屜金菊香我則見隔一騙二最為魁童子拜觀音叅悟理趕剗拖塵緊追飛大捨身餓虎撲食流星趕月朔凨疾醋葫蘆關公斬蔡陽三􅀾吕布威穿錢隔肚㡬人知五馬破曹那􅂔􅀔更有那枯􅀣蟠根巧藝耿恭拜井應天機么張良跨海東夜又探海西有􅂿梯望月夜眠遅五􅀑閙判使見識總不如陳摶盖􅀍騎騌倒坐探烏騅么英雄伍子胥鞭伏桞盗蹠夾鎗趕剗恰便似電光飛三馬解往来無賽比最􅕑的是金雞獨立有唐僧三蔵􅂑經囬么夜义探海潮巴山􅀎取水仙人􅃌路慶雲垂九里山洞前㧞虎尾更有那十閑子弟􅀑牽龍緊驟定赤狻猊節節髙也有那八仙慶夀二郎趕日摩利支飛刀對箭四毛女穿金戴翆也有那五􅆐争果二仙傳道登山􅂑水单獻靴􅀟馬觧三耍旗呀有一箇􅀾八􅀅英雄敬徳元和令㱕湖的范蠡姜太公釣魚􅀔耍孩兒兩馬比髙低急攘攘追凨小旎旗更有那推星踢斗奮神威節節髙前後催剪倒股往来追上馬嬌也有雙獻靴大揭屜更和那書画琴棋金剛獻杵山門立左剗右疾大鞍剗有誰及逰四門飛蟾起足燦光輝六倒手最堪宜我見他登塵邁步㝷踪跡弓箭剗更無敵斜挿桞竒後探鞦兩三囬賞芲時又見那玊女攛梭尋機織鞦韆子施逞真可喜单献纓打扮的俊忒羙野馬剗偏整齊倒捲簾緊追􅊞􅈽石投江萬古知入海求珠献寳貝僵板闥縦金勒挺身直張子房圯橋三進履右入鞍左入鞍兩相宜勝葫蘆試㸔那李廣英雄射鴈軆四夷觧朝貢盡皈依見一箇老僧背坐窮妙理見一箇􅀟飛燕綽水見一箇千里眼無比見一箇順凨耳下雲梯見一箇倒掛枯松懸崖壁分左右埋伏用心機見一箇存孝施逞打虎威見一箇捨身落地見一箇滚騌過膛無對見一箇四季跌落總難為后庭花也有那神香子劈華山見豹子翻身省􅂔力且休題旱水磨千遭轉更有肩樁起範疾見野馬三跳澗緊相随射白􅆐深蔵竒異復奪窩燕子飛張天師驅虎威前鈎後伏屜頷搭頦為第一􅀟鴈兒擔水救火馬争馳老逹子放鷹大打圍二􅀑争環調􅆐背左揷芲下馬急右挿芲上馬疾尾金鼓鳴旗幟捲凱歌聲罷征旗􅀭塵舞蹈拜丹墀願吾皇穏登龍鳯椅衆臣寮山呼萬􅀊托賴着當今洪福與天齊集賢賔雞􅁰約二十年死生交同志友咱兩箇再相見永無由一靈兒伴􅀌雲􅄀􅄀杳杳趂悲凨蕩蕩攸攸恨不的摔碎我䄂􅂻􅁝鞭走乏我坐下驊騮整整三晝夜水􅄴不到口沿路上誰敢道半霎停留身穿的􅁝麻三月服􅇩懷着今古一天愁逍遥樂打的這匹馬不刺刺凨􅇛般馳驟百般的抹不過山腰盻不到地頭那􅀌塜荒坵仰天號哭破我咽㗋更那堪􅀣稍頭冷凨不住吼恰黄昏雪霽雲収猛聴的哭聲哽噎遥望見幡影飄揚眼見的殢魄夷猶金菊香三生梦㫁九泉幽休想一日無常萬事休莫為尊堂妻子憂這三件事我索承頭尔亡之後不湏憂梧葉兒舉孝㢘曽三聘論文章第一流兄弟你不拜相也封侯正滄海魚龍夜趂西凨鵰鶚秋一去了不囬頭這煩惱越感起天長地乆掛金索皮殻定箇骷髅黄紺紺渾消瘦恰便似刀攪我的心腸痛煞煞難禁受恨子恨箇月之間少人来問􅀱早知你病在膏肓我如何不捨性命􅀅伊救村里迓鼔九原􅀌塜可惜好人不長夀兄弟你平生正直無􅀻曲心無塵垢想腹中大才􅇩中清􅂔都做了江山之秀閃的我急急似漏網魚呀呀似失羣鴈忙忙似丧家的狗兄弟也不由我身恍惚提心在口元和令㡬日長星落大如斗流光射如晝原来是䘮賢人地慘共天愁􅀣掛汝陽城外桞青山一帶也白頭滿城人雨淚流上馬嬌休道是人一舟力萬牛百般的拽不動輿車軸你隂魂耿耿􅀅咱􅀱志己酬􅀅靈聖暫時収逰四門踈刺刺慘人凨過冷颼颼支生生頭髪似人揪静悄悄荒郊野外申時候昏慘慘落日壓城頭慘霧又収寒鴈又下汀洲景物正幽村落帶林丘勝葫蘆都做了野草閑花滿地愁你為我不肯上墳丘枉教那一千人都落後便做道誰親誰舊誰薄誰厚豈不聞相守到白頭后庭花􅀕酒奠到一二斗輓詩吟到数十首可惜耗盡了凨雲志沉埋了經濟手論交逰你不落在人之後播聲名横宇宙吐虹霓貫斗牛臥白雲啇嶺頭釣西凨渭水秋􅀏嚴光傲許由到今日一筆勾青哥兒兄弟你今日箇功名功名成就都不如古今古今前後一寒儒過如萬户侯既今日㱕休人死不中留咱意􅂔相投知我心憂来到神州􅀅髙節清修我去白玉堦前拜冕旒我與你丁寍奏栁葉兒似這般光前􅁉後一靈兒蕩蕩攸攸我親身自把靈車扣一来是神明祐二來是􅀑推軸我與你革刺刺相拽到墳頭集賢賔秋懷憶吹簫玉人何處也今夜病較添些白露冷秋蓮香謝粉墻髙皓月光斜止不過暫時間鏡破􅁫分勝强似数十年信㫁音絶對西凨􅀝楼空自嗟望不㫁嶺􅀣重疊怕流光奔去馬鴈陣擺長􅉬逍遥樂歡娛前夜喜報燈芲香生帶結剛得箇合諧誰承望又早􅄐別常記的相靠相偎咲語喋画堂中那日驕奢受用些樽中緑蟻扇㡳紅牙枕上蝴蝶醋葫蘆我和他􅀄相逢臉帶羞乍交歡心尚怯半粧酔半粧醒半粧呆兩情濃到今難棄捨錦帳鴛衾方􅂊温熱把一根鳯凰簮掂做了兩三節么我為他挑着燈􅀅好句兒裁背着人􅀅心事兒説直等到碧梧囱外影兒斜惜芲心怕􅀅春漏泄步蒼苔脚尖兒輕躡露珠兒常汚了踏青靴么我為他朋情上􅀅謊話兒丢他為我母親行􅀅喬様兒摭我為他在家中費盡了巧㗋舌他為我褪湘裙杜䳌芲上血我為他耳輪兒常􅀬他為我面皮紅羞把扇兒􅃒梧葉兒一箇是相府内懐春女一箇是君門前弹劍客半路􅂻恰逢者剛㡬箇千金夜忽刺八抛去也我怎肯恁随邪又去把墻芲亂折后庭花夢了些虚飄飄枕上蝶聴了些擊丁當簷外銕剛􅂊得合上温郎鏡却又早攔囬卓氏車我這裏痛傷嗟鴛帳冷香消蘭麝困􅀅来剛睡些望陽臺道路賖那憂愁怎打疊這相思索害也㸔銀河直又斜對􅀌燈明又㓕青哥兒呀凨亂掃堦前堦前黄葉雲半􅃒栁稍栁稍殘月這􅄐恨更比前春較陡些害的来乜斜瘦的来唓嗻待桑田重變海枯竭還不了凨流業浪􅂻来煞這愁呵剛不在眼角踅又来到眉上惹恨不的倩三尸肺腑細鐫碣有一日綉幃中玉肌重厮貼我􅀅他􅃌尖兒輕揑直説到楼頭北斗柄兒斜集賢賔秋憶􅃈囱寒井梧秋到早霜月小粉墙髙說􅄐思堦前蟋蟀閙西凨枕上芭蕉鎖不住􅀾兢兢一􅀧靈􅙈盻不到黒沉沉百尺藍橋這些時玉精神為花消瘦了害的来難画難描我把他聲音兒愁記起模様兒怕題着逍遥樂于飛方效間阻􅀹多歡娛較少昨日今朝􅀏青銅兩鬂蕭騷萬種凄凉厮輳着折挫煞多愁沈約怨了些鴛鴦枕冷鸚鵡盃空翡翆衾薄金菊香往常時芲香春店馬聲驕今日箇雲􅊕秋江鴈影遥夢難成㡬畨直到曉四壁寥寥燈熖短􅂐烟消醋葫蘆常記的透踈簾月半明掩重門人静悄正嬌雲􅊠壓海棠稍我和他既相知恨不相見早他燭芲前􅀅錦筝来斜抱剗的又背着人偷用眼兒瞧么他也曾病懨懨只自擔瘦亭亭難自保他也曽怕人知常帶着㡬分囂他也曽擲金錢数番芲下禱他也曽直等到星移月落他也曽􅀝䦨干画損掠兒稍么我和他對着神􅀅海誓言我和他並着肩􅀅眉黛掃我和他把陽春一字字細推敲我和他說􅀻情一説一箇天大暁不離了相偎相抱他見我霎時間無語便把話兒嘲么他雖無甚麽傾國妍他雖無甚麽出􅀋好似這等知人的情性兒最難學但見呵或是忙􅂉是遅或是早那􅂻有半星兒違約多應是我心他意兩投着么他道我心同魚水諧情随天地老你休要見垂楊又去折柔條他道是既綢繆只宜相㑹少只恐怕燕鶯知道他也曽抵牙兒㡬度費量度梧葉児今日也鳳去秦楼迥鴻稀漢苑遥雲散楚天髙他􅃌冷筝閒鴈我屏寒扇掩蕉剛間隔㡬昏朝岀􆈌的把秋光過了后庭花又不是緑囱前芲謝早又不是瑶琴上絃㫁了又不是青鳥音書滯又不是銀河凨浪惡止不過暫相抛這恁的求神服藥跳梭梭􅁏似挑急煎煎身似燒生踈了月底簫闌􅃢了囱下稿茶飯又不甚調夢兒又不大好青哥児呀這病兒千方千方難療百般百般不効聴了些芲漏沉沉夜轉迢寒透珠箔燈燼蘭膏凨閙簷鐸露滴松梢嘆今宵别様好難熬眼睁睁盻不的雞兒呌浪􅂻来煞他存心豈是薄我留情非道少駕車的終乆㑹題橋破菱花等閒重輳却成就了錦堂歡樂把相思一擔擔兒抛集賢賔翫江楼家住在碧澄澄緑楊灣官渡口張綱索駕漁舟恰離了黄蘆岸白蘋洲畔早来到緑楊堤紅蓼灘頭為活計簔笠綸竿做交知野鷺沙鷗却纔釣活魚換来新糯酒越凨波到大来攸攸船灣在鸚鵡洲夢不到鳯凰楼逍遥樂得了些安家情受教我夜去明来載花渡桞近凨流學得也凨流聴了些冝時的曲調謌謳㸔了些窄窄弓鞋蹙鳯頭翆紅香每日追逰我也曽輕扶翠䄂欵拂紅裙重携素手金菊香親蒙官長把咱勾常言道一酔􅀎消萬種愁􅂔昻昻走􅀅来髙呌吼我和你有甚冤讐不明白恰便似打春牛梧葉児住山野為活計趂凨波得自由我㡬經官府惹閑愁也不知冬和夏也不識春共秋你着我念勾頭我是箇不識字的􅃄波釣叟醋葫蘆小人破房兒一兩間破家􅀻三四口止不過朝耕暮種靠些田疇喝公人忙將我兩鬂揪越分說越難荅救恰便似熖騰騰火上去澆油么每一日錢四百米二斗止不過朝迎暮送走的滑􅌻黄貟外怕人相趂逐去時節鍾鳴時候来時節曉星殘月五更頭么我本是撐㰏舉棹人又不是拈芲􅎥葉手則我這打魚舡上怎與他效綢繆黄貟外若知難素休我怎敢把恩人營搆一重愁翻做兩重愁么那小姐容顔似雨後花腰肢似凨外桞那小姐更知音更標致更凨流你㸔這打魚舡上怎諧鶯燕友請你箇官人窮究怎下的將牡丹芽剪砕了喂村牛么那小姐香甜俊羙嬌俺小人村呆憨强醜醜和嬌兩意怎相投你敎我月明中緊􅀅他懷内搂覷着我村皮粗肉恰便似雪􅇛兒緊靠定黒石頭后庭芲凖俻鐝並頭蓮花下藕再不想釣斜陽江上秋不是我性狠心毒害姐姐呵也是官差不自由你早上扁舟舡撐在當溜若依随索罷休不依随百事有脚跐着舡罄口晃一晃一命休雙燕兒㸔着那一江春水向東流到官司怎索休只說道浪急凨狂怎生荅救好􅊚縁一筆勾這夫妻兩罷手浪来􅂻煞這的是􅀟觧元使的計策小蘇卿中了機彀我去那打魚舡上准􅍯了釣鰲鈎他是箇惺惺人􅄸来出不得漁父手相公呵免勞台􅀱我􅀅那􅀧鋼鍬掘倒了這翫江楼集賢賔慶七夕暑纔消大火即漸西斗柄往坎宫移一葉梧桐瓢墜萬方秋意皆知暮雲軒聒聒蝉鳴晚凨輕􅀧􅀧螢飛天堦夜凉清似水鵲橋圗髙掛偏宜金盤内種五生瓊楼上設筵席南集賢賔金宵兩星相㑹期正乞巧投機沉李浮􅀲餚􅄿羙把㡬箇摩訶羅兒擺起齊拜禮齊拜禮端的是塑得来可喜鳯鸞吟月色又輝夜將闌銀漢低閗穿針逞艶質喜蛛兒竒一絲絲往下垂結羅成巧様􅀔酒斟着緑蟻香焚着麝臍飲盃觴大家沉酔櫻桃突水低紅葱􅃌剖氷􅀲脆更勝似愛月夜眠遅閗雙雞金􅁫墜金􅁫墜玳瑁整齊蟠桃宴蟠桃宴衆仙聚會彩衣輕紗織翆禁歩摇綉帶垂但􅂅得同歡宴團圓到底節節髙玊葱纎細粉腮嬌膩争妍閗巧􅀏聲舉歡天喜地我則見管絃齊奏啇音夷則見瑶天外斗漸移呀喜隂晴今宵七夕耍􅇹老􅇛圏􅀏令心盡喜食品愈稀竒新摘葡萄紫旋剥雞頭羙珍珠嫩實歡坐間夜凉人静巳􅀏聲直接青霄内凨淅淅雨霏霏露濕了弓鞋底紗籠􅇁仕女随燈影下人扶起尚留戀懶心回四門子画堂深􅄫􅄫重門閉照金荷絳蠟輝半柄又横月色不西酔鄊中不知更漏遅士庶每安兵燹又息􅂅豐年稔􅀊尾人生􅂅得同歡㑹把四季良辰湏記乞巧年年慶七夕集賢賔慶七夕新月一彎蟾半影如弓様似梳形彩楼上金凨淅淅御堦前玉露零零看銀漢天星期金殿賞人間節令靈鵲兒駕河光耿耿照簾櫳玉宇澄清瑞雲光燦爛踪跡顯分明逍遥樂今宵喜慶此夜排筵一時待等望天􅁁女宿牛星􅋹沉檀寳􅂦香馨奏笙簧一􅂀清音擺列着御堦前承應輕吹玉管慢品瓊簫欵撥銀筝金菊香響璫璫恰便似鳯鸞鳴韵攸攸有如鶯燕聲唱宫調遶梁一韻清舞的又嬝娜䡖盈勝閬苑賽蓬瀛醋葫蘆玉甌中瑞魁供細茗瓊漿玉液注金瓶對熒煌銀燭照玉屏碧天􅁁凨清雲浄不湏􅂯􅀧九華燈么渡鵲橋河漢等駕牛車天上迎喜蛛兒盒内網􅁝成羅綺叢百芲映月明華筵擺㝎穿針乞巧對􅀟星么銅龍更漏長銀漢光色清殿堦前羅扇撲流螢金凨淅淅爽􅂔增露芲鮮管絃相應㸔金梭墜下彩霞明梧葉兒金波淡玉宇清玉露滴金莖祥光靄瑞􅂔騰對銀漢織女共牛星滿注着瓊漿謾請尾聲金堦前管絃鳴碧天􅁁韵相應度金針得過喜歡聲供珍羞百味滿殿馨直喫的星回斗柄但􅂅年年華宴賀昇平集賢賔秋懷晚凉生碧天清似水秋意慘景悽悽㝡關情寒蛩啾唧助􅄐愁塞鴈聲悲聴楼頭禁鼔􅀄敲更那堪画角頻吹盻青鸞杳然無信息想人生㝡苦别離甚時成配偶何日赴佳期逍遥樂他那􅂻安眠稳睡在何處戀酒迷芲怎下的辜恩負徳想情人清减了腰圍淡春山誰画蛾眉則落的一聲長嘆息空對着景物狼藉花殘易發葉落疾生人去難回金菊香金凨淅淅衆星稀玉露零零皓月輝無心凭䦨十二􅀝寒透羅衣不由人兩眼淚雙垂醋葫蘆意懸懸想念伊悶懨懨成病疾胭憔粉悴似呆痴向深沉画閤庭院􅂻倦舒鴛􅀍玉纎曲損数㱕期么㡬時得咲吟吟兩意親喜孜孜接玉盃􅀟雙携手入羅幃同衾共枕成匹配那些兒歡會􅀙今後再不去愛月夜眠遅尾聲倘俺冤家情意改早􅁯了言盟誓料今生難得效于飛捧名香再向神前祈若許咱鸞凰匹配那其間慶賀做筵席集賢賔離思半囱閑一輪凉月明十分病又􅀍兩樁児應怎禁那譙楼上撲鼕鼕禁鼔更那堪銀臺上昏慘慘􅀌燈􅀝单枕捱不盡凄凉靠幃屏嘆不盡心情則俺這睡不安料應梦怎成綉衾寒凨透踈櫺怎聴那簷間鉄馬聲誰想道音㫘了紫鸞笙逍遥樂倦臨粧鏡怕見鶯花懶焚翆􅂦想念俺梁鴻端的是錦綉才􅀎俊俏多情瘦損形空着人上危楼望㫁雲路鵬程這些時魚沉滄海鴈落沙汀恰便似線㫁了凨筝金菊香常記的春逰郊圃展才􅀎則他這花下題詩吟和的清凨流軆態数可憎他和我並香肩同至郵亭飲芳樽憶春色贈春情醋葫蘆他􅀎栽河陽縣内芲㺯􅂑那凨流紅葉影軆的是章臺走馬画眉行常記的正秋光侍香凉夜清唱一篇新詞羙令向青楼端的占佳名梧葉児思薄幸念可憎􅀃的話不相應冷落了陽臺梦消踈了楚岫屏不由我淚盈盈端的是望㫁了雲山萬層后庭花則他那信不通鴻不鳴則我這食不甜病巳成則俺這京兆尹把心情忘因此上河陽芲板葉零想起他舊恩情誰承望今朝􅀌另則俺這情淚深似井黄昏悶髙似嶺錦筝歇金柱停紫簫閑象极寧栁葉児多管是占鰲頭一定享榮華一舉成名戀着那画堂錦屋成婚聘則我這相思令漸伶仃俏形骸難入丹青尾房櫳簾幙閑簾外画楼净望巫山縹緲碧崚層莫不是蘇州刺史不慣經則我這多憂多病雨雲􅀻積䟎下誓山盟集賢賔兩世姻縁隔紗囱日髙芲㺯影聴何處囀流鶯虚飄飄半衾幽夢悶騰騰一枕春醒恰離了逰􅁝児竹塢桃溪趕趂那蝴蝶児早来到月榭凨亭我恰􅂊覺来時􅀝着翆雲十二屏恍惚似墜露飛螢則我這寸腸千萬結長嘆兩三聲逍遙樂尚兀自神心不定􅀝遍危楼望不見長安帝京知他在何處也薄情多應是戀金屋銀屏想自想扵咱家不至誠空説下箇磣磕磕的海誓山盟赤緊的關河路逺嵗月如流魚鴈無慿上馮嬌覷不的鴈絃㫁臥了銀筝聴不的鳯嘴聲殘冷了玉笙獸面􅂐消閑了翆􅂦門半掩悄悄㝠㝠㫁腸人和淚梦􅀄醒梧葉児火燎般身軀􅀬錐剜般額角疼這些時即裏漸􅂻瘦了身形這兩日茶飯不待用這些時睡臥不甚寍若􅀅這脉来評這證􅀱多是廢寢忘飡病症醋葫蘆㸔了他容顔兒實是撐衣􅃣兒別様整更凨流更洒落更聦明唱一箇小曲兒宫調清㸔了他軟欵温柔情性則􅀍你坑了人的性命引了人的魂靈金菊香㸔了他錦心綉腹那些才􅀎更和這雪月凨芲可教我怎不動情酒席間小曲児編揑成端的是剪雪裁氷惺惺自古惜惺惺浪来􅂻煞㡬番家官身處来的較晚眼巴巴簾下等直等到星移斗轉二三更入門来不覺的画堂春自生緊緊的將他来守定那温存那愛惜那勞承金菊香㡬畨待落筆巧施呈争奈這一叚傷心可教我画不成腮斗上淚珠兒粉漬定無顔色鬂亂􅁫横眼皮児眉黛不分明后庭花想起這和薔􅅔花露清􅀧胭脂紅蠟冷嫰芲朶心偏愛画蛾眉手慣經梳洗處􅀅俺玉肩来凭恰便似鴛鴦般交頸這些時玉肌膚减了九停粉香腮無了半星無心情􅀅雲髻整骨捱捱痩了形悶懨懨画不成栁葉児呀􅄫寞了菱芲菱芲粧鏡自覷了自害自害心疼􅀅一片至誠心都寫入氷綃􆂀和我這相思令都待要􅀉與多情說道是人憔悴人憔悴不似丹青浪来􅂻煞你比那題橋的没信行駕車的無凖誠比着那漢相如厮敬重也不多争我比那卓文君有上稍少了四星好教我呌天来不應豈不聞舉頭三尺有神靈浪来􅂻煞尾心事人㧞着短籌有情人忒薄倖許了我三年来却又早五載不回程我如今覷天逺入地近潑殘生恰便似凨内燈見俺那負心短命則我這一靈兒飛入洛陽城集賢賔雪􅀝龍泉数聲長嘆息逰子去何期添一嵗長一分白髪治一經飽一世黄􅐽凨凛凛􅀊晚江空雪漫漫天闊雲低對梅芲嘆人猶未㱕觀不足嚴凝景致玉壷春艶艶銀海夜凄凄逍遥樂客囱深閉止不過香炷龍涎茶烹鳯髄􅁓帳低垂早難道翆􅀝紅偎冷暖年来只自知捱不徹凄凉滋味鴛鴦無梦鴻鴈無音靈鵲無依金菊香㸔別人吹簫跨鳯上瑶池乗興扁舟訪剡溪真乃是平地白雲三萬里堪画堪題水晶宫翻做了素玻璃尾調琴演楚騷研硃􅀧周易凨流似党家終日酔如泥磨龍香拂鸞箋呵兎筆揮寫就乾坤清氣着人到老􅀽安猶自説兵機集賢賔􅀌悶自別􅄐到今不見影空撇下誓海共山盟心性似随凨栁絮身飄蕩如水上浮萍悶懨懨無語無聊冷清清斜􅀝幃屏不知近来誰至誠姻縁如火上氷凌􅀌幃愁蹙蹙綉幙冷清清逍遥樂懶臨粧鏡恰便似􅁓做的湯瓶充飢的画餅我這􅂻側耳聴聲却元来凨擺􅄕楹􅀑病纒綿可慣經瘦的来伶伶仃仃攸攸一枕梦魂驚鳯凰吟睡不寍怎教人捱到明這潑殘生有似凨内燈蘇小卿怎不怨雙縣令約當􅀄山寺等我這􅂻自評撲簌簌淚傾兩三畨空教人傒倖淅零零細雨霏骨捱捱甘成病冷清清獨對􅀌燈醋葫蘆針線不待拈鬂鬅鬆不待整不􅀎調理見施逞一去了半年不見影在那􅂻誇強賭勝􅀙別後不記的一星星金菊香睡不安坐不寍相思最苦捱殘更譙楼上画角愁倦聴恨咱薄倖一無成事百無成尾聲怎禁這良夜冷月華凈自思量長嘆兩三聲無情懶觀園内景題起他踈狂的情性若得見我那負心賊方顯卦兒靈集賢賔􅄐㑹恨􅄐情到令心上悔這其間無語怎支持冷清清寒衾􅀌枕悶懨懨香冷金猊靜巉巉庭院深沉淚汪汪不住悲啼則俺那俏冤家這其間在那􅂻空教人染病躭疾這些時愁腸空懊惱肺腑悶如痴逍遥樂則我這形容憔悴粉淡胭消不見了三稍末尾空教我獨守香閨呆荅孩廢寢忘食莫不我命犯􅀌辰不暫􅄐不由人感嘆傷悲㡬時香肩同並素手相􅀅並頭再理金菊香一㑹家魂勞梦攘似着迷撧耳揉腮口倦題不茶不飯長嘆息不由人雨淚扒推心兒中懷恨有誰知梧葉児想當日心厮愛端的是不摘􅄐則為他心聦俏意兒随羙甘甘甜如􅁡喜孜孜情似水我和他效于飛到如今可也抛棄的眉南面北后庭花不承望並頭蓮兩下􅂻我和他效鸞凰錦帳􅂻放下紅錦蓮花帳我􅀅金鈎簌下垂拂綽了錦藤席我和他權時歡㑹􅀅鳯頭鞋脫下􅃗綉羅衣權且􅄐咱兩箇心肝般厮愛惜性命般心上題青竒児恰便似蜂蝶蜂蝶逰戯燕約燕約鶯期趂着這嫰蕋嬌香白玉􅙈你可休懶惰身竒栁困芲遅則要你乗興狂為我可也儘意扶持趂着這軟玉温香倒鳯顛鸞厮禁持咱兩箇到来日重歡㑹尾聲則俺這􅊚縁重配偶情深莫休棄天生的一對兒俏夫妻想着俺心厮愛那些兒情意羙我為甚痛留些恩義則要你永團圓諧老百年期集賢賔知㡬二十年一塲虚梦境剛熬的知足好前程治家􅀻如還冷債益庄宅似擣空營鑚故􅁓錯認做多識多知覷先賢方叅透無用無􅀎則這好光景有如形共影緊慢􅂻􅀅咱纒定朱顔忙􅂻改白髪暗中生逍遥樂那時僥倖覔火灼氷巴山弄井好相識脚底撅坑大模様粧么小路児行動不動誇強賭勝都則要休病休閑休老休生醋葫蘆一聲低喚一聲應一日天隂一日晴春暮景又早秋暮景嵗月相仍為落花流水兩無情么我這閑来時縦翫逰悶来時側耳聴起頭枝上有流鶯隔紗囱直喚的人睡醒把老精神来相併按龍泉長嘆了兩三聲么浮生命運薄虚名身世䡖東綳西拽苦伶仃目乎四倒精細省慿何作證淡文章改做了受生經梧葉児一粒米似針穿着用半文錢似錐扎着疼但開口昧神靈飬児女啣􅅺燕愛錢財竸血蝇無明夜枉施呈都做了充飢画餅后庭花靈臺如鏡明神光似水清暗􅂻􅄸十兮㑹明中除無半星枉施逞翻回斗柄㧞山力􅀔已傾苦天才酔不醒金谷園草長青馬嵬坡血􅂔腥四般兒誰不曽柳葉児呀則我這忠言不聴利名似火上冬凌恰便似倒懸鍾配與無星秤知他是何日滿不知是㡬年平方信道無以難明余音何日休聴天命仰頭長歡兩三聲誰似俺功名不貪􅄐市井忘機遣興漫漫日月總無情集賢賔閨病􅀝幃屏数聲長嘆息思往事淚淋漓坐不穏神魂飄蕩睡不寍􅀑病禁持数㱕期曲損春纎盻回程皱定􅀟眉要相逢則除是枕席間魂梦􅂻㡬曾經這塲憔悴歌殘金􅈁詞酒斟鳯凰盃逍遥樂懸懸在意受了些萬苦千辛㡬曽歇一時半刻我這􅂻轉轉的疑惑越思量越越的難為這些時玉减香消添了些病疾冷清清獨自􅀌恓赤緊的關山路遠一去無音閤不住雙眸淚垂金菊香盻青鸞不至阻了佳期想黄犬無音失了配對望錦鱗落空絶了信息似酔如痴瘦肌膚寛褪了小腰圍梧葉児兩情似酥和􅁡一心如魚共水同衾枕效于飛早忘了山盟海誓更和那星前月底到如今怨他誰這煩惱則除是天知地知醋葫蘆這些時病懨懨骨似柴悶昏昏心似痴恰便似随凨栁絮不沾􅅺一㑹家魂靈在九霄雲外飛捱一日勝添一􅀊遅和疾早晚一身􅃜么想當日對神前碜磕磕言心事告蒼天一樁樁説就􅂻全不􅀅往日話兒依過三秋尚然猶未回你那􅂻偎紅􅀝翆想起他百般聦俊有誰及后庭芲空閑了翡翆幃蕭踈了鶯燕期折散了鴛鴦㑹硬兮開鸞鳯棲痛傷悲更闌之際明朗朗照閑堦月色輝昏慘慘伴􅄐人燈熖㣲麝蘭散淡了翆幃絳綃褪鬆了素軆揾鮫綃掩枕席紗囱外凨兒􅁸捱銅壷漏滳柳葉児呀我便是鉄石人鉄石人怎睡一思量一會傷悲恰便似刀剜九曲柔腸砕􅄐恨天人難覔相思病命􅀅危雖然你送了人呵􅄸甚麽便宜尾一柬書和淚封則􅀅這碧桃芲􅀣児来􅀝也是我前緣前世想人生自古七十稀集賢賔懸望恨青青画橋東畔桞曽發送少年逰散晴雪楊芲清􅀞又一塲心事攸攸翆􅁝長不繫雕鞍碧雲寒空掩朱楼揎羅䄂試􅀅纎玉手綰東凨按損䡖柔同心方勝結纓絡綉香毬逍遥樂結不成鴛鴦􅀟扣空驚散􅀣稍頭一􅀟錦鳩何䖏忘憂聴枝上杜宇聲幽你怕不調㺯春聲巧囀㗋驚回好梦題􅁸􅄐情喚醒閑愁醋葫蘆兩情珠淚垂􅃄顰翆黛收殢凨流還自怨凨流病多㸔来不耐秋因他消痩晚凨殘月上簾鈎浪􅂻来煞不要你護雕闌芲甍香䕃苔痕燦石幽則要盻情人終日我凝眸只要你重温覇陵別後酒如今時􅀱則要向緑楊深處棹㱕舟集賢賔嘆世嘆浮生有如一夢􅂻􅀅往事盡成非迅􅃌間紅輪西墜霎時間滄海塵飛正青春鬂髪斑皤恰朱顔皓首厖眉轉回頭北印山下􅀑逍遥樂題􅁸来総是傷悲都不如酒淹衫䄂濕芲壓帽簷低有何拘繫則不如一枕安然直睡到紅日三竿未􅁸梧葉児争甚麽名和利問甚麽我共你喒人可也轉眼故人稀漸漸的􅀅朱顔換㸔㸔的早白髪催題起来好傷悲赤緊的可便當不住白駒過􅂩后庭芲㸔光隂一夢􅂻翫韶華如逝水覷塵世無窮事盡今生有限盃莫疑惑急流中湧退磻溪岸魚更羙首陽山蕨正肥西華峰景物竒洞庭湖凨力㣲双鴈児不如聞早去来兮樂清閑究妙理無辱無榮不縈繫守清貧絶是非遠紅塵叅道徳醋葫蘆到春来聴黄鶯枝上鳴聞杜䳌芲下啼聲聲呌道不如㱕囊中錢勸君休愛惜􅂸了箇酔而醒醒而復酔席前芲影坐間移么到夏来㸔湖光㶑灔生香凨處處㣲披􅁭散髪緑楊堤得一日過一日無一日争何閑􅂔想人生自古七十稀么到秋来㸔東籬菊綻金翫長天月似水正江􅆂秋景鴈􅀄回樂吾心􅀏談飲数盃酒逢知契把黄芲亂挿滿頭㱕么到冬来落瓊花陣陣飄剪鵞毛片片飛横囱梅影映踈籬草堂中滿斟酒数杯酔時節盹睡一任教紅塵滚滚往来飛尾蝸角名休苦貪蠅頭利總休覔鶴長鳧短不􅀎齊到頭来不知誰是誰我則待混俗為最総不如葫蘆今後大家題集賢賔閨怨杜丹亭日長簾半捲推綉枕聴啼䳌夜雨過梨芲褪雪晚凨䡖桞絮飄綿憶多情萬水千山盻佳期甚日何年近香奩理粧貼翆鈿尚然有睡紅一線情濃眉黛􅂻愁入鬂雲􅁁逍遥樂嘴古都􅁫頭玉燕面磨羅鏡􅂻青鸞画不就青山宛轉恨惹情牽東凨桃李無縁章䑓路望来不甚逺張京兆那􅂻也不見香消寳􅂦燈盡銀缸爐吟沉烟梧葉児困臉輕蛾皱殘紅新月􅅯愁壓逺山偏火燎祅神廟芲飛金谷園春去武陵源直恁的縁薄分淺金菊香托香腮無語轉凄然淡注秋波軃翆蝉呆荅孩對人羞見面􅀑病􅆞綿㫁柔腸心事在誰􅁁醋葫蘆减酥臉褪蓮似楊妃病吐荔枝涎西子愁頻煩鹿苑頓不開連環金釧不由人終日恨綿綿浪来􅂻想當􅀄整玉容並粉肩晚粧楼上鏡䑓􅁁画出對􅀄生明月圓到如仐桃芲人面悶懨懨憔悴似去年前髙平煞那時節和凨麗日滿東園芲共桞紅嬌緑軟走斚飛觥品竹調絃暢道羙滿歡娱似比翼鳥于飛燕閑情侵翆靨春意近芲鈿今日箇寳􅁫頭擘􅀟鴛㸔何時鏡􅂻再團圓因此上兩道春山翆痕淺余音春殘連理枝香凨合歡扇好􅊚縁翻做了惡姻緣還不徹相思債呌不應􅄐恨吞知他是甚時相見兩眉峯重画翆婵姢集賢賔憶佳人客囱寒夜長更漏水聴何處起秋凨懸明鏡月華精彩撒殘棋星斗斜横緑堦前促織悲鳴雕簷外銕馬玎􅭉想情人滿眶情淚湧知他是何日相逢異香情耿耿􅀌舘恨匆匆逍遥樂自􅀙􅁫分金鳯止不過数日程途阻隔着雲山萬重走紅塵萍梗飄蓬嘆青春湖海西東㡬翻家惱人愁越重一聲聲凨送簾櫳猿啼峻嶺鴈過南楼鶴唳髙松金菊香別離了雲雨鄊生踈了風月功悶懨懨終日鬂鬅鬆往時節羙甘甘席上誇愛寵湘簾髙控閃的那半囱凉月困朦朧醋葫蘆瑶琴閑掛錦囊中寳劍慵弹錦袋中翆衾倦鋪錦帳空硯匣塵蒙都是一般瀟灑月明中梧葉児愁填滿東洋海悶弥髙太華峰愁和悶鎖眉叢這些時筆硯無心近經史不待攻我這􅂻怨天公㡬時得凄凉卷終后庭芲想則想蹴金蓮三寸弓啓櫻桃半􅀧紅想子想整酥軆一團玉露春纎十􅃌葱透酥胸麝蘭香送傍粧䑓整玉容列華筵捧玉鍾按紅牙思轉濃撥銀筝興不窮望瑶池雲亂封盻青鸞信不通栁葉児呀想着俺多嬌情重更那堪剔透玲瓏路迢迢霧鎖桃源洞團圓夢總成空楚陽䑓雲雨無踪尾越思量越慘悽轉傷悲轉疼痛㡬宵魂夢與伊同往常時酔㱕来画堂紅䄂擁到如今有誰人陪奉都做了斷腸詞權寫付雲鴻集賢賔對菱芲自傷憔悴損無語暗消魂鴈魚沉難傳音信鳯鸞􅀌誰傚殷勤大都来兩字相思怎當他一􅁭欝悶天生下凨流羙眷􅊚都做了打不􅄏愁陣因此上淹煎疾病减了精神逍遥樂想着他千般半韵萬種妖嬈金蓮歩穏欵蕩湘裙􅀃言談出衆超群懶去梳粧整鬂雲自評跋聡俊不弱西施勝似楊妃過如翆顰金菊香㫁腸人和淚怕黄昏枕剰衾寒獨自盹守􅀌燈㡬回心下忖暗暗傷神愁戚戚淚紛紛醋葫蘆想你羙甘甘枕上言甜膩膩心上人誰承望一時􅄐別在新春卜佳期知他是何日準怕的是桃溪難進那􅂻去覔漁父端的問通津梧葉兒瑶琴㫁寳鑑分陽臺散雨和雲何時㑹可意人好着我命難存莫不是相思病今畨折本后庭花莫不是武陵溪少主親閃的我出陽關别故人月下老無公論執柯的没斧斤自評論遭着這􅀌辰寡運􅀅鸞凰兩下分把鴛鴦折散群紅綾被懶去温白雪歌不待聞玉獅爐冷􅂐雲錦囊琹閑玉軫青哥兒呀㡬時得重諧重諧秦晋㡬時得再結再結朱陳綉帳春凨喜氣新錦被重温酒滿金樽恁時節夫婦團圓酔醺醺跳出凄凉運尾染霜毫越増恨拂芲箋悶無盡􅀅一箇漢相如終日思昏昏寫時節青衫䄂兒和淚揾將我這滿懷􅄐恨都做了一篇詞􅀉與卓文君集賢賔憶十羙二十年到今無信息直恁的乆別離又不敢明明作念你子索暗暗傷悲恰捱過賞燈時午夜元宵不覺的蹴鞦韆上巳寒食急回頭日長端午期沒揣的玉露凄凄光隂如過客寒暑急相催逍遥樂常想着別時容易到如今見後艱難只除是相逢在梦􅂻人􅀌另􅄫寞羅幃錦帳空閑淚暗垂数㱕鴻信逺音稀好教人煩煩惱惱哀哀怨怨慘慘悽悽金菊香珊瑚枕上梦􅀄回剛煖的鴛鴦􅀍半壁怎禁他月到紗囱凉露凄聴銅壷玉漏聲遅便是那鉄石人也感的蹙􅀟眉梧葉兒也曾􅀅香肩並玉手携實􅃌望效于飛間阻了鸞凰㑹分開了鶯燕期不似你忒着迷只為那十件兒凨流愛彼醋葫蘆眼呵轉双眸明似星溜秋波嬌欲滳怎當那送春情一􅀏萬金值若還是半醉朦朧􅀄睡起雨雲歡㑹放乜斜先把角兒垂么眉呵喜孜孜樽席前曲彎彎粧鏡􅂻把黛眉􅁿掃出香閨感春情若􅀅春事擬題起那別􅄐滋味鎻双蛾愁蹙的逺山低么髪呵木屏油攏掠的光薔薇露滋潤羙綰青􅁝半軃緑雲垂若是向玳瑁筵前穏坐地雲鬟髙髻􅀅一枝寳芲斜揷㝡相宜么口呵綻櫻桃紅半分吐幽蘭香暗􅊞咲談中出落着玉粳齊半啓朱唇􅀅甜吐唧央及一㑹唱一闋􅈁金歌聲遏的碧雲廻么臉呵憶香腮悲與歡想芳容嗔共喜他若是淡粧濃抺総相宜酒席上若還飲了数杯㸔他這俊厖兒標致恰便似暁霞烘透一枝梅么手呵数㱕期曲􅃌尖似柔荑偏細膩鳯仙花紅染玉纎齊若還是慢􅂻着氷絃在星月底把瑶琴相對見了些露春葱舒玉筍拂金徽么􅁕呵蕩湘裙半扎慳蹴金蓮双鳯嘴窄弓弓三寸兒步䡖移他便是蹅遍了香塵不見跡也子是天生的可喜􅀅他那綉鞋兒堪做煖金盃么腰呵逞凨流一捻兒顯妖嬈嬌媚軆恰便似擺春光弱桞任凨吹不似你愛他呵在人誇大嘴便有箇玉天仙出世㸔了他􅁿歌妙舞有誰及么乳呵紗厨中午睡醒晚凉天新浴起恰便似紫葡萄寒沁玉氷肌到晚来半露着酥胸在鴛帳􅂻略甞些滋味怎當那軟柔香馥馥好東西么寢呵赴陽䑓雲雨期殢芳情春意羙一㑹家乜斜着星眼皱双眉直等的粉臉上溶溶香汗濕嬌羞無力那温存那摑惜那着迷金菊香想􅀙前歡愛怎追随到如今阻隔的雲山千萬里但􅀅那十件兒在心上題便引的廢寢忘食不覺的沈腰寛褪了舊羅衣浪􅂻煞你這􅂻把花箋親自寫他那􅂻􅀅鴈帖逺来􅀉你這􅂻折開封孜孜的㸔了笑㣲㣲若還他海枯石爛心不移不忘了説来的盟誓少不的碧桃花春暖鳯鸞棲集賢賔追悔想着那二十年錦營芲陣􅂻經了些幾聚散㡬別􅄐往常時得之何喜今日箇捨之何悲他贏了時咱敗咱輸􅀎使他強他㑹更有那老䖍㜑慣使乖更有那小弟子他可也㑹求食逍遥樂好教我難容他情理今日箇財散人􅄐好也羅好也羅剗的来你東我西梧葉兒普天下男兒漢不似我受􅀌恓止望和你做夫妻有心和你鴛鴦㑹有心和你鸞鳯棲有心和你燕鶯期臘梅嗏誰承望半路􅂻拋閃的我眉南面北醋葫蘆我若是再和王臘梅說話呵則除是死了我身軀我若還再踏着王臘梅門呵掂折了我大腿則不是你歹哥哥誇強嘴則想你嫂嫂勸着呵打􅂻罵􅂻禁持誰想道肯依随么上寫着情人李孔目心事人王臘梅我的這帶刀兒順手實呸呸迷了我眼我與竹刮了􅅺坯有那等舊相識見呵寫下的至少呵有一千聲牙戯李孔目由自說兵機么兄弟呵有錢時買下柴糴下米常言道髙楼一酔到與我窮漢每半年食那潑烟芲閃的我三不㱕他如今偎紅􅀝翆我當􅀄討便冝翻做了落便冝么你若是有錢呵和你一様親無錢呵冷似水假若你吐出鮮血来只當蘇木汁休想我和你一家一計你㸔他喬即世賣柦梨么那䖍婆漸漸的觔力乏㸔㸔的􅀑病催那䖍婆少不的遭丧失火遇着強賊那䖍婆假若還不恁的那業錢兒㡬時能勾出世只争箇来早共来遅么那一箇􅀅郎君厮可憐把子弟生愛惜他一箇箇只待要挑人觔吸人髄更待要剥人皮􅀅你那普天下䖍婆妮子每刷􅀅来大鍋􅂻骨突突􅆈成肉汁你不信甞来呵都一般滋味那䖍婆妮子那一箇是人的么你㸔我病懨懨减了飲食眼巴巴盻箇信息則你那麗春園那一塊兒是望夫石則你那瞞神諕􅀑呵我今日都省的更有那虚心冷􅂔那傳書那􅀉柬那虚脾尾声落花怎上枝醃韮不入畦他和那敲囱楞那鳥他兩箇做夫妻我則道塩車兒怎生般穏坐的他道是上聴行妓天生本性怎生移集賢賔退隠撚蒼髯咲擎冬夜酒人事逺老懷幽志難酬知機的王燦梦無慿見景的荘周抱孫孫兒成願足引甥甥女嫁心休百年期六分甘到手数支干週遍又􅀙頭咲頻因酒酔燭換為詩留逍遥樂江梅並瘦檻竹同清岩松共乆無願何求􅀏時人鶴背揚州明月清凨老致優對緑水青山依舊曲肱北牖舒咲東臯放眼西楼金菊香想着那紅塵黄閤昔年羞到如今白髪青衫此地逰樂桑榆酧詩共酒酒侣詩儔詩潦倒酒凨流醋葫蘆到春来日遅遅庭舘春暖溶溶紅緑稠閙春光鶯燕語啾啾自焚香下簾清坐乆閑把那􅁝桐一奏滌塵􅁭消盡了古今愁么到夏来􅃈松隂竹塢亭載荷香栁岸舟有鮮魚鮮藕客堪留放白鶴逺􅌽雲外􅅱展楸枰消磨長晝較􅃜成一咲兩奩収么到秋来酔丹霞􅀣飽霜綻金錢籬菊秋半山殘照掛城頭老菱香􅈉肥堪佐酒正值着登髙時􅀱染霜毫乗酔賦㱕休么到冬来攪清酣雞語繁􅃞茅簷日影稠壓梅梢晴雪帶花留􅀝蒲團喚童重盪酒㸔萬里氷綃染就有王維妙手總難酬梧葉兒退一步乾坤大饒一着萬慮休怕狼虎惡圗謀遇事休開口逢人只􅀧頭見香餌莫吞鈎髙抄起經綸大手后庭芲住一間蔽凨霜茅草丘穿一領臥苔莎粗布裘揑㡬首寫懷抱歪詩句喫㡬杯放心􅇩村醪酒這瀟灑傲王侯且喜的身登身登中夀有㣲資堪贍賙有亭園堪縦逰保天和自養修放􅄱骸任自由把塵縁一筆勾再休題名利友青哥児呀閑處嘆蜂喧蜂喧蟻閗静中咲蝶訕蝶訕鶯羞你便有快馬難熬我這鈍炕頭見如今蔬果􅀄熟濁酒新蒭豆粥香浮大呌髙謳睁着眼張着口儘胡謅這快活誰􅀎勾尾聲酔時節盤陀石上眠飽時節婆娑松下走困時節布衲􅂻睡􅋜􅋜偶乗閑細􅀅玄奥剖把至理一星星叅透却原来括乾坤物我總浮漚集賢賔歡偶則為那凨流俊厖兒心上想交歡處忒顛狂我愛他心腸兒聡俊更那堪􅀁事安詳這些時悶懨懨蹙損蛾眉往常時喜孜孜淡抹濃粧到如今骨捱捱怎心痒空教人暁夜思量則我這雲鬟無意整茶飯不曽湯逍遥樂想着他惜芲模様􅀁事聡明諸般穩當想着他憐愛我的心腸到如今話短情長空教我暁夜思量空念想題着呵雨淚汪則為􅀙前的意羙温存不由我心勞意攘金菊香則為他平生貪愛女紅粧我可也意惹情牽􅀎對當則為我愛春情遇着好色郎恰便似戯水鴛鴦天生下一對兒俏􅀟雙梧葉兒則為他心腸兒俏端的是情意兒廣更那堪交會不㝷常羙甘甘香腮揾軟濃濃乳味香我和他效鸞凰不由人雨雲罷昏迷了半晌醋葫蘆􅂊歇了無半霎又思量第二塲把一塊絹帛兒展汚的水郎當等的我浴盆洗了揩抹的光我和你􅂯同鴛帳則􅀍你傒落的我忒着􅋉后庭花趂着這翆幃屏錦綉粧簇珠簾􅀅門閉上准備着珊枕腰間用香羅手内􅀅摘缷了鳯頭黄我􅀅這烏雲来盤上􅀅衣服脫在傍鳯頭鞋無意謊則􅀍他禁害的荒青哥兒你這般千般千般別様我則索百事百事斟量則管􅂻倒鳯顛鸞無事當則為這一􅀧紅粧嫰蕋芬芳軟玉嬌香引逗的俊秀才郎心不荒張再要成􅀟只等的燕懶鶯慵桞困花眠待何妨敢恁時節􅀅嬌雛放尾聲􅂅生成配偶趂良宵共鴛帳則他那團香㺯玉勝㐮王恰便似桃源洞玉仙配阮郎常想着凨流情况我和你宴髙楼重㑹錦雲鄊集賢賔春思猛聴的透簾櫳賣花聲喚起􅀅我這好梦却驚囬更和那喬木鶯聲偏砕上紗囱月影重移暗沉吟失䰟忘􅅎悶懨懨似酔如痴把重門緊緊深閉的怕鶯苍咲人憔悴􅄐愁何日滿更和這別恨有誰知逍遥樂則為這無媒匹配引起無倒㫁相思染下這塲不明白病疾眼睜睜􅀅我来抛􅄐潑敲才更狠似王魁我這􅂻罵他一聲却又悔空沒亂怎的支持則落得長吁短嘆倒枕垂床􅆸寢忘食金菊香這些時龍涎