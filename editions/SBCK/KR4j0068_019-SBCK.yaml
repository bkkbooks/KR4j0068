休競螟蛉蜾蠃蜾蠃螟蛉酒盃濃一葫蘆春色酔山翁一葫蘆酒壓芲梢重随我奚童葫蘆乾興不窮誰人共一帶青山送乗凨列子列子乗凨酒頻沽一葫蘆山鳥喚醍醐一葫蘆醒也問有無擎樽凝覷道飲徹還沽去踈狂趣枕琴臥在芲深處三閭咲我我咲三閭殿前歡相思晚􅀄晴半痕秋月照囪櫺梧桐敗葉凋金井淅淅凨清促織鳴愁難􅃪鈇石般心腸硬怎合得這啼睛􅁖病湏易害好梦㝎難成想他時懨懨常是害相思心中多少傷懐事感嘆嗟咨􅀉凄凉四句詩托知己暗傳示囬一箇鴛鴦字若来時便可勝海上方兒俏冤家平白和我意兒差當􅀄曽説知心話陡恁情雜非干是我負他他到説和咱罷罷了也猶牽掛相識每見他因話兒題咱説山盟兩情稠宻海来深只想你貴􅀅咱聘廢了恩情咱寍耐守婦名越思量越動情情沒亂何曽㝎今生非分淺分淺是前生殿前歡幽情􅃄波萬頃洞庭秋紅姜細切白蓮藕橙泛金甌潑䤃新斑竹篘買窮究不如酔而醒醒而又有青山緑水不羡你肥馬䡖裘水村山舘草莱廬生平不識青雲路新酒活魚吟㑹詩㸔㑹書人問我家何處在鸚鵡洲邉住有黄橙紫蟹不羡你玉帶金魚舍之則蔵用之行㱕来愛煞彭澤令家住蓬瀛望白雲憶酒樽近東籬露頂吟楊震節淵明興有猿鶴相伴不羡你画閤圗形人咲螳螂捕噪蝉螳螂又􅀍雀来飡腦後難防挾弹客無虛放螳螂夭雀随亡吾叅破潜江上有泉聲韵巧不羡你玉珮玎璫殿前歡村居㑹㝷思過中年便賦去来詞為甚等閑間不肯来城市只怕俗郤新詩對着這落芲村流水堤柴門閉栁外山横翠任斜凨細雨也近不得這蒲笠蓑衣二登㑹波楼四圍山㑹波楼上􅀝䦨干大明湖鋪翆描金間華島中間愛江心六月寒荷芲綻十里香凨散􅀍沙頭啼鳥喚醒這梦􅂻微官三玉香毬芲玉香毬芲中無物比凨流芳姿奪盡人間秀氷雪堪羞翆幃中分外幽開時􅀱把凨月都熏透神仙在此何覔􅀭州四對菊自嘆可憐秋一簾踈雨暗西楼黄芲零落重陽後减盡凨流對黄芲人自羞芲開卸還依舊人比這黄芲痩問芲不語芲替人愁五獨舘思㱕杜䳌啼一聲聲呌道不如㱕緑囪深鎻重門閑獨自􅀌恓不㱕呵有何益名位險禄縁細上東封書策懇索箇㱕期六觀螂雀圗咲螳螂撲蝉終日受飢荒芲間黄雀偷睛望災害難當螳螂􅀍鳥啄傷捕禽子弓玲便雀中弹魂飄蕩螳螂方命夭黄雀早身亡清江引酸齋舞香塵小園凨亂飄滿地胭脂落金踈楊栁枝玉减梨芲蕚把春光等閑辜􅀒了宿雕梁一双巢燕慵翆栁鶯眠重蜂閑報曉衙蝶倦逰春梦小園中㡬般都恨凨狂凨一春十占九揺撼芲枝瘦沙摧杏臉愁土蝕􅊝腮皺瓓珊了一株金線栁薄情的封家十八姨大逞狂心力楸撏萬片紅摔砕千條翆㫁送了好光隂都是你軟兀刺窄藤床甘菊枕桃竹簟清凉甚白石榴芲朶新紅海納枝柯䕃小書囪晚来獨自寢些兒名利争甚的枉了着筋力清凨荷葉盃明月蘆芲􅀍乾坤静中心似水靠蒲團坐觀今古書賡和新詩句濃煎鳯髄茶細割羊頭􅁏與江湖做些凨月主閑来唱會清江引觧放愁和悶富貴在扵天生死由乎命且開懷與知音談咲飲且開懷與知音談咲飲一曲瑶琴㺯弹出許多聲不與時人共􅀝幃屏静中心自省􅀝幃屏静中心自省萬事皆前㝎窮通各有時聚散非驕吝立忠誠步步前程穏立忠誠步步前程穏勉勵勤和慎勸君且耐心緩緩相随順好消息到頭端的凖昭君路迷關塞雪蔡琰明笳月往事惟心知新恨慿誰說只恐帕梦囬春去也清江引秋意十闋一􅀊兩回春到来芲也多成敗只為雲庄秋不避東君恠因此上向西凨特地開前日彩雲飛上天又向深秋見翆淡遥山眉紅慘春凨面恨燕鶯㱕期天様逺霜重物華揺落秋驚見春如舊一咲踈籬􅁁更比黄芲瘦剗地殢西凨猶帶酒宋玉每逢秋嘆嗟見比應懽悅恰􅀍凨吹開莫遣霜摧謝恐他惜芲人来到也亭下拒霜芲数叢不與渠同梦嬌􅀝秋雲薄瘦怯霜華重㡬時盻得箇日遅遅春晝永一日繞觀十数囬只恐芲憔忰錦帳􅃒寒威銀燭添春意端的太真妃初睡起􅄫寞一枝三四芲㺯色書囪下為着沉香迷梦見嵬坡怕且潜身住在居士家芲竹滿亭髙士居常把春留住賞罷芙蓉秋又見胭􅃌露筮的是綽然亭世間絶妙處睡起不禁霜月苦籬菊休相妬恰與東君別又􅀍西凨悞交他這粉蝶兒無是處香滿竹籬芲正嬌開徹胭脂蕚不幸遭凨霜葉兒都零落果然有上梢無下梢清江引相思愁􅃪画楼簷外鉄又值蛩吟夜心中無限思最怕窓間月這其間多情何處也梦囬枕􅁁人去也簾外無情月如何你獨圎照得人来缺􅁖相思挽霜毫不次寫怕􅃪秋来促織吟鎮日情難禁病兒疾漸沉書兒全無信但合眼巫山有梦尋魚沉雁杳絶信音淚􅀧香羅印一别更数春想念時時恁怎忘的那宵一片心清江引楊妃三郎悮聴枕畔啜縦得厖兒劣刮動海棠凨敲砕梧桐月嬌滴滴玉人何處也二王嫱貂裘變粧辭漢􅊴愽得凨塵㓕黄雲青塚秋白月黒河夜嬌滴滴玉人何處也三贈鶯兒妓名遷喬便㝷同志友處處啼春晝攛芲錦杼鳴擲栁金梭閗弹丸兒那一箇先下手四劉春景妓名落紅滿地誰是主送得春㱕去有意惜芲殘無計留春住楚陽䑓梦兒中雲共雨五張斗兒妓名四四方方輕又輕毎日斟量㝎就裏㡳兒平外面幇兒正小東西㸔来無十升六張五兒妓名細膩膩外様兒雖是好就裏粗生料一生有人欽五世家傳樂但拈着􅃌頭兒都軟了七劉麻兒妓名凹凹凸凸嬌又巧􅀁事心偏好一歌金􅈁詞十錠鴉青鈔鉄石人傍着他麻木了八王嬷兒夜来閑步囪外影側耳潜厮􅃪恐客枕􅁁唆孩兒心間應老殘生那荅兒是塟身后庭花酒興一聲金􅈁詞十分金菊巵金刅分甘蔗金盤薦荔枝不湏辭太平無事正宜沉酔時相逢飲興狂霜螯凨味長鮮鯉銀􅁝膾金蚕折蠣房透瓶香經年佳醸陶陶入酔鄊凨暖紫貂裘霜合白玉楼錦帳羊羔酒山隂雪夜舟党家侯興来時􅀱汚他王子猷溪山好處逰仙家酒旋篘三島十洲客六卿萬户侯不詢由玄關叅透世無天上有后庭花冷泉亭四時景六橋烟栁顰兩峰雲􅀣分羅襪移芳徑華裙生暗塵冷泉春賞心樂興水􅁁多麗人碧湖環武林仙舟出湧金南􅀦山河在東凨􅋄木新冷泉隂興亡如梦傷時折寸心香飄桂子楼凉生蓮葉舟落日鴛鴦浦西凨鸚鵡洲冷泉秋禅林新構題詩憶舊逰江南春巳通隴頭人未逢水淺梅横月山明雪映松冷泉冬烹茶無用人在錦帳中后庭花秋思西凨黄葉䦨子規啼􅂾畨日近長安逺見郎難上難盻㱕鄊清明去也白露人朱還西凨黄葉踈一年音信無除非来梦􅂻梦囬総成虚梦成虛一時相聚新来梦也無西凨黄葉稀南楼北雁飛揾妾燈前淚縫君身上衣約㱕期清明相㑹雁過人未㱕西凨黄葉飛染毫寫恨詞縫在衣領􅂻祝郎早早囬見詞時知咱躭疾連他也染疾十九卷終
