front:
  text: 雍熈樂府卷之十二
  hash: sha256:4f15c6fcdf1a7bc3e0dd8098c011b9048073bb20c9e7799c648f99ca7072b595
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_012-1a}
body:
  text: 􅀟調新水令享賀太平萬方齊賀大明朝樂雍熈披陳禮樂文宰清武臣豪㢘幹勤勞無奸佞有忠孝喬牌児四時節序調普天下盡歡樂聖明君毎放徴賢詔􅀅山林隠士招鴈児落托頼着明君同禹堯聖夀過嵩岳忠臣通六韜武􅀅知三畧掛玉鈎一箇箇義膽忠肝輔聖朝百姓毎都安樂訟簡官清减税徭那明聖帝興王道玉葉榮金枝茂􅀊應的出現禎祥端的是雨順風調亂栁葉賀㫒平萬國萬國来朝聖明君四方四方臨兆普天下􅀺庶􅀅皇恩報幸喜得崇儒崇儒道攝伏的􅁁疆􅁁疆到聖朝壽髙端的是文風廣武倣效太平令群臣每股肱賢良忠孝賀㫒平道泰歌謡依節序家家歡樂萬姓每足衣食人忻咲一壁廂舞着唱着賀着賀的是􅀊稔年豐吉兆豆葉黄攝伏的東虜西戎他每都拱手来朝見如今北狄南蠻歸伏盡􅁹宫殿風微燕雀髙玉碾金粧光燦瑶堦錦重重龍樓鳳閣七弟兄丹墀内擺着衆臣僚見瓊樓玉宇金光􅇁靜鞭鳴􅏛舉奏簫韶百司官讃祝髙呼噪梅花酒日光出暎赭􅂁寳䁀内香燒懸綉幕珠箔列劒㦸鎗刀賀吾皇聖夀髙呀敢風雨順四時調百官每受品爵刑税减少差徭甘露降産嘉苗景星明慶雲飄喜江南呀因此上九重春色酔仙桃詩成珠玉在揮毫征旗不動酒旗揺罷干戈􅀾討謳歌鼓腹樂陶陶新水令􅆊王宫殿月輪髙碧琉璃瑞烟籠􅇁香烟雲盖結諷呪海波潮幡影飄揺諸檀越盡來到駐馬聴法鼓金鐸二月春雷嚮殿角鍾聲佛號半天凨雨洒松稍侯門不許老僧敲紗囱外定有紅娘到害相思饞眼腦見他時湏㸔十分飽沉酔東風惟願存在的人間壽髙亡化的天上逍遥為曽祖父先靈禮佛法僧三寳焚名香暗中禱告則願的梅香休劣夫人休焦犬兒休惡早成就了幽期宻約鴈兒落我則道玉天仙離碧霄元来是可意種来清醮小生是多愁多病身怎當他傾􅀦傾城貌得勝令恰便似檀口􅀧櫻桃粉鼻兒􅀝瓊瑶淡白梨芲面輕盈楊栁腰妖嬈滿面兒鋪堆着俏苗條一􅇛児衠是嬌喬牌兒大師年紀老法座上也凝眺舉名的班首痴呆落覷着法聰頭做磬敲甜水令老的小的村的俏的没顛沒倒勝似閙元宵稔色人兒他怕人知道㸔時節泪眼偷瞧拆桂令着小生迷留没亂心痒難撓哭聲兒似鶯囀喬林淚珠兒似露滴芲稍大師也難學把一箇發慈悲臉兒来朦著繫磬的頭陀懊惱添香的行者心焦燭影凨揺香靄雲飄貪㸔鶯鶯燭㓕香消錦上花外像兒凨流青春年少内性兒聡明貫世才學扭揑着身子兒百般做作来往向人前賣㺯他俊俏么篇黄昏這一回白日那一覺囱兒外那㑹鑊鐸到晚来向書幃裏比及睡着千萬聲長吁怎生捱到曉碧玉簫情引眉稍心緒恁知道愁種心苗情思我猜着暢懊惱響璫璫雲板敲行者又嚎沙弥又哨你湏不奪人之好鴛鴦煞有心争奈無心好多情却􅀍無情惱閙攘了一宵月兒沉鍾兒響雞兒呌唱道是玉人兒㱕去的疾好事兒収拾的早道塲畢諸僧散了酩子􅂻各㱕家葫蘆提閙到曉五供飬若不是張解元識人多别一箇怎退得干戈排着酒果列着笙􅁔篆烟㣲芲香細散滿東凨簾幙救丫喒全家禍殷勤呵正禮欽敬呵當合新水令恰􅂊向碧紗囱下画了􅀟蛾拂拭了羅衫上粉香浮汚我則􅀅指尖呵輕輕的貼了鈿窩若不是驚覺人呵這其間猶壓綉衾臥么沒查沒利謊偻儸你道我宜梳粧的臉兒吹弹破你那裏休聒不當一箇信口開合知他命福是如何我做一箇夫人也做得過喬木查我相思為他他相思為我􅀙今後兩下相思都較可酬賀間理當酬賀俺母親也好心多攪箏琶他怕我是陪錢貨兩當一便成合據着他舉􅀅除賊也消得家緣過活費了甚一股那便結絲羅休波省人情的妳妳忒慮過恐怕張羅慶宣和門兒外簾兒前􅀅小脚兒那我則見目轉秋波誰想他識空便的靈心兒早瞧破諕的我倒躱鴈兒落荆棘窩怎動那死沒騰無囬豁措支刺不對荅軟兀刺難存坐得勝令誰承望即即世世老婆婆着鶯鶯做妹妹拜哥哥白􅃼􅃼溢起藍橋水不登登􅀧着祅廟火碧澄澄清波撲刺刺􅀅比目魚分破急攘攘因何扢搭的把􅀟眉鎻納合甜水令我這􅂻粉頸低垂蛾眉頻蹙芳心無那俺可甚相見話偏多星眼朦朧檀口嗟咨攧窨不過這席面児暢好是鳴合折桂令他其實的嚥不下玉液金波誰承望月底西廂變做了夢􅂻南柯淚眼偷淹酩子裏揾濕香羅他那􅂻眼倦開軟癱做一垜我這裏手難􅎑􅁛不起肩窩病染沉痾㫁然難活則􅀍你送了人呵當甚麽偻儸月上棠海而今煩惱由閑可乆後思量怎奈何有意訴衷腸争奈母親側坐成抛躱咫又間如間闊么一盃悶酒尊前過低首無言自推挫不堪酔顔酡可早嫌玻瓈盞大􅀙因我酒上心来覺可喬牌皃老夫人轉關児沒定奪啞謎児怎猜破黒閤落甜話児􅀅人和請􅀅来着人不快活江兒水佳人自来多命薄秀才每􅀙来懦悶殺沒頭鵞撇下陪錢貨下場頭那荅児發付我殿前懽恰􅂊箇􅀏呵呵都做了江州司馬淚痕多若不是一封書􅀅半萬賊兵破俺一家兒怎得存活他不想結婚姻想甚麽到如今難着莫老夫人慌到有天来大當日箇成也是母親今日箇敗也是恁箇蕭何􅄐亭宴帶歇拍煞􅀙今後玉容􅄫寞梨芲朶胭脂淺淡櫻桃顆這相思何時是可昏登登黒海深白茫茫陸地厚碧悠悠青天闊太行山般髙仰望東洋海般深思渇毒害的恁麽俺娘呵􅀅顫巍巍􅀟頭芲蕋搓香馥馥􅈁帶同心割長捖捖連理瓊枝挫白頭娘不􅀒荷青春女成躭閤􅀅俺那錦片也似前程蹬脱俺娘把甜話児落空了他虚名児誤賺了我新水令晚凨寒峭透囱紗控金鈎繡簾不掛門闌凝暮靄楼角歛殘霞恰對菱芲楼上晚粧罷駐馬聴不近諠譁嫰綠池塘蔵睡鴨自然幽雅淡黄楊栁帶棲雅金蓮蹴損牡丹芽玉簮􅎲住荼䕷架夜凉苔徑滑露珠兒濕透綾波襪喬牌兒自従那日􅀄時想月華捱一刻似一夏栁稍斜日遅遅下好教賢聖打攪箏琶打扮的身子乍准􅍯着雲雨㑹巫峽只為這燕侣鶯儔鎻不住心猿意馬因姐姐閉月羞芲真假這其間性児難按納一地裏胡孥沉酔東凨我則道槐影凨揺暮雅元来是玉人児帽側烏紗一箇潜身在曲檻􅁁一箇背立在湖山下那裏叙寒温並不曽荅話便做道搂得慌呵也索覷咱多管是餓的你箇窮酸眼芲喬牌兒你㸔那淡雲籠月華似絳􅁓護銀蠟栁絲芲朶垂簾下綠莎茵鋪綉榻甜水令良夜迢迢閑庭􅄫静芲枝低亞他是箇女孩児家你湏索性児温存話児摩㺯意児謙洽休猜做敗栁殘芲拆桂令他是箇嬌滴滴羙玉無瑕粉臉生春雲鬂堆雅似這般受怕擔驚又不圗甚浪酒閑茶則你那裌􅀍児時當奮發􅃌頭児告了銷乏打疊起嗟呀畢罷了牽掛収拾了憂愁准備着撐撻錦上花為甚媒人心無驚怕赤緊夫妻每意不争差我這􅂻躡􅁕潜踪悄地聴咱一箇羞慚一箇怒發張生無一言呀鶯鶯變了卦一箇悄悄㝠㝠一箇絮絮荅荅却早禁住隋何迸住陸賈义手躬身粧䏊做啞清江引沒人䖏則㑹閑磕牙就裏多奸詐怎想湖山􅁁不記西廂下香羙娘䖏分破芲木􅀲鴈兒落不是俺一家児喬作衙説㡬句衷腸話我則道你文學海様深誰知你色膽天来大得勝令誰着你夤夜入人家非奸做賊拏你是箇折桂客倒做了偷芲漢不想你跳龍門學騙馬謝姐姐賢逹㸔我面逐情罷若官司詳察張生呵准􅍯着精皮膚喫􅉐児打􅄐亭宴帶歇拍煞再休題春宵一刻千金價准僃着寒囱更守十年寡猜詩謎的社家􆁚拍了迎凨户半開山障了隔墙芲影動緑慘了待月西廂下你􅀅何郎傅粉搽他自把張敞眉児画強凨情惜大晴乾了􅀹雲殢雨心悔過了􅀼玉偷香膽刪抺了􅀝翠偎紅話􅁋詞児早則休簡帖児􅀙今罷尚兀自叅不透凨流調法從今後悔罪也卓文君你與我㳺學波漢司馬新水令望蒲東蕭寺暮雲􅃒􅃤􅄐情半林黄葉馬遅人意懶凨急鴈行斜􅄐恨重疊破題児第一夜步步嬌昨夜箇翠􅀍香濃薫蘭麝欹􅃢枕把身軀兒趄臉兒厮揾者仔細端詳可憎的別鋪雲鬂玉梳斜恰便似半吐􅀄生月落梅花旅舘欹单枕蛩吟鳴四野助人愁的􅁓囱児凨劣乍􅀌眠􅀍児薄又怯冷清清㡬時温􅀬喬木查走荒郊曠野把不住心嬌怯喘吁吁難􅀅兩氣接疾忙趕上者打草驚蛇攪箏琶他把我心腸児撦因此上不避路途賖瞞過這􅀎拘管的夫人穏住俺厮攅的侍妾想着他臨上馬痛傷嗟哭的我一似痴呆不是我心邪自別􅄐已後到日􅀄斜愁的来􅈝峻瘦的来唓嗻剛􅄐得半箇日頭可又早寛掩過翠裙三四褶誰曽經恁般磨㓕錦上花有限姻緣方􅂊寍貼無奈功名使人􅄐缺害不了的愁懐恰􅂊較些撇不下的相思如今又也清霜浸碧波白露下黄葉下下髙髙道路曲折四野凨来左右亂踅我這裏奔馳他何䖏困歇清江引呆荅孩店房児没話説悶對如年夜暮雨催寒蛩曉凨吹殘月今宵酒醒何䖏也慶宣和是人呵疾􅋉快分説是􅀑呵合􅄩㓕聴説罷􅀅香羅䄂児拽却元来是姐姐喬牌兒你為人湏為徹􅀅衣􅃑不顧藉繡鞋児露水􅅺沾惹脚心児管踏破也甜水令想着你廢寢􅁯飡香消玉减芲開芲謝猶自較爭些枕冷衾寒鳳隻鸞􅀌月圎雲􅃒尋思来有甚傷嗟折桂令想人生最苦􅄐別可憐見千里關山獨自䟦涉似這般割肚牽腸到不如義㫁恩絶雖然是一時間花殘月缺休猜做瓶墜簮折不戀豪傑不羡驕奢自願的生則同衾死則同穴水仙子硬圍着普救寺下鍬钁強當住咽㗋仗劍􅃏賊心腸饞眼腦天生的劣休言語靠後些杜􅀅軍他是英傑覷一覷為了醢醤􅃌一􅃌化做醟血􅀐着疋白馬来也鴈兒落綠依依墙髙栁半􅃒静悄悄門掩清秋夜踈刺刺林梢落葉凨昏􅃤􅃤雲際穿囱月得勝令驚覺我的是顫巍巍竹影走龍蛇虚飄飄荘周夢蝴蝶絮叨叨促織無休歇韻攸攸砧聲兒不㫁絶痛煞煞傷別急煎煎好夢兒應難捨冷清清咨嗟嬌滴滴玉人兒何處也鴛鴦煞栁􅁝長咫尺情牽惹水聲幽彷彿人嗚咽斜月殘燈半明不㓕暢道是舊恨連綿新愁欝結恨塞􅄐愁滿肺腑難淘瀉除􅁓筆代㗋舌千種相思對誰説絡􅁝娘都自為一官半職阻隔的千山萬水新水令玉鞭驕馬出皇都暢凨流玉堂人物今朝三品職昨夜一寒儒御筆親除􅀅名姓翰林注駐馬聴張珙如愚酬志了三尺龍泉萬卷書鶯鶯有福穏情了五芲官誥七香車身榮難􅁯借僧居愁来由記題詩䖏􅀙應舉梦魂兒不􅄐了蒲東路喬牌兒我這􅂻謹躬身問起居老夫人慈色為誰怒我則見􆁞鬟使數的厮行覷莫不是我身􅁁有些事故鴈兒落若説着􅁝鞭仕女圖端的是塞滿了章䑓路小生向此間懐舊恩我怎肯別處尋親去得勝令豈不聞君子㫁其􅀄我難􅁯有恩處那一箇賊畜生行嫉妬走􅀅来夫人行厮間阻不􅀎得嬌姝早共晚使心術説来的忒無徒遅和疾上木馿喬木查妾前来拜覆省可裏心頭怒間別来安樂否你那新夫人在何處居比俺姐姐何如慶東園糞堆上長出連枝􅀣淤􅅺􅂻生出比目魚不明白展汚了姻緣簿鶯鶯呵你嫁了箇油煠的猢猻丈夫紅娘呵你扶侍着箇烟薫的猫兒姐夫張生呵我撞着箇水浸的老鼠姨夫他這厮壊了凨俗傷了時務攪箏琶小生若求了新婦目下便身殂怎􅁯了待月廻廊難撇下吹簫伴侣受了些活地獄下了些死工夫不甫􅀎得做妻夫我􅀅那夫人的官誥縣君的名目怎生待歡天喜地兩隻手分付與剗地到把人粧誣沉酔東凨不見時准僃着千言萬語得相逢都變做短嘆長吁他急攘攘恰到来我羞荅荅如何覷􅀅腹中愁恰伸訴及至相逢一句無剛道箇先生萬福落梅凨􅀙􅄐了蒲東路来到這京兆府見他影兒的教他㓕門絶户甜水令君瑞先生不索躊躇何湏憂慮那厮本意忒糊突俺家世清白祖宗賢良相􅀦名譽我怎肯在他根前􅀉簡傳書折桂令那喫喬才怕不口裏嚼蛆那厮可便数黒