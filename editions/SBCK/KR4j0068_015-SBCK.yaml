front:
  text: 雍熈樂府卷之十五前集
  hash: sha256:55ecacd68d54bafa507512ec786475e80647ebe41d124357f6bdb488e3da97d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_015-1a}
body:
  text: 大石調摧拍子楊妃明皇且休催芲栁束舞衣特差時候艶陽晴晝出世間未夏至春㱕宫内巳綠肥紅痩錦圍依舊施逞盡窈窕馳騁妖嬈醖釀凨流倘遅他後若存謹意降人貽福厚但舉別心折人陽夀若思胡種向蒙寵愛始信私情不論妍醜夜連明枕鴛衾綉么雲雨懶收歡娛未休當日把玳筵排就按梁州羯鼔髙明習水調玉􅅇齊奏酒擎纎手絳唇頻吸粉面双熏酔目暈重榴軟紅心耨杏芲包暖小桃春重楊栁情嬌荔枝香透翆鬟偏軃玉肩斜􅀝星眼微朦黛眉䡖皱忍教奉世人箕箒尾年小三郎雖䏻勾休􅀝着帝王福厚這種恩情要人消受玉翼蝉煞逰月宫似仙闕若帝居截㫁青宵路至近也重規見龍楼共雉宇上瑶堦欲侵朱户猛驚御聴一人大呌呼清似雷霆怒壮貌魁梧有一千般歹閗處􅂔昻昻九尺来彪􅥟么總威嚴結束覷絶時教人怕怖披副黄金凱甲穿領蜀錦征服龍皮干跨鳯翅金盔纓亂拂么緊控着弓鏃順掛着昆吾帶束着素玉靴穿着抹緑走向前来覷着君主搠㝎那柄短頭䡖的金月斧尾這許来大蟾宫是神仙府湏不同恁那塵世皇都惹早晚行沙待那􅂻去好觀音怨恨先自相逢同歡偶天妨礙燕侣鶯儔並同肩共携手恩情厚夫婦般相㸔的好么打聴的新来迷歌酒凨聞的別染着箇嬌羞棄舊憐新自来有鉄心腸金不想些児舊尾薄倖􅃜人難禁受想着那樽前席上捻色凨流不良殺教人下不得呪念奴嬌大江逝水攸攸萬頃茫茫東去不息浪激汀沙淘盡千古凨流人物聞説道西邉嵬嵬赤壁故城石壘舊三􅀦人何在山髙月小水落石出燈月交輝昨宵梦覺聴門外珍珠洒漸覺無聲墜萬家對良辰争似我曉来時推起囪紗歡咲處説些情話休㱕去那雪児􅀭揚的正下喜梧桐冬景佳堪圗􅀞我則見遍滿長空瑞雪紛紛下好向暖閤紅爐泛流霞一色瓊瑶萬樹林梢掛踏雪沽酒添髙價尾楼䑓粉砌迷鴛瓦聴撒撒更敲囪打羙酒羊羔勝飲茶念奴嬌謅梅香翰林凨月驚飛幽鳥蕩殘紅撲簌簌胭脂零落門掩蒼苔書院悄潤破􅁓囪瞧則為一操瑶琴一畨相見又不曽道閑期約多情多緒等閑肌骨如削六囯朝這生不思獻賦不想題橋那卓氏女本無情把漢相如乾病倒教先生善服湯藥把貴軆和調教觧元苦志攻經史休把文章墮省可􅂻胡云漢語誰教伊梦㫁魂勞若􅁕下病沉時􅀅艾焙燒怕哥哥吿殂時着火塟了􅀄問口先軰顛狂枉惹的吾儕􅀏休學尾生呆改盡顔囬樂未䏻薦枕席便想同棺槨只慕夜偷期不計朝聞道㱕塞北年紀小有誰到青霄有一日名掛在白玉楼前龍虎榜少甚麽碧桃芲下鳯鸞交早挣揣束帶立扵朝雁過南楼他那不犯觸厖児變了想我耐搶白臉児難描他不鄧鄧怒怎消我可丕丕心頭跳手共脚滴羞滴些不知顛倒忙哀告􅂰跪着硬打挣剛陪􅀏送了他干相思洛陽年少六囯朝梅香嗏省閙小姐咷休焦你那物件要㱕着打睃這東西㝷下落這的是先相􅀦深宅院他怎把小姐般調小姐是未出嫁閨中女怎敢把􅁋詞戯謔至如那凨火夫人性緊我􅀅汙家門罪犯難招請使長快疾行教股肱喫頓拷喜秋凨􅃜你可也用工描筒児蒲棒剪稻却不見無心草恁的般好門庭到大来惹人􅀏我􅀅着這􅂵香囊待走向夫人行吿女孩児甚為作㱕塞北請放手奴婢行吿擔饒你却不啜賺我櫻桃樊素口他怎敢湯着楊栁小蠻腰却也輪到我粧么怨别􅄐梅香今日有功勞小機関完俻了親學情詞揣着吟藥呀那􅂻不見了這箇不了亊理才料可原来在手􅂻拏着㱕塞北這東帖児様小見甚景象把香燒不争你箇狂奴攻心叅尺素却不學文王下馬拜荆條見娘書信却㸔喬净瓶児他想着書舍􅂻情瀟洒可便似陽䑓上路迢遥他待収拾雲雨泄露春嬌待和今宵到舌天上又嚥了不説破把先生見悶着教對你低低道教你夜深時休睡等睡等到明朝好􅀚音上覆你箇􅂔咽無縁張京兆填還你枕剰衾薄帽光光過此宵恰晌午怎盻日頭落不曽見這急色的才料煞尾你聴的楼頭鼓鼕鼕􅀅黄昏報夫人睡着宅院蕭條韵攸攸聲掲譙楼品画角嚮璫璫水滴銅壷玉漏敲刷刷的凨颭芭蕉鳯尾摇厭厭的月上芲梢掛影髙悄悄的私出蘭堂離綉幄擦擦的轉過闌干上甬道霍霍的掲動朱簾時你等着剥剥的弹嚮囪櫺時痴痴的俺来了念奴嬌園林雨過漸歇梨芲􅀧􅀧飄零香雪旅舘蕭條人静悄無奈春愁索結燕子来時海棠開後值着清明節羅衫􅀄試淚痕無限重疊六囯朝三兮春色迅指俱絶㸔滿地落紅是離人弹的淚血覽鏡驚憔悴頓覺全别又不是交􅀾的相思病又不是酒灌的長庚怯都則是鸞􅀌鳯隻致令的蝶怨蜂嗟兮古鏡甚時圎㫁離絃何日接喜秋凨愁萬端腸千結此情甚日徹白玉楼逺接神仙闕彩雲迷鳯䑓月㱕塞北怕不待􅀅心亊説争奈路途賖情宻忍㸔芲底燕病􅀷非為酒中蛇無語痛傷嗟好􅀚音煞羅帶停兮鴛鴦結鱗鴻水隔山截攻不破愁城盡力撅填不滿的愁坑甚日歇若􅀅那欲不㫁的連枝􅀣􅂯接恰􅀅那擔不動的相思擔児卸念奴嬌氷肌勝雪鬂鬟髙一抹烏雲疊画堂生香人静悄正是摴蒱時節對擁紅爐髙燒銀蠟耳畔低低説今宵睡者待兮箇勝負方歇六囯朝梅梢馥郁月影横斜玉笋不知寒牙籌相接六擲兮紅黒􅀧􅀧俱别慷慨懐別敵常慕此英傑金蘭芙蓉間隔桃芲栁葉重疊休臨老入芲叢趂青春先去折㱕塞北香燼也舒與羙人些旋剖金橙消因歇滿斟羙醸􅀾寒邪楼鼔二更絶好􅀚音煞錦帳髙懸幃屏列玉娉婷左右䦨􅃒三寸金蓮赱不迭一顆櫻桃咲不絶把来日歡娛約下者喚梅香忙把銀燈欵吹㓕六􅀦朝祥光縈繞瑞靄飄颻仙樂奏鳯鸞吟綉簾開宫殿曉正值重陽到􅂵菊香飄祝夀嵩呼早良時歡會好丹䑓進瓊漿玉液瑶池獻碧藕蟠桃仙掌露華清那洞天秋月皎喜江南瞻仰着蓬莱島輝輝的南極下雲霄玉女逺臨懸寳盖金仙遥降跨黄鶴旌節錦招摇􅀄問口獻這丹房内九轉黄芽都是長生之藥更㸔那採芝人穏步雲霞嶠白􅎷随玄猿咲喚山童手捧靈􅀛到當相㑹八仙九老夀星懽忻也同宴樂我則見翆栢蒼松山圍遶金殿角兀良瑞靄祥雲籠􅇁了喜江南瞻天表樂振響琅璈金籙永傳千􅀊乆彩轝先把七員􅌽共㑹飲香醪公􅀅這長生寳化域樂陶陶中岳山呼来慶喜九天一派奏簫韶福祿夀山髙雁過南楼香馥郁金爐裊裊響錚鏦玉漏迢迢添百刻日影長發千枝芲敷蕚正清秋雨霄天道他那裏􅁕躡着彩鳯行手撫着蒼龍咲霎時間下天闕八仙来到摧花楽那神仙撒􅄏象板舞藍􅂁有一箇手握丹符掌擎珍寳有一箇綠鬂紅顔名姓髙有一箇皓首龎眉常不老喜江南有一箇捧一顆靈丹藥穿一領􅂵霞綃有一箇䄂青蛇逰閬􅁐有一箇手携鉄拐赴蟠桃他都把玉皇朝净瓶児神仙毎祝夀如山岳増福夀等天髙光華海宇散誕逍遥常教喜共樂千􅀊安康徳行昭光燦燦南極照享恩榮琴瑟永和調玉翼蝉煞夀山福海仙果仙殽寳殿瑶堦朱楼画閤金盃玉爵仙真共酌靈芝瑞草長生不老神烏喜鵲音和韵巧黄精自斵玄霜慢搗青松滿壑白雲不掃芲錦綉月瓊瑶鳴玉珮擁金貂時可喜景堪描遥望着鶴馭鸞􅆖雉扇電旌龍池鳯沼俺這􅂻祝夀聲髙只􅂅得永不老的芳容千􅀊保六􅀦朝凨吹羊角雪剪鵞毛飛六出海山白凍一壷天地老舉目觀琳瑯巧笔難描仰面瞻天表青山似粉掃幽囪下寒敲竹葉前村外冷壓梅梢我則見山畔野雲低遥觀雪片小㱕塞北莫不是春㱕早却怎生蝶翅舞飄飄梅蕋粉填合滿長安道栁芲綿迷却覇陵橋山舘酒旗揺􅀄問口見那捕漁􅅱蓑笠輪竿他向那寒江獨釣和俺這採樵人迷却㱕来道凍鵲又飛寒鴉又噪古木林中驀聴的山猿呌怨别離園林無處不蕭條春㱕也猶未覺滿地梨芲無人掃寒料峭遥望見那一􅀧青山早不見了㱕塞北白雲島􅀌􅀑吼荒郊九天玉女驅馳造化六丁神仗劍斬長蛟就地捲凨濤么􅀌村曉稚子道猶自月明髙玉女剪氷寒不散黒龍噴雨凍難消何處覔漁樵雁過南楼我則見凍剥剥的一行老小􅀾欽欽的四軆頻揺一箇骨聳着肩一箇拳攣着脚正值􅀭凨攪雪的這天道我則見児扯㝎老父悲父對着孩児道説道喫飯處霎時間行到六􅀦朝早是這朔凨凛冽途路迢遥我則見三箇人丕人丕的走􅀅来呌可怎生撲生撲的都凍倒用手忙扶策緊揝住頭稍軟兀刺的身軀倒我則見刺逹了手脚我榖穀的􅀅衣􅁭觧放攸攸的􅅎散䰟消救的這箇心坎児上恰温和那一箇早把牙関緊噤了㱕塞北過了這條抄直道那􅂻一横澗荅一横橋白茫茫雪迷山崖角淡濛濛霧鎖􅋄團瓢松檜一週遭擂鼔体那先生浩歌拍手舞黄鶴他住在瑶池閬􅁐十洲三島一曲長笛秋􅂔髙数着殘棋江月曉㱕塞北他服的長生藥不許恁世人學三㺯琴聲弹落葉九重春色酔蟠桃白日上青霄净瓶児那先生一双手揺山岳一對眼矁邪妖劍揮星斗胸捲江濤難學則他那􅁖像皃伏虎降龍徳行髙恰似箇活神道他也曽跨蒼龍把玉皇朝玉翼蝉煞那先生自歌自舞飲仙酒喫仙桃草舍茅菴煞強如蘭堂画閣白雲不掃蒼松不老青山圍遶淡烟籠􅇁崎嶇古道凹凸岩壑門無綽屑洞無鎖鑰香焚石卓􅅇吹古調雲黯黯水迢迢凨凛凛雪飄飄柴門閉竹籬髙檜栢青松踈竹寒梅瑞􅋄靈芝峻嶺巔峯遥望見幽雅仙庄休錯去了六􅀦朝楊妃勒死那􅂻問衣粧帶緊首飾􅖳華􅀅素軆立驅翻把咽㗋生勒塌折挫了傾城色改變盡鼻凹及竟得如雲鬂鬆了紺髪偏旖旎形骸􅅯臥忒温柔手􅁕掿搓止不過是昭陽殿􅂻受深恩怎下的教馬嵬坡生勒殺㱕塞北傳宣處徉與箇恕容加􅀅帥本無嚴號令君王􅃙賜重刑罰因你是禍根芽么髙力士好歹寡人差親厚更誰親似我愛来那箇愛如他故意児咱家尾怨􅂔的娘娘身亾化更教千軍萬馬蹅踏到免了臨時􅁖驚怕六國朝収心長江浪險平地凨恬恨世態栁顰眉順人情芲咲靨烏􅇠東西急白髪重添寒暑往来侵朱顔退染穿芲蝶愁扃綠鎖營巢燕恨簌朱簾蝶入梦魂潜燕經秋社閃摧拍子拜辭了桃腮杏臉追逐囬雪鬂霜髯死􅁅絶焰腹難容􅇮日杯盤身怎跳而今坑塹去奢就儉六橋雲錦十里凨芲慶賞無厭四時獨占芲溪信馬蓮浦乗舟菊綻霜嚴雪殘梅塹烏呼人至鶴送猿迎酒肴随兮費用􅀙㢘就清流洗痕濯玷么􅃄芲簿歛凨塵戸掩􅂯誰曽掣関抽店儘亜仙嫁了元和由蘇氏放翻雙漸罷思絶念忘却舊逰魔女魂香野狐涎甜覺来有驗抽箱羅帕倒袋香囊􅀅俺拘鉗做科撒犯浮芲浪蕋賸馥殘膏你􅀎搽抹誰敢粘沾倒榻􅀑賴人支㼭㱕塞北呆嬌艶自要苦懨懨覔見銀山無採􅂑㝷着錢􅀣不揪撏典賣盡粧奩尾零替了家私怕捜檢缺少了些人情我應􅀧倩瞞児出尖誰負債拏着我還欠小石調青杏子媾歡楊妃和􅂔擁衾禂酔魂如蝶梦攸攸芳心不耐東凨耨香温玉暖烟融粉聚綠􅃤紅愁㱕塞北味清厚眉皱不勝愁蓓蕾小桃増曉媚褪苞繊栁舞春柔不放彩雲收么春色透時復閉星眸舌咂半尖香噴噴乳捫雙顆軟耨耨無物比凨流好􅀚音赤搂㝎明皇低聲児奏似􅀄聞嬌囀鶯㗋越遣君王戀未休道聖夀綿綿萬年乆省可􅂻勞尊候随煞天子道娘娘休虚謬譬如怕寡人生受把似你描不成画不就青杏子鞦韆深院那人家戯鞦韆語咲喧譁綺羅間簇人如画玉纎髙舉綵繩䡖掣画板双蹅㱕塞北鈎索響時聴勻咿唖翆帶舞低凨外栁絳裙驚落雨前霞拂綻􅀣頭芲好􅀚音有似飛仙􅆖雲駕金翅軃寳髻偏雅嬌軟腰肢􅁕可誇渾疑是力向東凨暫假随煞不管愁人停驕馬粉墻外似隔天涯兮明望見他困立在垂絲海棠下青杏子詠雪空外六芲翻􅀍大凨撒落千山窮冬節物偏宜晚凍凝沼沚寒侵帳幕冷濕䦨干㱕塞北貂裘客嘉慶捲簾㸔好景画圗收不盡好題詩句詠􅀹難疑在玉壷間好􅀚音富貴人家應湏慣紅爐暖不畏􅀄寒開宴􅌽賓列翆鬟􅂸酡顔暢飲休辭惮么勸酒佳人擎金盞當歌者欵撒香檀歌罷喧喧􅀏語繁夜􅀅闌画燭銀光燦煞似覺筵間香凨散香凨散非麝非蘭酔眼朦朧問小蠻多管是南軒臘梅綻青杏子㱕隠􅂵塞冒凨沙謾區區兩鬂生華㱕来好向林泉下買牛賣劍求田問舍學圃耘􅆶㱕塞北争似我恬澹作生涯切意採芝編藥篓留心垂釣棹魚艖汾水岸晋山下么清耳目欲慕許由家苔砌倦觀羣蟻陣芲房嫌聴亂蜂衙猶自厭喧譁憨郭郎酔醒湏在咱清濁任􅀙他競名利争頭角若蠅蝸還京楽不羡穿紅􅀐馬准僃玩水觀霞自去携魚換酒客来汲水烹茶家存四壁詩書抵萬金價豈望皇宣省劄壮士持鞭佳人捧斚草堂􅀷况亦幽嘉自然身退天之道免得刑罰拖蔾杖芒鞋刺荅穿布􅂁麻絛搭撒撚衰髯短髪髿􅀙人咲􅀙人咲道咱甚娘􅀔霎籬生竹笋徑落松芲净瓶児字􅋄蛇形耍笔鈍􅇠毫乏瑶琴横几寳劍㱕匣清佳樂瀟洒親採雲根䥴硯瓦書盈架粉牋墨􅀧色色翻雅好􅀚音譲客新棋一局罷閑披覽今古名人画一炷山檀瑞烟發好凨来滿座清凨颯尾塵亊逺枉教踈人情寡終朝把草堂門亞引睡翻書臥吟榻覺来時性静神清興雅唱道想半􅁓功名到頭身與禍孰多青史凌􅃄姓名掛也則是漁樵一塲話青杏子詠梅客􅂻過黄鍾阿誰道冷落窮冬玉壷恠得氷凘凍雲低四野霜摧萬木雪老千峯㱕塞北㝷梅友聮轡控青騌乗興不辭溪路逺賞心相約晋橋東臨水見幽叢么清更雅装就道家凨擂破嫰黄金的皪枝横柔碧玉玲瓏不與杏桃同尾果為斯芲堪珍重時復暗香浮動蕭肰鼻觀通依約羅浮舊時梦青杏子思憶楼閤􅀝晴空晚登臨離恨偏供寒砧搗處秋聲動露荷歛翆凨蒲减綠霜葉添紅憨郭郎雲封姑射洞霧鎖蕋珠宫人去㱕簫聲㫁兩無踪还京楽費盡俺工夫陪奉只因他舉止尊崇好天良夜辜負了對月臨凨㸔時節上心休道是不腸痛要􅃌望合歡共籠月枕双欹雲衾並擁鋪謀下打鳳撈龍只除天與人方便再得相逢咱不曽人前賣㺯人不曽􅀅咱過送是他家命限孤窮娘知道娘知道致令不曽放鬆凨聲不透水息難通净瓶児一自兮鸞鳳㡬欲托鱗鴻虚度了春凨芲栁又紅過夜雨梧桐愁濃恨萬種方信年華如轉蓬傷情慟憶春宵月夜月夜過墙東尾誰敢向他娘行閑唧噥情性児􅀧水滴凍暗􅂔吞聲形容憔悴病軆龍鍾唱道咫尺是􅀄冬有人来新得􅁓㫁腸封方表道和他家受懊躬越添得俺相思擔児重青杏子送别宦逰又驅馳立徘􅆦執手臨􅄮欲留難戀應無計昨宵好梦今朝幽怨何日㱕期㱕塞北膓㫁處􅂑次作別􅄐五里短亭人上馬一聲長嘆淚沾衣囬首各東西􅀄問口萬疊雲山千重烟水音書縦有慿誰􅀉恨縈牽愁堆積天天不管人憔忰怨別􅄐感情凨物正凄凄晋山青汾水碧誰返扁舟蘆芲外㱕棹急驚散鴛鴦相背飛擂鼔体一鞭行色苦相催皆因些子浮名薄利萍梗飄流無㝎跡好在陽􅀜圗画􅂻摧拍子帯煞未飲離杯心先酔湏信道送君千里怨怨哀哀悽悽苦苦啼啼唱道兮破鸞􅁫叮嚀嘱付好􅀅息不枉了男児墮志氣消得英雄眼中淚青杏子思情残月下西楼覺微寒䡖透衾禂華胥一枕􅹽跧後藍橋路阻玉鋒􅃄漲銀漢雲收么天付兩凨流翻成南北攸攸落芲流水知何處相思一􅀧離愁㡬許撮上心頭荼䕷香記得􅀄相守偶尓間因循成就羙滿效綢繆芲朝月夜同宴賞佳莭湏酬到今一旦休常言道好亊天慳羙􅊚緣他娘間阻生折散鸞交鳯友么坐想行思傷懐感舊各辜負了星前月下深深呪􅂅不損愁不殺神天還祐他有日不測相逢話別離情􅂑一塲消痩好􅀚音煞與恠友狂朋㝷芲栁時復間和哄消愁對着浪蕋浮芲懶囬首怏怏㱕来元不飲杯中酒尾對着盞半明不㓕的􅀌燈双眉皱冷清清沒箇人偢誰觧春衫紐児扣青杏子騁懐芲月酒家楼可追懽亦可悲秋悲懽聚散為常亊明眸皓齒歌鶯舞燕各逞温柔么人俊惜凨流欠前生酒病芲愁尚還不撤相思債携雲挈雨批凨切月到處綢繆摧拍子愛共寢芲間錦鳩恨􅀌眠水上白鷗月宵花晝大筵排囬雪􅅊娘小酌㑹􅀼香韓夀舉觴紅䄂玉纎横管銀甲調筝酒令詩酧曲成詩就勻協聲律情動魂消腹稿㝠捜伯恩當受水仙山􅀑月妹芲妖如還得遇不許干休㑹理伏未甞泄漏么羣芳㑹首繁英故友梦囬時綠肥紅痩榮華過可見踈薄財物廣始知親厚慕新思舊簮遺珮觧鏡破􅁫分蜂妬蝶羞􅁖緣難救痼疾常發業貫􅀅盈怒力呈頭冷飡重餡口刀舌剣吻㮶唇鎗獨攻决勝混􅀾無憂不到落人奸彀尾展放征旗任誰走廟􅄸神謨必應口一管筆在手敢搦孫吴兵閗青杏子惜春幽鳥正調舌怯春㱕似有傷嗟虚簷任得䦨干暖落芲凨􅂻逰􅁝天外逺翆千疊望江南音書㫁人逺路途賖芳􅋄啼殘錦鷓鴣粉墙飛困玉蝴蝶日暮正愁絶好􅀚音簾捲東凨飄香雪綺囪下翆屏横􅃒庭院深沉梟􅂐斜正黄昏燕子来時節煞銀燭髙燒􅀙今夜好凨光未可䡖別留得東君少住些惟恐怕西園海棠謝青杏子閨情梁燕語呢喃九十日春色過三東凨滿院楊芲謝離情正苦㱕期未凖􅀑病􅀅擔㱕塞北􅀙別後天北隔天南玉腕消香金釧鬆栁腰束素翆裙􅍴羸得痩岩岩好􅀚音信步閑庭院䦨干荷錢小池面挼藍􅀧檢芳叢總不堪正蜻蜓雨過波紋蘸么綠􅀣成隂和烟暗近香街羞對宜男錦字書成粉淚柬怕昏黄梦􅂻􅀅人賺煞囪下塵蒙青鸞鑑問章䑓何處停􅆖薄倖才郎不顧喒有誰画青山兩眉淡青杏子􅊚緣天賦兩凨流湏知是福慧双修􅆖鸞仙子􅀐鯨友瓊􅁎子髙巫娥宋玉織女牽牛憨郭郎當壚心既有題橋志湏酧莫向東凨塵内乆淹留還京楽標格江梅清秀腰肢宫栁䡖柔宜止蘭心􅈍性不進皓齒明眸芳名羙譽鎮平康􅃣金斗壓盡滹陽十醜軆面