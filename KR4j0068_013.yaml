front:
  text: 雍熈樂府卷十三
  hash: sha256:c8dd512e602ab23bb39049fb12ef070ad042ab02d9fb06636f0e2c9196b28398
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_013-1a}
body:
  text: 越調闘鵪鶉電遶樞星虹流華渚紫氣氤氲清香馥郁海晏河清修文演武感聖恩過舜禹喜遇着萬夀佳辰更值着三冬莭序𬗋花児序丹墀内齊排着仙仗玉爐裏細裊名香金杯中滿泛着醍醐托吾皇有徳保四海無虞民樂康衢見昨夜長庚燦太虚正值着聖人初度擺列武職文臣一齊稱萬歲山呼小桃紅太平一統混車書萬國蒙生育黎庶謳歌感恩露盡歡娱皆仰頼聖主齊天福君明如舜禹臣賢比房杜徳勝似唐虞尾黎民樂業無差賦共祝願皇圗永固讃聖夀無疆掌中華聖明主闘鵪鶉詠雪雲幕重封風刀劲刮玉絮輕撏瓊雹碎打粉葉飄揚塩花亂撒一色白六出花宻宻踈踈瀟瀟洒洒𬗋花児序瑩玉縁髙山嶺䄂水晶碾陸地樓䑓玻璃砌老樹槎枒蚕食桒葉蟹走平沙時霎列璧鋪瓊迷萬瓦随風髙下蝶粉翩翻蜂翅交雜秃厮児應時候在深冬暮臘髙盈户報豐稔年華驅蝗入土将瘴氣壓禎祥瑞耀國家堪誇聖藥王是宜開綉闥斟玉斚泛羊羔羙酒味偏佳樂韻雜歌調雅肉屏風羅列女嬌娃開宴竸奢華么篇不覺的酒力加和氣奓佳人爭賞咲諠譁玉纎将雪片挐玉鈎将雪地蹅子見雪光人貌兩交加似一片玉無瑕𬗋花児序秦嶺寒迷去馬剡溪凍駐行槎蔡城喧起鵞鴨讀書冷落髙臥貧乏由他且則走斚飛觥受用咱直喫的酔時纔罷咲相偎綉𬒳香腮風流如𥿄帳梅花尾聲喚家僮且把氊簾下教侍妾髙燒絳蠟讀書舍烹茶的淡薄多銷金帳傳盃的快活煞闘鵪鶉髙聳聳一帶青山翆巍巍滿林緑柳曲彎彎澗下蒼松宻匝匝園中翆竹聲哀哀鶴唳猿啼急穣穣烏飛兎走清幽幽琴一張香噴噴酒數甌羙甘甘淡飯黄虀勝強如肥羊法酒紫花児序靜悄悄山中䄂手穏拍拍菴内存身煖烘烘𬒳裡蔵頭不知冬夏不管春秋都休薄利虚名一筆勾恰便似野雲出岫舒捲無心到大来優㳺金蕉葉少是非柴門扣乆無煩惱山妻問候畢罷了閑茶浪酒拜别了狂朋恠友調咲令我如今得修樂清幽收了苧藍罷了斗怕的是紅塵碧海蝦蟆閗是非塲無了無休我和這山猿野鷗為故友相伴着瓦鉢磁甌秃厮児名和利一齊罷手好共歹並不耽憂如痴似拙牢閉口忙收拾鈎魚鈎無限清幽聖藥王但将這詩句酬再将這欽興投休将閑事掛心頭管甚溪水渾不飲牛收拾一隻釣魚舟趂着緑水且閑逰尾聲至誠端的無塵垢俺本是箇烟波釣叟我向這草舍内不爭名再不去紅塵路上走闘鵪鶉錦重重寳殿金門髙聳聳龍樓鳳閣齊臻臻玉砌雕欄宻匝匝紅圍翆遶咲欣欣莭值元宵喜孜孜生逢盛世明朗朗月正髙光輝輝燈正皎碧澄澄的月影婆娑熖騰騰的燈光閃灼山馬客寳月圎花燈照我只見萬朶金蓮光射青霄逍遥端的是太平盛世人間絶妙則聴的錦箏慢撥羙詞低唱檀板輕𫾣鬼三台同顴樂齊歡咲任銅壷漏曉銀漢夜迢迢勝瑶池玉島喬三教緩行規範標聚八仙揣舞勢様巧端的是冠古難逢今時遇少蠻牌令擊鼍鼓品鸞簫歌金縷舞六么碧天香霧靄綵霞飄寳䁀内名香細裊金杯中酒泛羊羔黎民道玉山倒金吾不禁風景偏饒調咲令蠟炬燒似一天星斗移来到接鰲山火樹星橋我則見筵開玳瑁列着羙殽動仙音一派笙簫皂羅𫀆喜遇豐年之兆感皇恩浩蕩徳邁唐堯省刑罰薄稅歛罷差徭河清海晏民安樂禎祥迭現麒麟鳳鳥梯航重譯竒珍異寳㸔都城不弱蓬莱島聖藥王社火将迓鼓𫾣逰人把燈亂挑見參横雲縹緲則這燈光月色影重交這的氣勢兩相髙梅花酒歡娱宴樂觥籌交錯朱唇唱徹櫻桃小排羙質多嬌太平年元夜好家家樂陶陶同携共約喜人生幸遇着良辰羙宵闘鵪鶉人去陽䑓雲歸椘峡不爭你江上停舟㡬時得門前過馬悄悄㝠㝠蕭蕭洒洒踏鴈沙歩月華行過這萬水千山都則在一時半霎𬗋花児序想情人心中離恨赶王生栁下停舟似張騫在天塹浮槎汗溶溶珍珠盈臉亂鬅鬆雲鬂堆鴉走的我力盡觔乏莫不是夜宿秦淮賣酒家我向這斷橋植下踈刺刺的秋水枯蒲冷清清的明月蘆花小桃紅我驀聴的馬嘶人語閙喧譁掩暎在垂楊下諕的我撲撲的小鹿児那心頭驚怕璫璫的鳴榔板捕魚蝦恰纔那順西風悄悄的聴沉罷我趂着他這淹淹的露華對着這碧澄澄的月下猛聴的呀呀的寒鴈起平沙調咲令沙池上欵踏莎草上帶霜霞呀恰掩過湘裙翡翆紗抵多少蒼苔露冷凌波襪㸔江山列成圗画我則見氷壷㶑灔天上下青霄月碧玉無瑕聖藥王我這里近蓼花䌫釣槎有折蒲衰草緑蒹葭近水凹傍淺沙遥望見烟籠寒水月籠沙我則見茅舍兩三家麻郎児暢好是直伯牙我做了箇沒出豁的人家為甚麽私離本家待和伊同赴天涯么篇險把我爭些児走乏比及你逺至京華薄命人心中念他思量心何時撇下拙魯速你若似賈誼般困長沙便似孟光般顯賢逹若半星児意差一心児敬他舉案齊眉傍書榻一任他淡薄生涯折莫我戴荆釵穿布麻么篇把稍公忙喚咱怕家中厮捉拏我則見逺樹寒鴉岸草蘆花數聲啼鴉㡬縷殘霞快疾把雲㠶髙掛月明直下航櫓咿軋咱可便趂東風莫消停疾進咱尾聲果然他上長安登途路把車児駕則願你箇文章客時當奮發則我這慣沽酒的卓文君我情願扶侍你箇題橋漢司馬闘鵪鶉棄職休官張良范蠡拜辭了紫綬金章待去㸔青山綠水跳出了狼虎叢中再不入麒麟画裡爵祿髙性命危捨死忘生爭宣競勑紫花児序你都待重䄄而臥列䁀而食不如我拂袖而歸急流湧退見賢思齊當日箇寗武子左丘明孔仲尼邦有道則仕邦無道則廢齊魏裏使殺箇孫龎殷周間餓殺箇夷齊鬼三台㸔了些英雄軰爭閑氣為功名将性命虧嘆豫譲嘆沮溺待圗箇甚的論功勞誰如燕樂毅論才學誰如晋李儀常言道才廣妨身官髙害巳聖藥王我如今近七十得知湏信道老而不死是為賊鹿喚做馬鳳喚做雞從今葫蘆大家提再不辨是和非調咲令為甚終日酔如泥除睡人間總不知戒之在得因何意老不必爭名奪利黄金垜到北斗齊也跳不出這輪廻聖藥丅赤緊的烏又飛兎又催暫時相賞莫相違菊滿籬酒滿杯只喫得席前花影坐間移白髪故人稀尾想當日子房公㑹覓全身計好一箇識空便抽頭的范蠡歸山的待㸔那翆巍巍千丈嶺頭雲歸湖的待㸔那青湛湛長江萬頃水闘鵪鶉雪艶霜姿香肌玉軟杏臉紅嬌桃腮粉淺金鳳斜簮雲鬟半偏挿玉梳貼翆鈿體態輕盈歌喉宛轉𬗋花児序他有蘇卿才貌我學雙漸真誠望得箇羙滿姻縁俳優體様樂府梨園天然不弱如桃源洞裏仙可愛堪憐一捻腰肢半折金蓮小桃紅初出蘭堂立樽前似月裏姮娥現一撮精神勝飛燕正當年栁眉星眼芙蓉面絳衣縹渺麝蘭瓊樹花裏遇神仙天净紗初相逢恨惹情牽間别来却受熬煎各辦着心真意堅有時莭得便赴佳期月底星前尾聲狠毒娘阻隔的難相見統鏝的姨夫戀纒我為甚探望的脚歩児勤只恐離别的路児逺闘鵪鶉寄别百歲光隂寄身宇宙半世蹉跎忘懐詩酒竊玉偷香㝷花問栁放浪行不自羞十載江淮腦蟠星斗𬗋花児序鬂絲禅榻眉黛吟囱扇影歌樓獻書北闕挾䇿南州遲留社燕秋鴻㡬囬首壮懐感舊嫵媚精神羅綺風流調咲令漸乆過清秋今古名山惜未休琴罇相對消閑晝画烏絲酔圍紅䄂陽關一聲人去後蕭踈了月枕雙謳秃厮児浩浩寒波野鷗瀟瀟夜雨蘭舟津亭送别風外栁甚不觧繫離愁悠悠聖藥王夜氣牧人語幽西樓㫁梦月沉鈎惜勝逰憶唱酬追思往事到心頭腸欲㫁泪先流尾聲彩雲冉冉巫山岫還相逢邂逅綢繆終日惜芳心思量歲寒友闘鵪鶉風情連夜銀蟾逐朝媚臉體再情添淹漸病染殢雨𥘉霑尤雲乍歛他不嫌俺正忺不顧傷㢘何曽記點紫花児序雙欹月枕携手虚簷傅粉粧奩歡娛忒釅收管忒嚴如魪如鶼再合㑹有半句児謟無一星児欠浪靜風恬落花泥沾么篇無嫌大俳塲俺占喬風月咱兼閑是非人􅥦强做科撒坫硬熱戀白沾相簽掄的柄銅鍬分外裡險撅坑撅塹潘岳花撏韓夀香苫小桃紅小姨夫統鏝緊沾粘新人物冤家忺早起無錢晚夕厭怎拘鈐蘇卿不嫁窮雙漸敗旗児莫颭俏勤児絶念魚鴈各伏潜尾聲假真誠好話児親曽驗鼻凹裡沙糖怎去餂貪顧戀着眼前甜不隄防那背後閃闘鵪鶉歌姫教坊馳名梨園上班院本詼諧宫粧様範膚若凝脂顔如渥丹香肩凭玉樓湘雲擁翆鬟羅帕分香春纎換盞紫花児序扶颩煞東風桃李吸留煞暮雨房櫳紇喜煞夜月䦨干向尊席之上談咲其間意思相攀且是娘剔透玲瓏不放閑不枉了喚聲粧旦儘可以霧幌雲屏酒社詩壇天净沙眉児初月彎彎鞋児痩玉慳慳臉児孜孜耐着琵琶絃漫青衫泪點纔乾尾聲麗春園門外是潯陽岸最險是荼船上跳板一句話悔時難兩般児愛處㨂闘鵪鶉蹴踘蹴踘塲中鳴珂巷裡南北馳名寰中可意夾縫堪誇抛聲盡喜那換活煞整齊欵側金蓮微舒玉體唐裙輕蕩綉帶斜飄舞䄂低垂紫花児序打的箇桶子膁特硬合扇拐偏疾有一千来搊拾上下泛匀匀的論道児直使得箇挿肩来可喜扳摟抄雜足窩児伶俐小桃紅粧蹺委實用心機不枉了誇强㑹女軰叢中最為貴煞曽習沾身那取着田地趕起了白踼諸餘里快收拾調咲令噴鼻異香吹羅襪長沾現色泥天生藝性諸般児㑹折末你轉花枝勘膁當對鴛鴦扣體様如画的到賺得校尉毎疑感秃厮児粉汗濕珍珠亂滴寳髻偏鴉玉斜堆虚蹬落實拾躡起側身動栁腰脆丸惜聖藥王甚旖旎解數児稀左盤右折煞曽習甚整齊省氣力旁行側脚歩頻移来往似粉蝶児飛尾聲不離了花前栁影閑田地閗白打官塲小踼竿網下世無雙全塲児上占了第一闘鵪鶉半世飄蓬閑茶浪酒十載追陪狂朋恠友倚翆偎紅眠花臥栁恠膽児劣耍性児柔成了些心厮愛夫妻情厮當配偶𬗋花児序受用了些春風妓舘曉日章䑓夜月秦樓向紅裙中挿乎錦被裏舒頭風流不許傍人下釣鈎燕侣鶯儔百匹酬歌紅錦纒頭金蕉葉寨児裏相知是有一見咱望風舉手若論咱點砌桃科慣熟敢教䏻尖嘴姨夫閉口調咲令聲名歲乆急難收只恐怕扶侍冤家不到頭風月脚到處都成就誓不曽落人機彀弄得人燃香剪髪百事的有冷氣虛心使盡剛柔秃厮児愛楊栁樓心殢酒喜芙蓉帳底蔵䦰羙孜孜翆鬟排左右歌白雪捧金甌温柔聖藥王春纔休夏又逰芰荷香裏泛蘭舟到中秋月色幽酔薫薰無夜不登樓兀良抵多少風雨替花愁尾花隂栁影閑馳驟急回首三旬又九罷却了愛月惜花心閑袖了題詩画眉手闘鵪鶉玉宇無塵銀河瀉影月色横空花隂滿庭羅𬒮生寒芳心自驚側着耳朶児聴躡着脚歩児行悄悄㝠㝠潜潜等等𬗋花児序等待那齊齊整整嬝嬝婷婷姐姐鶯鶯一更之後萬籟無聲直至鶯庭若是回廊下沒揣的見俺可憎将他来緊緊的摟定則問你㑹少離多有影無形金蕉葉則聴的角門児呀的一聲風過處花香細生踮着脚尖児仔細定睛比我那𥘉見時龎児越整調咲令我這里甫䏻見娉婷比着那月殿里嫦娥也不恁般撑遮遮掩掩穿芳徑料應来小脚児難行可喜娘的臉児百媚生兀的不引了人魂靈小桃紅夜深香靄散空庭簾幙東風靜拜罷也斜将曲欄凭長吁了兩三聲剔團圞明月如懸鏡又不是輕雲薄霧都則是香烟人氣兩般児氤氲不分明秃厮児早是那臉児上鋪堆着可憎心児里埋沒着聰明新詩和得􅑯應聲一字字訴真情堪聴聖藥王語句児清音律児輕小名児不枉了喚做鶯鶯他若是共小生厮覷定隔墙児酬和到天明方信道惺惺的自古惜惺惺麻郎児我拽起羅衫欲待行他陪着咲臉児相迎不做羙的紅娘􅑯淺情更做道謹依来命么我忽聴得一聲猛驚元来是撲刺刺宿鳥飛騰顫巍巍花稍㺯影亂紛紛落紅滿徑絡絲娘空撇下碧澄澄蒼苔露冷