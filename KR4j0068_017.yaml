front:
  text: 雍熙樂府卷之十七
  hash: sha256:79de0508685f085ab7b364915342305b765f2b059b917d19be3ec844c619dccb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_017-1a}
body:
  text: 雜曲醉太平二十首元人汪元亨警世辭龍樓鳯闕納象簡烏靴棟梁材取次盡摧折况竹頭木屑結知心朋友著疼熱遇忘懷詩酒追歡恱見傷情光景放癡呆老先生醉也憎蒼蠅競血惡黑蟻爭穴急流中勇退是豪傑不因循苟且嘆烏衣一旦非王謝怕青山兩岸分吳越厭紅塵萬丈混龍蛇老先生去也家私上欠缺命運裡周折桑間飯誰肯濟靈輒安樂窩飬拙但新詞雅曲間編掜且粗衣淡飯權掤拽這虛名薄利不干涉老先生過也度流光電掣轉浮世凨車不歸來到大是癡呆添鏡中白雪天時涼指天時熱花枝開回首花枝謝日頭髙眨䀶日頭斜老先生悟也范丹貧瑣屑石崇富驕奢論貧窮何以富何耶十年運巧拙了浮生脫似辭柯葉縱繁華廽似殘更月嘆流光疾似下坡車老先生見也門前山妥帖囱外竹橫斜看山光掩映樹林遮小茆廬自結喜陳摶一榻眠時借愛盧同七碗醒時啜好焦公五斗醉時賖老先生樂也源流來俊傑骨髓裡驕奢折垂楊幾度贈離別少年心未歇吞繡鞋撑的咽喉裂擲金錢踅的身軀趄騙粉墻掂的腿脡折老先生害也嗟雲收雨歇嘆義斷恩絶覺逺年情况近來別全不似那些赴西廂踏破蒼苔月等御溝流出丹楓葉赱都城輾碎畫輪車老先生勾也恰花殘月缺又瓶墜簮折並頭蓮藕上下鍬鐝姻緣簿碎扯祅神廟雷火皆轟烈楚陽臺磚瓦平崩缷天台洞狼虎緊攔截老先生退也棄桃腮杏頰離燕體鶯舌逺市廛居止近岩穴論行藏用舍鴈翎刀揮動頭顱缷雞心鎚抹著皮膚裂狼牙棒輪起肋肢折老先生怕也錦箏搊莫歇紫簫品休絶把紅牙象板按低些皓齒歌未徹聽幾聲金縷心歡恱飲千鍾玉液身頽趄看兩行紅袖眼乜斜老先生醉也清泉沁齒頰佳茗潤喉舌喚山童門户好關者把琴書打疊欹菊花香枕無兢業擁蘆花絮𬒳多窠擪入梅花𥿄帳緊圍遮老先生睡也金雞唱未徹玉漏滴先絶慢驚回枕上夢蝴蝶起秋聲四野撼林梢一陳凨兒劣墜天邊一點參兒趄照床頭一片月兒斜老先生覺也怪鶯兒亂啼驚蝶夢𥘉回正春凨草滿謝家池睡齁齁鼻息奕棋聲敲上紗囱日拽車聲輾過香塵地賣花聲呌轉畫樓西老先生未起莫爭髙競低休説是談非此身不肯羡輕肥且埋名隱迹嘆世人用盡千般計笑時人倚盡十分勢看髙人著盡一枰棋老先生見機住雕墻峻宇乘駟馬髙車有棗瓤金子彈丸珠沒多時做主燕昭臺巳見藏狐兔吳王臺又見逰麋􅎷子陵臺不見釣鰲魚老先生吊古會談經覽史慣作賦吟詩褁翩翩烏帽插花枝聽佳人鼓瑟開經天緯地寬胸次展嘲凨詠月長才思吐敲金擊玉欵言詞老先生俊死結詩仙酒豪伴栁怪花妖白雲邊蓋座草團瓢是平生事了曽閉門不受徴賢詔自休官懶上長安道但探梅常過灞陵橋老先生俊倒褁烏紗帽短罩白苧𫀆寬喜無拘無束舊衣冠步前村後疃看七貧七富從他換料一生一死由天斷且半真半假𬒳人瞞老先生不管耳聞時做聾眼見處推盲且逹時知務暗包籠權粧箇懵懂聽人著冷話來調㺯由人著死句相譏諷任人著假意厮過送老先生不董醉太平八首自警恰金烏去也早玉兔跟者想百年一枕夢蝴蝶有甚麼話説幹功名有若花開謝享榮華相比燈明滅競錢財情似影盤踅老先生意歇向山村靜處築茅舍幽居任教他日夜儘貪圗使身心受苦大粧妖幾箇登豪富強爭頭幾箇張名譽乍施逞幾箇鐵規模老先生笑汝恰門前雨歇又屋角雲遮愛青山四面緊圍者笑無休話説玳筵前朝日添歡恱翠屏邊每夜知疼熱畫堂中整月最驕奢老先生笑也三家彎路邊五岔口門前撫孤松終日自盤桓喜山居過遣愛嵐光瑣洞青如靛看煙光明媚白如練玩波光瀲灔碧如天老先生對眠看白雲萬丈映翠竹千竿賦歸來飽飯兩三餐晃韶光過眼怕行舟逺使追張翰倦登樓爛醉思王粲緊關門髙臥效袁安老先生意懶清凨生樹梢明月上花梢畫堂深不換草團瓢向蓬囱笑傲喜歐蘇翰墨難能效慕班楊才望何能到講程朱義理怎能學老先生看了不經啇販茶莫在縣裁花就安排村裡做莊家要尋常淡雅向東臯冒雨扶犁耙去西坡帶露鋤苗稼對南山映日看桑麻老先生傲煞孝劬勞父母敬逺近親屬棄功名多讀聖賢書感唐堯帝主謝天恩放道休官路省人情置所安身處盡公心得𥿄護身符老先生願足醉太平六首警悟戰篤速手腳軟兀刺軀勞強支吾扶不起沈郎腰乜斜著矑老熱不熱冷不冷空􅞕躁眠不成睡不穩干黑怮頭不梳臉不洗忒鏖糟老先生病倒春容回面頰喜氣上眉睫聽吹者舞者更彈者喚紅兒在那些病形骸打掙的身子扯悶情懷抖擻的心腸熱小丫鬟簇擁定呌爺爺老先生好也稀粥湯半合軟羊肉新割不甫能自覺好也囉絮叨叨念聒撚汗貨把銚兒向爐中坐大桃皮一謎裡胡啇和有精神再不怕小兒魔老先生較可瘦身軀不懶劣病症才安等間歡笑便開顔舊凨情早􅶫入排場調音律猱兒憚倚花門説聲嗽書生訕會席中掂八義手兒慳老先生撒頑藥品須治理病體要將息這人生災殄只慿醫本不求神告鬼禮懴的鼓兒鼕鼕擂看經的鑼兒璫璫擊一任他小的每亂胡為老先生笑你列華筵玉臺會佳節金階看壽星光現彩雲開衆神仙到來三千年福壽增髙大五百年恩寵春常在一萬年歡會永和諧老先生樂哉醉太平四首嘆世散牛羊漢塜走狐兔秦宫一般消灑月明中競虛名閗勇一身罪惡千鈞重百年勳業三生夢五湖煙水一帆凨飬殘軀善終陶朱公釣船晉處士田園潛居水陸脫塵緣比别人慮逺賢愚參雜隨時變醉醒和閧迷歌宴清濁混沌待殘年休果波屈原人皆嫌命窘誰不見錢親水晶丸入􅔇糊盆才沾粘便滚文章糊了盛錢囤門庭改做迷魂陳清廉貶入睡餛飩胡蘆提到穩君唐虞聖明臣伊吕廉能兆民簫鼓賀豐登舊凨流老成貪婪花酒酬歡慶留連歌舞添杯興糊突夢魂有誰醒大家醉太平醉太平四首春夏秋冬情思啼春殘杜鵑掃花落鞦韆杏桃張錦栁含煙供相思淚眼啼痕界破殘粧面離情題遍緑紈扇新愁寫滿碧雲天無一箇鴈傳碧紗厨錦囊紫藤簟牙床榴花噴火晝𥘉長夢回時念想朱顔逰子常飄蕩紅粧仕女空凝望青鸞舞鏡自慚惶遣愁人斷腸轉梧桐月影穿簾幕秋聲衣裳微露暮寒生入深閨户扃芭蕉凨㝎羅幃靜麝蘭香散鴛衾剩轆轤聲斷夢魂驚盻不到五更寒梅開正濃斜月淡煙籠東簷鐵馬戰西凨動凄涼萬種恨君絶念離情重思君不見牽心痛見君無語正歡濃覺來時夢中又凨流老兒倒溜油黑染了鬢絲旋添綿紅暈了丰姿拄一條仙杖是連枝將縷金腔教子錦圍屏布列在香山寺翠紅鄊出落著耆英志花胡洞傳寫的壽星詞是一箇凨流老兒又凨流病叟就輕紅焐手喚小玉扶頭少年狂翻做老來羞不傷春便中酒腔腔咳肺因花嗽稜稜衰骨耽花瘦蕭蕭白髮為花愁是一箇凨流病叟又凨流散仙小鶯花洞天間凨月芝田長生會上舞蹁躚聽瑶池管絃噀香醪曽赴金鑾宴幻名花曽到藍關甸步芳春曽入武陵源是一箇凨流散仙又凨流秀才論文章舞臺赴考試花街束修錢統鏝使將來把西廂記注解演樂􅈦揑下酸丁怪教學堂賖下勤兒債看書幃苫下女裙叉是一箇凨流秀才又凨流貴師鉢盂為酒巵錫杖做花枝晌古麻紅褪染胭脂戴左雞帽兒撇花鈸屏旁撲察為佛事呪花米一六兀刺談文字揚花幡吸喨胡突唱畨詞是一箇凨流貴師又凨流舍人玉兔鶻粧著帶根金孔雀繡著襴裙皂皮靴刺著倒提雲答納珠墜著耳輪許猱兒一夜一箇夫人分嗊撅丁一日一箇從良運閧虔婆一句一箇改家門是一箇凨流舍人又凨流故友掃愁懷玉帚釣詩興金鈎相逢索喚不曽休直喫的醉醺醺罷手夢池塘每夜同衾宿宴秦樓數遍相携手入桃源幾度共追逰是一箇凨流故友又凨流縣宰晉潘安俊材宋栁玉情懷陶淵明歸去向彭澤都是貪花秀才似河陽桃李春凨在似江樓夜月扁舟待似東籬詩酒菊花開是一箇凨流縣宰又凨流令史銅駝巷判詞金斗那分司麗春園雙漸拜為師李孔目是他老子攛廂時勘問些煙花事刷卷時改抹些鴛鴦字斷案時出脫些燕鶯兒是一箇凨流令史又凨流小著青衫會耍騎竹馬學蹅紫鸞簫打捷譏手中拏未曽行要串瓦玉溫柔懷抱裡聲嗚啞翠娉婷幃幕裡學説話錦糢糊禋褥上恰能􅐡是一箇凨流小又凨流客人鶯花市販本凨月店調箏懷揣掌記入花門似茶鹽鈔引識江湖深淺船兒運品姿才髙下心兒順散恩情輕重等兒分是一箇凨流客人又凨流太醫製牡丹在栁堤採芍藥在花溪千金方權改做樂章集看傷春脈息洞春膏靈驗曽調治素女論玄妙常􅌻記房中術幽奧頗能知是一箇凨流太醫又凨流小僧雨雲臺講經凨月所修行小禪床擺列錦幃屏習煙花密乘細樂中嚮盞是天王磬撇末中靠背是菩薩幀舞旋中歌曲是禮佛聲是一箇凨流小僧凨流道姑褁琅函繡袱鑄鸂􅥩香爐縷金詞改做玉樞讀把青天歌舞做鷓鴣玉淸菴認做章臺路長生録寫入􅊚緣簿九陽巾換做翠冠梳是一箇凨流道姑又凨流醉翁阮步兵眷寵李太白遺凨殷勤翠袖捧金鍾共歡娛興濃紫駝牽載的葡萄甕金龜換暢飲酴醾洞玉山頽扶入牡丹叢是一箇凨流醉翁又凨流乞兒破瓦窑綴詞悲田院吟詩一生衣祿在于斯窮則窮浪子唱一箇蓮花落不忘傳心事挂著箇舊爻槌常入煙花市做得箇乾凨情纏那女嬌姿是一箇凨流乞兒又凨流樂官開呵時運寬發熖處堪觀薦子梁把戲數十般盡都曽教管能歌時曲能蹅爨能翻古本能粧判能收新韻助倩歡是一箇凨流樂官又凨流女娘花衢中古場栁陌裡名揚氷肌玉骨自然香伴知音粉郎多溫柔多嬌媚多情况能吹彈能編揑能歌唱會言談會耍笑會梳粧是一箇凨流女娘又凨流妳妳肉鰾膠怎解錦套索難開兔羔兒子弟撞將來不亡魂也喪魄眉兒來眼兒去先賖下凨情債擔兒沉價兒重髙抬著煙花賣酒兒烘情兒熱冷句子甲􅶫來是一箇凨流妳妳又凨流姐姐𥿄糊鍬莽鐝銅磨笴疾菱陽關一曲唱三疊但沽著㺯撅點朱櫻檀口噴蘭麝壓秋波眉黛彎新月露春蔥纎手慣𫾣徠是一箇凨流姐姐又重陽無酒釀寒凨似刮催詩雨如麻東籬寂寞舊栽花上心來悶殺孟參軍整烏紗低首頻嗟呀陶縣令掩柴扉緘口慵扳話蘇司業檢奚囊彈指告消乏白衣人在那答又逰春友不至芳塵衮衮香霧氲氲東凨何地不精神流鶯也喚人栁屯雲護錦城闉兩岸黃金嫩杏酣春映山村萬樹胭脂噴草鋪禋褥繞湖濵一片緑絨新不間逰是蠢又輪蹄冗雜羅綺交加東凨無地不繁華莊農也戲耍倚谽谺惡丫槎老樹臨溪汊閙唧喳隔山花好鳥鳴山窊蕩光滑亂明霞流水接天涯不間逰是儍又書所見二八年艷娃五百歲冤家海棠亭畔玩韶華無褒彈俊雅臉慵搽倚囱紗翠袖氷綃帕步輕踏涴塵沙錦靿青綾襪笑生花喚烹茶檀口玉粳牙美人圗是假又閨情惜花人那廂吹簫侣誰行好春光翻做惡凨光三般愁怎當入蘭房恰昏黃畫角偏嘹喨掩紗囱未思量杜宇聲悲愴上牙床正恓惶鐵馬越丁當不傷心也是謊又歡情樂間身酒酡乘髙興詩魔詩酬花酒債偏多儘虛名負我鸞簫寫恨銀箏和鳯杯挹醁金橙破雲囱並枕玉人歌快活也快活又離情積間愁渭城分離恨長亭戀君無計送君行唱陽關蹇情一篇疊怨雙愁聽一杯別酒君休剩一聲保重淚如傾則離心最疼一學老叟狂越羅衾尉貼蘄竹簟鋪設象牙床琥珀枕鳯頭結三般兒打疊鳯頭結綰不住心狂劣象牙床溫不暖情嬌怯琥珀枕辟不斷性乖斜賺殺人也麼姐姐二恰珠樓宴徹把玉液斟竭困朦騰嬌眼半睁者綻桃花嫩頰步香塵立不穩金蓮趄啓朱唇語不定嬌鶯咽軃烏雲扶不起緑鬟斜醉