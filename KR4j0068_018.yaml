front:
  text: 雍熈樂府卷之十八
  hash: sha256:9018f71d1a5730396f1c6a2110644d32b8e5932d1295f3299b734509c6510953
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_018-1a}
body:
  text: 雜曲朝天子二十關㱕隱汪元亨作新詩吟興濃香醪量洪好花挿烏紗重百年世事苦匆匆莫把眉頭縦鷗鷺新盟雲山清興逺紅塵俗事冗假石崇運通使范丹命窮總一枕南柯梦長歌詠楚詞細賡和杜詩閑臨寫羲之字亂雲堆裡結茅茨無意居朝市珠履三千金釵十二朝承恩暮賜死採啇山𬗋芝理桐江釣絲畢罷了功名事住茅舍竹籬穿芒鞋布衣啖藿食藜羹味兩輪日月走東西搬今古興和廢蕙帳低垂柴門深閉大齋時猶未起嘆蘇卿牧羝笑劉琨聴雞睡不足三竿日任薫蕕不分儘玉石共焚由人海魚龍混長歌楚㱔吊湘䰟誰待㸔匡時論身重千金舌緘三寸坐時安行䖏穩醉㸔山倒樽醒讀書閉門無半點塵俗悶榮華梦一塲功名𥿄半張是非海波千丈馬蹄踏碎禁街霜聴㡬度頭雞唱塵土衣冠江湖心量出皇家麟鳳網慕夷齊首陽嘆韓彭未央早納𥿄風魔状功名辭鳳闕浮生寄蟻穴醉入黄雞社取之無禁用無竭江上凨山間月基業隋唐干戈吳越付漁樵閑話說酒盃中影蛇枕頭上梦蝶二十載芲開謝繁華景巳休功名事莫求算富貴難消受匡廬掛在屋西頭終日㸔雲出岫瓜地深鋤茅菴新構醉翁意不在酒厭襟𥚑馬牛咲衣冠沐猴拂破我㱕山䄂朱顔去不囬白髪来暗催黄金盡将時背窮居野䖏保無危俯仰心無愧秋菊宜飡春蘭堪佩度流光如逝水髙陽池舉杯㶚陵橋探梅傲殺王侯貴身不出敝廬脚不登仕途名不上功勞簿窓前流水枕邊書深叅透其中趣大澤誅蛇中原逐鹿任江山誰做主孟浩然跨驢嚴子陵釣魚快快煞閑人物風俗變甚訛人情較太薄世事䖏真微末收拾琴劍入山阿眼不見髙軒過性本踈慵才非王佐守一丘并一壑算人生㡬何驚頭顱半皤怕干惹蕭墙禍雲林逺市朝烟村絶吏曹凨景隔長安道淋漓醉墨濕宫𫀆詩酒把王侯傲南畆躬耕東皐舒嘯㸔青山終日飽携一琴一鶴做半漁半樵人不識予心樂色侵堦碧苔䕃當門綠槐香滿瓮黄韲莱青山招我賦㱕来放浪形骸外漢室三傑唐家十宰数英雄如過客置軒車第宅積子女玉帛見多少成和敗逐東凨㸔芲鋤明月種瓜趂春雨耘苗稼堪嗟塵事手摶沙較世味如嚼蠟杖屨梅邊琹樽松下鎻心猿拴意馬鴟夷泛海槎陶潜休縣衙入千古漁樵話意隄防若城口緘守似瓶心磨拭如明鏡滄波照影鬂星星莫行險圖僥倖松菊幽懐蓴鱸髙興樂桒榆淹暮景手執玉捧盈足臨深履氷固君子知天命兩眉舒不攅一身閑盡拚百事了無羈絆霜侵兩鬂漸成斑嗟暗裡年光換小可盃盤尋常烟㸑客来時随意欵喜情歡量寛樂心廣體胖生與死由天㫁結構就草菴葺理下藥籃整頓挑詩擔蕭蕭白髪不勝簮羞對青銅鑑絶念榮華甘心恬澹安樂窩分付俺飲壷觴半酣共漁樵笑談喬公案無心勘白茅葺短簷黄蘆編細簾紅槿挿踈籬塹詩成一笑寫霜縑誨不厭學不倦伴侣猿鶴生涯琴劍設柴門常自掩沽村醪價廉挑野菜味甜絶㫁了功名念百篇詩細吟一壷酒自斟半間屋和雲賃粗衣淡飯且消任得温飽思量甚世態團蜂人心毒鴆是和非都在恁枕床頭素琹坐門前綠隂梦不入非熊䜟訪壷公洞天謁盧仝玉川住潘岳河陽縣漢家陵寝草芉芉嘆世事雲千變暮鼓晨鍾秋鴻春燕随光隂閑過遣結茅廬數椽和梅詩㡬篇遂了俺平生願染凨霜鬂斑際風雲興䦨躭風月心全慢天公容我老来間且喫頓黄􅐽飯並䖏賢愚同爐氷炭恠先生㱕去晚拜韓侯上壇放張良入山誰身後無憂患朝天子四季隱樂張雲荘作逺村近村烟靄都遮盡隂隂林樹曉難分時聴黄鸝韻竹杖芒鞋行穿花陣約漁樵共賞春日新又新是老子山林運自酌自歌自把新詩和人間甲子任由它壷裏乾坤大流水當門青山圍座樂陶陶閑快活綠蓑醉呵向雲錦香中臥此芲甚佳壮秋色東籬下人間凡卉不如他傲得凨霜怕玉蕋瓏葱瓊枝低壓雪香春何足誇羡煞愛煞覷一覷千金價此杯莫推雪片雲間墜火爐頭上酒頻煨吃得醺醺醉不避凨寒将詩尋覔咲㐮陽老子痴近着剡溪夜黒險凍殺来不得朝天子逺山近山兩意氷絃散行雲十二擁翠鬟攙不定春凨幔錦帳琵琶司空聴慣險教人喚小蠻粉殘黛减正好向燈前㸔榮華梦一塲功名𥿄半張人海波千丈馬蹄踏遍禁街霜聴㡬度頭雞唱塵土衣冠江湖心量出皇家麟鳯網慕夷齊首陽嘆韓彭未央早納𥿄凨魔状功名辭鳯闕浮生寤蟻穴酔入黄雞社取之無禁用無竭愛江凨山頭月㙋業隋唐干戈吴越付漁樵閑話説酒盃中影蛇枕頭上梦蝶恰便似花開謝繁華景巳休功名事莫求富貴難消受匡廬勝㮣屋西頭終日雲生竒岫瓜地新栽茅齋新構酔翁意不在酒厭襟𥚑馬牛咲衣冠沐㺅上拂破㱕山䄂鴨般錦𫀆猩血般戦𫀆送了些呆神道農家自古有下稍不識長安道淺種深耕無甚煩惱臥東囱日影髙芭棚下飯飽麥塲上酔倒快活殺村田樂朝天子題情逺山近山兩意氷絃散行雲十二擁翠鬟攙不定春凨幔錦帳琵琶司空聴慣險教人喚小蠻粉殘黛减正好向燈前㸔錦箏玉笙落日平湖浄寳花觧語不勝情翠䄂金波瑩蘓小堤邊東凨一另怕羞殺林外鶯方酒醒梦驚正好向燈前聴玉舟漸収淡淡双鵞皱鴛鴦羅帶㡬多愁繫不定春凨瘦二八芳年花開時候酒添嬌月帶羞酔休睡休正好向燈前候羙㢤羙㢤忙觧䦨胸帶鴛鴦枕上口揾腮直恁麽腰肢擺朦朧咲臉由他搶白且寛心權寕耐姐姐妳妳正好向燈前快朝天子隠逸朱顔去不回白髪来暗催老大将時背窮居野處保無危俯仰心無愧秋菊宜飡春蘭堪佩度流光如逝水髙陽舘舉杯㶚陵橋探梅傲殺王侯貴身不出敝廬脚不登仕途名不上功勞簿門前流水枕邊書自得其中趣世態炎凉人情反覆賴蒼天常做主孟浩然跨驢嚴子陵釣魚快活閑人物凨俗變易悪人情較大薄世事真㣲末掛冠㱕去向山阿眼不見髙軒過性本踈慵才非王佐樂一丘并一壑算人生㡬何驚頭顱巳皤不惹無端禍雲林逺市朝烟村絶吏曹凨景隔長安道淋漓酔墨濕宮𫀆詩酒王侯傲南畆躬耕東皐舒嘯㸔青山終日飽携一琴一鶴做半漁半樵誰識予心樂朝天子埜興色侵堦翠苔隂當門綠槐香滿瓮黄􅐽菜青山招我賦㱕来放浪形骸外漢室三傑唐家十宰数英雄如過客侈軒車第宅置子女玉帛見多少成還敗逐東凨㸔花鋤明月種瓜趂春雨耘苗稼堪嗟塵手摶流沙嘆世味如嚼蠟杖履籬邊琹樽松下鎻心猿拴意馬鴟夷泛海槎陶潜休縣衙千古漁樵話防姦意若城守拙口似瓶磨拭的心如鏡滄浪照影鬂星星莫行險圖僥倖松菊幽懐蓴鱸髙興修桒榆臨暮景手執玉捧盈足臨深履氷君子知天命兩眉舒不攅一身閑都拚百事了無羈絆霜侵衰鬂漸成斑暗裏年光換小可盃盤尋常烟爨客来時随意欵情懽則量寛心廣則軆胖生死事由天㫁朝天子樂芲耍些咲些休辜負梁園月好花好酒好時節喜遇中秋夜舞者弹者吹者唱者儘今宵沉酔也喚紅兒在那些悄聲兒對説将樽爼重排列老来恰乖㑹受用能躭待好時儘我自開懐列宴同歡愛酔眼朦朧何妨何碍玩銀蟾離大海喚紅兒将酒釃醒又醉放懐曉月轉西楼外玉奴酔扶花底尋㱕路銀屏画屋錦糢糊處處天然富萱草堆金梨芲積玉㸔輕飛蝶亂舞綠囱前纔睡足再歌弹再舞任賔鴻来還去吿天可憐且容我身康徤好花休謝月常圎遂却平生願羙滿􅊚縁歡娱繾綣儘今生同過遣喚紅兒在那廂整雲雨不妨諧老同心戀朝天子幽居結構就草菴葺理下藥藍慗頓挑詩擔蕭蕭白髪不勝簮羞對青銅鑑絶念繁華甘心恬澹安樂窩分付俺飲一觴半酣共漁樵話談喬公案無心勘白茅葺短簷黄蘆編細簾紅槿揷籬塹詩成一咲寫霜箋柴門常閉掩伴侣猿鶴生涯琴劍學不厭誨不倦沽村醪價廉挑野菜味甜全忘了功名念百篇詩細吟一壷酒自斟小屋和雲賃粗衣淡飯且随心温飽思量甚世態團蛇人情毒鴆是和非都聴恁枕床頭素琹臥門前綠隂梦不入非熊䜟訪壷公洞天謁盧仝玉川潘岳河陽縣漢家陵墓草芊芊世事雲千變暮鼓晨鍾秋鴻春燕随光隂閑過遣結茅廬数間和梅詩百篇遂却俺平生願朝天子放懐忖量這老懐揣摸這壮懐有變化多竒恠壮懐不减老懐開虎瘦雄心在磊磊落落寍為玉砕這胸襟寛似海世情漸乖光景漸衰獨有寒松耐打疊起病懐閤掛起倦懐凨月情元来大也無煩惱也無哀誰咲狂無賴得失榮枯青霄雲外酔来時天地窄人情冷㢤世事恠㢤惟我樽前在散春凨好懐徹壷漿雅懐任從容無些害人情冷暖自安排任他翻興敗鏡中未老樽前常在嘆逄冠誰去觧咲顔放開酒船載来酔臥妨何碍有花時暢懐有酒時放懐這勾當人人愛花枝前擁酒盈釃花酒精神大醒時無愁酔時無害孟甞君空有客光隂旋捱消息任来莫眉頭債朝天子述古人伯夷叔齊喜虞舜傳堯位武王伐紂悪戦敵耻周粟湯仁義死塟屍骸清名難立天䘮身不䘮徳願為餓死恨不遇羲皇世太公受窮有誰識真梁棟安居乆待暦数通兆先入非熊梦偶遇文王雲龍相從便能為百代功倘蒙不逢人與藝皆無用范蠡相國因主辱思良計平吴事了復㑹嵇将三致千金費臣有餘謀君心長疑不㱕湖等甚的自評自議君與臣皆賢智孔明自耕劉玄徳親徴聘茅廬一論帝業興漢鼎峙三分定六出祁山施呈才能志平吞吳魏兵蜀方太平國祚短天絶命太白大才時不遇将何奈明知帝主蓄禍胎相林甫朝綱敗以酒忘憂以酔忘懐學劉伶死便埋可哀痛㢤江月滿人何在楚王漢王祖龍死烟塵蕩鴻門㑹上那一塲得用也英雄将先到咸陽為君為相斬白蛇應上蒼韓侯智量子房共蕭丞相屈原命舛懐忠正讒臣謗唐虞盛治不再傳思王道無由見舉世獨清執中無權反能為漁父篇可憐大賢死不肯随機變賈誼為國献長策驚天地君臣之際有間隙上不能從其計時務和他明知相違愁無人扶漢室太息痛泣都滴盡傷時淚子房智量考天道炎劉盻韓彭㓕了楚覇王功盖世辭卿相馬啄無恩親誅二王想留侯好見長廟堂配享播萬載髙名望子陵本情以垂釣乗髙興潜居要學魯二生恨文叔知名姓一足髙蹺君王親擎客星曽犯帝星遇酒滿斟酔了重還醒朝天子梅雪孤芳暗香正雪霽梅花放可愛西南凍枝傍掛新月蛾眉様出墙横囱踈影昏黄恰詩人准備賞怎當㫁腸品寒角南楼上氷消雪消漸减却山容老推倒泥牛出東郊見遍野梅芲落市橋溪橋教人知道點紅花㺯翠條花梢柳梢報次第春来到梨花栁花凨外舞空中下天地氷壷玉無瑕竹枝偃梅梢壓銀沙瓊沙㳽漫抛撒近青旗纜釣艖漁家酒家映一帶山如画氷花雨花片片墜紛紛下瓊田萬頃絶繊瑕塩虎䧟蒼龍壓玉沙銀沙空中亂撒凍梅低傍釣艖陶家党家映一抺王維画朝天子詠羙素雲瘦踪飽載􅓸波重玉蓮歌罷紫芝凨太液金波動明月池塘黄昏誰共碧澄澄羅韈冷錦封翠濛蛩驚散鴛鴦梦玉徽玉梅摇落双雲佩紫芝天苑鳯凰飛忽變琉璃脆欲買湖舡今宵同酔酒未醒月漸低氷絃漸離消弭盡凨雲氣翠梳淺鋪粉汗香塵素画䦨誰與月同孤試聴髙唐賦雲堆玉梳多情眉宇有離人愁萬縷若還寄取羅帕上題詩去柳腰翠裙不似昨宵困碧凨吹散曉囱雲花落佳人鬂壁月多清黄昏誰近素盈盈羅帕塵淚痕尚存湏寄與東凨信朝天子嘆世暢㢤快㢤極目乾坤大不知何處是彭澤有箇淵明在放蕩形骸由他成敗到重陽菊自開去来去来不怕青山恠省也悟也人死如燈㓕光隂疾似下坡車白髪捱年月富貴貧窮前生冤業鬼争争蠅競血富者貧者水底撈明月要足便足湏索㱕山去樽前無厭酒頻沽一任功名誤宰相王侯英雄人物轉回頭化做土自古細数宫闕廢千處得閑且閑已過中年限浮名薄利莫相干静梩睁睛㸔邯郸長安皆是虚幻属漁樵一論間山居自安不管唐和漢朝天子離思長亭短亭是日分鴛頸関山萬里此離情縈繫的人成病長短燈檠知人孤另強支持秋夜永蛩聲雁聲逗引起凄凉興千難萬難别離誰曽慣當時只合鎖雕鞍愁易减人難盻悶倚雕䦨羞㸔双燕對東凨淹淚眼吳山楚山阻隔㫁傳書雁新愁舊愁撮的眉頭皱思君白日且登楼怕夜晚来狐宿恨壓重衾愁聞寒漏捱一宵如九秋心頭口頭念想到三更後雲中塞鴻寒角聲相送沙平水冷月溶溶蘆花老霜寒重淮北江東烟雲無縫稍不的書一封睡中驟凨忽驚起團圎梦朝天子退隠掛冠棄官偷走下連雲棧湖山佳處草莱間掩映垂楊岸滿地白雲東凨吹散却遮了一半山子陵釣灘韓侯将壇那一箇無憂患栁堤竹溪日影篩金翠杖藜徐步近漁磯㸔鷗鷺閑逰戯農父漁翁貪營活計似王維画圖裡幽幽景致清清興趣無酒也令人酔自劾退㱕用不着凨雲氣踈狂迂闊拙又痴今日纔回味玩水逰山身無拘繫三十載落下的翠㣲更竒滄浪更竒知道我閑居意翠微四圍無一點塵俗氣水聲不管是和非到處相尋覔想為吾儂心灰名利他也要随咱閑坐地寢食不離倒殢得吾先酔朝天子相思翠蛾恨鎖觧不開些兒箇愁魔病魔怎離脱行坐裡相着摸簷馬隣砧蛩吟相和助凄凉欺負我淚顆似梭羅帕揾腮淹破酒斟悶飲感離思凄凉甚良人無梦到羅衾淚滴濕鴛鴦枕衾枕無情香消寒沁砕人心蟋蟀吟夜深未寢情易感人難近恨添病染思量心何曽厭辜恩人去母又嚴直恁麽歡娱儉月舘凨亭離愁都占好教我無處閃杏臉淚淹滴不盡相思欠感懐痛㢤生剪砕合歡帶良人去乆不㱕来割不㫁情深愛紅日西沉雕鞍何在盻青鸞音信乖可哀病衰少欠他相思債朝天子述世情氣豪志髙談咲把公矦傲貧而無謟富無驕陋巷簞瓢樂黄卷青燈常存吾道近山林逺市朝咲他穿紫𫀆一起一箇雞兒呌仕途利途賢不肖人皆欲蝇頭蝸角苦上苦捨命争着做造物􅝇人誰曽省悟功名心無厭足自今古細数能有㡬箇㱕山去少貪莫婪好随分捱􅐽淡雖無暴富得重銜也不着坑䧟詩賦成篇琹書成担出凨波海内渰蠒蚕般脱籃硬掙㫁這功名纜左難右難枉把那功名幹烟波名利不如閑到大無憂患積玉堆金無邊無岸限来時悔後晚病患要過闗誰救的你貪心漢朝天子相思早知恁的到不如不相識前緣前世少欠伊少欠伊相思淚曽惹憂愁曽躭憔悴只今畨忒下的想伊所為落㡬聲長吁氣㡬畨近晚目㫁南来雁佳期空盻怎生慳想念的憂成患燭㓕烟消香凨𥘉散綉簾垂怯暮寒偷掩涙眼長吁氣千千遍此宵悮却陡恁的傷懐抱胭憔粉悴越添焦迤逗的心煩躁信㫁音絶特無消耗受孤恓情似燒細思量度他甚日得来到這宵怎熬𬒳一盞孤燈照促織囱外絮叨叨鉄馬兒簷前閙雁過南楼鐘声𥘉報淚珠兒滴到曉梦裡梦着驚醒人雞兒呌朝天子隠逸紫𫀆綠𫀆未若貧而樂雖然束帶立扵朝難脱邯郸道未必吾儂巢由同調一葫蘆一箇瓢儘教睡着凍宰相聴雞呌省者見麽鏡裡添白髪功名塲上㸔甚麽不入麒麟画户静門清兒成女大且随緣度歲華詩家酒家任意訪閑尋踏杜康酔鄊竹葉杯桃花醸百年三萬六千塲有恨誰無恙不覺秋霜飛来頭上正春凨倒玉觴喚将樂章燕舞鶯兒唱鋪的盖的毛毯粗衲𬒳百草為冠著麻衣淡飯􅐽塩味竹屋柴扉終日深閉釃村醪輪瓦盃陶朱棄職是逺害全身計朝天子詠羙想咱念咱玉有價春無價秋波生潤臉如芲兩葉眉兒画口兒頻掂心兒牽掛告神明合暗察病殺害殺未得句明白話晚晴月明一色瑶天静夜香燒罷步閑庭躡足行潜踪聴翠檻朦朧雕䦨掩映元来是凨㺯影此情此心管害入相思症心攘意勞作念無顛倒胭憔粉悴轉心焦陡恁的傷懐抱信㫁音絶杳無消耗捱火宅熱厮燒這煩這惱想殺人誰行告眉峰恨鎻未展些兒箇愁神病鬼怎祛脱害的咱無着模鉄馬頻敲蛩吟相和助凄凉禁仗我淚顆似梭羅衫濕腮揾破朝天子逸興日居月諸㫁送了人無数自從開闢你試数誰不到印山路何况吾儂些兒名譽電光中誰做主老夫志趣把烏兔常拴住恰隂却晴来和往何曽㝎湖光山色晦復明能㑹把人調㺯一叚幽竒将何酬應吐新詩字字清錦鶯數声又喚起逰山興錦屏翠屏極目山無罄白雲忽向樹梢生似林影波光㝎故把清凨動摇遮映水和山俱有聲半隂半晴天意也還相應梅溪竹村逺近相遮映隣笛吹徹曉未分聴一派鸞鶴韵竹杖芒鞋穿花步趂覔知情漁父吟陶情適興也不弱林和靖朝天子題情画橋邊栁枝粉墙頭杏枝春去人獨自粉郎不見許多時冷落鶯芲市為甚憂愁教誰扶侍病懨懨真似死栁結成穂兒花退却瓣兒都做了眼中淚心頭事又梨花月梦雲桃花雨送春鶯燕無情分落紅滿地掩重門不見㱕来信逰子何之丫鬟休問悶懨懨憔悴損羅衫上淚痕粉腮上枕痕都做了眼中淚心頭恨又蔷薇架露鮮海棠軒月圎悄悄閑庭院雕鞍别後夜如年何日重相見錦字書牋香羅題遍寫佳人薄命篇眉尖上墜鈿指尖上㫁絃都做了眼中淚心頭怨又塵蒙了錦箏香消了翠屏恨殺人孤另自從別後憶多情無福和薄倖暗想􅊚緣湏関前㝎似江心撈月影淅零零雨聲虚飄飄梦境都做了眼中淚心頭病朝天子村樂翠林綠隂都把紅塵禁老夫從此豁烦襟毛骨如氷沁七尺藤床一枚石枕聽新蝉葉底吟飢時便吟渇時便飲更待思量甚玉田翠烟鸞鶴聲相喚青山揺動水中天沙鳥都驚散物外凨光同誰逰翫有蓬莱海上仙綽然四邊雲烟滿眼助我騷人願牧笛酒旗社鼔喧天擂田翁漁父喜投機酔舞頭巾墜吾放踈狂逢塲作戯樂陶陶飲数杯江恬月黒雨過酔㱕踏得雲烟砕醒来又来親謝東君愛山肴重列酒延盃烏兎從他快縦飲狂歌精神康泰喚童兒