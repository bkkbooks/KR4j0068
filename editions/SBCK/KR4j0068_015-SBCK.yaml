芲落重門掩薄倖不来羞覩画梁燕天涯咫尺情人逺路阻藍橋無由得見天若是肯周全除非是梦􅂻相逢把我離情訴一遍慢折長亭栁情濃怕分手欲上雕鞍去扯住羅衫䄂問道㱕期端的是甚時候回言未卜佳人竒偶唱徹陽關重斟羙酒酒除非是觧消愁我只怕酒酔還醒愁懐又依舊園􅁐飄㣲雨金凨蕩飛絮有意傷春恨無計留春住􅀝遍闌千黙黙俏無語雲山萬疊空凝目我的情人知他在何處吁欲待􅀉封書争奈路逺山遥没箇便鴻去肆舘香雲擁􅁫分小金鳯為你多嬌態惹起愁山重月冷黄昏􅀌燈與誰共情人悞我良宵梦画角頻吹梅芲三㺯凨休吹入綉幃中只怕惱動我離情教我相思轉加重月児髙四時綉陌芲開遍芳郊正春妍綠栁拖金細紅杏飄香逺去􅀊情人芲開共歡宴今春謾自謾自園林羡思憶多才羞觀双雁天何時再團圎空教我坐想行思辜負了艶陽天海榴開紅熖池荷泛青錢帶綰和誰共簟枕同誰展對景恩情蹙破兩眉尖年時水閤水閤開排佳宴戯水鴛鴦教人羞見天青天肯方便早見俺那冤家同歡納晚天凉夜雨芭蕉􅀾秋凨雁聲逺驀覩鸞牋字病憶多嬌面曽記分離嘱付去時言㱕期暗約暗約重陽見未見多情木樨早開遍天月児慢團圎争奈獨守􅀌幃難捱暮秋天画閤空粧遍紅爐謾空展縦有羊羔酒共誰同歡宴轉目年華不覺度芳年冤家那􅂻那􅂻共誰厮迷戀痩損香肌殘粧嬌面天六出飛亂綿争奈枕冷衾寒難捱暮冬天七犯玲瓏思情新紅上海棠猛然情慘傷前春有箇人共賞今日在何方早把春心蕩免教人㫁腸細思量誰真誰謊自古佳人薄命怨燒㫁頭香想挑芲也㑹憶劉郎恨逺山無計留張敞芲隂月影㸔㸔過墻朝雲暮雨睡覺夜長捱得今宵過明朝又怎當鶯児對燕子双飛来飛去為誰􅋉偏不到伊行芭蕉映粉墻綠隂清晝長炎天倍覺心悒怏獨坐傍南囪暮雨消繁暑慢凨生嫰凉㸔池塘鴛鴦兩兩世上有情都匹配偏我不成双碧紗㡡鬆透玉肌香􅃢瑚鈎誤觸氷絃響浮􅀲沉李共誰舉觴調脂㺯粉為誰曉粧懶向金盆浴盈盈自觧裳腰如栁軆似霜無人共試紫蘭湯空惹舊心狂金凨透小囪不禁羅䄂凉秋来怕上危楼望舉目總堪傷衰栁垂寒雨敗荷擎晚霜擊玎璫􅉉前馬嚮最恨今宵更漏一似去年長㸔銀河織女㑹牛郎想嫦娥一様情惆悵􅀙来􅀌雁傳書故鄊縁何今日渾無半行想是恩情薄非干路渺茫芙蓉老菊蕋黄瀟瀟凨雨又重陽越越减容光江梅綻早芳雪芲籠錦堂􅀌眠分外寒威壮怎不倍恓惶想他身上不知寒與凉懶梳粧當年模様思憶千般促擁不是負心郎枕邉廂閑了綉鴛鴦擁香衾撇下紅羅帳淺斟低唱當年洞房山盟海􅊎何時象床曽見燈開蕋還聴鵲遶梁朝朝拜夜夜香依還㱕也謝穹蒼􅂅得永成双綿搭絮思情當􅀄奴愛你聡明和你月底星前吐膽傾心説􅊎盟暗偷期膽􅀾心驚怕人瞧見掩耳偷鈴本待要棄了你箇冤家刀攪我心腹教奴怎不害疼誰想你另有了女裙􅁫􅂔的奴似酔如痴斜􅀝定幃屏故意兒猜不明白怎肯丢􅄏傳書􅀉柬你又不来你若還負了奴的恩情人不為讎天降灾奴家又不曽愛你錢財只愛你箇可意的冤家知重知䡖情性兒乖奴本是朶好芲児園内􅀄開蝴蝶児飡破􅂯兒不来我和你黒海般恩情前世􅂻姻縁今世􅂻該心中轉轉兩三翻痩損了香肌茶飯上無心珠淚連好心酸禱吿青天非奴䡖賤也是前緣怎下的抛閃了奴家要和你離别難上難當􅀄奴愛你凨流共你剪􅄠燃香雨態雲踪兩意綢背親娘和你情偷怕甚麽傍人講論覆水難収你若是負了奴真情正是緣木求魚空自羞心中猶豫輾轉成憂常言道女子痴心惟有情人意不周是我迎頭和你情偷鮮芲付與怎肯干休你如今另有了知心海神廟威靈把状投奴今為你好沒来由又不曽圖覓了東西􅀉柬傳書惹下愁搥胸埋怨滴淚含羞奴為你枉躭了虚名好似画餅充飢枉用了謀
