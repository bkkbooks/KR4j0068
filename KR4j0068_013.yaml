阻紫花兒序瘦岩岩香消玉減冷清清夜永更長孤另另枕剩衾餘羞花閉月落鴈沉魚躊躇從今後誰寄蕭娘一𥿄書無情無緒水淹藍橋夢斷華胥調笑令肺腑恨怎舒三疊陽關愁萬縷幽期密約歡愛處動離愁暮雲無數今夜月明何處宿依依古岸黃蘆鬼三台歡笑地不堪舉目回首處景物蕭踈星前月下誰共語謾嗟吁何如尾聲眼睜睜怎忍分飛去痛殺我也吹簫伴侣不付能恰住了送行客一帆風又添起助離愁半江雨鬪鵪鶉閨情挑繡也無心茶飯不應口付能打疊起傷春誰承望捱不過暮秋暗想情懷心兒裡自羞兩件兒出盡醜臉淡似殘花腰纎如細栁𬗋花兒序愁的是針拈著玉笋怕的是燈點上銀缸恨的是簾控著金鈎赤緊的爺娘又不解語話也難投休休央及煞眉兒八字愁靠誰成就鳳隻鸞孤幾時能勾燕侣鶯儔么篇想殺我也枕頭兒上恩愛盻殺我也懷抱兒裡多情害殺我也𬒳窩兒裡風流渾身上四肢沉困迅指間一命淹留休休方信道相思是歹證候害的來不明不久事做的沾粘到如今潑水難收尾聲實丕丕罪犯先招受直到折倒了龎兒罷收若不成就美滿好姻緣則索學文君駕車走鬪鵪鶉雙陸四角盤中三十騎裡多少機關包藏見識席上風前花間樹底豈鬪剛各論智盤樣新竒聲清韻美𬗋花兒序月兒對渾如水照夕兒花有若雲生點兒踈恰似星稀馬兒齊擺下色兒大休擲會撚色的便宜更遞馬雙行休倒提雖慿色難同使力遞有髙低要識遲疾天淨沙盤中排營寨城池眼前無弓箭旌旗心內有刀鎗劒戟局面兒幾般形勢似英雄征戰相持小桃紅散二似蕭何追韓信待回歸衆軍士傍觀立散三似敬德趕秦王不相離有叔寶後跟隨百一局似關雲長獨赴單刀會收到這其間有幾􅑿了的百中無一輸了的似椘霸主刎江湄三台印兩家局安營地施謀智似挑軍對壘等破綻用心機色兒似飛沙走石漢髙皇對敵椘頃籍諸葛亮要擒司馬懿那兩箇地割鴻溝這兩箇兵屯渭水金蕉葉撤底似孫臏伏兵未起外划似孫武挑兵教習五梁似吕望兵臨孟水六梁似吕布遭圍下邳含笑花暗疾函谷孟嘗歸不下鴻門樊噲急失家如悮了吳元濟點頦如跳溪劉備無梁如火燒曺孟德撞門如拒水張飛小拜門把門似臨潼會裡墊頦如細栁軍圍看諸葛縱擒蜀孟獲兩下里馬來回堪題聖藥王等一擲心暗喜併合梁恨不的馬都回恰四六十又三四七更么三一二緊相隨心急馬行遲么篇犯了遲却變疾頭頦捲盡可傷悲色不隨梁不齊不甫能打的箇馬凶回他一馬走如飛么篇么五梁沒氣力么四梁終較得么三梁道喫了棧羊肥􅽂肚梁破到底單單梁無用的二梁誰道不空回則不破怎支持么篇若論遲有甚竒破著箇不打枉驅馳怕兩帖子救一道兩馬可當十巴到家不得馬休題更有截七帶去的麻郎兒到此際人難強嘴空打的馬不停蹄色不順那堪性急焦起來更加錯遞么篇著的可知見疾當局委實著迷休懼怯捱他免回如征戰要加神氣絡絲娘怕的是蓋著門墊著頦又起村的是把著馬揭著頭蓋底來到后喝著的應著的也隨邪順著人意綿褡絮明皇當日力士跟隨曽招色數殢殺楊妃因呼得四敕賜穿緋以色娛人脫布衣此物揚名出禁闈疾變為遲遲變疾白轉紅紅轉做黑尾聲翻雲覆雨無碑記則袖手傍觀笑你休把色兒填宜將世情比鬪鵪鶉贈小玉帶不辨珉玒紛紛貫耳自覩瓊瑶常常挂齒匡皋相逢荆山在此這樂名是誰賜樣稱纎腰光搖嫩指𬗋花兒序却是紅如鶴頂赤若雞冠白似羊脂是望月犀牛獨自是穿花鸞鳳雄雌是兔兒靈芝是螭虎是翎毛是鷺鷥是海青拿天鵝不是我則是想像因而你敢那就理知之調笑令細思你好瘦腰肢圍上偏宜舞柘枝性溫和雅稱芳名字料應來一般胸次色光澤瑩如美艷姿都無那半點瑕疵小沙門别是箇玲瓏樣子另生成剔透心兒為風流儘教撚斷髭不負我贈新詩新詞聖藥王重玩視巧意思羽毛枝幹細如絲溫潤資雕琢時那其間應是辨妍媸必定是明師尾聲挂金魚自古文章士未敢望當來衣紫有福后必還咱上心來記著你鬪鵪鶉妓好睡莫不是陳摶的姨姨莊周的妹妹宰豫的家屬謝安的親戚華胥夢裡姻緣邯鄲道上配匹兩件兒試問你可甚愛月遲眠惜花早起紫花兒序西廂底鶯鶯立睡茶船上小卿著昏東墻下秀英如癡真乃是棄生就死便休想廢寢忘食休題除睡人間總不知正是困人天氣啼殺流鶯呌死晨雞么篇推著倒鸞交鳳友倩人扶燕侣鶯儔合著眼蝶使蜂媒繡衾未展玉山先頽其實倒枕著床是你記得的胡突了一世恰便似椘陽臺半死的梅香蘭昌宫殉葬的奴婢小桃紅莫不是離魂倩女醉楊妃是箇有覺的平康妓難道嬌娥不出氣懵懂的最憐伊顛鸞倒鳳先及第直壓的珊瑚桄低黃金釧碎平地一聲雷秃厮兒祅廟火燒著不知藍橋水淹死合宜撧纓會上難侍立才燭滅早魂魄昏迷聖藥王子弟每做伴的安排著好夢做夫妻你也休問誰我也不答你陷人坑上𬒳兒裡直挺著塊望夫石尾聲對蒼天曽説牙疼誓直睡到紅日三竿未起若要戰退睡魔王差三千箇追魂大力鬼鬪鵪鶉露冷霜寒雲低霧黯灑灑瀟瀟凄凄慘慘眼底繁華心頭有感名利絶是非減愛的是雪月風花怕的是官民要覽紫花兒序昨宵酩酊今日糢糊來日醺酣帶一頂嵌肩􅤈笠穿一領麻衫粧一座栽梅結草庵誰能搖撼跳出這蟻穴蜂衙再不入虎窟龍潭小桃紅刀名劒利大􅮡唬碎間人膽白酒黃雞捱時暫就中甘這般滋味誰曽啖諧音人即參通經史親探世事要經諳尾聲此身有似舟無纜恣意教傍人笑咱富貴總由天清間盡在俺鬪鵪鶉題情燕燕鶯丨花花草草攘攘勞勞多多少少媚媚嬌嬌婷婷裊裊鸞鳳交沒下梢空耽了些是是非非受了些煩煩惱惱紫花兒序困騰騰頭昏腦悶急煎煎意攘心勞虛飄飄魄散魂消他丰半韻韶艷艷夭夭日日朝朝雨雨風風漸縹渺那堪暮秋天道似這般爽氣清髙那堪夜雨瀟瀟調笑令悶懨懨愁心怎熬昏沉沉夢斷魂勞秋聲和轆轤砧韻𫾣淅零零細雨灑芭蕉𥘉凋小桃紅枕寒衾冷夜迢迢旖旎人兒俏往往難成夢驚覺好心焦悲悲切切鴈兒呀呀的呌透户牖金風淅淅滴更長銅壷點點更那堪蛩韻絮叨叨天淨沙懨懨鬼病難消凄凄心癢難揉漸漸神魂散却好教人沒顛沒倒意遲遲業眼難交尾聲想當日熖騰騰烈火燒祅廟翻滚滚洪波浸畫橋明晃晃火燒此時休白茫茫水淹殺未成就的夫妻每到是了鬪鵪鶉詠小卿釋卷挑燈攀今覽古妬日嫌風埋雲怨雨因觀金斗遺文故造緑囱新語自忖度自窨服好做得是也有鈔荼啇好行得差也能文士夫𬗋花兒序蘇娘子本貪也欲也馮員外既與之求之雙解元怎羡乎嗟乎但常酬歌買笑誰再覩沽酒當爐哎青蚨壓碎那茶藥琴棋筆硯書今日小生做箇盟甫改正那村紂的馮魁踈駁那俊雅的通叔小桃紅當時去的遇嬌姝嫩蕊曽分付便和葉和根盡掘去自情踈直教他連愁嫁作啇人婦剗地進功名仕途直趕到風波深處雙泪你可愛君子斷其初金蕉葉微雨洗丹楓秀谷薄霧鎖白蘋斷滸零露濕蒼苔淺渚明月冷黃蘆逺浦調笑令那其間美女樓著村夫怎做得賢愚不並居便休題書中有女顔如玉偏那雙通叔不者也之乎他也曽懸頭刺股將經史讀他幾曽尋得箇落鴈沉魚秃厮兒雙漸正瑶琴自撫馮魁正紅袖雙扶雙漸正彈成滿江腸斷曲馮魁正倒金壷飲芳醑聖藥王雙漸正眉不踈馮魁正興未足雙漸正悶隨江水恨吞吳馮魁正樂有餘雙漸正愁怎除馮魁正寫成今世不休書雙漸正嫌殺影兒孤尾聲尋思兩箇間人物判風月才人記取將俊名兒雙漸行且權除把俏字兒馮魁行暫時與
