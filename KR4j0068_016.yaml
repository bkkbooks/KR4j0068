front:
  text: 雍熈樂府卷十六
  hash: sha256:3a0dcb6e51f5ac61bede2d851ad397f8df9cda46469617ffc9b9b7a1a7a4d25e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_016-1a}
body:
  text: 南曲綉停針慶七夕四海昇平萬國衣冠覲帝京人民樂業繁華盛時聴的處處歡聲荷聖主同天大徳逢時莭喜氣自然增蓐收司令迎利景今宵七夕共瞻星人間閬苑仙境北鬼三台碧天長浮雲靜玉露滴金風應見一道銀河千萬頃牛女㑹鵲橋成乞巧處香焚寳鼎画樓前列瓜果啓綉屏金針児閗穿翆縷輕一夜墜金井梧桐萬里共瑶空月影南山馬客玉漏頻傳不湏問㡬更列華筵綺席鼔吹笙歌窈窕舞娉婷白苧迎風爽氣生人月共清况遇着時和歲登一任教歡娛共樂太平黄薔薇試說着一京畿勝境遇七夕齊閗巧呈䏻樂繁華歡騰市井不負了良辰羙景仰望着蓬莱晃耀九華燈又只見碧霄仙侣駕雲軿遥聴得緱山子晋度鸞笙風清和月影逢盛世賞莭令樂昇平四般宜生當盛世遂安寧頻㸔瑞物表休徴神龜應兆呈金殿騶虞白象出郊埛瑞麥秀嘉禾共穎黄河水徹底澄清綱常正法度整家家相慶吾皇仁聖聖藥王皇風𬒳邊塵息警萬萬里傳流着頌聲謳歌鼓腹拚酩酊酬佳莭賀昇平福慶似雲興仰帝庭齊引領葱朧佳氣滿都城賞羙景齊歡慶普天下生民同樂際時亨遍朝野列英俊播芳馨餘音瞻星拜月焚金鼎但願得一人有慶萬萬世皇明直與天地永綉停針題木犀蕩起啇飈金井梧桐葉漸凋㡬畨雨過凉天道迤邐的把扇児慵摇頓覺得紗㡡裡似水風流處可喜娘一一妖嬈耳邊低道今宵紈扇且停摇凉似昨夜多少祝英䑓画堂深人靜悄秋意景偏好風送暗香丹桂芬芳先占沁園秋早開了此時莫惜千金花前歡咲賞心樂事湏拚沉酔陶陶望歌児天然枝枝朶朶堪画描此花有百媚千嬌不减了蟾光好四出玲瓏花枝恁般施巧是則是花頭児湏恁小直有許多般香得好五般宜折取向膽瓶中安排了香滿亭軒恍若身在蓬島皓齒纎腰那更歌舞勸香醪多嬌撚花枝時嗅微微咲咲道勝如茉莉賽過荼䕷香似沉腦四般宜攅攅簇簇縷金銷枝枝葉葉綴瓊瑶點點滴滴顔色好蕭蕭洒洒恁清髙香徑裡紅圍翆遶那堪更玉軟香嬌月児照越恁好佳人應咲嫦娥空老山馬客玉露金風是他的故交况良宵有約玳筵可􅌽如花貌逞妖嬈問道奴嬌花貌嬌人月都嬌料想丹青怎描怎消得才人下筆詠嘲憶多嬌花又好月又皎惜花人愛月眠遲起早暮暮朝朝不離花貌賞足花心任教殘英墜了江神子且莫教児童掃滿斟一任玉山倒酔来花下眠芳草贏得滿身蘭麝異香飄丰韻好尾声觀花愛月人年少但對酒當歌歡咲月夕花朝休教錯過了寨児令秋景餘近茅廬東籬下恰開三徑菊佳節纔初漁叟樵夫携手咲相呼喜今歲五穀收熟賞紅葉顔色堪圖黄鷄啄黍肥白酒如今正香浮直喫的倩人扶調咲令我向這淺處探着身軀呀慢慢的將鈎児與你垂将下去銀絲児界開波紋縷浮逰児不動纎湏低頭将錦鱗鈎上取折垂楊准備穿魚耍厮児松隂下自舞受用些新酒活魚村醪少時旋去取這江景界無虚端的堪圗聖藥王樂有餘興未足尊前無酒典琴沽唱一曲聴音吕直喫的滿身花影倩人扶與農叟咲相呼踏陣馬漁陽十題天上少世間無風流共許聰俊皆伏舉止非俗建座祠堂親供養柰何艶質難描塑倒鳳顛鸞落鴈沉魚閗鵪鶉玉自生香花䏻解語蓮歩輕移蛾眉掃緑水調習歌霓裳按舞俏模様好做處宴罷瑶池人歸月窟紫花児序恰正是春心飄蕩色膽踈狂酔眼糢糊半團香玉兩點瓊酥誰知盡日君王㸔不足似玉顆神珠俺也曽被擁鮫綃枕並珊瑚青山口翆簾低簌碧蝦鬚銀䑓明画燭綉屏圍簇錦芙蓉紅粉倒金壷無間阻生嫉妬就中醖釀機謀御筆親差領軍卒懶離長安便上漁陽路送到長亭坐散離筵侣画就陽關暮岀塞圗飲乾别酒唱徹􅌐駒各分去路痛懐衠悒怏開口是長呼更怎禁一弄児凄凉不曽離寸歩雪裡梅蜂共蝶緊相逐鶯與燕閗喧呼碧草緑楊落花飛絮歸鴻杜宇往常時恁助歡娱今日便躊躇把這一應一荅堪憎堪恨從頭児盡數麻郎児這芳草自新春長出到暮秋凋踈受天氣風霜雨露似人生得失榮枯也通世途委曲直穿連海角天隅不接引逰春翆車却粧點㫁腸詩句綿荅絮這落花滿地殘紅起有餘一樹鉛華蕾不成恰俺深閨鳳幃中錦綉鋪把賞心漸消除教酔魂越糊突誰是主半入池塘半塵汚􅌒凝佇春色共情縁到頭来總是虚金蕉葉這栁絮厮牽惹輕香暗撲相戀顧春衫倦拂細㸔来不是楊花亂舞却是征夫泪簌小挑紅這楊栁帶烟披霧嫩條舒不繫征鞍住簇滿紅塵覇陵路曉風踈温柔正要春将護纎纎瘦損依依渾似人立翆盤初天淨沙這燕子翅翩翻遶徧雲衢語呢喃驚破華胥休咲俺分飛子毋曾占緑囱朱户掖庭中来往携雏酔扶歸這歸鴈恰向愁邊絮早促望中無一片歸心何太速您巳無憂慮數點青山隱隱更勝如萬里人南去調咲令這黄鶯一從上喬木更整金衣来帝都飛入杏桃花深庭啼煞画樓風物送此行歌舊曲也不似他一串香珠絡絲娘這粉蝶勾遣荘周間阻不在東君管束􅌽請得香瑰糢糊去則向俺梦児中完聚鄭州春這逰蜂忙煞尋芳小翅羽一日花香都採足没添貨甜薺薺蜜醸出全不顧俺苦淹淹情緒東原樂這杜宇偏情理㝡狠毒赶定別離人欺負攛斷得俺區區活受苦見今日在長途尚然呌道不如歸去㸔花囬休道是愁腸肚相思肺腹假若便鐡打成銅鑄就石鐫出也難擔負早是分張丹鳳隻彩鸞孤那堪更遭逢着恁般景物眉児賺煞懶設設随軍吏矻蹬蹬信馬足遥望着錦宫髙處行一歩囬頭覷一覷眼児裡閣不定淚如珠是他仰着面嚎咷放聲哭綉停針大四景夏院落香餘緑樹隂濃复正初落花滿地飄紅雨遶画簷鶯燕相呼愛日永𫾣棋局打馬池亭上栁軃碧囱虚篆烟微裊随風度薔薇篩影入簾踈不覺散盡微暑北小桃紅碧烟淡靄暗䕷蕪洒㡬點黄梅雨菡蓞初開燕将乳見陌頭挽香車載酒垂楊路嬌鬟低唱處管絃更舒徐都說道行樂古来無南合笙皇都萬古似閬苑蓬壺遥望碧霄外錦綉鋪雕甍鎖闥連禁衢槐隂夾道蝉聲度往来逰人盡駐馬繁華處傍花随栁玉􅍡嘶過樓前去輕鞭慢控頻頻駐迤邐画橋南浦綉轂香車喧闐樂舞么篇咲談勸酒歌金縷翆鬟團扇掩羅襦索賦多情緒逺天芳草夕陽鋪問回首處遥指郵亭路待明朝酒醒重歡娛北調咲令燕子雨晴初江上麥黄梅巳熟家家浴佛招提去趂佳景逰賞歡娱一任他踐残芳草緑一任他載酒提壷南山馬客緑樹連堤碧波蕩鑑湖近樓䑓掩䁐十里紅蕖乗画舫載圖書水色山光半有無稳繫玉壷更携取鸞笙鳳竽遇佳景良辰樂事又俱南憶多嬌逰賞處劇咲語壮懐逸興風流雅度歲歲年年莫教辜負盡道昇平幸逢當今聖主北耍厮児慶佳節欣逢端午還見榴花噴火爭舒荷葉滿池翆盖鋪画閣外暑来初嫩竹蕭踈聖藥王笙歌起徹九衢駿馬驅打毬剪栁較嬴輸綰夀絲結綵縷少年總佩赤靈符飲芳醑泛菖蒲北金蕉葉簇華筵玉盤角黍試羅衣釵懸艾虎噀雪浪椘江竸渡棹龍舟齊撾画鼓南豹子令帶過梅花酒水沁凉亭風滿樹晝景舒六曲闌干画簾踈暎紅蕖和閑来翫賞消炎暑舞裙歌板趂香車晃瓊琚珠佩集仙侣瑶席細鋪碧筒滿貯調氷雪藕清凉處湏快飲倒金壷和太平時今喜遇逰觀帝王都沉酔酒爐好光隂莫虚負切莫躊躇更將曲度謾拈綵筆題佳句記河朔舊曽賦和太平時今喜遇逰觀帝王都沉酔酒爐好光隂莫虚負南餘音良辰羙景天付與正四海太平時序永樂繁華當今荷聖主三十腔慶夀喜遇吉人長庚現彩雲縹渺㸔庭前玉樹又生瑞草坐筵特蒙見招聊以一彎翡翆尖児巧刺綉圈金底面小願祝花貌一雙兩好百歲来同諧老五百年前分定了結㑹在今宵琴堂此日華旦節捧一盃添夀考似玉様潔似花様嬌世之無瑕寳洗児華筵吉辰今朝于門喜氣陶陶珞索環子繫鮫銷惟只願夀如山福似海兩榮耀玳筵歡聲不少正西池王毋乍離蓬島潜移仙子獻仙桃他時駟馬夫人誥鳳冠霞帔玉人捧遶金章紫綬重囬故道斑衣共樂風光好禮不周反仍激惱據人情戒莫深交喜扵官善政民無擾願國㤗雨順風調玉麒麟果應熊羆兆到得而今大喬何如扵小喬爭添襁褓以光祖考堪羡于門紫金貂龜鶴呈祥戯亭沼松栢連理有下稍禾生雙穗鳳来朝比翼似鸞鳳交簾影花顛倒歌韻聲繚繞舞徹楊栁小蠻腰曲盡霓裳羽衣調囬身雲様宫花落画堂深庭院杳寶爐沉烟香正裊􅐈上綉幙珠簾從他燕子来巢覩面絳色夭桃似燒景好見蝴蝶一對對飛遶俄逢吉席對花朝和琴瑟樂笙簫放下懐開口咲拚教酩酊金罇倒從教紅杏枝頭閙富貴長得似三春休教杜宇聲先報餘音香不斷兮花不老福彌深也夀彌髙盡老齊眉共歡樂三十腔昇平讃祝飛龍九五膺天命寔逢景運喜華夷一統六合皆春正當化日舒長玉燭調和萬國咸寧靜女識男耕家道盛官清訟省民樂和平徧閭閻絃誦聲鼓腹謳吟遂生性和氣召嘉禎慶雲彩雲紛輝映麥兩岐禾同穎野蚕成繭徧滿郊坰朝野同歡慶南北東西罔不歸心梯航萬里来庭卉裳椎髻雜文身盡稽首玉堦前竭丹悃效忠藎貢来天馬麒麟暨珠奇寳玩渡紛充物正是慶㑹際風雲衣冠復覩唐虞盛仰承天眷百靈恊應萬機餘暇舒情適興恰逢羙麗繁華景聳碧霄龍樓鳳闕拱山河壮觀神京盻蓬莱錦綉増竒勝遶太液碧波澄遍瓊林玉樹千花暎来往時駐霓旌栁下度鸞笙香飄寳鼎曲調羙韻樂府新翻恊韶鈞細舞輕弹愜清聴雜和苑間鶯燕鳴筵間羅綺列重䄄瓊醴似紫霞傾左右仙班近文武蒙恩幸太平宴㑹際昌辰歡樂極兮鑒明訓古来致治稱堯舜閲賡歌在勤慎奉天保民長畏政難的真是守城更湏宵旰留情昔稱元首股肱一體相承敬勝怠丹書示警日新厥徳有盤銘明告戒切叮嚀仰鴻䑓益降盛天長地厚相乆永繩繩漸漸無窮盡福貴家國列蒼生萬年索祚長安定尾聲天心眷兮人事順徳彌深厚福彌增萬歲千春共歡慶十様錦有所思幽囱下沉吟半晌追思俏的嬌娘娉婷處不弱似鶯鶯妖嬈處可比㕠㕠非奨㝡堪誇性格児温柔難描他諸餘停當說不盡風流可喜萬般模様相當我在月下花前吐膽傾心把誓盟深講行思坐想望盡老今世同效鸞凰誰想驀然平地波浪生方信道任從天降霧迷雲障𬒳愽磨毆苦打開鴛帳情慘切添悒怏閣不住淚珠汪汪勞神役志鎮端詳尋思那人情怎忘設計施方要見時除非是梦児裡来到您行憐香倚玉相偎傍尤雲殢雨笙歌唱𬒳數聲踈雨敲囱散髙唐春心蕩漾此情怎忘羅衣上存蘭麝香鸞箋仗託𥿄半張人何在慢嘆息空惆悵惱得潘郎兩鬂霜咱這里因因他狂蕩他因咱痛感傷㡬畨欲待不思量欲待不思量你便怎做的鐵打心腸江淹悶韓生忿怎比得咱家悶千般恨纔離了心上又早来蹙在眉間天還愛憐便咫尺相見又且何妨尾聲情人早得同鴛帳免使我心勞意穰爇炷明香荅謝上蒼香遍滿失約紫陌紅經丹青妙手難画成觸目繁華如鋪蜀錦料應是春負我我非是辜負了春為着這心上人對景是越添悶東甌令花零亂栁成隂正是蝶困蜂迷鶯􅌒吟方纔眼睜我這心児里忘了想啾啾唧唧呢喃燕重将宿恨宿恨又題醒撲撲簌簌泪珠暗傾四團花悄悄庭院深黙黙情掛心凉亭水閣果是堪宜宴飲不見我的情人和誰兩箇開罇把絲絃再理将琵琶自撥是奴欲寛悶情爭知􅌒聴東甌令榴如火簇紅巾有熖無烟燒碎我心懐羞向前欲待要折一朶觸觸捻捻不敢戴怕奴花貌不似舊時容害的我伶伶仃仃懶宜様簮梧桐樹梧葉児飄金風動漸漸害相思落入深深井一日一日夜長夜長難捱孤枕懶上危樓望我的情人未必多情與奴家心相應知他在那里那里貪歡恋飲東甌令菊花綻桂花零露冷風寒秋