斷夢勞魂惹僝僽端的是玉價慣酬香緣慣修誰敢試㺯玉摶香手一枝花贈小園春些些並蒂紅指指連枝翆慳慳金谷路窄窄五陵溪一片花飛泄漏春消息舞盤中歌扇底刮得盡凨月無多趲得過繁華有幾梁州一兩箇鶯儔燕侣五七雙蝶使蜂媒窖來寬也稱逰人戲眼空大劉晨未識腳步長杜甫先迷畫幀上香銷粉滴鏡奩中緑暗紅稀唾津兒浸滿盆池手心兒擎得起屏石苔錢兒買不斷間愁花瓣兒隨手著流水栁絲兒送不勾別離錦堆翆積海棠偷足相思睡名偏小景偏媚賺得東君子忍歸一撮兒芳菲餘音楚陽臺雲雨無三尺桃源洞光隂減九十玉拶香挨這窩兒地堪信道一寸隂可惜千金價總宜錦步障何須五十里一枝花贈李素蘭散清凨煙月中逞素質凨塵內染一枝春色淡攢兩葉翆痕低束具含犀另一種凨流意比羣芳分外竒俏如蓀名重秦樓嬌似芷聲揚楚國梁州天謫下仙葩聖卉世修來雪骨氷肌等間誰許問容易玉盤兒生長錦窖兒栽培影雙雙連理葉小小菩提幽齋結珮相宜賞蘭亭修禊間題胭脂瓣洗渲淨天香金花粉調和成玉蕊素檀心抽㨂出柔荑巧移俏植舞蹲一捻腰肢細解人意笑殺春凨不敢吹種種相宜尾並頭蓮合歡草多清致如意朵珊瑚枝有價值瘦影清香足凨味海棠嬌莫比芙蓉色怎及雪窗下玲瓏鏡兒裡一枝花妓名玉馬杓楚人抱著愁宋客看著愛碾開如意寶琢就可憎才舀盡江淮成器許凨流債尊前日月捱謁漿也崔護曽拈市酒也相如慣索梁州品藻如鴻門斗窄聲價似北斗髙開等間誰許沉浮態臨卭滌器陋巷傳來許由不認西子驚猜潤如脂一種紅白巧如瓢一擔身材瑪瑙盤莫勝精神玻璃盞難同骨格水晶盂怎比顔色價擡樣改有斟量無疵多禁耐鷺鷥腦鳳凰額曽向秦樓醉李白換骨移胎尾敲著昏不許徠兒買磕著睡常防阿母猜翆釜銀瓶謾矜賽掌中擎不側心頭放不歪輕重郎君莫橔摔一枝花贈張寸金兒西方列宿名南土真佛像羞沾牛尾汚愁認馬蹄香媚𬗋嬌黃曽選到燕臺上十分標一寸長四不知袖兒裡楊震偷携兩不碩菜畦畔管寧謾想梁州籝中滿怕損志廉夫盡棄床頭盡暗消魂壯士傾囊一星星買斷了平康巷舞腰束纖纖絶質歌謳按縷縷宫啇撥得軟溫柔性格煉不灰可喜心腸神仙指石似端詳郎君愛寶似收藏棗瓤堅香撲撲別􅍢對蜂蝶葉子窄明整整生銷對鳳凰錢兒沉熱博博另鑄對鴛鴦笑試將麝蘭熏鉛粉鍍胭脂搶足顔色巧模樣瑞玉神珠總莫償麗水明粧尾鮑叔子受貧也分得心先癢直不疑守困也誣著意早荒一尺恩情索還丈石盤似品量等盤似較量一笑須值價萬兩一枝花妓名張道姑風塵素淨身煙月清間字鶯花壇上友歌舞洞中師積善因慈守一點全真志扣玄關仗力持用偎紅倚翆工夫受惜玉憐香籙旨梁州演步虛輕敲檀板鍊華池淨洗胭脂逺山林隱閣閨知街市不跨鶴超凡小小不乘鸞得道師師慣棄俗纒頭紅錦慣出家買笑金資凨流客普化相思踈狂士稽首相辭碧玉簮芙蓉冠新入箇名流青霞帔逍遙服別生箇樣子黃金鍾蕊珠經另打箇腔兒念兹在兹心中猿意內馬情無二多財捨有緣施誰種紅蓮火裏枝朵朵靈芝尾參禮透朝雲暮雨情如𥿄戒得斷酒病花愁氣似絲修飬出手標更誰似蓬萊山降賜蟠桃會宴侍再謫下箇神仙度脫你一枝花悲歡離合阻鶯朋隔燕儔折鸞對分鴛伴並頭蓮和蒂撅連理樹帶根剜愁思漫漫圗畫無心玩詩書沒意觀相思病瘦得假遍體尫羸離恨苦愁的來一懷痛滿梁州怎知他將方勝書傳黃犬把同心信付青鸞今朝復會來相喚我因他恩濃意厚性耐情寬語甜話美表正形端謝穹蒼幸得團圞喜今宵復會盤桓羅幃間憐香心撫恤的恩濃繡衾中雨雲情溫存的意欵鴛枕上別離言訴説的心酸愁懷幾般光隂屈指從頭算自別離整年半今夜綢繆情更完萬喜千歡尾譙樓三㺯梅花管更鼓聲殘漏點攢囱外晨雞聞啼亂殘星沉玉丸太陽升赤盤訴不盡愁懷夜兒短一枝花詠妓綰烏雲髻巧盤蹙翆黛眉輕掃粉香生肌凝雪紅暈展臉舒桃一撮兒妖嬈十指春䓤弱雙眸秋水遙點胭脂檀口勻圎襯羅襪金蓮窄小梁州錦香囊髙懸翆襖象牙梳斜襯金翹看不盡天然俏蘭心蕙性智慧良標形儀窈窕體樣苗條小年紀二八𥘉交更通媒壓類欺曹唱一只遏行雲曲韻傳情舞一只回白雪宫腰㺯巧笑一只墜春花俏靨生嬌停睛覷了有名旦色傾城貌忒凨流那嬌少者麼丹青手假髙難畫難描賺尾他比那巫山神女猶多好越國西施更又髙我這裡口內無言自思度休道是白日間伴著黑夜裡摟著覷一覷平生碩足了一枝花中州十九韻運春雲陳陳消熙麗日遲遲照送東凨融瓏凍濡澍雨入墟郊嶺嵿亭勝景清標恰那答搯花草踅這些扯柘條玩巒湍疃畔盤桓看山澗潺湲謾繞梁州第七覽巉嵒含嵐暗黲覘瞻㶄瀲灔添濤岑林森蔭禽音冷蜓爭迎凨蝶熱斜飄蜂叢桶洞燕穿椽巢摘崖外彩色開桃良田前纒穿殷苗逰人每傍岡莊強將觴穰唱楊公子們聚樹墅據蹴踘舒軀足巧佳人每靠夭桃掿鮫綃笑貌妖嬈它歌我嘲酬甌酒友樓頭樂開懷再歪笑自使厮兒資餉殽魚煮豬爊隔尾停生冷靜箏聲悄檀板闌珊懶旦敲傀儡纍垂醉回跳胡顧姑舞著楊娼娘唱著直喫的酩酊倰儯更傾酌罵玉郎急回日巳西低落我這裡牽騸蹇沿田甸轉前濠臨岑心沁鷣禽呌見了些瀾灘綰棧山彎還道感皇恩呀使支侍兒曹遇出入漁樵驀過那塜東峰崆洞洞壠中橋拖矬騾我鎖把滑馬他縛我這裡觀湍鸛玩磐彎喚巒鶴採茶歌恁將這履藜携几棋提杯罍食壘委誰挑我在這岫囿洲疇逰勾了到家中進門混沌困春宵尾更有這助扶諸女除豫帽做夥多娥脫我𫀆攬藍衫解絛倘房床枕錦貂掩簷簾遮槅箔蠟華花香尚燒更聲停漏籌􅌳動銅鍾咂畫角譙樓上五鼓餘足女奴報他道是明星升正髙缺月斜趄倒更聽的籬底栖雞起啼曉一枝花激沖弟費盡了我同胞一體心激不起你好學修身志恨不的手推上攀蟾路頭頂在上天梯怎不尋思見如今五旬慈母先拋棄七十嚴親鬢巳絲又不是癡聾喑啞成殘疾又無有差使田糧苦氣力又不索鑿壁囊螢見放著明囱淨几梁州眼前多少傍州例勤學的千人敬仰不學的一事無知勤學的光顯宗親不學的顛連妻子勤學的如金如玉不學的如土如泥縱不如程夫子道德齊髙也須學蘇學士文章並美再不能呵也學那宋狀元科甲聮題説時勸時千言萬語淘乾了氣待重呵又怕傷恩義待輕呵公然四不知只怕你悔後耶遲尾你試看滔滔白日難拴繫我只怕湛湛青天不可欺怎生般參不透其中意若既肯奮志呵在你若不肯奮志在你莫教我忍氣吞聲直怨到死一枝花過寶應湖口白𥻘𥻘萬頃波緑湛湛千層浪漫攸攸通百越翻滚滚帶三江灝瀚汪洋浴日月煙霞上浸山川宇宙傍亂參差蓼岸蘋洲爭上下蘭橈畫槳梁州舉頭四顧無邊量東望呵扶桑曉氣蒸霞赤西望呵華嶽晴雲帶日黃南望呵翠重重五嶺連蠻國圵望呵紫靄靄全燕擁淮漢外間水倚帝鄊更著那辱雲孤起漢外樓臺鰲背穩藏眼前城郭颶凨恬送水面帆檣夕陽晚涼柁樓間倚舒懷况楊栁岸荷花塘信是人間雲水鄊鷗鷺翺翔尾聲恰便似水晶宫闕無屏障太乙仙舟泛渺茫採蓮人來往齊歌唱酌流霞滿觴祝髙堂夀康他日到臯蘭做話兒講
