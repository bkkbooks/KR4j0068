front:
  text: 雍熈樂府卷之十九
  hash: sha256:89dd1c654fb6b669b39840d7c55ed7ea87d3047db8c9bcee2d6a32cab0dcc254
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_019-1a}
body:
  text: 雜曲滿庭芳西廂十詠張生俊雅諸餘可愛所事堪誇吟詩和句在西廂下引動嬌娃一封書戦退了眼前士馬七絃琹匹配上宿世冤家登科罷香車駟馬夫婦享榮華鶯鶯女娘竒芲嫰蕋軟玉温香天生俊俏嬌模様聡慧非常待月處心懐粉郎燒香時詩訴衷腸成就了凨流况時殊事往千古説西廂紅娘艶質䏻傳芳信善做良媒偷寒送暖将婚􅊚配使盡心機你教他操瑶琴包含看道理寫芲箋引惹出佳期配合就鴛鴦㑹非你做羙焉得做夫妻夫人不乖想當日遭危受困怎生得脱難逃灾謝張生計策把賊兵敗情碩要配與裙釵既然你悔親盟宜離院宅誰教你拜兄妹請入書齋他私自成歡愛非干事鶯鶯不才单註着天地巧安排法聰老髠慈悲為本方便為門一堂經勾引的成秦晋扵理合尊守戒行持心敬謹主婚􅊚用意慇懃閑評論似這等寛柔上人當可報深㤙将軍杜確䏻通虎畧善曉龍韜全慿威武居津要名播唐朝則為那一封書飛星到了霎時間五千人凨捲雲濤除殘虐如斯俊豪不枉了做知交鄭恒太魯湏知㳤女怎配愚夫當日箇軍圍普救誰扶助多虧了君瑞呈書你則待逞其志馮河暴虎他怎肯從其心似水如魚傷時務你專一架虛枉自敗凨俗孫虎恃強不思燕雀怎配鸞凰硬圍普救驅兵将敗壊綱常你只待擄嬌姿朝歡暮賞他怎肯順賊徒共枕同床半霎兒将身丧這厮心術不良斬首正相當多才漢卿廣知故事洞曉新聲移宫換羽真堪聴義理兼明一句句包蔵着媚景一篇篇醖醸出深情無疵病不俗易省萬載播芳名聰明實甫胸蔵錦綉口吐璣珠清新樂府真無数壓盡其餘翻騰就尤雲殢雨顯豁出寄柬傳書多佳趣超今越古堪與後人述又西廂十詠張生不才學成錦綉丧與裙釵嘲凨詠月西廂待眼去眉来寫封書文學似海害場病形軆如柴險把聲名壞全不想賢賢易色㺯甚麽秀才乖鶯鶯鬼精麝蘭半匀芲月娉婷結絲蘿不用媒和證眼角傳情聽瑤琹宵奔夜行燒夜香膽戦心驚家不幸枉着你齊齊整整㺯出箇醜名聲夫人不良孤兒寡婦㓜女新丧不将靈柩去安塟暴露在僧房做水陸捜㝷出禍殃改婚􅊚敗壊盡綱常可不道消魔障惹的那蜂喧蝶攘不賢恵老尊堂紅娘快赸傳書寄柬送暖偷寒星前月下把鶯鶯賺使碎心肝伺候到更深夜䦨㺯得那月缺芲殘粧科犯左難右難做了箇撮合山夫人你聽我為官長門戸先生西房既許成匹聘巳有賢声我怎敢和他同眠到明止不過赶空児半夜三更或推些病潜潜䓁䓁躡足鷺鷥行嘲人惧内納寵春泉作将軍不仁擅離信地難保黎民怎做的扵家為國扶危困䡖舉三軍輸時節㓕了已身贏時節好了别人圗甚麽言而信沒来由閗狠何處顯功勲髠郎法聡不諳經典不理禅宗為媒作證虛迎送圗受些羊酒芲紅不争将崔小姐窩蔵着㺯影險把箇普救寺燒的精空強兵動枉施英勇捨命去争鋒鄭恒發昏不應撞死怎得招魂曠夫怨女何湏論成甚人倫立志氣別㝷箇主婚仗家凨另選箇名門可不道名聲俊沒来自殞越顯的小哥村漢卿不髙不明性理專㺯凨騷平地裏褒貶出村和俏賣㺯你才學瞞天謊説来不小㧞舌罪死後難饒着人道虛空架橋枉自筆如刀王家好忙沽名吊譽續短添長别人肉貼在你腮頰上賣狗懸羊既沒有朱文公肚腸又沒有程夫子行蔵忒狂蕩用心一塲上不的廟和堂滿庭芳閨房十事一葫蘆㸔生見長香醪許納粟粒難蔵可人一種凨流像嫩蕋鵞黄腰瘦似春凨緑楊軆輕如白玉玗璫雖無量天成氣象壓盡錦香囊二剪子双鋒並聳無塵似水有嘴如蟁多情夫指䡖分動想像成功只與金針競争偏和銀鑷相從堪珍重芲間萬種何用樹頭凨三鑷子秋毫厭尔春榆破甲連理分枝金鈴口吻那䏻似吞吐尤時樊素嵓封皓齒小蠻䡖束腰肢関心事菱芲鏡裡不放鬂狂絲四礶兒諸餘異種有懷可測無物堪客寛洪咲殺玻璃瓮到底成空盖偃荷翻曉凨索垂貫日晴虹雖無用紅遮翆擁樂亦在其中五瓶兒壷中緑醑盃斟鸚鵡索拽銀絲空懸着緑膽渾相似造物宜時席上難温玉指瓶中填墜長絲芳春至東凨殢死無任揷芲枝六盒兒脂膏易滿虚心未足空腹無寛故教銀索相牽絆恐失鴛鴦渾似齊分索暖别離復對合歡堪為伴香温玉軟人共永團圎七針筒韜光晦迹胸中有物嚢裡蔵錐剖開混沌三才内吐出虹霓一寸鋼膓難比十分快性誰及多鋒利些兒綉氣成就四時衣八獐牙双鰲破甲光匀麝粉色潤氷芲並頭不讓金刀叉粧點鉛華背似犀梳半揷面如珊掠微凹西廂下黄昏妬殺明月吐新芽九虎爪英魂杳㝠仍留古迹尚播威名蘭湯暖浴垢塵浄不染餘腥狐兔抽頭早嗔犬羊側目先驚何湏命桃芲扇影席上自生凨十牙杖清香滿腹四方志小一寸心虚此身不厭頻拘束世味難踈不尖着肉自出暫時韞匵蔵諸開懷處春纎半屈芲蕋上蜂鬚滿庭芳富貴貧窮陳粮滿倉財盈聚寳羅綺千箱終朝受用應時饌細酒肥羊咲欣欣擎擡過盞喜孜孜舉案流觴寛弘量樽前翫賞開宴出紅粧心廣軆胖腰金衣紫氣宇軒昻威儀濟楚多名望徳厚仁寛扶社稷賢才棟梁保山河永逺安康包公量承㤙受賞爵禄秉忠良身貧可憐多憂多恥少語無言雖貧怎肯将身賤禮義和謙新朋来清茶消遣舊友至閑話何妨休䡖量非吾腼腆窮達任皇天敝巾破裳形骸臞秀容貌堂堂靈輒不遇桒間飯每誦詩篇住半間無扉草菴臥一枕楊栁夕陽休輕量炎凉莫管否泰任循環滿庭芳京口感懷殘芲剰栁摧垣廢屋新塜荒坵海門天塹還依舊滚滚東流鉄瓮城横刺虎口金山寺髙顯鰲頭夕陽候吟登舵楼和淚望揚州二武林感舊錢家故址東吳覇業南渡京師縱横四百八十寺不似當時随處寫坡翁舊詩何人吊逋老荒祠傷情思西湖若此何處比西施三贈余光明黄庭合成青龍制伏白虎馴寍金丹養就還元性日月分明傳妙用神仙勝境積隂功海宇聲名真靈應杏林橘井乆視樂長生四寄何齋長端肅奉柬相違咫尺似隔関山少成懽㑹多離間直恁艱難平地裡情踈意懶暫時間書廢琴閑時頻盻㱕期早晚先報此平安五嘲人義蹇休懷故人難㝷東道誰念斯文南枝昨夜傳芳信大地囬春雪兒飄深深閉門魚兒膾旋旋開樽黄昏近黒喽便盹且伴睡魔神六西湖感興笙歌酔鄊綺羅絢綵粉黛吹香湖凨鼔起波千丈㶑灔春光亂紛紛逰人蕩漿閙攘攘潮子撐航情懷放芲簮酒賞時值煖天長七嘲薦非才荒蕪舊隠瘦田破屋流水閑門吾生甘守黄􅐽運何病何貧管城子誰行記本孟甞君舉甚賢人年将盡梅芲咲哂添一歲老三分八送宗叔仕居官軆統何憂倉廩不得長盈寮属和協休嫌衆同盡微忠勸農桒将供歲用莫偷安坐㸔民窮㱕家頌清白古凨纔是大宗翁滿庭芳春逰芳􅋄地春逰羙㢤名園佳圃㑹賞吾儕芲紅栁緑堪人愛蝶咲蜂猜臉桃芲三分酒色吐珠璣七步竒才踈狂態天寛地窄沉酔恰㱕来二夏賞緑荷池炎天景佳脫巾露頂幔罩䡖紗乗凉池閤無休暇滿眼繁華楊栁堤金樽玉斚荷芲池沉李浮瓜歌笙罷天寛地狹沉酔恰㱕家三秋飲黄花酒秋天景竒金凨玉露白雁南飛長堤髙栁吟蝉蛻菊桂芬菲翫月楼直侵北極賞芲亭正對東籬芲簮墜天幃地席沉酔恰扶㱕四冬吟白雪詩三冬景殊雪芲絮滚梅蕋香浮氊簾低簇寒威布煖閤紅爐光爛燦凝合玉宇明滳溜凍徹氷壷吟詩處天遮地阻沉酔玉人扶滿庭芳凨月凨塵艶娃堪題堪詠堪羡堪誇朱唇檀口些娘大臉襯桃芲理氷絃纎纎銀甲步香塵窄窄刀麻天生下温柔典雅端的玉無瑕凨情熱沾巫雲暗結楚雨偷淹錦塲芲洞春光占眼角眉尖鴛鴦帳春来梦甜鳯凰衾老後情忺平康院鶯芲簿上凨月擔兒擔鸞笙鳯簫銀筝欵按象板䡖敲㡬年忘却閑情調梦㫁魂勞重整頓鴛鴦配交再安排翡翆窩巢知音樂拈芲㺯草凨月擔兒挑凨流事耽湘裙晚皱紅䄂春渰梨園世不着虚賺陣馬曽諳三生話百年梦甜半生狂一縷涎饞重新㸔鶯芲陌上凨月擔兒擔喜春来馬致逺六藝一禮夙興夜寐尊師行動止渾絶浮浪名身潜詩禮且陶情栁溪中人世小蓬瀛二樂宫啇律吕随時奏散慮焚香理素琴人和神恱在佳音不関心玉漏滴殘淋三射古来射席觀其徳今向樽前自樂心酔横壷矢臥蓑隂且閑身醒踏月明吟四御昔馳鉄騎經燕趙往復奔騰穏似船今朝兩鬂巳成斑機自叅牛背得身安五書筆尖落𥿄生雲霧掃出龍蛇驚四筵蠻書寫畢動君顔酒中仙一恁酔長安六数盈虚妙自胸中蓄萬事幽傳一掌間不如長酔酒爐邊是非潜終日樂堯年喜春来初見綉簾兒外初相見嬌眼頻将恩愛傳滿懐心事総難言天那天教我㡬時圎二同行騰騰共入蘭房内困困相偎不暫離昭君恠道㑹較遅凝眸視猶自眼前飛三小酌金盃頻勸瓊芲醸玉斚氷調荔枝漿洛神西子閗濃粧推窓望月色轉囬廊四沐浴烏雲斜挽摘芲鈿素手相将入蘭堂鴛鴦同浴碧池塘桐槽放拂面麝蘭香五並枕星星俊眼横鋪俏馥馥香腮出落嬌纎纎一搦楚宮腰羅襪小無福也難消六交歡情郎耳邊低低道渾身春透兩心樂情濃不厭顫聲嬌投到了斜月上芲稍七言盟鴛鴦作對関前世翡翆成双約有期無縁若罷羙夫妻除梦裡驚散各東西八曉起隣笛吹徹五更歌日色蒼蒼映碧波佳人㣲咲問郎呵睡甚麽再樂些兒箇九梳粧腰肢楊栁凨前瘦腮頰桃芲鏡裡羞嬌紅嫰緑付温柔梳粧後仙子下瀛州十叙别一盃别酒強挣捱兩意綢繆觧不開長安得志早㱕来休只待野草蔽庭堦喜春来遣興湖山遣興還詩債杖履尋芳釋悶懐村醪滿酌勸吾儕杯莫側聴和喜春来雲鬟霧鬂鞦韆院翆䄂湘裙鼔吹船錦屏芲帳六橋邊真閬苑人酔杏芲天三月天外無消息八字峰前不暫離日長人困晚粧宜鸞鏡裡和影一雙飛金盃滿酌桃芲醸玉斚重斟桂蕋漿湘妃西子淡濃粧移画舫来趂芰荷香喜春来離思玉鞭楊栁春凨陌綉轂梨芲夜月堦楚雲湘雨梦陽䑓休分外芲栁暗塵埃兩行帶草連真字四句尤雲殢雨詩東凨吹與那人兒他見時知我害相思情傳骨髄難措洗愁灌肌膚怎受持相思離苦総成疾我共你相見一時醫雲慳雨澁歡娱儉雁杳魚沉欝悶添舊愁新恨兩眉攅掩淚眼誰問病懨懨喜春来憶羙湘裙半露金蓮辦錦䄂輕舒玉笋纎粉面宜貼翆芲鈿可喜娘争咲色妍妍不䏻懽會空偷㸔費煞心腸受用眼一囬相見一畨難数步間如隔萬重山一時口強心難強半霎恩情怎敢忘人前強道不思量却是難都在我心腸蜂蝶困歇梨芲梦鶯燕飛迎栁絮凨強移蓮步出簾櫳心緒冗羞見落芲紅喜春来妓情無錢難買蘇卿俏有鈔䏻驅倩女魂粉營芲寨緊關門咱受窘坡撇見錢親元和還徹烟芲債亜仙消殘陌栁懐爻槌瓦礶串芲街鴇兒乖只道去休来䡖歌慢舞梨芲院皓齒湘裙栁陌䦨王孫公子買幽歡有餘錢酔臥麗人天有錢得飲葡萄醸無鈔難甞荔枝漿古来多少淡濃粧死偎纏結果落空拳喜春来道情扁舟雖小乾坤大活計雖貧受用多世情日月暗消磨青鏡睃黒髪早斑皤今朝有酒今朝酔且盡樽前有限杯回頭滄海盡塵飛日月疾白髪故人稀皮縫執袋腰間掛草結芒鞋脚底踏黄􅐽淡飯一甌茶散誕煞脚到處為家塵寰跳出無牽掛意馬心猿自捉拏藥爐丹竈是生涯得清暇白雪長黄芽喜春来盻望鴛鴦失配誰驚散燕子無双飛興䦨粧頭倚做望夫山凝淚眼無語凭䦨干恓惶淚濕鴛鴦枕慘愴香消翡翆衾惱人砌畔促織吟驚夜寢隣院搗寒砧庭槐破梦秋凨撼妾淚聮珠夜雨攙朝雲無計出湘潭休問俺司馬淚青衫眼横秋水双波溜眉聳春山八字愁別来誰伴上粧楼如轉首葉樹忽驚秋喜春来春逰芳草地踏青閑翫心神泰杖竹歌謳好快㢤天台路上遇嬌態桃溪畔洞