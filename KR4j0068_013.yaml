  text: 雍熙樂府卷十三
  hash: sha256:a4ea2413623e64368f2fef34f77a839bb120e6be369b0e212dde5ddd3449e837
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_013-1a}
body:
  text: 越調鬪鵪鶉電繞樞星虹流華渚紫氣氤氲清香馥郁海晏河清修文演武感聖恩過舜禹喜遇著萬夀佳辰更值著三冬莭序𬗋花兒序丹墀內齊排著仙仗玉爐裏細裊名香金杯中滿泛著醍醐托吾皇有德保四海無虞民樂康衢見昨夜長庚燦太虛正值著聖人初度擺列武職文臣一齊稱萬歲山呼小桃紅太平一統混車書萬國蒙生育黎庶謳歌感恩露盡歡娛皆仰賴聖主齊天福君明如舜禹臣賢比房杜德勝似唐虞尾黎民樂業無差賦共祝願皇圗永固讃聖夀無疆掌中華聖明主鬪鵪鶉詠雪雲幕重封風刀徑刮玉絮輕撏瓊雹碎打粉葉飄揚鹽花亂撒一色白六出花密密踈踈瀟瀟灑灑𬗋花兒序瑩玉緣髙山嶺袖水晶碾陸地樓臺玻璃砌老樹槎丫蠶食桑葉蟹走平沙時霎列璧鋪瓊迷萬瓦隨風髙下蝶粉翩翻蜂翅交雜秃厮兒應時候在深冬暮臘髙盈户報豐稔年華驅蝗入土將瘴氣壓禎祥瑞耀國家堪誇聖藥王是宜開繡闥斟玉斚泛羊羔美酒味偏佳樂韻雜歌調雅肉屏風羅列女嬌娃開宴竸奢華么篇不覺的酒力加和氣奓佳人爭賞笑喧譁玉纎將雪片拿玉鈎將雪地蹅子見雪光人貌兩交加似一片玉無瑕𬗋花兒序秦嶺寒迷去馬剡溪凍駐行槎蔡城喧起鵝鴨讀書冷落髙臥貧乏由他且則走斚飛觥受用咱直喫的醉時才罷笑相偎繡𬒳香腮風流如𥿄帳梅花尾聲喚家僮且把氊簾下教侍妾髙燒絳蠟讀書舍烹茶的淡薄多銷金帳傳杯的快活煞鬪鵪鶉髙聳聳一帶青山翆巍巍滿林緑柳曲彎彎澗下蒼松密匝匝園中翆竹聲哀哀鶴唳猿啼急穰穰烏飛兔走清幽幽琴一張香噴噴酒數甌美甘甘淡飯黃虀勝強如肥羊法酒紫花兒序靜悄悄山中袖手穩拍拍菴內存身暖烘烘𬒳裡藏頭不知冬夏不管春秋都休薄利虛名一筆勾恰便似野雲出岫舒捲無心到大來優遊金蕉葉少是非柴門扣久無煩惱山妻問候畢罷了間茶浪酒拜别了狂朋怪友調笑令我如今得修樂清幽收了苧藍罷了斗怕的是紅塵碧海蝦蟆閗是非場無了無休我和這山猿野鷗為故友相伴著瓦鉢磁甌秃厮兒名和利一齊罷手好共歹並不耽憂如癡似拙牢閉口忙收拾鈎魚鈎無限清幽聖藥王但將這詩句酬再將這欽興投休將間事挂心頭管甚溪水渾不飲牛收拾一隻釣魚舟趂著緑水且間逰尾聲至誠端的無塵垢俺本是箇煙波釣叟我向這草舍內不爭名再不去紅塵路上走鬪鵪鶉錦重重寶殿金門髙聳聳龍樓鳳閣齊臻臻玉砌雕欄密匝匝紅圍翆繞笑欣欣莭值元宵喜孜孜生逢盛世明朗朗月正髙光輝輝燈正皎碧澄澄的月影婆娑熖騰騰的燈光閃灼山馬客寶月圎花燈照我只見萬朵金蓮光射青霄逍遙端的是太平盛世人間絶妙則聽的錦箏慢撥美詞低唱檀板輕𫾣鬼三台同顴樂齊歡笑任銅壷漏曉銀漢夜迢迢勝瑶池玉島喬三教緩行規範標聚八仙揣舞勢樣巧端的是冠古難逢今時遇少蠻牌令擊鼉鼓品鸞簫歌金縷舞六么碧天香霧靄綵霞飄寶䁀內名香細裊金杯中酒泛羊羔黎民道玉山倒金吾不禁風景偏饒調笑令蠟炬燒似一天星斗移來到接鰲山火樹星橋我則見筵開玳瑁列著美殽動仙音一派笙簫皂羅𫀆喜遇豐年之兆感皇恩浩蕩德邁唐堯省刑罰薄稅斂罷差徭河清海晏民安樂禎祥迭現麒麟鳳鳥梯航重譯竒珍異寶看都城不弱蓬萊島聖藥王社火將迓鼓𫾣逰人把燈亂挑見參橫雲縹眇則這燈光月色影重交這的氣勢兩相髙梅花酒歡娛宴樂觥籌交錯朱唇唱徹櫻桃小排美質多嬌太平年元夜好家家樂陶陶同携共約喜人生幸遇著良辰美宵鬪鵪鶉人去陽臺雲歸椘峽不爭你江上停舟幾時得門前過馬悄悄冥冥蕭蕭灑灑踏鴈沙步月華行過這萬水千山都則在一時半霎𬗋花兒序想情人心中離恨趕王生栁下停舟似張騫在天塹浮槎汗溶溶珍珠盈臉亂鬅鬆雲鬢堆鴉走的我力盡斤乏莫不是夜宿秦淮賣酒家我向這斷橋植下踈刺刺的秋水枯蒲冷清清的明月蘆花小桃紅我驀聽的馬嘶人語閙喧譁掩映在垂楊下唬的我撲撲的小鹿兒那心頭驚怕璫璫的鳴榔板捕魚蝦恰才那順西風悄悄的聽沉罷我趂著他這淹淹的露華對著這碧澄澄的月下猛聽的呀呀的寒鴈起平沙調笑令沙池上欵踏莎草上帶霜霞呀恰掩過湘裙翡翆紗抵多少蒼苔露冷凌波襪看江山列成圗畫我則見氷壷瀲灔天上下青霄月碧玉無瑕聖藥王我這里近蓼花纜釣槎有折蒲衰草緑蒹葭近水凹傍淺沙遙望見煙籠寒水月籠沙我則見茅舍兩三家麻郎兒暢好是直伯牙我做了箇沒出豁的人家為甚麼私離本家待和伊同赴天涯么篇險把我爭些兒走乏比及你逺至京華薄命人心中念他思量心何時撇下拙魯速你若似賈誼般困長沙便似孟光般顯賢逹若半星兒意差一心兒敬他舉案齊眉傍書榻一任他淡薄生涯折莫我戴荆叉穿布麻么篇把稍公忙喚咱怕家中厮捉拏我則見逺樹寒鴉岸草蘆花數聲啼鴉幾縷殘霞快疾把雲帆髙挂月明直下航櫓咿軋咱可便趂東風莫消停疾進咱尾聲果然他上長安登途路把車兒駕則願你箇文章客時當奮發則我這慣沽酒的卓文君我情願扶侍你箇題橋漢司馬鬪鵪鶉棄職休官張良范蠡拜辭了紫綬金章待去看青山緑水跳出了狼虎叢中再不入麒麟畫裡爵祿髙性命危捨死忘生爭宣競勑紫花兒序你都待重禋而臥列䁀而食不如我拂袖而歸急流湧退見賢思齊當日箇寧武子左丘明孔仲尼邦有道則仕邦無道則廢齊魏裏使殺箇孫龎殷周間餓殺箇夷齊鬼三台看了些英雄輩爭間氣為功名將性命虧嘆豫讓嘆沮溺待圗箇甚的論功勞誰如燕樂毅論才學誰如晉李儀常言道才廣妨身官髙害巳聖藥王我如今近七十得知須信道老而不死是為賊鹿喚做馬鳳喚做雞從今葫蘆大家提再不辨是和非調笑令為甚終日醉如泥除睡人間總不知戒之在得因何意老不必爭名奪利黃金垜到北斗齊也跳不出這輪回聖藥丅赤緊的烏又飛兔又催暫時相賞莫相違菊滿籬酒滿杯只喫得席前花影坐間移白髮故人稀尾想當日子房公會覓全身計好一箇識空便抽頭的范蠡歸山的待看那翆巍巍千丈嶺頭雲歸湖的待看那青湛湛長江萬頃水鬪鵪鶉雪艷霜姿香肌玉軟杏臉紅嬌桃腮粉淺金鳳斜簮雲鬟半偏插玉梳貼翆鈿體態輕盈歌喉宛轉𬗋花兒序他有蘇卿才貌我學雙漸真誠望得箇美滿姻緣俳優體樣樂府梨園天然不弱如桃源洞裏仙可愛堪憐一捻腰肢半折金蓮小桃紅初出蘭堂立樽前似月裏姮娥現一撮精神勝飛燕正當年栁眉星眼芙蓉面絳衣縹渺麝蘭瓊樹花裏遇神仙天淨紗初相逢恨惹情牽間别來却受熬煎各辦著心真意堅有時莭得便赴佳期月底星前尾聲狠毒娘阻隔的難相見統鏝的姨夫戀纒我為甚探望的腳步兒勤只恐離别的路兒逺鬪鵪鶉寄别百歲光隂寄身宇宙半世蹉跎忘懷詩酒竊玉偷香尋花問栁放浪行不自羞十載江淮腦蟠星斗𬗋花兒序鬢絲禪榻眉黛吟囱扇影歌樓獻書北闕挾䇿南州遲留社燕秋鴻幾回首壯懷感舊嫵媚精神羅綺風流調笑令漸久過清秋今古名山惜未休琴樽相對消間晝畫烏絲醉圍紅袖陽關一聲人去後蕭踈了月枕雙謳秃厮兒浩浩寒波野鷗瀟瀟夜雨蘭舟津亭送别風外栁甚不解繫離愁悠悠聖藥王夜氣牧人語幽西樓斷夢月沉鈎惜勝逰憶唱酬追思往事到心頭腸欲斷泪先流尾聲彩雲冉冉巫山岫還相逢邂逅綢繆終日惜芳心思量歲寒友鬪鵪鶉風情連夜銀蟾逐朝媚臉體再情添淹漸病染殢雨𥘉霑尤雲乍斂他不嫌俺正忺不顧傷廉何曽記點紫花兒序雙欹月枕携手虛簷傅粉粧奩歡娛忒釅收管忒嚴如魪如鶼再合會有半句兒諂無一星兒欠浪靜風恬落花泥沾么篇無嫌大俳場俺占喬風月咱兼間是非人􅥦強做科撒坫硬熱戀白沾相簽掄的柄銅鍬分外裡險撅坑撅塹潘嶽花撏韓夀香苫小桃紅小姨夫統鏝緊沾粘新人物冤家忺早起無錢晚夕厭怎拘鈐蘇卿不嫁窮雙漸敗旗兒莫颭俏勤兒絶念魚鴈各伏潛尾聲假真誠好話兒親曽驗鼻凹裡沙糖怎去餂貪顧戀著眼前甜不隄防那背後閃鬪鵪鶉歌姫教坊馳名梨園上班院本詼諧宫粧樣範膚若凝脂顔如渥丹香肩憑玉樓湘雲擁翆鬟羅帕分香春纎換盞紫花兒序扶颩煞東風桃李吸留煞暮雨房櫳紇喜煞夜月闌干向尊席之上談笑其間意思相攀且是娘剔透玲瓏不放間不枉了喚聲粧旦儘可以霧幌雲屏酒社詩壇天淨沙眉兒初月彎彎鞋兒瘦玉慳慳臉兒孜孜耐著琵琶絃漫青衫泪點才乾尾聲麗春園門外是潯陽岸最險是荼船上跳板一句話悔時難兩般兒愛處㨂鬪鵪鶉蹴踘蹴踘場中鳴珂巷裡南北馳名寰中可意夾縫堪誇拋聲盡喜那換活煞整齊欵側金蓮微舒玉體唐裙輕蕩繡帶斜飄舞袖低垂紫花兒序打的箇桶子膁特硬合扇拐偏疾有一千來搊拾上下泛勻勻的論道兒直使得箇插肩來可喜扳摟抄雜足窩兒伶俐小桃紅粧蹺委實用心機不枉了誇強會女輩叢中最為貴煞曽習沾身那取著田地趕起了白踼諸餘里快收拾調笑令噴鼻異香吹羅襪長沾現色泥天生藝性諸般兒會折末你轉花枝勘膁當對鴛鴦扣體樣如畫的到賺得校尉每疑感秃厮兒粉汗濕珍珠亂滴寶髻偏鴉玉斜堆虛蹬落實拾躡起側身動栁腰脆丸惜聖藥王甚旖旎解數兒稀左盤右折煞曽習甚整齊省氣力旁行側腳步頻移來往似粉蝶兒飛尾聲不離了花前栁影間田地閗白打官場小踼竿網下世無雙全場兒上占了第一鬪鵪鶉半世飄蓬間茶浪酒十載追陪狂朋怪友倚翆偎紅眠花臥栁怪膽兒劣耍性兒柔成了些心厮愛夫妻情厮當配偶𬗋花兒序受用了些春風妓館曉日章臺夜月秦樓向紅裙中插乎錦被裏舒頭風流不許傍人下釣鈎燕侣鶯儔百匹酬歌紅錦纒頭金蕉葉寨兒裏相知是有一見咱望風舉手若論咱點砌桃科慣熟敢教能尖嘴姨夫閉口調笑令聲名歲久急難收只恐怕扶侍冤家不到頭風月腳到處都成就誓不曽落人機彀弄得人燃香剪髮百事的有冷氣虛心使盡剛柔秃厮兒愛楊栁樓心殢酒喜芙蓉帳底藏䦰美孜孜翆鬟排左右歌白雪捧金甌溫柔聖藥王春才休夏又逰芰荷香裏泛蘭舟到中秋月色幽醉薰薰無夜不登樓兀良抵多少風雨替花愁尾花隂栁影間馳驟急回首三旬又九罷却了愛月惜花心間袖了題詩畫眉手鬪鵪鶉玉宇無塵銀河瀉影月色橫空花隂滿庭羅𬒮生寒芳心自驚側著耳朵兒聽躡著腳步兒行悄悄冥冥潛潛等等𬗋花兒序等待那齊齊整整裊裊婷婷姐姐鶯鶯一更之後萬籟無聲直至鶯庭若是回廊下沒揣的見俺可憎將他來緊緊的摟定則問你會少離多有影無形金蕉葉則聽的角門兒呀的一聲風過處花香細生踮著腳尖兒仔細定睛比我那𥘉見時龎兒越整調笑令我這里甫能見娉婷比著那月殿里嫦娥也不恁般撑遮遮掩掩穿芳徑料應來小腳兒難行可喜娘的臉兒百媚生兀的不引了人魂靈小桃紅夜深香靄散空庭簾幕東風靜拜罷也斜將曲欄憑長吁了兩三聲剔團圞明月如懸鏡又不是輕雲薄霧都則是香煙人氣兩般兒氤氲不分明秃厮兒早是那臉兒上鋪堆著可憎心兒里埋沒著聰明新詩和得􅑯應聲一字字訴真情堪聽聖藥王語句兒清音律兒輕小名兒不枉了喚做鶯鶯他若是共小生厮覷定隔墻兒酬和到天明方信道惺惺的自古惜惺惺麻郎兒我拽起羅衫欲待行他陪著笑臉兒相迎不做美的紅娘􅑯淺情更做道謹依來命么我忽聽得一聲猛驚元來是撲刺刺宿鳥飛騰顫巍巍花稍㺯影亂紛紛落紅滿徑絡絲娘空撇下碧澄澄蒼苔露冷