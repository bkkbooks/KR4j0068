漫天緑却又早楓葉秋霜滿地紅世事如翻餅古今興廢轉首成空一煞花開花又凋月圎月又更榮枯遞轉相催併光隂急急如流水世事紛紛似轉蓬死後貧富同一冢你試看漢陵楚廟兔迹狐蹤尾聲知命人坦蕩蕩不怨天樂道人靜幽幽守固窮六十年一枕通宵夢直等待漏盡更殘那時節省粉蝶兒歸隱歸去來兮出塵寰綽然恣意納還了靴簡朝衣過了深坑經了險路不付能得占平地趂西風拂袖而歸樂間身永絶名利醉春風才離了帝王畿早來到吾鄉里入門稚子笑牽衣好教我喜喜朋友相詢衆親清話滿堂和氣紅繡鞋急流中忽然湧退半程兒便覔歸期心為形役獨何悲迷途尚未逺倦鳥不欲飛因此上樂田園松菊美普天樂覔幽村尋活計耘瓜南畝種菊東籬盈疇禾黍香滿目山峰翆獨倚南囱安容膝撫瑶琴風力吹衣操一曲髙山流水釣一竿鈎頭新鯉賦一篇歸去來辭上小樓幽村過日柴門深閉不管興亡不觀邪正不知是非治三荒栽五栁蕭條活計消磨盡古今興廢么想人生能幾何嘆光隂似過隙則不如靜裡琴書悶中美酒間裡圍棋樂天命修道德抱仁懷義養一身浩然之氣滿庭芳君子人隨時見機都只為中途荆棘别尋箇小徑而歸空讀了五車書不濟當時溺且不如粧啞推癡見如今哲人萎賢途否塞太山傾梁木摧灰空費了中條力為山漸虧因此上折卸了上天梯耍孩兒徒懷報國安民藝時已危難推箇道誼自來麒麟不與耕牛閗鸞鳳不同燕雀飛薰蕕不一器世無周公孔子顯不出盜跖桓魋十煞一一將大道明細細將今古推孟軻正理挋楊墨我這里全慿經典闢邪説又恐怕傍人講是非不解其中意自來賢愚不等善惡難齊九煞從前錯怨天如今才省得忽然參透天地理榮枯枕上三更蘿成敗盤中一著棋日月搬興廢間來飲一杯悶酒展兩葉愁眉八煞所行將天爵尊所看皆墳典集五經厯厯説一會赤緊的清音不入常人耳聽者雖多逹者稀不如緊把舌關閉潛頭袖手掩户絶扉七煞一年四季中光隂似箭疾榮枯遞轉催人世眼前禍福誰能料明日隂晴怎得知何必貪髙位則不如野花村酒快活便宜六煞到春來賞郊園爛熳花聽上林鷓鴣啼騎著箇骨瘦毛長驢一壷村酒竿頭挑數首荒詩逐景題逰賞在花園內尋幾箇詩朋酒友只喫的酩酊而歸五煞到夏來避炎陽在五栁問趂濃隂一葉席把熟甜瓜打的凍凌碎甕頭醪酒無簾壓頭上摘巾渾漉著喫一點甘如蜜山妻搖扇稚子傳杯四煞到秋來慶豐年社鼓𫾣安排下擺卓盤時新食肥透透嫩雞脂漫著脅􅌽九天明月觀金菊會三島仙翁飲玉杯玩賞重陽會行歌松徑醉臥東籬三煞到冬來臥著那暖烘烘熱炕頭穿著領厚敦敦粗布衣可床做四幅綿衲𬒳一任教飄飄瑞雪屯門户除睡人間總不知覺來呵胡收拾爐煨白酒烹宰黃雞二煞喜逍遙四季間戀茅亭一所宜有鴻儒談笑無俗氣白雲出岫琴書潤桂子風飄香滿衣伴三益真朋輩傲霜似松菊欺雪若寒梅一煞我如今百歲太平過樂天命永不疑璇璣造化誰人識夀夭富貴皆由命進退安危不在機空用分毫力一朝省悟萬事休題尾聲每日間逍遙趂酒家直喫得醉醺醺暮夜歸一晚來睡徹三竿日床直下山妻喚不起粉蝶兒甘貧固守寒微樂天命不思榮貴掩柴門躲是潛非一任教這箇言那箇語將咱侮戲本來知却做不知且抽頭莫爭間氣醉春風遣興數篇詩遂心一管筆覽今博古喻前賢大抵來論箇理理把往日名場昔時利路到如今棄之于地紅繡鞋再不想蠅頭微利再不想蝸角星輝再不想鵬程萬里播天飛再不想登雲路再不想上天梯喜的是避風塵茅舍底普天樂歲寒心浩然氣困中修養難裡扶持人憐我受貧我笑人未識古往今來英雄輩覷黃金有似青泥但得箇清名不毀胸中有藝管甚麼腹內無食上小樓聖人道安不忘危窮不失義我從來富而無驕貧而無諂困而無危問甚麼穿惡衣餐惡食虛靈不昧養一身浩然之氣么篇合受榮也受榮合忍飢也忍飢山不更名人不改姓道不那移史魚直顔回德恰便似青天白日這兩箇身雖殁有名在世滿庭芳心存道義問甚麼身寒腹暖體瘦神疲居安莫管形容悴靜裡忘機湖水中埋名范蠡陋巷中隱迹顔回瑚璉器時人不識惟有老天知耍孩兒安居樂道修碩德一任他人知我不知有詩書筆硯同相會喜的是數椽茅屋接天逺兩葉蓬囱映日底到晚來落覺安心睡也不聽三更犬吠五鼓雞啼六煞貧居難不敢辭守經常豈敢違行藏要合天地理夷齊固守西山餓孔子甘貧陳蔡飢也飽清風味俺不失一時困節落得萬古名竒五煞養浩然胸次髙樂簞瓢名不低這兩箇廣居仁義包經濟一箇三千徒衆摽名姓一箇七國行逰四海知道統傳千世恰便似青天浩浩華嶽巍巍曰煞想仵貟曾品簫吕蒙正曾題筆古人未遇邅淹滯時來神鬼隂靈助運去英雄㒒輩欺逆順皆天意我怕待功名成就赤緊的時運乖危三煞論興亡不敢言聞是非不敢題藏舌閉口休爭氣心無利已瞞人術自有皇天后土知守本分全身計也不問誰長誰短誰是誰非二煞嘆平生我為人敬神明心不欺施財濟困周親戚人憐漂母情何厚我笑淮隂志節微男兒漢無廉恥若將夷齊相比便自有髙低一煞人笑我誇大言大綱來論道理聖人教同天地光前絶却周公旦繼往開來孔仲尼勳業無碑記恰便似青天湛湛赤日輝輝尾聲講了一會明天心周公書看了一會合神機顔孟術男兒漢有志出乎類便死後也做一箇袁安傲世鬼粉蝶兒慳各節儉為活幹家心委實不懦無明夜勤苦奔波常則是忍些兒飢寒熬些兒虀淡儧些兒行貨説喫穿怎敢張羅題起箇粗字兒也魂驚膽破醉春風我只待咬嚼别人別人休來侵害著我見幾箇相識朋友上門來小生抽身兒早躲躲聽的道置酒張筵挑斤拔髓忍咂不過普天樂一任你笑睃呵羡乞餓誰似俺口腹中積儧牙齒上騰那你看那待賓客的麩糲糲應節令粳早飯白粥才餐過到晚來又插和和似這般家常飲食隨心受用更待如何快活三官人是夾細哥娘子喚乞睃婆同心合意做家活怎教肯分毫錯朝天子下飯呵鹽醬著筯戳開齋呵脂油將嘴抹解饞呵嗍指頭把醎魚來摸見了那時新的滋味則著眼兒睃咽了些涎和唾雖有些夾細的名聲却無那奢華的罪過任傍人笑我我死呵便拖休動著咱松紋錁四邉靜親戚何須燒烙鄰里不必炒煿撈撈拖拖指望相酬賀寡茶熬下半鍋灌的他軟飽來由他坐脫布衫又不是久白風魔又不是一夢南柯又不是大時大節又不是著飢忍餓小梁州却怎生打夥兒拴通來撒科科泛著慳吝的嘍囉沒來由平地里起風波却教我如何過休為這口腹上惹下干戈么篇逼臨了人命難結末緊些兒我便自抹枉念聒乾咂嗑誰敢道三聲真個不覔井便投河石榴花唬的那親戚朋友走如梭誰敢慢延磨著咱計策好粧科他到將咱來取撮罷波作耍來也麼哥哥我便道回席一節都丢過從今後再敢來麼他們都對天説誓齊聲喝再來時也只是談些夾細講些慳吝説些齷齪閗鵪鶉再休題品味珍饈那里也杯盤酒果止不過數米調湯更那堪根柴把火似這般粗過活是若何更不如畫餅充飢我只待望梅止渴上小樓見人家三湯兩割喫卓看卓你看我捋袖揎拳狼餐虎咽恨少貪多大食籮小包褁收拾起座把幾箇使從人眼睛矁破么篇見鄉親到俺家也待學大手腳一碗蔓菁半瓶涼酒兩個磨磨他一個我一個誰曽咬破五六個瘦團臍到除下三個滿庭芳從今後休來害我似這般一時間受用到勾俺十日消磨今畨負痛猶間可慶官酒怎的殺割輪著次第兒實實的到我只説的個且消停慢慢由他我待推來又推不過待請來其實的怕多因此上兩耽閣耍孩兒告神天何時展放眉頭鎖慶了官諸餘的較可街坊鄰里莾􅌽喝衆親朋暗暗的擠撮他們雖不曾𫾣牛宰馬排筵宴他也曾擔酒牽羊遞果盒道恭喜作慶賀免不的搭席棚收拾座榻整厨竈刷洗下沙鍋十煞回席待衆賓開筵列綺羅今畨看我把這慳來破丹青幀上新鮮味水墨圗中竒異果雲中鴈飛騰過醴泉郡井花白酒右軍池水儧的肥鵝九煞更有那結了子蘿蔔頭攛下苔的芥子柯乾蔓菁晒下有十餘箇應時的蔬菜雖然少爽口的珍羞不用多喫呵喫休眼皮兒餓更有些掉抹來的孤兒點刴添換上是蕎麥􅔇的餄餎八煞大柿餅擺下幾雙乾軟棗㝎上八箇秃了的栗子十餘箇空了的搸子分做三處油沁了的核桃措了五卓用意兒對付了這五盤果待賔朋只圗好看潑家私那討若多七煞往常時喫别人的汗似澆到今畨喫我的淚似梭庖丁行磨石關節兒先題破背皮煮爛何須按豬首燒􅌻且慢割不移時天色暗日頭落却元來是凨雲慶會雷雨交作六煞割胸子用了四指脆骨獻豬頭使了兩雙耳朵盤腸膚肋都只是虛􅌽喝厨頭燒炙也只是提名件爐裡乾煿都只是假念聒那裡有些兒箇會支分的東家省儉聽使喚的局長斟酌五煞碗兒裡青龍罩碧波雙龍戲珠顆衆星捧月名兒大襯揲子的骨捧擂槌般大蓋面子的腰脂𥿄葉似薄待動筋沒著摸衆鄉鄰咂唇啖嘴主人家睁著瞧科四煞小生喚點湯賔朋索散火一天凨雨救了咱全家禍盻歸家的逺客實心兒遄迫逃席的東君假意兒拖不移時棚兒漏又難存坐恁只道邅凨雨主人慳吝我道來感天地節令調和三煞慌的那官人每把上蓋兒疊娘子每把繡鞋兒脫跟隨使從的都在人家房簷下躲新鮮的錦繡稀泥中汚濟楚的衣冠大雨裡濯惱殺他喜殺我著雨的憂心悄悄得手的大笑呵呵二煞羊背皮著􅌻醬擦燒豬頭著滚醋兒潑殘零的按酒著椒鹽兒抹隄防著冬至從消受準備著新正再享活那其間用不用還由我似這般全無撙節到頭來定受折磨一煞炒菜水休要丢煮肉湯爭忍潑楪兒中剩菜又有偌來箇不分老少由他喫那問尊卑一例喝只有兩件兒難發落饅頭皮晒成醬黃菜饀兒插做和和隔尾􅌻菜蔬充了飢腥湯水解了渴乍喫葷的肚皮兒都傷破家僮㵼倒難跟馬荆婦撑翻怎上鍋連我也㺯的沒殺合出來的直腸直肚東厠裡做不的存活尾聲輪到咱輪到咱沒奈何沒奈何這場破費敢道有天來大再題起回席兀的不唬殺我粉蝶兒富文堂陳大聲作萬卷圗書錦亭臺閙花深處值清朝事簡公餘寵光深人物勝德星相聚坐客無虛要平收午橋佳趣南泣顔回談笑有鴻儒盡是文章儔侣綸巾布氅交參紫綬華𥚑飛觥走斚看笙歌羅列尊罍具樂陶陶景媚時良間夭體廣情舒北塞鴻秋到春來策吟笻剛詠徹梅花句喜春和試羅裳間倚遍闌干玉趂春晴縱青鞋慢踏損蒼苔緑恐春深下珠簾不放入垂楊絮無意送春歸有心留春住分付杜鵑聲省可催春去南普天樂繡幃遮銀屏護芳草徑妖桃塢好相看照眼芳菲怕甚麼妬花風雨幾畨痛飲西園暮兩行紗籠燒銀燭海棠風蕩漾紅綃薔薇露點滴明珠有清油小蓋畫壁輕車北脫布杉閙雕楹燕子鶯雛點清池睡鴨飛鳬紅萱草芳㽔半吐紫丁香細心微露么坐對南薰倒玉壷細切香蒲荷花十里錦雲鋪聽一片歌聲度風月賽西湖北小梁州蟬聲兩兩鳴南樹夢𥘉回碧簞紗㡡間將緑綺彈靜把黃庭注蘭湯新浴罷長日一塵無南雁過聲規模潭潭相府堪寫入王維畫譜水沉一縷摶香霧笑三閭傲陶朱正好懷寬放吟骨清臞汲泉煮茗調氷雪藕納涼揮麈把人間一時熱惱盡消除北醉太平恰金風送暑早玉露滴梧碧天涼冷雁來𥘉與知音四五駕長風捉下天邉兔學長鯨吸盡杯中物㺯長竿掣得水中魚任狂歌怪舞南傾杯樂須臾十日霜幾夜風催綻東籬菊砌湧層巒泉飛靈竇橋橫幽洞門俯清渠賦成鸚鵡杯傾醹醁帽插茱茰又何須登髙戲馬憶東徐北貨郎兒犯寒不到重簾深户錦片似氍毹低簇簾鈎十二控珊瑚下著錦帳擁著紅爐對著玳筵前粉一攢花一簇捧著羊羔斟著馬乳勸著瓊酥有繁絃急管每分曹部演呈祥獻壽梨園這詞賦吹的吹彈的彈教習得精􅌻翡翆鐺瀹龍團鳯餅壓盡陶榖氣昻昻居著清要名赫赫執著金吾安享升平無限福南小桃紅侍虞廷陳禆輔入洛杜論今古虎帳談兵嚴法令施鎮撫古來幾箇文兼武眼前那有清而富更那堪謙德通疏北伴讀書簡書文半逼蘇詩律法全學杜走蚓驚蛇寫一筆唐懷素好竒觀雅玩娛心目有商􅉓周鼎多陳布所事俱足南笑賢歌遍江山古迹圗總金石名賢籙博考索精求募看金甌名姓覆專閫計請兵符統雄卒運竒謀破妖胡獻降俘試看他拜將封侯談笑取煞尾堂須造盟可續本是騷壇放浪徒豈待公孫折簡呼粉蝶兒春夜歸思三㺯梅花戍樓中角聲吹罷月輪兒斜映囱紗托香腮湮淚眼一篝燈下展轉嗟呀耳邉言都做了一場間話南泣顔回薄幸忒情雜不比尋常戲耍出門容易而今海角天涯歸期歲晚轉頭來過了春和夏去時節霜老芙蓉却又早水冷蒹葭北石榴花我只向緑囱前斷送下好年華許多時胭脂不曾搽九回腸翻倒的越窄狹幾乎害殺鬼病增加一會家告蒼穹問箇龜兒卦不明白甲乙交義猛然間撚起香羅帕肯分的繡一朵並頭花南泣顔回姦猾心性忒難拏瞞人利齒伶牙悠揚不定猶如風裏楊花千思萬想恁從來色膽天來大恐習學竊玉偷香搪揬了相府髙衙北閗鵪鶉惡離別動歲經年又不比些時暫霎恨壓損眉黛雙彎瘦減盡腰肢一搯我這裡暮暮朝朝想念他他何曾繫挂咱不能勾碧漢乘鸞只落的垂楊繫馬南撲燈蛾恩情如搦沙清苦似嚼蠟知他在那裡偎笑臉虛擔著許多驚怕也不須尋消問息到頭來終有箇還家風流罪招由細數從頭來一椿樁一件件細詳察北上小樓我自來無玷瑕他從來知禮法平白的受盡凄涼擔著寂寞邅些折罰眼見的漏澀銅龍聲喧鐵馬香消金鴨我這裡最難􅋙暮冬殘臘南撲燈蛾風兒颼颼亂刮雪兒紛紛密灑凄凄的鳯枕單沉沉的鴛帳冷薄薄的繡衾寒壓懨懨的銀燈爆花嗚嗚的城上吹笳鼕鼕的殘更正煞呀呀的曉天啼散樹頭鴉尾文君再把香車駕只恐琴心調㺯差返與相如做話把
