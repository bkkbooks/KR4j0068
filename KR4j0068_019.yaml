呆鄧鄧煩惱無顛倒凄凄涼涼怎得雞兒呌孤孤另另倦聽促織兒哨兀的不迤逗殺人也麼哥兀的不迤逗殺人也麼哥悄悄戚戚傷懷抱歡歡喜喜多少恩和愛美美匝匝夫婦無嗔怪冷冷清清日月難攴待思思量量難徹相思債兀的不禁害殺人也麼哥兀的不禁害殺人也麼哥腌腌􅧐􅧐病症著床害孤孤另另獨對殘燈照懨懨悶悶自把幃屏靠思思量量想起人兒俏絮絮叨叨念的傷懷抱兀的不熬煎殺人也麼哥兀的不熬煎殺人也麼哥寂寂靜靜怎得雞兒呌叨叨令幽興溪邉小徑舟橫渡門前流水清如玉青山隔斷紅塵路白雲滿地無尋處説與你尋不得也麼哥覔不得也麼哥却元來儂家鸚鵡洲邊住淡煙籠罩西湖路酒旗招颭垂楊樹畫船斜刺花深處煞強如儂家鸚鵡洲邉住兀的不快活殺也麼哥快活殺也麼哥抵多少相逢不飲空回去青簾髙挂垂楊樹朱簾暮捲西山雨不向禁城狼虎叢中去只在儂家鸚鵡洲邉住兀的不快活殺也麼哥快活殺也麼哥抵多少夢回明月生南浦錦幃不如新栽樹畫閣何堪舊苫廬間携猿鶴尋知故誰似咱儂家鸚鵡洲邊住兀的不快活殺也麼哥快活殺也麼哥再不向金門玉砌成名去叨叨令遇美金烏半墜銜山玉樽前有箇人如玉春蔥半露纎纎玉烏雲半朵橫叉玉兀的不愛殺人也麼哥兀的不愛殺人也麼哥方信道書中有女顔如玉二期約叮嚀約㝎偷期話欵把門兒悄悄呀潛潛獨立在花隂下戰戰不住心兒怕忽的走將來也麼哥忽的走將來也麼哥果然色膽有天來大三交歡拈拈恰恰人來倦挨挨靠靠熱厮纏絮絮叨叨情不厭羞羞答答怕待言只恁的慣禁害也麼哥只恁的慣禁害也麼哥顛鸞倒鳳忒寒賤四敘別鍾聲殘囪外雞兒呌鼓聲催園內雅兒噪綘蠟昏床下紅兒報説誓盟不捨人兒俏好恩情易别離也麼哥好恩情易別離也麼哥得功名即便先來報叨叨令懷金陵長干橋畔梁王寺胭脂井上陳家字吳宮晉闕誰為主空遺幾册金陵志上面都寫著也麼哥上面都寫著也麼哥寫的是南朝千古傷心事淹淹水祼金山寺寺壁寫著佳人字後來猶望雙生至寫道小小蘇傳示上面都寫著也麼哥上面都寫著也麼哥寫的是南朝千古傷心事殿前歡道情楚淮王忠臣跳入汨羅江離騷讀罷空惆悵日月同光傷心來笑一場笑你箇三閭強為甚不身心放滄浪汚你你污滄浪暢幽哉春凨無處不樓臺一時懷抱俱無奈總對大開就淵明歸去來怕鶴怨山禽怪為甚不功名在酸齋是我我是酸齋覺來評求名求利不多爭西凨吹起山林興便了余生白雲邊構草亭但留下尋芳徑消日月存天性功名戲我我戲功名怕西凨晚來吹上廣寒宫玉臺不放香奩夢正要清濃此時心造物同聽甚霓裳㺯酒醒後黃鶴送山翁醉我我醉山翁殿前歡離愁病多時芙蓉粉淡鬢堆絲鴻來不見音書至欲寄情詩借楓林紅葉兒芝麻字也寫不了心間事嘆有緣離恨恨無限相思病難熬無情無緒過花朝不茶不飯傷懷抱越恁無聊粉脂殘香暗消芙蓉貌我只怕鶯花笑深扃繡户低簇珠箔淚盈盈秋聲相間喟然聲枕衾相空人孤另翆帳寒生滴梧桐雨乍晴凨才㝎漏斷人初靜悶偏嫌夜永愁盻到天明夜深沉漏聲􅉉馬和蛩吟雨餘簾幕新涼甚好夢難尋鴛鴦帳翡翆衾珊瑚枕無計把相思禁淚糢糊困眼恨塞滿愁襟殿前歡詠酒酒凨流一杯消盡古今愁醉鄊寬闊無昏晝管甚春秋只喫的醉後休醒時又酒灌殺誰能勾問甚麼莊周夢蝶蝶夢莊周酒皮禈無明無夜醉醺醺騰騰兀兀胡突運辨甚清渾破磁甌老瓦盆煞粗坌與豪客消孤悶羡林中日月樂醉裡乾坤酒精靈從伊出世幾人醒問君何德稱賢聖誤盡蒼生竹林賢命巳傾灌殺彭澤令縱不死也都成病棄職身為大碩以酒為名酒神通能增狂客無窮興功名流入無何境淹盡英雄無些兒輔世能到有人知重想起來成何用琴書上意懶歌舞處情濃殿前歡題情恨襄王這回無夢赴髙唐盻鸞輿立遍青苔巷目滿昭陽長門靜輦路荒無程望空沒亂春心蕩漾掩不迭情淚續不上愁腸月圓圓露寒凨細夜漫漫凄涼物感愁心亂分外恐酸求鳯凰舞鏡鸞空腸斷魂魄也難逃竄少欠他情思虧負俺情歡禁閨房清霜輕染鬢邉愁怨粧粉淡梨花瘦減動凨流鴛鴦殿燕子樓空遙受兩件兒怎能勾天來髙孤悶地來厚間愁感情懷舊愁新害擁將來填還不徹相思債春盡天台鉛花謝錦樹衰情緣在惡光景欺人煞掩黃昏庭院飛暮雨樓臺殿前歡酒色財氣好時光休要皺雙眉有花有酒同歡會滿飲金杯酒淹的衫袖濕醉了呵齁齁睡醒來也重還醉喫了穿了快活是便宜好時光儘我放心為嬌花嫩蕊成佳配翆繞珠圍保元陽且莫題每日赴鴛鴦會儘夜效鸞凰對耍了笑了快活是便宜黃金散盡還來日有錢有鈔休慳細有甚稀竒急回首海塵飛枉積下成何濟興和寐勞心力使了用了快活是便宜饒人一步不為癡存仁存義休爭氣枉費心機得讓時且讓伊待爭甚名和利誇買甚能知會忍了耐了快活是便宜殿前歡思情翆鸞孤懶粧羞對美人圗臉殘蓮蕚肌消玉花貌清臞黃金鳯碧玉梳何曽覷無情物算來也傷心緒梳不通宫怨叉分斷華胥恨千疊半衾香散夢蝴蝶枕屏虛度如年夜景物堪嗟桐隂轉月影斜蠟將盡燈待滅攛送到愁時節凄涼心易感坎坷運難折恨殘春梨花暮雨掩重門花飛又到愁時分分外消魂無休歇揾啼痕淚淹的羅衫潤淚滴盡愁難盡忘餐捱白晝和淚待黃昏倚危闌闌欄便是望夫山雲間數遍西飛雁無箇平安愁難盡淚不乾枉短吁空長嘆越煩惱越無限欲消磨離恨除是見雕鞍殿前歡八葫蘆酒新篘一葫蘆春醉海棠洲一葫蘆未飲香先透俯仰糟丘傲人間萬户侯重甘後夢景皆虛謬莊周化蝶蝶化莊周酒頻傾一葫蘆凨味扶詩興一葫蘆杖挑相隨㝎荷插銀瓶愛詩家玩步兵寬沽興身丗都休競螟蛉蜾螺蜾螺螟蛉酒杯濃一葫蘆春色醉山翁一葫蘆酒壓花梢重隨我奚童葫蘆乾興不窮誰人共一帶青山送乘凨列子列子乘凨酒頻沽一葫蘆山鳥喚醍醐一葫蘆醒也問有無擎樽凝覷道飲徹還沽去踈狂趣枕琴臥在花深處三閭笑我我笑三閭殿前歡相思晚𥘉晴半痕秋月照囪櫺梧桐敗葉凋金井淅淅凨清促織鳴愁難聽鈇石般心腸硬怎合得這啼睛惡病須易害好夢㝎難成想他時懨懨常是害相思心中多少傷懷事感嘆嗟咨寄凄涼四句詩托知己暗傳示回一箇鴛鴦字若來時便可勝海上方兒俏冤家平白和我意兒差當𥘉曽説知心話陡恁情雜非干是我負他他到説和咱罷罷了也猶牽挂相識每見他因話兒題咱説山盟兩情稠密海來深只想你貴將咱聘廢了恩情咱寧耐守婦名越思量越動情情沒亂何曽㝎今生非分淺分淺是前生殿前歡幽情煙波萬頃洞庭秋紅薑細切白蓮藕橙泛金甌潑䤃新斑竹篘買窮究不如醉而醒醒而又有青山緑水不羡你肥馬輕裘水村山館草萊廬生平不識青雲路新酒活魚吟會詩看會書人問我家何處在鸚鵡洲邉住有黃橙紫蟹不羡你玉帶金魚舍之則藏用之行歸來愛煞彭澤令家住蓬瀛望白雲憶酒樽近東籬露頂吟楊震節淵明興有猿鶴相伴不羡你畫閣圗形人笑螳螂捕噪蟬螳螂又𬒳雀來餐腦後難防挾彈客無虛放螳螂夭雀隨亡吾參破潛江上有泉聲韻巧不羡你玉珮玎璫殿前歡村居會尋思過中年便賦去來詞為甚等間間不肯來城市只怕俗郤新詩對著這落花村流水堤柴門閉栁外山橫翠任斜凨細雨也近不得這蒲笠蓑衣二登會波樓四圍山會波樓上倚闌干大明湖鋪翆描金間華島中間愛江心六月寒荷花綻十里香凨散𬒳沙頭啼鳥喚醒這夢裡微官三玉香毬花玉香毬花中無物比凨流芳姿奪盡人間秀氷雪堪羞翆幃中分外幽開時候把凨月都熏透神仙在此何覔揚州四對菊自嘆可憐秋一簾踈雨暗西樓黃花零落重陽後減盡凨流對黃花人自羞花開卸還依舊人比這黃花瘦問花不語花替人愁五獨館思歸杜鵑啼一聲聲呌道不如歸緑囪深鎖重門間獨自孤恓不歸呵有何益名位險祿緣細上東封書策懇索箇歸期六觀螂雀圗笑螳螂撲蟬終日受飢荒花間黃雀偷睛望災害難當螳螂𬒳鳥啄傷捕禽子弓玲便雀中彈魂飄蕩螳螂方命夭黃雀早身亡清江引酸齋舞香塵小園凨亂飄滿地胭脂落金踈楊栁枝玉減梨花蕚把春光等間辜負了宿雕梁一雙巢燕慵翆栁鶯眠重蜂間報曉衙蝶倦逰春夢小園中幾般都恨凨狂凨一春十占九搖撼花枝瘦沙摧杏臉愁土蝕桃腮皺瓓珊了一株金線栁薄情的封家十八姨大逞狂心力楸撏萬片紅摔碎千條翆斷送了好光隂都是你軟兀刺窄藤床甘菊枕桃竹簟清涼甚白石榴花朵新紅海納枝柯蔭小書囪晚來獨自寢些兒名利爭甚的枉了著筋力清凨荷葉杯明月蘆花𬒳乾坤靜中心似水靠蒲團坐觀今古書賡和新詩句濃煎鳯髓茶細割羊頭肉與江湖做些凨月主間來唱會清江引解放愁和悶富貴在于天生死由乎命且開懷與知音談笑飲且開懷與知音談笑飲一曲瑶琴㺯彈出許多聲不與時人共倚幃屏靜中心自省倚幃屏靜中心自省萬事皆前㝎窮通各有時聚散非驕吝立忠誠步步前程穩立忠誠步步前程穩勉勵勤和慎勸君且耐心緩緩相隨順好消息到頭端的凖昭君路迷關塞雪蔡琰明笳月往事惟心知新恨慿誰説只恐帕夢回春去也清江引秋意十闋一歲兩回春到來花也多成敗只為雲莊秋不避東君怪因此上向西凨特地開前日彩雲飛上天又向深秋見翆淡遙山眉紅慘春凨面恨燕鶯歸期天樣逺霜重物華搖落秋驚見春如舊一笑踈籬邊更比黃花瘦剗地殢西凨猶帶酒宋玉每逢秋嘆嗟見比應歡悅恰𬒳凨吹開莫遣霜摧謝恐他惜花人來到也亭下拒霜花數叢不與渠同夢嬌倚秋雲薄瘦怯霜華重幾時盻得箇日遲遲春晝永一日繞觀十數回只恐花憔忰錦帳遮寒威銀燭添春意端的太真妃初睡起寂寞一枝三四花㺯色書囪下為著沉香迷夢見嵬坡怕且潛身住在居士家花竹滿亭髙士居常把春留住賞罷芙蓉秋又見胭指露筮的是綽然亭世間絶妙處睡起不禁霜月苦籬菊休相妬恰與東君別又𬒳西凨誤交他這粉蝶兒無是處香滿竹籬花正嬌開徹胭脂蕚不幸遭凨霜葉兒都零落果然有上梢無下梢清江引相思愁聽畫樓簷外鐵又值蛩吟夜心中無限思最怕窗間月這其間多情何處也夢回枕邊人去也簾外無情月如何你獨圎照得人來缺惡相思挽霜毫不次寫怕聽秋來促織吟鎮日情難禁病兒疾漸沉書兒全無信但合眼巫山有夢尋魚沉雁杳絶信音淚點香羅印一别更數春想念時時恁怎忘的那宵一片心清江引楊妃三郎悮聽枕畔啜縱得厖兒劣刮動海棠凨敲碎梧桐月嬌滴滴玉人何處也二王嬙貂裘變粧辭漢闕博得凨塵滅黃雲青冢秋白月黑河夜嬌滴滴玉人何處也三贈鶯兒妓名遷喬便尋同志友處處啼春晝攛花錦杼鳴擲栁金梭閗彈丸兒那一箇先下手四劉春景妓名落紅滿地誰是主送得春歸去有意惜花殘無計留春住楚陽臺夢兒中雲共雨五張斗兒妓名四四方方輕又輕每日斟量㝎就裏底兒平外面幫兒正小東西看來無十升六張五兒妓名細膩膩外樣兒雖是好就裏粗生料一生有人欽五世家傳樂但拈著指頭兒都軟了七劉麻兒妓名凹凹凸凸嬌又巧所事心偏好一歌金縷詞十錠鴉青鈔鐵石人傍著他麻木了八王嫫兒夜來間步囪外影側耳潛厮聽恐客枕邊唆孩兒心間應老殘生那答兒是葬身后庭花酒興一聲金縷詞十分金菊巵金創分甘蔗金盤薦荔枝不須辭太平無事正宜沉醉時相逢飲興狂霜螯凨味長鮮鯉銀絲膾金蠶折蠣房透瓶香經年佳釀陶陶入醉鄊凨暖紫貂裘霜合白玉樓錦帳羊羔酒山隂雪夜舟黨家侯興來時候汚他王子猷溪山好處逰仙家酒旋篘三島十洲客六卿萬户侯不詢由玄關參透世無天上有后庭花冷泉亭四時景六橋煙栁顰兩峰雲樹分羅襪移芳徑華裙生暗塵冷泉春賞心樂興水邊多麗人碧湖環武林仙舟出湧金南國山河在東凨􅋄木新冷泉隂興亡如夢傷時折寸心香飄桂子樓涼生蓮葉舟落日鴛鴦浦西凨鸚鵡洲冷泉秋禪林新構題詩憶舊逰江南春巳通隴頭人未逢水淺梅橫月山明雪映松冷泉冬烹茶無用人在錦帳中后庭花秋思西凨黃葉闌子規啼𢾗畨日近長安逺見郎難上難盻歸鄊清明去也白露人朱還西凨黃葉踈一年音信無除非來夢裡夢回總成虛夢成虛一時相聚新來夢也無西凨黃葉稀南樓北雁飛揾妾燈前淚縫君身上衣約歸期清明相會雁過人未歸西凨黃葉飛染毫寫恨詞縫在衣領裡祝郎早早回見詞時知咱耽疾連他也染疾十九卷終
