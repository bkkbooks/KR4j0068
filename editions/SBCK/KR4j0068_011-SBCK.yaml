封守宫是一對雏鸞嬌鳳川撥棹喜相逢喜相逢可喜種栁困花慵玉煖酥融那一㑹風流受用顫巍巍寳髻鬆困騰騰秋水横曲灣灣眉黛濃七弟兄酔烘玉容暈微紅尤花殢玉歡情縦都疑身在睡魂中蕋珠宫􅂻逰仙梦梅花酒恰收拾雲雨蹤沒亂煞見慣司空禁鼓銅龍簷馬丁東隣鷄唱画角終玉蓮漏咽銅龍銀河燼落金䖝紗囱外曉光籠收江南呀轆轤聲在粉墙東鴉啼金井下梧桐春嬌滿眼未醒􅥋􅀅一叚幽歡密寵等閑驚覺惜匆匆鴛鴦煞􅅻歡恰入梅花詠風光又到椒花頌粧􅀧新春斷送殘冬行樂莫相違良辰不易逢臘雪夜来消春意明朝動只㡬日東風樓外青山翆如擁新水令昭君出塞錦貂裘生改盡漢宫粧今日箇㸔昭君画圖模様舊思金勒短新恨玉鞭長本是對金殿􅂻鴛鴦分飛意怎承望駐馬聴宰相毎啇量止不過赴國還朝多賜賞早是俺夫妻每悒怏便做道小家児出外也揺椿渭城衰栁助凄凉覇橋流水添悲愴偏恁怎不斷腸娘娘他一天愁都撮在琵琶上步歩嬌你􅀅那一曲陽關休􅁿放咫尺如天様慢慢的捧着玉觴本意樽前捱些時光一壁廂列着宫啇便與我半句児俄延着唱落梅風早是俺别離重只恁般歸去的忙一片心先到李陵䑓上為頭児恰􅅻心内想便休題貴人多忘殿前歡怕不待要舞霞裳我則怕春風吹動舊時香怕羊車載過青苔巷猛到椒房一㑹家想菱花鏡􅂻粧風流忽的来心上今日㸔昭君出塞㡬時似蘇武還鄉鴈児落做了箇别虞􅁎椘覇王那里也守玉關征西􅀅保親的是李左車送女客的蕭丞相得勝令那里也架海紫金梁􅁁庭上鐡衣郎恁則待左右人扶侍我可甚糟糠妻不下堂你題起刀鎗撲撲的小鹿児心頭撞使㡬箇婆娘你可是男児當自强川撥棹怕待不放􅁝韁我可甚鞭􅃻金鐙嚮你可甚爕理隂陽掌握朝綱治國安􅀖展土開彊假使髙王使你梅香背井離鄉臥雪眠霜那里也春光画堂官封你做一字王七弟兄請你箇大王不當呌王嫱怎禁他去也回頭望我可甚風雲旌節韻悠􅀭助關山鼓角聲悲愴梅花酒呀我向這野陌荒凉免起早迎霜犬退的毛蒼車送着餱糧馬稱着行装人列着圍塲他傷心思漢主呀敢我携手上河梁前面呌擺成行愁鑾輿到咸陽到咸陽過蕭墙過蕭墙轉􅅆廊轉􅅆廊近椒房近椒房竹生凉竹生凉月昏黄月昏黄不思量收江南呀不思量除非是鐡心腸鐡心腸也泪滴千行羙人圖今夜掛在昭陽􅀅娘娘供養我可甚髙燒銀燭照紅粧新水令蘇武還鄉衆畨官簇擁的我上雕鞍閙垓垓一行戎扮馬頭前金蹀􅉜駝背上錦斑襴打着那雲月旗旛送我其間則聴的画角聲殘錯聴做頭直上􅀉書的鴈甜水令誰不知蘇武和畨李陵入塞何時歸漢空着我終日盻函關我對着那青塜巍巍平沙漠漠荒坡古岸我淚珠児都做了衰草斑斑折桂令我愁的是黒河中流水潺潺我這里挽不住􅁝韁兩三畨家上不的雕鞍空着我便兩下里傷懐一天哀怨都做了滿腹愁煩飲一杯送路酒如傾我這泪眼念㡬句餞行詞如摘下我心肝我拜辭了紫塞風寒衰栁凋殘晚照離山想殺我也渭水西風盻殺我也落日長安鴈児落誰不知你享富貴佐在北畨今日箇蘇子卿持漢節扶西漢想顔囘不是困窮孔子在陳蔡非是厄難得勝令呀這的是李陵蘇武鴈門關抵多少伯夷叔齊首陽山似這般落日黄庭幕㸔了些西風紫塞寒蘇武坡犇彎聴了些淺水流􅀷澗李陵得這䑓前見了些􅀌雲落淺山沽羙酒過太平令我當􅀄脱公服出塞關今日箇穿皮襖入長安我正是鐡甲􅀅軍夜過關我今日還朝来意滿見家属喜無限我受了十九年牧羊的這魔難喜得俺一家児人馬平安不問我這窮家業人離財散則􅂅的漢社稷河清海晏為甚數畨百般穿不上這紫羅襴這的是俺那牧羊䖏習儀不慣鴈児落臣􅀅這兩輪日月安救四海民無難我情􅂅一身児受坎坷我無那半􅀧児心辭惮掛玉鈎􅂅陛下海晏河清萬里安則道是還鄉了也蘇子卿你不是盡孝盡忠紂比干怎如那蕭相國扶炎漢武又無伍子胥文又無周公旦爭過這太半乾坤保護着萬里江山新水令范蠡歸湖越王䑓無道似摘星樓少不的又一塲武王伐紂兵臨吳越境月滿洞庭秋我如今賺得歸休恨不的拂破了布􅂁䄂駐馬聴椘尾吳頭雪浪雲濤萬頃秋遶着這家前院後止不過烟簔雨笠一扁舟強兵富國覇諸侯到如今山妻稚子都三口任去留趂着這五湖烟浪長相守沉酔東凨棹不過黄蘆岸白蘋渡口且灣在緑楊堤紅蓼灘頭雖無刎􅖪交􅁍有忘機友􅀧秋江白鷺沙鷗傲煞人間萬户侯我是箇不識字烟波釣叟撥不㫁蟹擘紫石榴橙剖軟金甌釣的這錦鱗来活納入青蒲簍緑蟻香浮斑竹蒭紅薑細切白蓮藕酔後呵只睡到烟寺里鐘嚮漁浦榔鳴江村月落海國潮来那其間􅅻是我那酒醒的時候慶東原鑄我做黄金像供養我在白玉樓你不合信讒言便准了西施奏往常我便談天我今日箇閉口往常時我便挐雲今日䄂手往常時我便輔國今日抽頭運糧草衆軍驕薄税歛􅀺民瘦鴈児落疑恠他這逰魚児不上鈎􅁍原来是腦背後蛟龍閗顯得俺那歸湖的有見識眼睜睜見死無人救得勝令道童才你與我便輇撥轉釣魚舟㸔了這霜降水痕􅀵一任教越國西施喚再休想搬囘壮士頭休休儘教那梦非熊文王􅀱不如我垂鈎釣西風渭水秋沽羙酒我如今秦不管魏不收到如今千自在百自由我可是扶侍君王不到頭見如今敵軍在他背後􅀅你那夫妻毎􅂃追逐太平令亡家國自作自受趂風波東諌東流貪酒色憐新棄舊聴讒言光前絶後呀如今在渡口岸頭報讐正遇着過海天隂船漏川撥棹喒兩箇舊交逰死生交同志友我與你髙壘􅀷溝開闢田疇百姓每歌謳二十載􅀅沒作有這的是􅀘完天地手七弟兄勸着你不偢落後强出頭端的是忠臣捨死忘前後仵貟一命丧髑髏君王毎苦樂皆同受梅花酒西施你如今􅀊數有减盡風流人老花羞葉落歸秋往常喫衣食在裙􅅁頭今日你分破俺帝王憂我可甚為國愁俺心去意難留您有國再難投俺􅁿撥轉釣魚舟趂風波蕩中流􅀵江南呀我則待臥吹簫管上􅀭州則俺那上源頭強似你下塲頭皆因歌舞一齊休􅀙今後罷手常言道前人田土後人􅀵尾聲聴筵前聒耳笙歌奏不隄防隣國􅁁關透他是箇戴南􅃣的椘囚一箇是出波龍一箇似傾巢鳳一箇是丧家狗我如今雲㠶疾如梭強如您金印大如斗我再不掛名利逺走趂着這逰四海五湖心蔵了這下三山釣鰲手新水令追韓信恨天涯流落客􅀌寒嘆英雄半生虚幻坐下馬空踏遍山水雄背上劒光射得斗牛寒空塞扵天地之間雲遮斷玉砌雕欄按不住浩然氣透霄漢駐馬聴囬首青山拍拍離愁滿􅀾鞍舉頭新鴈呀呀哀怨半天寒指望待龍投大海架天關剗地似軍􅀐羸馬連雲棧他覷英雄如等閑堪恨這無端四海蒼生眼沉酔東風幹功名千難萬難求伸志兩次三畨當􅀄我離了項羽今日我也别了炎漢不覺的皓首蒼顔對着這月朗風清把劒弹百忙里揾不住我這英雄泪眼鴈児落丞相你􅀅咱不住赶韓信也則索把程途盻為甚麽恰相逢早禁聲非是我不言語相􅁿慢得勝令我則怕义手告人難因此上􅂴下寳雕鞍傳與俺漢天子休心困我量那椘重瞳怎掛眼乗駿馬雕鞍向落日夕陽岸伴簔笠綸竿我則待釣西風渭水寒掛玉鈎我怎肯一事無成兩鬂斑既然你不用我英雄漢因此上鐡甲􅀅軍夜過關你莫不為馬来也􅀅人赶既不你為馬来你有甚别公幹你着我輔佐漢世江山保奏的我掛印登壇川撥棹半夜里恰回還抵多少夕陽歸去晚我則見烟水潺潺珂珮􅃢􅃢冷清清夜靜水寒可正是漁人江上晚七弟兄脚踏首跳板手扶着釣竿不住的把船攀兀良我則見沙鷗驚起蘆花岸􅑯楞楞飛過蓼花灘恰便似禹門浪汲桃花泛梅花酒雖然是暮景殘恰夜靜更䦨對緑水青山正天淡雲閑明滴溜銀蟾出海山光燦爛玉兎照天關撑開船掛起㠶俺紅塵中受塗炭您緑波中覓衣飯俺乗駿馬惧登山您駕􅀌舟怕逢灘俺不􅀎勾紫羅襴您空執定釣魚竿喒都不到這其間收江南呀這的是烟波名利大家難抵多少五更朝外馬嘶寒對一天星斗跨征鞍不由我惓惮􅄸来名利不如閑尾聲我想這男児受困遭魔難恰便似蛟龍未濟逢乾旱塵濛了􅀾䇿兵書消磨了頓劒揺環唱道惆帳功名因何太晚似這般渉水登山休休休空長嘆謝丞相執手相㸔哎你箇􅀎舉薦我的蕭何你可也再休赶新水令樂道對青山盖一座草團瓢伴琴棋古書茶藥門前㘽野杏院後種山桃松竹週遭無榮辱有歡樂駐馬聴散旦逍遥貧不憂愁富不驕誠心修道韶光逝水不相饒臨風對月品鸞簫􅀝溪近澗􅀅琴操無惮勞恁無情水火来週照喬牌児蝸角名不甚好蠅頭利有何妙俺存心無甚閑煩惱睡東囱紅日髙川撥棹閑来時過溪橋採藤花摘藥苗林下漁樵每日相􅌽俺三箇知心故交淡生涯活計小無憂愁閑快樂七弟兄喚山童舞着唱着飲香醪旋蒭的村酒連壷調􅀅宜時野菜帯根挑瓦盆中慢火煨山藥酔了時就地倒聴翆竹蕭蕭見梧葉飄飄㸔緑水迢迢梅花酒樂清閑度􅀊華無憂愁過逐朝四時中景物好春花開滿山遥夏天凉晚風飄秋月明素蟾髙冬瑞雪壓梅稍收江南呀㸔了一年四季樂陶陶蘆花􅀍煖度良宵瓦爐中伏火暗香燒掩柴門靜悄閑来無事跨雲鶴轉調煞散清香滿院松花落風来􅃻翆竹如宫調聴黄鶯㺯巧雲林散旦樂安然一世児清閑快活到老新水令王妙妙死哭秦少逰似一江春水向東流對秋天動情感舊心愁一萬縷半載勝三秋一望雷州一凝竚一僝僽駐馬聴一向淹留􅀉一􅁓書来一字愁自􅀙别後一畨花落一畨羞一聲杜宇倦凝眸趂一鞭行色慵回首我精神一旦休折倒的一枝粉淡梨花瘦甜水令則見那閙閙烘烘聒聒噪噪道姓題名圍前圍後濕浸浸冷汗遍身流哭哭啼啼凄凄凉凉不堪回首愁和悶常在心頭折桂令困騰騰髙枕無憂􅁍和你梦里相逢元来是神遶魂逰一靈児杳杳􅄀􅄀哀哀怨怨蕩蕩悠悠恓惶泪流了再流思量心愁上添愁空教我淹損􅀟眸拆散了燕侣鶯儔至老風流佳句難酬覷了這一曲新詞便是他兩句遺留落梅風染胭脂雙眉皱形容出兩鬂秋覷絶時泪淹衫䄂病来時倒大来不自由怎画的来骨崖崖影児消瘦慶東原你為我容顔瘦我為你心緒愁臨􅄮執手相别後我為你再不惹狂朋恠友再不喫閑茶浪酒再不上謝舘秦樓再不共厮追陪再不説閑聲嗽沉酔東風你虚飄飄㧞着短籌冷清清􅄸在雷州感承你實丕丕厮愛憐樂陶陶常相守誰承望苦懨懨拆散鸞儔眼睜一日無常萬事休則落的痛殺殺澆茶奠酒清江引風流落絮水上漚怎生捱昏晝月在栁稍頭人約黄昏後􅀅俺這好姻縁一筆勾碧玉簫懨懨僝僽魚水不綢繆腔腔咳嗽藥病不相投誰與你熬飰粥誰與你㸔證候獨自箇愁相思瘦休見死無人救鴈児落若是他人知替我愁更怕甚娘知道􅀅咱嗽你知時你也憂天知道和天瘦得勝令送的我白骨臥荒坵那里也談咲覓封矦你閃下真烈王行首痛殺我也風流秦少逰再相見時無由再相見時無由誰􅀎勾潑水難􅀵救休休似淹淹不㫁流喬牌児他絮叨叨不住口惡哏哏覓爭閗掀了路􅀕攔住靈柩潑了澆奠酒掛玉鈎惡哏哏魂旛児在手揪怎的死骨頭上􅀅他呪他和你生前有些甚讎恰便似刀攪我這心腸􅁏尀耐難禁受沒来由雪上加霜走􅀅来火上澆油尾聲對西風有似黄花瘦嘆椘雲不似陽䑓舊生則同衾死則同坵唱道􅂸一日無常播千年不朽眼見的因病相憂實愛情先透去意難留魂遶黄泉路児上走新水令知㡬古今興廢轉頭空嘆光隂一塲春梦今朝秦帝􅊴明日漢家宫多少英雄都曽􅀍利名送駐馬聴顯甚玲