front:
  text: 雍熈樂府卷之四
  hash: sha256:c41658456eb6ddd12e13bfe4688c368334b68939f2520f1340f2d6436416393a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_004-1a}
body:
  text: 仙吕宫點絳唇洪武天開聖恩寛大民安泰新造樓臺髙接雲霄外混江龍諸般児堪愛画簷前箇立招牌樓名児御筆頒賜酒旗児官降安排盡都是四海八方来逺客萬州千縣㑹英才廣有百味珎饈賣朝朝歡樂日日和諧油葫蘆醉仙樓每日神仙来画彩梅妍樓粧點得最竒㢤淡粉樓粉淡了多人買翠栁樓栁翠随凨擺謳歌樓歌慢酒細釅樂民樓端的民安泰則見那人攘攘閙垓垓天下樂上的鼓腹樓中且放懐酒量児寛似海更有那集賢樓多俊才鶴鳴樓驚九天輕烟樓雲裡埋便似空中降下来那吒令有那夥女色擺列着對排有那夥女色穿羅鞋綉鞋有那夥女色挿金釵玉釵端的是栁葉眉芙蓉額杏臉桃臉鵲踏枝這樓上勝蓬菜賽陽臺有酒凨流有色咊諧這兩般児千金盡難買想青春不再囘来寄生草端的是心裡快喜滿腮唱的舞的多嬌態吹的弹的堪人愛来的去的如車載便将我家私賣了待何如金銀使盡了無妨碍尾聲雙眼醉糢糊行出樓䑓外正遇着多情捻色俺咊他曽赴天台他道是前度劉郎今又来則見他精彩迎腮将人来錯愛倩人児扶䇿過芲街點絳唇春景花信風微燕泥雨霽韶光麗暖日遲遲醖醸出逰春意混江龍艶陽天氣遍園林無處不芳菲栁條嬝娜杏錦離披翠草和烟雏燕語碧桃凝露彩鸞棲芍藥粉鉛華淺試海棠絲絳蠟低垂翠檻暖香舍荳􅞦畫䦨暗雪噴荼䕷小徑嵌金錢石竹矮屏攅錦帶玫瑰花撲撲一片錦糢糊暖融融三月春光媚芳塵滚滚香霧霏霏油葫蘆四十里紅香錦繡圍風日羙香車寳馬趂晴暉雕輪輕碾莎茵細玉鞭亂拂楊花墜恰轉過甃花磚萬字堦早来到步金沙九曲堤立東風似覺非人世却疑是乗彩鳳下瑶池天下樂十二樓䑓擁翠微髙低簾半垂一處處啓紗窓列銀屏錦繡幃花香度閗草亭栁隂籠拾翠溪有丹青難下筆那吒令蝴蝶児對飛過葡萄架西逰蜂児競起落薔薇徑裡黄鶯児亂啼在櫻桃樹底鴛鴦戯緑水濵鸚鵡語金籠内一聲聲似殢嬌痴鵲踏枝錦香堆翠紅圍纔過了元夜花朝又早是禁烟寒食㸔如此風光景致儘逰人樂意忘歸寄生草泛曲水蘭舟漾簇香風彩仗移錦標收㸔罷鞦韆戯翆鬟迎齊奏笙歌沸玳筵開准僃鸞凰配夜長拚向月中歸春深莫惜花前醉么小隊按霓裳舞新腔歌金縷低随花傍栁春明媚調絲品竹仙音沸烹龍炮鳳珎饈僃瑶䑓飛下玉天仙蓬壷幻出風流地后庭花酒痕香手帕児濕花枝重䯼髻児低酒酔後情偏熱花深處眼欲迷覷吳姬風流佳麗粉酥胸白雪肌黛烟描新月眉寳釵横雲鬂堆栁腰纎玉一圍啓朱唇皓齒齊蕩湘裙蓮歩遲青歌児呀嬌靨咲秋波秋波生媚安排着雨雲雨雲情意翆䄂香温手共携画閤蘭閨綉枕羅幃琴瑟相宜鸞鳳于飛是一對羙滿好夫妻風流配賺尾賞花時㝷芳意問甚費千金一刻縱有逰絲百尺飛碧天邊難繋春暉到明日緑暗紅稀不忍聴空林呌的子䂓常則是𬒳流鶯喚起更做到殢紅粧不睡大古是惜花人愛月夜眠遲點絳唇麗情天霽雲開月華精彩南樓外行過庭堦我潜立在湖山側混江龍今夜箇百無方碍洗乾坤風露淨塵埃冷清清風揺翆竹白零零露滴蒼苔風力緊寒侵金縷衣露華凉氷透綉羅鞋輕移蓮歩慢轉雕欄簾篩月影燈晃書齋又不敢呼名道姓我則索躡足潜踪悄聲児獨立在窓児外想着俺懐児中受用怕甚麽臉児上搶白油葫蘆我着這瘦聳聳香肩将門扇児挨你試猜止不過月明千里故人来則我這後園中晚謁文章伯你不肯秦樓夜訪金釵客外面児模様好就里㝡為事歹我不比你窮酸般胡諞教均恠不放叅緊閉定㸔書齋天下樂却做了十謁朱門九不開書齋好幽㢤不曾有俗客来将幃屏㡬扇児窓下擺戀蝴蝶床榻児窄夢梅花𥿄帳児矮秀才呵你正是成人好不自在村里迓古你休教一時風火燒了咱百年恩愛則為你衾寒枕冷咱厮敬重一家無外你這般假古􅞕微身子粧些台孩可知道死了杜甫亡了韓愈渰殺李白你可甚賢賢易色元和令便有那曺子建七歩才還不了龎居士一分債他那般氣昻昻胸次捲江淮你可是酒膓寛似海則想我夜深私出綉房来實丕丕擔着利害上馬嬌一来是天地差二来是縁分該則你箇楚宋玉自裁劃待将這無出路巫娥推出門外我為甚麽来干教我空下楚陽䑓逰四門却正是蒺藜沙上野花開可不道疑是玉人来則為你冷清清難把長更捱砌下亂蛩哀咍我特地探多才勝葫蘆休着我倚㝎門児手托腮休将那不覩事的話児揣小的們天生酒量窄道的我速速眼跳氲氲的耳熱忽忽的燎雙腮么篇你見我兩朶桃花上臉来則怕你悔後也棟梁材哎你箇秉燭顔淵自鑑戒兀的般月斜風細更䦨人靜天地安排后庭花保親的論孟白主婚的唐漢䇿送女的霜毫筆守親的是硯䑓你既怕女裙釵無心相待枉将伊厮定害王子髙不好色周瓊姬忒分外卓文君是不諧栁葉児哎你箇漢相如休恠則要你温我的浸冷羅鞋干教我羞荅荅懶把門程邁哎你箇梁山伯不采我這祝英䑓羞的我怏怏児囬来寄生草你則怕擔煩惱惹罪責為姪児恐怕尊姑恠書生不好隂人愛莫不你一家児受了康禪戒量這箇彩雲喫打有何羞尚猶似文玉下馬将荆條拜尾聲得了手有情分的斷膓詞自惹下塲無氣路相思債這一箇小書舍裏天寛地窄也不索對天地說山盟言海誓喒則是常川似今夜和諧緊栽排怎肯教信㫁音乖則要你常准僃迎風户半開来日箇一更左側我則要倒倚門児䓁待我䓁的夫人燒罷夜香来點絳唇嘲塩啇聖人道良賈深蔵􅌂然人望都是些虚謙譲全不學尊重安詳岀来的豪氣有三千丈混江龍一箇箇做模打様豈不聞有麝自然香矜驕傲慢聲勢虚張通中不到一千三百引嚮畨了二十九塩塲父親是尚書舅舅毋親是少保姨娘動不動結交官長来不来送酒牽羊去不去鳴鑼撃鼓行不行號帶旗鎗南門李運司張謁舅劉探新王㝷㡬箇歪皁隷立在店門前覔㡬箇假軍牢擺在船頭上聴不得撇虚擣抗覷不得詭詐輕狂油葫蘆借了支頭不下塲每日家沒事忙花錢酒債少下尋常狂朋恠友頻来望風姨月姊閑飄蕩今日殺箇猪明日宰箇羊到晚偎紅倚翠在銷金帳抵多少窮漢半年糧天下樂擺列着金釵十二行怕不待風光滿画堂飛觥走斚開宴賞怎不教人心下思腹内想最難熬壷中日月長那吒令黒􅃮匣退光紗羅衣滿箱白綾𬒳噴香玉磚堦錦粧茜紅氊苫床羙人圖滿房到晚来着處偎白日裡沿門串毋拘束放蕩行蔵鵲踏枝這壁廂飲瓊漿那壁廂列壺觴李四家者也之乎張三家說短論長帶兩箇虚措脚幇閑的伴當穿兩件不着體恠色衣裳寄生草棋盤領三寸闊弓袋䄂四尺長戴一頂窄􅉉髙頂京時様披一件揪頭刺褶新時様穿一雙捲尖疊腦興齋様麄絲絛勒在胯骨邊細包巾褁在額顱上么篇栁條掙的門牙亮阿膠掠的水鬂光他道是一人自有一生相那裡有年頭支過年稍帳却原来羊毛出在羊身上虚飄飄使㡬貫鄧通錢實丕丕捱㡬頓伯俞杖尾聲路引在李家收塩引在蕭家放倉鈔在陳家當着處里撇白調謊酒友詩朋劈面搶到人前手脚慌張檢空嚢賣盡了衣裳怎得閑錢雇小郎虚飄飄鎻兩箇籠箱絮叨叨寫㡬行支帳只㺯得嘹叮盂撒不還鄉點絳唇贈麗人嬌艶名娃年方二八風流煞所事撑逹引的人牽掛混江龍茅庵草厦嬌滴滴一朶海棠花言談俊雅音律熟滑千葉内生成紅菡蓞九蓮中活現的小菩薩心靈變勝似亞仙名性聰明不在蘇卿下良金足色羙玉無瑕油葫蘆六幅湘裙簇絳紗綉鞋児半折歩金蓮窄窄印堤沙羊羊韻韻堪描画標標致致人嗟呀外面児波浪撑就里又心性耍玲瓏剔透千金價却怎生悞落野人家天下樂權倩東君做主咱真假事不洽俏風聲委實難按納甜話児荅應人實心児相待他似這般干風情全是假那吒令賞三春艶陽捧瑶觴玉斚翫中秋月華按銀箏玉甲向深閨閗茶倚鸞屏鳳榻翆巍巍雲鬂堆紅馥馥花枝壓羙孜孜臉襯朝霞鵲踏枝則他那意通逹性堪誇軟欵温柔喜咲歡洽全不似求食串瓦章䑓街路栁墻花寄生草能商謎慣續麻為知音兩意難抛下乍相逢惹的聲名大小心膓擔了些閑驚怕門児閉了再休踏眉児淡了教誰画么篇有那等喬相識閑磕牙使閑錢忙把花門迓強風情枉𬒳别人罵千相思勸不得咱家罷則為這賞花時㸔一叚好風光老生児說㡬句衷膓話尾聲年紀到六旬来嘆世事如嚼蠟不快樂枉待怎麽那羙景良辰休負他錦窩中小小生涯喚名娃板撇紅牙妙舞清歌閑咲耍春光正佳玉容堪画我則待占東風培養出牡丹芽點絳唇隐士造化生成榮枯巳定天之命随運而行因此上固守虀塩困混江龍都只為世情淺分倚衡門感嘆暗傷情憂只憂嚢空父老愁只愁家業凋零七件事常無所輳㡬般心事自沉吟到于今功名未遂學業無成年三十巳過四十将臨天哎莫雄志命蹇不能施展大才時拙成何用因此蓬窓守拙陋巷甘心油葫蘆甑有蛛絲釡有塵不厭貧都只為二文錢鈔苦難㝷空教我南来北往無時㝎東奔西拽空成病富的呵交又交貧的呵親不親細觀世事何時定因此上白髪鬂邊生天下樂誰不待利已肥家幹蠱心好教我難也波禁時不来十樁好事九無成一㑹家腹中思心内忖好教我無計度其身那吒令有一箇趕齋的吕蒙他也曽受貧有一箇未遇的買臣他也曾負薪有一箇胯下的那生他也曾時来呵賜金嘆先賢這人也曽受貧非小子無用無䏻鵲踏枝誰不待列簮纓做公卿誰不待獨顯髙衙畫閤銀屏誰不待朝歡暮飲誰不待白馬紅纓寄生草你便有文通智管鮑情你便有顔回徳行無人敬你便有蕭何刀筆無人問你便有蘇秦舌劍無人聴時乖咲煞小児曺有一日運来穩掛黄金印么篇屈沉煞風流體慷慨心有一日鵷列與三公並有一日華筵飲罷笙歌送有一日画堂春暖鴛鴦並有一日金釵十二列幃屏我将意中人寫入丹青幀尾聲罷罷罷冷暖自家知厚薄歸扵命固其窮甘心守分詩酒生涯樂太平㑹髙人講究些寒温一任他傍人冷話児浸雖無邵堯夫義仁且養孟浩然之性挐雲手怎肎埋没了這平生點絳唇贈妓萬種妖嬈一團俊俏十分妙百媚千嬌端的是閉月羞花貌混江龍他若是含情一咲朱唇一點嵌櫻桃梨花玉體楊栁纎腰眉黛春山嬌滴滴眼波秋水緑滔滔可觀可㸔宜喜宜嗔堪憐堪愛難画難描撥銀箏音律韻悠揚唱陽春一曲依腔調你便有千金髙價怎䏻勾一剡春宵油葫蘆喜遇得樽前猛見了更那堪情性好言談語話那清標更那堪聰明伶俐諸般俏他可便續麻道字無差錯生的来柳様柔花様嬌知今愽古通三教鐡石人見了也魂消天下樂怎能勾玉樹同棲翡翆巢無福的難也波消自喑約用心児訪㝷月下老者末你能會弹䏻㑹舞䏻㑹綉䏻㑹挑怎生有前程無下稍那吒令離情空懊惱我魂勞梦勞敢縁薄分薄盻明朝後朝斷膓籍上除了姓名姻縁簿上㝷箇着落一星星記在心苗鵲踏枝你與我自量度是評䟦你肯聴琴我便題橋趂青春年紀㓜小休辜負好姻縁月夜花朝寄生草相思病何年盡姻縁事甚日了我見他知輕知重知分曉不䏻勾同行同坐同歡樂到教我添愁添悶添煩惱怎䏻勾咲吟吟花下燕鶯期㡬時得喜孜孜䴡日鴛鴦沼六么序眼前靣人千里耳邊廂音信杳隔三千弱水迢迢悶懨懨鬼病難熬意遲遲情思心焦桃源洞不見分毫恰便似熖騰騰烈火燒祅廟白茫茫水渰藍橋我今生撅着相思窖好教我行眠立盹梦斷魂勞么篇哎你箇多嬌仔細聴着你肯花底相邀月下相招琴瑟和調同伴吹簫一世児團圎到老恁時節有下稍㝷一箇安樂窩巢散誕逍遥到大来志氣清髙當日箇謝天香李亞仙㝷思的到