有些窮情性香焚瓦鼎酒泛磁瓶油葫蘆挂著幀土暗塵蒙老夀星不由我嘆數聲用半甌渾水浸著花瓶又無箇茶食酒果把神靈供有幾箇連麩黑麵乾燒餅不曾開筵列管絃向尊前搊玉箏又無箇親兒眷屬相呆領好教我無語嘆平生天下樂今日那一箇相知每不世情見白馬紅纓偏志誠俺家寒有幾箇窮伴等一壁廂原憲邀一壁廂范丹請俺到處畫堂春自生那吒令又無甚樂聲動清朝九品提起道上夀索便充飢畫餅提起道做生日指雲中鴈做羔赤緊的百事艱難歡慶怎的施呈鵲踏枝好教我痛傷情赤緊的孟撒撩丁題起那待客迎賔唬了我魂靈敢受用齊齊整整則索在寒窗伴悄悄冥冥寄生草甚的是香和散更那里酒半瓶覷了那少柴無米腌􅧐景喟然獨嘆書窗影寒天更有誰人問霜天夜月照茅廬那里玉堂金馬相欽敬后庭花題起那做生日也不待聽臨花庭不𣣔停自撈下此帶沙子的紅粳飯見山妻做下些無油鹽黃菜羔大手捕著蒼蠅小拳頭兒握定做殷勤來放生尾痛傷情難吞忍覷了這窮活路擔寒受冷也無那百味珍饈將鄰舍來請遙受著貴降名辰命難行咱的施呈誰更敢庭前閗爭我向那土炕上端然的坐定則道了箇樂天知命悄聲兒念了卷夀生經八聲甘州醉飲歡遊賞心曾醉在青簾坐對紅裙囊金難容惜花心占斷東君幾度美人樓下䇿半醉歸來馬上眠滿目盡香塵銀燭黃昏混江龍不為酒間一言喚起醉鄉民狂歌數曲爛醉千鍾有限杯中牢閉口無緣看裡早抽身從今後不教稚子再惱比鄰后庭花遇佳辰不挂心任清風也笑人誓不隨陶元亮教初絶劉伯倫想朝昏把一領雪霜裘典盡只留下犢鼻棍賺煞論前唐講東晉太白摸波心月輪山澗歸來人自哂斜偏倒帶著綸巾俺曾論畢卓當初曾𬒳鄰家甕下嗔我今日蒙騰了事本清濁也不問墮寒江虧殺俺獨醒人八聲甘州詠蝶春光艷陽正人意徊徨花栁濃粧西園堪賞步莎茵喜吸笙簧桃花爛熳逰客醉院宇深沉春晝長見十九箇粉蝶兒巧筆難粧混江龍一箇不離闌檻一箇舞東風上下騁顛狂一箇戀著花蘂一箇映日尋芳一箇楊栁枝頭吸曉露一箇杏花蕊上採清香一箇困歇在湖山上一箇迎風竹􅏙一箇戲水在池塘醉扶歸一箇搜盡風流相一箇逐定賣花郎一箇又𬒳頑童唬得慌一箇在花下偷睛望一箇搧粉翅來尋伴當一箇緑楊枝上見金鶯不敢輕狂尾一箇戀名園桃杏芳一箇怕晚天亭夜涼一箇舞昔日莊周夢一箇戲春風花草香一箇不成雙輕輕把翅兒展放𬒳翻身飛過宋家莊封里迓古午日泛舟淮水上彩舟無數正值太平時序都一般蘭橈畫槳往來向中流競渡你看那王孫豪客華筵錦席誇奢騁富也有那皓齒歌金杯勸象板促敢則是間一派瓊簫畫鼓元和令那黃龍按中央戊已土那青龍應東方甲乙木赤龍元是丙丁屬庚辛金龍色素更有那北方壬癸爪牙烏貫魚行分部伍上馬嬌他任轉旋相抵觸也是他操演太滑熟五方龍雜彩旗分布有競利的徒他每都賽碩與祈福勝葫蘆更有那座上騷人宫錦服耽放浪少拘束白鷺洲邊重吊古桃根桃葉清歌妙舞樂事想當初么則見隱隱殘霞水面鋪雙雙的燕子戲平蕪覽勝追歡情未足臨流洗盞傍花展席將他交友謾招呼后庭花看他們寶叉頭挑絳符朱門上懸艾虎翆荷小盤𥘉展海榴紅巾半蹙緑槐影傍庭除向晚來蘭湯新浴愛輕綃薄映膚喜瑶觴滿泛蒲北窗詩當再續南薰絃仍一鼓雙鴈兒只喫的披著襟撒著髮酒重沽玉山頽玉手扶欵把紅兒悄分付翆雲屏暑氣無碧紗㡡涼意足青哥兒扇弄著生綃生綃團素簟展著碧波碧波寒玉新月姢姢透綺踈笑倚青奴醉枕珊瑚香炷重爐人臥氷壷待驚烏翻樹酒醒𥘉踏影向長廊步賺煞白髮暗相催好景休辜負正值㽔賔月午謾憶三閭楚大夫嘆離騷九辨誰續混風俗且自歡娛虎踞龍盤壯帝都粧點出丹青畫圗快活煞風流人物便休題歌舞醉西湖村里迓古向水邊林下蓋一座竹籬茅舍誰想髙車駟馬擺頭答名揚天下富貴心功名事從今都罷不如我玩翆峯觀緑水指落花鎖住我心猿意馬元和令柴門掩落霞明月杖頭挂清江凝目釣魚槎慢騰間瀟灑悶來時獨坐對天涯蕩村醪飲興加上馬嬌魚旋拿柴旋打無事掩荆笆醉時仰卧在葫蘆架髮亂􅎲睡醒一甌茶逰四門藥爐經卷作生涯學種邵平瓜淵明賞菊東籬下終日飲流霞向爐內煉丹砂勝葫蘆我則待散誕逍遙間笑要左右種桑麻靜聽前林噪晚鴉心無牽挂蹇驢斜跨逰玩野人家后庭花我將這嫩蔓菁帶葉煎細芋糕油內煠白酒杯中灔山花頭上插興來時笑呷呷一尊飲罷繞柴扉水一窪步桃溪數落花樂蓬萊天地家青哥兒呀看一帶雲山雲山如畫端的是景物景物堪誇剩水殘山向那答自少喧譁栁隂之下椰瓢髙挂無是無非誦南華靜裡乾坤大點絳唇明皇逰月宮玉艷光中素衣叢裡偏拖煞栁腰一搦舞徹妖嬈態么篇未會留情只會催行色愁無奈此心不解只恁嗔人愛金盞兒師父你也快差排莫推捱此間配對權寧奈教宫內取些金帛寡人待自手纏上錦親插鬢邊叉𣣔求天外事須動世間財醉扶歸準擬多情債還與可憎才龍體多應鬼病裹只碩得休痊瘥若晏駕了吾當大采早能勾鳯返丹霄外賺煞且寄此宵情只從明朝害整整的相思一載到來歲中秋顯素色休等間教霧鎖雲埋却早離了粧臺準僃迎風户半開則向那初更左側我試等待看月明千里故人來點絳唇明皇哀告葉靖人世塵清海門潮靜金盤擁飛上晴空萬里寒光迸混江龍素娥情重夜深私出廣寒宫玄霜浥露丹桂迎風却正是天上四蹄玉兔來見這人間八爪紫金龍當夜明皇躬著身施著禮向葉靖行忙陪奉情懷冗冗心緒匆匆油葫蘆你更比巫山十二峯又添出三四重恨不得髙燒銀燭用錦圍封更難如落花流水桃源洞更慳如朝雲暮雨陽臺夢光輝輝列開綺筵媚孜孜覷著玉容自恁教一杯未盡笙歌送寡人待拚却醉顔紅天下樂抵多少翆袖殷勤捧玉鍾誰想你箇仙翁却不放鬆出家兒怎恁般無始終俺待教酒作媒你却道都是空何似休教逰月宫金盞兒信難通恨無窮晃天衢咫尺東方動却索歸五雲樓觀日華宫恁時節銅壺催曉角朝馬閙晨鍾對半囱千里月一枕五更風賺煞全不肯似周方佯擁擁它剗地把吾當快悾若是無緣成配偶怎生向九霄雲外相逢索甚停同世見如何不用功這幽歡密寵如雛鸞嬌鳯師父爭忍教一般瀟灑月明中點絳唇十美人賞月為照芳妍有如皎練分明顯恰便似寶鏡臺前一樣蛾眉淺混江龍月窺人面玉人明月閗嬋姢月當良夜人正芳年華表月移無柄扇錦宫人列並頭蓮喜今宵人月皆酬碩月輪滿足人物十全油葫蘆滿袖天香惹瑞煙風力軟九龍獨趂五雲軒誰承望開元天子昭陽殿生扭做蕊珠王毋蟠桃宴預先爭逰廣寒沒來由拋禁苑恰來恁早些兒與朕疾相見怎肻去月宫裡覔神仙天下樂既看這十五團圎照滿天待把箇堪憐親自選將這可喜娘臉兒都覷遍兀的那箇合踈那一箇偏寡人則索告青天乞少年那吒令莫不他厭守皇宫內院莫不他懶駕鸞車鳯輦莫不他却趂蓬萊閬苑多應他顯些氣分施些機變那里問天子三宣鵲踏枝恰正是急煎煎意懸懸厭得仙袂飄飄綬帶翩翩衠一團兒香嬌玉軟更輕如玉液浮蓮寄生草貌把光輝映身宜縞素穿則見彩雲隨出梧桐院恰便似錦池捧出芙蓉面只疑是武陵泛出桃花片那裡見大唐家歌舞太真來分明是洛伽山水月觀音現六么序相陪奉謹顧戀携春纎笑憑瓊肩紅翆相連音律俱全正乾坤風露涓涓啓朱唇一點聲嬌顫似朝元玉女傳言此一杯朕索殷勤勸誰敢分文怠慢頃刻俄延么篇欣然若不當筵親捧金船又道是吾當厭倦意不專折未鹿走中原海變桑田鎮日同行同坐同眠儘翰林院編作荒媱傳任清風萬古流傳碩一年一度中秋宴則這碧天似水良夜如年醉扶歸則為你占斷風流選奪盡可憎權萬里江山正朗然為甚忽地浮雲顯為你強如他萬千因此上怕見你那羞花面金盞兒他夜無眠共同緣也學世態雲千變桂花點破鏡中天銀河明綺偃如瀑布落長川素娥映酒影西子在溫泉醉中天我想這文武朝金殿不熱樂如妃子列華筵簾捲蝦鬚吐翆煙不風韻如雲影隨歌扇􅐈的是那剪霹靂似三聲靜鞭聒的寡人心驚膽戰煞不如太真妃品竹調絃鴈兒俺在前受了些焚御香宮人怨往常教他都間阻今夜總團圎想你箇天也受香煙么篇各位下隨宫院誰不道楊妃行最偏省可教一心兒埋怨也強如兩下里受熬煎后庭花碧桃花樹前青鸞粧鏡邊去歲人無恙今秋月正圎為甚寡人重留連過中秋雖見則怕漸如弓不上絃賺煞尾平地鳯車行銀漢氷輪轉廽首流光漸逺卿呵你各向深宮輦路邊列雙雙白鷺紅鴛忽天然軃袖垂肩只向氷雪堂中圗畫展和寡人同逰上苑共臨寢殿抵多少月移花影緑窗前村里迓古明皇哀告陳玄禮六軍不進屯滿馬嵬坡下干戈遍野欺鑾駕那里問武士金瓜氣熖焰列虎兵嗔忿忿驅狼將一箇箇惡勢煞齊臻臻鴈翅排密匝匝魚鱗砌閙垓垓映日霞呀雄紏糾披袍擐甲元和令陳將軍怒轉加真箇敢變了卦龍泉三尺手中拏把吾當􅕑唬殺道貴妃荒淫敗國禍根芽按霓裳起士馬上馬嬌主意兒差故意待殺將國舅重刑加喊一聲地裂天摧塌壞了他磣磕磕尸首臥寒沙逰四門可憐身死野人家二罪盡俱發元戎你做取當今駕把妃子肯饒麼呵不妨野鹿走交加勝葫蘆㗸却宫中第一花不得地弱官家哀告他渾同咬定沙臣強主弱兵權獨霸誅斬則由他后庭花休教硬邦邦軍揵拏則使軟嫩嫩婇㜮壓貴妃上馬嬌無力回鸞舞困乏藉不得鬢堆鴉屹皺定蛾眉難畫眼睜睜怎救拔哭啼啼沒亂煞料他家埋怨咱髙力士你去他貴妃行詳道咱栁葉兒可憐見唐朝天下教寡人獨力難加將條素白練急早安排下把娘娘咽喉搯他是嬌滴滴海棠花卿呵怎下的千軍萬馬踏點絳唇閨怨花落黃昏暮雲將盡專盻青鸞信寶獸香焚又到愁時分混江龍相思慰悶繡屏斜倚正消魂帶圍寬盡消減精神翆𬒳任薰終不暖玉杯慵舉幾畨溫鸞叉半軃鬆蟬鬢長吁短嘆頻揾啼痕寄生草瓊簮折寶鑑分今春又惹前春恨淚珠兒滴盡愁難盡瘦龎兒不似當時俊思量幾度甚時休相思滿腹何時盡金盞兒風逼透繡羅衾風刮散楚臺雲簷間鐡馬風𫾣韻風搖間階翆竹不堪聞風篩簾影動風傳漏聲頻風薰花氣爽風㺯月華昏后庭花獸爐中香倦焚銀臺上燈漸昏羅幃內和衣睡紗囱外曙色分想情人起來時分跌金蓮搓玉笋捱的到天明却有誰偢問昨夜和衣睡把羅衣皺損一面殘粧空淚痕日髙也深院無人掩重門煩惱向誰論獨對菱花整亂雲待向瘦龎兒上付粉𣣔梳粧却心困氣長吁呵的鏡兒昏點絳唇四友爭春四海飄蓬半生歌詠嘆塵冗世事匆匆苦𬒳年光送混江龍眼前青供玉人降謫笑相迎𫾣金擊玉詠月嘲風三峽泉鳴新咳唾千章詩著舊題封春風楊栁秋水芙蓉溫柔典雅剔透玲瓏銷人魂夢廣寒宫迷人蹤迹桃源洞友朋每如兄如弟親眷每非虎非熊油葫蘆天下湖山風月籠這一夥作業種鶯儔燕侣不相容錦心繡腹親陪奉月眉星眼情搬弄茶供過三兩巡涎刮到五六桶儧下些髙談闊論成何用端的是風月兩無功天下樂幾曾兒翆袖殷勤捧玉鍾三冬節序窮老廉頗豈堪施會勇桑柴弓懸臂間𥿄糊鍬逼手中每日價干和閧那吒令江湖上量洪誰強似孔融天地間德容怎學得仲弓翆紅鄉鈔猛都不如鄧通假老實喬尊重買做了先鋒鵲踏枝探花人氣如虹狀元郎怒填胸榜眼哥哥尚自沖沖你也儂恩多愛濃想從前錯怨了天公寄生草大厮家包藏得險朋友每