皆同受梅花酒西施你如今歲數有减盡風流人老花羞葉落歸秋往常喫衣食在裙帶頭今日你分破俺帝王憂我可甚為國愁俺心去意難留您有國再難投俺輕撥轉釣魚舟趂風波蕩中流收江南呀我則待臥吹簫管上揚州則俺那上源頭強似你下塲頭皆因歌舞一齊休從今後罷手常言道前人田土後人收尾聲聴筵前聒耳笙歌奏不隄防隣國邊關透他是箇戴南冠的椘囚一箇是出波龍一箇似傾巢鳳一箇是丧家狗我如今雲㠶疾如梭強如您金印大如斗我再不掛名利逺走趂着這逰四海五湖心蔵了這下三山釣鰲手新水令追韓信恨天涯流落客孤寒嘆英雄半生虚幻坐下馬空踏遍山水雄背上劒光射得斗牛寒空塞扵天地之間雲遮斷玉砌雕欄按不住浩然氣透霄漢駐馬聴囬首青山拍拍離愁滿戦鞍舉頭新鴈呀呀哀怨半天寒指望待龍投大海架天關剗地似軍騎羸馬連雲棧他覷英雄如等閑堪恨這無端四海蒼生眼沉酔東風幹功名千難萬難求伸志兩次三畨當𥘉我離了項羽今日我也别了炎漢不覺的皓首蒼顔對着這月朗風清把劒弹百忙里揾不住我這英雄泪眼鴈児落丞相你将咱不住赶韓信也則索把程途盻為甚麽恰相逢早禁聲非是我不言語相輕慢得勝令我則怕义手告人難因此上懶下寳雕鞍傳與俺漢天子休心困我量那椘重瞳怎掛眼乗駿馬雕鞍向落日夕陽岸伴簔笠綸竿我則待釣西風渭水寒掛玉鈎我怎肯一事無成兩鬂斑既然你不用我英雄漢因此上鐡甲将軍夜過關你莫不為馬来也将人赶既不你為馬来你有甚别公幹你着我輔佐漢世江山保奏的我掛印登壇川撥棹半夜里恰回還抵多少夕陽歸去晚我則見烟水潺潺珂珮珊珊冷清清夜靜水寒可正是漁人江上晚七弟兄脚踏首跳板手扶着釣竿不住的把船攀兀良我則見沙鷗驚起蘆花岸􅑯楞楞飛過蓼花灘恰便似禹門浪汲桃花泛梅花酒雖然是暮景殘恰夜靜更䦨對緑水青山正天淡雲閑明滴溜銀蟾出海山光燦爛玉兎照天關撑開船掛起㠶俺紅塵中受塗炭您緑波中覓衣飯俺乗駿馬惧登山您駕孤舟怕逢灘俺不能勾紫羅襴您空執定釣魚竿喒都不到這其間收江南呀這的是烟波名利大家難抵多少五更朝外馬嘶寒對一天星斗跨征鞍不由我惓惮算来名利不如閑尾聲我想這男児受困遭魔難恰便似蛟龍未濟逢乾旱塵濛了戦䇿兵書消磨了頓劒揺環唱道惆帳功名因何太晚似這般渉水登山休休休空長嘆謝丞相執手相㸔哎你箇能舉薦我的蕭何你可也再休赶新水令樂道對青山盖一座草團瓢伴琴棋古書茶藥門前㘽野杏院後種山桃松竹週遭無榮辱有歡樂駐馬聴散旦逍遥貧不憂愁富不驕誠心修道韶光逝水不相饒臨風對月品鸞簫倚溪近澗将琴操無惮勞恁無情水火来週照喬牌児蝸角名不甚好蠅頭利有何妙俺存心無甚閑煩惱睡東囱紅日髙川撥棹閑来時過溪橋採藤花摘藥苗林下漁樵每日相􅌽俺三箇知心故交淡生涯活計小無憂愁閑快樂七弟兄喚山童舞着唱着飲香醪旋蒭的村酒連壷調将宜時野菜帯根挑瓦盆中慢火煨山藥酔了時就地倒聴翆竹蕭蕭見梧葉飄飄㸔緑水迢迢梅花酒樂清閑度歲華無憂愁過逐朝四時中景物好春花開滿山遥夏天凉晚風飄秋月明素蟾髙冬瑞雪壓梅稍收江南呀㸔了一年四季樂陶陶蘆花𬒳煖度良宵瓦爐中伏火暗香燒掩柴門靜悄閑来無事跨雲鶴轉調煞散清香滿院松花落風来𫾣翆竹如宫調聴黄鶯㺯巧雲林散旦樂安然一世児清閑快活到老新水令王妙妙死哭秦少逰似一江春水向東流對秋天動情感舊心愁一萬縷半載勝三秋一望雷州一凝竚一僝僽駐馬聴一向淹留寄一𥿄書来一字愁自從别後一畨花落一畨羞一聲杜宇倦凝眸趂一鞭行色慵回首我精神一旦休折倒的一枝粉淡梨花瘦甜水令則見那閙閙烘烘聒聒噪噪道姓題名圍前圍後濕浸浸冷汗遍身流哭哭啼啼凄凄凉凉不堪回首愁和悶常在心頭折桂令困騰騰髙枕無憂却和你梦里相逢元来是神遶魂逰一靈児杳杳冥冥哀哀怨怨蕩蕩悠悠恓惶泪流了再流思量心愁上添愁空教我淹損雙眸拆散了燕侣鶯儔至老風流佳句難酬覷了這一曲新詞便是他兩句遺留落梅風染胭脂雙眉皱形容出兩鬂秋覷絶時泪淹衫䄂病来時倒大来不自由怎画的来骨崖崖影児消瘦慶東原你為我容顔瘦我為你心緒愁臨𡵨執手相别後我為你再不惹狂朋恠友再不喫閑茶浪酒再不上謝舘秦樓再不共厮追陪再不説閑聲嗽沉酔東風你虚飄飄㧞着短籌冷清清算在雷州感承你實丕丕厮愛憐樂陶陶常相守誰承望苦懨懨拆散鸞儔眼睜一日無常萬事休則落的痛殺殺澆茶奠酒清江引風流落絮水上漚怎生捱昏晝月在栁稍頭人約黄昏後将俺這好姻縁一筆勾碧玉簫懨懨僝僽魚水不綢繆腔腔咳嗽藥病不相投誰與你熬飰粥誰與你㸔證候獨自箇愁相思瘦休見死無人救鴈児落若是他人知替我愁更怕甚娘知道将咱嗽你知時你也憂天知道和天瘦得勝令送的我白骨臥荒坵那里也談咲覓封矦你閃下真烈王行首痛殺我也風流秦少逰再相見時無由再相見時無由誰能勾潑水難收救休休似淹淹不㫁流喬牌児他絮叨叨不住口惡哏哏覓爭閗掀了路祭攔住靈柩潑了澆奠酒掛玉鈎惡哏哏魂旛児在手揪怎的死骨頭上将他呪他和你生前有些甚讎恰便似刀攪我這心腸肉尀耐難禁受沒来由雪上加霜走将来火上澆油尾聲對西風有似黄花瘦嘆椘雲不似陽䑓舊生則同衾死則同坵唱道拚一日無常播千年不朽眼見的因病相憂實愛情先透去意難留魂遶黄泉路児上走新水令知㡬古今興廢轉頭空嘆光隂一塲春梦今朝秦帝闕明日漢家宫多少英雄都曽𬒳利名送駐馬聴顯甚玲