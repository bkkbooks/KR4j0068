下鳯凰將翎毛生扯北收江南呀你敢在那碧桃花下將鳯毛扯人生最苦是離別山長水逺路途賖何年是徹響璫璫菱鏡碎玉簮折漿水令響璫璫菱花鏡碎攧支楞楞瑶琴絃斷絶革攴支同心綰帶扯擊玎璫寶簮兒斷折採蓮人偏把並頭折比目魚就池中冷水燒熱連枝樹生砍折打撈起御水流紅葉藍橋下翻滚滚波浪捲雪祅神廟熖騰騰火走金蛇尾饒君使盡機謀設止不住負心薄劣夢兒裡若見他俺與他分説夜行船明皇寵楊妃一片行雲天上來捧入栁腰花態料想東凨精神近蒙寵愛印頰臂蕙香獨在挂玉鈎顯瑩白生光彩猶恐芳恣汅染塵埃去首飾愡腰帶乍離君懷恰才用不勝嬌無奈掩雙襟欵脫宫鞋褪綾波襪壓香羅窄翠幕髙懸錦帳齊開道煞尾阿環早是凨流殺又添出些溫柔分外膩玉生嫩霞酥胸間㺯色夜行船明皇哀詔不覺天顔珠淚簌道陳玄禮負我何事雖是欺主上有千般諫則這揀宫娥的一句更勝似弒君殺父況醉東凨嬌滴滴嬰兒幼女軟耨耨姊妹承輿盡是他舊班行終有些親腸肚施行間怏然難覷恰到半死不活處氣力無倒大來教娘娘受苦么特向那雄糾糾征徒戰夫選幾箇氣昻昻惡黨凶徒莫遷延休猶豫疾忙教速歸冥路左右來少不的今朝一命殂早與他娘娘箇快取尾驚魂不挽行雲住暗雲巳逐西凨去藏去玉骨氷肌埋盡怨紅愁緑蛾眉宛轉難為主馬蹄踏蕩無尋處有一事將軍索再三躊躇不敢望似山陵般修墳墓想著曽扶侍鸞衾你却少贈與楊妃半堆兒土夜行船送司素蓮玉立亭亭太華仙間別來不記何年雲隔瑶池塵飛滄海誰承望又還相見沉醉東凨仿佛在耶溪岸邊分明在太液池前瓊簮墜地輕羅襪􅓸波淺勝華清賜浴溫泉微露漫漫濕翆鈿越顯得香嬌玉軟離亭宴帶歇拍煞韓昌黎甜話兒多稱羡周濂溪美意兒常留戀都子為凨流自然馨香賸噴水龍涎花瓣巧攢珠蚌壳藕絲細吐氷蠶繭欺凨㺯縞衣妬月摶紈扇三般兒可憐葉老翆房空波寒粧鏡慘粉淡芙蓉變休聽玉漏催且盡碧筒勸多嬌自勉恁若許帶根兒移我先將並頭連蒂選夜行船送景賢回武林花栁鄊中自在仙惹春凨兩袖翩翩酒社詩壇舞臺歌榭百年裡幾畨相見新水令君家家近六嬌邊占西湖洞天一片栁隂藍翆藹花氣麝蘭煙錦纜銀鞭一步步畫屏面慶東園醉舞筵殢歌扇偎栁坐枕花眠生來長費杖頭錢酒中遇仙詩中悟禪有心燕子樓無意翰林院離亭宴帶歇拍煞珊瑚文采天機絢珍珠咳唾氷花濺霜毫錦箋品藻著杜司空褒彈著張殿試出落著雙知縣一襟東魯書兩肋西廂傳相看黯然朝雨渭城愁夕陽南浦恨芳草陽關怨休言雞黍期謾結鶯花怨咱兩箇明年後年湖上吊蘇林花間覔劉阮夜行船殘春閨思一片花飛減動春凨吹萬點愁人苦雨連宵酸凨幾陳二十四畨花信喬牌兒嘆今春想去春感舊恨接新恨恨春春恨何時盡恐因而僝僽損新水令落紅滿地錦鋪雲促東皇緑濃紅褪遇景值殘春緊鎖眉顰因春瘦為春困天仙子鶯聲韻𬒳燕子暗銜春蜂怨消黃蝶愁褪粉空無語嘆東君惱亂吟魂雨打梨花深閉門如此黃昏離亭宴煞杜鵑聲裡韻華盡鷓鴣啼破鉛華暈東凨漸緊腕鬆了金肌羸了玉香消了粉人已別春誰問悶倚屏山暗忖春歸後有來時人回期甚時凖夜行船贈鳯臺春春滿瑶臺瑞靄飄鳯來儀飛下丹霄白石貞堅翆梧窈窕聲價重每稱先兆行香子正春暖臺髙更鳯婉鸞嬌聽玉人月下吹簫芳名顯耀美譽清標志凨雲心廣豁􅒏浮遙駐馬聽幾度凨和逰鳯沼舞輕歌妙九重春色醉仙桃休去鳯凰臺上引黃鶴則要蝴蝶夢裡來青鳥忒輕盈偏裊娜煞妖嬈沉醉東凨鎮寶髻叉簮鳯翹休彩雲聲斷鸞簫酒斟白玉甌曲唱黃鍾調間爭春五陵年少池上于今有鳯毛奈眼底知音較少鳯引雛鳯鸞交芙蓉帳暖度春宵海棠丰韻江梅俏器具羣超身騰碧虹橋翹展青雲道足躡荆山寶任千轉錦鶚儘萬里金雕鴛鴦煞休惹得鶯燕嫉妬蜂蝶閙和那等鸂鶒嬉戲鴛鴦笑有意相從無福難消唱道俊雅瓊姬凨流子髙豈是邪妖喜題目真妙若伴著箇蕭史英豪共㺯玉團圎快活到老夜行船寄教坊歌者湖上清香酒力微不由人對景傷悲楊栁鞦韆海棠庭院都不似舊時凨味凨入松畫梁新燕試香泥迅指又春歸玉京約線當年寄憐今後尋誰緱氏山頭月黑楚王臺上雲迷新水令故園極目草凄凄盡消磨酒情詩意再不去樽前傳筯急席上賣花催頓覺年來三兩盞九分醉胡十八常記得那一日花錦墜綺羅幃牡丹亭畔醉如泥死得在那裡人生百歲間能有幾歡會攪箏笆誇精細恁精細有誰及行令藏䦰承歡奉喜知進退識髙低端實一氣化生天地歌舞奪魁鴛鴦煞如今章臺街舊路荆榛閉平康巷故址蒼苔集指冷鸞笙聲斷龍笛唱道歌罷行雲香消舞衣堂長諸生行坐裡常縈繫也是我白日裡斯掂提因此上夜夜相逢在夢兒裡夜行船贈小腳娃顔色天然丰韻佳據精神閉月羞花膩粉粧施勻罷凨流處那些堪畫步步嬌微露金蓮湘裙下端的些娘大剛剛只半扎若舞霓裳將翆盤蹅覷絶他不弱楊妃襪沉醉東凨那步輕輕慢撒移蹤欵欵微蹅到晚夕臨床榻擁鮫綃枕邊燈下那的是冤家痛緊恰脫了鞋兒纏扎撥不斷為冤家恨咱家三兜跟用意收拾束纒的十分緊恰怕寒時重套上吳鈎襪從纏上幾曽撇下離亭宴煞比如常向心頭挂爭如移上雙肩搭問冤家既肯須當手內拏或是胳膊上擎或是肩兒上架髙點起銀缸看咱掂㺯著徹心兒麻髙擎盡意兒耍夜行船射覆分題換酒籌對花賞且盡金甌世事輕微人情薄淺也須是粗頑時候凨入松光隂迅速去難留一日過三秋開懷休把雙眉皺狂歌痛飲且消愁醉玩林間梅竹醒看岸畔松楸喬牌兒功名念巳休歸隱心如舊避紅塵盡緘談天口故藏頭並袖手甜水令常則是放浪形骸忘懷暢飲歌兒左右他事不干求則我這詩集成篇書修成卷文學不陋那希望拜將封侯離亭宴煞嬉逰信步間亭後行過堤外垂楊栁翠荷淺方知夏去碧梧凋又覺新秋間撫景心窮究總不如蓬囱自守種山間𬞞菜苗結林泉布衣友行香子名利貪婪世事􅮡空使人白髮髧鬖輪千撥萬暮四朝三赱江東逰海北涉淮南喬木查間愁自覽枉用英雄膽爭似間心住草菴伴老聃破碎襴衫續斷絃藥盈籃月明龕不強似亂石灘凨急舟絶纜連雲棧霜凝馬頓銜是非場雪壓人折擔嘆癡人著賺尾蒲團穩坐間時暫明囱讀易情踈淡道參任朝昏從烏兔猶將暗竹葉席蘆花毯談玄口緘榮辱縱教他凨波近不得俺行香子得也心焦失也心焦得共失爭不分毫榮也徒勞辱也徒勞鏡中霜頭上雪鬢邊毛慶宣和得失榮辱多儘教塵世波滔堪可林泉伴漁樵醉笑倒錦上花休喜休嗔休煩休惱暗裡光隂幾個人知道兩字功名天涯海角擾擾浮生行人易老么朱顔已退却青春再難到學取先生散誕逍遙醉臥松隂忽然睡著比恁俗人間愁較少清江引芒鞋竹杖粗布𫀆俯仰掀髯笑伴老華山雲不夢長安道落葉滿庭凨自掃碧玉簫一箇團瓢瓦鼎乳香燒三公黃閣朱户描金標俺清間道德恁為官憂國朝都睡著不必晨雞呌咷看此夢誰先覺尾誰人不向紅塵閙惟咱且對青山老領鶴澗邊歌林外舞花前酌百歲千年調光隂過了人換幾千秋江山自然好行香子祿山憶楊妃𬒳一𥿄皇宣和三品軍權創開萬劫情緣想青綾𬒳底紅燭囱前甚時曽整我裝歌畨曲按胡旋喬木查嘆平生分淺何日重相見為盻行雲眼睫穿淚珠兒揾血流遍秦川撥不斷再幾時幸溫泉寵梨園彩鸞巳赴蟠桃宴鸚鵡難回碧玉輦鴛鴦不鎖黃金殿千般旖旎萬種妖嬈怎下的教馬嵬坡蹅踐殄離亭宴帶歇拍煞麝香一汚春凨面鸞膠無分紅纖片身歸九泉把箇可意小名兒題將傾城模樣兒想望屈死的冤魂兒現明牽子母情暗隱別離怨無心過遣慢徒勞乾大閙空經變至長安京兆府從薊州漁陽縣一掇氣赱喏來近逺竭竭的趕埸憂剛剛的落聲喘凨入松吕止菴半生花栁擔曽耽凨月埸􅮡甫能巴到藍橋驛不隄防煙水重淹追想誓海盟山幾回淚濕青衫喬牌兒再不將凨月參勾斷欠汙濫偶因那日相逢處兩情牽他共俺新水令巧盤雲髻插瓊簮穿一套素衣恁般恬淡他説的話兒岩合下手脾和莫不是把人賺攪筝琶咱間言探切恐話交參休道咱虛脾伊不敢豈不怕外人知恐娘見離恨悶愁兩下耽獨自箇羞慚離亭宴帶歇拍煞做時莭彼此休心厭做時莭休把人坑陷常歡喜星前月下休等間面北眉南既做時休志忑若意懶從生便緘我的朴實心博伊家作怪膽凨入松翆樓紅袖倒金壷春色滿皇都夜闌剗地燒銀燭那其間多少歡娛薄利虛名間阻俏凨聲因此蕭踈喬牌兒這畨本實虛不合惹題目俊禽著網惜翎羽忍不住自暗付天仙子棘裡兔難配撲天鵠饞眼疾心看之不足猛可裡見姨夫敗壞凨俗好花怎教他做主不辨賢愚離亭宴煞錦箋空寫多情句枉可惜口談珠玉假做蘇卿伴侣𬒳馮魁已早圖謀使盡心才得悟則不如將娶字覽便數咱看上臉兒甜止不過鈔兒苦凨入松鳯臺人醉鳯樓春詩思惱吟魂玉娥何處鸞簫韻月明酒醒堪聞幾度清香馥郁一團和氣氤氲喬牌兒燕子樓情莫在雞兒巷意休順玄都觀裡宜親近上瑶臺心較穩新水令誰安題目更清新喜香名可憎淹潤身雖居羅綺志本逺凨塵駕瑞靄祥雲野鶴輩怎隨趂天仙子話長短梧桐論爭知有春色鳯城人也消得李白在臺上留題曽引得越娘向坡前背燈漢司馬操南薰調動王孫鳯求凰數聲絃內隱感起文君豆葉黃㺯玉能逹律知音蕭史會殢雨尤雲他須是宿世前􅊚天緣仙分尋箇鳯友鸞交兩對門那更皓齒朱唇翆袖紅裙占斷舞榭歌臺栁營花陳離亭宴煞天台傳到東皇信鳯鸞吟百花開噴錦鶯唱韶華過半子規啼媚景三分富貴鄊凨流運前程未凖知他是鳯凰池巧畫品宫眉知他是煙月街輕搽少年粉凨入松落花輕惹暖絲香飛燕過東墻重重簾幕間清畫金篆小煙縷𥘉長羅衣乍經春瘦蛾眉慵掃殘粧么幾回寂寞怨東皇獨自暗情傷振衣忽憶當時話空低首踏遍紅芳看到荼䕷缷也玉􅍡何處垂楊夜行船暮雨朝雲勞林想算却是幾般情况海闊相思山髙恩愛都撮在這心上喬牌兒韓香空妄想何粉怎承望怪靈鵲不離花枝上又來沒事謊攪筝笆恰撇下心兒忘才説著意兒謊俺捱過惡詫凨聲搜索遍凨流伎倆驀忖量猛參詳空將順人情筆尖和淚染怎訴衷腸月上海棠塵蒙金鎖間朱愰淚濕香絨冷繡床無語傍粧臺全不似舊時格樣慵逰賞忍見鶯雙燕兩么無端雲雨權收掌誰説道陽臺路悽愴著意會鸞凰穩把佳期盻指望成來往一任間人講賺煞挑燈織錦空勞攘須跳出愁羅怨網花壓東墻潛等待攏門兒月明下嚮喬牌兒四方民甚喜豐稔太平日香燈花果酬天地托當今仁聖德甜水令山明水秀青松檜柏堆嵐疊翆處處景幽竒雲起峯尖花生岩畔水繞山溪恰便似閬苑瑶池四邊靜金凨淅淅玉露零零紅葉濕菊花嬌媚三秋之際有黃橙醁醑赴一箇重陽會秋江送清間道無事仙講的是黃庭道德篇酒三杯詩一聮醉了呵青松直下自在眠仙鶴又舞翩頑童又笑喧誰似俺清間麻𫀆與藤冠常則是啖柏餐松飬道玄我子待跨鶴逰閬苑青哥兒俺那裡蓬萊蓬萊仙苑一箇箇益壽益壽延年俺那裡四季長春花滿園青耿耿萬里遙天接著這弱水三千鶴舞蹁躚獻果白猿是瑞草靈芝檜柏青松煉樂燒丹不老長生拂兩
