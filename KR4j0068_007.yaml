倦愁觀衰貌喜照芳妍三煞圎光淨更清菱花明更堅可憐世事雲千變玉盤本潔蒙塵垢皓月雖明障霧煙雲暗青霄掩世情有分物態無緣二煞古銅時下收菱花何處選今來特許良工見氣吹黯霧飛天外手拂殘雲離月邊光彩如銀練髙低善辨貌陋能傳一煞就中硬勝剛外面軟似綿氷盆𥘉破如刀剪逢人射影停身分覩物遺形在眼前分明現秋天朗朗風露涓涓么分毫無縷瑕光瑩淨玉瑄殘雲刮地西風捲寒光皎潔明盈室素魄團圎照滿天似銀漢氷盤轉鑑窺星斗照耀山川煞尾據堅平明正清非俺敢自專若回光反照仁人面廉潔分明自然顯哨遍思鄊輦轂下人生有幸樂太平歌舞同歡慶金綺陌玉娉婷間笙篁歌囀聞鶯閗馳騁粉濃蘭麝肌瑩瓊酥花鮮語嬌相並旦暮花魔酒病詩酬酢好句詞賡和新聲櫻唇月下品玉簫春笋花前按銀箏富貴皇都風光上國繁華盛景么篇書劍南行或征或止無定飄泊若雲萍駕孤帆一葉帆輕似脫頴辭九重鳳闕快萬里鵬程無名利徒奔競自碩瞰東南形勝湖山留客醉花栁繫人情梯航海嶠暮雲黃轎馬煙嵐亂山青屢曽經蓮渚蘆汀耍孩兒山屏錦幢繁花盛雪霽風和雨晴良工著色畫難成竹踈梅淡輕盈竹穿壞壁涼隂淺梅枕寒流瘦影清貪幽淨懶趨權勢不就功名三煞蹉蛇到處間蹭蹬不覺秋霜鬢冷客窗幾度夢朝京憶松楸敗境荒荆見新人百倍增千倍問故友十停少九停咱僥幸尚天涯流落海嶠飄零二煞涎乾沿壁蝸翅殭守凍蠅羈縻人舟纜樁橛釘遲留荆楚悲王粲久困長沙嘆賈生思薄命錢未嘗滿貫糧不足空瓶一煞雖然動的腳根何曽轉的眼睛杜鵑啼感動歸家興羡孤雲易舉離南浦無雙翼髙飛過渭城行裝併載滿船風月􅌽十里旗亭煞尾剡溪水半合山隂雪欲平還鄊子安道無蹤影不回棹的先生望誰請哨遍知休世事摶沙嚼蠟等間榮辱休驚訝日月不饒咱曉囱前拂淨菱花試覷咱雖是間愁無種間悶無芽子敢衠種出星星髮知進退冝休罷便今日蘇秦六國明日早賈誼長沙不如買牛學種洛陽田抱甕自澆邵平瓜向甚雲棧揮鞭滄海撑舟斗牛泛槎么篇好向名利場中一納頭剩告取些鬆寬暇且莫住山凹清間中不見箇生涯問甚麼南鄰富貴圵里奢華只有此身無價幸遇明時德化除徭役拯濟貧乏救得這困魚腮驚急列地脫了香鈎蓋因那餓虎血糢糊地汚了煙撾方表聖德無加耍孩兒對江山滿目真堪畫休把這美景良辰作榻清風明月不拈錢聞未老只今歡洽問甚往來燕子春秋社説怎麼辛苦蜂兒早晚衙休呆發便得征西車馬爭如社曲桑麻三煞莫將愁字兒眉尖上挂得一笑處笑一時半霎百錢長向杖頭挑沒拘束到處行踏飢時莭選著那六局全食店裏添些箇氣渴時莭㨂那百尺髙樓上咽數盞兒巳更那碗清茶罷聽俺幾回兒巴的今日羅街拽巷唱呌揚疾二煞好一場惡一場哭不得笑不得軟厮禁硬厮併却不濟調脫空對衆扳今古念條欵依然説是非難回避骷髏卦幾畨自説貓狗砌數遍親題一煞又不是鳳麒麟鈎絆著縫又不是鹿銜花窟嵌著刺又不是倒鈎針背襯上加些功績又不是三垂雲銀線分花樣又不是一抹圈金沿寶裡每日間淘氣子索行監坐守誰敢東走西移煞尾𥘉言定正月終調發到十月一新靴子投至能勾完􅍯舊兀刺先磨了半截底哨遍贈張玉嵓自唐晉傾亡之後草書掃地無蹤迹天再産玉嵓翁卓然獨立根基甚綱紀胸懷灑落意氣聰明才德相兼濟當日先生沉醉脫巾露頂祼袖揎衣霜毫歷歷蘸寒泉麝墨濃濃浸端溪卷展霜縑管握銅龍賦歌赤壁么篇子細看六書八法皆完備舞鳳戲翔鸞韻美寫長空兩腳墨淋漓灑東窗燕子銜泥甚雄勢斬釘截鐵纒葛垂絲似有風雲氣據此清新絶妙堪為家寶可上金石二王古法夢中存懷素遺風盡真習料想方今寰宇四海應無賽敵耍孩兒儘一軸十數尺從頭一掃無凝滯聲清恰似蠶食葉氣勇渾同猊抉石超先輩翰林遺贊髙士留題四煞寫的來狂又古顛又實出乎其類拔乎萃軟如楊栁和風舞硬似長空霹靂摧真堪惜沉沉著著曲曲直直三煞畫一畫如陳雲點一點似怪石撇一撇如展鵾鵬翼彎環怒偃乖龍骨峻峭橫拖巨蟒皮特殊異似神符堪呪如蚯蚓蟠泥二煞寫的來嬌又嗔怒又喜千般醜惡十分媚惡如山鬼拔枯樹媚似楊妃按羽衣誰堪比寫黃庭換取道士鵝歸一煞更有那顔真卿蘇子瞻米元章黃魯直先賢墨迹君都得滿廂拍塞數千卷文錦編挑滿四圍通三昧磨崖的本畫贊𥘉碑煞尾據著這劃畫難字樣竒就中渾穿諸家體四海縱橫第一管筆醉春風清髙七國謀臣諂三閭賢相貶官極將相位雙兼暢好是險險衆口難鉗恁也久占俺咱常嚴么篇狼虎途中慊山村酒興染引開醉眼舞青簾颭颭金橘香甜玉蛆浮酤緑醅醇最髙歌醒時長嘯掀鬚醉後髙歌入崦竹溪花塢山莊掩門映遙岑數點喜春來客來碗鏇巡山店鶴去松隂轉屋􅉉野塘消遣酒頻添杯瀲灔不顧老妻嫌普天樂無拘鈐絶憂念山嵐湖瀲浪靜風恬籬菊纖風雲儉隱迹埋名隨時漸任當途誰汚誰廉田租自斂餱糧不歉世事休呥賣花聲煞試看咱懸河口緊閉山水間潛經綸手忙義塵世上間書萬卷撑腸穩支疊有感幽懷露光熖吐虹霓作歌揮劍墻頭花祿山偷楊妃玄宗無道把兒婦強奪要直上天晒不髙自從親子行携來巳有他人候著么篇後庭深夜絳蠟明相照滿席春風宴碧桃軟耨耨玉簇香攢嬌滴滴朱圍翆繞么篇琵琶趂錦瑟銀箏間玉簫龍笛鳳管共笙篁攛斷私情第一遭彩雲收飲興將闌明月轉歌聲漸渺麻婆子寢殿裏從今夜玳筵前自此宵隱匿著漁陽變包藏著蜀道遙宫中始長亂萌芽人間𥘉動禍根苗祿山本虛推醉太真妃實醉倒么篇則等的人分散剛捱的夜靜悄又不曽通芳信又不曽許密約潛身緊匿著蠢形骸盜偷入鳳巢欵欵把酥胸襯輕輕把玉臂搖耍孩兒鴛衾揭翠錦仙衣分絳綃海棠折破胭脂蕚磣將他這細裊裊纖腰揾忍把他曲弓弓羅襪蹺狂為做枕磨盡粉暈鬢簇下金翹二煞夢覺回酒漸消雲雨方惡才疑覺驚聞太喘淫聲氣乍受無情痛扭作大道是君王抱却怎不香腮緊揾玉臂相交一煞眼倦開心暗約十中九多是那肥才料我猛呼陛下遮我這醜偶喚丫鬟掩映我那嬌施些兒機和巧雖然允順豈顯分毫煞尾我只得內忍著羞外㺯著嬌明知那胖厮圗謀却他佯道君王行應依了哨遍遺事引天寶年間遺事向錦囊玉罅新開創風流醖藉李三郎殢真妃日夜昭陽恣色荒惜花憐月寵恩雲霄鼓逐天杖繡領華清宫殿尤回翠輦浴出蘭湯半酣緑酒海棠嬌一笑紅塵荔枝香宜醉宜醒堪笑堪嗔稱梳稱粧么篇銀燭熒煌看不盡上馬嬌模樣私語向七夕間天邊織女牛郎自還想潛隨葉靖半夜乘空逰月窟來天上切記得廣寒宫曲羽衣縹渺仙珮玎璫笑携玉筯擊梧桐巧稱雕盤按霓裳不隄防禍隱蕭墻墻頭花無端乳鹿入禁苑平欺誑慣得箇祿山野物縱橫恣來往避龍情子母似恩情登鳳榻夫妻般過當么篇如穿人口國醜事難遮當將祿山別遷為薊州長便興心買馬招軍合下手合朋聚黨么篇恩多決怨深慈悲反受殃想唐朝觸禍機敗國事皆因偃月堂張九齡村野為農李林甫朝廷拜相耍孩兒漁陽燈火三千丈統大勢長驅虎狼響珊珊鐵甲開金戈明晃晃斧鉞刀鎗鞭颩剪剪搖旗影衡水𥻘𥻘射甲光慿驍健馬雄如獬豸人劣似金剛四煞潼關一鼓過元平蕩哥舒翰應難堵當生逼得車駕幸西蜀馬嵬坡􅕑抑君王一聲閫外將軍令萬馬蹄邊妃子亡扶歸路愁觀羅襪痛哭香囊三煞好似火塊般曲調新錦片似關目強如沙金璞玉逢良匠愁臨阻􅕑頻搔首曲到關情也斷腸雖脂粧不比送君南浦待月西廂二煞遇姦邪惡折罰逢忠直善播揚合人情剖判的無偏讜也是那鸞歌鳳舞雙行樂也是那虎閗龍爭百戰場能編綴零裁錦繡碎剪氷霜一煞俺曽列詩書几案邊下工夫燈火傍日營搜用盡平生量怨東風桃李嫌春短恨秋雨梧桐值夜長請才思翰林風月吏部文章煞尾俺將這美聲名傳萬古巧才能播四方歎行中自此編絶唱教普天下知音盡心賞哨遍楊妃勝腰千古風流旖旎束纖腰偏稱君王意翠盤中妃子逞妖嬈舞春風楊栁依依喜子喜深兜玉腹淺露酥胸拘束的宫腰細一幅錦或挑或繡金粧寶砌翆繞珠圍臥鋪繡褥釀春光睡展香衾暗花溪粧汗香溶𬒳底無雙懷中第一耍孩兒帳中偏惹情郎殢特遣人勞心費力選二色青紅相配揀四時錦繡稀竒剪行時蜀錦分花蕚針過處吳綾聚繡堆倒勾金針刺刺得絲絲密密裁得整整齊齊五煞恁看那摺絰兒似剪雲針腳兒如布蟣縫成倒鳳翻鸞勢見穿花鸂鷘偏斜落出水鴛鴦顛倒飛絡繡得繁華異髙低不剩寬窄伏肌四煞紅蓮紅似晚霞照楚山青蓮青如春雲射渭水玉纖手欵欵當胸繫帶頭拴十二蝴蝶舞牙子對一雙翡翠飛望得些風流意抅鈐的寂寞抑勒的孤恓三煞常常的靠著栁腰緊緊的貼著素體同行同坐同衾𬒳本待遮藏秋水肌膚瘦顛倒包弄出春光玉一圍先泄了春消息縱不􅥋開羅扣管瘦損了香肌二煞你不肯遮蓋咱咱須當遮蓋你不索褪香肌出落著相思諱最宜錦帳懷君手可惜嵬坡襯馬蹄你不比別衣袂都是有法度針線不比無納攢情衣一煞不索揾香肌轉轉裁伸纖腰細細比不離了按帶絰衫兒褃裙兒禊紅羅沿寬掩過三兩指翠當頭橫攙過少半圍若見俺風流壻便知清減不索先題煞尾知心腹倚仗伊誰承望半腰裡不得齊早知你無情不管人憔悴俺怎肯心坎兒上單單繫著你哨遍大打圍鷹犬從來無價霜翎鐵翅天生下早是我忒超群更那堪飬手􅌻滑是看咱鋪堆著秀氣抖擻著精神端的恰正三籠罷么標格天然如畫諸般兒可愛所事兒堪誇偏宜錦衣駕出四公宅飛騎擎來五侯家你覷那鐲腳兒新鮮摔皮兒停當五尺兒可誇耍孩兒遲疾緊慢皆如法鷹鶻論其中是答朝暮須索用工夫誰敢道半米兒爭差腹心欲熱著沙糖透怕野性思山將錦帽兒塌到晚來燈直下只擎到殘星半落禁鼓三撾五煞少年志氣髙擺圍埸興味嘉將蒼鷹錦背鴉鶻架半千來獵士臨郊野似一族天神降碧霞結束的威風大箭攢著栁葉馬跨著桃花四煞這壁廂㷱中著鎗那壁廂虎中了義野豬帶箭驚雕亞才放上的角鷂拏住山鷓恰推出的黃鷹按住水鴨端的是真堪畫慿黃犬坡前白取仗蒼鷹水上活拏三煞恰將軍逞壯心早夕陽映晚霞鞭稍一展圍場罷馬馱的鳥獸雞和兔抵多少網打就黿鼉魚共􅞩馬背後稍上挂挂的來瀝修陸續打畨語一六兀刺二煞將牧林即快拴擦摺兒連忙答安排飲宴在山坡下酥泛酒銀瓶鑼鍋裡旋鹽燒肉鋼籖炭火上義打刺酥哈刺撲哈土思胡先把蒙赤兔忙拏一煞緑依依玩著五速翆巍巍對著襖刺必答兒那家姦休姦詐奈思兒吉艾哈必答裏那把句思海土吉倒刺艾虎魯赤胡虜答亞綽兒只持著腔管火兒赤撥著琵琶尾哈刺米讀盤中堆著米哈打刺米渾托中放著打刺不花從頭兒吃罷從頭兒把哈刺米五論白者都休閙不似那顔者速讀麻馬兒上齊聲旦旦道是亜來亜來興闌去道亜不心足還家
