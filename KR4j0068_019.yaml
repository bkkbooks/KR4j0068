女王魁二十七紅獻生策先生何苦自傷懷我有一竒策教你今宵了愁債得和諧瑶琴彈動他偏愛按別鶴數拍奏孤鸞一派俺姐姐自然來二十八張生彈琴幽齋明月照黃昏那有人偢問靜裡焦桐遣孤悶那佳人必來聽這琴中韻將金徽玉軫瀉離愁別恨訴與卓文君二十九鶯鶯聽琴夜香燒罷月明中滿耳清音送此是何人把琴㺯響玎􅭉聲聲彈出孤鸞鳯未聽得曲終早先咱心動無語立花叢三十鶯鶯染病紅稀緑暗總關愁正是傷春候染病擔疾為誰瘦這根由自從月下聽琴後盻鸞交鳯友懶描鸞刺繡減了舊凨流三十一紅教生柬聰明當鑒妾之言特向郎君獻小姐新來懶針線病淹煎命薄不遂凨流碩你修封錦箋我瞧些空便替你把情傳三十二生央遞柬錦箋寫就鳯求凰倩你通情况倚靠似銀山鐵壁樣對鶯娘若還此去説合上奉酬勞重賞扳肩紅一假至死也難忘三十三紅遞與鶯此書莫􅏜小丫鬟是君瑞傳華翰使我將來姐姐看意思間度量必有蹺蹊幹他的巧關俺不瞧犯埋沒著九疑山三十四鶯得生書封皮折破自詳觀靠定粧臺畔滿𥿄情懷訴不斷恨漫漫顛來倒去乾沒亂助相思數欵添新愁一假何日得團圞三十五鶯遺生書就將柬尾把詩題回奉張君瑞囑付叮嚀在心記莫疑惑今宵準備同歡會離西廂月底來後花園內休要誤佳期三十六生赴鶯約月移花影上囪虛靜院間凝佇洛浦神仙在何處步階除歡天喜地尋他去休説尤雲殢雨摶香㺯玉摟一摟也心舒三十七鶯鶯搶生不達時務逞輕薄無故因何到半夜三更把墻跳好不學贏姦賣俏真強盜恕尊兄這遭若夫人知道拏住怎輕饒三十八張生羞退傳消寄信請咱來啞謎兒誰能解既得相逢又嗔怪熱搶白頩著冷臉將人曬佯偢不採是何相待羞下楚陽臺三十九張生自嘆誰知你箇小冤家走滚機謀大不想今畨變了卦受白擦這場凨月乾休罷恁故來調發俺險些兒立化尖擔兒兩頭滑四十張生自縊志誠空抱尾生梁好事無承望白練套兒勒咽項狠鶯娘今畨把俺殘生葬算不的恁強做這般模樣這性命要他償四十一僧勸張生只因紅粉一嬌姿把性命全輕視一失人身萬劫至欲何之不知命無以為君子問你這懸梁鬼尸怎做箇明經進士可笑不尋思四十二生答法聰小生一一訴衷情碩啓尊師聽他家子母忒心硬把人坑不合救恁全家命雖六禮未行諒一言已㝎臨了也悔前盟四十三夫人問生離鄉背井病淹煎近日多清減雖是聰明主張欠病懨懨男兒當把功名念將鵬程奮颭把鰲頭髙占休悮了去攀蟾四十四生答夫人夫人你去自量度這病因誰惱則為當時背盟約悶無聊夢魂兒孤枕上沒著落瘦削沈腰愁添潘貌此恨幾時消四十五鶯探生病尊兄何苦至于斯妾背母來相視保重將息自調治莫嗟咨從今少恁勞神思悔殺當時咱多不是休要記心兒四十六生答鶯鶯著床臥枕在他鄉針灸都無當減了凨流舊波浪好難當瘦得來不似人模樣喜芳卿見訪料小生微恙今夜敢㝎寧康四十七鶯柬期生情書寫就帶愁封特遣梅香送致意多才那張珙把心通今宵結末了鸞和鳯海棠月朦牡丹露重雲雨會巫峯四十八紅娘不允從今不惹這凨聲非是違尊命送暖偷寒枉傒幸事無成驚心怕膽憂成病這邊你撇清那廂他督併好著我兩下裡費精神四十九紅遞生柬一天好事㝎今宵特向先生報鸞柬題情送期約暗藏包佳人有意郎君俏説雲英等著教裴航知道早些赴藍橋五十生得鶯書春寒惻惻掩重門滿地殘紅襯忽得靑鸞寄芳信到黃昏書齋準擬成秦晉病痊九分心寬一寸索整起舊精神五十一生盻鶯鶯鞦韆院落夜沉沉孤館難成寢映月樓臺似波浸立花隂玉人不至因為甚好著咱自審他敢又撒無處問佳音五十二紅送鋪陳一輪明月照南樓夜色清如晝想那酸丁把咱候莫遲留催逼姐姐疾忙走珊瑚欹枕芙蓉禋褥俺先去報凨流五十三鶯至書齋有情怕甚隔年期才得文章力投至相逢在今日可知裏凄涼受了無碑記心歡神喜雨情雲意携手入羅幃五十四雨雲歡會髙燒銀燭照紅粧低簇芙蓉帳倒鳯顛鸞那狂蕩喜洋洋春生翆被翻紅浪汗溶溶粉香美甘甘情况別是一凨光五十五雲雨初歇鬢雲斜軃鳯叉垂枕簟留春意錦帕盈香沁紅記蹙雙眉侍兒扶起嬌無力笑迷嬉語遲困朦騰眼閉凨月此情知五十六紅促鶯歸半囪花影月三更悄悄穿芳徑早離書齋便乾淨噤麼聲紅娘不是相督併著姐姐快行恐奶奶潛聽瞧破恁私情五十七生送鶯歸海棠枝上月兒斜雲雨恰才歇蘭腦馨香散書舍暫分別莫教辜負千金夜我叮嚀告説你再休扯拽明日早來些五十八紅貼鶯歸燈花連夜為誰新來往相逐趂戴月披星不辭困送殷勤東君有意傳芳信紗囪夜分翠衾春嫩心事費溫存五十九事聞夫人清白相國重當朝這妮子先不肖潑賤奴才聽他調往來挑誰知養下家生哨把咱氣倒等他來到粗棍打折腰六十紅行鶯囑若還你到母親前見責休埋怨欵裡慢把良言勸問根源覷些喜怒承機變望姐姐可憐替説些方便善為我辭焉六十一夫人詰紅叮嚀行坐守閨房誰料你將心放夜靜更深沒攔當小花娘勾引小姐同胡創有何勾當因甚狂蕩實與我説行藏六十二紅娘受責家翻宅亂閙啾啾唬的我難開口惱犯尊顔怎收救沒來由自家攬得愁來受雨點似棍抽火急般追究做媒的下場頭六十三紅答夫人既然妳妳問根苗則索從頭道當日寺中解危閙那功勞至今一向何曽報俺姐姐意好怕哥哥心惱因此效鳯鸞交六十四鶯鶯自念這埸煩惱怎周折老母尋枝節暗箭連珠把人射枉咨嗟兢兢戰戰心喬怯臉兒羞怎遮懷兒愁怎卸有甚話兒説六十五紅勸夫人尊前敢掉巧舌頭有事當窮究看了張生那清秀本凨流胸中志氣沖牛斗與姐姐既有望奶奶將就結未了燕鶯