女王魁二十七紅獻生策先生何苦自傷懷我有一竒策教你今宵了愁債得和諧瑶琴弹動他偏愛按別鶴数拍奏孤鸞一派俺姐姐自然来二十八張生弹琴幽齋明月照黄昏那有人偢問静裡焦桐遣孤悶那佳人必来聽這琴中韵将金徽玉軫瀉離愁別恨訴與卓文君二十九鶯鶯聴琴夜香燒罷月明中滿耳清音送此是何人把琴㺯響玎􅭉聲聲弹出孤鸞鳯未聽得曲終早先咱心動無語立芲叢三十鶯鶯染病紅稀緑暗總関愁正是傷春候染病擔疾為誰瘦這根由自從月下聽琴後盻鸞交鳯友懶描鸞刺綉减了舊凨流三十一紅教生柬聡明當鑒妾之言特向郎君獻小姐新来懶針線病淹煎命薄不遂凨流碩你修封錦牋我瞧些空便替你把情傳三十二生央逓柬錦牋寫就鳯求凰倩你通情况倚靠似銀山鉄壁様對鶯娘若還此去説合上奉酧勞重賞扳肩紅一叚至死也難忘三十三紅逓與鶯此書莫􅏜小丫鬟是君瑞傳華翰使我将来姐姐㸔意思間度量必有蹺蹊幹他的巧關俺不瞧犯埋没着九疑山三十四鶯得生書封皮折破自詳觀靠定粧䑓畔滿𥿄情懷訴不㫁恨漫漫顛来倒去乾沒亂助相思数欵添新愁一叚何日得團圞三十五鶯遺生書就将柬尾把詩題囬奉張君瑞嘱付叮嚀在心記莫疑惑今宵准備同歡㑹離西廂月底来後芲園内休要悞佳期三十六生赴鶯約月移芲影上囪虚静院閑凝竚洛浦神仙在何處步堦除歡天喜地尋他去休說尤雲殢雨摶香㺯玉搂一搂也心舒三十七鶯鶯搶生不達時務逞輕薄無故因何到半夜三更把墻跳好不學贏奸賣俏真強盗恕尊兄這遭若夫人知道拏住怎䡖饒三十八張生羞退傳消寄信請咱来唖謎兒誰䏻觧既得相逢又嗔恠熱搶白頩着冷臉将人曬佯偢不採是何相待羞下楚陽臺三十九張生自嘆誰知你箇小冤家走滚機謀大不想今畨變了卦受白擦這塲凨月乾休罷恁故来調發俺險些児立化尖擔兒兩頭滑四十張生自縊志誠空抱尾生梁好事無承望白練套兒勒咽項狠鶯娘今畨把俺殘生塟算不的恁強做這般模様這性命要他償四十一僧勸張生只因紅粉一嬌姿把性命全輕視一失人身萬刼至欲何之不知命無以為君子問你這懸梁鬼屍怎做箇明經進士可笑不尋思四十二生荅法聰小生一一訴衷情碩啓尊師聴他家子母忒心硬把人坑不合救恁全家命雖六禮未行諒一言已㝎臨了也悔前盟四十三夫人問生離郷背井病淹煎近日多清减雖是聡明主張欠病懨懨男兒當把功名念将鵬程奮颭把鰲頭髙占休悮了去攀蟾四十四生荅夫人夫人你去自量度這病因誰惱則為當時背盟約悶無聊梦魂兒孤枕上沒着落瘦削沈腰愁添潘貌此恨㡬時消四十五鶯探生病尊兄何苦至扵斯妾背母来相視保重将息自調治莫嗟咨從今少恁勞神思悔殺當時咱多不是休要記心兒四十六生荅鶯鶯着床臥枕在他郷針灸都無當减了凨流舊波浪好難當瘦得来不似人模様喜芳卿見訪料小生微恙今夜敢㝎寍康四十七鶯柬期生情書寫就帶愁封特遣梅香送致意多才那張珙把心通今宵結末了鸞和鳯海棠月朦牡丹露重雲雨會巫峯四十八紅娘不允從今不惹這凨聲非是違尊命送暖偷寒枉傒倖事無成驚心怕膽憂成病這邊你撇清那廂他督併好着我兩下裡費精神四十九紅逓生柬一天好事㝎今宵特向先生報鸞柬題情送期約暗蔵包佳人有意郎君俏説雲英等着教裵航知道早些赴藍橋五十生得鶯書春寒惻惻掩重門滿地殘紅襯忽得靑鸞寄芳信到黄昏書齋准擬成秦晋病痊九分心寛一寸索整起舊精神五十一生盻鶯鶯鞦韆院落夜沉沉孤舘難成寢映月楼䑓似波浸立芲隂玉人不至因為甚好着咱自審他敢又撒無處問佳音五十二紅送鋪陳一輪明月照南楼夜色清如晝想那酸丁把咱候莫遅留催逼姐姐疾忙走珊瑚欹枕芙蓉䄄褥俺先去報凨流五十三鶯至書齋有情怕甚隔年期纔得文章力投至相逢在今日可知裏凄凉受了無碑記心歡神喜雨情雲意携手入羅幃五十四雨雲歡㑹髙燒銀燭照紅粧低簇芙蓉帳倒鳯顛鸞那狂蕩喜洋洋春生翆被翻紅浪汗溶溶粉香羙甘甘情况別是一凨光五十五雲雨初歇鬂雲斜軃鳯釵垂枕簟留春意錦帕盈香沁紅記蹙双眉侍兒扶起嬌無力咲迷嬉語遅困朦騰眼閉凨月此情知五十六紅促鶯㱕半囪芲影月三更悄悄穿芳逕早離書齋便乾浄噤麽聲紅娘不是相督併着姐姐快行恐奶奶潜聴瞧破恁私情五十七生送鶯㱕海棠枝上月兒斜雲雨恰纔歇蘭腦馨香散書舍暫分別莫教辜負千金夜我叮嚀吿說你再休扯拽明日早来些五十八紅貼鶯㱕燈芲連夜為誰新来徃相逐趂戴月披星不辭困送殷勤東君有意傳芳信紗囪夜分翠衾春嫰心事費温存五十九事聞夫人清白相國重當朝這妮子先不肖潑賤奴才聽他調往来挑誰知養下家生哨把咱氣倒等他来到粗棍打折腰六十紅行鶯嘱若還你到母親前見責休埋怨欵裡慢把良言勸問根源覷些喜怒承機變望姐姐可憐替説些方便善為我辭焉六十一夫人詰紅叮嚀行坐守閨房誰料你将心放夜静更深沒攔當小芲娘勾引小姐同胡創有何勾當因甚狂蕩實與我説行蔵六十二紅娘受責家翻宅亂閙啾啾諕的我難𨳩口惱犯尊顔怎収救沒来由自家攬得愁来受雨點似棍抽火急般追究做媒的下場頭六十三紅荅夫人既然妳妳問根苗則索從頭道當日寺中觧危閙那功勞至今一向何曽報俺姐姐意好怕哥哥心惱因此效鳯鸞交六十四鶯鶯自念這埸煩惱怎周折老母㝷枝節暗箭連珠把人射枉咨嗟兢兢戦戦心喬怯臉兒羞怎遮懷兒愁怎卸有甚話兒説六十五紅勸夫人尊前敢掉巧舌頭有事當窮究㸔了張生那清秀本凨流胸中志氣冲牛斗與姐姐既有望奶奶将就結未了燕鶯