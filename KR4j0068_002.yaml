道是自古雲林逺市朝因此上跳出風濤真乃是南山秋色兩相髙非髙傲明知道浮世不堅牢么篇他雖不在長生路上參玄妙也能勾樂樂醄醄明月歌清風操與巢由同調誰待要束帶立于朝二煞這枕孕隂陽滋雨露發天機叱巨靈髙從太華峯頭琢這枕藴風電含斗曜遣飛廉驅象罔深向東瀛海底撈這枕滑膩如珊瑚清新如琥珀古淡如鴛鴦溫潤如瓊瑶抱著呵骨清毛爽靠著呵心曠神怡枕著呵夢斷魂勞但黑甜一覺知他是幾千畨紅日上花稍一煞入羅浮棲野店對寒梅偎素質參橫月落啼青鳥盻陽臺瞻椘岫惹嬌雲霑嫩雨暮約朝期望翆翹賦甘泉吞鳳成章釣渭濱非熊協兆繞南柯逐蟻穿槐採荒郊得鹿蒙蕉悶懨懨懷中失筆磣磕磕腹內生松光輝輝梁上懸刀都是些神魂顛倒只落的干生受枉劬勞煞尾你伴著半囱花影鶯聲俏我趂著萬里風頭鶴背髙我向東華上九霄你到南浮走一邅折桂攀蟾姓字標入省登臺意氣髙曳玉拖金享重爵耀武揚威靜邉閙畫閣蘭堂飽宴樂鳳枕鴛幃配艷嬌日月如流不可招富貴榮華不能保投至得五十載其間再撞著少不的緑鬢朱顔鏡中老端正好月下吹簫訴别攴楞的斷了冰絃擊玎的分開鸞鏡撲鼕的井墜銀瓶滴溜的半囱明月梧桐影兀的不又感起心頭病滚繡毬每日家愁沒亂心不寧睡不著夢又驚乍離别怎捱那凄涼光景想多才必定飄零雖然他無定凖難道他無志誠既無情呵可怎生頻稍書把咱來欽敬既有情呵可怎生過三秋不見回程我這里懨懨瘦損消磨了這悶他那里緊緊相纒教我怎不動情這些時魚鴈無慿倘秀才每夜家愁悶到三更四更長吁道千聲萬聲似這般枕冷燈昏好著我睡不成一箇冷落在臨川縣一箇寂寞在豫章城他兩箇一般病症滚繡毬染霜毫濕墨濃端溪硯秋水傾拂花箋巧疊成箇方勝不由人雨淚盈盈我比那題橋的無定凖駕車的少信行兩般兒不當不正𥿄和筆包藏著兩字關情展開𥿄呵怎禁那目邉點水淹難盡我援起筆恰便似門裡挑心寫不成將斑管來髙擎賽鴻秋行時思坐時想間時論怕人知嗔人講嫌人問圖他些恬愛他些俏貪他些俊因此上耽著驚受著怕懷揣著悶風流人可增可意堪人敬怕不我口兒里強身子兒扯心兒里順脫布衫這簫吹起來間悶間縈引的人來無緒無情再誰敢道憑闌倚樓再誰敢道放懷遣興小梁州這簫他引鳳勾鸞感起舊情又不比夜月聞箏則俺這憂愁哀怨不堪聽是一曲陽關令吹徹斷腸聲么篇朣朧皓月如懸鏡入簾櫳照得傷情我愁聞這角韻頻越感起心頭病則我這影兒孤另因此上嫌殺月兒明端正好夜將闌人初靜悶懨懨獨步間行又無箇使數的把咱相將領羅襪窄雙尖並滚繡毬這其間天色晴月正明並無那片雲遮映我將這香盒兒手內髙擎我這里燒好香稱著小名禱告了四方神聖負心的少不的落塹投坑題起那小名兒怎不著我心頭想行呪罵雙眸淚點傾不由人感嘆傷情倘秀才聞畫角悠悠數聲聽更鼓鼕鼕的二更歸寢室連忙不暫停玎璫響玉鈎鳴我這里慢行滚繡毬又恐怕老毋聽我則索躡足行欵欵的將繡房門掩映怎禁那銀臺上燈熖熒熒懶將那針指拈繡作工我將這碎生活連忙打併急收拾手似撈菱黑油架上衣服搭紅漆粧盒叉釧盛斜倚定幃屏脫布衫不由人雨淚盈盈月兒照房內囱櫺寶爐中焚燒篆餅風兒吹壁間圖幀小梁州半擁鮫綃眼漸明端的是好夢難成垂床倒枕不安寧添愁興涼夜對寒燈么篇尋思半晌空傒幸想起來一陳心疼則願的成了配偶婚姻定哎你箇喬才薄幸忒俊俏忒聰明端正好蘇卿題恨不覩事拆鸞凰軟兀刺分鶯燕茶船上暗接了絲鞭浪花中一葉扁舟逺望不見芙蓉面滚繡毬想呵想俺那無主意的人恨呵恨他那有勢力的錢𬒳幾文潑銅錢將栁青來買轉莫不我只有分寡宿孤眠這其間過金山古寺前到潯陽江岸邉把九江水品茶嘗遍他幾曾慣掃雪烹煎他安排著楦肚腸鳳髓酬歌興我準備著調琴瑟鸞膠續斷絃再相逢甚日何年倘秀才書寫下情詞數聮更敘著寒溫半篇揀一張整整齊齊碧玉箋將心事付嬋姢百般的無一箇順便滚繡毬往常時玉樓前巢翡翆繡衾棲交􅖪鴛也曾遂少年心願翠紅鄉非我十全他則會風月情花栁筵幾曾經這般水面暗送了茶引三千把一箇麗春園生扭做相思海金斗郡翻為離恨天就裏難言倘秀才再不見嬌滴滴人如玉仙星靨靨花攢翆鈿再不見桃花扇影偏我往常尊席上小樓前將吹彈敷演呆骨朵梨花零落深沉院冷清清間耍鞦韆誰想他信杳音乖閃的我緣薄分淺𬒳這倒城計虔婆騙誰與這無勢力的人方便他管甚麼有情惜有情問甚麼解元不解元尾聲新愁不共芭蕉展舊恨難將栁線穿曾記臨行甚所言恩愛翻成生死冤赤緊的冤家緊厮纒有一日宴罷瓊林作狀元除得臨川做知縣恁時節蘇氏方知姓名顯端正好恰移得牡丹叢早惹下花胡洞載著這滿船兒和氣春風我向那酒排柵一枕南柯夢勾引了嬌鸞鳳滚繡毬我子見半空中山色濃一江風波浪湧兩岸邉青滲滲緑楊隂重滿晴灘暖融融鷗素鴛紅我這里眼巴巴望著逺汀困騰騰靠著短篷專等那惜花人將俺這牡丹陪奉知他那逰春的甚日相逢我這里江心舉棹穿雲影抵多少苑內尋芳入錦叢好教人心緒忡忡倘秀才我恰才載花船來到這菰蒲岸東見一箇龎眉引定箇風流的女童他道是勾引春光泛落紅他道是有來尋的呵只來在蓬島畔相會向大羅中知他是我癡呆耶你懵懂呆骨朵你道我小生涯只會將花種你如何倚翆偎紅我子怕老了你芳春耽閣了業種你道他牡丹花無名草我笑你樗散材成何用你既是説天香有甚罕却怎的思國色來問蹤醉太平囑付你夀春的老翁夙契俺仙風我將這船開在當溜説心宗子這部悟真篇是道統如斯煆煉真鉛汞如斯爐鼎勤修用如斯溫養見吾功這一句有神人護擁脫布衫你看他占天香國色春工有沉魚落鴈芳容一團兒和氣暖風百般嬌錦鴛丹鳳三轉小梁州休戀那斗帳春風翆𬒳重撇罷了酒釅花濃打疊起陽臺雲雨杳無蹤眼前是蓬萊洞一霎兒便相逢能將這青蛇百煉的常明瑩響錚錚利刃鋼鋒降得魔能揮用子將那真鉛真汞結成了一粒兒寶珠紅金丹熟也神光迸氣沖霄伏虎降龍火候勻靈胎動萬萬卷仙經佛頌不離了此門中尾聲我這里挂一帆雲影天風送看兩岸芳洲曙色瞳遙望仙源一派通回首仙凡逈不同若見俺仙家那受用火棗交梨味正濃沆瀣瓊漿滿玉鍾萬本靈芝五粒松千載蟠桃養玉容翠柏黃精飯恰㫪白鹿玄鶴左右從緑水青山瑞靄籠瑶草竒花散翆紅金碧樓臺圖畫中貝闕珠宫香霧濛五色雲車駕六龍萬里江山馭八􅍡間伴香山九老朋悶喚啇山四皓翁長嘯清秋碧海東八表翺翔跨大鵬位列仙班品級崇抵多少塵世逰仙一場夢爭似俺不老長生萬年永端正好曉珊珊琪樹蕩靈風晚濛濛輦道迷香霧花撲撲錦乾坤望眼糢糊曲盤盤五城十二樓前步逺騰騰似入蓬萊路滚繡毬紅冉冉緑依依花籠隂映玉除清淺淺響濺濺水流香出翆渠明朗朗墨浸浸八龍篆太霞深處寬綽綽靜巉巉繞雕闌依翆檻展轉盤紆滑擦擦細𥻘𥻘布金沙雲階甃碔玞輕颭颭琅琅隔琳窗霞綃響珮琚薄設設靜勻勻蒙畫欄護銀屏水涵雲母齊臻臻滴溜溜挂珠箔捲繡簾鈎搭珊瑚香靄靄暖溶溶玉樹縹渺迷青瑣氣森森光閃閃金屋稜層絢碧虛真乃是人間天上全殊倘秀才蕭爽似瀛海東扶桑奧區廓落似閬苑西蟠桃聖圃一片天光浸玉壷閣門珠䍡􅝹復道錦氍毹上青華洞府脫布衫丹青繪絳闕清都奎星燦寶檢靈書龍虎衛飛天象符風霆護太玄瓊籙醉太平以琴書自娛與道德為徒孔情周思乃災畬擺列著牙籖玉軸上青冥借嫦娥八竅月中兔採神芝倩麻姑七寶山前鹿訪丹丘賃張公千歲杖頭驢樂逍遙分福尾聲近北軒竹搖煙毿毿鳳展沖霄羽對南樓松挂月矯矯龍㗸照乘珠綽約仙君蒞廣居玄默無為道味腴一寸心存太古拘萬里神逰廣漢墟蕚緑飛瓊時寄語赤鯉青鸞頻報覆道滄海碧雲拱望舒恁時節鶴馭雲軿降王毋端正好栁輕柔花嬌媚春雲淡日色輝輝曉來枝上鶯聲細似喚起逰春意滚繡毬栁隂中駿馬嘶花隂外好鳥啼看蜂蝶採花成對巧丹青粧點屏圍這壁廂令鼓催那壁廂妙舞宜採花枝玉纎相遞戲鞦韆畫板沾泥髙張翆蓋嬌紅粉慣走青􅍡俊緑衣堪賞堪題倘秀才牡丹亭嬌容膩體芍藥圃濃香艷蕊玉蕊山茶間𬗋薇素珍珠明含笑紅錦𬒳映酴醿海棠花似煙霞照水脫布衫一處處仕女逰嬉一攢攢醉客樽罍一簇簇笙歌韻美一步步管絃聲沸小梁州沽酒樓前人聚集掩映踈籬桃花似錦栁依依蒸和氣賽閬苑勝瑶池么江南自古繁華地勝追逰儘醉方歸波動處緑鴨浮沙暖處紅鴛睡風流佳致省可里杜鵑啼尾聲逰春不覺金烏墜乘興還隨玉兔回倒玉頽山醉似泥相賞休違莫負芳菲看了這萬紫千紅端的是畫圖裏端正好集曲名我子見粉蝶兒聚芳叢黃鶯兒遷髙栁慶東原景物悠悠我到這萬花臺上間行走迅指般絳都春光又滚繡毬我子見捲珠簾挂玉鈎控金猊滚繡毬殿前歡把碧玉簫齊奏子聽的攪箏琶慢撥輕搊他將那風流體舞袖垂喜人心曲調謳催花樂鼓喧晴晝醉春風花栁盈眸常子是感皇恩享千年福大德歌傳萬載秋端的是美景堪酬倘秀才我這里踏莎行到垂楊渡頭見幾箇憑闌人在桃花洞口問你箇醉娘子因何向苑內逰他道是穿芳􅏙將蒙童兒覔撲蝴蝶把耍孩兒逐他將那紅繡鞋欵兜滚繡毬你看那黃薔薇葉漸稠紅芍藥花未有小桃紅胭脂恰透猛聽得賣花聲遙隔著紅杏墻頭你道是迎仙客向栁外樓賞花時正沽美酒直盻到牡丹春過了這禁煙時候聽你那大安樂唱徹梁州緑囱前金蕉葉暖春雲淡花枝上玉翼蟬輕曉霧收仙苑清幽倘秀才子你箇天仙子將栽培問候休怪俺憨郭郎叨叨絮口他不比石竹子山丹花山石榴他是箇慶豐年誇麗景逍遙樂勝追逰他是箇四季花領袖滚繡毬這牡丹綵樓春飲興酬恰便似翆盤秋舞態羞他到那喜春來玉嬌枝把韶光泄漏栽培在梧葉兒中秋他相伴著金菊香共登髙上小樓常記著豆葉黃去年時候那其間醉髙歌滿泛金甌移根呵青山口一半兒添黃壤澆灌呵新水令三畨人引碧流花盛在中州倘秀才他與那古鮑老羞臨皓首他與那笑和尚參辰卯酉他的是秃厮兒斜簮在四換頭他與那採茶歌難共賞他與那醜奴兒不相投他與那絡絲娘難同配偶滚繡毬喜的是醉太平金盞兒酬愛的是栁青娘將金縷謳樂的是神曲纒齊天樂奏伴著的憶王孫寶馬追逰想當日好觀音在南海洲靜瓶光裏插枝栁五供養呵牡丹花也不曾落後便將著一錠銀也難覔難求恰便似謁金門貴客丰標美端正好佳人體態柔步步嬌羞叨叨令看了你念奴嬌將一箇翆裙腰結束的腰肢瘦虞美人將一箇紅衫兒雙軃下泥金袖好姐姐舞一回臉兒紅汗漬得香腮透催拍子唱一曲六么序越顯得聲音溜兀的不好事近也麼哥兀的是快活年也麼哥又𬒳你這六娘子十棒鼓攛斷的呵聲驟餘音這牡丹錦上花新時令嫩蕊紅香剖西河栁撥不斷長條翆帶柔到明日探春令看花園苑逰俺向聖藥王庭闈慶賞酬寶鼎現香濃瑞靄浮女冠子相陪飲巨甌傾杯樂筵前美女謳只願得千秋歲萬年歡百事投直宴到更漏子迢迢夜景幽穿囱月斜窺翡翆樓沉醉東風未肯休直宴到燭影搖紅那時候低簌下蘇幕遮重重鳳幃裏宿雍熙樂府卷之二終
