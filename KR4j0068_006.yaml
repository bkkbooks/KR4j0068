我心間無事人都道我面帶驚疑人怎知今年瘦似去年時不覺的􅥋了金釧不覺的瘦了腰肢寛掩過這湘裙五六指耍孩児止不過二十三四西風了却黄花事减了精神瘦了龎児憔悴時病身軀恰似繭中絲人都道我不宜時滴溜溜臍下常疼痛冷定定三關閉了脉息到不的五七年上絶了事人又道是退胞老鴇那里取花酒鶯児三煞天可憐有一時烟花簿上除名字脫了這沾花惹草長衫子穿一件綉鳳描鸞大襖児遂了我心間事丢了這翆花包髻帶一箇帔子冠児二煞當家也㑹當使奴也㑹使更添了兩箇夫人字向碧紗囱下描些花様也強如白玉堦前舞柘技逐朝的事收拾些針線伴些箇書櫃箱児一煞撇了這不值錢的烟花市免見些不養家的浪漢子棄了這巴家私心性循行止早離了樽前席上歌春唱情碩做布襖荆釵無惮辭都道我收心的是做了箇無憂愁的婦女守着箇有疼熱的男児尾聲到冬来燒取箇熱炕児到夏来住取箇凉院子俺夫妻毎說取箇家常事到大来無是無非快活死粉蝶児擬淵明歸去来兮咲人生苦貪名利我豈肯䧟迷途惆悵獨悲假若做公卿居宰輔剗地心勞形役量這些来小去官職枉消磨了浩然之氣酔春風想聚散若浮雲嘆光隂如過隙不如聞早賦歸歟暢是一箇羙羙棄職歸農杜門脩道早子死心塔地紅綉鞋泛逺水舟摇揺以輕颺送征㠶風飄飄而吹衣望烟水平蕪把我去程迷問征夫詢逺近瞻衡日熹微盻柴桑歸興急滿庭芳再休想折腰為米落得箇心閑似水酒酔如泥樂醄醄並不管家和計都分付與稚子山妻栽五栁閑居隠迹撫孤松小院徘徊問因宜把功名棄豈不見張良范蠡這兩箇多大得便宜上小楼我則待逐朝毎日無拘無繫我則待從事西疇寄傲南囱把酒東籬三徑􅈬荒松菊猶存規模不廢䇿扶老尚堪流憇么引壷觴以自酌盻庭柯以自怡有酒盈尊門設常關景幽人寂或命巾車或棹孤舟從容逰戯比着箇彭澤縣較淡中有味耍孩兒溪泉流出消㳙細木向陽欣欣弄碧登東臯舒嘯對斜暉有兩般児景物稀竒覷無心出岫雲如画見有意投林鳥倦飛草堂小堪容膝說親戚之情話樂琴書以忘機么篇或㝷丘壑觀清致或自臨清流品題我為甚絶交逰待與世相違雖是我傲羲皇本性難移想人間富貴非吾碩望帝里迢遥不可期巳往事都休記度晚景樂夫天命其餘更復奚疑尾聲辭功名則待逺是非守田園是我有見識閑悠悠無半點為官意一任駟馬髙車聘不起粉蝶児蘇卿訴苦江景瀟踈更那堪楚天秋暮占西風栁敗荷枯立夕陽空凝竚江鄉古渡水接天隅眼瀰漫晚山烟樹醉春風寂寞日偏長别離人最苦把一封正家書改做假休書馮魁不覩将我来娶娶知他是身跳龍門首登虎榜想這故人何處紅綉鞋往常時冬里臥芙蓉䄄褥夏里鋪藤席紗厨但出門換套児好衣服不應馮魁茶貟外茶貟外鈔姨夫我則想俏雙生為伴侣迎仙客見一座古寺宇盖造得非常俗見一箇僧人念經搯着數珠待道是小闍梨却元来是老院主俺是箇檀越門徒問長老何方去石榴花㸔了那可人江景壁間圗粧點費工夫比及江天暮雪見寒儒盻平沙趂宿落鴈無書空随得逺浦㠶歸去漁村落照船歸住烟寺晚鐘夕陽暮洞庭秋月照人孤閗鵪鶉愁多似山市晴嵐淚多似瀟湘夜雨少一箇心上才郎多一箇脚頭丈夫毎日家茶不茶飯不飯百沒是處教我那里吿訴最髙的離恨天堂最低的相思地獄普天樂腹中愁詩中句問甚麽失題落韻跨馬騎驢想着那得意時着情處筆尖題到傷心處不由人短嘆長吁嘱付你僧人記取蘇卿休與知它雙漸何如上小樓怕不待開些肺腑都向詩中分付我這里行想行思行寫行讀雨淚如珠都是些道不出寫不出憂愁思慮忍不住放聲啼哭么他怎知我嫁人我知他應過舉畨做了魚沉鴈杳瓶墜簮折信㫁音踈咫尺地半載餘一字無雙郎何處我則索随他販茶船去十二月無福效同儔並侣有分受枕剰衾餘想起来相思最苦空教人好夢全無擗飛了清歌妙舞受了些寂寞蕭踈堯民歌閃的人鳳凰䑓上月児孤趂㠶風勢下東吳我這里安桅舉棹泛江湖到不如沉酔羅幃倩人扶躊躇躊躇天邉鴈児無遥望把佳期悞耎孩兒這厮不通今古通啇賈是販賣俺愁人的客旅守着這厮愁悶怎消除真乃是牛馬而襟𥚑斗筲之器成何用糞土之墻不可杇想俺愛錢娘喬為做不分些好弱不辨賢愚三煞娘呵你好下的好下的􅑯狠毒忒狠毒全没些子母情腸肚則好教三千塲失火邅天震一萬處疔瘡生背疽怎不教我心中怒你在錢堆受用撇我在水面上邅荼二煞我上船時如上木驢下倉時如下地府靠桅杆似靠将軍柱一箇随風倒柁船牢獄趂浪逐波乗轞車伴着這魋人物便如冤魂般相纒日影般相逐一煞他正是馮魁酒正濃蘇卿愁起𥘉下船来行到無人處我比娥皇女哭舜添斑竹比曺娥女哭江少一套孝服則怕他瞧破俺離情緒推眼疾偷掩痛泪佯呵欠帶㡬聲長吁尾聲比我這泪珠児何日乾愁眉甚日舒将普天下煩惱收拾聚也不似得蘇卿半日苦粉蝶児集曲名題秋怨雙鴈児聲悲景蕭蕭楚江秋意勝陽關刮地風吹滿庭芳梧桐樹金蕉葉墜慶東原金菊香滴滴金惟那更酔西湖乾荷葉失翆酔春風我一半児情感玉花秋一半児憶王孫歸塞北我這應天長乆不㫁怨别離對秋風怨憶憶折倒的風流體尫羸紅衫児寛褪翆裙腰難繫迎仙客都不念奴嬌望逺行忘了初相見在武陵溪罵玉郎有上稍没末尾瘦削了栁絲玉芙蓉花面皮這翆眉児攣刺捱這等相思㑹紅綉鞋上小樓凭闌人立青山口日上平西子聴得喬木鵲踏枝呌聲疾莫不倘秀才餘音至夜行船阮郎歸元来是牧羊關烏夜啼石榴花常記得賞花時節㸔花回上京馬酔扶歸歸来囱半月児低真箇酔矣栁青娘虞羙人扶只困騰騰上馬嬌無力歩歩嬌㺯影児行遲似鳳鸞交配荅雙鴛鴦對人都道端正好夫妻閗鵪鶉不悮這萬年歡娱畨做了荆湘怨憶把一箇玉翼婵姢閃在瑶䑓月底想曩日逍遥樂事迷今日呆古朶自悔子落得初問口長吁哭皇天泪滴普天樂空閑了碩成雙鴛鴦児𬒳攪箏笆㫁毀碧玉簫塵迷四塊玉簮折一錠銀瓶墜嘆因縁節節髙天際這淹證候越随煞愁的想兩相思病體把紅芍藥枉喫有藥聖王難醫尾聲我毎夜伴穿囱月影低好也羅你可快活三不歸空教人立蒼苔紅綉鞋児濕可怕不戀上别的賺煞你粉蝶児集曲名題情金盞児裡􅌒飲香醪盻到那賞花時甚實曾歡咲别人都喜春来唯我心焦出得那慶東原離亭宴暗傷懐抱貪㸔那喜逰蜂蝶戀花稍想起賀新郎不知消耗酔春風何日碩成雙㡬時䏻勾端正好只除是憶王孫合小桃紅怎消得這惱惱直喫得沉酔東風武陵溪畔后庭花落迎仙客櫻桃般點絳唇楊栁般翆裙腰紅綉鞋輕移蓮歩小栁眉顰一半児嬌端的有絡絲娘的妖嬈似一朶紅芍藥紅綉鞋上平西㸔㸔日落念奴嬌梦㫁魂勞鵲踏枝黄昏里哨遍林稍雙鴈児呀呀呌牧羊關外野猿號怨别離難睡着石榴花緑囱人去悶難熬哭皇天和淚洒芭蕉人月圎㝡好愁殺我也鳳友鸞交兩相思真病難醫療只除倘秀才赴藍橋閗鵪鶉想起那撥不㫁恩情元和令下稍上馬嬌郎君㸔花回最好歸塞北恩情恨未消呆古朶怎放脫了石榴花裙児綿荅絮睡着普天樂賣花聲還驚覺把一朶雪里梅生扭的粉碎臙焦罵玉郎傷懐抱㡬時捱得金鷄呌凭䦨人恨殺才𫾣一枝花瘦了穿囱月底虞羙人難熬尾聲酔扶歸入画堂輕移歩歩嬌阮郎歸一去無音耗空踏遍䑓前寄生草粉蝶児道情引的是白鹿玄鶴向雲水鄉那荅児不到藥籃児肩上斜挑上雲梯穿石凳猛然凝眺不覺地老天髙正宜咱孟嘉落㡌酔春風玉露潤菊花肥金風催梧葉老黄花紅葉滿秋山此景暢是好好野水横橋淡烟衰草晚峰殘照迎仙客見一座小道庵盖的来一箇茅捨俗出家逺市朝俺那里水烟深山勢髙四壁週邅不許些紅塵到紅綉鞋親奉得師父指教向籬邉去打勤勞摘藤花挑竹笋採茶苗𥙷雲衣畨槲葉明石洞爇松膏這的是仙家活計了滿庭芳您道是為官是好光隂㫁送催逼了些宰相臣僚細思量君起早時臣起早俺也曾子細評䟦譬似去丹墀内穿靴着𫀆怎如俺草庵一丫髻環絛標寫在凌烟閣便做到太師太傅太保難免折腰勞耍孩兒俺那里香風不動松花老比您那帝輦京師較好毎日㸔神仙神女住仙庒俺喫的是仙酒仙桃俺那里風花雪月人長乆春夏秋冬草不凋觀着星曜清閑落魄快活逍遥二煞俺爭将紫府逰閗把玉帝朝輅車鳳輦知多少三更月底鸞聲逺萬里風頭鶴背髙毎日價神仙閙屯合月窟塞滿天橋一煞月華明甚底喚一宵日光輝甚的喚一朝俺住的是長明不夜通明閣眼觀白日神仙景甚的是鍾送黄昏鷄報曉時把瑶琴操獸爐裊裊沉酔醄醄尾聲竹林寺里無俺弟兄桃源洞内有俺故交待教你㝷真悮入蓬菜島把你濁骨凢胎替換了粉蝶児牛訴冤性魯心愚住烟村飽諳農務醜則醜堪画堪圗杏花村桃林野春風㡬度踈林外紅日西晡載吹笛牧童歸去酔春風緑野喜春耕一犂江上雨利農扶耙受驅馳因為主甘分受苦苦經了些横雨斜風酷寒盛暑暮烟曉霧紅綉鞋牧放在芳草岸白蘋古渡嬉逰扵緑楊堤紅蓼平湖画工描我在逺山圗助田单英勇陣駕老子驀山車古今人吟未足石榴花朝耕暮墾費工夫辛苦為誰乎一朝染患倒在官衢見一箇宰輔借問農夫氣喘因何故聴說罷感嘆長吁那官人勸課還朝去題着咱名字奏鑾輿閗鵪鶉他道我潤國扵民受千辛萬苦毎日向堰口拖船渡頭拽車一勇性天生膽氣麄從来不怕虎為侣的是伴哥王留受用的是村歌社鼓上小楼感謝中書部符行移諸處所在官司禁治嚴明徧下鄉都里正行社長行叮嚀省諭宰耕牛的捕獲懲戮么篇食我者肌膚未肥賣我者家私不富若是老病殘疾卒中身亡不堪耕鋤吿本官送本部從公發付閃的我醜屍骸不着墳墓滿庭芳㗸冤負屈春工辨足却待閑居圈門前見兩箇人来覷多應是将我窺圗一箇曾受戒南庒上的忻都一箇是累經㫁北彊王屠好教我心驚慮若是将咱賣與一命在湏臾十二月心中畏懼意下躊躇莫不待将我釁鍾不忍其觳觫那思想耕牛為主他則是嗜利而圗𬒳這厮添錢買我離桒樞不覩是牽咱過前途一聲嗟嘆氣長吁兩眼恓惶泪如珠兇徒兇徒貪財性狠毒綁我在将軍柱耍孩兒只見他手持刀器将咱覷諕得我戦都速魂歸地府登時間滿地血糢糊碎分張骨肉皮膚尖刀児割下薄刀児切官秤称来私秤上估應捕人在傍邉覷張弹壓先擡了膊項李弓兵強要了胸脯六煞却不道聞其聲不忍食其肉剗地加料物寛鍋中爛煑煑得羙甘甘香噴噴軟如酥把從前的主雇招呼他則道三分為本十分利那里問一失人身萬刦無有一等貪餔啜的喬人物就本店随機児索喚買歸家取意児庖厨五煞或是包饅頭待上賓或是褁餛飩請伴侣向磁瓶中軟火児䓤椒䲴勝如黄犬䏻醫冷賽過胡羊善𥙷虚添㡬盞椒花露你装的肚皮飽旺我的性命何辜四煞我本是時苗留下犢田單用過牯勤耕苦戦功無𥙷還比那展草垂韁義有餘我是一箇直錢底物有我時田園開闢無我時倉廩空虚三煞泥牛䏻報春石牛䏻致雨耕牛運土邅誅戮從今後草坡邉野鹿無朋友麥壠上山羊失了伴侣那的是我傷情處再不見栁稍殘月再不見古木昏烏二煞觔児鋪了弓皮児鞔了鼓骨頭児賣與釵環鋪黒角児做就烏犀帶花蹄児開成玳瑁梳無一件抛殘物好材児賣與靴匠碎皮児回與田夫尾聲我元陽夀未終死得真箇屈苦吿你箇閻羅王正直無私曲訴不盡平生受過的苦粉蝶児閱世自嘆浮生怎生来恁般薄命從㓜年間踼透聰明折末作文章通經史詩詞歌詠今日掌逹刑名頗諳知古今律令酔春風折末圍棊赶箇相知打雙陸攀箇門庭折末粧蹺小踼賽箇輸贏不是我逞逞折末共釋道清談漁樵閑話我可也略通蹊徑剔銀燈折末道謎續麻合笙折未道字說書打令諸般樂藝都曾領向人前舉目回情踈狂性湖海情更愛的是弟兄蔓菁菜脚到處人相敬都為我忒惺惺倒擔閣了半生㡬畨待發志氣修身幹功名爭柰一縷頑涎硬石榴花一片惜花心常是引了人魂靈但沾着便留情玉蕭檀板紫鸞笙向花陣錦營燕燕鶯鶯悲歡聚散常無定落得去秦樓謝舘貪濫風聲好光隂過眼如翻餅到擔閣了錦片也似好前程閗鵪鶉常想着桃李春風怎知有桒榆暮景少年排塲都做了老来罪名一件件從頭自三省都便似梦個驚㸔别人去雲路里飛騰我到老剗地在湫窪中坐靜滿庭芳屈指數班行後生少甚麽無才無徳無義無䏻一跳身平歩登䑓省一箇頭角崢嶸更做八字拙難和我命爭怎生二十年一事無成我這里羞臨鏡我呆心児自驚又早白髪鬂邉生耍孩兒嘆榮枯得失皆前定富貴由人生五行花花草草煞曾經不戀他薄利虚名則不如盖三間茅舍埋頭住買數畆荒田親自耕或臨溪崖或是環山徑受用些竹籬茅舍拜辭了月舘風亭四煞偎山邉建草堂臨江濱買隻釣艇我和樵夫漁父相随趂說今来古往非和是講滄海桒田廢與興耳畔常清淨無来無往無送無迎三煞新茅柴沽滿瓶活鮮魚旋煑鐺粗衣淡飯無拘禁悶来時㸔四圍翆岫烟霞景閑来時誦一卷黄庭道徳經到大来身心凈非是無錢㫁酒臨老修行二煞嘆人生似水上萍富貴如風裡燈出門来一歩一箇風光景量着六斗米司吏何足數便陞做千兩俸人員有甚榮圗箇甚閑爭競想十大功韓信到不如五斗酒劉伶尾聲說着做郎君臉上羞幹功名腦袋疼麗春園子弟埋名姓邯郸道先生這回省粉蝶児一點情牽冷雨梧桐破離雲半床香梦翆屏深燭影揺紅酒邉愁花底恨一時間牽動間阻匆匆夜迢迢枕衾誰共酔春風難打捱枕衾寒怎支吾更漏永今生若得遂于飛我把你来寵寵佛也似皈依命也似惜愛玉也似珍重呌聲邂逅得相逢兩情兩情秋波送淡月鞦韆小院東剔銀燈附着耳低低的過從舉着案謙謙的陪奉他将我羙名児巳向心苗裡種特地裡瘂謎也似包籠顧不的蜂蝶咲倩是麽魚鴈通也是那情濃来意濃蔓菁莱他愛我䏻吟咏我愛他不凢庸擔定着怕恐因此上打不開分不散兩情同想註下山海似姻縁重快活三你若是真真的有始終實實的肯姑容你若甘心不厭我愚蒙不枉了我常稱誦鮑老兒我為他握雨携雲少定蹤𬒳了些人譏諷他為我帶月披星苦用功受了些人搬弄若是他同我同文君之分司馬之風管取他心我心生前厮守死後相從尾聲好音也既通深恩也巳蒙有一日雙雙穩跨秦䑓鳳把玉觴親奉笙歌春酔錦堂中粉蝶児幽居旅寄山東細思量老来無用向荒村循理埋名草堂幽墻院闊把柴門掩暎也不聞暮鼓晨鐘樂身閑耳清身靜酔春風自從識破鏡中天原来便似心上冗中前事業總成空到如今省省我把這萬卷詩書百年活計都做了一塲春梦紅綉鞋安樂窩琴書遣興寒玉堂松栢孤青閑来時展花牋背寫酔翁亭妻児侍左右日月走西東樂閑人心自省石榴花柴門靜坐也春風四時佳興人同等閑不與利名爭趂桒榆暮景蘭菊秋容三荒復理開幽徑小床低炕煖囱明坐間把酒添詩興朗吟風月歲寒亭閗鵪鶉管甚麽孰是孰非自憐自省樂道忘貧離鄉背井麄衣糲食随時用止不過守着這陋巷簞瓢那里有重䄄列鼎普天樂氣神清心安靜撫琴鼓瑟吟月嘲風擎杯鸚鵡飛舉筆龍蛇動進退榮枯皆由命淡生涯女織男耕七里灘閑殺子陵八陣圗忙殺孔明五栁庒酔殺陶令上小樓自憐自警休爭休競忍事饒人蔵舌閉口靜掩柴門講黄庭念道經賢傳孔孟養道人樂天知命么嘆自家時運乖非干是道不行見如今四海無虞八方無事萬國咸寧柰賢者少愚者多賢愚交勝這貧和富總關前定滿庭芳乾坤治平民安國泰海晏河清萬民樂業一人慶聖徳涵弘宸位逺群星向明海量寛萬派朝宗韶光勝桒榆晚景俯仰太平風耍孩兒喜得是四夷萬國干戈定六合八方宇宙寧河清海晏禎祥應幸逢尭舜為真主不學巢由作外卿脚到神仙洞相伴着山中樵子水上漁翁十一煞羙唐虞治世寛喜滄浪水正清自憐老拙非時用整竿鈎線臨溪釣南畆荒田帶雨耕真是吾家幸一身飽煖萬事無䏻十煞為這性昏愚逺市朝無才學趂下風茅齋盖處㝷幽靜自從白屋親農叟懶向青雲探月宫獨樂田園俸遂着老農庒圃四季營生九煞到春来賞清明三月三整杯盤祀祖宗家家院落鞦韆送雨催春色飛来甕風送花香入酒中一弄児新佳景上林鴈呌谷口鶯鳴八煞到夏来設蘆席坐栁隂㑹知音三兩人田園瓜果堪時用瓜浮水甕漂孤月柰浸氷盆落衆星曲唱新時令盞斟白酒扇握清風七煞到秋来賞重陽九月天㑹當行親與隣東籬賞菊希陶令黄鷄啄黍脂漫脇白酒初熟味正濃要把豊年慶三蠶老滿五榖收成六煞到冬来靜幽幽掩柴扉㸔瓊花瑞雪傾煨爐撥火星辰動酒斟玉斚銀河泛詩詠花箋戦鼔鳴詩酒逼寒冷歌児舞女煖煖烘烘五煞喜逍遥四季閑任功名兩字空自慚朽木堪何用寧如塞上翁失馬不管池中魚化龍無辱無榮田舍翁懶起群星衆我向林泉有足官府無名四煞愛閑人終得閑避名人不顯名專心致力㝷幽靜三江口拜别周公瑾七里灘相謁嚴子陵知止心身定一任教鴈飛南北人走西東三煞恰纔見圎圎日落西熒熒月轉東兩輪日月無私鏡任他天上搬昏晝不管人間有死生急急将人併併的那朱顔憔悴白髪鬔鬆二煞草近九月枯人活百年終寒来暑往無歇空恰纔見栁絲春雨漫天緑却又早楓葉秋霜滿地紅世事如翻餅古今興廢轉首成空一煞花開花又凋月圎月又更榮枯逓轉相催併光隂急急如流水世事紛紛似轉蓬死後貧富同一塚你試㸔漢陵楚廟兎跡狐踪尾聲知命人坦蕩蕩不怨天樂道人靜幽幽守固窮六十年一枕通宵夢直等待漏盡更殘那時節省粉蝶児歸隠歸去来兮出塵寰綽然恣意納還了靴簡朝衣過了深坑經了險路不付䏻得占平地趂西風拂䄂而歸樂閑身永絶名利酔春風纔離了帝王畿早来到吾鄉里入門稚子咲牽衣好教我喜喜朋友相詢衆親清話滿堂和氣紅綉鞋急流中忽然湧退半程児便覔歸期心為形役獨何悲迷途尚未逺倦鳥不欲飛因此上樂田園松菊羙普天樂覔幽村㝷活計耘瓜南畆種菊東籬盈疇禾黍香滿目山峰翆獨倚南囱安容膝撫瑶琴風力吹衣操一曲髙山流水釣一竿鈎頭新鯉賦一篇歸去来辭上小樓幽村過日柴門深閉不管興亡不觀邪正不知是非治三荒栽五栁蕭條活計消磨盡古今興廢么想人生䏻㡬何嘆光隂似過隙則不如靜裡琴書悶中羙酒閑裡圍棋樂天命修道徳抱仁懐義養一身浩然之氣滿庭芳君子人随時見機都只為中途荆棘别㝷箇小徑而歸空讀了五車書不濟當時溺且不如粧啞推痴見如今哲人萎賢途否塞太山傾梁木摧灰空費了中條力為山漸虧因此上折卸了上天梯耍孩兒徒懐報國安民藝時已危難推箇道誼自来麒麟不與耕牛閗鸞鳳不同燕雀飛薰蕕不一器世無周公孔子顯不出盗跖桓魋十煞一一将大道明細細将今古推孟軻正理挋楊墨我這里全慿經典闢邪說又恐怕傍人講是非不解其中意自来賢愚不等善惡難齊九煞從前錯怨天如今纔省得忽然叅透天地理榮枯枕上三更萝成敗盤中一着棋日月搬興廢閑来飲一杯悶酒展兩葉愁眉八煞所行将天爵尊所㸔皆墳典集五經厯厯說一㑹赤緊的清音不入常人耳聴者雖多逹者稀不如緊把舌關閉潜頭䄂手掩户絶扉七煞一年四季中光隂似箭疾榮枯逓轉催人世眼前禍福誰䏻料明日隂晴怎得知何必貪髙位則不如野花村酒快活便宜六煞到春来賞郊園爛熳花聴上林鷓鴣啼騎着箇骨痩毛長驢一壷村酒竿頭挑數首荒詩逐景題逰賞在花園内㝷㡬箇詩朋酒友只喫的酩酊而歸五煞到夏来避炎陽在五栁問趂濃隂一葉席把熟甜瓜打的凍凌砕甕頭醪酒無帘壓頭上摘巾渾漉着喫一點甘如蜜山妻摇扇稚子傳杯四煞到秋来慶豐年社鼓𫾣安排下擺卓盤時新食肥透透嫩鷄脂漫着脇􅌽九天明月觀金菊㑹三島仙翁飲玉杯翫賞重陽㑹行歌松徑醉臥東籬三煞到冬来臥着那煖烘烘熱炕頭穿着領厚敦敦粗布衣可床做四幅綿衲𬒳一任教飄飄瑞雪屯門户除睡人間總不知覺来呵胡收拾爐煨白酒烹宰黄鷄二煞喜逍遥四季閑戀茅亭一所宜有鴻儒談咲無俗氣白雲出岫琴書潤桂子風飄香滿衣伴三益真朋軰傲霜似松菊欺雪若寒梅一煞我如今百歲太平過樂天命永不疑璇璣造化誰人識夀夭富貴皆由命進退安危不在機空用分毫力一朝省悟萬事休題尾聲毎日閑逍遥趂酒家直喫得酔醺醺暮夜歸一晚来睡徹三竿日床直下山妻喚不起粉蝶児甘貧固守寒微樂天命不思榮貴掩柴門躱是潜非一任教這箇言那箇語将咱侮戯本来知却做不知且抽頭莫爭閑氣酔春風遣興數篇詩遂心一管筆覧今愽古喻前賢大抵来論箇理理把往日名塲昔時利路到如今棄之扵地紅綉鞋再不想蠅頭微利再不想蝸角星輝再不想鵬程萬里播天飛再不想登雲路再不想上天梯喜的是避風塵茅舍底普天樂歲寒心浩然氣困中修養難裡扶持人憐我受貧我咲人未識古往今来英雄軰覷黄金有似青泥但得箇清名不毀胷中有藝管甚麽腹内無食上小楼聖人道安不忘危窮不失義我從来富而無驕貧而無謟困而無危問甚麽穿惡衣飡惡食虚靈不昧養一身浩然之氣么篇合受榮也受榮合忍饑也忍饑山不更名人不改姓道不那移史魚直顔回徳恰便似青天白日這兩箇身雖殁有名在世滿庭芳心存道義問甚麽身寒腹煖體瘦神疲居安莫管形容悴靜裡忘機湖水中埋名范蠡陋巷中隠迹顔回瑚璉器時人不識惟有老天知耍孩兒安居樂道修碩徳一任他人知我不知有詩書筆硯同相㑹喜的是數椽茅屋接天逺兩葉蓬囱暎日底到晚来落覺安心睡也不聴三更犬吠五鼓鷄啼六煞貧居難不敢辭守經常豈敢違行蔵要合天地理夷齊固守西山餓孔子甘貧陳蔡饑也飽清風味俺不失一時困節落得萬古名竒五煞養浩然胷次髙樂簞瓢名不低這兩箇廣居仁義包經濟一箇三千徒衆摽名姓一箇七國行逰四海知道統傳千世恰便似青天浩浩華嶽巍巍曰煞想仵貟曾品簫吕蒙正曾題筆古人未遇邅淹滯時来神鬼隂靈助運去英雄㒒軰欺逆順皆天意我怕待功名成就赤緊的時運乖危三煞論興亡不敢言聞是非不敢題蔵舌閉口休爭氣心無利已瞞人術自有皇天后土知守本分全身計也不問誰長誰短誰是誰非二煞嘆平生我為人敬神明心不欺施財濟困周親戚人憐漂母情何厚我咲淮隂志節微男児漢無㢘恥若将夷齊相比便自有髙低一煞人咲我誇大言大綱来論道理聖人教同天地光前絶却周公旦繼往開来孔仲尼勲業無碑記恰便似青天湛湛赤日輝輝尾聲講了一㑹明天心周公書㸔了一㑹合神機顔孟術男児漢有志出乎類便死後也做一箇袁安傲世鬼粉蝶児慳各節儉為活幹家心委實不懦無明夜勤苦奔波常則是忍些児饑寒熬些児虀淡儧些児行貨說喫穿怎敢張羅題起箇麄字児也魂驚膽破酔春風我只待咬嚼别人別人休来侵害着我見㡬箇相識朋友上門来小生抽身児早躱躱聴的道置酒張筵挑觔㧞髄忍咂不過普天樂一任您咲睃呵羡乞餓誰似俺口腹中積儧牙齒上騰那你㸔那待賓客的麸糲糲應節令糠早飯白粥纔飡過到晚来又挿和和似這般家常飲食随心受用更待如何快活三官人是夾細哥娘子喚乞睃婆同心合意做家活怎教肯分毫錯朝天子下飯呵塩醤着筯戳開齋呵脂油将嘴抹解饞呵嗍指頭把醎魚来摸見了那時新的滋味則着眼児睃嚥了些涎和唾雖有些夾細的名聲却無那奢華的罪過任傍人咲我我死呵便拖休動着咱松紋錁四邉静親戚何湏燒烙隣里不必炒煿撈撈拖拖指望相酬賀寡茶熬下半鍋灌的他軟飽来由他坐脱布衫又不是乆白風魔又不是一夢南柯又不是大時大節又不是着饑忍餓小梁州却怎生打夥児拴通来撒科科泛着慳吝的嘍囉没来由平地里起風波却教我如何過休為這口腹上惹下干戈么篇逼臨了人命難結末緊些児我便自抹枉念聒乾咂嗑誰敢道三聲真個不覔井便投河石榴花諕的那親戚朋友走如梭誰敢慢延磨着咱計筞好粧科他到将咱来取撮罷波作耍来也麽哥哥我便道回席一節都丢過從今後再敢来麽他們都對天說誓齊聲喝再来時也只是談些夾細講些慳吝說些齷齪閗鵪鶉再休題品味珍饈那里也杯盤酒果止不過數米調湯更那堪根柴把火似這般麄過活是若何更不如画餅充饑我只待望梅止渇上小楼見人家三湯兩割喫卓㸔卓你㸔我捋䄂揎拳狼飡虎嚥恨少貪多大食籮小包褁收拾起座把㡬箇使從人眼睛矁破么篇見鄉親到俺家也待學大手脚一椀蔓菁半瓶凉酒兩個磨磨他一個我一個誰曽咬破五六個瘦團臍到除下三個滿庭芳從今後休来害我似這般一時間受用到勾俺十日消磨今畨負痛猶閑可慶官酒怎的殺割輪着次第児實實的到我只說的個且消停慢慢由他我待推来又推不過待請来其實的怕多因此上兩躭閣耍孩兒吿神天何時展放眉頭鎻慶了官諸餘的較可街坊隣里莾􅌽喝衆親朋暗暗的擠撮他們雖不曾𫾣牛宰馬排筵宴他也曾擔酒牽羊逓果盒道恭喜作慶賀免不的搭席棚收拾座榻整厨竈刷洗下沙鍋十煞回席待衆賓開筵列綺羅今畨㸔我把這慳来破丹青幀上新鮮味水墨圗中竒異果雲中鴈飛騰過醴泉郡井芲白酒右軍池水儧的肥鵞九煞更有那結了子蘿蔔頭攛下苔的芥子柯乾蔓菁晒下有十餘箇應時的蔬菜雖然少爽口的珍羞不用多喫呵喫休眼皮兒餓更有些掉抺来的孤兒點刴添換上是蕎麦􅔇的餄餎八煞大杮餅擺下㡬双乾軟枣㝎上八箇秃了的栗子十餘箇空了的搸子分做三處油沁了的核桃措了五卓用意兒對付了這五盤果待賔朋只圗好㸔潑家私那討若多七煞徃常時喫别人的汗似澆到今畨喫我的淚似梭庖丁行磨石関節兒先題破背皮煑爛何須按猪首燒􅌻且慢割不移時天色暗日頭落却元来是凨雲慶㑹雷雨交作六煞割匈子用了四指脆骨献猪頭使了兩双耳朶盤腸膚肋都只是虚􅌽喝厨頭燒炙也只是提名件爐裡乾煿都只是假念聒那裡有些兒箇㑹支分的東家省儉聴使喚的局長斟酌五煞碗兒裡青龍罩碧波双龍戯珠顆衆星捧月名兒大襯揲子的骨捧擂槌般大盖面子的腰脂𥿄葉似薄待動筋沒着摸衆郷隣咂唇啖嘴主人家睁着瞧科四煞小生喚點湯賔朋索散火一天凨雨救了咱全家禍盻㱕家的逺客實心兒遄迫逃席的東君假意兒拖不移時棚兒漏又難存坐恁只道邅凨雨主人慳吝我道来感天地節令調和三煞慌的那官人毎把上盖兒叠娘子毎把綉鞋兒脱跟随使從的都在人家房簷下躱新鮮的錦綉稀泥中汚濟楚的衣冠大雨裡濯惱殺他喜殺我着雨的憂心悄悄得手的大咲呵呵二煞羊背皮着􅌻醤擦燒猪頭着滚醋兒潑殘零的按酒着椒塩兒抹隄防着冬至從消受准備着新正再享活那其間用不用還由我似這般全無撙節到頭来定受折磨一煞炒菜水休要丢煮肉湯争忍潑楪兒中剰菜又有偌来箇不分老少由他喫那問尊卑一例喝只有兩件兒難發落饅頭皮晒成醤黄菜饀兒挿做和和隔尾􅌻菜蔬充了飢腥湯水觧了渇乍喫葷的肚皮兒都傷破家僮㵼倒難跟馬荆婦撐翻怎上鍋連我也㺯的沒殺合出来的直腸直肚東厠裡做不的存活尾声輪到咱輪到咱沒奈何沒奈何這塲破費敢道有天来大再題起囬席兀的不諕殺我粉蝶兒富文堂陳大声作萬卷圗書錦亭䑓閙花深處值清朝亊簡公餘寵光深人物勝徳星相聚坐客無虚要平収午橋佳趣南泣顔回談咲有鴻儒盡是文章儔侣綸巾布氅交叅紫綬華𥚑飛觥走斚㸔笙歌羅列尊罍具樂陶陶景媚時良閑夭軆廣情舒北塞鴻秋到春来策吟笻剛詠徹梅芲句喜春和試羅裳閑倚遍䦨干玉趂春晴縦青鞋慢踏損蒼苔緑恐春深下珠簾不放入垂楊絮無意送春㱕有心留春住分付杜䳌聲省可催春去南普天樂綉幃遮銀屏護芳艸逕妖桃塢好相㸔照眼芳菲怕甚麽妬芲風雨㡬畨痛飲西園暮兩行紗籠燒銀燭海棠風蕩漾紅綃薔薇露點滴明珠有清油小盖画壁䡖車北脫布杉閙雕楹燕子鶯雛點清池睡鴨飛鳬紅萱草芳㽔半吐紫丁香細心微露么坐對南薫倒玉壷細切香蒲荷芲十里錦雲鋪聴一片歌聲度風月賽西湖北小梁州蝉聲兩兩鳴南樹梦𥘉回碧簞紗㡡閑将緑綺弹靜把黄庭註蘭湯新浴罷長日一塵無南雁過声規模潭潭相府堪寫入王維画譜水沉一縷摶香霧咲三閭傲陶朱正好懐寛放吟骨清臞汲泉煑茗調氷雪藕納凉揮麈把人間一時熱惱盡消除北酔太平恰金風送暑早玉露滴梧碧天凉冷雁来𥘉與知音四五駕長風捉下天邉兎學長鯨吸盡杯中物㺯長竿掣得水中魚任狂歌恠舞南傾盃樂湏臾十日霜㡬夜風催綻東籬菊砌湧層巒泉飛靈竇橋横幽洞門俯清渠賦成鸚鵡盃傾醹醁帽挿茱茰又何湏登髙戯馬憶東徐北貨郎兒犯寒不到重簾深户錦片似氍毹低簇簾鈎十二控珊瑚下着錦帳擁着紅爐對着玳筵前粉一攅花一簇捧着羊羔斟着馬乳勸着瓊酥有繁絃急管毎分曹部演呈祥献壽梨園這詞賦吹的吹弹的弹教習得精􅌻翡翆鐺瀹龍團鳯餅壓盡陶榖氣昻昻居着清要名赫赫執着金吾安享昇平無限福南小桃紅侍虞廷陳禆𥙷入洛杜論今古虎帳談兵嚴法令施鎮撫古来㡬箇文兼武眼前那有清而富更那堪謙徳通䟽北伴讀書簡書文半逼蘓詩律法全學杜走蚓驚蛇寫一筆唐懐素好竒觀雅玩娛心目有商􅉓周鼎多陳布所亊俱足南咲賢歌遍江山古跡圗總金石名賢籙博考索精求募㸔金甌名姓覆專閫計請兵符統雄卒運竒謀破妖胡献降俘試㸔他拜将封侯談笑取煞尾堂湏造盟可續本是騷壇放浪徒豈待公孫折簡呼粉蝶兒春夜㱕思三㺯梅花戍楼中角聲吹罷月輪兒斜映囱紗托香腮湮淚眼一篝燈下展轉嗟呀耳邉言都做了一塲閑話南泣顔回薄倖忒情雜不比㝷常戯耍出門容易而今海角天涯㱕期歲晚轉頭来過了春和夏去時節霜老芙蓉却又早水冷蒹葭北石榴花我只向緑囱前㫁送下好年華許多時胭脂不曾搽九回腸翻倒的越窄狹㡬乎害殺鬼病增加一㑹家告蒼穹問箇龜兒卦不明白甲乙交义猛然間撚起香羅帕肯分的綉一朶並頭芲南泣顔回奸猾心性忒難拏瞞人利齒伶牙悠揚不定猶如風裏楊花千思萬想恁從来色膽天来大恐習學竊玉偷香搪揬了相府髙衙北閗鵪鶉悪離別動歲經年又不比些時暫霎恨壓損眉黛雙彎痩减盡腰肢一搯我這裡暮暮朝朝想念他他何曾繫掛咱不䏻勾碧漢乗鸞只落的垂楊繫馬南撲燈蛾恩情如搦沙清苦似嚼蠟知他在那裡偎笑臉虚擔着許多驚怕也不湏㝷消問息到頭来終有箇還家風流罪招由細数從頭来一椿樁一件件細詳察北上小楼我自来無玷瑕他從来知禮法平白的受盡凄凉擔着寂寞邅些折罰眼見的漏澁銅龍聲喧銕馬香消金鴨我這裡最難􅋙暮冬殘臘南撲燈蛾風兒颼颼乱刮雪兒紛紛宻洒凄凄的鳯枕单沉沉的鴛帳冷薄薄的綉衾寒壓懨懨的銀燈爆花嗚嗚的城上吹笳鼕鼕的殘更正煞呀呀的曉天啼散樹頭鴉尾文君再把香車駕只恐琴心調㺯差返與相如做話把
