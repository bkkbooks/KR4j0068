貌喜照芳妍三煞圎光净更清菱花明更堅可憐世事雲千變玉盤本潔蒙塵垢皓月雖明障霧烟雲暗青霄掩世情有分物態無縁二煞古銅時下収菱花何處􅃟今来特許良工見氣吹黯霧飛天外手拂殘雲離月􅁁光彩如銀練髙低善辨貌陋􅀎傳一煞就中硬勝剛外面軟似綿氷盆􅀄破如刀剪逢人射影停身分覩物遺形在眼前分明現秋天朗朗風露㳙㳙么分毫無􅈁瑕光瑩浄玉瑄殘雲刮地西風捲寒光皎潔明盈室素􅅎團圎照滿天似銀漢氷盤轉鑑窺星斗照耀山川煞尾據堅平明正清非俺敢自專若回光反照仁人面㢘潔分明自然顯哨遍思鄊輦轂下人生有幸樂太平歌舞同歡慶金綺陌玉娉婷間笙篁歌囀聞鶯閗馳騁粉濃蘭麝肌瑩瓊酥花鮮語嬌相並旦暮花魔酒病詩酬酢好句詞賡和新聲櫻唇月下品玉簫春笋花前按銀箏富貴皇都風光上􅀦繁華盛景么篇書劍􅀯行或征或止無定飄泊若雲萍駕􅀌㠶一葉㠶􅁿似脫頴辭九重鳳􅇅快萬里􅉇程無名利徒奔競自􅂅瞰東南形勝湖山留客酔花栁繫人情梯航海嶠暮雲黄轎馬烟嵐亂山青屡曽經蓮渚蘆汀耍孩兒山屏錦幢繁花盛雪霽風和雨晴良工着色画難成竹踈梅淡􅁿盈竹穿壊壁凉隂淺梅枕寒流痩影清貪幽浄懶趨權􅀔不就功名三煞蹉蛇到處閑蹭蹬不覺秋霜鬂冷客窓㡬度夢朝京憶松楸敗境荒荆見新人百倍増千倍問故友十停少九停咱僥倖尚天涯流落海嶠飄零二煞涎乾沿壁蝸翅殭守凍蝇羈縻人舟纜樁橛釘遅留荆楚悲王粲乆困長沙嘆賈生思薄命錢未甞滿貫糧不􅁕空缾一煞雖然動的脚根何曽轉的眼睛杜䳌啼感動㱕家興羡􅀌雲易舉􅄐南浦無􅀟翼髙飛過渭城行装併載滿舡風月􅌽十里旗亭煞尾剡溪水半合山隂雪欲平還鄊子安道無蹤影不回棹的先生望誰請哨遍知休世事摶沙嚼蠟等閑榮辱休驚訝日月不饒咱曉囱前拂淨菱花試覷咱雖是閑愁無種閑悶無芽子敢衠種出星星髪知進退冝休罷便今日蘓秦六􅀦明日早賈誼長沙不如買牛學種洛陽田􅈽瓮自澆邵平􅀲向甚雲棧揮鞭滄海撐舟斗牛泛槎么篇好向名利塲中一納頭剰吿􅂑些鬆寛暇且莫住山凹清閑中不見箇生涯問甚麽南隣富貴圵里奢華只有此身無價幸遇明時徳化除徭役拯濟貧乏救得這困魚腮驚急列地脱了香鈎盖因那餓虎血糢糊地汚了烟撾方表聖徳無加耍孩兒對江山滿目真堪画休把這羙景良辰作榻清風明月不拈錢聞未老只今歡洽問甚往来燕子春秋社説怎麽辛苦蜂兒早晚衙休呆發便得征西車馬争如社曲桑麻三煞莫􅀅愁字兒眉尖上掛得一咲處􅀏一時半霎百錢長向杖頭挑沒拘束到處行踏飢時莭􅃟着那六局全食店裏添些箇氣渴時莭㨂那百尺髙楼上嚥数盞兒巳更那椀清茶罷聴俺㡬回兒巴的今日羅街拽巷唱呌􅀭疾二煞好一塲惡一塲哭不得咲不得軟厮禁硬厮併却不濟調脫空對衆扳今古念條欵依然説是非難回避骷髅卦㡬畨自説猫狗砌数遍親題一煞又不是鳳麒麟鈎絆着縫又不是鹿啣花窟嵌着刺又不是倒鈎針背襯上加些功績又不是三垂雲銀線分花様又不是一抺圈金沿寳􅂻每日閑淘氣子索行監坐守誰敢東走西移煞尾􅀄言定正月終調發到十月一新靴子􅄬至􅀎勾完􅍯舊兀刺先磨了半截底哨遍贈張玉嵓自唐晋傾亡之後草書掃地無踪跡天再産玉嵓翁卓然獨立根基甚綱紀􅇩懐洒落意氣聡明才徳相兼濟當日先生沉酔脫巾露頂祼䄂揎衣霜毫歴歴蘸寒泉麝墨濃濃浸端溪卷展霜縑管握銅龍賦歌赤壁么篇子細㸔六書八法皆完備舞鳳戯翔鸞韻羙寫長空兩脚墨淋漓洒東窓燕子啣泥甚雄勢斬釘截鉄纒􅁑垂絲似有風雲氣據此清新絶妙堪為家寳可上金石二王古法梦中存懐素遺風盡真習料想方今寰宇四海應無賽敵耍孩兒儘一軸十数尺􅀙頭一掃無凝滯聲清恰似蚕食葉氣勇渾同猊抉石超先軰翰林遺賛髙士留題四煞寫的来狂又古顛又實出乎其􅀋㧞乎萃軟如楊栁和風舞硬似長空霹􅆮摧真堪惜沉沉着着曲曲直直三煞畫一畫如陣雲􅀧一􅀧似恠石撇一撇如展鵾鵬翼彎環怒􅅯乖龍骨峻峭横拖巨蟒皮特殊異似神符堪呪如蚯蚓蟠泥二煞寫的来嬌又嗔怒又喜千般醜惡十分媚惡如山􅀑㧞枯􅀣媚似楊妃按羽衣誰堪比寫黄庭換取道士鵞㱕一煞更有那顔真卿蘓子瞻米元章黄魯直先賢墨跡君都得滿廂拍塞数千卷文錦編挑滿四圍通三昧磨崖的本􅀞賛􅀄碑煞尾據着這劃畫難字様竒就中渾穿諸家體四海縦横第一管筆醉春風清髙七􅀦謀臣謟三閭賢相貶官極􅀅相位􅀟兼暢好是險險衆口難鉗恁也乆占俺咱常嚴么篇狼虎途中慊山村酒興染引􅄏酔眼舞青帘颭颭金橘香甜玉蛆浮酤緑醅醇最髙歌醒時長嘯掀鬚醉後髙歌入崦竹溪花塢山庄掩門映遥岑数􅀧喜春来客来椀鏇廵山店鶴去松隂轉屋􅉉野塘消遣酒頻添杯㶑灔不顧老妻嫌普天樂無拘鈐絶憂念山嵐湖㶑浪静風恬籬菊繊風雲儉隠跡埋名随時漸任當途誰汚誰㢘田租自歛餱糧不歉世事休呥賣花聲煞試㸔咱懸河口緊閉山水間潜經綸手忙义塵世上閑書萬卷撐腸穏支疊有感幽懐露光熖吐虹霓作歌揮劍墙頭花祿山偷楊妃玄宗無道把兒婦強奪要直上天㬠不髙自􅀙親子行携来巳有他人􅀱着么篇後庭深夜絳蠟明相照滿席春風宴碧桃軟耨耨玉簇香攅嬌滴滴朱圍翆遶么篇琵琶趂錦瑟銀箏間玉簫龍􅅇鳳管共笙篁攛㫁􅀻情第一遭彩雲收飲興􅀅䦨明月轉歌聲漸渺麻婆子寢殿裏􅀙今夜玳筵前自此宵隠匿着漁陽變包蔵着蜀道遥宫中始長亂萌芽人間􅀄動禍根苗禄山本虚推酔太真妃寔酔倒么篇則等的人分散剛捱的夜静悄又不曽通芳信又不曽許宻約潜身緊匿着蠢形骸盗偷入鳳巢欵欵把酥胸襯􅁿䡖把玉臂揺耍孩兒鴛衾掲翠錦仙衣分絳綃海棠折破胭脂蕚磣􅀅他這細裊裊繊腰揾忍把他曲弓弓羅襪蹺狂為做枕磨盡粉暈髩簇下金翹二煞夢覺回酒漸消雲雨方惡􅂊疑覺驚聞太喘􅁋聲氣乍受無情痛扭作大道是君王抱却怎不香腮緊揾玉臂相交一煞眼倦開心暗約十中九多是那肥才料我猛呼陛下􅃒我這醜偶喚丫鬟掩映我那嬌施些兒機和巧雖然允順豈顯分毫煞尾我只得内忍着羞外㺯着嬌明知那胖厮圗謀却他佯道君王行應依了哨遍遺事引天寳年間遺事向錦嚢玉罅新開創風流醖藉李三郎殢真妃日夜昭陽恣色荒惜花憐月寵恩雲霄鼓逐天杖綉領華清宫殿􅀹回翠輦浴出蘭湯半酣綠酒海棠嬌一􅀏紅塵荔枝香宜酔宜醒堪咲堪嗔􅁛梳􅁛粧么篇銀燭熒煌㸔不盡上馬嬌模様􅀻語向七夕間天􅁁織女牛郎自還想潜随葉靖半夜乗空逰月窟来天上切記得廣寒宫曲羽衣縹渺仙珮玎璫咲携玉筯擊梧桐巧􅁛彫盤按霓裳不隄防禍隠蕭墙墙頭花無端乳鹿入禁􅁐平欺誑慣得箇祿山野物縦横恣来往避龍情子母似恩情登鳳榻夫妻般過當么篇如穿人口􅀦醜事難遮當􅀅祿山別遷為薊州長便興心買馬招軍合下手合朋聚黨么篇恩多决怨深慈悲反受殃想唐朝觸禍機敗􅀦事皆因偃月堂張九齡村野為農李林甫朝廷拜相耍孩兒漁陽燈火三千丈統大􅀔長驅虎狼響􅃢􅃢鉄甲開金戈明晃晃斧􅃏刀鎗鞭颩剪剪揺旗影衡水􅉿􅉿射甲光慿驍徤馬雄如獬豸人劣似金剛四煞潼關一鼓過元平蕩哥舒翰應難堵當生逼得車駕幸西蜀馬嵬坡􅕑抑君王一聲閫外􅀅軍令萬馬蹄􅁁妃子亡扶㱕路愁觀羅韈痛哭香嚢三煞好似火塊般曲調新錦片似關目強如沙金璞玉逢良匠愁臨阻􅕑頻搔首曲到關情也㫁腸雖脂粧不比送君南浦待月西廂二煞遇奸邪惡折罰逢忠直善播􅀭合人情剖判的無偏讜也是那鸞歌鳳舞􅀟行樂也是那虎閗龍争百􅀾塲􅀎編綴零裁錦繡碎剪氷霜一煞俺曽列詩書几案􅁁下工夫燈火傍日營捜用盡平生量怨東風桃李嫌春短恨秋雨梧桐值夜長請才思翰林風月吏部文章煞尾俺􅀅這羙聲名傳萬古巧才􅀎播四方歎行中自此編絶唱教普天下知音盡心賞哨遍楊妃胜腰千古風流旖旎束繊腰偏􅁛君王意翠盤中妃子逞妖嬈舞春風楊栁依依喜子喜深兠玉腹淺露酥胸拘束的宫腰細一幅錦或挑或綉金粧寳砌翆遶珠圍臥鋪綉褥醸春光睡展香衾暗花溪粧汗香溶􅀍底無􅀟懐中第一耍孩兒帳中偏惹情郎殢特遣人勞心費力􅃟二色青紅相配揀四時錦綉稀竒剪行時蜀錦分花蕚針過處吳綾聚綉堆倒勾金針刺刺得絲絲宻宻裁得整整齊齊五煞恁㸔那摺絰兒似剪雲針脚兒如布蟣縫成倒鳳翻鸞􅀔見穿花鸂䳵偏斜落出水鴛鴦顛倒飛絡綉得繁華異髙低不剰寛窄伏肌四煞紅蓮紅似晚霞照楚山青蓮青如春雲射渭水玉繊手欵欵當胸繫帶頭拴十二蝴蝶舞牙子對一􅀟翡翠飛望得些風流意抅鈐的􅄫寞抑勒的􅀌恓三煞常常的靠着栁腰緊緊的貼着素軆同行同坐同衾􅀍本待􅃒蔵秋水肌膚瘦顛倒包弄出春光玉一圍先泄了春消息縦不􅥋開羅扣管痩損了香肌二煞你不肯􅃒盖咱咱湏當􅃒盖你不索褪香肌出落着相思諱最宜錦帳懐君手可惜嵬坡襯馬蹄你不比別衣袂都是有法度針線不比無納攅情衣一煞不索揾香肌轉轉裁伸繊腰細細比不􅄐了按帶絰衫兒褃裙兒禊紅羅沿寛掩過三兩􅃌翠當頭横􅍴過少半圍若見俺風流婿便知清减不索先題煞尾知心腹􅀝仗伊誰承望半腰􅂻不得齊早知你無情不管人憔悴俺怎肯心坎兒上单单繫着你哨遍大打圍鷹犬􅀙来無價霜翎銕翅天生下早是我忒超群更那堪飬手􅌻滑是㸔咱鋪堆着秀氣抖擞着精神端的恰正三籠罷么標格天然如画諸般兒可愛􅀁亊兒堪誇偏宜錦衣駕出四公宅飛􅀐擎来五侯家你覷那鐲脚兒新鮮摔皮兒停當五尺兒可誇耍孩兒遅疾緊慢皆如法鷹鶻論其中是荅朝暮湏索用工夫誰敢道半米兒争差腹心欲􅉯着沙糖透怕野性思山􅀅錦帽兒塌到晚来燈直下只擎到殘星半落禁鼓三撾五煞少年志􅂔髙擺圍􅂣興味嘉􅀅蒼鷹錦背鴉鶻架半千来獵士臨郊野似一族天神降碧霞結束的威風大箭攅着栁葉馬跨着桃花四煞這壁廂㷱中着鎗那壁廂虎中了义野猪帶箭驚雕亞􅂊放上的角鷂拏住山鷓恰推出的黄鷹按住水鴨端的是真堪画慿黄犬坡前白􅂑仗蒼鷹水上活拏三煞恰􅀅軍逞壮心早夕陽映晚霞鞭稍一展圍塲罷馬䭾的鳥獸雞和兎抵多少網打就黿鼉魚共􅞩馬背後稍上掛掛的来􅄋修陸續打畨語一六兀刺二煞􅀅牧林即快拴擦摺兒連忙荅安排飲宴在山坡下酥泛酒銀瓶鑼鍋􅂻旋塩燒肉鋼籖炭火上义打刺酥哈刺撲哈土思胡先把蒙赤兎􅋉拏一煞緑依依翫着五􅄩翆巍巍對着襖刺必荅兒那家奸休奸詐奈思兒吉艾哈必荅裏那把句思海土吉倒刺艾虎魯赤胡虜荅亞綽兒只持着腔管火兒赤撥着琵琶尾哈刺米讀盤中堆着米哈打刺米渾托中放着打刺不花􅀙頭兒吃罷􅀙頭兒把哈刺米五論白者都休閙不似那顔者􅄩讀麻馬兒上齊聲旦旦道是亜来亜来興䦨去道亜不心􅁕還家
