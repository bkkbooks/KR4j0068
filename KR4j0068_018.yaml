欵步金蓮蹴湘紗纎柔嬌襯凌波韈軟玉鈎新月芽可妬殺髻亂窩釵横堕貌减愁添怎存活抽籖打卦為工課形兒衰病兒魔何日可孤鴈悲寒螿泣恰待團圎梦驚囬凄凉物感愁心碎翠黛顰珠淚滴衫䄂濕玉簮折菱芲缺舊恨新愁亂山疊思君凝望臨䑓榭魚鴈杳音信絶何處也寨兒令妓情黄肇利馮魁惷惟有通神鈔和銀奴非不愛双生俊鴇兒嚴坡撇狠錢上緊狗探湯魚着網急走緣身痛着傷價要華貌邪魔旺價㺯柔芲艶粧君莫賞買咲金纒頭錦得遇知音可心人倦逢狂客天生沁摔死鶴劈砕琴不害磣和曲詞調琴指偕我撚香剪青絲忘恩刴㫁鴛鴦翅唵左科喬到兒再休提寨兒令嘲烏衣巷祿千鍾家百口父子居官弟封侯画堂不管銅壷漏休費心休過求跌破頭二嘲江湖客貨物収金珠有勞勞終日早白頭塩啇茶客結朋友江内宿湖上逰死纔休三乞兒郎凨雪狂衣衫破凍捐多情鄭元和哩哩嗹嗹嗹哩囉學打蓮芲落不甫能逢着李亜仙有分的撞着李婆婆怎奈何四喬凨月夜巳䦨燈将㓕紗囱外昏慘慘月兒斜越求和越把身子兒趄耳輪兒揪膀背兒揑罵道是喫喬才我怕你悔去也
