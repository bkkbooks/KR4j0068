狠毒心正苦兒兩箇飛禽兒惱人心也來相喚相呼採茶歌拈彩筆手生踈寫不就雪蕉圗雪蕉圖我只病容愁蠶絲臨摸既到君前君一覩我只怕崔徽不似舊規模尾晚來時難在甫茫茫風雪遍江湖正是夫戍蕭關妾在吳梧桐樹惜别相思借酒消酒醒相思到月夕花朝容易傷懷抱懨懨病轉深未否他知道要得重生除是他醫療他行自有靈丹藥罵玉郎無端掘下相思窖那里是蜂蝶陳燕鶯巢癡心枉做千年調不札實似風竹搖無投奔似風絮飄沒出活似風花落東甌令情山遠意波遙咫尺粧樓天樣髙月圓苦𬒳隂雲罩偏不把離愁照玊人何處教吹簫辜負了這良宵感皇恩呀那些箇投以木桃報以瓊瑶我便似日影內捕金烏月輪中擒玉兔雲端裏覔黃鶴心腸枉費伎倆徒勞也是我恩情盡時運乖分緣薄浣溪沙我自招隨人笑自古來好物難牢我做了謁漿崔護違前約採藥劉郎沒下稍心懊惱再休想畫堂中綺筵前夜將紅燭髙燒採茶歌疼熱話向誰學機密事把誰托那里是潯陽江上不通潮有一日相逢酬舊好我把這相思兩字細推𫾣尾我青春他年少玉簫終久遇韋皋萬苦千辛休忘了青衲襖別思重會想多嬌情性兒標想多嬌恩意兒好想著俺携手同行共歡樂吟風詠月將詩句兒嘲女溫柔郎俊俏正青春年紀兒小誰承望比翼分飛瓶墜簮折魚沉鴈杳罵玉郎想著俺那多嬌一去無消耗想著那情似􅃮意如膠常記的當時共枕同歡樂想著他花樣般嬌桞樣般柔傾國傾城貌大迓鼓千般百樣嬌風流俊俏體態妖嬈所為諸般妙搊箏撥阮歌舞吹簫總有丹青難畫描感皇恩好教我心緒無聊意穰情勞懶把杜詩溫慵將韓文序倦把那桞文學這兩日愁懷越焦好教我容貌添憔不能勾同歡會成配偶只落的受煎熬東甌令潘郎貌沈郎腰可憐相思沒下稍心腸懊惱傷懷抱烈火燒祅廟滔滔緑水淹藍橋相思病怎生熬採茶歌相思病怎生熬離愁陳擺的堅牢我天呵鐡石人見了也魂消愁似南山堆積積悶如東海水滔滔賺誰想今朝自古書生多命薄傷懷抱癡心惹得傍人笑向誰行分告烏夜啼想當初偎紅倚翆我和他踏青閗草想逢時遇景同歡笑到春來語呢喃燕子尋巢到夏來荷蓮香滿開池沼到秋來菊滿荒郊到冬來瑞雪飄飄想當初畫堂金屋列佳肴到如今孤眠旅館無著落鬼病侵難醫療情牽恨惹意穰心勞節節髙悶懨懨睡不著想多嬌他知音解吕明宫調諸般妙閉月容羞花貌語言嬌媚心聰俏恰如仚子行來到金蓮欵蹙鳳頭蹺朱唇皓齒微微笑鵪鶉兒看了他體態輕盈更那堪宜穿素縞看了他脂粉勻施蛾眉淡掃看了他萬種妖嬈難畫描難畫描寶鴨香飄銀燭髙燒酒泛羊羔成就了美滿夫妻綰下箇同心到老尾青霄有路終須到生前無福也難消把佳期叮嚀休忘了四塊金美眷效比翼成連理想同坐雙雙一似比目魚想當初設山盟今日箇都故了牙疼誓甜膩膩的密和著酥喜孜孜的魚共水美甘甘的膠共漆罵玉郎從他去後我便添縈繫不由我心似醉意如癡常言道相隨百步也有徘徊意這些時靈鵲兒不報喜喜蛛兒難信實龜卦兒全不濟大迓鼓當𥘉共枕席自從别後獨守孤幃止望成家計鴛衾半擁通宵寐此恨綿綿無盡期感皇恩今日箇藍橋下水淹波圍桃源洞霧鎖雲迷青鸞信杳無蹤黃犬音全不至白鴈書甚時回這相思怎醫那鬼病禁持悶昏昏情切切意遲遲東甌令添疾病減香肌瘦損懨懨説向誰天天不管人憔悴辜負了韶華日燈昏月暗夢初回寶鼎內篆煙微採茶歌寶鼎內篆煙微衫袖上泪淋漓不由我一思一想一悲啼每日家屈指長懷他去日逺我正是有心不怕隔年期節節髙想著他花似容玊如肌春風一捻腰肢細鴛愇裏翡翆衾鮫綃被錦瑟瑶琴何時對鸞簫象板無心習恨堆八字桞眉顰愁添九曲柔腸碎鵪鶉兒燕燕飛飛花邉桞堤事事皆依夫唱婦隨共枕同席偎紅倚翆月漸西燈漸微香冷金猊酒盡金杯琴間金徽今日箇月缺花殘閃的人鸞孤鳳隻尾聲多嬌有日重相會雙雙携手入羅幃永逺團圓直到底青衲襖相會幾時得這煩惱絶幾時得這離恨徹本待要去散悶間行到得臺榭傷情教我對景長嘆嗟悶懷爭忍撇待割捨難割捨沉吟教我倚遍闌干萬感情切都分付與這長吁嘆嗟一江凨步蒼苔月下深深拜拜罷向西廂待盻多才時樣冠兒貼體衫兒想繡來的香羅帶相思淚滿腮好似梨花帶雨開見了怎不教人愛凨入松記前日席上泛流霞遇著一箇宿世冤家自從見了情牽挂心兒裡撇他不下夢兒裡常常見他説不的半星兒話尾得團圓歡樂罷和諧繾綣享榮華何處垂楊堪繫馬九轉貨郎兒也不唱韓元帥偷營劫寨漢司馬陳言獻策也不唱巫娥雲雨楚陽臺也不唱梁山伯也不唱祝英臺則唱那娶小婦長安李秀才么篇我則見齊臻臻的朱樓髙厦碧聳聳青簷鴛瓦挂玊鈎途路嶺長存四季花銅駝陌王孫閗奢華公子仕女乘車馬繡簾髙挂都是他都是王俟宰相家貨郎兒李秀才不離了花街桞陌占場兒貪杯好色看上他桞眉星眼杏桃腮對面兒相挑泛背地裡暗窺諧背著他那渾家著媒人往來間家孹劃諸般綽開花紅布擺早將一箇煙花娶過來貨郎兒那妮子舌刺刺的挑搽斡刺百枝百枝枝花兒葉子望空裡揣與他箇罪名兒間挑刺間尋公事挑三斡四大渾家吐不的咽不下心頭刺減了神思瘦了腰肢病懨懨睡損了裙兒祬一卧不起難動止咨冷了四肢將一箇賢慧的渾家生氣死貨郎兒火逼的花稍上雅飛鵲散更和那更深夜闌恰便似火熖山天賜到長安迎仙客燒地戶燎天關恰便似火龍降來凡世間萬火燒空老君煉丹似介子推在綿山恰便似子房燒了連雲棧紅繡鞋恰便似赤壁鏖兵凨範布牛陳舉火田單恰便似火龍煙戰錦闌斑把房􅉉扯將脊條板急救著連纍了官房五六間貨郎兒我則見昏慘慘天涯雲布更那堪滴滴點點瀟湘夜雨早是那窄窄狹狹溝溝塹塹路崎嶇黑黑黯黯隂雲布那赤留出律消消灑灑斷斷續續出出律律忽忽魯魯隂雲開處我子見霍霍閃閃電光星注上小樓怎禁那颼颼摔摔凨淋淋淥淥雨髙髙下下凹凹凸凸水渺糢糊撲撲簌簌濕濕淥淥踈林人物却便似昏昏慘慘瀟湘水墨圗貨郎兒河岸上和誰説話向前去親自問他詐言道姦夫是船家殿前歡猛見他將俺家長喉嚨搯磕答的揪住頭髮我是箇婆娘家怎生救他身亡化撲鼕命掩在黃泉下將李春郎的父親則向那翻滚滚波心淹殺貨郎兒據一品凨流人物打扮的諸餘裡俏措快活年繡雲肩胸背是鴈銜蘆他繫著條兔鶻兔鶻海斜皮偏宜玉連珠是那無瑕的荆山玉驟身去也麼哥繒髭鬚也麼哥打著鬢胡走犬飛鷹架著雕鶻恰獵圍場過去扯著轡盤旋驟著龍駒疾似流星去那凨流也麼哥恰渾如也麼哥恰便似和畨的昭君出塞圖貨郎兒我便就寫與他生時年幾不曾道差遲了半米未落筆花箋上淚珠垂脫布衫長吁氣呵軟了毛錐悽惶淚滴滿了端溪十三年不知箇信息相别時恰才七歲醉太平他如今方二十恰便似大海內沉石自從在洛河岸上兩分離知他在江南也塞北俺孩兒耳垂福相過肩墜胸前一點硃砂記長安解庫省衙西俺孩兒小名喚做春郎身姓李
