front:
  text: 雍熈樂府卷之三
  hash: sha256:0b0730cff1cb9cc09714d2a94f6d460538ff8c1f0b7861137ae41822469348ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_003-1a}
body:
  text: 正宫端正好衣錦還鄉一班兒扶社稷衆公卿多應是随聖主天差降一箇箇笑吟吟志氣昻昻與皇家出力忠良将堪寫在凌烟上滚綉毬是男兒顯紀綱掃蠻夷定四方不枉了故鄉人仰望俺在長亭上等不到半霎兒時光㸔紛紛的塵土生聴珊珊環珮響並馬兒相行排列着聖朝卿相諕的那庒農毎無處潜蔵馬頭前銀盆水礶成行擺更有那狼虎公人列在兩廂一箇箇壮貌堂堂倘秀才父老毎急慌忙下跪在路傍大人毎都把這謙辭禮講他道是數十載今朝還故鄉将小童毎審箇端的年邁的問箇行蔵這的是大人毎大量脫布衫明聖主仁倣三皇明聖主徳似陶唐明聖主千邦讃禮明聖主萬民仰望小梁州百姓毎䖍心一炷香一齊的拜謝吾皇謝吾皇垂拱整朝綱今日箇昇平象着俺那黎庶毎得安康么篇願神孫聖子常興旺願金枝玉葉榮昌願吾皇聖體安保護的山河壮普天下軍民仰望賀萬夀永無疆端正好武臣享福享富貴受皇恩陳綱紀明天道貫胸襟虎略龍韜威儀楚楚全忠孝文共武皆竒妙滚綉毬擺旌旗霞彩飄列干戈日月髙驟蹀躞馬􅋦着金絡撼玲瓏玉掛絨絛擁髙牙大纛雄坐重䄄列鼎餚靄畫堂瑞烟籠罩撲湘簾花霧飄颻金爐火煖龍涎噴銀燭光輝絳蠟燒歲月逍遥倘秀才朝鳳闕朱衣紫𫀆陞虎帳貂裘綉襖瞻仰龍樓爵祿髙氣昻昻趋黄道雄紏紏侍清朝近鑾輿玉藻呆骨朶丹書鐡劵金花誥撫華夷四海名標旌旗影欵動龍蛇金鼓響驚飛燕雀出落着威武非熊兆調鼎鼐理隂陽居廊廟普天下賀太平夀域開宰臣每整乾坤安定了貨郎児開大宴齊臻臻華筵前歡樂香馥馥珎羞羙餚有交梨火棗有蟠桃炮麟脯烹魚尾燒熊掌煎羊羔醉太平有龍笛鳳簫間鼍鼓檀槽擺列着笙歌妙舞出妖嬈唱黄鍾六么萬民豐稔皆歡樂八方寧靖開懐抱四時康泰盡和調尾聲文修武略日轉千堦穏拍拍撫鎮邉庭把這烟塵靜掃端正好芸窓下守青燈蝸舍裏觀黄卷志功名将銕硯磨穿今朝待把鰲頭占穏情取登科選滚綉毬只因是三月天賞禁烟見了箇意中人把他留戀片時間接了絲鞭雖不曽口内言将情意傳子俺這兩心中暗包蔵着一天哀怨恰相思早黒海似無邉我這裏恨無青鳥傳芳信他那裏待得鸞膠續㫁絃兩意懸懸倘秀才我見他出香閨湘簾乍捲他那裏溜秋波星眸半轉宫額塗黄貼翠鈿整金釵鬆霧鬂舒玉指理冰絃天生的可憐滚綉毬從今後你将那新子弟休顧戀舊相識不要纒學些箇好人家軆面我出言在駟馬之前從今後銕銚盤少去煎銅磨笴再休轉𥿄湯瓶不須紈扇你将那水塌房皮解庫關閉的完全子道你㝷着駿骨把黄金買誰想你夢見槐花要緑襖兒穿好教我半晌無言倘秀才怕甚的當家火一年半年費用過千錢萬錢子你這銅斗兒家私我自專我子教孔方兄常當足老薄嬷少熬煎霎時間過遣白鶴子我見他瀉金波親捧勸停玉斚嚲香肩髙唱着金縷詞半掩圈金扇么支楞的冰絃上傳宻意髙韻内寄情篇聴數句鳳鸞吟搊一曲春閨怨紅綉鞋子我這新女婿𥘉成繾綣你将那舊姨夫再莫留連玉粳牙休兠上野狐涎我為甚緊栽連理樹子要你同長並頭蓮休道是你縁薄咱分淺快活三恰纔明月圎沒揣地起雲烟自来好事不堅牢又引的東君怨栁青娘曽着重拳他是箇烟月所中窮原憲不識人意嫌尚古自緊相纏在花街贍表有半年你待将精銀響鈔買轉買不成儘世團圎抵多少舞裙邉歌扇上結姻縁道和對嬋姢對嬋姢休索苦縈牽恰開筵教俺教俺自呫教俺教俺成嗟怨村夫空使買嫌錢暗埋冤埋冤他不知些回轉尚自諞那些那些識軆面開談便覺村筋現那些那些知空便若還到此来相見玳筵之前數他一篇問的他淹淹淹乗首再再再難言耍孩兒向這花門栁戸均休戀你便有賽陸賈的機謀怎展你道有花星正照二十年单注着郎君每赤手空拳起𥘉時能推房内頑石磨間深裏賣了城南金谷園聴咱勸做䖍婆的把千斤斧劈開腦袋做女娘的将九股索套住㗋咽八煞我和他身如比目魚情同錦水鴛百年和羙成姻眷閑開東閣㸔歌舞悶向西樓列管絃貪歡宴受用些金釵十二紅粉三千七煞他那䧟人坑埋伏的深迷魂陣擺布的圎他響玎璫放㡬枝連珠箭他白奪銕鷂三千引贏得青蚨十萬錢子弟每子索把降旗展輸的你有家難奔有口難言六煞同歸霧帳中雙欹月枕眠冰肌玉骨芙蓉面准備着金冠霞帔陞三品寳馬香車直萬千怎比你身㣲賤慿着我一生壮志滿腹韋編五煞那一箇不聰明不十全不多財不有權下塲頭少不得成哀怨送了些他鄊塩客和茶客都只為每日花錢共酒錢我也親曽見送的人爻椎瓦礶只因是品竹調絃四煞有一箇王妙妙死哭秦少㳺有一箇裴興奴重逢白樂天有一箇燕子樓許盻盻思張建他都曽芳心恨寄青鸞鏡抵多少淚血染成紅杜䳌你道是娼優賤怎生也夫妻情重節義心堅三煞他子待錢財鈔貫親怎肯将聰明文學憐如今那䖍婆每不道的羊兒般善有錢呵管甚麽臭回回臊羅羅同衾睡無鈔也你便是俊子弟愰郎君獨自眠如今世態多更變他把那張三舍門前恰送李二哥後巷忙搧二煞只因咱風流情興多功名心較逺強争春引惹的蜂蝶怨暫留月舘風亭内醉倚紅裙翠䄂邉㸔了這桃花面因為俺一時間恩愛成就了五百載姻縁尾聲老薄嬷心放寛俊嬌娥情索專你将箇志誠心永逺成姻眷直教你駟馬香車将姓名顯端正好學唱紫芝歌不復紅塵道早離了錦排塲月夜花朝子我㝷真悞入蓬莱島躱世事来西岳滚綉毬㸔了這悠悠的白雲出翠岩隂隂的蒼松際碧霄盡都是淡氤氲紫霞籠罩怕甚麽冷清清秋意蕭條霜欺得一叢叢山果兒紅風吹得一堆堆樹葉兒凋近着這剗修得另巍巍華隂古廟響潺潺水縈廻土洞石橋愛的是勢崢嶸九重天上仙人掌聲嘹喨五色雲間玉女簫靜悄悄端的是清髙倘秀才淺撇撇半間房權時借了齊整整衆仙長誰曾問着軟兀刺的圜床上坐㡬宵添香燭叅聖賢運漿水打勤勞便辛苦咲欣欣的受了滚綉毬将俺這油䯼髻梳洗通粉骷髏改換了将一箇縷金腔改做這歩虚聲調打扮做出家兒丫髻環絛穿着的壮草鞋粗布𫀆也子是我心中所好但行時不離了木椀椰瓢子俺這黄精洞裏猿鶴友抵多少白玉樓中翡翠巢這一件難學呆古朶愛青山特地来修道㸔着你那些兒善與人交走将来火上又添油誰知他咲中又有刀欺負我年紀小賣㺯他通玄妙比似這做道姑的不氣長還强如粧旦色的恩義薄倘秀才也是我一時間千差萬錯送的我瘦形骸七顛八倒到𬒳他嘴揾地推翻這一交子聴的半空中風雨響山凹裏鬼神嚎耳根前閙炒醉太平我子見老神仙覷着傳法㫖聲髙金冠鶴氅羽衣飄罩祥雲繚繞他道是玉女峯強似蓬莱島回心石自有靈丹藥蒼龍岩漸得宴蟠桃道了箇守靜姑記着脱布衫子我這頭直上香風縹緲眼前面秋景寂寥再不向心坎内堆積着懊惱再不聴耳朶邉格揪着聒噪小梁州搭伏定磐石過一宵怎當那襪冷衣薄見了些銀河清淺夜迢迢恰捱的鐘聲報将行李杖頭挑么聴荒村野店雞𥘉呌怕甚麽山路﨑嶢一回家腹内思心中料神仙指教平地上青霄二煞子見他揎拳将䄂来㝷閙諕的我低首躬身且告饒使他那舉止村沙聲音莽撞眼腦張狂心地鏖糟你子待欺􅝇天地搶奪錢財亂下風雹不是你望空禱告這的是人怨語聲髙尾聲子我這草鞋寛忒刺着金蓮小布裙大遮蔵了玉笋嬌歩窄難行獨木橋力弱難攀老樹稍頑石上停息四五邅苔逕上滑擦二十交閙吖吖猿㺅竹外號惡狠狠豺狼路上跑碧䕃䕃松栢左右交磣可可妖精来徃攪石砌就深岩入土壕銕索做雲衢上九霄投直到玉女峯頭訪仙道便是箇慣打掙的身軀也走的困乏了端正好全昧了聖賢心空惹下妖邪氣剗地道秀才家經史曽習尚不知隂陽消長其中意枉了你鑚故𥿄十来歲滚綉毬他常是明滳溜出海天怎肯去黒荅窟共枕席伴你的敢子是鬼精妖魅論常經日月交蝕他那清光即古是今循環有盈與虧子他那影山河是玉蟾丹桂共三光五岳名齊常子是玄霜玉杵和仙藥他怎肯暮雨朝雲入繡幃枉費了你心機倘秀才㸔了他風風勢勢不由我傷情痛泣㸔了他拈起東来忘了西這的是名登龍虎榜抵多少身到鳳凰池着朋友每也咲你滚綉毬見如今瘦伶仃氣力疲病淹煎語話遲尚古自我根前做些廻避常言道酒病是花醫自早晨到晚夕㡬曾嚐半星兒滋味甚的是遇神仙法力扶持怕不你温存暖𬒳三更夢空教你撥盡寒爐一夜灰悔後何及倘秀才都子為唐明皇蔵頭露尾因此上葉靖師􅝇心昧巳送的他玉骨香肌踐馬嵬都子是霓裳歌好聴直令得蜀道輦難回下塲頭落的滚綉毬我子道孫真人能救急王叔和知脉息却怎生請将来百般不㑹怎做的祖傳来三世行醫你見他瘦懨懨軟了身子黄淹淹的改了面皮又道是近新来感着些時氣休猜做乞兒每飽病難醫這秀才常懐秋月心千里到做了細㸔春風玉一圍須索參知倘秀才你道是柴胡湯加些枳實益元散調着蜜汁這的是退熱寛中進飲食敢不如桂花頭逢逺志天仙子共當歸子要點蟾酥半粒醉太平本是箇山精樹鬼錯認做越艶吳姬你道是芙蓉如面栁如眉㝷思起就裏團圎夢裏添憔悴分明色上迷精細清光影外辯真實我子怕悔之晚矣叨叨令都子為月嬋姢消盡了風雲氣致令得性踈狂全忘了經書義因此上病淹煎錯認了妖精勢近新来口填涎淡薄了珍羞味兀的不悞了你也麽哥兀的不悞了你也麽哥怎生来􅎥酸梨倒把甜桃棄脱布衫我這裏意躊蹰傷感傷悲他那裏死臨侵如醉如癡嘴骨邦獨行獨立呆荅孩不醒不醉小梁州好着我跌脚鎚匈告訴誰淚似扒推沈郎多病不勝衣添憔悴都做了風月此情知么乜斜着眼腦胡支對一㑹家意張狂脚歩查梨你道是月宫中非人世都𬒳那雲情雨意沒揣地蔽光輝二煞常言道男婚女娉人常理鬼夢妖言總𬒳迷恰便似指山賣磨縁木求魚望梅止渇畫餅充饑那裏也聲聲相應事事相諧歩歩相随誰着你攀髙折桂到做了愛月夜眠遲尾聲檢名方用藥難醫治論造化将言勸不回全無些肯懊悔癡着心昧天理看了他軟兀刺身軆無絲力似隔着一𥿄兒陽間便是鬼端正好我将這祖燈傳佛光禮出三途八難災危靜中禪愛把機鋒對受萬法宗臨濟滚綉毬有時将公案題有時将棒喝馳我把這趙州茶畧甞滋味問門呵南北東西問路呵線迸似直問道呵從脚下起問靈䑓呵一方之地赤緊的老婆心忒㬠慈悲無䑓無樹将何掃非色非空我不知冷咲㣲㣲倘秀才你将那兩片皮休着杖擊七箇竅休将氣吹收拾在腔兒裏暖肚皮直等的竅中春靉靆皮上汗淋灕那其間誰得似你滚綉毬我向那青山中獨歩歸将一箇白牛兒自在騎調伏的他性兒純粹順西風一曲羌笛也不收丢了他我向那草坡前黒婁婁的鼾睡醒来時團㺯着一顆摩尼我不怕頓開鐵索蒼蛟走摔碎金籠彩鳳飛到大来便宜貨郎兒平康巷水甜人義夷山側韶光正羙一川風色晚烟迷我子待改乞留曲吕蚰蜒道退稀溜合刺虼蜋皮自呷呷咲起黄梅雨後有一箇能明繼赤肉團上有一箇真人位紅爐𦦨裏有一點雪花飛我若是跳出這圈兒誰姓李叨叨令得吾師𨳩發的多伶俐謝吾師警䇿的多詳細感吾師指示的慇懃意愛吾師逼拶的機鋒利兀的不醒了也麽哥兀的不悟了也麽哥與吾師都得赴龍華㑹貨郎兒積善的多存隂隲似靈芝生扵糞堆常行好事福相随聴了這不明不暗希竒事一㑹家指空畫空説玄機直恁地神通智慧直恁地佛力精微叮嚀説到兩三回教妙清記只他道俺乆巳後脱離