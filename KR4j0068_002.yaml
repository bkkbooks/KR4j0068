front:
  text: 雍熈樂府卷之二
  hash: sha256:abc2563c4d81b3d1594693ca68ee79c27d1b1d46e7a73c7f043d01fa6cf3e332
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_002-1a}
body:
  text: 正宫端正好金䑓八景聖天子統華夷際龍虎風雲㑹有賢臣宰輔扶持八方寧靖干戈息勝舜代過堯世滚綉毬保山河壮帝基輔寛仁四海歸順天心應垂祥瑞千邦進萬國来儀省刑罰薄稅歛賞三軍足食衣盡歌謡豐年稔歲户無扄路不拾遺風調雨順黎民樂家給人和享富貴生意無虧倘秀才文官毎坐琴堂知法度清廉正直武将毎掌兵權施謀略赤心報國因此上海宇清寧日月輝光風盛樂雍熈保安着社稷滚綉毬羡金臺八景竒㸔盧溝曉月輝髙聳聳居庸疊翆薊門深烟雨霏霏觀西山霽雪晴翫秋風太液池暎金䑓紅輪西墜玉泉山倒掛虹蜺萬歲山瓊島春隂靄五鳳樓瑞氣祥光罩𬗋㣲端的是堪詠堪題賽鴻秋太平年無士馬烟塵息感皇恩蒙天寵榮華貴衆公卿拜舞在丹墀内挿宫花飲御酒排筵㑹笙歌奏管絃鼍鼓鼕鼕擂瓊林宴罷醺醺醉脫布衫擺頭踏兩行朱衣跨金鞍駿馬頻嘶将照道紗燈挑起咲吟吟玉鞭催騎小梁州扶下馬嬌娥翠遶圍端的是歩歩兒相随畫堂銀燭燦光輝安然睡福祿夀年齊子孫世襲登八位靴踪兒不離朝基一班兒宰相毎都是些勲臣軰凌烟閣内垂青史把名題醉太平頼神明威徳托洪福天齊八方四海盡服歸鎮蠻夷定體遵依禮樂流芳世徳化俗美興仁義賢人軰軰長苗裔荷蒼天道理尾聲讃吾皇永綿綿聖意合天意衆臣僚撫乾坤都與皇家出氣力秉忠良能扵國官清廉法正直榖雙穗麥二𡵨現祥光靄瑞氣普天下不動征旗掛酒旗願吾皇納諌如流萬民喜端正好慶郊祭囬鑾一氣轉發青陽四時序開黄道聖明君端拱臨朝臚傳大祀承天表排鹵簿離蓬島滚綉毬赤力力風翻的錦帶飄急颭颭旗迎的曙色髙霧濛濛暎金鑾曉霞籠罩氣昻昻百司官具公服圍列週邅齊臻臻鞍上将不弱出嵎虎宻匝匝坐下馬如同戯浪蛟雄紏紏各施呈六韜三略聖明主巍巍大徳期文武輔弼臣耿耿丹心壓契皐踈刺刺旗影飄颻倘秀才龍鳳車淡氤氲霞光閃灼狻猊鼎香靉靆祥烟繚繞百萬隊貔貅擁護着秉䖍心離北闕辦誠意赴南郊祀天畢囬鳳閣脫布衫金殿上陳水陸擺列佳餚設珍羞羙饌烹炮托聖主汪洋大徳遇豐年太平之兆小梁州萬國衣冠拜聖朝樂奏笙簫普天率土盡歌謡感聖主恩波浩玉斚進香醪么願吾皇萬載承宗廟錦江山永固堅牢普天下黎庶歡軍民樂鳶飛魚躍萬物盡逍遥尾聲文官武職宜品藻鷺序鵷行堪畫描四海清寧國富饒五榖收成風雨調祝聖夀綿延嵩嶽髙拜獻上當今慶成表端正好趙太祖雪夜幸趙普水晶宫鮫綃帳夜深沉睡不穏龍床離金門私出天街上正風雪空中降滚綉毬似紛紛蝶翅飛如漫漫栁絮狂拂氷花旋風兒飄蕩踐瓊瑶脚歩兒慌忙白襴兩䄂遮把烏紗小㡌盪猛囬頭把鳳樓凝望全不見碧琉璃瓦甃鴛鴦霎時間九重宫闕如銀砌萬里乾坤似玉粧粉墊滿封疆倘秀才他把那鐡桶般重門来閉上我将這銅獸面雙環扣響𫾣門的是萬歲山前趙大郎想堂中無客伴料燈下㸔文章我特来聽講呆骨朶冲寒風冐凍雪来相望有機宻事緊待啇量忙怎麽了事公人免禮波招賢宰相這的是調鼎鼐三公府那里有剃頭髪唐三藏我向這坐席間聽講書你休来我耳邉廂呌點湯倘秀才朕不學漢髙皇深居在未央朕不學唐天子停眠在晋陽常則是翠被寒生金鳳凰有心思傅說無夢到髙唐這的是為君的勾當滚綉毬既然四海為一家必索要正三綱謹五常朕㓜年間廣習鎗棒恨未到孔子門墙尚書是㡬篇毛詩共㡬章講禮記始知謙譲論春秋可鑑興亡朕待學禹湯文武宗堯舜卿可效房杜蕭曺立漢唐爕理隂陽倘秀才卿道是用論語治朝廷有方却原来這半部運山河在掌聖道如天不可量談經臨絳帳索强如開宴出紅粧聽說罷神清氣爽滚綉毬銀䑓上畫燭明金爐中寳篆香不當教老兄自斟佳醸又何湏教嫂嫂親捧霞觴卿道是糟糠妻不下堂朕湏想貧賤交不可忘常言道表壮呵不如裡壮妻若賢夫免灾殃朕遇卿正如太甲逢伊尹卿得嫂嫂呵恰便似梁鴻配孟光只願的福夀綿長倘秀才我但歇息論前王後王恰合眼慮興邦䘮邦因此上曉夜無眠想萬方方信道歡娱嫌夜短寂寞恨更長憂愁事㡬樁滚綉毬憂則憂當站夫身無掛體衣憂則憂貧家毎無隔宿糧憂則憂行船客阻一江風浪憂則憂駕車的萬里經啇憂則憂號寒的妻怨夫憂則憂啼饑的子喚娘憂則憂甘貧的晝眠深巷憂則憂讀書人夜坐寒窓憂則憂布衣賢士無活計憂則憂鐡甲将軍守戦塲不由我感嘆悲傷倘秀才憂的是百姓苦向御榻心勞意穣害的是不小可教寡人眠思夢想太原府劉崇據北方朕待暫離丹鳳闕親擁碧油幢先取河東来上黨滚綉毬卿道是錢王共李王劉鋹與孟昶他毎無仁政萬民失望行覇道百姓邅殃差何人收四川命誰人定兩廣取吳越必湏名将下江南宜用忠良要定奪展江山白王檠天柱索問你正宇宙黃金架海梁卿仔細叅詳脫布衫取金陵飛渡長江到錢塘平定他降西川路休辝棧閣南蠻地莫愁烟瘴醉大平陣衝開虎狼身冒着風霜用六韜三略定邉疆把元戎印掌則要你人披鐡甲身雄壮馬揺玉勒難遮當鞭𫾣金鐙響玎璫早班師汴梁二煞有那等順天心逹天理去邪歸正皆踈放有那等覇王紫抗王師耀武揚威盡滅亡休虜掠民財休傷殘民命休淫汚民妻休燒燬民房恤軍馬施仁發政廣錢糧定賞行罰保城池納逆招降沿路上安民掛榜重賑濟再開倉尾朕專待正衣冠尊相貌就凌烟圖畫功臣像卿莫負勒金石銘鍾鼎向青史標題姓字香能用兵善為将有心機有膽量仰㸔天文筭星象俯察山川辨形状决戦先将九地量晝戦多将旗幟張夜戦頻将火鼓揚歩戦屯雲護軍仗水戦随凨使㠶漿竒正相生兵最强仁智兼行勇怎當專聴将軍定這廂坐擁元戎取那廂飛奏邉庭進表章齊賀昇平囬帝鄊比及你列土分茅拜卿相先将這部下軍卒論功賞端正好祝讃昇平九重宫五色日輪髙十二樓萬縷祥雲放建皇都鞏固金湯纉成大業山河壮靄佳氣天都旺滚綉毬喜孜孜聴康衢誦歌謡黔黎共樂昌笑吟吟祝堯封躋夀域臣民齊賛揚錦重重設大駕擺金鑾掛寳扇綉旗仙仗齊臻臻擁千官簉鵷鷺列彤墀玉笋班行光燦燦金鑾殿髙捲起蝦鬚簾玲瓏霞彩帳煖溶溶玉獅爐細裊裊龍涎篆氤氲瑞靄香韻悠悠動一派奏鈞天和仙音樂聲嘹喨鞠躬躬瞻萬乗拜冕旒肅衣冠環珮鏗鏘香冉冉色霏霏祥雲光覆蓬莱近明朗朗熖煌煌銀燭朝天𬗋陌長喜孜孜齊祝願聖夀無疆倘秀才保宗社功過武湯撫黎庶徳邁漢唐明四目逹四聰定四方民無怨生恱喜天有感降禎祥遍四野庒農擊壌脫布衫四時序未稼豐穣五辰順日月昭彰甘露降白如雪霜醴泉生味勝佳釀小梁州瑞草靈芝是處芳進騶虞兩出非常龍駒天馬自来王南極現呈乾象米麥積盈倉么篇湧浮圖凝秀寒氷降獻麒麟獅子神羊玄兎産白鹿生神龜出黄龍降普天下軍民歡暢慶明主賀吾皇尾聲幸遇着進重祥貢疊瑞感洪恩誠惶奉表朝今上更勝如逺重譯渉萬里獻白雉率土来賔服越裳永固皇圖帝業昌常轉法輪佛日光海不揚波聖意彰風不鳴條聖恩廣同㑹車書禮樂邦輻輳輪蹄錦繡鄉門不闔扇民樂康路不拾遺人善良總握乾符御萬邦保護着萬萬載華夷聖人掌端正好大打圍射鵰擁千騎擺圍塲出四野排軍候農事畢禾稼皆收山林中捕捉禽和獸因此上交飛走放分箇先後滚綉毬撁犬的輕摇動銅項鈴架鷹的緊拴着皮臂鞲按節令夏苗冬狩順時光秋獮春蒐齊臻臻列兩行採獵人宻匝匝擺一邅弓箭手五方旗舞飄飄綵霞錦繡七重圍明燦爛劔㦸戈矛威凛凛人如越嶺巴山虎勢昻昻馬勝翻江出水虬不弱如萬隊貔貅倘秀才我只見翠葉凋池荷岸栁色添青山松澗竹方信道明日黄花蝶也愁起西風聲淅淅吹落葉響颼颼堪描在丹青畫頭賽鴻秋更那堪潤濛濛露浥芙蓉秀冷清清霜壓梧桐瘦碧𥻘𥻘水漾玻璃皱響潺潺澗瀉瑶琴奏丹桂異香飄紅葉臙脂透驀聴的韻泠泠山峪鳴岩溜快活三山林中並無一箇採樵叟水面上豈有一箇釣魚舟衆獵人張羅捕網遶週邅一箇箇難逃漏蔓菁菜弓弩開時狐兎憂箭下如何救鑼鼓鳴時虎豹愁义鎗下應難受盡擒住黄羊黒熊山獐野獸麋鹿猿猴我只見犬挐狡兎鷹摶飛鳥鶻擊寒鳩耍孩児那匹馬蕩塵埃滚滚閑馳驟正来到垣河橋左右那将軍忽的猛擡頭見蒼鵰天氣悠悠鵰見人忙搧鐡翅凌霄漢人見鵰緊跨龍駒上斗牛有志氣難能勾鵰翺翔勝如鸑鷟馬跳躍賽過犇彪四煞一来見飛禽騰舞的髙二来顯将軍武藝熟精神抖搜威風紏鵲樺弓飛魚袋内連忙取鳳翎箭走獸壷中急去抽此箭中功名就秉一片雄心苦志使滿懐壮志難酬三煞那鵰兩翼徤急急的飛那馬四蹄輕緊緊的逐鞍上将持弓挾箭揎𫀆䄂翻身背展猿猱臂仰面爭開神恠眸弦搭上朱紅扣這箭去百發百中那鵰着千死千休二煞撲刺刺驚起些林外鶯忒稜稜蕩散些水面鷗諕的那鷺鶿鸂䳵難飛走纔離了寒沙淺水鴛鴦浦又㸔見秋草凄烟鸚鵡洲莫不墜落向殘林右鋪白雪白蘋渡口多躱在暎紅霞紅蓼灘頭一煞既然那綠楊枝上無多敢在黄蘆岸畔有料應只在村前後那将軍縱馬踏荒野車輪大的毛團臥古坵與髙手爭前後威伏的他衆人怯懼㫁送了一鶚鳴秋尾聲一箇李廣也曾射虎一箇賈竪也曾射牛便有那養由基百歩穿楊栁都不如這斛律光将軍射鵰的手端正好碧雲天黄花地西風緊北鴈南飛曉来誰染霜林醉總是那離人淚滚綉毬恨則恨相見的遲怨則怨歸去的疾栁絲長玉􅍡難繫恨不的倩踈林掛住斜暉馬兒逆逆的竹車兒快快的随恰告了相思廽避破題兒又早别離聽的道一聲去也鬆了金釧遥望見十里長亭减了玉肌此恨誰知叨叨令見安排着車兒馬兒不由人熬熬煎煎的氣有甚心情将花兒靨兒打扮的嬌嬌滴滴媚准備着𬒳兒单枕兒冷則索昏昏沉沉睡從今後衫兒䄂兒都揾濕重重疊疊的淚兀的不閃煞了人也麽哥兀的不想煞了人也麽哥乆巳後書兒信兒湏索與我恓恓惶惶的寄脫布衫下西風黄葉紛飛染寒烟衰草凄迷酒席間斜僉着坐的蹙愁眉死臨侵地小梁州我見他閣淚汪汪不敢垂恐怕人知猛然見了把頭低長吁氣推整素羅衣么雖然乆後成佳配柰時間怎不悲啼意似痴心如醉想昨宵今日清减了小腰圍上小樓合歡未巳離愁相繼想着俺那前暮私情昨夜成親今日别離我諗知這㡬日相思滋味却原来比别離更增十倍么篇年少呵輕逺别情薄呵易棄擲全不想腿兒相壓臉兒相偎手兒相携你與俺崔相國做女婿妻榮夫貴但得箇並頭蓮强如状元及第滿庭芳供食太急湏臾對面頃刻别離若不是酒席間子毋當廽避有心待舉案齊眉雖然是相守的一時半刻也合着夫妻每共卓而食眼底下留情意㝷思起􅈬里險化做了望夫石快活三将来的酒共食嚐着的似土和泥徦若便是土和泥也有些土氣息泥滋味朝天子暖溶溶玉杯白泠泠似水多半是相思淚眼前靣茶飯怕待要喫恨塞滿柔膓胃蝸角虚名蠅頭微利折鴛鴦在兩下里一箇在這壁一箇在那壁則落的一逓一口長吁氣四邉靜霎時間杯盤狼藉見車兒向東馬兒向西兩意徘徊落日山横翠今宵宿在那里有夢難㝷覔耍孩兒淋漓襟䄂啼紅淚比司馬青衫更濕伯勞東去燕西飛未登程先問歸期雖然眼底人千里且進生前酒一杯未飲心先醉眼中流血心内成灰五煞到京師服水土趂程途節飲食順時自保揣身體荒村雨露宜眠早野店風霜要起遲鞍馬秋風里最難調護最要扶持四煞這憂愁訴與誰相思只自知老天不管人憔悴淚添九