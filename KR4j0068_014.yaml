分連枝樹斧斷根畫眉的無㝎凖傳粉的信不聞竊玉的情性村偷香的心內狠栁葉兒呀閃的我無投無奔空著人進退無門路途遙千里關山恨無音信斷鴻鱗一思量一陳消魂集賢賔金殿上慶雲祥霧繞觀林苑動簫韶都逰玩千紅萬紫見了些緑垂紅杏夭桃看了些滿日繁華數不盡百媚千嬌苔徑前緑茸茸鋪地草杜鵑啼在花稍杏開金殿繞花綻玉樓髙逍遙樂湖山倚靠亭上排筵歌聲韻繞絃管簫韶紫金杯滿飲香醪寶鼎龍涎靄篆飄排列下竒珍異寶有玻璃擡槖碧玉杯銀鋺玉杓金菊香我子見金叉十二列妖嬈天仙般容顔怎的描下香階半勾羅襪小挽烏雲螺髻偏髙朱唇一顆櫻桃醋葫蘆玉纎手象板敲撥琵琶合鳯簫舞翩翩一捻小蠻腰金爐中靄煙香細裊醉後把幃屏倚靠抵多少海山銀闕宴蟠桃后庭花看紅桃緑栁繞有青松間嫩稍枝上鶯聲巧梁間燕語嬌樂陶陶玉鈎髙吊直喫的沉醉倒恰朦朧眼閉著有佳人簇擁著玉纎手扶策著猛凝眸觀了似天仙下碧霄青哥兒猛可的將人將人驚覺醉後也不知不知顛倒扶上雕鞍將寶鐙桃將紫絲緊掿似駕鸞鶴如上青霄早月上花稍絳紗籠罩翆繞珠圍一周遭聽一派簫韶樂尾聲我將這玉鞭交付與金爐異香燒瓊酥滿捧玉匙調趂寒凨撲面酒力消把銀缸髙照衆金叉扶下玉逍遙集賢賔栁眉攢倦聽簷外鐵這離恨亂重疊秦臺上吹簫無伴桃源路迢遞跋涉盻佳期展轉躊蹰想薄情意斷恩絶倚幃屏悶懨懨長嘆嗟怎承望兩下離別畫梁聽燕語老樹囀鶯舌愁臨臺榭舉目遙觀把離愁暫歇逍遙樂這些時心不寧貼悶懨懨痛口咨嗟消減香魂引夢賖畫角聲絶離情空懊惱愁悶眼前踅難熬今夜欲寄音書心慵倦寫金菊香誰承望玉簮掂做兩三截井墜銀瓶何處也羞對鶯花鸞鏡缺情思嬌怯似莊周一枕夢蝴蝶醋葫蘆怎禁那蛩亂吟砧韻切辰鍾暮鼓不休歇怎做的容易得來容易捨好教我腸慌腹熱則我那故人難望𬒳雲遮餘音則恁般情意短性薄劣待一年半載見時節那辜恩逆賊親自説這場冤業人生最苦怕離別集賢賔鶯花寨近來誰戰討這兒郎懸寶劍佩金貂燕子樓屯合了凱甲雞兒巷簇擁著鎗刀麗春院萬馬蕭蕭鳴珂巷衆口嗷嗷將一座玩江樓等間白占了他道是特欽丹詔穿花擒凰鳯跨海鈞鯨鰲逍遙樂六韜三略也則是制勝量敵却做了幽期密約陳馬咆哮比販茶船煞是粗豪將俺這軟弱蘇卿禁害倒統領著雅青神道衝開蜂媒蝶使烘散燕子鶯兒折散鳯友鸞交梧葉兒雖不曽糟粳婦休猜做花月妖又不曽諳海島慣風濤把舵春纎嫩扶篙筋力小恁待去征遼沒話説軍期誤却金菊香他將這絳銷衣罩著錦征𫀆銀鎖甲纓聮著珠絡索鐵兜鍪壓損了金鳯翹改盡了手標全不似海棠嬌醋葫蘆鎗搠呵玉臂擎箭來呵羅襪挑丁香舌吐似劍吹毛連環炮𬒳窩兒裡聒破腦知音的都道我不信建頭功先奏箇女妖嬈么剪青絲纏做弓絃裁香羅納做征𫀆輔旗幡鈸題翆裙腰金瘡藥細將脂粉調都是凨流功效他子待五花誥下紫宸朝么呌喳喳錦纜移閙垓垓畫槳搖那裡取明眸皓齒姆軍稍更做道孫武子教的來武藝髙止不過提鈴喝號抵多少碧桃花下坐吹簫么他戀著蓬囱下凨致佳舵樓中景物饒棹歌聲裡樂陶陶辱沒殺鋪紅苫緑翡翠巢怕不道相偎相抱那裡也笑芙蓉帳暖度春宵么晚凨涼觱篥鳴曉星落鼙鼓𫾣熱樂似銀筝象板紫檀槽子學那明皇早起時臣起早白鷗冷笑到惹的黑漫漫殺氣蜃樓髙餘音恁妳妳得了些賣陳錢恁哥哥占了些惜軍鈔他向那海神廟多買下些好香燒但只碩一年一度征海島休忘了將軍的旗號他是玉門關舊日勇班超集賢賔獲騶虞看一帶好山十數里恰便似錦步障翆屏幃我子見凝樹色霜寒露冷鎖嵐光霧慘雲迷恰轉回路凹峻嶺崇岡早來到石槎牙陡澗深溪看一會青抹了的亂峰如畫戟我將這錦韁兜玉勒輕提日晃著火星龜背鎧凨颭動雲月皂雕旗逍遙樂密匝匝擺開雲騎厮琅琅掣響鑾鈴明晃晃擺開畫戟子聽的撲鼕鼕擂動征鼙呐喊聲髙華嶽摧也不索疾走銜枚我向那山前嶺後澗北溪南布列長圍上京馬也不索六韜虎豹運兵機也不索八陳魚龍出正竒也不索九曲長蛇頭應尾披挂的整整齊齊都是些水磨成銀甲滲金盔梧葉兒你那裡砍翆竹把排場立折靑松將籠陷堆髙阜處搭雲梯俺這裡按星宿分人馬依五行增氣勢各自索用心機且看是誰先來報喜醋葫蘆這一隊向東山增氣勢春搜的將士齊恁在這甲乙方居震位御勾芒司太昊體人心的兵校每正雄威上應著角木蛟斗木獬奎木狼并木犴四星宿向東方無對敵一箇箇戴青盔披青甲鞚青􅍡束青帶提著柄青蘸斧施逞英鋭最當先展青龍應木德順東凨迎麗日忽刺刺打一面摩霄漢的繡青旗么這一隊向南山增氣勢夏苗的將士齊恁在這丙丁方居離位御祝融司炎帝遵禮法的兵校每正雄威上應著尾火虎翼火蛇室火豬觜火猴四星宿向南方無對敵一箇箇挂紅𫀆乘赤兔帶紅纓抹紅額拏著箇紫金爪施逞英鋭最當先展朱雀應火德順南凨迎烈日忽刺刺打一面拂炎火的絳紅旗么這一隊向西方增氣勢秋獮的將士齊恁在這庚辛方居兊位御蓐收司少昊尚義勇的兵校每正雄威上應著亢金龍婁金徇鬼金羊牛金牛四星宿向西方無對敵一箇箇頂銀盔騎白馬帶􅣱刀懸玉簡使一條梨花鎗施逞英鋭最當先展白虎應金德順西凨迎皓日忽刺刺打一面沾白露的素白旗么這一隊向北山增氣勢冬狩的將士齊恁在這壬癸方居坎位御玄冥司顓帝能智慮的兵校每正雄威上應著壁水㺄箕水豹參水猿軫水蚓四星宿向北方無對敵一箇箇驟烏騅彎黑弓使鋼鞭披皂鎧手執著黑纓鎗施逞英鋭最當先展玄武應水德順朔凨迎曖日忽刺刺打一面生黑霧的皂征旗么這一隊向中央增氣勢校獵的將士齊恁在這戊巳方居黃極鎮中央軒轅位守忠信的兵校每正雄威上應著桞土獐胃土雉氐土貉女土蝠四星宿向中央無對敵一箇箇跨黃驃絡金轡戴金蝥執金劍披一副黃金甲施逞英鋭最當先展太極應土德布和凨宣化日忽刺刺打一面繡八卦的赭黃旗么這一隊向東南增氣勢校獵的將士齊恁在這辰巳方居巽位照燭龍出暘谷的兵校每正雄威上應著房日兔虛日鼠昴日雞星日馬四星宿向東南無對敵一箇箇錦征𫀆獅蠻帶繡裙襴金頓項手執著三停刀施逞英鋭最當先展金烏應陽德著羲鞭行黃道忽刺刺打一面降靈曜日的日光旗么這一隊向西南增氣勢校獵的將士齊恁在未申方居坤位輾氷輪修玉斧的兵校每正雄威上應著心月狐危月燕畢月烏張月鹿四星宿向西南無對敵一箇箇鳯翅盔龍鱗甲鵲樺弓雕翎箭手拏著竹節鞭施逞英鋭最當先展玉兔應隂德御望舒紛丹桂匆刺刺打一面開寶鑑的月光旗后庭花我子待盡忠誠保社稷守藩邦恭護衛覩仁獸來山郭看禎祥設大圍我這裡告神祗只碩的早觀祥瑞我則索下深壕過嶮溪扳藤蘿履怪石入叢林樹色迷上髙岩雲氣濕青哥兒蹅遍了山前山前之地却怎生不見昨朝昨朝祥瑞不由我手搭著心頭暗自疑莫不是百姓虛脾報不真實空動勞藩府親臨受驅馳跋涉在紅塵內浪來裡煞向前來囑付你首先去通報知休愛惜錦征𫀆汗濕的濕淋漓把征􅟯馳驟的滿肘泥只限你一宵一日入金門先報喜到丹墀集賢賔喜相逢並頭花下友天配偶兩嬌羞一對兒冤家合欠還今生諧老鴛儔意相投似漆如膠契相合萬種綢繆畫堂前滿斟香糯酒喜孜孜共飲金甌則喫的天邊明月轉樓上換更籌南字字錦瑶階羡晚逰間行携素手金蓮欵欵移細桞腰肢瘦看花樓撫景偏優笑吟吟轉過見新月一鈎休辜負好景香醪再酬低低悄語私情授向蘭房錦鸞早儔慢鬆丁香細鈕香散繡幃嬌滴滴溫柔玉體非宿世怎生消受北醋葫蘆溫柔誰並肩凨流為世首彈弦品竹最精􅌻吟詩作賦時下有一團兒玲瓏剔透天生的秀氣他兩箇總全周南字字錦山盟海誓留休忘神前口辜恩自有天負德神不祐倚粧樓訴盡緣由多情休得相棄兩頭優同眠繡衾鸞凰共儔心中緊記休忘舊好􅊚緣喜今早周贈新詩數首鮫綃半幅上有那鴛鴦雙繡北醋葫蘆姊妹每一箇所事全一箇件件周好似那二喬鏡像影兒留占梨園委實無對手常想著歡娛時候我和他契相合情相好意相投南皂羅𫀆美滿恩深情厚碩百年諧老共守白頭相逢誰似恁凨流終朝絃管笛歌奏池亭東畔湖山西首金杯慢舉佳飾廣有蓬萊仙境無加右北浪裏來煞他存心意最真我留情非虛謬休教那燕鶯參透兩心頭鳯鸞交美甘甘共斯守常禱告神天加祐子願的襄王雲兩萬年稠集賢賔貪荒忙棘針科抓住戰衣險唬殺小河西行不動山坡下歇息立不住東倒西推眼張狂有似撈菱行不動一絲兩氣那將軍慣相持能對壘有軍來誰敢和他迎敵則聽的摔天般發喊震地凱征鼙逍遙樂端的是名傳萬世看了他四海無雙不枉了寰中第一狄青將玉勒兜寶鐙踢獸壷中順手扯金鈚鳯翎箭水磨端的直弓彎神背更壓著李廣飬由基么箭著時支楞楞撇了畫戟撲簌簌零了豹尾我見他翻身落地馬空回彎弓插箭覷了一會將一頂紫冠來撞碎我見他三思台吞滿畫桃皮么史牙恰鎗使迎狄將軍刀去的疾我子見鎗迎著刀捍足律律火光飛見鎗來躲過刀去劈則見連眉帶臂恰便似錦毛彪撲倒赤狻猊么狄將軍前面行史牙恰後面隨他兩箇不曽答話便相持恰便似六丁神撞著箇霹靂鬼天生下是本對寰中少有世間稀尾你與我即便去莫迎敵得便宜則恐怕落便宜他每都響珊珊笑將金鐙踢喜孜孜還營威勢打一面皂雕旗齊和凱歌回集賢賔幽囱靜悄月又明恨獨倚幃屏驀聽的孤鴻樓外鳴把離愁又還題醒更長漏永早不覺燈昏香盡眠未成他那裡睡得安穩雙聲疊韻思量起思量起怎不上心無人處無人處淚珠暗傾我怨他我怨他説不盡誰知道這裡先走滚自恨我當𥘉不合認真簇御林人都道人都道他志誠却元來厮引眼睁睁心口不相應山誓海盟説假道真險些兒為他錯害相思病負心人看伊家做作如何有前程琥珀貓兒日踈日逺和你再相逢枉了把癡心兒寧奈等想巫山雲雨夢難成薄情猛拚今生和你鳯折鸞分尾冤家下得忒薄幸割捨的將人孤另那日裡恩情翻成做畫餅
