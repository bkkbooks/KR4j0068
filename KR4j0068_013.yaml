顧将一領錦征袍鮮血糢糊夏侯惇陣前觀了嘆吁他道是六丁神見也伏輸秃厮児都棄了強弓硬弩丢下些衲襖征服俺這里亂紛紛馬蹄追敗虜一箇箇傍林麓入深蒲潜伏聖藥王我子見雲氣敷山澗阻滿身衣甲錦糢糊聲呌呼着箭鏃抵多少滿身花影倩人扶羞的那袁紹嘴孤都麻郎児傷輕的潜身在民屋着重的横倘在荒墟得勝的揮戈跳舞敗殘的魂魄俱無么載輜重遥貢内府得了些寳貨圗書收拾的營中物足齊唱着凱歌歸去黄蔷薇磨旗幟忙收隊伍擊金鉦聚點兵卒積京觀髙堆數畆歸附的居民安堵慶元真子這中軍寳帳獻獲俘論功行賞到皇都只有這雲長功業㝡為初他更有嘉謀武藝熟論英雄世上無随煞若再来聴的道關将軍臨陣也戦欽欽早自袁軍懼怎敢又慿勢力揚威耀武再遇着青龍刀赤兎馬黄金甲絳紅袍交鋒厮捲了旗收了陣拱着手低着頭早歸降聖明主闘鵪鶉玉露新凉金風漸起托頼着聖主洪寛千邦進禮喜遇着盛世年豐興隆社稷見如今四序和萬姓喜道泰歌謡偏邦頓息紫花鬼序感應的麒麟出現彩鳳呈祥青鳥来儀四時八節民樂雍熈無及他毎都鼓腹謳歌讃聖徳見如今萬邦寧息一統封彊萬國扶持金蕉葉雄紏紏文臣武職善通知天文地理秉忠誠扵家為國一箇箇威風萬里鬼三台我子見龍官内盡都是黄金砌光晃晃瓊慺玉壁見瑞靄燦光輝勝蓬莱洞裏玉樓䑓巧鐫龍鳯飛金粧成升斗錦綉堆恰便似閬苑蓬莱勝似那十洲勝跡調咲令蕩金風氣質彩雲更和那兎影蟾光明似水見氷輪照徹天和地桂花香月影風襲祝賀着吾皇萬年延夀紀更那堪洪福天齊秃厮児萬乗主仁慈孝義勝當年虞舜無為寛仁厚徳秉正直天心順百禎集堪宜聖藥王擺列着玳瑁齊百味竒你㸔那金釵十二謹相随更和這玉液濃㶑灔盃則聴的笙歌一泒奏塤箎齊賀着萬萬歲永無極尾聲太平年四海民歡㑹齊賀着年豐物羙中秋月喜團圎托頼着聖夀無彊萬萬紀闘鵪鶉操一曲流水髙山錦心綉腹水國魚邦跳出他龍潭虎窟頂笠披簑隄防着斜風細雨閑来時琴一張酒一壷自飲自歌獨言獨語𬗋花児序也不學李白捫月屈原投江只學范蠡歸湖遶一灘紅蓼對兩岸青蒲漁夫慢慢的将船児你與我棹過去驚起㡬行鷗鷺樂以清閑吾不歸歟小桃紅水聲山色兩相宜閑㸔雲来去怨結愁腹對誰訴自躊蹰将㡬般児煩惱收拾聚感時懐古舊榮新辱都装入酒葫蘆金蕉葉来到這蘆花宻處欵欵的将船児䌫住見垂栁風揺翆縷風蕩得㡬朶荷花似舞調咲令来到他這淺處探着身軀慢慢的将鈎児垂将下去則𬒳這銀絲児界破波紋緑怎生這浮逰児不動纎湏我這里回頭猛然觀了艶姝可知道落雁沉魚秃厮児可人意清歌妙舞酬吾志新酒活魚春風一枝花觧語似着色羙人圗粧梳聖藥王樂有餘興未足罇中無酒典琴沽倒玉壷聴金縷直喫得滿身花影倩人扶待不輸與俺椘三閭麻郎児我生居在画屋流落在郊墟冷落了歌児并舞女控閑了寳馬香車知他是㫁扵甚處睡足遶青山十里平湖向一葉扁舟睡足抖擞着緑簑歸去綿荅絮仗年尊咫尺鑾輿倚功勞敢喝金吾瞞不過鳳啣去處那一箇官人敢言語無徒㫁沒来家卒你若是我根前我根前没怕懼絡絲娘我今日復帝都你根前再嘱付則要你憫恤軍卒愛惜些民户弟兄和睦伴當賔伏從今之後有的文書我行分付不比其餘你若是我根前敢做主尾聲好山好水難将去都寫入丹青画圗對此景賞無休到晚来停燈㸔不足闘鵪鶉秋聲賦歐陽子方夜讀書有聲自西南乍猛掩黄卷危坐神驚對青燈忽聴膽冷嚮珊珊宻洒踈𫾣冷清清無形少影勢不停怒轉増㵼潺湲瀑布千潯捲洶湧波濤萬頃𬗋花児序凄凉如蕭颯淅瀝聲惡似驟雨盆傾呼號若砰湃奔騰雷霆霹靂金鐡鏦錚堪驚又似啣枚赴敵兵不聞嚴令但聴蕭蕭人馬行聲小桃紅我謂童子此何聲汝出堦前聴童子聞言即從命到中庭悄無跡蹤大尤劲銀河耿耿踈星光暎相伴月華明寨児令童子驚問先生自沉吟坐到二三更出户閑行倚樹潜聴聲在樹頭鳴是啇君今夜司征遵號令法取施行慘一天横殺氣助萬籟起秋聲聴好教人感時序痛傷情金蕉葉其氣懸天髙日晶其聲慘雲騰霧昇其激烈霜結露凝其砭人肌寒骨冷秃厮児啇君主西方正聲夷則為七月之名扵時為金又象兵秋為官而司刑可更傷情聖藥王春發生秋結成世間草木本無情草正青木正榮忽然當此更凋零敢這正是惟人乃物之靈鬼三台百憂感心無定萬事執刑多病動其中必揺彼精尚日月有虧盈咲痴人未省思其智之所未䏻憂其事之所未行徒形體勞勞昧心胸瞑瞑尾聲恠予童子呼無應正鼾睡垂頭未醒但聞的四壁閙空聲更和這助我凄凉伴燈影闘鵪鶉鵲噪霜枝螢飛露草月浸樓䑓風生院落塞鴈聲輩寒蛩韻巧鐡馬摇砧杵𫾣金鼎香燒銀缸熖少𬗋花児序綉𬒳空孤幃寂靜金鈎控獨坐凄凉翆幃閑单枕蕭條囱前皓月簾下風飄好是難熬漏滴銅壷良夜迢越添焦躁腰細裙寛粉悴胭憔小桃紅深閨獨寝最難熬好是傷懐抱左右翻身盻難曉泪珠抛敗殘紅葉庭前落金鷄呌徹玉蟾低墜風動桂花飄天净紗甫䏻捱過良宵如何捱得終朝暢好是添煩受惱全無消耗閃的人玉减香消調咲令想着他恁情薄淺淡蛾眉不用描倚幃屏展轉愁顛倒怕聴那喜鵲聲噪往常時雲鬟整罷将金鳳挑這些時那曽道是湯着尾聲要梳粧直等他来到這般苦何時是了不是我恁的般上心愁怎當他那風流情意児好闘鵪鶉宻宻飄飄紛紛片片帶雨随雲寒光冷熖積玉堆瓊鵝毛亂剪雲滿天雪滿川潤物宜時禎祥兆年𬗋花児序剡溪中子猷訪戴覇陵橋浩然騎驢藍関道退之熬煎正應着袁安閉户蒙正歸窑買臣山前喜殺了穿鶴􅌁清閑那老仙氷雪堂蘇秦不見都不