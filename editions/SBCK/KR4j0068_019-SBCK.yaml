front:
  text: 雍熈樂府卷之十九
  hash: sha256:89dd1c654fb6b669b39840d7c55ed7ea87d3047db8c9bcee2d6a32cab0dcc254
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_019-1a}
body:
  text: 雜曲滿庭芳西廂十詠張生俊雅諸餘可愛􅀁事堪誇吟詩和句在西廂下引動嬌娃一封書􅀾退了眼前士馬七絃琹匹配上宿世冤家登科罷香車駟馬夫婦享榮華鶯鶯女娘竒芲嫰蕋軟玉温香天生俊俏嬌模様聡慧非常待月處心懐粉郎燒香時詩訴􅂨腸成就了凨流况時殊事往千古説西廂紅娘艶質䏻傳芳信善做良媒偷寒送暖􅀅婚􅊚配使盡心機你教他操瑶琴包含看道理寫芲箋引惹出佳期配合就鴛鴦㑹非你做羙焉得做夫妻夫人不乖想當日遭危受困怎生得脱難逃灾謝張生計策把賊兵敗情􅂅要配與裙􅁫既然你悔親盟宜􅄐院宅誰教你拜兄妹請入書齋他􅀻自成歡愛非干事鶯鶯不才单註着天地巧安排法聰老髠慈悲為本方便為門一堂經勾引的成秦晋扵理合尊守戒行持心敬謹主婚􅊚用意慇懃閑評論似這等寛柔上人當可報深㤙􅀅軍杜確䏻通虎畧善曉龍韜全慿威武居津要名播唐朝則為那一封書飛星到了霎時間五千人凨捲雲濤除殘虐如斯俊豪不枉了做知交鄭恒太魯湏知㳤女怎配愚夫當日箇軍圍普救誰扶􅂇多􅃜了君瑞呈書你則待逞其志馮河􅁀虎他怎肯􅀙其心似水如魚傷時務你專一架虛枉自敗凨俗孫虎恃強不思燕雀怎配鸞凰硬圍普救驅兵􅀅敗壊綱常你只待擄嬌姿朝歡暮賞他怎肯順賊徒共枕同床半霎兒􅀅身丧這厮心術不良斬首正相當多才漢卿廣知故事洞曉新聲移宫換羽真堪聴義理兼明一句句包蔵着媚景一篇篇醖醸出深情無疵病不俗易省萬載播芳名聰明實甫胸蔵錦綉口吐璣珠清新樂府真無数壓盡其餘翻騰就􅀹雲殢雨顯豁出􅀉柬傳書多佳趣超今越古堪與後人述又西廂十詠張生不才學成錦綉丧與裙􅁫嘲凨詠月西廂待眼去眉来寫封書文學似海害場病形軆如柴險把聲名壞全不想賢賢易色㺯甚麽秀才乖鶯鶯􅀑精麝蘭半匀芲月娉婷結􅁝蘿不用媒和證眼角傳情􅃪瑤琹宵奔夜行燒夜香膽􅀾心驚家不幸枉着你齊齊整整㺯出箇醜名聲夫人不良􅀌兒寡婦㓜女新丧不􅀅靈柩去安塟􅁀露在僧房做水陸捜㝷出禍殃改婚􅊚敗壊盡綱常可不道消魔障惹的那蜂喧蝶攘不賢恵老尊堂紅娘快赸傳書􅀉柬送暖偷寒星前月下把鶯鶯賺使碎心肝伺􅀱到更􅀷夜䦨㺯得那月缺芲殘粧科犯左難右難做了箇撮合山夫人你􅃪我為官長門戸先生西房既許成匹聘巳有賢声我怎敢和他同眠到明止不過赶空児半夜三更或推些病潜潜䓁䓁躡足鷺鷥行嘲人惧内納寵春泉作􅀅軍不仁擅􅄐信地難保􅀺民怎做的扵家為􅀦扶危困䡖舉三軍輸時節㓕了已身贏時節好了别人圗甚麽言而信沒来由閗狠何處􅂋功勲髠郎法聡不諳經典不理禅宗為媒作證虛迎送圗受些羊酒芲紅不争􅀅崔小姐窩蔵着㺯影險把箇普救寺燒的精空強兵動枉施英勇捨命去争鋒鄭恒發昏不應撞死怎得招魂曠夫怨女何湏論成甚人倫立志􅂔別㝷箇主婚仗家凨另􅃟箇名門可不道名聲俊沒来自殞越􅂋的小哥村漢卿不髙不明性理專㺯凨騷平地裏褒貶出村和俏賣㺯你才學瞞天謊説来不小㧞舌罪死後難饒着人道虛空架橋枉自筆如刀王家好􅋉沽名吊譽續短添長别人肉貼在你腮頰上賣狗懸羊既沒有朱文公肚腸又沒有程夫子行蔵忒狂蕩用心一塲上不的廟和堂滿庭芳閨房十事一葫蘆㸔生見長香醪許納粟粒難蔵可人一種凨流像嫩蕋鵞黄腰瘦似春凨緑楊軆輕如白玉玗璫雖無量天成氣象壓盡錦香囊二剪子双鋒並聳無塵似水有嘴如蟁多情夫􅃌䡖分動想像成功只與金針競争偏和銀鑷相􅀙堪珍重芲間萬種何用􅀣頭凨三鑷子秋毫厭尔春榆破甲連理分枝金鈴口吻那䏻似吞吐􅀹時樊素嵓封皓齒小蠻䡖束腰肢関心事菱芲鏡􅂻不放鬂狂絲四礶兒諸餘異種有懷可測無物堪客寛洪咲殺玻璃瓮到底成空盖􅅯荷翻曉凨索垂貫日晴虹雖無用紅􅃒翆擁樂亦在其中五瓶兒壷中緑醑盃斟鸚鵡索拽銀􅁝空懸着緑膽渾相似造物宜時席上難温玉􅃌瓶中填墜長􅁝芳春至東凨殢死無任揷芲枝六盒兒脂膏易滿虚心未􅁕空腹無寛故教銀索相牽絆恐失鴛鴦渾似齊分索暖别􅄐復對合歡堪為伴香温玉軟人共永團圎七針筒韜光晦迹胸中有物嚢􅂻蔵錐剖開混沌三才内吐出虹霓一寸鋼膓難比十分快性誰及多鋒利些兒綉􅂔成就四時衣八獐牙双鰲破甲光匀麝粉色潤氷芲並頭不讓金刀叉粧􅀧鉛華背似犀梳半揷面如􅃢掠微凹西廂下黄昏妬殺明月吐新芽九虎爪英魂杳㝠仍留古迹尚播威名蘭湯暖浴垢塵浄不染餘腥狐􅇠抽頭早嗔犬羊側目先驚何湏命桃芲扇影席上自生凨十牙杖清香滿腹四方志小一寸心虚此身不厭頻拘束世味難踈不尖着􅁏自出暫時韞匵蔵諸開懷處春纎半屈芲蕋上蜂鬚滿庭芳富貴貧窮陳粮滿倉財盈聚寳羅綺千箱終朝受用應時􅄿細酒肥羊咲欣欣擎􅎑過盞喜孜孜舉案流觴寛弘量樽前翫賞開宴出紅粧心廣軆胖腰金衣紫氣宇軒昻威儀濟楚多名望徳厚仁寛扶社稷賢才棟梁保山河永逺安康包公量承㤙受賞爵禄秉忠良身貧可憐多憂多恥少語無言雖貧怎肯􅀅身賤禮義和謙新朋来清茶消遣舊友至閑話何妨休䡖量非吾腼腆窮達任皇天敝巾破裳形骸臞秀容貌堂堂靈􅂺不遇桒間飯每誦詩篇住半間無扉草菴臥一枕楊栁夕陽休輕量炎凉莫管否泰任循環滿庭芳京口感懷殘芲剰栁摧垣廢屋新塜荒坵海門天塹還依舊滚滚東流鉄瓮城横刺虎口金山寺髙顯鰲頭夕陽候吟登舵楼和淚望􅀭州二武林感舊錢家故址東吳覇業南渡京師縱横四百八十寺不似當時随處寫坡翁舊詩何人吊逋老荒祠傷情思西湖若此何處比西施三贈余光明黄庭合成青龍制伏白虎馴寍金丹養就還元性日月分明傳妙用神仙勝境積隂功海宇聲名真靈應杏林橘井乆視樂長生四􅀉何齋長端肅奉柬相違咫尺似隔関山少成懽㑹多􅄐間直恁艱難平地􅂻情踈意懶暫時間書廢琴閑時頻盻㱕期早晚先報此平安五嘲人義蹇休懷故人難㝷東道誰念斯文南枝昨夜傳芳信大地囬春雪兒飄深深閉門魚兒膾旋旋開樽黄昏近黒喽便盹且伴睡魔神六西湖感興笙歌酔鄊綺羅絢綵粉黛吹香湖凨鼔起波千丈㶑灔春光亂紛紛逰人蕩􅄴閙攘攘潮子撐航情懷放芲簮酒賞時值煖天長七嘲薦非才荒蕪舊隠瘦田破屋流水閑門吾生甘守黄􅐽運何病何貧管城子誰行記本孟甞君舉甚賢人年􅀅盡梅芲咲哂添一􅀊老三分八送宗􅅩仕居官軆統何憂倉􅅒不得長盈寮属和協休嫌衆同盡微忠勸農桒􅀅供􅀊用莫偷安坐㸔民窮㱕家頌清白古凨􅂊是大宗翁滿庭芳春逰芳􅋄地春逰羙㢤名園佳圃㑹賞吾儕芲紅栁緑堪人愛蝶咲蜂猜臉桃芲三分酒色吐珠璣七步竒才踈狂態天寛地窄沉酔恰㱕来二夏賞緑荷池炎天景佳脫巾露頂幔􅇁䡖紗乗凉池閤無休暇滿眼繁華楊栁堤金樽玉斚荷芲池沉李浮􅀲歌笙罷天寛地狹沉酔恰㱕家三秋飲黄花酒秋天景竒金凨玉露白雁南飛長堤髙栁吟蝉蛻菊桂芬菲翫月楼直侵北極賞芲亭正對東籬芲簮墜天幃地席沉酔恰扶㱕四冬吟白雪詩三冬景殊雪芲絮滚梅蕋香浮氊簾低簇寒威布煖閤紅爐光爛燦凝合玉宇明滳溜凍徹氷壷吟詩處天􅃒地阻沉酔玉人扶滿庭芳凨月凨塵艶娃堪題堪詠堪羡堪誇朱唇檀口些娘大臉襯桃芲理氷絃纎纎銀甲步香塵窄窄刀麻天生下温柔典雅端的玉無瑕凨情􅉯沾巫雲暗結楚雨偷淹錦塲芲洞春光占眼角眉尖鴛鴦帳春来梦甜鳯凰衾老後情忺平康院鶯芲簿上凨月擔兒擔鸞笙鳯簫銀筝欵按象板䡖敲㡬年忘却閑情調梦㫁魂勞重整頓鴛鴦配交􅂯安排翡翆窩巢知音樂拈芲㺯草凨月擔兒挑凨流事耽湘裙晚皱紅䄂春渰梨園世不着虚賺陣馬曽諳三生話百年梦甜半生狂一􅈁涎饞重新㸔鶯芲陌上凨月擔兒擔喜春来馬致逺六藝一禮夙興夜寐尊師行動止渾絶浮浪名身潜詩禮且陶情栁溪中人世小蓬瀛二樂宫啇律吕随時奏散慮焚香理素琴人和神恱在佳音不関心玉漏滴殘淋三射古来射席觀其徳今向樽前自樂心酔横壷矢臥蓑隂且閑身醒􅂿月明吟四御昔馳鉄􅀐經燕趙往復奔騰穏似船今朝兩鬂巳成斑機自叅牛背得身安五書筆尖落􅁓生雲霧掃出龍蛇驚四筵蠻書寫畢動君顔酒中仙一恁酔長安六数盈虚妙自胸中蓄萬事幽傳一掌間不如長酔酒爐􅁁是非潜終日樂堯年喜春来初見綉簾兒外初相見嬌眼頻􅀅恩愛傳滿懐心事総難言天那天教我㡬時圎二同行騰騰共入蘭房内困困相偎不暫􅄐昭君恠道㑹較遅凝眸視猶自眼前飛三小酌金盃頻勸瓊芲醸玉斚氷調荔枝􅄴洛神西子閗濃粧推窓望月色轉囬廊四沐浴烏雲斜挽摘芲鈿素手相􅀅入蘭堂鴛鴦同浴碧池塘桐槽放拂面麝蘭香五並枕星星俊眼横鋪俏馥馥香腮出落嬌纎纎一搦楚宮腰羅襪小無福也難消六交歡情郎耳􅁁低低道渾身春透兩心樂情濃不厭顫聲嬌投到了斜月上芲稍七言盟鴛鴦作對関前世翡翆成双約有期無縁若罷羙夫妻除梦􅂻驚散各東西八曉起隣􅅇吹徹五更歌日色蒼蒼映碧波佳人㣲咲問郎呵睡甚麽􅂯樂些兒箇九梳粧腰肢楊栁凨前瘦腮頰桃芲鏡􅂻羞嬌紅嫰緑付温柔梳粧後仙子下瀛州十叙别一盃别酒強挣捱兩意綢繆觧不開長安得志早㱕来休只待野草蔽庭堦喜春来遣興湖山遣興還詩債杖􅂂尋芳釋悶懐村醪滿酌勸吾儕杯莫側聴和喜春来雲鬟霧鬂鞦韆院翆䄂湘裙鼔吹船錦屏芲帳六橋􅁁真閬􅁐人酔杏芲天三月天外無消息八字峰前不暫􅄐日長人困晚粧宜鸞鏡􅂻和影一􅀟飛金盃滿酌桃芲醸玉斚重斟桂蕋􅄴湘妃西子淡濃粧移画舫来趂芰荷香喜春来􅄐思玉鞭楊栁春凨陌綉轂梨芲夜月堦楚雲湘雨梦陽䑓休分外芲栁暗塵埃兩行帶草連真字四句􅀹雲殢雨詩東凨吹與那人兒他見時知我害相思情傳骨髄難措洗愁灌肌膚怎受持相思􅄐苦総成疾我共你相見一時醫雲慳雨澁歡娱儉雁杳魚沉欝悶添舊愁新恨兩眉攅掩淚眼誰問病懨懨喜春来憶羙湘裙半露金蓮辦錦䄂輕舒玉笋纎粉面宜貼翆芲鈿可喜娘争咲色妍妍不䏻懽會空偷㸔費煞心腸受用眼一囬相見一畨難数步間如隔萬重山一時口強心難強半霎恩情怎敢忘人前強道不思量却是難都在我心腸蜂蝶困歇梨芲梦鶯燕飛迎栁絮凨強移蓮步出簾櫳心緒冗羞見落芲紅喜春来妓情無錢難買蘇卿俏有鈔䏻驅倩女魂粉營芲寨緊關門咱受窘坡撇見錢親元和還徹􅃄芲債亜仙消殘陌栁懐爻槌瓦礶串芲街鴇兒乖只道去休来䡖歌慢舞梨芲院皓齒湘裙栁陌䦨王孫公子買幽歡有餘錢酔臥麗人天有錢得飲葡萄醸無鈔難甞荔枝漿古来多少淡濃粧死偎􅆞結果落空拳喜春来道情扁舟雖小乾坤大活計雖貧受用多世情日月暗消磨青鏡睃黒髪早斑皤今朝有酒今朝酔且盡樽前有限杯回頭滄海盡塵飛日月疾白髪故人稀皮縫執袋腰間掛草結芒鞋脚底踏黄􅐽淡飯一甌茶散誕煞脚到處為家塵寰跳出無牽掛意馬心猿自捉拏藥爐丹竈是生涯得清暇白雪長黄芽喜春来盻望鴛鴦失配誰驚散燕子無双飛興䦨粧頭􅀝做望夫山凝淚眼無語凭䦨干恓惶淚濕鴛鴦枕慘愴香消翡翆衾惱人砌畔促織吟驚夜寢隣院搗寒砧庭槐破梦秋凨撼妾淚聮珠夜雨攙朝雲無計出湘潭休問俺司馬淚青衫眼横秋水双波溜眉聳春山八字愁別来誰伴上粧楼如轉首葉􅀣忽驚秋喜春来春逰芳草地踏青閑翫心神泰杖竹歌謳好快㢤天台路上遇嬌態桃溪畔洞􅂻酒方来二夏賞緑荷池金盃頻勸凉亭上玉斚重斟暑閣􅁁玉人歌舞動笙簧臨画舫拂面芰荷香三秋飲黄芲酒青霄霜降楓林酔白雁南騰􅀣葉飛望逺登髙飲村盃圗画裏沉酔臥東籬四冬吟白雪詩􅅻臨溪畔香先到芲放氷梢雪未消􅀐驢吟過覇􅁜橋凨􅀔􅁖休咲子猷喬喜春来隠居官級一品終為患啇賈千金睡不安傍人休咲許由憨自點檢名利不如閑龍楼辭却無牽掛鳯􅇅登開少恐呀竹籬茅舍是吾家虚名罷學種邵平􅀲沾芲惹草沙中俏付粉施朱咲􅂻刀􅀙今叅破逺芲嬌都罷却結果許由瓢牧羊枉嘆白石爛垂釣休嗟渭水寒雲􅀷虎豹九重關非是懶無意近長安喜春来盻望窄裁衫褃安排瘦淡掃蛾眉准俻愁思君一度一登楼音信乆望㫁楚天秋玉緘巧剪􅀌飛雁􅄐此秋波入逺山佳人忒只盻彫鞍凝眸望猶信到眉尖溪􅁁倦客停蘭棹楼上何人品玉簫哀聲幽怨滿江潮他命薄遣我悶無聊不茶不飯懨懨害不死不活強挣捱相思何日得明白愁似海煩惱早安排喜春来遁迹張良辭漢全身計范蠡㱕湖逺害機樂山樂水兩相宜消息兒今古㡬人知官髙必㝎為身患財廣還湏是已殃許由不受帝堯禅非是憨難買一身閑凌烟閤上功名濫青史書中姓字繁􅄸来省事是山岩逺安長妻子保平康威權大呵災必大仕禄多呵禍㝎多龍顔變了怎䏻躱不如我早觧落魄魄喜春来詩酒人䏻克已終無患事不欺心睡自安損人益已有何難悔後晚天理有循環佳章軟語醒時和白雪陽春酔後歌簮芲泛酒且婆娑開悶鎖㸔破􅁖凨波不因酒困因詩困常􅀍吟魔惱酔魂四峕凨景一閑身雖無甚詩酒樂天真功名􅂯不􅀅身就書劍為朋怎肯休􅄸来兩件可消愁詩共酒酔􅀝仲宣楼喜春来贈㢘能親登華岳悲哀􅀨自布嚢金拯世民滿城都道好官人還自哂朝夕費精神十年不作南柯梦一旦還為西土臣滿城都道好官人還自哂閒殺樂湖春路逢餓殍湏親問道遇流民必細詢滿城都道好官人還自哂鬂􅁁白􅁝新鄊村良善全生命㕓市兇頑破膽心滿城都道好官人還自哂未戮亂朝臣喜春来隠逸無窮名利無窮恨有限有限身也曽附鳯與攀鱗今日省芲鳥一般春一塲􅁖梦凨驚覺依舊壷天日月髙白雲深處結􅇛瓢山更好嵐翆滴林梢一溪􅃄水奩開鏡四野雲山錦簇屏客来沉酔綽然亭無限景不肯就功名拖條藜杖山林下無是無非快活殺王矦卿相不如咱斟玉斚獨賞碧桃芲喜春来傷春梅芲巳有飄零意楊栁􅀅垂嬝娜枝杏芲彷彿露胭脂殘照底青出草芽齊海棠零落空遺恨芍藥芳菲欲㫁魂一年春事又成塵憔悴損消得㡬黄昏可憐沈約腰肢瘦堪嘆潘郎鬂髮秋沈腰潘鬂為芲羞凝思眸緑􅃤更紅愁黄鸝嚦嚦緑楊内紫燕喃喃翆栁枝㝷芳感起乆違思三春裏對景不逢伊喜春来警世翻騰禍患千鍾禄搬載憂愁四馬車浮名薄利待何如乾受苦不如三􅏙菊滿床書掛􅃣已有逍遥志納帶先興慷􅁣機蔵頭不若到山溪興和廢不管一些兒功名千里愁無数晝夜憂思尚有餘吾儂識破早囬車休待阻翻下洛陽衢攛身岩壑安居罷暮鼔晨鍾不聒咱山妻稚子自耘􅀲甘心耍㸔的眼睛芲􅀉生草道情常酔後方何碍不醉時有甚思糟醃兩箇功名字醅渰千古興亡事􅎘埋萬丈虹蜺志不逹時皆咲屈原非但知音盡􅀃陶潜是芲尚有重開日人决無􅂯少年恰情懽春晝紅粧面正情濃夏日双飛燕早情踈秋暮合懽扇武陵溪引入􅀑門關楚陽䑓駕到參羅殿緑珠嬌人無比石崇富禍有餘全家兒老㓜遭誅戮半合兒帑蔵無金玉兩般兒景物傷情緒暗塵埋錦步障邉芲亂蝉鳴金谷園中􅀣形骸随紅塵化功名向青史標七英雄事業真堪咲六豪王踪跡平如掃兩下􅂻争􅀾圗前閙一壁廂淡烟衰草覇王城一壁廂西凨落日髙皇廟􅀉生草遇羙猛見他朱簾下過引的人沒亂煞少一枝楊栁瓶中挿少一串数珠胸前掛少一箇化生兒立在傍壁下人道是章䑓路栁出墙芲我猜做靈山會上活菩薩二情叙恰􅅻箇讀書罷囪兒外誰喚咱元来是嬌娃獨立芲隂下露蒼苔濕透綾波襪靠前来叙􅀃昨宵話我與你金盃打就鳯凰􅁫你與我銀􅁝撚做香羅帕三怕別行􅂻坐􅂻相随趂歡歡喜喜厮問當双双共飲葡萄醸酔熏熏同入銷金帳今朝並枕相歌唱怕怕惜惜搂抱着意中人一千般凄凄凉凉都撮在眉尖上四相思􅀅奴這桃芲面只因他憔悴損不是因惜芲愛月傷春困則是因今春不减前春恨常則是淚珠兒滴盡相思症恨的是綉幃空暖面生寒書房人逺天涯近􅀉生草勸世當時王新室圗江山奪世界磣可可約㝎把君王害不隄防光武依然在二十八宿河山帶􅀐牛奪馬􅂯中興􅀅軍􅀾馬今何在當時韓元帥真箇是名􅀅才漢髙皇捧轂推輪拜九里山十座連雲寨烏江岸覇主無舟載打魚船釣叟賺龍車􅀅軍􅀾馬今何在説起韓元帥曽登拜􅀅䑓把田横赶入東洋海楚重瞳自刎傷殘害吕大后㝎計鋪謀壊想英雄都在土中埋􅀅軍􅀾馬今何在誅董卓英雄􅀅立朝綱逞􅂔槩温侯敢勇人無賽虎牢關三􅀾何曽敗水圍了下邳方生害侯成盗馬也同亡􅀅軍􅀾馬今何在􅀉生草樂酒辭朝去山内居竹籬茅舍柴門户漁樵􅀃到興亡䖏玉堂金屋無心住清凨明月兩閑人和相逢不飲空㱕去衣和禄天付與貧窮富貴前生注鴛鴦遶㝎蒹葭浦鳯凰飛在梧桐􅀣鶴長鳬短㡬曽齊和相逢不飲空㱕去依宫調品鷓鴣掲天擂地鼍皮鼔細腰按盡霓裳曲佳人唱徹黄金􅈁主人􅄏宴出紅粧和相逢不飲空㱕去盃盤列錦綉鋪一樽酒盡青山暮酔㱕錦障逰仙宇梦囬明月鋪南浦滿身芲影倩人扶和相逢不飲空㱕去秋聲盡景物踈飄飄敗葉辭芳􅀣雁聲嘹喨㱕南浦燕知社日辭巢去龍山約慶賞黄芲和相逢不飲空㱕去彤雲布瑞雪鋪朔凨凛冽江天暮浩然㝷得梅芲􅀣退之迷却藍關路子猷訪戴凍回来和相逢不飲