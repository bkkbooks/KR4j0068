front:
  text: 雍熙樂府卷之十二
  hash: sha256:1df077ef21b5f5d1b7d3d8ccf1813defe3d5b44b070120c18671f40dfdfcdf92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_012-1a}
body:
  text: 雙調新水令享賀太平萬方齊賀大明朝樂雍熙披陳禮樂文宰清武臣豪廉幹勤勞無姦佞有忠孝喬牌兒四時節序調普天下盡歡樂聖明君每放徴賢詔將山林隱士招鴈兒落托賴著明君同禹堯聖夀過嵩嶽忠臣通六韜武將知三略挂玉鈎一箇箇義膽忠肝輔聖朝百姓每都安樂訟簡官清減稅徭那明聖帝興王道玉葉榮金枝茂歲應的出現禎祥端的是雨順風調亂栁葉賀廾平萬國萬國來朝聖明君四方四方臨兆普天下黎庶將皇恩報幸喜得崇儒崇儒道攝伏的邊疆邊疆到聖朝壽髙端的是文風廣武倣效太平令群臣每股肱賢良忠孝賀廾平道泰歌謡依節序家家歡樂萬姓每足衣食人欣笑一壁廂舞著唱著賀著賀的是歲稔年豐吉兆豆葉黃攝伏的東虜西戎他每都拱手來朝見如今北狄南蠻歸伏盡剿宫殿風微燕雀髙玉碾金粧光燦瑶階錦重重龍樓鳳閣七弟兄丹墀內擺著衆臣僚見瓊樓玉宇金光罩靜鞭鳴􅏛舉奏簫韶百司官讃祝髙呼噪梅花酒日光出映赭𫀆寶䁀內香燒懸繡幕珠箔列劒戟鎗刀賀吾皇聖夀髙呀敢風雨順四時調百官每受品爵刑稅減少差徭甘露降産嘉苗景星明慶雲飄喜江南呀因此上九重春色醉仙桃詩成珠玉在揮毫征旗不動酒旗搖罷干戈戰討謳歌鼓腹樂陶陶新水令𣑽王宫殿月輪髙碧琉璃瑞煙籠罩香煙雲蓋結諷呪海波潮幡影飄搖諸檀越盡來到駐馬聽法鼓金鐸二月春雷嚮殿角鍾聲佛號半天凨雨灑松稍侯門不許老僧敲紗囱外定有紅娘到害相思饞眼腦見他時須看十分飽沉醉東風惟願存在的人間壽髙亡化的天上逍遙為曽祖父先靈禮佛法僧三寶焚名香暗中禱告則願的梅香休劣夫人休焦犬兒休惡早成就了幽期密約鴈兒落我則道玉天仙離碧霄元來是可意種來清醮小生是多愁多病身怎當他傾國傾城貌得勝令恰便似檀口點櫻桃粉鼻兒倚瓊瑶淡白梨花面輕盈楊栁腰妖嬈滿面兒鋪堆著俏苗條一團兒衠是嬌喬牌兒大師年紀老法座上也凝眺舉名的班首癡呆落覷著法聰頭做磬敲甜水令老的小的村的俏的沒顛沒倒勝似閙元宵稔色人兒他怕人知道看時節泪眼偷瞧拆桂令著小生迷留沒亂心癢難撓哭聲兒似鶯囀喬林淚珠兒似露滴花稍大師也難學把一箇發慈悲臉兒來朦著繫磬的頭陀懊惱添香的行者心焦燭影凨搖香靄雲飄貪看鶯鶯燭滅香消錦上花外像兒凨流青春年少內性兒聰明貫世才學扭揑著身子兒百般做作來往向人前賣㺯他俊俏么篇黃昏這一回白日那一覺囱兒外那會鑊鐸到晚來向書幃裏比及睡著千萬聲長吁怎生捱到曉碧玉簫情引眉稍心緒恁知道愁種心苗情思我猜著暢懊惱響璫璫雲板敲行者又嗥沙彌又哨你須不奪人之好鴛鴦煞有心爭奈無心好多情却𬒳無情惱閙攘了一宵月兒沉鍾兒響雞兒呌唱道是玉人兒歸去的疾好事兒收拾的早道場畢諸僧散了酩子裡各歸家葫蘆提閙到曉五供飬若不是張解元識人多别一箇怎退得干戈排著酒果列著笙歌篆煙微花香細散滿東凨簾幕救丫咱全家禍殷勤呵正禮欽敬呵當合新水令恰才向碧紗囱下畫了雙蛾拂拭了羅衫上粉香浮汚我則將指尖呵輕輕的貼了鈿窩若不是驚覺人呵這其間猶壓繡衾臥么沒查沒利謊僂儸你道我宜梳粧的臉兒吹彈破你那裏休聒不當一箇信口開合知他命福是如何我做一箇夫人也做得過喬木查我相思為他他相思為我從今後兩下相思都較可酬賀間理當酬賀俺母親也好心多攪箏琶他怕我是陪錢貨兩當一便成合據著他舉將除賊也消得家緣過活費了甚一股那便結絲羅休波省人情的妳妳忒慮過恐怕張羅慶宣和門兒外簾兒前將小腳兒那我則見目轉秋波誰想他識空便的靈心兒早瞧破唬的我倒躲鴈兒落荆棘窩怎動那死沒騰無回豁措支刺不對答軟兀刺難存坐得勝令誰承望即即世世老婆婆著鶯鶯做妹妹拜哥哥白茫茫溢起藍橋水不登登點著祅廟火碧澄澄清波撲刺刺將比目魚分破急攘攘因何扢搭的把雙眉鎖納合甜水令我這裡粉頸低垂蛾眉頻蹙芳心無那俺可甚相見話偏多星眼朦朧檀口嗟咨攧窨不過這席面兒暢好是鳴合折桂令他其實的咽不下玉液金波誰承望月底西廂變做了夢裡南柯淚眼偷淹酩子裏揾濕香羅他那裡眼倦開軟癱做一垜我這裏手難擡稱不起肩窩病染沉痾斷然難活則𬒳你送了人呵當甚麼僂儸月上棠海而今煩惱由間可久後思量怎奈何有意訴衷腸爭奈母親側坐成拋躲咫又間如間闊么一杯悶酒尊前過低首無言自推挫不堪醉顔酡可早嫌玻璃盞大從因我酒上心來覺可喬牌貌老夫人轉關兒沒定奪啞謎兒怎猜破黑閣落甜話兒將人和請將來著人不快活江兒水佳人自來多命薄秀才每從來懦悶殺沒頭鵝撇下陪錢貨下場頭那答兒發付我殿前歡恰才箇笑呵呵都做了江州司馬淚痕多若不是一封書將半萬賊兵破俺一家兒怎得存活他不想結婚姻想甚麼到如今難著莫老夫人慌到有天來大當日箇成也是母親今日箇敗也是恁箇蕭何離亭宴帶歇拍煞從今後玉容寂寞梨花朵胭脂淺淡櫻桃顆這相思何時是可昏登登黑海深白茫茫陸地厚碧悠悠青天闊太行山般髙仰望東洋海般深思渴毒害的恁麼俺娘呵將顫巍巍雙頭花蕊搓香馥馥縷帶同心割長捖捖連理瓊枝挫白頭娘不負荷青春女成耽閣將俺那錦片也似前程蹬脫俺娘把甜話兒落空了他虛名兒誤賺了我新水令晚凨寒峭透囱紗控金鈎繡簾不挂門闌凝暮靄樓角斂殘霞恰對菱花樓上晚粧罷駐馬聽不近喧譁嫩緑池塘藏睡鴨自然幽雅淡黃楊栁帶棲雅金蓮蹴損牡丹芽玉簮􅎲住荼䕷架夜涼苔徑滑露珠兒濕透綾波襪喬牌兒自從那日𥘉時想月華捱一刻似一夏栁稍斜日遲遲下好教賢聖打攪箏琶打扮的身子乍準􅍯著雲雨會巫峽只為這燕侣鶯儔鎖不住心猿意馬因姐姐閉月羞花真假這其間性兒難按納一地裏胡孥沉醉東凨我則道槐影凨搖暮雅元來是玉人兒帽側烏紗一箇潛身在曲檻邊一箇背立在湖山下那裏敘寒溫並不曽答話便做道摟得慌呵也索覷咱多管是餓的你箇窮酸眼花喬牌兒你看那淡雲籠月華似絳𥿄護銀蠟栁絲花朵垂簾下緑莎茵鋪繡榻甜水令良夜迢迢間庭寂靜花枝低亞他是箇女孩兒家你須索性兒溫存話兒摩㺯意兒謙洽休猜做敗栁殘花拆桂令他是箇嬌滴滴美玉無瑕粉臉生春雲鬢堆雅似這般受怕擔驚又不圗甚浪酒間茶則你那夾𬒳兒時當奮發指頭兒告了銷乏打疊起嗟呀畢罷了牽挂收拾了憂愁準備著撑撻錦上花為甚媒人心無驚怕赤緊夫妻每意不爭差我這裡躡足潛蹤悄地聽咱一箇羞慚一箇怒發張生無一言呀鶯鶯變了卦一箇悄悄冥冥一箇絮絮答答却早禁住隋何迸住陸賈義手躬身粧聾做啞清江引沒人處則會間磕牙就裏多姦詐怎想湖山邊不記西廂下香美娘處分破花木瓜鴈兒落不是俺一家兒喬作衙説幾句衷腸話我則道你文學海樣深誰知你色膽天來大得勝令誰著你夤夜入人家非姦做賊拏你是箇折桂客倒做了偷花漢不想你跳龍門學騙馬謝姐姐賢逹看我面逐情罷若官司詳察張生呵準􅍯著精皮膚喫頓兒打離亭宴帶歇拍煞再休題春宵一刻千金價準僃著寒囱更守十年寡猜詩謎的社家􆁚拍了迎凨户半開山障了隔墻花影動緑慘了待月西廂下你將何郎傅粉搽他自把張敞眉兒畫強凨情惜大晴乾了尤雲殢雨心悔過了竊玉偷香膽刪抹了倚翠偎紅話淫詞兒早則休簡帖兒從今罷尚兀自參不透凨流調法從今後悔罪也卓文君你與我遊學波漢司馬新水令望蒲東蕭寺暮雲遮慘離情半林黃葉馬遲人意懶凨急鴈行斜離恨重疊破題兒第一夜步步嬌昨夜箇翠𬒳香濃薰蘭麝欹珊枕把身軀兒趄臉兒厮揾者仔細端詳可憎的別鋪雲鬢玉梳斜恰便似半吐𥘉生月落梅花旅館欹單枕蛩吟鳴四野助人愁的𥿄囱兒凨劣乍孤眠𬒳兒薄又怯冷清清幾時溫熱喬木查走荒郊曠野把不住心嬌怯喘吁吁難將兩氣接疾忙趕上者打草驚蛇攪箏琶他把我心腸兒扯因此上不避路途賖瞞過這能拘管的夫人穩住俺厮攢的侍妾想著他臨上馬痛傷嗟哭的我一似癡呆不是我心邪自別離已後到日𥘉斜愁的來陡峻瘦的來唓嗻剛離得半箇日頭可又早寬掩過翠裙三四褶誰曽經恁般磨滅錦上花有限姻緣方才寧貼無奈功名使人離缺害不了的愁懷恰才較些撇不下的相思如今又也清霜浸碧波白露下黃葉下下髙髙道路曲折四野凨來左右亂踅我這裏奔馳他何處困歇清江引呆答孩店房兒沒話説悶對如年夜暮雨催寒蛩曉凨吹殘月今宵酒醒何處也慶宣和是人呵疾忙快分説是鬼呵合速滅聽説罷將香羅袖兒拽却元來是姐姐喬牌兒你為人須為徹將衣𬒮不顧藉繡鞋兒露水泥沾惹腳心兒管踏破也甜水令想著你廢寢忘餐香消玉減花開花謝猶自較爭些枕冷衾寒鳳隻鸞孤月圎雲遮尋思來有甚傷嗟折桂令想人生最苦離別可憐見千里關山獨自跋涉似這般割肚牽腸到不如義斷恩絶雖然是一時間花殘月缺休猜做瓶墜簮折不戀豪傑不羡驕奢自願的生則同衾死則同穴水仙子硬圍著普救寺下鍬钁強當住咽喉仗劍鉞賊心腸饞眼腦天生的劣休言語靠後些杜將軍他是英傑覷一覷為了醢醬指一指化做醟血騎著匹白馬來也鴈兒落緑依依墻髙栁半遮靜悄悄門掩清秋夜踈刺刺林梢落葉凨昏慘慘雲際穿囱月得勝令驚覺我的是顫巍巍竹影走龍蛇虛飄飄莊周夢蝴蝶絮叨叨促織無休歇韻攸攸砧聲兒不斷絶痛煞煞傷別急煎煎好夢兒應難捨冷清清咨嗟嬌滴滴玉人兒何處也鴛鴦煞栁絲長咫尺情牽惹水聲幽倣佛人嗚咽斜月殘燈半明不滅暢道是舊恨連綿新愁鬱結恨塞離愁滿肺腑難淘瀉除𥿄筆代喉舌千種相思對誰説絡絲娘都自為一官半職阻隔的千山萬水新水令玉鞭驕馬出皇都暢凨流玉堂人物今朝三品職昨夜一寒儒御筆親除將名姓翰林注駐馬聽張珙如愚酬志了三尺龍泉萬卷書鶯鶯有福穩情了五花官誥七香車身榮難忘借僧居愁來由記題詩處從應舉夢魂兒不離了蒲東路喬牌兒我這裡謹躬身問起居老夫人慈色為誰怒我則見􆁞鬟使數的厮行覷莫不是我身邊有些事故鴈兒落若説著絲鞭仕女圖端的是塞滿了章臺路小生向此間懷舊恩我怎肯別處尋親去得勝令豈不聞君子斷其𥘉我難忘有恩處那一箇賊畜生行嫉妬走將來夫人行厮間阻不能得嬌姝早共晚使心術説來的忒無徒遲和疾上木驢喬木查妾前來拜覆省可裏心頭怒間別來安樂否你那新夫人在何處居比俺姐姐何如慶東園糞堆上長出連枝樹淤泥裡生出比目魚不明白展汚了姻緣簿鶯鶯呵你嫁了箇油煠的猢猻丈夫紅娘呵你扶侍著箇煙薰的貓兒姐夫張生呵我撞著箇水浸的老鼠姨夫他這厮壞了凨俗傷了時務攪箏琶小生若求了新婦目下便身殂怎忘了待月回廊難撇下吹簫伴侣受了些活地獄下了些死工夫不甫能得做妻夫我將那夫人的官誥縣君的名目怎生待歡天喜地兩隻手分付與剗地到把人粧誣沉醉東凨不見時準僃著千言萬語得相逢都變做短嘆長吁他急攘攘恰到來我羞答答如何覷將腹中愁恰伸訴及至相逢一句無剛道箇先生萬福落梅凨從離了蒲東路來到這京兆府見他影兒的教他滅門絶户甜水令君瑞先生不索躊躇何須憂慮那厮本意忒糊突俺家世清白祖宗賢良相國名譽我怎肯在他根前寄簡傳書折桂令那喫喬才怕不口裏嚼蛆那厮可便數黑