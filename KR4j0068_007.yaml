運退雪滚湯煎尾聲本分的天可憐困窮的守自然豈知天意如車轉有一日運至時來那時節顯粉蝶兒逰赤壁十月之𥘉步雪堂孟冬時序臨臯二客從豫過黃泥木葉脫滿天霜露人影糢糊向青天仰觀蟾兔醉春風顧樂以行歌相酬還嘆取今夜箇有佳賔無酒更無肴真箇是苦苦月朗風清好天良夜怎生虛負紅繡鞋有客語停舟薄暮栁隂中舉網得魚細鱗巨口狀如鱸山妻藏斗酒專以待供需因此上赤壁逰重吊古普天樂雪山傾洪濤怒山髙月小水落石出江流半夜聲斷岸千餘處日月攛梭飛烏兔玩江山不可重復踞虎狼險窟登虬龍禹闕舉雕鶚巢居耍孩兒劃然長嘯潯陽路草木動山鳴應谷悄而悲肅而恐凛而呼放中流煙水糢糊半江洶湧波濤怒四顧寂寥人影孤適有孤鶴橫江去衣如玄縞翅若輪車二煞長鳴三兩聲髙飛二里餘須臾一夢神仙遇臨臯之下揖而語赤壁之逰樂矣乎問名字留不住俯而不答能以鳴呼尾聲疇昔之夜終飛鳴過我居道士顧笑豫驚悟開户觀之不知汝粉蝶兒思怨這些時浪靜風恬再不去喚官身題名兒差占直睡到上紗囱紅日淹淹從今後管家私學針指罷了花濃酒釅一會暗搯春纎我這裡數歸期故人作念醉春風舊約信難慿新愁眉帶臉落紅滿地不鈎簾把朱扉掩掩怕對菱花照人憔悴不似我舊時嬌艷迎仙客靈鵲兒噪緑槐喜蛛兒挂在垂簷不由我腮斗上喜孜孜堆著笑臉這書寫時節帶著些愁眉封時節秋淚粘折開封皮仔細觀瞻我與你一字字從頭兒念石榴花原來這負心的真箇不中粘想當𥘉啜賺我話兒甜則好去破窯中捱風雪受虀鹽那時節謙廉君子謙謙疾發的赴科場才把鰲頭占風塵行不待占粘如今這七香車五花誥無慿驗到做了脫擔兩頭尖閗鵪鶉則有分淚眼愁眉無福受金花翆鈿我這裡按不住長吁揾不乾淚點誰承望你半路裡將人來死拋閃恩情似水底鹽到罵我路栁墻花顧不的桃腮杏臉上小樓也是我前世裡沒緣也是我今世裡少欠疾發的他應舉求官獨步青霄折桂扳蟾受了些老母嚴女伴每􅥦何曽心厭兀的不虧負了小卿雙漸么有一日見了他我和他便有甚臉若見俺那負德辜恩短命喬才敢吃我會摑打揪撏見放著海神廟有報應爺爺靈驗看你這負心賊恁般短見十二月這厮把鶯花來熱粘俺娘將財禮錢忙拈你道是先憂後喜我看你有苦無甜請學士先生吊膁快疾忙歸去陶潛堯民歌使了些精銀夯鈔買人嫌把這厮剔了髓挑了筋剮了肉不傷廉我從針頭線角不曽拈我子會傅粉施朱對粧奩心嚴財錢信口添著這厮吃我會荒劍耍孩兒俺伴的是風流俊俏潘安臉怎覷那向日頭的獾兒嘴臉喬趨蹌宜舞一張掀怎和他送春情眼角眉尖我心裡不愛他心裏愛正是家菜不甜野菜甜覷不的喬鋪苫看了他村村棒棒怎和他等等潛潛二煞你休誇七步才連敢道三箇鹽九江絶品三江瀲倚仗你馮魁茶引三千廣強把蘇卿熱似粘眼見的泥中陷赤緊的販茶客富更和這愛鈔娘嚴尾聲往常時一迷裡嫌到今日都是諂汝陽齋眼見撅下坑塹不隄防腦背後將咱這一閃粉蝶兒省悟殢雨尤雲半生狂不依本分慣得來忒逞精神折莫是翠紅鄉脂粉隊更合著栁營花陳占斷芳春但題著箇頂老兒便就心順醉春風常子是眼兒裏恰相傳意兒中却早肯蹅踏的秦樓謝館美風塵相隨得緊緊成就了不一處的萬種恩情做慣了難記數的千場子弟結下了無打算的百年緣分紅繡鞋到如今悔去也言而有信看來也往事休論恰便似一枕黃粱夢醒人你如今樂仙家千載夀飬丹竈四時春想著那戀鶯花何太蠢石榴花你為甚錦營中參透要修真赤緊的别是箇俏家門怕不待清歌妙舞醉紅裙你便是出衆超羣也索著昏子𬒳他鴛鴦債的心先悶撥換得幾星兒剩雨殘雲直熬的形骸坎壈頭旋暈抵多少拍拍滿腔春閗鵪鶉怎如你修煉的一粒丹成保守的千年夀穩你也曽口內親傳心中自忖這玄妙從來有定準休將説謊話云和合的真汞成形便是你真鉛報本上小樓看了那愚迷世人他怎肯安心守分都子待賽逞風情枉用心機強打精神不隄防腦後門𫾣箇昏筋輸力盡我看那推磨的小哥每困也不困么那其間悔後遲思後恨直待的骨節酸麻眼腦迷稀鬢髮紛紜若還是瘦損形疾在身他又將行貨來打襯你看那海神仙恨也不恨耍孩兒既參知便索從今認休等得恁時節遭他那一窘你將這藥爐丹鼎再新修直看那紫金丹寶氣沖雲抽將坎內陽鉛出合得離宫隂汞均也不索三車運不須那風波猛烮只要這火候調勻尾聲既得了黍珠般一粒丹急將來華池中滿口吞這的是神仙自有神仙分那其間將你這折栁扳花的方才證得本粉蝶兒四時享樂明媚春光遍園林萬花爭向舞蹁躚蝶粉蜂黃栁拖煙桃噴火東風飄蕩春景非常一處處管絃嘹喨醉春風仕女撥銀箏逰人捧玉觴牡丹亭畔笑喧呼喜孜孜攘攘燕語梁間鶯啼栁外鳬眠沙上呌聲回首又端陽向日葵花放馥馥薰風遞荷香剔銀燈梔子開恰便似玉粧榴花吐有如猩綘我在這紫藤席珊瑚枕青紗帳我恰才夢𥘉回浴罷了蘭湯我恰向涼亭上水閣傍揮羽扇晚風清最爽蔓菁菜屈指早金風蕩梧葉兒嚮銀床南樓外鴈翔正遇著蟹壯雞肥菊𥘉放尋幾箇知心友同歡暢快活三荷盡應無雨蓋張菊殘尚有傲嚴霜一年好景莫相忘又冬月堪酬賞鮑老兒隴畔寒梅送暗香折取在瓶中放天上瓊花呈瑞祥亂舞在空中降恰便似撏綿扯絮堆鹽撒粉鶴羽翺翔藏山壓樹期梅折竹宿麥遺蝗尾聲四時景物喜百年福祿昌妻賢子孝應無恙代代相傳樂榮享粉蝶兒仗義踈財這幾日間坐在山營猛聽得喚一聲李山兒急忙答應我將這加鋼斧磨得來耀日爭明遮莫是差咱去探官軍劫牢獄救人之命我怎敢消停忙把這茜紅巾額顱上拴定醉