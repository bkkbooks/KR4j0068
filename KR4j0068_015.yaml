front:
  text: 雍熙樂府卷之十五前集
  hash: sha256:911c39227e67611b364f83c74317d5ab7c969a9ed256fb13605d921a40021d48
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_015-1a}
body:
  text: 大石調摧拍子楊妃明皇且休催花栁束舞衣特差時候艷陽晴晝出世間未夏至春歸宫內巳緑肥紅瘦錦圍依舊施逞盡窈窕馳騁妖嬈醖釀凨流倘遲他後若存謹意降人貽福厚但舉別心折人陽夀若思胡種向蒙寵愛始信私情不論妍醜夜連明枕鴛衾繡么雲雨懶收歡娛未休當日把玳筵排就按梁州羯鼓髙明習水調玉笛齊奏酒擎纎手絳唇頻吸粉面雙熏醉目暈重榴軟紅心耨杏花包暖小桃春重楊栁情嬌荔枝香透翆鬟偏軃玉肩斜倚星眼微朦黛眉輕皺忍教奉世人箕帚尾年小三郎雖能勾休倚著帝王福厚這種恩情要人消受玉翼蟬煞逰月宫似仙闕若帝居截斷青宵路至近也重規見龍樓共雉宇上瑶階欲侵朱户猛驚御聽一人大呌呼清似雷霆怒壯貌魁梧有一千般歹閗處氣昻昻九尺來彪􅥟么總威嚴結束覷絶時教人怕怖披副黃金凱甲穿領蜀錦征服龍皮干跨鳯翅金盔纓亂拂么緊控著弓鏃順挂著昆吾帶束著素玉靴穿著抹緑走向前來覷著君主搠㝎那柄短頭輕的金月斧尾這許來大蟾宫是神仙府須不同恁那塵世皇都惹早晚行沙待那裡去好觀音怨恨先自相逢同歡偶天妨礙燕侣鶯儔並同肩共携手恩情厚夫婦般相看的好么打聽的新來迷歌酒凨聞的別染著箇嬌羞棄舊憐新自來有鐵心腸金不想些兒舊尾薄幸虧人難禁受想著那樽前席上捻色凨流不良殺教人下不得呪念奴嬌大江逝水攸攸萬頃茫茫東去不息浪激汀沙淘盡千古凨流人物聞説道西邉嵬嵬赤壁故城石壘舊三國人何在山髙月小水落石出燈月交輝昨宵夢覺聽門外珍珠灑漸覺無聲墜萬家對良辰爭似我曉來時推起囪紗歡笑處説些情話休歸去那雪兒揚揚的正下喜梧桐冬景佳堪圗畫我則見遍滿長空瑞雪紛紛下好向暖閣紅爐泛流霞一色瓊瑶萬樹林梢挂踏雪沽酒添髙價尾樓臺粉砌迷鴛瓦聽撒撒更敲囪打美酒羊羔勝飲茶念奴嬌謅梅香翰林凨月驚飛幽鳥蕩殘紅撲簌簌胭脂零落門掩蒼苔書院悄潤破𥿄囪瞧則為一操瑶琴一畨相見又不曽道間期約多情多緒等間肌骨如削六國朝這生不思獻賦不想題橋那卓氏女本無情把漢相如乾病倒教先生善服湯藥把貴體和調教解元苦志攻經史休把文章墮省可裡胡云漢語誰教伊夢斷魂勞若足下病沉時將艾焙燒怕哥哥告殂時著火葬了𥘉問口先輩顛狂枉惹的吾儕笑休學尾生呆改盡顔回樂未能薦枕席便想同棺槨只慕夜偷期不計朝聞道歸塞北年紀小有誰到青霄有一日名挂在白玉樓前龍虎榜少甚麼碧桃花下鳯鸞交早挣揣束帶立于朝雁過南樓他那不犯觸厖兒變了想我耐搶白臉兒難描他不鄧鄧怒怎消我可丕丕心頭跳手共腳滴羞滴些不知顛倒忙哀告膝跪著硬打挣剛陪笑送了他干相思洛陽年少六國朝梅香嗏省閙小姐咷休焦你那物件要歸著打睃這東西尋下落這的是先相國深宅院他怎把小姐般調小姐是未出嫁閨中女怎敢把淫詞戲謔至如那凨火夫人性緊我將汙家門罪犯難招請使長快疾行教股肱喫頓拷喜秋凨虧你可也用工描筒兒蒲棒剪稻却不見無心草恁的般好門庭到大來惹人笑我將著這𬗋香囊待走向夫人行告女孩兒甚為作歸塞北請放手奴婢行告擔饒你却不啜賺我櫻桃樊素口他怎敢湯著楊栁小蠻腰却也輪到我粧么怨别離梅香今日有功勞小機關完備了親學情詞揣著吟藥呀那裡不見了這箇不了事理才料可原來在手裡拏著歸塞北這東帖兒樣小見甚景象把香燒不爭你箇狂奴攻心參尺素却不學文王下馬拜荆條見娘書信却看喬淨瓶兒他想著書舍裡情瀟灑可便似陽臺上路迢遙他待收拾雲雨泄露春嬌待和今宵到舌天上又咽了不説破把先生見悶著教對你低低道教你夜深時休睡等睡等到明朝好觀音上覆你箇氣咽無緣張京兆填還你枕剩衾薄帽光光過此宵恰晌午怎盻日頭落不曽見這急色的才料煞尾你聽的樓頭鼓鼕鼕將黃昏報夫人睡著宅院蕭條韻攸攸聲揭譙樓品畫角嚮璫璫水滴銅壷玉漏敲刷刷的凨颭芭蕉鳯尾搖厭厭的月上花梢挂影髙悄悄的私出蘭堂離繡幄擦擦的轉過闌干上甬道霍霍的揭動朱簾時你等著剝剝的彈嚮囪櫺時癡癡的俺來了念奴嬌園林雨過漸歇梨花點點飄零香雪旅館蕭條人靜悄無奈春愁索結燕子來時海棠開後值著清明節羅衫𥘉試淚痕無限重疊六國朝三兮春色迅指俱絶看滿地落紅是離人彈的淚血覽鏡驚憔悴頓覺全别又不是交戰的相思病又不是酒灌的長庚怯都則是鸞孤鳯隻致令的蝶怨蜂嗟兮古鏡甚時圎斷離絃何日接喜秋凨愁萬端腸千結此情甚日徹白玉樓逺接神仙闕彩雲迷鳯臺月歸塞北怕不待將心事説爭奈路途賖情密忍看花底燕病深非為酒中蛇無語痛傷嗟好觀音煞羅帶停兮鴛鴦結鱗鴻水隔山截攻不破愁城盡力撅填不滿的愁坑甚日歇若將那欲不斷的連枝樹再接恰將那擔不動的相思擔兒卸念奴嬌氷肌勝雪鬢鬟髙一抹烏雲疊畫堂生香人靜悄正是摴蒱時節對擁紅爐髙燒銀蠟耳畔低低説今宵睡者待兮箇勝負方歇六國朝梅梢馥郁月影橫斜玉笋不知寒牙籌相接六擲兮紅黑點點俱别慷慨懷別敵常慕此英傑金蘭芙蓉間隔桃花栁葉重疊休臨老入花叢趂青春先去折歸塞北香燼也舒與美人些旋剖金橙消因歇滿斟美釀戰寒邪樓鼓二更絶好觀音煞錦帳髙懸幃屏列玉娉婷左右闌遮三寸金蓮赱不迭一顆櫻桃笑不絶把來日歡娛約下者喚梅香忙把銀燈欵吹滅六國朝祥光縈繞瑞靄飄颻仙樂奏鳯鸞吟繡簾開宫殿曉正值重陽到𬗋菊香飄祝夀嵩呼早良時歡會好丹臺進瓊漿玉液瑶池獻碧藕蟠桃仙掌露華清那洞天秋月皎喜江南瞻仰著蓬萊島輝輝的南極下雲霄玉女逺臨懸寶蓋金仙遙降跨黃鶴旌節錦招搖𥘉問口獻這丹房內九轉黃芽都是長生之藥更看那採芝人穩步雲霞嶠白􅎷隨玄猿笑喚山童手捧靈龜到當相會八仙九老夀星歡欣也同宴樂我則見翆柏蒼松山圍繞金殿角兀良瑞靄祥雲籠罩了喜江南瞻天表樂振響琅璈金籙永傳千歲久彩輿先把七員􅌽共會飲香醪公將這長生寶化域樂陶陶中嶽山呼來慶喜九天一派奏簫韶福祿夀山髙雁過南樓香馥郁金爐裊裊響錚鏦玉漏迢迢添百刻日影長發千枝花敷蕚正清秋雨霄天道他那裏足躡著彩鳯行手撫著蒼龍笑霎時間下天闕八仙來到摧花樂那神仙撒開象板舞藍𫀆有一箇手握丹符掌擎珍寶有一箇緑鬢紅顔名姓髙有一箇皓首龎眉常不老喜江南有一箇捧一顆靈丹藥穿一領𬗋霞綃有一箇袖青蛇逰閬苑有一箇手携鐵拐赴蟠桃他都把玉皇朝淨瓶兒神仙每祝夀如山嶽增福夀等天髙光華海宇散誕逍遙常教喜共樂千歲安康德行昭光燦燦南極照享恩榮琴瑟永和調玉翼蟬煞夀山福海仙果仙殽寶殿瑶階朱樓畫閣金杯玉爵仙真共酌靈芝瑞草長生不老神烏喜鵲音和韻巧黃精自斫玄霜慢搗青松滿壑白雲不掃花錦繡月瓊瑶鳴玉珮擁金貂時可喜景堪描遙望著鶴馭鸞驂雉扇電旌龍池鳯沼俺這裡祝夀聲髙只碩得永不老的芳容千歲保六國朝凨吹羊角雪剪鵝毛飛六出海山白凍一壷天地老舉目觀琳琅巧筆難描仰面瞻天表青山似粉掃幽囪下寒敲竹葉前村外冷壓梅梢我則見山畔野雲低遙觀雪片小歸塞北莫不是春歸早却怎生蝶翅舞飄飄梅蕊粉填合滿長安道栁花綿迷却霸陵橋山館酒旗搖𥘉問口見那捕漁叟蓑笠輪竿他向那寒江獨釣和俺這採樵人迷却歸來道凍鵲又飛寒鴉又噪古木林中驀聽的山猿呌怨别離園林無處不蕭條春歸也猶未覺滿地梨花無人掃寒料峭遙望見那一點青山早不見了歸塞北白雲島孤鬼吼荒郊九天玉女驅馳造化六丁神仗劍斬長蛟就地捲凨濤么孤村曉稚子道猶自月明髙玉女剪氷寒不散黑龍噴雨凍難消何處覔漁樵雁過南樓我則見凍剝剝的一行老小戰欽欽的四體頻搖一箇骨聳著肩一箇拳攣著腳正值揚凨攪雪的這天道我則見兒扯㝎老父悲父對著孩兒道説道喫飯處霎時間行到六國朝早是這朔凨凛冽途路迢遙我則見三箇人丕人丕的走將來呌可怎生撲生撲的都凍倒用手忙扶策緊揝住頭稍軟兀刺的身軀倒我則見刺逹了手腳我榖穀的將衣襟解放攸攸的魄散魂消救的這箇心坎兒上恰溫和那一箇早把牙關緊噤了歸塞北過了這條抄直道那裡一橫澗答一橫橋白茫茫雪迷山崖角淡濛濛霧鎖􅋄團瓢松檜一周遭擂鼓體那先生浩歌拍手舞黃鶴他住在瑶池閬苑十洲三島一曲長笛秋氣髙數著殘棋江月曉歸塞北他服的長生藥不許恁世人學三㺯琴聲彈落葉九重春色醉蟠桃白日上青霄淨瓶兒那先生一雙手搖山嶽一對眼矁邪妖劍揮星斗胸捲江濤難學則他那惡像貌伏虎降龍德行髙恰似箇活神道他也曽跨蒼龍把玉皇朝玉翼蟬煞那先生自歌自舞飲仙酒喫仙桃草舍茅菴煞強如蘭堂畫閣白雲不掃蒼松不老青山圍繞淡煙籠罩崎嶇古道凹凸岩壑門無綽屑洞無鎖鑰香焚石卓笛吹古調雲黯黯水迢迢凨凛凛雪飄飄柴門閉竹籬髙檜柏青松踈竹寒梅瑞􅋄靈芝峻嶺巔峯遙望見幽雅仙莊休錯去了六國朝楊妃勒死那裡問衣粧帶緊首飾􅖳華將素體立驅翻把咽喉生勒塌折挫了傾城色改變盡鼻凹及竟得如雲鬢鬆了紺髮偏旖旎形骸偃臥忒溫柔手足掿搓止不過是昭陽殿裡受深恩怎下的教馬嵬坡生勒殺歸塞北傳宣處徉與箇恕容加將帥本無嚴號令君王敕賜重刑罰因你是禍根芽么髙力士好歹寡人差親厚更誰親似我愛來那箇愛如他故意兒咱家尾怨氣的娘娘身亡化更教千軍萬馬蹅踏到免了臨時惡驚怕六國朝收心長江浪險平地凨恬恨世態栁顰眉順人情花笑靨烏兔東西急白髮重添寒暑往來侵朱顔退染穿花蝶愁扃緑鎖營巢燕恨簌朱簾蝶入夢魂潛燕經秋社閃摧拍子拜辭了桃腮杏臉追逐回雪鬢霜髯死灰絶焰腹難容曩日杯盤身怎跳而今坑塹去奢就儉六橋雲錦十里凨花慶賞無厭四時獨占花溪信馬蓮浦乘舟菊綻霜嚴雪殘梅塹烏呼人至鶴送猿迎酒肴隨兮費用從廉就清流洗痕濯玷么煙花簿斂凨塵戶掩再誰曽掣關抽店儘亜仙嫁了元和由蘇氏放翻雙漸罷思絶念忘却舊逰魔女魂香野狐涎甜覺來有驗抽箱羅帕倒袋香囊將俺拘鉗做科撒犯浮花浪蕊賸馥殘膏你能搽抹誰敢粘沾倒榻鬼賴人支㼭歸塞北呆嬌艷自要苦懨懨覔見銀山無採取尋著錢樹不揪撏典賣盡粧奩尾零替了家私怕搜檢缺少了些人情我應點倩瞞兒出尖誰負債拏著我還欠小石調青杏子媾歡楊妃和氣擁衾禱醉魂如蝶夢攸攸芳心不耐東凨耨香溫玉暖煙融粉聚緑慘紅愁歸塞北味清厚眉皺不勝愁蓓蕾小桃增曉媚褪苞纖栁舞春柔不放彩雲收么春色透時復閉星眸舌咂半尖香噴噴乳捫雙顆軟耨耨無物比凨流好觀音赤摟㝎明皇低聲兒奏似𥘉聞嬌囀鶯喉越遣君王戀未休道聖夀綿綿萬年久省可裡勞尊候隨煞天子道娘娘休虛謬譬如怕寡人生受把似你描不成畫不就青杏子鞦韆深院那人家戲鞦韆語笑喧譁綺羅間簇人如畫玉纎髙舉綵繩輕掣畫板雙蹅歸塞北鈎索響時聽勻咿啞翆帶舞低凨外栁絳裙驚落雨前霞拂綻樹頭花好觀音有似飛仙驂雲駕金翅軃寶髻偏雅嬌軟腰肢足可誇渾疑是力向東凨暫假隨煞不管愁人停驕馬粉墻外似隔天涯兮明望見他困立在垂絲海棠下青杏子詠雪空外六花翻𬒳大凨撒落千山窮冬節物偏宜晚凍凝沼沚寒侵帳幕冷濕闌干歸塞北貂裘客嘉慶捲簾看好景