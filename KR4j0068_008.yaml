front:
  text: 雍熈樂府卷之八
  hash: sha256:cf3fef630effde806cb852fba11c2347f5a51f1cae4f19afea06a623394a84c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_008-1a}
body:
  text: 南吕宮一枝花燈詞皇都錦繡城江左繁華地累朝天子闕萬載帝王基水秀山竒百姓多豪貴庄農禾稼齊幸遇着盛世明時端的是豊年稔歲梁州喜泥牛碎鴻鈞氣轉碧天輪斗柄寅回鳳城元夜堪人意一輪寳鑑萬顆星垂燈光相映月色相随燈和月上下光輝月和燈来徃相宜遍皇都錦樹花開遶鳳闕金蓮放蕋滿城池銀燦琉璃這壁那壁家家䖏䖏排羅綺燈和月兩相對勝似蓬莱圗畫裡堪賞堪題罵玉郎元宵賞翫排筵㑹斟緑蟻飲金盃燈光影裡香風細擡金錢才子行閑逰翫仕女随㸔社火佳人立感皇恩呀鼓樂如雷絃管聲齊一壁廂躧着髙橇一壁廂踏着迓鼓一壁廂舞着白旗更有那八仙過海更有那四聖朝西鰲山上畫燈明照華夷採茶歌咲吟吟手相携慢騰騰歩輕移相呼相喚不相逼漸漸東方分曙色㸔㸔月落衆星稀尾聲五更禁鼓都休擂三㺯梅花且休吹豊稔元宵太平日千邦来進禮萬國来慶喜萬萬載中華大明國一枝花武臣擎天架海梁祐國安邦将錦𫀆銀鎻鎧金印碧油幢神表堂堂諳地裏觀乾象受皇恩𬒳寵光典三軍返琚投壷安萬姓謳謌擊壌梁州驅虎豹威風凛凛擁貔貅豪氣昻昻坐施行政中軍帳弓彎秋月劍掣寒霜營安細栁獵從長楊撲鼕鼕鼓擂花鞚卜刺刺馬驟沙塲按着那六韜書亂紛紛竒正旋環施逞那三畧法閙炒炒縦横擾攘展開那五方旗卒律律上下攸揚逺方近方人都道羽林星宿從天降施愷悌萬人望名注金縢姓字香萬代輝光尾聲箎塤迭奏誠堪賞文武兼齊普賛揚當日箇徳行如雲過顔巷使蓬門有光斯文道長自嘆不遇英賢鎮長想一枝花十面埋伏統三軍将帥能托賴着萬萬歲君王徳有千貟英勇将掌着這八面虎狼威撾鼓奪旗有十面埋伏智将一箇楚重瞳相戦敵一片心保護江山兩隻手扶着社稷梁州施妙策經綸天地六韜書輔佐華夷但行兵托賴着當今帝人如猛獸馬似狻猊旗開得勝馬到成功論英雄端的誰及這軍兵世上無敵俺俺俺明晃晃宻排着斧鉞鎗刀寒凛凛齊列着戈矛劍㦸古刺刺風颭動號帶征旗相持對壘将一箇楚重瞳困在那垓心内雄糾糾大軍勢鉄桶軍圍数十里有翅難飛牧羊関非是我能争戦是吾皇有聖德恢宇宙洪福天齊因此上馬壮兵強安邦定國兵臨處皆拱手馬到處納降旗取城郭三千座展江山十萬里罵王郎官軍各自施才智顯武藝逞雄威都子要赤心保護當今帝王陵你鎮守西周勃守着正北灌嬰守着這東南地感皇恩呀四下裏呐喊揺旗楚重瞳将少兵微漢髙皇順天心楚重瞳逆道理仁聖主應天機苦争戦扵家為國厮殺相持将敵兵如浮草盡皆遺採茶歌楚重瞳一時虧漢髙皇掌華夷保護的家邦安穏勝磐石得勝也喜孜孜鞭𫾣金鐙嚮咲吟吟齊唱凱歌囬尾聲若㱕西漢無拘繫晝夜追随不可遅将着勁兵帶着䡖器見如今子嬰㓕矣覇王命虧普天下罷戦無争萬民喜一枝花榮貴官居八輔臣禄享千鍾近功存遺百世名播萬千春極禮亨純惟治國安邦論用調鼎鼐新持義莭率忠貞都則待報主施恩秉賢烈慿直正也則是懲清化民梁州獲聲譽軆的是那漢汲黯丹書清史取清名訪的是唐魏徴汗簡標勲端的是振綱常尊倫理行仁信所以上平和天下寜静了乾坤八蠻拱手四夷調均一箇箇氣冲𨳩牛斗星辰一箇箇志髙接太華風雲一箇箇似臯陶伊尹的形蔵一箇箇揣吕望張良的䇿論文武功一箇箇比蕭何李靖的忠勲都子挺身報君保皇圗大業無疆運武勇烈文賢俊所以國治家齊民物忻堪花酒盈樽尾聲㝎邊疆安社稷把戎狄鎮扶宇宙保華夷除剪了蠻貊塵如今這癬疥兒曹永不病文英能至真武威嚴似神眼見的凌煙閤標題姓名凖一枝花白鸚鵡慶夀霜翎雪握成素羽銀粧就老拳金鑄煉勁翮玉雕鎪電掣雙眸壮氣冲牛斗英風播九州過千㝷碧海髙飛渺萬里青雲顧首梁州珍重比麒麟上瑞禎祥如鸞鳳同流玉海青自古為稀有方譽紀載簡冊名留昇平吉兆盛世嘉猷他本自逺方来慶賀千秋单注着億千春夀禄遐修正值着豊稔歲樂雍熈國泰民安太平日享富貴天長地乆封域中保康寧物穣人稠似這般禽在手髙擎着至寳非虚謬賞佳祥祝延夀樂中土康衢擊壤謳萬載千秋尾聲九重宫苑歡聲輳七奏笙歌曲調􅌻聴一派清新樂音溜遥瞻着錦鞲滿斟着玉甌進一盞千秋慶夀酒一枝花祝夀玳筵排翡翠屏香篆裊狻猊獸捲珠簾迎五福𨳩寳殿慶千秋瑞靄輕浮日色遲宫漏歡聲滿鳳楼喜孜孜仙女擎盃嬌滴滴仙娥勸酒梁州簮寳髻仙花馥郁列金堦仙樂滑􅌻更有那八仙九老来添夀盈玉盎仙桃髙捧合瑶笙仙曲齊謳展素羽仙鶴對舞飲清泉仙鹿馴逰四般兒粧點的仙境清幽三般兒成就了千載遐修採靈芝授仙籙青帝遥臨嚥玉液嗽華池黄庭内守煉丹砂騰寳氣紫府名留寰中更有夀山福地同髙厚保天恩自天祐隂隲湏教福禄酬永永源流尾聲正值着九秋天氣重陽候百歲芳容不老秋露菊霜凝正清秀聚十方九州衆神仙稽首共祝千秋億萬乆一枝花自詠夀恰三陽漸暖辰逢𥘉度新春日喜桑榆延晚景幸康徤樂雍熈生忝宗室藩屏中原地忠良守社稷志誠心理國尊朝端謹道齊家正巳梁州感聖主洪恩大徳托天朝聖武神威芳名保守無他異立身呵謙恭是務持心呵本分為期酔来呵詩學李杜醒時莭字習繇羲将仁義立㝎根基方寸地端的是平夷只因我心寛弘懶飾邊幅意曠蕩不親瑣碎性踈狂慵整冠緌道頭識尾論風流堪作箇名書㑹和夀詞向丹陛唱一曲髙歌飲数盃聴你那祝夀聲齊尾聲劬勞罔極恩非細因此上厚惠禮相待的遲葵藿羮墙憶先世樂昇平共喜仰君親厚徳我将這忠孝持心億萬紀一枝花春別兩堤烟栁垂十里夭桃暎半篙春水綠一帶曉山青三月朝京酌別酒添詩興聴驪歌緩去程鞚雕鞍行色匆匆載畫舸行装整整梁州暫留戀風流秀士畧相別通變儒生愛你那錦心綉腹文學正你将那溪山飽玩風月閑賡暮雲觀鴈春樹聞鶯你與我片時間等待消停我将這三般兒嘱付叮嚀早晨間取一帖避風寒壮筯力藥餌頻服到晚来㝷一間曽厮認㑹温存店房兒自寢天明㝷問一條有人烟無泥濘官路長行則為這下情志誠遥瞻上闕心忙併感洪恩樂安静滿飲香醪酔太平老我平生尾聲俺如今身躭舊日文園病帶减當年沈約鞓若見俺相知問時呵應你道我年紀正五旬百無那一䏻常則是花酒鄊中喚不醒一枝花武昌作雍容黄閤姿卓犖青雲態彷彿憂國志慷慨濟川才奉詔西来衝瘴霧臨邊界駕天風下鳳臺正正旗堂堂陣蛇鳥争輝轔轔車蕭蕭馬風雲動色梁州展其韜施其畧孫吳是法依扵仁行扵義周孔為懐經綸逈出諸藩外八陣旗春營栁暗七重圍夜帳蓮開六鈞弓曉星迸激雙龍劍秋水磨揩轉儲胥周饋餉掌上裁劃撫疲羸均勞逸意外驅差玉兎毫揮翰墨學足三冬𬗋鸞誥叙勲舊恩封三代丹墀陛列班資歩近三台偉㢤盛㢤况托着巍巍聖徳乾坤大露布馳玉關塞力挽天河下九垓淨洗氛埃尾聲錄豊功褒盛績班班擬見銘鍾著芳聲垂後代歴歴終期炫竹帛若報道東閤門前不妨碍借尺地寸堦進一言半䇿恁時節吐氣揚眉拜丰采一枝花荆南作嵬嵬九鼎臣落落三台位飄飄七歩才黙黙五兵機花蕚相輝俯仰諧天意經綸合聖規書架挿三萬舊日牙籖武庫列十二清霜畫㦸梁州翰墨奪人間錦綺咳唾落天上珠璣統雄藩肅鎮西南裔𬗋泥詔符分銅虎碧油幢纛散紅犛金麒麟繡蒙瑣甲玉螭龍籠帶宫衣八卦營細栁深迷五方旗鉄馬驕嘶喜的是沙漠空狐兎塵清静鯨鯢浪息宫殿髙燕雀風微據之以徳用之以禮因此上太平天子無為治片𥿄間九重内喚得春来草木知萬物熈熈尾聲金甌應巳蔵名諱麟閤終當繪像儀寄語公明董狐筆比及論功賜邑銘彛勒石先築沙堤四十里一枝花武臣汪汪江海心落落雲霄志昻昻經濟才矯矯廟堂姿閫外行司暫把牛刀試播芳聲雷貫耳匣中劍氷涵映水芙蓉腰間帶銀鈒盤花荔枝梁州烽燧息朝廷有道簿書閑門舘無私談咲間喚得春風至昆季雍雍穆穆友朋切切偲偲禮法兢兢業業書謨念念孜孜了公家無甚縈思追歡樂有甚推辤獵西山金僕姑錦袋琱弓宴東閤銀錯落瓊箏寳瑟逰南陌紫叱撥玉轡青絲丈夫似此多管是胸中寸地平如砥嘉瑞巳天賜庭下蘭孫與桂子雨露滋滋尾聲扵親巳是平生事許國應當少壮時顯孝揚忠但如是横金曵紫承恩奉㫖穏情取勲業班班照青史一枝花自述三千丈蕭蕭白髪生七十歲楚楚青衫舊抱經綸無官朝圵闕買犁鋤有子事西疇氣禀清修玉聳雙肩痩胸涵一鏡秋躡天根探地脉秘訣深㣲歩詩壇入酒社精神抖捜梁州瞻勝跡蓬莱山不離眼底避危途太行路長在心頭将古今吏隠都窮䆒慕謝安髙邁羡陶令㱕休愛戴逵洒落學賀老風流文房藝苑偏逰藥欄花逕新幽披覽著禹陵書半囱星斗光芒張玩着輞川圗四壁烟雲馳驟撥刺着嶧陽琴一簾風雨颼颼淡然自守全勝他㱕山拂破麻𫀆䄂䏻爕護㑹消受髙臥元龍百尺楼萬事攸攸尾聲恰能勾天涯萍水同携手誰承望上表蓴鱸又買舟少不的再叙離懐那時候連床秉燭隔籬喚酒夜雨呼童剪春韮一枝花贈草聖括造化攅成赤兎毫挽滄𬈑磨徹烏龍尾燦日月光揺玉版箋吐烟雲香散紫英石四寳清竒瀟洒芸囱内風流蓮帳底念孜孜八法八訣意懸懸六書六軆梁州指其掌畫其腹雲崩露乗得之心應乎手雷走風飛天然一筆無窮意秋蛇春蚓野鶩家雞跳龍臥虎渇驥獰猊有隂陽偃仰的精神無偏枯背向的支離樂毅論太史箴敷揚出忠烈之風逍遥篇孤鴈賦醖醸出神仙之氣曹娥碑吉誓文摸臨出孝悌之規遮莫醒兮酔兮一揮一洒非逰戯干喜怒系明晦可知筆塜纍纍墨作池名播京畿尾聲誰不道十年非得通三昧我子知一日偷閑測萬機常子得青瑣髙賢自論議看那顔真卿徤筆王右軍妙跡真乃是一色長天共秋水一枝花題檜得指教三遷好住居便栽培千丈深根蒂䏻借取四時工造化以生成一片翆屏帷大剛是即景成規直幹攅楹宻横柯壓棟齊但将翰墨褒題不假丹青繪飾梁州靑欝欝栢葉松姿僃軆香馥馥芝馨术味沾衣更㡬般天然景趣諧人意風過䖏絲篁咿啞月来時金碧光輝簷露洒珠璣點滴篆烟生紫黛霏㣲雖無華麗芳菲端實蕭爽新竒奢不効七松家綺幕圍風清不譲五栁庄黄花遶籬貴不慕三槐堂畫㦸當扉料伊所為單指望歲寒眼底為交契况值太平世一様肝腸似鉄石愁甚麽雪虐霜欺尾聲映踈簾籠曲檻盤旋着夭喬蛟龍勢傍圍攔依短砌踞聳著狰獰虎豹威我試将過眼的風光自評議十萬户㑹稽八百里鑑水縦有些亭䑓則是栽桃李一枝花梅花深處羅浮山接渺茫大庾嶺横空窈凌風臺迷汗漫却月觀阻迢遥意㑹神交想得到行得到一逢春一遇着蕋踈踈花宻宻蓓蕾葳𬎼幹盤盤枝挺挺槎芽夭矯梁州品藻着世上色瑕疵的雅淡評論着天下花無褒貶的孤髙長記得㸔花時有㡬様兒堪稱道露點滴珠容膩粉烟朦朧翠護輕綃風揺曵香飄麝腦雪糢糊玉壓瓊瑶厭桃杏灼灼夭夭伴松篁洒洒瀟瀟何水曹一生心愛得綢繆林和靖兩句詩聮得妙巧宋廣平八韻賦撰得風騷想度暗約我猜似梨雲一片連𬈑漠指顧間自吟嘯但則覺花氣氤氲襲毳𫀆白茫茫萬樹千條尾聲全不似夢逰東海㝷三島真乃是身在西湖過六橋嘱付那羌管嗚嗚莫吹落等待着籟聲悄悄月華皎皎㸔一㑹踈影横斜到清曉一枝花田老齋樹當軒作翠屏月到簾為銀燭栁綿舒白􅖯氊苔綠展翆絨氁四壁蕭踈若得琅玕護何湏蘿蔓鋪聴了些雨打囱下芭蕉㸔了些日照盤中苜蓿梁州破陸續歇