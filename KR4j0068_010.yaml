雲曵曉紅逺樹團晴翠好山如鳳尾新水似玻璃巧畫屏幃壯觀蓬萊地東湖景最竒兩三行鷗鷺清間七十二峯巒秀美梁州露寺僧吟翆微月波樓客宴金杯寶華臺殿松隂蔽赤闌橋畔想像瑶池金沙路上勝却蘇堤若東坡到此逰歷向西湖懶把詩題學士廟紺宇朱扉觀音洞金堂玉室宰相家翆竹清溪會稽鑑水賀知章謾奬多佳致放船去在天際楊栁凨輕生浪遲漾動玻璃餘音喜的是供盤鯽銀絲鱠愛的是對酒名花錦繡機荷香滿衣酒醉似泥落照時漁歌唱起棹蒼煙乘興而回煞強如誤入桃源洞天裏一枝花湖上歸長天落彩霞逺水涵秋鏡花如人面紅山似佛頭青生色圍屏翆冷松隂徑嫣然眉黛橫但携將旖旎濃香何必賦橫斜瘦影梁州挽玉手留連錦􅎆據胡床指點銀瓶素娥不嫁傷孤另想當年小小問何處卿卿東坡才調西子娉婷總相宜千古留名吾二人此地私行六一泉亭上詩成三五夜花前月明十四弦指下凨生可憎有情捧紅牙合和伊州今萬籟寂四山靜幽咽泉流水下聲鶴怨猿驚餘音更那堪岩阿禪窟鳴金磬波底龍宫漾水晶夜氣清酒力醒寶篆銷玉漏鳴笑歸來倣佛有鼓二更煞強如踏雪尋梅霸橋冷一枝花別啇友江山眼界寬湖海胸襟傲鄉邦聲譽美寰宇姓名髙劍氣沖霄翆竹蒼松操瓊林玉樹標吟的是杜陵詩泣鬼驚神寫的是羲之字連真帶草梁州習詩禮門凨逺播紹箕裘家世豐饒衣冠典雅多竒妙威儀秀整人物英豪襟懷瀟灑氣質飄颻也曽伴髙朋花底聞韶也曽會佳賔月下吹簫也曽樂間情玉斚吞蛇也曽消間悶金丸墜鳥也曽好間逰寶箭驚雕不矜不驕五湖勝覽人年少德量寬心胸浩四海名人廣故交氣壓時髦尾論文正好同談笑判袂應嗟兩棄拋餞送郵亭馬當道送行杯舉著贈行詞唱了眼睜睜西出陽關故交少一枝花別友衣冠家世雄詩禮門庭壯髙凨聞上國美譽播遐邦四海名商文苑稱宗匠詞林壓等行也曽會詩朋花圃吟嘲也曽􅌽酒友蘭亭宴賞梁州第七蒙青眼頻加看視羡白眉到處稱揚雍容典雅儒冠樣襟懷灑落器宇軒昻品題凨月裁剪氷霜販金珠湖海徜徉載琴書京國翶翔話交逰志懇情堅推器識才髙意廣論聲華珍重名香髙朋過訪清樽談笑陶情况鮑叔情田文量富比陶朱世代昌良價深藏尾幾畨家金叉勸酒情無曠朱履論文志不忘似這般博古通今有誰像論契友山髙水長從識面年來歲往教小生北斗相瞻泰山仰一枝花挽妻蘭房物巳空蕙帳人何在愁雲迷繡榻怨霧鎖粧臺天降凶災叉頭鳳雙分壞鏡中鸞兩下開三十三耗散了杳杳三魂七月七沉淪了攸攸七魄梁州第七好教我嘆箕帚空間地上慕糟粳不下堂來痛的是半途夫婦拋恩愛再不將孟光案舉道藴詩裁都只把溫郎鏡掩卓氏車埋想著我讀書時緝麻陪良夜虛齋赴筵時引燈迎明月空階撇下那白生生一柄兒獨舉氷紈撇下那小可可幾對兒親穿繡鞋撇下那細亭亭兩隻兒舊戴金叉想著你幽間性格常依婦道遵閨誡內助賢有誰賽善事公姑孝不衰誰承望修短合該尾聲今日箇則落的一堆黃土香肌蓋三尺荒丘玉骨埋撇下箇五歲嬰兒怎將帶説起來悲愁滿懷題起來容顔變色端的是此恨綿綿甚時得解一枝花詠劍離匣牛斗寒到手凨雲助插腰姦膽破出袖鬼神伏正直規模香檀杷虎口雙吞玉沙魚鞘龍鱗密砌珠挂三尺壁上飛泉嚮半夜床頭驟雨梁州金錯落盤花扣挂碧玲瓏􅍢玉粧束美名兒今古人爭慕彈魚空館斷蟒長途逢賢把贈遇寇即除比鏌鋤端的全殊縱干將未必能如曽遭遇諍朝讒烈士朱雲能回避嘆蒼穹雄天亡羽怕追陪報私讐俠客專珠價孤世無數十年是俺家藏物嚇人魂射人目相伴著萬卷圗書酒一壷遍歷江湖尾聲笑提常向尊前舞醉解多從醒後贖則為俺未遂封侯把他久擔誤有一日修文用武驅蠻靜虜好與凊時定邊土一枝花樂間常尋霸岸梅靜理桐江竹厭看青瑣論懶上皂囊書心古形臞但身在貧無慮喜豐年賦有餘愁的是搜尋著幾遍徴宣追趕著三畨薦舉梁州喜泉水暗通蔬圃愛雲山正對茅廬客來山鳥頻驚懼新收野果舊釀醁醑宜時嫩蕨墜釣鱸魚肚皮寬儘自粧愚眼睛髙不肯容俗服青精煉丹砂修飬天和買耕牛鎔寶劍消磨英武缷烏紗戴綸巾學盡村夫假駑詐魯傲襟懷不入時人目恥趨權陋阿富習就林泉禮法踈豈待別圗尾聲枕琴聽雨湘簾􅉡信步看花短杖扶有時節爛醉歸來近薄暮蘆花𬒳欵鋪任齁齁睡足強似恁午夜鍾聲頻催促一枝花重九天空碧水澄木落青山瘦籬寒黃菊晚甕暖緑醅熟歲月如流才過了中秋後又重陽九月九染秋容紅蓼丹楓添秋色殘荷敗栁梁州散孤悶間尋野寺快離懷逺眺江樓憑髙一覽江山秀山形北拱水徑東流綿綿極浦滚滚滄洲白鷺洲二水攸攸鳳凰臺百鳥啾啾覔得根羊叔子軟琅璫博帶垂腰借得條葛仙翁彎曲律青藜在手尋得箇孟參軍腌刺答破帽籠頭放開笑口對西凨滿把黃花嗅聳吟肩妥吟袖自把陶詩細和酬景趣窮搜罵玉郎凨光厮把人迤逗携樽爼約朋儔江鄉禾黍秋成後剖金橙味尚酸薦黃雞膘正肥擘紫蟹黃初溜感皇恩到大來心上無憂身外無求管甚麼三略法立興了周一聲歌平散了楚萬言策坐安了劉趂著天清氣爽雨霽雲收逢僧舍過酒家便遲留採茶歌見鷗鷺放中流覩鴻鴈起蘋洲牧童橫笛倒騎牛看了這錦繡川原紅樹晚端的是一年好景讓三秋尾一箇向東華鍾鼓常聽漏一箇為南國蓴鱸便駕舟兩般兒我參透幹功名枉生受得清間怎能勾遇晴明好時候與村翁共林叟登髙臺陟逺岫酒腸寬詩骨瘦到老雙眉不曽皺欵段馬犯紅塵不􅌻粗布𫀆見時人怕醜只慣向傍水沿山路兒上走一枝花竒遇嬌滴滳千金玉體輕窄弓弓半虎羅鞋㜞長攙攙兩彎眉黛巧顫巍巍一搦栁腰纎禮數謙謙歌白雪櫻唇艷撥檀槽春笋尖俏儀容燕燕堪同美聲價鶯鶯不忝梁州那裏有一毫兒破綻端的無半米兒憎嫌溫柔瑩潔絶瑕玷宜嗔宜喜知恥知廉諸餘可愛所事相兼惹的些蜜蜂兒攘動雕簷引的些蝴蝶兒飛近粧奩恨子恨歸去後珮聲兒空館遙聞喜子喜相見時腳步兒殘紅半掩愁子愁別離間唾津兒香帕猶粘意忺語甜知音不是恩情欠恁蘇卿俺雙漸瞞不過慣打聽凨聲阿母嚴步步拘鈐尾聲丢不開放不下難成合繾綣終常念染之重感之深無倒斷相思即漸添有一日軟玉溫香許咱贍放下花撲撲繍簾偎著喜孜孜杏臉恁時莭方才把撥雨撩雲的意收斂一枝花夏日寫懷正楊栁成隂覆短墻恰荼䕷噴雪迷深巷才荷葉㺯青浮水面又芭蕉分緑上晴囱窄窄書房自一種清間况小壷天詩酒鄉舞青衣童子雙雙歌白雪佳人兩兩梁州冷清清溪泉潄玉細茸茸庭草生香幾般兒陳設多竒壯刻獸面南金篆鼎碾羊脂郢玉壷觴展魚浪蘄藤榻簟織龜紋蜀錦琴囊樂天真頗類羲皇友金蘭不比髙陽有時節撚吟髭俯雕闌聽枝上蟬鳴有時節敞吟袍揮羽扇納凨前晚涼有時節倚吟屏鈎湘簾看雨後山光鎮長見訪都是些布衣詞客儒林相那踈狂那豪放醉倒青樽送日長品藻興亡尾論奢華評富貴休題太尉銷金帳數清標誇雅淡絶勝裴公緑野堂端的是半點紅塵不容傍或是寫黃庭幾行或是詠離騷半晌一任他世事榮枯似翻掌一枝花道情公行天理明私意人心暗古書讀未了世事飽經諳圖甚麼貪婪名利境多坑陷羡青門瓜正甘園林茂堪置幽居山水秀真為勝覽梁州流水繞一村桑柘亂山圍四壁煙嵐顛峯倒影澄波蘸遙岑疊翠逺水揉藍鳶飛鷺落魚躍深潭偃怡場水府山岩安樂窩土洞石龕景不嫌物少人稀食不厭茶渾酒淡家不離水北山南有何不堪籃輿到水輕舟泛稼穡外得時暫間飲漁樵酒半酣闊論髙談三煞乾坤向漁父波中淹日月在樵夫肩上擔處羲皇巳上有何慙將萬物包函至潦倒終身無憾與時輩作龜鑑晦迹韜光繭內蠶再不開緘二煞崑岡隱玉石中嵌蛤蚌含珠水底淹樊籠得脫再誰監一味清間雖楚漢應難搖撼懶子懶不愚濫把道潛心靜裡參樂及妻男尾岩穴中虎惡由人探飽暖外身輕體自安我將智飬做愚飢忍住餓携酒一壷提果半籃引的詩興濃􅽓得酒德憨教野叟扶命稚子攙倚松立絶頂巉岩開醉眼看人呆大膽一枝花道情盟山土底埋誓海波中淹煙花情意足凨月債難擔情理難甘子弟每常和俺賽兒中閗厮攙巫山下𥿄糊鍬钁陽臺上開荒劍砍梁州也曽慣錦貂花溪泛舸當金鞭栁巷遺簮錦箋寫恨寶靨留香覔仙停驂悲歡離合多經賺分叉破鑑解佩遺簮洞府山岩尋神女在虎窟龍潭嶽陽樓鄭子紅綃藍橋驛裴航錦船琵琶亭司馬青衫自羞自慘東凨吹得行雲淡鏡裡似霜糝一枕青樓夢已酣總付髙唐三煞光隂迅速實傷感時務翻騰百不堪功名一線我傷慙四海交逰飄零的不知明暗默默的自取勘眼底渾無一二三流落在江南二煞再不喚行院每逗鏝家中探粧旦的開山門上參粗𫀆大笠且粧憨不是癡換抄著手傍邊搠淹唆朗末聽撒欠撚渲處踅來纏定咱碎臠零啖尾年來頓覺精神減老去常教妻子嫌翠紅鄉口緊緘鶯花寨眼下饞惡凨波怎搖撼間是非不招攬惜芳心莫我貪踈狂性再誰敢效何郎枉撒暫病軀老巳抱藍老雙漸儘打憐小蘇卿便張喊過中年往事經諳消磨盡少年凨月膽一枝花冬雪朔凨狂撼地軸同雲布埋天際唯聞千樹吼俄視六花飛凛冽寒威暮景冬天氣只疑春欲回舞飄揚栁絮迎凨亂零落梨花滿地梁州一漫兒不分乾坤上下半合兒難辨途路髙低凍枝頭那裡覔梅花蕊將寒枝壓損把凍樹深培望前村惆悵庾嶺徘徊一會家撲簌簌亂撒珠璣只疑是白茫茫倒瀉瑶池端的是退之馬藍關外失路難行浩然驢灞陵橋迷蹤怎騎子猷船剡溪中阻興而歸不曽暫息却便似耍鵝兒萬萬千千對搧粉蝶舞凨戲密灑歌樓酒力微不許停杯三煞亂飄僧舍茶煙濕深壅樵岩古徑迷漁人披定玉簑歸才罷釣收輪向灘邊將扃舟尋覔吕蒙正在破窰內撥盡寒爐一夜灰展轉傷悲二煞嚴凝冷透孫康室料峭寒侵顔子扉長安酒價倍增十文君忍凍當爐司馬敲氷滌器嘆周瑜怎題壁張儀蘇秦強不的繚繞空回隔尾這的是潤國家天降真祥瑞濟黎庶皆無苦病疾一糢糊約三尺望逺沙鷗鷺栖非丹青即水墨有粧欒有畫飾從盤古立天地是有豪奢富貴城池也無那瓊世界玉乾坤銀社稷一枝花收心一生酒裡眠半世花中走惜花頻淨臉愛酒懶梳頭酒病花愁花共酒相迤逗酒和花厮趂逐看花時㺯盞傳杯殢酒後眠花臥栁梁州花送了些青春子弟酒老了些白髮公矦不知花酒無成就花枝無敗酒債無休花開爛熳酒滿金甌怎做的花酒忘憂略相別酒內神仙永厮離花間故友酒和花一筆都勾從今後罷手早則不為花為酒干生受從來花酒不堅久只管裏戀酒迷花甚日休早則箇葉落歸秋尾從今再不因花瘦以後如何為酒愁花酒中間盡參透若要省憂省愁再不簮花更殢酒一枝花休官不戀蝸角名豈問蠅頭利世情堪冷暖人面逐髙低間是間非僻掉的都伶俐百年身圗畫裡本待要快活逍遙情願待休官罷職梁州誰待想錦衣御食甘心守淡飯黃􅐽向林泉選一答兒清幽地間時一曲悶後三杯柴門草户茅舍踈籬守著咱稚子山妻伴著幾箇故友相識每日家笑吟吟談古論今間遙遙逰山玩水樂陶陶下象圍棋早起晚夕喫醉了重還醉嘆白髮緊相逼百歲光隂能有幾快活了是便宜煞尾都則是兩輪日月搬興廢一合乾坤洗是非直宿到紅日三竿偃然睡那些兒况味誰知一任鶯啼喚不起一枝花花酒花堪消遣愁酒可相酬醉一生花裏臥半世酒中迷花酒相隨花共酒相牽繫酒和花不暫離酒膽大漸漸踈狂花星照重重見喜梁州但坐處一簇簇花濃酒艷但行處一步步翆繞朱圍論凨流無妙咱為最分茶攧竹下象圍棋吟詩課賦蹴踘投壷萬千般笑耍曽習比古來俊者肩齊我有那鄭生竊玉權術韓夀偷香見識潘安擲果心機據著俺志氣交友名聲見我連忙退慿寫染仗才藝不弱如東坡黃魯直小可誰及尾琴棊書畫般般兒會歌舞吹彈件件兒知頂字續麻快商謎階頭巷底將咱説起小伴當叢中占了第一一枝花離情粘花惹草心招攬凨流事生前同帶綰今世遇嬌姿伶便容儀知音有林泉志恰合歡連理枝喜孜孜兩意相投美甘甘夫妻相似梁州甘不過輕狂子弟難禁受村紂勤兒撞聲打怕無淹潤倚強壓弱滴溜著官司轟盆打甑走踢飛拳查胡相萬般街市待勉強過從枉費神思是他慣追陪沛楚髙人見不得村沙謊厮臉不定冷笑咨咨可人舉止為他十分喫靜不肯隨時變除此外沒投玷聚少離多信有之古今如此尾好􅊚緣眼見的無終始一載恩情似彈指別離怨草次感恨無言謾搔耳後會何時唱道無限凨流花箋悶寫相思字托魚鴈寄傳示我志誠心一點無辭一枝花楊妃剪足脫鳳頭宫樣鞋褪錦靿吳綾襪破胭脂紅袴色擁金縷翆裙紗帶溫霜華欵解放輕愡下並春蔥指密匝軟耨耨堪襯雙蓮瘦怯怯剛迭半扎梁州可知道登鳳輦朱梯倦跳上雕鞍寶鐙慵蹅無拘縛越顯的些娘大眼前可玩膝上堪誇掌中愡托𬒳底輕答引鴛幃雲雨情加使龍庭父子心差則見那素尖微慢偃銀鈎雙縫裂輕分玉瑕嫩趺圎細捲瓊葩暗香潤撒恰金盆蘭麝湯濯罷堪賽過善菩薩只恐怕嬪娥誤觸纎手親拏二煞尾分開兩股金刀又剪破雙頭玉蕊花纎柔壓盡小宫娃帶接連枝一抹的相迭相迓微顯出半痕甲癮痛處寧心兒盡去却忒滋膩光滑收尾喜則喜瑩如銀炬𥘉凝蠟愛則愛漱似蓮根恰吐芽重收拾越緊恰遍憎嫌地窄狹祿山兒恰似他早則向後宫中大儻的蹅踏常則把親骨肉幾遭兒痛殺一枝花楊妃梳粧蘇合香蘭蕊膏瓊花粉薔薇露繡幃中春睡足緑囱下起粧梳香水銀壷簇向金盆注玉纖纖春笋舒嫩紅似掬破瓊珠淡白似梨花帶雨梁州蠟滴軟燒殘鳯燭蜜脂香和就蜂鬚更添宫粉人如玉對銀屏因無語一點春心未足動不勝嬌偏嚲雲鬢擁破衣金縷神仗兒塵清洞府凨生桂窟夢斷瑶池魂離洛浦鴈行鴛序鶯雛燕乳侍晨粧翆圍紅簇恐要侍兒扶宜寫在懶粧圗神仗兒煞雲囱繡户光凝綺窟春暖氷肌香溫玉骨芳姿新浴蘭湯乍出汗溶溶潤徹瓊酥似梨花一枝春帶雨一枝花玄宗捫乳掌中白玉圭樹底紅芽筯都不如𬒳頭上如何生枕上夜明珠玉并雙渠濃滴胭脂露世間甜總不如包藏盡夜月春凨醖釀出朝雲暮雨梁州圍繡帶衣襟欵束透香囊蘭麝糢糊汗溶溶宜在華清浴溫柔易暖潤澤難枯撲凹相對涅色仍姝兩堝兒妖艷當浮半星兒粉垢全無顫巍巍剛顯香溫膩團團潛攢玉粟軟耨耨輕漲雲腴錦叢乍出于身最是生情處廕應帝王福染指濃薰自有餘更壓著帶雨蜂鬚二煞尾輕盈溫透胸中物瑩滑新來塞上酥凨流特似破瓜初素蛾流光隔斷紅鴛白鷺常惹得錦鸞姤則不宜將手摩㺯唇吻也堪嗚收尾對若初􅌻雞頭肉亂國私招燕子雛懷中抱緊遮護牽腸惹肚知心可腹左右教明皇做不得主一枝花楊妃捧硯金瓶點素痕寶翰磨香暈春纎藏玉笋羅怕襯白雲鳯沼無塵滿眼寒光潤灑松凨拂面新露華涼暗浥玄霜香臉嫩重加醉粉梁州紅錦繡擎離月窟紫霜點透雲根豪轉秋波俯視愁無盡比金杯難舉比鈿金難親比玉笛難㺯比如意難溫啓鶯唇麝氣輕噴透酥胸蘭蕙濃薰照鬢項霧靄濛濛射腮斗煙霞隱隱晃叉鸞金碧鏗鏗那些可人對明皇不免強隨順他早一搦栁腰困半扎金蓮立不穩素腕剛伸二煞尾這硯能添傾國眉尖恨難印開元指甲痕蓋因天子重賢臣這物太無情也助得神仙凨韻越勉淹潤比省那相抱相偎痛怕惜他到太殷勤著他那翰林院宫錦香成陳助的那醉筆新詩思不群心無聊意轉嗔量這些輕沉不忍禁把那亂宫賊掌上溫存生壓的玉容憔忰損一枝花長生殿慶七夕細珠絲穿繡針暗昧如人機巧小金盆種五生榮旺似禍根苗彩障新描羅綺重圍繞長生殿慶此宵雖然布花果香燈那裏肯虔心暗禱梁州待強扭揑些蹺蹊旖旎別施量些分外妖嬈就中醖釀更多少衣冠錦繡裙擺鮫綃枕邊縱臥口內頻招恰扶起玉骨香嬌總翻成鬼負神看或緯或織或描或畫或裁或絞或縫或繡或挑恁的做作更著得針指皆絶妙于國有何報隨坐隨行鎮宴賞沒半步曽拋二煞既能逐日同鴛幄何必經年羡鵲橋宫娃嬌少甚苗條從入宫闈女工上何曽少靠只靠欣歡笑夢裏難將百藝呈開眼忘却尾枉將織女牛郎告間使宫嬪彩㜮學元來低本性濁既無成便怎髙那裡曽留些小赤緊的太真妃至死也難教一片亂宫心從起初兒直屈到了一枝花祿山謀反蒼煙擁劍門老樹屯雲棧西凨吹渭水落葉滿長安近帝都景物凋殘傷感起人愁嘆只合在邊塞間則見那白茫茫莎草連天甚的是嬌滴滴鶯花過眼梁州不幸遺東歸薊北更勝如西出陽關看幾時捱徹相思限怕的是孤燈熒暗殘月弓彎戌樓人靜梅帳更闌思量玉砌雕闌消磨盡緑鬢朱顔煞再幾時染濃香翡翆衾溫迷醉魂芙蓉帳暖解餘醒荔枝漿寒這近間敢病畨舊時的衣褃頻頻儧瘦證候何經慣那的是從來最稀罕單出落著廢寢忘餐三煞動無喘息行無汗坐也昏沉睡不安兩行淚道漬成斑每日家做伴的胡友胡兒胡舞胡歌胡吹胡彈知他是甚凨範偏恁一曲霓裳寵玉環羯鼓聲乾二煞拚了教匆匆行色催征鴈止不過拍拍離愁滿戰鞍驅兵早晚到驪山若奪了娘娘教唐天子登時兩分散休想再能勾看一看四件事分明緊調犯勢到也怎托攔尾聲把六宫心事分明的慢將半𥿄音書黨閉的慳教千里途程阻隔的難我因此上一點春心醖釀的反一枝花陳玄禮駭赦錦宫除禍機青史標名列黃塵暗羅綺白練損花傑十數載唇舌尓為人為娘業則這一朝還報徹眼見的芙蓉帳暮雨朝雲都作了楊栁岸曉凨殘月梁州辭丹鳯九重禁闕臥黃沙三尺深穴除寡人更有誰疼熱自推自嘆難當難遮無情無緒如醉如呆唐明皇棄捨無些陳將軍決斷忒別也是楊國忠月值年災安祿山時乖運拙太真妃祿盡衣絶帝情慘切攢著眉閣著淚躬著身義著手分付與陳玄禮兀的是手詔早寧帖他便頓首誠惶却回奏據辨利有誰迭三煞這詔是重興宇宙郊天赦早是復救生靈奉敕牒見許多軍馬怎攔遮撞過潼關壁指干戈排列這一畨為誰設早是區區蜀道難那堪更煙水重疊二煞則為你鸞歌鳯舞明連夜直引的虎閗龍爭了併耶若相待休想肯饒些戰馬交時手到處將旗颭拽兵創不粘血折末兩摟來人肥骨吞胖肚皮則那就鞍子上活挾尾這欺君冤枉難分説反國緣由怎漏泄直等拏住賊臣恁時節教那厮自分説陛下聽者臣是臣非見去也一枝花楊妃繡鞋傾城忒可憎絶國施機巧麝蘭噴皓齒鶯栁囀篁嬌婇㜮低昭玉井泉金盆要滌香纎粉垢挑開線貼蕊綻香包剪竒樣瓊葩謝蕚梁州鳴寶釧自裁自絞墜金翹親點親描回眸百媚明囱靠重輔穩當減襯輕薄包藏旖旎醖釀凨騷蕙姿天付羣超輔方刺繡誰學一扇扇畨的堪誇一行行衲的是好一針針縫的絶髙布蟣線腳花兒葉子無差錯遍根上盡貼落彩線蒙金妬魏姚蝶引蜂招二煞能教鸂鷘潛清沼善配鸞凰戲碧桃鴛鴦菡蓞池嬌殘菊秋蟬蘆鴈冬梅寒鵲春蛾杏夏萱草對務連針底上却星目分毫剛半扎越顯吳綾小一百錢看價不髙鳯頭偏稱綘裙綃寰宇無雙六宫嬪妃難著凨流處痛絶妙太液池蓮兩葉好足下堪消黃鍾尾翆盤可按回鸞樂寶鐙宜踏上馬嬌那祿山兒怎不喬窄弓弓惹禍苗這鞋面上海棠花繡得來分外妖嬈到後來土塵中不的馬踐了一枝花楊妃翆荷葉櫳髮雲滿梳舒黛月生指玉肌凝瑞雪檀口注胭脂出浴多時鸞鏡慵窺視厭粧盒麝汚指為甚麼懶設設付粉施朱怕差落嬌滴滴姚黃魏紫梁州旖媚臉海棠灼灼舞纎腰楊栁絲絲髙盤鳯髻銷雅翅緑雲堆裡𥘉月參差南威絶代西子傾城蒙東君花正當時恍疑猜洛浦天姿錦燦爛繡織仙裳金錯落瓊垂鳯子玉瓏璁寶嵌錍兒噴香荔枝婉眉巧笑謝唐天子承厚意重恩錫御手輕輕鬢邊插賞讃無辭二煞翆荷痛愛名禽翅緑葉成林子滿枝良工巧匠用心施翆壘紅疊異樣珍花難似耀日色碧青紫玉砌珠攢百寶粧包含情思黃鍾尾豈知根本淤泥刺誰解源流引禍絲招凨聲惹唇齒褁明皇暗憐子六宫中攙奪盡玉葉金枝這花兒攛斷的太真妃運休也憔悴死一枝花漁樵樵夫在堆藍翠雲錦鄊漁翁在泛白雪桃花浪那樵夫愛霜林紅葉舞那漁翁釣煙雨趂長江他兩箇在樵國漁邦那樵夫嫌斧頭鈍只在頑石上蹌那漁翁恨釣頭食不香那樵夫在峻嶺上砍樹伐桑那漁翁在寒溪下扳􅊻撒網梁州那樵夫柴擔擔來歇在林影那漁翁魚籃携來放在隂涼二人共坐一塊頑石上論一會開天闢地論一會五帝三皇説一會顓頊少昊論一會堯舜陶唐殷啇湯夏禹成康周朝滅才顯出楚壯秦強那去了雄紏紏亡秦末西楚霸王那去了氣昻昻東西晉北史南唐那去了紏泛泛晉宋齊梁有一箇越王大梁古來多少英雄將有一箇魏曹操漢王莽縱饒你峥嶸少不的葬在北邙想著人枉了爭強恨不的壘石墻鑄鐵窗不甫能禁人行撲鼕鼕暮鼓頻敲却又早催人起嚮璫璫晨鐘又撞不覺的日落山岡尾樵夫道等柴做飯山妻望漁翁道晚膳鮮魚要煮湯樵夫道不荒漁翁説不忙咱兩箇來日相逢再把話兒來講一枝花漁樵漁翁在碧深深波浪間樵夫在翠巍巍顛峯下漁翁道我整綸竿為活計樵夫道慿斧擔作生涯咱兩箇本藝無差堪寫入丹青畫樂清幽自在煞樵夫在黃蘆岸拴縛了柴薪漁翁在白蘋渡口收拾了釣義梁州漁翁道我栁條滿休心便罷樵夫道我擔頭沉獨力難加二人行至林泉下那漁翁魚懸在隂影那樵夫柴映定殘霞咱兩箇且不説平日生涯講齊梁戰討征伐論周朝富貴榮華咱兩箇𥘉相交無憂無愁無慮咱兩箇意相投有談有笑有耍咱兩箇説多端自嗟自嘆自誇漁翁道坐咱樵夫道睡咱不覺的緑隂轉夕陽下回首踈林噪晚雅乘興回家尾漁翁道等鮮魚作鮓樵夫道等乾柴煮茶咱兩箇來日相逢再把話兒來答一枝花及第鰲功翰墨鮮志汲桃花暖胸中書萬卷舌底浪千翻射策金鑾宫花明翆帽御酒濕羅襴喜儒道光臨舜日幸文明澤𬒳堯天梁州一口氣鼓開雪浪兩隻手撥轉天關慿著伊文林學海把鰲頭占文驚神鬼詩壓山川名標虎榜姓列仙班際凨雲慶會斯年佩紫綬早朝丹闕傳玉燭晚直金鸞美然罕然九重恩渥近天顔祿位遷奎光現赫赫聲名播宇寰富貴何難尾舉直錯枉除民患濟世經邦于國賢身忠力孝為心鑒才兼德全御筆題封翰林院一枝花私情雲髫金雀翹山隱靑鸞鑑藕絲輕織粉湘水細揉藍性子兒岩嵌小可的難搖撼起𥘉早著摸䀤假撇清面北眉南實怕儧紅愁緑慘梁州不顯豁意頭兒甚好不尋常眼腦兒偏饞酒席間間話兒將它來探都笑科兒承答冷諢兒包含不能勾空便因此上雲雨􅮡老婆婆坐守行監狠厥丁暮四朝三不能勾偷工夫恰喜喜歡歡怕厥撒也却忑忑志志知消息早噥噥喃喃儧科閗喊風聱凶惹起如何按徒那逰再誰敢有等乾咽唾的杓徠死嘴漸委實難耽尾聲從今後將鳯凰巢鴛鴦殿遮籠的暗將金縫鎖玉連環對勘的岩錦片也似前程做的來不愚濫非是咱不甘不是你不堪只𬒳你這受驚怕的恩情到如今都唬破我膽一枝花喜雨用盡我為民為國心祈下些值玉值金雨數年空盻望一旦遂沾濡喚省焦枯喜萬象如故恨流民尚在途留不住棄業拋家擋不住離鄉背土梁州恨不的把野草翻騰做菽粟澄河沙都變化做金珠直使千門萬户家豪冨我也不枉了受天祿眼覷著災傷教我沒是處只落的雪滿頭顱尾聲青天多謝相扶助赤子從今罷嘆吁只願的三日霖霖不停住下的來當街似五湖都潤徹隴衢猶自古不盡從前受過的苦一枝花梅休言白玉堂怎和黃金鼎難栽瑪瑙甕宜插水晶瓶索笑為生冷暖偎村徑朝昏傍驛亭長則是採薪夫覔覔尋尋那裡取惜花客潛潛等等梁州琴譜內又不將宫啇剔撥角聲中長則趂鍾鼓悲鳴我將他腳跟兒從頭省大庾嶺多年的魑魅羅浮山舊日妖精東閣外移來異種西湖上流出殘英虛擔看玉潔氷清空落的雪虐霜侵孟浩然見了呵揚了吟鞭趙光普覷了呵罷了諫諍楊輔之畫了呵唬了魂靈試聽他本情未成實先有酸心病可知道楚大夫厮傒幸萬古離騷不入名枉自飄零尾打不動裁氷剪雪林和靖衝不動擊玉敲金宋廣平縱泄盡了春光也不乾淨趂風清月明恐天寒地冷則不如放捨了橫斜水邊影一枝花美人説窈窕端然窈窕待苗條不甚苗條向尊前徹膽兒包藏著俏肌雪瑩勻勻粉膩臉霞酣淡淡紅潮豆蔲小半吐玉蕊丁香嫩一點春嬌舞態輕燕體飄飄歌喉細鶯語嘐嘐梁州縷金環嵌八顆蠙珠交股叉裊雙頭鳯翹凌波襪蕩六幅鮫綃老陶見了少不得剖肝腸再寫段凨流波好年紀兒正芳妙索捨千金度一宵沒福也難消尾燭熒煌香靉靆鋪張箇夜月芙蓉幄鋪纏聮金絡索蓋箇春凨翡翆巢我是箇鑒樂酸丁最公道折莫將丹青畫描詞章品藻兀的般解語花生香玉世間少一枝花及第鵬霄九萬里豪氣三千文龍蛇生筆硯星斗煥文章志氣昂昻青雲當立志金榜願名揚八詠賦驚駭俗膽七篇文鏖戰占科埸梁州折蟾窟一枝丹桂飬蠧簡十載藝囱才搏的彩旗簇擁長安賞赤緊的文成錦繡䇿對堯湯群儒戰退多士魁強幸今日名題桂府待斯時踐任琴堂拂秋闈兩袖天香筆尖掃千軍勇概劍􅉭揮萬道虹光爾當自強蟄起凨雷震四方須有日瓊林宴桃花浪緑𫀆象簡紫薇郎早能勾脫迹螢囱尾聲榮身耀祖多名望駟馬髙車返故鄉朱衣好爵從天降恩光建章朝朝染翰侍君王
