皮襖毛児恰正軟舊皮襖羊毛児不甚􅐈何時趂得平生碩則你那錦衣綉襖輪班児着不如我皮襖皮裘換套児穿兩般児自把清濁辨您穿的粧身扮體爭如我赤手空拳二煞你為官有望加我牧羊不驟前似這般無情日月難消遣則你這李陵咫尺六七載誰不知蘇武爭襟十九年我扵漢國心無􅌒你休忘了李陵䑓上我不離了蘓武坡前一煞那里有淋淋雨若絲常則是紛紛雪似綿颼颼風緊疾如箭㡬曾見茸茸芳草生南陌儘一眼漠漠平沙際碧天這荅児凍餓死誰人見想殺人十親九故盻殺我也八水三川煞尾比着那漢武帝将我来宣兄弟也全仰你單于王根前保奏的言則我這一鞭行色歸心戀遥望長安路児逺粉蝶児離思這些時意懶心慵悶懨懨似痴如夢想當初倚翆偎紅我風流他俊雅恩深情重他生的剔透玲瓏語容和言談出衆醉春風他生的粉臉似秋蓮春纎如嫩笋鞋弓襪小歩輕盈更䏻歌善詠詠鴈柱輕移氷絃欵撥便是那鐡石人也心動紅綉鞋指望待要湖山畔乗鸞跨鳳誰承望陽䑓上雲雨無踪則我這口中言都當作耳邉風冷落了蜂媒蝶使稀踈了燕侣鶯朋多應是攪閑人将話児哄剔銀燈俏冤家風流萬種他也學七擒七縦把我作勤児般推磨相調弄我這里假粧痴件件依從又則怕傷了和氣觸着芙蓉假和真你心裡自忖蔓菁菜你常好是不知輕重動不動皱了眉峰氷霜般面扄若是箇村紂的和你兩箇乍相逢他把你那半世児清名送栁靑娘這些時稀踈了詩賔和這酒朋悶来後共誰同一任教花紅和這栁濃有何意戀芳叢則這詩書禮樂不待攻端溪硯塵埋土蒙紫霜毫乾燥了尖峰赤緊的缺了鸞箋無了香翰無香翰怎題紅道合離恨匆匆離恨匆匆天涯咫尺不相逢覔鱗鴻杳無踪濛濛霧鎖桃源洞漫漫水泛藍橋湧雪浪雪浪泊濤洪祅廟祅廟火飛紅翆衾空人悶冗玉青庵錯把衣衾送藕絲微銀屏重比目魚活氷凍小卿道把雙郎送鶯鶯逺却離張珙栁毅錯将家書奉張生煑海金錢夢恨蹙眉峰愁積心中怨恨無窮何時得玉環合金釵輳對對對對上青銅粉蝶児十面理伏創立秦都漢三傑盡忠人物慿着這黄石公三卷天書一来是子房功二来是蕭何智都把這三軍擺布大将軍智壓孫吳我覷那椘重瞳有如無物醉春風收六國􅐈三秦播清名一萬古築壇拜将用賢良蕭丞相舉舉暗渡陳倉明修棧道真天子百靈咸助紅綉鞋困滎陽英雄發怒火焚了紀信身軀将沛公在鴻門㑹上厮追逐吕馬通随着鑾駕陳都尉便䟎着軍卒㸔俺這韓元帥定一箇漢楚石榴花聖明天子百靈扶大将軍有機謀托頼着漢君王聖主有洪福都一般俸禄兩等遷除雖然進西施上不得功勞簿他曾㸔戦策兵書量這箇丁么雍齒成何物他便㑹文共武待何如閗鵪鶉他便㑹握霧拏雲我也㑹呼風喚雨鵲自㝷巢輕如輕如糞土量這箇舉鼎㧞山夯鐵夫微臣根前怎過去縦他計有千條走不出龍潭虎窟上小樓四下里旗旛亂舞八方里軍兵擺布殺的他羞逩齊邦懶歸燕趙恥向東呉那其間軍又無将又踈孤行獨歩来日箇到烏江自無船渡么篇韓元帥明明的傳了将令子房公暗暗的散了士卒閃的他直至江邉架着孤舟酩子里扮做箇漁夫慿着子房謀整隊伍把他在垓心裡圍住飛不過浪滔滔大江東去滿庭芳哎你箇英雄覇主想當日指鴻溝為界創立東都貪財撅了秦皇墓秦宫内粉黛邅誅休咲這胯下夫偷瓜盗粟却端的有撥天關㝎乾坤安社稷權術軍過問陳倉路俺這里兵熊将虎到来日穏情取一箇㑹垓下見箇贏輸快活三丹墀内忙拜舞玉堦前緊山呼豁逹大度世間無大開取賢門路朝天子我王是箇聖主覇王是箇勇夫怎消的百二山河路空做箇堂堂大丈夫便死也無名譽扶立劉朝英傑相助我王是紫金龍㣲臣是白額虎非微臣謬語忠心待破楚我則待扶立得江山固十二月這的是重瞳項羽他可怎生小覷俺這征夫欺負俺沛公軟弱拜韓矦統領軍卒鞍上将如狼似虎走不出十面埋伏堯民歌呀則俺灌嬰盧綰英布彭越用機謀更有那周勃周昌樊噲都尉悄悄促促的暗埋伏殺的那西楚覇王一人一騎要上東吳則聴的擂鼓篩鑼呐喊揺旗五侯人馬當攔住路一聲長吁軍兵一箇無将重瞳啜賺入隂陵路耍孩児氣撲撲按不住雷霆怒統大勢干戈便舉衆児郎准備定機謀向槽頭牽轉龍駒前先鋒持一枝定乾坤安社稷描金画桿方天㦸後合後使一柄攻必取戦必勝鐡桿朱纓倒馬纛九江王使一柄明愰愰燦爛月様開山斧慿戦策南征北討按兵書東蕩西除七煞到来日喊殺聲閙了戦塲蕩征塵遮了太虚殺的箇楚重瞳對面無心取髙聳聳嶮巍巍四圍山頂遍地宻匝匝軍屯滿畨滚滚浪滔滔萬里長江漸漸的都着馬飲枯四下里都攔住咽喉路三畧法軍兵點聚六韜書隊伍潜伏六煞那韓信龍鱗凱乆擐披獅蠻帶䏻結束虎觔絛緊緊的牢拴住寳鐡胎香檀靶鵲樺弓斜掛向雕鸞油漆飛魚袋紫金鈚皁鵰翎狼牙箭輕挿入鋪翆描金走獸壷殺的有去路無回路直熬的他勈舒力盡使不的你膽大心麄五煞一壁廂蕭何運草糧周勃統士卒莾樊噲助喊聲鳴金鼓慣相持慣對壘大将盧綰排軍陣䏻舌辯䏻言語才智随何下戦書陳都尉緊緊的牢防護百萬軍週圍下寨九里山十面埋伏四煞漢主向寳帳中悠悠的奏樂聲子房公在天蓬山暗暗的用智謀笛吹散楚歌聲回去吹的八千子弟閙垓垓急攘攘都把軍隔散四顧㸔營盤中帷幄下冷清清靜悄悄三軍一箇也無他都聴音律思鄉故使不的你滅秦朝㧞山舉鼎刺懐王覇業爭都三煞吕馬通緊緊的随後跟伏路軍急急的催戦鼓殺的箇楚重瞳驟龍駒緊随定虞姬女夫别婦恰便似管娃宫西施女悲切切深閨内離了吳帝婦别夫恰便似晋石崇金谷園髙樓上哭啼啼墜了緑珠生死分前路玉纎手忙擎寳劒磣