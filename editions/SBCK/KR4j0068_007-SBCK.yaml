釧長􅀞簷間鉄馬兒玎璫響庭前靈鵲喧聲噪總是􅄐人也㫁腸霧鎻在明園巷怕分開鶯燕生折散鸞凰二煞去時節留下言怎不教人心内想今朝一去無承望人離楚岫離情逺線㫁風箏在那廂虚夢在陽䑓上空設下山盟海誓甘罷了剪髪燃香一煞收拾起腹内憂再休題心内想􅀙今後眉尖悶鎻􅀟開放志誠蘓氏還鄊巳薄幸王魁􅀒桂娘􅀒心自有神靈鑒再休題人前問信也不索打卦燒香尾音空閑了白玉幃冷落了銷金帳説来的言語全不當一片真心畨騰做了謊粉蝶兒馬嵬坡踐楊妃漢主登極重娉婷慕求傾􅀦㡬年間玉宇難祈幸楊家二八女麗質難棄􅃟入宫闈咲顔開六宫無色酔春風始是受恩時新承憐愛日芙蓉帳暖度春宵怕日髙起起光彩門庭弟兄列土滿門榮貴紅綉鞋奏管絃風飄聲細舞霓裳䄂拂塵低盡朝開宴泛金盃茶迷紅綉榻酒汚衮龍衣只喫的酔醺醺傾玉軆滿庭芳逗引起漢陽鼓鼙霓裳驚破城郭烟迷千乗萬􅀐西南地行色悽悽無奈何六軍不起可憐見馬踐楊妃要救也應無計君王淚垂淋灕濕赭黄衣上小楼風吹的塵埃散起旗耀的日光無色帝主深情行宫見月􅈽恨含悲夜雨零續㫁聲芳心擊碎眼睁睁死生迢逓么馬嵬坡泥土中玉容消塵霧裏空只見綠水澄澄浮雲慘慘明月依依信馬㱕池舘西落紅滿地都做了楚天秋意耍孩兒對離宫蕭索如痴酔太液芙蓉正羙未央楊栁色凄其想芙蕖似面栁如眉春風􅊝李花􅄏夜秋雨梧桐葉落時夕殿飛螢際􅀌燈挑盡鍾鼓遲遲六煞銀河欲曙天柔腸愁陣裏至少呵也有十萬聲長吁氣鴛鴦瓦冷霜華重翡翠衾寒夢寐稀衠一弄凄凉味別􅄐有日相見無期五煞臨卭一道人善精致神􅀑感君王展轉相思意遂教方士慇懃覔魄落黄泉兩不知聞海上仙山際虚無縹緲楼䑓參差四煞其中多士仙䡖盈嬌態軆一人自比非常異太真名喚無虚謬雲鬂花顔甚整齊出落的風流質西廂金闕扃戸關幃三煞知漢家天使来向九華魂夢飛攪衣出戸起徘徊雲鬟不整偏垂風吹仙􅃑飄飄舉歩蹴金蓮欵欵移􅄫寞添憔悴含情舒謝涕淚淋漓二煞㸔人寰塵上生望長安烟霧􅂻但􅀅舊物伸深意􅁫留一股和一扇􅁫璧黄金鈿兩離臨別分盟􅊎人間天上再㑹相期尾聲􅂅為比翼鳥􅂅為連理枝天長地乆何湏計惟此恨綿綿竟不巳粉蝶兒思情心緒難慿只落得守香閨一簾風静對銀缸一寸寒燈意張狂心喬怯神魂不定子為那可増才一􅀧真情送的這俏􅅊娘染疾躭病酔春風我有意紅葉上􅀉新詩他無情綠波中㝷舊境閃得人鮫綃􅀍半床閑暢好是冷冷怎􅀎勾携手相􅀅香肌相揾玉肩相並迎仙客往常似珠碎般手内擎性命般斯㸔承到如今玉簮折恰似瓶墜井見如今信兒稀意兒冷㡬時得鸞鳳和鳴羙滿重交􅖪紅綉鞋想着俺錦帳裏顛鸞倒鳳今日箇㫁人腸魚鴈無慿想着俺臉兒揾懐兒抱口兒侵只為他龎兒整性兒清因此上傾心兒􅀅春事逞十二月帶過堯民歌想起那巫山事踪陽䑓夢好事難成䡖憐痛惜殢雨􅀹雲紅爐内情濃怕分羙滿恩情呀閃的我垂床倒枕冷清清㡬時得鮫綃􅀍裏煖烘烘􅀞堂春色曉風生􅀏吐丁香皺眉峯情濃􅅻覺素軆䡖這的是醫治我相思病尾聲空把鮫綃錦帳懸那裏也羅幃春自生低垂簾幙人􅄫静更那堪綉榻風寒􅀍兒冷粉蝶兒村田樂瓦鉢磁甌庄家每村田享受一年價指望秋收五榖豊豋飫唱的是村歌村奏只喫的老瓦盆無了無休管甚麽丗塵中喧嘩争閗酔春風這壁廂王太公扶起劉郎那壁廂李二嫂搀着村􅅱胡歌野呌閙庄村田家每喫的好醉酒酒他説道秋滿盈倉納完糧稅便是俺老庄家一年成􅌻普天樂望春秋還依舊一年過了又早年頭見如今􅀦泰安衆百姓每樂業受庄家每箇箇無昏晝村厮兒犁耙疇田禾内稻􅌻村醪酒篘再受用瓦鉢磁甌水仙子瀟瀟雨洒一扁舟細細風吹兩岸栁小船中共友閑窮䆒􅀏吟吟茶共酒錦鱗􅌻旋折泥頭説一㑹前唐西漢講一㑹天長地乆論一㑹吳越春秋又人生虚度七十年捻指光隂在眼前烏飛兎走疾如箭嘆浮生有甚堅争名利枉做徒然千條計􅀍天一筭萬物生止直慿天天報有善惡姻縁粉蝶兒嘆世八字生時富和貧皆因前世無錢的受盡了驅馳有錢的衣䡖裘乗肥馬不枉了人生一世賭不的伶俐精細運不通不怕你千䏻百㑹酔春風每日家東奔西走有如飛受貧窮何日止困龍也有上天時􅀅前人来比比孟軻於齊絶粮孔子受窮殺蘇秦張儀紅綉鞋覷富貴不􅀎富貴有文齊福不􅀎齊世間人􅀎走不􅀎飛有東西無南北有南圵少東西因此上難明天地理普天樂富休誇貧休􅀏貧而無謟富而無驕貧休貪不義財富休􅀅貧人􅀏富貴貧窮由天造富和貧委實難學陳雷膠漆分金的管􅇹􅂅平生善與人交上小楼富和貧無根無基倘来物難存難聚見㡬家富了還貧貧了還富成敗興廢為錢呵子父離好相識教財絶義這錢呵買佳人貞節輸志么身貧言語低苦勞晝夜思常言道大富由天小富由勤起早眠遅一㑹家怨自已思量了一㑹元来是注定了飢寒二字十二月古到今貧窮有㡬我這裏暗暗情思有㡬箇文章似海運不通到受驅馳見㡬箇詩書意淺後来呵金榜上名題堯民歌呀我這􅂻焚香拱手吿神祗天宫注造有髙低與人厚薄有増􅃜他人逞志我無時躊躇太公八十􅀆後来􅅻把文王遇耍孩兒凄凉淚打腮􅁁轉愁滿􅅐懐不恨天如今光景都更變紅纓白馬人人敬赤手空拳箇箇嫌猜透了曹兒面有錢的人前説話無錢的閉口蔵言二煞無錢呵空説天花落掌中眼前生並蓮衣衫襴􅈁人䡖賤有錢歪談亂道胡有禮無錢的説過六􅀦機關總是閑到䖏人輕慢寜俺苟延􅀊月莫辤二字飢寒一煞你記的長江水不廻中年在眼前為家􅀻愁的我朱顔變人生有似當風燭水上浮萍不耐堅休誇羡天折磨衰如燈㓕大運退雪滚湯煎尾聲本分的天可憐困窮的守自然豈知天意如車轉有一日運至時来那時節顯粉蝶兒逰赤壁十月之􅀄步雪堂孟冬時序臨臯二客􅀙予過黄泥木葉脫滿天霜露人影糢糊向青天仰觀蟾􅇠酔春風顧樂以行歌相酬還嘆􅂑今夜箇有佳賔無酒更無餚真箇是苦苦月朗風清好天良夜怎生虚􅀒紅綉鞋有客語停舟薄暮栁隂中舉網得魚細鱗巨口状如鱸山妻蔵斗酒專以待供需因此上赤壁逰重吊古普天樂雪山傾洪濤怒山髙月小水落石出江流半夜聲㫁岸千餘䖏日月攛梭飛烏􅇠翫江山不可重復踞虎狼險窟登虬龍禹􅇅舉雕鶚巢居耍孩兒劃然長嘯潯陽路草木動山鳴􅀿谷悄而悲肅而􅂲凛而呼放中流烟水糢糊半江洶湧波濤怒四顧寂寥人影􅀌適有􅀌鶴横江去衣如玄縞翅若輪車二煞長鳴三兩聲髙飛二里餘湏􅁷一夢神仙遇臨臯之下揖而語赤壁之逰樂矣乎問名字留不住俛而不荅􅀎以鳴呼尾聲疇昔之夜終飛鳴過我居道士顧􅀏予驚悟開户觀之不知汝粉蝶兒思怨這些時浪静風恬再不去喚官身題名兒差占直睡到上紗囱紅日淹淹􅀙今後管家􅀻學針􅃌罷了花濃酒釅一㑹暗搯春纎我這􅂻数㱕期故人作念酔春風舊約信難慿新愁眉帶臉落紅滿地不鈎􅄕把朱扉掩掩怕對菱花照人憔悴不似我舊時嬌艶迎仙客靈鵲兒噪緑槐喜蛛兒掛在垂簷不由我腮斗上喜孜孜堆着􅀏臉這書寫時節帶着些愁眉封時節秋淚粘折開封皮仔細觀瞻我與你一字字􅀙頭兒念石榴花原来這負心的真箇不中粘想當􅀄啜賺我話兒甜則好去破窯中捱風雪受虀塩那時節謙廉君子謙謙疾發的赴科塲􅅻把鰲頭占風塵行不待占粘如今這七香車五花誥無慿騐到做了脱担兩頭尖閗鵪鶉則有分淚眼愁眉無福受金花翆鈿我這􅂻按不住長吁揾不乾淚􅀧誰承望你半路􅂻􅀅人来死抛閃恩情似水底塩到罵我路栁墙花顧不的桃腮杏臉上小楼也是我前世􅂻沒緣也是我今世􅂻少欠疾發的他應舉求官獨歩青霄折桂扳蟾受了些老母嚴女伴每􅥦何曽心厭兀的不􅃜􅀒了小卿􅀟漸么有一日見了他我和他便有甚臉若見俺那􅀒徳辜恩短命喬才敢吃我㑹摑打揪撏見放着海神廟有報應爺爺靈騐㸔你這􅀒心賊恁般短見十二月這厮把鶯花来􅉯粘俺娘􅀅財禮錢忙拈你道是先憂後喜我㸔你有苦無甜請學士先生吊膁快疾忙㱕去陶潜堯民歌使了些精銀夯鈔買人嫌把這厮剔了髄挑了筋剮了肉不傷㢘我􅀙針頭線角不曽拈我子㑹傅粉施朱對粧奩心嚴財錢信口添着這厮吃我㑹荒劍耍孩兒俺伴的是風流俊俏潘安臉怎覷那向日頭的獾兒嘴臉喬趋蹌宜舞一張掀怎和他送春情眼角眉尖我心􅂻不愛他心裏愛正是家菜不甜野菜甜覷不的喬鋪苫㸔了他村村棒棒怎和他等等潜潜二煞你休誇七歩才連敢道三箇塩九江絶品三江㶑􅀝仗你馮魁茶引三千廣強把蘇卿􅀬似粘眼見的泥中䧟赤􅂃的販茶客富更和這愛鈔娘嚴尾聲徃常時一迷􅂻嫌到今日都是謟汝陽齋眼見撅下坑塹不隄防腦背後􅀅咱這一閃粉蝶兒省悟殢雨􅀹雲半生狂不依本分慣得来忒逞精神折莫是翠紅郷脂粉隊更合着栁營花陣占㫁芳春但題着箇頂老兒便就心順酔春風常子是眼兒裏恰相傳意兒中却早肯蹅踏的秦楼謝舘羙風塵相随得􅂃􅂃成就了不一䖏的萬種恩情做慣了難記数的千塲子弟結下了無打􅄸的百年縁分紅綉鞋到如今悔去也言而有信㸔来也徃事休論恰便似一枕黄粱夢醒人你如今樂仙家千載夀飬丹竈四時春想着那戀鶯花何太蠢石榴花你為甚錦營中叅透要修真赤􅂃的别是箇俏家門怕不待清歌妙舞酔紅裙你便是出衆超羣也索着昏子􅀍他鴛鴦債的心先悶撥換得㡬星兒剰雨殘雲直􅆈的形骸坎􅇄頭旋暈抵多少拍拍滿腔春閗鵪鶉怎如你修煉的一粒丹成保守的千年夀穏你也曽口内親傳心中自忖這玄妙􅀙来有定准休􅀅􅀃謊話云和合的真汞成形便是你真鉛報本上小楼㸔了那愚迷世人他怎肯安心守分都子待賽逞風情枉用心機強打精神不隄防腦後門􅃻箇昏筋輸力盡我㸔那推磨的小哥每困也不困么那其間悔後遲思後恨直待的骨節酸麻眼腦迷稀鬂髪紛紜若還是痩損形疾在身他又􅀅行貨來打襯你㸔那海神仙恨也不恨耍孩兒既叅知便索􅀙今認休等得恁時節遭他那一窘你􅀅這藥爐丹􅂦􅄪新修直㸔那紫金丹寳氣冲雲抽􅀅坎内陽鉛出合得􅄐宫隂汞均也不索三車運不湏那風波猛烮只要這火􅀱調匀尾聲既得了􅁰珠般一粒丹急􅀅来華池中滿口吞這的是神仙自有神仙分那其間􅀅你這折栁扳花的方􅅻證得本粉蝶兒四時享樂明媚春光遍園林萬花争向舞蹁躚蝶粉蜂黄栁拖烟桃噴火東風飄蕩春景非常一䖏䖏管絃嘹喨酔春風仕女撥銀箏逰人捧玉觴牡丹亭畔咲喧呼喜孜孜攘攘燕語梁間鶯啼栁外鳬眠沙上呌聲回首又端陽向日葵花放馥馥薫風逓荷香剔銀燈梔子開恰便似玉粧榴花吐有如猩綘我在這紫藤席􅃢瑚枕青紗帳我恰􅂊夢􅀄囬浴罷了蘭湯我恰向凉亭上水閤傍揮羽扇晚風清最爽蔓菁菜屈􅃌早金風蕩梧葉兒嚮銀床南楼外鴈翔正遇着􅈉壮雞肥菊􅀄放㝷㡬箇知心友同歡暢快活三荷盡應無雨盖張菊殘尚有傲嚴霜一年好景莫相忘又冬月堪酬賞􅇹老兒隴畔寒梅送暗香折取在瓶中放天上瓊花呈瑞祥亂舞在空中降恰便似撏綿扯絮堆塩撒粉鶴羽翺翔蔵山壓􅀣期梅折竹宿麥遺蝗尾聲四時景物喜百年福禄昌妻賢子孝應無恙代代相傳樂榮享粉蝶兒仗義踈財這㡬日閑坐在山營猛聴得喚一聲李山兒急忙荅應我􅀅這加鋼斧磨得来耀日争明􅃒莫是差咱去探官軍刼牢獄救人之命我怎敢消停忙把這茜紅巾額顱上拴定酔春風我這􅂻整頓了黒油鎗提掇起紅納領出門来聞不得一陣家血風腥􅀅咱這膽量来逞逞呌着浪子燕青更呌着山兒名姓受不得他恁般催併紅綉鞋莫不是出水寨與人爭競莫不是下梁山打探民情莫不是有冤屈吿状要分明莫不是方臘賊来作耗莫不是蔡太師忒胡行莫不是大金家侵界境么莫不是護俺那宋官家去李師師家逰幸莫不是護俺那宋官家上元驛􅂻􅀻行莫不是護俺那宋官家黒楼子上聴箏莫不是護俺那宋官家趙玄奴家開小􅀃楊太尉家按新聲却怎的喚恁箇黒爹爹不住程石榴花聴􅀃罷氣撲撲惡向膽邉生真恁他􅀅百姓忒欺凌便做他􅀝官挾􅀔莽施呈也有箇三媒六證問肯方成便做是窮庄家不敢違尊命也存些天理人情却怎生走􅀅来不下些花紅㝎平地裏奪了箇女娉婷閗鵪鶉實是那趙都廵的短倖難容這雪冤李山兒親身􅂅領我合着浪子燕青我􅀅那機謀暗整扮做箇嬌娃窄歩兒行向轎兒􅂻乗暫學些抺粉搽胭權做箇油頭粉􅖪上小楼他必然衙中厮等􅀅俺簾兒掲㝎得入的前門到得中庭坐列幃屏㑹聚賔鼓樂聲花紅滿徑你㸔我扭扭揑揑的騎鞍驀勝么一覺的掲了盖頭見了我醜形一隻手揝住頭稍摔下堦基打碎他天靈我直教諕得一城閙到五更不知名姓到来日安安穏穏的哥哥前復命耍孩兒這一塲雪冤報恨無乾浄打的那濫官吏潜踪㓕影也不湏小婁羅相送下山程只消得黒旋風浪子燕青向人叢若見他喝一聲骨突突江河沸到城市若共他併一合忽刺刺山岳驚慿着俺􅀟拳硬一條鎗神輸􅀑磨一把斧月根風生尾聲不是李山兒誇大言俏燕青敢自逞要活的呵恰便似死狗兒般拖􅀅来寨兒下等粉蝶兒慶朔堂正值新秋別離情把人迤逗我和他二年来心意相􅄬傚鸞凰同琴瑟把姻縁成就分開了燕侣鶯儔今日箇送情人淚淹衫䄂酔春風我子見馬鞴上寳雕鞍船灣在新渡口見行装一㺯兒助凄凉直恁般陡陡㸔了那滿目秋光一鞭行色全不似去年時􅀱紅綉鞋雲慘淡半空嵐岫水縈廽兩岸鳬鷗閑西風新鴈一天秋紅添楓葉恨情送逺山愁我這裏折蕭條官路栁滿庭芳髙擎玉甌謌詞􅂴唱箏瑟慵搊樽前強展眉間皺雨淚交流少留戀閑茶浪酒休忘了俺皓齒星眸㝷争閗再怎肯出乖㺯醜休想我抹上燕鶯儔石榴花你子待懐揣着訕臉入青楼全不害臉兒羞你道是揮金統鏝的下塲頭􅀙今後罷手一筆都勾這塲風月空遥受到如今覆水難収􅂯不索手掿着冷汗偎紅䄂枉了你風雨替花愁閗鵪鶉自做得剔蝎撩蜂更􅀃甚眠花臥栁撇罷了浪雨閑雲蹬脫了狂朋恠友休學新来砑的禽兒每􅉯厮兠少追随少趂逐你便索錦􅀍􅂻抽頭且向那紅裙中䄂手上小楼罵你箇恠魔􅀑頭腌􅧐禽獸便做道水局娼門路栁墙花也有箇葉落㱕秋我子道你近来立志氣思前􅄸後誰想你爛冬􅀲不中撩閗么你不害臉上羞他不合心上有他􅀅你㸔似明珠愛似心肝惜似􅀟眸你却也全不肯想恩情􅀅他等􅀱原来你屎盆兒刷殺還臭十二月常子是􅀌眠自宿一任教緑慘紅愁你若肯寜心兒等待怕甚麽􅀊月淹留我如今整頓下團衫大䄂有一日改換了粉面油頭堯民歌我子待守香閨關暖閤鎻重楼我子待掩朱扉垂綉幙控銀鈎我􅀅你落花飛絮等閑休閑情如水付東流似這般清幽􅀅心来急早収休等的人比花枝瘦耍孩兒我􅀅人情冷暖都叅透我和那雲雨夢參辰卯酉婦人家行止自當修難管難収你子愛今朝紅蕋蜂成隊我子怕明日黄花蝶也愁委實的休僝僽眼見的侯門有望到大来髙枕無憂一煞無人拏我的奸無人咲我的醜雖然是娼門活計􅀙来有只因我平生心性剛如鉄因此上一世生涯拙似鳩受了些娘雜嗽學穏重妖嬈軆態不施逞宛轉歌謳尾聲枉説了萬與千省不得十共九我􅀅這一身兒獨自捱昏􅀞􅊠􅉡下羅幃耐心兒守粉蝶兒烟花夢冬景蕭踈又遇着濃摳兠一天雲霧散瓊花徧滿街衢剪鵞毛踅羊角粉粧成林木玉宇氷壷赤􅂃的路凹凸怎生移歩酔春風似這般凍雪壓征衫寒風砭痩骨莫不是春㱕也栁絮滚香綿却怎生半空中舞向人頭上撲撲我􅀅這䄂兒拂僧舍裏颺一􅈁茶烟歌楼中消一􅁭酒力扁舟上披一簑漁父紅潚鞋這雪韓退之他也曽迷踪失路狄梁公他也曽感嘆嗟吁賢逹婦他也曽􅀟駕井陘車酷寒亭他也曽悲孔目破窯内他也曽凍寒儒貶黄州他也曽􅀅學士阻么便有那穆官裏也難歌黄竹便有那孫康志也怎地讀書便有那晋􅀽安也盖上箇厚綿􅃭便有那王子猷也難舉棹便有那孟浩然也不􅀐驢便有那陶學士也茶怎煑么謝道韞把楊花比喻陶仕行􅀅木屑平鋪蘇子卿飲雪飡毛在單于蕭君有老糜哀滕六降衛君感樵子哭出倉粟便有那李􅀅軍也破汝么我子見白􅃼􅃼渾迷逺渡素皚皚亂糝長途迅􅃌間千里山川似銀鋪我子見㱕鴉􅄬古木寒鴈宿深蘆􅀅我這紅綉鞋蹅上些泥共土石榴花對着這青燈相伴影兒􅀌又撞入囚妓女黒豊都我和你百年恩愛做妻夫既知心可腹似水如魚誰承望踏枝不着空囬去閃的人尖檐脫兩頭無我􅀅這千言萬語伊行訴誰解我天来大悶葫蘆閗鵪鶉儘今世鳳隻鸞􅀌再怎肯鶯儔燕侣撇罷了抹月批風休􅃌望巫雲楚雨守到那石爛江乾河海枯也栽不成連理株布襖荆􅁫無福受花􅃣綉服上小楼寒門草廬蓬窓蓽戸我子待􅀘綻縫聮倒杼畨機每日家播種耕鋤奉舅姑事丈夫􅀝賴着十親九故實􅃌望一家兒上下和睦么我便似搯了毒的蝎你便似㧞了尾的虎送得来棄業抛家背井離鄊鰥寡􅀌獨常想着結髪􅀄又不到半載餘也􅄸了春風一度抵多少結絲蘿百年夫婦耍孩兒一樽酒盡青山暮淚滴濕征衫半幅眼睜睜千里踐程途望天涯雪景糢糊呌一聲才郎身去心休去空閃的賤妾人􅀌夢不􅀌魂靈兒每夜似風前絮冷清清单衾獨枕痛煞煞短嘆長吁五煞我如今送君十里亭好􅀅這良言親自囑早晨間調一盞辟風寒壮筋力香湯服白日裏合一箇有誠實好伴侣途中走到晚来㝷一箇曽厮認㑹温存店内居問一條無泥濘的平川路饑渇時少飲食生冷風寒時休脫換衣服四煞囬到你南方舊祖居怎􅄐了中原厚水土隄防着一天風浪把長淮渡嘱付你山花野草休親傍浪酒閑茶少去沽到後夜相思䖏空盻煞青鸞􅀉恨無承望白鴈傳書三煞急煎煎別意長哭啼啼􅄐思苦恨綿綿塞滿柔腸肚正似那鴈㱕紫塞人淹楚夫戍蕭關妾在吳􅄣把這羈懐付望的人眼穿腸㫁憂的人魄散魂無二煞㸔了這黄􅫌􅫌風捲沙濕淋淋雪共雨見了些髙低愽浪堆銀粟見如今寒氷凍透鴛鴦骨那􅂻也暖水温存比目魚􅀍鶯燕閑嫉妬不由人情傷肺腑氣咽胸脯尾聲恰待要附耳􅀃咱腹内言不由人倒身􅀅他懐内撲子􅀍這歹哥哥推擁的兒夫去好着我跌着脚搥着􅅐放聲哭粉蝶兒辰鈎月恰􅄐了閬􅁐蓬瀛駕青鸞一天㱕興這其間廣寒宫仙樂来迎散天香凝瑞靄夜䦨風静搗玄霜玉兎長生掃浮雲放開金鏡酔春風隠約玉蟾光扶踈丹桂影遍乾坤萬里露華清暢好是冷冷百尺瑶臺九重銀􅇅五雲芳徑迎仙客任盈虚經百􅀊結隂魄夀千齡見了些滄海變更塵世景俺怎㑹暗偷期潜地裏等做不慣雨態雲情那裏有風月踈狂情紅綉鞋廣寒殿清虚勝境娑羅樹有影無形江山不改古今情常子是氷輪晴露滿又不曽翆被暮寒生那􅂻也西廂和月等石榴花又不曽曉風殘月入華清這的是酒病怨春鶯又不曽轉教他小玉報􅀟成那秀才着迷不省空着我淚眼盈盈更做道幽明兩下􅂻相兼併誰曽學暗約􅀻情全不􅀅隂陽神􅀑相欽敬惱的我惡向膽􅁁生閗鵪鶉常子是洒洒瀟瀟受了些清清冷冷㡬曽㑹悄悄㝠㝠潜潜等等照的這大地山河萬里明􅀅往事自論評見了些虎閗龍争那􅂻也鶯招燕請上小楼我本是隂陽至精難同那木石靈聖自􅀙那清濁􅀄分天地􅀄成便有這水火􅀄凝萬象咸尊七曜同瞻三辰為證怎比那小妖魔把人傒倖么本是虚明的氣結成那思取思凢的罪犯情你那法官口是心非面善情乖行濁言清我想着那後生忒世情他􅀅那妖邪􅅶定剗地道奉天心五雷法正滿庭芳和奸事情他道俺􅀻􅄐月殿待要去上奏天庭不明白迤逗的無乾净恰便似掩耳偷鈴既做得蔵頭露影激濁􅀭清待和他相折證直捉住真賍罪名那其間打㓕了潑風聲耍孩兒賫神符用法力傳宣㫖下界去把思凡事整他道是占塲兒傒落的那酸丁病淹煎九死十生本是箇短翎毛比翼難成對怎做的亂疙疸同心結未成他子待忙催併戴一箇四方黒㡌扎兩􅈁三尺紅纓五煞牡丹芳春日嬌荷花香暑雨清秋冬梅菊風霜勁子恁四時羙景因花艶空着我萬里㱕心伴月明我子索㝷抄徑快疾行動不索消停四煞石季倫並蕋嬌太真妃一捻􅁿姚黄魏紫編為姓沉香亭外新曽賜花蕚楼前舊有名􅀃起那喬行徑傒落的唐寜邸忙􅃻羯鼓禁持得隋宫娥滿挿龍瓶三煞正值俺惡情懐愁似織他道我糖口兒巧撇清􅀝紅粧曽把頭兒並張昌宗比並的同伊艶周茂叔㸔承的似你清你也曽窩苫着鴛鴦甯俺住在雲宫月殿不似你栁聖花星二煞引的箇陶淵明呆荅孩凍的箇孟浩然嘴骨􅏢赤􅂃地籬􅁁嶺上枝梢硬三冬玉瓣飛龍腦九月金錢滿鳳城且休索閑爭競便做是風花有罪迯不過雪月知情一煞吕􅀩正破瓦窯鄭孔目酷寒亭變青山揺碧􅀣獨強性斜吹赤壁舡難動漫擁藍關馬不行送了些生靈命剪鵞毛貧窮冬冷客旅秋驚尾聲且去来且去来不索争不索争風花雪月同朝聖􅀅俺那􅀒屈㘅􅁈状兒来整粉蝶兒悟真如眼力昏花裊西風数莖白髪寨兒中小小生涯待官貟迎子弟悶来閑話賣着些􅂖雨新茶一世兒不曽虚詐酔春風慿方寸志誠心有神天􅀎鑒察我常􅀅忠直言語勸街坊全不㑹假假我勸人孝順爺娘和睦郷里㸔承姻婭紅綉鞋試聴我平心説話論行蔵誰得如他他􅀅這錦陣花營不曽蹅支楞箏的頓開玉鎻踈刺沙的擺脫金枷暢好是自逍遥清静煞石榴花好兒好女眼前花一哄地閙諠譁便做是有錢有物莫矜誇世情如嚼蠟恩愛似􅅮沙􅀍光隂催儧的他心驚怕急囬頭鬂霜華有一日臥麒麟髙低在圵邙下知他是明月落誰家閗鵪鶉都子為慾火貪泉致令的心狂性儍出来的􅀏有嫌無常子是􅀅真作假不似恁猱兒每忒狡猾似宣州花木􅀲全不肯改志収心剗地待粧聾做啞上小楼你子待街頭撇花席前謊詐但見些嚮鈔精銀懐􅂻忙揣手内頻􅎲若共他兩事家争鋒截馬直􅶭的郎君每血忽淋刺齊天樂你子待向星前月底歡洽委實地擔驚怕真如慣跳塔輪䥷臥房中玉鎻金枷􅀙他那䡖狂􅀔沙空陪酒共茶明明地賣俏迎奸暗暗地棄業抛家肉鰾膠粘花圈圚大過一世虚花紅衫兒難􅀃知心話為甚􅀅伊罵潑生涯潑生涯直恁傷風化忒情雜忒情雜儘放縦心猿意馬滿庭芳他子為心情冗雜倐然光景撚􅃌韶華便有那嬌兒嬌女難描􅀞都是些歡喜的冤家因此上知去就端嚴坐化恰正是􅂯重来現世菩薩􅀃與恁休驚訝一任他閑人嗑牙都是那打鼓㺯琵琶耍孩兒􅀅恁這半生風月収拾罷嘆塵世光隂沒揣拏清閑冷淡作生涯便休去排塲上土抺􅁅搽撇末中再莫心留戀花爨􅂻休􅀅脚去蹅趕趂處休牽掛収拾了古㺯洗渲了烟花四煞􅀅恁那賤衣食早打疊潑風聲湏按納􅄪休題春宵一刻千金價􅂯莫㺯笙簫鼓板􅌙箏瑟賸買下柴米油塩醤醋茶􅀃㡬句家常話每日家畨機倒杼紡布緝麻三煞常題着善在心早起些勤治家休睡損􅃢瑚枕面春風凹你既是青楼再不揺歌扇又何湏絳􅈁猶封繫䑀紗恁若是得閑假􅀅佛經朗誦把数珠頻搯二煞讃嘆你李妙清證菩提老媽媽盖因為輪廻轉的你心兒裏怕你莫在寳蓮臺畔閑聴講兠率宫中正散花你若是神通大􅀎􅀅你佛光遍照慧力㣲加餘音我子見豪光龕上生天花空内洒香風滿室雲迎迓似這等感應昭然是不假粉蝶兒泣楊妃寳殿凉生夜迢迢六宫人静對銀缸一寸殘燈枕席間靈寢處起顯的吾當薄倖萬里龍亭知他宿誰家一靈真性酔春風恰盡一爐香我與你便旋添黄串餅娘娘似竹林寺不見半分形到今日則留下影影娘娘你殁死之後在生之日我可便一般恭敬呌聲髙唐也夢難成可那􅂻也不愛卿愛卿怎生無些靈聖越顯的吾當染之卿剔銀燈我子道是這荅兒單于王的使命呼喚俺那昭君的名姓喚王嫱不肯道是燈前應元来是􅀞兒上丹青猛聴的仙音院鳳管鳴便道簫韶九品蔓菁菜可怎生白日􅂻無承應並不曽做到天明夢景恰原来鴈過長門兩三聲怎知道更有一箇人􅀌另白鶴子多管是春秋髙觔力短莫不是食水少毛骨􅁿待退去後愁江南網羅寛待向前怕北塞雕弓硬么篇感傷似昭君思漢主哀怨似作薤露􅂘田横凄凉似半夜楚歌聲悲切似唱三疊陽關令上小楼早是我這神思不寧又着這􅁈家纒定他呌的慢一㑹兒長一聲和盡寒更不争便打盤旋這荅兒裏同聲相應你可便差訛我四時莭令么篇你端的㝷子卿覔李陵對着靈堂專教吾當見景生情則俺那逺鄊的漢明妃雖然得命不見你箇毛團也耳清静滿庭芳莫不是自愛自聴恰便似林鶯嚦嚦山溜泠泠山長水逺天街静我子怕悮了途程子􅀍你冷落湘江暮景不知你宿誰家人過留名更那堪瑶堦夜永盻煞月兒明十二月休道是吾當動情呀便是那宰相每也難聴又不比雕梁燕語錦􅀣鳩鳴漢昭君􅄐鄊背井阻隔着千里途程堯民歌子聴的呀飛過蓼花灘􅀌鴈兒不􅄐了鳯凰城􅀞簷前鐡馬兒響玎玎寳殿上君王冷清清寒也波更蕭蕭落葉聲燭㓕長門静尾聲一聲兒遶漢宫一聲兒􅀉渭城暗添白髪成衰病不恁的吾當勸不省粉蝶兒慶夀閬􅁐瑶池老人星降臨凡世衆群仙左右相随一箇捧仙􅊝一箇擎夀酒一箇獻丹砂一粒奉􅃙令文籍􅂅延年一生榮貴酔春風夀添似西岳嶺頭雲福増如東洋海内水一生福夀兩全齊一家兒喜喜夫婦康寜子孫孝順弟兄和㑹十二月曹􅀦舅􅀅笊篱李孔目鉄拐忙提張四郎輪竿捲起吕純陽寳劍光輝陳七􅀅霞光影􅂻徐神翁披㝎仙衣堯民歌呀韓湘子牡丹花頃􅈓不宜遲張果老白驢勝似促風疾蓬莱閬􅁐􅂃相随更有那益夀延年漢鍾離堪和風細細吹来慶賀長生日尾聲金童擎着仙酒玉女捧着瓊盃東華仙􅀮􅀮在祥雲􅂻􅀅百􅀊靈丹慶夀你粉蝶兒哭楊妃玉骨香肌臥荒郊塜蒙塵昧塞空穴草擁沙培綉簾垂鴛幕簌重門深閉常想着懶出宫闈卿呵早則不怕鶯花咲人憔悴酔春風氣結就嶺頭雲淚湮着泉下水雖然不得便生天也是寡人箇禮禮空伴着三尺魂幡一軸影􆂀半間靈位迎仙客急􅋩􅋩難忍耐痛煞煞怎禁持割捨了痛哭一塲便子待甚的欲嚎咷却又後悔只恐怕軍政司條例又有俺這難棄捨渾家罪石榴花恰長安西望綉成堆子見滿目擁旌旗向馬嵬東畔血沾衣怎知有這塲抛擲半生錦帳恩情棄馬頭前蹙損蛾眉一條素練把咽㗋繫消不得髙塜瑞烟迷閗鵪鶉子向這淺土􅂻浮丘盡都是行踪過跡你是随霧也那随雲你却是做神也那做􅀑非是吾當肯棄擲只般狠做為都只因他虎閗龍争生拆得鸞􅀌鳳隻齊天樂誰承望正行􅂻六軍圍閑仗劍月輝輝嚇帝主除兄妹捲地胡塵潼關失􅀝仗用人之濟抵多少狐假虎威子揪父髻臣扯君衣乾荷葉徃常時小娃随侍兒携起嬌無力韈塵移暗香􅊞􅀁為兒偏稱帝王機却元来只不可􅀅軍意上小楼子為韶華暗催把春光空費恰正緑嫩紅嬌早葉落花飛似恁得杜䳌啼鷓鴣鳴林鶯嚦嚦再休想驚破海棠春睡么篇寡人勸力士省可􅂻哭呌起不争你信口開合放聲悲啼倘或間赱􅀅来道楊妃和咱同例你和我也無塟身之地滿庭芳吾當命􅂻值灾星照耀惡限臨逼區區鞍馬空勞役劍閤崔嵬早是我亡家敗􅀦更那堪害子傷妻早知道逢今日折莫兵屯萬里寕可我去待自迎敵紅綉鞋早子恁功成名遂生教俺財散人􅄐􅀾􅀐冲雲猛跨馳情巳㫁淚􅀟垂六宫中誰第一快活三止不過梧桐􅀣下按羽衣又不曽蓮花帳上悞了軍期臨危不敢共他相持倒反做了箇􅀦舅娘娘罪鮑老兒未殺他人先損了自巳怎做得後取那潼關計見放着􅁁庭上造反的怎做的禍起蕭墙内􅀙新革故擎王保駕統領軍回誰知道依前似舊欺君做事却向蜀西么篇想俺那厮嗔厮持忒温柔性兒再誰似的是他但嗔但喜可喜娘臉兒再誰襯的向懐中􅈽座上偎樽前立不由人不愛惜不幸上值着風流迭配半路􅂻教軍人勒么篇􅀅凶年避登蜀地列戈㦸九重圍遶賊兵退還宫位對文武兩班齊削了權兵去了爪牙除了官職恁時莭俺近的翰林院有俺功臣每史記􅂻不湏用文意煞尾寡人親􅀅古跡標湏當教後代知半行兒褒貶盡陳玄禮寫詔不由皇帝強向那馬嵬下踐了楊妃粉蝶兒力士泣楊妃若不是􅀅令行疾􅕑些箇把撮合山連累沒来由也去臨逼恰對元戎休道其中情􅁦子道髙力士明知更做巧舌頭怎生支對酔春風子為他復望雨雲期生送得不着墳墓􅀑帝王家妃子要為妻祿山賊休好羙羙天子僝僽衆軍寜貼自家也伶俐迎仙客不是我佯孝順假慈悲禁宫中起􅀄曽拜識雖是各爹娘厮認義據着覷當追陪不若如親兄弟石榴花記得那彩雲成陣錦重圍恰正是人軆態酒為媒忽變做落花沾土絮沾泥怎想這祿山賊統領征鼙一時間􅕑逼迫煞陳玄禮誰承望正行之際半霎兒􅕑殃殺唐皇帝一片聲呌道宜早不宜遲閗鵪鶉他子待按法依條那􅂻問違宣抗􅃙􅀝􅀔挾權死一般做頭害底非是俺心偏向􅂻迷恁也待顯正直據這般剪草除根那􅂻是扵家潤􅀦普天樂阻天顔􅀙心意怎息雷霆之怒罷虎狼之威施狠切誇鋒利􅃌歌舞為名相羅織其間事容機宻就􅂻僥傒宻把宫中禍機軍前號令便説法外凌遲乾荷葉明明是不曽題暗暗地早任誰知做多少英雄􅀔見放着亂宫賊不敢與他做頭敵既然教奸婦一身􅃜你却湏合問那奸夫罪上小楼每月家干請俸給經年常閑着兵器恰見􅀾馬奔騰早教幸蜀廻避你可早路途中保護得無踈無失兀的是大唐家飬軍千日么篇他為甚麽痛未休為甚麽去便回子為他龍閗魚傷􅇠死狐悲三十年弟兄般何曽相棄早是俺眼睁睁物傷其􅀋滿庭芳恰得箇風恬浪息他剗地昻昻而巳却教俺怏怏而㱕好教那白練把你十分勒死後正合宜每日居禁􅁐豊衣􅁕食誰教你背君王落道為非臣當日若不看娘娘的面皮怎容過這蠢東西六么令今日對你􅀙實分析不是見喫閃着􅃜你勸不的把俺死央及對面又難為因此上不免的依随偷方覔便雖做羙得廻避恁偎香抱玉無了期世着迷子管着迷直到落便宜紅綉鞋那厮生得来矮罷下􅽩来寛膀䑀粗古魯恁来闊腰圍項圎蠢腮啉㖔胖容儀胸凸報肚纍垂却是那些兒引動你快活三猛生怕渉疑詐為兒厮瞞昧雖不懐胎十月得分􅄐却有乳哺二年意􅇹老催誰想恁悄悄㝠㝠預先做下張鴛鴦􅀍誰教你喜喜懽懽正羙裏自拆散鸞凰隊特然遣趕漁陽鎮守防護夷狄忽然變亂把潼關攻擊􅆲皇基六么令早子都你東我西恁平地塟送三不㱕却教父南子北無前事間隔在兩下􅂻到黄泉見夀王迎禮第一句説甚的是子是皇妃情理却也受煞你􅀅軍氣么篇那催兵吏􅥋征轡子聴馬過處哭聲悲辤軍壘􅄬蜀􅀦更壓着人和凱歌回怕的是還朝日翰林院那管無情筆休想道半星兒不完備暗想風流形􅀔到今日成何濟堯民歌也曽風流霞洗也曽粉耨香偎也曽華攅錦簇也曽翠遶珠圍如此般夫榮婦貴今日箇瓦解星飛恰便似野風吹散􅁓錢􅁅劒嶺嵳峩路人稀碧桃花下月平西咲煞蜀禽也難廻狼藉狼藉殘紅襯馬蹄休想花有重開日尾聲娘娘呵你使些躁􅁀方减些是非自通傳曉諭長安内道他無罪強向那馬嵬坡下踐了楊妃粉蝶兒禄山泣楊妃雖是我肌軆豊肥豈辤憚路途迢逓不曽分星夜驅馳馬行乏人走困剗地開旗拽隊暗想㱕疾全不似去時莭容易酔春風滿腹㫁腸愁一聲長嘆息夜来由自説活人今日早做􅀑􅀑怎不教怨氣冲天落的惡名留世早則都死心塌地迎仙客若不殺了􅀦忠㓕了皇妃平白那􅂻有背君作亂的雖是不爭鋒㝷對壘子是待強帝宫圍委實無塟送娘娘的意喜春風天香􅀦色辭人世玉骨冰肌襯馬蹄凄凉􅀌枕助鴛幃聞􅀾鼙抵多少更漏促曉鍾催石榴花憶惜花憐月暗偷期常則春早起夜眠遲六宫中即漸􅂻有人知只恐怕敗露帝王疑敢故然􅂑咲爲兒戯到教咱盡歡了三日夜筵􅀙此無疑滯恰便似親子母不相􅄐閗鵪鶉常子在翡翠鴛衾芙蓉帳底恰正是楊栁情嬌海棠睡羙想着那旖旎温柔俊􅀁爲怎忘得並不是暫煞兒歡娛盡都是通宵况味普天樂近􅂻話也不合題說着早森森地俺受盡嗔持地撒盡迷奚別􅀔様無巴壁雨雲期間諸餘􅂻更親如大唐皇帝㸔了些斜堆鳳髻㣲􅉂秋水䡖皱蛾眉乾荷葉沒揣的使心機擁旌旗火􅄩􅄐皇官内生忔察兩分􅄐痛支沙怎禁持教俺便得死後到是偏宜誰曽那般活受風流罪上小楼金盃未吸人心先酔恐臨長安送路樽席則辦下左一行右一行別􅄐情淚全不似後宫中洗兒筵㑹么篇不覺的變了面色沒揣的􅥋了肚皮未到漁陽早添憔悴則想乆而間却依圎肥啉㖔的誰想我一日痩如一日滿庭芳特来探尓實􅃌望衣􅃒彩鳳聴俺金雞這塲歹閗成何濟則落的虎倦龍疲一箇乾引的漁陽禍起一箇空教留萬代人知􅀦史内名標記縦不編謀反大逆也寫做亂宫賊紅綉鞋再不侍晚宴塵清寳地再不見浴春泉香滿温池再不見桃李花開綉成堆趂枯蓬奔古道随落葉蕩荒陂伴西風吹渭水快活三比及我起屍骸􅄐馬嵬比及我􅃟山陵置靈位比及我引靈魂排僧道列威儀權時向軍伍中先遥􅀕鮑老兒欲酌香醪奠一盃百忙的傾不盡我關情淚枉使丹青染像儀􅀞不出傾情意百年恨絶三生夢㫁半路身􅃜數層欲合一聲􅂦沸六道輪廻六么序一壁廂人軍見􅂃急唐皇帝避灾離故􅀦忙裏問禍根苗又是誰陳玄禮損人安自已一壁廂哥哥丧妹妹亡把娘娘来勒恁的他躱甚的誰不道安禄山無恩義這公更壓着三千倍么篇據臣威􅀔􅀅君抑勒合該九族盡誅夷想他情理􅀅咱抛棄教人一任痛凌遲有一日相逢處􅀾間如􅃜失恁時莭休後悔比及還報了終身讎􅂩敢愁的這心如碎随煞娘娘呵莫怨咱我也堪恨你但留心休想貞元備恰来􅀅音書頻􅀉怎到馬嵬坡下踐了楊妃古調石榴花閨思顛狂栁絮撲簾飛緑暗紅稀垂楊影􅂻杜䳌啼一㺯兒㫁送了春㱕牡丹亭畔人􅄫寞惱芳心似酔如痴懨懨為他成病也鬆金釧褪羅衣拆散燕鶯期総是傷情别離則這魚書鴈信冷清清杳無踪跡更有誰知到何時共我成連理乍離別玉减香消俊厖兒亦憔悴酥枣兒一自相逢􅀅人来縈繫樽前席上眼約心期比及道是配合了受了些閑是閑非咱各辦一箇堅心要博箇終緣活計想佳期夢㫁魂勞衾寒枕冷􅄫寞羅幃痩損香肌悶懨懨􅀑病誰知同歡㑹不隄防半路裏簮折瓶墜兩下相抛棄把腰肢痩損廢寢忘食􅇹老兒當􅀄􅃌望成家計誰想瓊簮碎當􅀄􅃌望無抛棄誰想銀瓶墜煩煩惱惱哀哀怨怨哭哭啼啼悲悲切切長吁短嘆自跌自摧􅇹老兒故人何處冷清清染病疾相思證轉添受凄凉捱朝夕細濛濛雨兒淅淅颯颯晚風窓兒外吹撲鼕鼕的鼓聲滴滴􅀧􅀧玉漏不住催添愁悶獨自知子這心自悔再􅇛圎㡬時一處共相随􅇹老三台滚俺也自知鸞臺懶傍塵土迷俺也自知金􅁫欵嚲雲鬂