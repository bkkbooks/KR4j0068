front:
  text: 雍熙樂府卷之一
  hash: sha256:127f38136ac9b4ea84e1908ef94d2a12ab724e583c60576d008d2467ffba2361
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_001-1a}
body:
  text: 黃鍾宫醉花隂燈詞國祚風和太平了是處産靈芝瑞草聖天子美臣僚法正官清百姓每都安樂喜佳節值元宵點萬盞花燈直到曉南畫眉序花燈兒巧粧描萬朵金蓮綻池沼任銅壷絶漏禁鼓停𫾣庭內外香靄齊焚樓上下燈光相照楚腰羅綺叢中俏人在洞天蓬島北喜遷鶯似神仙般歡樂聽梨園一派笙簫青霄月離海嶠恰便似寶鑑髙懸銀漢遙明皎皎月色和燈光相射燈光和月色相交南盡眉序街市喜通宵仕女逰人閗施巧剪春蛾雲鬢寶叉輕挑紅袖底雙握春纎花燈下相看花貌楚腰羅綺叢中俏人在洞天蓬島北出隊子仙境內雖然難到便怎生強如咱塵世好水晶簾低簌畫堂標玳瑁筵寬鋪庭院小琉璃盞齊燒燈熖髙南神杖兒元宵景好喜慶皇朝逰人閙炒轉燈兒鞋燈兒齊挑繡毬燈團團皎皎綵繩髙吊錦帶似彩雲飄絳蠟似曉霞燒北刮地風習習天風香霧繞則聽的社火鑊鐸街衢上迓鼓偏聒噪動的來聲髙喬三教喜動清樂醉八仙快跚髙橇這壁廂那壁廂同飲香醪笙和笛間𬗋簫箏和􅌙合著檀槽繡簾下美女多竒妙他每唱陽春按六么南耍鮑老一派歌聲動天表唱的是直恁好孔雀屏開映徹鮫綃玉斚金樽閗相招儘教他天漸曉儘教他天漸曉北四門子彩雲間斗柄斜傾了霽一天星月皎酒令兒行籌筯兒交絳綃樓痛飲添快樂鳳髓又烹獸炭又燒把肥羊來旋燎南雙閗雞兩行金叉最宜素縞麝蘭香縹眇微露著金蓮小憑欄凝眺看街前舞鮑老北古水仙子我我我自暗約是是是曽見説當年元夜好因漢武帝朝中召東方朔言道海中央有巨鰲他他他現時節五榖豐饒麟甲內有光沖碧霄若天官喜恱民安樂後來因此上賞元宵尾聲人生百歲須還老切莫吝追歡求笑但願年年慶此宵醉花隂賞雪寶殿珠樓玉花糝萬里同雲一覽遍世界滿山巖栁絮風攙似織就鵝毛毯喜遷鶯莫不是戰退玉龍酣萬萬片銀鱗滿翠嵐將這禎祥推勘太平時瑞應宜堪須參臘前白喜見三聽四境歡聲民庶談將天地感盡都道豐年有象飽暖先諳出隊子雕欄寶檻列華筵樂事耽見滿空鵠鶴翅相參撲萬隊蝴蝶粉亂糝凍千里銀河氷細􅥵刮地風有一派仙音供奉著咱列兩行珠履瓊簮𬗋金杯到手休辭暫果劈黃柑乘醉想梅花將探遣興把霜毫頻蘸酒半酣詞一函喚紅兒雅歌清唱衣披著黑貂裘酒注在白玉壜列珍羞𬗋蟹紅蚶四門子颭蒼松翠竹風搖撼積瓊瑶映舞衫看亭臺逺近銀粧嵌哨紗囱似食葉蠶鎖翠峯凍碧潭遍乾坤萬里雲霧緘詩句清酒味甘直喫的醉醺醺紅遮緑掩古水仙子想少年忒是憨向郊原正宜將圍獵貪看俊鶻擊鴽鵝在白茫茫雪湖中曾淹凍剝剝的履頑氷馬脫了轡銜撲鼕鼕的鞭鼓兒波面上聲含笑呷呷得雋的喜氣都自擔明滴溜的金頭玉頸鵝盈擔響璫璫的鞭𫾣著金鐙候回驂尾聲到今日老後心中樂恬淡遇冬寒賞雪在梅菴相伴著酒社詩壇受用煞俺醉花隂燈夕錦繡花燈半空挑綵結成鰲山最髙十五夜賞元宵百姓將滿斗香燒將萬萬載皇恩報感天地好田苗五榖收成都完備了喜遷鶯先動起簫韶音樂韻悠悠音吕和調聲嬌都是這太平曲調南北腔黃鍾句句標真箇是好看了這鰲山勝景端的是巧筆難描出隊子則見那紅光顯耀似祥雲罩碧霄則見那花燈兒不離了這一周遭更有那滚燈兒鰲山前後繞恰便似萬萬朵金蓮開放了刮地風玉兔金烏日月髙呀普天下萬國來朝有西池王母祥雲罩綵雲間瑞靄飄颻上面有七真傳道更有那八仙請教有金童和玉女捧著仙桃更有那長夀仙世不老引著那虎鹿猿鶴髙髙的展開看經教寫著那賀豐年萬萬朝四門子有千般隊舞安排了有八蠻來進寶率領般簇獻錦𫀆有玲瓏玉帶寶嵌著獻象牙白水犀牛角玻璃瓶珊瑚瑪瑙古水仙子鼕鼕鼕畫鼓𫾣響璫璫鑼聲相襯著見見見傀儡兒齊來一箇箇手擎著珍寶出出出繞周圍轉幾邅他他他端的是難畫難描是是是院本做一假喬教學賀賀賀一齊的舞起村田樂慶慶慶慶佳節賞元肖尾聲萬盞花燈太平了賀當今四海來朝普天下快活直到老醉花隂美遇日永簾櫳篆煙靄簇絳紗葵榴閗色聽蟬噪緑隂槐出水荷開亭臺下雕欄側喜遷鶯粉汗滴香腮嬌滳滳玉臉溶溶紅映白忒丰姿體態緑雲堆上插金叉偏歪那妖嬈殢色堪可上金粧七寶臺美俊哉嫦娥臨凡世仙子離天台出隊子一輪蟾魄出扶桑離大海強臨寶鑑對鸞臺重貼花鈿插玉叉再理胭脂勻粉腮么篇繫合歡鴛帶挂玲瓏玉項牌湘裙微露鳳頭鞋玉膩氷肌香滿懷雲鬢堆雅插鳳叉刮地風出繡户凌波踏緑苔等候多才趂著那晚風涼潛向欄杆待緑隂庭槐則聽的忒楞楞宿鳥兒驚林外猛可裏忔攴攴小角門兒開笑臉迎禮樂施對天設願香諧接住秀才玉肩相挨四門子到香閨施禮深深拜笑吟吟喜滿腮今宵喜遇乘鸞客五百年緣分該將金扣兒鬆繡帶兒解濕酥胸膩香光瑩白錦帳裏歡翠𬒳中挨不覺的春生滿懷古水仙子香羅上紅點帛端的是可可喜喜嬌嫩色看了他丰丰韻韻堪人愛真箇似一朵牡丹花妖妖艷艷珠露滴開美姿姿好是竒哉汗淋淋玉纎向粉臉上揩意匆匆不覺渾身態亂鬅鬆雲髻歪賽兒令陽臺陽臺楚巫娥今夜和諧似採藥的劉晨到天台越看紅白春意美還在神伏兒又早是雲收雨開也不肯鸞分鳳拆恰褪了蝶粉蜂黃常則要鶯隨燕來似雙蒂蓮並排連理枝相挨合歡帶休解琴瑟永和諧挂金索海誓山盟休要把人禁害美滿情懷常則是一點真心在殢雨尤雲常常的寄在心懷休把心腸半路揣尾聲忽的星稀月沉海悄聲兒囑付多才將你那俊俏的心腸莫更改醉花隂趕蘇卿雪浪銀濤大江逈舉目玻璃萬頃天際水雲平浩浩澄澄越感的人孤另一葉片帆輕只趕到金山可怎生不見影喜遷鶯見樓臺掩映接雲霄金璧重重那能上方幽徑我則見那寶殿玲瓏𬗋氣生真勝境驀聽的幽香縹眇則不見可意的娉婷出隊子心中傒幸意癡癡愁轉增猛然見楚王宫得悟的老禪僧何處也金斗郡無心的蘇小卿那裏也臨川縣的多情的雙縣令刮地風抄手躬身將禮數迎請禪僧細説叮嚀他道有一箇女裙叉寺裏間踢蹬他生的裊裊婷婷不住的雨淚盈盈愁切切有如癡掙悶懨懨即漸成病拈霜毫回廊下壁上標名我可便猛回頭恰定睛正是俺可意的多情四門子狠毒娘應接了馮魁定他道揣與我箇惡罪名真心兒守實意兒等恰便似竹林寺有影不見形真心兒守實意兒等我可便和誰折證古水仙子覷絶罷兩淚傾恰便似九江水如何洗得清當𥘉指鴈為羔似充飢畫餅道無情却有情我我我暗暗的仔細評論俏蘇卿摔碎了粉面箏村馮魁硬對上菱花鏡蘇婆婆無前程者刺古占天邉月共星同坐同行對神前説誓盟言死言生香焚寶鼎酒斟在玉觥越感的人孤另分開燕鶯神仗兒喚稍公忙答應休得要意掙幾曽道半點兒消停直趕到豫章城節節髙碧天雲霽翠波風㝎銀蟾皎潔猛然見多情薄幸俺兩箇附耳言低頭語携手行下水船如何見影尾聲説與你箇馮魁耐心兒聽俺兩箇喜孜孜俏語低聲我教你藍橋下細尋思謾謾等醉花隂美姬玉臉橫秋淡眉掃傾國傾城相貌堆雲鬢鳳叉挑身分兒苗條淺淡粧天然俏美甘甘異香飄性格兒柔情意兒好喜遷鶯更那堪風流年少正當時二八多嬌難描萬般竒妙恰便似月裏嫦娥離碧霄天性巧裊婷婷千般旖旎嬌滴滴萬種妖嬈出隊子若論著聰明俊俏通禪機將詩謎包裁氷剪雪辨低髙擊玉𫾣金不做作闊論髙談諸事曉刮地風體態輕盈貫世少喜孜孜笑撚鮫綃更那堪閉月羞花貌檀口似櫻桃玉纎嫩一似蔥稍金蓮小欵步輕蹺踐香塵不由人心癢難揉自相逢猛見了不由人魄散魂消瘦香肌裊裊婷婷妙端的有丹青怎畫描四門子本是箇美玉無瑕寶怎不教聲價髙粉臉又勻蘭麝又飄挽鳥雲鬢鬆金鳳翹錦營中寵花陳內嬌但行處香雲亂繞古水仙子我我我猛見了引引引魂飛在九霄他他他模樣兒風流敢敢敢諸般兒俏倬騰騰騰邁蘭堂入畫閣欵欵的將檀板輕𫾣輕盈舞徹楊栁腰他他他通音吕善曉諸宫調俺俺俺拚沉醉樂醄醄尾聲休負了青春正年少美甘甘玉軟香嬌趂著這好光景莫教虛度了醉花隂秋景玉宇金風送殘署半霎兒輕雲細雨秋意滿庭除珊枕紗㡡頓覺涼如許喜遷鶯欲試繡羅𥜗喚小玉爇龍涎薰翠縷睡紅生玉映菱花秋水芙蕖粧梳點蘭膏勻鳳酥百寶光涵絡臂珠整珮琚步雲階縹眇對秋景歡娛出隊子緑窗朱户㺯新晴曉日𥘉合歡床鋪苫翠氍毺連珠幄纓聮珠珞簌一似蓬島仙家碧玉壷么篇園林景物寫秋光作盡圖芙蓉傍水錦千株丹桂迎風香萬斛掩映著楊栁梧桐深密處么篇𬗋薇香露染霞綃攢細粟鳳仙開九苞秋暖錦毛舒玉簮綻六出花含檀韻吐又早見亂撒金錢籬下菊么篇淡煙濃霧看山光乍有無咿啞啞賔鴻出塞逺相呼啾唧唧社燕辭巢嬌對語滴溜溜紅葉兒隨風零亂舞刮地風一弄兒秋聲不斷續真乃是萬籟笙竽一年好景休虛負漸看那栁敗荷枯畫屏般碧雲紅樹錦機似綵鴛白鷺爽氣浮日影踈送長天落霞孤鶩掃纎塵淨太虛見氷輪飛出雲衢剔團圞碾破銀河路放寒光照九區四門子上南樓似入清虛府捲珠簾遙望舒列玳筵倒玉壷簫聲似綵鸞雙鳳雛丫鬟擁嬌艷姝擺列著清歌妙舞古水仙子浥金波泛醁醑直喫到斗柄橫斜桂影踈畫燭髙燒玉山低趄拚著箇沉醉花前紅袖扶問嫦娥今夜何如願天長地久為眷屬這的是人間天上團圞處盡今生歡愛永無虞寨兒令煞強如煞強如廣寒宫一世幽居常則是舞罷霓裳鏡鸞孤珊枕剩翠衾餘空自把青春誤挂金索光燦燦燈月交輝素魄流香霧嬌滴滴粉黛成行清影涵瓊樹立停停羅襪生涼疑是淩波步舞飄飄霜袂乘風恍然飛仙去尾聲不覺涼生桂花露猶兀自醉眼糢糊共倚著玉欄十二曲醉花隂思憶雪月風花共裁剪雲雨夢香嬌玉軟花正發月𥘉圓雪壓風顛正比人天涯逺欲寄斷腸篇爭奈這無邉岸相思好教我難運轉喜遷鶯指滄溟為硯管城毫健筆如椽松煙將太行山做墨研把萬里青天為錦箋都做了草聖傳我欲待要書書不盡心事一會家訴訴不盡熬煎出隊子記當𥘉相見見俺那風流的小業冤兩心中便結死生緣一載間渾如膠􅃮堅誰承望半路裏翻騰做離恨天么篇二三朝不見渾如隔了十數年無一頓茶飯不縈牽無一刻光隂不悵念無一箇更兒裏將他不夢見刮地風無一箇來人行不問遍害的我有似風顛相識每見了重還勸不由人不挂牽思量的眼前活現作念的口中粘涎襟領前袖口邉淚䀶湮遍想從前語在先那時節他嬌小我當年論聰明貫世何曽見他敢真誠處有萬千四門子于咱家為他心無倦氣相和情綣戀俺也曽坐並膝語並肩俺也曽芟荷香效他交頸鴛俺也曽把手兒行共枕兒眠哎天也是我緣薄分淺水仙子非干是我自專直覔得鸞膠續斷絃記枕上盟言念神前心願我心堅石也穿暗暗的禱告青天若咱家少他前世冤俏冤家不稱今生願俺俺俺俺那世裏再團圓尾聲囑付你衷腸莫更變再相逢不知是動歲經年則要你身去逺莫教心去逺醉花隂慕戀春困書齋夢魂擾誰似俺今畨這遭相思病怎生熬竹影頻搖越感的傷懷抱心間事對誰學似這般無打算凄涼何日了喜遷鶯想著俺多情容貌一團兒玉軟香嬌難描萬般竒妙想著俺倒鳳顛鸞那一宵指望待同諧到老不思量火燒了祅廟誰承望水淹了藍橋刮地風鐵馬兒在簷前不住搖引的人心癢難揉金風淅淅添煩惱怎禁那砧杵頻𫾣夢斷魂勞閙啾啾蟬鳴栁稍絮叨叨蟲砌磚竅這壁廂那壁廂咭聒聒魄散魂消想起俺離情的女艷嬌