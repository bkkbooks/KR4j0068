front:
  text: 雍熙樂府卷十六
  hash: sha256:7b2f22aee246ee268db061df87fff1b9738401cbe8de3756d9696e82c788abeb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_016-1a}
body:
  text: 南曲繡停針慶七夕四海升平萬國衣冠覲帝京人民樂業繁華盛時聽的處處歡聲荷聖主同天大德逢時莭喜氣自然增蓐收司令迎利景今宵七夕共瞻星人間閬苑仙境北鬼三台碧天長浮雲靜玉露滴金風應見一道銀河千萬頃牛女會鵲橋成乞巧處香焚寶鼎畫樓前列瓜果啓繡屏金針兒閗穿翆縷輕一夜墜金井梧桐萬里共瑶空月影南山馬客玉漏頻傳不須問幾更列華筵綺席鼓吹笙歌窈窕舞娉婷白苧迎風爽氣生人月共清况遇著時和歲登一任教歡娛共樂太平黃薔薇試説著一京畿勝境遇七夕齊閗巧呈能樂繁華歡騰市井不負了良辰美景仰望著蓬萊晃耀九華燈又只見碧霄仙侣駕雲軿遙聽得緱山子晉度鸞笙風清和月影逢盛世賞莭令樂升平四般宜生當盛世遂安寧頻看瑞物表休徴神龜應兆呈金殿騶虞白象出郊埛瑞麥秀嘉禾共穎黃河水徹底澄清綱常正法度整家家相慶吾皇仁聖聖藥王皇風𬒳邊塵息警萬萬里傳流著頌聲謳歌鼓腹拚酩酊酬佳莭賀升平福慶似雲興仰帝庭齊引領蔥朧佳氣滿都城賞美景齊歡慶普天下生民同樂際時亨遍朝野列英俊播芳馨餘音瞻星拜月焚金鼎但願得一人有慶萬萬世皇明直與天地永繡停針題木犀蕩起啇飈金井梧桐葉漸凋幾畨雨過涼天道迤邐的把扇兒慵搖頓覺得紗㡡裡似水風流處可喜娘一一妖嬈耳邊低道今宵紈扇且停搖涼似昨夜多少祝英臺畫堂深人靜悄秋意景偏好風送暗香丹桂芬芳先占沁園秋早開了此時莫惜千金花前歡笑賞心樂事須拚沉醉陶陶望歌兒天然枝枝朵朵堪畫描此花有百媚千嬌不減了蟾光好四出玲瓏花枝恁般施巧是則是花頭兒須恁小直有許多般香得好五般宜折取向膽瓶中安排了香滿亭軒恍若身在蓬島皓齒纎腰那更歌舞勸香醪多嬌撚花枝時嗅微微笑笑道勝如茉莉賽過荼䕷香似沉腦四般宜攢攢簇簇縷金銷枝枝葉葉綴瓊瑶點點滴滴顔色好蕭蕭灑灑恁清髙香徑裡紅圍翆繞那堪更玉軟香嬌月兒照越恁好佳人應笑嫦娥空老山馬客玉露金風是他的故交况良宵有約玳筵可􅌽如花貌逞妖嬈問道奴嬌花貌嬌人月都嬌料想丹青怎描怎消得才人下筆詠嘲憶多嬌花又好月又皎惜花人愛月眠遲起早暮暮朝朝不離花貌賞足花心任教殘英墜了江神子且莫教兒童掃滿斟一任玉山倒醉來花下眠芳草贏得滿身蘭麝異香飄丰韻好尾聲觀花愛月人年少但對酒當歌歡笑月夕花朝休教錯過了寨兒令秋景餘近茅廬東籬下恰開三徑菊佳節才初漁叟樵夫携手笑相呼喜今歲五穀收熟賞紅葉顔色堪圖黃雞啄黍肥白酒如今正香浮直喫的倩人扶調笑令我向這淺處探著身軀呀慢慢的將鈎兒與你垂將下去銀絲兒界開波紋縷浮逰兒不動纎須低頭將錦鱗鈎上取折垂楊準備穿魚耍厮兒松隂下自舞受用些新酒活魚村醪少時旋去取這江景界無虛端的堪圗聖藥王樂有餘興未足尊前無酒典琴沽唱一曲聽音吕直喫的滿身花影倩人扶與農叟笑相呼踏陳馬漁陽十題天上少世間無風流共許聰俊皆伏舉止非俗建座祠堂親供養奈何艷質難描塑倒鳳顛鸞落鴈沉魚閗鵪鶉玉自生香花能解語蓮步輕移蛾眉掃緑水調習歌霓裳按舞俏模樣好做處宴罷瑶池人歸月窟紫花兒序恰正是春心飄蕩色膽踈狂醉眼糢糊半團香玉兩點瓊酥誰知盡日君王看不足似玉顆神珠俺也曽被擁鮫綃枕並珊瑚青山口翆簾低簌碧蝦鬚銀臺明畫燭繡屏圍簇錦芙蓉紅粉倒金壷無間阻生嫉妬就中醖釀機謀御筆親差領軍卒懶離長安便上漁陽路送到長亭坐散離筵侣畫就陽關暮出塞圗飲乾别酒唱徹􅌐駒各分去路痛懷衠悒怏開口是長呼更怎禁一弄兒凄涼不曽離寸步雪裡梅蜂共蝶緊相逐鶯與燕閗喧呼碧草緑楊落花飛絮歸鴻杜宇往常時恁助歡娛今日便躊躇把這一應一答堪憎堪恨從頭兒盡數麻郎兒這芳草自新春長出到暮秋凋踈受天氣風霜雨露似人生得失榮枯也通世途委曲直穿連海角天隅不接引逰春翆車却粧點斷腸詩句綿答絮這落花滿地殘紅起有餘一樹鉛華蕾不成恰俺深閨鳳幃中錦繡鋪把賞心漸消除教醉魂越糊突誰是主半入池塘半塵汚􅌒凝佇春色共情緣到頭來總是虛金蕉葉這栁絮厮牽惹輕香暗撲相戀顧春衫倦拂細看來不是楊花亂舞却是征夫泪簌小挑紅這楊栁帶煙披霧嫩條舒不繫征鞍住簇滿紅塵霸陵路曉風踈溫柔正要春將護纎纎瘦損依依渾似人立翆盤初天淨沙這燕子翅翩翻繞遍雲衢語呢喃驚破華胥休笑俺分飛子毋曾占緑囱朱户掖庭中來往携雛醉扶歸這歸鴈恰向愁邊絮早促望中無一片歸心何太速你巳無憂慮數點青山隱隱更勝如萬里人南去調笑令這黃鶯一從上喬木更整金衣來帝都飛入杏桃花深庭啼煞畫樓風物送此行歌舊曲也不似他一串香珠絡絲娘這粉蝶勾遣莊周間阻不在東君管束􅌽請得香瑰糢糊去則向俺夢兒中完聚鄭州春這逰蜂忙煞尋芳小翅羽一日花香都採足沒添貨甜薺薺蜜釀出全不顧俺苦淹淹情緒東原樂這杜宇偏情理最狠毒趕定別離人欺負攛斷得俺區區活受苦見今日在長途尚然呌道不如歸去看花回休道是愁腸肚相思肺腹假若便鐡打成銅鑄就石鐫出也難擔負早是分張丹鳳隻彩鸞孤那堪更遭逢著恁般景物眉兒賺煞懶設設隨軍吏矻蹬蹬信馬足遙望著錦宫髙處行一步回頭覷一覷眼兒裡閣不定淚如珠是他仰著面嗥咷放聲哭繡停針大四景夏院落香餘緑樹隂濃復正初落花滿地飄紅雨繞畫簷鶯燕相呼愛日永𫾣棋局打馬池亭上栁軃碧囱虛篆煙微裊隨風度薔薇篩影入簾踈不覺散盡微暑北小桃紅碧煙淡靄暗䕷蕪灑幾點黃梅雨菡蓞初開燕將乳見陌頭挽香車載酒垂楊路嬌鬟低唱處管絃更舒徐都説道行樂古來無南合笙皇都萬古似閬苑蓬壺遙望碧霄外錦繡鋪雕甍鎖闥連禁衢槐隂夾道蟬聲度往來逰人盡駐馬繁華處傍花隨栁玉􅍡嘶過樓前去輕鞭慢控頻頻駐迤邐畫橋南浦繡轂香車喧闐樂舞么篇笑談勸酒歌金縷翆鬟團扇掩羅襦索賦多情緒逺天芳草夕陽鋪問回首處遙指郵亭路待明朝酒醒重歡娛北調笑令燕子雨晴初江上麥黃梅巳熟家家浴佛招提去趂佳景逰賞歡娛一任他踐殘芳草緑一任他載酒提壷南山馬客緑樹連堤碧波蕩鑑湖近樓臺掩䁐十里紅蕖乘畫舫載圖書水色山光半有無穩繫玉壷更携取鸞笙鳳竽遇佳景良辰樂事又俱南憶多嬌逰賞處劇笑語壯懷逸興風流雅度歲歲年年莫教辜負盡道升平幸逢當今聖主北耍厮兒慶佳節欣逢端午還見榴花噴火爭舒荷葉滿池翆蓋鋪畫閣外暑來初嫩竹蕭踈聖藥王笙歌起徹九衢駿馬驅打毬剪栁較嬴輸綰夀絲結綵縷少年總佩赤靈符飲芳醑泛菖蒲北金蕉葉簇華筵玉盤角黍試羅衣叉懸艾虎噀雪浪椘江竸渡棹龍舟齊撾畫鼓南豹子令帶過梅花酒水沁涼亭風滿樹晝景舒六曲闌干畫簾踈映紅蕖和間來玩賞消炎暑舞裙歌板趂香車晃瓊琚珠佩集仙侣瑶席細鋪碧筒滿貯調氷雪藕清涼處須快飲倒金壷和太平時今喜遇逰觀帝王都沉醉酒爐好光隂莫虛負切莫躊躇更將曲度謾拈綵筆題佳句記河朔舊曽賦和太平時今喜遇逰觀帝王都沉醉酒爐好光隂莫虛負南餘音良辰美景天付與正四海太平時序永樂繁華當今荷聖主三十腔慶夀喜遇吉人長庚現彩雲縹渺看庭前玉樹又生瑞草坐筵特蒙見招聊以一彎翡翆尖兒巧刺繡圈金底面小願祝花貌一雙兩好百歲來同諧老五百年前分定了結會在今宵琴堂此日華旦節捧一杯添夀考似玉樣潔似花樣嬌世之無瑕寶洗兒華筵吉辰今朝于門喜氣陶陶珞索環子繫鮫銷惟只願夀如山福似海兩榮耀玳筵歡聲不少正西池王毋乍離蓬島潛移仙子獻仙桃他時駟馬夫人誥鳳冠霞帔玉人捧繞金章紫綬重回故道斑衣共樂風光好禮不周反仍激惱據人情戒莫深交喜于官善政民無擾願國泰雨順風調玉麒麟果應熊羆兆到得而今大喬何如于小喬爭添襁褓以光祖考堪羡于門紫金貂龜鶴呈祥戲亭沼松柏連理有下稍禾生雙穗鳳來朝比翼似鸞鳳交簾影花顛倒歌韻聲繚繞舞徹楊栁小蠻腰曲盡霓裳羽衣調回身雲樣宫花落畫堂深庭院杳寶爐沉煙香正裊􅐈上繡幕珠簾從他燕子來巢覩面絳色夭桃似燒景好見蝴蝶一對對飛繞俄逢吉席對花朝和琴瑟樂笙簫放下懷開口笑拚教酩酊金樽倒從教紅杏枝頭閙富貴長得似三春休教杜宇聲先報餘音香不斷兮花不老福彌深也夀彌髙盡老齊眉共歡樂三十腔升平讃祝飛龍九五膺天命實逢景運喜華夷一統六合皆春正當化日舒長玉燭調和萬國咸寧靜女識男耕家道盛官清訟省民樂和平遍閭閻絃誦聲鼓腹謳吟遂生性和氣召嘉禎慶雲彩雲紛輝映麥兩岐禾同穎野蠶成繭遍滿郊坰朝野同歡慶南北東西罔不歸心梯航萬里來庭卉裳椎髻雜文身盡稽首玉階前竭丹悃效忠藎貢來天馬麒麟暨珠奇寶玩渡紛充物正是慶會際風雲衣冠復覩唐虞盛仰承天眷百靈協應萬機餘暇舒情適興恰逢美麗繁華景聳碧霄龍樓鳳闕拱山河壯觀神京盻蓬萊錦繡增竒勝繞太液碧波澄遍瓊林玉樹千花映來往時駐霓旌栁下度鸞笙香飄寶鼎曲調美韻樂府新翻協韶鈞細舞輕彈愜清聽雜和苑間鶯燕鳴筵間羅綺列重禋瓊醴似紫霞傾左右仙班近文武蒙恩幸太平宴會際昌辰歡樂極兮鑒明訓古來致治稱堯舜閲賡歌在勤慎奉天保民長畏政難的真是守城更須宵旰留情昔稱元首股肱一體相承敬勝怠丹書示警日新厥德有盤銘明告戒切叮嚀仰鴻臺益降盛天長地厚相久永繩繩漸漸無窮盡福貴家國列蒼生萬年索祚長安定尾聲天心眷兮人事順德彌深厚福彌增萬歲千春共歡慶十樣錦有所思幽囱下沉吟半晌追思俏的嬌娘娉婷處不弱似鶯鶯妖嬈處可比雙雙非奬最堪誇性格兒溫柔難描他諸餘停當説不盡風流可喜萬般模樣相當我在月下花前吐膽傾心把誓盟深講行思坐想望盡老今世同效鸞凰誰想驀然平地波浪生方信道任從天降霧迷雲障𬒳博磨毆苦打開鴛帳情慘切添悒怏閣不住淚珠汪汪勞神役志鎮端詳尋思那人情怎忘設計施方要見時除非是夢兒裡來到你行憐香倚玉相偎傍尤雲殢雨笙歌唱𬒳數聲踈雨敲囱散髙唐春心蕩漾此情怎忘羅衣上存蘭麝香鸞箋仗託𥿄半張人何在慢嘆息空惆悵惱得潘郎兩鬢霜咱這里因因他狂蕩他因咱痛感傷幾畨欲待不思量欲待不思量你便怎做的鐵打心腸江淹悶韓生忿怎比得咱家悶千般恨才離了心上又早來蹙在眉間天還愛憐便咫尺相見又且何妨尾聲情人早得同鴛帳免使我心勞意穰爇炷明香答謝上蒼香遍滿失約紫陌紅經丹青妙手難畫成觸目繁華如鋪蜀錦料應是春負我我非是辜負了春為著這心上人對景是越添悶東甌令花零亂栁成隂正是蝶困蜂迷鶯􅌒吟方才眼睜我這心兒里忘了想啾啾唧唧呢喃燕重將宿恨宿恨又題醒撲撲簌簌泪珠暗傾四團花悄悄庭院深默默情挂心涼亭水閣果是堪宜宴飲不見我的情人和誰兩箇開樽把絲絃再理將琵琶自撥是奴欲寬悶情爭知􅌒聽東甌令榴如火簇紅巾有熖無煙燒碎我心懷羞向前欲待要折一朵觸觸捻捻不敢戴怕奴花貌不似舊時容害的我伶伶仃仃懶宜樣簮梧桐樹梧葉兒飄金風動漸漸害相思落入深深井一日一日夜長夜長難捱孤枕懶上危樓望我的情人未必多情與奴家心相應知他在那里那里貪歡戀飲東甌令菊花綻桂花零露冷風寒秋