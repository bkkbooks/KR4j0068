庭花却原来梦未成醒翻身不見影空教人眼角眉尖恨心間悶怎禁俏魂靈我和他步随肩並入羅幃雲雨興正綢繆說誓盟呌他時他連應猛然間鍾一聲鳯鸞吟題起来心上疼枉教人梦不成相思病怎禁也是我命薄倖這煩惱石爛海枯􅂊㝎為才郎羞的我摔碎了菱芲鏡撲鼕鼕井墜銀瓶尾金雞呌冲散滿天星日頭東出照囱明有人呌来心上驚不應呵又怕是那箇薄倖短命㡬時得鴛鴦帳底鳯鸞吟集賢賔􅄐思則我這黒瀰漫惡愁煩何日息無一刻不思伊粉容枯梨芲冷淡腰肢瘦楊桞依稀困騰騰靠損幃屏意遅遅懶步香閨則為俺可憎才那些兒情意羙迱逗的染病躭疾怕的是更䦨人静悄愁的是天曉角聲催逍遥楽我委實難􅆈永日想着他枕頭兒上輕憐􅀍窩兒􅂻痛惜呆荅孩似酔如痴悶懨懨􅆸寢忘食冷清清香燼金猊這凄凉只是天地知㡬時得同心共結帶扣合歡並頭再理金菊香只因他信㫁與音稀好着我梦想眠思無盡期則我這好􅊚緑有朝終到底低首無言星眸中不覺淚雙垂梧葉兒香肩並玉體偎可又早攸攸五魂飛情濃也星眸閃交歡處怎動移忍不住咲㣲㣲最難禁舌吐丁香味羙后庭花只為他忒聡明忒俊竒恰便似心肝般怎摘離更那堪通音吕明宫調善言談􅀁事知更一表俏容儀真乃是天然聡慧性温柔有見識曉詩書明道理其實的也不及鳯鸞吟非是我痴皆因他多俊質眼傳情眉下知件件兒事事冝凨流處那􅀁為不由咱意相㑹心上随我終心為你你知他戀誰􅀅一叚羙滿恩情㡬時得重配則因他模様兒撐心腸兒殢不由人越越着迷尾声􅂅生前成配偶向神前設盟誓空教我無語痛傷悲好姻縁這翻魂梦􅂻則想今生榮貴我如今得便宜翻做了落便宜集賢賔􅄐思想着這俏嬌娘那些兒情意羙你可索急回首早㱕期虚飄飄半衾殘梦淚汪汪空自悲啼則為那俏凨流可意的冤家着這箇俊嬌娃每夜傷悲常想着綉幃中可人心上喜題着時似酔如痴這其間桃源雲閉塞更和這神女梦魂迷逍遥樂俺本是夙緣仙契端的是異種竒芲難與這凢芲共比則我這意肯情實不知是那些兒失義忘機這些時針線慵拈不自知不由人想望佳期這些時愁腸萬結空教我兩淚千行㡬時得並頭再理金菊香則為凨流俊俏世間稀今日箇羙愛恩情不到底我􅀅他心肝兒般敬重頻愛惜似恁的少有人知則我這心中怨恨怎生移梧葉兒常記的􅀄相見端的是不暫􅄐我和他同衾枕效千飛每日家相歡愛真箇是兩意随俺湏是俏相識抛撇了閑伴等单則是為你后庭花誰承望俏冤家兩下􅂻空教我這凄凉訴與誰想着俺共宿鮫綃帳香幃簾幙低鴛鴦􅀍緊収拾我和你權時歡㑹􅀅衣􅃑髙掛起鳯頭􅁫缷的疾抹胸帶權摘􅄐我和你似鴛鴦水上飛青哥兒趂着這春宵春宵無寐端的是百縦百縦千随則他那㺯玉團香百事知真箇是嫰栁腰肢欵趂休􅄐羙愛無及似這般凉夜迢迢漏聲催敢􅂸今宵無休棄尾声趂着這青春年紀小好􅊚縁重匹配則俺這天生的一對兒俏夫妻盡今生共成夫婦禮休間阻一時半日則􅂅的團圓千載不厮􅄐集賢賔悶損花影月移凨㺯桞香露滴杏稍頭金壷注滴殘銀漏玉蝉低斜墜紅楼錦幃空冷落牙牀翆簾垂閑控金鈎画角吹梅芲聲韵攸心兒上越添僝僽相思魂减爽雲梦越添愁逍遥樂纔合眼一心情厚恰翻身兩意相投正待要鳯友鸞交燕侣鶯儔偎紅􅀝翆那凨流送丁香吐珠兒香噴口雲情兩意兩相投恰待設海誓山盟怎當那黄鶯啼􅀣梢頭梧葉兒喚醒了鴛鴦梦驚醒了鶯燕儔猶兀自逞凨流芲容减玉貌羞恨鸝鶹百忙􅂻調舌弄口掛金索緑慘紅愁梦醒還依舊閃的人粉砕胭消怎生􅆈春晝翆檻前芲影簾櫳一陣陣玉囱外香凨透金菊香下牙床欵把綉鞋兠岀羅愇輕移月半鈎露酥胸􅀅玉纎金扣扭展轉凝眸妖嬈軆態更温柔浪来裏煞對粧䑓越添腹内愁傍明囱又増心上憂見蜂蝶往来相越逐他向那珠簾左右翩翩上下不曽休醋葫蘆海棠亭倦待逰芍藥圃羞去走鬂鬅鬆亂挽緑雲稠界殘粧一􅁝痕尚有秋波偷溜似楊妃睡醒懶􅎑頭后庭花端的是月羞明芲見愁鴻見落魚不逰軆似氷肌如玉臉如桃眉似桞那凨流天然生就世間稀天上有􅀧櫻桃樊素口露金蓮双鳳頭鳯鸞吟半帶着愁似一朶牡丹芲含露羞双眉兒緊皱俏身兒褪後扭回香羅􅁭䄂向檀口上􅃒蔵悄聲兒輕嗽恨的是梦㫁魂逰尾聲意沉沉言談懶心設設話不偢悶懨懨常是閉凝眸則為那雲慳雨澁不自由雖然憔悴清瘦比西施嬝娜更凨流集賢賔山水娛情名山自然如画􅂻翫四野景清竒分兩下青松檜栢列週圍竹徑芲溪緑隂中幽鳥調舌白雲下鶴唳猿啼則聴的嚮潺潺細流金線水玉泉山堪詠堪題雲山天外􅀝松栢恠龍垂逍遥樂巍巍山􅀔遍地芲􅄏山峰秀麗則見這恠嶺深堤遍山林處處芳菲道古及今人詠題山色増輝端的是青山緑水梧葉兒山峰秀秀水溪溪㵎遶山圍圍遶波無数数不盡亂石壘壘嵓下映踈籬籬畔漁樵樂矣醋葫蘆春光如水清桃芲似火堆随凨栁絮不沾􅅺十二玉闌天外􅀝松芲飄墜一年此景最為魁么夏天如降火炎凨撲面吹披􅁭散髪酔扶㱕荷芲蕩􅃞香拂鼻晴和天􅂔浮􅀲沉李飲金盃么砧聲不住搥鴈行兒擺得齊龍山賞翫閗芳菲蕭蕭夜凉凨力㣲登髙為最挿黄芲共飲賞東籬么冬寒冷􅂔侵踈囱梅綻蕋撲簾瑞雪恰便似玉蝶飛樂吾儕咲談飲数盃氷芲飄墜紅爐暖閣酔如􅅺尾聲㱕山絶物理仰天吿慚愧逰山翫水可忘機我愚痴盡教似木石後生可畏慿着這胷懷星斗煥凨當北集賢賔離恨為薄情近来針線懶憶何處鎻雕鞍對青銅千聲長嘆傍粧奩萬種心煩啼痕淚揾腫秋波鎻新愁蹙損春山盻得箇南楼鴈書真是罕步蒼苔羅襪生寒斜陽外􅃄水􅃼古渡畔草萋灘南集賢賓􅀙来不曽受僽僝瘦了容