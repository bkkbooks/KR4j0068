楊妃上馬嬌傾􅀦傾城貌􅂅得今生不相抛自評䟦因縁有分誰知道平生􅂅􅁕相随相趂成就鳯鸞交一自相逢便情舒無些褒談處兩意濃如水接魚得歡娱痛惜輕憐心無足相偎相抱􅀹雲殢雨諧老做妻夫嬌娥一把粉團香搭伏㝎牙床雨􅅎雲䰟恣飄蕩問才郎攻書坐到何時况㸔㸔月上寒生羅帳早睡些何妨小桃紅悲世馬頭垂淚出神京一望兵塵盛留得陳公半邉鏡可憐生後期好在嫦娥影傷心莫把菱芲重照不似舊時明禁城值暑夜傳宣別殿分茶宴更撒金蓮送㱕院玉堂前雌雄誰與羣雞辨㫁教一朶嬌雲留在不恨海南仙故城一帶鎖寒烟芳􅋄萋青遍悶煞誰家舊庭院最悽然飛飛総是當時燕垂楊路􅁁斷橋前面都繫送窮舡姑蘓䑓上望姑蘓一抺青無数淡雨殘雲日􅀅暮􅃌吾廬白雲􅃒斷愁来路芲間杜宇天􅁁􅀌鶩脫摸望鄊圗小桃紅思情鳯隻鸞􅀌不成双冷落銷金帳獨坐牙床甚情况細思量人前強把心兒強䖸眉蹙損双眸淚掩愁斷九回腸陽䑓梦斷碧雲􅃒􅄐恨愁千結向日情懐對誰説似痴呆懨懨怎捱如年夜鸞􅀌鳯隻􅁫分鏡破瓶墜玉簮折愁斟悶酒腸欲㫁情思何曾放千里相違兩分張意徊徨猛然似在咱心上口兒厮強心兒厮念怎道不思量音書不帶雁行斜又是愁時節千里關山路途賖愁縈結受了這般閑磨㓕朝雲暮雨何時遇也苦煞􅁖􅄐别小桃紅三歌傭人以牧短衣􅄄無奈随縁過一事無成手空唾鬂双皤桓公何日臨山廓䔥䔥暮景漫漫長夜誰􅃪叩牛歌南柯梦􅂻避凨波寵辱先叅破日月循環蟻沿磨盡消磨百年光景石中火潜身􅀛吉殺身牛禍都賦鼔盆歌好躭佳句􅀍詩魔總是閑工課一代􅀌髙快吟和待如何曽􅀅西漢披讀過功名百􅀾文章一世三句大凨歌小桃紅題白蕉扇二首素雲葉剪曉霜侵缺月銀波浸萬􅈁氷􅁝夜光䕃遇知音桃芲難比凨流甚清歌意深佳懷不禁􅅻是得舒心雨囪驚梦勝庭梧随手薰凨度蝶翅䡖盈粉香妬鏡鸞􅀌歌聲引得雲来去清談咲語凨流人物白甚不心舒小桃紅西廂百詠即武陵春一生􅄐洛陽辭家曉出洛陽城吟鞭裊敲金鐙琴劍書箱擔随㝎赴神京今畨㸔把功名競趂東凨媚景去上朝􅂑應􅀙此奮鵬程二生至蒲東馬蹄香襯落芲塵二月東凨信緑映紅􅃒錦成陣正芳春經逰蹔住蒲東郡望長安去穏向南宫奪俊准僃跳龍門三生逰普救客中􅆘悶訪禅扃散步穿松逕金碧楼䑓紫霞映伴山僧往来觀㸔添吟興愛清幽勝境把功名懶競待􅃪講三乗四生遇紅娘淹淹潤潤走􅀅来舉止真堪愛四鬂掙掙剪芲頟本乖乖低言多道夫人拜使賤妾禀白望尊師擇􅂀何日好修齋五生見鶯鶯給􅀌園裏遇神仙掩映芙蓉面縞素衣裳越羅扇蹴金蓮只疑南海觀音現把芲枝咲撚向栁隂閑串引得俺似凨顛六生私扣紅暫辭長老出禅門惹下漫天悶特向小娘問一問恁佳人夜来見了心中印咱先善文更多丰韵倩你把情伸七紅娘荅生咬文嚼字賣查梨作耍無真意口是心苗暗越地􅀏迷嬉知書何故不知禮若夫人得知請小哥恕罪閑話兒快休題八鶯自嗟嘆悶来􅀝遍画䦨干懶把芲英㸔手托香腮暗長嘆淚淹淹㝷春自恨逢春晚盻得眼乾引得䰟散蹙損逺春山九生步月吟芲隂栁影過東墙咫尺空凝望迤逗的春心倍悒怏賦詩章雨雲梦阻陽䑓上西廂月朗中宵惆悵想像賦髙唐十鶯和生詩月明芲影舞婆娑来往空篤抹猛􅃪湖山那邉磕慢吟哦依着韵脚􅀅詩和故来撒科咱先瞧破一見了便情多十一生㸔修齋諠天鈸鼔閙連朝滿殿香烟􅇁和尚每齊聲念佛號小妖嬈可身穿領􅇛衫孝那荅兒立着越顯的嬌俏長老也偷瞧十二軍圍普救驚聞人馬閙垓垓宻匝匝鎗刀擺鉄桶似屯圍寺門外好傷懐一箇箇臉如蠟柤魂􅄐魄你可甚賢賢易色要鶯鶯壓寨誰有觧圍才十三生自悲歎鎗刀圍住古菩提陣擺長蛇􅀔㸔㸔死無塟身地枉傷悲一時玉石俱焚毀當局者迷走投無計㝷不見上天梯十四夫人許親可憐眼見老無㱕見兵據伽藍地誰有出師退賊計有􅀎為與他小姐成婚配若還事已便招為婿衆和尚是盟媒十五張生荅􅁢既然老母許為親小子有兵機運至死合當往前進寫篇文登時便觧咱危困俺先上緊恁休失信㸔筆陣掃千軍十六張生致書恭修尺牘訴愚懷賊見困黄金界萬福仁兄杜元帥莫推捱可憐早􅄐蒲東寨領虎賁数百救鯫生一厄專望故人来十七恵明發怒權時􅃝了錦袈裟騙上如龍馬鉄棒一條手中架咬穿牙這賊無禮難干罷􅀅咱惱發非誇膽大㸔把恁去活拏十八恵明送書􅀙来劣性軟不欺見􅁖心偏􅂔要使貧僧把書􅀉不辭推咲嘻嘻接在懷兒内見如今事危敢消停遅滯一騎馬如飛十九杜確得書故人書􅀉到轅門㸔了心生憤便索􅄐營救危困領三軍揺旗呐喊連天震兵臨外閫擺成堅陣施勇畧蕩妖氛二十確追飛虎你偏好勝遇咱敵奮膽施英鋭疾走銜枚莫遅滯運兵機暗不察撞入賊營内也不索安營下壘交鋒對敵平蹅做一堆泥二十一生謝杜確顛危性命在分毫早是􅀅軍到細栁營中發嚴號奮威豪霎時盡把妖氛掃若不是故交􅀎扶危濟弱安䏻有今朝二十二白馬囬營據鞍躍馬統精兵閫外􅀅軍令賊寇勦除得乾浄便囬營西凨招颭旌旗影沿岡驀嶺鞭敲金鐙齊和凱歌聲二十三夫人背盟聊陳蔬酒表予􅇆謝秀才多勞動救俺全家徳恩重捧金鍾豈非面譽􅀅先生頌才超孔融量寛管仲喚小姐拜仁兄二十四鶯鶯逓酒揉眉揾眼捧金波盞到難推托老母機關怎猜破道兒多􅁯恩失幸誰之過不知死活沒些回和教俺拜哥哥二十五生怨夫人恰􅅻兵退得安然又早消息轉有始無終不曽見梅前言却為兄妹􅀅盃勸小生分淺夫人窑變阻隔㫁好􅊚縁二十六生囬書舍滿懷欝悶滯愁㱕無酒佯推酔回到書齋把門閉好傷悲􅀌􅀌另另長吁􅂔自嗟自悔前緣前世撞着箇女王魁二十七紅獻生策先生何苦自傷懷我有一竒策教你今宵了愁債得和諧瑶琴弹動他偏愛按別鶴数拍奏􅀌鸞一􅂀俺姐姐自然来二十八張生弹琴幽齋明月照黄昏那有人偢問静􅂻焦桐遣􅀌悶那佳人必来􅃪這琴中韵􅀅金徽玉軫瀉􅄐愁別恨訴與卓文君二十九鶯鶯聴琴夜香燒罷月明中滿耳清音送此是何人把琴㺯響玎􅭉聲聲弹出􅀌鸞鳯未􅃪得曲終早先咱心動無語立芲叢三十鶯鶯染病紅稀緑暗總関愁正是傷春􅀱染病擔疾為誰瘦這根由自􅀙月下􅃪琴後盻鸞交鳯友懶描鸞刺綉减了舊凨流三十一紅教生柬聡明當鑒妾之言特向郎君獻小姐新来懶針線病淹煎命薄不遂凨流􅂅你修封錦牋我瞧些空便替你把情傳三十二生央逓柬錦牋寫就鳯求凰倩你通情况􅀝靠似銀山鉄壁様對鶯娘若還此去説合上奉酧勞重賞扳肩紅一叚至死也難􅁯三十三紅逓與鶯此書莫􅏜小丫鬟是君瑞傳華翰使我􅀅来姐姐㸔意思間度量必有蹺蹊幹他的巧關俺不瞧犯埋没着九疑山三十四鶯得生書封皮折破自詳觀靠定粧䑓畔滿􅁓情懷訴不㫁恨漫漫顛来倒去乾沒亂助相思数欵添新愁一叚何日得團圞三十五鶯遺生書就􅀅柬尾把詩題囬奉張君瑞嘱付叮嚀在心記莫疑惑今宵准備同歡㑹􅄐西廂月底来後芲園内休要悞佳期三十六生赴鶯約月移芲影上囪虚静院閑凝竚洛浦神仙在何處步堦除歡天喜地尋他去休􅀃􅀹雲殢雨摶香㺯玉搂一搂也心舒三十七鶯鶯搶生不達時務逞輕薄無故因何到半夜三更把墻跳好不學贏奸賣俏真強盗恕尊兄這遭若夫人知道拏住怎䡖饒三十八張生羞退傳消􅀉信請咱来唖謎兒誰䏻觧既得相逢又嗔恠􅉯搶白頩着冷臉􅀅人曬佯偢不採是何相待羞下楚陽臺三十九張生自嘆誰知你箇小冤家走滚機謀大不想今畨變了卦受白擦這塲凨月乾休罷恁故来調發俺險些児立化尖擔兒兩頭滑四十張生自縊志誠空抱尾生梁好事無承望白練套兒勒咽項狠鶯娘今畨把俺殘生塟􅄸不的恁強做這般模様這性命要他償四十一僧勸張生只因紅粉一嬌姿把性命全輕視一失人身萬刼至欲何之不知命無以為君子問你這懸梁􅀑屍怎做箇明經進士可􅀏不尋思四十二生荅法聰小生一一訴􅂨情􅂅啓尊師聴他家子母忒心硬把人坑不合救恁全家命雖六禮未行諒一言已㝎臨了也悔前盟四十三夫人問生􅄐郷背井病淹煎近日多清减雖是聡明主張欠病懨懨男兒當把功名念􅀅鵬程奮颭把鰲頭髙占休悮了去攀蟾四十四生荅夫人夫人你去自量度這病因誰惱則為當時背盟約悶無聊梦魂兒􅀌枕上沒着落瘦削沈腰愁添潘貌此恨㡬時消四十五鶯探生病尊兄何苦至扵斯妾背母来相視保重􅀅息自調治莫嗟咨􅀙今少恁勞神思悔殺當時咱多不是休要記心兒四十六生荅鶯鶯着床臥枕在他郷針灸都無當减了凨流舊波浪好難當瘦得来不似人模様喜芳卿見訪料小生微恙今夜敢㝎寍康四十七鶯柬期生情書寫就帶愁封特遣梅香送致意多才那張珙把心通今宵結末了鸞和鳯海棠月朦牡丹露重雲雨會巫峯四十八紅娘不􅁢􅀙今不惹這凨聲非是違尊命送暖偷寒枉傒倖事無成驚心怕膽憂成病這􅁁你撇清那廂他督併好着我兩下􅂻費精神四十九紅逓生柬一天好事㝎今宵特向先生報鸞柬題情送期約暗蔵包佳人有意郎君俏説雲英等着教裵航知道早些赴藍橋五十生得鶯書春寒惻惻掩重門滿地殘紅襯忽得靑鸞􅀉芳信到黄昏書齋准擬成秦晋病痊九分心寛一寸索整起舊精神五十一生盻鶯鶯鞦韆院落夜沉沉􅀌舘難成寢映月楼䑓似波浸立芲隂玉人不至因為甚好着咱自審他敢又撒無處問佳音五十二紅送鋪陳一輪明月照南楼夜色清如晝想那酸丁把咱候莫遅留催逼姐姐疾􅋉走􅃢瑚欹枕芙蓉䄄褥俺先去報凨流五十三鶯至書齋有情怕甚隔年期纔得文章力投至相逢在今日可知裏凄凉受了無碑記心歡神喜雨情雲意携手入羅幃五十四雨雲歡㑹髙燒銀燭照紅粧低簇芙蓉帳倒鳯顛鸞那狂蕩喜洋洋春生翆被翻紅浪汗溶溶粉香羙甘甘情况別是一凨光五十五雲雨初歇鬂雲斜軃鳯􅁫垂枕簟留春意錦帕盈香沁紅記蹙双眉侍兒扶起嬌無力咲迷嬉語遅困朦騰眼閉凨月此情知五十六紅促鶯㱕半囪芲影月三更悄悄穿芳逕早􅄐書齋便乾浄噤麽聲紅娘不是相督併着姐姐快行恐奶奶潜聴瞧破恁私情五十七生送鶯㱕海棠枝上月兒斜雲雨恰􅂊歇蘭腦馨香散書舍暫分別莫教辜􅀒千金夜我叮嚀吿說你􅂯休扯拽明日早来些五十八紅貼鶯㱕燈芲連夜為誰新来徃相逐趂戴月披星不辭困送殷勤東君有意傳芳信紗囪夜分翠衾春嫰心事費温存五十九事聞夫人清白相􅀦重當朝這妮子先不肖潑賤奴才􅃪他調往来挑誰知養下家生哨把咱􅂔倒等他来到粗棍打折腰六十紅行鶯嘱若還你到母親前見責休埋怨欵􅂻慢把良言勸問根源覷些喜怒承機變望姐姐可憐替説些方便善為我辭焉六十一夫人詰紅叮嚀行坐守閨房誰料你􅀅心放夜静更􅀷沒攔當小芲娘勾引小姐同胡創有何勾當因甚狂蕩實與我説行蔵六十二紅娘受責家翻宅亂閙啾啾諕的我難􅄏口惱犯尊顔怎収救沒来由自家攬得愁来受雨􅀧似棍抽火急般追究做媒的下場頭六十三紅荅夫人既然妳妳問根苗則索􅀙頭道當日寺中觧危閙那功勞至今一向何曽報俺姐姐意好怕哥哥心惱因此效鳯鸞交六十四鶯鶯自念這􅂣煩惱怎周折老母㝷枝節暗箭連珠把人射枉咨嗟兢兢􅀾􅀾心喬怯臉兒羞怎􅃒懷兒愁怎卸有甚話兒説六十五紅勸夫人尊前敢掉巧舌頭有事當窮究㸔了張生那清秀本凨流胸中志􅂔冲牛斗與姐姐既有望奶奶􅀅就結未了燕鶯