front:
  text: 雍熙樂府卷之二
  hash: sha256:799b3bcf68b2fe4ba1a5358e18f1e0124985c0d17750e71c4b3f46d0f4e1989e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_002-1a}
body:
  text: 正宫端正好金臺八景聖天子統華夷際龍虎風雲會有賢臣宰輔扶持八方寧靖干戈息勝舜代過堯世滚繡毬保山河壯帝基輔寬仁四海歸順天心應垂祥瑞千邦進萬國來儀省刑罰薄稅斂賞三軍足食衣盡歌謡豐年稔歲户無扄路不拾遺風調雨順黎民樂家給人和享富貴生意無虧倘秀才文官每坐琴堂知法度清廉正直武將每掌兵權施謀略赤心報國因此上海宇清寧日月輝光風盛樂雍熙保安著社稷滚繡毬羡金臺八景竒看盧溝曉月輝髙聳聳居庸疊翆薊門深煙雨霏霏觀西山霽雪晴玩秋風太液池映金臺紅輪西墜玉泉山倒挂虹霓萬歲山瓊島春隂靄五鳳樓瑞氣祥光罩𬗋微端的是堪詠堪題賽鴻秋太平年無士馬煙塵息感皇恩蒙天寵榮華貴衆公卿拜舞在丹墀內插宫花飲御酒排筵會笙歌奏管絃鼉鼓鼕鼕擂瓊林宴罷醺醺醉脫布衫擺頭踏兩行朱衣跨金鞍駿馬頻嘶將照道紗燈挑起笑吟吟玉鞭催騎小梁州扶下馬嬌娥翠繞圍端的是步步兒相隨畫堂銀燭燦光輝安然睡福祿夀年齊子孫世襲登八位靴蹤兒不離朝基一班兒宰相每都是些勳臣輩凌煙閣內垂青史把名題醉太平賴神明威德托洪福天齊八方四海盡服歸鎮蠻夷定體遵依禮樂流芳世德化俗美興仁義賢人輩輩長苗裔荷蒼天道理尾聲讃吾皇永綿綿聖意合天意衆臣僚撫乾坤都與皇家出氣力秉忠良能于國官清廉法正直榖雙穗麥二𡵨現祥光靄瑞氣普天下不動征旗挂酒旗願吾皇納諌如流萬民喜端正好慶郊祭回鑾一氣轉發青陽四時序開黃道聖明君端拱臨朝臚傳大祀承天表排鹵簿離蓬島滚繡毬赤力力風翻的錦帶飄急颭颭旗迎的曙色髙霧濛濛映金鑾曉霞籠罩氣昻昻百司官具公服圍列周邅齊臻臻鞍上將不弱出嵎虎密匝匝坐下馬如同戲浪蛟雄紏紏各施呈六韜三略聖明主巍巍大德期文武輔弼臣耿耿丹心壓契皋踈刺刺旗影飄颻倘秀才龍鳳車淡氤氲霞光閃灼狻猊鼎香靉靆祥煙繚繞百萬隊貔貅擁護著秉虔心離北闕辦誠意赴南郊祀天畢回鳳閣脫布衫金殿上陳水陸擺列佳肴設珍羞美饌烹炮托聖主汪洋大德遇豐年太平之兆小梁州萬國衣冠拜聖朝樂奏笙簫普天率土盡歌謡感聖主恩波浩玉斚進香醪么願吾皇萬載承宗廟錦江山永固堅牢普天下黎庶歡軍民樂鳶飛魚躍萬物盡逍遙尾聲文官武職宜品藻鷺序鵷行堪畫描四海清寧國富饒五榖收成風雨調祝聖夀綿延嵩嶽髙拜獻上當今慶成表端正好趙太祖雪夜幸趙普水晶宫鮫綃帳夜深沉睡不穩龍床離金門私出天街上正風雪空中降滚繡毬似紛紛蝶翅飛如漫漫栁絮狂拂氷花旋風兒飄蕩踐瓊瑶腳步兒慌忙白襴兩袖遮把烏紗小帽蕩猛回頭把鳳樓凝望全不見碧琉璃瓦甃鴛鴦霎時間九重宫闕如銀砌萬里乾坤似玉粧粉墊滿封疆倘秀才他把那鐡桶般重門來閉上我將這銅獸面雙環扣響𫾣門的是萬歲山前趙大郎想堂中無客伴料燈下看文章我特來聽講呆骨朵沖寒風冒凍雪來相望有機密事緊待啇量忙怎麼了事公人免禮波招賢宰相這的是調鼎鼐三公府那里有剃頭髮唐三藏我向這坐席間聽講書你休來我耳邉廂呌點湯倘秀才朕不學漢髙皇深居在未央朕不學唐天子停眠在晉陽常則是翠被寒生金鳳凰有心思傅説無夢到髙唐這的是為君的勾當滚繡毬既然四海為一家必索要正三綱謹五常朕幼年間廣習鎗棒恨未到孔子門墻尚書是幾篇毛詩共幾章講禮記始知謙讓論春秋可鑑興亡朕待學禹湯文武宗堯舜卿可效房杜蕭曺立漢唐燮理隂陽倘秀才卿道是用論語治朝廷有方却原來這半部運山河在掌聖道如天不可量談經臨絳帳索強如開宴出紅粧聽説罷神清氣爽滚繡毬銀臺上畫燭明金爐中寶篆香不當教老兄自斟佳釀又何須教嫂嫂親捧霞觴卿道是糟粳妻不下堂朕須想貧賤交不可忘常言道表壯呵不如裡壯妻若賢夫免災殃朕遇卿正如太甲逢伊尹卿得嫂嫂呵恰便似梁鴻配孟光只願的福夀綿長倘秀才我但歇息論前王後王恰合眼慮興邦喪邦因此上曉夜無眠想萬方方信道歡娛嫌夜短寂寞恨更長憂愁事幾樁滚繡毬憂則憂當站夫身無挂體衣憂則憂貧家每無隔宿糧憂則憂行船客阻一江風浪憂則憂駕車的萬里經啇憂則憂號寒的妻怨夫憂則憂啼飢的子喚娘憂則憂甘貧的晝眠深巷憂則憂讀書人夜坐寒窗憂則憂布衣賢士無活計憂則憂鐡甲將軍守戰場不由我感嘆悲傷倘秀才憂的是百姓苦向御榻心勞意穰害的是不小可教寡人眠思夢想太原府劉崇據北方朕待暫離丹鳳闕親擁碧油幢先取河東來上黨滚繡毬卿道是錢王共李王劉鋹與孟昶他每無仁政萬民失望行霸道百姓邅殃差何人收四川命誰人定兩廣取吳越必須名將下江南宜用忠良要定奪展江山白王檠天柱索問你正宇宙黃金架海梁卿仔細參詳脫布衫取金陵飛渡長江到錢塘平定他降西川路休辝棧閣南蠻地莫愁煙瘴醉大平陳衝開虎狼身冒著風霜用六韜三略定邉疆把元戎印掌則要你人披鐡甲身雄壯馬搖玉勒難遮當鞭𫾣金鐙響玎璫早班師汴梁二煞有那等順天心逹天理去邪歸正皆踈放有那等霸王紫抗王師耀武揚威盡滅亡休虜掠民財休傷殘民命休淫汚民妻休燒燬民房恤軍馬施仁發政廣錢糧定賞行罰保城池納逆招降沿路上安民挂榜重賑濟再開倉尾朕專待正衣冠尊相貌就凌煙圖畫功臣像卿莫負勒金石銘鍾鼎向青史標題姓字香能用兵善為將有心機有膽量仰看天文算星象俯察山川辨形狀決戰先將九地量晝戰多將旗幟張夜戰頻將火鼓揚步戰屯雲護軍仗水戰隨凨使帆漿竒正相生兵最強仁智兼行勇怎當專聽將軍定這廂坐擁元戎取那廂飛奏邉庭進表章齊賀升平回帝鄊比及你列土分茅拜卿相先將這部下軍卒論功賞端正好祝讃升平九重宫五色日輪髙十二樓萬縷祥雲放建皇都鞏固金湯纘成大業山河壯靄佳氣天都旺滚繡毬喜孜孜聽康衢誦歌謡黔黎共樂昌笑吟吟祝堯封躋夀域臣民齊贊揚錦重重設大駕擺金鑾挂寶扇繡旗仙仗齊臻臻擁千官簉鵷鷺列彤墀玉笋班行光燦燦金鑾殿髙捲起蝦鬚簾玲瓏霞彩帳暖溶溶玉獅爐細裊裊龍涎篆氤氲瑞靄香韻悠悠動一派奏鈞天和仙音樂聲嘹喨鞠躬躬瞻萬乘拜冕旒肅衣冠環珮鏗鏘香冉冉色霏霏祥雲光覆蓬萊近明朗朗熖煌煌銀燭朝天𬗋陌長喜孜孜齊祝願聖夀無疆倘秀才保宗社功過武湯撫黎庶德邁漢唐明四目逹四聰定四方民無怨生恱喜天有感降禎祥遍四野庒農擊壤脫布衫四時序未稼豐穰五辰順日月昭彰甘露降白如雪霜醴泉生味勝佳釀小梁州瑞草靈芝是處芳進騶虞兩出非常龍駒天馬自來王南極現呈乾象米麥積盈倉么篇湧浮圖凝秀寒氷降獻麒麟獅子神羊玄兔産白鹿生神龜出黃龍降普天下軍民歡暢慶明主賀吾皇尾聲幸遇著進重祥貢疊瑞感洪恩誠惶奉表朝今上更勝如逺重譯涉萬里獻白雉率土來賔服越裳永固皇圖帝業昌常轉法輪佛日光海不揚波聖意彰風不鳴條聖恩廣同會車書禮樂邦輻輳輪蹄錦繡鄉門不闔扇民樂康路不拾遺人善良總握乾符御萬邦保護著萬萬載華夷聖人掌端正好大打圍射雕擁千騎擺圍場出四野排軍候農事畢禾稼皆收山林中捕捉禽和獸因此上交飛走放分箇先後滚繡毬撁犬的輕搖動銅項鈴架鷹的緊拴著皮臂鞲按節令夏苗冬狩順時光秋獮春搜齊臻臻列兩行採獵人密匝匝擺一邅弓箭手五方旗舞飄飄綵霞錦繡七重圍明燦爛劔戟戈矛威凛凛人如越嶺巴山虎勢昻昻馬勝翻江出水虬不弱如萬隊貔貅倘秀才我只見翠葉凋池荷岸栁色添青山松澗竹方信道明日黃花蝶也愁起西風聲淅淅吹落葉響颼颼堪描在丹青畫頭賽鴻秋更那堪潤濛濛露浥芙蓉秀冷清清霜壓梧桐瘦碧𥻘𥻘水漾玻璃皺響潺潺澗瀉瑶琴奏丹桂異香飄紅葉胭脂透驀聽的韻泠泠山峪鳴岩溜快活三山林中並無一箇採樵叟水面上豈有一箇釣魚舟衆獵人張羅捕網繞周邅一箇箇難逃漏蔓菁菜弓弩開時狐兔憂箭下如何救鑼鼓鳴時虎豹愁義鎗下應難受盡擒住黃羊黑熊山獐野獸麋鹿猿猴我只見犬拿狡兔鷹摶飛鳥鶻擊寒鳩耍孩兒那匹馬蕩塵埃滚滚間馳驟正來到垣河橋左右那將軍忽的猛擡頭見蒼雕天氣悠悠雕見人忙搧鐡翅凌霄漢人見雕緊跨龍駒上斗牛有志氣難能勾雕翺翔勝如鸑鷟馬跳躍賽過奔彪四煞一來見飛禽騰舞的髙二來顯將軍武藝熟精神抖搜威風紏鵲樺弓飛魚袋內連忙取鳳翎箭走獸壷中急去抽此箭中功名就秉一片雄心苦志使滿懷壯志難酬三煞那雕兩翼健急急的飛那馬四蹄輕緊緊的逐鞍上將持弓挾箭揎𫀆袖翻身背展猿猱臂仰面爭開神怪眸弦搭上朱紅扣這箭去百發百中那雕著千死千休二煞撲刺刺驚起些林外鶯忒稜稜蕩散些水面鷗唬的那鷺鷀鸂鷘難飛走才離了寒沙淺水鴛鴦浦又看見秋草凄煙鸚鵡洲莫不墜落向殘林右鋪白雪白蘋渡口多躲在映紅霞紅蓼灘頭一煞既然那緑楊枝上無多敢在黃蘆岸畔有料應只在村前後那將軍縱馬踏荒野車輪大的毛團臥古丘與髙手爭前後威伏的他衆人怯懼斷送了一鶚鳴秋尾聲一箇李廣也曾射虎一箇賈竪也曾射牛便有那養由基百步穿楊栁都不如這斛律光將軍射雕的手端正好碧雲天黃花地西風緊北鴈南飛曉來誰染霜林醉總是那離人淚滚繡毬恨則恨相見的遲怨則怨歸去的疾栁絲長玉􅍡難繫恨不的倩踈林挂住斜暉馬兒逆逆的竹車兒快快的隨恰告了相思廽避破題兒又早别離聽的道一聲去也鬆了金釧遙望見十里長亭減了玉肌此恨誰知叨叨令見安排著車兒馬兒不由人熬熬煎煎的氣有甚心情將花兒靨兒打扮的嬌嬌滴滴媚準備著𬒳兒單枕兒冷則索昏昏沉沉睡從今後衫兒袖兒都揾濕重重疊疊的淚兀的不閃煞了人也麼哥兀的不想煞了人也麼哥久巳後書兒信兒須索與我恓恓惶惶的寄脫布衫下西風黃葉紛飛染寒煙衰草凄迷酒席間斜僉著坐的蹙愁眉死臨侵地小梁州我見他閣淚汪汪不敢垂恐怕人知猛然見了把頭低長吁氣推整素羅衣么雖然久後成佳配奈時間怎不悲啼意似癡心如醉想昨宵今日清減了小腰圍上小樓合歡未巳離愁相繼想著俺那前暮私情昨夜成親今日别離我諗知這幾日相思滋味却原來比别離更增十倍么篇年少呵輕逺别情薄呵易棄擲全不想腿兒相壓臉兒相偎手兒相携你與俺崔相國做女壻妻榮夫貴但得箇並頭蓮強如狀元及第滿庭芳供食太急須臾對面頃刻别離若不是酒席間子毋當廽避有心待舉案齊眉雖然是相守的一時半刻也合著夫妻每共卓而食眼底下留情意尋思起􅈬里險化做了望夫石快活三將來的酒共食嘗著的似土和泥徦若便是土和泥也有些土氣息泥滋味朝天子暖溶溶玉杯白泠泠似水多半是相思淚眼前靣茶飯怕待要喫恨塞滿柔腸胃蝸角虛名蠅頭微利折鴛鴦在兩下里一箇在這壁一箇在那壁則落的一遞一口長吁氣四邉靜霎時間杯盤狼藉見車兒向東馬兒向西兩意徘徊落日山橫翠今宵宿在那里有夢難尋覔耍孩兒淋漓襟袖啼紅淚比司馬青衫更濕伯勞東去燕西飛未登程先問歸期雖然眼底人千里且進生前酒一杯未飲心先醉眼中流血心內成灰五煞到京師服水土趂程途節飲食順時自保揣身體荒村雨露宜眠早野店風霜要起遲鞍馬秋風里最難調護最要扶持四煞這憂愁訴與誰相思只自知老天不管人憔悴淚添九