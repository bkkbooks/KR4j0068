front:
  text: 雍熙樂府卷之八
  hash: sha256:a54d5186d2930f45e1e9447cf8996ca536e25ecd75915a968dd5100c90be02de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_008-1a}
body:
  text: 南吕宮一枝花燈詞皇都錦繡城江左繁華地纍朝天子闕萬載帝王基水秀山竒百姓多豪貴莊農禾稼齊幸遇著盛世明時端的是豐年稔歲梁州喜泥牛碎鴻鈞氣轉碧天輪斗柄寅回鳳城元夜堪人意一輪寶鑑萬顆星垂燈光相映月色相隨燈和月上下光輝月和燈來往相宜遍皇都錦樹花開繞鳳闕金蓮放蕊滿城池銀燦琉璃這壁那壁家家處處排羅綺燈和月兩相對勝似蓬萊圗畫裡堪賞堪題罵玉郎元宵賞玩排筵會斟緑蟻飲金杯燈光影裡香風細擡金錢才子行間逰玩仕女隨看社火佳人立感皇恩呀鼓樂如雷絃管聲齊一壁廂屣著髙橇一壁廂踏著迓鼓一壁廂舞著白旗更有那八仙過海更有那四聖朝西鰲山上畫燈明照華夷採茶歌笑吟吟手相携慢騰騰步輕移相呼相喚不相逼漸漸東方分曙色看看月落衆星稀尾聲五更禁鼓都休擂三㺯梅花且休吹豐稔元宵太平日千邦來進禮萬國來慶喜萬萬載中華大明國一枝花武臣擎天架海梁祐國安邦將錦𫀆銀鎖鎧金印碧油幢神表堂堂諳地裏觀乾象受皇恩𬒳寵光典三軍返琚投壷安萬姓謳歌擊壤梁州驅虎豹威風凛凛擁貔貅豪氣昻昻坐施行政中軍帳弓彎秋月劍掣寒霜營安細栁獵從長楊撲鼕鼕鼓擂花鞚卜刺刺馬驟沙場按著那六韜書亂紛紛竒正旋環施逞那三略法閙炒炒縱橫擾攘展開那五方旗卒律律上下攸揚逺方近方人都道羽林星宿從天降施愷悌萬人望名注金縢姓字香萬代輝光尾聲箎塤迭奏誠堪賞文武兼齊普贊揚當日箇德行如雲過顔巷使蓬門有光斯文道長自嘆不遇英賢鎮長想一枝花十面埋伏統三軍將帥能托賴著萬萬歲君王德有千貟英勇將掌著這八面虎狼威撾鼓奪旗有十面埋伏智將一箇楚重瞳相戰敵一片心保護江山兩隻手扶著社稷梁州施妙策經綸天地六韜書輔佐華夷但行兵托賴著當今帝人如猛獸馬似狻猊旗開得勝馬到成功論英雄端的誰及這軍兵世上無敵俺俺俺明晃晃密排著斧鉞鎗刀寒凛凛齊列著戈矛劍戟古刺刺風颭動號帶征旗相持對壘將一箇楚重瞳困在那垓心內雄糾糾大軍勢鐵桶軍圍數十里有翅難飛牧羊關非是我能爭戰是吾皇有聖德恢宇宙洪福天齊因此上馬壯兵強安邦定國兵臨處皆拱手馬到處納降旗取城郭三千座展江山十萬里罵王郎官軍各自施才智顯武藝逞雄威都子要赤心保護當今帝王陵你鎮守西周勃守著正北灌嬰守著這東南地感皇恩呀四下裏呐喊搖旗楚重瞳將少兵微漢髙皇順天心楚重瞳逆道理仁聖主應天機苦爭戰于家為國厮殺相持將敵兵如浮草盡皆遺採茶歌楚重瞳一時虧漢髙皇掌華夷保護的家邦安穩勝磐石得勝也喜孜孜鞭𫾣金鐙嚮笑吟吟齊唱凱歌回尾聲若歸西漢無拘繫晝夜追隨不可遲將著徑兵帶著輕器見如今子嬰滅矣霸王命虧普天下罷戰無爭萬民喜一枝花榮貴官居八輔臣祿享千鍾近功存遺百世名播萬千春極禮亨純惟治國安邦論用調鼎鼐新持義莭率忠貞都則待報主施恩秉賢烈慿直正也則是懲清化民梁州獲聲譽體的是那漢汲黯丹書清史取清名訪的是唐魏徴汗簡標勳端的是振綱常尊倫理行仁信所以上平和天下寧靜了乾坤八蠻拱手四夷調均一箇箇氣沖開牛斗星辰一箇箇志髙接太華風雲一箇箇似臯陶伊尹的形藏一箇箇揣吕望張良的䇿論文武功一箇箇比蕭何李靖的忠勳都子挺身報君保皇圗大業無疆運武勇烈文賢俊所以國治家齊民物欣堪花酒盈樽尾聲㝎邊疆安社稷把戎狄鎮扶宇宙保華夷除剪了蠻貊塵如今這癬疥兒曹永不病文英能至真武威嚴似神眼見的凌煙閣標題姓名凖一枝花白鸚鵡慶夀霜翎雪握成素羽銀粧就老拳金鑄煉徑翮玉雕鎪電掣雙眸壯氣沖牛斗英風播九州過千尋碧海髙飛渺萬里青雲顧首梁州珍重比麒麟上瑞禎祥如鸞鳳同流玉海青自古為稀有方譽紀載簡册名留升平吉兆盛世嘉猷他本自逺方來慶賀千秋單注著億千春夀祿遐修正值著豐稔歲樂雍熙國泰民安太平日享富貴天長地久封域中保康寧物穰人稠似這般禽在手髙擎著至寶非虛謬賞佳祥祝延夀樂中土康衢擊壤謳萬載千秋尾聲九重宫苑歡聲輳七奏笙歌曲調􅌻聽一派清新樂音溜遙瞻著錦鞲滿斟著玉甌進一盞千秋慶夀酒一枝花祝夀玳筵排翡翠屏香篆裊狻猊獸捲珠簾迎五福開寶殿慶千秋瑞靄輕浮日色遲宫漏歡聲滿鳳樓喜孜孜仙女擎杯嬌滴滴仙娥勸酒梁州簮寶髻仙花馥郁列金階仙樂滑􅌻更有那八仙九老來添夀盈玉盎仙桃髙捧合瑶笙仙曲齊謳展素羽仙鶴對舞飲清泉仙鹿馴逰四般兒粧點的仙境清幽三般兒成就了千載遐修採靈芝授仙籙青帝遙臨咽玉液嗽華池黃庭內守煉丹砂騰寶氣紫府名留寰中更有夀山福地同髙厚保天恩自天祐隂隲須教福祿酬永永源流尾聲正值著九秋天氣重陽候百歲芳容不老秋露菊霜凝正清秀聚十方九州衆神仙稽首共祝千秋億萬久一枝花自詠夀恰三陽漸暖辰逢𥘉度新春日喜桑榆延晚景幸康健樂雍熙生忝宗室藩屏中原地忠良守社稷志誠心理國尊朝端謹道齊家正巳梁州感聖主洪恩大德托天朝聖武神威芳名保守無他異立身呵謙恭是務持心呵本分為期醉來呵詩學李杜醒時莭字習繇羲將仁義立㝎根基方寸地端的是平夷只因我心寬弘懶飾邊幅意曠蕩不親瑣碎性踈狂慵整冠緌道頭識尾論風流堪作箇名書會和夀詞向丹陛唱一曲髙歌飲數杯聽你那祝夀聲齊尾聲劬勞罔極恩非細因此上厚惠禮相待的遲葵藿羮墻憶先世樂升平共喜仰君親厚德我將這忠孝持心億萬紀一枝花春別兩堤煙栁垂十里夭桃映半篙春水緑一帶曉山青三月朝京酌別酒添詩興聽驪歌緩去程鞚雕鞍行色匆匆載畫舸行裝整整梁州暫留戀風流秀士略相別通變儒生愛你那錦心繡腹文學正你將那溪山飽玩風月間賡暮雲觀鴈春樹聞鶯你與我片時間等待消停我將這三般兒囑付叮嚀早晨間取一帖避風寒壯筯力藥餌頻服到晚來尋一間曽厮認會溫存店房兒自寢天明尋問一條有人煙無泥濘官路長行則為這下情志誠遙瞻上闕心忙併感洪恩樂安靜滿飲香醪醉太平老我平生尾聲俺如今身耽舊日文園病帶減當年沈約鞓若見俺相知問時呵應你道我年紀正五旬百無那一能常則是花酒鄊中喚不醒一枝花武昌作雍容黃閣姿卓犖青雲態倣佛憂國志慷慨濟川才奉詔西來衝瘴霧臨邊界駕天風下鳳臺正正旗堂堂陳蛇鳥爭輝轔轔車蕭蕭馬風雲動色梁州展其韜施其略孫吳是法依于仁行于義周孔為懷經綸逈出諸藩外八陳旗春營栁暗七重圍夜帳蓮開六鈞弓曉星迸激雙龍劍秋水磨揩轉儲胥周饋餉掌上裁劃撫疲羸均勞逸意外驅差玉兔毫揮翰墨學足三冬𬗋鸞誥敘勳舊恩封三代丹墀陛列班資步近三台偉哉盛哉况托著巍巍聖德乾坤大露布馳玉關塞力挽天河下九垓淨洗氛埃尾聲録豐功褒盛績班班擬見銘鍾著芳聲垂後代歷歷終期炫竹帛若報道東閣門前不妨礙借尺地寸階進一言半䇿恁時節吐氣揚眉拜丰采一枝花荆南作嵬嵬九鼎臣落落三台位飄飄七步才默默五兵機花蕚相輝俯仰諧天意經綸合聖規書架插三萬舊日牙籖武庫列十二清霜畫戟梁州翰墨奪人間錦綺咳唾落天上珠璣統雄藩肅鎮西南裔𬗋泥詔符分銅虎碧油幢纛散紅犛金麒麟繡蒙瑣甲玉螭龍籠帶宫衣八卦營細栁深迷五方旗鐵馬驕嘶喜的是沙漠空狐兔塵清靜鯨鯢浪息宫殿髙燕雀風微據之以德用之以禮因此上太平天子無為治片𥿄間九重內喚得春來草木知萬物熙熙尾聲金甌應巳藏名諱麟閣終當繪像儀寄語公明董狐筆比及論功賜邑銘彛勒石先築沙堤四十里一枝花武臣汪汪江海心落落雲霄志昻昻經濟才矯矯廟堂姿閫外行司暫把牛刀試播芳聲雷貫耳匣中劍氷涵映水芙蓉腰間帶銀鈒盤花荔枝梁州烽燧息朝廷有道簿書間門館無私談笑間喚得春風至昆季雍雍穆穆友朋切切偲偲禮法兢兢業業書謨念念孜孜了公家無甚縈思追歡樂有甚推辭獵西山金僕姑錦袋雕弓宴東閣銀錯落瓊箏寶瑟逰南陌紫叱撥玉轡青絲丈夫似此多管是胸中寸地平如砥嘉瑞巳天賜庭下蘭孫與桂子雨露滋滋尾聲于親巳是平生事許國應當少壯時顯孝揚忠但如是橫金曵紫承恩奉旨穩情取勳業班班照青史一枝花自述三千丈蕭蕭白髮生七十歲楚楚青衫舊抱經綸無官朝圵闕買犁鋤有子事西疇氣稟清修玉聳雙肩瘦胸涵一鏡秋躡天根探地脈祕訣深微步詩壇入酒社精神抖搜梁州瞻勝迹蓬萊山不離眼底避危途太行路長在心頭將古今吏隱都窮究慕謝安髙邁羡陶令歸休愛戴逵灑落學賀老風流文房藝苑偏逰藥欄花徑新幽披覽著禹陵書半囱星斗光芒張玩著輞川圗四壁煙雲馳驟撥刺著嶧陽琴一簾風雨颼颼淡然自守全勝他歸山拂破麻𫀆袖能燮護會消受髙臥元龍百尺樓萬事攸攸尾聲恰能勾天涯萍水同携手誰承望上表蓴鱸又買舟少不的再敘離懷那時候連床秉燭隔籬喚酒夜雨呼童剪春韭一枝花贈草聖括造化攢成赤兔毫挽滄𬈑磨徹烏龍尾燦日月光搖玉版箋吐煙雲香散紫英石四寶清竒瀟灑藝囱內風流蓮帳底念孜孜八法八訣意懸懸六書六體梁州指其掌畫其腹雲崩露乘得之心應乎手雷走風飛天然一筆無窮意秋蛇春蚓野鶩家雞跳龍臥虎渴驥獰猊有隂陽偃仰的精神無偏枯背向的支離樂毅論太史針敷揚出忠烈之風逍遙篇孤鴈賦醖釀出神仙之氣曹娥碑吉誓文摸臨出孝悌之規遮莫醒兮醉兮一揮一灑非逰戲干喜怒系明晦可知筆塜纍纍墨作池名播京畿尾聲誰不道十年非得通三昧我子知一日偷間測萬機常子得青瑣髙賢自論議看那顔真卿健筆王右軍妙迹真乃是一色長天共秋水一枝花題檜得指教三遷好住居便栽培千丈深根蒂能借取四時工造化以生成一片翆屏帷大剛是即景成規直幹攢楹密橫柯壓棟齊但將翰墨褒題不假丹青繪飾梁州靑鬱鬱柏葉松姿僃體香馥馥芝馨术味沾衣更幾般天然景趣諧人意風過處絲篁咿啞月來時金碧光輝簷露灑珠璣點滴篆煙生紫黛霏微雖無華麗芳菲端實蕭爽新竒奢不效七松家綺幕圍風清不讓五栁莊黃花繞籬貴不慕三槐堂畫戟當扉料伊所為單指望歲寒眼底為交契况值太平世一樣肝腸似鐵石愁甚麼雪虐霜欺尾聲映踈簾籠曲檻盤旋著夭喬蛟龍勢傍圍攔依短砌踞聳著狰獰虎豹威我試將過眼的風光自評議十萬户會稽八百里鑑水縱有些亭臺則是栽桃李一枝花梅花深處羅浮山接渺茫大庾嶺橫空窈凌風臺迷汗漫却月觀阻迢遙意會神交想得到行得到一逢春一遇著蕊踈踈花密密蓓蕾葳𬎼幹盤盤枝挺挺槎芽夭矯梁州品藻著世上色瑕疵的雅淡評論著天下花無褒貶的孤髙長記得看花時有幾樣兒堪稱道露點滴珠容膩粉煙朦朧翠護輕綃風搖曵香飄麝腦雪糢糊玉壓瓊瑶厭桃杏灼灼夭夭伴松篁灑灑瀟瀟何水曹一生心愛得綢繆林和靖兩句詩聮得妙巧宋廣平八韻賦撰得風騷想度暗約我猜似梨雲一片連𬈑漠指顧間自吟嘯但則覺花氣氤氲襲毳𫀆白茫茫萬樹千條尾聲全不似夢逰東海尋三島真乃是身在西湖過六橋囑付那羌管嗚嗚莫吹落等待著籟聲悄悄月華皎皎看一會踈影橫斜到清曉一枝花田老齋樹當軒作翠屏月到簾為銀燭栁綿舒白􅖯氊苔緑展翆絨氁四壁蕭踈若得琅玕護何須蘿蔓鋪聽了些雨打囱下芭蕉看了些日照盤中苜蓿梁州破陸續歇兩肘疲童灑掃奄刺答漏雙肩老嫗供厨主人自得其中趣隔墻貰酒鑿壁觀書拾薪煮茗賃圃栽蔬雀堪羅忙煞蜘蛛鼠無糧間煞狸狐寂寞似萊蕪縣范史雲琴堂虛敝似臨卭市藺相如酒壚瀟灑似錦官城杜子美茆廬坦然自足剗地裏撥灰吟出驚人句想石崇在金谷止不過錦障春深醉緑珠今日何如尾聲送將窮鬼出門去描取錢神入畫圗但能勾半點兒陽和到喬木管城子進取孔方兄做主翻蓋做十二瑶臺列歌舞一枝花自娛江湖老姓名風月間人物文章新制作禮樂舊規模暮景桑榆杏林好春無數橘泉甘樂有餘一絲風曽釣鯨鰲九轉丹恰成龍虎梁州核老聃千言道德問安期萬劫榮枯長則怕白雲引入青山去包含丹篆簸㺯明珠逍遙巾幘懶散襟𥚑雖不曽指南陽賣却茅廬少不的傍東湖苫箇廜㢝菊花枕滿頭香霧氤氲梅花帳滿面香風馥郁蘆花𬒳滿身香雪糢糊淡然自足可知道黃金不賣長門賦將千畝渭川竹寫作江南煙雨圗暢不塵俗尾聲清溪道士為賔主東里先生問起居別却紅塵是非路清茶自煮濁醪旋沾日日髙歌𬗋芝曲一枝花心逺軒不從方外逰且向寰中住但能通大道何必厭亨衢吾愛吾廬選得陶詩句楣間籀字書黃庭靜玩之無窮靈源溢探之不足梁州七竅逹八荒廣漠一簾隔萬里空虛誰不知方寸地無多物玄參黃老易論程朱詩𫾣怪險棊較􅑿輸不聞滿耳喧呼只宜竟日跏趺恰枕肱攸攸夢繞華胥不動腳默默神逰洛浦才合眼飄飄身在蓬壷本無間阻山林城市俱同路解到此中趣便覺平生百慮踈遐邇何如尾聲光風轉蕙春生戶幽草生香月到除不離團蒲二三步休道星躔月窟遮莫天關地軸垂拱之間在環堵一枝花隱居峥嶸倚上遊突兀當雄鎮髙明臨大道迢遞帶通津從去了河上仙人千載無音信丹青似創新架飛楹聮走拱不下班倕敞天囱攢藻井堪扳翼軫梁州龜背織朱簾閃閃鴛翎甃碧瓦鱗鱗雕闌一目天之盡洞庭半掬雲夢平吞荆襄低瞰漢沔中分長空逺水茫茫光風霽月紛紛吕岩笛夜夜聞音陶潛栁年年報春崔灝詩句句絶倫後人議論都道是物華勝壓東南郡况與洞天近絳節琅璈度綵雲萬象騰文尾聲汀花岸草春成陳沙鳥風帆暮作群我待要間躡金梯散孤悶仰之北辰俯之大坤氣勢髙寒立不穩一枝花方外娛蜀道難長懷李太白廬山髙每羡歐陽叔江曲折多詢郭景純海周遭曽問木玄虛大綱來混一皇輿萬里神逰去何須覔坦途腳到時選勝探幽眼落處興今慨古梁州圗得些風月情長沾肺腑贏得些是非名不到襟𥚑分明記得經行處躡蒼梧衝飛綵鳳扣扶桑撼動金烏登鴈宕驚潛木客涉龍門叱起天吳又不比攸攸泛一葉黃蘆飄飄跨兩足白鳬散袒似李元貞松隂內干祿求名逍遙似趙師雄梅花下開樽按舞廓落似淳于棼槐柯上架室安居遮莫五湖四瀆釣竿直拂珊瑚樹天地闊渺無路撞入這仙翁白玉壷知他是紫府也清都尾聲濕淋浸滿身香露侵毛骨擊玎璫過耳清颷響珮琚驀然的睜破雙眸了然悟尚兀自爐煙馥郁燈花恍惚不覺的月在梧桐畫闌曲一枝花雙溪間老半生溪上居一寸心間地稻粱常有慶桃李自成蹊積善之基細察其中理多管是槐根深種德三五箇平頭奴能種能耕八九歲寧馨兒學詩學禮梁州山之北春雨桑麻藹藹水之南秋風栗棗纍纍明囱別有間風致象腿爐麝煙馥郁鴈足檠蠟炬光輝兔毫盞金芽瀲灔犀皮甌玉瀣淋漓無半星俗事相羈有三般勝槩堪題護虛櫩滴溜溜破野色橋駕虹腰映踈簾翻滚滚蕩天光溪分燕尾繞危欄淡氤氲帶煙痕山抹蛾眉是誰效得人生似此非容易居移氣飬移體慈順堂前戲綵衣歡笑怡怡尾聲念之頻遇之晚區區萍水𥘉相識見而難別而易渺渺關河未有期聊寫篇詞暫相慰春前臘底江東渭圵還折梅花問消息一枝花為鳳陽諸公子門前十畝桑籬下千叢菊田頭五色瓜墻角四時蔬幾廈茅廬僅可遮風雨平生心自足我本是守青𫀆濟濟儒家人都道列畫戟潭潭相府梁州劉夢得堪銘陋室潘安仁可賦間居送流光更有優遊趣琴調妙譜棋藴良謨書藏逸典畫展名圗相知是楮先生陶泓氏之徒相知是松滋侯管城子之屬撫墨迹臨一會鍾玉習詩法吟一會李杜論衣冠講一會唐虞數年以餘形骸從此無拘束知用舍厭榮辱心與間雲共卷舒算得箇逹理通疏尾聲階除靜掃賢人路門徑常多長者車鍾鼎山林不同律鍾鼎呵是華榮分福山林呵是清間命途都分付青湛湛天公自區處一枝花隱居潮生玉馬來沙湧金鰲動水天涵上下浦淑控西東四野無窮一片波漓凍梯航萬里通蕩炎蒸青蘋風六月凄凄翻渤澥紅桃浪三春洶洶梁州近覩著扶桑野陽烏閃爍遙認著蓬萊山煙靄𬈑濛天然幽勝堪題詠柔桑藹藹秀麥芃芃丹椒簇簇碧葦叢叢閙人煙生意從容舊家風禮莭謙崇宴斯堂何時不饌雞豚居是州何代不生麟鳳觀于海何年不化魚龍歲豐廩充喜的是年年布榖催春種知用舍厭迎送睡徹東囱日影紅樂在其中尾聲幽尋不索桃源洞髙臥何須太華峰但得留心誦周孔研硃墨訓蒙寬犁鋤務農只得贍老良田二三頃一枝花玉芝春休言雨露恩不假陽和力自天能長飬無地可栽培貴質香肌長遇承平世比春花别樣竒光膩膩出落著風流清淡淡包含著旖旎梁州人都道秦㺯玉生成標格我猜是許飛瓊托化的容儀誰承望天風吹落鶯花地亟德墀無緣相識甘泉宫有句褒題謝安石多曽譽夏黃公聊得充飢向花下神是問箇真實檢春工自有箇髙低風韻似軟刺答石上猗蘭雅淡似矮婆娑月中老桂溫柔似瘦伶仃雪裏寒梅有誰認得九莖三秀真祥瑞相遇是何日得能勾分微香到酒杯不枉了玩賞忘歸尾聲既不能貯雕盤蒙錦帕擎將手掌輕憐惜也消得依畫閣近蘭堂著箇欄杆謹護持春日春風莫虛費你道是浮花浪蕊