front:
  text: 雍熙樂府卷之二十
  hash: sha256:a6128f4eb1240047f389533cdbfc979aa025ca09265dd2a47724de262f4a4cce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_020-1a}
body:
  text: 雜曲山坡裏羊嘆世身無所幹心無所患一生不到凨波岸祿休千貴休攀功名縱得皆虛幻浮生落花空過眼公也夢間私也夢間當休髙歌薺鹽貧過皮囚身膚皆參破冨如何貴如何間中自有間中樂天地一壷寬又闊東也在我西也在我繁華搬㺯豪傑陪奉一杯未盡笙歌送恰成功早無蹤昨宵一枕逰仙夢人世枉將花月寵春也是空秋也是空有錢有物無憂無慮賞心樂事休辜負百年虛七旬踈饒君更比石崇冨合眼一朝天數足金也換主銀也換主伏低伏落粧呆粧弱是非多由自家招一任他待如何天公尚有妨農過蠶怕雨寒苗怕火隂也是錯晴也是錯譁誇聰慧爭誇才藝乾坤一混清濁氣察虛實不能知時間難識魚龍輩只到禹門三月裡魚也認得龍也認得官資新授功名相就折腰為在兒孫勾便抽頭好歸休黃花恰正開時候籬下自將巾漉酒功也罷手名也罷手三閭當日一身辭世何須自若凨波際淈其泥啜其醨此心到大無縈繫若見子房和范蠡醉也笑你醒也笑你愁眉緊皺仙方可救劉伶對面親傳授滿懷憂一時愁錦封未折香先透物換不如人世有朝也媚酒暮也媚酒凨流人坐玻璃盞大採蓮學舞新曲破飲時歌醉時魔眼前多少秋毫末人世是非將就我髙也亦可低也亦可生涯雖舊衣食足勾區區自要尋生受一身憂一心愁身心常在他人後天道若能隨分守身也自由心也自由天于人樂天于人禍不知此箇心何若嘆蕭何反調唆未央宮賺韓侯過千古文書難改抹成也是他敗也是他新修田院多開門面要圗久逺兒孫佃恣專權橫鳩錢臨危不與人方便一日惡深夜貫滿天也降愆人也做冤江山如畫茅茨低凹妻蠶女織兒耕稼務桑麻捕魚蝦漁樵來訪無别話三國鼎分牛易馬興也任他亡也任他凨波慣怕唇舌休挂鶴長鳬短天生下勸漁家共樵家從今休説賢愚話得道多兮失道寡賢也在他愚也在他隂隨隂報陽隨陽報不以其道成家道枉劬勞不堅牢錢物算來皆凶兆一旦禍生福漸消人也散了財也散了須教人倦須教人冤立心不好為方便喫􅧍羶著新鮮一朝報應天公變行止不似他在先飢也怨天寒也怨天凨波時候俱教遙受少年埸上逞馳驟酒盈甌錦纒頭休令人老花殘後花退落紅人皓首花也自羞人也自羞休爭間氣休生不義終身孝弟心休退掩人非去人疑得官休仗官人勢冨而莫驕貧莫恥天也順爾人也順尓淵明圗醉陳摶貪睡此時人不解當時意志相違事難隨由他醉者由他睡今朝世態非昨日賢也任你愚也任你花開花謝燈明燈滅百年勞似莊周蝶興時節快活些明朝緑鬢添白雪石崇鄧通今謾説人也散者錢也散者堯民堪畫朱陳婚嫁柴門斜搭葫蘆架吠池蛙噪林鴉牧笛聲裡牛羊下竹籬茆舍兩三家民也種瓜官也種瓜青霄有路黃金無數勸君萬事從寬恕富之餘貴之餘枉將後代兒孫護富貴不依公道取兒也受苦孫也受苦長天炎熱水心亭榭乘涼避暑更深夜漏未絶月半斜筵前樽爼重排列放踈狂喫得金甕竭主也醉者賓也醉者膏梁供奉寰區知重浮生自覺皆無用德尊崇祿盈豐渾如一枕黃糧夢迷到老來才自懂功也是空名也是空功名為務勞力費慮半生巳被人情誤古詩讀法書摹少年惟恐清名汚算到老來乾受苦賢也是土愚也是土朱軒兩厦牙籖滿架蠧魚穿透書和畫喜恰恰笑呷呷近來無甚間牽挂一任雪霜添鬢髮間也好耍忙也好耍水亭間眺藤牀倚靠曲闌干外逰魚躍午凨飄晚雲消一畨雨過才晴了數朵芙蓉開翆沼花依舊好人年越老人活百歲踈狂一世謝安携出東山妓管絃催酒盈杯花前醒了重還醉休使心機圖甚的花也笑你酒也笑你困來髙臥客來間嗑無憂無慮隨緣過飲金波呾髙歌山腔野調誰能和僮僕莫將間事聒醒也任我醉也任我黃蜂報曉蝴蝶戀蕚􅉉前看㺯蜘蛛巧恰春朝又秋宵寒暄不管踈狂老美惡都教隨順了髙也道好低也道好常無飢餓不曽折挫浮名薄利些娘大眼觀睃腳奔波紅塵世事都參破得失從天不在我行也快活坐也快活雲埋山麓雨傾如注水田歡笑乾田怒榖才鋤麥新􅍄隂晴總是妨農處莊家看來沒分福晴也是苦隂也是苦禾田耘遍麥畦黃遍麥禾水旱難方便這村喧那村喧祈晴禱雨心無倦蒼空謗言猶未免晴也怨天隂也怨天水輪髙駕銀河斜挂廣寒宮闕堪圗畫對光華恣歡洽故人來説圑圞話無情素娥吟咏咱詩也孟撒酒也孟撒羈懷縈挂人情矯詐相逢休説妨時話路波查事交雜秋光何處堪消暇昨日夢魂歸到家田也無瓜園也無花長江東注夕陽西沒流光容易拋人去莫嗟吁任椰榆老天還有安排處蕭蕭客囱無伴侣酒也再沽琴也再撫驅馳何甚乖離忒恁凨波尤自連頭浸自沉吟莫追尋田文近日多門禁炎涼本來一寸心親也在恁踈也在恁田園荒廢箕裘凌替桃源路渺難尋覓典春衣舉螺杯酕醄醉了囫圇睡啼鳥一聲驚覺起悲也未知喜也未知山坡裏羊思情喬才心邪不來一月繡衾整曠三十夜你俏心兒別俺癡心兒呆不合將人十分熱容易得來容易捨他興過也我緣分拙􅓸波羅襪天然生下紅雲印下相思卦似藕生芽如蓮缷花怎生纒得來些娘大桞條兒比來剛半扎他不念咱咱想念他簾兒私下門兒俏呀𬒳兒裏􅥦著咱名兒罵你戀煙花不來家我眉兒淡了教誰畫何處緑楊拴繫馬他欺負咱咱想念他繡幃孤臥良宵空過甫能勾有夢還驚破病成魔淚如梭凄涼景百般樣來著末慿誰人頓開咱眉上鎖愁無奈何病無處躲山坡裏羊警戒雞鳴早去雅噪未歸幾曽得覺囫圇睡使心機昧神祗區區造下彌天罪冨貴一埸春夢裡財源沫水人泉下鬼榮華休傲貧窮休笑循環世態多顛倒恰春朝早秋宵花開花謝誰知道今歲孟春花更早花依舊好人空謾老虛名休就眉頭休皺終身更不遭機彀抱官囚為誰愁功名半𥿄難能勾爭如漆園蝶夢叟常且閉口間且袖手花逢春到人逢時到花開人旺多歡笑看英豪賞花嬌樂極悲生非人樂花正發時凨又惡花零落了人憔忰了紅塵千丈凨波一樣利名人似凨魔障恰餘杭又燉煌雲南蜀海黃茅瘴暮宿曉行一世粧利金半兩名𥿄半張塵心撇下虛名不挂種園桑棗圜茅厦笑喧譁醉麻花悶來間訪漁樵話髙臥緑隂清味雅栽三徑花種一假瓜財帛爭競田園吞併得來未必兒孫慶幹虛名捨殘生歸來笑殺彭澤令孤雲野鶴為伴等鶴飛過嶺雲行過嶺失時休懊得時休笑得失兩字循環到恰歡樂早憂焦兩般微理誰知道老儂參破逃樞要得字不好失字不惱水仙子帶過折桂令四景海棠雨過錦狼藉楊栁煙消翆整齊梨花滴露珍珠碎春深也人未歸對東凨滿目傷悲近緑囱蜂喧蝶閙臨寶鏡鸞愁鳯泣隔朱簾燕語鶯啼隔珠簾燕語鶯啼鶯嚦嚦如説凄涼燕喃喃如訴別離香魂趂飛絮攸揚薄命逐逰絲飄蕩芳心隨落日昏迷三分病即漸的消磨了玉肌一春愁堆趲下壓損了蛾眉愁和病多苦禁持靠銀床倦眼乜斜濕羅衣清淚淋漓水盤貯果水晶涼石髓和茶玉乳香碧筒注飲葡萄釀傷心也誰共賞對良宵無限恓惶藕花凨輕翻紗帳楊桞月微籠緑囱梧桐露暗滴銀床梧桐露暗滴銀床腳步兒未離南軒魂靈兒已到東墻屏間也翡翆塵蒙簟冷也琉璃失色枕空也琥珀無光誰承望生撏了連理樹枝頭鳯凰不隄防活刺了並頭蓮花底鴛鴦儘今生難捨難忘甜殢殢兩字恩情苦懨懨幾樣思量繡幃零落綵絨毬珠箔空間碧玉鈎羅衣寬褪了泥金袖懨懨也歹症候對西凨總是離愁孤鶩點白雲天外新雁過黃蘆渡口昏鴉歸紅樹墻頭昏鴉歸紅樹墻頭透踈簾涼月纎纎走空階落葉颼颼縱支琴今夜寂寞索準備經年憔忰謾咨嗟往日凨流落下金鏡臺不求配偶諒這錦香囊怎做遺留細評跋著甚來由遙受的鳳友鸞交虛名兒燕侣鶯儔鬢從別後甚蓬鬆心自愁來越懵懂腸于斷處偏疼痛更難捱寒夜永對梅花歡笑誰同黃串冷駝毛氊帳緑酒甘羊脂玉鍾青燈暗龜甲屏凨青燈暗龜甲屏凨癡著心拜月瞻星擎著淚織錦回文共何人踏雪騎驢去那答看花駐馬落誰家扳桂乘龍平安信阻藍橋三千丈凨波洶洶團圎夢隔巫山十二重雲雨濛濛問歸期兩下朦朧卦錢兒許待新春燈花兒報到殘冬水仙子帶過折桂令春閨即事病乜斜恰似醉乜斜身瘦怯那堪影瘦怯人薄劣何似情薄劣好􅊚緣成棄捨對鸞臺展轉傷嗟鶴袖兒金鬆扣鳯頭兒珠褪結想人生最苦離別想人生最苦離别業冤讎難動干戈悶根苗怎下鍬钁淹藍橋白馬波翻燒祅廟金蛇火烈暗巫山蒼狗雲遮長吁氣短吁氣咽喉裡哽噎新啼痕舊啼痕衫袖上重疊兩般兒更是愁絶更被這傾盆雨驚覺鴛鴦落花凨吹散蝴蝶二盻妓梁錦堂老先生空戀錦堂嬌滑彈子難粘鳯嘴膠劣厥丁使不透鴉青鈔把一片惜花心空費了引的人夢斷魂勞迷魂陳折了一陳琉璃井擦了幾交鶯花寨串到有千遭鶯花寨串到有千遭怎能勾熱氣兒相呵只落的冷眼兒偷瞧他如今翆繞珠圍別就了鶯儔燕侣鳯友鸞交你根前黑洞洞雲迷了楚山白茫茫水淹了藍橋恨滿歸橈泪濕征𫀆看了他有分相逢無福難消三題情並頭蓮池上錦鴛行連理樹枝間彩鳯鳴合歡花樹底青鸞寧永團圎伉儷情為知音所事皆能可意人相逢可意志誠人遇著志聰明人伴著聰明聰明人伴著聰明辦堅心共結芳盟只為你性格溫存體態娉婷我子道凨流境重生箇小卿誰承望綺羅叢再長箇鶯鶯儘自今生久逺相承惜愛你花朵兒身受用了錦片也前程四中秋萬花臺上正中秋坐對氷輪飲玉甌夜深樓閣明如晝露華清雲氣收九霄中凨力颼颼任笑語驚神鬼鬼怕松篁礙斗牛看山河襟帶中州看山河襟帶中州歲稔時豐物穰人稠手撫星河口談凨月身在瀛洲聽鳯管朱唇韻悠按鸞筝素手滑􅍄翆袖凨流玉體香浮只喫到月轉西廊日上東樓五美愛一箇煙花裊娜艷詞頭一箇豪貴絲綸經濟手他兩箇欲同心綰帶金絲扣遂結就意綢繆鸞交鳯友俏心腸堪愛堪酬他惹下相思恨我耽著凨月憂美情懷石爛難休美情懷石爛難休一氣相合兩意相投水逺山髙天長地久燕侣鶯儔一箇會施逞英雄大手一箇善梳粧粉面油頭體態溫柔模樣嬌羞千載冤家萬種凨流六贈妓張茶花千嬌百媚俏冤家眼去眉來可喜殺氷肌玉骨難描畫美人圗都是假寶叉橫雲髻堆鴉少一箇童子兒身邊立淨瓶兒手內拏恰便似見世的菩薩恰便似見世的菩薩赤緊的俊俏名兒喚做茶花再休寵栁嬌華問栁尋花路栁墻花比那丁香褪荼􅐘淡殺比那牡丹村芍藥低蹅看了茶花覷了茶花便有那魏𬗋姚黃怎如你張氏茶花鴈兒落兼得勝令知機往常時為功名惹是非到如今對山水忘名利往常時趂雞鳴赴早朝到如今近晌午猶然睡往常時秉笏立丹墀到如今把酒向東籬往常時俯仰承權貴到如今逍遙謁故知往常時狂癡險犯著笞杖徒流罪到如今便宜課會凨花雪月題自髙懸神武冠身無事心無患對凨花雪月吟有筆硯琴書伴夢境兒也清安俗勢利不相關由他傀儡棚中閙且向崑崙嵿上看雲山隔斷紅塵岸逰觀壷中天地寬也不學嚴子陵七里灘也不學薑太公磻溪岸也不學賀知章乞鑑湖也不學栁子厚逰南澗俺住雲水屋三間凨月竹千竿由他傀儡棚中閙且向崑崙嵿上看身安到大無憂患遊觀壷中天地寬三十年一夢驚財與氣消磨罄把當年花月心都變做今日山林興早是不能行那更鬢星星照菱花常嗟嘆會賔朋強打撑歌聲即漸無心聽多情頻來待怎生抖擻了元亮塵分付了蘇卿印泛西凨范蠡舟任雪滿潘安鬢乞得自由身且作太平民酒吸華峰月詩吟濼水春而今識破東華夢紅裙休歌南浦雲雲來山更佳雲