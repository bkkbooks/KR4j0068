front:
  text: 雍熈樂府卷之二十
  hash: sha256:8404a394ad039cf6eb0540e7ab5587b5ce21278975bf70a4643442ca2b305574
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_020-1a}
body:
  text: 雜曲山坡裏羊嘆世身無􅀁幹心無􅀁患一生不到凨波岸禄休千貴休攀功名縦得皆虛幻浮生落芲空過眼公也梦間私也梦間當休髙歌薺塩貧過皮囚身膚皆參破冨如何貴如何閑中自有閑中樂天地一壷寛又闊東也在我西也在我繁華搬㺯豪傑陪奉一盃未盡笙歌送恰成功早無踪昨宵一枕逰仙梦人世枉􅀅芲月寵春也是空秋也是空有錢有物無憂無慮賞心樂事休辜負百年虚七旬踈饒君更比石崇冨合眼一朝天数足金也換主銀也換主伏低伏落粧呆粧弱是非多由自家招一任他待如何天公尚有妨農過蚕怕雨寒苗怕火隂也是錯晴也是錯譁誇聡慧争誇才藝乾坤一混清濁氣察虚實不􅀎知時間難識魚龍軰只到禹門三月􅂻魚也認得龍也認得官資新授功名相就折腰為在兒孫勾便抽頭好㱕休黄芲恰正開時候籬下自􅀅巾漉酒功也罷手名也罷手三閭當日一身辭世何湏自若凨波際淈其􅅺歠其醨此心到大無縈繫若見子房和范蠡酔也咲你醒也咲你愁眉緊皱仙方可救劉伶對面親傳授滿懷憂一時愁錦封未折香先透物換不如人世有朝也媚酒暮也媚酒凨流人坐玻璃盞大採蓮學舞新曲破飲時歌酔時魔眼前多少秋毫末人世是非􅀅就我髙也亦可低也亦可生涯雖舊衣食􅁕勾區區自要㝷生受一身憂一心愁身心常在他人後天道若􅀎随分守身也自由心也自由天扵人樂天扵人禍不知此箇心何若嘆蕭何反調唆未央宮賺韓侯過千古文書難改抹成也是他敗也是他新修田院多開門面要圗乆逺兒孫佃恣專權横鳩錢臨危不與人方便一日􅁖􅀷夜貫滿天也降􅄽人也做冤江山如畫茅茨低凹妻蚕女織兒耕稼務桒麻捕魚蝦漁樵来訪無别話三􅀦􅂦分牛易馬興也任他亡也任他凨波慣怕唇舌休掛鶴長鳬短天生下勸漁家共樵家􅀙今休説賢愚話得道多􅀆失道寡賢也在他愚也在他隂随隂報陽随陽報不以其道成家道枉劬勞不堅牢錢物􅄸来皆凶兆一旦禍生福漸消人也散了財也散了湏教人倦湏教人冤立心不好為方便喫􅧍羶着新鮮一朝報應天公變行止不似他在先飢也怨天寒也怨天凨波時􅀱俱敎遥受少年􅂣上逞馳驟酒盈甌錦纒頭休令人老芲殘後芲退落紅人皓首芲也自羞人也自羞休争閑􅂔休生不義終身孝弟心休退掩人非去人疑得官休仗官人􅀔冨而莫驕貧莫恥天也順尔人也順尓淵明圗酔陳摶貪睡此時人不觧當時意志相違事難随由他酔者由他睡今朝世態非昨日賢也任你愚也任你芲開芲謝燈明燈㓕百年勞似莊周蝶興時節快活些明朝緑鬂添白雪石崇鄧通今謾説人也散者錢也散者堯民堪画朱陳婚嫁柴門斜搭葫蘆架吠池蛙噪林鵶牧􅅇聲􅂻牛羊下竹籬茆舍兩三家民也種􅀲官也種􅀲青霄有路黄金無数勸君萬事􅀙寛恕富之餘貴之餘枉􅀅後代兒孫護富貴不依公道􅂑兒也受苦孫也受苦長天炎􅉯水心亭榭乗凉避暑更深夜漏未絶月半斜筵前樽爼重排列放踈狂喫得金甕竭主也酔者賓也酔者膏梁供奉寰區知重浮生自覺皆無用徳尊崇禄盈豊渾如一枕黄糧梦迷到老来􅂊自懂功也是空名也是空功名為務勞力費慮半生巳被人情悞古詩讀法書摹少年惟恐清名汚􅄸到老来乾受苦賢也是土愚也是土朱軒兩厦牙籖滿架蠧魚穿透書和画喜恰恰咲呷呷近来無甚閑牽掛一任雪霜添鬂髪閑也好耍􅋉也好耍水亭閑眺藤牀􅀝靠曲闌干外逰魚躍午凨飄晚雲消一畨雨過􅂊晴了数朶芙蓉開翆沼芲依舊好人年越老人活百􅀊踈狂一世謝安携出東山妓管絃催酒盈杯芲前醒了重還酔休使心機圖甚的芲也咲你酒也咲你困来髙臥客来閑嗑無憂無慮随縁過飲金波呾髙歌山腔野調誰􅀎和僮僕莫􅀅閑事聒醒也任我酔也任我黄蜂報曉蝴蝶戀蕚􅉉前㸔㺯蜘蛛巧恰春朝又秋宵寒暄不管踈狂老羙􅁖都教随順了髙也道好低也道好常無飢餓不曽折挫浮名薄利些娘大眼觀睃脚奔波紅塵世事都叅破得失􅀙天不在我行也快活坐也快活雲埋山麓雨傾如注水田歡咲乾田怒榖􅂊鋤麥新􅍄隂晴総是妨農處庄家㸔来没分福晴也是苦隂也是苦禾田耘遍麥畦黄遍麥禾水旱難方便這村喧那村喧祈晴禱雨心無倦蒼空謗言猶未免晴也怨天隂也怨天水輪髙駕銀河斜掛廣寒宮􅇅堪圗画對光華恣歡洽故人来説圑圞話無情素娥吟咏咱詩也孟撒酒也孟撒覊懷縈掛人情矯詐相逢休説妨時話路波查事交雜秋光何處堪消暇昨日梦魂㱕到家田也無􅀲園也無芲長江東注夕陽西沒流光容易抛人去莫嗟吁任椰榆老天還有安排處蕭蕭客囱無伴侣酒也􅂯沽琴也􅂯撫驅馳何甚乖􅄐忒恁凨波􅀹自連頭浸自沉吟莫追㝷田文近日多門禁炎凉本来一寸心親也在恁踈也在恁田園荒廢箕裘凌替桃源路渺難㝷覓典春衣舉螺盃酕醄酔了囫圇睡啼鳥一聲驚覺起悲也未知喜也未知山坡裏羊思情喬才心邪不来一月綉衾整曠三十夜你俏心兒別俺痴心兒呆不合􅀅人十分􅉯容易得来容易捨他興過也我縁分拙􅓸波羅襪天然生下紅雲印下相思卦似藕生芽如蓮缷芲怎生纒得来些娘大桞條兒比来剛半扎他不念咱咱想念他簾兒私下門兒俏呀􅀍兒裏􅥦着咱名兒罵你戀􅃄芲不来家我眉兒淡了教誰画何處緑楊拴繫馬他欺負咱咱想念他綉幃􅀌臥良宵空過甫􅀎勾有梦還驚破病成魔淚如梭凄凉景百般様来着末慿誰人頓開咱眉上鎖愁無奈何病無處躲山坡裏羊警戒雞鳴早去雅噪未㱕㡬曽得覺囫圇睡使心機昧神祗區區造下弥天罪冨貴一􅂣春梦􅂻財源沬水人泉下􅀑榮華休傲貧窮休咲循環世態多顛倒恰春朝早秋宵芲開芲謝誰知道今􅀊孟春芲更早芲依舊好人空謾老虚名休就眉頭休皱終身更不遭機彀􅈽官囚為誰愁功名半􅁓難􅀎勾争如漆園蝶梦􅅱常且閉口閑且䄂手芲逢春到人逢時到芲開人旺多歡􅀏㸔英豪賞芲嬌樂極悲生非人樂芲正發時凨又􅁖芲零落了人憔忰了紅塵千丈凨波一様利名人似凨魔障恰餘杭又燉煌雲南蜀海黄茅瘴暮宿曉行一世粧利金半兩名􅁓半張塵心撇下虚名不掛種園桒棗圜茅厦咲喧嘩酔麻芲悶来閑訪漁樵話髙臥緑隂清味雅栽三徑芲種一叚􅀲財帛争競田園吞併得来未必兒孫慶幹虚名捨殘生㱕来咲殺彭澤令􅀌雲野鶴為伴等鶴飛過嶺雲行過嶺失時休懊得時休咲得失兩字循環到恰歡樂早憂焦兩般微理誰知道老儂叅破逃樞要得字不好失字不惱水仙子帶過折桂令四景海棠雨過錦狼藉楊栁烟消翆整齊梨芲滴露珍珠砕春深也人未㱕對東凨滿目傷悲近緑囱蜂喧蝶閙臨寳鏡鸞愁鳯泣隔朱簾燕語鶯啼隔珠簾燕語鶯啼鶯嚦嚦如説凄凉燕喃喃如訴別􅄐香魂趂飛絮攸􅀭薄命逐逰絲飄蕩芳心随落日昏迷三分病即漸的消磨了玉肌一春愁堆䟎下壓損了蛾眉愁和病多苦禁持靠銀床倦眼乜斜濕羅衣清涙淋漓水盤貯果水晶凉石髄和茶玉乳香碧筒注飲葡萄釀傷心也誰共賞對良宵無限恓惶藕芲凨輕翻紗帳楊桞月微籠緑囱梧桐露暗滴銀床梧桐露暗滴銀床脚步兒未􅄐南軒魂靈兒已到東墻屏閑也翡翆塵蒙簟冷也琉璃失色枕空也琥珀無光誰承望生撏了連理􅀣枝頭鳯凰不隄防活刺了並頭蓮芲底鴛鴦儘今生難捨難忘甜殢殢兩字恩情苦懨懨㡬様思量綉幃零落綵絨毬珠箔空閑碧玉鈎羅衣寛褪了􅅺金䄂懨懨也歹症􅀱對西凨總是􅄐愁􅀌鶩􅀧白雲天外新雁過黄蘆渡口昏鴉㱕紅􅀣墻頭昏鴉㱕紅􅀣墻頭透踈簾凉月纎纎走空堦落葉颼颼縦支琴今夜􅄫寞索准俻經年憔忰謾咨嗟往日凨流落下金鏡䑓不求配偶諒這錦香嚢怎做遺留細評䟦着甚来由遥受的鳳友鸞交虚名兒燕侣鶯儔鬂􅀙別後甚蓬鬆心自愁来越懵懂腸扵㫁處偏疼痛更難捱寒夜永對梅芲歡咲誰同黄串冷駝毛氊帳緑酒甘羊脂玉鍾青燈暗􅀛甲屏凨青燈暗􅀛甲屏凨痴着心拜月瞻星擎着淚織錦廻文共何人踏雪􅀐驢去那荅㸔芲駐馬落誰家扳桂乗龍平安信阻藍橋三千丈凨波洶洶團圎梦隔巫山十二重雲雨濛濛問㱕期兩下朦朧卦錢兒許待新春燈芲兒報到殘冬水仙子帶過折桂令春閨即事病乜斜恰似酔乜斜身瘦怯那堪影瘦怯人薄劣何似情薄劣好􅊚縁成棄捨對鸞䑓展轉傷嗟鶴䄂兒金鬆扣鳯頭兒珠褪結想人生最苦􅄐別想人生最苦􅄐别業􅁈讎難動干戈悶根苗怎下鍬钁渰藍橋白馬波翻燒祅廟金蛇火烈暗巫山蒼狗雲􅃒長吁氣短吁􅂔􅍋㗋􅂻哽噎新啼痕舊啼痕衫䄂上重疊兩般兒更是愁絶更被這傾盆雨驚覺鴛鴦落芲凨吹散蝴蝶二盻妓梁錦堂老先生空戀錦堂嬌滑弹子難粘鳯嘴膠劣厥丁使不透鴉青鈔把一片惜芲心空費了引的人梦㫁魂勞迷魂陣折了一陣琉璃井擦了㡬交鶯芲寨串到有千遭鶯芲寨串到有千遭怎􅀎勾􅉯􅂔兒相呵只落的冷眼兒偷瞧他如今翆遶珠圍別就了鶯儔燕侣鳯友鸞交你根前黒洞洞雲迷了楚山白茫茫水渰了藍橋恨滿㱕橈泪濕征􅂁㸔了他有分相逢無福難消三題情並頭蓮池上錦鴛行連理􅀣枝間彩鳯鳴合歡芲樹底青鸞甯永􅇛圎伉儷情為知音􅀁事皆􅀎可意人相逢可意志誠人遇着志聡明人伴着聡明聡明人伴着聡明辦堅心共結芳盟只為你性格温存軆態娉婷我子道凨流境重生箇小卿誰承望綺羅叢再長箇鶯鶯儘自今生乆逺相承惜愛你芲朶兒身受用了錦片也前程四中秋萬芲䑓上正中秋坐對氷輪飲玉甌夜深楼閤明如晝露華清雲􅂔収九霄中凨力颼颼任咲語驚神􅀑􅀑怕松篁碍斗牛㸔山河襟帶中州㸔山河􅁭帶中州􅀊稔時豊物穰人稠手撫星河口談凨月身在瀛洲􅃪鳯管朱唇韵悠按鸞筝素手滑􅍄翆䄂凨流玉軆香浮只喫到月轉西廊日上東楼五羙愛一箇􅃄芲嬝娜艶詞頭一箇豪貴􅁝綸經濟手他兩箇欲同心綰帶金絲扣遂結就意綢繆鸞交鳯友俏心腸堪愛堪酬他惹下相思恨我躭着凨月憂羙情懷石爛難休羙情懐石爛難休一􅂔相合兩意相投水逺山髙天長地乆燕侣鶯儔一箇㑹施逞英雄大手一箇善梳粧粉面油頭軆態温柔模様嬌羞千載冤家萬種凨流六贈妓張茶芲千嬌百媚俏冤家眼去眉来可喜殺氷肌玉骨難描画羙人圗都是假寳􅁫横雲髻堆鴉少一箇童子兒身􅁁立浄瓶兒手内拏恰便似見世的菩薩恰便似見世的菩薩赤緊的俊俏名兒喚做茶芲􅂯休寵栁嬌華問栁㝷芲路栁墻芲比那丁香褪荼􅐘淡殺比那牡丹村芍藥低蹅㸔了茶芲覷了茶芲便有那魏􅂵姚黄怎如你張氏茶芲鴈兒落兼得勝令知機往常時為功名惹是非到如今對山水忘名利往常時趂雞鳴赴早朝到如今近晌午猶然睡往常時秉笏立丹墀到如今把酒向東籬往常時俯仰承權貴到如今逍遥謁故知往常時狂痴險犯着笞杖徒流罪到如今便宜課㑹凨芲雪月題自髙懸神武􅃣身無事心無患對凨芲雪月吟有笔硯琴書伴梦境児也清安俗􅀔利不相関由他傀儡棚中閙且向崑崙嵿上㸔雲山隔斷紅塵岸逰觀壷中天地寛也不學嚴子􅁜七里灘也不學姜太公磻溪岸也不學賀知章乞鑑湖也不學栁子厚逰南澗俺住雲水屋三間凨月竹千竿由他傀儡棚中閙且向崑崙嵿上㸔身安到大無憂患㳺觀壷中天地寛三十年一梦驚財與􅂔消磨罄把當年芲月心都變做今日山林興早是不􅀎行那更鬂星星照菱芲常嗟嘆㑹賔朋强打撑歌声即漸無心􅃪多情頻来待怎生抖擞了元亮塵分付了蘓卿印泛西凨范蠡舟任雪滿潘安鬂乞得自由身且作太平民酒吸華峰月詩吟濼水春而今識破東華梦紅裙休歌南浦雲雲来山更佳雲