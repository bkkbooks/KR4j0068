裡開時和淚開他那裡修時和淚修多管是筆尖兒未寫淚先流寄來書淚點兒猶自有我這裡新痕把舊痕湮透正是那一重愁翻做了兩重愁么當日向西廂月底潛今日在瓊林宴上􅷸誰承望跳東墻腳步兒占了鰲頭惜花心飬成折桂手脂粉叢裡包藏著錦繡從今後晚粧樓改做志公樓梧葉兒這汗衫兒他若是和衣臥便是和我一處宿但粘著些皮肉不信不想我溫柔常不離了前後守著他左右緊緊的繫在心頭這襪兒呵拘管他休教胡行亂走后庭花當日箇五言詩緊趂逐後來因七絃琴成配偶他怎肯冷落了詩中意我子怕生踈了絃上手我須索有箇緣由他如今功名成就則怕他撇人在腦背後湘江兩岸秋當日娥皇因虞舜愁今日鶯鶯為君瑞憂這九疑山下竹共香羅衫袖口青哥兒呀都一般啼痕啼痕湮透似這等淚斑淚斑宛然依舊萬古情緣一樣愁涕淚澆流怨慕難收對學士丁寧説緣由是必休忘舊醋葫蘆你逐朝野店上宿休將包袱兒做枕頭又子怕油脂膩展汚了恐難酬倘或水浸雨濕休便扭我則怕乾時節尉不開褶皺一樁樁一件件細收留金菊香書封鴈足此時修愔繫人心早晚休長安望來天際頭倚遍西樓人不見水空流浪來裡煞他那裡為我愁我這裡因他瘦臨行時啜賺人巧舌頭指歸期約定九月九不覺的過了小春時候到如今悔教夫壻覔封矦集賢賔曲江池我當𥘉占排場奪第一串了些花胡洞錦屏圍我也曾雨雲鄉調猱釀狚我也曽凨月所暗約偷期子為我賞芳春夢撒了憭丁因此上向花營納了降旗想著那老虔婆狠毒心忒下的小弟子又會虛脾到如今寸腸千萬結長嘆兩三回逍遙樂想當𥘉別時容易到如今見後艱難只除是相逢夢裡送的我戰欽欽忍冷耽飢知他在何處銀筝間玉笛抵多少步步相隨俺如今只落的半頭斜炕一箇歪瓢兩片破席上京馬也是我一時間錯𬒳那鬼魂迷這是俺贍表子平生落的有見識的哥哥每知了就裡似這等切切悲悲從今後有金銀多儧下些買糧食梧葉兒這雪賽桞絮漫天墜似蝴蝶撲地飛昏慘慘黑雲垂玉琢就崇山嶺粉填平深澗溪富漢每笑微微單注著俺窮子弟年災月值醋葫蘆剪鵝毛雪正飛踅羊角凨又悲好教俺説之難思之苦感之深耽之久冷清清難捱腹中飢這些時頭不梳臉不洗牙不刷口不漱黃懨懨的改了面皮空教人捶著胸攧著腳揉著腮撧著耳呌天呼地也子是為貪花因好酒愛錢財爭間氣死臨侵迤逗的俺怨他誰么酒呵助豪吟詩百篇放踈狂醉一席這酒泛玻璃斟琥珀小槽邊深巷裡碧澄澄香馥馥的潑春醅你道是釣詩鈎掃愁帚旋添綿增和氣暖融融的紅了面皮酌葡萄銀甕裡飲羊羔錦帳底笑談一會下場頭只落的臥糟丘喝酵水這的是得便宜翻做了落便宜么色呵歌玉樹彩雲低舞霓裳翆袖垂只因他栁眉踈星眼秀點櫻唇迎杏臉美甘甘嬌滴滴好東西更有等贍花街踏陳馬錦纏頭金買笑喜孜孜的成了配匹受用些𬒳兒中枕兒上臉兒偎腿兒壓雨雲歡會下場頭只落得守孤燈捱長夜這的是得便宜翻做了落便宜么財呵聚青蚨百萬堆列珊瑚十數圍端的是物之魁人之膽失之貧得之富最通神的好相識你便待販南商為北客慣經營能集儧把金銀直堆到北斗齊你便賽石崇過郿塢腰纏著十萬貫敢誇那豪貴下場頭只落得披羊皮蓋藁薦這的是得便宜翻做了落便宜么氣呵逞粗豪猛力威志沖霄氣蓋世勢昻昻雄糾糾吐紅霓扶天漢仰觀星斗恨雲低你子待伴逰俠同惡少學會拳打會棒爭頭鼓腦的尋對敵你待似北宫􅉳不膚撓不目逃挫一毫若鞭撻的浩然之氣下場頭只落得呌爹爹呼妳妳這的是得便宜翻做了落便宜后庭花老尊君發怒威若嚴霜將草摧險些兒一命臨泉世閃的我孤身三不歸不似你啜人賊你要我再逰斯地我便似落花枝不戀蕊醃韭菜怎入畦栽不成野薔薇護不住出墻葵再難收潑下的水青哥兒送的我似凨前凨前葉墜好恩情看承看承容易我欲待罵幾句棄舊迎新浪甚的兜的上我心裏想起俺舊日美滿夫妻事事相依步步相隨素手相携丹臉相偎共枕而栖同卓而食錦帳羅幃繡幕香閨巧畫蛾眉揀口而喫換套穿衣你若還有些兒病疾愁的俺似醉如癡么贖藥求醫禱告神祗更𬒳你薄嫫禁持撅丁牙戲相識輕易姨夫妬嫉若瞞兒有些胡為你氤的怒起床兒前超祭燈兒下跪膝投至得歡歡喜喜受多少切切悲悲有時節應官身直盻到黃昏日沉西説來的都做了牙疼誓醋葫蘆乍相逢如夢裡誰承望得重會這的是有真情誰怕隔年期雖不似孟母三移將賢聖擬子要我用心學藝我將那三場的文字慎攻習浪來裏煞深謝你俊嬌姿眷戀心多感你可憎才忠厚德你要我霎時間身到鳯凰池你要我對金鑾答策時才似水你要我折蟾宮一枝丹桂那其間跳龍門奪得箇狀元回集賢賔喬斷鬼挂秋空半彎斜月影雲氣濕露華清子聽的嚮踈刺階前落葉遙望著昏此藍囱內孤燈恰隨著旋凨兒走遍了後巷前街又𬒳那惡犬兒驚入我古廟間庭猛見箇碑亭似大漢唬的我打了箇意挣我子見將髭鬚把鳯目圓睁正面上紅𫀆懸玉帶傍壁廂赤兔挂鑾鈴上京馬我這裡躬身施禮告神明叩首在階前側耳聽却不到報應尤疾靈聖境怎生的悄悄冥冥却原來關菩薩也是木雕成梧葉兒我恰才七林林來中院可察察到外􅈦悄促促入的門丞猛見他惡狠狠髙聲呌我這裡靜巉巉側耳聽不由我可丕丕早心驚原來是五逆子十分太逞醋葫蘆見他一會家軟厮禁一會家硬厮挺氣的他白頭老母淚盈盈你便是傍人見了也怒不平氣填住咽頸拶著我這瘦拳頭待打那賴人精么我向那牀兒前躡足行囱兒下潛著影忽明忽暗㺯著孤燈我這裡颼颼的哨著他才自醒到罵做亡魂夭命他那裡丕丕的連噀了兩三聲金菊香我便是去年間