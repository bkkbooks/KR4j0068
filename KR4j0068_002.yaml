道是自古雲林逺市朝因此上跳出風濤真乃是南山秋色兩相髙非髙傲明知道浮世不堅牢么篇他雖不在長生路上叅玄妙也能勾樂樂醄醄明月歌清風操與巢由同調誰待要束帶立于朝二煞這枕孕隂陽滋雨露發天機叱巨靈髙從太華峯頭琢這枕藴風電含斗曜遣飛廉驅象㒺深向東瀛海底撈這枕滑膩如珊瑚清新如琥珀古淡如鴛鴦温潤如瓊瑶抱着呵骨清毛爽靠着呵心曠神怡枕着呵夢㫁魂勞但黒甜一覺知他是㡬千畨紅日上花稍一煞入羅浮棲野店對寒梅偎素質參横月落啼青鳥盻陽䑓瞻椘岫惹嬌雲霑嫩雨暮約朝期望翆翹賦甘泉吞鳳成章釣渭濱非熊恊兆遶南柯逐蟻穿槐採荒郊得鹿蒙蕉悶懨懨懐中失筆磣磕磕腹内生松光輝輝梁上懸刀都是些神魂顛倒只落的干生受枉劬勞煞尾你伴着半囱花影鶯聲俏我趂着萬里風頭鶴背髙我向東華上九霄你到南浮走一邅折桂攀蟾姓字標入省登䑓意氣髙曳玉拖金享重爵耀武揚威靜邉閙画閣蘭堂飽宴樂鳳枕鴛幃配艶嬌日月如流不可招富貴榮華不能保投至得五十載其間再撞着少不的緑鬂朱顔鏡中老端正好月下吹簫訴别攴楞的斷了冰絃擊玎的分開鸞鏡撲鼕的井墜銀瓶滴溜的半囱明月梧桐影兀的不又感起心頭病滚綉毬毎日家愁沒亂心不寧睡不着夢又驚乍離别怎捱那凄凉光景想多才必定飄零雖然他無定凖難道他無志誠既無情呵可怎生頻稍書把咱来欽敬既有情呵可怎生過三秋不見囬程我這里懨懨瘦損消磨了這悶他那里緊緊相纒教我怎不動情這些時魚鴈無慿倘秀才毎夜家愁悶到三更四更長吁道千聲萬聲似這般枕冷燈昏好着我睡不成一箇冷落在臨川縣一箇寂寞在豫章城他兩箇一般病症滚綉毬染霜毫濕墨濃端溪硯秋水傾拂花箋巧疊成箇方勝不由人雨淚盈盈我比那題橋的無定凖駕車的少信行兩般児不當不正𥿄和筆包蔵着兩字關情展開𥿄呵怎禁那目邉點水淹難盡我援起筆恰便似門裡挑心寫不成将斑管来髙擎賽鴻秋行時思坐時想閑時論怕人知嗔人講嫌人問圖他些恬愛他些俏貪他些俊因此上躭着驚受着怕懐揣着悶風流人可增可意堪人敬怕不我口児里强身子児撦心児里順脫布衫這簫吹起来閑悶閑縈引的人来無緒無情再誰敢道凭䦨倚樓再誰敢道放懐遣興小梁州這簫他引鳳勾鸞感起舊情又不比夜月聞箏則俺這憂愁哀怨不堪聴是一曲陽關令吹徹斷腸聲么篇朣朧皓月如懸鏡入簾櫳照得傷情我愁聞這角韻頻越感起心頭病則我這影児孤另因此上嫌殺月児明端正好夜将闌人初靜悶懨懨獨歩閑行又無箇使數的把咱相将領羅韈窄雙尖並滚綉毬這其間天色晴月正明並無那片雲遮暎我将這香盒児手内髙擎我這里燒好香稱着小名禱告了四方神聖負心的少不的落塹投坑題起那小名児怎不着我心頭想行呪罵雙眸淚點傾不由人感嘆傷情倘秀才聞画角悠悠數聲聴更鼔鼕鼕的二更歸寝室連忙不暫停玎璫響玉鈎鳴我這里慢行滚綉毬又恐怕老毋聴我則索躡足行欵欵的将綉房門掩暎怎禁那銀䑓上燈熖熒熒懶将那針指拈綉作工我将這碎生活連忙打併急收拾手似撈菱黒油架上衣服搭紅漆粧盒釵釧盛斜倚定幃屏脫布衫不由人雨淚盈盈月児照房内囱櫺寳爐中焚燒篆餅風児吹壁間圖幀小梁州半擁鮫綃眼漸明端的是好夢難成垂床倒枕不安寧添愁興凉夜對寒燈么篇㝷思半晌空傒倖想起来一陣心疼則願的成了配偶婚姻定哎你箇喬才薄倖忒俊俏忒聰明端正好蘇卿題恨不覩事拆鸞凰軟兀刺分鶯燕茶船上暗接了絲鞭浪花中一葉扁舟逺望不見芙蓉面滚綉毬想呵想俺那無主意的人恨呵恨他那有勢力的錢𬒳㡬文潑銅錢将栁青来買轉莫不我只有分寡宿孤眠這其間過金山古寺前到潯陽江岸邉把九江水品茶嚐遍他㡬曾慣掃雪烹煎他安排着楦肚腸鳳髄酬歌興我准備着調琴瑟鸞膠續㫁絃再相逢甚日何年倘秀才書寫下情詞數聮更叙着寒温半篇揀一張整整齊齊碧玉箋将心事付婵姢百般的無一箇順便滚綉毬往常時玉樓前巢翡翆綉衾棲交􅖪鴛也曾遂少年心願翠紅鄉非我十全他則㑹風月情花栁筵㡬曾經這般水面暗送了茶引三千把一箇䴡春園生扭做相思海金斗郡翻為離恨天就裏難言倘秀才再不見嬌滴滴人如玉仙星靨靨花攅翆鈿再不見桃花扇影偏我往常尊席上小樓前将吹弹敷演呆骨朶梨花零落深沉院冷清清閑耍鞦韆誰想他信杳音乖閃的我縁薄分淺𬒳這倒城計䖍婆騙誰與這無勢力的人方便他管甚麽有情惜有情問甚麽解元不觧元尾聲新愁不共芭蕉展舊恨難将栁線穿曾記臨行甚所言恩愛翻成生死冤赤緊的冤家緊厮纒有一日宴罷瓊林作状元除得臨川做知縣恁時節蘇氏方知姓名顯端正好恰移得牡丹叢早惹下花胡洞載着這滿船児和氣春風我向那酒排柵一枕南柯夢勾引了嬌鸞鳳滚綉毬我子見半空中山色濃一江風波浪湧兩岸邉青滲滲緑楊隂重滿晴灘暖融融鷗素鴛紅我這里眼巴巴望着逺汀困騰騰靠着短篷專䓁那惜花人将俺這牡丹陪奉知他那逰春的甚日相逢我這里江心舉棹穿雲影抵多少苑内㝷芳入錦叢好教人心緒忡忡倘秀才我恰纔載花船来到這菰蒲岸東見一箇龎眉引定箇風流的女童他道是勾引春光泛落紅他道是有来㝷的呵只来在蓬島畔相㑹向大羅中知他是我痴呆耶你懵懂呆骨朶你道我小生涯只㑹将花種你如何倚翆偎紅我子怕老了你芳春躭閣了業種你道他牡丹花無名草我咲你樗散材成何用你既是說天香有甚罕却怎的思國色来問蹤醉太平嘱付你夀春的老翁夙契俺仙風我将這船開在當溜說心宗子這部悟真篇是道統如斯鍜煉真鉛汞如斯爐鼎勤修用如斯温養見吾功這一句有神人護擁脫布衫你看他占天香國色春工有沉魚落鴈芳容一團児和氣暖風百般嬌錦鴛丹鳳三轉小梁州休戀那斗帳春風翆𬒳重撇罷了酒釅花濃打疊起陽䑓雲雨杳無蹤眼前是蓬莱洞一霎児便相逢能将這青蛇百煉的常明瑩響錚錚利刄鋼鋒降得魔能揮用子将那真鉛真汞結成了一粒児寳珠紅金丹熟也神光迸氣冲霄伏虎降龍火候匀靈胎動萬萬卷仙經佛頌不離了此門中尾聲我這里掛一㠶雲影天風送看兩岸芳洲曙色瞳遥望仙源一派通回首仙凢逈不同若見俺仙家那受用火棗交梨味正濃沆瀣瓊漿滿玉鍾萬本靈芝五粒松千載蟠桃養玉容翠栢黄精飯恰㫪白鹿玄鶴左右從緑水青山瑞靄籠瑶草竒花散翆紅金碧樓䑓圖画中貝闕珠宫香霧濛五色雲車駕六龍萬里江山馭八􅍡閑伴香山九老朋悶喚啇山四皓翁長嘯清秋碧海東八表翺翔跨大鵬位列仙班品級崇抵多少塵世逰仙一塲夢爭似俺不老長生萬年永端正好曉珊珊琪樹蕩靈風晚濛濛輦道迷香霧花撲撲錦乾坤望眼糢糊曲盤盤五城十二樓前歩逺騰騰似入蓬莱路滚綉毬紅冉冉緑依依花籠隂暎玉除清淺淺響濺濺水流香出翆渠明朗朗墨浸浸八龍篆太霞深處寛綽綽靜巉巉遶雕䦨依翆檻展轉盤紆滑擦擦細𥻘𥻘布金沙雲堦甃珷玞輕颭颭瑯瑯隔琳窓霞綃響珮琚薄設設靜匀匀蒙画欄護銀屏水涵雲母齊臻臻滴溜溜掛珠箔捲綉簾鈎搭珊瑚香靄靄煖溶溶玉樹縹渺迷青瑣氣森森光閃閃金屋稜層絢碧虚真乃是人間天上全殊倘秀才蕭爽似瀛海東扶桒奥區廓落似閬苑西蟠桃聖圃一片天光浸玉壷閣門珠䍡􅝹複道錦氍毹上青華洞府脫布衫丹青繪絳闕清都奎星燦寳檢靈書龍虎衛飛天象符風霆護太玄瓊籙醉太平以琴書自娱與道徳為徒孔情周思乃菑畬擺列着牙籖玉軸上青㝠借嫦娥八竅月中兎採神芝倩麻姑七寳山前鹿訪丹丘賃張公千歲杖頭驢樂逍遥分福尾聲近北軒竹摇烟毿毿鳳展冲霄羽對南樓松掛月矯矯龍㗸照乗珠綽約仙君蒞廣居玄黙無為道味腴一寸心存太古拘萬里神逰廣漢墟蕚緑飛瓊時寄語赤鯉青鸞頻報覆道滄海碧雲拱望舒恁時節鶴馭雲軿降王毋端正好栁輕柔花嬌媚春雲淡日色輝輝曉来枝上鶯聲細似喚起逰春意滚綉毬栁隂中駿馬嘶花隂外好鳥啼看蜂蝶採花成對巧丹青粧點屏圍這壁廂令鼓催那壁廂妙舞宜採花枝玉纎相逓戯鞦韆画板沾泥髙張翆盖嬌紅粉慣走青􅍡俊緑衣堪賞堪題倘秀才牡丹亭嬌容膩體芍藥圃濃香艶蕋玉蕋山茶間𬗋薇素珍珠明含咲紅錦𬒳暎酴醿海棠花似烟霞照水脫布衫一處處仕女逰嬉一攅攅酔客樽罍一簇簇笙歌韻羙一歩歩管絃聲沸小梁州沽酒樓前人聚集掩暎踈籬桃花似錦栁依依蒸和氣賽閬苑勝瑶池么江南自古繁華地勝追逰儘醉方歸波動處緑鴨浮沙煖處紅鴛睡風流佳致省可里杜䳌啼尾聲逰春不覺金烏墜乗興還随玉兎回倒玉頽山醉似泥相賞休違莫負芳菲看了這萬紫千紅端的是畫圖裏端正好集曲名我子見粉蝶児聚芳叢黄鶯児遷髙栁慶東原景物悠悠我到這萬花䑓上閑行走迅指般絳都春光又滚綉毬我子見捲珠簾掛玉鈎控金猊滚綉毬殿前歡把碧玉簫齊奏子聴的攪箏琶慢撥輕搊他将那風流體舞袖垂喜人心曲調謳催花樂鼓喧晴晝酔春風花栁盈眸常子是感皇恩享千年福大徳歌傳萬載秋端的是羙景堪酬倘秀才我這里踏莎行到垂楊渡頭見㡬箇凭䦨人在桃花洞口問你箇酔娘子因何向苑内逰他道是穿芳􅏙将蒙童児覔撲蝴蝶把耍孩児逐他将那紅綉鞋欵兠滚綉毬你看那黄薔薇葉漸稠紅芍藥花未有小桃紅臙脂恰透猛聴得賣花聲遥隔着紅杏墻頭你道是迎仙客向栁外樓賞花時正沽羙酒直盻到牡丹春過了這禁烟時候聴你那大安樂唱徹梁州緑囱前金蕉葉煖春雲淡花枝上玉翼蝉輕曉霧收仙苑清幽倘秀才子你箇天仙子将㘽培問候休恠俺憨郭郎叨叨絮口他不比石竹子山丹花山石榴他是箇慶豐年誇䴡景逍遥樂勝追逰他是箇四季花領袖滚綉毬這牡丹綵樓春飲興酬恰便似翆盤秋舞態羞他到那喜春来玉嬌枝把韶光泄漏㘽培在梧葉児中秋他相伴着金菊香共登髙上小樓常記着豆葉黄去年時候那其間酔髙歌滿泛金甌移根呵青山口一半児添黄壌澆灌呵新水令三畨人引碧流花盛在中州倘秀才他與那古鮑老羞臨皓首他與那咲和尚參辰夘酉他的是秃厮児斜簮在四換頭他與那採茶歌難共賞他與那醜奴兒不相投他與那絡絲娘難同配偶滚綉毬喜的是酔太平金盞児酬愛的是栁青娘将金縷謳樂的是神曲纒齊天樂奏伴着的憶王孫寳馬追逰想當日好觀音在南海洲靜瓶光裏挿枝栁五供養呵牡丹花也不曾落後便将着一錠銀也難覔難求恰便似謁金門貴客丰標羙端正好佳人體態柔歩歩嬌羞叨叨令看了你念奴嬌将一箇翆裙腰結束的腰肢瘦虞羙人将一箇紅衫児雙軃下泥金袖好姐姐舞一回臉児紅汗漬得香腮透催拍子唱一曲六么序越顯得聲音溜兀的不好事近也麽哥兀的是快活年也麽哥又𬒳你這六娘子十棒鼓攛㫁的呵聲驟餘音這牡丹錦上花新時令嫩蕋紅香剖西河栁撥不㫁長條翆帶柔到明日探春令看花園苑逰俺向聖藥王庭闈慶賞酬寳鼎現香濃瑞靄浮女冠子相陪飲巨甌傾盃樂筵前羙女謳只願得千秋歲萬年歡百事投直宴到更漏子迢迢夜景幽穿囱月斜窺翡翆樓沉酔東風未肯休直宴到燭影揺紅那時候低簌下蘇幕遮重重鳳幃裏宿雍熈樂府卷之二終
