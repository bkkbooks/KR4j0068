下鳯凰􅀅翎毛生扯北収江南呀你敢在那碧桃芲下􅀅鳯毛扯人生最苦是離別山長水逺路途賖何年是徹響璫璫菱鏡碎玉簮折漿水令響璫璫菱花鏡砕攧支楞楞瑶琴絃㫁絶革攴支同心綰帶扯擊玎璫寳簮兒㫁折採蓮人偏把並頭折比目魚就池中冷水燒􅀬連枝􅀣生砍折打撈起御水流紅葉藍橋下翻滚滚波浪捲雪祅神廟熖騰騰火走金蛇尾饒君使盡機謀設止不住負心薄劣夢兒􅂻若見他俺與他分説夜行舡明皇寵楊妃一片行雲天上来捧入栁腰芲態料想東凨精神近蒙寵愛印頰臂􅈍香獨在掛玉鈎顯瑩白生光彩猶恐芳恣汅染塵埃去首飾愡腰帶乍􅄐君懐恰􅂊用不勝嬌無奈掩双􅁭欵脱宫鞋褪綾波韈壓香羅窄翠幙髙懸錦帳齊開道煞尾阿環早是凨流殺又添出些温柔分外膩玉生嫰霞酥􅇩間㺯色夜行舡明皇哀詔不覺天顔珠淚簌道陳玄禮負我何事雖是欺主上有千般諫則這揀宫娥的一句更勝似弑君殺父況酔東凨嬌滴滴嬰兒㓜女軟耨耨姊妹承轝盡是他舊班行終有些親腸肚施行間怏然難覷恰到半死不活處􅂔力無倒大来教娘娘受苦么特向那雄糾糾征徒􅀾夫􅃟㡬箇􅂔昻昻􅁖黨兇徒莫遷延休猶豫疾忙教􅄩㱕㝠路左右来少不的今朝一命殂早與他娘娘箇快􅂑尾驚魂不挽行雲住暗雲巳逐西凨去蔵去玉骨氷肌埋盡怨紅愁綠蛾眉宛轉難為主馬蹄踏蕩無尋處有一亊􅀅軍索再三躊躇不敢望似山􅁜般修墳墓想着曽扶侍鸞衾你却少贈與楊妃半堆兒土夜行舡送司素蓮玉立亭亭太華仙間別来不記何年雲隔瑶池塵飛滄海誰承望又還相見沉酔東凨仿彿在耶溪岸􅁁分明在太液池前瓊簮墜地輕羅襪􅓸波淺勝華清賜浴温泉微露漫漫濕翆鈿越顯得香嬌玉軟􅄐亭宴帶歇拍煞韓昌􅀺甜話兒多􅁛羡周濂溪羙意兒常留戀都子為凨流自然馨香賸噴水龍涎芲瓣巧攅珠蚌壳藕􅁝細吐氷蚕蠒欺凨㺯縞衣妬月摶紈扇三般兒可憐葉老翆房空波寒粧鏡慘粉淡芙蓉變休聴玉漏催且盡碧筒勸多嬌自勉恁若許帶根兒移我先􅀅並頭連蒂􅃟夜行舡送景賢囬武林芲栁鄊中自在仙惹春凨兩䄂翩翩酒社詩壇舞䑓歌榭百年􅂻㡬畨相見新水令君家家近六撟􅁁占西湖洞天一片栁隂藍翆藹芲􅂔麝蘭烟錦纜銀鞭一步步画屏面慶東園酔舞筵殢歌扇偎栁坐枕芲眠生来長費杖頭錢酒中遇仙詩中悟禅有心燕子楼無意翰林院􅄐亭宴帶歇拍煞􅃢瑚文采天機絢珍珠咳唾氷芲濺霜毫錦箋品藻着杜司空褒弹着張殿試出落着双知縣一􅁭東魯書両肋西廂傳相㸔黯然朝雨渭城愁夕陽南浦恨芳草陽関怨休言鷄􅁰期謾結鶯芲怨咱兩箇明年後年湖上吊蘓林芲間覔劉阮夜行舡殘春閨思一片芲飛减動春凨吹萬􅀧愁人苦雨連宵酸凨㡬陣二十四畨芲信喬牌兒嘆今春想去春感舊恨接新恨恨春春恨何時盡恐因而僝僽損新水令落紅滿地錦鋪雲促東皇綠濃紅褪遇景值殘春緊鎖眉顰因春痩為春困天仙子鶯聲韵􅀍燕子暗啣春蜂怨消黄蝶愁褪粉空無語嘆東君惱亂吟魂雨打梨芲深閉門如此黄昏􅄐亭宴煞杜䳌聲􅂻韵華盡鷓鴣啼破鉛華暈東凨漸緊腕鬆了金肌羸了玉香消了粉人已別春誰問悶􅀝屏山暗忖春㱕後有来時人囬期甚時凖夜行舡贈鳯䑓春春滿瑶䑓瑞靄飄鳯来儀飛下丹霄白石貞堅翆梧窈窕聲價重每􅁛先兆行香子正春暖䑓髙更鳯婉鸞嬌聴玉人月下吹簫芳名顯耀羙譽清標志凨雲心廣豁􅒏浮遥駐馬聴㡬度凨和逰鳯沼舞輕歌妙九重春色酔仙桃休去鳯凰䑓上引黄鶴則要蝴蝶梦􅂻来青鳥忒輕盈偏嬝娜煞妖嬈沉酔東凨鎮寳髻􅁫簮鳯翹休彩雲聲㫁鸞簫酒斟白玉甌曲唱黄鍾調閑争春五陵年少池上于今有鳯毛奈眼底知音較少鳯引雏鳯鸞交芙蓉帳暖度春宵海棠丰韻江梅俏器具羣超身騰碧虹橋翹展青雲道􅁕躡荆山寳任千轉錦鶚儘萬里金雕鴛鴦煞休惹得鶯燕嫉妬蜂蝶閙和那等鸂􅈃嬉戯鴛鴦咲有意相􅀙無福難消唱道俊雅瓊􅁎凨流子髙豈是邪妖喜題目真妙若伴着箇蕭史英豪共㺯玉􅇛圎快活到老夜行舡􅀉教坊歌者湖上清香酒力微不由人對景傷悲楊栁鞦韆海棠庭院都不似舊時凨味凨入松画梁新燕試香泥迅􅃌又春㱕玉京約線當年􅀉憐今後尋誰緱氏山頭月黒楚王䑓上雲迷新水令故園極目草凄凄盡消磨酒情詩意􅂯不去樽前傳筯急席上賣芲催頓覺年来三両盞九分酔胡十八常記得那一日芲錦墜綺羅幃牡丹亭畔酔如泥死得在那􅂻人生百􅀊間􅀎有㡬懽㑹攪箏笆誇精細恁精細有誰及行令蔵䦰承懽奉喜知進退識髙低端實一􅂔化生天地歌舞奪魁鴛鴦煞如今章䑓街舊路荆榛閉平康巷故址蒼苔集指冷鸞笙聲㫁龍笛唱道歌罷行雲香消舞衣堂長諸生行坐􅂻常縈繫也是我白日􅂻斯掂提因此上夜夜相逢在梦兒􅂻夜行舡贈小脚娃顔色天然丰韵佳據精神閉月羞芲膩粉粧施匀罷凨流處那些堪画步步嬌微露金蓮湘裙下端的些娘大剛剛只半扎若舞霓裳􅀅翆盤蹅覷絶他不弱楊妃襪沉酔東凨那步輕輕慢撒移踪欵欵微蹅到晚夕臨床榻擁鮫綃枕􅁁燈下那的是􅁈家痛緊恰脱了鞋兒􅅶扎撥不断為􅁈家恨咱家三兠跟用意収拾束纒的十分緊恰怕寒時重套上吳鈎襪􅀙􅅶上㡬曽撇下􅄐亭宴煞比如常向心頭掛争如移上双肩搭問􅁈家既肯湏當手内拏或是肐膊上擎或是肩兒上架髙􅀧起銀缸㸔咱掂㺯着徹心兒麻髙擎盡意兒耍夜行舡射覆分題換酒籌對芲賞且盡金甌世亊輕微人情薄淺也湏是粗頑時􅀱凨入松光隂迅􅄩去難留一日過三秋開懐休把双眉皱狂歌痛飲且消愁酔玩林間梅竹醒㸔岸畔松楸喬牌兒功名念巳休㱕隱心如舊避紅塵盡緘談天口故蔵頭並䄂手甜水令常則是放浪形骸忘懐暢飲歌兒左右他事不干求則我這詩集成篇書修成卷文學不陋那希望拜􅀅封侯􅄐亭宴煞嬉逰信步閑亭後行過堤外垂楊栁翠荷淺方知夏去碧梧凋又覺新秋閑撫景心窮䆒總不如蓬囱自守種山間􅂼菜苗結林泉布衣友行香子名利貪婪世亊􅮡空使人白髪髧鬖輪千撥萬暮四朝三赱江東逰海北涉淮南喬木查閑愁自覽枉用英雄膽争似閑心住草菴伴老聃破砕襴衫續断絃藥盈籃月明龕不強似亂石灘凨急舟絶纜連雲棧霜凝馬頓啣是非塲雪壓人折擔嘆痴人着賺尾蒲􅇛穏坐閑時暫明囱讀易情踈淡道叅任朝昏􅀙烏􅇠猶􅀅暗竹葉席蘆芲毯談玄口緘榮辱縦教他凨波近不得俺行香子得也心焦失也心焦得共失争不分毫榮也徒勞辱也徒勞鏡中霜頭上雪鬂􅁁毛慶宣和得失榮辱多儘教塵世波滔堪可林泉伴漁樵酔笑倒錦上芲休喜休嗔休煩休惱暗􅂻光隂㡬個人知道兩字功名天涯海角擾擾浮生行人易老么朱顔已退却青春再難到學取先生散誕逍遥酔臥松隂忽然睡着比恁俗人閑愁較少清江引芒鞋竹杖粗布􅂁俯仰掀髯咲伴老華山雲不梦長安道落葉滿庭凨自掃碧玉簫一箇􅇛瓢瓦􅂦乳香燒三公黄閣朱户描金標俺清閑道徳恁為官憂􅀦朝都睡着不必晨雞呌咷㸔此梦誰先覺尾誰人不向紅塵閙惟咱且對青山老領鶴澗􅁁歌林外舞芲前酌百􅀊千年調光隂過了人換㡬千秋江山自然好行香子祿山憶楊妃􅀍一􅁓皇宣和三品軍權剏􅄏萬刼情縁想青綾􅀍底紅燭囱前甚時曽整我装歌畨曲按胡旋喬木查嘆平生分淺何日重相見為盻行雲眼睫穿淚珠兒揾血流遍秦川撥不断􅂯㡬時幸温泉寵梨園彩鸞巳赴蟠桃宴鸚鵡難廻碧玉輦鴛鴦不鎖黄金殿千般旖旎萬種妖嬈怎下的教馬嵬坡蹅踐殄􅄐亭宴帶歇拍煞麝香一汚春凨面鸞膠無分紅繊片身㱕九泉把箇可意小名兒題􅀅傾城模様兒想望屈死的􅁈魂兒現明牽子母情暗隠別離怨無心過遣慢徒勞乾大閙空經變至長安京兆府􅀙薊州漁陽縣一掇􅂔赱喏来近逺竭竭的趕􅂣憂剛剛的落聲喘凨入松吕止菴半生芲栁擔曽躭凨月􅂣􅮡甫􅀎巴到藍橋驛不隄防烟水重渰追想誓海盟山㡬回淚濕青衫喬牌兒􅂯不􅀅凨月叅勾㫁欠汙濫偶因那日相逢處両情牽他共俺新水令巧盤雲髻挿瓊簮穿一套素衣恁般恬澹他説的話兒岩合下手脾和莫不是把人賺攪筝琶咱閑言探切恐話交叅休道咱虚脾伊不敢豈不怕外人知恐娘見離恨悶愁両下躭獨自箇羞慚離亭宴帶歇拍煞做時莭彼此休心厭做時莭休把人坑陷常歡喜星前月下休等閑面北眉南既做時休志忑若意懶􅀙生便緘我的朴實心博伊家作恠膽凨入松翆楼紅䄂倒金壷春色滿皇都夜闌剗地燒銀燭那其間多少歡娛薄利虚名間阻俏凨聲因此蕭踈喬牌兒這畨本實虚不合惹題目俊禽着網惜翎羽忍不住自暗付天仙子棘􅂻􅇠難配撲天鵠饞眼疾心㸔之不􅁕猛可􅂻見姨夫敗壊凨俗好芲怎教他做主不辨賢愚離亭宴煞錦箋空寫多情句枉可惜口談珠玉假做蘓卿伴侣􅀍馮魁已早圖謀使盡心􅂊得悟則不如􅀅娶字覽便数咱㸔上臉兒甜止不過鈔兒苦凨入松鳯䑓人酔鳯楼春詩思惱吟魂玉娥何處鸞簫韵月明酒醒堪聞㡬度清香馥郁一􅇛和􅂔氤氲喬牌兒燕子楼情莫在雞兒巷意休順玄都觀􅂻宜親近上瑶䑓心較穏新水令誰安題目更清新喜香名可憎淹潤身雖居羅綺志本逺凨塵駕瑞靄祥雲野鶴軰怎随趂天仙子話長短梧桐論争知有春色鳯城人也消得李白在䑓上留題曽引得越娘向坡前背燈漢司馬操南薫調動王孫鳯求凰数聲絃内隠感起文君豆葉黄㺯玉􅀎逹律知音蕭史㑹殢雨􅀹雲他湏是宿世前􅊚天緣仙分尋箇鳯友鸞交兩對門那更皓齒朱唇翆䄂紅裙占㫁舞榭歌䑓栁營芲陣􅄐亭宴煞天台傳到東皇信鳯鸞吟百芲開噴錦鶯唱韶華過半子規啼媚景三分富貴鄊凨流運前程未凖知他是鳯凰池巧画品宫眉知他是􅃄月街輕搽少年粉凨入松落芲輕惹暖􅁝香飛燕過東墙重重簾幙閑清畫金篆小􅃄􅈁􅀄長羅衣乍經春痩蛾眉慵掃殘粧么㡬囬􅄫寞怨東皇獨自暗情傷振衣忽憶當時話空低首踏遍紅芳㸔到荼䕷缷也玉􅍡何處垂楊夜行舡暮雨朝雲勞林想􅄸却是㡬般情况海闊相思山髙恩愛都撮在這心上喬牌兒韓香空妄想何粉怎承望恠靈鵲不􅄐芲枝上又来沒事謊攪筝笆恰撇下心兒忘􅂊説着意兒謊俺捱過􅁖詫凨聲捜索遍凨流伎倆驀忖量猛叅詳空􅀅順人情筆尖和淚染怎訴􅂨腸月上海棠塵蒙金鎖閑朱愰淚濕香絨冷綉床無語傍粧䑓全不似舊時格様慵逰賞忍見鶯双燕兩么無端雲雨權収掌誰説道陽䑓路悽愴着意㑹鸞凰穏把佳期盻􅃌望成来往一任閑人講賺煞挑燈織錦空勞攘湏跳出愁羅怨網芲壓東墙潜等待攏門兒月明下嚮喬牌兒四方民甚喜豊稔太平日香燈芲果酧天地托當今仁聖徳甜水令山明水秀青松檜栢堆嵐疊翆處處景幽竒雲起峯尖芲生岩畔水遶山溪恰便似閬􅁐瑶池四􅁁静金凨淅淅玉露零零紅葉濕菊芲嬌媚三秋之際有黄橙醁醑赴一箇重陽㑹秋江送清閑道無事仙講的是黄庭道徳篇酒三盃詩一聮酔了呵青松直下自在眠仙鶴又舞翩頑童又咲喧誰似俺清閑麻􅂁與藤􅃣常則是啖栢飡松飬道玄我子待跨鶴逰閬􅁐青哥兒俺那􅂻蓬莱蓬莱仙􅁐一箇箇益壽益壽延年俺那􅂻四季長春芲滿園青耿耿萬里遥天接着這弱水三千鶴舞蹁躚献果白猿是瑞草靈芝檜栢青松煉樂燒丹不老長生拂兩
