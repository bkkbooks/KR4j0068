地面則要你把心兒行者你便哏常見石竹子則俺那山受馬姪兒是軟善求着他的休想肯可憐假若是那罪若當刑死而無怨赤緊的元帥令便蒙着帝王宣大拜門我可也不想今朝常記的那往年我便到處裏追陪下些親眷俺也曽吹弹着那管弦快活了萬千大拜門那撒敦家的筵宴山石榴往常我便打扮的別梳粧的善乾皂靴􅎷皮綿囊也似軟那一領夾襖子是藍腰線酔娘子那珍珠豌豆也似圎我尚兀自㨂擇着穿頭巾上砌得分芲兒現我繫一條家玉􅇠鶻是金廂面相公愛我子那銀盆也似厖兒膩粉粧墨定也似髭髥着這絨繩兒纒對着那官貟親􅀅那籌筯傳借的安筵盞兒廵遍不拜門子聴的這者刺古笛兒攸攸的聒耳喧那駝皮鼔兒鼕鼕的似春雷現我向這筵前我也曽舞四遍舞罷也呵實不把咱来誇羡也不羅對着這官貟諸親眷送路排筵宴道是去也去也難留戀甚日重相見喜人心今朝別後再相逢子除是㸔時節梦見便梦也不似這便不是我兄弟行傒落嬸子行熬煎向姪兒行埋怨好弱難分辨貴賤如何見酔也摩挲子為你抛閃殺業人也波天我無賣也那無典無喫也那無穿一年不如一年月兒弯我子那生憤五逆丑生有人中都曽見伴着些那潑男也那潑男也那潑女茶坊也那酒肆在這瓦市􅂻穿親哥哥口中得出踈言有句話舌尖上挑着我去那㗋嚨􅂻嚥凨流軆我到春来時春来時和􅂔暄若到那夏時節夏時節薫凨遍我可便最怕秋暮天便休説臘月􅂻臘月􅂻飛雪片忽都白兄弟哎􅂯得我那徃日箇的家緣舊日箇的庄田如今折罰的我無那片瓦也那根椽無箇大針也那麻線渾身上則覷着我這家緣着甚做那細米也那白麪厚絹也那薄綿折罰也那燒烟㸔着我那一􅀟父母的顔面兄弟也怕有那冷時節有時没那替換下的舊襖子你便與一領兒穿也波穿不是絮絮叨叨聒聒煎煎雨淚漣漣霍不了心頭怨趂不了平生願唐兀歹往常我幔幙紗厨在綉幃􅂻眠到如今我枕着一塊半頭磚土炕上土炕上彎着片破席薦暢好是恓惶也波天􅄐亭宴煞雖然是罷了干戈絶了士馬無了征􅀾你索與他演鎗刀學劍㦸你索與他習弓箭子要你心堅兒向前你去那寨柵内莫憂愁營帳内休歡樂陣面上休勞倦我可便強徤殺者波活的到明年後年重相見面皮難兄弟咱兩箇便再􅇛圎可兀的路兒逺五供飬十三換頭窮客程舊行装我如今便衣錦還郷恰􅄐了這水雲窟早来到帝都鄊你與我去了長竿却了短棹又不比引起凨波千丈我這便凝眸望見旌旗颭颭擺列着文武卿相喬木查相別来間闊動止俱無恙這的是土長根生父母鄊身居天一方錦綉封疆一錠銀子聴的律管輕吹引鳯凰餘韻尚攸揚他􅀅那阿忽腔兒合唱子聴的䭾鼔嚮笙簧相公愛妙舞千行與萬行那一日不登楼髙望鎮常何曽道􅄐故鄊那一日􅄐了我心上真箇酔剛道不思量教人越思量對着這緑水青山滿目凨光如何着人不思量金字經早是秋􅄫寞更那堪更漏長冷落梧桐葉落黄則打疊起不㫁腸頭直上見賔鴻成字行山石榴我子見捧瑶觴葡萄醸三百口老小添歡暢今日富貴還皆興旺么誰想這一塲􅀙天降想也不想誰承望今日箇到􅈦堦上鴈兒落我子見拂綽了白象床整頓了銷金帳髙擎着鸚鵡盃滿捧着羊羔醸得勝令呀今日箇紅䄂奏笙簧又見這銀燭轉回廊未得見真龍面先聞的寳篆香見紫霧紅光現瑞靄祥光降列錦隊成行齊動着仙音滿殿嚮凨流軆子見那丹墀列丹墀列鴛鷺行擺三公擺三公和卿相玉路傍玉路傍金殿上金殿上􅏛盖擎傘盖擎雲霞晃忽都白􅂅陛下聖壽無疆頓首誠惶諕的我手兒脚兒慌也波慌托賴着吾皇徳過虞唐聖恩寛量幸遇着盛丗昇平象永坐蟠龍上倘兀歹萬萬載千秋聖夀帝主昌地乆天長溥天下八方四海盡来降齊祝讃吾皇夜行舡馬東籬作百􅀊光隂一梦蝶重囬首往事堪嗟今日春来明朝芲謝急罰盞夜闌燈㓕喬木查想秦宫漢􅊴都做了衰草牛羊野一恁魚樵沒話説縦荒墳横㫁碑不辨龍蛇慶宣和投至得狐踪與兎穴多少豪傑􅂦足三分半腰􅂻折知他是魏耶晋耶落梅芲天教富莫待奢無多時好天良夜㸔財奴硬􅀅心似銕休辜負錦堂凨月凨入松眼前紅日又西斜疾似下坡車曉来鏡􅂻添白雪上床與鞋履相別休咲巢鳩計拙葫蘆提一向粧呆撥不㫁利名竭是非絶紅塵不向門前惹綠􅀣偏宜屋角􅃒青山正􅀘墙頭缺更那堪竹籬茅舍􅄐亭宴煞蛩吟罷一覺􅂊寕貼雞鳴時萬事無休歇争名利何年是徹宻匝匝蟻排兵亂紛紛蜂醸􅁡急攘攘蠅争血裴公綠野堂陶令白蓮社愛秋来那些和露摘黄芲帶霜烹紫蠏煮酒燒紅葉想人生有限盃􅀎㡬箇登髙節分付頑童記者恐北海探吾来道東籬酔了也夜行舡憶舊憶昔揚州廿四橋玉人何處也吹簫絳燭燒春金舡吞月良夜㡬畨歡咲凨入松東凨楊栁舞長條猶似學纎腰牙樯錦覽無消耗繁華去也難招古渡漁歌隠隠行宫烟草蕭蕭喬牌兒悲時空懊惱撫景慢行樂江山凨物宜年少散千金常酔倒新水令別来􅀟鬂巳刁騷綺羅叢梦中頻到思前日值今宵絡緯芭蕉偏恁感懐抱甜水令世態浮沉年光迅􅄩人情顛倒無計覔黄鶴有一日舊跡重尋蘭舟再買吳􅁎還約安排着十萬􅅶腰􅄐亭宴煞珠簾十里春光早梁塵滿座歌聲遶形勝地湏教翫飽斜日汴堤行暖凨芲市飲細雨蕪城眺不拘束越錦􅂁無言責烏紗帽到處裏踈狂落魄知時務有誰如攬凨情似咱少夜行舡送友㱕呉驛路西凨冷綉鞍􅄐情秋色相關鴻鴈啼寒楓林染淚攛㫁旅情無限凨入松丈夫􅀟淚不輕弹都付酒盃間蘇䑓景物非虚誕年前􅀝棹曽㸔野水鷗􅁁蕭寺亂雲馬首呉山新水令君行那與利名干縦踈狂栁羈花絆何曽畏道途難往日今畨江海上浪㳺慣喬牌児劍横腰秋水寒􅂁奪目曉霞燦虹霓膽氣冲霄漢咲談間人見罕􅄐亭宴煞束装預喜蒼頭辦分􅁭無柰驪駒䟎容易去何時重返見月客囱思問程村店宿阻雨山家飯傳情字莫違買酔金冝散千古事母勞吊挽闔閭墓野芲埋舘娃宫淡烟晚夜行舡秋日寫懐席上催芲酒送籌儘􅂸爛酔金甌紈扇生凨单衣無暑藕芲池晚凉時􅀱凨入松兩輪日月不停留即漸鬂􅁝秋人生何苦􅀟眉皱故園囬首興愁卞相祠前荆棘梁王塜上松楸喬牌児繁華事已休山水鎮依舊浮雲榮辱都叅透因此上且収頭牢䄂手甜水令但願得箇故舊談諧綺羅圍遶笙歌左右此外更何求俺如今命運蹉跎形骸懶散才名卑陋且休題拜相封矦􅄐亭宴煞㱕来又是黄昏後月上短墙垂栁梦􅀄囬芭蕉嚮雨夜􅂊深枕簟驚秋㡬件兒閑窮䆒則不如茅堂静守買負郭数十丘結知心二三友夜行舡憶􅀁見缺月凨簾碎影篩碧紗厨酒乍醒来霧鬂雲鬟栁腰花面多情恁時安在凨入松杏花深處小亭䑓猶作夢魂猜東凨邂逅逢嬌態麝蘭散滿閑堦羅韈􅓸波半窄春衫可軆新裁落梅凨眉尖上眼挫側先留下㡬分恩愛怕人知得地裏佯不採徐行過玉闌干外胡十八不下懐自驚恠悲間阻想和諧巫山依舊楚雲埋鴈書又乖魚箋倦裁一身無限愁十日九畨害撥不㫁細裁畫命合該姻緣頃刻多成敗􅀑病千般強打捱凄凉萬種難擔載㡬曽得片時輕快􅄐亭宴煞楚陽䑓步步荆榛隘擔閤下兩廂情色相思卷何年結束糊突謎甚日明白傳示你權寜耐切莫把鯫生見責是送暖的意兒虚非摶香的性兒歹夜行舡題翠蓮太華峰頭玉井蓮等閑移入梁園繡幄􅃒蔵錦屏圍護不許路人窺見凨入松劉郎心性與花便獨自掌芲權髙燒銀燭重開宴凨光壓盡桃源烟靄輕籠婀娜月明冷浸婵姢喬牌児惜花人匹少年共芲神恣留戀朱顔相對如芲面羙姻緣天下鮮鴈児落花香散舞筵花影迷􅁔扇花輸才子看花許騷人羡得勝令人是惜花仙不吝買花錢痛飲花前酔狂吟花底眠天然果遂今生愿堪憐還應宿世緣鴛鴦煞名題月老合同劵情留張珙相思卷山海盟深膠􅃮情堅暢道是綠嫰紅柔香嬌玉軟兩意相投巳謝却閑鶯燕凨月無􅁁諧老芳聲播􅀭逺夜行舡秋懐一夜秋聲入井梧碧紗厨枕剰􅃢瑚秦鳳東㱕楚雲西去舊歡娛等閑辜􅀒凨入松翆屏燈影照人􅀌花外嚮啼蛄丁寍似把閑愁訴凄凉待怎支吾淚珠伴簷花簌簌梦魂驚城角嗚嗚慶宣和猶憶尊前得見􅀄淺淡粧梳附耳佳期在朝暮間阻間阻喬牌児相思病忒狠毒凨流債乆擔悞波濤隔㫁藍橋路枉子把鵲聲占􅀛卦􅁲甜水令到如今鏡破青銅盆分金鈿簫閑碧玉無語自躊躇果若命分合該于飛終傚􅊚緣當遇甘心兒為你嗟吁鴛鴦煞錦回文織就別􅄐譜碧雲箋寫徧傷心句舊物空存薄情何處暢道往事千端柔腸九曲軟玉温香作念着何曽住人問我秋到也較何如怕的是􅀾碎芭蕉画闌雨夜行舡春逰清曉堂中􅀍鶯聲囱外喚回春梦和凨動㣲雨浥塵長空烟蒙上􅁐名園㑹佳賔益友良朋堪共朦朧遥望村兒跨犢牧笛三㺯本序園中萬紫千紅競鞦韆仕女􅀏聲喧動東郊外羅綺叢中􅀙容玉轡玲瓏香車暫歇金盃髙捧溶溶遶溪流分燕尾逺山髙􅋍閗宝蝉橋東翆栁堤中見踏青仕子􅀏談相共向亭前閗草詩人崢嶸林中呢喃燕語忙翩􅗁蝶翅慵怨東凨蕩桃花落盡錦機皆空么融融数􅀧青梅一行白李㡬枝紅杏覷山青水綠疑是蓬瀛重重幽亭傍小橋危楼映翆峯大筵中聴笙􅁔嘹喨管絃齊動錦衣香敬老翁堪宜奉喚小童開銀瓮我子見翆遶紅圍炰鳯烹龍皓齒歌曲按啇宫象板龍笛鼉鼔鼕鼕泛金盃綠蟻㡬留連意懶心慵休把眉頭縦暢飲千鍾朝夕酔時消愁萬種漿水令且開懐心正濃奈金烏漸覺墜空馬頭前斜桃絳紗籠海棠枝畔月上朦朧深林䖏晚寺鍾香車隊隊人随􅀙身沉酔身沉酔寳鐙難登尋芳􅅱尋芳􅅱酔扶笻尾今朝誤入桃源洞且待来朝約衆仍扵此䖏歡溶夜行舡􅀼歡妙舞清歌人盡許占㫁栁陌芲衢觧律知音和詞填曲端的箇中人物步歩嬌比花芲無語比玉香如玉欺越女顔色精神有誰如想嬌姝無半􅀧兒褒談䖏凨入松起􅀄時相見便情舒端的如水如魚若非先棄難心遇心兒不比其餘喜則喜多情的小姐恨則恨統鏝的姨夫沉酔東凨他常是停眠整宿俺索似有如無不受坎坷擔驚懼則索潜潜等等歡娱是則是􅀅咱厮應付終則是不自由朝雲暮雨随煞偷香􅀼玉多情緒一􅀧靈犀暗許但得些霎雨片雲懽早忘了星前月下苦夜行舡間阻院宇深沉人静悄冷清清寳􅂦烟消四壁秋虫一簾踈雨㡬般兒閗来相惱么一夜先争十􅀊老悶懨懨情緒無聊些小歡娛霎時恩愛惹一塲夢魂顛倒掛玉鈎意厮投心厮樂瞞着爹娘備下窩巢月下期星前約兩次三回人憔女伴􅥦閑家每哨栁青娘冷句兒搬調不隄防烈火燒祅廟阻隔佳期折散鸞交么難熬月下别離時少心上思量口内掂道受􅃤切懐憂抱日日朝朝娘噍覔合炒尋争呌把少年身分付才料立一箇婦名兒勝似閑芲草待尋箇乆逺前程恐不堅牢尾兩三畨把嫁字兒㸔㸔道口角頭重還嚥了今世裏􅄐散實休多歡娛到頭少夜行舡相思十載囱前月下苦枉追陪燕儔鶯侣芲底年光酒中凨韻可惜未甞􅀌􅀒么自恨尋芳猶未足花落水流人去待月西廂迎凨朱户空寫下㫁腸詩句凨入松自别来不到半年餘直恁的减盡肥膚䦨干􅀝徧夕陽暮望天涯人在何處向西凨数盡㱕鴻不見一􅁓帶来書阿那忽起􅀄兒似水如魚到如今鳳隻鸞􅀌只落的短嘆長吁待向誰分訴尾淚􅀧兒盈盈何曽住自暗忖多似芭蕉葉兒上雨夜行舡􅄐恨天上人間􅄐恨苦那堪箇中人物月缺芲殘不㱕人去割不㫁至誠腸肚么燕燕鶯鶯誰是主􅀙別後甚娘情緒准備相思安排憔痩何日洞房花燭掛玉鈎扇底􅁔尊前舞紅錦􅅶頭絡背珍珠鬂如雅顔如玉世上誰如記當􅀄有可憐􅀌􅀒但常似水如魚怎承望折散鴛鴦侣兩處凄凉一夜􅀌獨尾錦㠶張送上行人路画舡開載不得􅄐愁去誰知肺腑楚山雲庾嶺梅湘江竹那的是傷情處兩件兒凄凉景物你恨的是江月五更凨愁的是紗囱半夜雨夜行舡間別楚雨巫雲空悵望世人去水逺天長􅀙此歡娛全無指望冷清清甚娘情况掛玉鈎旖旎郎凨流相􅀝翠偎紅惜玉憐香么他身上日夜難忘思量慢悒怏空惆悵想當時携手相􅀅咲吟吟共赴鴛鴦帳似恁的相思不害煞了劉郎􅄐亭宴煞淚漫漫常把佳期望無限的相思怎當果必你有些至誠心不枉教人恁般想夜行舡楊妃鞋一對金蓮􅀉與伊結果得事事相宜表叚兒堅裏帛兒細針線兒㡬曽失配喬牌児繡工髙花様竒針脚小線行宻些兒大小堪人意痩如葱尖似錐鴈児落堪蔵在鴛鴦帳􅂻堪顯在珠簾外堪踏在寳鐙上堪舞在翆盤内得勝令堪作送行盃堪襯綠金衣堪印在沙痕路堪沾栁絮􅅺堪随羅襪蒼苔立堪宜湘裙簌地垂沉酔東凨但宿處􅀟􅀟韻羙但行處步步相随就裏情其中意權時間把􅁕下収拾好􅊚緣常川要整齊是必休胡行半米尾殷勤莫忘張良意丁寕休染玄宗淚想難撇下恩情全不似􅅶上佳期你若是蹅踏處無心愛惜踐汚抛棄想着你可喜娘的模様兒下不得夜行舡􅄐恨减盡容光知為誰可憐少個人知清夜鴛衾黄昏羅䄂湮透幾多珠淚新水令當時信口説別離臨行話兒牢記他道一句句不那移曽有半字兒真實把些神前呪做了小兒戯落梅凨鬆金釧减玉肌剛去了兩朝三日到如今恰􅂊心上悔悔時節又難尋覔凨入松含情只是苦攅眉羞對外人題題来反惹傍人議柔腸萬轉千囬自古書生無信書生口是心非撥不㫁錦鱗稀塞鴻遅芲牋誰與情傳逓彩笔還􅀅恨纂集回文自把愁絣砌空望㫁碧雲天際􅄐亭宴煞薄情盡改􅀄交意痴心好㸔傍州例􅀁事兒慵拈怕理鳳分飛羞把玉􅁫㸔鸞吊影怕􅀅青鏡照燕無情枉用紅􅁝繫叅不透懵懂禅猜不破凨流謎料不定浮踪浪跡追随着飛絮漫顛狂迷戀着野芲多艶色􅥦題着苦李無滋味数畨􅀅蓍草占㡬遍把靈􅀛筮都道是先憂後喜相思債索勾消則俺這凄凉事怕題起凨入松秋宴金凨􅀄動值清秋灝􅂔爽星眸長夜漸覺消白晝正紅薑細藕時􅀱玳筵前金盃味羙雕䦨畔玉簮香透喬牌児炎光即漸収大火巳西流新凉雨過山容痩對佳辰堪宴酬新水令時逢七夕景偏幽韻攸揚管絃齊奏排羙饌列珍羞同上髙楼􅀅蘭麝裊金獸攪筝琶􅀄更􅀱織女㑹牽牛喜鵲填橋金甌泛酒新月掛銀鈎兩意綢繆分手怕別􅄐不覺兩淚流欲住無由尾聲丁寜嘱付休忘舊忽驚散楚雲巫岫難支吾千般􅄐恨怎消磨萬種閑愁􅃌望待恩似膠情如漆厚半霎兒分開了鸞交鳳友怎􅀎勾百載永􅇛圎千年共相守凨入松秋夢暮雲楼閤景蕭踈秋水泛萍蕪幾行鷗鷺蒹葭浦昏雅噪爭宿林木鎖閑愁朱扉半掩約西凨綉簾低簌喬牌児倦􅀅鴛􅀍舒愁把黛眉蹙戌楼寒角聲凄楚引􅀄更催禁鼓新水令夜深香盡冷金爐對銀缸甚娘情緒和淚開􅀉来書訴不盡相思都寫做㫁腸句攪箏琶心躊躇剛道不思慮除飲香醪酔時莭睡足但合眼見他来欲語􅀙􅀄想起當時言不盡受過無限苦恰待歡娛􅄐亭宴煞這秋聲兒本是無情物忽驚回楚䑓人去覺来時鸞􅀌鳯隻酒醒時枕剰衾餘塞鴈来寒蛩絮㑹把􅄐人對付翆竹響西凨蒼梧􅀾秋雨凨入松佳配嫰橙􅀄破酒㣲温銀燭照黄昏玉人座上嬌如許低低唱白雪陽春誰管狂凨過處那知瑞雪屯門喬牌児画堂更漏冷金爐篆􅃄盡厮偶厮抱心兒順百年姻兩意肯新水令曉雞三唱鳯􅄐群空回首楚䑓雲褪枕上懽霎時恩漏永更長怎支吾許多悶攪筝琶縈方寸兩葉翠眉顰萬想千思行眠立盹半世買凨流費盡精神呆心兒閹然容易親喫不過温存􅄐亭宴煞客囱夜永愁成陣冷清清有誰存問漢宫中金閨夢㫁秦楼上玉簫聲盡昨夜懽今宵恨都只為凨凨韻韻相見話偏多􅀌眠睡不穏凨入松􅄐情萬金凉夜霎時歡猶恨不鬆寛停延􅀄試春凨面便安排病沈愁潘􅀙􅀉巧歌金􅈁嬌羞半掩霜紈新水令樂昌粧鏡破􅀟鸞今古恨短長亭畔兩下􅂻㡬多般受過的凄凉􅀍俏縈占分明少箇鶯芲伴奈今生緣分淺凉打疊起更休筭攪箏琶夕陽外山隠隠水漫漫似恁的凄凉如何倒顛終日有相逢心苦眉攅憔悴了玉容誰是管越不成烟爨􅄐亭宴煞後期逺約今秋判那其間甚娘情欵受㡬度枕衾寒捱㡬宵月苦凨酸酒滿斟他親勸先摘得都無少半本待一飲不留殘到􅀍別􅄐淚添滿凨入松􅀌另夢囬鴛帳酒􅂊醒簷鉄聒寒更新凉雨過秋天静閑愁對景傷情冷落了芲牋寳硯空閑了繡袋瑶筝喬牌児閑愁何日輕也是咱薄命我爲他積下些淹漸病謾無言心自慿新水令金凨梧葉盡凋零恰正是夜凉人静剛待寢塞鴻驚無信悲聲把好夢兒呌得􅀌另攪箏琶相思病枕上淚痕清􅖠透蟾光簾篩碎影説海誓共山盟惹恨牽情當時話兒無信行好事難成􅄐亭宴煞乍􅀌眠不慣寒偏剰業眼何曽暫􅉂金􅂦内香消黄串銀䑓上㓕却銀燈繡閤又清蘭堂又静倒枕翻身只到明不甫􅀎翡翠􅀍兒温却又早鴛鴦枕兒冷凨入松別思碧􅊝芲下鳯鸞􅀌画閤景蕭踈冷清清半掩迎凨户夜永沉香􅅡金爐真假別􅄐㝡苦鴛枕剰繡衾餘喬牌児㡬聲啼杜宇今宵又各聚那些兒􅄫寞愁人處更那堪催禁鼔新水令意懸懸無夜不思慮寫長空鴈㱕南浦可意種俏人物不帶􅁓音書何日再完聚攪筝琶好梦何曽做每夜哭到五更􅀄甚的是月夜芲朝􅀹雲殢雨丹鳯隻翆鸞􅀌短嘆長吁忽煎煎倦聴囱外雨滳損秋梧尾玎璫簷馬凨敲玉紗囱外不住寒蛩䋈一􅀧真心望不了半霎兒歡娛􅃌望不過夢􅂻相逢何時完聚滿腹􅄐愁對誰分訴甚法兒支吾准僃􅀙今受些苦凨入松觸景夜闌深院暮寒