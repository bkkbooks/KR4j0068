後神昏眼睛芲其實的怕他怕他休道􅁯憂飲流霞酒膽天来大失禮傷凨化不是耍放浪烟芲不成家其實的怕他怕他休道紅粧羙如芲色膽天来大傾􅀦傾城價不是耍百萬青蚨怨根芽其實的怕他怕他休道通神作生涯財膽天来大少把心牽掛不是耍志􅂔昻昻逞豪家其實的怕他怕他休道剛強敢矜誇􅂔膽天来大理法難容納不是耍鸚鵡曲馮海粟儂家鸚鵡洲􅁁住是一箇不識字漁父閬􅁐中一葉扁舟睡殺江南烟雨覺来滿眼青山暮抖擞着緑簔㱕去􅄸􅀙前錯怨天公甚也有安排我處錢塘江上親曽住司馬栖不是村夫􅈁金衣唱徹流年㡬陣紗囱梅雨梦囬時不見犀梳燕子又衘春去便人間月缺芲殘是小小香魂㫁處長䋲短繫虚名住傾濁酒勸隣父草亭前􅀣當門画出䡖烟踈雨㸔燕南陌上紅塵馬首北凨吹去一年二月夜芲朝自占􅂑溪山好處張良更姓圯橋住半夜􅂻遇師父一編書不為封留字字咸陽膏雨借箸籌㓕項興劉到底託神仙去待啇山四皓還山􅂯不戀人間好處逃囬辭楚無家住觧寳劍曽問津父十年間隷越鞭荆怒捲秋江潮雨空城組練三千白馬素車囬去又逡廵月上波平暮色在􅃄光􅂵處赭肩腰斧登山住耐的苦是採薪父亂雲升急􅀣飛来拗折青松􅃒雨記年時雪㫁溪橋暁渡前灣㱕去買臣妻富貴来㝷􅂔􅆋到寒􅁅冷處青衫司馬江州住月夜􅅇厭竹村父甚有傳舊譜琵琶切切嘈嘈簷雨薄情郎又販茶舡近日又浮梁去説相逢總是天涯訴不盡柔腸苦處才郎于祐咸陽住是箇不識字的田父御溝西綠水東流乍歇長安秋雨恨勿勿一片題情紅葉為誰流去恰殷勤􅄐得􅀷宮便得到人間好處賽鴻秋山行警東􅁁路西􅁁路南􅁁路五里鋪七里鋪十里鋪行一步盻一步懶一步霎時間天也暮日也暮雲也暮斜陽滿地鋪回首生􅃄霧兀的不山無数水無数情無数又宴畢警燈也照星也照月也照東􅁁咲西􅁁咲南􅁁咲忽聴的鈞天樂簫韶樂雲和樂合着這大石調小石調黄鍾調銀芲遍地飄火􅀣連天照喜的是君有道臣有道國有道又村夫飲賔也酔主也酔僕也酔唱一會舞一㑹咲一㑹管甚麽三十􅀊五十􅀊八十􅀊你也跪他也跪恁也跪無甚繁絃急管催喫到紅輪日西墜打的那盤也砕碟也砕碗也砕又丹客行朝燒煉暮燒煉朝暮學燒煉這􅂻串那􅂻串到處都串遍東家騙西家騙南北都誆遍惹的妻埋怨子埋怨父母都埋怨我問你金丹何日成鉛汞何日見只落的披一片掛一片拖一片又綽然亭春来時綽然亭香雪梨芲㑹夏来時綽然亭雲錦荷芲會秋来時綽然亭霜露黄芲㑹冬来時綽然亭凨月梅芲㑹春夏與秋冬四季皆佳㑹問主人此意趣誰􅀎㑹小梁州酸齋朱顏緑鬂少年郎都變做白髪蒼蒼儘教芲栁自芬芳無心賞不趂燕鶯􅋉么東家酔了西家唱唱一㑹􅂯酔何妨酔的強醒的強百年渾是三萬六千塲􅊝芲如面桞如腰他生的且是妖嬈酔闌乗興㑹今宵低低道無語眼児瞧么揣着羞臉娘行吿百般的撒粧夭心下焦空憋躁􅊚縁簿上前世暗勾消相偎相􅈽正情濃争忍西東相逢争似不相逢愁添重只怕画楼空么垂楊渡口人相送拜􅀷深暗祝東凨髙掛㠶休吹動只留一宿天意肯相容晚粧囱下酔􅄐觴月色蒼蒼来時誰暮去時􅋉空惆悵無計鎖鴛鴦么殘雲剰雨陽䑓上空贏得兩䄂餘香春夜長東凨旺桃芲飄蕩何處覔劉郎小梁州小山玉壷春水浸晴霞景物奢華彩舡歌管間琵琶青旗掛沽酒是誰家么夕陽一帶山如画数投林萬􅀧寒鴉曲水􅁁􅀌山下逰人㱕去明月映梅花兩峯晴翆挿波光十里横塘画楼踈影掛夕陽誰凝望紈扇掩紅粧么蓮舟撐入荷芲蕩拂天凨兩䄂清香酒酔㱕明月上棹歌齊唱驚起宿鴛鴦永壷光浸水晶寒好景人間暗香来處是􅀌山㝷梅慣詩思壓馿鞍么瓊􅁎争捲珠簾㸔画舡中歌舞唱弹明月殘白石爛凌空楼閤十二玉䦨干篷囱凨急雨絲絲咲撚吟髭淮陽西望路何之鱗鴻至把酒問篙師么迎頭便説兵戈亊凨流再莫追思塌了酒楼焚了茶肆栁營芲市更呼甚燕子鶯児秋凨江上棹􅀌舟􅃄水悠悠傷心有亊賦登楼山容痩楓􅀣替人愁么樽前細把茱茰嗅問相知㡬箇白頭樂可酬人非舊黄芲時􅀱枉負晋凨流秋凨江上棹􅀌航烟水茫茫白雲西去雁南翔推篷望情思滿滄浪么東籬悮約陶元亮過了重陽自感傷何情况黄芲惆悵空作去年香凭闌人秋懷十韻露冷池塘秋水澄夜静松凨音韵清一天凉雨晴半彎斜月明門外髙槐垂嫰黄池内秋蓮凝淡粧西凨吹􅁓囱小楼今夜凉􅀧破蒼苔墻角螢􅀾退西凨簷外鈴画楼秋露清玉䦨梧葉零寳􅂦香殘秋夜􅀷玉漏聲遅凉􅂔侵月明三㺯琴誰􅀎知此音戯撥琵琶囱下聴換羽移官無限聲不知琴調清誰􅀎􅀉古情月照珠簾垂玉鈎凨透紗囱凉翆楼凄凄蛩韵幽盈盈芲露秋小殿昨宵天􅂔凉玉箭初傳更漏長荷芲消晚香芙蓉添晚粧酒力禁持頭懶擡詩思縈紆情滿懷好香天上来木犀芲正開着罷殘棋茶一甌寫就新詞芲滿楼碧天銀漢秋新蟾玉一鈎獨上髙䑓凝望中􅂵翆模糊山萬重秋波連逺空晴嵐飛塞鴻乾荷葉劉太保乾荷葉色蒼蒼老柄凨摇蕩减了清香越添黄都因昨夜一􅂣霜􅄫寞在秋江上乾荷葉映枯蒲柄折難擎露藕􅁝蕪倩凨扶待擎無力不成珠難盖宿灘頭鷺根摧折柄欹斜翆减清香謝恁時莭萬􅁝絶紅鴛白鷺不􅀎􅃒憔忰損乾荷葉乾荷葉色無多不耐凨霜剉貼秋波倒枝柯宮娃齊唱採蓮歌梦􅂻繁華過南髙峰北髙峰􅃤淡烟霞洞宋髙宗一塲空呉山依舊酒旗凨兩度江南梦夜来箇酔顏酡不記芲前過醒来何二更過春衫惹㝎茨􅐘科絆倒芲㧓破乾荷葉水上浮漸漸浮􅀅去跟􅀅你去随􅀅去你問當家有媳婦問着不言語脚児尖手児纎雲髻梳児露半􅁁臉児甜話児粘更宜煩惱更宜忺直恁凨流茜初生月児題情初生月児一似弓梦􅂻相逢恩愛同覺来時錦􅀍一半空去無踪難􅂯逢囱児外燭影揺紅初生月児懸太虛恰似嫦娥鬂上梳氷輪未滿羡歎處謾長吁􅄐恨苦冷清清鳯􅃗鸞􅀌初生月児一半彎一半􅇛圓只恁難雕鞍去後何日還捱更闌掩淚眼画簷外凭損䦨干初生月児明處少又􅀍浮雲􅃒蔽了香消燭㓕人静俏夜迢迢難睡着囱児外􅀨打芭蕉􅀄生月児一似鈎占㫁天香八月秋秋蝉鬂􅁁常見有掛着頭難􅂯収照人間萬種愁逰四門自娱野塘芲落杜鵑啼啼血送春㱕芲開不􅂸芲前酔酔􅂻又傷悲伊快活了是便宜桞綿飛盡緑􅁝垂只管送別􅄐年年拆盡依然翆行客㡬時囬伊快活了是便宜落紅滿地濕胭脂逰賞正直時呆才料不顧薔薇貪折海棠枝􅅓㧓破綉裙児海棠芲下月明時有約暗通私不甫􅀎等的紅児至欲審舊題詩支関上角門児前程萬里苦相傳今日果如然烟波名利雖榮顕何日是㱕年天杜宇枉熬煎琴書笔硯作生涯誰肯戀榮華有時相伴漁樵話興盡飲流霞咱不酔不囬家賞芲時全真道院去路崎嶇鳥道分人海滄􅃼鯨浪奔喧馬􅁕閙車塵麻姑咲哂落日又黄昏么金谷㸔芲梦􅂻身銅柱流芳􅁓上文􅀎黼黻㑹經綸先生議論少不的髙塜臥麒麟既悟死生機便得清閑分真乃是羲皇上人散誕似携家傍鹿門老生涯經卷爐薫么指乾坤作慢為䄄吸扶桒五色暾等待着黄粱飯滚碧桃春近大吹簫管上崑崙又應詔聘賢五彩雲開丹鳯楼萬雉城連白鷺洲天塹壮東流天長地乆今古帝王州么乕豹関深肅劍矛鵷鷺班趋拜冕旒廊廟総伊周青雲趂逐猶自臥林丘既奉紫􅅺宣合拂斑衣䄂正桂子西凨暮秋整頓着千尺􅁝綸一寸鈎咲談間釣出鰲頭公莫遅留壮志湏酬不負平生經濟手穩情􅂑金芲御酒銀章􅂵綬教人道鳯凰䑓上鳯凰逰
