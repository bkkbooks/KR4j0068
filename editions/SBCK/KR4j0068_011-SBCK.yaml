多情白粉郎盻殺玉婵姢苦痛哀憐思量起㡬時見駐馬聴正值着秋景金天良夜佳期難過遣光隂如箭蕭條􅄫寞索幽然你㸔這金風玉露暑方潜星橋月燭祥光現賀七夕翡翆軒穿針乞巧長生殿川撥棹他每􅀅彩樓􅆞綉重疊錦袋懸擺列着􅀲果新鮮酒泛如川更有這羙貌香嬌玉軟㸔星毬落照􅁁七弟兄俺可也意專性堅􅅡龍涎有他這十洲三島蓬莱院瀛洲方丈洞中玄更和這瑶池閬苑扶桒獻梅花酒我則見瑞氣蹁躚列着這粉席香筵緑嫩紅鮮翆幕樓前設盃盤酒饌豐陳􅀲果列竒鮮端的喜咲喧望牛女碧天􅁁鵲填河喜相連收江南呀這的是天星相㑹古今傳夫妻完聚羙團圎人間乞巧意無偏樂天長地逺則􅂅的延生益夀百千年尾且休説夫妻間阻天涯逺今日箇洞房相㑹芙蓉面俺如今福夀皆金則俺這羙滿夫妻再難􅃟新水令人月重圎恨相思長夜痛難熬眼睜睜梦魂顛倒則我這雲鬟無意整針線􅂴慵桃􅀅這寶鴨香燒空教我作念的眼皮児跳駐馬聴我如今每夜勤勞遥望蟾宫明月皎我􅀅這香焚烟裊騰騰瑞氣徹雲霄則􅂅俺姻縁重㑹鳳鸞交恩情羙滿人之道􅂅嫦娥心意表你團圎偏俺無着落沉酔東風往常時同宿在紗㡡絳綃慢施逞鳳友鸞交我愛他憐香惜玉心他重我閉月羞花貌俺也曽共交歡徹夜連宵端的他臥損香䄄翡翆巢俺可也共飲在蘭堂画閣攪箏琶好教我欣然咲不承望相㑹在今朝閑叙些間闊之情皆因是離多㑹少喒于今堅意放下頭稍准備今宵綉􅀍􅀩着我和你一夜不定交休要論好弱低髙川撥棹脱了這瑞雲綃鴛鴦􅀍重盖了簌下這錦帳鮫綃翆幙珠箔似戯水鴛鴦閗巧儘施呈不􅌒勞七弟兄則為他像貌俊俏更清標恰便似綉毬般上下多顛倒栁枝般風擺任􅁿揺吐櫻桃一􅀧微微咲梅花酒不由我逞艶嬌金鳳斜翹雲鬂鬆着粉汗胭消綉幃中成配偶鴛帳内鳳鸞交端的是兩意好似裵航遇藍橋成仙眷得功髙收江南呀可又早一宵春色潤胷消露滴花蕋動情髙兩情􅀷密不相饒這滋味更好􅂅天長地乆永和調新水令閨悶枕痕一線粉紅湮對鸞䑓不堪整頓萬花無意賞百鳥豈堪聞怕到黄昏又是我悶時分駐馬聴對景傷神雨打梨花􅀷閉門無言感恨又􅀍這烟迷楊栁暗消魂則我這憂愁折倒有誰論相思害殺無人問心内忖今春更比前春恨喬牌児任金爐沉水温銀䑓上燭花盡才郎别後絶音信這凄凉怎地忍鴈児落則聴的鶯聲嬌囀巧新燕語喃多半韻自别了有意人展轉的添愁悶得勝令呀桃花落紅雨遶堦痕梨花謝白雪滿園春海棠開雨過胭脂重荼䕷敗風催瓊玉損逡廵人逺天涯近慇懃情踈恩義真甜水令好着我眼角低垂眉尖頻蹙腰肢寛褪端的我無一日不思君這些時减盡了風流遭逢薄倖消磨淹潤懨懨的獨守閨門折桂令㸔何時暮雨朝雲愁的是鍾送黄昏怕的是鷄報清晨這些時􅂴上粧樓慵􅀅酒飲􅌒把香焚泪漣漣難施朱粉骨岩岩怎繋湘裙想當日同歩㝷春對面開樽㡬時􅀅連理􅀣重㘽比翼鳥温存尾聲他􅀅那盟山誓海全無准可着我呆荅孩心中自忖逐朝家盻望見無因每夜思量睡不稳新水令閨病枕痕一線界芙蓉悶懨懨似痴如梦别離容易捨相児甚時逢間阻匆匆傷感偶情動駐馬聴獨出房櫳閑歩瑶堦金釧鬆和誰相共千愁萬結惱人胷相思乆染病尤㐫多情反􅀍無情送喬閑人謊話児哄這其間無語傷情重鴈児落甚日箇得相逢銅雀宫見如今識破巫山梦􅀙去後䦨􅃢了謝氏舘這些時冷淡了天台洞得勝令呀空設着扎雀舊屏風鳳沼共焦桐我恰􅅻􅀅筆心方描寫不似崔徽画􅂻容花叢閗草何人共房櫳拈䦰誰與同川撥棹終日家似鎮風散烏雲腮半擁怕的是報曉晨鼕送晚昏鐘鐡馬玎􅭉何日得相偎相寵逩長安無路通七弟兄一㑹家晚風透櫳恨偏供㡬般児感起傷心痛瘦身軀猶似􅀑形容􅀍相思險把殘生送梅花酒但合眼梦􅂻逢恨燕侣鶯朋恠使蝶媒蜂隔山水重重無一語音通當􅀄也􅀅逺别呀敢曽有誓告蒼穹眼見的不志誠怕人知自推啞自推聾自屈指計前冬向画閣待東風􅀝朱䦨望青􅍡收江南呀成就了夫妻羙滿舊時同􅀙今畢罷恨綿業日踈日逺再相逢斯言也不空蘭房花燭百年榮新水令落紅風􅂻不聞聲嘆東君漸成薄倖􅁍艶冶又飄零葉底殘紅剛留住惜花性喬牌児對景愁倍増追思舊行􅈳蘇卿偏識臨川令俏心腸忒志誠風入松咲􅀅風月好前程付與俊書生柰青春庭院關不定􅀍東風吹滿宸京􅀮隠仙􅁎去也悠悠環珮無聲撥不㫁栁青青竹亭亭觀絶樓頭瀟瀟景想盡花間怯情添沉心上懨懨病􅁍只為㫁􅁫分鏡一綻銀􅄫􅄫黄昏户半扄獨立閑庭誰道一言永為定俺執手到數千囬剗地又􅀌另􅄐亭宴歇拍煞相逢常要西廂等到来不奉東墙令無言暗省秦樓何夕彩雲囬瑶琴昨日氷絃斷碧天今夜􅀌星耿露寒衣􅃑􅁿風定簾櫳靜偏覺更長漏永香肌不煖梦蝶魂月明應攪幽衾宿清燈偏照離鸞影誰􅀅才子情訴與佳人聴今夜􅂻休来俺梦境縱知道枕頭児单也填不的􅀍児冷新水令一春常費買花錢錦營中慣曽逰遍酒斟金叵羅人伴玉婵姢急管繁絃髙樓上恣歡宴駐馬聴驕馬吟鞭我是箇酒社詩壇小状元舞裙􅁔扇伴着箇風花雪月玉天仙我把紫霜毫書滿碧雲箋他撮着􅅺金䄂透徹紅絨線正當年一團児嬌艶堪人羡鴈児落蛾眉翡翆鈿玉腕黄金釧酥胷蘭麝香檀口丁香煎徳勝令因此上典賣了洛陽田重建座䴡春園安排下剪雪裁氷句准僃着尤雲殢雨言床􅁁放一􅃃崔氏春秋傳囱前横一幅􅀟生風月篇川撥棹􅂸了箇喫昏拳怕甚麽嚥頑涎割捨了銅斗児家縁鐡板児似盤􅆞便日用三千我其實少不得箇嬌滴滴玉人児過遣怕的是獨自眠七弟兄我這里告天可憐教我永團圎􅂅天公與我行方便地連枝産朶並頭蓮天比翼生對雙飛燕栂芲酒到夏来携手上採蓮船􅀲初剖水晶九酒新泛蓿砂煎魚旋打錦鱗鮮収江􅀯呀到秋来㸔四圍紅葉滿山川兩行翆䄂画堂前㸔一輪明月照天􅁁到冬来雪花児滿天蒸羊羔羙酒慶豐年尾聲四時獨占風流􅃟百年遂􅁍于飛􅂅常言道女貌郎才恨惹情牽􅀅一對羙滿姻縁萬載千秋教人做咲話児演新水令思慕㓜年間曽入錦雲鄉咲吟吟兩情歡暢今日箇􅀌眠獨自宿㡬時得歡㑹共成雙空教我曉夜思量離别意不承望駐馬聴俺也曽意惹情牽携手同行􅀅情意講則為俺風流情况到于今書齋獨守悶凄凉陽䑓無梦惱㐮王藍橋水泛疊千丈好教我空念想悶懨懨無語空惆悵川撥棹想着佳配鸞凰綉幃中春事賞准備着綉褥牙床􅀍刺鴛鴦並頭蓮同􅎞長俏姻縁天配上七弟兄想着那玉娘粉粧腕生香喜孜孜共賞銷金帳綉簾低嬌色配才郎羙甘甘不捨風流様栂芲酒思量羙艶粧慢慢的斟量不肯顛狂也不索荒唐俏風流旖旎嬌俊龎児顯髙强想着俺入蘭房同衾枕共鴛鴦金蓮瘦俏難量収江南呀我􅀅那殘花撇􅁍不思量則他這嬌紅一􅀧嫩生香恩情終日不􅀎忘心児中自想到来朝重㑹綉蘭房新水令和諧繡幃中重㑹雨雲情夜迢迢繡幃􅄫靜你㸔這銀蟾光皎潔玉兎射寒氷一任教徹囱櫺我和你同歡愛枕相並駐馬聴你㸔這和氣􅂬聲恰便似並􅎞蓮池一處生這的是今生佳慶鴛鴦交􅖪臥沙汀俺湏是風流一叚羙恩情􅀍児中恩愛常相敬􅀅風流事儘意逞􅂸今宵不捨無乾靜沉酔東凨我􅀅這綉􅀍児從頭児再整䄂稍児揩抹了幃屏重􅀅􅃢枕欹再把鮫綃定控金鈎簌下簾櫳趂着這良夜迢迢且受用一任教更長漏永鴈兒落者末你風流所事成則要你件件休薄倖你愛我方􅅻花蕋香我愛你一􅀧根苗正得勝令呀你可休風􅂻弄殘燈水面蕩浮萍我陪着數載真誠意更和這千嬌百媚生打迭起精神施展㑹風流性我為你心疼免不的到五更沽羙酒料今宵不暫停不歇􅂔到天明者莫你弄玉團香所事精休猜做充饑画餅料應咱敢相爭太平令我俏聲児全然不掙儘教他左右翻騰荒沒出腰肢迭併軟兀刺無言荅應呀呌一聲可憎是聴不要你慢停便死呵休惜一命新水令梨花夜雨未開門日遲遲緑囱人困鏡緘鸞未起香盡鴨猶温半晌􅎑身舒玉笋整蝉鬂駐馬聴春意猶昏楊栁青牽綿正滚香腮微印海棠横界線留痕目前春煖物華新意中人逺天涯近怨未伸枝頭春色三分褪喬牌児靈􅀛無定准喜鵲児少慿信􅀝䦨無語懨懨悶一春愁憔悴損鴈児落齊臻臻光消寶髻雲寛綽綽瘦掩羅衫褃碧幽幽天髙鴈少書緑湛湛水闊無魚信得勝令愁戚戚蕭索對清晨情黙默冷落坐黄昏悄促促翆掩合歡帳濕津津紅綃拭泪巾清黯黯消魂烟淡淡草際遥天盡昏􅃤􅃤傷神夜迢迢花殘過雨頻沽羙酒江分平緑草茵門半掩翆苔痕悄悄閑庭不見人無語自哂空目㫁楚䑓雲太平令恠則恠鸞凰生分惱則惱鶯燕爭春恨則恨心中有刃悔則悔言而無信想這厮背恩􅀒恩説着後一言難盡水仙子氣吁鸞影寳奩昏愁蹙蛾眉翆黛顰情随鴈是青霄近􅀝朱扉􅁒㫁魂䏻消得㡬箇青春恰透風光一陣春采度盡花容數本春先去人瘦三分折桂令春先去人瘦三分粧减了半面風流衣鬆了一捻精神歩紅塵愁踐紅芳上綉榻愁拈綉帖􅀝朱扉愁盻朱輪海棠困琴閑玉軫石榴皱人睡損羅裙愁思昏昏人事紛紛眼底卿卿心上人人尾来時跪􅂰児在床前問􅀅那厮謊舌頭裙刀児碎刎先􅀅他抛閃去的罪名児一件件招後把受用過凄凉一星星證了本新水令翆荷翻露碎珠璣一簾風藕花凉意林鶯嬌舞酔簾燕語還飛幽梦驚囬紗囱外半竿日駐馬聴緑栁枝垂飛絮􅅻沾燕嘴􅅺碧桃子墜殘花初醸􅁡蜂脾半囱竹射影風微滿庭風鼓松聲碎日遲遲曉粧䑓􅀷鎻人憔悴喬牌兒怕臨粧鏡􅂻不画逺山翆施朱付粉無心意難禁清泪洗鴈兒落倦聴的朱門外紫燕飛羞覩着碧沼内紅鴛戯􅂴簮的軃烏雲金鳳翹愁擁的翻錦浪霞綃􅀍得勝令最苦的是織囬錦竇滔妻酷害的是書險韻彩鸞􅁎渴想的是文君令琴中意􅀷悲的是班婕好扇上題空簌的羅幃懸隔的是殢夜月千㑹閑􅁍是香煤􅂴画是蹙春山一黛眉沽羙酒瑶琴上宫調稀寳䁀内􅂐烟微十二巫山雲梦迷翆雲屏倦􅀝寛掩過絳綃衣太平令行坐處似痴如酔挑綉處有心無意鎮日家揉眵抹淚㡬時得歡天喜地我這想起所爲見識多敢别做了乗龍嬌婿水仙子日斜楊栁乳鴉啼烟鎻梧桐綵鳳棲風恬菡蓞嬌鴛睡倚䦨干心萬里數歸期巳悮了歸期書不斷鴈来鴻去食不飡龍肝鳳髄味不甘熊掌駝蹄折桂令味不甘熊掌駝蹄身雖在賞月亭南心巳在落日關西芭蕉扇痩掩酥胷韮葉釧痩鬆氷腕藕􅁝裳瘦褪香肌鵾觔㫁􅅺金面琵琶倦理鳳頭閑紫瓊枝簫管慵吹彼􅀆身􅀆螓首蛾眉駟牡騑騑何日人歸尾聲不来時枉了閑淘􅂔来時節􅀙頭児整理先􅀅他頑耳朶着錐児剜後把他謊舌頭着綉針児刺新水令桂花凉露椘天秋瘦廉纎去年時􅀱詩題紅葉􅂴鏡拂翆鸞愁怕近粧樓薄羅衣晚風透駐馬聴凉思颼颼龍腦烟消閑玉斗秋容皱皺鴈行風急㫁銀鈎寂寞影對碧桐愁懨煎人比黄花瘦􅂴凝眸一天恨壓􅀟眉皱喬牌児泪淹羅䄂口鬂鬆寳􅁫溜逼人愁思捱昏晝天長和地乆鴈児落喜蛛児􅁝慢溜靈鵲児聲遥受梦魂児九遍㝷名姓児三畨呪得勝令揉泪眼把書修停心事整箏搊門半掩紅燈夜床空閑翆􅀍秋嬌羞閃不掉相思扣綢繆掙不脱恩愛韝沽羙酒􅅁太平令害的我瘦難禁珠臂鞲困壓損玉搔頭十二簾櫳不上鈎非關是病酒鎮日家苦僝僽相約在清明左右􅁍又早重陽前後他那里花成蜜就我這里緑消紅瘦這憂那愁怎休心和口自家窮究水仙子麝臍煤淡逺山秋􅆩髄朱勻滿鏡愁鴛鴦􅀍冷纎羅皱數歸期泪暗流惱愁懐萬緒千頭入綉户窺人霜月􅃻綉榻牽情露竹滴銅龍索命更籌折桂令滴銅龍索命更籌化鴛鴦忘想韓慿變蝴蝶怎做荘周呌不絶井露蛩螿絮不㫁寒堦蟋蟀臥不安􅀬地蜒蚰凄凉恨相關節一星星厮守相思梦厮廽避一處處空投俺念他線絍針頭他戀俺髙占鰲頭不付䏻放下眉頭􅁍又早掛在心頭尾聲来時節准備着閑爭閗玉纎手迎門便彀雖抓不着􅀒情背恩的心也摑綻他脱空賺人的口新水令梅花一夜漏春工隔紗囱暗香時送􅂐消金睡鴨簾捲綉蟠龍去鳳聲中又題覺半衾梦駐馬聴心事匆匆斜􅀝雲屏愁萬種􅁭懐冗冗半欹鴛枕恨千重金􅁫剪燭曉猶紅膽瓶盛水寒偏凍冷清清掩流蘇帳暖和誰共喬牌児悶懐􅀟泪湧恨鎻兩眉縦自從執手河梁送􅄐愁天地永鴈児落琴閑吳㸑桐簫歇秦䑓鳳歌停天上謡曲罷江南弄得勝令書信􅀉封封烟水隔重重夜月巴陵下秋風渭水東相逢枕上歡娛梦飄蓬天涯悵望中沽羙酒龍濤傾白玉鍾羊羔泛紫金觥獸炭添煤火正紅業身軀自擁聴門外雪花風太平令悔當日東墙窺宋有心教夫婿乗龍見如今天寒地凍知他共何人陪奉想這厮指空話空脱空巧舌頭􅀅人搬弄水仙子朔風掀倒椘王宫凍雨埋蔵神女峯雪雹打碎桃源洞冷丁丁總是空簌湘簾翆靄重重寫幽恨題殘春扇􅃻欎悶聴絶暮鐘數歸期曲損春葱折桂令數歸期曲損春葱魚􅀷潜鴨頭緑寒波鴈唳殘羊角轉旋風碎寒金照腕徒黄􅀵香鳥蔵烟近黒守宫砂􅀧臂猶紅雪一畨霰一陣時間驟擁雲一携雨一握何處行踪途路西東烟霧􅈚濛魂也難通梦也難通尾聲這􅁈讐懐恨千鈞重見時節心頭氣擁想盻的我腸㫁眼晴児穿直摑的他腮頬臉児腫新水令劉時中世無伯樂怨它誰枉送了挽塩車騏驥空懐伏􅇫心徒􅀒化龍威索甚傷悲用之行捨之棄駐馬聴玉鬣銀蹄再誰想三月㐮陽緑草齊雕鞍金轡再誰敢一鞭行色夕陽低花間不聴紫騮嘶帳前空嘆烏騅逝你命乖我自知眼見的千金駿骨無人貴鴈児落誰知你汗血功誰念你垂韁義誰憐你千里材誰識你千鈞力得勝令誰想你當日跳檀溪救先主出重圍誰念你单刀㑹上随着關羽羙良川扶持敬徳誰想到今日輸與驢騾隊有一日征敵㸔你那驢騾怎赴敵甜水令只為這乍冨児曺無知小軰一槩把人欺一迷里状躐􅁿踮胡奔亂走無休無繋不識尊卑折桂令致令的官府聞知驗數目存留分官品髙低准備着竹杖芒鞋免不得奔走驅馳再不敢鞭駿􅀐向街頭閙起則索扭蠻腰􅀅足下央及為此軰無知􅀅我也連累把我埋沒在蓬蒿坑䧟在汚􅅺尾有一等逞雄心屠户貪微利嚥饞涎豪客思佳味一地把性命圗􅃜百般的􅀅刑法凌遲唱道任意欺公全無道理􅀙今去誰買誰騎眼見的無客販無人喂便休説站驛難為則怕你東討西征那時節悔新水令雲囱秋梦玉簫吹斷鳳凰聲彩雲飛洞房人靜麝塵棲綉榻蛛網掛圍屏感嘆傷情又害起去年病駐馬聴燭暗銀檠瘦怯怯羞㸔和泪影梧飄金井淅零零怕聴斷腸聲冷清清羅帳内嫩寒生薄設設翆􅀍餘香剰急煎煎心意不相誠愁山悶海三千頃喬牌児猛可􅂻心内有也是我慣縦了他少年性一心児要嫁箇臨川令到如今不見影攪箏琶莫不是喬行􅈳流落在栁陣花營我這里雨澁雲慳他那里鶯招燕請拈數瓊簮心疼一緘書欲問千里情又只恐魚鴈無慿慶宣和翆幙低垂户半扄綉枕慵凭六幅鴛衾江􅁓般􅁿那冷冷沉酔東風明晃晃花前月明嚮􅃢􅃢竹外風聲凉夜天清秋景好教人對景傷情早是那神思昏昏睡不成但合眼是一箇相思病児境水仙子錦香亭下見多情携手在花隂移歩行悄聲児問罷低聲應春恣厮􅆞定兩情濃咲臉盈盈不付䏻同歡慶沒揣的魂梦醒端的是有影無形折桂令怕的是咭玎玎風擺簷鈴嚮璫璫鐘送黄昏撲鼕鼕鼓轉􅀄更韻悠悠砧杵凄凉鳴呀呀賔鴻嘹嚦絮叨叨促織児悲鳴聴一聲數一聲盻得来腦疼長吁氣短吁氣捱不到天明踈刺刺一㺯児秋聲悶懨懨長夜難熬急煎煎好梦児難成滴滴金想當日粉臉相偎玉手同携香肩厮並甜膩膩羙恩情到如今待月無期吹簫失伴吟詩無興獨自箇冷冷清清月上海棠梦児􅂻相見空傒倖覺後相思怨恨生打疊起愁懐花病強聲児扎掙徒悲哽舊歡娱如画餅想蘇卿枉接了馮魁定桂英錯受了王魁聘都一般語真誠恰怎麽偏他報應自思省怎柰他離愁越逞鴈児落三停刀割不開歡愛情九還丹醫不可腌􅧐證藕條􅁝織不成錦字詩鳳嘴膠粘不上菱花鏡得勝令梦児􅂻似天外㫁風箏人児去似井底墜銀瓶活􅉭刺此翼鳥分飛去亂忔荅同心􅅁結未成訴兩意雲情巫娥女傷􅀌另設海誓山盟椘陽䑓不志誠落梅風擔􅄫寞無伴等也是你命運中不幸正青春未曽立箇節婦名姻縁簿那里前定殿前歡瘦伶仃比離魂倩女不多爭一靈児似逰􅁝飛無定骨岩岩一捻身形困騰騰酒未醒呆荅孩把香奩凭慢欵欵把雲鬟整春山隱約秋水懵懂清江引錦薫籠未添黄串餅且對鸞䑓鏡愁添翆黛濃泪减􅀟眉靜瘦的那俊龎児沒了四星七弟兄猶古自半明不明枕前燈想着他多情多錯多薄倖自做下􅃜心㫁送了好前程枉教人惹下這等相思病梅花酒驀地自省暗地傷情暗地吞聲撲簌簌珠泪傾珠泪傾悶如縈悶如縈可曽經可曽􅀴這等冷清清收江南怨只怨憐新棄舊小牢成恰一似風中飛絮水中萍那一箇玉天仙引動他的魂靈知道是怎生不明白折倒了玉娉婷􅄐亭宴􅅁歇拍煞金爐火冷香烟盡紗囱月轉花揺影睡覺来把愁懐再整髙的離恨天􅀷的是憂愁海薄的是佳人命土木般神思昏鐡石似心腸硬也捱不得天長漏永活摘鳳凰心生撏鸚鵡翅扭㫁鴛鴦􅖪空餘待月心不慣偷香性比及見多情那生三竿日尚嬌眠五更鷄呌不醒新水令中州十九韻則他這項娘床上想郎歸嘆单寒晚間弹泪則因這憂愁猶舊有恨悶近新積一㑹家涕泣悲啼好着我臨衾枕甚心睡喬牌児這㡬日飯􅄿難食好着我焦懆號咷消耗體見如今精形零替歪揣歹瘵害衰脾俫瘸扯拽惹些疾貪婪俺感腌􅧐􅂔它麽陀我過失我可便怨先前展轉綿􅆞你沉酔東風我如今觀鸞伴團圞歡喜敬鶯朋情性誠實鴻賔群論陣随鳳友酒甌酧酔蜂媒随為羙追陪那一箇蝶使兹時自此離我與那燕侣處驅書去矣鴈児落那一箇賈大那花押催施二使咨辭􅀉譚慚减􅊥叅支四止時思憶得勝令鄔五母阻吾囬劉六舅誘你離你㸔那齊七妹催媒退怎當那夏八家把話譏尤九友羞歸季十妻提離異怎捨俺漢患難山西我可便懷揣孩来塞北沽羙酒到春来送東風融凍氷巨澍雨沐􅂼畦我可便靜聴鶯聲鳴影􅂻則我這私事似子規太平令他與我呼吾夫不如歸蝶歇柘斜遮葉宻燕沿椽旋填􅅺靠郊桃蕚凋落地盈嶺杏瓊英零替呀這朝晚日西酔囬倚閨扉睡起端的是衠混沌困人天氣川撥棹到夏来煔熖熖漸炎極夜歇些越􅀬逼我􅀅那圎扇搧肌徙􅂂披衣挐那􅀲食更整氷喫我恰便欵盤桓觀巒翫水㝷林䕃飲金盃七弟兄到秋来鴈囬燕歸蠏􅅻肥呼奴釡煮鱸魚鱠呌嫂鏖烙稻糕糜央娘湯盪香糧穂梅花酒到冬来冷清清景正凄送冬風凍松溪兩􅂣霜降桒堤雪踅些野斜飛挽欄杆㸔寒梅喜江南呀這一二日常常望想尚傷悲慇懃問信恨分離喜的期日你囬歸正房床帳􅂻我􅀅那􅀌獨苦椘訴夫知尾聲我那時立其媒你配咱你恰便下罷茶咱嫁你君進門婚姻謹畢我恰便貪奸汎濫俺含慙你恰便臨寝㝷媱恁􅀷喜新水令皇都元日欝葱佳氣藹寰區慶豐年太平時序民有感國無虞瞻仰皇都聖天子有百靈助攪箏琶江山富天下總欣伏忠孝寛仁雄文壮武㓛業振乾坤軍盡歡娱民亦安居軍民都托頼着我聖主福同樂蓬壷殿前歡賽唐虞大明至大古今無架海梁對着擎天柱玉􅅁金符慶風雲㑹龍虎萬户侯千鍾祿播四海光千古三陽交泰五榖時熟鴛鴦煞梅花枝上春光露椒盤杯􅂻香風度帳設鮫綃簾捲蝦􅂡唱道天賜長生人皆讃祝道徳巍巍衆臣等􅀩恩露拜舞嵩呼萬萬嵗當今聖明主新水令離别離鸞别鳳乆􅀴年一畨春一畨新怨青瑣畔綉幃前少箇婵姢酬不了少年􅂅鴈児落常想西湖􅋈画船北苑開春宴一聲金縷令七換梁州遍得勝令今日小亭軒羞對杏花􅁁黯黯愁成陣懨懨日勝年嫣然一咲春風面無縁燈前雲髻偏鴈児落春衫和泪穿猶認伊針線玉簫􅀷夜品多是君愁怨水仙子别来㡬見月児圎每為嫦娥惜少年画堂􅀷隔㫁歸来燕玉鈎閑簾未􅐈一天情着箇誰傳想一餉心間事寫一幅腸斷篇等一箇􅀌鴈囬旋鴈児落艶陽三月天夀酒筵前勸可憐張觧元不赴蟠桃宴掛玉鈎愛殺槎頭縮􅖪鯿皆上金盤薦咲殺池中並蒂蓮未許東風見援紫毫磨端硯屈曲銀鈎細草鸞牋尾聲沉沉烟鎖垂楊院遲遲月上桃花扇羅帕新詞聊􅀉情縁唱道張京兆心專周瓊􅁎苦意堅怕㡬陣東風吹落殘花片恁時緑暗紅嫣兀誰管春山翆眉淺新水令閨麗綉閨􅀷培養出牡丹芽控銀鈎綉簾不掛燕鶯逰上苑蝶梦遶東華富貴人家花隂内栁隂下喬木查忽地迎頭見咱嬌小心児􅂻怕厭地囬身攏鬂鴉傍䦨干行又羞􅀟臉烘霞攪箏琶我凝眸罷心内頑麻可知曲江頭三次遺鞭我粉墙外㡬乎墜馬人説觀自在活菩薩堪誇普陀山㡬曽到他更隔着海角天涯甜水令它秋水囬波春山揺翆芳心迎迓彼此各承荅詩句傳情琴聲寫恨衷情牽掛許多時不得歡洽鴈児落閗的滿街里閑磕牙待罷呵如何罷空揣着題詩玉板牋織錦香羅怕得勝令我是箇為客秀才家你是箇未嫁女嬌娃不是􅀅海鶴児相埋怨休把這􅁓鷂児厮調發若是真箇回與我句實誠的話天呵送了人呵不是耍􅄐亭宴煞只因你擔不下觧合的心腸児义不是我口不嚴表􅀭的風聲児大佇頭慿䦨一日三衙唱道成時節准備着小意児粧鰕不成時怎肯呆心児跳塔哎你箇吃戯􅁈家来来来􅀅人休量抺我不是井底鳴蛙我是箇花栁營中慣􅀾馬新水令西湖四時湖水鏡無瑕布江山自然如画雄宴賞足奢華人不奢華山共水本無價慶東原暖日宜乗轎春風堪馭馬恰寒食早有二百處鞦韆架向人嬌的是杏花撲人衣的是栁花迎人咲的是桃花来往画船逰招颭青旗掛早郷詞納凉時波漲沙滿湖中芰荷蒹葭用金杯斟玉斚恁般樓䑓最宜夏也子索輸與他沉李浮􅀲掛玉鈎曲岸􅀴霜落翆華誰道秋蕭洒㝡好是西湖賣酒家黄菊綻東籬下自立冬交殘臘有雪片也似江梅血􅀧也似山茶石竹花錦綉錢塘十萬家画㦸簮纓官宦家百􅀊􅀎熬得㡬多暇可惜韶華過了他山石榴櫓摇摇聲咿啞繁華一梦天来大風物遂人心虚名爭甚那􅀌舟駕功名已在漁樵話更飲三杯罷酔娘子真箇是酔也麻沙咲指南山􅁍道西樓真箇是酔也麻沙駙馬還朝想像間神仙宫􅀋舘娃俯仰間飛来峯勝巫峽恰道仙翁􅁑氏家數􅀧林鶯勝丹砂胡十八雲外塔岸􅁁霞橋上客􅀣頭鴉水村山舘日斜掛老子酔麻疑閬苑勝浮槎一錠銀欲向中原力不加嚢篋消乏直等的男婚女嫁恁時節􅁍歸林下阿納忽山上種些桒麻湖上覔些生涯枕上聴些鼓吹鳴蛙江上聴甚琵琶尾聲漁村偏喜添鵝鴨柴門鎮掩絶車馬竹引清泉􅂦試雷芽唱道但得􅀌山㝷梅處苫㡬間茆厦靠着林和靖是隣家喝口水在西湖快活煞新水令閨情枕痕一線粉香殘寳􅁫横緑雲低軃粧慵鸞鏡掩人去鳳衾单悶􅀝䦨干無語㡬長嘆駐馬聴蝶僽蜂僝芳草天涯春事晚鶯慵燕􅂴杏花簾幙雨聲寒秦樓寂寞玉簫閑椘䑓容易朝雲散乍離别􅀴這畨恁般懊惱誰曽慣喬牌児行時思坐不安所事児怕干犯多情反受風流難舊愁積新恨儧鴈児落翆减了修眉栁葉彎香消了嬌臉桃花瓣寛褪了纎腰翡翆裙鬆綽了縷􅅁鮫綃襻得勝令自􅀙那花底唱陽關栁下送征鞍􅀴了些夜月􅀌幃靜望不見天涯一鴈還㸔㸔業眼児熬清旦澘澘泪珠児落夜䦨甜水令常記的白雪􅁿謳金杯滿泛紅牙低按私語燭花殘到如今好梦全無佳期易阻相思成患平白的廢寝忘飡折桂令望藍橋逺似三山烟水迷􅃼道路艱難瓶墜簮折風酸月苦雨澁雲慳長攙攙連理􅀣柔條盡剷磣可可比目魚活水􅀅乾他性格奸頑不􅀉平安章䑓栁恣意留連蟾宫桂未許躋攀随煞怕的是無情􅀊月相催儧容易去何年重返賈充宅韓􅁺見應難天台路劉郎到来晚新水令憶楊妃翆鸞無路到南柯玉簫閑彩雲零落慵斟和泪酒􅂴聴㫁腸歌卿呵你問今日如何更愁似夜来箇駐馬聴不為那楊栁情多怯暮雨渾同人嬝娜梧桐葉堕蕩西風特似命􅁿薄荒墳空對馬嵬坡珠簾巳閑朝元閣恨無聊㸔玉容何處添寂寞落梅風他俺行随機應變他行乞命児活怎下的活支煞的眼前折挫那的是寡人承謝它把箇無投逩的帝王饒過鴈児落您早則㫁絶了心上火您早則剪除了宫中禍您早則掀騰了枕畔情俺早抛持了舌尖上唾得勝令切齒恨干戈無心􅃟嬪娥恨望終朝盡悲啼半夜過常和妃子同衾臥我也難和别人擁􅀍窩殿前懽這煩惱怎消磨想温泉直恁是非多􅁍甚風恬浪靜人亡過好不分箇清濁一尺水二尺波閙穣穣空惹箇雄紏紏威風大則近的三千粉黛􅁍近不得百二山河七煞尾不問羯鼓習天樂空驚虎旅鳴宵臥太平歌憶當時偶然潼關破日夜和奪不免的幸西蜀劒嶺嵳峩海棠正煖東風馬頭前蹙損雙蛾黃塵埋綺羅兩鬂巳成皤俺也曽香腮偎定芙蓉蕚朱唇温柔櫻桃顆川撥棹當夜對銀河女牛星恰㑹合正人態柔和伴月影婆娑俏分金􅁫鈿盒望愽箇死生縁無間闊鴛鴦煞尾近􅌐山冉冉隂雲磨暗華清慘慘寒烟鎖神思昏沉􅀑病􅆞縛唱道薄倖堪憎㸔承的人小可這無主倚的君王雖然想着那好處及多卿呵也合梦児㸔􅀅節来􅊥覷着我新水令禄山憶楊妃舞腰寛褪􅁦貂衣害得人死臨侵一􅁝兩氣您那里雲作垜綉成堆毎日家眼迷奚全不想洗児㑹駐馬聴想今日别離少半是君王多半是你你舊時標息九分来消瘦一分肥秋風空使景狼藉青天不管人憔悴光隂雖去急俺歸心更􅂃似西風日落梅風往常時胖得来無把背如今瘦得来􅑯恁地想綉幃中一畨家喬勢具濃時最嫌的是肥財皮若是再相逢早得百無阻􅆡鴈児落再㡬時偷斟鸚鵡杯再㡬時重配鸞凰對再㡬時同偎孔雀屏再㡬時共擁鴛鴦􅀍得勝令恨别鳥替人悲思郷馬頻嘶􅀉信魚難到傳情鴈不歸别離夜月人千里相偎春風玉一圍七煞胡笳韻起聞知酔玉簫聲斷㝷無跡太平歌琵琶曲盡弹絶淚嘆零落棲遲觸目總堪傷逈野荒陂誰知你在那神仙化樂天宫内遣俺入烟􅁁塞週廽何日銷金帳底得赴隔年期三煞俺無縁赴稳私情龍虎風雲㑹有分擁離愁金鼓旌旗隊川撥棹恰到日平西對長安一嘆息見霜草凄迷烟􅀣依稀望不盡千山萬水恨不得上青霄登玉梯鴛鴦尾煞彩雲縦赴槐安􅀦早黄塵依舊陽關曲見目下縈損枕上禁持唱道有始無終多虚少實據任無心成佳配白甚驅馳把似一就休来梦児􅂻新水令閨情􅀟峯毛舜臣作碧紗囱外曉鶯啼斷腸聲擾人春睡魔軍􅅻待遣病􅄦又相欺展轉追逼甞盡惡滋味駐馬聴􅀧檢芳菲花落花開紅雨洗安排憔悴􅀣頭􅀣底緑雲垂戈矛難敵恨鋒機參芩不􅀘愁腸胃恨和愁甚道理百般的不准人央及鴈児落擔閣了迎風待月期錯誤了捉雨挐雲計䦨􅃢了憐香惜玉心翻悔了赫􅀑瞞神誓得勝令呀這些時消瘦不勝衣憂悶竟忘食護短嫌人問着迷只自知歡嬉往常間語話甜如􅁡别離近新来恩情冷似石川撥棹我則索强支持狠相思透骨髄這些時蹙損蛾眉减削香肌獨守􅀌幃靜掩􅀷閨咫尺間關山萬里又一春虚度矣七弟兄一㑹家暗疑痛悲受岑寂這早晚雕鞍寳馬在誰家繫到頭羙滿且休題臨行嘱付全不記梅花酒呀知他是虚共實憶素手相携曽􅀬臉相偎更寸歩相随連枝􅀣該並活比翼鳥定同棲不承望􅁿棄擲去箭也怎攔回覆水也怎收拾斷梗無再生時破甑無再完日收江南呀為甚麽王孫一去不思歸天涯芳草怨萋萋把生綃一幅寫還題㡬度價泪垂画中人不似舊崔徽新水令念逺燒痕回緑遍天涯憶王孫去時殘臘愁垂簷外雨憂損鏡中花掘土摶沙感事自驚訝駐馬聴望眼巴巴春陌香塵迷去馬梦魂颯颯曉囱初日閙啼鴉千聲作念湊嗟呀一􅁝情景留牽掛許歸期全是假秀才每説謊天来大喬牌児綉雙飛線脚差描並宿筆尖怕牡丹亭閑􅁍鞦韆架好春光誰共耍落梅風肌消玉臉褪霞怎打熬九秋三夏􅀍薄賺的􅀌又寡辜􅀒了小喬初嫁鳫児落誰攔截巫女峽誰改變崔徽画誰糊突漢上衿誰扯破秋雲帕得勝令身似井中蛙命似釡中蝦難把猿心鎖空􅀅䳌泪洒情雜下不的題着他名児罵性猾恨不的揪住他身子打甜水令馬上墙頭月底星前囱間簾下容易得歡洽案舉齊眉􅅁綰同心􅁫留結髪那曽有一􅀧児䙝狎折桂令好姻縁兩意相荅你本是秋水無塵我本是羙玉無瑕十字為媒又不圗紅定黄茶我不學普救寺幽期調發你怎犯海神祠􅀒意折罰生也因他死也因他恩愛人児歡喜􅁈家錦上花想着他錦綉充腸諸餘俊雅山海填胷􅀁事撑逹花下低頭風吹㡌紗月底潜踪露濕羅韈朱絃續有時寳劒配無價求似神仙信似菩蕯􅅻得相逢撲絮納􅀲恰早分離瓶沉珠撒清江引一聲去也沒亂殺少㡬句叮嚀話説歸甚日歸待罷何時罷梦児中見他剛半霎􅄐亭宴歇拍煞狂風飄散鴛鴦瓦嚴霜冷透鸞凰榻好教我如痴似啞佳期絶往来後約無慿凖前語皆欺詐空傳紅葉詩枉卜金錢卦凄凉日加燕驚飛張氏樓犬吠斷韓生宅虎攔住蕭郎駕悶随秋夜長情逐春氷化待他見咱􅄸他那狠罪過有千樁害的我這瘦骨頭沒一把新水令祿山梦楊妃駕着五雲軒飛上月宫来別是重境界却便似春氷籠宇宙秋水滿楼䑓虚説一座閬苑蓬莱便有也難賽凨入松瑞簾丹桂冷凨篩掃盡繊埃水晶簾晃珍珠額迸寒光玉砌瑶堦為惜中秋夜色微雨浄天街万花方三䑓忽然金􅊴門開奏樂聲一􅂀素娥仙􅃑兩􅁁排莫􅀅舞䄂􅁿􅎑雖無百寶粧腰帶趂霓裳節輳和諧帝王黙記心懐見精神有情無奈尾廣寒一見神仙態把六宫中許多恩愛都撇在九霄雲外新水令十羙人慶賞牡丹園牡丹亭上日遅遲愽山銅􅂐香凨細栁垂金瑣暗芲壓玉䦨低睡􅁕羅幃斜倚朱扉整頓春衣巧画蛾眉恰出香閨是誰人􅀅俺名題喚一聲玉天仙有何意慶宣和欵撒金蓮歩懶移翆擁紅堆我這􅂻􅋉掲朱簾問是誰却元来是你是你喬牌兒相别纔数日迅􅃌又重㑹瑤池金母群仙隊飲瓊􅀅斟玉液鴻門奏凱歌這一箇出銅光的酸似虀這一箇傲雪冷的甜如􅁡這一箇辟麝香辣味多這一箇生淡脆的先春意想着那天生物不偏欹兼羙􅁖得春暉這便是荆棘同蘭葸瓊瑤伴瓦石想人事何疑有君子便有那憸邪軰􅀅天理相推有忠良便有那謟䛕的甜水令俺拜謝􅀷恩仰荷光榮恭承嘉意㸔歌舞樂聲齊向玳瑁筵前散滿天香飄然衣􅃑髙擎着獻夀金杯天香引髙擎着献夀金盃奏的是錦瑟鸞笙鳯管龍􅅇玉盎蟠桃金盂火􅀥寳􅂦交梨萬萬春福如海比千千年夀與山齊縹緲衣佇立丹墀拂綽香塵献舞瑤池川撥棹愛的是值春暉暖融融凨日羙音樂相随羯鼓頻催喜遇生日慶㑹筵席膏雨繊㣲養芲天氣更遇着主人慇懃種植是扵俺正合宜七弟兄更有舞的唱的㸔芲的賞名園每日醺醺酔有歡有喜有相知無憂無慮無縈繫梅花酒似今日快樂期正中􅀦雍熈值采鳯来儀㸔祥瑞雲集五榖収百姓喜八表静四夷㱕牡丹芲茂盛得荷主人㑹㘽培滋飬的􅀣豐肥保護的不折􅃜􅀎接換善分移収江南因此上牡丹嬌艶逞芳菲感主人雨露四時齊駐紅顔乆逺壮宫闈俺這􅂻謝的十羙人青簡内永標題尾謝天仙賜與多嬌媚生長在名園上􅀦増羙艶向三春永合歡樂千紀新水令堵察善良聴楼頭画鼓打三更綉圍中枕餘衾剰明朗朗囱外月昏慘慘榻前燈空倚幃屏簷間鉄好難聴駐馬聴盻殺我也璫璫玎玎你便是􅂯出世的陳摶也睡不成度一宵如同百嵗捱一朝勝似三春金爐香盡酒􅀄醒􅀌眠那怕心腸硬誰慣經相思最是難熬的症喬牌兒一㑹家睡不着獨自箇寢非干是咱薄倖沒来由簮折瓶墜井􅀅鴛鴦兩下分雁兒落常想着芲前携手行月下肩相並羅衾翻浪紅玉腕相交㝎徳勝令眉黛逺山青桃臉嵌朱唇楊栁腰肢瘦青螺髻挽雲天生下精神十指繊繊嫰描不就丹青比觀音少净瓶川撥棹不由我淚盈盈聴長空􅀌鴈聲暫出門庭聴我叮嚀自别多情雁兒我其實捱不過衾寒枕冷相思病疾漸沉七弟兄雁兒你却是怎生暫停聴我訴􅄐情一封書與你牢拴㝎快疾􅋉飛過蓼花汀那人家寢睡長門静梅花酒你與我呀呀呀呌㡬聲驚起那人聴說起咱姓名他自有人相通􅀙別後不見影閃得人丧了魂靈羅幃中愁怎禁只爲他掛心情朝忘飡淚如傾曲慵唱酒慵斟収江南雁也可隣見今宵獨自冷清清你與我疾囬疾轉莫消停山遥水逺殺勞神趂天色未明只休要等閑㝷便宿沙汀尾你是必休辭雲濃凨力緊我這􅂻盻伊醫治相思病傳示與俺可意情人休辜負海􅊎山盟唱道性命也似㸔承心肝兒般欽敬准俻你鵬程我這􅂻獨守慢慢的等新水令鳯凰䑓上憶吹簫似錢塘梦魂􅀄覺芲月友鳯鸞交半世踈狂總做了一塲懊駐馬聴黄詔奢豪桒木剣熬乏古㝎刀双郎傘薄􅁓糊鍬撅了􅀧剛鍬怕不待争鋒􅂑債戀多嬌又索書名画字㝷人保枉徒勞供錢買咲教人咲落梅凨姨夫閙咱便曉君子不奪人之好他攬㝎磨杆兒誇俊俏推不動磨杆兒上自吊步歩嬌積攅下三十兩通行雅青鈔買􅂑箇大笠子粗麻􅇁每日粧甚麽眼見的和契丹交雖是不凨騷不到的着圏套甜水令佳人有意郎君俏郎君無鈔鶯芲惱如今的惜芲人㺯巧􅃌不過羙話兒排虚科兒套實心兒少想着月下情星前約是則是芲木􅀲兒㸔好李亜仙􅀒心的疾鄭元和下畨的早
