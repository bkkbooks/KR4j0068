㫁梦勞魂惹僝僽端的是玉價慣酧香縁慣修誰敢試㺯玉摶香手一枝花贈小園春些些並蒂紅指指連枝翆慳慳金谷路窄窄五陵溪一片芲飛泄漏春消息舞盤中歌扇底刮得盡凨月無多䟎得過繁華有㡬梁州一兩箇鶯儔燕侣五七雙蝶使蜂媒窖来寛也稱逰人戯眼空大劉晨未識脚步長杜甫先迷画幀上香銷粉滴鏡奩中緑暗紅稀唾津兒浸滿盆池手心兒擎得起屏石苔錢兒買不㫁閑愁芲瓣兒随手着流水栁絲兒送不勾別離錦堆翆積海棠偷足相思睡名偏小景偏媚賺得東君子忍㱕一撮兒芳菲餘音楚陽䑓雲雨無三尺桃源洞光隂减九十玉拶香挨這窩兒地堪信道一寸隂可惜千金價総宜錦歩障何湏五十里一枝花贈李素蘭散清凨烟月中逞素質凨塵内染一枝春色淡攅兩葉翆痕低束具含犀另一種凨流意比羣芳分外竒俏如蓀名重秦楼嬌似芷聲揚楚國梁州天謫下仙葩聖卉世修来雪骨氷肌等閑誰許問容易玉盤兒生長錦窖兒㘽培影雙雙連理葉小小菩提幽齋結珮相宜賞蘭亭修禊閑題胭脂瓣洗渲浄天香金芲粉調和成玉蕋素檀心抽㨂出柔荑巧移俏植舞蹲一捻腰肢細觧人意咲殺春凨不敢吹種種相宜尾並頭蓮合歡草多清致如意朶珊瑚枝有價值痩影清香足凨味海棠嬌莫比芙蓉色怎及雪窓下玲瓏鏡兒裡一枝花妓名玉馬杓楚人抱着愁宋客㸔着愛碾開如意寳琢就可憎才舀盡江淮成器許凨流債尊前日月捱謁漿也崔護曽拈市酒也相如慣索梁州品藻如鴻門斗窄聲價似北斗髙開等閑誰許沉浮態臨卭滌器陋巷傳来許由不認西子驚猜潤如脂一種紅白巧如瓢一担身材瑪瑙盤莫勝精神玻璃盞難同骨格水晶盂怎比顔色價擡様改有斟量無疵多禁耐鷺鷥腦鳳凰額曽向秦楼酔李白換骨移胎尾敲着昏不許俫兒買磕着睡常防阿母猜翆釜銀瓶謾矜賽掌中擎不側心頭放不歪䡖重郎君莫橔摔一枝花贈張寸金兒西方列宿名南土真佛像羞沾牛尾汚愁認馬蹄香媚𬗋嬌黄曽選到燕臺上十分標一寸長四不知䄂兒裡楊震偷携兩不碩菜畦畔管寜謾想梁州籝中滿怕損志㢘夫盡棄床頭盡暗消䰟壮士傾嚢一星星買㫁了平康巷舞腰束繊繊絶質歌謳按縷縷宫啇撥得軟温柔性格煉不灰可喜心腸神仙指石似端詳郎君愛寳似収蔵棗瓤堅香撲撲別􅍢對蜂蝶葉子窄明整整生銷對鳳凰錢兒沉熱愽愽另鑄對鴛鴦咲試将麝蘭熏鉛粉鍍胭脂搶足顔色巧模様瑞玉神珠総莫償麗水明粧尾鮑叔子受貧也分得心先痒直不疑守困也誣着意早荒一尺恩情索還丈石盤似品量等盤似較量一咲湏值價萬兩一枝花妓名張道姑風塵素凈身烟月清閑字鶯芲壇上友歌舞洞中師積善因慈守一點全真志扣玄關仗力持用偎紅倚翆工夫受惜玉憐香籙㫖梁州演歩虚輕敲檀板鍊華池浄洗胭脂逺山林隱閤閨知街市不跨鶴超凢小小不乗鸞得道師師慣棄俗纒頭紅錦慣出家買咲金貲凨流客普化相思踈狂士稽首相辭碧玉簮芙蓉冠新入箇名流青霞帔逍遥服別生箇様子黄金鍾蕋珠經另打箇腔兒念兹在兹心中猿意内馬情無二多財捨有緣施誰種紅蓮火裏枝朶朶靈芝尾叅禮透朝雲暮雨情如𥿄戒得㫁酒病芲愁氣似絲修飬出手標更誰似蓬莱山降賜蟠桃㑹宴侍再謫下箇神仙度脫你一枝花悲歡離合阻鶯朋隔燕儔折鸞對分鴛伴並頭蓮和蒂撅連理樹帶根剜愁思漫漫圗画無心玩詩書沒意觀相思病瘦得假遍軆尫羸離恨苦愁的来一懐痛滿梁州怎知他将方勝書傳黄犬把同心信付青鸞今朝復㑹来相喚我因他恩濃意厚性耐情寛語甜話羙表正形端謝穹蒼幸得團圞喜今宵復㑹盤桓羅幃間憐香心撫恤的恩濃綉衾中雨雲情温存的意欵鴛枕上別離言訴說的心酸愁懐㡬般光隂屈指從頭算自別離整年半今夜綢繆情更完萬喜千歡尾譙楼三㺯梅芲管更鼔聲殘漏點攅囱外晨雞聞啼亂殘星沉玉丸太陽升赤盤訴不盡愁懐夜兒短一枝花詠妓綰烏雲髻巧盤蹙翆黛眉輕掃粉香生肌凝雪紅暈展臉舒桃一撮兒妖嬈十指春䓤弱雙眸秋水遥點胭脂檀口勻圎襯羅韈金蓮窄小梁州錦香囊髙懸翆襖象牙梳斜襯金翹㸔不盡天然俏蘭心蕙性智慧良標形儀窈窕軆様苗條小年紀二八𥘉交更通媒壓類欺曹唱一只遏行雲曲韻傳情舞一只回白雪宫腰㺯巧咲一只墜春芲俏靨生嬌停睛覷了有名旦色傾城貌忒凨流那嬌少者麽丹青手叚髙難画難描賺尾他比那巫山神女猶多好越國西施更又髙我這裡口内無言自思度休道是白日間伴着黒夜裡搂着覷一覷平生碩足了一枝花中州十九韻運春雲陣陣消熈麗日遅遅照送東凨融瓏凍濡澍雨入墟郊嶺嵿亭勝景清標恰那荅搯芲草踅這些扯柘條翫巒湍疃畔盤桓㸔山澗潺湲謾遶梁州第七覽巉嵒含嵐暗黲覘瞻㶄㶑灔添濤岑林森䕃禽音冷蜓爭迎凨蝶熱斜飄蜂叢桶洞燕穿椽巢摘崖外彩色開桃良田前纒穿殷苗逰人每傍岡庄強将觴穣唱楊公子們聚樹墅據蹴踘舒軀足巧佳人每靠夭桃掿鮫綃咲貌妖嬈它歌我嘲酧甌酒友楼頭樂開懐再歪咲自使厮兒資餉殽魚煑猪爊隔尾停生冷静箏聲悄檀板䦨珊懶旦敲傀儡累垂酔回跳胡顧姑舞着楊娼娘唱着直喫的酩酊倰儯更傾酌罵玉郎急回日巳西低落我這裡牽騸蹇沿田甸轉前濠臨岑心沁鷣禽呌見了些瀾灘綰棧山彎還道感皇恩呀使支侍兒曹遇出入漁樵驀過那塜東峰崆峒洞壠中橋拖矬騾我鎻把滑馬他縛我這裡觀湍鸛翫磐彎喚巒鶴採茶歌恁将這履藜携几棋提杯罍食壘委誰挑我在這岫囿洲疇逰勾了到家中進門混沌困春宵尾更有這助扶諸女除予帽做夥多娥脫我𫀆攬藍衫觧絛倘房床枕錦貂掩簷簾遮槅箔蠟華芲香尚燒更聲停漏籌􅌳動銅鍾咂画角譙楼上五鼔餘足女奴報他道是明星升正髙缺月斜趄倒更聴的籬底栖雞起啼曉一枝花激冲弟費盡了我同胞一軆心激不起你好學修身志恨不的手推上攀蟾路頭頂在上天梯怎不㝷思見如今五旬慈母先抛棄七十嚴親鬂巳絲又不是痴䏊喑啞成殘疾又無有差使田粮苦氣力又不索鑿壁嚢螢見放着明囱净几梁州眼前多少傍州例勤學的千人敬仰不學的一事無知勤學的光顯宗親不學的顛連妻子勤學的如金如玉不學的如土如泥縦不如程夫子道徳齊髙也湏學蘇學士文章並羙再不能呵也學那宋状元科甲聮題說時勸時千言萬語淘乾了氣待重呵又怕傷恩義待輕呵公然四不知只怕你悔後耶遅尾你試㸔滔滔白日難拴繫我只怕湛湛青天不可欺怎生般叅不透其中意若既肯奮志呵在你若不肯奮志在你莫教我忍氣吞聲直怨到死一枝花過寳應湖口白𥻘𥻘萬頃波緑湛湛千層浪漫攸攸通百越翻滚滚帶三江灝瀚汪洋浴日月烟霞上浸山川宇宙傍亂參差蓼岸蘋洲爭上下蘭橈画槳梁州舉頭四顧無邊量東望呵扶桑曉氣蒸霞赤西望呵華岳晴雲帶日黄南望呵翠重重五嶺連蠻國圵望呵紫靄靄全燕擁淮漢外閑水倚帝鄊更着那辱雲孤起漢外楼臺鰲背穏蔵眼前城郭颶凨恬送水面㠶樯夕陽晚凉柁楼閑倚舒懐况楊栁岸荷芲塘信是人間雲水鄊鷗鷺翺翔尾聲恰便似水晶宫闕無屏障太乙仙舟泛渺茫採蓮人来往齊歌唱酌流霞滿觴祝髙堂夀康他日到臯蘭做話兒講
