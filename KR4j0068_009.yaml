front:
  text: 雍熙樂府卷之九南吕
  hash: sha256:4256fa19e6e036e96b8805ac3be5e35ac32e059437a7673189636e96544bf811
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_009-1a}
body:
  text: 一枝花威武乾坤旺氣髙日月光明照衆星拱北極萬象應皇朝雨順風調國泰民安樂各偏邦來進朝享宗廟社稷威靈差遣祭名山華嶽梁州保山河公侯勇烈定邊強直正臣僚有仁有德行中道齊家盡孝報國臨朝擎天妙䇿濟世功勞退姦邪選用英豪進賢能施展才學領雄兵南北無敵布勇猛東西戰討用三軍跨海征遼帥領將校行兵布陳依三略但到處尅伏了盡按著孫吳運六韜蓋世功勞尾聲西戎東虜歸伏了北狄南蠻賀聖朝萬國千邦盡來到各分他品爵丹墀內列著齊上當今謝恩表一枝花初夏池塘中睡錦鴛樓閣上飛雙燕紅榴招戲蝶緑桞噪新蟬葵綻階前竹笋侵墻串泉流草徑邉緑茸茸莎展青氊密匝匝苔鋪著翆蘚梁州荼􅐘架隂稀日轉木香棚影密風搧消磨暑氣把香醪勸有氷沉果木香爇龍涎有知心朋友歌舞嬋姢盡開懷語笑聲喧任披襟撒髮掀髯看蜻蜓菡蓞初開隱逰魚浮萍乍展托青蛙荷葉才圓登臨畫船趂薰風撲入在垂陽院對此景可堪羡慢把金樽淺淺斟盞盞垂􅘟尾聲一彎新月添情􅌒十里香風助酒筵向曉歸來小庭院簟紋鋪水淵紗㡡在路邊一枕珊瑚夢魂逺一枝花間阻風吹散楚岫雲水淹斷藍橋路硬分開鶯燕友生拆散鳳鸞雛想起當初止望待常相聚誰承望好姻緣邅間阻月初圎忽被隂雲花正發頻邅著驟雨梁州他為我在畫閣中􅌒拈針指我因他在緑囱前懶看詩書近新來不由我心憂慮這些時琴間雁足歌歇驪珠我神心恍惚更和這鬼病揶揄望夕陽對景嗟吁倚危樓朝夕躊蹰我我我覷不的小池中一來一往交􅖪鴛鴦我我我聽不的踈林外一遞一聲啼紅杜宇我我我看不的畫簷間一上一下閗巧蜘蛛景物太毒蜘蛛絲一絲絲又𬒳那風吹去杜宇聲一聲聲喚不住鴛鴦對一對對分飛各趂逐不由我感嘆嗟吁尾聲幾時能勾那柔條兒栽接上連枝樹䁔水重溫比目魚那的是著人腸斷處囱兒外夜雨枕邊廂淚珠知我這一點芳心做不的主一枝花志士未遇飄零在海角邊流落在天涯外論文無故友仗義有英才運拙時乖虎瘦雄心在休將人一例猜志髙如西嶽巔峯量寬似東洋大海梁州誰承望花正發風狂雨驟月𥘉圎霧鎖雲埋聖人道歲寒然後知松柏憑著我胸懷星斗志􅐈江淮心藏錦繡口吐文才為功名逺逺而來嘆踈貧朽木之材休休休那一箇肯學那龎居士濟困扶危恁恁恁則待學費無忌輕賢重色是是是那一箇肯學那孟嘗君仗義踈財見來痛哉屈沉殺乘鸞跨鳳攀蟾客時不來且寧奈有一日金榜將咱名姓開那時節苦盡甘來尾聲讀毛詩知禮記春秋册我是箇逹書易庸學語孟白得換箇紫羅襴白象簡黃金帶那時節快哉樂哉不枉了寒窗下辛勤二十載一枝花叔寶不伏老箭空攢白鳳翎弓間挂烏龍角土培了金鎖鎧塵蒙了錦征𫀆空喂的戰馬咆哮劈楞簡生踈了那的是我心內憔多不到五七載其髙不能勾惡狠狠沙場上戰討梁州如今但做夢我和那敵軍兩箇對壘不甫能才睡著撲刺刺戰馬相交則見篩日影滴溜溜繡幕翩翻我則見忽刺刺雜彩旗搖急煎煎心癢難揉往常時我也曾遇水疊橋往常時俺逢山呵便開道今日箇老來也天那剗地著我央别人跨海征遼悶懷怎消這其間病體兒依然較自暗約枉醫療如今那肅殺秋風動瘡越發作好教我疼痛難熬牧羊關我和那胡敬德初相見在美良川俺兩箇厮撞著我和他比試一箇好弱低髙他將那虎眼鞭忙來擊我將這劈楞簡急架却得空便難躲閃待相饒可便怎相饒我甫能搜搜兩簡方將中他可便騰便騰復三鞭還的巧尾聲那簡却便似一條銀蠎除了鱗角那鞭恰便似半截烏龍去了牙爪遙望見簡去鞭來撲撲的腦門挑休道是正著但些兒抹著便就是鐡臂銅頭也震碎了一枝花贈武臣銀磨鳳翅盔玉碾獅蠻帶黃金鎖子鎧蜀錦戰𫀆裁梁棟之材入朝相出朝帥展英雄顯氣槩論英雄勝宋國文山説英勇如胡公大海梁州敕第居錦禋繡褥列簮纓畫戟門排衣冠濟楚名尊大有擎鞭壯士捧臂金叉官居九錫職理三槐定邊強靜掃塵埃懾偏邦朝貢金階一箇箇秉赤心護國尊君一箇箇理隂陽調和鼎鼐一箇箇效忠誠腦􅐈江淮兵書戰策軍分竒正威風大平蠻虜肅邊塞拜將封矦象簡揣博一箇誓劒金牌尾聲論武呵不弱如施謀略守秦關英猛將夷吾策論文呵不弱如嚇蠻書掃雲箋醉筆題詩李太白鐡劵丹書賜先代名揚四海聲聞在九垓華胄簮纓播萬載一枝花燈詞磐石鞏固基啓運興龍地天星應人馬地勢作屏圍水秀山竒士庶皆豪貴莊農多黍稷幸遇著盛世明時端的是豐年稔歲梁州恰新春鴻鈞氣轉早元宵斗柄寅回欣逢五夜堪人意一輪寶鑑萬顆珠璣燈光相映月色相隨燈和月上下清竒月和燈來往相宜照鳳闕耀龍樓錦樹開花繞御階遍丹墀金蓮放蘃光燦爛映蟾宫皓彩流輝這壁那壁家家處處排羅綺儘歡樂拚沉醉勝似丹青圖畫裡堪賞堪題罵玉郎我則見鰲山髙聳侵雲霽開筵宴飲金杯燈光影裡香風細撒金錢公子行間逰玩仕女隨看社火佳人立感皇恩則聽的鼓樂如雷絃管聲齊一壁廂屣髙撬一壁廂蹅迓古一壁廂舞白旗不弱如蓬菜閬苑勝似那紫府瑶池光閃閃銀河燦碧熒熒燭花明色輝輝照華夷採茶歌笑吟吟手相携慢騰騰步輕移相呼相喚俏言低漸漸東方催曙色看看月落衆星稀尾聲五更禁鼓都休擂三弄梅花且莫吹慶賞元宵太平世見如今千邦納禮萬民皆讃喜皆仰望一統乾坤大明國一枝花佳麗風流體態嬌可意龎兒俏半生無點破萬種有妖嬈舉止竒標裙底露金蓮小鳳叉簮寶髻髙似嫦娥才降天庭如仙子初離蓬島梁州喜孜孜花前見了笑吟吟月下逢著他情我意相投妙善描鸞刺繡慣賦課吟嘲會吹彈歌唱能擲彩投拋俏心兒所事偏髙美儀容壓賽紅綃燭花前私語相傳星月下佳期共禱遇知音喜在今宵情稠意好翆衾錦悵鸞凰效嬌滴滴芙蓉貌價抵千金此一宵小可的難消尾聲不覺的五更唱曉雞聲報半夜催人鐘韻𫾣萬斛離愁滿懷抱並鴛鴦散了望章臺路遙從今後雲雨巫山夢兒繞一枝花惜花春起早花間杜宇啼桞外黃鶯囀銀河廽耿耿玉露滴涓涓暫入花園露濕殘粧面風吹雲髻偏畫閣內羅幕猶垂錦堂上珠簾未􅐈梁州恰行過開爛熳梨花樹底早來到噴清香芍藥闌邊海棠嬌艷堪人羡桃花噴火楊桞拖煙蜂飛颭颭蝶舞翩翩驚起些宿平沙對對紅鴛又見出新巢燕子喧喧怕的是罩花叢曉霧𪷟濛避的是透羅衣輕風剪剪耀的是照紗囱紅日懨懨進前怕逺蹴金蓮懶把殘紅踐􅑯心堅怕心􅌒怎肯辜負了美景良辰三月天堪賞堪憐尾聲為惜花不入鞦韆院因早起致將鴛枕間廢寢忘餐把他戀將花枝笑撚斜插在鬢邊猶自古手執著菱花鏡兒顯一枝花愛月夜眠遲晚霞魚尾紅秋水鴨頭緑氷輪從地湧明月照天隅潛出庭除行到清幽處欵將藤簟舒仰面觀北斗南辰側臥看牽牛織女梁州辜負了繡衾錦褥空間了羅幕紗㡡夜天涼正值著清秋序梧飄菊綻桞敗荷枯時光冷淡景物蕭踈旅亭前􅌒客躊蹰繡幃中怨女嗟吁獸爐內爇盡清香銀臺上燒殘絳燭緑囱前手冷金盂非是我自誇自許銀蟾皎潔難留住呼梅香喚小玉準備杯盤飲醁醑歡比其餘尾聲清光影苫梧桐樹皓魄星移白玉珠暢喜情歡懶歸去藉不得露宿問甚麼起居直熬的夜靜更闌玩不足一枝花掬水月在手風輕銀漢清雲斂瑶天靜興身離繡榻信步出閨庭白露零零小院人初靜長空月正明照乾坤皓魄澄澄遍宇宙清光耿耿梁州金井畔梧桐弄影緑囱前翆竹無聲玉盆注水安中正輕挽羅袖掬水春蔥捧擎寶鏡玩弄寒氷定睛觀有影無形剔團圞能破能成感傷懷淡淡踈星添寂寞蕭蕭夜景助凄涼渺渺飛螢忽聽猛驚見梅香速至傳台命歸畫閣阻佳興多管是宴罷夫人酒半醒闌散消停尾聲串香煙盡銷金鼎銀燭光殘照畫屏羅幕猶寒我孤另誰曾來慣禁瘦身軀病沉溫不暖鮫綃被兒冷一枝花弄花香滿衣泥融燕子飛沙暖鴛鴦睡竹髙翡翆鳴花發社鵑啼潛出庭閨步入花園內欵將蓮步移恰行過拖香煙楊栁池邉早來到開白雪梨花樹底梁州觀不盡紅灼灼數枝桃李賞不絶香馥馥一架荼䕷一年四季春為貴牡丹為最芍藥奪魁堪憐堪愛堪賞堪題見逰蜂飛去飛回看蝴蝶相趂相隨開紅英芍藥蝴蝶垂玉線海棠子規裊金絲細桞黃鸝可憐可惜殘紅落滿蒼苔地剪薔薇折梅桂裙拂花叢香滿衣廢寢忘食尾聲懷揣著花蕊香盈體手撚花鈿貼面皮留戀竒花奈無計躊躇了一會則無些兒見識則除是圖畫在幃屏面兒裡一枝花秋西風昨夜生溽暑今朝退梧桐飄一葉踈桞下重階斗轉星回雲淡淡秋容改看秋光天際來點暮景落霞與孤鶩齊飛暢幽情秋水共長天一色南一江風向池臺縱步涼亭外暮雨打枯荷碎轉庭階淅淅風涼放入清涼敞繡户無遮礙新秋興滿懷挂起珠䈴待月來爽塏真堪愛北紅芍藥竹涼清爽透讀書齋且收拾羽扇􅐈羅幃當七夕見雙星齊渡過鵲橋來看百尺錦結樓臺閗乞巧九針穿線五彩牽牛織女暫徘徊銀河邊易曉燭龍催見滿地露葉下庭槐南兩頭蠻帶風入松天晴河漢影昭回露冷風清淡日輝庭前把衣曝將書開晒碧紗囱掀掣開望玉宇逈絶塵埃早晚是盂蘭盆會建佛齋普使河沙齊上大𣑽臺四時光景迭相催秋色正竒哉殘星幾點鴈橫塞天如水水天如苔誰倚闌干弄笛數聲過鴈同來北罵玉郎洞庭波冷芙蓉悴雲北去鴈南來長空萬里秋無際野水邊荒樹裡斜陽外南節節髙瓊樓玉宇髙出浮埃清宵把酒邀月對應擬待桂魄飛來天街側浸碧天流光彩上蓬萊不用騎鶴背千里嬋姢共徘徊臥看氷輪漸升滄海北感皇恩帶採茶歌黃菊初開紫茰堪佩遇重陽秋似水賞令節酒盈杯凨迎翻落帽戲馬上髙臺招陶令會俊才引仚客上崔嵬望蓬萊但將酩酊共追陪我醉欲眠卿且去明朝有意抱琴來南生薑芽秋光粧點得景佳哉晴嵐一抹連輕靄誰不愛兩兩鴛鴦相對插鬢多把茱茰戴東籬菊蕊還堪採送酒更期白衣來涼風一夜吹天籟餘音太平幸際風雲會萬方歡樂共徘徊願吾皇聖夀萬萬載一枝花神京八景蓊鬱鬱居庸疊翆峰清湛湛玉泉垂虹擁色蒼蒼薊門煙樹秀明皎皎蘆溝月溶溶氣勢崢嶸瓊島騰鸞鳳太液池魚化龍金臺䁐晴日輝輝西山顯雪霽炯炯南一江風景無窮宜賞玩堪逰從寶殿內香風送勝巫山古檜森森賽過神仙景方壷亭近玉濵瀛州亭金露濃疊河玉侵雲嶺北罵玉郎萬歲山瑶臺映日增光瑩池沼靜水波平瓊林苑緑分輕重香馥馥花弄影來往往蝶戀蜂溜嚦嚦鶯聲送南東甌令􅋦泥燕採花蜂度栁穿花向芳徑東竒葩異草開千種總與春光共佳人仕女樂歡慶香飄蕩散簾櫳北感皇恩錦重重畫棟雕櫳髙聳聳勢接蒼穹飛橋髙近碧天復道長臨瓊島御溝逺水流通長生殿石如踞虎廣寒宫樹若蟠龍前臨水後靠山聖人殿正當中南節節髙風雲會宴九重喜相逢君臣共享升平世蒙恩寵開玳筵簫韶奉妙舞清歌新章詠繁絃擊管仙音動仁風廣布兆民安甘露普降天恩重北採茶歌乾坤奉慶雲濃日月彰見飛龍紫霧現祥光籠罩九重宫聖子神孫金枝旺玉葉榮勝磐石皇圗鞏固永興隆尾聲軍民樂業咸稱頌賢臣良將效華封地久天長日月明一枝花題小腳香纏疊雪紗錦襯淩波襪底裁楊桞葉央蹙牡丹芽行過堤沙印下對相思卦窄弓弓可喜殺鳳頭兒不勾輕拿虎口裏剛剛半扎梁州步蒼苔金蓮似笋過瑶階玉嫩如芽湘裙微露些娘大恰便似雙鳬出水新月籠紗玉鈎簾控嫩藕生芽不知那可喜娘怎的纏扎多情人不住嗟呀莫不是瑶臺仙悮落在天台莫不是巫娥