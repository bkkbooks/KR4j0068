front:
  text: 雍熙樂府卷之十八
  hash: sha256:7bf61e890f385af121cf50e367458d5af942759466418fcf0dd7e6154110e2fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_018-1a}
body:
  text: 雜曲朝天子二十關歸隱汪元亨作新詩吟興濃香醪量洪好花插烏紗重百年世事苦匆匆莫把眉頭縱鷗鷺新盟雲山清興逺紅塵俗事冗假石崇運通使范丹命窮總一枕南柯夢長歌詠楚詞細賡和杜詩間臨寫羲之字亂雲堆裡結茅茨無意居朝市珠履三千金叉十二朝承恩暮賜死採啇山𬗋芝理桐江釣絲畢罷了功名事住茅舍竹籬穿芒鞋布衣啖藿食藜羹味兩輪日月走東西搬今古興和廢蕙帳低垂柴門深閉大齋時猶未起嘆蘇卿牧羝笑劉琨聽雞睡不足三竿日任薰蕕不分儘玉石共焚由人海魚龍混長歌楚些吊湘魂誰待看匡時論身重千金舌緘三寸坐時安行處穩醉看山倒樽醒讀書閉門無半點塵俗悶榮華夢一場功名𥿄半張是非海波千丈馬蹄踏碎禁街霜聽幾度頭雞唱塵土衣冠江湖心量出皇家麟鳳網慕夷齊首陽嘆韓彭未央早納𥿄風魔狀功名辭鳳闕浮生寄蟻穴醉入黃雞社取之無禁用無竭江上凨山間月基業隋唐干戈吳越付漁樵間話説酒杯中影蛇枕頭上夢蝶二十載花開謝繁華景巳休功名事莫求算富貴難消受匡廬挂在屋西頭終日看雲出岫瓜地深鋤茅菴新構醉翁意不在酒厭襟𥚑馬牛笑衣冠沐猴拂破我歸山袖朱顔去不回白髮來暗催黃金盡將時背窮居野處保無危俯仰心無愧秋菊宜餐春蘭堪佩度流光如逝水髙陽池舉杯灞陵橋探梅傲殺王侯貴身不出敝廬腳不登仕途名不上功勞簿窗前流水枕邊書深參透其中趣大澤誅蛇中原逐鹿任江山誰做主孟浩然跨驢嚴子陵釣魚快快煞間人物風俗變甚訛人情較太薄世事處真微末收拾琴劍入山阿眼不見髙軒過性本踈慵才非王佐守一丘并一壑算人生幾何驚頭顱半皤怕干惹蕭墻禍雲林逺市朝煙村絶吏曹凨景隔長安道淋漓醉墨濕宫𫀆詩酒把王侯傲南畝躬耕東皋舒嘯看青山終日飽携一琴一鶴做半漁半樵人不識豫心樂色侵階碧苔蔭當門緑槐香滿甕黃韲萊青山招我賦歸來放浪形骸外漢室三傑唐家十宰數英雄如過客置軒車第宅積子女玉帛見多少成和敗逐東凨看花鋤明月種瓜趂春雨耘苗稼堪嗟塵事手摶沙較世味如嚼蠟杖屨梅邊琴樽松下鎖心猿拴意馬鴟夷泛海槎陶潛休縣衙入千古漁樵話意隄防若城口緘守似瓶心磨拭如明鏡滄波照影鬢星星莫行險圖僥幸松菊幽懷蓴鱸髙興樂桑榆淹暮景手執玉捧盈足臨深履氷固君子知天命兩眉舒不攢一身間盡拚百事了無羈絆霜侵兩鬢漸成斑嗟暗裡年光換小可杯盤尋常煙㸑客來時隨意欵喜情歡量寬樂心廣體胖生與死由天斷結構就草菴葺理下藥籃整頓挑詩擔蕭蕭白髮不勝簮羞對青銅鑑絶念榮華甘心恬淡安樂窩分付俺飲壷觴半酣共漁樵笑談喬公案無心勘白茅葺短簷黃蘆編細簾紅槿插踈籬塹詩成一笑寫霜縑誨不厭學不倦伴侣猿鶴生涯琴劍設柴門常自掩沽村醪價廉挑野菜味甜絶斷了功名念百篇詩細吟一壷酒自斟半間屋和雲賃粗衣淡飯且消任得溫飽思量甚世態團蜂人心毒鴆是和非都在恁枕床頭素琴坐門前緑隂夢不入非熊讖訪壷公洞天謁盧同玉川住潘嶽河陽縣漢家陵寢草芉芉嘆世事雲千變暮鼓晨鍾秋鴻春燕隨光隂間過遣結茅廬數椽和梅詩幾篇遂了俺平生願染凨霜鬢斑際風雲興闌耽風月心全慢天公容我老來間且喫頓黃􅐽飯並處賢愚同爐氷炭怪先生歸去晚拜韓侯上壇放張良入山誰身後無憂患朝天子四季隱樂張雲莊作逺村近村煙靄都遮盡隂隂林樹曉難分時聽黃鸝韻竹杖芒鞋行穿花陳約漁樵共賞春日新又新是老子山林運自酌自歌自把新詩和人間甲子任由它壷裏乾坤大流水當門青山圍座樂陶陶間快活緑蓑醉呵向雲錦香中臥此花甚佳壯秋色東籬下人間凡卉不如他傲得凨霜怕玉蕊瓏蔥瓊枝低壓雪香春何足誇羡煞愛煞覷一覷千金價此杯莫推雪片雲間墜火爐頭上酒頻煨吃得醺醺醉不避凨寒將詩尋覔笑襄陽老子癡近著剡溪夜黑險凍殺來不得朝天子逺山近山兩意氷絃散行雲十二擁翠鬟攙不定春凨幔錦帳琵琶司空聽慣險教人喚小蠻粉殘黛減正好向燈前看榮華夢一場功名𥿄半張人海波千丈馬蹄踏遍禁街霜聽幾度頭雞唱塵土衣冠江湖心量出皇家麟鳯網慕夷齊首陽嘆韓彭未央早納𥿄凨魔狀功名辭鳯闕浮生寤蟻穴醉入黃雞社取之無禁用無竭愛江凨山頭月㙋業隋唐干戈吳越付漁樵間話説酒杯中影蛇枕頭上夢蝶恰便似花開謝繁華景巳休功名事莫求富貴難消受匡廬勝概屋西頭終日雲生竒岫瓜地新栽茅齋新構醉翁意不在酒厭襟𥚑馬牛笑衣冠沐猴上拂破歸山袖鴨般錦𫀆猩血般戰𫀆送了些呆神道農家自古有下稍不識長安道淺種深耕無甚煩惱臥東囱日影髙芭棚下飯飽麥場上醉倒快活殺村田樂朝天子題情逺山近山兩意氷絃散行雲十二擁翠鬟攙不定春凨幔錦帳琵琶司空聽慣險教人喚小蠻粉殘黛減正好向燈前看錦箏玉笙落日平湖淨寶花解語不勝情翠袖金波瑩蘇小堤邊東凨一另怕羞殺林外鶯方酒醒夢驚正好向燈前聽玉舟漸收淡淡雙鵝皺鴛鴦羅帶幾多愁繫不定春凨瘦二八芳年花開時候酒添嬌月帶羞醉休睡休正好向燈前候美哉美哉忙解闌胸帶鴛鴦枕上口揾腮直恁麼腰肢擺朦朧笑臉由他搶白且寬心權寧耐姐姐妳妳正好向燈前快朝天子隱逸朱顔去不回白髮來暗催老大將時背窮居野處保無危俯仰心無愧秋菊宜餐春蘭堪佩度流光如逝水髙陽館舉杯灞陵橋探梅傲殺王侯貴身不出敝廬腳不登仕途名不上功勞簿門前流水枕邊書自得其中趣世態炎涼人情反覆賴蒼天常做主孟浩然跨驢嚴子陵釣魚快活間人物凨俗變易惡人情較大薄世事真微末挂冠歸去向山阿眼不見髙軒過性本踈慵才非王佐樂一丘并一壑算人生幾何驚頭顱巳皤不惹無端禍雲林逺市朝煙村絶吏曹凨景隔長安道淋漓醉墨濕宮𫀆詩酒王侯傲南畝躬耕東皋舒嘯看青山終日飽携一琴一鶴做半漁半樵誰識豫心樂朝天子野興色侵階翠苔隂當門緑槐香滿甕黃􅐽菜青山招我賦歸來放浪形骸外漢室三傑唐家十宰數英雄如過客侈軒車第宅置子女玉帛見多少成還敗逐東凨看花鋤明月種瓜趂春雨耘苗稼堪嗟塵手摶流沙嘆世味如嚼蠟杖履籬邊琴樽松下鎖心猿拴意馬鴟夷泛海槎陶潛休縣衙千古漁樵話防姦意若城守拙口似瓶磨拭的心如鏡滄浪照影鬢星星莫行險圖僥幸松菊幽懷蓴鱸髙興修桑榆臨暮景手執玉捧盈足臨深履氷君子知天命兩眉舒不攢一身間都拚百事了無羈絆霜侵衰鬢漸成斑暗裏年光換小可杯盤尋常煙爨客來時隨意欵情歡則量寬心廣則體胖生死事由天斷朝天子樂花耍些笑些休辜負梁園月好花好酒好時節喜遇中秋夜舞者彈者吹者唱者儘今宵沉醉也喚紅兒在那些悄聲兒對説將樽爼重排列老來恰乖會受用能耽待好時儘我自開懷列宴同歡愛醉眼朦朧何妨何礙玩銀蟾離大海喚紅兒將酒釃醒又醉放懷曉月轉西樓外玉奴醉扶花底尋歸路銀屏畫屋錦糢糊處處天然富萱草堆金梨花積玉看輕飛蝶亂舞緑囱前才睡足再歌彈再舞任賔鴻來還去告天可憐且容我身康健好花休謝月常圎遂却平生願美滿􅊚緣歡娛繾綣儘今生同過遣喚紅兒在那廂整雲雨不妨諧老同心戀朝天子幽居結構就草菴葺理下藥藍慗頓挑詩擔蕭蕭白髮不勝簮羞對青銅鑑絶念繁華甘心恬淡安樂窩分付俺飲一觴半酣共漁樵話談喬公案無心勘白茅葺短簷黃蘆編細簾紅槿插籬塹詩成一笑寫霜箋柴門常閉掩伴侣猿鶴生涯琴劍學不厭誨不倦沽村醪價廉挑野菜味甜全忘了功名念百篇詩細吟一壷酒自斟小屋和雲賃粗衣淡飯且隨心溫飽思量甚世態團蛇人情毒鴆是和非都聽恁枕床頭素琴臥門前緑隂夢不入非熊讖訪壷公洞天謁盧同玉川潘嶽河陽縣漢家陵墓草芊芊世事雲千變暮鼓晨鍾秋鴻春燕隨光隂間過遣結茅廬數間和梅詩百篇遂却俺平生願朝天子放懷忖量這老懷揣摸這壯懷有變化多竒怪壯懷不減老懷開虎瘦雄心在磊磊落落寧為玉碎這胸襟寬似海世情漸乖光景漸衰獨有寒松耐打疊起病懷閣挂起倦懷凨月情元來大也無煩惱也無哀誰笑狂無賴得失榮枯青霄雲外醉來時天地窄人情冷哉世事怪哉惟我樽前在散春凨好懷徹壷漿雅懷任從容無些害人情冷暖自安排任他翻興敗鏡中未老樽前常在嘆逄冠誰去解笑顔放開酒船載來醉臥妨何礙有花時暢懷有酒時放懷這勾當人人愛花枝前擁酒盈釃花酒精神大醒時無愁醉時無害孟嘗君空有客光隂旋捱消息任來莫眉頭債朝天子述古人伯夷叔齊喜虞舜傳堯位武王伐紂惡戰敵耻周粟湯仁義死葬尸骸清名難立天喪身不喪德願為餓死恨不遇羲皇世太公受窮有誰識真梁棟安居久待曆數通兆先入非熊夢偶遇文王雲龍相從便能為百代功倘蒙不逢人與藝皆無用范蠡相國因主辱思良計平吳事了復會嵇將三致千金費臣有餘謀君心長疑不歸湖等甚的自評自議君與臣皆賢智孔明自耕劉玄德親徴聘茅廬一論帝業興漢鼎峙三分定六出祁山施呈才能志平吞吳魏兵蜀方太平國祚短天絶命太白大才時不遇將何奈明知帝主蓄禍胎相林甫朝綱敗以酒忘憂以醉忘懷學劉伶死便埋可哀痛哉江月滿人何在楚王漢王祖龍死煙塵蕩鴻門會上那一場得用也英雄將先到咸陽為君為相斬白蛇應上蒼韓侯智量子房共蕭丞相屈原命舛懷忠正讒臣謗唐虞盛治不再傳思王道無由見舉世獨清執中無權反能為漁父篇可憐大賢死不肯隨機變賈誼為國獻長策驚天地君臣之際有間隙上不能從其計時務和他明知相違愁無人扶漢室太息痛泣都滴盡傷時淚子房智量考天道炎劉盻韓彭滅了楚霸王功蓋世辭卿相馬啄無恩親誅二王想留侯好見長廟堂配享播萬載髙名望子陵本情以垂釣乘髙興潛居要學魯二生恨文叔知名姓一足髙蹺君王親擎客星曽犯帝星遇酒滿斟醉了重還醒朝天子梅雪孤芳暗香正雪霽梅花放可愛西南凍枝傍挂新月蛾眉樣出墻橫囱踈影昏黃恰詩人準備賞怎當斷腸品寒角南樓上氷消雪消漸減却山容老推倒泥牛出東郊見遍野梅花落市橋溪橋教人知道點紅花㺯翠條花梢柳梢報次第春來到梨花栁花凨外舞空中下天地氷壷玉無瑕竹枝偃梅梢壓銀沙瓊沙瀰漫拋撒近青旗纜釣艖漁家酒家映一帶山如畫氷花雨花片片墜紛紛下瓊田萬頃絶纖瑕鹽虎陷蒼龍壓玉沙銀沙空中亂撒凍梅低傍釣艖陶家黨家映一抹王維畫朝天子詠美素雲瘦蹤飽載􅓸波重玉蓮歌罷紫芝凨太液金波動明月池塘黃昏誰共碧澄澄羅襪冷錦封翠濛蛩驚散鴛鴦夢玉徽玉梅搖落雙雲佩紫芝天苑鳯凰飛忽變琉璃脆欲買湖船今宵同醉酒未醒月漸低氷絃漸離消弭盡凨雲氣翠梳淺鋪粉汗香塵素畫闌誰與月同孤試聽髙唐賦雲堆玉梳多情眉宇有離人愁萬縷若還寄取羅帕上題詩去柳腰翠裙不似昨宵困碧凨吹散曉囱雲花落佳人鬢壁月多清黃昏誰近素盈盈羅帕塵淚痕尚存須寄與東凨信朝天子嘆世暢哉快哉極目乾坤大不知何處是彭澤有箇淵明在放蕩形骸由他成敗到重陽菊自開去來去來不怕青山怪省也悟也人死如燈滅光隂疾似下坡車白髮捱年月富貴貧窮前生冤業鬼爭爭蠅競血富者貧者水底撈明月要足便足須索歸山去樽前無厭酒頻沽一任功名誤宰相王侯英雄人物轉回頭化做土自古細數宫闕廢千處得間且間已過中年限浮名薄利莫相干靜梩睁睛看邯鄲長安皆是虛幻屬漁樵一論間山居自安不管唐和漢朝天子離思長亭短亭是日分鴛頸關山萬里此離情縈繫的人成病長短燈檠知人孤另強支持秋夜永蛩聲雁聲逗引起凄涼興千難萬難别離誰曽慣當時只合鎖雕鞍愁易減人難盻悶倚雕闌羞看雙燕對東凨淹淚眼吳山楚山阻隔斷傳書雁新愁舊愁撮的眉頭皺思君白日且登樓怕夜晚來狐宿恨壓重衾愁聞寒漏捱一宵如九秋心頭口頭念想到三更後雲中塞鴻寒角聲相送沙平水冷月溶溶蘆花老霜寒重淮北江東煙雲無縫稍不的書一封睡中驟凨忽驚起團圎夢朝天子退隱挂冠棄官偷走下連雲棧湖山佳處草萊間掩映垂楊岸滿地白雲東凨吹散却遮了一半山子陵釣灘韓侯將壇那一箇無憂患栁堤竹溪日影篩金翠杖藜徐步近漁磯看鷗鷺間逰戲農父漁翁貪營活計似王維畫圖裡幽幽景致清清興趣無酒也令人醉自劾退歸用不著凨雲氣踈狂迂闊拙又癡今日才回味玩水逰山身無拘繫三十載落下的翠微更竒滄浪更竒知道我間居意翠微四圍無一點塵俗氣水聲不管是和非到處相尋覔想為吾儂心灰名利他也要隨咱間坐地寢食不離倒殢得吾先醉朝天子相思翠蛾恨鎖解不開些兒箇愁魔病魔怎離脫行坐裡相著摸簷馬鄰砧蛩吟相和助凄涼欺負我淚顆似梭羅帕揾腮淹破酒斟悶飲感離思凄涼甚良人無夢到羅衾淚滴濕鴛鴦枕衾枕無情香消寒沁碎人心蟋蟀吟夜深未寢情易感人難近恨添病染思量心何曽厭辜恩人去母又嚴直恁麼歡娛儉月館凨亭離愁都占好教我無處閃杏臉淚淹滴不盡相思欠感懷痛哉生剪碎合歡帶良人去久不歸來割不斷情深愛紅日西沉雕鞍何在盻青鸞音信乖可哀病衰少欠他相思債朝天子述世情氣豪志髙談笑把公矦傲貧而無諂富無驕陋巷簞瓢樂黃卷青燈常存吾道近山林逺市朝笑他穿紫𫀆一起一箇雞兒呌仕途利途賢不肖人皆欲蠅頭蝸角苦上苦捨命爭著做造物􅝇人誰曽省悟功名心無厭足自今古細數能有幾箇歸山去少貪莫婪好隨分捱􅐽淡雖無暴富得重銜也不著坑陷詩賦成篇琴書成擔出凨波海內淹繭蠶般脫籃硬掙斷這功名纜左難右難枉把那功名幹煙波名利不如間到大無憂患積玉堆金無邊無岸限來時悔後晚病患要過關誰救的你貪心漢朝天子相思早知恁的到不如不相識前緣前世少欠伊少欠伊相思淚曽惹憂愁曽耽憔悴只今畨忒下的想伊所為落幾聲長吁氣幾畨近晚目斷南來雁佳期空盻怎生慳想念的憂成患燭滅煙消香凨𥘉散繡簾垂怯暮寒偷掩淚眼長吁氣千千遍此宵悮却陡恁的傷懷抱胭憔粉悴越添焦迤逗的心煩躁信斷音絶特無消耗受孤恓情似燒細思量度他甚日得來到這宵怎熬𬒳一盞孤燈照促織囱外絮叨叨鐵馬兒簷前閙雁過南樓鐘聲𥘉報淚珠兒滴到曉夢裡夢著驚醒人雞兒呌朝天子隱逸紫𫀆緑𫀆未若貧而樂雖然束帶立于朝難脫邯鄲道未必吾儂巢由同調一葫蘆一箇瓢儘教睡著凍宰相聽雞呌省者見麼鏡裡添白髮功名場上看甚麼不入麒麟畫户靜門清兒成女大且隨緣度歲華詩家酒家任意訪間尋踏杜康醉鄊竹葉杯桃花釀百年三萬六千場有恨誰無恙不覺秋霜飛來頭上正春凨倒玉觴喚將樂章燕舞鶯兒唱鋪的蓋的毛毯粗衲𬒳百草為冠著麻衣淡飯􅐽鹽味竹屋柴扉終日深閉釃村醪輪瓦杯陶朱棄職是逺害全身計朝天子詠美想咱念咱玉有價春無價秋波生潤臉如花兩葉眉兒畫口兒頻掂心兒牽挂告神明合暗察病殺害殺未得句明白話晚晴月明一色瑶天靜夜香燒罷步間庭躡足行潛蹤聽翠檻朦朧雕闌掩映元來是凨㺯影此情此心管害入相思症心攘意勞作念無顛倒胭憔粉悴轉心焦陡恁的傷懷抱信斷音絶杳無消耗捱火宅熱厮燒這煩這惱想殺人誰行告眉峰恨鎖未展些兒箇愁神病鬼怎祛脫害的咱無著模鐵馬頻敲蛩吟相和助凄涼禁仗我淚顆似梭羅衫濕腮揾破朝天子逸興日居月諸斷送了人無數自從開闢你試數誰不到印山路何况吾儂些兒名譽電光中誰做主老夫志趣把烏兔常拴住恰隂却晴來和往何曽㝎湖光山色晦復明能會把人調㺯一假幽竒將何酬應吐新詩字字清錦鶯數聲又喚起逰山興錦屏翠屏極目山無罄白雲忽向樹梢生似林影波光㝎故把清凨動搖遮映水和山俱有聲半隂半晴天意也還相應梅溪竹村逺近相遮映鄰笛吹徹曉未分聽一派鸞鶴韻竹杖芒鞋穿花步趂覔知情漁父吟陶情適興也不弱林和靖朝天子題情畫橋邊栁枝粉墻頭杏枝春去人獨自粉郎不見許多時冷落鶯花市為甚憂愁教誰扶侍病懨懨真似死栁結成穗兒花退却瓣兒都做了眼中淚心頭事又梨花月夢雲桃花雨送春鶯燕無情分落紅滿地掩重門不見歸來信逰子何之丫鬟休問悶懨懨憔悴損羅衫上淚痕粉腮上枕痕都做了眼中淚心頭恨又薔薇架露鮮海棠軒月圎悄悄間庭院雕鞍别後夜如年何日重相見錦字書箋香羅題遍寫佳人薄命篇眉尖上墜鈿指尖上斷絃都做了眼中淚心頭怨又塵蒙了錦箏香消了翠屏恨殺人孤另自從別後憶多情無福和薄幸暗想􅊚緣須關前㝎似江心撈月影淅零零雨聲虛飄飄夢境都做了眼中淚心頭病朝天子村樂翠林緑隂都把紅塵禁老夫從此豁煩襟毛骨如氷沁七尺藤床一枚石枕聽新蟬葉底吟飢時便吟渴時便飲更待思量甚玉田翠煙鸞鶴聲相喚青山搖動水中天沙鳥都驚散物外凨光同誰逰玩有蓬萊海上仙綽然四邊雲煙滿眼助我騷人願牧笛酒旗社鼓喧天擂田翁漁父喜投機醉舞頭巾墜吾放踈狂逢場作戲樂陶陶飲數杯江恬月黑雨過醉歸踏得雲煙碎醒來又來親謝東君愛山肴重列酒延杯烏兔從他快縱飲狂歌精神康泰喚童兒