似醉如癡不明不暗無了無休兩地憂一樣愁慿誰醫救我甘心兒為他消瘦么篇揾鮫綃淚暗流塞離懷病不瘳一會家攘攘勞勞才在心頭又上眉頭夢裡憂醒後愁忘了還又都則為美甘甘那些兒情厚滿庭芳指望到天長地久星前月下燕侣鶯儔美姻緣甘受用無昏晝無慮無憂誰承望錦纒頭如常病酒青衫淚鎮日悲秋後會何時又不堪回首風雨替花愁耍孩兒既無情休把人迤逗早共晚空教人等候月明才上栁稍頭幾畨家來又還休想殺我也彩雲聲斷鸞簫夜盻殺人也青鳥書沉隴樹秋空把眉兒皺則為些巫雲楚雨翻做了緑慘紅愁二煞恰梨花暮雨收早芙蓉野水秋恰清明又早重陽候昨宵錦帳春如海明日黃花蝶也愁世事如翻手青春有限愁悶無休一煞把花箋著意修想韓香甚日偷黑糢糊雲暗了巫山岫半生恩憂三生夢一種情懷萬種愁難禁受怕的是燈昏酒冷雨歇雲收尾聲留戀著竊玉心包籠著折桂手若是這好姻緣早晚能成就再不向鶯花路兒上走端正好漁樂釣艇小苫寒波簔笠軟欺風雨打魚人活計蕭踈儂家鸚鵡洲邉住對江景真堪趣滚繡毬白蘋渡如雪堆紅蓼灘似錦鋪野鷗間自來自去暮雲間或捲或舒日巳無月漸出映蟾光滿川修竹助風聲兩岸黃蘆收綸罷釣尋歸去酒美魚鮮樂有餘此樂誰如倘秀才睡時節把扁舟纜住覺來也流在蘆花淺處蕩蕩悠悠無束拘市朝逺故人踈有樵夫作伴侣脫布衫雨才過山色糢糊日𥘉升樹影扶踈却離了聚野猿白雲洞口早來到散清風緑隂深處醉太平相逢的伴侣豈問箇賢愚人間開口説樵夫俺會談今論古放懷講會詩中句忘憂飲會杯中趣消間釣會水中魚心足意足尾聲樵夫别我山中去我别樵夫水上居來日相逢共一處旋打香醪旋取魚散誕逍遙看古書問甚麼誰是誰非俺兩箇慢慢的數端正好豪放不羈翠紅鄉鶯花寨占春風歌舞樓臺酒腸寬嫌殺金杯窄會受用文章伯滚繡毬都將著玉與帛換做酒共色儘教咱百年歡愛管甚麼萬貫資財鬢髮白容貌改物和人知他誰在青春去再不回來一任教佳人宛轉歌金縷醉客佯狂飲繡鞋便是英才倘秀才雖無那奪利爭名手䇿殢酒簮花的氣槩風月所施呈七步才花營中將愁解酒部內把頭擡快哉醉太平會三千劔客列十二金叉綺羅叢里玳筵開俊嬌娥侍側金蓮欵步香塵陌春蔥慢折花枝帶玉簮斜插鬢雲歪是風流膩色尾聲香焚寶鼎沉煙靄酒泛金杯浮琥珀銀燭輝煌那光彩翠袖殷勤捧玉臺對舞春風翠盤窄合唱笙簫音吕諧一對佳人醉扶䇿兩箇紗籠引下階快活煞長安少年客端正好憶情珊枕畔麝蘭香羅帕上鴛鴦字引的人無明夜坐想行思不甫能遂了平生志又惹起間愁至滚繡毬想著那抱銀箏寫怨詞並香肩詠栁枝我為他朋友中受了那許多譏刺他為我毋親行常惹的來參差他為我針指上撇了半年我為他筆硯上踈了許時他敬我勝敬似飽文章玉堂學士我愛他更愛如擅風流金屋嬌姿撇不的他腰欺楊栁風前態忘不的他口吐丁香枕上私眼底何之倘秀才一箇是善歌舞梨園教師一箇是知律吕蘇州刺史端的是才子佳人信有之一箇懷春消粉暈一箇想像廢神思不分箇彼此滚繡毬好恩情半霎兒惡愁腸十二時幾畨家簡帖兒上錯僉了名字有時節卦爻兒中倒點了干支減何郎鏡裡容添潘郎鬢上絲怕姨夫爭怕似出押虎兕恨虔婆更恨如當道蛇虺往常時種成合璧藍田玉今日也砍倒棲鸞翆竹枝展轉嗟咨倘秀才我為他寄相思寄到有百來篇小詞他為我寫離恨寫到有千來張大𥿄到如今都做了無打算春蠶口內絲約期在明月館設誓在海神祠虛勞了口齒叨叨令性踈狂播滿煙花市病風流害損青雲志思糢糊懶寫蘭亭字瘦伶仃羞掩羅衫祬兀的不想殺人也麼哥兀的不想殺人也麼哥路迢遙無箇人傳示脫布衫常想著喜春晴步蒼苔輕逐逰絲動春心倚雕闌笑撚花枝怯春寒下珠簾羞觀燕子訴春愁寄花箋暗央蝶使小梁州咱兩箇相逢萬種思留意孜孜鞦韆庭院晚涼時傳心事撇下繡鞋兒么篇這姻緣不讓蒲東寺想鶯鶯未必如斯也曾向月底潛也曾在花邉俟雲情雨思都做了斷腸詞尾聲今日也愁著風怕著雨青衫血淚應常漬幾時得並著肩携著手玉鏡鉛華恰再施撥雨撩雲又如是詠月嘲風舊相似看香裊金爐篆一絲喜梅印紗窗影半枝何粉韓香得重賜破鏡分叉得重視吐噀玉噴珠那才思展説地談天那次將翠幕雲屏更設施把錦帳鴛衾重鋪肆説海誓山盟舊日思遂倚翠偎紅少年事解合歡帶兒鬆同心結子還記的喘吁吁立不定燈前那一陳兒死端正好雲淡淡飬花天風習習籠花霧雨初晴日上金鋪子為這繡衾香暖留春住因此上睡足叉橫玉滚繡毬束纎腰翡翠𥚑掠烏雲玳瑁梳子我這瘦龎兒尚帶著粉痕清素贏得這為東君眼笑眉舒尋芳到紅杏隅踏青來緑栁衢又子怕不做美的燕嫉鶯妬因此上倚欄杆佇立躊蹰園苑裡香雲擁護連枝樹池塘內暖水溫存比目魚美景歡娛倘秀才我待臨一幅鍾繇體蹲龍臥虎寫一篇張旭草鸞飛鳳舞我待書一本顔栁帖嫌他露筋骨我待寫一幅子昻字忒嫵媚我待學一幅米老字忒糊突總不如羲之字超今越古靈壽哥下瑶階忙接青鸞馭問天仙到此何如多感謝金母親臨于牡丹恩深愛殊料想著飲仙酒添容色受寶籙傳聲譽但得箇與名花常駐春便是俺共天真為伴侣叨叨令黃庭經點畫實髙趣畫像讃布置多寬𥙿蘭亭敘波傑皆全具樂毅論結束合規度子是要意在筆前也麼哥子是要意在筆前也麼哥想羲繇字體真難遇滿庭芳山林畫圗髙低興趣逺近規模峰頭水口溪橋路位置分區學馬遠皴如鑿斧效關同筆勢縈紆髙彥敬無人物李昭道金碧細縷米元暉翰墨太糢糊上小樓畫神呵威嚴是祖畫佛呵慈悲為務粗細衣紋