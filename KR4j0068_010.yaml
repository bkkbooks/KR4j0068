front:
  text: 雍熙樂府卷之十
  hash: sha256:d32bd0964cc50e04a7c12b81b15949b28af55c6d70ccd2729f59c5153e9f252c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_010-1a}
body:
  text: 南吕宫一枝花文明經侍孔墻守道居顔巷藝香熏蠧簡螢火映紗囊學冨才長雲路通天象文星煥斗光中髙科月殿攀蟾登甲第天門看榜梁州如渭水垂鈎吕望似圯橋進履張良憂民憂國丹心壯設樽爼眼前談笑論兵機胸內包藏瞻日下九重禁闕撫寰中萬里封疆肅嚴威滿路凨霜屏姦邪當道豺狼掌紀綱法正官寮扶社稷才兼將相際凨雲拜命君王畨邦巳降邊城寧謐人歌唱是天人自天降堪作擎天一棟梁萬古無雙尾紫鸞誥賜恩波蕩金豸峩冠姓宇香功業應標史書上身臨下方心合上蒼爵祿綿綿世世享一枝花武胸藏十萬兵氣吐三千丈丹心懸日月素志凛氷霜義勇忠良列宿分天象征𫀆惹御香保蒼生萬里馳名荷聖主千金賜賞梁州處公務廉能有幾肅嚴威正大無雙分符統領三邊將麾前號令筆下文章關中虎鎮塞外鷹揚戍煙消戎寇潛藏戰塵收胡虜歸降運神機寒擁金貂觀鳥陳春圍寶帳講龍韜夜對銀缸廟堂棟梁忠臣本是天差降夀誕臨臘栂放南極臨軒燦寶光昨夜呈祥尾螺杯滿泛黃金釀鶴髮清調白雪腔壽享椿萱八十上托賴著當今帝王威服了萬邦坐對南山則把太平享一枝花期第金鑾殿上臣孔聖門中客鯉庭遵父訓蠧閣究心齋喬木良材道德無邊界英姿絶點埃放懷成泣鬼新詩揮筆就驚神妙策梁州守回也四針為戒察參乎三省于懷文明耿耿推當代器同瑚璉量等江淮歐蘇堪共李杜同偕意不期朱履金叉志須登蘭省烏臺結朋情志若金石廬親塋名乘簡册荷皇恩行表家宅奈時未來萬金寶劍沉滄海到來科顯豪邁穩占鰲頭志壯哉不負雄才尾鹿鳴宴罷離鄊陌雕鶚升騰上玉階獨步丹墀沐恩大賜瓊林宴排插宫花帽歪醉飲仙桃益春色一枝花怨雪不呈六出祥豈應三白瑞易添身上冷能使腹中飢有甚稀竒無主向沿街墜不著人到處飛暗敲囱有影無形偷入户潛蹤躡迹梁州才苫上茅菴草舍又鑽入破壁踈籬似楊花滚滚輕狂勢你幾曽見貴公子錦禋繍褥你多曽伴老漁翁箬笠蓑衣為飄凨胡做胡為怕騰雲相趂相隨只著你凍的箇孟浩然掙掙癡癡只著你逼的箇林和靖欽欽歷歷只著你阻的箇韓退之哭哭啼啼更長漏遲𬒳窩中無半點兒陽和氣惱人眠攪人睡你那冷燥皮膚似鐵石著我怎敢相偎尾一冬酒債因他纍千里關山𬒳你迷似這等浪蕊間花也不是久長計儘飄零數日掃除做一堆我將你溫不熱薄情化做了水一枝花及第世俗云諸葛心辨牛斗張華藝墨磨成修月斧筆掃就上天梯平地一聱雷親覩當今帝脫白襴換紫衣慿著我撥天關穩跨龍腰登月處髙乘鳯尾梁州執一柄繡金花寶蓋打兩面泥金粧鳳葉紅旗喝一聲小來下路諸神避揩磨日月鼎鼐鹽梅扶持社稷整頓華夷未遇時難辨髙低成名時天下皆知念一篇送窮文錦繡才華寫一篇嚇蠻書魂魄消飛草一道論天表龍蛇字體兒曺每笑耻文章到底終須貴慿著我走襄陽志氣赴長安道德時想中原萬古里尾年絶雖小有沖霄志一躍龍門到鳳池江湖飬成浩然氣春雷震起天涯盡知方表功名姓字喜一枝花研精孔孟書早遂伊周志遭逢堯舜世經際禹湯時秀發天姿展萬里鵾鵬翅見九苞威鳳資臨蒼海躍龍門春浪桃花步青雲攀蟾窟秋凨桂子梁州聽平地上凨雷霹靂應九天邊星斗參差韋郎暫把長才試滋國政賢良必舉順民情人愛興思玉之溫無半點兒瑕疵鑑之明別萬狀妍蚩間來時講一會論語綱常興來時談一會中庸奧旨悶來時卜一會周易爻辭念兹在兹刑寬訟減民無事延賔客集儒士銀燭金樽夜賦詩醉寫烏絲罵玉郎鳯凰飛下丹書至催行色上京師黃童白叟盈街市他那裡待綰姚崇借寇恂留侯氏感皇恩一箇箇感嘆嗟咨淚漣漣拜車前歌載道酒盈巵別離易捨去後猶思控征驂截鞍鐙住車脂採茶歌準備著立生祠賜存思甘棠未必建新詞此去定應承褒寵不須龜卦揲靈蓍尾只願的秉鴻鈞調鼎鼐親揩日月把龍輿侍掌絲綸為柱石輔佐乾坤將社稷支霖雨蒼生受恩施髙山仰之景行行止萬古勳名照青史一枝花武談文孔孟徒講武孫吳輩帥垣居塞北將印挂征西冠世權威漢唐臣應難比大明功更許誰鎮上谷撫兵民歲稔年豐守雲中掃胡虜潛蹤遁迹梁州見如今丹書鐵劵登髙位鳳誥鸞箋賜蟒衣金章紫綬身榮貴見了些弓張月滿箭發星飛劍揮牛斗氣吐虹霓論雄才名動京畿播英凨威振華夷盡忠良輔皇猷雄糾糾立朝端父子齊名諳韜略識兵機氣昻昻列簮纓弟兄齊美樂升平慶家庭玉森森立玳筵兒女清竒名在鼎彛功在社稷正遇著當今龍虎凨雲會魚水相逢千載稀壽躋期頥尾聲九重端拱無為治一將安邊四海知佇看圖形凌煙裏先明了五德作長城萬里贏得箇聲名照靑史一枝花杭州景普天下錦繡鄊寰宇內凨流地大明朝新附國亡宋代舊華夷水秀山竒一處處堪逰戲一答答忒富貴滿城中繡幕凨簾一閧地人煙輳集梁州百十里街衢齊整萬餘家樓閣參差並無那半答兒間田地松軒竹徑藥圃蔬畦茶園稻附花塢梅溪一陀兒一句詩題一步步扇面屏幃西鹽場恰便似一帶瓊瑶吳山色千疊翡翆兀的望錢塘江萬頃玻璃更有那清溪緑水畫船兒來往間逰戲浙江亭緊相對相對著􅕑嶺髙峯長怪石堪羡堪題尾家家掩映渠流水樓閣峥嶸出翆微遙望西湖暮山勢看了這壁覷了那壁總有丹青難下筆一枝花間樂新栽數畝瓜舊種千竿竹不彈三尺劍靜閲滿床書詩骨清臞冷淡淡心何慮間夭夭樂有餘碧梧髙彩鳯深栖滄𬈑濶鯨隱居梁州取崖畔枯藤作杖伐江皋曲木為廬主人素得林泉趣烹茶掃葉引水通渠鈎簾待月俯檻觀魚恥干求自抱憨愚厭追陪懶混塵俗傲慢似去彭澤棄職陶潛踈散如困夔府豪吟杜甫清髙似老孤山不仕林逋豈濁不魯處酸寒緊閉乾坤目躲凨雷看烏兔靜掩柴扉春日晡便休題黑漆似程途黃鍾煞守茆屋忘勢利甘貧何用王侯顧倒青樽拚趔趄爛醉頻教婢妾扶世上炎涼久憎惡敬于賢慢于富罷朝參儉家務叱阿諛薦忠恕視肥甘若鴆蠱懼功名似豺虎詠梅軒釣菱浦結樵朋友漁父陋繁華尚雅素逺雕輪避朱芾老妻賢釀醹醁老夫狂唱金縷課耕男教織女推仁愛給奴僕頌歌謡贊明主儘紅輪換朝暮任浮雲變今古對猿鶴做儔侣喜煙霞近囱户但將那老鳩巢懷抱放寬舒一任教競蠅血兒曺謾欺侮尾學不的睡不安蒼荒拔劍雞囱下舞趕不上時未遇抖搜彈冠仕途上趨秉一段鐵石心腸愈堅固者磨你趙平原誘英雄計謀齊孟嘗待賢良肚腹賺不去狗盜雞鳴類兒數一枝花秋懷事詞章舊有名攬凨月多才俊説興亡常閉口期富貴怕勞神回首青春又早三十近虹霓志未伸因此上筆尖兒判栁評花心性兒摶香㺯粉梁州喜聽的是輕歌金縷愛看的是妙舞紅裙也是我平生注下踈狂性手段兒􅍄猾如張敞舌頭兒利便似蘇秦性格兒凨流如杜牧肚皮兒豁逹似田文語言直敬的是斯文骨頭髙傲的是王孫芙蓉露濕烏紗夜夜歸遲梧桐月照羅幔齁齁睡穩桂花凨爽吟𫀆日日逰頻自思自忖保箕裘且待亨通運省干求罷談論和滄浪靜掩柴門且回避滚滚紅塵尾有一日半空中飛下凨雷信平地裏分來雨露恩那其間執節操戈把栁營鎮秉精忠為君守清白愛民酬得些勳勞便歸隱一枝花宴會畫堂中列翆鬟玳筵前排紅袖倚玉屏挨錦榻捲繡幔吊香毬簾捲金鈎蘭麝靄渾金獸種葵花接翆竹淺斟茶有一簇緑鬢佳人間談論有幾箇知心故友梁州間來時畫堂中描一會山水悶來時書房中看一會春秋茶餘飯飽間時候打一會雙陸踢幾腳行頭駕蒼鷹飛放騎駿馬迢逰或暇時玩賞在秦樓調音律曲調歌謳聽一派賽仙音押韻笙簧見幾箇舞翩躚筵前展手聽一曲羽衣詞宛轉歌喉酒籌再投共語佳人間相閗醉從狂歌曲未休不弱如閬苑瀛洲牧羊關白蓮藕堪如意紫石榴能解酒更有那賽珍珠蜜煎雞頭荔枝漿入口清香金橘煎消渴醒酒酒斟在玻璃盞茶傾在水晶甌隔尾笙歌繚繞音聲輳象板輕敲喜意酬只喫的扶上雕鞍拂衫袖絳紗燈左右紫絲韁欵兜趂著這明月清凨望家走罵玉郎到家裡金叉美女堂前候一箇箇忙扶下紫驊騮銀臺上畫燭明如晝笑吟吟入畫堂喜孜孜解玉環樂醄醄鬆金扣感皇恩呀擺列著美貌嬌羞一箇箇體態溫柔一箇捧著銀瓶一箇執著瑞果一箇擎著金甌茶罷時尊勸酒共佳人席上藏䦰只喫的金斚倒玉山堆看一會錦纏頭採茶歌只喫的醉時休醒扶頭月移花影玳筵收翡翆衾中成配偶銷金帳裡效綢繆一枝花賞雪滿長空玉葉飄遍世界銀錢墜多管是敗殘鱗甲舞錯認做春去栁花飛凍剝剝雲垂寒凛凛凨刮地採樵夫歸路迷半空中滕六裁氷遙天外馮夷剪水梁州舉頭觀山色頓老貴公子髙閣簾垂千山萬瓦如瓊砌水不知逺近山不辨髙低霸橋驢凍倒藍關馬行遲釣魚舟橫纜在江溪酒家旗斜插在踈籬亂紛紛都飛向吕蒙正破瓦窰中一片片盡飄不入黨太尉飲羊羔銷金帳裡冷氷氷都積趲在貧孫康冷落柴扉富家見喜列金叉爭塑狻猊戲慶豐年賀祥瑞常言道臘前三白壓瘴氣粉飾華夷尾呼童緊把朱扉閉畫閣低乘繡幔圍擁紅爐添炭急簇紅粧開綺席只喫的爛醉如泥偎著箇美人睡一任教敲門打扉那裡管下的來三尺四尺也寒不到我這錦重重鴛鴦𬒳窩兒裡一枝花趙太祖事杜太后天生氣浩然嶽降才豪放詩追唐李杜字繼晉鍾王派演天潢德比乾坤量恩霑雨露香覩萱花盡日忘憂供菽水三時孝飬如周世娛親萊子似劉朝奉母文皇梁州問安侍疾龍樓上晨昏勤懇頃刻憂惶衣冠不脫湯藥親嘗求醫入選得賢良願慈親早得平康望南山夀域陳情瞻北極星宫稽顙謁東華神廟焚章闡揚道場仙經釋典都宣唱法王臨大師降一念專精感上蒼夢賜良方尾夏侯得藥非虛妄楊皡祈天遂保禳聖母安然巳無恙精神愈強夀年永昌大孝芳名兀的不萬古傳一枝花自述馮歡長嘆吁夫子絶糧困蘇秦氷雪冷蒙正破窰存四箇賢賔尚且皆由命寂然且受貧漢韓信伏跨淮隂魯顔回簞瓢樂飲且如我守寒囱甘貧度日耐時光陋巷安身梁州吾飬志待時進胸中懷武腹內藏文言談俊雅福至三公間時莭敘一會韓文栁文苦只苦英雄志怎肯深埋貧則貧凨流體依然還在窮則窮慷慨心猶自超羣吾兄慢人有年何故沒德行全無些仗義踈財管鮑情清濁難分尾男兒未遇時間窘得意聲名萬兩金他便是三千朱履成何用且休題買臣負薪韓信賜金有一日衣錦還鄊才證了本一枝花急流勇退非貪鸚鵡杯不入麒麟畫幾株陶令栁數畝邵干瓜書卷生涯甚日何年罷枉將鰲背蹅下苦志空學得滿腹文章至如今誤賺了盈頭白髮梁州昨日閙垓垓兵臨孟水今日冷清清草滿章華嘆興亡世事如嚼蠟則不如篘半缸緑蟻啜一盞清茶感時懷古對景嗟呀水穿雲碧玉流霞山疊翆青錦蒙紗黃菊綻猛獸睁晴紅葉落火龍退甲蒼松盤怪蟒張牙景幽靜雅一輪皓月林梢挂醉後將蹇驢跨稚子山妻引到家煞強如大纛髙才尾南山射虎弓藏插北海誅龍劍隱匣兩字功名不牽挂書房中臥咱松隂下坐咱無是無非快活煞一枝花文士待時詩書勤講習禮樂從先進齊家能治國修已以安人務正其身孝乃人之本德不孤必有鄰分長幼次序尊卑自天子至于庶人梁州我一片心于家為國兩隻手撥霧拏雲遵天理依古禮升階進胸襟浩浩文質彬彬先王之道亞聖之尊無半點塵俗埃氛洋洋乎盈耳哉云蕩蕩乎常懷惻隱巍巍乎貫世才文以文會友以友輔仁言忠信行篤敬事父母能盡其孝事君王必竭其忠尾蛟龍不與魚蝦混雕鶚難同燕雀羣有一日皇家用時分