後神昏眼睛花其實的怕他怕他休道忘憂飲流霞酒膽天來大失禮傷凨化不是耍放浪煙花不成家其實的怕他怕他休道紅粧美如花色膽天來大傾國傾城價不是耍百萬青蚨怨根芽其實的怕他怕他休道通神作生涯財膽天來大少把心牽挂不是耍志氣昻昻逞豪家其實的怕他怕他休道剛強敢矜誇氣膽天來大理法難容納不是耍鸚鵡曲馮海粟儂家鸚鵡洲邊住是一箇不識字漁父閬苑中一葉扁舟睡殺江南煙雨覺來滿眼青山暮抖擻著緑簔歸去算從前錯怨天公甚也有安排我處錢塘江上親曽住司馬栖不是村夫縷金衣唱徹流年幾陳紗囱梅雨夢回時不見犀梳燕子又銜春去便人間月缺花殘是小小香魂斷處長繩短繫虛名住傾濁酒勸鄰父草亭前樹當門畫出輕煙踈雨看燕南陌上紅塵馬首北凨吹去一年二月夜花朝自占取溪山好處張良更姓圯橋住半夜裡遇師父一編書不為封留字字咸陽膏雨借箸籌滅項興劉到底託神仙去待啇山四皓還山再不戀人間好處逃回辭楚無家住解寶劍曽問津父十年間隸越鞭荆怒捲秋江潮雨空城組練三千白馬素車回去又逡巡月上波平暮色在煙光𬗋處赭肩腰斧登山住耐的苦是採薪父亂雲升急樹飛來拗折青松遮雨記年時雪斷溪橋曉渡前灣歸去買臣妻富貴來尋氣𦦨到寒灰冷處青衫司馬江州住月夜笛厭竹村父甚有傳舊譜琵琶切切嘈嘈簷雨薄情郎又販茶船近日又浮梁去説相逢總是天涯訴不盡柔腸苦處才郎于祐咸陽住是箇不識字的田父御溝西緑水東流乍歇長安秋雨恨勿勿一片題情紅葉為誰流去恰殷勤離得深宮便得到人間好處賽鴻秋山行警東邊路西邊路南邊路五里鋪七里鋪十里鋪行一步盻一步懶一步霎時間天也暮日也暮雲也暮斜陽滿地鋪回首生煙霧兀的不山無數水無數情無數又宴畢警燈也照星也照月也照東邊笑西邊笑南邊笑忽聽的鈞天樂簫韶樂雲和樂合著這大石調小石調黃鍾調銀花遍地飄火樹連天照喜的是君有道臣有道國有道又村夫飲賔也醉主也醉僕也醉唱一會舞一會笑一會管甚麼三十歲五十歲八十歲你也跪他也跪恁也跪無甚繁絃急管催喫到紅輪日西墜打的那盤也碎碟也碎碗也碎又丹客行朝燒煉暮燒煉朝暮學燒煉這裡串那裡串到處都串遍東家騙西家騙南北都誆遍惹的妻埋怨子埋怨父母都埋怨我問你金丹何日成鉛汞何日見只落的披一片挂一片拖一片又綽然亭春來時綽然亭香雪梨花會夏來時綽然亭雲錦荷花會秋來時綽然亭霜露黃花會冬來時綽然亭凨月梅花會春夏與秋冬四季皆佳會問主人此意趣誰能會小梁州酸齋朱顏緑鬢少年郎都變做白髮蒼蒼儘教花栁自芬芳無心賞不趂燕鶯忙么東家醉了西家唱唱一會再醉何妨醉的強醒的強百年渾是三萬六千場桃花如面桞如腰他生的且是妖嬈醉闌乘興會今宵低低道無語眼兒瞧么揣著羞臉娘行告百般的撒粧夭心下焦空憋躁􅊚緣簿上前世暗勾消相偎相抱正情濃爭忍西東相逢爭似不相逢愁添重只怕畫樓空么垂楊渡口人相送拜深深暗祝東凨髙挂帆休吹動只留一宿天意肯相容晚粧囱下醉離觴月色蒼蒼來時誰暮去時忙空惆悵無計鎖鴛鴦么殘雲剩雨陽臺上空贏得兩袖餘香春夜長東凨旺桃花飄蕩何處覔劉郎小梁州小山玉壷春水浸晴霞景物奢華彩船歌管間琵琶青旗挂沽酒是誰家么夕陽一帶山如畫數投林萬點寒鴉曲水邊孤山下逰人歸去明月映梅花兩峯晴翆插波光十里橫塘畫樓踈影挂夕陽誰凝望紈扇掩紅粧么蓮舟撑入荷花蕩拂天凨兩袖清香酒醉歸明月上棹歌齊唱驚起宿鴛鴦永壷光浸水晶寒好景人間暗香來處是孤山尋梅慣詩思壓驢鞍么瓊姬爭捲珠簾看畫船中歌舞唱彈明月殘白石爛凌空樓閣十二玉闌干篷囱凨急雨絲絲笑撚吟髭淮陽西望路何之鱗鴻至把酒問篙師么迎頭便説兵戈事凨流再莫追思塌了酒樓焚了茶肆栁營花市更呼甚燕子鶯兒秋凨江上棹孤舟煙水悠悠傷心有事賦登樓山容瘦楓樹替人愁么樽前細把茱茰嗅問相知幾箇白頭樂可酬人非舊黃花時候枉負晉凨流秋凨江上棹孤航煙水茫茫白雲西去雁南翔推篷望情思滿滄浪么東籬悮約陶元亮過了重陽自感傷何情况黃花惆悵空作去年香憑闌人秋懷十韻露冷池塘秋水澄夜靜松凨音韻清一天涼雨晴半彎斜月明門外髙槐垂嫩黃池內秋蓮凝淡粧西凨吹𥿄囱小樓今夜涼點破蒼苔墻角螢戰退西凨簷外鈴畫樓秋露清玉闌梧葉零寶鼎香殘秋夜深玉漏聲遲涼氣侵月明三㺯琴誰能知此音戲撥琵琶囱下聽換羽移官無限聲不知琴調清誰能寄古情月照珠簾垂玉鈎凨透紗囱涼翆樓凄凄蛩韻幽盈盈花露秋小殿昨宵天氣涼玉箭初傳更漏長荷花消晚香芙蓉添晚粧酒力禁持頭懶擡詩思縈紆情滿懷好香天上來木犀花正開著罷殘棋茶一甌寫就新詞花滿樓碧天銀漢秋新蟾玉一鈎獨上髙臺凝望中𬗋翆模糊山萬重秋波連逺空晴嵐飛塞鴻乾荷葉劉太保乾荷葉色蒼蒼老柄凨搖蕩減了清香越添黃都因昨夜一埸霜寂寞在秋江上乾荷葉映枯蒲柄折難擎露藕絲蕪倩凨扶待擎無力不成珠難蓋宿灘頭鷺根摧折柄欹斜翆減清香謝恁時莭萬絲絶紅鴛白鷺不能遮憔忰損乾荷葉乾荷葉色無多不耐凨霜銼貼秋波倒枝柯宮娃齊唱採蓮歌夢裡繁華過南髙峰北髙峰慘淡煙霞洞宋髙宗一場空吳山依舊酒旗凨兩度江南夢夜來箇醉顏酡不記花前過醒來何二更過春衫惹㝎茨􅐘科絆倒花㧓破乾荷葉水上浮漸漸浮將去跟將你去隨將去你問當家有媳婦問著不言語腳兒尖手兒纎雲髻梳兒露半邊臉兒甜話兒粘更宜煩惱更宜忺直恁凨流茜初生月兒題情初生月兒一似弓夢裡相逢恩愛同覺來時錦𬒳一半空去無蹤難再逢囱兒外燭影搖紅初生月兒懸太虛恰似嫦娥鬢上梳氷輪未滿羡歎處謾長吁離恨苦冷清清鳯隻鸞孤初生月兒一半彎一半團圓只恁難雕鞍去後何日還捱更闌掩淚眼畫簷外憑損闌干初生月兒明處少又𬒳浮雲遮蔽了香消燭滅人靜俏夜迢迢難睡著囱兒外雨打芭蕉𥘉生月兒一似鈎占斷天香八月秋秋蟬鬢邊常見有挂著頭難再收照人間萬種愁逰四門自娛野塘花落杜鵑啼啼血送春歸花開不拚花前醉醉裡又傷悲伊快活了是便宜桞綿飛盡緑絲垂只管送別離年年拆盡依然翆行客幾時回伊快活了是便宜落紅滿地濕胭脂逰賞正直時呆才料不顧薔薇貪折海棠枝嗤㧓破繡裙兒海棠花下月明時有約暗通私不甫能等的紅兒至欲審舊題詩支關上角門兒前程萬里苦相傳今日果如然煙波名利雖榮顯何日是歸年天杜宇枉熬煎琴書筆硯作生涯誰肯戀榮華有時相伴漁樵話興盡飲流霞咱不醉不回家賞花時全真道院去路崎嶇鳥道分人海滄茫鯨浪奔喧馬足閙車塵麻姑笑哂落日又黃昏么金谷看花夢裡身銅柱流芳𥿄上文能黼黻會經綸先生議論少不的髙塜臥麒麟既悟死生機便得清間分真乃是羲皇上人散誕似携家傍鹿門老生涯經卷爐薰么指乾坤作慢為禋吸扶桑五色暾等待著黃粱飯滚碧桃春近大吹簫管上崑崙又應詔聘賢五彩雲開丹鳯樓萬雉城連白鷺洲天塹壯東流天長地久今古帝王州么乕豹關深肅劍矛鵷鷺班趨拜冕旒廊廟總伊周青雲趂逐猶自臥林丘既奉紫泥宣合拂斑衣袖正桂子西凨暮秋整頓著千尺絲綸一寸鈎笑談間釣出鰲頭公莫遲留壯志須酬不負平生經濟手穩情取金花御酒銀章𬗋綬教人道鳯凰臺上鳯凰逰
