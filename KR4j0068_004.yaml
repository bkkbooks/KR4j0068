謳著金縷詞酒斟著白玉觴笑吟吟且開懷展放江湖量只恐怕春歸去太疾忙天下樂因此上拚了醄醄入醉鄉見芳草池塘夭桃間緑楊端的是花撲撲賽過錦繡鄉蹴踘聲吹到綺筵鞦韆影送過粉墻回首早散荼䕷滿院香那吒令過清和氣爽葵花開艷芳起薰風淡蕩藕花吹異香正炎天晝長榴花綻錦囊繞方池圎沼中敢向水閣涼亭上搖紈扇浴罷蘭湯鵲踏枝碧荷筒飲瓊漿白蓮藕雪氷霜正好宜沉李浮瓜避暑乘涼人和著採蓮腔載蘭舟畫舫須臾間又早重陽寄生草一任教西風墜烏紗帽且喜得東籬下菊正黃趂著這凝霜紫蟹偏肥壯旋將那新篘緑蟻頻釃蕩和俺那知心故友同歡暢恰才見丹楓樹葉滿林間却又早彤雲四野從天降六么序呀冷颼颼寒成陳踈刺刺風力狂剪氷花應瑞呈祥恰便似蝶翅飛揚鶴羽翺翔𫾣竹葉風透幽囱採樵人迷路難行往便有那打魚翁怎向寒江亂紛紛撏綿扯絮空中降這雪消災壓瘴更那堪宿麥遺蝗么篇這雪偏宜向髙堂蘭房氊幕𥿄張翆袖成行錦褥牙床繡𬒳鴛鴦深把那重門閉上呀梅花開送暗香韻悠悠歌著竒腔按著宫啇炭火上燒著肥羊金杯中淺泛羊羔釀便醺醺醉後何妨受用些紅爐暖閣銷金帳慶得是豐年稔歲樂的是地久天長點絳唇文人遂志十載寒窗半生指望登春榜今便懷寶迷邦誰肯舉直錯諸枉混江龍赤緊的斯文未喪空將美玉韞櫝而藏你便能勾片言拆獄一語興邦不去蘭省一朝登北闕便想茅廬三顧到南陽毛錐乏盡鐵硯磨穿髙歌鼓腹談笑掀髯謾登臨慷慨仲宣樓我則怕有才無夀在顔回巷養浩然袁門積雪久巳後空嗟嘆潘鬢成霜油葫蘆且休説我逺志輕離父毋鄉投京師應舉場將群儒戰退氣昻昻奪得翰林兩字標金榜便是禹門三汲桃花浪那時節進表章見帝王白衣脫在金階上早能勾披紫綬換金章天下樂宣賜蒙恩出建章朱衣列在兩廂起蟄龍一聲雷震響會風雲志四方遂功名𥿄半張是俺男兒當自強鵲踏枝咱想東坡伎倆怎比東山氣象怎做東床伴當主人將東閣開直喫得東方亮問甚麼日照東方那吒令且休説翰林忙暫入他綺羅鄉我則見燭影搖紅月色昏黃他教小生酒喫的倒垂蓮前合後仰小生却甚麼檢書史愰斂銀缸寄生草今日在編修院往常住氷雪堂詩魂髙壓山河壯琴彈神鬼魂飄蕩劍揮牛斗昏無象我將九經苦志二十年養就五陵豪氣三千丈么篇今日有千鍾祿往日無半合糧十年禮義勤習講半生鹽菜貧修養才落得金章紫綬髙名望我將這五車黃卷隱胸中才博得一輪皂蓋飛頭上點絳唇諸葛平蜀秦失邦基漢劉爭利施謀智倚仗權威天命歸仁德混江龍君臣際會豪傑英俊似雲集張子房運籌帷幄韓元帥戰勝迎敵蕭丞相輔弼國家遵法律不絶糧草撫黔黎整頓的江山鞏固揩磨的日月光輝肅靜了亡秦宇宙扶立起炎漢華夷調鼎鼐理鹽梅播星斗吐虹霓逼的箇秦子嬰係􅖪獻降符逼的箇楚重瞳自刎在烏江內一來是天上差命二來是臣宰扶持油葫蘆鼎足三分漢社稷占天時曺孟德他則待令諸矦施權柄逞姦回事無成一命歸泉世廢獻帝做山陽公便把曺丕立論東吳孫仲謀據長江千萬里倚仗著龍韜虎略多雄勢得地利可料敵天下樂劉先主人和是國戚占了西蜀建帝基山河帶礪殷富國他則待復故邦雪舊恥不能勾統乾坤同混一那吒令若論著智謀有軍師李直若論著威武有雲長益德若論著英勇有子龍孟起老將軍黃漢升多剛毅一班兒將先主扶持鵲踏枝沙場上慣驅馳陳靣上惡迎敵雖然是將勇兵強虧軍師妙䇿神機想當初赤壁下鏖兵對壘片時間檣櫓灰飛寄生草丞相要平夷虜我待要除逆賊剿遐荒強暴無遺類見如今曺丕虎踞中原地我則乘虛鼠竊西蜀地軍師前論黃數黑説兵機正是班門運斧誇強會六么序擎天柱堪稱許棟梁材衆所知習韜略善説兵機慿丞相妙䇿深竒雄斷無疑曉天文地理精微堪為舟楫能經濟敢當先斗膽誰及共軍師報國把功勞立他則待心存漢室振撫華夷么若到那邊陲兩陳迎敵炮響春雷鼓譟征鼙馬驟狻猊耀武揚威斬將奪旗剿捕渠魁將他那小醜妖氛靖洗喜孜孜得勝回四海傳檄萬國皆知奏鑾舉獻俘丹墀玳筵開慶賞風雲會麒麟殿圗寫容儀功勞顯耀英雄輩笑吟吟加官賜賞喜孜孜的廕子封妻尾聲點士馬便興師按遁甲擇良日打磨了鎗刀劍戟搠立起中軍帥字旗快疾將糧草收拾莫要稽遲托賴著聖主洪威你若是得勝先將露布齎削平了寇賊撫安了邊地恁時節班師得勝凱歌回點絳唇陶淵明歸去來兮歸去來兮故鄉近日田園內蕪草荒迷催把微官棄混江龍既心為形役何須惆悵獨生悲悟往哉不諌知來者堪追昨日方知今日錯今朝便覺昨朝非舟搖搖以輕揚風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇適我間居意雖休官早每恨歸遲油葫蘆荷月鋤田夜始歸有歡迎僮僕隨候門椎子笑牽衣栽五株翆栁籠煙細種一籬黃菊凝霜媚三徑雖就荒喬松喜不移盻庭柯木葉交蒼翆長把笑顔怡天下樂雖設柴關鎮掩扉無為交暫息既世情巳與我碩違看出岫雲始騰羡知還鳥倦飛撫孤松心似水那吒令恱髙朋故戚共談玄講理愛扶笻屧履辦登山玩水早休官棄職肯折腰為米深蒙雨露恩自得鋤匏力問恁每此興誰知鵲踏枝與猿鶴久忘機共琴書自相陪舒嘯東臯適興東籬誰待要勞神費力不能勾展眼舒眉寄生草一任秦灰冷從教晉鼎移倚囱或樂詩書味從流或棹孤舟濟登山或命巾車力美哉之志樂田園浩然之氣衝天地么農夫告春將及朝來雨一犂新生木葉欣欣密長流泉水涓涓細旋開黃菊叢叢媚有時矯首恣逰觀䇿扶老以欣流憩金盞兒去來兮莫呆癡寓形宇宙能何幾悉不為去留迷笑遑將底用聞汲汲𣣔安歸知帝鄉身不利任富貴碩皆違尾聲喜植杖止耘耔莫開口談興廢善萬物逢時所喜休感吾生駒過隙喜忘言更巳忘機賞東籬採菊浮杯坐對南山山色裡逍遙度日優遊終歲樂夫天命復奚疑點絳唇發憤忘食浩然之氣衝天地志節威儀無友不如已混江龍後生可畏君子謀道不謀食與人恭而有禮侍親行孝無違僣禮季孫為八佾管仲之器有三歸欲誠其意先致其知莫見乎隱莫顯乎微言思聰色思溫貌思恭志於道依於仁據于德遊于藝人而無信大車無輗油葫蘆由也升堂未入室聞過喜雖居貧賤不能移禮之用和為貴先王之道斯為美身巳修家可齊欲平天下先治國如何是舉枉錯諸直天下樂三省吾身稟信實時習學在已聖人言四十而不惑富可求賤可恥雖執鞭士吾亦為之那吒令若用之則行道千乘之國若舍之則藏居十室之邑果道之不行便遷居九夷貧而無怨難富而無驕易學南容三復白圭鵲踏枝季文子正其誼晏平仲仕于齊善與人交久敬無移師也過啇也不及惟顔淵聞一知十寄生草司馬牛無兄弟冉伯牛有病疾臧文仲居蔡何為知王孫賈媚竈誇權勢公冶長縲絏非其罪為人克已總由心出乎其類拔乎萃么桑伯子啇于魯微生髙豈為直泰伯讓國人稱美景公千駟終無德夷齊餓死人稱義君子憂道不憂貧學也祿在其中矣尾聲敏于事慎于言入則孝出則弟豈可窮斯濫矣寧武子其愚不可及噫曾參道統傳遺嘆顔回正人心三月不違道也者須臾不可離異端並起道之將廢總不如風乎舞雩詠而歸點絳唇大埋伏天淡雲孤怨雲愁霧施英武威鎮征夫取勝如神助混江龍全按著周天之數九宫八卦立錕鋙怎肯道差持了劍戟失配了軍卒安排下走虎飛龍扶社稷準僃著釣鰲網索困江湖第一陳乾為天天門隱遁第二陳坎為水水居同謀第三陳艮為山神符隘口第四陳震為雷識逹賢愚第五陳巽為風煙塵浩蕩第六陳離為火火燎寰區第七陳坤為地栽花接果第八陳兊為澤蟠足潛迹第九陳中宫安寨第十陳惡黨凶從上按著九天紛紛殺氣下按著八埏靄靄神謀若你有萬人之勇直殺的你力盡斤舒鳥藏在深林怪樹獸潛蹤在野嶺蕪居隔山聞軍卒相應隔澗聽畫角喧呼閙垓垓鳴金走陳齊臻臻擐甲征夫縱你除天可害難逃這十靣埋伏天之道天之理天之數張良用黃公三略法韓信用吕望六韜書油葫蘆則聽得呐喊搖旗齊譟鼓縱征􅟯親去取則今畨一朝定國見一箇贏輸為君的開基創業齊天福為臣的要安邦定國上功勞簿平地上起戰場髙阜處立帥府更那張司從蕭相國劉髙祖韓元帥山頂上運機謀天下樂聽得動一派簫韶品奏霸主髙呼罵韓信一餓夫你則待立劉邦覷吾如糞土仗無敵去便拿縱龍駒親去取不隄防列千枝腳蹬弩那吒令我這里望上射飛蝗驟雨望下砍使大刀巨斧密匝匝隊伍要擒拿項羽見樊噲旗在手便磨在垓心處整點起百萬軍卒鵲踏枝一箇箇腆著胸脯用著權術恰便似砍瓠截瓜刈葦釤蒲口吐著狼煙氣毒他不隄防先有了埋伏寄生草將項羽圍在這垓心內九里山一字兒擺下陳圗更有那張司徒吹起傷情曲衆兒郎流淚思鄉土吹散了八千子弟歸何處將軍你有何面目向東吳那里烏江不是無船渡點絳唇杜牧之醉寫楊州夢錦纜龍舟可憐空有隋堤栁千古間愁和他春老瓊花瘦混江龍江山如舊竹西歌吹古揚州三分明月十里紅樓人倚雕欄品玉簫手捲珠簾上金鈎淮南風月景天下最為頭罷干戈無士馬太平時世省刑法薄稅斂民物悠悠列一百二十行經商買賣透四萬八千門人物風流平山堂竹西閣間花野草九曲池小金山白鷺沙鷗銀行街米市街如龍馬驟天寧寺雍熙寺似蟻人稠文章客傲王侯峨冠博帶豪傑士蕩風埃肥馬輕裘茶房內泛松風香酥鳳髓酒樓內歌白雪檀板鶯喉接前庭通後閣馬銀街砌繞朱闌近綺户龜背毬樓金盤露瓊花露釀成佳醖太官羊栁蒸羊炮饌珍饈看官場愛軃袖垂肩蹴踘體教坊慣清歌妙舞俳優著輕紗穿異錦齊臻臻按春秋奏繁絃吹急管閙炒炒無昏晝拚數萬兩黃金買笑散幾百假紅錦纏頭油葫蘆為甚麼月底籠燈花下逰將飲興酬我向綺羅叢封作醉鄉矦斟著錦橙漿渲淨談天口折取碧桃花拈答住拏雲手且打疊起太學挺拽扎了翰苑搊趂著錦封未折香先透渴時節飲盡洞庭秋天下樂上兀自一盞能消萬斛愁三甌扶起頭我待紅裙會中奪一籌飲酒呵灌得咳嗽看花呵沁成證候都不如勝簮花常殢酒那吒令倒金瓶鳳頭捧瓊漿玉甌蹙金蓮鳳頭顯凌波玉鈎整金叉鳳頭露春纎玉手若還天有情天也老春有意春先瘦山有情呵山也頻愁鵲踏枝花比他少風流玉比他欠溫柔端的是燕爾消魂鶯也藏羞看蜂與蝶是花間四友呆答孩豆􅞦稍頭寄生草我空央到十箇千嵗他剛咽了三箇半口顯汚了內家粧束紅鸞袖越顯出些宮腰體態纎楊栁道添出些芙蓉顔色嬌皮肉白處似梨花粧冷粉酥香紅處似海棠暈暖胭脂透么磨鐡角烏犀冷點霜毫玉兔秋對明囱滄海龍蛇走蘸端溪石硯雲煙透拂鸞箋湘水波紋皺投至看吳宫花草二十年少不的翰林風月三千首后庭花應答得意思兒投笑談得局面兒熟拚了我夜月携紅袖不覺春風到玉樓這酒呵怎生咽下咽喉動勞你箇田文生受氣昻昻才包古今吞宇宙熖騰騰噴吐虹霓射斗牛寬綽綽拂袖紅雲出鳳樓興悠悠騰駕蒼龍遍九州樂陶陶醉賞瓊花雙玉甌香馥馥斟一杯花露酒青歌兒呀央及煞偷香偷香韓夀不驚回兩行兩行紅袖感謝文章賢太守我是江海裡儒流傲宰相王矦咱賓主相留我敘筆硯交遊會詩酒綢繆他悶倚著雲兜緊控著驊騮觴賦蘭舟潯陽江水悠悠蘆花楓葉颼颼紅蓼汀洲白鷺沙鷗話不相投不爭聽徹琵琶楚江頭休淚濕了青衫袖尾聲比及客散畫堂中不隄防人約黃昏後這花呵不比泛常間墻花路栁這公事怎肯癡心兒干素休引惹得人強風情酒病花愁掃愁帚爭如捧箕手者麼你鬢邉廂霜華漸稠衫袖上酒痕依舊只我這會風流的到老也風流點絳唇蘇子瞻風雪貶黃州萬頃瀟湘九天星象長江浪吸入詩腸都變作豪氣三千丈混江龍絲綸閣上紫薇花對紫微郎步九重春色拂兩袖天香萬里雲煙揮翰墨一天星斗煥文章若非是翰林風月京洛山川洞庭煙樹金谷瓊園怎能勾一輪皂蓋飛頭上詩吟得神號鬼哭文警的地老天荒油葫蘆想月滿西樓夜未央蒙君恩宿建章不比長安三日荔枝香那里翆鬟擁出芙蓉帳須不曾醉鞭悮入平康巷笙歌處處聞靜鞭三下響驀揣的半張鑾駕從天降翆輦中倣佛見君王天下樂却便是一朵紅雲捧玉皇止不過昭陽飲玉觴那里取六宫美人恨煞秋夜長下珠簾處處涼撒金蓮步步香月明中吹簫引鳳凰那吒令我一身紀綱守簞瓢陋巷顯一生氣象步金門玉堂上一封諌章入天羅地網錦繡腸江湖量都變做水國魚邦鵲踏枝萬言䇿獻君王一騎馬渡衡陽霎離了三島蓬萊直走遍九曲滄浪學不得李太白逍遙入醉鄉可做了韓昌黎昔貶潮陽寄生草臣則碩居蠻貊再誰想立廟堂今日曾參難免機梭誑周公也難免流言講有仲尼也難免狐裘謗本是轅門獻賦漢相如怎做的東籬賞菊陶元亮公篇臣折麼流儋耳折麼貶夜郎一箇因書賈誼長沙放因詩杜甫雲陽葬因文李白江心喪臣本是屈原千古汨羅江怎生做禹門三汲桃花浪金盞兒不願狂不荒唐折末你雲陽梟首在髙竿上煞將碧天風月兩平章拚著夢魂逰故國想像赴髙唐則今日傷心逰海島携手上河梁尾聲罷罷罷不入犬羊群難躲鯨鯢網直貶過滔滔大江不是行人不斷腸接天涯煙水迷茫更有那助凄涼衰草夕陽再休想築起髙臺望故鄉這里有當途虎狼他那里潑天風浪趂祥煙飛過水雲鄊點絳唇亞聖樂道顔子簞瓢季倫家道為官爵富貴奢豪未若貧而樂混江龍豈不聞聖人憂道貧而無諂富無驕假若是堆金至北斗少不的身卧荒郊比及看滄海塵飛幾度絰少不得北印山髙塜一周遭觀流水光隂急急嘆虛名塵世飄飄似輕鷗浮于水面如曉露綴于花稍畫簷間蜘蛛結網銀漢外鳥鵲成橋彼也虛名薄利任他人祿重官髙撚指間朱顔昨日急回頭白髮明朝被日月暗消年少向循環困殺英豪富貴是惹災題目榮華是種禍根苗酒色是斬身之劍財氣是致命之刀牢鎖住心猿顛耍緊拴住意馬咆哮看野鹿㗸枝瑞草笑猿猴獻會仙桃我遣興藥爐經卷使吾心草履麻絛採靈芝蓬萊頂上種胡麻野角山腰戴簮冠捱會寂寞住茅庵打會勤勞五七畝間庭小院兩三間茅舍蕭蕭唱道情逍遙快樂趂農時耕種鋤刨我縛定風波口是禍之門我則待隱林泉身退天之道須不如張良棄職待學那范蠡辭朝油葫蘆想閬苑神仙粗布𫀆恁為官實是好誰待要海山中歸去醉蟠桃我則待是非海內抽身早你待要利名場上鑽頭閙明説道在醜不爭在上不驕人無百歲人枉作千年調不如去間訪漁樵天下樂你看萬里風頭鶴背髙將間憂愁消散了利名場上再不去染汚著每日將絰卷習世事曉早一場活計了那吒令秀才每應舉呵選場中放雕令史每取狀呵司房中探爪官人每問事呵公􅈦上看招縱有官長廉又被曺吏每拗赤緊的不辨清濁鵲踏枝有學的是小吾曺無意的逞英豪出來的惡紫奪朱一箇箇折桂攀髙動不動拏人做錯甚的是晏平仲善與人交寄生草見帶著烏紗帽又想挂紫錦袍紅塵滿面真堪笑白頭無力應難蹈空學得千卷萬卷聖人書剗地里七月八月長安道后庭花靠一峯鎖煙霞山勢髙住一間避塵俗茅舍小做一床蓋乾坤黃紬被穿一領傲風霜粗布袍每日價醉醄醄綸巾顛倒看春風桃李嬌賞羊羔瑞雪飄冬天梅信早幾畨兒厮撞著醉鄉中取快樂青歌兒呀我則待酒中酒中得道情碩髽髻髽髻環絛醉歸來一任傍人笑蓬萊島走一遭我跨蒼鸞醉赴碧蟠桃點絳唇子弟收心花面金剛綺羅形像喬模樣玉體魔王但遇著遭魔障混江龍想著我數年飄蕩都為那春風一曲杜韋娘使了些沒疼熱錢鈔棄了些有子粒田桑只落得象板輕敲籠彩袖銀箏欵撥對紅粧我聽了些淫詞艷典他喫了些美酒肥羊我廢了些金銀頭面他置了些羅錦衣裳我典賣了些東西園圃他蓋造了些前後房廊我若不千金買笑他怎肯萬種思量我假若一時不到他便就去處唱揚我戀他時乖運蹇半生貧他愛我家肥屋潤十年旺從今後再不去花街栁陌躲離了月户雲囱油葫蘆𥿄樣恩情不久長我自忖量都是我錢財買轉了得成雙你若是無錢呵便休想同羅帳他那里不便宜怎肯相親傍他只待錢親人不親財香人不香我為他把潑天般家當無歸向恰收心惟有一空囊天下樂他轉眼看人陌路傍有甚麼貞良做了些歹勾當他只待接金銀著斗量我將那箱籠內財都放做煙花帳閃煞我張敞畫眉郎那吒令想那糶風月的女娘似飢狼餓狼覷那販茶船的巨啇似肥羊胖羊便有贍天才智量索投降納降你便有子建能潘安樣躲不過他舌劍唇鎗鵲踏枝我細思量細參詳他則待送舊迎新惜玉憐香管甚麼張郎李郎在茶房酒房若得了幾文錢就與他成雙寄生草想當初馮員外愛蘇卿沒主張把三千茶送在平康巷五百鹽堆在章臺上十塊鈔卸在梨園放只落的滿船空載月明歸一帆虛影風飄蕩么篇王魁是攀蟾客桂英是栁陌娼他未得時權且相親傍未為官暫且同鴛帳未榮華苟且將香降一箇在海神廟裡做冤魂一箇在金鑾殿上為卿相后庭花我雖是乍收心有紀綱我怎比撲燈蛾為色傷我再不捨命撞迷魂陳怕的是風流劍下亡想著翆紅鄉女娘每一箇箇雄壯他慣埋伏有智量子弟每都受降急回頭都中傷腦後炮怎的防青歌兒呀想著那鄭