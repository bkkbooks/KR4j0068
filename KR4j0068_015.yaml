處花落重門掩薄幸不來羞覩畫梁燕天涯咫尺情人逺路阻藍橋無由得見天若是肯周全除非是夢裡相逢把我離情訴一遍慢折長亭栁情濃怕分手欲上雕鞍去扯住羅衫袖問道歸期端的是甚時候回言未卜佳人竒偶唱徹陽關重斟美酒酒除非是解消愁我只怕酒醉還醒愁懷又依舊園苑飄微雨金凨蕩飛絮有意傷春恨無計留春住倚遍闌千默默俏無語雲山萬疊空凝目我的情人知他在何處吁欲待寄封書爭奈路逺山遙沒箇便鴻去肆館香雲擁叉分小金鳯為你多嬌態惹起愁山重月冷黃昏孤燈與誰共情人誤我良宵夢畫角頻吹梅花三㺯凨休吹入繡幃中只怕惱動我離情教我相思轉加重月兒髙四時繡陌花開遍芳郊正春妍緑栁拖金細紅杏飄香逺去歲情人花開共歡宴今春謾自謾自園林羡思憶多才羞觀雙雁天何時再團圎空教我坐想行思辜負了艷陽天海榴開紅熖池荷泛青錢帶綰和誰共簟枕同誰展對景恩情蹙破兩眉尖年時水閣水閣開排佳宴戲水鴛鴦教人羞見天青天肯方便早見俺那冤家同歡納晚天涼夜雨芭蕉戰秋凨雁聲逺驀覩鸞箋字病憶多嬌面曽記分離囑付去時言歸期暗約暗約重陽見未見多情木樨早開遍天月兒慢團圎爭奈獨守孤幃難捱暮秋天畫閣空粧遍紅爐謾空展縱有羊羔酒共誰同歡宴轉目年華不覺度芳年冤家那裡那裡共誰厮迷戀瘦損香肌殘粧嬌面天六出飛亂綿爭奈枕冷衾寒難捱暮冬天七犯玲瓏思情新紅上海棠猛然情慘傷前春有箇人共賞今日在何方早把春心蕩免教人斷腸細思量誰真誰謊自古佳人薄命怨燒斷頭香想挑花也會憶劉郎恨逺山無計留張敞花隂月影看看過墻朝雲暮雨睡覺夜長捱得今宵過明朝又怎當鶯兒對燕子雙飛來飛去為誰忙偏不到伊行芭蕉映粉墻緑隂清晝長炎天倍覺心悒怏獨坐傍南囪暮雨消繁暑慢凨生嫩涼看池塘鴛鴦兩兩世上有情都匹配偏我不成雙碧紗㡡鬆透玉肌香珊瑚鈎誤觸氷絃響浮瓜沉李共誰舉觴調脂㺯粉為誰曉粧懶向金盆浴盈盈自解裳腰如栁體似霜無人共試紫蘭湯空惹舊心狂金凨透小囪不禁羅袖涼秋來怕上危樓望舉目總堪傷衰栁垂寒雨敗荷擎晚霜擊玎璫􅉉前馬嚮最恨今宵更漏一似去年長看銀河織女會牛郎想嫦娥一樣情惆悵從來孤雁傳書故鄊緣何今日渾無半行想是恩情薄非干路渺茫芙蓉老菊蕊黃瀟瀟凨雨又重陽越越減容光江梅綻早芳雪花籠錦堂孤眠分外寒威壯怎不倍恓惶想他身上不知寒與涼懶梳粧當年模樣思憶千般促擁不是負心郎枕邉廂間了繡鴛鴦擁香衾撇下紅羅帳淺斟低唱當年洞房山盟海誓何時象床曽見燈開蕊還聽鵲繞梁朝朝拜夜夜香依還歸也謝穹蒼碩得永成雙綿搭絮思情當𥘉奴愛你聰明和你月底星前吐膽傾心説誓盟暗偷期膽戰心驚怕人瞧見掩耳偷鈴本待要棄了你箇冤家刀攪我心腹教奴怎不害疼誰想你另有了女裙叉氣的奴似醉如癡斜倚定幃屏故意兒猜不明白怎肯丢開傳書寄柬你又不來你若還負了奴的恩情人不為讎天降災奴家又不曽愛你錢財只愛你箇可意的冤家知重知輕情性兒乖奴本是朵好花兒園內𥘉開蝴蝶兒餐破再兒不來我和你黑海般恩情前世裡姻緣今世裡該心中轉轉兩三翻瘦損了香肌茶飯上無心珠淚連好心酸禱告青天非奴輕賤也是前緣怎下的拋閃了奴家要和你離别難上難當𥘉奴愛你凨流共你剪髮燃香雨態雲蹤兩意綢背親娘和你情偷怕甚麼傍人講論覆水難收你若是負了奴真情正是緣木求魚空自羞心中猶豫輾轉成憂常言道女子癡心惟有情人意不周是我迎頭和你情偷鮮花付與怎肯干休你如今另有了知心海神廟威靈把狀投奴今為你好沒來由又不曽圖覓了東西寄柬傳書惹下愁捶胸埋怨滴淚含羞奴為你枉耽了虛名好似畫餅充飢枉用了謀
