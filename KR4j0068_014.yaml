front:
  text: 雍熙樂府卷之十四
  hash: sha256:42838d0e463902ccd91a7e74595c0b615f68378042383db880ab31f677ead34e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_014-1a}
body:
  text: 商調集賢賔皇都八景大明朝萬方聲教美受天命建皇極禮樂興立綱陳紀賞罰明庶績咸熙攝偏邦一統車書掌中原萬里華夷聖明君至仁行道德股肱臣調鼎鹽梅凨雲齊慶會日月燦光輝八寶粧德凨𬒳四夷際遇升平世航海梯山重譯來朝會龍庭輳集稱臣納禮方物進獻多華麗白象金獅麒麟呈祥禎祥迭至鳯來儀玳瑁紋犀翡翆陳詞拜跪皆歡忭敬仰著天顔拱帝基攄誠慕義從此盡歸依聖恩施仁惠寰宇歡騰祝夀基梧葉兒烽燧息無征戍國朝安罷戰敵懸酒斾捲征旗農物辦耕牛臥士卒間戰馬嘶四海內樂雍熙聽擊壤歌讃喜侍香金童嘉氣彩霞飛繚繞都城映曉日龍樓鳯池金燦爛蓬萊圗裏歌康衢士庶咸集動歡聲快樂逰嬉仰賴著仁明治美民豐物熙溥沾生意太平年萬載應昌期賀聖朝壯觀皇都八景堪題玩晴雪西山霽薊門外煙雨飛瓊島春雲月殿清竒太液池秋風蕩緑漪菡蓞香飄萬頃玻璃水紅花金臺夕照挂斜暉錦屏幃居庸疊翆潺灣峻嶺勢崔嵬更相宜玉泉虹墜恰亦似洞天福地勝如那閬苑瑶池蘆溝皓月色輝輝也囉哩哩青哥兒幸逢著豐年豐年稔歲端的是鞏固鞏固洪基見如今雨順凨調和氣美普天下南北東西瞻仰著京畿朝賀􅊮幃聖主垂衣禮和樂備列文武公卿舞蹈揚塵頌聲齊祝萬萬歲當今帝尾聲錦乾坤江山麗聖恩寬厚撫黔黎但願皇圖天地齊集賢賔忠臣輔國殿頭官恰才傳宣敕俺老臣入宫闈不曽歇一時半刻連宣到兩次三回俺這裡鞠躬躬象簡當胸寬綽綽紫𫀆簇地按下俺這紗幞頭更將這玉束帶整齊登輦輅直叩丹墀不聽的靜鞭三下響那裡也文武兩班齊逍遙樂又不在長朝殿內朝陽宫裡多管在望思臺上坐地每日家子是哭哭啼啼你不合信讒言父子相離可不道事要所思免勞後悔他並不知我暗藏著苗裔我今日舉荐儲君怕甚麼泄漏了天機梧葉兒君王恱逹著這聖主機咱正是白髮故人稀遙望見盤龍椅怎敢道免拜禮誰敢失了尊卑我這裡舞蹈揚塵三叩畢老微臣拜舞罷山呼萬歲金菊香見如今毁將兵器為農器不動征旗挂酒旗省刑罰薄稅斂賊盜息路不拾遺普天下四海樂雍熙醋葫蘆那老兒他道是女配了夫兒娶了妻則他那有錢有物有東西則他那親兒親女都來這裡慶八十那老兒歡天喜地倚仗他有官有祿有承龍么老微臣有官呵􅊞與誰有家私誰做主意無挨無靠無親戚淚淹淹盡將袍袖濕不由我啼天哭地雙眸中兩淚似扒推金菊香老微臣身死靠著誰誰是我拖麻拽布的做了箇秦不收魏不管忠孝鬼若到寒食誰與我燒一陌𥿄錢灰村里迓鼓餓的我黑乾憔悴早難道飽食飽食終日深山內胡尋亂喫他每都􅶭樹皮也無那珍羞百味渴飲澗水飢餐榆樹採蕨薇也不是聖主孫君王嗣也不是太子妃也做得過首陽山伯夷叔齊元和令小儲君腹內飢委實的捱不得將一箇李延年剮割的血淋漓與儲君胡亂喫李延年剮皮割肉代糧食做的箇損別人安自巳上馬嬌怎當那肚裡飢又無那身上衣天也做三口兒苦相隨正寒天臘月在深山內凍的似癡捱不過這天氣逰四門則他那撲頭撲面雪花飛凍捐了病身體踅天踅地寒凨起常好是命將危幾口兒悲含恨有誰知勝葫蘆閣不住撲簌簌腮邊淚珠垂三口兒痛傷悲埋怨俺尊君􅑯下的教別人斷送了苗裔教別人欺瞞了尊位教別人傾陷了漢華夷尾聲今日將社稷扶聖明主賽堯年正好捧金杯穩坐著盤龍亢金飛鳯椅他正是君臣慶會輔佐著山河日月衮龍衣集賢賔端陽走驃騎萬方寧仰賀明聖國民鼓腹樂雍熙滅五毒青蒲似劍納千祥緑艾如旗感吾皇大德寬仁因此上內宰扶持則將這稀聞罕見的驃騎習擁旌幢緊驟狻猊鑼鳴如霹靂鼓響似轟雷逍遙樂人人爭氣箇箇嚴威堪圗在畫裡我則見鐵桶周圍志昻昂各逞雄威簇擁定萬里威凨百丈旗大開門比併髙低拖白練爭先閗巧忽的見鐙裡藏身又閃上揭鞍換屜金菊香我則見隔一騙二最為魁童子拜觀音參悟理趕剗拖塵緊追飛大捨身餓虎撲食流星趕月朔凨疾醋葫蘆關公斬蔡陽三戰吕布威穿錢隔肚幾人知五馬破曹那氣勢更有那枯樹蟠根巧藝耿恭拜井應天機么張良跨海東夜又探海西有踏梯望月夜眠遲五鬼閙判使見識總不如陳摶蓋𬒳騎鬃倒坐探烏騅么英雄伍子胥鞭伏桞盜跖夾鎗趕剗恰便似電光飛三馬解往來無賽比最􅕑的是金雞獨立有唐僧三藏取經回么夜義探海潮巴山能取水仙人指路慶雲垂九里山洞前拔虎尾更有那十間子弟鬼牽龍緊驟定赤狻猊節節髙也有那八仙慶夀二郎趕日摩利支飛刀對箭四毛女穿金戴翆也有那五猿爭果二仙傳道登山取水單獻靴雙馬解三耍旗呀有一箇戰八將英雄敬德元和令歸湖的范蠡薑太公釣魚勢耍孩兒兩馬比髙低急攘攘追凨小旎旗更有那推星踢斗奮神威節節髙前後催剪倒股往來追上馬嬌也有雙獻靴大揭屜更和那書畫琴棋金剛獻杵山門立左剗右疾大鞍剗有誰及逰四門飛蟾起足燦光輝六倒手最堪宜我見他登塵邁步尋蹤迹弓箭剗更無敵斜插桞竒後探鞦兩三回賞花時又見那玊女攛梭尋機織鞦韆子施逞真可喜單獻纓打扮的俊忒美野馬剗偏整齊倒捲簾緊追􅊞抱石投江萬古知入海求珠獻寶貝僵板闥縱金勒挺身直張子房圯橋三進履右入鞍左入鞍兩相宜勝葫蘆試看那李廣英雄射鴈體四夷解朝貢盡皈依見一箇老僧背坐窮妙理見一箇雙飛燕綽水見一箇千里眼無比見一箇順凨耳下雲梯見一箇倒挂枯松懸崖壁分左右埋伏用心機見一箇存孝施逞打虎威見一箇捨身落地見一箇滚鬃過膛無對見一箇四季跌落總難為后庭花也有那神香子劈華山見豹子翻身省氣力且休題旱水磨千遭轉更有肩樁起範疾見野馬三跳澗緊相隨射白猿深藏竒異復奪窩燕子飛張天師驅虎威前鈎後伏屜頷搭頦為第一雙鴈兒擔水救火馬爭馳老逹子放鷹大打圍二鬼爭環調猿背左插花下馬急右插花上馬疾尾金鼓鳴旗幟捲凱歌聲罷征旗揚塵舞蹈拜丹墀願吾皇穩登龍鳯椅衆臣寮山呼萬歲托賴著當今洪福與天齊集賢賔雞黍約二十年死生交同志友咱兩箇再相見永無由一靈兒伴孤雲冥冥杳杳趂悲凨蕩蕩攸攸恨不的摔碎我袖裡絲鞭走乏我坐下驊騮整整三晝夜水漿不到口沿路上誰敢道半霎停留身穿的絲麻三月服胸懷著今古一天愁逍遙樂打的這匹馬不刺刺凨團般馳驟百般的抹不過山腰盻不到地頭那孤塜荒丘仰天號哭破我咽喉更那堪樹稍頭冷凨不住吼恰黃昏雪霽雲收猛聽的哭聲哽噎遙望見幡影飄揚眼見的殢魄夷猶金菊香三生夢斷九泉幽休想一日無常萬事休莫為尊堂妻子憂這三件事我索承頭爾亡之後不須憂梧葉兒舉孝廉曽三聘論文章第一流兄弟你不拜相也封侯正滄海魚龍夜趂西凨雕鶚秋一去了不回頭這煩惱越感起天長地久挂金索皮殼定箇骷髏黃紺紺渾消瘦恰便似刀攪我的心腸痛煞煞難禁受恨子恨箇月之間少人來問候早知你病在膏肓我如何不捨性命將伊救村里迓鼓九原孤塜可惜好人不長夀兄弟你平生正直無私曲心無塵垢想腹中大才胸中清氣都做了江山之秀閃的我急急似漏網魚呀呀似失羣鴈忙忙似喪家的狗兄弟也不由我身恍惚提心在口元和令幾日長星落大如斗流光射如晝原來是喪賢人地慘共天愁樹挂汝陽城外桞青山一帶也白頭滿城人雨淚流上馬嬌休道是人一舟力萬牛百般的拽不動輿車軸你隂魂耿耿將咱候志己酬將靈聖暫時收逰四門踈刺刺慘人凨過冷颼颼支生生頭髮似人揪靜悄悄荒郊野外申時候昏慘慘落日壓城頭慘霧又收寒鴈又下汀洲景物正幽村落帶林丘勝葫蘆都做了野草間花滿地愁你為我不肯上墳丘枉教那一千人都落後便做道誰親誰舊誰薄誰厚豈不聞相守到白頭后庭花祭酒奠到一二斗挽詩吟到數十首可惜耗盡了凨雲志沉埋了經濟手論交逰你不落在人之後播聲名橫宇宙吐虹霓貫斗牛臥白雲啇嶺頭釣西凨渭水秋笑嚴光傲許由到今日一筆勾青哥兒兄弟你今日箇功名功名成就都不如古今古今前後一寒儒過如萬户侯既今日歸休人死不中留咱意氣相投知我心憂來到神州將髙節清修我去白玉階前拜冕旒我與你丁寧奏栁葉兒似這般光前𥙿後一靈兒蕩蕩攸攸我親身自把靈車扣一來是神明祐二來是鬼推軸我與你革刺刺相拽到墳頭集賢賔秋懷憶吹簫玉人何處也今夜病較添些白露冷秋蓮香謝粉墻髙皓月光斜止不過暫時間鏡破叉分勝強似數十年信斷音絶對西凨倚樓空自嗟望不斷嶺樹重疊怕流光奔去馬鴈陳擺長蛇逍遙樂歡娛前夜喜報燈花香生帶結剛得箇合諧誰承望又早離別常記的相靠相偎笑語喋畫堂中那日驕奢受用些樽中緑蟻扇底紅牙枕上蝴蝶醋葫蘆我和他𥘉相逢臉帶羞乍交歡心尚怯半粧醉半粧醒半粧呆兩情濃到今難棄捨錦帳鴛衾方才溫熱把一根鳯凰簮掂做了兩三節么我為他挑著燈將好句兒裁背著人將心事兒説直等到碧梧囱外影兒斜惜花心怕將春漏泄步蒼苔腳尖兒輕躡露珠兒常汚了踏青靴么我為他朋情上將謊話兒丢他為我母親行將喬樣兒托我為他在家中費盡了巧喉舌他為我褪湘裙杜鵑花上血我為他耳輪兒常熱他為我面皮紅羞把扇兒遮梧葉兒一箇是相府內懷春女一箇是君門前彈劍客半路裡恰逢者剛幾箇千金夜忽刺八拋去也我怎肯恁隨邪又去把墻花亂折后庭花夢了些虛飄飄枕上蝶聽了些擊丁當簷外鐵剛才得合上溫郎鏡却又早攔回卓氏車我這裏痛傷嗟鴛帳冷香消蘭麝困將來剛睡些望陽臺道路賖那憂愁怎打疊這相思索害也看銀河直又斜對孤燈明又滅青哥兒呀凨亂掃階前階前黃葉雲半遮栁稍栁稍殘月這離恨更比前春較陡些害的來乜斜瘦的來唓嗻待桑田重變海枯竭還不了凨流業浪裡來煞這愁呵剛不在眼角踅又來到眉上惹恨不的倩三尸肺腑細鐫碣有一日繡幃中玉肌重厮貼我將他指尖兒輕揑直説到樓頭北斗柄兒斜集賢賔秋憶瑣囱寒井梧秋到早霜月小粉墻髙説離思階前蟋蟀閙西凨枕上芭蕉鎖不住戰兢兢一點靈􅙈盻不到黑沉沉百尺藍橋這些時玉精神為花消瘦了害的來難畫難描我把他聲音兒愁記起模樣兒怕題著逍遙樂于飛方效間阻尤多歡娛較少昨日今朝笑青銅兩鬢蕭騷萬種凄涼厮輳著折挫煞多愁沈約怨了些鴛鴦枕冷鸚鵡杯空翡翆衾薄金菊香往常時花香春店馬聲驕今日箇雲暝秋江鴈影遙夢難成幾畨直到曉四壁寥寥燈熖短篆煙消醋葫蘆常記的透踈簾月半明掩重門人靜悄正嬌雲低壓海棠稍我和他既相知恨不相見早他燭花前將錦筝來斜抱剗的又背著人偷用眼兒瞧么他也曾病懨懨只自擔瘦亭亭難自保他也曽怕人知常帶著幾分囂他也曽擲金錢數番花下禱他也曽直等到星移月落他也曽倚闌干畫損掠兒稍么我和他對著神將海誓言我和他並著肩將眉黛掃我和他把陽春一字字細推敲我和他説私情一説一箇天大曉不離了相偎相抱他見我霎時間無語便把話兒嘲么他雖無甚麼傾國妍他雖無甚麼出類好似這等知人的情性兒最難學但見呵或是忙或是遲或是早那裡有半星兒違約多應是我心他意兩投著么他道我心同魚水諧情隨天地老你休要見垂楊又去折柔條他道是既綢繆只宜相會少只恐怕燕鶯知道他也曽抵牙兒幾度費量度梧葉兒今日也鳳去秦樓迥鴻稀漢苑遙雲散楚天髙他指冷筝間鴈我屏寒扇掩蕉剛間隔幾昏朝出􆈌的把秋光過了后庭花又不是緑囱前花謝早又不是瑶琴上絃斷了又不是青鳥音書滯又不是銀河凨浪惡止不過暫相拋這恁的求神服藥跳梭梭肉似挑急煎煎身似燒生踈了月底簫闌珊了囱下稿茶飯又不甚調夢兒又不大好青哥兒呀這病兒千方千方難療百般百般不效聽了些花漏沉沉夜轉迢寒透珠箔燈燼蘭膏凨閙簷鐸露滴松梢嘆今宵别樣好難熬眼睁睁盻不的雞兒呌浪裡來煞他存心豈是薄我留情非道少駕車的終久會題橋破菱花等間重輳却成就了錦堂歡樂把相思一擔擔兒拋集賢賔玩江樓家住在碧澄澄緑楊灣官渡口張綱索駕漁舟恰離了黃蘆岸白蘋洲畔早來到緑楊堤紅蓼灘頭為活計簔笠綸竿做交知野鷺沙鷗却才釣活魚換來新糯酒越凨波到大來攸攸船灣在鸚鵡洲夢不到鳯凰樓逍遙樂得了些安家情受教我夜去明來載花渡桞近凨流學得也凨流聽了些冝時的曲調歌謳看了些窄窄弓鞋蹙鳯頭翆紅香每日追逰我也曽輕扶翠袖欵拂紅裙重携素手金菊香親蒙官長把咱勾常言道一醉能消萬種愁氣昻昻走將來髙呌吼我和你有甚冤讐不明白恰便似打春牛梧葉兒住山野為活計趂凨波得自由我幾經官府惹間愁也不知冬和夏也不識春共秋你著我念勾頭我是箇不識字的煙波釣叟醋葫蘆小人破房兒一兩間破家私三四口止不過朝耕暮種靠些田疇喝公人忙將我兩鬢揪越分説越難答救恰便似熖騰騰火上去澆油么每一日錢四百米二斗止不過朝迎暮送走的滑􅌻黃貟外怕人相趂逐去時節鍾鳴時候來時節曉星殘月五更頭么我本是撑篙舉棹人又不是拈花􅎥葉手則我這打魚船上怎與他效綢繆黃貟外若知難素休我怎敢把恩人營搆一重愁翻做兩重愁么那小姐容顔似雨後花腰肢似凨外桞那小姐更知音更標致更凨流你看這打魚船上怎諧鶯燕友請你箇官人窮究怎下的將牡丹芽剪碎了喂村牛么那小姐香甜俊美嬌俺小人村呆憨強醜醜和嬌兩意怎相投你教我月明中緊將他懷內摟覷著我村皮粗肉恰便似雪團兒緊靠定黑石頭后庭花凖備鐝並頭蓮花下藕再不想釣斜陽江上秋不是我性狠心毒害姐姐呵也是官差不自由你早上扁舟船撑在當溜若依隨索罷休不依隨百事有腳跐著船罄口晃一晃一命休雙燕兒看著那一江春水向東流到官司怎索休只説道浪急凨狂怎生答救好􅊚緣一筆勾這夫妻兩罷手浪來裡煞這的是雙解元使的計策小蘇卿中了機彀我去那打魚船上準􅍯了釣鰲鈎他是箇惺惺人算來出不得漁父手相公呵免勞台候我將那點鋼鍬掘倒了這玩江樓集賢賔慶七夕暑才消大火即漸西斗柄往坎宫移一葉梧桐瓢墜萬方秋意皆知暮雲軒聒聒蟬鳴晚凨輕點點螢飛天階夜涼清似水鵲橋圗髙挂偏宜金盤內種五生瓊樓上設筵席南集賢賔金宵兩星相會期正乞巧投機沉李浮瓜肴饌美把幾箇摩訶羅兒擺起齊拜禮齊拜禮端的是塑得來可喜鳯鸞吟月色又輝夜將闌銀漢低閗穿針逞艷質喜蛛兒竒一絲絲往下垂結羅成巧樣勢酒斟著緑蟻香焚著麝臍飲杯觴大家沉醉櫻桃突水低紅蔥指剖氷瓜脆更勝似愛月夜眠遲閗雙雞金叉墜金叉墜玳瑁整齊蟠桃宴蟠桃宴衆仙聚會彩衣輕紗織翆禁步搖繡帶垂但碩得同歡宴團圓到底節節髙玊蔥纎細粉腮嬌膩爭妍閗巧笑聲舉歡天喜地我則見管絃齊奏啇音夷則見瑶天外斗漸移呀喜隂晴今宵七夕耍鮑老團圈笑令心盡喜食品愈稀竒新摘葡萄紫旋剝雞頭美珍珠嫩實歡坐間夜涼人靜巳笑聲直接青霄內凨淅淅雨霏霏露濕了弓鞋底紗籠罩仕女隨燈影下人扶起尚留戀懶心回四門子畫堂深寂寂重門閉照金荷絳蠟輝半柄又橫月色不西醉鄊中不知更漏遲士庶每安兵燹又息碩豐年稔歲尾人生碩得同歡會把四季良辰須記乞巧年年慶七夕集賢賔慶七夕新月一彎蟾半影如弓樣似梳形彩樓上金凨淅淅御階前玉露零零看銀漢天星期金殿賞人間節令靈鵲兒駕河光耿耿照簾櫳玉宇澄清瑞雲光燦爛蹤迹顯分明逍遙樂今宵喜慶此夜排筵一時待等望天邊女宿牛星爇沉檀寶鼎香馨奏笙簧一派清音擺列著御階前承應輕吹玉管慢品瓊簫欵撥銀筝金菊香響璫璫恰便似鳯鸞鳴韻攸攸有如鶯燕聲唱宫調繞梁一韻清舞的又裊娜輕盈勝閬苑賽蓬瀛醋葫蘆玉甌中瑞魁供細茗瓊漿玉液注金瓶對熒煌銀燭照玉屏碧天邊凨清雲淨不須再點九華燈么渡鵲橋河漢等駕牛車天上迎喜蛛兒盒內網絲成羅綺叢百花映月明華筵擺㝎穿針乞巧對雙星么銅龍更漏長銀漢光色清殿階前羅扇撲流螢金凨淅淅爽氣增露花鮮管絃相應看金梭墜下彩霞明梧葉兒金波淡玉宇清玉露滴金莖祥光靄瑞氣騰對銀漢織女共牛星滿注著瓊漿謾請尾聲金階前管絃鳴碧天邊韻相應度金針得過喜歡聲供珍羞百味滿殿馨直喫的星回斗柄但碩年年華宴賀升平集賢賔秋懷晚涼生碧天清似水秋意慘景悽悽最關情寒蛩啾唧助離愁塞鴈聲悲聽樓頭禁鼓𥘉敲更那堪畫角頻吹盻青鸞杳然無信息想人生最苦别離甚時成配偶何日赴佳期逍遙樂他那裡安眠穩睡在何處戀酒迷花怎下的辜恩負德想情人清減了腰圍淡春山誰畫蛾眉則落的一聲長嘆息空對著景物狼藉花殘易發葉落疾生人去難回金菊香金凨淅淅衆星稀玉露零零皓月輝無心憑闌十二倚寒透羅衣不由人兩眼淚雙垂醋葫蘆意懸懸想念伊悶懨懨成病疾胭憔粉悴似呆癡向深沉畫閣庭院裡倦舒鴛𬒳玉纎曲損數歸期么幾時得笑吟吟兩意親喜孜孜接玉杯雙雙携手入羅幃同衾共枕成匹配那些兒歡會從今後再不去愛月夜眠遲尾聲倘俺冤家情意改早忘了言盟誓料今生難得效于飛捧名香再向神前祈若許咱鸞凰匹配那其間慶賀做筵席集賢賔離思半囱間一輪涼月明十分病又𬒳兩樁兒應怎禁那譙樓上撲鼕鼕禁鼓更那堪銀臺上昏慘慘孤燈倚單枕捱不盡凄涼靠幃屏嘆不盡心情則俺這睡不安料應夢怎成繡衾寒凨透踈櫺怎聽那簷間鐵馬聲誰想道音㫘了紫鸞笙逍遙樂倦臨粧鏡怕見鶯花懶焚翆鼎想念俺梁鴻端的是錦繡才能俊俏多情瘦損形空著人上危樓望斷雲路鵬程這些時魚沉滄海鴈落沙汀恰便似線斷了凨筝金菊香常記的春逰郊圃展才能則他這花下題詩吟和的清凨流體態數可憎他和我並香肩同至郵亭飲芳樽憶春色贈春情醋葫蘆他能栽河陽縣內花㺯取那凨流紅葉影體的是章臺走馬畫眉行常記的正秋光侍香涼夜清唱一篇新詞美令向青樓端的占佳名梧葉兒思薄幸念可憎説的話不相應冷落了陽臺夢消踈了楚岫屏不由我淚盈盈端的是望斷了雲山萬層后庭花則他那信不通鴻不鳴則我這食不甜病巳成則俺這京兆尹把心情忘因此上河陽花板葉零想起他舊恩情誰承望今朝孤另則俺這情淚深似井黃昏悶髙似嶺錦筝歇金柱停紫簫間象極寧栁葉兒多管是占鰲頭一定享榮華一舉成名戀著那畫堂錦屋成婚聘則我這相思令漸伶仃俏形骸難入丹青尾房櫳簾幕間簾外畫樓淨望巫山縹眇碧崚層莫不是蘇州刺史不慣經則我這多憂多病雨雲私積趲下誓山盟集賢賔兩世姻緣隔紗囱日髙花㺯影聽何處囀流鶯虛飄飄半衾幽夢悶騰騰一枕春醒恰離了逰絲兒竹塢桃溪趕趂那蝴蝶兒早來到月榭凨亭我恰才覺來時倚著翆雲十二屏恍惚似墜露飛螢則我這寸腸千萬結長嘆兩三聲逍遙樂尚兀自神心不定倚遍危樓望不見長安帝京知他在何處也薄情多應是戀金屋銀屏想自想于咱家不至誠空説下箇磣磕磕的海誓山盟赤緊的關河路逺嵗月如流魚鴈無慿上馮嬌覷不的鴈絃斷臥了銀筝聽不的鳯嘴聲殘冷了玉笙獸面篆消間了翆鼎門半掩悄悄冥冥斷腸人和淚夢𥘉醒梧葉兒火燎般身軀熱錐剜般額角疼這些時即裏漸裡瘦了身形這兩日茶飯不待用這些時睡臥不甚寧若將這脈來評這證候多是廢寢忘餐病症醋葫蘆看了他容顔兒實是撑衣冠兒別樣整更凨流更灑落更聰明唱一箇小曲兒宫調清看了他軟欵溫柔情性則𬒳你坑了人的性命引了人的魂靈金菊香看了他錦心繡腹那些才能更和這雪月凨花可教我怎不動情酒席間小曲兒編揑成端的是剪雪裁氷惺惺自古惜惺惺浪來裡煞幾番家官身處來的較晚眼巴巴簾下等直等到星移斗轉二三更入門來不覺的畫堂春自生緊緊的將他來守定那溫存那愛惜那勞承金菊香幾畨待落筆巧施呈爭奈這一假傷心可教我畫不成腮斗上淚珠兒粉漬定無顔色鬢亂叉橫眼皮兒眉黛不分明后庭花想起這和薔薇花露清點胭脂紅蠟冷嫩花朵心偏愛畫蛾眉手慣經梳洗處將俺玉肩來憑恰便似鴛鴦般交頸這些時玉肌膚減了九停粉香腮無了半星無心情將雲髻整骨捱捱瘦了形悶懨懨畫不成栁葉兒呀寂寞了菱花菱花粧鏡自覷了自害自害心疼將一片至誠心都寫入氷綃􆂀和我這相思令都待要寄與多情説道是人憔悴人憔悴不似丹青浪來裡煞你比那題橋的沒信行駕車的無凖誠比著那漢相如厮敬重也不多爭我比那卓文君有上稍少了四星好教我呌天來不應豈不聞舉頭三尺有神靈浪來裡煞尾心事人拔著短籌有情人忒薄幸許了我三年來却又早五載不回程我如今覷天逺入地近潑殘生恰便似凨內燈見俺那負心短命則我這一靈兒飛入洛陽城集賢賔雪倚龍泉數聲長嘆息逰子去何期添一嵗長一分白髮治一經飽一世黃􅐽凨凛凛歲晚江空雪漫漫天闊雲低對梅花嘆人猶未歸觀不足嚴凝景致玉壷春艷艷銀海夜凄凄逍遙樂客囱深閉止不過香炷龍涎茶烹鳯髓𥿄帳低垂早難道翆倚紅偎冷暖年來只自知捱不徹凄涼滋味鴛鴦無夢鴻鴈無音靈鵲無依金菊香看別人吹簫跨鳯上瑶池乘興扁舟訪剡溪真乃是平地白雲三萬里堪畫堪題水晶宫翻做了素玻璃尾調琴演楚騷研硃點周易凨流似黨家終日醉如泥磨龍香拂鸞箋呵兔筆揮寫就乾坤清氣著人到老袁安猶自説兵機集賢賔孤悶自別離到今不見影空撇下誓海共山盟心性似隨凨栁絮身飄蕩如水上浮萍悶懨懨無語無聊冷清清斜倚幃屏不知近來誰至誠姻緣如火上氷凌孤幃愁蹙蹙繡幕冷清清逍遙樂懶臨粧鏡恰便似𥿄做的湯瓶充飢的畫餅我這裡側耳聽聲却元來凨擺簾楹鬼病纒綿可慣經瘦的來伶伶仃仃攸攸一枕夢魂驚鳯凰吟睡不寧怎教人捱到明這潑殘生有似凨內燈蘇小卿怎不怨雙縣令約當𥘉山寺等我這裡自評撲簌簌淚傾兩三畨空教人傒幸淅零零細雨霏骨捱捱甘成病冷清清獨對孤燈醋葫蘆針線不待拈鬢鬅鬆不待整不能調理見施逞一去了半年不見影在那裡誇強賭勝從別後不記的一星星金菊香睡不安坐不寧相思最苦捱殘更譙樓上畫角愁倦聽恨咱薄幸一無成事百無成尾聲怎禁這良夜冷月華淨自思量長嘆兩三聲無情懶觀園內景題起他踈狂的情性若得見我那負心賊方顯卦兒靈集賢賔離會恨離情到令心上悔這其間無語怎支持冷清清寒衾孤枕悶懨懨香冷金猊靜巉巉庭院深沉淚汪汪不住悲啼則俺那俏冤家這其間在那裡空教人染病耽疾這些時愁腸空懊惱肺腑悶如癡逍遙樂則我這形容憔悴粉淡胭消不見了三稍末尾空教我獨守香閨呆答孩廢寢忘食莫不我命犯孤辰不暫離不由人感嘆傷悲幾時香肩同並素手相將並頭再理金菊香一會家魂勞夢攘似著迷撧耳揉腮口倦題不茶不飯長嘆息不由人雨淚扒推心兒中懷恨有誰知梧葉兒想當日心厮愛端的是不摘離則為