子忻然駐待芳意任從容春纎凭煖金蓮立困付能催上玉華􅍡賺煞尾錦衣籠宫人馳騁盡温柔萬種強駐剛乗嬌𣣔滴顫巍巍簌翠遺紅暢道真恁踈慵寶鐙深蔵足弓金㗸慢鬆玉鞭不動馬蹄児懶趂海棠風勝葫蘆貶祿山漁陽則為我爛酔佳人錦瑟傍則為我金殿宿鴛鴦則為我殢殺風流睡海棠宰臣明謗弟兄隂講生送在漁陽么篇常則是一曲悲歌淚兩行近日越怏怏有甚心情習戦塲衆兇徒惡黨虎賁狼将那一箇不慚惶逰四門四邊荆棘遶城墙靜悄悄的沒人鄉風流繫囚邊庭上我不是孝児郎應您甚好爺娘后庭花煞枉常時喫的兩圍来麄十分得胖如今全不似當時壮旺受用處寰中奪第一别離後世上無雙這模様若到他行便指與他孜孜得認了半晌珎饈倦餉從教滋味長馬乳還濃釅羊羔児更香當日恰纔湯猛想起太真妃情况萬斛愁先滿九廻腸祅神急埋楊妃霧昏秦嶺日塵暗馬嵬坡傾國傾城到底成何用挽回壮士心絶却君王寵驚魂巳逐虎狼叢把咽喉緊匝素練難鬆寄生草肌膚變氣血擁淚行亂落珎珠迸腮霞雙擁臙脂重舌尖半吐丁香送溜刀刀一對鳯眸蔵曲彎彎兩葉蛾眉縱么篇妖年盡艶限窮海棠巳斷三春種梅花巳赴三生夢素娥巳返三山洞芙蓉帳裡有誰同鴛鴦枕上無人共六么遍思當日選玉容正雙棲枕鴛鴦素體香温酔魂情濃弄春嬌星眼朦朧夜連夜春與春相從弟兄皆列土侯封惜明皇如此親陪奉猛然愁絶慮逺衣足食豐么篇好難容好難容祿山何人比之為児往来私情暗通便亂宫差離長安使鎮漁陽恨輕别氣冲冲忽然反國驅兵撞破潼關自作元戎一朝命盡身雖痛盖因尔罪莫怨天公賺煞尾除了禍根苗絶却親昆仲為子為臣盡忠當下消磨了軍旅恨即時􅕑諕殺玄宗暢道驀見箇英雄搓玉揉香甚威勇似風雷性猛鐡石般心硬把一箇酔姮娥拖入地穴中賞花時哭香嚢據刺綉描鸞巧伎倆再不岀世超凡堪供養分外教襟袖淚淋琅則這一時半晌不弱如犯重丧么篇離了他行到俺行滴盡千行萬行金翡翆綉鴛鴦但撞天羅地網更不抛閃的越孤孀金盞児向椒房對紗窓是他用心児親製得風流様四停八當将蕙蘭装也曾暗懸低帳幕輕染舞霓裳也曾煖偎香體態也曾濃撲睡君王醉中天眼見得添悲愴枕上都恓惶縦有音書兩渺茫别後雖無恙枉使愁人斷腸量這些虚嚢怎生盛無限凄凉賺煞尾抛撇盡死生縁收拾聚别離况增製出眠思夢想染指餘馨猶拂鼻更勝如印臂殘粧覩物堪傷也似人生夢一塲恰教黄塵掩蔵又𬒳西風飄蕩再㡬時隔紅衫相伴着妳児香金殿喜重重秋思風雨秋堂孤枕無眠愁聴鴈南翔風也凄凉雨也凄凉節序已過重陽盻歸期何期何事歸未得料天教暫尔參啇晝思鄉夜思鄉此情常是悒怏賽鴻秋想那人妬青山愁蹙在眉峯上泣丹楓淚滴在香腮上㧞金釵劃損在雕䦨上託瑶琴哀訴在氷絃上無事不思量總為喒身上爭知我懶貪書羞對酒也只為他身上金殿喜重重悽愴望羙人兮天一方謾想像賦髙唐夢到他行身到他行甫䏻得一霎成雙是誰将好夢都驚破𬒳西風吹起啼螿惱劉郎害潘郎折倒盡舊日豪放貨郎児想着和他相偎厮傍知他是千塲萬塲我怎比司空見慣當㝷常纔離了一時半刻恰便似三暑十霜醉太平恨程途渺茫更風波零瀼我這里千回百轉自徬徨撇不下多情數椿半真半假喬模様宜嗔宜喜嬌情况知疼知熱俏心膓尾聲往事後期空記省我正是桃葉桃根各盡傷賺終日懸望恰元来擣虚撇抗悮我一向到此纔知言是謊把當初花前宴樂星前誓約真箇崔張不譲命該凋䘮險些病染膏肓此言非妄怕春歸白髪陡然千丈非關明鏡無情縁愁似箇長相别時多相見時難天公自主張若䏻勾相見我和他對着燈児深講春歸犯自想但只愁年華老容顔改添惆悵驀然平地反生波浪最莫把青春棄擲他時難算風流帳怎辜負銀屏綉褥朱幌才色相當兩情契合非強怎割捨眉南面北成撇漾尾聲動止幸然俱無恙画堂内别是風光散却離憂重歡暢八聲甘州天寳遺事引開元至尊爲舞按霓裳失政君臣雲鬟霧鬢那其間别是箇乾坤亡家若無安禄山傾國誰知楊太真雨露九天恩難洗妖氛混江龍繁華将盡嬌鶯啼破六宫春長安融日蜀道連雲富貴一塲鴛枕夢是非千古馬蹄塵君休問嵬坡古迹都付與涿郡閑人六么篇據先生俊多評論書讀萬卷筆掃千軍按唐書監本歐陽節文曲児壍關児嵓句児匀清新筆尖招聚海棠魂賺煞尾聲杜工部賦哀詩白樂天長恨歌都不似通鑑後史囬頭児最緊将天寳年間遺事引與楊妃再責遍詞因剔胡倫公案全新與諸宫調家風剏立箇教門若説到兩頭話分六軍不進您敢替明皇都做了㫁腸人祅神急雪景磨空生粉雲蔽日見彤霞透骨侵肌忽尔風飄颯峻寒若箭穿嚴冷如刀刮裁氷剪絮都半霎乾坤一玉壷表裏無瑕六么遍故邀佳客乗轎馬過向陽溪曲暎煖堤窊山茶半蕚江梅正花十里横橋直西下􆅂咧㡬人家籬落接平沙最宜觀賞堪圗画破墙酒斾古岸漁艖筠稍宻洒松稍重壓老木枯枝寒藤掛槎牙似玉龍搭撒亂披麻后庭花覩暮天昏黯黲望長林白刺擦馬盻山城近人嫌江路滑怨胡笳賞心不盡歸来情倍加随煞設酒筵連夜飲㑹詩題分字押掃竹葉聊酬興刳橙瓤深蘸甲論奢華圍爐同話此風流不羡党侯家瑞鶴仙楊妃蔵鈎會小杯橙醸淺綉蔟齊分袂幕重懸國色絶嬌然綠嫩紅柔香嬌玉軟時停管絃作戯同歡帝王前似春風花栁爭妍望東君長養無偏憶帝京銀燭熒煌不夜天列兩行見世神仙偷降蕊珠宫私出清雲殿雙按碧雲軒對蟠桃宴欲使心暗牽各把精神閗顯一賭輸贏先共言數欵規條盡寫全拈下紫霜毫磨下端溪硯醉扶歸仙裳深難見纎指共相連素腕齊擎併玉肩微露黄金釧恰便似未折得瓊葩半捲掩暎着宫粧面醉中天鳯嘴明珠顯荷盖露璣圎再拈起輕将翆袖揎来往都行遍解引嬌姿慢轉些児機變更勝如暗裏偷傳賺煞尾将錦籌雖把方欲偏一顆圎光中選那的是真妃堪愛處那片亂宫心並不遷延可知道偏得恩憐則見那得勝描金彩旗児偃春纎盡展玉鈎児難辯向玳筵間奪盡羙人權八聲甘州天寳遺事中華大唐四海衣冠萬里梯航太平有象玉環選入昭陽梧桐樹邊舞羽衣天寳年中侍玉皇取媚倚新粧偏寵恩光混江龍自九齡免相君王盤樂失朝綱巢玉樓翡翆鎻金殿鴛鴦揚子江南取荔枝廣寒宫裏舞霓裳誰承望樂極鳯關兵起漁陽六么篇馬嵬坡上楊妃丧龍􅋮劍閣鹿入宫墻妖氛掃蕩皇基再昌海晏河清廻天仗三郎歸来剗地哭香嚢元和令将繁華梦一塲都挽在筆天上編成遺事潤文房仗知音深賛賞敲金撃玉按宮啇剔胡倫衠四行后庭花煞煥星斗新樂章燦珠璣古錦嚢據此叚風流傳竒喧傳旖旎鄉判興亡諸官調説唱便是太真妃千古返魂香雍熈樂府卷之四終
