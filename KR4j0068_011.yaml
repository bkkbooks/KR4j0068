front:
  text: 雍熈樂府卷之十一
  hash: sha256:579bc5096340f86f78eb91f3b48c48da26ad5fd6915f0ea22d390c95e3f4ec5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_011-1a}
body:
  text: 雙調新水令元日祝賀大明紅日麗中天瑞雲籠玉樓金殿香風飄霧靄瑞氣隱霞邊爐爇龍涎萬邦㑹盡朝獻駐馬聴擺列着文武官員秉笏垂紳玉殿前更有這四夷朝見你㸔這簫韶一派奏聲喧有他者竒珍異寳貢竒鮮麟駝犀象来投獻讋偏邦来貢逺托頼着當今聖主洪恩遍沉酔東凨時遇着正旦節鴻鈞乍轉泛酴酥酒注金船有百司来慶㑹更萬國趋朝見賀昇平四海安然正值着百榖豐登大有年賀萬載皇圗永逺攪箏琶百姓每追歡勸喜遇着春色正芳妍你㸔這律管灰飛鴻鈞氣轉三陽泰景光鮮萬物生焉百草蒙暄可又早報新春将残臘遣喜咲登筵川撥棹我則見鳳樓前列簮纓文武官員這的是舜日堯年萬古流傅盛繁華當今帝輦奏歌聲徹太玄七弟兄文武每大賢志堅奉天顔見文修武僃皆通練安邦定國立山川賀春光四海皆稱羡梅花酒呀他毎都喜氣喧禾稼増延民樂欣然貧困哀憐俺丹墀内呼萬歲祝嵩嶽夀長年宰臣毎奉皇宣一齊的御堦前三舞蹈意誠䖍収江南呀托頼着當今天子重英賢見如今歌謡道㤗不虚傳賀新春萬象以囬先把仙音共演讃齊天萬夀永長年新水令春日慶豐年春色滿皇都勝唐虞太平時務八方皆讃喜四海盡歡娱萬國来服托頼聖明主百靈助江児水春光明媚和風麗日遲聴花隂深處燕語鶯啼㸔雙雙蝶對飛緑栁翠盈堤桃花遶澗溪翫賞芳菲玉樓人酔金勒馬児不住嘶逺望着清池緑水賽閬苑繁華勝地萬花開似錦重重圗画裡沽羙酒讃當今明聖主普天下喜無虞攝伏的四海来賔皆納土托頼着吾皇洪福萬民樂盡歡娱太平令樂奏着簫韶音律酒斟着玉液瓊巵十二樓香風馥郁九重宫祥雲擁護文武毎搢笏拜舞一齊的讃祝萬萬載皇基詠固川撥棹蜂蝶戯萬紫千紅真箇羙我只見緑栁依依画輪過香塵蕩起聴笙歌聲韻齊待今宵沉酔歸錦綉江山景物最竒見逰人来似蟻海棠開血染胭脂梨花放似江梅綻蕋一齊的讃祝萬萬載永固皇基餘音一年此景春和氣想蓬莱也只如是端的羙景良時新水令燈詞鳳城佳節賞元宵遶鰲山瑞雲籠罩銀河星皎潔天塹月輪髙動一派簫韶開筵宴儘歡咲川撥棹花燈児兩邊挑更那堪一天星月皎我則見綉帶風飄寳盖微摇鰲山上燈光照耀剪春蛾頭上挑七弟兄一壁廂舞着唱着共弹着驚人百戯其實妙動人的傀儡怎生學咲人的院本其實俏梅花酒呀一壁廂舞鮑老仕女每打扮的清標有萬種妖嬈更百媚千嬌一壁廂踏迓古呀敢一壁廂躧髙橇端的是有咲樂細氤氲麝蘭飄咲吟吟飲香醪排筵宴賞元宵収江南呀今日箇喜孜孜開宴賞元宵我則見玉纎慢撥紫檀槽燈光月色兩相交照樓䑓殿閣今日箇開懐沉醉樂陶陶新水令燈詞大明黎庶盡康寧荷皇圗一人有慶八方皆納土萬國進趋呈鳳産麟生民撃壌誦歌詠駐馬聴海晏河清白叟黄童喧市井臣賢君聖民安國泰好收成疑承輔弼任賢能臯䕫稷契持公正享太平時逢佳節人歡慶甜水令髙聳聳玉砌雕欄貝闕珠宫瑶池掩暎簫鼓樂昇平齊臻臻寶輦金輿鸞飛鳳舞鰲山境勝賞元宵春滿都城鴈児落珍饈百味亭樂奏天街靜龍樓鳳閣中月色燈光暎得勝令天地一壷氷錦綉萬枝燈朶朶金蓮放迢迢銀漢澄彤庭拜舞千官慶公卿髙呼萬嵗聲側磚児来往往香車寳馬爭馳競金吾玉漏暫時停燈光月色遥相暎竹枝歌銀漢碧澄澄萬丈鰲山接太清簇錦攅花列画屏鋪紅剪彩萬枝燈樂陶陶逰閬苑咲吟吟入蓬瀛聴仙音嘹喨管絃聲沽羙酒樂豐年百榖登賞佳節好時令萬國衣冠仰大明獻禎祥表誠重譯朝盡歸命太平令四海伏干戈肅靜民樂業法正官清有武職文僚秉政玉葉金枝昌盛呀賀一統大明玉京錦城都仰頼當今明聖新水令燈詞正元宵髙點萬家燈照樓䑓綺羅相暎金蓮陸地開簫鼓掲天鳴銀漢澄澄鰲山結彩雲靜拆桂令樂豐年海晏河清慶賞元宵節届新正只聽得大樂鈞天千門燈火晃若蓬瀛開萬斛金蓮滿城振金䑓一片歌聲凝望分明時遇昇平賀吾皇洪福齊天樂雍熈萬載康寧鴈兒落鳳城中軍民和氣生鰲山畔燈月光輝暎天街上香車寳馬喧譙樓内銀漏銅壷靜得勝令韻悠悠鼓板管絃聲香馥馥羅綺麝蘭馨玉繩低旋轉從教動金吾排威嚴不禁行賀四海昇平祝碩着國祚千年盛慶五榖豐登照乾坤萬里明沽羙酒聴笙歌滿鳳城動歌舞宴龍庭一咲悠然春自生串香噴寳鼎爇龍涎臘梅清太平令正值着邊庭安定盡都来朝賀神京又喜遇元宵佳令恰好放梨園承應畧聴樂聲讃稱萬萬載臣賢君聖新水令一年羙景㸔鰲山燈火徹雲霄賀新正九重春到三陽開泰日萬國賞元宵雨順風調民庶總恣歡樂駐馬聴喜遇花朝夭桃㺯色杏含嬌淡烟籠罩盈盈橋栁發青條沙暖鴛鴦宿舊沼泥融燕子歸巢難画描蛾眉淡露青山脚喬牌児鞦韆庭院小仕女語喧咲車輪馬足紅塵道家家将墳墓掃水仙子風翻麥浪翆雲揺日暖楊花瑞氣飄露凝萱草金簮倒愛清和時節標雨初晴滿地禾苗浴佛水心香妙賽神羊口愿了准僃下㡬領𧖟箔鴈児落禱雲龍春社炒懸艾虎家家樂浴蘭湯公子嬌閗百草佳人咲得勝令氷碗浸櫻桃玉藕切瓊瑶竹葉傾銀斚松花釀翆飄檀板輕𫾣唱徹黄鍾調把彩扇輕摇凉生白苧𫀆甜水令和採菱歌悠悠輕韻合着仙樂牛女渡星橋素手相携金橙旋摘白魚新釣端的是無福難消折桂令問嫦娥何處是逍遥月吐寒蟾書寄鳴鶴丹桂花香玄霜搗藥金井梧凋百年人百般計較秋陽暠酒和琴挑夜景迢迢酔也酕醄醒也逰遨痛飲狂歌鼓瑟吹簫對玉環九月登髙無邊景物饒社㑹龍山西風落㡌早紅葉墜林稍黄花初綻曉錦片似秋光重陽休負却負却重陽淵明空潦倒清江引小春時節陽氣薄已有豐年兆萬寶入天倉一點通玄竅天公造化真箇巧沽羙酒撼龍山風怒號簾幙外雪飄飄銀海瑶山樹縹緲粉粧成殿閣白練練賽瓊瑤太平令梅花夢忽然驚覺梅花神相友相交聴一曲中和古調弹一曲幽閑雅操呀㸔了這錦貂翆翹綉襖暖融融将画屏倚靠尾豐年稔歲合温飽酴酥酒除夜安排了門上換桃符户外蒼术燎處處歌謡托頼着萬萬載洪基受用到老新水令中秋一天清露散瑶光香馥馥桂花初放海天秋欲老草木葉将黄佳景非常開宴在玉樓上喬牌兒我則見氷輪出海洋瑞彩罩朱幌平分金水多清爽助詩人情興廣沽羙酒則聴的歡聲動帝鄉和氣蕩空蒼今夜團圎興趣長開懐宴賞對嫦娥舞霓裳太平令酒滿泛珍珠佳醸歌聲奏羙韻新腔風力微蟾光偏亮酔顔酡襟懐儘量呀我今日對着這月光讃揚慶賞幸遇着太平年豐登景象清江引吾皇聖徳天地長四海皆歸向一統錦江山萬載長興旺慶中秋玳筵常宴賞新水令翫春輕風細雨養花天賞韶光在海棠庭院夭桃如噴火楊栁似堆烟景羙花鮮春風滿玉樓殿喬牌児異香飄禁苑錦綉滿花園堆紅積翆真堪羨牡丹花正妍鴈児落蜜蜂児髙低在花内穿粉蝶児上下向林中旋錦鳩児雙雙在葉底飛金翅児對對向花枝轉掛玉鈎紫燕見輕飛對舞翩梁上歇簷前串舌巧黄鶯枝上言百種嬌千般囀列玳筵排華宴宜男草遣興忘憂好花児似語無言亂栁葉麗春花競綉競綉爭妍荼䕷架淡黄淡黄雲練素馨放香氣飄金殿上幽香遍紫錢翆錢風吹動滿池面太平令呀翆萍藻魚逰水面玉泉清龜戯池邊蜂採花花間留戀蝶遶枝枝上盤旋呀栁綿滿天舞旋亂穣穣榆錢滿院豆葉黄玉堦前画板鞦韆金殿上品竹調絲奏管絃音清悠韻逺對對嫦娥雲外顯玉珮瓊簮綉襖羅衣翆環金釧七弟兄殿前兩邊列飛仙似月宫仙子雲間現輕踏画板襯金蓮髙髙下下空中轉梅花酒呀見許飛瓊下洞天寳髻垂偏綉帶風搧錦綉畨旋光凝得釵釧輝雲暎得佩衣鮮捧金盃酒慢傳弹銀線燕鶯言吹玉管鳳鸞翩𫾣象板韻聲連収江南呀端的則見這輕盈嬝娜舞蹁蹮歌聲清巧透天邊笛音清亮透雲軒勝蓬莱閬苑不枉了良辰佳節賞花天新水令憶情碧桃花外一聲鐘綉衾寒喚回春夢香消金獸冷花落翆屏空雨雨風風攛㫁的病児重駐馬聴帶結頻鬆瘦骨不禁愁冗冗眉峯難縦黛蛾深鎖恨重重瑶䑓人逺信勞鴻彩雲聲㫁簫閑鳳惡相思千萬種百般的難把愁懐送鴈児落冷落了春風銅雀宫間阻了夜雨陽䑓夢䦨珊了停雲燕子樓寂寞了流水桃源洞得勝令单守着四扇矮屏風三尺舊絲桐總費嚢中藥全消鏡裏容簾籠步月無人共花叢㝷春誰與同川撥棹我這里恨匆匆晝偏長夜更永許多時歌歇梧桐悵冷芙蓉酒盡瑤觥不見紅圍翆擁望藍橋無路通七弟兄對着這落紅舞風画䦨東怯餘寒簾簌金鈎控寄閑情琴在錦嚢封揾啼痕䄂濕瓊珠迸梅花酒减崔徽画裡容怕曉角昏鐘恨芳草青􅍡恠浪蝶狂蜂秋来呵江上列花落也未相逢又不知吉與凶我則索含着泪告蒼穹陪着咲問青銅側着耳聴歸鴻緘着口怨東風收江南呀懨懨不比舊時同緑囱針線廢春工殘雲剰雨自西東全無有定蹤巫山十二總成空新水令餞别馬蹄香襯落花泥近清和日長天氣㡬樽辭别酒三唱報晨鷄一望平堤綠暗紅稀留春住百無計駐馬聴翆栁烟迷迎客青山數點齊綠槐風細可人黄鳥一聲啼麥蔵鴉蚕入簇榖初犁燕營巢鳩喚友禾分裔官路上慢驅馳一鞭行色匆匆意沉醉東風護逺水青蒲綠葦暎村居瘦竹踈籬郵亭古道長野渡扁舟繋望天涯雲樹凄迷山色朦朧雨亦竒宜寫在丹青画裡慶東原薄酒逢村酔新詩遇景題好山一路随征斾童僕弱行装擔遲香塵滚驊騮去疾風力劲紗㡌簷低曉出大梁城晚宿延津驛離亭宴帶歇拍煞我向那金䑓一望霞光霽你去也歸鴻㡬點催征騎赤緊的心忙意急准備着待玉漏鳳樓前列鵷班金殿側秉象笏丹墀内㸔香烟傍衮龍曉色明旗幟耿耿的丹衷向日方表我一片老臣心萬年磐后國千古中華地托天朝雨露恩永帶礪山河勢嘱河山先生要知我常是謹守分報皇恩秉忠誠立家國新水令離愁卜信海棠枝上子規啼伴離愁九分滋味時當明媚景紅綻嶺頭梅陡憶相知歡㑹在何日駐馬聴寛褪羅衣昏曉相催䏻有㡬困人天氣懨懨懶去傍朱扉青鸞失却信音稀近間鏡裡添憔悴瘦形容猶似鬼害相思鎮日情如酔鴈児落我恰纔輕将蓮步移欵向花前立好教我含愁訴與誰揾不住兩眼恓惶泪得勝令我這里自嘆自傷悲自怨自孤恓月下燒香拜盻的来伶仃瘦影微一㑹家呆痴怕入香閨内獨自箇幽棲滿懐愁只自知川撥棹曉夜家盻佳期好恩情如同塩落水恨只恨短命强賊飽病難醫狠似王魁恨薄情辜恩負徳撇奴家在兩下里七弟兄一㑹家黛眉慢蹙數歸期早離别三載凄凉日怕黄昏鐘響漏聲催怯啼春燕語鶯聲嚦梅花酒呀减崔徽画裡肌恨芳草凄迷恠浪蝶分飛當時也臨逺别呀敢曾有話對咱題百椿児無一實我恨不的死㝷追負心賊把咱欺望永逺效于飛生拆散各東西收江南呀這些時懨懨悶守舊屏幃孤眠獨枕泪珠垂燈前月下費相思全無箇信息金錢每夜對神擲新水令春怨海棠深院杜䳌啼一聲聲喚将春去落紅閑不掃飄絮亂猶飛簾幙低垂曉風輕篆烟細駐馬聴心事羞題画閣無言空嘆息春情空憶瑶堦獨步自徘徊纎腰寛褪絳綃衣玉搔亂綰青螺髻無歡容不理浥鮫綃揾濕相思泪喬牌児慵将這斑管揮倦把那青銅對玉容寂寞了心如酔這芳菲誰愛惜落梅風和風細麗日遲燕呢喃往来相戯㺯春音鳥聲児嬌更羙他咲愁人不禁憔悴鴈児落這些時香消脂粉稀清减腰肢細香殘錦綉衾夢破鴛鴦𬒳得勝令呀春意有誰知春恨自心馳鳳去簫聲㫁魚沉鴈信違追随屈纎指把歸期記孤恓染霜毫将離恨批滴滴金空撇下