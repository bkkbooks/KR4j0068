掛無牽鋤一會閑卒苦心腸也寛収一㑹貧受用老㓜都歡濁酒隣家換酔了穩眠飢飽且随縁小小山岡平川逺買箇黄牛賤種時種一囬収時収一遍這生涯自在誰人管􅃄連􅋄連羊㱕隴上牛飲溪􅁁斜凨細雨隂晴變簑笠當先吹一曲寒林葉捲歌一聲晚照雲閑富貴􅀙他戀酔了穩眠無梦到長安夕陽入照凨力軟􅅇㺯梅芲變􅀐牛過逺村名利都不見這生涯放浪誰人管叨叨令兼折桂令䭾背妓名陳觀音奴􅞩児腰􅀛児背玉連環繫不􅁸香羅帶脊児髙絞兒細緑茸毛生就的王八盖眼児瞘鼻児凸驅處走了猢猻恠嘴兒尖舌兒快洛伽山怎受的菩薩戒兀的醜殺人也麽哥兀的不醜殺人也麽哥鈎兒形絛兒様爛茄􅀲辱沒殺鶯芲寨鶯芲寨命􅂻合該一背兒殘疾一世兒裁劃便道是倒鳯顛鸞鶯儔燕侣彎不刺怎麽安排凨月債休􅀅人㝎害俺則怕雨雲濃厥殺喬才你這形骸其實歪揣調稍弓着不的扯拽竅頭舡趂早児撐􅄏脫布衫兼小梁州羙妓氷肌瑩寳釧玲瓏藕絲輕環珮玎􅭉櫻桃小胭脂露濃海棠嬌麝蘭香送玉頸圎搓粉膩紅恰便似映水芙蓉犀梳斜墜鬂雲鬆黄金鳯髙挿翆盤龍􅓸波仙子生塵梦向瑶䑓月下相逢酒暈濃凢心動夜凉人静飛下水晶宮又妓思映斜陽数􅀧㱕雅蘸秋波㡬􅈁殘霞􅃢瑚枕鮫綃半榻水晶簾玉鈎髙掛廢寢􅁯飡子為他他如今逺在天涯想着那月明􅂊上海棠芲却又早相約在鞦韆下題起来滿身児麻老夫人知道呵怎肯甘休罷小梅香絮絮荅荅俺則索悄悄央低低罵似這般躭驚受怕辜􅀒了俏冤家梅花酒兼七弟兄嘆世他每日咲呵呵道淵明不如我跳出天羅占㫁烟波竹塢松坡到處婆娑到大来清閑快活更㸔時莭酔了呵休恠他唱箇弹箇似凨魔他把功名富貴皆叅破有芲有酒有行窩無煩無惱無灾禍又年紀又半百過壮志也消磨暮景也蹉跎鬂髪也斑皤想人生有㡬何恨日月疾如梭得磨跎處且磨跎向尊前莫惜酔顏酡古今都是一南柯􅂵羅未必勝漁簔休只管戀它急囬頭好景已無多鴈兒落兼清江引野興喜山林眼界髙嫌市井人􅃄閙過中年便退官再不想長安道綽然一亭塵世表不許俗人到四面桒麻深一帶雲山妙這一塔兒快活直到老后庭芲兼青哥兒喜孜孜擺珍羞􅄏大筵韵攸攸奏笙歌列管絃細氤氲􅂦内香凨動錦重重彩雲飄則在雲外懸四時慶豊年恰便似蓬莱仙􅁐兠率宫極樂天似瑶池如閬􅁐呀你㸔那龍楼楼楼金殿見如今鳯凰凰凰来現海外直臣朝帝輦更有那百司官員武勝文賢正直忠良受賞傳宣東魯西戎北狄南蠻四海千􅀖萬􅀦来降喜孜孜拜舞在玉堦前萬萬載昇平宴進忠良為股肱懾偏􅀖朝鳯城舉意言忠信則要俺為人行志誠既然是用賢􅀎湏索要忠良直正㝎􅁁疆無􅀾争嚇蠻夷湏拱辰保山河朝帝京呀現鑾輿皆㱕㱕㱕仁聖進忠心率土来賔慶都只為大放賢門一箇箇􅃟俊英見如今四序和平禮樂欣欣􅀺庻歡慶鳯舞麟生海晏河清普天下軍民無憂無慮大咸寍皆因是托頼着吾皇聖湘妃逰月宫帶折桂令贈遂安陳總戎王春泉作簮纓華胄更風流韜略胸蟠誰與儔蟒衣玉帶江山秀列三公名位乆秉丹心日侍龍樓歸􅀞閣笙􅁔齊奏撫青萍光芒射斗宴佳賔詩酒賡酬宴佳賔詩酒賡酬􅀚徳投壷分韻蔵䦰决勝圍棊爭竒打馬較射贏籌寳炬吐玉荷花紐瑞烟飄金􅂦香浮羙景堪􅀵樂事淹留塵世人仚京輦瀛洲殿前􅂬際清朝西班人物顕英豪詞林吐出珠璣耀俊逸才饒到春来詠碧桃入夏来引玄鶴深秋酔賞黄花茂冬寒時雪飄錦帳底飲羊羔滿庭芳金鞍錦韉青驄寳馬玉勒絲鞭宜時逰賞園林遍景樂壷天横槊賦詩揮綵箋穿楊手箭射飛鳶時稱羡芳名播逺看功業勒燕然喜梧桐贈張茶芲妓名蒙山頂上茶不比閑芲卉採得茶来一篓児千金貴香香噴噴瓶児􅂻煨想起茶来酒也無滋味前縁前世少下下下茶行利蒙山頂上茶榖雨晴時採採得茶来一篓児千金買香香噴噴瓶児􅂻釃想起茶来酒也無心愛前縁前世少下下下茶行債雪裏梅慶夀㸔仙子跨黄鶴乗雲霧下青霄他都来慶蟠􅊝只􅂅的延年益夀不弱如蓬菜三島黄薔薇祝頌君天坐碧霄寳􅂦内香燒弹着唱着舞着端的是十分歡樂玉纎輕把錦筝挑春葱慢撥􅂵檀槽紅牙按拍品鸞簫堪也波描齊和着慶成吾皇大明朝脫布衫兼小梁州慶賀明聖主仁彷三皇明聖主徳彿陶湯明聖主千􅀖進禮明聖主萬民仰望百姓每䖍誠一炷香一齊道謝吾皇謝吾皇垂整朝綱今日得昇平降􅀺庻每得安康􅂅祝我聖子神孫常興旺金枝玉葉盛隆昌􅂅吾皇聖夀長保山河壮帝疆普天下人民仰望賀萬世大明皇月上海棠秋夜海棠開玉楼芲影清秋夜金屋香殘午漏徹􅀷院海棠開全似那仲春二月盈盈紅頰向霜華乍怯靑娥銀燭髙燒者睡足嬌容怕凋謝着意護芲些正值西凨􅁖劣紅芳粧􅀧園林富也似嫌黄菊千枝放如妬芙蓉半面粧秋日逞妖嬈還與那早春一様秋凨蕩此際霜清月朗瑶光乍轉芳枝上翆䄂驚寒若悽愴垂首歛嬌姿獨􅀝闌干宁望􅄏朱幌酌酒芲前共賞掃晴娘述興掃晴娘髙盤雲髻閗紅粧手持竹箒三千丈舞䄂翩􅀭掃隂雲見太陽曙色光晴霞晃彩鸞囬馭到仙鄊相酬進玉觴掃晴娘輕移蓮步下囬廊飛空直到青霄上掃浄晨光􅀅濃雲濕霧􅀭山色蒼清波􅃞㱕来金􅂦􅅡名香相酬奠酒􅄴掃晴娘臂懸􅁅土絳紗嚢化成萬斛空中颺堰住銀潢㸔晴天日月光日月光羅星象㱕来相勸酒肴香人間喜􅂔􅀭掃晴娘一身可喜好衣裳便􅀅雲霧相除蕩盡力掀􅀭掃晴空萬里長打麥􅀭農夫望㱕来相謝救民荒佳名百世芳酔扶㱕止軒瘦後因他瘦愁来為他愁早知伊家不應口怎肯先成就你營了人也罷手喫了我些酩子􅂻罵低低児呪頻去教人講不去自家忙若得箇相思海上方不到的害這些閑魔障還咲我眠思夢