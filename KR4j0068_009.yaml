front:
  text: 雍熈樂府卷之九南吕
  hash: sha256:42966eccd5c31cdc9a08a444627ed67ccbddae9dc19e6dbc7a409eb3c5a0df77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_009-1a}
body:
  text: 一枝花威武乾坤旺氣髙日月光明照衆星拱北極萬象應皇朝雨順風調國泰民安樂各偏邦来進朝享宗廟社稷威靈差遣祭名山華嶽梁州保山河公侯勇烈定邊彊直正臣僚有仁有徳行中道齊家盡孝報國臨朝擎天妙䇿濟世功勞退奸邪選用英豪進賢䏻施展才學領雄兵南北無敵布勇猛東西戦討用三軍跨海征遼帥領將校行兵布陣依三畧但到處尅伏了盡按着孫呉運六韜盖世功勞尾聲西戎東虜歸伏了北狄南蠻賀聖朝萬國千邦盡来到各分他品爵丹墀内列着齊上當今謝恩表一枝花初夏池塘中睡錦鴛樓閣上飛雙燕紅榴招戯蝶緑桞噪新蝉葵綻堦前竹笋侵墻串泉流草徑邉緑茸茸莎展青氊密匝匝苔鋪着翆蘚梁州荼􅐘架隂稀日轉木香棚影宻風搧消磨暑氣把香醪勸有氷沉果木香爇龍涎有知心朋友歌舞婵姢盡開懐語咲聲喧任披襟撒髮掀髯㸔蜻蜓菡蓞初開隠逰魚浮萍乍展托青蛙荷葉纔圓登臨画船趂薫風撲入在垂陽院對此景可堪羡慢把金罇淺淺斟盞盞垂􅘟尾聲一彎新月添情􅌒十里香風助酒筵向曉歸来小庭院簟紋鋪水淵紗㡡在路邊一枕珊瑚夢魂逺一枝花間阻風吹散楚岫雲水渰㫁藍橋路硬分開鶯燕友生拆散鳳鸞雏想起當初止望待常相聚誰承望好姻縁邅間阻月初圎忽被隂雲花正發頻邅着驟雨梁州他為我在画閣中􅌒拈針指我因他在緑囱前懶㸔詩書近新来不由我心憂慮這些時琴閑雁足歌歇驪珠我神心恍惚更和這鬼病揶揄望夕陽對景嗟吁倚危樓朝夕躊蹰我我我覷不的小池中一来一往交􅖪鴛鴦我我我聴不的踈林外一逓一聲啼紅杜宇我我我㸔不的画簷間一上一下閗巧蜘蛛景物太毒蜘蛛絲一絲絲又𬒳那風吹去杜宇聲一聲聲喚不住鴛鴦對一對對分飛各趂逐不由我感嘆嗟吁尾聲㡬時䏻勾那柔條児㘽接上連枝樹䁔水重温比目魚那的是着人腸㫁處囱児外夜雨枕邊廂淚珠知我這一點芳心做不的主一枝花志士未遇飄零在海角邊流落在天涯外論文無故友仗義有英才運拙時乖虎瘦雄心在休将人一例猜志髙如西嶽巓峯量寛似東洋大海梁州誰承望花正發風狂雨驟月𥘉圎霧鎖雲埋聖人道歲寒然後知松栢憑着我胸懷星斗志􅐈江淮心蔵錦繡口吐文才為功名逺逺而来嘆踈貧朽木之材休休休那一箇肯學那龎居士濟困扶危恁恁恁則待學費無忌輕賢重色是是是那一箇肯學那孟甞君仗義踈財見来痛㢤屈沉殺乗鸞跨鳳攀蟾客時不来且寧柰有一日金榜将咱名姓開那時節苦盡甘来尾聲讀毛詩知禮記春秋冊我是箇逹書易庸學語孟白得換箇紫羅襴白象簡黄金帶那時節快㢤樂㢤不枉了寒窓下辛勤二十載一枝花叔寳不伏老箭空攅白鳳翎弓閑掛烏龍角土培了金鎻鎧塵蒙了錦征𫀆空喂的戦馬咆哮劈楞簡生踈了那的是我心内憔多不到五七載其髙不䏻勾惡狠狠沙塲上戦討梁州如今但做夢我和那敵軍兩箇對壘不甫䏻纔睡着撲刺刺戦馬相交則見篩日影滴溜溜繡幕翩翻我則見忽刺刺雜彩旗揺急煎煎心痒難揉往常時我也曾遇水疊橋往常時俺逢山呵便開道今日箇老来也天那剗地着我央别人跨海征遼悶懐怎消這其間病體児依然較自暗約枉醫療如今那肅殺秋風動瘡越發作好教我疼痛難熬牧羊關我和那胡敬徳初相見在羙良川俺兩箇厮撞着我和他比試一箇好弱低髙他将那虎眼鞭忙来擊我将這劈楞簡急架却得空便難躱閃待相饒可便怎相饒我甫䏻捜搜兩簡方将中他可便騰便騰復三鞭還的巧尾聲那簡却便似一條銀蠎除了鱗角那鞭恰便似半截烏龍去了牙爪遥望見簡去鞭来撲撲的腦門挑休道是正着但些児抹着便就是鐡臂銅頭也震碎了一枝花贈武臣銀磨鳳翅盔玉碾獅蠻帶黄金鎻子鎧蜀錦戦𫀆裁梁棟之材入朝相出朝帥展英雄顯氣槩論英雄勝宋國文山說英勇如胡公大海梁州敕第居錦䄄綉褥列簮纓画㦸門排衣冠濟楚名尊大有擎鞭壮士捧臂金釵官居九錫職理三槐定邊彊静掃塵埃懾偏邦朝貢金堦一箇箇秉赤心護國尊君一箇箇理隂陽調和鼎鼐一箇箇效忠誠腦􅐈江淮兵書戦筞軍分竒正威風大平蠻虜肅邊塞拜将封矦象簡揣愽一箇誓劒金牌尾聲論武呵不弱如施謀畧守秦關英猛将夷吾策論文呵不弱如嚇蠻書掃雲箋酔筆題詩李太白鐡劵丹書賜先代名揚四海聲聞在九垓華胄簮纓播萬載一枝花燈詞磐石鞏固基啓運興龍地天星應人馬地勢作屏圍水秀山竒士庶皆豪貴庄農多黍稷幸遇着盛世明時端的是豐年稔歲梁州恰新春鴻鈞氣轉早元宵斗柄寅回忻逢五夜堪人意一輪寳鑑萬顆珠璣燈光相暎月色相随燈和月上下清竒月和燈来往相宜照鳳闕耀龍樓錦樹開花遶御堦徧丹墀金蓮放蘃光燦爛暎蟾宫皓彩流輝這壁那壁家家處處排羅綺儘歡樂拚沉酔勝似丹青圖画裡堪賞堪題罵玉郎我則見鰲山髙聳侵雲霽開筵宴飲金杯燈光影裡香風細撒金錢公子行閑逰翫仕女随㸔社火佳人立感皇恩則聴的鼓樂如雷絃管聲齊一壁廂躧髙撬一壁廂蹅迓古一壁廂舞白旗不弱如蓬菜閬苑勝似那紫府瑶池光閃閃銀河燦碧熒熒燭花明色輝輝照華夷採茶歌咲吟吟手相携慢騰騰歩輕移相呼相喚俏言低漸漸東方催曙色㸔㸔月落衆星稀尾聲五更禁鼓都休擂三弄梅花且莫吹慶賞元宵太平世見如今千邦納禮萬民皆讃喜皆仰望一統乾坤大明國一枝花佳麗風流體態嬌可意龎児俏半生無點破萬種有妖嬈舉止竒標裙底露金蓮小鳳釵簮寳髻髙似嫦娥纔降天庭如仙子初離蓬島梁州喜孜孜花前見了咲吟吟月下逢着他情我意相投妙善描鸞刺綉慣賦課吟嘲㑹吹弹歌唱䏻擲彩投抛俏心児所事偏髙羙儀容壓賽紅綃燭花前私語相傳星月下佳期共禱遇知音喜在今宵情稠意好翆衾錦悵鸞凰效嬌滴滴芙蓉貌價抵千金此一宵小可的難消尾聲不覺的五更唱曉鷄聲報半夜催人鐘韻𫾣萬斛離愁滿懷抱並鴛鴦散了望章䑓路遥從今後雲雨巫山夢児遶一枝花惜花春起早花間杜宇啼桞外黄鶯囀銀河廽耿耿玉露滴㳙㳙暫入花園露濕殘粧面風吹雲髻偏画閣内羅幕猶垂錦堂上珠簾未􅐈梁州恰行過開爛熳梨花樹底早来到噴清香芍藥闌邊海棠嬌艶堪人羡桃花噴火楊桞拖烟蜂飛颭颭蝶舞翩翩驚起些宿平沙對對紅鴛又見出新巢燕子喧喧怕的是罩花叢曉霧𪷟濛避的是透羅衣輕風剪剪耀的是照紗囱紅日懨懨進前怕逺蹴金蓮懶把殘紅踐􅑯心堅怕心􅌒怎肯辜負了羙景良辰三月天堪賞堪憐尾聲為惜花不入鞦韆院因早起致将鴛枕閑廢寝忘飡把他戀将花枝咲撚斜挿在鬂邊猶自古手執着菱花鏡児顯一枝花愛月夜眠遲晚霞魚尾紅秋水鴨頭緑氷輪從地湧明月照天隅潜出庭除行到清幽處欵将藤簟舒仰面觀北斗南辰側臥㸔牽牛織女梁州辜負了綉衾錦褥空閑了羅幙紗㡡夜天凉正值着清秋序梧飄菊綻桞敗荷枯時光冷淡景物蕭踈旅亭前􅌒客躊蹰綉幃中怨女嗟吁獸爐内爇盡清香銀䑓上燒殘絳燭緑囱前手冷金盂非是我自誇自許銀蟾皎潔難留住呼梅香喚小玉准備盃盤飲醁醑歡比其餘尾聲清光影苫梧桐樹皓魄星移白玉珠暢喜情歡懶歸去藉不得露宿問甚麽起居直熬的夜静更闌翫不足一枝花掬水月在手風輕銀漢清雲歛瑶天静興身離綉榻信歩出閨庭白露零零小院人初静長空月正明照乾坤皓魄澄澄徧宇宙清光耿耿梁州金井畔梧桐弄影綠囱前翆竹無聲玉盆注水安中正輕挽羅袖掬水春葱捧擎寳鏡翫弄寒氷定睛觀有影無形剔團圞䏻破䏻成感傷懷淡淡踈星添寂寞蕭蕭夜景助凄凉渺渺飛螢忽聴猛驚見梅香速至傳台命歸画閣阻佳興多管是宴罷夫人酒半醒闌散消停尾聲串香烟盡銷金鼎銀燭光殘照画屏羅幙猶寒我孤另誰曾来慣禁瘦身軀病沉温不煖鮫綃被児冷一枝花弄花香滿衣泥融燕子飛沙煖鴛鴦睡竹髙翡翆鳴花發社䳌啼潜出庭閨歩入花園内欵将蓮歩移恰行過拖香烟楊栁池邉早来到開白雪梨花樹底梁州觀不盡紅灼灼數枝桃李賞不絶香馥馥一架荼䕷一年四季春為貴牡丹為㝡芍藥奪魁堪憐堪愛堪賞堪題見逰蜂飛去飛囬㸔蝴蝶相趂相随開紅英芍藥蝴蝶垂玉線海棠子䂓嬝金絲細桞黄鸝可憐可惜殘紅落滿蒼苔地剪薔薇折梅桂裙拂花叢香滿衣廢寢忘食尾聲懷揣着花蕋香盈體手撚花鈿貼面皮留戀竒花柰無計躊躇了一㑹則無些児見識則除是圖画在幃屏面児裡一枝花秋西風昨夜生溽暑今朝退梧桐飄一葉踈桞下重堦斗轉星回雲淡淡秋容改㸔秋光天際来點暮景落霞與孤鶩齊飛暢幽情秋水共長天一色南一江風向池䑓縦歩凉亭外暮雨打枯荷砕轉庭堦淅淅風凉放入清凉敞綉户無遮碍新秋興滿懐掛起珠䈴待月来爽塏真堪愛北紅芍藥竹凉清爽透讀書齋且收拾羽扇􅐈羅幃當七夕見雙星齊渡過鵲橋来㸔百尺錦結樓䑓閗乞巧九鍼穿線五彩牽牛織女暫徘徊銀河邊易曉燭龍催見滿地露葉下庭槐南兩頭蠻帶風入松天晴河漢影昭回露冷風清淡日輝庭前把衣曝将書開晒碧紗囱掀掣開望玉宇逈絶塵埃早晚是盂蘭盆㑹建佛齋普使河沙齊上大𣑽䑓四時光景迭相催秋色正竒㢤殘星㡬點鴈横塞天如水水天如苔誰倚闌干弄笛數聲過鴈同来北罵玉郎洞庭波冷芙蓉悴雲北去鴈南来長空萬里秋無際野水邊荒樹裡斜陽外南節節髙瓊樓玉宇髙出浮埃清宵把酒邀月對應擬待桂魄飛来天街側浸碧天流光彩上蓬莱不用騎鶴背千里婵姢共徘徊臥㸔氷輪漸昇滄海北感皇恩帶採茶歌黄菊初開紫茰堪佩遇重陽秋似水賞令節酒盈杯凨迎翻落㡌戯馬上髙䑓招陶令㑹俊才引仚客上崔嵬望蓬莱但将酩酊共追陪我酔欲眠卿且去明朝有意抱琴来南生姜芽秋光粧點得景佳㢤晴嵐一抹連輕靄誰不愛兩兩鴛鴦相對挿鬂多把茱茰戴東籬菊蕋還堪採送酒更期白衣来凉風一夜吹天籟餘音太平幸際風雲㑹萬方歡樂共徘徊願吾皇聖夀萬萬載一枝花神京八景蓊欝欝居庸疊翆峰清湛湛玉泉垂虹擁色蒼蒼薊門烟樹秀明皎皎蘆溝月溶溶氣勢崢嶸瓊島騰鸞鳳太液池魚化龍金䑓䁐晴日輝輝西山顯雪霽烱烱南一江風景無窮宜賞翫堪逰從寳殿内香風送勝巫山古檜森森賽過神仙景方壷亭近玉濵瀛州亭金露濃疊河玉侵雲嶺北罵玉郎萬歲山瑶䑓暎日増光瑩池沼静水波平瓊林苑綠分輕重香馥馥花弄影来往往蝶戀蜂溜嚦嚦鶯聲送南東甌令􅋦泥燕採花蜂度栁穿花向芳徑東竒葩異草開千種總與春光共佳人仕女樂歡慶香飄蕩散簾櫳北感皇恩錦重重画棟雕櫳髙聳聳勢接蒼穹飛橋髙近碧天複道長臨瓊島御溝逺水流通長生殿石如踞虎廣寒宫樹若蟠龍前臨水後靠山聖人殿正當中南節節髙風雲㑹宴九重喜相逢君臣共享昇平世蒙恩寵開玳筵簫韶奉妙舞清歌新章詠繁絃擊管仙音動仁風廣布兆民安甘露普降天恩重北採茶歌乾坤奉慶雲濃日月彰見飛龍紫霧現祥光籠罩九重宫聖子神孫金枝旺玉葉榮勝磐石皇圗鞏固永興隆尾聲軍民樂業咸稱頌賢臣良将傚華封地乆天長日月明一枝花題小脚香纏疊雪紗錦襯淩波襪底裁楊桞葉央蹙牡丹芽行過堤沙印下對相思卦窄弓弓可喜殺鳳頭児不勾輕挐虎口裏剛剛半扎梁州歩蒼苔金蓮似笋過瑶堦玉嫩如芽湘裙微露些娘大恰便似㕠鳬出水新月籠紗玉鈎簾控嫩藕生芽不知那可喜娘怎的纏扎多情人不住嗟呀莫不是瑶䑓仙悮落在天台莫不是巫娥