江龍自天地人三皇興運至女媧氏一十八代㝎乾坤紀年數三百二十七萬稱尊號一百八十餘君因康氏壽域同躋千歲考無懷氏豐年樂永四千春伏羲氏造書契始畫八卦神農氏嘗百草普濟蒸民軒轅氏製舟車衣冠濟濟少昊氏降封禪民物欣欣顓頊氏守淵靜無為而治髙辛氏布威德率土之濵陶唐氏欽明文思命羲和曆象星辰有虞氏溫恭允塞舉臯陶屏出凶臣夏后氏功垂萬世使后稷播種耕耘成湯作東征西怨用伊尹帝德帷新文王應非熊夢兆遇吕望際會風雲武王怒吊民發罪哀惸獨法政施仁周公禮百王兼備孔子道千古獨尊孟子時周流憂世歷齊梁道屈無伸距楊墨法湯文傳五典説三墳明天理正人倫君臣道主于仁父子道主于親夫婦道主于恩道性善教本出曽參見諸侯言必稱堯舜油葫蘆道統相承十二君三聖人皇天有意為斯文教人從誠心正意修根本以致齊家治國為標凖孔孟書齊魯論不離忠恕傳心印以此上天子重賢臣天下樂方信道文章可立身今人𬒳名利引輸林院老子錢上緊歪吟得幾句詩胡謅得一道文一脈地立碑碣諂佞臣那吒令國子監助教的尚書做主人祕書監著作的參政是丈人翰林院應舉的左丞家舍人知他看春秋怎的發正閏如何論制誥敕怎生般行文鵲踏枝恨那箇老喬民用這夥小猢猻見念得幾句粧點皮膚子曰詩云本子要借路兒苟圖一箇出身如今都齊了行不用别人寄生草將鳳凰池攔了前路麒麟閣頂殺後門你便是漢相如獻賦難求進賈長沙上書誰偢問董仲舒對䇿無公論恰便似司馬遷撞不開昭文館內虎牢關公孫弘打不破編修院裏長蛇陳么口邊頭奶腥也不曽落頂門上胎髮依舊存生下來便落在爺羹娘飯長生運正行著子承父業財帛運又交著夫榮妻貴臨官運儘教他大拚了十年家富小兒嬌少不的一朝馬死黃金盡六么序子母每輪簮換當朝貴倒班兒居要津欺瞞殺萬乘之君宫裏便如海如深如日如雲其力如輪其志如神怎識他苦害軍民的聚斂之臣如今棟梁材平地剛三寸怎搘撑萬里乾坤子是裝肥羊法海人皮國一箇箇智無四兩肉重千斤么這等魔軍又沒甚功勳却教他畫戟朱門列鼎重禋赤金白銀翠袖紅裙羊馬成羣花酒盈樽有一日天打算衣絶祿盡吊頸抽斤小生白身樂道安貧視此輩何足齒云滿胸襟拍塞孤德憤將世間太華平吞大丈夫若是言無信枉頂天履地束髮冠巾金盞兒二載隔音塵千里共消魂我子待趂天風飛入山陽郡想兄弟情分最關親升堂重拜母樽酒細論文當時不因雞黍約今朝誰識志誠人醉扶歸母親道一句何其凖不曽錯半箇時辰小生雖真君更真數日前早僃下美饌篘下佳醖量這些薄人事別無甚孝順何須母親勞困有多少逺路風塵金盞兒黃菊噴清芬白酒濁正深相逢萬事都休問想離多會少百年身烹雞方味美炊黍却嘗新我做了急喉嚨陳仲子你便是大肚量孟常君賺尾禮義國之綱孝弟人之本修天爵其道自尊繞著溪上青山廓外村多飬著不粘錢的狗彘雞豚奉尊親笑引兒孫兀的不是羲皇上人休道是繞皇宣扣門折末便聘玄纁的訪問你與我掩柴扉髙枕臥麒麟點絳唇别却蓬壷坦然獨步塵寰去回首仙居縹眇雲深處混江龍仙凡有路則慿著足履雙鳬翺翔天地放浪江湖東訪丹丘西華嶽朝逰北海暮蒼梧暫旋真境來混塵俗覷百年泛世一夢華胥信壷裏乾坤廣大嘆人間甲子須臾斬眼間白石巳爛轉頭來蒼海將枯箭一般走乏玉兔梭一般飛困金烏看了這短光隂子不如且入蓬萊去詩懷浩蕩酒眼糢糊油葫蘆髙聳雕闌十二曲接太虛上得這百尺梯耒便是步雲衢一會待皇州子索低頭訴又恐怕近天宫不敢髙聲語這樓襟三江帶五湖更對著均山千仭青如許咱如今不醉待何如天下樂醉倒黃公舊酒爐我笑三閭楚大夫子今日誰有誰如古怕不待騎鯨飛上天荷插埋入土子問你至今無金盞兒公子換金魚豪客醉解瓊琚俺子道人有甚麼隨身物止不過金縷琴譜藥葫蘆皆因我囊裡缺青蚨神仙留劍飲秀士典衣沽么這劍六合為爐二氣鑄成模這劍呼的風喚的雨吼的雲霧降的龍伏的虎威的魅霜鋒如巨闕氷刃勝昆吾光搖牛斗氣射天樞醉太平我比你無些懼你問我有何術指劍呵這劍袖裡青蛇膽氣粗怕甚麼妖精物我試拔向樽前起舞手到處百靈威助怎容他山鬼揶榆滿庭芳清間快娛忘懷棊酒得意琴書把名韁利索都發付有甚躊躇無心戀朱門畫屋巳跳出地塹天衢江頭覷沙鷗遍渚一品待何如清江引先生歸去今去矣菊花松篁趣休貪蝸角名莫戀蠅頭利尋一榻穩便處間坐的又緑囱曉來鶯亂啼喚醒先生睡愁來總不愁醉醒還重醉尋一榻穩便處間坐的點絳唇王粲子為我家業凋殘幾曽經慣人輕慢寶劍空彈貧困非吾患混江龍我與人秋毫無犯只為我氣昻昻誤的鬢斑斑久居在簞瓢陋巷受用些土榻柴關窮不窮甑有蛛絲塵網亂窘不窘爐無煙火酒瓶乾天涯零落海角孤單中年巳過百無一全捱不過傷官破祖窮愁限剗地在人閭簷之下眉睫之間油葫蘆你休笑書生膽氣寒看的我如等間子我這蔽裘常怯曉霜寒他把我做兒曹看無端一郡蒼生眼我量寬如東大海志髙似西華山子因我五行差斡運難迭辦不能隨聖主展江山天下樂因此上時復挑燈把劍彈有那等酸寒他每都怎挂眼子待要論黃數黑在筆硯間你道教蒙童數子頑我子待輔佐皇朝百姓安我怎肯教人一例看那叱令我怎肯空隱在嚴子陵釣灘我子待走上韓元帥將壇我雖貧樂有餘心無憚咱人脫不的二字飢寒鵲踏枝赤緊的世途難主人慳那裏也握髮周公下榻陳蕃凍餓殺間居的范丹憂愁殺髙臥的袁安寄生草伊尹埋沒在耕鋤內傳説劬勞在板築間寧戚謾嘆白石爛太公空鈞磻溪岸靈輒誰濟桑間飯哀哉堪恨小人儒嗚呼誰識男兒漢么哎你一箇田文傲不將劍客安待賢情急早心先憚學雞鳴落得人輕慢食無魚贏得自悲嘆你雖然紫𫀆金帶祿十鐘飬不的錦衣繡襖軍十萬六么序我沒投奔望你為東道倚靠你如泰山似金烏玉兔冷枝寒鏡裡空看劍上虛彈前程事非易非難想蟄龍奮起非為晚待春來震破天關有一日得志扶炎漢離了繩樞甕牗平步上玉砌雕鞍么得覩天顔列在朝班書壓南蠻威振西畨屏姦讒外鎮邊關整頓江山平治塵寰恁時節紫綬烏靴和象簡不教人下眼看萍梗身寒塵土衣單有一日天數輪環不平氣空長嘆塞平天地間吁漫漫長夜何時旦你看我斬蛟龍北海射猛虎南山金盞兒屈不知巳豈愁煩伸于知巳有何難他無心濟魚龍江漢何愁晚空教我趨前退後兩三畨困于陳蔡地餓死首陽山我想那挂冠歸去好義手告人難醉扶歸論文呵筆掃煙雲散論武呵劍射斗牛寒掃蕩妖氛不足難則磨得掌帥府居文翰不消我羽扇綸巾坐談敢破虜軍十萬尾聲我子待翰林謁荆州展羽翼騰霽漢我得了白金駿馬雕鞍我若是到荆襄子願的人馬平安取峥嶸現你眼我略別你箇放魚的子産你試看屠龍的王燦錦衣含笑入長安油葫蘆祝賀天下黎民仰聖德百姓每皆感激讃吾皇聖夀與天齊文官每忠孝扶家國武官每威鎮邊庭息君賢明萬代傳臣忠良千載知喜君臣慶會如魚水因此上日月顯光輝天下樂保護山河壯帝基公卿行正直河清海晏民盡喜選賢能重職遷放桃園戰馬嘶託吾皇堯舜德那叱令市民每孝義因官員正直莊農每鼓腹為時豐稔歲姦邪每逺退見賢人在職黎民無驚擾心敢州府有成康治託賴著洪福巍巍鵲踏枝武和文兩班齊分左右列丹墀鞠躬稽首頓首誠惶萬歲聲齊自聖上掌山河社稷千邦進萬國來儀寄生草五常正三綱㝎民仰望天意隨八方齊賀升平丗軍民皆讃和千嵗乾坤開泰清平日玳筵開金闕宴公卿太平年龍虎凨雲會賞花時祿山叛擾擾氊車慘霧生黯黯虛空殺氣增天地也離情西凨鼓角總是斷腸聲么敗國兒郎捨性命捲地干戈起戰爭豈肯暫消停一時半霎恨不的走兩三程尾甲籠􅥋𫀆寬剩三停豐肥減了二停瘦損郎當淹肚子全不似舊日膨病縈縈為首先行怎見的三郎瘦不勝絲韁慢稱雕鞍緊憑蕩征塵西去馬蹄輕賞花時明皇夢楊妃天寶年間事一㝎人説環兒似玉容為愛荔枝紅纎腰如栁宜捧翆盤中么一曲霓裳舞未終怨殺漁陽戈甲雄驚出上離宫馬嵬坡下塵土慢隨凨尾笑明皇心裏痛怏怏歸來恨冗冗寂寞雲屏秋夜氷恍然間依舊相逢意匆匆霧髸鬅鬆兩葉眉兒淡逺峰貪歡未罷驚回清夢玉階前踈雨響梧桐賞花時楊西菴秋水粼粼古岸蒼蕭索踈籬偎短岡山色日微茫黃花綻也粧點馬蹄香勝葫蘆見一簇人家入屏障竹籬折輔苔墻破設設柴門上張著破網幾間茅屋一竿凨斾搖拽挂長江賺尾晚凨林蕭蕭響響一㺯兒凄涼旅况見壁指一似桑榆侵著道傍草橋崩搖催舵唱道向紅蓼灘頭見一箇黑出律的漁翁鬢似霜靠著那舵腰拗樁癭嗓垂膊項一鈎香餌釣斜陽賞花時水到湍頭燕尾分檣抵河梁龍背穩流水繞孤村殘霞隱隱天氣褪殘雲么客况凄凄又一春年紀區區巳四旬日日在紅塵愁眉鎮鎖白髮又添新尾腹中愁心間闊九曲柔腸悶損白日傷神猶自輕到晚來更關情唱道則聽的玉漏聲頻搭伏㝎鮫綃枕頭上盹客囱夜永有誰偢問二三更捱不得𬒳兒溫賞花時花點蒼蒼繡不勻鶯喚垂楊語未真簾外絮紛紛日長人困凨暖獸煙噴么一自檀郎共錦衾再不曾暗擲金錢卜逺人香臉哭生春舊時衣褃寬放出二三分賺尾調飬就舊精神粧點出嬌凨韻將息到損苔垣玉笋拂綽了香冷粧奩寶鏡塵舒展開繫東凨雨葉眉顰曉粧新髙綰起烏雲再不管暖日珠簾鵲噪頻從今後雅鳴不聽燈花誰信一任他子規聲啼破海棠魂賞花時情淚流香淡臉桃髙髻鬆雲軃鳯翹鴛𬒳冷鮫綃收拾煩惱準備下捱今宵賺尾篆煙消銀缸照和這瘦影兒無言對著一自陽臺雲路杳玉簮折難覔鸞膠最難熬更漏迢迢線帖兒翻騰耳慢搔愁的是斷腸人病倒盻殺那負心人不到將一封寄來書乘恨一時燒賞花時香徑泥融燕語喧彩檻凨微蝶翅翩飛絮舞香綿嬌鶯時囀驚起緑囱眠賺尾惜花愁傷春怨縈繫殺多情少年何處狂逰裊玉鞭慢教人暗卜金錢空寫遍翆詩箋魚雁難傳似這般白日黃昏怎過遣青鸞信逺紫簫聲斷畫樓中間殺月明天賞花時香爇龍涎寶篆殘簾捲􅞩鬚春晝間心事苦相關春光欲晚無一字寄平安賺尾意無聊愁無限花落也鶯慵燕懶兩地相思會面難上危樓憑暖雕闌暢心煩盻殺人也秋氷春山幾時看寶髻鬅鬆雲亂綰怕的是樽空酒闌月斜人散背銀燈偷把淚珠彈賞花時臥枕著床染病疾夢斷魂勞怕飲食不索請名醫沉吟了半日這症候敢蹺蹊么俺滲的寒來恰禁起忽的渾身如火逼厭的皺了雙眉豁的一會家精細烘的半晌又昏迷賺尾減精神添憔忰把我這瘦損厖兒整理對著鏡裡容顔不認的呆答孩展轉猜疑瘦損腰圍寬盡羅衣一日有兩三次頻將紐扣兒移覷了這淹煎病體比東陽無異不似你害相思出落的外人知賞花時麗日和凨三月天準備西園賞禁煙院宇立鞦韆桃花噴火楊桞緑垂煙么倚㝎門兒語笑喧來往星眸厮顧戀彼此正當年花隂桞影月底星前賺尾口兒裏掂心兒裏怨急切裏難尋空便天也似間愁無處展蘸霜毫寫雲箋唱道各辦心堅休教千里關山勞夢傳不是雙生自專小卿緊勸只休教花殘鶯老麗春園賞花時捫乳只為多情忒俊雅月下星前迤逗咱掩映著牡丹花潛潛等等不見芴冤家么今夜相逢打罵咱忽見人來敢是他只恐有爭差孜孜認了正是那嬌娃賺尾悄悄吁低低話厮抽抒拈拈搯搯終是箇女孩兒家不慣耍嫩厖兒不甚撑逹透紗囱雙乳似白芽持入胸前緊緊拏光油油膩滑滑顫巍巍拏罷至今猶自手兒麻賞花時春夜沉沉庭院幽偷訪吹簫鸞鳳友良月過南樓昨宵許俺今夜結綢繆么兩處相思一樣愁及至相逢却害羞只是性兒柔俯般哀告腼腆不擡頭賺尾你溫柔咱清秀本是一對兒凨流配偶咫尺相逢説上手緊推辭不肯承頭又不是久遲留只怕老母親追求料想伊家不自由空耽著悶愁虛陪了伺候誰承望剛做了箇嘴兒休八聲甘州鮮于伯機江天暮雪最可愛青簾搖曵長江生涯間散占斷水國魚邦煙浮草屋梅近砌水繞柴扉山對囱時復竹籬傍犬吠汪汪么向滿目夕陽影裡見逺浦歸舟帆力凨降山城欲閉時聽戍鼓逄逄羣鴉噪晚千萬點寒雁書空三四行畫向小屏間夜夜停缸大安樂從人笑我愚癡戅瀟湘景裡且粧憨不談劉項與孫龎近小囱誰羡碧油幢元和令粳米炊長腰鯿魚煮縮項悶携村酒飲空缸是非一任講恣情拍手唱山歌髙低不論腔尾浪滂滂水淙淙小舟斜鎖壞橋樁綸竿蓑笠落梅凨裡釣寒江八聲甘州王修甫春閨夢好奈覺來心情向人難學錦屏斜靠尚離魂默默難招逰絲萬丈天外飛落絮千團凨裡飄似這般愁著甚相熬六么遍自春來到春衰老簾垂白晝門掩青霄間庭杳杳空堂悄悄此情除是天知道寂寥唾絨縷兩三條后庭花煞無心繡作空間却金剪刀眉變吳山翠恨橫秋水髙想多嬌正心焦梅香低報報道晚粧樓外月兒髙八聲甘州王嘉用鶯花伴侣效卓氏聽琴司馬題橋情深意逺爭奈分淺緣薄香箋寄恨紅錦囊聲斷傳情碧玉簫都為可憎才夢斷魂勞六么遍更身兒單厖兒俏傾城傾國難畫難描窄弓弓撇刀光溜溜六老稱霞腮一點朱唇小妖嬈更那堪楊桞小蠻腰穿囱月憶雙雙鳯友鸞交料應咱無分消真真彼此俱相樂花星兒照彩雲兒飄不隄防壞美衆生攪元和令謾贏得自已羞空惹得傍人笑多情却是不多情好模樣歹做作相逢爭似不相逢有上稍沒下稍賺尾那回期今畨約花木瓜兒看好舊路髙髙築起界墻盡今生永不踏著唱道言許心違説的擔尋思暢好脫卯待裝些氣髙難禁腳拗不由人又走了兩三遭八聲甘州天涯羈旅記斷腸南陌回首石樓許多時冷落了酒令詩籌腰圍似沈不耐春鬢髮如潘那更秋無語細沉吟心緒悠悠混江龍十年往事也曽一夢到揚州黃金買笑紅錦纏頭跨鳯吹簫三島客抱琴携劍五湖逰凨流羅幃畫燭彩扇銀鈎六么遍為他迤逗咱揣就更兩情厮同病相憂前時唧𠺕今畨抹颩急料子心腸天生透追求沒誠實誰道不自由元和令外頭花木瓜裡頭鐵豌豆橫琴彈徹鳯凰聲兩厭難上手當𥘉説盡海擔山盟一星星不應口賺尾洛陽花宜城酒那裡與狂朋怪友水逺山長憔忰也滿青衫雨淚交流唱道事到如今收了蘭罷了斗那些兒自羞二三年逞受誰承望空溜了會眼兒休八聲甘州彭壽之平生放蕩俏綽聲名喧滿平康少年埸上只舌劍唇鎗機謀主張凨月景局經營旖旎鄊回首數年間多少踈狂混江龍知音幸遇不由人重上欠排場花明月夜酒肆茶坊相見十分相敬重厮看承無半點厮隄防凨流事贊之雙美悔則俱傷元和令合著兩會家相逢一合相憐新棄舊短因緣強中更有強偷方覔便俏家凨當行識當行賺尾一片志誠心萬種凨流相非是我著迷過奬燕子鶯兒知幾許據凨流不類尋常唱道好處難忘花有幽情月有香想著尊前伎倆枕邊模樣不思量除是鐵心腸八聲甘州杯中酒冷鼎內香消臺上燈昏夜闌人靜玉齋中半掩重門愁靠芙蓉繡枕間悶擁鮫綃錦𬒳空思想意中人年少芳卿醉中天一點朱唇嫩八字桞眉顰寶髻髙梳楚岫雲蓮臉施朱粉褒彈處全無半分可人意凨韻見他時忽的消魂賺尾為他嬌因他俊迤逗俺行癡坐盹便約後冤家行頻囑付偷工夫短命行溫存費了些精神一夜歡娛正了本他于咱親咱于他順不由人終日腳兒勤八聲甘州芳菲過眼向玉砌雕闌翆落紅翻都來一假新愁舊恨相煩簾垂永日人乍別門掩東凨花又殘無語問春歸天上人間六么遍恨歸期晚尋芳懶倚遍闌干盻殺雕鞍佳音越慳啼痕不乾挣捱厭厭相思恨愁煩悶來獨把繡床攀元和令慢將龜卦卜空把雁書盻料他雲雨阻關山天涯何日還重衾猶怯五更寒悶愁心上儧后庭花煞瘦來金縷寬空將寶鏡看髸綰雙鴉亂眉顰八字彎最心煩間庭院子規啼數畨問長安隔關山別郎容易見郎難清明過也鷓鴣聲裡畫樓間翆裙腰鶯穿細桞開金翅遷上最髙枝海棠零亂飄階址墮胭脂共誰同唱送春詞金盞兒減容姿瘦腰肢繡床塵滿慵針指眉懶畫粉羞施憔忰死無盡間愁將甚比恰如梅子雨絲絲緑囱愁有客持書至還喜却嗟咨未委歸期約幾時先折破駌鴦字元來則是賣㺯他凨流浪子誇翰墨顯文辭枉用了身心空費了𥿄尾聲總虛脾無實事喬問候的言詞怎使復別了花箋錦字重作念自家少欠你相思唱道再展放重讀讀罷也無言暗切齒沉吟數次罵你箇負心賊忒字把一封寄來書都扯做𥿄條兒翆裙腰吕止菴老來多病逢秋驗便覺嫩涼添懶搖紈扇間紋簟捲珠簾晚粧樓外月纎纎金盞兒更西凨釅微雲斂黃昏即漸暑氣消殘隂晴乍閃氷魂尚潛指甲痕芽生天塹傷廉又傳宫印眉尖元和令素娥公案嚴牛女緣分儉蒼虬鈎玉控雕簷翠屏人半掩彩鸞取鏡入粧奩霓裳誰再拈賺尾昻藏醉臉控香襟袖拈花下心無慊等潛興未厭約銀蟾瑶臺獨占立金梯長嘯一掀髯勝葫蘆踐楊妃是去君王不奈何盡分得淚痕多羽衣曲翻成薤露歌玉溝空闊玉人偃臥沒撚指早填合么戰馬也如將怨氣豁比及排甲胄列干戈料想嗔人緊勒他騁精神惡打盤桓突磨閗嘶喊要奔波賺煞尾撞出虎狼叢堪上凌煙閣天意與人情暗合幾曽使鞭稍兒觸抹著蕩香魂健足頻那唱道相銜不離了楊妃那禍荔枝塵閃脫將海棠根過撇凨也似飛上馬嵬坡六么令華亭江上煙淡淡草萋萋浮光萬頃長篙短棹一蓑衣終日向船頭上穩坐來往故人稀輪竿收罷輕拋香餌問箇消息有誰知么説破真如妙理唯恐露玄機春夏秋冬披星戴月守寒溪一點殘星照水上下接光輝素波如練東流不住錦鮮不遇又空回賺煞謾傷嗟空勞力欲説誰明此理千尺絲綸直下垂一波動萬波相隨唱道曉幽微且恁陶陶度浮世寒煙冷水小魚兒離釣滿船空載月明歸六么令明皇逰月宫氷輪光展皎潔正圑圎人間天上不知今夕是何年當夜宫中宴賞因問廣寒仙天師奏却明皇聽罷便將密旨暗中傳么把拄杖隨時擲起奪盡鬼神權俄尓矁窺虹橋千丈碧空懸月色如銀燦爛隱隱逺相連急令天子緊瞑雙眼恍然相近斗牛邊賺煞寒蟾明飛龍現翆擁紅遮漸逺玉帝私逰離上方似紫微星半夜朝元唱道瑞氛飄然隨至仙宫葉法善清凨半軒秋雲一片趂寒光飛上月明天
