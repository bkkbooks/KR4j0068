front:
  text: 雍熙樂府卷之十一
  hash: sha256:266b7beed766178f51a85f4c27df3af02f493c22e1ec90279d10976b13d2ea4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_011-1a}
body:
  text: 雙調新水令元日祝賀大明紅日麗中天瑞雲籠玉樓金殿香風飄霧靄瑞氣隱霞邊爐爇龍涎萬邦會盡朝獻駐馬聽擺列著文武官員秉笏垂紳玉殿前更有這四夷朝見你看這簫韶一派奏聲喧有他者竒珍異寶貢竒鮮麟駝犀象來投獻讋偏邦來貢逺托賴著當今聖主洪恩遍沉醉東凨時遇著正旦節鴻鈞乍轉泛酴酥酒注金船有百司來慶會更萬國趨朝見賀升平四海安然正值著百榖豐登大有年賀萬載皇圗永逺攪箏琶百姓每追歡勸喜遇著春色正芳妍你看這律管灰飛鴻鈞氣轉三陽泰景光鮮萬物生焉百草蒙暄可又早報新春將殘臘遣喜笑登筵川撥棹我則見鳳樓前列簮纓文武官員這的是舜日堯年萬古流傅盛繁華當今帝輦奏歌聲徹太玄七弟兄文武每大賢志堅奉天顔見文修武僃皆通練安邦定國立山川賀春光四海皆稱羡梅花酒呀他每都喜氣喧禾稼增延民樂欣然貧困哀憐俺丹墀內呼萬歲祝嵩嶽夀長年宰臣每奉皇宣一齊的御階前三舞蹈意誠虔收江南呀托賴著當今天子重英賢見如今歌謡道泰不虛傳賀新春萬象以回先把仙音共演讃齊天萬夀永長年新水令春日慶豐年春色滿皇都勝唐虞太平時務八方皆讃喜四海盡歡娛萬國來服托賴聖明主百靈助江兒水春光明媚和風麗日遲聽花隂深處燕語鶯啼看雙雙蝶對飛緑栁翠盈堤桃花繞澗溪玩賞芳菲玉樓人醉金勒馬兒不住嘶逺望著清池緑水賽閬苑繁華勝地萬花開似錦重重圗畫裡沽美酒讃當今明聖主普天下喜無虞攝伏的四海來賔皆納土托賴著吾皇洪福萬民樂盡歡娛太平令樂奏著簫韶音律酒斟著玉液瓊巵十二樓香風馥郁九重宫祥雲擁護文武每搢笏拜舞一齊的讃祝萬萬載皇基詠固川撥棹蜂蝶戲萬紫千紅真箇美我只見緑栁依依畫輪過香塵蕩起聽笙歌聲韻齊待今宵沉醉歸錦繡江山景物最竒見逰人來似蟻海棠開血染胭脂梨花放似江梅綻蕊一齊的讃祝萬萬載永固皇基餘音一年此景春和氣想蓬萊也只如是端的美景良時新水令燈詞鳳城佳節賞元宵繞鰲山瑞雲籠罩銀河星皎潔天塹月輪髙動一派簫韶開筵宴儘歡笑川撥棹花燈兒兩邊挑更那堪一天星月皎我則見繡帶風飄寶蓋微搖鰲山上燈光照耀剪春蛾頭上挑七弟兄一壁廂舞著唱著共彈著驚人百戲其實妙動人的傀儡怎生學笑人的院本其實俏梅花酒呀一壁廂舞鮑老仕女每打扮的清標有萬種妖嬈更百媚千嬌一壁廂踏迓古呀敢一壁廂屣髙橇端的是有笑樂細氤氲麝蘭飄笑吟吟飲香醪排筵宴賞元宵收江南呀今日箇喜孜孜開宴賞元宵我則見玉纎慢撥紫檀槽燈光月色兩相交照樓臺殿閣今日箇開懷沉醉樂陶陶新水令燈詞大明黎庶盡康寧荷皇圗一人有慶八方皆納土萬國進趨呈鳳産麟生民擊壤誦歌詠駐馬聽海晏河清白叟黃童喧市井臣賢君聖民安國泰好收成疑承輔弼任賢能臯夔稷契持公正享太平時逢佳節人歡慶甜水令髙聳聳玉砌雕欄貝闕珠宫瑶池掩映簫鼓樂升平齊臻臻寶輦金輿鸞飛鳳舞鰲山境勝賞元宵春滿都城鴈兒落珍饈百味亭樂奏天街靜龍樓鳳閣中月色燈光映得勝令天地一壷氷錦繡萬枝燈朵朵金蓮放迢迢銀漢澄彤庭拜舞千官慶公卿髙呼萬嵗聲側磚兒來往往香車寶馬爭馳競金吾玉漏暫時停燈光月色遙相映竹枝歌銀漢碧澄澄萬丈鰲山接太清簇錦攢花列畫屏鋪紅剪彩萬枝燈樂陶陶逰閬苑笑吟吟入蓬瀛聽仙音嘹喨管絃聲沽美酒樂豐年百榖登賞佳節好時令萬國衣冠仰大明獻禎祥表誠重譯朝盡歸命太平令四海伏干戈肅靜民樂業法正官清有武職文僚秉政玉葉金枝昌盛呀賀一統大明玉京錦城都仰賴當今明聖新水令燈詞正元宵髙點萬家燈照樓臺綺羅相映金蓮陸地開簫鼓揭天鳴銀漢澄澄鰲山結彩雲靜拆桂令樂豐年海晏河清慶賞元宵節屆新正只聽得大樂鈞天千門燈火晃若蓬瀛開萬斛金蓮滿城振金臺一片歌聲凝望分明時遇升平賀吾皇洪福齊天樂雍熙萬載康寧鴈兒落鳳城中軍民和氣生鰲山畔燈月光輝映天街上香車寶馬喧譙樓內銀漏銅壷靜得勝令韻悠悠鼓板管絃聲香馥馥羅綺麝蘭馨玉繩低旋轉從教動金吾排威嚴不禁行賀四海升平祝碩著國祚千年盛慶五榖豐登照乾坤萬里明沽美酒聽笙歌滿鳳城動歌舞宴龍庭一笑悠然春自生串香噴寶鼎爇龍涎臘梅清太平令正值著邊庭安定盡都來朝賀神京又喜遇元宵佳令恰好放梨園承應略聽樂聲讃稱萬萬載臣賢君聖新水令一年美景看鰲山燈火徹雲霄賀新正九重春到三陽開泰日萬國賞元宵雨順風調民庶總恣歡樂駐馬聽喜遇花朝夭桃㺯色杏含嬌淡煙籠罩盈盈橋栁發青條沙暖鴛鴦宿舊沼泥融燕子歸巢難畫描蛾眉淡露青山腳喬牌兒鞦韆庭院小仕女語喧笑車輪馬足紅塵道家家將墳墓掃水仙子風翻麥浪翆雲搖日暖楊花瑞氣飄露凝萱草金簮倒愛清和時節標雨初晴滿地禾苗浴佛水心香妙賽神羊口願了準僃下幾領𧖟箔鴈兒落禱雲龍春社炒懸艾虎家家樂浴蘭湯公子嬌閗百草佳人笑得勝令氷碗浸櫻桃玉藕切瓊瑶竹葉傾銀斚松花釀翆飄檀板輕𫾣唱徹黃鍾調把彩扇輕搖涼生白苧𫀆甜水令和採菱歌悠悠輕韻合著仙樂牛女渡星橋素手相携金橙旋摘白魚新釣端的是無福難消折桂令問嫦娥何處是逍遙月吐寒蟾書寄鳴鶴丹桂花香玄霜搗藥金井梧凋百年人百般計較秋陽皓酒和琴挑夜景迢迢醉也酕醄醒也逰遨痛飲狂歌鼓瑟吹簫對玉環九月登髙無邊景物饒社會龍山西風落帽早紅葉墜林稍黃花初綻曉錦片似秋光重陽休負却負却重陽淵明空潦倒清江引小春時節陽氣薄已有豐年兆萬寶入天倉一點通玄竅天公造化真箇巧沽美酒撼龍山風怒號簾幕外雪飄飄銀海瑶山樹縹眇粉粧成殿閣白練練賽瓊瑤太平令梅花夢忽然驚覺梅花神相友相交聽一曲中和古調彈一曲幽間雅操呀看了這錦貂翆翹繡襖暖融融將畫屏倚靠尾豐年稔歲合溫飽酴酥酒除夜安排了門上換桃符户外蒼术燎處處歌謡托賴著萬萬載洪基受用到老新水令中秋一天清露散瑶光香馥馥桂花初放海天秋欲老草木葉將黃佳景非常開宴在玉樓上喬牌兒我則見氷輪出海洋瑞彩罩朱幌平分金水多清爽助詩人情興廣沽美酒則聽的歡聲動帝鄉和氣蕩空蒼今夜團圎興趣長開懷宴賞對嫦娥舞霓裳太平令酒滿泛珍珠佳釀歌聲奏美韻新腔風力微蟾光偏亮醉顔酡襟懷儘量呀我今日對著這月光讃揚慶賞幸遇著太平年豐登景象清江引吾皇聖德天地長四海皆歸向一統錦江山萬載長興旺慶中秋玳筵常宴賞新水令玩春輕風細雨養花天賞韶光在海棠庭院夭桃如噴火楊栁似堆煙景美花鮮春風滿玉樓殿喬牌兒異香飄禁苑錦繡滿花園堆紅積翆真堪羡牡丹花正妍鴈兒落蜜蜂兒髙低在花內穿粉蝶兒上下向林中旋錦鳩兒雙雙在葉底飛金翅兒對對向花枝轉挂玉鈎紫燕見輕飛對舞翩梁上歇簷前串舌巧黃鶯枝上言百種嬌千般囀列玳筵排華宴宜男草遣興忘憂好花兒似語無言亂栁葉麗春花競繡競繡爭妍荼䕷架淡黃淡黃雲練素馨放香氣飄金殿上幽香遍紫錢翆錢風吹動滿池面太平令呀翆萍藻魚逰水面玉泉清龜戲池邊蜂採花花間留戀蝶繞枝枝上盤旋呀栁綿滿天舞旋亂穰穰榆錢滿院豆葉黃玉階前畫板鞦韆金殿上品竹調絲奏管絃音清悠韻逺對對嫦娥雲外顯玉珮瓊簮繡襖羅衣翆環金釧七弟兄殿前兩邊列飛仙似月宫仙子雲間現輕踏畫板襯金蓮髙髙下下空中轉梅花酒呀見許飛瓊下洞天寶髻垂偏繡帶風搧錦繡畨旋光凝得叉釧輝雲映得佩衣鮮捧金杯酒慢傳彈銀線燕鶯言吹玉管鳳鸞翩𫾣象板韻聲連收江南呀端的則見這輕盈裊娜舞蹁蹮歌聲清巧透天邊笛音清亮透雲軒勝蓬萊閬苑不枉了良辰佳節賞花天新水令憶情碧桃花外一聲鐘繡衾寒喚回春夢香消金獸冷花落翆屏空雨雨風風攛斷的病兒重駐馬聽帶結頻鬆瘦骨不禁愁冗冗眉峯難縱黛蛾深鎖恨重重瑶臺人逺信勞鴻彩雲聲斷簫間鳳惡相思千萬種百般的難把愁懷送鴈兒落冷落了春風銅雀宫間阻了夜雨陽臺夢闌珊了停雲燕子樓寂寞了流水桃源洞得勝令單守著四扇矮屏風三尺舊絲桐總費囊中藥全消鏡裏容簾籠步月無人共花叢尋春誰與同川撥棹我這里恨匆匆晝偏長夜更永許多時歌歇梧桐悵冷芙蓉酒盡瑤觥不見紅圍翆擁望藍橋無路通七弟兄對著這落紅舞風畫闌東怯餘寒簾簌金鈎控寄間情琴在錦囊封揾啼痕袖濕瓊珠迸梅花酒減崔徽畫裡容怕曉角昏鐘恨芳草青􅍡怪浪蝶狂蜂秋來呵江上列花落也未相逢又不知吉與凶我則索含著泪告蒼穹陪著笑問青銅側著耳聽歸鴻緘著口怨東風收江南呀懨懨不比舊時同緑囱針線廢春工殘雲剩雨自西東全無有定蹤巫山十二總成空新水令餞别馬蹄香襯落花泥近清和日長天氣幾樽辭别酒三唱報晨雞一望平堤緑暗紅稀留春住百無計駐馬聽翆栁煙迷迎客青山數點齊緑槐風細可人黃鳥一聲啼麥藏鴉蠶入簇榖初犁燕營巢鳩喚友禾分裔官路上慢驅馳一鞭行色匆匆意沉醉東風護逺水青蒲緑葦映村居瘦竹踈籬郵亭古道長野渡扁舟繫望天涯雲樹凄迷山色朦朧雨亦竒宜寫在丹青畫裡慶東原薄酒逢村醉新詩遇景題好山一路隨征斾童僕弱行裝擔遲香塵滚驊騮去疾風力徑紗帽簷低曉出大梁城晚宿延津驛離亭宴帶歇拍煞我向那金臺一望霞光霽你去也歸鴻幾點催征騎赤緊的心忙意急準備著待玉漏鳳樓前列鵷班金殿側秉象笏丹墀內看香煙傍衮龍曉色明旗幟耿耿的丹衷向日方表我一片老臣心萬年磐后國千古中華地托天朝雨露恩永帶礪山河勢囑河山先生要知我常是謹守分報皇恩秉忠誠立家國新水令離愁卜信海棠枝上子規啼伴離愁九分滋味時當明媚景紅綻嶺頭梅陡憶相知歡會在何日駐馬聽寬褪羅衣昏曉相催能有幾困人天氣懨懨懶去傍朱扉青鸞失却信音稀近間鏡裡添憔悴瘦形容猶似鬼害相思鎮日情如醉鴈兒落我恰才輕將蓮步移欵向花前立好教我含愁訴與誰揾不住兩眼恓惶泪得勝令我這里自嘆自傷悲自怨自孤恓月下燒香拜盻的來伶仃瘦影微一會家呆癡怕入香閨內獨自箇幽棲滿懷愁只自知川撥棹曉夜家盻佳期好恩情如同鹽落水恨只恨短命強賊飽病難醫狠似王魁恨薄情辜恩負德撇奴家在兩下里七弟兄一會家黛眉慢蹙數歸期早離别三載凄涼日怕黃昏鐘響漏聲催怯啼春燕語鶯聲嚦梅花酒呀減崔徽畫裡肌恨芳草凄迷怪浪蝶分飛當時也臨逺别呀敢曾有話對咱題百椿兒無一實我恨不的死尋追負心賊把咱欺望永逺效于飛生拆散各東西收江南呀這些時懨懨悶守舊屏幃孤眠獨枕泪珠垂燈前月下費相思全無箇信息金錢每夜對神擲新水令春怨海棠深院杜鵑啼一聲聲喚將春去落紅間不掃飄絮亂猶飛簾幕低垂曉風輕篆煙細駐馬聽心事羞題畫閣無言空嘆息春情空憶瑶階獨步自徘徊纎腰寬褪絳綃衣玉搔亂綰青螺髻無歡容不理浥鮫綃揾濕相思泪喬牌兒慵將這斑管揮倦把那青銅對玉容寂寞了心如醉這芳菲誰愛惜落梅風和風細麗日遲燕呢喃往來相戲㺯春音鳥聲兒嬌更美他笑愁人不禁憔悴鴈兒落這些時香消脂粉稀清減腰肢細香殘錦繡衾夢破鴛鴦𬒳得勝令呀春意有誰知春恨自心馳鳳去簫聲斷魚沉鴈信違追隨屈纎指把歸期記孤恓染霜毫將離恨批滴滴金空撇下