分連枝􅀣斧㫁根画眉的無㝎凖傳粉的信不聞竊玉的情性村偷香的心内狠栁葉兒呀閃的我無投無奔空着人進退無門路途遥千里關山恨無音信斷鴻鱗一思量一陣消魂集賢賔金殿上慶雲祥霧遶觀林􅁐動簫韶都逰翫千紅萬紫見了些緑垂紅杏夭桃㸔了些滿日繁華数不盡百媚千嬌苔徑前緑茸茸鋪地草杜䳌啼在芲稍杏開金殿遶花綻玉楼髙逍遥楽湖山􅀝靠亭上排筵歌聲韵遶絃管簫韶紫金盃滿飲香醪寳􅂦龍涎靄􅂐飄排列下竒珍異寳有玻璃􅎑槖碧玉盃銀鋺玉杓金菊香我子見金􅁫十二列妖嬈天仙般容顔怎的描下香堦半勾羅襪小挽烏雲螺髻偏髙朱唇一顆櫻桃醋葫蘆玉纎手象板敲撥琵琶合鳯簫舞翩翩一捻小蠻腰金爐中靄􅃄香細裊酔後把幃屏􅀝靠抵多少海山銀闕宴蟠桃后庭花㸔紅桃緑栁遶有青松間嫰稍枝上鶯聲巧梁間燕語嬌樂陶陶玉鈎髙吊直喫的沉酔倒恰朦朧眼閉着有佳人簇擁着玉纎手扶策着猛凝眸觀了似天仙下碧霄青哥兒猛可的􅀅人􅀅人驚覺酔後也不知不知顛倒扶上雕鞍􅀅寳鐙桃􅀅紫􅁝緊掿似駕鸞鶴如上青霄早月上芲稍絳紗籠􅇁翆遶珠圍一週遭聴一􅂀簫韶樂尾聲我􅀅這玉鞭交付與金爐異香燒瓊酥滿捧玉匙調趂寒凨撲面酒力消把銀缸髙照衆金􅁫扶下玉逍遥集賢賔栁眉攅倦聴簷外鉄這離恨亂重疊秦䑓上吹簫無伴桃源路迢逓跋渉盻佳期展轉躊蹰想薄情意斷恩絶􅀝幃屏悶懨懨長嘆嗟怎承望兩下離別画梁聴燕語老􅀣囀鶯舌愁臨䑓榭舉目遥觀把離愁暫歇逍遥楽這些時心不寧貼悶懨懨痛口咨嗟消减香魂引夢賖画角聲絶離情空懊惱愁悶眼前踅難熬今夜欲􅀉音書心慵倦寫金菊香誰承望玉簮掂做兩三截井墜銀瓶何處也羞對鶯芲鸞鏡缺情思嬌怯似荘周一枕夢蝴蝶醋葫蘆怎禁那蛩亂吟砧韵切辰鍾暮鼔不休歇怎做的容易得来容易捨好教我腸慌腹􅀬則我那故人難望􅀍雲􅃒餘音則恁般情意短性薄劣待一年半載見時節那辜恩逆賊親自説這塲冤業人生最苦怕離別集賢賔鶯芲寨近来誰􅀾討這兒郎懸寳劍佩金貂燕子楼屯合了凱甲雞兒巷簇擁着鎗刀麗春院萬馬蕭蕭鳴珂巷衆口嗷嗷􅀅一座翫江楼等閑白占了他道是特欽丹詔穿花擒凰鳯跨海鈞鯨鰲逍遥楽六韜三畧也則是制勝量敵却做了幽期宻約陣馬咆哮比販茶船煞是粗豪􅀅俺這軟弱蘇卿禁害倒統領着雅青神道衝開蜂媒蝶使烘散燕子鶯兒折散鳯友鸞交梧葉兒雖不曽糟糠婦休猜做花月妖又不曽諳海島慣風濤把舵春纎嫰扶㰏筋力小恁待去征遼沒話説軍期悞却金菊香他􅀅這絳銷衣􅇁着錦征􅂁銀鎻甲纓聮着珠絡索鉄兠鍪壓損了金鳯翹改盡了手標全不似海棠嬌醋葫蘆鎗搠呵玉臂擎箭来呵羅襪挑丁香舌吐似劍吹毛連環砲􅀍窩兒􅂻聒破腦知音的都道我不信建頭功先奏箇女妖嬈么剪青􅁝􅆞做弓絃裁香羅納做征􅂁􅀘旗旛鈸題翆裙腰金瘡藥細􅀅脂粉調都是凨流功効他子待五花誥下紫宸朝么呌喳喳錦纜移閙垓垓画槳摇那􅂻􅂑明眸皓齒姆軍稍更做道孫武子教的来武藝髙止不過提鈴喝號抵多少碧桃芲下坐吹簫么他戀着蓬囱下凨致佳舵楼中景物饒棹歌聲􅂻樂陶陶辱沒殺鋪紅苫緑翡翠巢怕不道相偎相抱那􅂻也咲芙蓉帳暖度春宵么晚凨凉觱篥鳴曉星落鼙鼓􅃻􅀬樂似銀筝象板紫檀槽子學那明皇早起時臣起早白鷗冷􅀏到惹的黒漫漫殺􅂔蜃楼髙餘音恁妳妳得了些賣陣錢恁哥哥占了些惜軍鈔他向那海神廟多買下些好香燒但只􅂅一年一度征海島休􅁯了􅀅軍的旗號他是玉門關舊日勇班超集賢賔獲騶虞㸔一帶好山十数里恰便似錦步障翆屏幃我子見凝􅀣色霜寒露冷鎻嵐光霧慘雲迷恰轉回路凹峻嶺崇崗早来到石槎牙陡澗深溪㸔一㑹青抺了的亂􅈐如画㦸我􅀅這錦韁兠玉勒輕提日晃着火星􅀛背鎧凨颭動雲月皂雕旗逍遥楽宻匝匝擺開雲􅀐厮琅琅掣響鑾鈴明晃晃擺開画㦸子聴的撲鼕鼕擂動征鼙呐喊聲髙華岳摧也不索疾走啣枚我向那山前嶺後澗北溪南布列長圍上京馬也不索六韜虎豹運兵機也不索八陣魚龍出正竒也不索九曲長蛇頭應尾披掛的整整齊齊都是些水磨成銀甲滲金盔梧葉兒你那􅂻砍翆竹把排塲立折靑松􅀅籠䧟堆髙阜處搭雲梯俺這􅂻按星宿分人馬依五行增氣􅀔各自索用心機且㸔是誰先来報喜醋葫蘆這一隊向東山増氣􅀔春蒐的􅀅士齊恁在這甲乙方居震位御勾芒司太昊軆人心的兵校每正雄威上應着角木蛟斗木獬奎木狼并木犴四星宿向東方無對敵一箇箇戴青盔披青甲鞚青􅍡束青帶提着柄青蘸斧施逞英鋭最當先展青龍應木徳順東凨迎麗日忽刺刺打一面摩霄漢的繡青旗么這一隊向南山增氣􅀔夏苗的􅀅士齊恁在這丙丁方居離位御祝融司炎帝遵禮法的兵校每正雄威上應着尾火虎翼火蛇室火猪觜火㺅四星宿向南方無對敵一箇箇掛紅􅂁乗赤􅇠帶紅纓抹紅額拏着箇紫金爪施逞英鋭最當先展朱雀應火徳順南凨迎烈日忽刺刺打一面拂炎火的絳紅旗么這一隊向西方增氣􅀔秋獮的􅀅士齊恁在這庚辛方居兊位御蓐収司少昊尚義勇的兵校每正雄威上應着亢金龍娄金狥􅀑金羊牛金牛四星宿向西方無對敵一箇箇頂銀盔􅀐白馬帶􅣱刀懸玉簡使一條梨花鎗施逞英鋭最當先展白虎應金徳順西凨迎皜日忽刺刺打一面沾白露的素白旗么這一隊向北山增􅂔􅀔冬狩的􅀅士齊恁在這壬癸方居坎位御玄㝠司顓帝􅀎智慮的兵校每正雄威上應着壁水㺄箕水豹參水猿軫水蚓四星宿向北方無對敵一箇箇驟烏騅彎黒弓使鋼鞭披皂鎧手執着黑纓鎗施逞英鋭最當先展玄武應水徳順朔凨迎瞹日忽刺刺打一面生黒霧的皂征旗么這一隊向中央増氣􅀔校獵的􅀅士齊恁在這戊巳方居黄極鎮中央軒轅位守忠信的兵校每正雄威上應着桞土獐胃土雉氐土貉女土蝠四星宿向中央無對敵一箇箇跨黄驃絡金轡戴金蝥執金劍披一副黄金甲施逞英鋭最當先展太極􅀿土徳布和凨宣化日忽刺刺打一面綉八卦的赭黄旗么這一隊向東南増氣􅀔校獵的􅀅士齊恁在這辰巳方居㢲位照燭龍出暘谷的兵校每正雄威上應着房日兎虚日䑕昴日雞星日馬四星宿向東南無對敵一箇箇錦征􅂁獅蠻帶綉裙襴金頓項手執着三停刀施逞英銳最當先展金烏應陽徳着羲鞭行黄道忽刺刺打一面降靈曜日的日光旗么這一隊向西南增氣􅀔校獵的􅀅士齊恁在未申方居坤位輾氷輪修玉斧的兵校每正雄威上應着心月狐危月燕畢月烏張月鹿四星宿向西南無對敵一箇箇鳯翅盔龍鱗甲鵲樺弓鵰翎箭手拏着竹節鞭施逞英鋭最當先展玉兎應隂徳御望舒紛丹桂怱刺刺打一面開寳鑑的月光旗后庭花我子待盡忠誠保社稷守藩􅀖恭護衞覩仁獸来山郭㸔禎祥設大圍我這􅂻吿神祗只􅂅的早觀祥瑞我則索下深壕過嶮溪扳籐蘿履恠石入叢林􅀣色迷上髙岩雲氣濕青哥兒蹅遍了山前山前之地却怎生不見昨朝昨朝祥瑞不由我手搭着心頭暗自疑莫不是百姓虚脾報不真實空動勞藩府親臨受驅馳跋渉在紅塵内浪来􅂻煞向前来嘱付你首先去通報知休愛惜錦征􅂁汗濕的濕淋漓把征􅟯馳驟的滿肘泥只限你一宵一日入金門先報喜到丹墀集賢賔喜相逢並頭芲下友天配偶兩嬌羞一對兒冤家合欠還今生諧老鴛儔意相投似漆如膠契相合萬種綢繆画堂前滿斟香糯酒喜孜孜共飲金甌則喫的天􅁁明月轉楼上換更籌南字字錦瑶堦羡晚逰閑行携素手金蓮欵欵移細桞腰肢瘦㸔芲楼撫景偏優咲吟吟轉過見新月一鈎休辜􅀒好景香醪􅂯酬低低悄語私情授向蘭房錦鸞早儔慢鬆丁香細鈕香散綉幃嬌滴滴温柔玉軆非宿世怎生消受北醋葫蘆温柔誰並肩凨流為世首弹弦品竹最精􅌻吟詩作賦時下有一團兒玲瓏剔透天生的秀􅂔他兩箇総全周南字字錦山盟海誓留休􅁯神前口辜㤙自有天􅀒徳神不祐􅀝粧楼訴盡縁由多情休得相棄兩頭優同眠綉衾鸞凰共儔心中緊記休忘舊好􅊚緣喜今早周贈新詩数首鮫綃半幅上有那鴛鴦􅀟綉北醋葫蘆姊妹每一箇􅀁事全一箇件件周好似那二喬鏡像影兒留占梨園委實無對手常想着歡娛時􅀱我和他契相合情相好意相投南皂羅􅂁羙滿㤙深情厚􅂅百年諧老共守白頭相逢誰似恁凨流終朝絃管笛歌奏池亭東畔湖山西首金盃慢舉佳飾廣有蓬莱仙境無加右北浪裏来煞他存心意最真我留情非虚謬休教那燕鶯叅透兩心頭鳯鸞交羙甘甘共斯守常禱吿神天加祐子願的㐮王雲兩萬年稠集賢賔貪荒􅋉􅁄針科抓住􅀾衣險諕殺小河西行不動山坡下歇息立不住東倒西推眼張狂有似撈菱行不動一絲兩氣那􅀅軍慣相持􅀎對壘有軍来誰敢和他迎敵則聴的摔天般發喊震地凱征鼙逍遥樂端的是名傳萬世㸔了他四海無双不枉了寰中第一狄青􅀅玉勒兠寳鐙踢獸壷中順手扯金鈚鳯翎箭水磨端的直弓彎神背更壓着李廣飬由基么箭着時支楞楞撇了画㦸撲簌簌零了豹尾我見他翻身落地馬空囬彎弓挿箭覷了一會􅀅一頂紫冠来撞砕我見他三思台吞滿画􅊝皮么史牙恰鎗使迎狄􅀅軍刀去的疾我子見鎗迎着刀捍􅁕律律火光飛見鎗來躱過刀去劈則見連眉帶臂恰便似錦毛彪撲倒赤狻猊么狄􅀅軍前面行史牙恰後面随他兩箇不曽荅話便相持恰便似六丁神撞着箇霹􅆮􅀑天生下是本對寰中少有世間稀尾你與我即便去莫迎敵得便宜則恐怕落便宜他每都響珊􅃢咲􅀅金鐙踢喜孜孜還營威􅀔打一面皂鵰旗齊和凱歌囬集賢賔幽囱静悄月又明恨獨􅀝幃屏驀聴的􅀌鴻楼外鳴把離愁又還題醒更長漏永早不覺燈昏香盡眠未成他那􅂻睡得安穩双声疊韵思量起思量起怎不上心無人處無人處淚珠暗傾我怨他我怨他説不盡誰知道這􅂻先走滚自恨我當􅀄不合認真簇御林人都道人都道他志誠却元來厮引眼睁睁心口不相􅀿山誓海盟説假道真險些兒為他錯害相思病負心人㸔伊家做作如何有前程琥珀猫児日踈日逺和你􅂯相逢枉了把痴心児寍奈等想巫山雲雨梦難成薄情猛􅂸今生和你鳯折鸞分尾冤家下得忒薄倖割捨的􅀅人􅀌另那日􅂻恩情翻成做􅀞餅
