哭哭啼啼倘秀才我若是守着箇賊營坐地怎當那做賊的干連帶累便守寨也少不得雲陽血染衣我将那賊心腸都改變賊手脚盡拾収做一箇小闍黎省了些是非滚綉毬從早起到晚夕常念着波羅掲諦子他那善根芽廣種了些佛果菩提喫着的是施主食穿着的是施主衣又不費半星兒本利做齋時不受些布施東西子他那化来的米麪真強如盗白得的錢財更勝似賊比那去偷的多少便宜呆骨朶惱得我撲登登按不住心頭氣我那些兒軟弱尫羸不信這花和尚智深不如那黒旋風李逵若説我閗鞭簡偏能使論鎗劍諸般㑹我惱了赤力力畨了大地軸忽刺刺攪渾了滄海水醉太平我子待躱紅塵是非向翠嶺幽棲小僧房相稱𥿄窓低編一邅兒竹籬間身分落一覺囫圇睡窮衣鉢不受那腌􅧐氣淡生涯常與這水雲期想人生有㡬么想人生有㡬㸔兎走烏飛迅指間鬢邉白髪老来催好光隂似逝水昨朝恰遇親兄弟今朝又送新昆季明朝不見舊相識怎教人不嘆息尾聲想世情嚼蠟真無味怕日月攛梭去較疾常言道且盡生前有限盃莫把心懐苦用機但得清閒少是非便是脩行路不迷撇罷了蝸角蠅頭那些名利笑傲向雲山畫圖裏端正好荷聖主撫洪基登賢俊安黎庶仁恩布無間華夷曲章法度皆脩舉因此上感神祗来嘉瑞鴈過聲由来是祖考積累常思想開基創業神功聖徳同天地布恩威撫黔黎四十年天下雍熈吾皇繼軆須知道立綱陳紀成非易守法度慎終如慎始滚綉毬鑒前代事可稽載簡册靡有遺堯放勲舜重華後先承繼夏禹帝勤儉無違孝神明菲飲食却儀狄絶酒醴治水土安生民有功萬世啇成湯徳日新昭假遅遅克寛仁祝網覃恩徳責六事甘霖應禱祈物阜民熈傾盃序周世自太王始治岐有聖徳文王繼更牧野陳師鉅橋發粟鹿䑓散財武土承志論成康嗣統好賢樂善守成無替至雍熈太和八百載應昌期脱布衫漢髙祖天與人歸漢文景蹈矩循規刑㡬措黎民共仰廣仁恩四方漸𬒳小挑紅太宗唐賢主功業尤宣著屈已求言行仁義當時賢相稱房魏曾将守成創業評難易魏徴言儆戒無虞芙蓉花想前王徳化美願明主常留意承先志總覽綱維咨啓沃輸忠義調和着鼎鼐塩梅休忘了修兵備屯将士鎮撫邊陲文與武皆榮貴剔銀燈遵郊廟嚴其享祀待宗室均其恩禮蠻貊戎夷要撫綏厚風俗恤飬惸婺䡖租稅寛力役民皆便利謹法律休䡖易伴讀書念皇天鑒君徳戒盈滿勤操執逰畋荒淫常須制但競競業業存欽畏時想着普天率土思康濟更旰食宵衣四邉靜萬方歡恱天心慰乾坤靄和氣海嶽效禎祥神龜靈鳥薦蕃祉黃河又清騶虞又至隆古治平時難比我聖明世尾聲騰嵩祝遍九圍但願吾皇萬萬歲聖子神孫福夀齊端正好我向那紫芝田丹砂地玩仙家日月遲遲陽和布暖江山麗瑶草香風細滚綉毬守丹爐玄鶴鳴駕雲車彩鳳棲獻岩花野猿逰戯近溪山有白鹿靈龜這其間碧蘿藤蔓垂黃精苗葉肥茯苓香傍着那老松仙檜喫的是萬年秋火棗膠棃㸔了那天連綠水源頭闊雲𥙷青山缺䖏齊㡬見了滄海塵飛倘秀才猛見了金童意急特奉着東華帝敕召俺芝仙赴玉墀莫不是宴瑶池王母㑹莫不是呈瑞應向南極仙家的道理滚綉毬金芝仙映日輝青芝仙翠盖巍石芝仙玉肌堅膩肉芝仙有車馬跟随子俺紫芝仙夀萬春金芝仙千歲期青芝仙多長在洞天福地石芝仙有岩壑相依見了些兩輪日月催昏晝萬里乾坤運化機仙境稀竒倘秀才東皇令獻瑞向中原大國正值着五福遥臨的月日民物春風化域熈豐登先庶類歡樂慶宫闈都来賀喜醉太平慶千秋萬歲仰宗社盤石昇平時世物雍熈正明良奉職萬萬年永保中華地千千歲永固宗枝貴煌煌的威徳撫蠻夷與堯舜同稱共美白鶴子兆時和并歲稔表萬國共来儀喜民庶樂安康享盛世千千奕白鶴子感藩憲賢能徳行清正合天機政平易化民安永鎮守中原地白鶴子應中國太平年喜四境豐登日慶風俗尚淳和樂民庶皆忠義啄木兒尾聲向宫城瑞草生表禎祥福夀期若見了仙芝一遍千千歲子那家門榮貴夀星光現福星随端正好霜重綠楊凋雨冷蒼荷脆喜黃花綻滿東籬恰便似金錢買得園林貴粧點的秋容媚滚綉毬滴溜溜紅葉飛濕津津玉露晞凉滲滲翠屏風細碧天邉斜月輝輝聴啼螿砌下聲㸔征鴻雲外歸恰𨳩了鳳樓前㡬枝丹桂散天香吹入簾幃我這裏収拾凉枕閒歌扇裁剪新羅換舞衣迅指間佳莭臨期倘秀才金釵揷茱茰露濕玉盃泛芳英嫩蕋佳莭登髙賞翫宜笙歌聞上界咲語躡雲梯恰便似天仙聚㑹滚綉毬松呵你鳳尾齊你都来賞秋光滿懐清致牡丹根正宜着接換栽培芍藥叢枝梗摧水仙花茎葉肥海棠花發秋嬌媚嫩紅苞顆頼江梅如今正遶籬玉露滋黄菊滿圃金風散木犀景物稀竒倘秀才我這里髙捧着梁州第七儘今日休辭歛灔盃直喫到明月上方纔教醉扶歸睡到那日三竿未起脱布衫理芳容整頓威儀束腰肢改換霞衣百寳粧瓔珞帶起珍珠砌頭巾欵繫小梁州我這裏占板忙将曲調催箏韻相随䡖𫾣羯鼓趂低廻丫鬟軰齊品鷓鴣笛么合清商入慢含秋意㡬聲歌髙遏雲飛玉軆柔春葱膩施展那栁腰纎細必感得王母下瑶池尾聲陶淵明滿把多風味南陽水延年飬夀宜松竹凌寒雪月棲花卉迎春日月遲荷芰薰風暑雨催梅蕚逢冬始占魁都一般芽茁根盤在膏地各等得四時時来恰榮美端正好慿智力将俊材収假仁義把民心結各施逞英武豪傑亂紛紛據地圖功業恰便似閙攘攘蠅爭血滚綉毬智的他見得别愚的他不敢惹若去呵稱了我一生心百年名莭欲留下一封書與曹操辭别我這裏取雲牋做書簡疊染霜毫将真字寫一星星把志誠實説墨花親運動龍蛇子我這半年兄弟音書阻怕甚麽千里關山道路賖豈憚䟦渉倘秀才将書與曹公告别把府庫封緘宻者尊嫂賢姪穏上車逺尋鴻鴈侶跳出虎狼穴關雲長去也轉調貨郎兒凉時候秋風八月向郊外車兒慢拽逺山遥望曉雲遮楓林赤鴈行斜極目向天涯一望賖二轉光閃閃暗霞暉照清湛湛寒波浩渺滳溜溜風吹落葉飄乾此刺枯荷𬒳霜凋靜巉巉遍野連天草閙呀呀㫁鴻哀急攘攘心随落日遥三轉我子見青䕃䕃栁垂兩岸下征􅟯遲遲意懶㸔了他數十間茅屋枕河灣小車兒纔歇住将玉勒快疾拴向店房中収拾一間鬆寛馬鞍何曽得聞玉粳自揀請阿嫂姪兒将美饌餐四轉打這厮舌刺刺狂言作戯口叭叭全無道理握雙拳待打這潑東西引起咱氲氲氣你正是衝着魔祟撅了太歲打的你忍不的喫不的就地下彎跧着睡磕損頭皮掂拆大腿這是你念彼觀音力着重委的難掙起頽再若恁的便休想漢将雲長饒過你五轉餞行酒多勞厚禮更将這衣服拜留這其間逺路途霜降正逢秋恰便似堪禦冷鷫鸘裘慇懃賜来祗領収厚感恩榮北瞻頓首恁衆将軍遥送勞台候餞行酒席前何湏又待不受呵越顯的雲長話不投相談相咲相勸相酬将美酒連斟了五六甌六轉寛度量能容小忿廣機謀方為大臣設筵宴開懐列芳樽醉時你将水䡖輕噀我這裏眼交睷将盹好也囉夏候惇心毒狠不由我氣撲撲惡發生嗔忿将你那血瀝瀝六陽涴了我明晃晃鋼刀敢恰證本七轉關某自河東来聚奔涿郡相從舊主但交兵對壘呵不曽輸馬到䖏便伏自玄徳昔為平原相共益徳多曽同禦侮我和他知心可腹他委俺統領兵卒襲邳城誅車胄占青徐敢揚威能耀武你待来口兒甜心兒苦惡狠狠的生嫉妬引的我靣皮紅胷中熱氣撲撲的添嗔怒我這裏向腰間掣寳鞘支楞楞的執昆吾若不是且㸔曹公深恩義我着你潑性命登時血濺土八轉炎漢室衰㣲時世為臣子湏當盡職想中興光武建皇極一統萬里舉英賢端士立綱維後来有明章能承繼慶豐年也哥太平時也哥自東自西鑿井耕田樂雍熈庶民心那喜那喜到末年傳及桓靈任奸回不把朝綱治黨錮興也哥私賣官也哥因此上逗引的閙攘攘群雄鼎沸起九轉誰肯立孤忠直烈更無箇冰清玉㓗重拜覆曹公自思些将忠厚言語聴者尊帝室職分休奢俺劉玄徳雖然衰懦終則是漢家枝葉一星星均前細說一句句你索知耶見如今魚龍入海混豪傑誰肯立芳名建節學宣尼尊王賤覇成功業學齊桓諸候九合㰱盟血學伊周忠誠輔相永無別説来的㡬般兒随公擇休把做不經意的常談不記者尾聲愁随烟栁千絲結悶擁雲林萬仞疊来到這荒郊曠野感嘆傷嗟極目山遮早十里長亭路兒也畨馬舞西風羙妓年少佳人咲吟吟可喜龎兒獨占春我見他眉彎新月臉襯紅霞髻挽烏雲一似廣寒仙子謫紅塵下香堦欵歩金蓮穏便有嬌姿畫圖真都不如他半韻一江風果超羣女隊裏偏他俊多嬝娜多嬌嫩論精神休說昭君總有飛瓊也不似他淹潤搊箏與撫琴謳歌共頂真委的般般順月雲髙語言安頓諸餘盡停分一咲生百媚櫻唇香噴黙轉秋波教人暗消䰟有意相存問無計相親近正是路入桃源未遇春目見陽䑓不見春秋夜月可意人推整羅衫褃暗逓鮫綃帕傳芳信終須有日諧秦晋羙滿眷姻羙滿眷姻餘音女心從郎情順果然成就洞房春不枉了教人做話論鴈過聲納凉赤帝當㩲耀太虚無半點南来薰風意任吞冰嚼雪成何濟扇頻揮汗如珠空持損玉骨冰肌一身傍翠微使兒童撼竹求風至煩熱也得恰片時風淘沙閑倚雕欄日漸西㸔鴛鴦戯蓮溪不覺夜凉生衣𬒮見萍開月破水金波影轉翠擎叢裏臉朧霞逞妖並頭蓮蒂芳心可惜不解語為恁凝竚么篇爐爇沉烟香院宇瀟灑䖏精神爽情意舒簮茉莉賦新詩此景有誰知何䖏設枕簟共紗㡡一撮棹清宵短樽前好傳盃白晝永酷暑怎當敵願得譙樓上銅壷漏休催三兩盞何妨夜眠遲餘音銀河動玉漏滴且向南窓少憇明夜納凉又這裏
