顧將一領錦征袍鮮血糢糊夏侯惇陳前觀了嘆吁他道是六丁神見也伏輸秃厮兒都棄了強弓硬弩丢下些衲襖征服俺這里亂紛紛馬蹄追敗虜一箇箇傍林麓入深蒲潛伏聖藥王我子見雲氣敷山澗阻滿身衣甲錦糢糊聲呌呼著箭鏃抵多少滿身花影倩人扶羞的那袁紹嘴孤都麻郎兒傷輕的潛身在民屋著重的橫倘在荒墟得勝的揮戈跳舞敗殘的魂魄俱無么載輜重遙貢內府得了些寶貨圗書收拾的營中物足齊唱著凱歌歸去黃薔薇磨旗幟忙收隊伍擊金鉦聚點兵卒積京觀髙堆數畝歸附的居民安堵慶元真子這中軍寶帳獻獲俘論功行賞到皇都只有這雲長功業最為初他更有嘉謀武藝熟論英雄世上無隨煞若再來聽的道關將軍臨陳也戰欽欽早自袁軍懼怎敢又慿勢力揚威耀武再遇著青龍刀赤兔馬黃金甲絳紅袍交鋒厮捲了旗收了陳拱著手低著頭早歸降聖明主鬪鵪鶉玉露新涼金風漸起托賴著聖主洪寬千邦進禮喜遇著盛世年豐興隆社稷見如今四序和萬姓喜道泰歌謡偏邦頓息紫花鬼序感應的麒麟出現彩鳳呈祥青鳥來儀四時八節民樂雍熙無及他每都鼓腹謳歌讃聖德見如今萬邦寧息一統封強萬國扶持金蕉葉雄紏紏文臣武職善通知天文地理秉忠誠于家為國一箇箇威風萬里鬼三台我子見龍官內盡都是黃金砌光晃晃瓊慺玉壁見瑞靄燦光輝勝蓬萊洞裏玉樓臺巧鐫龍鳯飛金粧成升斗錦繡堆恰便似閬苑蓬萊勝似那十洲勝迹調笑令蕩金風氣質彩雲更和那兔影蟾光明似水見氷輪照徹天和地桂花香月影風襲祝賀著吾皇萬年延夀紀更那堪洪福天齊秃厮兒萬乘主仁慈孝義勝當年虞舜無為寬仁厚德秉正直天心順百禎集堪宜聖藥王擺列著玳瑁齊百味竒你看那金叉十二謹相隨更和這玉液濃瀲灔杯則聽的笙歌一泒奏塤箎齊賀著萬萬歲永無極尾聲太平年四海民歡會齊賀著年豐物美中秋月喜團圎托賴著聖夀無強萬萬紀鬪鵪鶉操一曲流水髙山錦心繡腹水國魚邦跳出他龍潭虎窟頂笠披簑隄防著斜風細雨間來時琴一張酒一壷自飲自歌獨言獨語𬗋花兒序也不學李白捫月屈原投江只學范蠡歸湖繞一灘紅蓼對兩岸青蒲漁夫慢慢的將船兒你與我棹過去驚起幾行鷗鷺樂以清間吾不歸歟小桃紅水聲山色兩相宜間看雲來去怨結愁腹對誰訴自躊蹰將幾般兒煩惱收拾聚感時懷古舊榮新辱都裝入酒葫蘆金蕉葉來到這蘆花密處欵欵的將船兒纜住見垂栁風搖翆縷風蕩得幾朵荷花似舞調笑令來到他這淺處探著身軀慢慢的將鈎兒垂將下去則𬒳這銀絲兒界破波紋緑怎生這浮逰兒不動纎須我這里回頭猛然觀了艷姝可知道落雁沉魚秃厮兒可人意清歌妙舞酬吾志新酒活魚春風一枝花解語似著色美人圗粧梳聖藥王樂有餘興未足樽中無酒典琴沽倒玉壷聽金縷直喫得滿身花影倩人扶待不輸與俺椘三閭麻郎兒我生居在畫屋流落在郊墟冷落了歌兒并舞女控間了寶馬香車知他是斷于甚處睡足繞青山十里平湖向一葉扁舟睡足抖擻著緑簑歸去綿答絮仗年尊咫尺鑾輿倚功勞敢喝金吾瞞不過鳳銜去處那一箇官人敢言語無徒斷沒來家卒你若是我根前我根前沒怕懼絡絲娘我今日復帝都你根前再囑付則要你憫恤軍卒愛惜些民户弟兄和睦伴當賔伏從今之後有的文書我行分付不比其餘你若是我根前敢做主尾聲好山好水難將去都寫入丹青畫圗對此景賞無休到晚來停燈看不足鬪鵪鶉秋聲賦歐陽子方夜讀書有聲自西南乍猛掩黃卷危坐神驚對青燈忽聽膽冷嚮珊珊密灑踈𫾣冷清清無形少影勢不停怒轉增㵼潺湲瀑布千潯捲洶湧波濤萬頃𬗋花兒序凄涼如蕭颯淅瀝聲惡似驟雨盆傾呼號若砰湃奔騰雷霆霹靂金鐡鏦錚堪驚又似銜枚赴敵兵不聞嚴令但聽蕭蕭人馬行聲小桃紅我謂童子此何聲汝出階前聽童子聞言即從命到中庭悄無迹蹤大尤徑銀河耿耿踈星光映相伴月華明寨兒令童子驚問先生自沉吟坐到二三更出户間行倚樹潛聽聲在樹頭鳴是啇君今夜司征遵號令法取施行慘一天橫殺氣助萬籟起秋聲聽好教人感時序痛傷情金蕉葉其氣懸天髙日晶其聲慘雲騰霧升其激烈霜結露凝其砭人肌寒骨冷秃厮兒啇君主西方正聲夷則為七月之名于時為金又象兵秋為官而司刑可更傷情聖藥王春發生秋結成世間草木本無情草正青木正榮忽然當此更凋零敢這正是惟人乃物之靈鬼三台百憂感心無定萬事執刑多病動其中必搖彼精尚日月有虧盈笑癡人未省思其智之所未能憂其事之所未行徒形體勞勞昧心胸瞑瞑尾聲怪豫童子呼無應正鼾睡垂頭未醒但聞的四壁閙空聲更和這助我凄涼伴燈影鬪鵪鶉鵲噪霜枝螢飛露草月浸樓臺風生院落塞鴈聲輩寒蛩韻巧鐡馬搖砧杵𫾣金鼎香燒銀缸熖少𬗋花兒序繡𬒳空孤幃寂靜金鈎控獨坐凄涼翆幃間單枕蕭條囱前皓月簾下風飄好是難熬漏滴銅壷良夜迢越添焦躁腰細裙寬粉悴胭憔小桃紅深閨獨寢最難熬好是傷懷抱左右翻身盻難曉泪珠拋敗殘紅葉庭前落金雞呌徹玉蟾低墜風動桂花飄天淨紗甫能捱過良宵如何捱得終朝暢好是添煩受惱全無消耗閃的人玉減香消調笑令想著他恁情薄淺淡蛾眉不用描倚幃屏展轉愁顛倒怕聽那喜鵲聲噪往常時雲鬟整罷將金鳳挑這些時那曽道是湯著尾聲要梳粧直等他來到這般苦何時是了不是我恁的般上心愁怎當他那風流情意兒好鬪鵪鶉密密飄飄紛紛片片帶雨隨雲寒光冷熖積玉堆瓊鵝毛亂剪雲滿天雪滿川潤物宜時禎祥兆年𬗋花兒序剡溪中子猷訪戴霸陵橋浩然騎驢藍關道退之熬煎正應著袁安閉户蒙正歸窑買臣山前喜殺了穿鶴􅌁清間那老仙氷雪堂蘇秦不見都不如錦帳內歡娛暖閣排筵金蕉葉列金叉十二在面前一箇箇品竹調絃囱兒外梅花不逺一陳陳風吹到酒筵調笑令對著這聖賢作詩篇可正是才思未興酒再傳都一般韻角兒相留戀半空中栁絮飄綿樓臺殿閣碧玉填端的是逞才思酒興詩聮秃厮兒有似那天花亂剪飛六出萬萬千千縱橫往來撲面旋垂玉柱挂簷前堪憐聖藥王詩未全酒興便國家祥瑞慶豐年舞一畨唱一篇觥籌交錯笑聲喧齊賀著豐稔太平年尾聲玉龍怒吼空中戰戰敗的殘鱗遍天上方鑾駕到人間既不索誰把氷輪玉溝碾鬪鵪鶉雨意雲情十朝五朝雪艷天姿千嬌萬嬌鳳髻濃梳蛾眉淡掃櫻桃口楊栁腰玉蕊纎纎金蓮小小紫花兒序歌􅌐珠一串舞瑞雪千回無福也難消超群旖旎出衆妖嬈風標一笑千金價不髙世間絶妙意厚情深引的夢斷魂勞秃厮兒席兒前眉尖眼角寨兒中口強心矯謝瓊姬不嫌王子髙同跨鳳宴蟠桃吹簫尾聲不隄防側腳裏姨夫每閙全在你箇有終始冤家自保我身上但留心偷方便應付了鬪鵪鶉玉笛愁聞粧奩倦開鬢軃烏雲眉顰翆黛慵轉歌喉羞翻舞態悶填腦泪滿腮常記的錦字偷傳香囊暗解小桃紅倚欄無語憶多才往事今何在病體懨懨為誰害瘦形骸今春更比前春賽雕闌砌緑囱朱户深院鎖蒼苔醉中天􅥋却香羅帶慵整短金叉無語無言呆打孩不厭倦衫兒窄幾度將龜兒卦買何日佳期再天淨紗也是咱運拙時乖致令得雨杳雲埋側腳裏相知不該胡喧亂講𥿄糊鍬怎撅得陽臺尾聲他一片偷香竊玉心寧耐喑氣吞聲慢捱怕甚風月悶愁鄉煙波是非海鬪鵪鶉賞元宵讃當今帝主仁明德過文武臣宰忠良才勝伊吕治化的歲稔年豐見如今民康物阜統華夷立帝都定洪基建殿宇恰便似兜率天宮不弱如清虛洞府𬗋花兒序恰過了新正令節又遇著元夜燈宵人盡皆在化日康衢煒煌煌光沖霄漢明朗朗月照寰衢堪圗則這燈月交輝光彩舒傳柑宴雲山水陸氣氤氲香靄雕盤光瀲灔酒注金壷金蕉葉樓上下銀燈畫燭殿周圍花錦攢簇碧雲外鸞飛鳳舞玉階前金鞍繡轂拙魯速結鰲山翆扶踈點花燈錦糢糊有諸天佛祖朝聖毋更有那春夏秋冬古今人物明滴溜簾簌珍珠光燦爛花放芙蕖聽一派百花棚動仙音按樂圗么篇採蓮船美艷姝貨郎擔零碎鋪承應的藝解相續錦繡旗舒笑樂歡娛鼓震天隅則聽的百司班部四夷賔服舞蹈山呼齊祝讃萬萬歲萬萬歲聖明主鬪鵪鶉走驃騎萬國來朝千邦納表士庶康寧黎民快樂節遇端陽大開殿閣應𬎼賔艾虎懸宜時序蒲觴酌都則為聖主寬仁內宰每殷勤走標𬗋花兒序則聽的春雷鼓嚮震地鑼鳴雲磨旗搖征塵起處駿馬炮烋堪畫堪描百丈旗開第一遭隨後有二仙傳道拖白練天下絶倫大開門冠世竒標寨兒令坐鞍心亦效勞四夷解盡來朝有仙人指路雲霧瞧李存孝打虎威風漢李廣射鴈穿雕尉遲恭戰八將逞英豪取經回白馬馱著雙飛燕綽水擇毛挾鎗趕鏟疾有背坐老僧喬鬪爭環二鬼厮奪著小桃紅揭鞍換􅦘使心苗隔肚穿錢妙倒挂枯松捨身落前跌塵在分毫金鈎拂􅦘誰知道且休説隔二騙三流星趕月都不如燕子去奪巢金蕉葉豹子翻身側瞧入海求珠取寶枯樹盤根轉腰踢斗推星懊惱調笑令見八蠻進寶四毛女逞妖嬈呀我則見六臂那吒顯躁暴張天師馳虎施玄妙挾黃巾要獻功勞擔水救火馬上挑後探鞦側坐鞍橇鬼三台薑太公垂鈎釣五馬將追著曺操童子拜觀音悟道張子房進履在圯橋大捨身登時放倒金剛獻杵手搦著二郎趕日轉幾遭秋千子施展精神有玉女攛梭弄巧秃厮兒野馬鏟從來見少剪刀股前後相交追風膩旗手內招頷搭頦最難學可也無褒聖藥王僵板闥直定腰節節髙五猿爭果摘仙桃左插花手下疾右插花上馬牢踏梯望月看雲霄旱水磨轉千遭黃薔薇夜義探海潮倒捲簾懸髙餓虎撲食煞爪滚繡毬獅子臥倒耿恭拜井把香燒五鬼閙判亂揪著歸湖的范蠡樂道逍遙雙馬解拖著斜插栁稍五匹馬亂爭跑拙魯速我則見滚鬃過膛又一遭鐙裏藏身暗偷瞧斬蔡陽氣豪射白猿正著耍孩兒量馬比低髙弓箭鏟宜詠宜嘲你試看左入鞍右入鞍百計較么篇三上馬兩臂勞金雞獨立著有十間子弟清標三耍旗搖單獻靴蹺箭對飛刀我則見肩莊偏髙攀腦絶妙四季跌落單獻鷹放的疾大打圍才散了尾聲鳴金鼓鎧連聲炮御座前揚塵舞蹈碩聖夀萬年安長宴良辰慶讃到老鬪鵪鶉享賀升平四海安然八方寧息萬國來朝千邦進禮道泰歌謡豐年稔歲五榖收禾稼齊處處謳歌家家慶喜𬗋花兒序明晃晃兩輪日月錦重重萬里江山永綿綿一統華夷文官武職燮理鹽梅其實護國于民秉正直一箇箇孝當竭力拜舞金鑾受賞在丹墀調笑令衆星拱北極彩雲飛十二簾籠繡幕垂寶爐中一陳香風細動龍蛇日暖旌旗左右兩行排錦衣列宫人翆繞紅圍秃厮兒豐稔年麥秀二𡵨太平時榖穗雙垂候門兩行排畫戟開玳宴飲金杯堪宜聖藥王絃管隨音律低蓬萊仙景勝瑶池天下知感聖德皇基永固勝磐石麒麟現鳳來儀尾聲宴群臣龍虎風雲會衆星拱當今紫微過玉府洞中仙勝蓬萊畫圗裏鬪鵪鶉宴慶皇朝錦重重蘭殿椒房光燦燦皇宫錦屋齊臻臻彩檻雕欄髙聳聳瓊樓玉宇更勝似閬苑仙鄉又壓賽清都紫府金鈎懸翡翆簾御龍駕龍鳳車慶雲生冉冉霏霏佳氣靄蔥蔥鬱鬱紫花兒序禋褥隱芙蓉錦繡宫幃開孔雀金屏篆煙焚寶鴨金爐這的是人間天上不弱似弱水蓬壷堪圗端的是萬里山河壯帝居受用享四時之富玉盤盛有名竒珍金盆內無價珊瑚調笑令動清歌妙舞開玳筵飲芳醑則聽的鳳管鸞簫絲共竹進珍饈百味皆全具進金羹玉膳天厨列雲山美肴陳水陸奏簫韶聲徹天衢耍厮兒端的是繞宫闕香風馥郁遍樓臺翆錦流蘇天香九成樂再舉慶一統會車