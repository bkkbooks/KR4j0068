翡翆裙鬆綽了縷帶鮫綃襻得勝令自從那花底唱陽關栁下送征鞍經了些夜月孤幃靜望不見天涯一鴈還㸔㸔業眼児熬清旦澘澘泪珠児落夜䦨甜水令常記的白雪輕謳金杯滿泛紅牙低按私語燭花殘到如今好梦全無佳期易阻相思成患平白的廢寝忘飡折桂令望藍橋逺似三山烟水迷茫道路艱難瓶墜簮折風酸月苦雨澁雲慳長攙攙連理樹柔條盡剷磣可可比目魚活水将乾他性格奸頑不寄平安章䑓栁恣意留連蟾宫桂未許躋攀随煞怕的是無情歲月相催儧容易去何年重返賈充宅韓掾見應難天台路劉郎到来晚新水令憶楊妃翆鸞無路到南柯玉簫閑彩雲零落慵斟和泪酒懶聴㫁腸歌卿呵你問今日如何更愁似夜来箇駐馬聴不為那楊栁情多怯暮雨渾同人嬝娜梧桐葉堕蕩西風特似命輕薄荒墳空對馬嵬坡珠簾巳閑朝元閣恨無聊㸔玉容何處添寂寞落梅風他俺行随機應變他行乞命児活怎下的活支煞的眼前折挫那的是寡人承謝它把箇無投逩的帝王饒過鴈児落您早則㫁絶了心上火您早則剪除了宫中禍您早則掀騰了枕畔情俺早抛持了舌尖上唾得勝令切齒恨干戈無心選嬪娥恨望終朝盡悲啼半夜過常和妃子同衾臥我也難和别人擁𬒳窩殿前懽這煩惱怎消磨想温泉直恁是非多却甚風恬浪靜人亡過好不分箇清濁一尺水二尺波閙穣穣空惹箇雄紏紏威風大則近的三千粉黛却近不得百二山河七煞尾不問羯鼓習天樂空驚虎旅鳴宵臥太平歌憶當時偶然潼關破日夜和奪不免的幸西蜀劒嶺嵳峩海棠正煖東風馬頭前蹙損雙蛾黃塵埋綺羅兩鬂巳成皤俺也曽香腮偎定芙蓉蕚朱唇温柔櫻桃顆川撥棹當夜對銀河女牛星恰㑹合正人態柔和伴月影婆娑俏分金釵鈿盒望愽箇死生縁無間闊鴛鴦煞尾近􅌐山冉冉隂雲磨暗華清慘慘寒烟鎖神思昏沉鬼病纏縛唱道薄倖堪憎㸔承的人小可這無主倚的君王雖然想着那好處及多卿呵也合梦児㸔将節来探覷着我新水令禄山憶楊妃舞腰寛褪弊貂衣害得人死臨侵一絲兩氣您那里雲作垜綉成堆毎日家眼迷奚全不想洗児㑹駐馬聴想今日别離少半是君王多半是你你舊時標息九分来消瘦一分肥秋風空使景狼藉青天不管人憔悴光隂雖去急俺歸心更緊似西風日落梅風往常時胖得来無把背如今瘦得来􅑯恁地想綉幃中一畨家喬勢具濃時最嫌的是肥財皮若是再相逢早得百無阻滯鴈児落再㡬時偷斟鸚鵡杯再㡬時重配鸞凰對再㡬時同偎孔雀屏再㡬時共擁鴛鴦𬒳得勝令恨别鳥替人悲思郷馬頻嘶寄信魚難到傳情鴈不歸别離夜月人千里相偎春風玉一圍七煞胡笳韻起聞知酔玉簫聲斷㝷無跡太平歌琵琶曲盡弹絶淚嘆零落棲遲觸目總堪傷逈野荒陂誰知你在那神仙化樂天宫内遣俺入烟邊塞週廽何日銷金帳底得赴隔年期三煞俺無縁赴稳私情龍虎風雲㑹有分擁離愁金鼓旌旗隊川撥棹恰到日平西對長安一嘆息見霜草凄迷烟樹依稀望不盡千山萬水恨不得上青霄登玉梯鴛鴦尾煞彩雲縦赴槐安國早黄塵依舊陽關曲見目下縈損枕上禁持唱道有始無終多虚少實據任無心成佳配白甚驅馳把似一就休来梦児裡新水令閨情雙峯毛舜臣作碧紗囱外曉鶯啼斷腸聲擾人春睡魔軍纔待遣病鬼又相欺展轉追逼甞盡惡滋味駐馬聴點檢芳菲花落花開紅雨洗安排憔悴樹頭樹底緑雲垂戈矛難敵恨鋒機參芩不𥙷愁腸胃恨和愁甚道理百般的不准人央及鴈児落擔閣了迎風待月期錯誤了捉雨挐雲計䦨珊了憐香惜玉心翻悔了赫鬼瞞神誓得勝令呀這些時消瘦不勝衣憂悶竟忘食護短嫌人問着迷只自知歡嬉往常間語話甜如蜜别離近新来恩情冷似石川撥棹我則索强支持狠相思透骨髄這些時蹙損蛾眉减削香肌獨守孤幃靜掩深閨咫尺間關山萬里又一春虚度矣七弟兄一㑹家暗疑痛悲受岑寂這早晚雕鞍寳馬在誰家繫到頭羙滿且休題臨行嘱付全不記梅花酒呀知他是虚共實憶素手相携曽熱臉相偎更寸歩相随連枝樹該並活比翼鳥定同棲不承望輕棄擲去箭也怎攔回覆水也怎收拾斷梗無再生時破甑無再完日收江南呀為甚麽王孫一去不思歸天涯芳草怨萋萋把生綃一幅寫還題㡬度價泪垂画中人不似舊崔徽新水令念逺燒痕回緑遍天涯憶王孫去時殘臘愁垂簷外雨憂損鏡中花掘土摶沙感事自驚訝駐馬聴望眼巴巴春陌香塵迷去馬梦魂颯颯曉囱初日閙啼鴉千聲作念湊嗟呀一絲情景留牽掛許歸期全是假秀才每説謊天来大喬牌児綉雙飛線脚差描並宿筆尖怕牡丹亭閑却鞦韆架好春光誰共耍落梅風肌消玉臉褪霞怎打熬九秋三夏𬒳薄賺的孤又寡辜負了小喬初嫁鳫児落誰攔截巫女峽誰改變崔徽画誰糊突漢上衿誰扯破秋雲帕得勝令身似井中蛙命似釡中蝦難把猿心鎖空将䳌泪洒情雜下不的題着他名児罵性猾恨不的揪住他身子打甜水令馬上墙頭月底星前囱間簾下容易得歡洽案舉齊眉帶綰同心釵留結髪那曽有一點児䙝狎折桂令好姻縁兩意相荅你本是秋水無塵我本是羙玉無瑕十字為媒又不圗紅定黄茶我不學普救寺幽期調發你怎犯海神祠負意折罰生也因他死也因他恩愛人児歡喜冤家錦上花想着他錦綉充腸諸餘俊雅山海填胷所事撑逹花下低頭風吹㡌紗月底潜踪露濕羅韈朱絃續有時寳劒配無價求似神仙信似菩蕯纔得相逢撲絮納瓜恰早分離瓶沉珠撒清江引一聲去也沒亂殺少㡬句叮嚀話説歸甚日歸待罷何時罷梦児中見他剛半霎離亭宴歇拍煞狂風飄散鴛鴦瓦嚴霜冷透鸞凰榻好教我如痴似啞佳期絶往来後約無慿凖前語皆欺詐空傳紅葉詩枉卜金錢卦凄凉日加燕驚飛張氏樓犬吠斷韓生宅虎攔住蕭郎駕悶随秋夜長情逐春氷化待他見咱算他那狠罪過有千樁害的我這瘦骨頭沒一把新水令祿山梦楊妃駕着五雲軒飛上月宫来別是重境界却便似春氷籠宇宙秋水滿楼䑓虚説一座閬苑蓬莱便有也難賽凨入松瑞簾丹桂冷凨篩掃盡繊埃水晶簾晃珍珠額迸寒光玉砌瑶堦為惜中秋夜色微雨浄天街万花方三䑓忽然金闕門開奏樂聲一派素娥仙𬒮兩邊排莫将舞䄂輕擡雖無百寶粧腰帶趂霓裳節輳和諧帝王黙記心懐見精神有情無奈尾廣寒一見神仙態把六宫中許多恩愛都撇在九霄雲外新水令十羙人慶賞牡丹園牡丹亭上日遅遲愽山銅篆香凨細栁垂金瑣暗芲壓玉䦨低睡足羅幃斜倚朱扉整頓春衣巧画蛾眉恰出香閨是誰人将俺名題喚一聲玉天仙有何意慶宣和欵撒金蓮歩懶移翆擁紅堆我這裡忙掲朱簾問是誰却元来是你是你喬牌兒相别纔数日迅指又重㑹瑤池金母群仙隊飲瓊将斟玉液鴻門奏凱歌這一箇出銅光的酸似虀這一箇傲雪冷的甜如蜜這一箇辟麝香辣味多這一箇生淡脆的先春意想着那天生物不偏欹兼羙悪得春暉這便是荆棘同蘭葸瓊瑤伴瓦石想人事何疑有君子便有那憸邪軰将天理相推有忠良便有那謟䛕的甜水令俺拜謝深恩仰荷光榮恭承嘉意㸔歌舞樂聲齊向玳瑁筵前散滿天香飄然衣𬒮髙擎着獻夀金杯天香引髙擎着献夀金盃奏的是錦瑟鸞笙鳯管龍笛玉盎蟠桃金盂火棗寳鼎交梨萬萬春福如海比千千年夀與山齊縹緲衣佇立丹墀拂綽香塵献舞瑤池川撥棹愛的是值春暉暖融融凨日羙音樂相随羯鼓頻催喜遇生日慶㑹筵席膏雨繊㣲養芲天氣更遇着主人慇懃種植是扵俺正合宜七弟兄更有舞的唱的㸔芲的賞名園每日醺醺酔有歡有喜有相知無憂無慮無縈繫梅花酒似今日快樂期正中國雍熈值采鳯来儀㸔祥瑞雲集五榖収百姓喜八表静四夷㱕牡丹芲茂盛得荷主人㑹㘽培滋飬的樹豐肥保護的不折虧能接換善分移収江南因此上牡丹嬌艶逞芳菲感主人雨露四時齊駐紅顔乆逺壮宫闈俺這裡謝的十羙人青簡内永標題尾謝天仙賜與多嬌媚生長在名園上國増羙艶向三春永合歡樂千紀新水令堵察善良聴楼頭画鼓打三更綉圍中枕餘衾剰明朗朗囱外月昏慘慘榻前燈空倚幃屏簷間鉄好難聴駐馬聴盻殺我也璫璫玎玎你便是再出世的陳摶也睡不成度一宵如同百嵗捱一朝勝似三春金爐香盡酒𥘉醒孤眠那怕心腸硬誰慣經相思最是難熬的症喬牌兒一㑹家睡不着獨自箇寢非干是咱薄倖沒来由簮折瓶墜井将鴛鴦兩下分雁兒落常想着芲前携手行月下肩相並羅衾翻浪紅玉腕相交㝎徳勝令眉黛逺山青桃臉嵌朱唇楊栁腰肢瘦青螺髻挽雲天生下精神十指繊繊嫰描不就丹青比觀音少净瓶川撥棹不由我淚盈盈聴長空孤鴈聲暫出門庭聴我叮嚀自别多情雁兒我其實捱不過衾寒枕冷相思病疾漸沉七弟兄雁兒你却是怎生暫停聴我訴離情一封書與你牢拴㝎快疾忙飛過蓼花汀那人家寢睡長門静梅花酒你與我呀呀呀呌㡬聲驚起那人聴說起咱姓名他自有人相通從別後不見影閃得人丧了魂靈羅幃中愁怎禁只爲他掛心情朝忘飡淚如傾曲慵唱酒慵斟収江南雁也可隣見今宵獨自冷清清你與我疾囬疾轉莫消停山遥水逺殺勞神趂天色未明只休要等閑㝷便宿沙汀尾你是必休辭雲濃凨力緊我這裡盻伊醫治相思病傳示與俺可意情人休辜負海誓山盟唱道性命也似㸔承心肝兒般欽敬准俻你鵬程我這裡獨守慢慢的等新水令鳯凰䑓上憶吹簫似錢塘梦魂𥘉覺芲月友鳯鸞交半世踈狂總做了一塲懊駐馬聴黄詔奢豪桒木剣熬乏古㝎刀双郎傘薄𥿄糊鍬撅了點剛鍬怕不待争鋒取債戀多嬌又索書名画字㝷人保枉徒勞供錢買咲教人咲落梅凨姨夫閙咱便曉君子不奪人之好他攬㝎磨杆兒誇俊俏推不動磨杆兒上自吊步歩嬌積攅下三十兩通行雅青鈔買取箇大笠子粗麻罩每日粧甚麽眼見的和契丹交雖是不凨騷不到的着圏套甜水令佳人有意郎君俏郎君無鈔鶯芲惱如今的惜芲人㺯巧指不過羙話兒排虚科兒套實心兒少想着月下情星前約是則是芲木瓜兒㸔好李亜仙負心的疾鄭元和下畨的早
