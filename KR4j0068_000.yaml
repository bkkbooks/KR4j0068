body:
  text: 雍熙樂府序夫樂府之名起于漢是後代有作者體製漸嚴至于今日獨益精斯乃文詞之最工聲律之大備也其體製有十七宫調曰仙吕調曰南吕宫曰中吕宫曰黃鍾宫曰正宫曰道宫曰大石曰小石曰髙平曰般涉曰歇指曰商角曰雙調曰商調曰角調曰宫調曰越調皆因天地自然之音定腔命名各從其屬一句之內不可亂下一字一調之中不可混施一曲自非髙才博學妙解音律者不能按腔填詞使情明語暢穩諧樂府何者蓋前人閲歷既多腔譜巳定聲分平仄字别隂陽至精至備本不可易故于措詞之間其字其音一有出入即非家法弗愜人心何以傳久逺被絃管哉故此為詞林之絶技藝苑之至難也文人才士往往難言之求其究心精專獨臻其妙者代不數人而已由是傳授既寡樂教遂微豫生長中州蚤入內禁中和大樂時得見聞又嘗接鴻儒承論説似若倣佛其影響者比見舊刻彚輯國朝并金元以來諸名公巨卿佳詞妙曲套數小令凡若干章宫分調别燦然具備作非一手調出一腔信皆樂府之指南先得我心之同然者也竊自愛之乃于直侍之餘禮文政務之暇或觀諸窗几或命諸聲歌臨風對月把酒賞音洋洋陶陶久而忘倦自惟際世雍熙仰受隆恩和平安樂斯能樂此爰鋟諸梓用廣其傳仍其舊名曰雍熙樂府雍熙云者蓋采唐虞時雍咸熙之語以昭盛世之治和也且欲歌之聽之者咸知聲樂之所自云嘉靖丙寅歲中秋日安肅春山謹識雍熙樂府卷之二十目録雜曲山坡裡羊身無所幹當休髙歌繁華搬㺯有錢有物伏低伏落譁誇聰慧官資新授三閭當日愁眉緊皺風流人坐生涯雖舊天于人樂新修田院江山如畫風波慣怕隂隨隂報須教人倦風波時候休爭間氣淵明圗醉花開花謝堯民堪畫青霄有路長天炎熱膏梁供奉功名為務朱軒兩厦水亭間眺人活百歲困來髙臥黃蜂報曉常無飢餓雲埋山麓禾田耘遍氷輪髙駕羈懷縈挂長江東注驅馳何甚田園荒廢喬才心邪􅓸波羅襪簾兒私下繡幃孤臥雞鳴早去榮華休傲虛名休就花逢春到紅塵千丈塵心撇下財帛爭競失時休懊水仙子帶過折桂令海棠雨過錦狼藉氷盤貯果水晶涼繡幃零落綵絨毬鬢從別後甚蓬鬆病乜斜恰似醉乜斜老先生空戀錦堂嬌並頭蓮池上錦鴛行萬花臺上正中秋一箇煙花裊娜艷詞頭千嬌百媚俏冤家鴈兒落兼得勝令往常時為功名惹是非自髙懸神武冠也不學嚴子陵七里灘三十年一夢驚抖擻了元亮塵雲來山更佳器非瑚璉同間來無妄想山翁醉似泥詞林錦繡堆功名休挂齒身離皂蓋車天時鑒盛衰相親麋鹿羣柴門盡日關慙居鼎鼐官時光幾變遷至如富貴驕詩書細琢磨性情甘淡雅茶烹鐺內雪婆娑蓋草亭忙忙鳥兔走新詩囱下吟經書子訓嚴趨炎真面慙怕的是五鼓敲喜的是玉兔升想的是橂樣標愛的是一處眠小狀元酸如醋那裏是煙花寨錦繡窩托根近水堤形圗煙月牌飛不上離恨天女孩兒年正嬌倚幃屏長嘆吁手帕兒托著腮十二月兼堯民歌從跳出功名火坑清明禁煙堂名遂間池亭草苫最髙歌兼喜春來禁苑中試看花開詩磨的剔透玲瓏沽美酒兼醉太平在官時只説間寶粧成鸞鵲牖滿長空瑞雪飄對玉環兼清江引水向東流奄奄日墜西白髮階前眼見故友稀兔走烏飛忙中日月疾碧玉簮折掂為三兩截郎上孤舟片帆無計留江雨淋淋梅垂無數金懶聽笙歌酒空金叵羅去歲觀梅折花親贈君羅袖頻淹淚珠凝粉腮香透簾櫳藕花風漸生滿泛霞杯羞歌白苧詞孔雀屏開半遮銀蠟光脫布衫兼小梁州樂繁華倚翠偎紅沽美酒兼快活年鍮石銅生性格滿庭芳兼清江引一蓑晚煙逺山近山村前野田煙連草連叨叨令兼折桂令蝦兒腰龜兒背玉連環繫不起香羅帶脫布衫兼小梁州氷肌瑩寶釧玲瓏映斜陽數點歸雅梅花酒兼七弟兄他每日家笑呵呵年紀又半百過鴈兒落兼清江引喜山林眼界髙湘妃逰月宫帶折桂令簮纓華胄更風流後庭花兼青歌兒喜孜孜擺珍羞開玳筵盡忠良為股肱喜梧桐蒙山頂上茶蒙山頂上茶雪裏梅看仙子跨黃鶴黃薔薇君天坐碧霄脫布衫兼小梁州明聖主仁倣三皇月上海棠玉樓花影淸秋夜青娥銀燭髙燒者似嫌黃菊千枝放瑶光乍轉芳枝上掃晴娘掃晴娘髙蹺雲髻閗紅粧掃晴娘輕移蓮步下回廊掃晴娘臂懸灰土絳紗囊掃晴娘一身可喜好衣裳醉扶歸瘦後因他瘦頻去教人講有意同成就我嘴揾著他油䯼髻一半兒懷中摑惜費溫存不禁春色眼兒涎纎腰恰退繡羅裙俏心端的性難拏海棠香雨濕吟𫀆春閨怨要解愁懷除是酒桞葉眉兒芙蓉色要解愁腸除是他要解愁腸除是你落梅風門外山無數野鶴才鳴罷山隔紅塵斷野水明映月流水髙低澗入室琴書伴荼􅐘徑芍藥亭龍蛇字鸞鳯𥿄清香透醅甕開包藏消出落嬌陽關别千里疊才相見又早别離鄊井背土居恨青􅍡過野橋思今日想去年山迢迢水潺潺黃昏想白日思間針線怕待拈囱間月簷外鐵燈將滅人睡也燈將滅人睡些燈下詞寄與伊陶元亮楚大夫酒紅臉愁白毛桃千樹梅一株間花草臨路開軟履香泥潤髻軃青螺重蜂黃散蝶粉乾王冕風流在留春住春怎留本兒五利五張風入松春風不到小囱紗前日席上泛流霞丫鬟休賣小桃紅劉郎前日到桃源堯民歌靜巉巉煙霞嶺北一箇青雅雅門栽五桞看看的相思成病這的是金山豫章遙山隱隱四換頭清明時候西湖煙岸江湖豪邁衝寒乘騎堪描堪畫因咱間暇違咱嚴假因些間話佳人安在兩葉眉頭從他別後牽腸割肚非咱薄幸繡簾不挂更闌人靜言盟説誓河西六娘子二八誰家小多嬌二八誰家窈窕娘二八誰家女娥媓二八誰家女妖嬈央及梅香好姐姐入門來將奴摟抱在懷兩意相投情挂牽喜的相逢怕的離去了多嬌好情懷懶對菱花整艷粧倚著門兒等他來囑付梅香兩三遭景色春來燕子雙不覺熏風三伏天葉落梧桐又早秋瑞雪飄飄凛冽天錦被斜搭象牙床錦被摺在𬗋帳中錦𬒳無心去整摺錦被斜倚枕頭兒挨天淨沙海棠開退嬌姿滿懷病勢愁煩荼􅐘白雲攢攢跨狂愁值眷殘劣冤家百媚千嬌山林回隔紅塵嬌滴滴體態妖嬈笑談間語話清髙青山一抹殘霞玉容嬌傾國傾城山中採藥歸來房前檜柏屯門小船新酒活魚斜陽數曲漁歌莎禋十里初芳逍遙誰識豫心昨朝楊栁依依年時尚覺平安休言咱是誰非去年花下相逢同雲布滿髙崖近山近水人家岧嶤天近山椒緑楊樹底尋春柴扉土炕茆廬白鶴子金風殘暑退荷衰青蓋偃碧雲催曉意玉簮香滿徑書齋涼風爽寂心無象染欲修千歲夀黃婆心不順先天真一氣欲知鉛汞體紅鉛與白汞方知三教理逹得玄機子和風開桞眼熏風清竹塢金風飄敗葉朔風如箭急步步嬌怕囱間人瞧見幾畨家佯推醉等間來三更至不溫存心兒強書齋外簾前站小鞋兒連根繡天生的嬌娃秀玉天仙臨凡世寂寞深閨人獨自一字思長吁千口氣楊栁枝頭黃昏月戴月披星耽驚怕胡十八正妙年不覺的老來到從退間遇生日客可人景如意試算春九十日人會合不容易人笑余類狂夫自隱居謝塵俗結茆屋近水邊美名兒常在心天生下俏臉兒相會了半霎兒經了些苦折磨又不曽得甚的眼皮兒怕待合才説些好話兒百般的㝎計謀快活年小小船兒棹滄波挑月穿雲入煙蘿納了官糧少差科牛背斜陽短笛歌醉後神昏眼睛花放浪煙花不成家百萬青蚨怨根芽志氣昻昻逞豪家鸚鵡曲儂家鸚鵡洲邉住覺來滿眼青山暮錢塘江上親曽住夢回時不見犀梳長繩短繫虛名住看燕南陌上紅塵張良更姓圯橋住借箸籌滅項興劉逃回辭楚無家住空城組練三千赭肩腰斧登山住記年時雪斷溪橋青衫司馬江州住薄情郎又販茶船才郎于祐咸陽住恨匆匆一片題紅怨賽鴻秋東邊路西邊路南邊路燈也照星也照月也照賓也醉主也醉僕也醉朝燒煉暮燒煉朝暮學燒煉春來時綽然亭香雪梨花會小梁州朱顏緑鬢少年郎玉壷春水浸晴霞憑闌人露冷池塘秋水澄門外髙槐垂嫩黃點破蒼苔墻角瑩寶鼎香殘秋夜深戲撥琵琶囱下聽月照珠簾垂玉鈎小殿昨宵天氣涼酒力禁持頭懶擡著罷殘棋茶一甌獨上髙臺凝望中乾荷葉乾荷葉色蒼蒼乾荷葉映枯蒲根摧折柄欹斜乾荷葉色無多南髙峰北髙峰夜來箇醉顔酡乾荷葉水上浮腳兒尖手兒纎𥘉生月兒初生月兒一似弓𥘉生月兒懸太虛初生月兒一半彎初生月兒明處少初生月兒一似鈎逰四門野塘花落杜鵑啼桞綿飛盡緑絲垂落紅滿地濕胭脂海棠花下月明時前程萬里苦相傳琴書筆硯作生涯賞花時去路崎嶇鳥道分五彩雲開丹鳯樓既悟死生機既奉𬗋泥宣
