曽盻着九十日重相㑹誰承望二三年音信絶恨的是路途賖病症兒添了寒􅉯困騰騰眼腦斜瘦伶仃様勢別酒難吞盞内蛇梦不成枕上蝶思量的智巳竭好恩情都棄撇想當􅀄話語喋到如今成賺啜青哥兒呀好教我難捱難捱長夜這些時㡬曾㡬曾懽悅則俺這萬􅈁愁腸腹内踅阻隔着途路跋渉這江􅀣重疊巫岫雲􅃒梦又随邪恨轉咨嗟每日家挑􅀌燈月影斜空撇下鴛鴦舍浪􅂻来煞怨􅀌眠三月天負一刻千金夜不􅀎勾賺劉晨還到武􅁜者㡬時得㑹面重􅀅心事説我􅀅他如何􅁿赦准俻着唾津兒嚥了那俊酸俫集賢賔􅄐怨怨今畨折開鶯燕友剗的又添上許多愁又沒箇青鸞至通些音問又無箇便鴻㱕􅀉些情由這些時瘦伶仃懶去粧容鬂鬅鬆怕待梳頭悶懨懨㡬畨如中酒好教我難捱昏盡兠的早香閨神思减珊枕梦䰟逰逍遥樂到如今氷絃誰奏鴈歇瑶筝盃空緑酒盻知音何處淹留赤緊的一􅀧芳心無限憂好着我如何禁受每日家香消玉􅂦燈暗銀缸簾控金鈎金菊香往常時朱顔常傲海棠羞今日箇翆黛空攅栁葉愁怨的是鳯去臺空人􅄐乆望㫁青眸包淚眼罷歌㗋醋葫蘆常記得並香肩月底行靠酥胸羅帳宿他和我說私情曽到五更頭他和我共剪青􅁝燃玉肘他和我神前發呪只思量百年偕老永無休么他爲我過瞞着結髪妻生踈了同志友他也曾經年動嵗把心留他與我羙愛幽歡􅂊到手忽的又雲􅃒巫岫生生的驚散了鳯鸞儔么莫不他錯疑我重生了節外枝别尋了心上友既不是却怎生今畨一去不囬頭我這􅂻一片真誠空自守並無那半星兒虚謬誰承望一場恩愛變爲讎么埋怨他俏冤家忒負心謊喬才不應口他􅀅那海神前盟􅊎當胡謅全不想薄倖王魁曾㺯醜􅀅一箇桂英来忘舊這都是痴心女子下塲頭么他非貪我詠雲才我非圗他扳月手則説道他心我意兩相投不料他一例㸔如臨路桞待説他辜恩短夀又不曽相逢㑹話問縁由么他那􅂻棄真情陡㫁别我這􅂻辦堅心寧耐守我怎肯一塲恩愛半途休常言道自古私情天下有不似我因他忒厚則俺這問来人問的話兒羞梧葉兒暗塵了流蘇帳香消了結綵毬懶上晚粧楼人去􅀌幃静愁添兩鬂秋清减了舊凨流􅄐恨比相思更陡后庭芲怕聴的亂鶯聲啼檻栁厮合着衆幽禽鳴院竹越感的薄倖妾芳心碎更那堪㫁腸人雨淚流人問俺病根由多管是因他迱逗藥方兒案上投瘦懨懨何日瘳害的人無了休茶飯又不到口問安書空自修卦錢兒常在手青哥兒呀我這􅂻思前思前想後又添上許多許多僝僽怕的是燈照黄昏恨轉攸到如今酒罄金甌井墜吳鈎月暗西楼聴盡更籌梦㫁莊周事在心頭呌一聲短命才郎淚不収濕透了羅衫䄂浪􅂻来煞他如今雨雲情為我躭我空把芲月軆因他瘦不􅀎勾效鶼鶼比翼再綢繆盻㸔箇人月双圎還配偶將俺那破菱花来重輳那時節把相思一筆盡都勾集賢賔佳遇記當年宴青楼􅀄見影兠的就飛去了俏魂靈只疑是玉天仙空中謪降又猜做羙嫦娥月􅂻相迎猛可􅂻翆屏愇宻轉秋波沒揣的緑紗囱暗惱春情感承他㑹佳期預先芲下等成就了片霎兒前程也不譲人間秦㺯玉天上許飛瓊逍遥樂多管是三生有幸便􅂸下紫錦千機黄金数餅難買真情正相宜手掌兒竒擎多管是標致雙郎正逢着蘇小卿玉簿上婚姻巳定受用足尊前㺯斚芲外聞韶月㡳吹笙仑菊香往常時追歡謝舘可曽經今日箇買咲章䑓慣索行㡬畨家静守幽居深自省天與娉婷剛道喜又還驚醋葫蘆喜呵好姻縁成的未深驚呵歹離别来的最靈都只為阻藍橋如間阻百重城咫尺間地北天南分鳯頸不􅀎勾相偎相並把一塲好恩情分付在短長亭么我為他枕􅁁廂洒了淚痕他為我􅀍窩中勞了些梦境誰承望膠漆的恩愛半途坑㡬回家望㫁􅀌鴻楼外影都只是天髙雲逈閃的箇羙幽歡生做了斷腸聲么想着我朋友上費了些搶白想着他母親行受了些撞挺我也曽霎時間不見便心驚他為我悶守香閨金釧冷赤緊的衾餘枕剰到如今恨如芳草剗還生么我􅀅他並不曽冷氣呵他見我常時把􅉯臉兒迎他也曽画堂春排宴請髙朋􅃪了些一曲新腔音調整助了些詩人髙興俺也曾厭厭夜飲到更深么想着他和明月品着玉簫唱陽春奏着錦筝想着他纎纎素手進瑶觥他也曽酔舞霓裳嬌態逞岀落的十分端正他比那海棠芲睡起更輕盈么曽和他坐幽閨􅀅螺髻盤傍粧䑓􅀅雅鬂整你㸔他緑雲擾擾玉􅁫横誰似他占㫁排塲凨月景若寫入丹青圗幃縦尋得画昭君妙筆画難成么他也曽閗嬌姿芲外逰他也曽叙幽情月底行他和我唱新詞曽把字兒評我與他立盡芲稍明月影遂了這凨流佳慶曽説的楼頭北斗柄兒横梧葉兒今日箇盻仙苑人何在恨巫山梦不成情黙黙巳吞聲他枕冷宵聴漏我屏寒夜掩燈酒醒後月三更何日把新愁􅂯醒集賢賔傷春一聲杜宇落照間􅄫寞又春殘楊桞簾櫳深閉海棠庭院􅀄闌流水飄春色三分芳徑飛殘紅千萬清明過也停画板牡丹瓣芍藥􅀄綻芳心成黯慘春事巳闌珊逍遥樂傷春可慣雪褪氷肌香消玉顔枕剰衾单痩来不似今畨燕子楼空怯暮寒滿目􅄐情無限胭憔粉悴緑减紅消鶯老芲殘金菊香衣鬆了搂􅅁爲愁拴裙掩過腰圍因病攅修眉兩葉弓様彎凨度髙鬟羞對鏡鸞㸔浪来􅂻破黄昏空自焦對着燈不奈煩夜香添低喚小􆁞鬟􅊚縁間阻天意慳喟然長嘆盈盈翆䄂暗偷弹髙平調煞人生今古別􅄐難芳草連天望眼記髙堂􅄐筵衰桞陽關唱道是爲問平安􅀝粧楼数過南飛鴈㡬回驚妾夢千里望君還目送遥山盻㫁㱕鞍青玉琅玕紅淚斑斕快了㱕来鳯幃懶尾攬衣㱕画問回首望銀漢更傳玉漏夜􅀅闌鎖閑庭暮雲天􅂔晚東凨吹散月移芲影上䦨干集賢賔􅀕楊妃人咸道太真妃禁宫中飬出禍胎今日苦痛如血光災折剉盡桃李三春凨物阻隔㫁荔枝千里塵埃太隂星空照昭陽紫㣲宫虚列三台早子不翆䄂舞嫌天地窄􅂯不聴簫韶一派往常時錦雲籠面目争忍這􅃤霧軍屍骸逍遥樂囙甚千戈侵界致使文武專權子為國家重色雖是掌扇齊開都是半凋殘杏臉桃腮少不的侣峨嵋下閤道為甚寵三千粉黛偏你不朝逰南陌盡宴蘭堂夜訪金􅁫上京馬想創業興兵日㡬曽着至尊無奈嘆保駕臨蜀的大元帥好把穩如唐十宰后庭芲霎時間也難􅄐摘梦兒中也無間隔他到那枕頭兒上湏傒落教寡人􅀍兒中越㝎害每日家不􅄐懷可正是心肝兒般惜愛偏然臨虎狼垓忽然間鶯鳯折栁葉兒却死在陳􅀅軍閫外眼睜睜淺土培埋挾權的也不似陳元帥你挾權的煞到把帝王差今畨去㡬時回来梧葉兒青霄外棧道開疑似上蓬莱觀嶺尖髙難到黑龍江深莫測更添巨浪接巔崖也是低淺如俺盟山誓海醋葫蘆俺向碧霞迎着翆靄六丁神􅀅巧安排抵多少立金梯􅀝空十二階更壓着鴈門紫塞一層層子辦着好心兒捱尾早是俺人意堅更合着馬蹄兒耐􅀙嵬坡直下扢蹬蹬的捽􅀅来集賢賔楊妃訴恨似飛花落絮無㝎止凨外趂逰絲聳兩葉眉顰淺黛混千行淚濕凝脂見一團􅀾􅀾兢兢越十分媚媚姿姿一箇可喜娘臉兒可喜到死㸔承得如同草刺巳留身後名猶訴口中詞上京馬心毒害更誰人似恁四下􅂻一齊併我猶自恁早則稱了平生志后庭花一壁廂是怒楊妃的軍政司一壁廂是送楊妃的節度使一壁廂是棄楊妃的唐皇帝一壁廂是怨楊妃的髙力士自尋思這賤人不是送屍骸撇在外料因来􅀕祀金菊香早忘了長生殿夜參差悄悄無人私語時枕邉擔約中甚使鈿盒金􅁫放着證明師么早則耳乾眼浄衆嬌姿早則意㫁㤙絶兩姓子有句話􅂯三嘱付你若得見君王却道俺傳示尾把我生勒死不知為何事若施行了巳後却休教死骨頭上揣與我箇罪名兒集賢賔中秋敞南楼夜深簾半捲㸔雲翳淨遥天人世􅂻秋光􅀅半碧天􅁁􅇠魄􅀄圓共清光萬户千門盻佳期動嵗經年立髙䑓覷天不甚遠分明的桂影髙懸我這裏臨凨歌窈窕把酒對婵姢逍遥樂逢時開宴老子今宵凨流不淺咲聳吟肩伴粗豪酒聖詩賢果是今年勝去年􅀅数曲闌干􅀝遍殷勤問月人既多情月豈無言醋葫蘆盈􅃜在数餘尋常任晦顯一輪兒今夜向尊前聴霓裳羽衣仙韻演大開着廣寒宫殿覔浮槎直犯斗牛􅁁么我咲那謝玄暉吟詠慳􅁃元規局量匾一箇􅀽宏牛渚便回船若嫦娥肯􅀅人可憐許一箇年年来相見又何妨夜夜􅂸遅眠么那洗炎蒸露滿衣快􅁭懷凨一剪恰金神􅀾退了火龍權好良宵秪慿歡咲遣報徹了銅壷銀箭水沉香消盡玉爐􅃄梧葉兒人意滿月光少月明多入事蹇今日箇人月兩團圎玉山倒君休計緑醅空衣􅂯典則管􅂻苦留連問甚麽梧桐影轉后庭花把瓊觴住又傳􅀅瑶席収更展直喫到􅀣梢銀河㵼城頭斗柄偏杯爛熳興陶然猛可􅂻秋聲一片竹蕭蕭曲檻前葉飄飄荒砌􅁁蛩凄凄的語最便鴈呀呀的聲漸逺青竒兒月有意清光普遍人幸得此身康徤人有意時月有縁􅂅的是􅀊􅀊年年人月依然老子痴顛白髪垂肩睥睨青天呼吸長川坐太乙池蓮駕御宼雲軒䄂拂秋􅃄手挾飛仙娑羅􅀣底藥爐􅁁直要見嫦娥面浪来􅂻煞隂晴少定期造化多遷變一年􅂻􅀎有㡬回圎人情暗随天道轉天若是與人方便儘今生常醉月光前集賢賔秋懷􅀾芭蕉数聲秋夜雨正珊枕梦回􅀄盻望殺多情宋玉打􅆈成渴病相如恰傷春媚杏繁桃早悲秋敗桞凋梧一燈兒強􅀅芲穗吐似咲人形影􅀌獨又􅀍這露凉蛩韵巧雲冷鴈聲踈逍遥樂非是把盟言辜負多應是身事牽縈致令的佳期間阻抛撇下紅粉嬌姝自別来消息全無怎􅀎勾蕭娘一􅁓書多應是水底沉魚好教我難捱白晝最怕黄昏㡬遍嗟吁金菊香無奈這逼人富貴太拘束撚􅃌光隂忒迅速一􅀣紅芳替他難做主等閑間减翆消緑却教我感時撫景怎支吾醋葫蘆腌􅧐􅂔怎地消淹煎病何日愈常記得牡丹亭畔共歡娱對蒼天曽把心事許便􅂸着百年完聚今日箇千言萬語総成虚么我也曽絮叨叨講口古實丕丕傾肺腑下了些調凨㺯月死工夫想章䑓是一條直路途􅀍誰攔住莫不是􅊚縁簿上把我姓名除么我和他受􅀌恓有業縁永團圎無分福㫁絃破鏡怎接續枉自求神與問􅁲莫逃夭数料􅀌辰寡宿单照我身軀么我似那鴛鴦怕自飛我似那鸞鶴該並舞由来天性怎生拂我和他乆交歡乍知離別苦百無是處眼睁睁伶俐變糊突梧葉兒相思病何時退睡魔神鎮日侮害的我忒荼毒刁騷了􅀟蓬鬂撲簌的兩淚珠綟山嶺恁﨑嶇隔斷了吹簫伴侣后庭芲這些時捻霜毫懶寫摸理氷絃律吕倦開眼親黄卷怎舒情倒玉壺天􅂔更蕭肅你便是銕石人也躭不去妬黄芲金色鋪泣丹楓血淚枮望空江練一幅對遥山青㡬矗別􅄐懷容易觸別離人生怕覩青哥兒呀自別了凨流凨流人物終湏是有日有日歡娛對付我心腸諒不殊且㸔他俊俏規模香軟肌膚巧妙粧束耍咲喧呼行行歩歩緊随逐謾把流年度浪来􅂻煞杜少􅁜秋興詩歐陽子秋聲賦都對不着我的題目大都来一見他萬事足別無甚憂慮成就了碧􅊝芲下鳯鸞雛集賢賔􅄐􅄐了眼前悶却又在心上有不甫􅀎離了心上又早眉頭忘了依然還又􅁖思量無了無休大都来一寸眉峰怎當他許多顰皺新愁近来接着舊愁厮混了難分新舊舊愁似太行山隠隱新愁似天塹水攸攸逍遥樂曽經消瘦每遍猶閑這畨最陡何處􅁯憂㸔時節獨上粧楼手捲珠簾上玉鈎空目斷山明水秀見蒼烟迷􅀣衰草連天野渡横舟掛金索裙染榴芲睡損胭脂皱紐結丁香掩過芙蓉扣線脫珍珠淚濕香羅䄂楊桞眉顰人比黄芲瘦金菊香早是我只因他去减了凨流不争你􅀉得書来又與我添些證􅀱説来的話兒不應口無語低頭書在手淚凝眸醋葫蘆我這􅂻開時和淚開他那􅂻修時和淚修多管是筆尖兒未寫淚先流􅀉来書淚􅀧兒猶自有我這􅂻新痕把舊痕湮透正是那一重愁翻做了兩重愁么當日向西廂月底潜今日在瓊林宴上􅷸誰承望跳東墻脚歩兒占了鰲頭惜芲心飬成折桂手脂粉叢􅂻包蔵着錦綉􅀙今後晚粧楼改做志公楼梧葉兒這汗衫兒他若是和衣臥便是和我一處宿但粘着些皮肉不信不想我温柔常不􅄐了前後守着他左右緊緊的繫在心頭這襪兒呵拘管他休教胡行亂走后庭芲當日箇五言詩緊趂逐後来因七絃琴成配偶他怎肯冷落了詩中意我子怕生踈了絃上手我湏索有箇縁由他如今功名成就則怕他撇人在腦背後湘江兩岸秋當日娥皇因虞舜愁今日鶯鶯為君瑞憂這九疑山下竹共香羅衫䄂口青哥兒呀都一般啼痕啼痕湮透似這等淚斑淚斑宛然依舊萬古情縁一様愁涕淚澆流怨慕難収對學士丁寧說緣由是必休忘舊醋葫蘆你逐朝野店上宿休將包袱兒做枕頭又子怕油脂膩展汚了恐難酧倘或水浸雨濕休便扭我則怕乾時節熨不開褶皱一樁樁一件件細収留金菊香書封鴈足此時修愔繫人心早晚休長安望来天際頭􅀝遍西楼人不見水空流浪来􅂻煞他那􅂻為我愁我這􅂻因他瘦臨行時啜賺人巧舌頭􅃌㱕期約定九月九不覺的過了小春時􅀱到如今悔教夫婿覔封矦集賢賔曲江池我當􅀄占排塲奪第一串了些芲胡洞錦屏圍我也曾雨雲郷調猱釀狚我也曽凨月􅀁暗約偷期子為我賞芳春梦撒了憭丁因此上向芲營納了降旗想着那老䖍婆狠毒心忒下的小弟子又㑹虚脾到如今寸腸千萬結長嘆兩三回逍遥楽想當􅀄別時容易到如今見後艱難只除是相逢梦􅂻送的我􅀾欽欽忍冷躭飢知他在何處銀筝間玉􅅇抵多少步步相随俺如今只落的半頭斜炕一箇歪瓢兩片破席上京馬也是我一時間錯􅀍那􅀑䰟迷這是俺贍表子平生落的有見識的哥哥每知了就􅂻似這等切切悲悲􅀙今後有金銀多儧下些買粮食梧葉兒這雪賽桞絮漫天墜似蝴蝶撲地飛昏慘慘黒雲垂玉琢就崇山嶺粉填平深澗溪富漢每咲㣲㣲单注着俺窮子弟年災月值醋葫蘆剪鵞毛雪正飛踅羊角凨又悲好教俺説之難思之苦感之深躭之乆冷清清難捱腹中飢這些時頭不梳臉不洗牙不刷口不漱黄懨懨的改了面皮空教人搥着胸攧着脚揉着腮撧着耳呌天呼地也子是為貪芲因好酒愛錢財争閑􅂔死臨侵迤逗的俺怨他誰么酒呵助豪吟詩百篇放踈狂酔一席這酒泛玻璃斟琥珀小槽􅁁深巷􅂻碧澄澄香馥馥的潑春醅你道是釣詩鈎掃愁帚旋添綿增和􅂔暖融融的紅了面皮酌葡萄銀瓮􅂻飲羊羔錦帳底􅀏談一㑹下塲頭只落的臥糟丘喝酵水這的是得便宜翻做了落便宜么色呵歌玉􅀣彩雲低舞霓裳翆䄂垂只因他栁眉踈星眼秀􅀧櫻唇迎杏臉羙甘甘嬌滴滴好東西更有等贍芲街踏陣馬錦􅆞頭金買咲喜孜孜的成了配匹受用些􅀍兒中枕兒上臉兒偎腿兒壓雨雲歡㑹下塲頭只落得守􅀌燈捱長夜這的是得便宜翻做了落便宜么財呵聚青蚨百萬堆列􅃢瑚十数圍端的是物之魁人之膽失之貧得之富最通神的好相識你便待販南商為北客慣經營􅀎集儧把金銀直堆到北斗齊你便賽石崇過郿塢腰􅆞着十萬貫敢誇那豪貴下塲頭只落得披羊皮盖藁薦這的是得便宜翻做了落便宜么氣呵逞粗豪猛力威志冲霄􅂔盖世􅀔昻昻雄糾糾吐紅霓扶天漢仰觀星斗恨雲低你子待伴逰俠同􅁖少學㑹拳打㑹棒争頭鼓腦的㝷對敵你待似北宫􅉳不膚撓不目逃挫一毫若鞭撻的浩然之􅂔下塲頭只落得呌爹爹呼妳妳這的是得便宜翻做了落便宜后庭花老尊君發怒威若嚴霜􅀅草摧險些兒一命臨泉世閃的我􅀌身三不㱕不似你啜人賊你要我􅂯逰斯地我便似落芲枝不戀蕋醃韮菜怎入畦栽不成野薔􅅔護不住出墻葵􅂯難収潑下的水青哥兒送的我似凨前凨前葉墜好恩情㸔承㸔承容易我欲待罵㡬句棄舊迎新浪甚的兠的上我心裏想起俺舊日羙滿夫妻事事相依步步相随素手相携丹臉相偎共枕而栖同卓而食錦帳羅幃綉幙香閨巧画蛾眉揀口而喫換套穿衣你若還有些兒病疾愁的俺似酔如痴么贖藥求醫禱告神祗更􅀍你薄嬷禁持撅丁牙戯相識輕易姨夫妬嫉若瞞兒有些胡為你氤的怒􅁸床兒前超祭燈兒下跪膝投至得歡歡喜喜受多少切切悲悲有時節應官身直盻到黄昏日沉西説来的都做了牙疼誓醋葫蘆乍相逢如梦􅂻誰承望得重會這的是有真情誰怕隔年期雖不似孟母三移􅀅賢聖擬子要我用心學藝我􅀅那三塲的文字慎攻習浪来裏煞深謝你俊嬌姿眷戀心多感你可憎才忠厚徳你要我霎時間身到鳯凰池你要我對金鑾荅策時才似水你要我折蟾宮一枝丹桂那其間跳龍門奪得箇状元回集賢賔喬㫁􅀑掛秋空半彎斜月影雲􅂔濕露華清子聴的嚮踈刺堦前落葉遥望着昏此藍囱内􅀌燈恰随着旋凨兒走遍了後巷前街又􅀍那􅁖犬兒驚入我古廟閑庭猛見箇碑亭似大漢諕的我打了箇意挣我子見􅀅髭鬚把鳯目圓睁正面上紅􅂁懸玉帶傍壁廂赤兎掛鑾鈴上京馬我這􅂻躬身施禮吿神明叩首在堦前側耳聴却不到報應􅀹疾靈聖境怎生的悄悄㝠㝠却原来關菩薩也是木雕成梧葉兒我恰􅂊七林林来中院可察察到外􅈦悄促促入的門丞猛見他惡狠狠髙聲呌我這􅂻静巉巉側耳聴不由我可丕丕早心驚原来是五逆子十分太逞醋葫蘆見他一㑹家軟厮禁一㑹家硬厮挺􅂔的他白頭老母淚盈盈你便是傍人見了也怒不平􅂔填住􅍋頸拶着我這瘦拳頭待打那賴人精么我向那牀兒前躡􅁕行囱兒下潜着影忽明忽暗㺯着􅀌燈我這􅂻颼颼的哨着他􅂊自醒到罵做亡魂夭命他那􅂻丕丕的連噀了兩三聲金菊香我便是去年間送画的酸丁子你圗賴欺人沒箇信行我為那翎毛六幅成了病證送的来悄悄㝠㝠因此上一靈兒㝷你要見箇分明醋葫蘆你做的􅑯世情剗地要懴罪名你道是修齋累七念蓮􅀴這都是和尚每要了錢揑合成若是那隂司􅂻全無報應似那等有錢的都得享遐齡么我這􅂻向前来扯了他一扯他那􅂻退後去蹬了我兩蹬我見他摩挲着桃棍在手中擎他道是隂魂共陽人難閗争􅀅着箇張天師的画幀子􅀍他牀頭間鏡兒照出我醜身形么他又賴是俺􅀑擘口他又賴是俺􅀑捻青改不了他瞞心昧巳賴人精我欲待􅂯入房中魘他會梦境走到他房門前立㝎子􅀍他撒一條􅁅道兒擋住我隂靈后庭芲這冤家何日明這屈􅂔何日平子為那古画些湏物送的我荒墳一命傾想起呵忒留情為書画忔成病誦着書口不寍觀着画手不停愛書似愛眼睛惜画似惜性命青哥兒誰料這一塲不幸到翻成惹事災星兀的是運落在凨波梦也驚見如今来往隂陵岀入幽㝠魂不曾停魄不曾寍恰便似搯了頭亂撞胡飛的屎蒼蠅抵多少􅄫㓕禅心静浪米􅂻煞欲待要尋一箇出生路跳出那枉死城只除是􅀅他那五逆不孝的罪名稱是實情怕甚麽無對證直請的判官来察聴我務要雪了冤報了恨恰心平集賢賔金安壽得仙黄梅細絲江上雨碧沼内翆荷舒受用的是瑪瑙盤蔗漿酪粉􅃢瑚枕籐簟紗㡡􅁰新包褁黄金蒲細剉分白玉詠離騷歌楚些誰吊古奪金標櫂画將似飛鳬繫同心長命􅈁佩端節赤靈符逍遥楽蘭湯試浴納水閤㣲凉避凨亭倦午乗竹隂槐影桐踈疊水山素羽青奴剪彩仙人懸艾虎開南軒竒峰雲布􅀲開金子膾切銀􅁝茶烹瓊􅃾春閨怨夫貴妻榮多来大福画堂羅列錦糢糊妻財子祿前生注是有餘羙滿歡娛配鳯友對鸞雏鴈兒落賦新詩詠樂府歌古調逹音律是一朶沒褒弹嬌柔觧語芲是一塊無瑕玷温潤生香玉得勝令簾低簌碧􅞩鬚沉細􅋹紫金爐霜瓦宻鴛鴦甃雪軒髙翡翆鋪俺同坐着香車似地長就連枝􅀣雙並着驊駒如膠粘成比目魚賢聖吉􅈁金成玉􅇠鶻七寳嵌紫珊瑚墨錠也似髭髥撚絨䋲打着鬂鬚皂紗巾珠珞簌錦襖子金較輅芲灘比玉不如雲根靴懸抹緑面銀盆膩粉團酥河西后庭芲翠娉婷衡不俗羙蝉蜎嬌艶姝似對月嫦娥現如臨溪仙洛浦么他芙呵似秋蓮恰半吐他悲呵如梨芲春帶雨行動呵似新鴈雲􅁁落説話呵如雏鶯枝上語他酔呵似晚凨前垂桞翆扶踈他浴出呵如海棠般擎露他立呵似丹青仕女圗他坐呵如觀音自在居他睡呵羊脂般臥着羙玉他弹呵拂氷絃斷復續他歌呵白苧宛意有餘他舞呵彩雲旋掌上珠双鴈兒團衫纓絡綴珍珠綉包髻鸂䳵符翆鳯鸞翹内粧束玉搔頭掩鬂梳喜相逢蝉對舞望逺行叵耐這無端的鉄拐使機謀不知怎用些道術􅀅俺那小姐迷惑来去赴玄都扯砕俺􅊚縁簿忽刺八掘㫁俺前程路空沒亂搥􅇩跌足揉腮倦語􅀅一朶並頭蓮磣可可兩下分生折散鶯燕􅀌擊玎璫摔砕連環玉梧葉兒據情理難容恕論􅀁為忒狠毒忍不住怒氣奮胸脯一隻手楸着執袋一隻手揝住道服兩隻手緊揪摔咱向那明鏡也似官司吿去賀聖朝陡澗髙山嶮峻﨑嶇教我手慌脚亂無是處流水横橋眼暈心虚蟠巨蟒老􅀣枯滲猿精猛虎伏躱避在林莾掩映我身軀鳯鵉吟聴的􅀅金安夀名字呼我這􅂻低首拜伏這塔兒雲水山林是沒去處是蓬瀛玉宇得仙居洞府食仙桃飲瓊􅄴甘露朱頂鶴献果猿綠毛􅀛啣芲鹿夀長生玉􅂐丹書牡丹春嬰兒姹女趣黄芽白雪枯􅀍金枷玉鎻緊相拘􅀅心猿意馬牢拴住雖然得省悟回首認當􅀄凉亭楽迅速光隂過􅂩駒恰一夢華胥烏飛􅇠走緊相逐晝夜催寒暑我本来有仙凨道骨争如我鼍鼓笛兒者刺骨歌鸚鵡舞鷓鴣小梁州恰􅂊東凨匹有盡喧呼堆紅紫翆錦糢糊又早碧池緑水映芙蕖菡蓞暑又是楓葉曉霜鋪么正蛩音清露滋黄菊便怎生水晶寒氷雪瑩壷暗􅂻􅀅流年度早則慢傳籌筯蔵䦰令悅浮屠尾聲我這􅂻拜辭了翆裙紅䄂簇朱唇皓齒扶夢回時明月生南浦向無為深處步瑶池閬苑到蓬壷集賢賔中秋太平年四季多羙景今夕景偏清正遇着中秋佳節普天下民庻歡騰感吾皇一視同仁撫華夷四方無警文共武濟蹌蹌欽仰皇綱正齊都道此身何幸逢時須快樂讃頌賀朝廷南喜語桐金凨送晚凉浮雲淨一色晴空須更飛上黄金鏡散清光晃􅃞琉璃千萬頃桂􅀣影婆娑香清露冷駕鳯飛鸞環珮聲相應擁群仙来㑹清虚境址梧葉兒迭奏雲和笛􅀟吹紫玉笙妙舞更娉婷金􅊴三千界瑶䑓十二層凨露􅄫無聲真箇是良辰羙景南山坡裏羊金水平分秋令皓彩十分光瑩霞杯滿泛金波輝映夜氣清銅壷簡屡更瓊楼玉宇闌干凭髙捲水晶簾清興又增怡情雲影和月影堪聴簫聲雜鳯聲北賀聖朝月到中天萬􅀦同明倒浸着山河影桂􅅎􅀌凝只見那玉兎銀蟾顧影頻驚寳􅂦内香焚金杯滿傾遏行雲齊唱着新歌共樂㫒平南水紅花良時何幸際昇平㑹蓬瀛人人歡慶那凨月兩同心永安寍家家相慶且喜的凨調雨順更遇着嵗稔年豊福慶似雲烝北滿堂春樂昇平也波樂㫒平也波平玉燭調和海波澄也波澄景星宵見慶雲興也波興醴泉盈嘉禾盛甘露零人人共仰萬福萃佳禎南一封書䖍誠感聖明廣仁心行徳政振綱常法度整重官寮育俊英鑿井耕田民樂業連野桒麻户不扃滿門闉管絃聲皡皥熈熈喜氣臻北金菊香北醋葫蘆德凨逺􅀍萬方遵四海蠻夷総效誠仰神京至心齊引領㑹梯航輻輳来庭貢方物敵竒珍䭾䭾擎髙寳瓶金獅簇絳纓更稀竒白象雪毫明紋􅙈間翆翎向丹墀齊擺定陳詞拜舞表􅂨情南梧葉兒四夷賔􅁁方定征鼔無聲閑􅀅閫烽烟不舉塵埃静見這商旅通行任􅀴營那更閭閻雞犬聲相應正是華夷一統咸遵號令北村􅂻迓鼓正今日􅅯武修文因此上民皆興行盡忠立孝行慈