front:
  text: 雍熈樂府卷之一
  hash: sha256:0673b4f6e43d871ce0604ce0c922d47fbef8f51fb994796793b616e6b1faacf8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_001-1a}
body:
  text: 黃鍾宫醉花隂燈詞􅀦祚風和太平了是䖏産靈芝瑞草聖天子美臣僚法正官清百姓每都安樂喜佳節值元宵點萬盞花燈直到曉南􅀞眉序花燈兒巧粧描萬朶金蓮綻池沼任銅壷絶漏禁鼔停􅃻庭内外香靄齊焚樓上下燈光相照楚腰羅綺叢中俏人在洞天蓬島北喜遷鶯似神仙般歡樂聴梨園一派笙簫青霄月離海嶠恰便似寳鑑髙懸銀漢遥明皎皎月色和燈光相射燈光和月色相交南盡眉序街市喜通宵仕女逰人閗施巧剪春蛾雲鬂寳􅁫䡖挑紅袖底􅀟握春纎花燈下相㸔花貌楚腰羅綺叢中俏人在洞天蓬島北出隊子仙境内雖然難到便怎生強如喒塵世好水晶簾低簌􅀞堂標玳瑁筵寛鋪庭院小琉璃盞齊燒燈熖髙南神杖兒元宵景好喜慶皇朝逰人閙炒轉燈兒鞋燈兒齊挑繡毬燈團團皎皎綵繩髙吊錦帶似彩雲飄絳蠟似曉霞燒北刮地風習習天風香霧繞則聴的社火鑊鐸街衢上迓鼔偏聒噪動的来聲髙喬三教喜動清樂醉八仙快跚髙橇這壁廂那壁廂同飲香醪笙和笛間􅂵簫箏和􅌙合着檀槽繡簾下美女多竒妙他每唱陽春按六么南耍􅇹老一派歌聲動天表唱的是直恁好孔雀屏開映徹鮫綃玉斚金樽閗相招儘教他天漸暁儘教他天漸曉北四門子彩雲間斗柄斜傾了霽一天星月皎酒令兒行籌筯兒交絳綃樓痛飲添快樂鳳髄又烹獸炭又燒把肥羊来旋燎南􅀟閗雞兩行金􅁫最宜素縞麝蘭香縹緲㣲露着金蓮小凭欄凝眺㸔街前舞鮑老北古水仙子我我我自暗約是是是曽見説當年元夜好因漢武帝朝中召東方朔言道海中央有巨鰲他他他現時節五榖豐饒麟甲内有光冲碧霄若天官喜恱民安樂後来因此上賞元宵尾聲人生百􅀊須還老切莫悋追歡求咲但願年年慶此宵醉花隂賞雪寳殿珠樓玉花糝萬里同雲一覽遍世界滿山巖栁絮風攙似織就鵞毛毯喜遷鶯莫不是􅀾退玉龍酣萬萬片銀鱗滿翠嵐􅀅這禎祥推勘太平時瑞應宜堪須參臘前白喜見三聴四境歡聲民庶談􅀅天地感盡都道豐年有象飽暖先諳出隊子雕欄寳檻列華筵樂事躭見滿空鵠鶴翅相參撲萬隊蝴蝶粉亂糝凍千里銀河氷細􅥵刮地風有一派仙音供奉着喒列兩行珠􅂂瓊簮􅂵金盃到手休辭暫果擗黄柑乗醉想梅花􅀅􅊥遣興把霜毫頻蘸酒半酣詞一函喚紅兒雅歌清唱衣披着黒貂裘酒注在白玉壜列珍羞􅂵蠏紅蚶四門子颭蒼松翠竹風揺撼積瓊瑶映舞衫㸔亭臺逺近銀粧嵌哨紗囱似食葉蚕鎻翠峯凍碧潭遍乾坤萬里雲霧緘詩句清酒味甘直喫的醉醺醺紅􅃒緑揜古水仙子想少年忒是憨向郊原正宜􅀅圍獵貪㸔俊鶻擊鴽鵞在白茫茫雪湖中曾渰凍剥剥的􅂂頑氷馬脫了轡啣撲鼕鼕的鞭鼓兒波面上聲含咲呷呷得雋的喜氣都自擔明滴溜的金頭玉頸鵞盈擔響璫璫的鞭􅃻着金鐙􅀱回驂尾聲到今日老後心中樂恬澹遇冬寒賞雪在梅菴相伴着酒社詩壇受用煞俺醉花隂燈夕錦繡花燈半空挑綵結成鰲山最髙十五夜賞元宵百姓􅀅滿斗香燒􅀅萬萬載皇恩報感天地好田苗五榖􅀵成都完備了喜遷鶯先動起簫韶音樂韻悠悠音吕和調聲嬌都是這太平曲調南北腔黄鍾句句標真箇是好㸔了這鰲山勝景端的是巧筆難描出隊子則見那紅光顯耀似祥雲􅇁碧霄則見那花燈兒不離了這一週遭更有那滚燈兒鰲山前後繞恰便似萬萬朶金蓮開放了刮地風玉􅇠金烏日月髙呀普天下萬􅀦来朝有西池王母祥雲􅇁綵雲間瑞靄飄颻上面有七真傳道更有那八仙請教有金童和玉女捧着仙桃更有那長夀仙世不老引着那虎鹿猿鶴髙髙的展開㸔經教寫着那賀豊年萬萬朝四門子有千般隊舞安排了有八蠻来進寳率領般簇獻錦􅂁有玲瓏玉帶寳嵌着獻象牙白水犀牛角玻璃瓶􅃢瑚瑪瑙古水仙子鼕鼕鼕􅀞鼓􅃻響璫璫鑼聲相襯着見見見傀儡兒齊来一箇箇手擎着珍寳出出出繞週圍轉㡬􅇜他他他端的是難􅀞難描是是是院本做一叚喬教學賀賀賀一齊的舞起村田樂慶慶慶慶佳節賞元肖尾聲萬盞花燈太平了賀當今四海来朝普天下快活直到老醉花隂美遇日永簾櫳􅂐烟靄簇絳紗葵榴閗色聴蟬噪緑隂槐出水荷開亭臺下雕欄側喜遷鶯粉汗滴香腮嬌滳滳玉臉溶溶紅映白忒丰姿體態綠雲堆上揷金􅁫偏歪那妖嬈殢色堪可上金粧七寳臺美俊㢤嫦娥臨凡世仙子離天台出隊子一輪蟾魄出扶桑離大海強臨寳鑑對鸞臺重貼花鈿揷玉􅁫再理胭脂匀粉腮么篇繫合歡鴛帶掛玲瓏玉項牌湘裙微露鳳頭鞋玉膩氷肌香滿懐雲鬂堆雅挿鳳釵刮地風出繡户凌波踏緑苔等􅀱多才趂着那晚風凉潜向欄杆待緑隂庭槐則聴的忒楞楞宿鳥兒驚林外猛可裏忔攴攴小角門兒開咲臉迎禮樂施對天設願香諧接住秀才玉肩相挨四門子到香閨施禮深深拜咲吟吟喜滿腮今宵喜遇乘鸞客五百年縁分該􅀅金扣兒鬆繡帶兒解濕酥􅅐膩香光瑩白錦帳裏歡翠􅀍中挨不覺的春生滿懐古水仙子香羅上紅點帛端的是可可喜喜嬌嫩色㸔了他丰丰韻韻堪人愛真箇似一朶牡丹花妖妖艶艶珠露滴開美姿姿好是竒㢤汗淋淋玉纎向粉臉上揩意匆匆不覺渾身態亂鬅鬆雲髻歪賽兒令陽臺陽臺楚巫娥今夜和諧似採藥的劉晨到天台越㸔紅白春意美還在神㐲兒又早是雲􅀵雨開也不肯鸞分鳳拆恰褪了蝶粉蜂黄常則要鶯随燕来似􅀟蒂蓮並排連理枝相挨合歡帶休解琴瑟永和諧掛金索海誓山盟休要把人禁害美滿情懐常則是一􅀧真心在殢雨􅀹雲常常的􅀉在心懐休把心腸半路揣尾聲忽的星稀月沉海悄聲兒嘱付多才􅀅你那俊俏的心腸莫更改醉花隂趕蘓卿雪浪銀濤大江逈舉目玻璃萬頃天際水雲平浩浩澄澄越感的人孤另一葉片㠶䡖只趕到金山可怎生不見影喜遷鶯見樓臺掩映接雲霄金璧重重那􅀎上方幽徑我則見那寳殿玲瓏􅂵氣生真勝境驀聴的幽香縹緲則不見可意的娉婷出隊子心中傒倖意癡癡愁轉増猛然見楚王宫得悟的老禪僧何䖏也金斗郡無心的蘓小卿那裏也臨川縣的多情的􅀟縣令刮地風抄手躬身􅀅禮數迎請禪僧細説叮嚀他道有一箇女裙􅁫寺裏閑踢蹬他生的嬝嬝婷婷不住的雨淚盈盈愁切切有如癡掙悶懨懨即漸成病拈霜毫回廊下壁上標名我可便猛回頭恰定睛正是俺可意的多情四門子狠毒娘應接了馮魁定他道揣與我箇惡罪名真心兒守實意兒等恰便似竹林寺有影不見形真心兒守實意兒等我可便和誰折證古水仙子覷絶罷兩淚傾恰便似九江水如何洗得清當􅀄指鴈為􅅅似充飢􅀞餅道無情却有情我我我暗暗的仔細評論俏蘓卿摔碎了粉面箏村馮魁硬對上菱花鏡蘓婆婆無前程者刺古占天邉月共星同坐同行對神前説誓盟言死言生香焚寳􅂦酒斟在玉觥越感的人孤另分開燕鶯神仗兒喚稍公忙荅應休得要意掙㡬曽道半點兒消停直趕到豫章城節節髙碧天雲霽翠波風㝎銀蟾皎潔猛然見多情薄倖俺兩箇附耳言低頭語携手行下水舡如何見影尾聲説與你箇馮魁耐心兒聴俺兩箇喜孜孜俏語低聲我教你藍橋下細㝷思謾謾等醉花隂美􅁎玉臉横秋淡眉掃傾􅀦傾城相貌堆雲鬂鳳􅁫挑身分兒苗條淺淡粧天然俏美甘甘異香飄性格兒柔情意兒好喜遷鶯更那堪風流年少正當時二八多嬌難描萬般竒妙恰便似月裏嫦娥離碧霄天性巧嬝婷婷千般旖旎嬌滴滴萬種妖嬈出隊子若論着聰明俊俏通禪機􅀅詩謎包裁氷剪雪辨低髙擊玉􅃻金不做作闊論髙談諸事曉刮地風體態䡖盈貫世少喜孜孜咲撚鮫綃更那堪閉月羞花貌檀口似櫻桃玉纎嫩一似葱稍金蓮小欵歩輕蹺踐香塵不由人心痒難揉自相逢猛見了不由人魄散魂消瘦香肌嬝嬝婷婷妙端的有丹青怎􅀞描四門子本是箇美玉無瑕寳怎不教聲價髙粉臉又匀蘭麝又飄挽鳥雲鬂鬆金鳳翹錦營中寵花陣内嬌但行䖏香雲亂遶古水仙子我我我猛見了引引引魂飛在九霄他他他模様兒風流敢敢敢諸般兒俏倬騰騰騰邁蘭堂入􅀞閣欵欵的􅀅檀板䡖􅃻䡖盈舞徹楊栁腰他他他通音吕善曉諸宫調俺俺俺􅂸沉醉樂醄醄尾聲休􅀒了青春正年少美甘甘玉軟香嬌趂着這好光景莫教虚度了醉花隂秋景玉宇金風送殘署半霎兒輕雲細雨秋意滿庭除􅃢枕紗㡡頓覺凉如許喜遷鶯欲試綉羅􅃭喚小玉􅅡龍涎薰翠縷睡紅生玉映菱花秋水芙蕖粧梳點蘭膏匀鳳酥百寳光涵絡臂珠整珮琚歩雲堦縹緲對秋景歡娛出隊子綠窓朱户㺯新晴曉日􅀄合歡床鋪苫翠􅉊毺連珠幄纓聮珠珞簌一似蓬島仙家碧玉壷么篇園林景物寫秋光作盡圖芙蓉傍水錦千株丹桂迎風香萬斛掩映着楊栁梧桐深宻䖏么篇􅂵􅅔香露染霞綃攅細粟鳳仙開九苞秋暖錦毛舒玉簮綻六出花含檀韻吐又早見亂撒金錢籬下菊么篇淡烟濃霧㸔山光乍有無吚啞啞賔鴻出塞逺相呼啾唧唧社燕辭巢嬌對語滴溜溜紅葉兒随風零亂舞刮地風一弄兒秋聲不㫁續真乃是萬􅄜笙竽一年好景休虚􅀒漸㸔那栁敗荷枯􅀞屏般碧雲紅􅀣錦機似綵鴛白鷺爽氣浮日影踈送長天落霞孤鶩掃纎塵淨太虚見氷輪飛出雲衢剔團圞碾破銀河路放寒光照九區四門子上南樓似入清虚府捲珠簾遥望舒列玳筵倒玉壷簫聲似綵鸞雙鳳雛丫鬟擁嬌艶姝擺列着清歌妙舞古水仙子浥金波泛醁醑直喫到斗柄横斜桂影踈􅀞燭髙燒玉山低趄􅂸着箇沉醉花前紅袖扶問嫦娥今夜何如願天長地乆為眷属這的是人間天上團圞䖏盡今生歡愛永無虞寨兒令煞強如煞強如廣寒宫一世幽居常則是舞罷霓裳鏡鸞孤􅃢枕剰翠衾餘空自把青春悞掛金索光燦燦燈月交輝素魄流香霧嬌滴滴粉黛成行清影涵瓊􅀣立停停羅襪生凉疑是淩波歩舞飄飄霜袂乗風恍然飛仙去尾聲不覺凉生桂花露猶兀自醉眼糢糊共􅀝着玉欄十二曲醉花隂思憶雪月風花共裁剪雲雨夢香嬌玉軟花正發月􅀄圓雪壓風顛正比人天涯逺欲􅀉㫁腸篇爭奈這無邉岸相思好教我難運轉喜遷鶯指滄溟為硯管城毫徤筆如椽松烟􅀅太行山做墨研把萬里青天為錦箋都做了草聖傳我欲待要書書不盡心事一㑹家訴訴不盡􅆈􅋩出隊子記當􅀄相見見俺那風流的小業冤兩心中便結死生縁一載間渾如膠􅃮堅誰承望半路裏翻騰做離恨天么篇二三朝不見渾如隔了十數年無一頓茶飯不縈牽無一刻光隂不悵念無一箇更兒裏􅀅他不夢見刮地風無一箇来人行不問遍害的我有似風顛相識每見了重還勸不由人不掛牽思量的眼前活現作念的口中粘涎􅁭領前䄂口邉淚㾗湮遍想􅀙前語在先那時節他嬌小我當年論聰明貫世何曽見他敢真誠䖏有萬千四門子扵咱家為他心無倦氣相和情綣戀俺也曽坐並􅂰語並肩俺也曽芟荷香效他交頸鴛俺也曽把手兒行共枕兒眠哎天也是我縁薄分淺水仙子非干是我自專直覔得鸞膠續㫁絃記枕上盟言念神前心愿我心堅石也穿暗暗的禱告青天若咱家少他前世􅁈俏􅁈家不􅁛今生願俺俺俺俺那世裏再團圓尾聲嘱付你衷腸莫更變再相逢不知是動􅀊經年則要你身去逺莫教心去逺醉花隂慕戀春困書齋夢魂擾誰似俺今畨這遭相思病怎生熬竹影頻揺越感的傷懐抱心間事對誰學似這般無打筭凄凉何日了喜遷鶯想着俺多情容貌一團兒玉軟香嬌難描萬般竒妙想着俺倒鳳顛鸞那一宵指望待同諧到老不思量火燒了祅廟誰承望水渰了藍橋刮地風鐵馬兒在簷前不住摇引的人心痒難揉金風淅淅添煩惱怎禁那砧杵頻􅃻夢㫁魂勞閙啾啾蟬鳴栁稍絮叨叨蟲砌磚竅這壁廂那壁廂咭聒聒魄散魂消想起俺離情的女艶嬌