front:
  text: 雍熙樂府卷之四
  hash: sha256:a33a43e730b59f32b7be0971fef446abe0ce2f1e27764a83306cc5ce148b91df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_004-1a}
body:
  text: 仙吕宫點絳唇洪武天開聖恩寬大民安泰新造樓臺髙接雲霄外混江龍諸般兒堪愛畫簷前箇立招牌樓名兒御筆頒賜酒旗兒官降安排盡都是四海八方來逺客萬州千縣會英才廣有百味珍饈賣朝朝歡樂日日和諧油葫蘆醉仙樓每日神仙來畫彩梅妍樓粧點得最竒哉淡粉樓粉淡了多人買翠栁樓栁翠隨凨擺謳歌樓歌慢酒細釅樂民樓端的民安泰則見那人攘攘閙垓垓天下樂上的鼓腹樓中且放懷酒量兒寬似海更有那集賢樓多俊才鶴鳴樓驚九天輕煙樓雲裡埋便似空中降下來那吒令有那夥女色擺列著對排有那夥女色穿羅鞋繡鞋有那夥女色插金叉玉叉端的是栁葉眉芙蓉額杏臉桃臉鵲踏枝這樓上勝蓬菜賽陽臺有酒凨流有色和諧這兩般兒千金盡難買想青春不再回來寄生草端的是心裡快喜滿腮唱的舞的多嬌態吹的彈的堪人愛來的去的如車載便將我家私賣了待何如金銀使盡了無妨礙尾聲雙眼醉糢糊行出樓臺外正遇著多情捻色俺和他曽赴天台他道是前度劉郎今又來則見他精彩迎腮將人來錯愛倩人兒扶䇿過花街點絳唇春景花信風微燕泥雨霽韶光麗暖日遲遲醖釀出逰春意混江龍艷陽天氣遍園林無處不芳菲栁條裊娜杏錦離披翠草和煙雛燕語碧桃凝露彩鸞棲芍藥粉鉛華淺試海棠絲絳蠟低垂翠檻暖香舍豆􅞦畫闌暗雪噴荼䕷小徑嵌金錢石竹矮屏攢錦帶玫瑰花撲撲一片錦糢糊暖融融三月春光媚芳塵滚滚香霧霏霏油葫蘆四十里紅香錦繡圍風日美香車寶馬趂晴暉雕輪輕碾莎茵細玉鞭亂拂楊花墜恰轉過甃花磚萬字階早來到步金沙九曲堤立東風似覺非人世却疑是乘彩鳳下瑶池天下樂十二樓臺擁翠微髙低簾半垂一處處啓紗窗列銀屏錦繡幃花香度閗草亭栁隂籠拾翠溪有丹青難下筆那吒令蝴蝶兒對飛過葡萄架西逰蜂兒競起落薔薇徑裡黃鶯兒亂啼在櫻桃樹底鴛鴦戲緑水濵鸚鵡語金籠內一聲聲似殢嬌癡鵲踏枝錦香堆翠紅圍才過了元夜花朝又早是禁煙寒食看如此風光景致儘逰人樂意忘歸寄生草泛曲水蘭舟漾簇香風彩仗移錦標收看罷鞦韆戲翆鬟迎齊奏笙歌沸玳筵開準僃鸞凰配夜長拚向月中歸春深莫惜花前醉么小隊按霓裳舞新腔歌金縷低隨花傍栁春明媚調絲品竹仙音沸烹龍炮鳳珍饈僃瑶臺飛下玉天仙蓬壷幻出風流地后庭花酒痕香手帕兒濕花枝重䯼髻兒低酒醉後情偏熱花深處眼欲迷覷吳姬風流佳麗粉酥胸白雪肌黛煙描新月眉寶叉橫雲鬢堆栁腰纎玉一圍啓朱唇皓齒齊蕩湘裙蓮步遲青歌兒呀嬌靨笑秋波秋波生媚安排著雨雲雨雲情意翆袖香溫手共携畫閣蘭閨繡枕羅幃琴瑟相宜鸞鳳于飛是一對美滿好夫妻風流配賺尾賞花時尋芳意問甚費千金一刻縱有逰絲百尺飛碧天邊難繫春暉到明日緑暗紅稀不忍聽空林呌的子規常則是𬒳流鶯喚起更做到殢紅粧不睡大古是惜花人愛月夜眠遲點絳唇麗情天霽雲開月華精彩南樓外行過庭階我潛立在湖山側混江龍今夜箇百無方礙洗乾坤風露淨塵埃冷清清風搖翆竹白零零露滴蒼苔風力緊寒侵金縷衣露華涼氷透繡羅鞋輕移蓮步慢轉雕欄簾篩月影燈晃書齋又不敢呼名道姓我則索躡足潛蹤悄聲兒獨立在窗兒外想著俺懷兒中受用怕甚麼臉兒上搶白油葫蘆我著這瘦聳聳香肩將門扇兒挨你試猜止不過月明千里故人來則我這後園中晚謁文章伯你不肯秦樓夜訪金叉客外面兒模樣好就里最為事歹我不比你窮酸般胡諞教均怪不放參緊閉定看書齋天下樂却做了十謁朱門九不開書齋好幽哉不曾有俗客來將幃屏幾扇兒窗下擺戀蝴蝶床榻兒窄夢梅花𥿄帳兒矮秀才呵你正是成人好不自在村里迓古你休教一時風火燒了咱百年恩愛則為你衾寒枕冷咱厮敬重一家無外你這般假古􅞕微身子粧些台孩可知道死了杜甫亡了韓愈淹殺李白你可甚賢賢易色元和令便有那曺子建七步才還不了龎居士一分債他那般氣昻昻胸次捲江淮你可是酒腸寬似海則想我夜深私出繡房來實丕丕擔著利害上馬嬌一來是天地差二來是緣分該則你箇楚宋玉自裁劃待將這無出路巫娥推出門外我為甚麼來干教我空下楚陽臺逰四門却正是蒺藜沙上野花開可不道疑是玉人來則為你冷清清難把長更捱砌下亂蛩哀咍我特地探多才勝葫蘆休著我倚㝎門兒手托腮休將那不覩事的話兒揣小的們天生酒量窄道的我速速眼跳氲氲的耳熱忽忽的燎雙腮么篇你見我兩朵桃花上臉來則怕你悔後也棟梁材哎你箇秉燭顔淵自鑑戒兀的般月斜風細更闌人靜天地安排后庭花保親的論孟白主婚的唐漢䇿送女的霜毫筆守親的是硯臺你既怕女裙叉無心相待枉將伊厮定害王子髙不好色周瓊姬忒分外卓文君是不諧栁葉兒哎你箇漢相如休怪則要你溫我的浸冷羅鞋干教我羞答答懶把門程邁哎你箇梁山伯不采我這祝英臺羞的我怏怏兒回來寄生草你則怕擔煩惱惹罪責為姪兒恐怕尊姑怪書生不好隂人愛莫不你一家兒受了康禪戒量這箇彩雲喫打有何羞尚猶似文玉下馬將荆條拜尾聲得了手有情分的斷腸詞自惹下場無氣路相思債這一箇小書舍裏天寬地窄也不索對天地説山盟言海誓咱則是常川似今夜和諧緊栽排怎肯教信斷音乖則要你常準僃迎風户半開來日箇一更左側我則要倒倚門兒等待我等的夫人燒罷夜香來點絳唇嘲鹽啇聖人道良賈深藏􅌂然人望都是些虛謙讓全不學尊重安詳出來的豪氣有三千丈混江龍一箇箇做模打樣豈不聞有麝自然香矜驕傲慢聲勢虛張通中不到一千三百引嚮畨了二十九鹽場父親是尚書舅舅毋親是少保姨娘動不動結交官長來不來送酒牽羊去不去鳴鑼擊鼓行不行號帶旗鎗南門李運司張謁舅劉探新王尋幾箇歪皂隸立在店門前覔幾箇假軍牢擺在船頭上聽不得撇虛搗抗覷不得詭詐輕狂油葫蘆借了支頭不下場每日家沒事忙花錢酒債少下尋常狂朋怪友頻來望風姨月姊間飄蕩今日殺箇豬明日宰箇羊到晚偎紅倚翠在銷金帳抵多少窮漢半年糧天下樂擺列著金叉十二行怕不待風光滿畫堂飛觥走斚開宴賞怎不教人心下思腹內想最難熬壷中日月長那吒令黑􅃮匣退光紗羅衣滿箱白綾𬒳噴香玉磚階錦粧茜紅氊苫床美人圖滿房到晚來著處偎白日裡沿門串毋拘束放蕩行藏鵲踏枝這壁廂飲瓊漿那壁廂列壺觴李四家者也之乎張三家説短論長帶兩箇虛措腳幫間的伴當穿兩件不著體怪色衣裳寄生草棋盤領三寸闊弓袋袖四尺長戴一頂窄􅉉髙頂京時樣披一件揪頭刺褶新時樣穿一雙捲尖疊腦興齋樣粗絲絛勒在胯骨邊細包巾褁在額顱上么篇栁條掙的門牙亮阿膠掠的水鬢光他道是一人自有一生相那裡有年頭支過年稍帳却原來羊毛出在羊身上虛飄飄使幾貫鄧通錢實丕丕捱幾頓伯俞杖尾聲路引在李家收鹽引在蕭家放倉鈔在陳家當著處里撇白調謊酒友詩朋劈面搶到人前手腳慌張檢空囊賣盡了衣裳怎得間錢雇小郎虛飄飄鎖兩箇籠箱絮叨叨寫幾行支帳只㺯得嘹叮盂撒不還鄉點絳唇贈麗人嬌艷名娃年方二八風流煞所事撑逹引的人牽挂混江龍茅庵草厦嬌滴滴一朵海棠花言談俊雅音律熟滑千葉內生成紅菡蓞九蓮中活現的小菩薩心靈變勝似亞仙名性聰明不在蘇卿下良金足色美玉無瑕油葫蘆六幅湘裙簇絳紗繡鞋兒半折步金蓮窄窄印堤沙羊羊韻韻堪描畫標標致致人嗟呀外面兒波浪撑就里又心性耍玲瓏剔透千金價却怎生誤落野人家天下樂權倩東君做主咱真假事不洽俏風聲委實難按納甜話兒答應人實心兒相待他似這般干風情全是假那吒令賞三春艷陽捧瑶觴玉斚玩中秋月華按銀箏玉甲向深閨閗茶倚鸞屏鳳榻翆巍巍雲鬢堆紅馥馥花枝壓美孜孜臉襯朝霞鵲踏枝則他那意通逹性堪誇軟欵溫柔喜笑歡洽全不似求食串瓦章臺街路栁墻花寄生草能商謎慣續麻為知音兩意難拋下乍相逢惹的聲名大小心腸擔了些間驚怕門兒閉了再休踏眉兒淡了教誰畫么篇有那等喬相識間磕牙使間錢忙把花門迓強風情枉𬒳别人罵千相思勸不得咱家罷則為這賞花時看一假好風光老生兒説幾句衷腸話尾聲年紀到六旬來嘆世事如嚼蠟不快樂枉待怎麼那美景良辰休負他錦窩中小小生涯喚名娃板撇紅牙妙舞清歌間笑耍春光正佳玉容堪畫我則待占東風培養出牡丹芽點絳唇隱士造化生成榮枯巳定天之命隨運而行因此上固守虀鹽困混江龍都只為世情淺分倚衡門感嘆暗傷情憂只憂囊空父老愁只愁家業凋零七件事常無所輳幾般心事自沉吟到于今功名未遂學業無成年三十巳過四十將臨天哎莫雄志命蹇不能施展大才時拙成何用因此蓬窗守拙陋巷甘心油葫蘆甑有蛛絲釡有塵不厭貧都只為二文錢鈔苦難尋空教我南來北往無時㝎東奔西拽空成病富的呵交又交貧的呵親不親細觀世事何時定因此上白髮鬢邊生天下樂誰不待利已肥家幹蠱心好教我難也波禁時不來十樁好事九無成一會家腹中思心內忖好教我無計度其身那吒令有一箇趕齋的吕蒙他也曽受貧有一箇未遇的買臣他也曾負薪有一箇胯下的那生他也曾時來呵賜金嘆先賢這人也曽受貧非小子無用無能鵲踏枝誰不待列簮纓做公卿誰不待獨顯髙衙畫閣銀屏誰不待朝歡暮飲誰不待白馬紅纓寄生草你便有文通智管鮑情你便有顔回德行無人敬你便有蕭何刀筆無人問你便有蘇秦舌劍無人聽時乖笑煞小兒曺有一日運來穩挂黃金印么篇屈沉煞風流體慷慨心有一日鵷列與三公並有一日華筵飲罷笙歌送有一日畫堂春暖鴛鴦並有一日金叉十二列幃屏我將意中人寫入丹青幀尾聲罷罷罷冷暖自家知厚薄歸于命固其窮甘心守分詩酒生涯樂太平會髙人講究些寒溫一任他傍人冷話兒浸雖無邵堯夫義仁且養孟浩然之性拿雲手怎肯埋沒了這平生點絳唇贈妓萬種妖嬈一團俊俏十分妙百媚千嬌端的是閉月羞花貌混江龍他若是含情一笑朱唇一點嵌櫻桃梨花玉體楊栁纎腰眉黛春山嬌滴滴眼波秋水緑滔滔可觀可看宜喜宜嗔堪憐堪愛難畫難描撥銀箏音律韻悠揚唱陽春一曲依腔調你便有千金髙價怎能勾一剡春宵油葫蘆喜遇得樽前猛見了更那堪情性好言談語話那清標更那堪聰明伶俐諸般俏他可便續麻道字無差錯生的來柳樣柔花樣嬌知今博古通三教鐡石人見了也魂消天下樂怎能勾玉樹同棲翡翆巢無福的難也波消自喑約用心兒訪尋月下老者末你能會彈能會舞能會繡能會挑怎生有前程無下稍那吒令離情空懊惱我魂勞夢勞敢緣薄分薄盻明朝後朝斷腸籍上除了姓名姻緣簿上尋箇著落一星星記在心苗鵲踏枝你與我自量度是評跋你肯聽琴我便題橋趂青春年紀幼小休辜負好姻緣月夜花朝寄生草相思病何年盡姻緣事甚日了我見他知輕知重知分曉不能勾同行同坐同歡樂到教我添愁添悶添煩惱怎能勾笑吟吟花下燕鶯期幾時得喜孜孜麗日鴛鴦沼六么序眼前靣人千里耳邊廂音信杳隔三千弱水迢迢悶懨懨鬼病難熬意遲遲情思心焦桃源洞不見分毫恰便似熖騰騰烈火燒祅廟白茫茫水淹藍橋我今生撅著相思窖好教我行眠立盹夢斷魂勞么篇哎你箇多嬌仔細聽著你肯花底相邀月下相招琴瑟和調同伴吹簫一世兒團圎到老恁時節有下稍尋一箇安樂窩巢散誕逍遙到大來志氣清髙當日箇謝天香李亞仙尋思的到