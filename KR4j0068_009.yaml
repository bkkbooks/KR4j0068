狠毒心正苦児兩箇飛禽児惱人心也来相喚相呼採茶歌拈彩筆手生踈寫不就雪蕉圗雪蕉圖我只病容愁蚕絲臨摸既到君前君一覩我只怕崔徽不似舊規模尾晚来時難在甫茫茫風雪徧江湖正是夫戍蕭關妾在吳梧桐樹惜别相思借酒消酒醒相思到月夕花朝容易傷懐抱懨懨病轉深未否他知道要得重生除是他醫療他行自有靈丹藥罵玉郎無端掘下相思窖那里是蜂蝶陣燕鶯巢痴心枉做千年調不札實似風竹揺無投奔似風絮飄没出活似風花落東甌令情山遠意波遥咫尺粧樓天様髙月圓苦𬒳隂雲罩偏不把離愁照玊人何處教吹簫辜負了這良宵感皇恩呀那些箇投以木桃報以瓊瑶我便似日影内捕金烏月輪中擒玉兎雲端裏覔黄鶴心腸枉費伎倆徒勞也是我恩情盡時運乖分縁薄浣溪沙我自招随人咲自古来好物難牢我做了謁漿崔護違前約採藥劉郎没下稍心懊惱再休想画堂中綺筵前夜将紅燭髙燒採茶歌疼熱話向誰學機宻事把誰托那里是潯陽江上不通潮有一日相逢酬舊好我把這相思兩字細推𫾣尾我青春他年少玉簫終乆遇韋皋萬苦千辛休忘了青衲襖別思重㑹想多嬌情性児標想多嬌恩意児好想着俺携手同行共歡樂吟風詠月将詩句児嘲女温柔郎俊俏正青春年紀児小誰承望比翼分飛瓶墜簮折魚沉鴈杳罵玉郎想着俺那多嬌一去無消耗想着那情似􅃮意如膠常記的當時共枕同歡樂想着他花様般嬌桞様般柔傾國傾城貌大迓鼓千般百様嬌風流俊俏體態妖嬈所為諸般妙搊箏撥阮歌舞吹簫總有丹青難画描感皇恩好教我心緒無聊意穣情勞懶把杜詩溫慵将韓文序倦把那桞文學這兩日愁懷越焦好教我容貌添憔不䏻勾同歡㑹成配偶只落的受煎熬東甌令潘郎貌沈郎腰可憐相思沒下稍心腸懊惱傷懐抱烈火燒祅廟滔㴞緑水渰藍橋相思病怎生熬採茶歌相思病怎生熬離愁陣擺的堅牢我天呵鐡石人見了也䰟消愁似南山堆積積悶如東海水滔滔賺誰想今朝自古書生多命薄傷懐抱痴心惹得傍人咲向誰行分告烏夜啼想當初偎紅倚翆我和他踏青閗草想逢時遇景同歡咲到春来語呢喃燕子㝷巢到夏来荷蓮香滿開池沼到秋来菊滿荒郊到冬来瑞雪飄飄想當初画堂金屋列佳餚到如今孤眠旅舘無着落鬼病侵難醫療情牽恨惹意穰心勞節節髙悶懨懨睡不着想多嬌他知音觧吕明宫調諸般妙閉月容羞花貌語言嬌媚心聰俏恰如仚子行来到金蓮欵蹙鳳頭蹺朱唇皓齒微微咲鵪鶉兒㸔了他體態輕盈更那堪宜穿素縞㸔了他脂粉匀施蛾眉淡掃㸔了他萬種妖嬈難画描難画描寳鴨香飄銀燭髙燒酒泛羊羔成就了羙滿夫妻綰下箇同心到老尾青霄有路終湏到生前無福也難消把佳期叮嚀休忘了四塊金羙眷效比翼成連理想同坐雙雙一似比目魚想當初設山盟今日箇都故了牙疼誓甜膩膩的宻和着酥喜孜孜的魚共水羙甘甘的膠共漆罵玉郎從他去後我便添縈繫不由我心似酔意如痴常言道相随百步也有徘徊意這些時靈鵲児不報喜喜蛛児難信實龜卦児全不濟大迓鼔當𥘉共枕席自從别後獨守孤幃止望成家計鴛衾半擁通宵寐此恨綿綿無盡期感皇恩今日箇藍橋下水渰波圍桃源洞霧鎻雲迷青鸞信杳無蹤黄犬音全不至白鴈書甚時回這相思怎醫那鬼病禁持悶昏昏情切切意遲遲東甌令添疾病减香肌瘦損懨懨說向誰天天不管人憔悴辜負了韶華日燈昏月暗夢初回寳鼎内篆烟微採茶歌寳鼎内篆烟微衫䄂上泪淋漓不由我一思一想一悲啼每日家屈指長懐他去日逺我正是有心不怕隔年期節節髙想着他花似容玊如肌春風一捻腰肢細鴛愇裏翡翆衾鮫綃被錦瑟瑶琴何時對鸞簫象板無心習恨堆八字桞眉顰愁添九曲柔腸碎鵪鶉兒燕燕飛飛花邉桞堤事事皆依夫唱婦随共枕同席偎紅倚翆月漸西燈漸微香冷金猊酒盡金盃琴閑金徽今日箇月缺花殘閃的人鸞孤鳳隻尾声多嬌有日重相㑹雙雙携手入羅幃永逺團圓直到底青衲襖相㑹㡬時得這煩惱絶㡬時得這離恨徹本待要去散悶閑行到得䑓榭傷情教我對景長嘆嗟悶懷争忍撇待割捨難割捨沉吟教我倚遍闌干萬感情切都分付與這長吁嘆嗟一江凨歩蒼苔月下深深拜拜罷向西廂待盻多才時様冠兒貼軆衫兒想綉来的香羅帶相思淚滿腮好似梨花帶雨開見了怎不教人愛凨入松記前日席上泛流霞遇着一箇宿世冤家自從見了情牽掛心兒裡撇他不下梦兒裡常常見他説不的半星兒話尾得團圓歡樂罷和諧繾綣享榮華何處垂楊堪繫馬九轉貨郎兒也不唱韓元帥偷營刼寨漢司馬陳言獻策也不唱巫娥雲雨楚陽䑓也不唱梁山伯也不唱祝英䑓則唱那娶小婦長安李秀才么篇我則見齊臻臻的朱楼髙厦碧聳聳青簷鴛瓦掛玊鈎途路嶺長存四季芲銅駝陌王孫閗奢華公子仕女乗車馬繡簾髙掛都是他都是王俟宰相家貨郎児李秀才不離了芲街桞陌占塲児貪杯好色㸔上他桞眉星眼杏桃腮對面児相挑泛背地裡暗窺諧背着他那渾家着媒人往来閒家孹劃諸般綽開芲紅布擺早将一箇烟芲娶過来貨郎児那妮子舌刺刺的挑搽斡刺百枝百枝枝芲児葉子望空裡揣與他箇罪名児閑挑刺閑尋公事挑三斡四大渾家吐不的嚥不下心頭刺减了神思瘦了腰肢病懨懨睡損了裙児祬一卧不起難動止嗞冷了四肢将一箇賢慧的渾家生氣死貨郎児火逼的芲稍上雅飛鵲散更和那更深夜闌恰便似火熖山天賜到長安迎仙客燒地戸燎天關恰便似火龍降来凡世間萬火燒空老君煉丹似介子推在綿山恰便似子房燒了連雲棧紅綉鞋恰便似赤壁鏖兵凨範布牛陣舉火田單恰便似火龍烟戦錦闌斑把房􅉉扯将脊條板急救着連累了官房五六間貨郎児我則見昏慘慘天涯雲布更那堪滴滴點點瀟湘夜雨早是那窄窄狹狹溝溝塹塹路崎嶇黒黒黯黯隂雲布那赤留出律消消洒洒㫁㫁續續出出律律忽忽魯魯隂雲開䖏我子見霍霍閃閃電光星注上小楼怎禁那颼颼摔摔凨淋淋淥淥雨髙髙下下凹凹凸凸水渺糢糊撲撲簌簌濕濕淥淥踈林人物却便似昏昏慘慘瀟湘水墨圗貨郎児河岸上和誰說話向前去親自問他詐言道奸夫是船家殿前歡猛見他将俺家長㗋嚨搯磕荅的揪住頭髮我是箇婆娘家怎生救他身亡化撲鼕命掩在黄泉下将李春郎的父親則向那翻滚滚波心渰殺貨郎児據一品凨流人物打扮的諸餘裡俏措快活年綉雲肩匈背是鴈啣蘆他繋着條兎鶻兎鶻海斜皮偏宜玉連珠是那無瑕的荆山玉驟身去也麽哥繒髭鬚也麽哥打着鬂胡走犬飛鷹架着鵰鶻恰獵圍塲過去扯着轡盤旋驟着龍駒疾似流星去那凨流也麽哥恰渾如也麽哥恰便似和畨的昭君出塞圖貨郎児我便就寫與他生時年㡬不曾道差遲了半米未落笔芲牋上淚珠垂脫布衫長吁氣呵軟了毛錐悽惶淚滴滿了端溪十三年不知箇信息相别時恰纔七歲醉太平他如今方二十恰便似大海内沉石自從在洛河岸上兩分離知他在江南也塞北俺孩児耳垂福相過肩墜匈前一點硃砂記長安解庫省衙西俺孩児小名喚做春郎身姓李
