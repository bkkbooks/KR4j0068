body:
  text: 箇佳期重會早喜遇著神仙聚會風光好則碩的歲歲秋光閗乞巧粉蝶兒走驃騎節遇端陽慶㽔賔萬民歡暢感吾皇聖夀無強艾如旗蒲似劒靈符浩蕩户納千祥鎮妖氛􅍔除福降醉春風文共武御苑中武和文金殿上聖明天子重賢臣因此上享享射栁爭功龍舟競渡騎驃爭放醉高歌喊聲髙炒閙空蒼金鼓鳴春雷震響馬咆哮爭把門旗望百丈旗巍巍蕩蕩紅繡鞋鸞鈴響驊騮爭放比髙低各自斟量抖搜精神姓名揚一箇箇施巧藝一箇箇逞能強恰便似惡相持爭戰場石榴花拖塵趕鏟急心忙蹬塵邁步腳慌張揭鞍換屜甚安詳攛梭在兩廂蹬裡把身藏流星趕月如飄蕩剪刀股二足著忙肩庒起範登雲漾斜插栁絶妙把名揚閗鵪鶉最險的是隔肚穿錢滚鬃過膛身軀倒仰強板逹直挺身軀金錢豹緊追莫慌我則見那左右入鞍捨身落地久占場節節髙自忖量打虎的是存孝威風射鴈的是英雄李廣十二月一箇單獻靴雄威氣象二仙傳道神光虎牢關三戰吕布斷密澗四馬投唐五馬破曺操怎當六倒手意急心忙堯民歌呀七里灘垂鈎獨釣隱嚴光八仙慶壽過汪洋星辰九曜顯髙強十靣埋伏列刀鎗進履的張良關公斬蔡陽更有那取經的唐三藏耍孩兒騎鬃倒坐在烏騅上三馬解來來往往金雞獨立最難當有山門獻杵金剛鬼牽龍緊驟定狻猊豸射白猿深將竒藝藏張天師驅虎神威降順風兒側耳千里眼偷張二煞前跌塵二足慌後探鞦兩手忙鯉魚跌脊隨波浪蛟龍出水巴山勢餓虎投崖撲下岡頷搭頦人誇奬三上馬心忙意急五方旗戊已中央一煞伍子胥鞭伏了栁盜跖薛仁貴飛刀起定緑江昆陽大戰驅兵將耿恭拜井天心應敬德威風鎮四方三跳澗合興旺單雄信割袍斷義浣沙女抱石投江尾聲寬堯舜過禹湯慶豐年蒙賜賞民安國泰邦威蕩四海來賔萬民仰粉蝶兒憶情畫閣蕭踈那里也玉堂人物間别來音信全無拆鸞凰分鶯燕生離開比目病懨懨瘦損肌膚粉慵搽朱唇懶注醉春風這些時縷帶趲了三分羅裙掩過半幅臨行曽説幾時回我與你便數數去時節正遇春分回來也必然是夏至到如今又過了秋暮醉髙歌更闌香冷金爐夜靜燈殘畫燭今朝有夢歸何處那里也吹簫伴侣紅繡鞋愁寂寞縈牽腸肚病懨懨瘦損身軀鬢雲鬆意懶甚時梳茶飯上無些滋味針指上減了工夫塵蒙了七絃琴冷了鴈足普天樂意徘徊心猶豫知他在科場應舉翰苑升除崢嶸在畫閣中顯耀在蘭堂住閃的我便冷冷清清捱朝暮想薄情負我何辜撲簌簌兩行淚珠悶懨懨九分病苦氣絲絲一口長吁上小樓也是我今生分福多管是前生合注那里也畫眉張敞擲果潘安傅粉平叔不弱似待月張生偷香韓夀謁漿崔護我如今孤辰運正該天數么篇愁和悶眼倦開悶和愁眉怎舒愁的是離思懨懨神魂飄蕩鬼病揶揄悶便似華嶽三峯巫山十二黃河九曲看看的骨崕崕命歸泉路十二月四時景光隂迅速更那堪秋景相逐踈刺刺風搖翠竹淅零零雨灑蒼梧畫簷間玎玎璫璫鐡馬戍樓中滴滴點點銅壷堯民歌呀我恰才望夫山上問箇實虛他可在竹林寺裡寄情書多管是秦樓謝館笑喧呼他敢在栁陌花街恣歡娛躊蹰薄情􅑯狠峯恨不的扯碎了姻緣簿耍孩兒趕蘇卿何處雙通叔我到做了三不歸離魂倩女俺正是碧桃花下鳯鸞孤山和水阻隔著萬里程途山隱隱繞天涯怎覔青鸞信水茫茫遍海角難尋錦鯉書兩般兒總是無尋路桃源洞磚填土塞武陵溪煙水糢糊一煞身如水上萍命似風中燭月華明忽𬒳隂雲布藍橋下水波濤萬丈通海島祅廟火烈熖千團接著太虛兩般兒無情物玉簮折何時再接氷絃斷甚日重續尾聲漢相如有日還故鄉卓文君多情親見汝一星星盡把衷腸訴我把這受過的凄涼慢慢的數粉蝶兒贈美妓笑臉含春粉脂融淡霞紅暈立東風無限精神寶叉橫金鳳小緑鋪雲鬢眉月斜痕眼橫波不禁春困醉春風步錦襪蹙金蓮拭羅衫舒玉笋常言道明花解語亦傾城這話兒敢凖凖因此上鴈落魚沉花羞月慘玉嬌香嫩紅繡鞋歌扇掩胭脂紅褪舞衣飄蘭麝香溫氷絲細織帕羅新翆裙鸚鵡緑繡帶鳳鸞紋玉鈿蝴蝶粉普天樂一見了引人魂再見了消人悶急追陪金杯錯落莫辜負翆袖殷勤覷一覷萬種嬌笑一笑千金俊手撒紅牙歌清韻上青山遏住行雲腸斷也蘇州刺史心堅也蒲東􅌒客情迷也洛浦行人上小樓説甚麼芳卿性純秋娘丰韻多應他懶住蟾宮私下仙瑎謫降凡塵翡翆屏錦繡裀包藏春信涵養出嬌滴滴殢人身分么篇也不索鶯兒探春賔鴻傳信慿著這綵筆題情羅帕留香索強如織錦回紋酒半醺粉半勻把這情郎低問比著那海棠花更多淹潤耎孩兒錦筵開一派笙歌引簇擁著一箇娉婷玉人舞腰纎細不勝春美孜孜淺笑輕顰也宜教畫欄干遮護著瓊花蕊錦步帳遮圍著玉樹春酒捧著金波醖受用殺銀箏象板風流殺翆袖紅裙尾聲輕聲度艷歌淺粧凝素粉東風滿地殘紅褪一刻千金意不肯粉蝶兒憶别錦帳羅幃空留下這場憔悴想人生最苦别離恨匆匆愁冗冗忘餐失寐困騰騰眼􅌒心迷元來是害相思恁般滋味醉春風這些時枕剩夢難成衾餘愁易得似這等衾餘枕剩捱長更好教我悔悔發付的你逺上陽關悶的人孤幃寂寞害的人一絲兩氣紅繡鞋黃甘甘胭憔粉悴病懨懨瘦損香肌急煎煎流泪數歸期閙攘攘心煩亂磣磕磕的苦分離這些時悶懨懨愁似癡普天樂意躊蹰心憂慮哀哀怨怨慘慘悽悽閃殺我年少人辜負了鸞凰配早是離人愁縈繫更那堪杜宇悲啼或時在銷金帳裡珊瑚枕畔將我這好夢驚回上小樓美恩情眉南面北好姻緣鴛鴦拆離幾時得携手星前並肩月下同入羅幃到如今寶鏡分叉斷股簮折瓶墜正值著惱人腸物傷人意么篇畫梁間燕語喧花栁間鶯囀啼我這里淚眼偷觀愁聞􅌒聽景物傷悲正遇著風雨催栁絮飛殘花滿地我則索掩重門紗囱深閉要孩兒山長水逺人千里月缺花殘春又歸多憂多慮怕黃昏掩重門簾幕低垂更闌夜靜離人苦燭暗香消怨女悲捱不徹凄涼日打熬出悶懨懨日月憔悴了花朵兒身軀煞尾不爭你撇了我數載餘淹留我三不歸若能勾重整佳期會則除是一枕南柯夢兒裡粉蝶兒歸隱褁帽穿衫習儒風半醎不淡誦毛詩召南周南尚書經春秋傳子書通鑑樂府曾諳詩禪中略通詩塹醉春風論吟和豈獨專説拿雲非自敢受寒囱辛苦止望待立箇成名陋巷中淹留殺俺俺看别人在雲霧裡升騰市門里中踴躍輪到我在淤泥中著陷石榴花想區區虛度五旬三赤緊的三十載事􅮡想從前事務總教參便有那熊心豹膽誰敢跳虎窟龍潭題起那簮纓名爵其實慘鴻毫輕豈足為談我則待要守寒門養素心不憚我可也不束髮不簮冠閗鵪鶉我煉的金木間關一任教離官配坎我將這財利不貪欲情欲情退減但得些參粟鮮甜豆粥甘著麻衣有甚慚一心待樂道甘貧問甚麼傍人笑俺上小樓我則待粧癡作憨誰想道言多語濫不求聞逹不謁髙門不上書緘我則待隱于農歸于浦漁籃樵擔比恁那跳龍門不邅坑陷么篇跨著箇耽耳驢乘一騎欵假驂我則待挈榼携壷對月臨風玩水逰岩若是我興正酣飲正甘直吃的頭低身探問甚麼髮刀騷土埋塵暗十二月利名場徑行見坎風月擔重負難擔漸漸的形容踈減看看的鬢髮髧鬖我將這古往今來事覽再誰敢奔逞貪婪堯民歌呀我則待樂簞瓢陋巷里靜巉巉一任教守清貧沿路語喃喃我將這帶脿脂豬肉旋煎爁帶蛆濁醪著瓢淹放浪醺也波酣今畨識破俺再誰拆朱雲檻耍孩兒避風波家住在山岩嵌蓋一座不踈漏低低草庵粗衣糲食度流年樂耕鋤孳養些桑蠶常安排一樽醪酒滌塵慮多喂養幾隻雞豚欲解饞無驚恐心和淡機頭伴織梭荆拙燈前引戲綵兒男五煞要清心呵與吾儕三五人對書齋燈一龕正夜靜銀海澄澄湛焚著那松花柏子雲煙偃撫著那焦尾氷絃神鬼參琴彈罷相陪伴茶烹石䁀酒注磁罈四煞要釋悶呵松棚下同笑歌石床上共手談有漁夫樵子傍觀鑑未曾終黑白勝負碁一著迅指早紅日西沉山半含識進退知成陷若論那其中就裡閗爭先機智相攙三煞要忘懷呵將端溪硯水添把烏犀手內攬輕拈斑管將霜毫蘸拂開玉板箋三幅寫出梨園書一緘問甚麼文理踈言詞淡大剛來情懷意散就中將名姓包含二煞要樂意呵看關同海潮圖風聲􅐈水靣濤有王維輞川圗雲氣生山頂嵐有龍眠寒雪圗孟浩然霸陵橋驢背如銀糝有魏衍松風圗龍根雲幹龍盤偃有肅射梅竹圗雨意胭脂鳳尾擔此四景消昏旦惜性命粧些粗踈蠢倴誰敢弄殘生施逞那僥幸姦讒尾聲我將這人惡墻砌的髙把是非門閉的嚴一任教滿天雷震山搖撼便有那驟雨狂風也哨不著俺粉蝶兒題美人腳小他生的如月如花蕩湘裙一鈎羅襪寶叉橫雲鬢堆鴉翆眉彎櫻唇小堪貓堪畫間近囱紗倚幃屏繡簾低下醉春風香細裊紫金爐酒頻斟白玉斚銀燈影裏殢人嬌他生的可喜殺殺他生的宜喜宜嗔便有他間愁間悶見了他且休且罷迎仙客傍芝蘭吸露花逰宇宙步雲霞我則見窄弓弓藕芽兒剛半折踐香塵踏落花淺印下輕沙印一對相思卦紅繡鞋有他時一刻千金無價有他時一生興旺人家有他時村沙的化的不村沙臨風三勸酒對月一甌茶説蓬萊都是假普天樂信步到海棠軒間行至荼􅐘架引的些蜂喧蝶攘來往交加粉臉襯桃杏腮雲髻把花枝抹裊裊婷婷花隂下他若是不言語無處尋他他比白花解語他比黃金足色他生的美玉無瑕耍孩兒透春情説幾句知心話則𬒳你迤逗殺我心猿意馬寒囱寂寞費琴書不由人曉夜思他傲風霜分不開連枝樹宜雨露栽培出並蒂花見一日買幾遍龜兒卦似這般短促促携雲握兩幾時得穩便便立計成家三煞捧金杯勸醁醑按銀箏那玉馬似展開幅吳道子觀音畫他那里倚鸞翆袖凝秋水映日紅裙襯曉霞但見處人驚唬端的是沉魚落鴈他生的閉月羞花二煞笑一面不覺的春自生行一步迱逗人眼􅌒花十分愛常墊著三分怕愛的是三分旖旎嬌千種怕的是間阻飄零那半霎天生下一虎口淩波襪堪與那俏子弟寒時暖手村郎君飽後挑牙煞尾要教咱稱了心則除是娶到家學知些柴米油鹽價恁時節悶減愁消受用殺粉蝶兒慶冬至節正值著冬至初交恰才箇一陽生漸回天道我則見凍雲垂四野飄颻簌氊簾鋪繡榻寒侵幃幄更那堪景物蕭條四時中最宜歡樂醉春風你看這黎庶盡謳歌更那堪官清法正好似這般堯年舜日樂升平端的是少少這的是聖主寬仁賢臣扶助輔安宗廟紅繡鞋見如今過舜帝堯王之道端的是用忠良宰輔臣僚况值著仲冬佳節景風飄見處處追歡賞家家可也設瓊肴端的是慶豐年享鳳閣石榴花托賴著吾皇仁智勝唐堯端的是四海盡風調則碩的八方無事罷兵刀宰臣每智巧鼎鼐和調見如今巍巍聖德如山嶽重賢良文武英豪臣遇著嚴威凛冽寒天道真乃是富貴在今朝閗鵪鶉你看這寶殿瓊宫敢則是龍樓鳳閣我則見瑞靄靄祥雲九重九重霧繞更和這疊翆堆瓊景物髙端的是堪畫描猛然見四野祥雲敢則是寒風亂掃快活三散天花瑞雪飄飛六出舞瓊瑶也宜在紅爐暖閣飲羊羔一任教瑞雪紛紛落鮑老兒你看這玉闕瓊宫新蓋造更和這雕斗泥金罩是看這紫霧紅光籠罩著將萬載龍庭照見如今民安國泰年豐歲稔雨順風調托賴著巍巍聖德乾坤道太平免差徭尾聲見如今四序和八方來進朝你看這千邦獻瑞依王道齊獻上冬令佳辰太平表粉蝶兒楊妃舞翠盤天淡雲間寫長空數行征鴈御園中夏景初殘菊添黃荷減緑秋蓮脫瓣坐近雕欄却原來噴清香玉簮初綻呌聲共婇女喜開筵等間等