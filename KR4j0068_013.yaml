消他丰半韻韶艶艶夭夭日日朝朝雨雨風風漸縹渺那堪暮秋天道似這般爽氣清髙那堪夜雨瀟瀟調咲令悶懨懨愁心怎熬昏沉沉梦㫁魂勞秋聲和轆轤砧韻𫾣淅零零細雨洒芭蕉𥘉凋小桃紅枕寒衾冷夜迢迢旖旎人兒俏往往難成梦驚覺好心焦悲悲切切鴈児呀呀的呌透户牖金風淅淅滴更長銅壷點㸃更那堪蛩韻絮叨叨天净沙懨懨鬼病難消凄凄心痒難揉漸漸神魂散却好教人沒顛沒倒意遲遲業眼難交尾聲想當日熖騰騰烈火燒祅廟翻滚滚洪波浸画橋明晃晃火燒此時休白茫茫水渰殺未成就的夫妻每到是了闘鵪鶉詠小卿釋卷挑燈攀今覧古妬日嫌風埋雲怨雨因觀金斗遺文故造緑囱新語自忖度自窨服好做得是也有鈔荼啇好行得差也䏻文士夫𬗋花児序蘇娘子本貪也欲也馮員外既與之求之雙解元怎羡乎嗟乎但常酬歌買咲誰再覩沽酒當爐哎青蚨壓碎那茶藥琴棋筆硯書今日小生做箇盟甫改正那村紂的馮魁踈駁那俊雅的通叔小桃紅當時去的遇嬌姝嫩蕋曽分付便和葉和根盡掘去自情踈直教他連愁嫁作啇人婦剗地進功名仕途直赶到風波深處雙泪你可愛君子斷其初金蕉葉微雨洗丹楓秀谷薄霧鎖白蘋㫁滸零露濕蒼苔淺渚明月冷黄蘆逺浦調咲令那其間羙女樓着村夫怎做得賢愚不並居便休題書中有女顔如玉偏那雙通叔不者也之乎他也曽懸頭刺股将經史讀他㡬曽㝷得箇落鴈沉魚秃厮児雙漸正瑶琴自撫馮魁正紅䄂雙扶雙漸正弹成滿江腸斷曲馮魁正倒金壷飲芳醑聖藥王雙漸正眉不踈馮魁正興未足雙漸正悶随江水恨吞吳馮魁正樂有餘雙漸正愁怎除馮魁正寫成今世不休書雙漸正嫌殺影児孤尾聲㝷思兩箇閑人物判風月才人記取将俊名児雙漸行且權除把俏字児馮魁行暫時與
