子楼省你也葉落㱕秋餘音誰不知蘇卿已嫁雙通叔王氏元憐秦少㳺咱兩箇沒添貨的姻縁厮成就天長地乆鸞交鳳友再不教你鳴珂路兒上走一枝花梅香勸妓從良芳卿細細聴賤丫明明道雨雲湏念想凨月不堅牢月夜花朝兩地成躭閤虛飄飄何日了吐蛛絲鎻不住蝶使蜂媒啣泥燕壘不就鸞窩鳳巢梁州怕不道甜膩膩恩情怎捨瞞不過嚮璫璫禮法難饒赤緊的一身萬事縈懐抱椿萱衰邁松菊蕭條雲山縹緲烟水迢遥則落的鶯燕呼招怎能勾琴瑟和調恰便似劉晨悞入天台交甫神逰漢臯裴航夢㫁藍橋㡬遭暗約既知休怕甚鶯芲咲做便道娶之後怎發落少不的留與青楼做散樂到大酕醄餘音從今後休将錦字傳青鳥謾把綸竿釣巨鰲不是我巧語芲言厮推調你如今模様兒正嬌年紀兒又小則不如早嫁箇知心俊孤老一枝花素蘭春含九畹芲秀得三湘瑞名髙蕚緑華梦入鄭燕妃滿目芳菲不與群芳比群芳自不及有十分雅態幽姿無半點浮芲浪蕋梁州包啞謎㘽排了陶谷寄情詩傒落煞張碩誰承望天凨吹落鶯芲地紫茅荏苒丹頴葳𬎼檀心馥郁翠帶紛披也不弱月桂寒梅便休題杜若江籬日烘烘有緑艶醺酣凨颺颺似翆裙揺拽露零零如香汗淋漓若非異卉楚大夫怎肯紉為佩更一般甚清致緯天經地魯仲尼也将他引入金徽尾既不着珠簾翆幙深遮閉也消的綉檻雕欄謹護持試與知音細論議恁時要笔尖上品題眼皮上愛惜則除是描入明囱画圗裏一枝花麗春園有世情鳴珂巷無公論愛村沙欺軟弱嫌文墨咲温純別是箇家門飽煖随時運詼諧教子孫伴凨姨陪月姊甚日辭柵覔芲錢償酒債何年證本梁州粧鏡裡暗暗的添了白髪酒席上飄飄的過了青春急回頭巳是三十盡粉褪了杏腮桃臉涎乾了瓠齒櫻唇塵暗了錦箏銀甲香消了綵扇羅裙恁時要片時間㧞類超羣子除是三般兒結果収因招一箇莽庄家便是良人嫁一箇窮書生便是儒人苫一箇俊孤荅便是夫人小生暗忖如今這女娘每一箇箇口順心不順多詭詐少誠信直待紅鸞活現身可知道好景因循你試檢點鶯芲簿細摩挲烟月文真乃是有竒芲便有東君玉簫女結韋臯兩世絲蘿蘇小卿配雙漸百年眷姻謝天香遂却耆卿志李亞仙疼煞鄭生貧薛瑶英大享着奢華福韓素梅深蒙雨露恩餘音你子早畢罷了栁衢芲市笙歌陣我俻着鳳枕鴛幃錦繡裀縦然道板障的娘娘有些生忿明放着玉鏡䑓主婚金花誥保親不從良的也算的箇蠢一枝花羙人温柔素質過標格芳名播俗塵絶是少和氣靄然多嚮動鳴珂舌吐珠璣唾身蔵翡翆窩碧隂隂暮雨朝雲錦片片蘭堂画閤梁州恰纔離佛天有頃早来到仙境無他儀容堪上湏弥座衣穿蜀錦扇掩輕羅裙拖湘水襪襯􅓸波咲蟾宫桂影婆娑嘆巫山雲梦蹉跎章䑓路咲忻忻素縞霓裳晚粧楼情黙黙濃粧艶抹翆紅鄊韻悠悠妙舞清歌百般盡可銀屏画燭天堦臥錦紗厨綉幃幙百媚千嬌㳤景和壓賽姮娥餘音可人情朱唇一點櫻桃破粉臉雙分菡蓞合更稱着嬝娜妖嬈那些箇揚州遇我梁園見他無限瓊芲第一朶一枝花別離羅幃中恩愛濃蘭舍内情懐熱實指望長相守誰想道有離別兩下裏相隔盻望煞無音信想的人有似邪恨不的駕雲軒逺去相陪生羽翼飛騰進謁梁州我只待陸地上驟馳驛馬汴河中揺促舟楫奈因那關山迢逓鱗鴻㓕端的是青鸞信杳黄犬音絶想的人神魂恍惚情思痴呆對踈林暮景咨嗟倚危楼望眼雲遮我我我氣長吁吹滅了銀燈淚珠兒流濕衣摺口兒顛枯乾了㗋舌甚時得情連意接同携素手登䑓榭再和諧再歡恱見如今兩下裡相思忘了截甚日寜貼尾你那裡長吁短嘆無休歇我這裡廢寢忘飡無了也悶腹愁懐甚時節謹粧修緘帖懇奉呈姐姐早早把同心帶兒結一枝花述情記相逢紫陌中共歡㑹青楼上按氷絃歌白雪燒銀燭泛瑶觴滿座凨光甜口兒相偎傍熱心兒厮順當娯情在流蘇帳翡翆鴛衾雲母屏氍毺象床梁州芲隂下香肩並倚月明中玉手相将叮嚀咱錦營芲陣休浮浪把終身恩愛禱吿穹蒼盟山誓海剪髪拈香我子想羙姻縁地乆天長誰承望這劣心腸倒皂囬黄端的是小猱兒耍性難拏怪不的老鴇兒虛脾調謊儘教那俏人兒恣意着忙忖量這塲你愛他七重圍金頂蓮芲帳恰相逢便随向髙駕楼舡上魏塘抵多少野水鴛鴦尾楚陽䑓一任教人来往桃源洞從他那信杳茫再不将想像芲容在心上這一卷溪山樂事榜章寄與你箇無情艶粧明囱下披圗你與我慢慢的想一枝花相思海様寛煩惱天来大情懐多似許心緒亂如麻這病敢為酒因芲時刻抛不下湏臾怎棄他不想呵除非是鉄石心腸怎生推䏊粧啞梁州我為他軆態凨流有沉魚落鴈儀容嬌嫰有閉月羞芲我為他向人前一咲有千金價知音業主可意冤家堪憐堪敬堪羡堪誇他是箇嬌滴滴羙玉無瑕明晃晃真金無不假我為他将一片讀書心改變做竊玉偷香我為他将兩隻折桂手翻騰做㺯栁拈芲我為他兩三畨害的人不飯不茶想他念他㡬時把相思一筆都勾罷那時節羙滿姻縁興味徍情性難拏尾便有那王維筆巧難描画劉鑾手怎塑他常記的當𥘉那句凨流話料應来心兒裡想咱口兒裡念咱但能勾一墓同埋敢不説半星兒假一枝花妓乗馬巧堆雲鬂雅淡掃蛾眉綠桃腮輕付粉檀口淺塗朱丰韻何如肌骨清如玉温柔人盡許妖嬈如天上飛瓊可喜似圗中仕女梁州顫篤簌芲簮翡翆明滴溜釵軃珍珠隣姬女伴常相聚朝逰栁陌日翫芲衢喜乗駿馬懶坐香車錦糢糊鮮麗衣服玉娉婷淹潤䂓模嵌羅鞋金鐙斜踏垂鴛䄂銀鞭慢舉挽絲韁玉笋㣲舒凨流有餘散東風馳驟過章䑓路鶯兒猜燕兒妬閉月羞芲豈是虚可知道落鴈沉魚尾五陵人一見空躊躇凨騷客相随枉趂逐引的人眼暈心迷㡬囬顧死沒騰暗付呆荅孩嘆吁不忿箇小