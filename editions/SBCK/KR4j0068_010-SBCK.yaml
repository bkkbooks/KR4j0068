front:
  text: 雍熈樂府卷之十
  hash: sha256:a7647080ac980601c33be54ea50ee9c57076eee4c0ae631d22f98782845d7ae6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_010-1a}
body:
  text: 南吕宫一枝花文明經侍孔墙守道居顔巷芸香熏蠧簡螢火映紗嚢學冨才長雲路通天象文星煥斗光中髙科月殿攀蟾登甲第天門㸔榜梁州如渭水垂鈎吕望似圯橋進履張良憂民憂􅀦丹心壮設樽爼眼前談􅀏論兵機􅅐内包蔵瞻日下九重禁􅊴撫寰中萬里封􅆠肅嚴威滿路凨霜屏奸邪當道豺狼掌紀綱法正官寮扶社稷才兼􅀅相際凨雲拜命君王畨􅀖巳降􅁁城寜謐人歌唱是天人自天降堪作擎天一棟梁萬古無􅀟尾紫鸞誥賜恩波蕩金豸峩􅃣姓宇香功業􅀿標史書上身臨下方心合上蒼爵禄綿綿世世享一枝花武􅇩蔵十萬兵氣吐三千丈丹心懸日月素志凛氷霜義勇忠良列宿分天象征􅂁惹御香保蒼生萬里馳名荷聖主千金賜賞梁州處公務廉􅀎有㡬肅嚴威正大無􅀟分符統領三􅁁􅀅麾前號令筆下文章關中虎鎮塞外鷹􅀭戍煙消戎寇潜蔵􅀾塵収胡虜㱕降運神機寒擁金貂觀鳥陣春圍寳帳講龍韜夜對銀缸廟堂棟梁忠臣本是天差降夀誕臨臘栂放南極臨軒燦寳光昨夜呈祥尾螺盃滿泛黄金醸鶴髪清調白雪腔壽享椿萱八十上托賴着當今帝王威服了萬􅀖坐對南山則把太平享一枝花期第金鑾殿上臣孔聖門中客鯉庭遵父訓蠧閤䆒心齋喬木良材道徳無􅁁界英姿絶􅀧埃放懐成泣􅀑新詩揮筆就驚神妙策梁州守回也四箴為戒察參乎三省扵懐文明耿耿推當代器同瑚璉量等江淮歐蘇堪共李杜同偕意不期朱􅂂金􅁫志湏登蘭省烏臺結朋情志若金石廬親塋名乗簡冊荷皇恩行表家宅柰時未来萬金寳劍沉滄海到来科顯豪邁穏占鰲頭志壮㢤不􅀒雄才尾鹿鳴宴罷離鄊陌鵰鶚昇騰上玉堦獨歩丹墀沐恩大賜瓊林宴排挿宫花帽歪酔飲仙􅊝益春色一枝花怨雪不呈六出祥豈應三白瑞易添身上冷􅀎使腹中飢有甚稀竒無主向沿街墜不着人到處飛暗敲囱有影無形偷入户潜踪躡跡梁州􅂊苫上茅菴草舍又鑚入破壁踈籬似楊芲滚滚􅁿狂􅀔你㡬曽見貴公子錦䄄繍褥你多曽伴老漁翁箬笠蓑衣為飄凨胡做胡為怕騰雲相趂相随只着你凍的箇孟浩然掙掙痴痴只着你逼的箇林和靖欽欽歴歴只着你阻的箇韓退之哭哭啼啼更長漏遅􅀍窩中無半􅀧兒陽和氣惱人眠攪人睡你那冷燥皮膚似鉄石着我怎敢相偎尾一冬酒債因他累千里關山􅀍你迷似這等浪蕋閑芲也不是乆長計儘飄零数日掃除做一堆我􅀅你温不􅉯薄情化做了水一枝花及第世俗云諸􅁑心辨牛斗張華藝墨磨成修月斧筆掃就上天梯平地一聱雷親覩當今帝脱白襴換紫衣慿着我撥天關穏跨龍腰登月處髙乗鳯尾梁州執一柄綉金芲寳盖打兩面泥金粧鳳葉紅旗喝一聲小来下路諸神避揩磨日月鼎鼐塩梅扶持社稷整頓華夷未遇時難辨髙低成名時天下皆知念一篇送窮文錦綉才華寫一篇嚇蠻書魂魄消飛草一道論天表龍蛇字體兒曺毎咲耻文章到底終須貴慿着我走㐮陽志氣赴長安道徳時想中原萬古里尾年絶雖小有冲霄志一躍龍門到鳳池江湖飬成浩然氣春雷震起天涯盡知方表功名姓字喜一枝花研精孔孟書早遂伊周志遭逢尭舜世經際禹湯時秀發天姿展萬里鵾鵬翅見九苞威鳳資臨蒼海躍龍門春浪􅊝芲步青雲攀蟾窟秋凨桂子梁州聴平地上凨雷霹􅆮􅀿九天􅁁星斗參差􅅊郎暫把長才試滋􅀦政賢良必舉順民情人愛興思玉之温無半􅀧兒瑕疵鑑之明別萬状妍蚩閑来時講一㑹論語綱常興来時談一㑹中庸奥㫖悶来時􅁲一㑹周易爻辭念兹在兹刑寛訟减民無事延賔客集儒士銀燭金樽夜賦詩酔寫烏􅁝罵玉郎鳯凰飛下丹書至催行色上京師黄童白􅅱盈街市他那􅂻待綰姚崇借寇恂留侯氏感皇恩一箇箇感嘆嗟咨淚漣漣拜車前歌載道酒盈巵別離易捨去後猶思控征驂截鞍鐙住車脂採茶歌准備着立生祠賜存思甘棠未必建新詞此去定應承褒寵不湏􅀛卦揲靈蓍尾只願的秉鴻鈞調􅂦鼐親揩日月把龍輿侍掌􅁝綸為柱石輔佐乾坤􅀅社稷支霖雨蒼生受恩施髙山仰之景行行止萬古勲名照青史一枝花武談文孔孟徒講武孫吳軰帥垣居塞北􅀅印掛征西􅃣世權威漢唐臣應難比大明功更許誰鎮上谷撫兵民􅀊稔年豊守雲中掃胡虜潜踪遁跡梁州見如今丹書鉄劵登髙位鳳誥鸞箋賜蟒衣金章紫綬身榮貴見了些弓張月滿箭發星飛劍揮牛斗氣吐虹霓論雄才名動京畿播英凨威振華夷盡忠良輔皇猷雄糾糾立朝端父子齊名諳韜畧識兵機氣昻昻列簮纓弟兄齊羙樂昇平慶家庭玉森森立玳筵兒女清竒名在􅂦􅃔功在社稷正遇着當今龍虎凨雲㑹魚水相逢千載稀壽躋期頥尾聲九重端拱無為治一􅀅安􅁁四海知竚㸔圖形凌煙裏先明了五徳作長城萬里贏得箇聲名照靑史一枝花杭州景普天下錦繡鄊寰宇内凨流地大明朝新附􅀦亡宋代舊華夷水秀山竒一䖏䖏堪逰戯一荅荅忒富貴滿城中綉幙凨簾一閧地人烟輳集梁州百十里街衢齊整萬餘家楼閤參差並無那半荅兒閑田地松軒竹徑藥圃蔬畦茶園稻附芲塢梅溪一陀兒一句詩題一步步扇面屏幃西塩塲恰便似一帶瓊瑶吳山色千疊翡翆兀的望錢塘江萬頃玻璃更有那清溪緑水画舡兒来往閑逰戯浙江亭緊相對相對着􅕑嶺髙峯長恠石堪羡堪題尾家家掩映渠流水楼閤峥嶸出翆㣲遥望西湖暮山􅀔㸔了這壁覷了那壁總有丹青難下笔一枝花閑樂新栽数畆􅀲舊種千竿竹不弹三尺劍靜閱滿床書詩骨清臞冷淡淡心何慮閑夭夭樂有餘碧梧髙彩鳯深栖滄􅈚濶鯨隱居梁州取崖畔枯藤作杖伐江􅆏曲木為廬主人素得林泉􅃐烹茶掃葉引水通渠鈎簾待月俯檻觀魚恥干求自抱憨愚厭追陪懶混塵俗傲慢似去彭澤棄職陶潜踈散如困䕫府豪吟杜甫清髙似老􅀌山不仕林逋豈濁不魯䖏酸寒緊閉乾坤目躱凨雷㸔烏兎靜掩柴扉春日晡便休題黒漆似程途黄鍾煞守茆屋忘􅀔利甘貧何用王侯顧倒青樽􅂸趔趄爛酔頻教婢妾扶世上炎凉乆憎惡敬扵賢慢扵富罷朝叅儉家務叱阿䛕薦忠恕視肥甘若鴆蠱懼功名似豺虎詠梅軒釣菱浦結樵朋友漁父陋繁華尚雅素逺雕輪避朱芾老妻賢醸醹醁老夫狂唱金􅈁課耕男教織女推仁愛給奴僕頌歌謡賛明主儘紅輪換朝暮任浮雲變今古對猿鶴做儔侣喜烟霞近囱户但􅀅那老鳩巢懐抱放寛舒一任教競蠅血兒曺謾欺侮尾學不的睡不安蒼荒㧞劍雞囱下舞趕不上時未遇抖捜弹􅃣仕途上趋秉一段鉄石心腸愈堅固者磨你趙平原誘英雄計謀齊孟甞待賢良肚腹賺不去狗盗雞鳴􅀋兒数一枝花秋懐事詞章舊有名攬凨月多才俊􅀃興亡常閉口期富貴怕勞神囬首青春又早三十近虹霓志未伸因此上筆尖兒判栁評芲心性兒摶香㺯粉梁州喜聴的是􅁿歌金缕愛㸔的是妙舞紅裙也是我平生注下踈狂性手段兒􅍄猾如張敞舌頭兒利便似蘇秦性格兒凨流如杜牧肚皮兒豁逹似田文語言直敬的是斯文骨頭髙傲的是王孫芙蓉露濕烏紗夜夜㱕遅梧桐月照羅幔􅋜􅋜睡穏桂芲凨爽吟􅂁日日逰頻自思自忖保箕裘且待亨通運省干求罷談論和滄浪静掩柴門且囬避滚滚紅塵尾有一日半􅆰中飛下凨雷信平地裏分来雨露恩那其間執節操戈把栁營鎮秉精忠為君守清白愛民酬得些勲勞便㱕隠一枝花宴㑹画堂中列翆鬟玳筵前排紅䄂􅀝玉屏挨錦榻捲繡幔吊香毬簾捲金鈎蘭麝靄渾金獸種葵芲接翆竹淺斟茶有一簇緑鬂佳人閑談論有㡬箇知心故友梁州閑来時画堂中描一㑹山水悶来時書房中㸔一㑹春秋茶餘飯飽閑時􅀱打一㑹􅀟陸踢㡬脚行頭駕蒼鷹飛放􅀐駿馬迢逰或暇時翫賞在秦楼調音律曲調謌謳聴一􅂀賽仙音押韵笙簧見㡬箇舞翩躚筵前展手聴一曲羽衣詞宛轉歌喉酒籌􅂯投共語佳人閑相閗酔従狂歌曲未休不弱如閬􅁐瀛洲牧羊關白蓮藕堪如意紫石榴􅀎觧酒更有那賽珍珠􅁡煎雞頭荔枝􅄴入口清香金橘􅋩消渇醒酒酒斟在玻璃盞茶傾在水晶甌隔尾笙歌繚繞音聲輳象板􅁿敲喜意酬只喫的扶上雕鞍拂衫䄂絳紗燈左右紫􅁝韁欵兠趂着這明月清凨望家走罵玉郎到家􅂻金􅁫羙女堂前􅀱一箇箇忙扶下紫驊騮銀臺上画燭明如晝笑吟吟入画堂喜孜孜觧玉環樂醄醄鬆金扣感皇恩呀擺列着羙貌嬌羞一箇箇體態温柔一箇捧着銀瓶一箇執着瑞果一箇擎着金甌茶罷時尊勸酒共佳人席上蔵䦰只喫的金斚倒玉山堆㸔一㑹錦􅆞頭採茶歌只喫的酔時休醒扶頭月移芲影玳筵収翡翆衾中成配偶銷金帳􅂻效綢繆一枝花賞雪滿長􅆰玉葉飄徧世界銀錢墜多管是敗殘鱗甲舞錯認做春去栁芲飛凍剥剥雲垂寒凛凛凨刮地採樵夫㱕路迷半􅆰中滕六裁氷遥天外馮夷剪水梁州舉頭觀山色頓老貴公子髙閤簾垂千山萬瓦如瓊砌水不知逺近山不辨髙低覇橋驢凍倒藍關馬行遅釣魚舟横纜在江溪酒家旗斜挿在踈籬亂紛紛都飛向吕蒙正破瓦窰中一片片盡飄不入党太尉飲羊羔銷金帳􅂻冷氷氷都積䟎在貧孫康冷落柴扉富家見喜列金􅁫爭塑狻猊戯慶豐年賀祥瑞常言道臘前三白壓瘴氣粉飾華夷尾呼童緊把朱扉閉画閤低乗綉幔圍擁紅爐添炭急簇紅粧開綺席只喫的爛酔如泥偎着箇羙人睡一任教敲門打扉那􅂻管下的来三尺四尺也寒不到我這錦重重鴛鴦􅀍窩兒􅂻一枝花趙太祖事杜太后天生氣浩然岳降才豪放詩追唐李杜字􅁇晋鍾王􅂀演天潢徳比乾坤量恩霑雨露香覩萱芲盡日忘憂供菽水三時孝飬如周世娱親莱子似劉朝奉母文皇梁州問安侍疾龍楼上晨昏勤懇頃刻憂惶衣􅃣不脫湯藥親甞求醫入􅃟得賢良願慈親早得平康望南山夀域陳情瞻北極星宫稽顙謁東華神廟焚章闡􅀭道塲仙經釋典都宣唱法王臨大師降一念專精感上蒼梦賜良方尾夏侯得藥非虚妄楊皡祈天遂保禳聖母安然巳無恙精神愈強夀年永昌大孝芳名兀的不萬古傳一枝花自述馮驩長嘆吁夫子絶糧困蘇秦氷雪冷蒙正破窰存四箇賢賔尚且皆由命􅄫然且受貧漢韓信伏跨淮隂魯顔回簞瓢樂飲且如我守寒囱甘貧度日耐時光陋巷安身梁州吾飬志待時進􅇩中懐武腹内蔵文言談俊雅福至三公閑時莭叙一㑹韓文栁文苦只苦英雄志怎肯深埋貧則貧凨流軆依然還在窮則窮慷慨心猶自超羣吾兄慢人有年何故沒徳行全無些仗義踈財管鮑情清濁難分尾男兒未遇時間窘得意聲名萬兩金他便是三千朱􅂂成何用且休題買臣􅀒薪韓信賜金有一日衣錦還鄊􅂊證了本一枝花急流勇退非貪鸚鵡盃不入麒麟画㡬株陶令栁数畆邵干􅀲書卷生涯甚日何年罷枉􅀅鰲背蹅下苦志􅆰學得滿腹文章至如今誤賺了盈頭白髮梁州昨日閙垓垓兵臨孟水今日冷清清草滿章華嘆興亡世事如嚼蠟則不如篘半缸緑蟻啜一盞清茶感時懐古對景嗟呀水穿雲碧玉流霞山疊翆青錦蒙紗黃菊綻猛獸睁晴紅葉落火龍退甲蒼松盤恠蟒張牙景幽静雅一輪皓月林梢掛酔後􅀅蹇驢跨稚子山妻引到家煞強如大纛髙才尾南山射虎弓蔵挿北海誅龍劍隠匣兩字功名不牽掛書房中臥咱松隂下坐咱無是無非快活煞一枝花文士待時詩書勤講習禮樂􅀙先進齊家􅀎治􅀦修已以安人務正其身孝乃人之本徳不􅀌必有隣分長㓜次序尊卑自天子至扵庶人梁州我一片心扵家為􅀦兩隻手撥霧拏雲遵天理依古禮陞階進􅇩􅁭浩浩文質彬彬先王之道亞聖之尊無半􅀧塵俗埃氛洋洋乎盈耳㢤云蕩蕩乎常懐惻隠巍巍乎貫世才文以文㑹友以友輔仁言忠信行篤敬事父母􅀎盡其孝事君王必竭其忠尾蛟龍不與魚蝦混雕鶚難同燕雀羣有一日皇家用時分青雲中奮身雲梯上步穏那其間身佩金章􅂊證了本一枝花嘆世今年老似去年昨日強如今日黄金浮世在白髪故人稀日月如飛有後軰無先軰上心来都記得今日箇暮景桑榆昨日箇春凨桃李梁州恰合眼黄粱夢覺猛囬頭滄海塵飛想少年行樂嬉逰地凨䑓月榭栁逕芲溪東城開宴南浦分題戀青楼雨約雲期不防隄老限相催嘆韶光如駿馬加鞭浮世事似落芲流水㸔人心是飛絮沾􅅺旣然省得不如咱酔而醒醒而酔過一日少一日且盡生前有限盃快活了便宜尾山妻行事多賢惠稚子為人有見識嬸子姪兒忒和氣一任他豐衣􅁕食俺怎敢瞞神諕􅀑倘若有半􅀧兒偏心到不的黒一枝花西湖賞翫黒楼舡翡翆屏錦步芙蓉榻玻璃盤堆異品瑪瑙甕漲流霞攅簇着絳蠟銀芲青玉案三綽抹紫金盃一陸児撒飄飄的羅綺香浮隠隠的笙歌韻雅梁州蒼頭奴頻揮羽扇翠眉娥低按紅牙攸攸蕩蕩湖山下恰離了錢塘門岸口早来到髙麗寺山凹岳王祠前散酒叔保塔下分茶賦詞章才子軒逹逞凨標狂客諠譁不弱如蘇東坡逰赤壁半夜扁舟杜子羙濯錦江三春釣艖張愽望泛銀河八月乗槎這荅那荅趂薫風到䖏都逰罷􅇩次羙興情灑酔眼連天見暮雅拂䄂還家尾山光緑映巾中髪波影凨揺帽上芲奉別諸公栁隂下這箇道咱哈荅那箇道咱酔呀一箇箇都挽不住絲韁扶不上馬一枝花自述錦嚢寛閑鳳琴寳匣冷蔵龍劍􅂐香消閑翆􅂦書卷廣亂牙籖欝悶懨懨青􅃈論無心念紫霜毫不待拈尫羸似老文園病渇的相如􅄫寞如居海島傷懐的子瞻梁州㸔白雲閑出岫頻移淨几愛青山正當囱不捲踈簾客房兒冷落似邯郸店心滳砕銅壷青漏耳愁聞鉄馬虚簷腸欲㫁堦前夜雨夢􅀄回屋角秋蟾一片心逺功名無甚沾粘兩隻脚信行蔵有甚拘鈐􅀴了些摧舟楫走蛟鼉鯨窟波翻行了些壊車輪􅀍虎豹羊腸路􅕑過了些連雲梯絶猿猴鳥道峯尖静中自檢事無成志不遂人情欠休拖逞且粧儉但得箇小小生涯之飬㢘甘分鱗潜尾􅀎文章㑹談論才髙反􅀍時人厭守清貧樂清閑運拙頻遭俗子嫌有一日際㑹凨雲得慿騐那時節威儀可瞻經綸得兼正笏垂紳逺佞謟一枝花相思燕泥沾白象床麝塵暗氷蚕褥螢燈照青􅃈榻蛛網掛碧紗厨一㺯兒蕭踈鏡􅂻人何䖏尊前誰是主凄凉煞錦水鴛鴦􅄫寞了雕籠鸚鵡梁州下㡬􅀧梅子雨兩行情淚蕩一陣藕芲凨数口長吁㡬般兒㸔入傷心䖏金步揺芲殘落索玉搔頭線脫珍珠蔷􅅔露羞和膩粉蘭蕋膏倦抹犀梳上粧楼一步一箇嗟吁指長亭一望一箇糊突紫香嚢徒效殷勤白紈扇􅆰題望譜錦廻文枉費工夫這的是怨女曠夫料應来錯配了姻縁簿多間阻少完聚更狠似夫戌蕭關妾在呉鳳隻鸞􅀌罵玉郎也是我孜孜攛㫁學干禄嗟往事悔當初多情却􅀍無情誤喚不出離恨天捱不出憂愁府赶不上相思路感皇恩呀􅀑病揶揄睡魔追逐軟兀刺病身軀顛不刺喬證􅀱干支刺痩肌膚沒半米歡娱分福衠一味鰥寡􅀌獨叮嚀話総虚詞長短篇成故􅁓平安信似休書採茶歌他止望八􅎛圗我貪愛七香車誰承望黄金窰變了漢相如蓍草占来多反復卦錢兒磨得字糢糊餘音並頭蓮􅆰房護子心腸苦連理枝嫩緑成隂葉未枯手抵着牙兒自猶豫㡬時得凄凉恨􅁕相思業􅁕不由我蘸緑亭前放聲兒哭一枝花懨懨懶画眉悶悶朱顔汅鸞箋􅆰疊簡玉笋慢嵯峨羞揭粧盒甚情况濃粧褁一心兒只為他推不倒心上愁山頓不開眉尖恨鎻梁州這些時病懨懨香消玉减淡勻勻蹙損􅀟蛾有詞章委實無心和銀箏懶按白雪慵歌倦拈針􅃌懶綰雲蛾不由人一似凨魔害的我伏枕沉痾他不来時喚梅香冷清清半掩朱扉数殘更碧熒熒燈昏画閤他不来時欹􅃢枕涙盈盈濕透香羅我這􅂻想他念他呆荅孩􅀝定幃屏坐懐惆悵受􅄫寞山海恩情躭坎軻知他是心意如何尾往常時紅馥馥􅊝臉如芲朶今日則黒糝糝香肌似落柯側耳擁衾和衣臥菱芲鏡打睃認不的是我憔悴形骸證不得果一枝花題蘇卿不叅懵懂禅先受荒􅁋戒􅂊離水月窟又上雨雲臺東去西来還不了衆生債更説甚􅆰是􅆰色是色搧俫呵四十八願叮嚀咒􅊎巴鏝呵五十三叅容顔變改梁州又拈着老逹磨折蘆枝浪逰海􅀦阿羅漢覔桃芲逺訪天台那􅂻問當年摩頂人何在超度了千家徒弟坐化了萬種嬰孩子落的撚香剪髮怎􅀎勾㓕罪消灾雖然鄭元和布施些錢財又好􅀅􅀟通䟽供飬在書齋你􅀅那臥房兒伽藍殿􅀵拾客院兒旃檀林布擺門面兒龍華㑹鋪排左猜右猜這湫洼怎比曹溪􅂀那菴門甚寛大但􅀅箇龎居士人兒莾注子挨把慧眼睜開尾張無盡氣狠狠待打鶯芲寨韓退之嗔忿忿敢掀番了烟月牌落得虚名滿沙界我􅀅臨川縣状責教坊司㫁隔牒配與金山販茶客一枝花勸友與朋友擇善交嘱付叮嚀記二十年同道侣衠一味好情懐這兄弟仗義踈財流落荆㐮客蹉跎􅀅􅀊月捱笋條兒㓜子􅀌单芲朶兒渾家失色梁州戀着千人寵凨塵歌妓供着他一家細米乾柴一脚兒出在門兒外他與張郎暗約李客和諧你便有石季倫豪富龎居士家財怎當他䧟人坑丈二横開更有那一千般巧計安排有錢呵和你煖烘烘􅀝翠偎紅磣可可盟山􅊎海無錢呵撇的你悶淹淹月值年災想来蠢材良言苦口君休恠一句句着人戒我與你寫做本粧就冊牢記心懐尾􅀟親白髪多年邁稚子青春出衆材終日思量􅀝門待好教他在捱右捱只㺯的水盡鵞飛恁時改一枝花趙太祖祝杜太后夀秋聲翠葉凋秋景黄芲綻秋山遥入画秋水近拖藍秋色漫漫八月蟾光湛中秋桂影寒步瑶堦綉户初開朝玉殿珠簾半捲梁州祝聖母千秋慶㑹效莱子五綵斑斕酡顔不改真堪羙三賢孝飬五福周完諸孫羅拜八節輕安享珍羞濟楚精專肅瑶宫禮数多端步瑶堦妙舞霓裳飲玄露髙擎玉盞進仙桃髙捧金盤氷絃鳳管簫韶一􅂀紅牙按仙侣交歡尾凨飄律吕侵雲漢時堪賞景堪翫王母遥臨駕綵鸞海屋籌添豈􅀎􅄸金門慶衍金枝貴顯夀禄綿綿共天逺一枝花武英雄濟世才俊􅊆封侯相虬鬚身凛凛虎背貌堂堂智勇無􅀟氣吐虹霓壮恩霑雨露香拜元戎鳳詔褒封蒙聖主龍􅂁賜賞梁州觀筆下三千字掃􅀃􅇩中百萬兵蔵上天差下忠良􅀅揮戈挽日射箭穿楊霓旌掣電寳劍含霜統雄兵獨鎮􅁁􅆠破匈奴百􅀾沙塲慣摧鋒豈譲㢘頗􅀎料敵堪追吕望善知機不亞周郎鷹􅀭奮􅀭虎頭燕頷丹心壮才髙放志髙尚千里英名震八方擁護君王煞尾黒頭早画麒麟像紫詔榮書錦繡章鉄劵論功又須降三軍世掌千鍾禄飬日日笙歌自安享一枝花賞雪漫漫栁絮飛片片梨芲落一壷天地窄四野海山髙滿􅀣瓊瑶迷却投林鳥洒歌楼酒力消白茫茫玉碾就楼臺光閃閃銀粧成殿閤梁州寒凛凛吹人羊角亂紛紛撲面鵞毛古今勝敗誰知道􅀽安扃户蒙正㱕窯一時清苦萬載名髙讀書人志氣英豪更有那三般兒堪画堪描一箇在藍橋上策馬難行一箇在覇陵橋馳驢凍倒一箇在山隂溪訪友凨騷樂陶假嘲心頭無事開懐抱且歌謳且歡咲細聴紅粧品玉簫滿飲羊羔尾吟䰟汗漫㱕蓬島酔眼朦朧却睡着嬌滳滳呉􅁎耳􅁁廂道壓折了竹稍埋沒了画橋門外青山頓然老一枝花漢卿不伏老攀出墙朶朶芲折臨路枝枝栁芲攀紅蕋嫩栁折翠條柔浪子凨流慿着我折栁攀芲手直熬得芲殘栁敗休半生来折栁攀芲一世􅂻眠芲臥栁梁州我是箇普天下郎君領䄂盖世界浪子班頭願朱顔不改常依舊芲中消遣酒内忘憂分茶攧竹打馬蔵䦰通五音六律滑熟甚閑愁到我心頭伴的是銀箏女銀臺前理銀箏咲􅀝銀屏伴的是玉天仙携玉手並玉肩同登玉楼伴的是金􅁫客歌金􅈁捧金樽滿泛金甌你道我老也暫休占排塲凨月功名首更玲瓏又剔透我是箇錦陣芲營都帥頭曽翫府逰州隔尾子弟毎是箇茅草崗沙土窩􅀄生的兎羔兒乍向圍塲上走我是箇經籠􅇁受索網蒼翎毛老野雞蹅踏的陣馬兒熟經了些窩弓冷箭蠟鎗頭不曽落人後恰不道人到中年萬事休我怎肯虚度了春秋尾我是箇蒸不爛煑不熟搥不匾炒不爆嚮璫璫一粒銅豌豆恁子弟每誰教你鑚入他鋤不㫁斫不下觧不開頓不脱慢騰騰千層錦套頭我翫的是梁園月飲的是東京酒賞的是洛陽芲攀的是章䑓栁我也㑹圍棊㑹蹴踘㑹打圍㑹挿科㑹歌舞㑹吹弹㑹嚥作㑹吟詩㑹􅀟陸你便是落了我牙歪了我嘴瘸了我腿折了我手天賜與我這㡬般兒歹症􅀱尚兀自不肯休則除是閆王親自喚神􅀑自来勾三䰟㱕地府七􅅎丧㝠幽天那那其間􅂊不向烟芲路兒上走一枝花醜齋自述生居天地間禀受隂陽氣既為男子軆湏入壮俗機􅀁事堪宜件件可咱家意為評䟦惹是非折莫煞舊友新知􅂊見了着人咲起梁州子為這外貌兒不中擡舉因此上内才兒不得便宜半生未得文章力􅆰自古􅇩蔵錦繡口吐珠璣只争奈􅁅容土貌缸齒重頥又兼着細眼单眉人中短髭鬂稀稀那􅂻陳平般􅃣玉精神何晏般凨流面皮那􅂻取潘安般俊俏容儀自知就􅂻清晨倦把青鸞對恨殺爹娘不爭氣有一日黄榜招収醜陋的准擬奪魁隔尾有時軟烏紗抓剳起鑚天髻乾皂靴出落着簌地衣向晚乗閒後門立猛可地咲起似一箇甚的恰便似見世鍾馗謕不殺􅀑牧羊闗冠不正相知罪貌不􅀭怨恨誰那􅂻也尊瞻視貌重招威枕上㝷思心頭怒起􅆰長三十􅀊暗想九十回恰便似木上節難鎊鋸胎中疾沒藥醫賀新郎世間􅀎赱的不􅀎飛饒你千件千冝百伶百俐閑中觧盡其中意黒暗地自恁觧釋倦閑㳺出塞臨池臨池魚恐墜出塞鴈驚飛入園林􅀫鳥應回避生前難入画死後不留題隔尾寫神的要得丹青意子怕你巧笔難傳造化機不打草兩般兒可同􅀋法刀鞘依着格式粧􅀑的添上嘴鼻眼巧何湏做様比哭皇夭饒你有拏雲藝冲霄計誅龍局段打鳳機近来論世態世態有髙低有錢的髙貴無錢的低㣲那􅂻問凨流子弟折朱顔如灌口貌賽神仙洞賔出世宋玉重生沒荅了鏝的夢撒了寮丁他采你也不見得枉自論黄数黒談􅀃是非烏夜啼一箇斬蛟龍秀士為髙第升堂室今古誰及一箇射金錢武士為夫婿韜畧無敵武藝深知醜和好自有是和非文共武便是傍州例有鑒識無嗔諱自芲白寸心不昧若􅀃謊上帝應知収尾常記的半囱夜雨燈􅀄昧一枕秋凨夢未回見一人請相㑹道咱家必髙貴既通儒又通吏既通踈又精細一時間失啇議既成形悔不及子教你請俸給子孫多夫婦宜貨充盈倉􅅒實禄福増夀􅄸齊我特来吿你知暫相別恕情罪嘆息了㡬聲懊悔了一㑹覺来時記得記得是誰元来是不做羙當年的揑胎􅀑一枝花買咲銀箏暗麝塵錦瑟􅆰檀架青鸞臨寳鏡丹鳳隔烟霞同是天涯休辜負春無價可憎它誰不誇明出着月夜芲朝􅆰􅄫寞鴛幃綉榻梁州無人暖羅衾易冷漬啼痕􅃢枕偏多夢囬酒醒添瀟洒昏􅃤􅃤􅀌燈羅幌淡濛濛斜月囱紗却想羙甘甘􅀹雲殢雨喜孜孜倒鳳顛鸞便是鉄石人也感嗟呀休道是俏心腸所事兒通逹見別人有破綻着冷句兒填扎見別人生科泛着咲話兒逼匝見別人乾厮研着假意兒承荅放奸放耍我子待儘田園都准做千金價一見了􅃞不下據旖旎凨流俊雅更有誰如他三煞慿温柔舉止忒如法論恩愛踈薄却有差你子待這回雲雨殢巫峽一任教眉淡了春山也不要張京兆輕盈巧画陡恁地變了卦陽臺路新来下了面閘要戀那談咲生涯二煞􅀎清歌妙舞捱時霎㑹受諢承科度􅀊華就着這其間覷㸔你的甚叅雜㨂一箇可意的􅁈家酩子􅂻由伊驅駕更有行止不謊詐肯的舒心兒便許咱我古自未敢道真假尾怕你肯不肯回我句真實話可休是不是􅆰教人􅃌􅀧細尋思再想咱好前程不是耍由你徹骨的娘透了的那疑惑心那有半米兒争差可敢錯繫了緑楊門外馬一枝花行樂十年􅀅黄卷習半世把紅粧贍向鶯芲􅂣上走􅀅凨月担兒拈本性謙謙到處干凨欠人􅀅名姓􅥦道麗春園重長箇羲之豫章城新添箇子瞻梁州酔醺醺過如李白樂陶陶勝似陶潜春凨和氣咱獨占朝雲画棟暮雨朱簾狂朋恠友舞妓歌􅁎喜孜孜詩酒相兼争知我愁􅄫寞悶似江淹也不怕偷寒送暖俫禽也不怕棄舊憐新女慊也不怕愛錢巴鏝娘嚴非咱􅃌􅀧平康巷一歩一箇深坑塹凨波險令人厭門掩半安排粗棍掂有舌無甜尾棟梁才怎受衠鋼劍經濟手難拏桒木杴堪咲多情老􅀟漸江洪茶價添醜馮魁正忺見箇年小的蘓卿望凨兒閃一枝花登第春凨滿鳳城麗日明金殿瓊鈎垂翡翠別是一重天碧玉堦前御賜瓊林宴列笙歌動管絃賀昇平家國安然保社稷江山乆逺罵玉郎見如今干戈寍息無征􅀾絶士馬罷狼煙君臣慶喜黄金殿紫金盃白玉斚頻頻勸感皇恩呀願福夀􅀟全宇宙洪堅滿朝中都稱賀太平年民安􅀦泰君聖臣賢今日箇聚賢臣登寳殿肆開筵採茶歌一隊隊舞翩翩樂聲喧歌謳宛轉韻攸􅀭一曲陽春聲漸逺恰便似和鳴巒鳳下雲軒一枝花竹夫人紗厨只自眠蘄簟和誰共客窓人静悄簷外馬丁東好夢難同夜永愁偏冗披衣䇿短笻明月下醉眼閑画堂中吟肩痩聳梁州見青奴亭然獨立使蒼童抱過相􅀙同床共枕如鸞鳳賜夫人名號有君子家凨湘川後裔渭水名宗喜綢繆志節雍容歴凨霜肌骨豊隆一千般可意着人一時間􅃌􅆰話􅆰一團兒剔透玲瓏心聰性聰知卿本是龍孫種厮敬愛厮陪奉睡徹東窓日影紅彼此西東尾凉侵肌體添情重清透心脾引興濃只恐金凨等閑動那時節不中咱人心不同且倒鳳顛鸞再三寵一枝花蚊䖝妖嬈軆態輕薄劣腰肢細窩巢居栁陌活計傍芲溪相趂相随聚朋黨成群隊逞䡖狂撒殢滯愛黄昏月下星前怕青宵凨吹日炙梁州毎夜家穿楼䑓蘭堂画閤透簾櫳綉幙羅幃悵嗡嗡喬聲氣不禁拍撫怎受禁持厮鳴厮咂相抱相偎損傷人玉軆氷肌殢人嬌並枕同席痩伶仃腿似蛛絲薄攴刺翅似莩􅁅快稜曽嘴似鋼錐透人骨髄滿口兒脗下胭脂記想着那痒撒撒些滋味有你時㡬曽睡到眼底到強如蝶使蜂媒尾閑時節不離了芲香栁影清隂􅂻睡悶時節則就日援凨和葉底下依不想痩軀老人根前逞精細且休説香羅䄂􅂻桃芲扇底子怕你露冷風寒恁時節悔一枝花惜春奪殘造化功占㫁繁華富芳名喧上􅁐和氣滿皇都論春秀誰如一任教浪蕋閑芲塢正是㫁人腸三月􅀄本待學煮海張生生扭做逰春杜甫梁州齊臻臻珠圍翠遶冷清清緑暗紅踈但合眼夢􅂻㝷春去春光堪画春景堪圗春心狂蕩春梦何如消春愁不曽兩葉眉舒殢春嬌一􅀧心酥感春情来来往往蜂媒動春意哀哀怨怨杜宇亂春心喬喬怯怯鶯雏春光怎如緑囱猶唱留春曲怎肯把春􅀒長要春凨酔後扶春梦似華胥尾休躭閤一天栁絮如綿舞滿地殘芲似錦鋪九十日春光等閑負雲囱月户狂凨驟雨休沒亂殺東君做不得主一枝花惜春春雲畫閣低梅瓣瓊英落曉光浮緑野草色翆盈郊鶯語般調㫁送凨光好隔墙聲􅀹自巧道逰人莫惜千金春色漸三分過了梁州海棠睡嬌容似酔栁凨􅁿緑線如繅輪蹄碾破青青草酒家何處沽斾招揺画船無数舞䄂翩躚凨流殺鳳管鸞簫多情殺翠髻雲翹梨芲院愛月眠遅杏芲楼惜芲起早桃芲庄覔句相嘲鬂角二毛曉来鏡􅂻都知道忽忽的又過了年少苦凨驟雨昨夜惡恐一片芲飄尾緑隂繁漸漸春光老玉壷暖遅遅夜月髙九十日光隂􅀎有㡬日􅀏朱簾放下着綉幙垂低着休教那攪春梦的呢喃燕来了一枝花白蓮瑶池施素粧洛浦誇清景廬山傳絶艶太華擅髙名秋水澄澄洗得胭脂净淡梳粧百媚生裁剪下雪賦香柔包含盡凨清露冷梁州縦不是虢􅀦女承恩楚壼多管是太真妃出浴華清水雲鄉喧滿秋娘性也不羡紅粧翠盖金屋銀屏鉛華絳彩綉珞珠瓊他子待占秋江獨歩傾城􅀝秋江壓盡繁英他生的臉兒媚脉脉盈盈他生的腰兒細凨凨韻韻立的箇影兒􅀌嬝嬝婷婷這箇可人晚凉睡殺鴛鴦頸與秋月淡相映天遣姮娥下太清来赴蓬瀛么煞滿池玉蕋連枝􅉷一片瓊葩徹骨清緑楊影􅂻画舡􅁿一派歌聲十里波光如鏡俺本待閑遣水雲興􅀍藕􅁝嫩把柔腸厮繫定越教人惹恨牽情随尾休只管粧添澤􅀦三秋景我只怕狼藉江鄊一夜氷雖宜同根㘽並蒂生受了些蓮心苦割不㫁蓮理情若不是採蓮人他把你在手掌兒􅂻竒擎我怕那西凨明日起吹的你淩波韈兒冷一枝花儒正伯牙志未諧遇鍾子心􅀎觧使髙山羣虎嘯要流水老龍哀洒落􅁭懷一􅀏乾坤大髙談雲霧開㡬行北鴈吞聲一片西山失色梁州無人我驚心句險有江山􅆰日烟埋相逢盡是他鄉客我淹呉楚君顯江淮雄逰海嶠挺出人材萁裘事業合該簮纓苗裔傳来大胸􅁭進履圯橋壮逰翫乗槎大海老凨波走馬章䑓千載後代子孫凨流多半態見了他豪邁玉有潤難明借月色出落吾儕尾向管中窺豹那知外坐井底觀天又出来運斧班門志何大出削箇好歹但成箇架格未敢望􅀅如梁棟材一枝花秋蝶數聲􅀌鴈哀㡬􅀧昏雅噪桂芲随雨落梧葉帶霜凋園苑蕭條零落了芙蓉蕚見一箇玉蝴蝶軆態嬌描不成雅淡凨流画不就輕盈痩小梁州難趂逐鶯期月夜怎追随燕約芲朝栖香覔意誰知道春光錯過媚景輕抛虚辜艶杏忍􅀒夭桃梦䰟杳不在花稍精神懶豈觧争髙喜孜孜翠䄂兠籠嬌滴滴玉纎捻掿􅀏吟吟羅扇招揺替它暗約秋深何處生芳草殘菊􅁁且明閙不似姚黄魏紫好忍􅀒良宵尾聲金凨不念香􅂡少玉露那憐粉翅嬌凨露催殘冷来到艶陽時過了暮秋天怎熬􅀅一捻兒香肌㫁送了一枝花安慶湖雪夜荒陂寒鴈鳴逺􅀣昏雅噪㫁雲淮甸闊殘照楚山髙古岸蕭蕭敗葦折蘆草穿林荒徑小水村寒犬吠柴荆梅嶺凍猿啼􅀣梢梁州野烟暗迷合渡口漁燈明照破江臯溪􅁁望罷㱕村落野塘蕭索暮景􅄫寥半間草厦一榻平橋冷清清伴我蕭條到黄昏惡限􅂊交恓惶運環海般相連煩惱郷石城般圍遶離愁陣鉄壁般堅牢怎生得逃百十般無計把凄凉傲愁恰去悶来到愁和悶共凄凉厮􅆞􅌳不離我周遭三煞安排下􅀌悶供詩料収拾下閑愁注酒瓢假開懐只飲的酔醄醄獨擁衾禂都忘盡傷懐抱􅂊睡羙又還閙籬畔篩凨竹韻敲驚梦無聊二煞破窓鳴雨霰凨猶惡漏屋垂氷殘凍未消梦囬酒醒越難熬萬籟皆鳴更一􅀧殘燈斜照供愁恨獻煩惱􅀍思慮憂愁厮渾着年少貌潜消尾黄昏時春色生容貌青鏡曉秋霜􅀧鬂毛愁雖是多恨也不少衰了潘容痩了沈腰鏡􅂻端詳心下暗約端詳罷怎不教我心焦只一夜勝添十􅀊老一枝花方士白雲留故山曉月流清澗西凨吹渭水落葉滿長安龍虎痴頑正要別真贗都来方寸間内丹成未飲刀圭宦情逺不登仕版梁州無中有嬰兒姹女有中無火棗金丹温温鉛􅂦清光爛一泓水静一片雲閑一輪月滿一􅀧神安㫁七情寳劍光寒避三尸午夜更殘秘天真離坎交馳縦玄㫖乙庚配綰錬希夷金木間關藥欄􅀊晚黄精滿地和烟㨂安排净蚌珠燦耿耿靈䑓照夜䦨去蕙留蘭尾辨清濁不在青白眼誇懸觧何勞道士肝銀海澄澄洞諸幻快還九山滿地松凨洞天晚一枝花􅀌悶芲稍消杜宇魂藕􅁝繋鴛鴦足春凨丹鳳􅃗月夜翠鸞􅀌對景蕭踈􅆰憶如簧語最添心上苦冷清清沉水香殘昏慘慘燈芲穂吐梁州東墙女􅆰窺宋玉西廂月却就崔姝便休題月下老烟縁簿凨流偏阻好事多辜藍田隠璧滄海遣珠桃源洞山谷﨑嶇陽䑓路雲雨糢糊書房中勉強韓香蘭房内生踈鄭五涇河􅁁不􅀉龍書怨苦自􅂑世間情知他是甚娘般物自嗟嘆静思慮直教栁下恵開門不秉燭薄命寒儒尾一天愁㝷殺裴生杵千􅀧淚啼斑湘女竹一輪皓月當窟正隠在雲霧量半幅素楮訴不盡燕燕鶯鶯半分語一枝花女怨慵輔翡翠鬟懶暈胭脂頰寸心愁萬􅈁滿腹恨千疊獨對西凨倦把黄芲折幽庭閑歩蹀紅葉飛来我􅀅這相思字寫玉嬌枝那人家薄劣故把雕鞍鎻者廢千金要買閑凨月真眷愛等閑撇情懐欲言何處説一星星都向琵琶瀉若有知音聴徹應也青衫揾血烏夜啼黄昏快快㱕蘭舍還又是夜来時節枕衾寒難捱如年夜可慣離缺受恁磨折金盤火冷􅂐烟絶銀䑓燭盡燈芲謝月下砧凨前鉄敲碎人腸㡬曽寍帖閗鵪鶉薄幸多應今宵酔也謝舘秦楼偎香􅀝雪不信伊家不耳􅀬俺好痴俺好呆怎恁今生天慳運拙賺煞尾則聴的南楼上禁鼔敲三歇擁􅀍和衾強睡些業眼朦朧暫交睫唱道是欲睡還驚驀聞的門兒外簾兒揭俺喚則他来到出門接元来是凨度竹筠篩翠葉一枝花合箏酒酣春色濃簾捲芲隂静佳人嬌和曲豪客酔弹箏心與手調停歛􅃑帶絃􅀄定鴈行斜江月影搊銀甲􅃌撥䡖淸按金􅈁歌謳数聲梁州第七歌應􅃌似林鶯嚦嚦􅃌随歌似山溜泠泠同聲相應梁州令滴銀盤秋雨敲玉􅀣春氷恰壮懐慷慨又私語叮嚀迸瓊珠萬顆瑽琤間驟珠一串分明恰便似卓文君荅撫琴相如黄念奴伴開元􅔧寕小單于學鼓瑟湘靈繹如以成遲疾纎巧随摳搯無些病腔児穏字児正一對児合得着綢繆有情效鸞鳯和鳴尾煞強如泣琵琶淚濕青杉上冷彷彿似鸚鵡聲訛錦罩内聴洗得平生耳根浄凨流這生乞戯可憎我便有陶學士鼻凹也下不得絣一枝花王春泉贈江東史廷直真踈狂李太白多慷慨郭元振擅清髙徐孺子不驕貴孟嘗君守道安貧任匣中紫電􅀟鋒鈍愛座上青毡舊物存脚踪児不􅄐了凨月詩壇心坎児長揣着江山畫本梁州逢英俊捫虱談當世之務遇相知割鷄奉養育之親把乾坤造化包羅盡少微䖏士太古遺民林泉􅈗相蓬島仙人這四家児堪與為隣有三般児果是超群歌一聲雄壮如周公瑾徃昔喉嚨畫一筆遒勁似黄子乆當年妙品書一行彷彿同蘇東坡舊日精神芲尊酒尊卧痴楼四季長安􅉐陪賞鑒助評論縦有朝雲共綵雲不換白雲尾喜的是一門兄弟皆誠信来的是四海交逰總縉紳􅄑生在虎踞龍蟠建業那仰頼着唐虞至尊皐䕫大臣容放你箇再出世巢由快活􅀮一枝花情雜粉雲香臉試搽翆胭膩眉學画紅酥潤氷笋手烏金漬玉粳芽鬂攏宫雅改様兒新鞋韈挑粉垢修􅃌甲収拾的􅀁事温柔粧􅀧的諸餘顯恰梁州堪􅀏這沒分曉的媽媽則抱的不啼哭娃娃小心兒一見了相牽掛腿厮捺説話手厮着行踏額厮拶着作耍腮厮揾着温存肩厮挨着和曲琵琶尋題目頂針續麻常子是􅀏沒盈弄盞傳杯好吃䦨同床共榻􅀬魔羅過飯供茶那些喜呷天来大恠膽兒無些怕這些時變了話小則小心腸兒到狡猾顯出些情雜罵玉郎但着些頭疼腦􅀬我早心驚訝着疼􅀬只除咱尋方褁藥占􅀛卦直到喫得粥時􅂊離臥榻恰撇的心兒下感皇恩㸔承似羙玉無瑕誰敢做野草閑芲曹大家賣杏虎裴小蠻學撒撇温太真索粧蝦麗春園扎撒鳴珂巷南衙見而今如嚼蠟似咬瓦若摶沙採茶歌喜時節臉烘霞笑時節眼生芲一霎時一天凨雪冷鼻凹本待做曲律木的車兒随性打元来是滑出律水晶毬子怎生拏一枝花省悟春凨栁吐金夏日荷鋪錦秋蟾輝碧漢冬雪老遥岑四季光隂終日尋芳飲竒芲㨂􅃟簮曽共知音受了些雲屏月枕梁州俺也曽腿厮壓齊聲兒和曲頭厮頂難字兒閑吟審思年少如春梦傳書􅀉簡剪髪撚沉盟山海誓觧珮遺簮也曽待佳期到夜半更深度良宵翆􅀍鴛衾俺如今腆着臉百事兒粧憨低着頭凢事兒撒吞睁着眼􅀁事推䏊聦明待怎藍橋一任洪波浸但飽䁔且随恁始覺􅀙前枉用心再不追尋餘音俺􅀅那眠芲臥栁性全禁惜玉憐香心不侵便就是普救寺麗春園待怎生自今自今都把這俏倬家風脱與恁一枝花東湖纎雲曵曉紅逺􅀣團晴翠好山如鳳尾新水似玻璃巧画屏幃壮觀蓬萊地東湖景最竒兩三行鷗鷺清閑七十二峯巒秀羙梁州露寺僧吟翆㣲月波楼客宴金盃寳華䑓殿松隂蔽赤䦨橋畔想像瑶池金沙路上勝却蘓堤若東坡到此逰歴向西湖懶把詩題學士廟紺宇朱扉觀音洞金堂玉室宰相家翆竹清溪㑹稽鑑水賀知章謾奨多佳致放舡去在天際楊栁凨䡖生浪遅􅃞動玻璃餘音喜的是供盤鯽銀􅁝鱠愛的是對酒名芲錦繡機荷香滿衣酒酔似􅅺落照時漁歌唱起棹蒼烟乗興而囬煞強如誤入桃源洞天裏一枝花湖上㱕長天落彩霞逺水涵秋鏡芲如人面紅山似佛頭青生色圍屏翆冷松隂徑嫣然眉黛横但携􅀅旖旎濃香何必賦横斜痩影梁州挽玉手留連錦􅎆據胡床􅃌􅀧銀瓶素娥不嫁傷􅀌另想當年小小問何處卿卿東坡才調西子娉婷総相宜千古留名吾二人此地􅀻行六一泉亭上詩成三五夜芲前月明十四弦􅃌下凨生可憎有情捧紅牙合和伊州今萬籟􅄫四山静幽咽泉流水下聲鶴怨猿驚餘音更那堪岩阿禅窟鳴金磬波底龍宫􅃞水晶夜氣清酒力醒寳􅂐銷玉漏鳴咲㱕来彷彿有鼓二更煞強如踏雪尋梅覇橋冷一枝花別啇友江山眼界寛湖海胸􅁭傲郷􅀖聲譽羙寰宇姓名髙劍氣冲霄翆竹蒼松操瓊林玉􅀣標吟的是杜陵詩泣􅀑驚神寫的是羲之字連真帶草梁州習詩禮門凨逺播紹箕裘家世豊饒衣􅃣典雅多竒妙威儀秀整人物英豪􅁭懐瀟洒氣質飄颻也曽伴髙朋芲底聞韶也曽㑹佳賔月下吹簫也曽樂閑情玉斚吞蛇也曽消閑悶金丸墜鳥也曽好閑逰寳箭驚雕不矜不驕五湖勝覽人年少徳量寛心􅅐浩四海名人廣故交氣壓時髦尾論文正好同談笑判袂應嗟兩棄抛餞送郵亭馬當道送行盃舉着贈行詞唱了眼睜睜西出陽關故交少一枝花別友衣􅃣家世雄詩禮門庭壮髙凨聞上國羙譽播遐􅀖四海名商文􅁐稱宗匠詞林壓等行也曽㑹詩朋芲圃吟嘲也曽􅌽酒友蘭亭宴賞梁州第七蒙青眼頻加㸔視羡白眉到處稱􅀭雍容典雅儒􅃣様􅁭懐洒落器宇軒昻品題凨月裁剪氷霜販金珠湖海徜徉載琴書京􅀦翶翔話交逰志懇情堅推噐識才髙意廣論聲華珍重名香髙朋過訪清樽談􅀏陶情况鮑叔情田文量富比陶朱世代昌良價􅀷蔵尾㡬畨家金􅁫勸酒情無曠朱履論文志不忘似這般愽古通今有誰像論契友山髙水長􅀙識面年来􅀊徃教小生北斗相瞻泰山仰一枝花挽妻蘭房物巳􅆰􅈍帳人何在愁雲迷綉榻怨霧鎻粧䑓天降㐫災􅁫頭鳳􅀟分壊鏡中鸞兩下開三十三耗散了杳杳三䰟七月七沉淪了攸攸七􅅎梁州第七好教我嘆箕箒􅆰閑地上慕糟糠不下堂来痛的是半途夫婦抛恩愛再不􅀅孟光案舉道藴詩裁都只把温郎鏡掩卓氏車埋想着我讀書時緝麻陪良夜虚齋赴筵時引燈迎明月􅆰堦撇下那白生生一柄兒獨舉氷紈撇下那小可可㡬對兒親穿繡鞋撇下那細亭亭兩隻兒舊戴金􅁫想着你幽閑性格常依婦道遵閨誡内助賢有誰賽善事公姑孝不衰誰承望修短合該尾聲今日箇則落的一堆黄土香肌盖三尺荒坵玉骨埋撇下箇五􅀊嬰兒怎􅀅帶説起来悲愁滿懐題起来容顔變色端的是此恨綿綿甚時得觧一枝花詠劍離匣牛斗寒到手凨雲助挿腰奸膽破出袖􅀑神伏正直規模香檀杷虎口􅀟吞玉沙魚鞘龍鱗宻砌珠掛三尺壁上飛泉嚮半夜床頭驟雨梁州金錯落盤芲扣掛碧玲瓏􅍢玉粧束羙名兒今古人爭慕弹魚􅆰舘㫁蟒長途逢賢把贈遇寇即除比鏌鋤端的全殊縦干􅀅未必􅀎如曽遭遇諍朝䜛烈士朱雲􅀎回避嘆蒼穹雄天亡羽怕追陪報􅀻讐俠客專珠價􅀌世無数十年是俺家蔵物嚇人䰟射人目相伴着萬卷圗書酒一壷遍歴江湖尾聲􅀏提常向尊前舞酔觧多􅀙醒後贖則為俺未遂封侯把他乆擔悞有一日修文用武驅蠻静虜好與凊時定􅁁土一枝花樂閑常尋覇岸梅静理桐江竹厭㸔青􅃈論懶上皂嚢書心古形臞但身在貧無慮喜豊年賦有餘愁的是搜㝷着㡬遍徴宣追趕着三畨薦舉梁州喜泉水暗通蔬圃愛雲山正對茅廬客来山鳥頻驚惧新収野果舊醸醁醑宜時嫰蕨墜釣鱸魚肚皮寛儘自粧愚眼睛髙不肯容俗服青精煉丹砂修飬天和買耕牛鎔寳劍消磨英武缷烏紗戴綸巾學盡村夫假駑詐魯傲􅁭懐不入時人目恥趋權陋阿富習就林泉禮法踈豈待別圗尾聲枕琴聴雨湘簾􅉡信步㸔芲短杖扶有時節爛醉㱕来近薄暮蘆芲􅀍欵鋪任􅋜􅋜睡足強似恁午夜鍾聲頻催促一枝花重九天􅆰碧水澄木落青山痩籬寒黄菊晚瓮暖緑醅熟􅀊月如流􅅻過了中秋後又重陽九月九染秋容紅蓼丹楓添秋色殘荷敗栁梁州散􅀌悶閑㝷野寺快離懐逺眺江楼凭髙一覽江山秀山形北拱水勁東流綿綿極浦滚滚滄洲白鷺洲二水攸攸鳳凰䑓百鳥啾啾覔得根羊􅅩子軟琅璫愽帶垂腰借得條􅁑仙翁彎曲律青藜在手㝷得箇孟叅軍腌刺荅破帽籠頭放開笑口對西凨滿把黄芲嗅􅋍吟肩妥吟袖自把陶詩細和酬景趣窮搜罵玉郎凨光厮把人迤逗携罇爼約朋儔江郷禾􅁰秋成後剖金橙味尚酸薦黄雞膘正肥擘紫蠏黄初溜感皇恩到大来心上無憂身外無求管甚麽三畧法立興了周一聲歌平散了楚萬言策坐安了劉趂着天清氣爽雨霽雲收逢僧舍過酒家便遅留採茶歌見鷗鷺放中流覩鴻鴈起蘋洲牧童横笛倒􅀐牛㸔了這錦繡川原紅􅀣晚端的是一年好景譲三秋尾一箇向東華鍾鼓常聴漏一箇為南􅀦蓴鱸便駕舟兩般兒我叅透幹功名枉生受得清閑怎􅀎勾遇晴明好時􅀱與村翁共林􅅱登髙䑓陟逺岫酒腸寛詩骨痩到老􅀟眉不曽皱欵段馬犯紅塵不􅌻粗布􅂁見時人怕醜只慣向傍水沿山路兒上走一枝花竒遇嬌滴滳千金玉軆輕窄弓弓半虎羅鞋㜞長􅍴􅍴兩彎眉黛巧顫巍巍一搦栁腰纎禮数謙謙歌白雪櫻唇艶撥檀槽春笋尖俏儀容燕燕堪同羙聲價鶯鶯不忝梁州那裏有一毫兒破綻端的無半米兒憎嫌温柔瑩潔絶瑕玷宜嗔宜喜知恥知㢘諸餘可愛􅀁事相兼惹的些􅁡蜂兒攘動雕簷引的些蝴蝶兒飛近粧奩恨子恨㱕去後珮聲兒􅆰舘遥聞喜子喜相見時脚歩兒殘紅半掩愁子愁別離間唾津兒香帕猶粘意忺語甜知音不是恩情欠恁蘇卿俺雙漸瞞不過慣打聴凨聲阿母嚴步步拘鈐尾聲丢不開放不下難成合繾綣終常念染之重感之深無倒㫁相思即漸添有一日軟玉温香許咱贍放下芲撲撲繍簾偎着喜孜孜杏臉恁時莭方􅂊把撥雨撩雲的意収歛一枝花夏日寫懐正楊栁成隂覆短墙恰荼䕷噴雪迷深巷􅂊荷葉㺯青浮水面又芭蕉分緑上晴囱窄窄書房自一種清閑况小壷天詩酒郷舞青衣童子􅀟􅀟歌白雪佳人兩兩梁州冷清清溪泉潄玉細茸茸庭草生香㡬般兒陳設多竒壮刻獸面南金􅂐􅂦碾羊脂郢玉壷觴展魚浪蘄藤榻簟織􅀛紋蜀錦琴嚢樂天真頗􅀋羲皇友金蘭不比髙陽有時節撚吟髭俯雕䦨聴枝上蝉鳴有時節敞吟袍揮羽扇納凨前晚凉有時節􅀝吟屏鈎湘簾㸔雨後山光鎮長見訪都是些布衣詞客儒林相那踈狂那豪放酔倒青罇送日長品藻興亡尾論奢華評富貴休題太尉銷金帳数清標誇雅淡絶勝裴公緑野堂端的是半􅀧紅塵不容傍或是寫黄庭㡬行或是詠離騷半晌一任他世事榮枯似翻掌一枝花道情公行天理明􅀻意人心暗古書讀未了世事飽經諳圖甚麽貪婪名利境多坑䧟羡青門􅀲正甘園林茂堪置幽居山水秀真為勝覽梁州流水遶一村桒柘亂山圍四壁烟嵐顛峯倒影澄波蘸遥岑疊翠逺水揉藍鳶飛鷺落魚躍深潭􅅯怡塲水府山岩安樂窩土洞石龕景不嫌物少人稀食不厭茶渾酒淡家不離水北山南有何不堪籃輿到水輕舟泛稼穑外得時暫閑飲漁樵酒半酣闊論髙談三煞乾坤向漁父波中渰日月在樵夫肩上擔處羲皇巳上有何慙􅀅萬物包函至潦倒終身無憾與時軰作􅀛鑑晦跡韜光蠒内蚕再不開緘二煞崑崗隠玉石中嵌蛤蚌含珠水底渰樊籠得脫再誰監一味清閑雖楚漢􅀿難揺撼懶子懶不愚濫把道潜心静􅂻叅樂及妻男尾岩穴中虎惡由人探飽暖外身輕體自安我􅀅智飬做愚飢忍住餓携酒一壷提果半籃引的詩興濃􅽓得酒徳憨教野􅅱扶命稚子􅍴􅀝松立絶頂巉岩􅄏酔眼㸔人呆大膽一枝花道情盟山土底埋誓海波中渰烟芲情意足凨月債難擔情理難甘子弟每常和俺賽兒中閗厮􅍴巫山下􅁓糊鍬钁陽䑓上開荒劍砍梁州也曽慣錦貂芲溪泛舸當金鞭栁巷遺簮錦箋寫恨寳靨留香覔仙停驂悲歡離合多經賺分􅁫破鑑觧佩遺簮洞府山岩㝷神女在虎窟龍潭岳陽楼鄭子紅綃藍橋驛裴航錦船琵琶亭司馬青衫自羞自慘東凨吹得行雲淡鏡􅂻似霜糝一枕青楼夢已酣總付髙唐三煞光隂迅􅄩實傷感時務翻騰百不堪功名一線我傷慙四海交逰飄零的不知明暗黙黙的自􅂑勘眼底渾無一二三流落在江南二煞再不喚行院每逗鏝家中探粧旦的開山門上叅粗􅂁大笠且粧憨不是痴換抄着手傍􅁁搠渰唆朗末聴撒欠撚渲處踅来􅅶定喒碎臠零㗖尾年来頓覺精神减老去常教妻子嫌翠紅鄉口緊緘鶯芲寨眼下饞惡凨波怎揺撼閑是非不招􅄃惜芳心莫我貪踈狂性再誰敢傚何郎枉撒暫病軀老巳抱藍老􅀟漸儘打憐小蘇卿便張喊過中年徃事經諳消磨盡少年凨月膽一枝花冬雪朔凨狂撼地軸同雲布埋天際唯聞千􅀣吼俄視六芲飛凛冽寒威暮景冬天氣只疑春欲回舞飄􅀭栁絮迎凨亂零落梨芲滿地梁州一漫兒不分乾坤上下半合兒難辨途路髙低凍枝頭那􅂻覔梅芲蕋􅀅寒枝壓損把凍􅀣深培望前村惆悵􅁃嶺徘徊一㑹家撲簌簌亂撒珠璣只疑是白茫茫倒瀉瑶池端的是退之馬藍闗外失路難行浩然驢㶚陵橋迷踪怎􅀐子猷舡剡溪中阻興而㱕不曽暫息却便似耍鵞兒萬萬千千對搧粉蝶舞凨戯密洒歌楼酒力㣲不許停盃三煞亂飄僧舍茶烟濕深壅樵岩古徑迷漁人披定玉簑㱕纔罷釣収輪向灘􅁁􅀅扃舟㝷覔吕蒙正在破窰内撥盡寒爐一夜􅁅展轉傷悲二煞嚴凝冷透孫康室料峭寒侵顔子扉長安酒價倍増十文君忍凍當爐司馬敲氷滌􅄊嘆周瑜怎題壁張儀蘇秦強不的繚繞􅆰回隔尾這的是潤􅀦家天降真祥瑞濟􅀺庻皆無苦病疾一糢糊約三尺望逺沙鷗鷺栖非丹青即水墨有粧欒有画飾􅀙盤古立天地是有豪奢富貴城池也無那瓊世界玉乾坤銀社稷一枝花収心一生酒􅂻眠半世芲中走惜芲頻浄臉愛酒懶梳頭酒病芲愁芲共酒相迤逗酒和芲厮趂逐㸔芲時㺯盞傳盃殢酒後眠芲臥栁梁州芲送了些青春子弟酒老了些白髪公矦不知芲酒無成就芲枝無敗酒債無休芲􅄏爛熳酒滿金甌怎做的芲酒忘憂畧相別酒内神仙永厮􅄐芲間故友酒和芲一筆都勾􅀙今後罷手早則不為芲為酒干生受􅀙来芲酒不堅乆只管裏戀酒迷芲甚日休早則箇葉落㱕秋尾􅀙今再不因芲痩以後如何為酒愁芲酒中間盡叅透若要省憂省愁再不簮芲更殢酒一枝花休官不戀蝸角名豈問蠅頭利世情堪冷暖人面逐髙低閑是閑非僻掉的都伶俐百年身圗画􅂻本待要快活逍遥情願待休官罷職梁州誰待想錦衣御食甘心守淡飯黄􅐽向林泉􅃟一荅兒清幽地閑時一曲悶後三盃柴門草户茅舍踈籬守着咱稚子山妻伴着㡬箇故友相識毎日家咲吟吟談古論今閑遥遥逰山翫水樂陶陶下象圍棋早起晚夕喫酔了重還酔嘆白髪緊相逼百􅀊光隂􅀎有㡬快活了是便宜煞尾都則是兩輪日月搬興廢一合乾坤洗是非直宿到紅日三竿􅅯然睡那些兒况味誰知一任鶯啼喚不起一枝花芲酒芲堪消遣愁酒可相酧醉一生芲裏臥半世酒中迷芲酒相随芲共酒相牽繫酒和芲不暫離酒胆大漸漸踈狂芲星照重重見喜梁州但坐處一簇簇芲濃酒艶但行處一步步翆遶朱圍論凨流無妙咱為最分茶攧竹下象圍棋吟詩課賦蹴踘投壷萬千般笑耍曽習比古来俊者肩齊我有那鄭生􅀼玉權術韓夀偷香見識潘安擲果心機據着俺志氣交友名聲見我連忙退慿寫染仗才藝不弱如東坡黄魯直小可誰及尾琴棊書画般般兒㑹歌舞吹弹件件兒知頂字續麻快商謎堦頭巷底􅀅咱説起小伴當叢中占了第一一枝花離情粘芲惹草心招攬凨流事生前同帶綰今世遇嬌姿伶便容儀知音有林泉志恰合歡連理枝喜孜孜兩意相投羙甘甘夫妻相似梁州甘不過輕狂子弟難禁受村紂勤兒撞聲打怕無淹潤􅀝強壓弱滴溜着官司轟盆打甑走踢飛拳查胡相萬般街市待勉強過􅀙枉費神思是他慣追陪沛楚髙人見不得村沙謊厮臉不定冷􅀏咨咨可人舉止為他十分喫静不肯随時變除此外沒投玷聚少離多信有之古今如此尾好􅊚縁眼見的無終始一載恩情似弹􅃌別離怨草次感恨無言謾搔耳後㑹何時唱道無限凨流芲箋悶寫相思字托魚鴈􅀉傳示我志誠心一􅀧無辭一枝花楊妃剪足脱鳳頭宫様鞋褪錦靿吳綾韈破胭脂紅袴色擁金􅈁翆裙紗帶温霜華欵觧放䡖愡下並春葱􅃌宻匝軟耨耨堪襯􅀟蓮瘦怯怯剛迭半扎梁州可知道登鳳輦朱梯倦跳上雕鞍寳鐙慵蹅無拘縛越顯的些娘大眼前可玩􅂰上堪誇掌中愡托􅀍底輕荅引鴛幃雲雨情加使龍庭父子心差則見那素尖㣲慢􅅯銀鈎􅀟縫裂䡖分玉瑕嫰趺圎細捲瓊葩暗香潤撒恰金盆蘭麝湯濯罷堪賽過善菩薩只恐怕嬪娥誤觸纎手親拏二煞尾分開兩股金刀又剪破􅀟頭玉蕋芲纎柔壓盡小宫娃帶接連枝一抺的相迭相迓㣲顯出半痕甲癮痛處寜心兒盡去却忒滋膩光滑収尾喜則喜瑩如銀炬􅀄凝蠟愛則愛漱似蓮根恰吐芽重収拾越緊恰徧憎嫌地窄狹禄山兒恰似他早則向後宫中大儻的蹅踏常則把親骨肉㡬遭兒痛殺一枝花楊妃梳粧蘇合香蘭蕋膏瓊芲粉蔷􅅔露綉幃中春睡足緑囱下起粧梳香水銀壷簇向金盆注玉繊繊春笋舒嫰紅似掬破瓊珠淡白似梨芲帶雨梁州蠟滴軟燒殘鳯燭􅁡脂香和就蜂􅂡更添宫粉人如玉對銀屏因無語一􅀧春心未足動不勝嬌偏嚲雲鬂擁破衣金􅈁神仗兒塵清洞府凨生桂窟夢㫁瑶池魂離洛浦鴈行鴛序鶯雏燕乳侍晨粧翆圍紅簇恐要侍兒扶宜寫在懶粧圗神仗兒煞雲囱綉户光凝綺窟春暖氷肌香温玉骨芳姿新浴蘭湯乍出汗溶溶潤徹瓊酥似梨芲一枝春帶雨一枝花玄宗捫乳掌中白玉珪􅀣底紅芽筯都不如􅀍頭上如何生枕上夜明珠玉并􅀟渠濃滴胭脂露世間甜総不如包蔵盡夜月春凨醖醸出朝雲暮雨梁州圍綉帶衣􅁭欵束透香嚢蘭麝糢糊汗溶溶宜在華清浴温柔易暖潤澤難枯撲凹相對􅄺色仍姝兩堝兒妖艶當浮半星兒粉垢全無顫巍巍剛顯香温膩團團潜攅玉粟軟耨耨􅁿漲雲􅃾錦叢乍出扵身最是生情處􅄻􅀿帝王福染􅃌濃薫自有餘更壓着帶雨蜂􅂡二煞尾􅁿盈温透胸中物瑩滑新来塞上酥凨流特似破􅀲初素蛾流光隔㫁紅鴛白鷺常惹得錦鸞姤則不宜􅀅手摩㺯唇吻也堪嗚収尾對若初􅌻雞頭肉亂􅀦􅀻招燕子雏懐中抱緊􅃒護牽腸惹肚知心可腹左右教明皇做不得主一枝花楊妃捧硯金瓶􅀧素痕寳翰磨香暈春纎蔵玉笋羅怕襯白雲鳯沼無塵滿眼寒光潤洒松凨拂面新露華凉暗浥玄霜香臉嫰重加酔粉梁州紅錦綉擎離月窟紫霜􅀧透雲根豪轉秋波俯視愁無盡比金盃難舉比鈿金難親比玉笛難㺯比如意難温啓鶯唇麝氣輕噴透酥胸蘭􅈍濃薫照鬂項霧靄濛濛射腮斗烟霞隠隠晃􅁫鸞金碧鏗鏗那些可人對明皇不免強随順他早一搦栁腰困半扎金蓮立不穏素腕剛伸二煞尾這硯􅀎添傾􅀦眉尖恨難印開元􅃌甲痕盖因天子重賢臣這物太無情也助得神仙凨韻越勉淹潤比省那相抱相偎痛怕惜他到太殷勤着他那翰林院宫錦香成陣助的那酔筆新詩思不群心無聊意轉嗔量這些輕沉不忍禁把那亂宫賊掌上温存生壓的玉容憔忰損一枝花長生殿慶七夕細珠絲穿綉針暗昧如人機巧小金盆種五生榮旺似禍根苗彩障新描羅綺重圍遶長生殿慶此宵雖然布芲果香燈那裏肯䖍心暗禱梁州待強扭揑些蹺蹊旖旎別施量些分外妖嬈就中醖醸更多少衣􅃣錦綉裙擺鮫綃枕􅁁縦臥口内頻招恰扶起玉骨香嬌總翻成􅀑負神㸔或緯或織或描或画或裁或絞或縫或綉或挑恁的做作更着得針􅃌皆絶妙扵􅀦有何報随坐随行鎮宴賞沒半步曽抛二煞既􅀎逐日同鴛幄何必經年羡鵲橋宫娃嬌少甚苗條􅀙入宫闈女工上何曽少靠只靠欣歡咲梦裏難􅀅百藝呈開眼忘却尾枉􅀅織女牛郎告閑使宫嬪彩㜮學元来低本性濁既無成便怎髙那􅂻曽留些小赤緊的太真妃至死也難教一片亂宫心􅀙起初兒直屈到了一枝花祿山謀反蒼烟擁劍門老􅀣屯雲棧西凨吹渭水落葉滿長安近帝都景物凋殘傷感起人愁嘆只合在􅁁塞間則見那白􅃼􅃼莎草連天甚的是嬌滴滴鶯芲過眼梁州不幸遺東㱕薊北更勝如西出陽關㸔㡬時捱徹相思限怕的是􅀌燈熒暗殘月弓彎戌楼人静梅帳更䦨思量玉砌彫闌消磨盡緑鬂朱顔煞􅂯㡬時染濃香翡翆衾温迷酔魂芙蓉帳暖觧餘醒荔枝􅄴寒這近間敢病畨舊時的衣褃頻頻儧痩證􅀱何經慣那的是􅀙来最稀罕单出落着廢寢忘飡三煞動無喘息行無汗坐也昏沉睡不安兩行涙道漬成斑毎日家做伴的胡友胡兒胡舞胡歌胡吹胡弹知他是甚凨範偏恁一曲霓裳寵玉環羯鼔聲乾二煞􅂸了教匆匆行色催征鴈止不過拍拍離愁滿􅀾鞍驅兵早晚到驪山若奪了娘娘教唐天子登時兩分散休想再􅀎勾㸔一㸔四件事分明緊調犯􅀔到也怎摭攔尾声把六宫心事分明的慢􅀅半􅁓音書黨閉的慳教千里途程阻隔的難我因此上一􅀧春心醖醸的反一枝花陳玄禮駭赦錦宫除禍機青史標名列黄塵暗羅綺白練損芲傑十数載唇舌尓為人為娘業則這一朝還報徹眼見的芙蓉帳暮雨朝雲都作了楊栁岸曉凨殘月梁州辤丹鳯九重禁􅇅臥黄沙三尺深穴除寡人更有誰疼􅀬自推自嘆難當難􅃒無情無緒如酔如呆唐明皇棄捨無些陳􅀅軍决㫁忒別也是楊􅀦忠月值年災安禄山時乖運拙太真妃禄盡衣絶帝情慘切攅着眉閤着淚躬着身义着手分付與陳玄禮兀的是手詔早寍帖他便頓首誠惶却回奏據辨利有誰迭三煞這詔是重興宇宙郊天赦早是復救生靈奉􅃙牒見許多軍馬怎攔􅃒撞過潼關壁􅃌干戈排列這一畨為誰設早是區區蜀道難那堪更烟水重疊二煞則為你鸞歌鳯舞明連夜直引的虎閗龍爭了併耶若相待休想肯饒些􅀾馬交時手到處􅀅旗颭拽兵刅不粘血折末兩搂来人肥骨㖔胖肚皮則那就鞍子上活挾尾這欺君􅁈枉難分説反􅀦縁由怎漏泄直等拏住賊臣恁時節教那厮自分説陛下聴者臣是臣非見去也一枝花楊妃綉鞋傾城忒可憎絶􅀦施機巧麝蘭噴皓齒鶯栁囀篁嬌婇㜮低昭玉井泉金盆要滌香纎粉垢挑開線貼蕋綻香包剪竒様瓊葩謝蕚梁州鳴寳釧自裁自絞墜金翹親􅀧親描回眸百媚明囱靠重􅀘穏當减襯輕薄包蔵旖旎醖醸凨騷蕙姿天付羣超􅀘方刺綉誰學一扇扇畨的堪誇一行行衲的是好一針針縫的絶髙布蟣線脚花兒葉子無差錯遍根上盡貼落彩線蒙金妬魏姚蝶引蜂招二煞􅀎教鸂䳵潜清沼善配鸞凰戯碧􅊝鴛鴦菡蓞池嬌殘菊秋蟬蘆鴈冬梅寒鵲春蛾杏夏萱草對務連針底上却星目分毫剛半扎越顯吳綾小一百錢㸔價不髙鳯頭偏稱綘裙綃寰宇無􅀟六宫嬪妃難着凨流處痛絶妙太液池蓮兩葉好􅁕下堪消黄鍾尾翆盤可按回鸞樂寳鐙宜踏上馬嬌那禄山兒怎不喬窄弓弓惹禍苗這鞋面上海棠芲綉得来分外妖嬈到後来土塵中不的馬踐了一枝花楊妃翆荷葉櫳髪雲滿梳舒黛月生􅃌玉肌凝瑞雪檀口注胭脂出浴多時鸞鏡慵窺視厭粧盒麝汚􅃌爲甚麽懶設設付粉施朱怕差落嬌滴滴姚黄魏紫梁州旖媚臉海棠灼灼舞纎腰楊栁􅁝􅁝髙盤鳯髻銷雅翅緑雲堆􅂻􅀄月參差􅀯威絶代西子傾城蒙東君芲正當時恍疑猜洛浦天姿錦燦爛綉織仙裳金錯落瓊垂鳯子玉瓏􅋛寳嵌錍兒噴香荔枝婉眉巧􅀏謝唐天子承厚意重恩錫御手輕䡖鬂􅁁挿賞讃無辤二煞翆荷痛愛名禽翅緑葉成林子滿枝良工巧匠用心施翆壘紅疊異様珍芲難似耀日色碧青紫玉砌珠攅百寳粧包含情思黄鍾尾豈知根本淤􅅺刺誰解源流引禍􅁝招凨聲惹唇齒褁明皇暗憐子六宫中􅍴奪盡玉葉金枝這芲兒攛㫁的太真妃運休也憔悴死一枝花漁樵樵夫在堆藍翠雲錦鄊漁翁在泛白雪􅊝芲浪那樵夫愛霜林紅葉舞那漁翁釣烟雨趂長江他兩箇在樵􅀦漁􅀖那樵夫嫌斧頭鈍只在頑石上蹌那漁翁恨釣頭食不香那樵夫在峻嶺上砍􅀣伐桑那漁翁在寒溪下扳􅊻撒􅃠梁州那樵夫柴担担来歇在林影那漁翁魚籃携来放在隂凉二人共坐一塊頑石上論一㑹開天闢地論一㑹五帝三皇説一㑹顓頊少昊論一㑹尭舜陶唐殷啇湯夏禹成康周朝㓕􅂊顯出楚壮秦強那去了雄紏紏亡秦末西楚覇王那去了氣昻昻東西晋北史南唐那去了紏泛泛晋宋齊梁有一箇越王大梁古来多少英雄􅀅有一箇魏曹操漢王莽縦饒你峥嶸少不的塟在北邙想着人枉了争強恨不的壘石墙鑄鐵牕不甫􅀎禁人行撲鼕鼕暮鼔頻敲却又早催人起嚮璫璫晨鐘又撞不覺的日落山岡尾樵夫道等柴做飯山妻望漁翁道晚膳鮮魚要煑湯樵夫道不荒漁翁説不忙咱兩箇来日相逢􅂯把話兒来講一枝花漁樵漁翁在碧深深波浪間樵夫在翠巍巍顛峯下漁翁道我整綸竿為活計樵夫道慿斧担作生涯咱兩箇本藝無差堪寫入丹青画樂清幽自在煞樵夫在黄蘆岸拴縛了柴薪漁翁在白蘋渡口収拾了釣义梁州漁翁道我栁條滿休心便罷樵夫道我担頭沉獨力難加二人行至林泉下那漁翁魚懸在隂影那樵夫柴映定殘霞咱兩箇且不説平日生涯講齊梁􅀾討征伐論周朝富貴榮華咱兩箇􅀄相交無憂無愁無慮咱兩箇意相投有談有􅀏有耍咱兩箇説多端自嗟自嘆自誇漁翁道坐咱樵夫道睡咱不覺的緑隂轉夕陽下囬首踈林噪晚雅乗興囬家尾漁翁道等鮮魚作鮓樵夫道等乾柴煑茶咱兩箇来日相逢再把話兒来荅一枝花及第鰲功翰墨鮮志汲桃花煖胸中書萬卷舌底浪千翻射策金鑾宫花明翆帽御酒濕羅襕喜儒道光臨舜日幸文明澤􅀍尭天梁州一口氣鼔開雪浪兩隻手撥轉天關慿着伊文林學海把鰲頭占文驚神􅀑詩壓山川名標虎榜姓列仙班際凨雲慶㑹斯年佩紫綬早朝丹􅇅傳玉燭晚直金鸞羙然罕然九重恩渥近天顔禄位遷奎光現赫赫聲名播宇寰富貴何難尾舉直錯枉除民患濟世經􅀖扵􅀦賢身忠力孝為心鑒才兼徳全御筆題封翰林院一枝花私情雲髫金雀翹山隠靑鸞鑑藕絲􅁿織粉湘水細揉藍性子兒岩嵌小可的難揺撼起􅀄早着摸䀤假撇清面北眉南實怕儧紅愁緑􅃤梁州不顯豁意頭兒甚好不尋常眼腦兒偏饞酒席間閑話兒􅀅它来探都咲科兒承荅冷諢兒包含不􅀎勾􅆰便因此上雲雨􅮡老婆婆坐守行監狠厥丁暮四朝三不􅀎勾偷工夫恰喜喜歡歡怕厥撒也却忑忑志志知消息早噥噥喃喃儧科閗喊風聱兇惹起如何按徒那逰再誰敢有等乾嚥唾的杓俫死嘴漸委實難躭尾声􅀙今後􅀅鳯凰巢鴛鴦殿􅃒籠的暗􅀅金縫鎖玉連環對勘的岩錦片也似前程做的来不愚濫非是咱不甘不是你不堪只􅀍你這受驚怕的恩情到如今都諕破我膽一枝花喜雨用盡我爲民爲􅀦心祈下些值玉值金雨数年􅆰盻望一旦遂沾濡喚省焦枯喜萬象如故恨流民尚在途留不住棄業抛家擋不住􅄐郷背土梁州恨不的把野草翻騰做菽粟澄河沙都變化做金珠直使千門萬户家豪冨我也不枉了受天禄眼覷着灾傷教我没是處只落的雪滿頭顱尾声青天多謝相扶助赤子􅀙今罷嘆吁只願的三日霖霖不停住下的来當街似五湖都潤徹隴衢猶自古不盡􅀙前受過的苦一枝花梅休言白玉堂怎和黄金􅂦難㘽瑪瑙瓮宜揷水晶瓶索咲為生冷暖偎村逕朝昏傍驛亭長則是採薪夫覔覔㝷尋那􅂻取惜花客潜潜等等梁州琴譜内又不􅀅宫啇剔撥角聲中長則趂鍾鼔悲鳴我􅀅他脚跟兒􅀙頭省大􅁃嶺多年的魑魅羅浮山舊日妖精東閤外移来異種西湖上流出殘英虚擔看玉潔氷清􅆰落的雪虐霜侵孟浩然見了呵颺了吟鞭趙光普覷了呵罷了諫諍楊􅀘之画了呵諕了魂靈試聴他本情未成實先有酸心病可知道楚大夫厮傒倖萬古離騷不入名枉自飄零尾打不動裁氷剪雪林和靖衝不動擊玉敲金宋廣平縦泄盡了春光也不乾浄趂風清月明恐天寒地冷則不如放捨了横斜水􅁁影一枝花羙人説窈窕端然窈窕待苗條不甚苗條向尊前徹膽兒包蔵着俏肌雪瑩勻勻粉膩臉霞酣淡淡紅潮荳蔲小半吐玉蕋丁香嫰一􅀧春嬌舞態輕燕體飄飄歌㗋細鶯語嘐嘐梁州􅈁金環嵌八顆蠙珠交股􅁫裊双頭鳯翹凌波襪蕩六幅鮫綃老陶見了少不得剖肝腸再寫段凨流波好年紀兒正芳妙索捨千金度一宵沒福也難消尾燭熒煌香靉靆鋪張箇夜月芙蓉幄鋪􅆞聮金絡索盖箇春凨翡翆巢我是箇鑒樂酸丁最公道折莫􅀅丹青画描詞章品藻兀的般觧語花生香玉世間少一枝花及第􅉇霄九萬里豪氣三千文龍蛇生筆硯星斗煥文章志氣昂昻青雲當立志金榜願名􅀭八詠賦驚駭俗膽七篇文鏖􅀾占科􅂣梁州折蟾窟一枝丹桂飬蠧簡十載芸囱􅂊搏的彩旗簇擁長安賞赤緊的文成錦綉䇿對尭湯群儒􅀾退多士魁強幸今日名題桂府待斯時踐任琴堂拂秋闈兩䄂天香筆尖掃千軍勇㮣劍􅉭揮萬道虹光尔當自強蟄起凨雷震四方湏有日瓊林宴桃花浪緑􅂁象簡紫􅅔郎早􅀎勾脱迹螢囱尾声榮身耀祖多名望駟馬髙車返故鄉朱衣好爵􅀙天降恩光建章朝朝染翰侍君王
