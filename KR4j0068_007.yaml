裏怕你莫在寶蓮臺畔間聽講兜率宫中正散花你若是神通大能將你佛光遍照慧力微加餘音我子見豪光龕上生天花空內灑香風滿室雲迎迓似這等感應昭然是不假粉蝶兒泣楊妃寶殿涼生夜迢迢六宫人靜對銀缸一寸殘燈枕席間靈寢處起顯的吾當薄幸萬里龍亭知他宿誰家一靈真性醉春風恰盡一爐香我與你便旋添黃串餅娘娘似竹林寺不見半分形到今日則留下影影娘娘你殁死之後在生之日我可便一般恭敬呌聲髙唐也夢難成可那裡也不愛卿愛卿怎生無些靈聖越顯的吾當染之卿剔銀燈我子道是這答兒單于王的使命呼喚俺那昭君的名姓喚王嬙不肯道是燈前應元來是畫兒上丹青猛聽的仙音院鳳管鳴便道簫韶九品蔓菁菜可怎生白日裡無承應並不曽做到天明夢景恰原來鴈過長門兩三聲怎知道更有一箇人孤另白鶴子多管是春秋髙斤力短莫不是食水少毛骨輕待退去後愁江南網羅寬待向前怕北塞雕弓硬么篇感傷似昭君思漢主哀怨似作薤露哭田橫凄涼似半夜楚歌聲悲切似唱三疊陽關令上小樓早是我這神思不寧又著這冤家纒定他呌的慢一會兒長一聲和盡寒更不爭便打盤旋這答兒裏同聲相應你可便差訛我四時莭令么篇你端的尋子卿覔李陵對著靈堂專教吾當見景生情則俺那逺鄊的漢明妃雖然得命不見你箇毛團也耳清靜滿庭芳莫不是自愛自聽恰便似林鶯嚦嚦山溜泠泠山長水逺天街靜我子怕悮了途程子𬒳你冷落湘江暮景不知你宿誰家人過留名更那堪瑶階夜永盻煞月兒明十二月休道是吾當動情呀便是那宰相每也難聽又不比雕梁燕語錦樹鳩鳴漢昭君離鄊背井阻隔著千里途程堯民歌子聽的呀飛過蓼花灘孤鴈兒不離了鳯凰城畫簷前鐡馬兒響玎玎寶殿上君王冷清清寒也波更蕭蕭落葉聲燭滅長門靜尾聲一聲兒繞漢宫一聲兒寄渭城暗添白髮成衰病不恁的吾當勸不省粉蝶兒慶夀閬苑瑶池老人星降臨凡世衆群仙左右相隨一箇捧仙桃一箇擎夀酒一箇獻丹砂一粒奉敕令文籍碩延年一生榮貴醉春風夀添似西嶽嶺頭雲福增如東洋海內水一生福夀兩全齊一家兒喜喜夫婦康寧子孫孝順弟兄和會十二月曹國舅將笊籬李孔目鐵拐忙提張四郎輪竿捲起吕純陽寶劍光輝陳七將霞光影裡徐神翁披㝎仙衣堯民歌呀韓湘子牡丹花頃刻不宜遲張果老白驢勝似促風疾蓬萊閬苑緊相隨更有那益夀延年漢鍾離堪和風細細吹來慶賀長生日尾聲金童擎著仙酒玉女捧著瓊杯東華仙隱隱在祥雲裡將百歲靈丹慶夀你粉蝶兒哭楊妃玉骨香肌臥荒郊塜蒙塵昧塞空穴草擁沙培繡簾垂鴛幕簌重門深閉常想著懶出宫闈卿呵早則不怕鶯花笑人憔悴醉春風氣結就嶺頭雲淚湮著泉下水雖然不得便生天也是寡人箇禮禮空伴著三尺魂幡一軸影􆂀半間靈位迎仙客急煎煎難忍耐痛煞煞怎禁持割捨了痛哭一場便子待甚的欲嗥咷却又後悔只恐怕軍政司條例又有俺這難棄捨渾家罪石榴花恰長安西望繡成堆子見滿目擁旌旗向馬嵬東畔血沾衣怎知有這場拋擲半生錦帳恩情棄馬頭前蹙損蛾眉一條素練把咽喉繫消不得髙塜瑞煙迷閗鵪鶉子向這淺土裡浮丘盡都是行蹤過迹你是隨霧也那隨雲你却是做神也那做鬼非是吾當肯棄擲只般狠做為都只因他虎閗龍爭生拆得鸞孤鳳隻齊天樂誰承望正行裡六軍圍間仗劍月輝輝嚇帝主除兄妹捲地胡塵潼關失倚仗用人之濟抵多少狐假虎威子揪父髻臣扯君衣乾荷葉往常時小娃隨侍兒携起嬌無力襪塵移暗香􅊞所為兒偏稱帝王機却元來只不可將軍意上小樓子為韶華暗催把春光空費恰正緑嫩紅嬌早葉落花飛似恁得杜鵑啼鷓鴣鳴林鶯嚦嚦再休想驚破海棠春睡么篇寡人勸力士省可裡哭呌起不爭你信口開合放聲悲啼倘或間赱將來道楊妃和咱同例你和我也無葬身之地滿庭芳吾當命裡值災星照耀惡限臨逼區區鞍馬空勞役劍閣崔嵬早是我亡家敗國更那堪害子傷妻早知道逢今日折莫兵屯萬里寧可我去待自迎敵紅繡鞋早子恁功成名遂生教俺財散人離戰騎沖雲猛跨馳情巳斷淚雙垂六宫中誰第一快活三止不過梧桐樹下按羽衣又不曽蓮花帳上誤了軍期臨危不敢共他相持倒反做了箇國舅娘娘罪鮑老兒未殺他人先損了自巳怎做得後取那潼關計見放著邊庭上造反的怎做的禍起蕭墻內從新革故擎王保駕統領軍回誰知道依前似舊欺君做事却向蜀西么篇想俺那厮嗔厮持忒溫柔性兒再誰似的是他但嗔但喜可喜娘臉兒再誰襯的向懷中抱座上偎樽前立不由人不愛惜不幸上值著風流迭配半路裡教軍人勒么篇將凶年避登蜀地列戈戟九重圍繞賊兵退還宫位對文武兩班齊削了權兵去了爪牙除了官職恁時莭俺近的翰林院有俺功臣每史記裡不須用文意煞尾寡人親將古迹標須當教後代知半行兒褒貶盡陳玄禮寫詔不由皇帝強向那馬嵬下踐了楊妃粉蝶兒力士泣楊妃若不是將令行疾􅕑些箇把撮合山連纍沒來由也去臨逼恰對元戎休道其中情弊子道髙力士明知更做巧舌頭怎生支對醉春風子為他復望雨雲期生送得不著墳墓鬼帝王家妃子要為妻祿山賊休好美美天子僝僽衆軍寧貼自家也伶俐迎仙客不是我佯孝順假慈悲禁宫中起𥘉曽拜識雖是各爹娘厮認義據著覷當追陪不若如親兄弟石榴花記得那彩雲成陳錦重圍恰正是人體態酒為媒忽變做落花沾土絮沾泥怎想這祿山賊統領征鼙一時間􅕑逼迫煞陳玄禮誰承望正行之際半霎兒􅕑殃殺唐皇帝一片聲呌道宜早不宜遲閗鵪鶉他子待按法依條那裡問違宣抗敕倚勢挾權死一般做頭害底非是俺心偏向裡迷恁也待顯正直據這般剪草除根那裡是于家潤國普天樂阻天顔從心意怎息雷霆之怒罷虎狼之威施狠切誇鋒利指歌舞為名相羅織其間事容機密就裡僥傒密把宫中禍機軍前號令便説法外凌遲乾荷葉明明是不曽題暗暗地早任誰知做多少英雄勢見放著亂宫賊不敢與他做頭敵既然教姦婦一身虧你却須合問那姦夫罪上小樓每月家干請俸給經年常間著兵器恰見戰馬奔騰早教幸蜀回避你可早路途中保護得無踈無失兀的是大唐家飬軍千日么篇他為甚麼痛未休為甚麼去便回子為他龍閗魚傷兔死狐悲三十年弟兄般何曽相棄早是俺眼睁睁物傷其類滿庭芳恰得箇風恬浪息他剗地昻昻而巳却教俺怏怏而歸好教那白練把你十分勒死後正合宜每日居禁苑豐衣足食誰教你背君王落道為非臣當日若不看娘娘的面皮怎容過這蠢東西六么令今日對你從實分析不是見喫閃著虧你勸不的把俺死央及對面又難為因此上不免的依隨偷方覔便雖做美得回避恁偎香抱玉無了期世著迷子管著迷直到落便宜紅繡鞋那厮生得來矮罷下􅽩來寬膀癖粗古魯恁來闊腰圍項圎蠢腮啉吞胖容儀胸凸報肚纍垂却是那些兒引動你快活三猛生怕涉疑詐為兒厮瞞昧雖不懷胎十月得分離却有乳哺二年意鮑老催誰想恁悄悄冥冥預先做下張鴛鴦𬒳誰教你喜喜歡歡正美裏自拆散鸞凰隊特然遣趕漁陽鎮守防護夷狄忽然變亂把潼關攻擊篡皇基六么令早子都你東我西恁平地葬送三不歸却教父南子北無前事間隔在兩下裡到黃泉見夀王迎禮第一句説甚的是子是皇妃情理却也受煞你將軍氣么篇那催兵吏􅥋征轡子聽馬過處哭聲悲辭軍壘投蜀國更壓著人和凱歌回怕的是還朝日翰林院那管無情筆休想道半星兒不完備暗想風流形勢到今日成何濟堯民歌也曽風流霞洗也曽粉耨香偎也曽華攢錦簇也曽翠繞珠圍如此般夫榮婦貴今日箇瓦解星飛恰便似野風吹散𥿄錢灰劒嶺嵳峩路人稀碧桃花下月平西笑煞蜀禽也難回狼藉狼藉殘紅襯馬蹄休想花有重開日尾聲娘娘呵你使些躁暴方減些是非自通傳曉諭長安內道他無罪強向那馬嵬坡下踐了楊妃粉蝶兒祿山泣楊妃雖是我肌體豐肥豈辭憚路途迢遞不曽分星夜驅馳馬行乏人走困剗地開旗拽隊暗想歸疾全不似去時莭容易醉春風滿腹斷腸愁一聲長嘆息夜來由自説活人今日早做鬼鬼怎不教怨氣沖天落的惡名留世早則都死心塌地迎仙客若不殺了國忠滅了皇妃平白那裡有背君作亂的雖是不爭鋒尋對壘子是待強帝宫圍委實無葬送娘娘的意喜春風天香國色辭人世玉骨冰肌襯馬蹄凄涼孤枕助鴛幃聞戰鼙抵多少更漏促曉鍾催石榴花憶惜花憐月暗偷期常則春早起夜眠遲六宫中即漸裡有人知只恐怕敗露帝王疑敢故然取笑為兒戲到教咱盡歡了三日夜筵從此無疑滯恰便似親子母不相離閗鵪鶉常子在翡翠鴛衾芙蓉帳底恰正是楊栁情嬌海棠睡美想著那旖旎溫柔俊所為怎忘得並不是暫煞兒歡娛盡都是通宵况味普天樂近裡話也不合題説著早森森地俺受盡嗔持地撒盡迷奚別勢樣無巴壁雨雲期間諸餘裡更親如大唐皇帝看了些斜堆鳳髻微瞑秋水輕皺蛾眉乾荷葉沒揣的使心機擁旌旗火速離皇官內生忔察兩分離痛支沙怎禁持教俺便得死後到是偏宜誰曽那般活受風流罪上小樓金杯未吸人心先醉恐臨長安送路樽席則辦下左一行右一行別離情淚全不似後宫中洗兒筵會么篇不覺的變了面色沒揣的􅥋了肚皮未到漁陽早添憔悴則想久而間却依圎肥啉吞的誰想我一日瘦如一日滿庭芳特來探尓實指望衣遮彩鳳聽俺金雞這場歹閗成何濟則落的虎倦龍疲一箇乾引的漁陽禍起一箇空教留萬代人知國史內名標記縱不編謀反大逆也寫做亂宫賊紅繡鞋再不侍晚宴塵清寶地再不見浴春泉香滿溫池再不見桃李花開繡成堆趂枯蓬奔古道隨落葉蕩荒陂伴西風吹渭水快活三比及我起尸骸離馬嵬比及我選山陵置靈位比及我引靈魂排僧道列威儀權時向軍伍中先遙祭鮑老兒欲酌香醪奠一杯百忙的傾不盡我關情淚枉使丹青染像儀畫不出傾情意百年恨絶三生夢斷半路身虧數層欲合一聲鼎沸六道輪回六么序一壁廂人軍見緊急唐皇帝避災離故國忙裏問禍根苗又是誰陳玄禮損人安自已一壁廂哥哥喪妹妹亡把娘娘來勒恁的他躲甚的誰不道安祿山無恩義這公更壓著三千倍么篇據臣威勢將君抑勒合該九族盡誅夷想他情理將咱拋棄教人一任痛凌遲有一日相逢處戰間如虧失恁時莭休後悔比及還報了終身讎隙敢愁的這心如碎隨煞娘娘呵莫怨咱我也堪恨你但留心休想貞元備恰來將音書頻寄怎到馬嵬坡下踐了楊妃古調石榴花閨思顛狂栁絮撲簾飛緑暗紅稀垂楊影裡杜鵑啼一㺯兒斷送了春歸牡丹亭畔人寂寞惱芳心似醉如癡懨懨為他成病也鬆金釧褪羅衣拆散燕鶯期總是傷情别離則這魚書鴈信冷清清杳無蹤迹更有誰知到何時共我成連理乍離別玉減香消俊厖兒亦憔悴酥棗兒一自相逢將人來縈繫樽前席上眼約心期比及道是配合了受了些間是間非咱各辦一箇堅心要博箇終緣活計想佳期夢斷魂勞衾寒枕冷寂寞羅幃瘦損香肌悶懨懨鬼病誰知同歡會不隄防半路裏簮折瓶墜兩下相拋棄把腰肢瘦損廢寢忘食鮑老兒當𥘉指望成家計誰想瓊簮碎當𥘉指望無拋棄誰想銀瓶墜煩煩惱惱哀哀怨怨哭哭啼啼悲悲切切長吁短嘆自跌自摧鮑老兒故人何處冷清清染病疾相思證轉添受凄涼捱朝夕細濛濛雨兒淅淅颯颯晚風窗兒外吹撲鼕鼕的鼓聲滴滴點點玉漏不住催添愁悶獨自知子這心自悔再團圎幾時一處共相隨鮑老三台滚俺也自知鸞臺懶傍塵土迷俺也自知金叉