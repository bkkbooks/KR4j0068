將著這降妖物揚金輪到碧虛他尚然不怕懼搖著頭擺著尾林浪裏趨把天兵將列宿撑倒在山坡水曲古水仙子呀呀呀他將那黑霧吁向向向峯巒間刮刮匝匝烈熖吐見見見火燎天似紅騰騰騰焚燒了林樹踈刺刺起寒風遍八區急煎煎緊驟著胯下龍駒敗殘兵逺退到十里餘逢著這青獅子委實的難隄禦將將將神將每總教輸尾聲罷罷罷向佛會從頭細分訴説那箇青獅子猛力難伏少不得遣一位聖菩薩到來方才容易取醉花隂楊妃出浴膩水流清漲新緑洗盡胭凝粉聚斗障錦重圍只恐東君窺見濃勻聚淡白淺傅微抹輕浮玉搓咽頸雪膩肌膚媚春風半露胸酥對鸞臺恣意粧梳錦梔香宫額塗黃蘭麝煙娥眉掃緑玉蓮嬌香腮施朱巧將鬢鋪髙盤鳳髻堆雅羽七寶鈿盒取斜插犀梳雲半吐風韻誰如三煞細看了妃子新粧束休説昭君舊畫圗襯銀錢黃串滿金爐香霧縈紆粧點就銀屏金屋翠圍繞錦遮護舉止輕盈那些濟楚天上應無二煞六宫粉黛生嫉妬五月榴花照眼𥘉語言恰似囀鶯雛翠女髙呼揭繡幕忙開朱户下瑶階進蓮步前殿上君王快報與半霎兒工夫尾聲沉香亭上歌金縷花蕚樓前擊翠梧按舞霓裳羽衣曲有嬪妃綵女有鳳簫羯鼓教那會受用君王看不足醉花隂明皇告代楊妃死有句衷言細詳察是不是將軍莫怒發先斬了國忠則休莫待要踐了娘娘則勒死吾當呵罷興龍引重權獨霸久飬威轉加致教主弱臣強內外忒差其間事節莫不也干連著鑾駕賜一條素練撅三尺黃沙么斟量口氣見得將他難救拔教娘娘速赴轅門早受刑罰非干易捨便告半霎嚴假枉與他廣增些怨望剩添些驚怕么鴛幃咫尺黃昏也陡斷懷中不見他猛撮上心來則你道疼麼蘭魂蕙魄願早向皇宫托化又無甚六親又無甚根芽尾聲若能勾地久天長葬黃沙但有人奠酒澆茶情願向一箇套兒裏教恁雙勒殺醉花隂楊妃上馬嵬坡愁據雕鞍翠眉鎖一聲聲煎煎絮聒情淚落秋波瀟灑長途極目天涯闊出隊子離情坦坦聽征鼙愁越多西風白草陳雲合落日牛羊下逺坡煙水凄迷血淚多么篇玉容寂寞料今生愁越多一場寵幸起干戈朝內君王沒奈何閫外將軍管甚麼尾聲拈甲紅裙也索言破翰林院學士行評跋凌煙閣上只堪圖畫著我醉花隂祿山戲楊妃羡煞尋花上陽路芳草斜風細雨隨分到皇都恰正青春𥘉放入深宮去么宵夜鴛幃暗銀燭可體紅圍翠簇酒力漸蹙繡枕溫香錦𬒳裏偎紅玉出隊子朦朧雙目不勝媱態度唾秥涎緊貼口相嗚送甜津頻將舌半吐胖肚子百忙的厮間阻么靈犀一點嬌疑聚不由人眉暗蹙軟溫潤香汗似溶酥旖旎留清花解語正是風流美愛處栁葉兒驀然有人發怒連珠兒呌道十句餘則教恁壓子嗣義為兒母誰教恁背君王做妻夫么唐明皇也不曽痛關腸肚也不曽似恁重牽情緒也不曽似恁鎮日追逐也不曽似恁連夜歡娛隨煞一自明皇轉廊廡便不肯暫離了娘娘皮膚這厮也蠢則蠢到大如皇帝福醉花隂元宵憶舊凍雪才消臘梅謝早擊碎泥牛應節栁眼吐些些時序相催閗把鰲山結喜遷鶯暢豪奢聽鼓吹喧天那歡恱好教我如刀切淚珠兒揾不迭哭的似癡呆自從别後這滿腹相思何處説流痛血瑶琴怎續玉簮難接出隊子想當𥘉時節那濃歡怎棄捨新愁裝滿太平車舊恨常堆幾萬疊若負德辜恩天地折神仗兒這些時情詩倦寫和音書斷絶斜月籠明殘燈半滅恨簷馬玎璫怨塞鴻悽切猛然間想起多嬌那愁悶怎欄截挂金索業緣心腸那煩惱何時徹對景傷情怎捱如年夜燈火闌珊似萬朵金蓮謝車馬闐賽一夥鴛鴦社隨尾見它人兩口兒携著手看燈夜教俺怎生不感嘆傷嗟尚想俺去年的那人何處也醉花隂孤另寶釧鬆金髻雲軃不似前濃梳艷褁寬繡帶掩香羅鬼病懨懨除見他方痊可出隊子傷心無那遣離人愁悶多見銀臺絳蠟漸消磨寶鼎無煙香燼火燭滅煙消怎奈何么篇情郎去後添寂寞盻佳期無始末這一雙業眼斂秋波兩葉愁眉蹙翠蛾淚滴胭脂流玉顆尾聲著我倒枕垂床怎生臥到二三更暖不溫和這沒人情的𬒳窩兒也傒落我南畫眉序燈詞元宵景堪題畫堂深沉勝瑶池奏笙歌一派韻美聲齊畫燭映兩行神仙蘭麝靄一簇珠翠和翡翠簾捲香風細人在水晶宫裡畫眉序明月照庭除萬頃芙蕖映秋水夜迢迢一任畫角頻吹沉醉爇古鼎龍涎歡會宴玉簮珠履和翡翠簾捲香風細人在水晶宮裡神仗兒元宵景好元宵景好點放花燈雙雙慢行牡丹燈琉璃燈弓鞋燈慳慳點著果然二寸頭上好箇木香棚良夜好賽蓬瀛么篇燈點頭上甚光景做的事直恁蠢敢恁無知耻我門庭㺯許多寒酸自相輕怎不教人笑聲怎不教人笑聲間樊樓晝堂深沉繡簾半掩瑞煙裊噴寶篆羅綺香風軟喧天樂奏聲清雅韻逺滴滴金通宵爛把銀燈點影交輝照華筵姢姢夜色如秋水更澄澄明月圓明月圓似氷輪輾出一洞天洞天一境移來世間雙閗雞我今日欣逢景當上元點花燈在頭上是人笑喧我燈粧得極妙不須用蠟燭共𥿄撚似移下一天星毬萬點雙聲疊韻多丰範多丰範座列神仙眷開玳筵開玳筵午夜難留戀擁翠鬟擁翠鬟拚醉眠拚醉眠任銅壷漏滴畫角聲傳餘音來宵廣設華筵宴午夜風光疾如箭準備踏青賽上元南畫眉序燈詞皇恩被華夷太平豐登四海咸集喜都城午夜月色輝輝碧落轉一輪清光黃道靄六合佳氣和萬歲閬苑羣仙會金闕逺攢羅綺畫眉序蓬萊勝瑶池玉樹銀花樂聲裡看神鰲鼓舞雷掣星馳光閃爍瑞鳳來逰影燦爛祥鸞飛戲和萬歲閬苑羣仙會金闕逺攢羅綺神仗兒天顔有喜萬像花燈森羅禁畿牡丹芙蓉荼䕷球燈開玲瓏翡翠泡燈琉璃蓮花巧簇衆芳菲環玉砌擁金堤么篇今久天下最佳麗水晶宫不恁般美蝦蟹龍魚獻異呈竒吐瑞招搖映波漪有仙鶴鴛鴦綬雞有虎鹿騶虞象犀閙樊樓寶爐內焚香篆雲穗飛進蠻夷夀星隊頌聲更齊越裳重譯慶賀四方合萬國盡會極普天下萬民同歡共喜雙聲疊韻天花墜天花墜遍滿乾坤內祥雲隨祥雲隨錦繡中華地品物宜品物宜多福齊多福齊更人人樂業賞玩良期餘音蒸民仰賴天恩力萬萬載太平時世風順雨調化日遲拋毬樂楊妃病酒雨雲新擾那更宿酒禁虐儘侍兒催促晨粧任鸞鏡空照手支頥枕並珊瑚衣襜體衾擁鮫綃懶收零落花鈿寶髻籠鬆金叉嚲鳳翹倚春風不展眉尖一點春心怕春愁多少睡思愈粉光縈損人間花月妖嬈紅愁緑慘粉悴胭焦么篇忽聞報羊車欲起玉鬟休别樣嬌君王俏極困也休動勞剛啓鶯唇呼噪孜孜的覷著越添旖旎妖嬈龍情頓發荒婇㜮􅉡下鴛幃宫嬪盡去却向懷中欵欵溫存只恐真妃厭寵心緒無聊未敢踈狂陪笑陪言耳畔焦君王悄喚玉鬟低諾尾聲顔容漸消弱不向枕衾偎抱著箇呆病酒臉兒都瘦了願成雙楊妃乞罪一壁廂尸猶熱血未乾休將那取次相看怯容顔強將嬌滴滴忙離繡鞍么仙衣欲枕難迭辦把不㝎膽戰心寒怕的是白練套頭拴剛打迭起愁眉淚眼出隊子驚慌無限啓朱唇噴麝蘭既教臣妾受摧殘必㝎阿環有破綻向陳將軍乞罪犯么陳玄禮火速言公案㝎興亡頃刻間休嗔將令不鬆間見有親人來指攀敢把娘娘快證翻尾常言道九族邅誅為一人反許多軍撞過潼關説道為首的是恁兒安祿山碩成雙蘇卿香共撚誓共説美姻緣永不離别為功名兩字赴長安阻隔煙水雲山萬疊么辜恩一去成拋撇他無情俺到心呆悔當時恨不鎖雕鞍折倒的人香肌褪雪出隊子柔腸千結算今畨愁又別長吁短嘆不寧貼淚眼愁眉怎打疊若見伊家親自説么玉簮折怎得鸞膠接見無由成間別你不來人道你心邪我先死天教我業徹欲寄平安怎生寫尾若把我雙郎見時時節向三婆行訴不盡喉舌則道是思量的小卿成病也碩成雙蘇卿鴛鴦對鸞鳯群恰尋著美滿前程摶香惜玉好恩情忽變做充飢畫餅么擊玎的分破菱花鏡撲鼕的井墜銀瓶指山賣磨愛錢精送的我離鄊背井出隊子佳人薄幸沒福消雙縣令老娘無頓放過書生秀士多磨遇著栁青妾守著馮魁似頦下癭么到如今剗的無形影教奴家愁越增半江秋影月偏明滿腹愁懷心自硬一雁哀鳴水雲冷尾不是你雙生多傒幸休埋怨這不得巳的蘇卿先向豫章城下等碩成雙好病弱似醉酣鬢鬅鬆髻彈金簮錦衣寬褪瘦嵓嵓殘粉淚香消玉減么恨東君不管人情似綻芳叢奪錦爭攙舊逰園圃見停驂思往事離愁越感出隊子慵臨鸞鑑瘦容顔影自慘鄰姬問我似癡憨欲語無言自懶似恁般熬煎可慣耽么看時節夢兒裡將人賺閃的奴恨不甘山盟海擔我心貪負德辜恩他意敢悔恨當𥘉我自攬尾留戀恁三婆等時暫則這幾行書和淚封緘寫著道意不過肯來相探俺
