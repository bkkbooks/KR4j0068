front:
  text: 雍熙樂府卷之五
  hash: sha256:266f674581a64cd5b68b854f36242a0dfddd4d2de216fb9f3b148bc36c98b26a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_005-1a}
body:
  text: 仙吕宮點絳唇祝聖夀國泰隆昌萬民仰望山河壯聖夀無疆玩賞在金鑾上混江龍喜孜孜髙擎美釀列金叉十二出紅粧朱圍翠繞炮鳳烹凰翠巍巍花團如錦繡緑依依翠竹繞回廊珠簾搖晃紫霧飄香祥雲瑞靄蕩蕩祥光端的是紫府瑶池上輕敲象板齊奏笙簧油葫蘆一派仙音滿殿響齊祝讃隆壽長仙音嘹喨樂歡暢鸞翩鳳舞堪逰賞金童玉女雙歌唱直喫的酒暈紅新面粧五音六律聲嘹喨清美韻悠楊天下樂鳳閣鑾輿錦繡粧别是箇風光笑吟吟滿玉堂有南極衆星慶聖主七真共五老朝帝王捧玉觴祝當今福夀長寄生草我則見金鑾殿列兩行文臣武將公卿相讃吾皇穩坐蟠龍上大明一統山河壯夀綿綿永享錦封疆奎星耿耿明天象尾聲萬國盡來降四海無征蕩大賢門用選俊良普天下黎民朝聖王永延年福夀雙雙讃吾皇明主榮昌舉案齊眉進玉觴擺列著稀竒異相髙擎著佳釀則願的聖明天子永無疆點絳唇國祚靈長本朝興旺俺驅兵將竭力勤王久巳後圖寫在雲臺上混江龍自從那秦嬴天喪東西兩漢祖髙光保障著山河錦繡城郭金湯想當日四百載華夷歸正統到後來兩三畨跋扈立朝綱才除宦官近習早寵外戚專權恰誅了強梁董卓又遇著姦詐曹瞞只為董承种輯泄機謀到惹的衣帶中密詔添愁况逗引起群雄逐鹿空教我獨自亡羊油葫蘆有德服人世必昌怎得亡俺哥身材七尺貌堂堂氣昻昻命世英雄像性謙謙德重寬洪量俺哥哥仁義又純智慮又長他生的手垂過膝竒形狀少不得位至漢中王天下樂子這暗地裏謀人不算強便將他殺傷有甚麼好智量我怎肯為劫賊做刺客的歹勾當我子待播英風萬古傳立芳名百世揚慿著羽取群雄如運掌那吒令想曹公飬士呵把賊擒寇攘想曹公立節呵正三綱五常想曹公盡忠呵肯勤王㝎邦我為甚露丹衷將美女辭却厚惠把黃金讓這的是于曹公寵愛增光鵲踏枝你休要苦相央我和你好商量你教我痛飲黃封醉倚紅粧你子待掉三寸舌尖伎倆絮叨叨數黑論黃寄生草列羅綺排佳宴擁笙歌到盡堂新醅緑蟻玻璃漾滿斟玉液葡萄釀髙擎春色珍珠漾我是箇飄零孤館客中人一任他瓓珊竹葉樽前唱醉中天囑付酒盡休重蕩醉後早擡羊休子顧指點銀瓶索酒嘗多謝恁曹丞相何必黃金滿箱子俺客中情况休想咱匹配鸞凰金盞兒細裁量自參詳三回五次難敵當浮名薄利受何妨我子是守誠心思故主怕甚麼受虛位在朝堂好著我嘆孤忠隨日落悲離恨與天長醉扶歸自結義平原相誰承望有參商子俺生死之交不可忘盟誓難虛誑空教我望斷愁雲故鄊都撮在雙眉上金盞兒不是我自誇強敢承當直等我立功名以報曹丞相轟轟烈烈尚鷹揚試看我金鎗明曉日寶劍掣秋霜一任他延津屯沮授怕甚麼官渡有顔良賺尾慿著我扶持社稷功包括乾坤量一片心天青日朗我不比跋扈姦雄黑肚腸我子待立功勳盡節朝綱守忠良青簡傳芳雄紏紏威風膽氣剛我如今暫留許昌心情悒怏我子怕困塵空自老干將點絳唇王粲登樓一介寒儒遭逢明主居言路得罪當誅擢任當邊圉混江龍須是我文而不武看起來文與武原自不差殊學的是文宗孔孟用的是武尚孫吳便把那十八般武藝櫬貼起我這一萬卷經書慿據著龍韜虎略斡運著地軸天樞機傳風后法闡穰苴李衛公六花之陳諸葛亮八陳之圖地上的山川險易天上的時日孤虛握機制勝出有趨無布列時蛇蟠虎翼呼吸時鬼運神輸掎角則四竒皆出弛張則二廣爭驅逰車以按其後疑兵以固其餘閃閃的戈矛森立晃晃的干盾紛趨敵王之愾執敵之俘管取見三邊不動四海無虞須知道播皇仁不伐是天聲體天心不殺為神武常蓄著兵威士氣全仗著聖算神謨油葫蘆這正是袖有青蛇膽氣粗牢拴著威與福你看他紅光上射斗牛墟他向那江湖河海裏攪得魚鱉蛟龍哭他向那山林岩洞內唬得那虎豹獅貌懼三軍裏誰敢舉眼看萬衆中誰敢開口語一箇箇都鞠躬屏息遵軀束伏看他把邊瘞咸掃蕩盡驅除點絳唇寶殿朱扉鳳墀丹陛做著箇中官職灑掃宫闈能奉侍先承意混江龍也是俺一生近貴見了些香煙常傍衮龍衣穿一套飛仙海馬繫一條正透山犀懸一把􅣱鐵打刃兒鸂鶒木戴一箇鏤金廂帽頂鴉鶻石雖不曽入鵷班陪列任府僚中我常是近龍床祗候向宫庭內穿了些輕紗異錦喫了些美酒堂食油葫蘆十二樓臺錦繡圍盡都是金間碧看了那曉雲紅映著緑玻璃看了鴛鴦瓦上金鋪翠鸞凰榻畔椒塗壁雕梁是碾玉粧銀屏是螺甸漆水晶簾捲香風細人世裏小瑶池天下樂麗日簾櫳燕子飛春暉和氣美看園林曉來膏雨催緑茸茸栁帶煙紅馥馥花散綺端的是有丹青難下筆那吒令我這裏掃龍鱗砌石繞緋桃徑裏展龍紋地席向荼䕷架底試龍舟戲水在垂楊渡西拂綽了白象床整頓下青鸞珮淡氤氲香裊金猊鵲踏枝曉霞暉暖雲垂羯鼓聲髙仙樂音齊我這裏聽絃管悠悠韻美這的是樂繁華慶賞樽席生草看十二金叉列見三千粉黛圍錦鸚哥語羅嬌聲細紫鴛鴦睡足春光媚綵蝴蝶舞困名香膩沉檀大冷篆煙斜流蘇帳暖東風醉金盞兒你那裡品龍笛將鳳簫吹五凡工尺上休訛昧偷聲減字取的精微笛呵夀寧白玉管簫呵緱嶺綵雲飛笛呵畫船中龍裂石簫呵金殿上鳳來儀么彈的指法兒要新竒絃索上索參知恰便似玉盤中亂撒珍珠碎子要恁輕彈慢撚改的絃宜撧聲髙過調花字緊相隨休誇曹善才勝似漢明妃么唱的仙吕要起音疾賺煞要尾聲遲你將那務頭兒撲得多標致依腔貼調更識髙低停聲呵能待拍放褃呵會收拾常子是懷裹著十大曲袖褪著樂章集么舞的細看你瘦腰圍施展些巧心機寬裳一曲飄仙袂翠盤中旋轉的紫雲回看了你從金蓮羅襪窄翻翠袖玉纎垂準􅍯下纏頭紅錦假安排著簌地絳綃衣么囑付你女嬌癡將樂藝用功習子這內中承應比排場異入梨園改換了樂官籍見了些王孫每能騎髙駕馬士女每會著四時衣抵多少髙樓一席酒窮漢半年食賺尾聲恁休要失拍了舊歌詞馬齦了新雜劇花串的關兒整齊拴一箇熖釁休教冷淡只玳筵前承應合宜向宫門春色光輝準􅍯著象板銀箏間玉笛正值著繁華月日似這般太平年歲任揭天般簫鼓樂雍熙點絳唇逰藝中原腳根無線如蓬轉望眼連天日近長安逺混江龍向詩書經傳蠧魚似不出費鑽研將棘圍守暖把鐵硯磨穿投至得雲路鵬程九萬里先受了雪窗螢火二十年才髙難入俗人機時乖不遂男兒願空雕蟲篆刻綴斷簡殘編油葫蘆九曲風濤何處顯則除是此地偏這河帶齊梁分秦晉隘幽燕雪浪拍長空天際秋雲捲竹索纜浮橋水上蒼龍堰東西潰九州南北串百川歸舟緊不緊如何見恰便似弩箭乍離弦天下樂只疑是銀河落九天淵泉雲外懸入東洋不離此徑穿滋洛陽千種花潤梁園萬頃田也曽泛浮槎到日月邊節節髙隨喜了上方佛殿早來到下方僧院行過厨房近西法堂北鐘樓前面逰了洞房登了寶塔把回廊繞遍數了羅漢參了菩蕯拜了聖賢呀正撞著五百年前風流業冤元和令顛不刺的見了萬千似這般可喜娘臉兒罕曽見引的人眼花撩亂口難言魂靈兒飛在半天他那裡儘人調戲軃著香肩則將花笑撚上馬嬌這的是兜率宫休猜做離恨天呀誰想寺裡遇神仙我見他宜嗔宜喜春風面偏宜貼翠花鈿勝葫蘆則見他宫樣眉兒新月偃侵入鬢雲邊未語人前先腼腆櫻桃紅綻玉粳白露半晌恰方言么恰便似嚦嚦鶯聲花外囀行一步兒可人憐解舞腰肢嬌又軟千般裊娜萬般旖旎似垂桞晚風前后庭花若不是襯殘紅芳徑軟怎顯得步香塵底樣兒淺且休題眼角留情處則這腳蹤兒將心事傳慢俄延投至到龍門前面剛那了一步逺剛剛的打箇照面風魔了張解元似神仙歸洞天空餘下楊桞煙只聞得鳥崔喧栁葉兒呀門掩著梨花深院粉墻兒髙似青天恨天怨天天不與人行方便好著我難消遣端的是怎留連小姐呵則𬒳你引了人意馬心猿寄生草蘭麝香仍在環珮聲漸逺東風搖曵垂楊線逰絲撁惹桃花片珠簾掩映芙蓉面你道是河中開府相公家我道是海南水月觀音現尾聲餓眼望將穿饞口涎空咽空著我透骨髓相思病染怎當他臨去秋波那一轉便是鐵石人意惹情撁近庭軒花桞爭妍日午當庭塔影圎春光在眼前爭奈玉人不見將一座𣑽王宫疑是武陵源八聲甘州懨懨瘦損早是傷神猶值殘春羅衣寬褪能消幾箇黃昏風裊篆煙不捲簾雨打梨花深閉門無語憑闌干目斷行雲混江龍落花成陳風飄萬點正愁人池塘夢曉蘭檻辭春蝶粉輕沾飛絮雪燕泥香惹落花塵繫春心情短柳絲長隔花隂人逺天涯近香消了六朝金粉清減了三楚精神油葫蘆翠𬒳生寒壓繡禋休將蘭麝薰便將那麝蘭薰畫則索自溫存昨宵錦囊佳製明勾引今日玉堂人物難親近這些時睡又不安坐又不寧我欲待登臨不快間行又悶每日家情思睡昏昏天下樂我則索搭伏定鮫綃枕頭兒上盹但出這閨門影兒般不離了身小梅香扶侍的勤老夫人拘繫的緊恐怕俺女孩兒折了氣分那吒令往常時見箇外人氲的又早嗔但見箇客人厭的我倒褪從見了那人呵兜的我便親想著他昨夜詩依前韻酬和得清新鵲踏枝吟得句兒勻念得字兒真詠月新詩索強似織錦回文誰肯針兒將線引向東鄰通殷勤寄生草想著俺文章士旖旎人他生的臉兒清秀身子兒俊性兒溫克情兒順不由人口兒裏作念心兒裏印學得來一天星斗煥文章張生呵不枉了十年窗下無人問六么序聽説罷魂離了殼見放著禍滅身我將袖稍兒揾不住啼痕好教我去處無因進退無門可著俺心堝兒裏人急偎親孤孀子母無投奔赤緊的先亡了有福之人耳邊廂金鼓連天震征雲冉冉上雨紛紛么篇那厮風聞胡云他道我眉黛清顰蓮臉生春恰便似傾國傾城的太真呀兀的不送了三百僧人半萬賊兵片霎兒敢剪草除根那厮每于家為國無忠信恣情的虜掠人民便做道天宫般蓋造焚燒盡則沒那諸葛孔明便待要慱望燒屯后庭花第一來免摧殘老太君第二來免堂殿作灰瘞第三來諸僧無事得安存第四來先人靈柩穩第五來歡郎年小未成人你須是崔家後代孫鶯鶯為惜巳身不幸上從亂軍諸僧衆汚血痕將伽藍火內焚將先靈為細塵斷絶了愛弟親割捨了慈母恩栁葉兒你將俺一家兒不留一箇齠齔待從軍怕辱沒了家門則不如白練套兒尋箇自盡將我尸櫬獻與賊人這的是逺害全身青哥兒母親都做了鶯鶯鶯鶯生忿對傍人一言一言難盡母親休愛惜鶯鶯一身不㨂何人建立功勳殺退賊兵掃蕩妖氛到陪家門情願與英雄結婚姻成秦晉尾聲諸僧衆各逃生衆家眷誰偢問這生不相識橫枝兒著緊非是書生多議論也隄防玉石俱焚雖然是不關親可憐他命在逡巡濟不濟權將秀才來儘果然有出師表文嚇蠻書信張生也則願你筆尖兒橫掃了五千人點絳唇相國行祠寄居蕭寺因喪事幼女孤兒將欲從軍死混江龍謝張生伸志一封書到便興師顯得文章有用足見天地無私若不是剪草除根半萬賊險些兒滅門絶户了俺一家兒鶯鶯君瑞許配雄雌夫人失信推托别詞將婚姻打滅以兄妹為之到如今棄却成親事一箇價糊突了胸中錦繡一箇價淚揾濕了臉上胭脂油葫蘆憔悴潘郎鬢有絲杜韋娘不似舊時一箇帶圍寬清減瘦腰肢一箇睡昏昏不待觀經史一箇意懸懸懶去拈針指一箇絲桐上調㺯出離恨譜一箇花箋上刪抹出斷腸詞一箇筆下寫幽情一箇絃上傳心事兩下裡都一樣害相思天下樂方信道才子佳人信有之紅娘看時有些乖性兒則怕那有情人不遂心也似此他害的有些魔