front:
  text: 雍熈樂府卷之十七
  hash: sha256:59237be3279bdd41f1838816b40af37e1196e137b7699b1caf970399b4573f50
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_017-1a}
body:
  text: 雜曲醉太平二十首元人汪元亨警世辭龍楼鳯闕納象簡烏靴棟梁材取次盡摧折况竹頭木屑結知心朋友着疼熱遇忘懐詩酒追懽恱見傷情光景放痴呆老先生醉也憎蒼蠅競血惡黒蟻爭穴急流中勇退是豪傑不因循苟且嘆烏衣一旦非王謝怕青山兩岸分吳越厭紅塵萬丈混龍蛇老先生去也家私上欠缺命運裡周折桒間飯誰肯濟靈輒安樂窩飬拙但新詞雅曲閑編掜且粗衣淡飯權掤拽這虚名薄利不干涉老先生過也度流光電掣轉浮世凨車不㱕来到大是痴呆添鏡中白雪天時凉指天時熱芲枝開回首芲枝謝日頭髙眨䀶日頭斜老先生悟也范丹貧瑣屑石崇富驕奢論貧窮何以富何耶十年運巧拙了浮生脱似辭柯葉縦繁華廽似殘更月嘆流光疾似下坡車老先生見也門前山妥帖囱外竹横斜㸔山光掩映樹林遮小茆廬自結喜陳摶一榻眠時借愛盧仝七椀醒時啜好焦公五斗醉時賖老先生樂也源流来俊傑骨髄裡驕奢折垂楊㡬度贈離別少年心未歇吞綉鞋撐的咽㗋裂擲金錢踅的身軀趄騙粉墙掂的腿脡折老先生害也嗟雲収雨歇嘆義㫁恩絶覺逺年情况近来別全不似那些赴西廂踏破蒼苔月等御溝流出丹楓葉赱都城輾碎画輪車老先生勾也恰芲殘月缺又瓶墜簮折並頭蓮藕上下鍬鐝姻緣簿碎扯祅神廟雷火皆轟烈楚陽䑓磚瓦平崩缷天台洞狼虎緊攔截老先生退也棄桃腮杏頰離燕軆鶯舌逺市廛居止近岩穴論行蔵用舍鴈翎刀揮動頭顱缷雞心鎚抹着皮膚裂狼牙棒輪起肋肢折老先生怕也錦箏搊莫歇紫簫品休絶把紅牙象板按低些皓齒歌未徹聴㡬聲金縷心歡恱飲千鍾玉液身頽趄㸔兩行紅䄂眼乜斜老先生醉也清泉沁齒頰佳茗潤㗋舌喚山童門户好關者把琴書打疊欹菊芲香枕無兢業擁蘆花絮𬒳多窠擪入梅芲𥿄帳緊圍遮老先生睡也金雞唱未徹玉漏滴先絶慢驚回枕上夢蝴蝶起秋聲四野撼林梢一陣凨兒劣墜天邊一點參兒趄照床頭一片月兒斜老先生覺也恠鶯兒亂啼驚蝶梦𥘉回正春凨草滿謝家池睡齁齁鼻息奕棋聲敲上紗囱日拽車聲輾過香塵地賣花聲呌轉画楼西老先生未起莫爭髙競低休說是談非此身不肯羡輕肥且埋名隠迹嘆世人用盡千般計咲時人倚盡十分勢㸔髙人着盡一枰棋老先生見機住雕墙峻宇乗駟馬髙車有枣瓤金子弹丸珠没多時做主燕昭䑓巳見蔵狐兔吳王䑓又見逰麋􅎷子陵䑓不見釣鰲魚老先生吊古㑹談經覧史慣作賦吟詩褁翩翩烏帽挿花枝聴佳人鼓瑟開經天緯地寛胸次展嘲凨詠月長才思吐敲金擊玉欵言詞老先生俊死結詩仙酒豪伴栁恠芲妖白雲邊盖座草團瓢是平生事了曽閉門不受徴賢詔自休官懶上長安道但探梅常過㶚陵橋老先生俊倒褁烏紗帽短罩白苧𫀆寛喜無拘無束舊衣冠歩前村後疃㸔七貧七富從他換料一生一死由天㫁且半真半假𬒳人瞞老先生不管耳聞時做聾眼見處推盲且逹時知務暗包籠權粧箇懵懂聴人着冷話来調㺯由人着死句相譏諷任人着假意厮過送老先生不董醉太平八首自警恰金烏去也早玉兔跟者想百年一枕梦蝴蝶有甚麽話説幹功名有若花開謝享榮華相比燈明㓕競錢財情似影盤踅老先生意歇向山村静處築茅舍幽居任教他日夜儘貪圗使身心受苦大粧妖㡬箇登豪富強争頭㡬箇張名譽乍施逞㡬箇鉄䂓模老先生咲汝恰門前雨歇又屋角雲遮愛青山四面緊圍者咲無休話說玳筵前朝日添懽恱翠屏邊每夜知疼熱画堂中整月㝡驕奢老先生咲也三家彎路邊五岔口門前撫孤松終日自盤桓喜山居過遣愛嵐光瑣洞青如靛㸔烟光明媚白如練玩波光㶑灔碧如天老先生對眠㸔白雲萬丈映翠竹千竿賦㱕来飽飯兩三飡晃韶光過眼怕行舟逺使追張翰倦登楼爛醉思王粲緊關門髙臥效袁安老先生意懶清凨生樹梢明月上芲梢画堂深不換草團瓢向蓬囱咲傲喜歐蘓翰墨難能效慕班楊才望何能到講程朱義理怎能學老先生㸔了不經啇販茶莫在縣裁花就安排村裡做庄家要尋常淡雅向東臯冒雨扶犁耙去西坡帶露鋤苗稼對南山映日㸔桒麻老先生傲煞孝劬勞父母敬逺近親属棄功名多讀聖賢書感唐堯帝主謝天㤙放道休官路省人情置所安身處盡公心得𥿄護身符老先生願足醉太平六首警悟戦篤速手脚軟兀刺軀勞強支吾扶不起沈郎腰乜斜着矑老熱不熱冷不冷空􅞕躁眠不成睡不穏干黒怮頭不梳臉不洗忒鏖糟老先生病倒春容回面頰喜氣上眉睫聴吹者舞者更弹者喚紅兒在那些病形骸打掙的身子撦悶情懐抖擞的心腸熱小丫鬟簇擁定呌爺爺老先生好也稀粥湯半合軟羊肉新割不甫能自覺好也囉絮叨叨念聒撚汗貨把銚兒向爐中坐大桃皮一謎裡胡啇和有精神再不怕小兒魔老先生較可瘦身軀不懶劣病症纔安等閑歡咲便開顔舊凨情早􅶫入排塲調音律猱兒惮倚芲門説聲嗽書生訕㑹席中掂八义手兒慳老先生撒頑藥品湏治理病軆要将息這人生災殄只慿醫本不求神告鬼禮懴的鼓兒鼕鼕擂㸔經的鑼兒璫璫擊一任他小的每亂胡為老先生咲你列華筵玉䑓㑹佳節金堦㸔壽星光現彩雲開衆神仙到来三千年福壽增髙大五百年恩寵春常在一萬年歡㑹永和諧老先生樂㢤醉太平四首嘆世散牛羊漢塜走狐兔秦宫一般消洒月明中競虚名閗勇一身罪悪千鈞重百年勲業三生梦五湖烟水一㠶凨飬殘軀善終陶朱公釣船晋處士田園潜居水陸脱塵緣比别人慮逺賢愚叅雜随時變醉醒和閧迷歌宴清濁混沌待殘年休果波屈原人皆嫌命窘誰不見錢親水晶丸入􅔇糊盆纔沾粘便滚文章糊了盛錢囤門庭改做迷魂陣清廉貶入睡餛飩胡蘆提到穏君唐虞聖明臣伊吕廉能兆民簫鼓賀豊登舊凨流老成貪婪芲酒酬歡慶留連歌舞添盃興糊突梦魂有誰醒大家酔太平醉太平四首春夏秋冬情思啼春殘杜䳌掃芲落鞦韆杏桃張錦栁含烟供相思淚眼啼痕界破殘粧面離情題遍緑紈扇新愁寫滿碧雲天無一箇鴈傳碧紗厨錦嚢紫籐簟牙床榴花噴火晝𥘉長梦回時念想朱顔逰子常飄蕩紅粧仕女空凝望青鸞舞鏡自慚惶遣愁人㫁腸轉梧桐月影穿簾幙秋聲衣裳㣲露暮寒生入深閨户扃芭蕉凨㝎羅幃静麝蘭香散鴛衾剰轆轤聲断梦魂驚盻不到五更寒梅開正濃斜月淡烟籠東簷鉄馬戦西凨動凄凉萬種恨君絶念離情重思君不見牽心痛見君無語正歡濃覺来時梦中又凨流老兒倒溜油黒染了鬂絲旋添綿紅暈了丰姿拄一條仙杖是連枝将縷金腔教子錦圍屏布列在香山寺翠紅鄊出落着耆英志花胡洞傳寫的壽星詞是一箇凨流老兒又凨流病叟就輕紅焐手喚小玉扶頭少年狂翻做老来羞不傷春便中酒腔腔咳肺因花嗽稜稜衰骨躭花瘦蕭蕭白髪為花愁是一箇凨流病叟又凨流散仙小鶯花洞天閑凨月芝田長生會上舞蹁躚聴瑶池管絃噀香醪曽赴金鑾宴幻名花曽到藍關甸步芳春曽入武陵源是一箇凨流散仙又凨流秀才論文章舞䑓赴考試花街束修錢統鏝使将来把西廂記註觧演樂􅈦揑下酸丁怪教學堂賖下勤兒債㸔書幃苫下女裙釵是一箇凨流秀才又凨流貴師鉢盂為酒巵錫杖做花枝晌古麻紅褪染胭脂戴左雞帽兒撇花鈸屏旁撲察為佛事呪花米一六兀刺談文字揚花旛吸哴胡突唱畨詞是一箇凨流貴師又凨流舍人玉兎鶻粧着帶根金孔雀綉着襕裙皂皮靴刺着倒提雲荅納珠墜着耳輪許猱兒一夜一箇夫人分嗊撅丁一日一箇從良運閧䖍婆一句一箇改家門是一箇凨流舍人又凨流故友掃愁懐玉帚釣詩興金鈎相逢索喚不曽休直喫的酔醺醺罷手梦池塘每夜同衾宿宴秦楼数遍相携手入桃源㡬度共追逰是一箇凨流故友又凨流縣宰晋潘安俊材宋栁玉情懐陶淵明㱕去向彭澤都是貪花秀才似河陽桃李春凨在似江楼夜月扁舟待似東籬詩酒菊花開是一箇凨流縣宰又凨流令史銅駝巷判詞金斗那分司麗春園双漸拜為師李孔目是他老子攛廂時勘問些烟芲事刷卷時改抹些鴛鴦字㫁案時出脱些燕鶯兒是一箇凨流令史又凨流小着青衫㑹耍騎竹馬學蹅紫鸞簫打捷譏手中拏未曽行要串瓦玉温柔懐抱裡聲嗚啞翠娉婷幃幙裡學説話錦糢糊䄄褥上恰能􅐡是一箇凨流小又凨流客人鶯花市販本凨月店調箏懐揣掌記入芲門似茶塩鈔引識江湖深淺舡兒運品姿才髙下心兒順散恩情輕重等兒分是一箇凨流客人又凨流太醫製牡丹在栁堤採芍藥在芲溪千金方權改做樂章集看傷春脉息洞春膏靈騐曽調治素女論玄妙常􅌻記房中術幽奥頗能知是一箇凨流太醫又凨流小僧雨雲䑓講經凨月所修行小禅床擺列錦幃屏習烟芲宻乗細樂中嚮盞是天王磬撇末中靠背是菩薩幀舞旋中歌曲是禮佛聲是一箇凨流小僧凨流道姑褁琅函綉袱鑄鸂􅥩香爐縷金詞改做玉樞讀把青天歌舞做鷓鴣玉淸菴認做章䑓路長生録寫入􅊚縁簿九陽巾換做翠冠梳是一箇凨流道姑又凨流酔翁阮步兵眷寵李太白遺凨殷勤翠䄂捧金鍾共歡娱興濃紫駝牽載的葡萄瓮金龜換暢飲酴醾洞玉山頽扶入牡丹叢是一箇凨流酔翁又凨流乞兒破瓦窑綴詞悲田院吟詩一生衣祿在扵斯窮則窮浪子唱一箇蓮花落不忘傳心事掛着箇舊爻槌常入烟芲市做得箇乾凨情纏那女嬌姿是一箇凨流乞兒又凨流樂官開呵時運寛發熖處堪觀薦子梁把戯数十般盡都曽教管能歌時曲能蹅爨能翻古本能粧判能収新韻助倩歡是一箇凨流樂官又凨流女娘花衢中古塲栁陌裡名揚氷肌玉骨自然香伴知音粉郎多温柔多嬌媚多情况能吹弹能編揑能歌唱㑹言談㑹耍咲㑹梳粧是一箇凨流女娘又凨流妳妳肉鰾膠怎觧錦套索難開兔羔兒子弟撞将来不亡魂也丧魄眉児来眼兒去先賖下凨情債担兒沉價兒重髙抬着烟花賣酒兒烘情兒熱冷句子甲􅶫来是一箇凨流妳妳又凨流姐姐𥿄糊鍬莽鐝銅磨笴疾菱陽關一曲唱三疊但沽着㺯撅點朱櫻檀口噴蘭麝壓秋波眉黛彎新月露春葱纎手慣𫾣俫是一箇凨流姐姐又重陽無酒醸寒凨似刮催詩雨如麻東籬寂寞舊栽芲上心来悶殺孟叅軍整烏紗低首頻嗟呀陶縣令掩柴扉緘口慵扳話蘇司業檢奚嚢弹指吿消乏白衣人在那荅又逰春友不至芳塵衮衮香霧氲氲東凨何地不精神流鶯也喚人栁屯雲護錦城闉兩岸黄金嫰杏酣春映山村萬樹胭脂噴草鋪䄄褥繞湖濵一片綠絨新不閑逰是蠢又輪蹄冗雜羅綺交加東凨無地不繁華庄農也戯耍倚谽谺悪枒槎老樹臨溪汊閙唧喳隔山花好鳥鳴山窊蕩光滑亂明霞流水接天涯不閑逰是儍又書所見二八年艶娃五百歲冤家海棠亭畔翫韶華無褒弹俊雅臉慵搽倚囱紗翠䄂氷綃帕步輕踏涴塵沙錦靿青綾韈咲生芲喚烹茶檀口玉粳牙羙人圗是假又閨情惜花人那廂吹簫侣誰行好春光翻做悪凨光三般愁怎當入蘭房恰昏黄画角偏嘹喨掩紗囱未思量杜宇聲悲愴上牙床正恓惶鉄馬越丁當不傷心也是謊又歡情樂閑身酒酡乗髙興詩魔詩酬花酒債偏多儘虚名負我鸞簫寫恨銀箏和鳯盃挹醁金橙破雲囱並枕玉人歌快活也快活又離情積閑愁渭城分離恨長亭戀君無計送君行唱陽關蹇情一篇疊怨双愁聴一盃別酒君休剰一聲保重淚如傾則離心最疼一學老叟狂越羅衾熨貼蘄竹簟鋪設象牙床琥珀枕鳯頭結三般兒打疊鳯頭結綰不住心狂劣象牙床温不暖情嬌怯琥珀枕辟不㫁性乖斜賺殺人也麽姐姐二恰珠楼宴徹把玉液斟竭困朦騰嬌眼半睁者綻桃花嫰頰歩香塵立不穏金蓮趄啓朱唇語不定嬌鶯咽軃烏雲扶不起緑鬟斜酔