欵步金蓮蹴湘紗纎柔嬌襯凌波襪軟玉鈎新月芽可妬殺髻亂窩叉橫墮貌減愁添怎存活抽籖打卦為工課形兒衰病兒魔何日可孤鴈悲寒螿泣恰待團圎夢驚回凄涼物感愁心碎翠黛顰珠淚滴衫袖濕玉簮折菱花缺舊恨新愁亂山疊思君凝望臨臺榭魚鴈杳音信絶何處也寨兒令妓情黃肇利馮魁蠢惟有通神鈔和銀奴非不愛雙生俊鴇兒嚴坡撇狠錢上緊狗探湯魚著網急走緣身痛著傷價要華貌邪魔旺價㺯柔花艷粧君莫賞買笑金纒頭錦得遇知音可心人倦逢狂客天生沁摔死鶴劈碎琴不害磣和曲詞調琴指偕我撚香剪青絲忘恩刴斷鴛鴦翅唵左科喬到兒再休提寨兒令嘲烏衣巷祿千鍾家百口父子居官弟封侯畫堂不管銅壷漏休費心休過求跌破頭二嘲江湖客貨物收金珠有勞勞終日早白頭鹽啇茶客結朋友江內宿湖上逰死才休三乞兒郎凨雪狂衣衫破凍捐多情鄭元和哩哩嗹嗹嗹哩囉學打蓮花落不甫能逢著李亜仙有分的撞著李婆婆怎奈何四喬凨月夜巳闌燈將滅紗囱外昏慘慘月兒斜越求和越把身子兒趄耳輪兒揪膀背兒揑罵道是喫喬才我怕你悔去也
