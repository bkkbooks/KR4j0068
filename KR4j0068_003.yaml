front:
  text: 雍熙樂府卷之三
  hash: sha256:6de58cc244f1db56e6a4dbbcd48545bc0e6b096221d7f357bb3946903ea4c81a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_003-1a}
body:
  text: 正宫端正好衣錦還鄉一班兒扶社稷衆公卿多應是隨聖主天差降一箇箇笑吟吟志氣昻昻與皇家出力忠良將堪寫在凌煙上滚繡毬是男兒顯紀綱掃蠻夷定四方不枉了故鄉人仰望俺在長亭上等不到半霎兒時光看紛紛的塵土生聽珊珊環珮響並馬兒相行排列著聖朝卿相唬的那庒農每無處潛藏馬頭前銀盆水罐成行擺更有那狼虎公人列在兩廂一箇箇壯貌堂堂倘秀才父老每急慌忙下跪在路傍大人每都把這謙辭禮講他道是數十載今朝還故鄉將小童每審箇端的年邁的問箇行藏這的是大人每大量脫布衫明聖主仁倣三皇明聖主德似陶唐明聖主千邦讃禮明聖主萬民仰望小梁州百姓每虔心一炷香一齊的拜謝吾皇謝吾皇垂拱整朝綱今日箇升平象著俺那黎庶每得安康么篇願神孫聖子常興旺願金枝玉葉榮昌願吾皇聖體安保護的山河壯普天下軍民仰望賀萬夀永無疆端正好武臣享福享富貴受皇恩陳綱紀明天道貫胸襟虎略龍韜威儀楚楚全忠孝文共武皆竒妙滚繡毬擺旌旗霞彩飄列干戈日月髙驟蹀躞馬􅋦著金絡撼玲瓏玉挂絨絛擁髙牙大纛雄坐重禋列鼎肴靄畫堂瑞煙籠罩撲湘簾花霧飄颻金爐火暖龍涎噴銀燭光輝絳蠟燒歲月逍遙倘秀才朝鳳闕朱衣紫𫀆升虎帳貂裘繡襖瞻仰龍樓爵祿髙氣昻昻趨黃道雄紏紏侍清朝近鑾輿玉藻呆骨朵丹書鐡劵金花誥撫華夷四海名標旌旗影欵動龍蛇金鼓響驚飛燕雀出落著威武非熊兆調鼎鼐理隂陽居廊廟普天下賀太平夀域開宰臣每整乾坤安定了貨郎兒開大宴齊臻臻華筵前歡樂香馥馥珍羞美肴有交梨火棗有蟠桃炮麟脯烹魚尾燒熊掌煎羊羔醉太平有龍笛鳳簫間鼉鼓檀槽擺列著笙歌妙舞出妖嬈唱黃鍾六么萬民豐稔皆歡樂八方寧靖開懷抱四時康泰盡和調尾聲文修武略日轉千階穩拍拍撫鎮邉庭把這煙塵靜掃端正好藝窗下守青燈蝸舍裏觀黃卷志功名將鐵硯磨穿今朝待把鰲頭占穩情取登科選滚繡毬只因是三月天賞禁煙見了箇意中人把他留戀片時間接了絲鞭雖不曽口內言將情意傳子俺這兩心中暗包藏著一天哀怨恰相思早黑海似無邉我這裏恨無青鳥傳芳信他那裏待得鸞膠續斷絃兩意懸懸倘秀才我見他出香閨湘簾乍捲他那裏溜秋波星眸半轉宫額塗黃貼翠鈿整金叉鬆霧鬢舒玉指理冰絃天生的可憐滚繡毬從今後你將那新子弟休顧戀舊相識不要纒學些箇好人家體面我出言在駟馬之前從今後鐵銚盤少去煎銅磨笴再休轉𥿄湯瓶不須紈扇你將那水塌房皮解庫關閉的完全子道你尋著駿骨把黃金買誰想你夢見槐花要緑襖兒穿好教我半晌無言倘秀才怕甚的當家火一年半年費用過千錢萬錢子你這銅斗兒家私我自專我子教孔方兄常當足老薄嫫少熬煎霎時間過遣白鶴子我見他瀉金波親捧勸停玉斚嚲香肩髙唱著金縷詞半掩圈金扇么支楞的冰絃上傳密意髙韻內寄情篇聽數句鳳鸞吟搊一曲春閨怨紅繡鞋子我這新女壻𥘉成繾綣你將那舊姨夫再莫留連玉粳牙休兜上野狐涎我為甚緊栽連理樹子要你同長並頭蓮休道是你緣薄咱分淺快活三恰才明月圎沒揣地起雲煙自來好事不堅牢又引的東君怨栁青娘曽著重拳他是箇煙月所中窮原憲不識人意嫌尚古自緊相纏在花街贍表有半年你待將精銀響鈔買轉買不成儘世團圎抵多少舞裙邉歌扇上結姻緣道和對嬋姢對嬋姢休索苦縈牽恰開筵教俺教俺自呫教俺教俺成嗟怨村夫空使買嫌錢暗埋冤埋冤他不知些回轉尚自諞那些那些識體面開談便覺村筋現那些那些知空便若還到此來相見玳筵之前數他一篇問的他淹淹淹乘首再再再難言耍孩兒向這花門栁戶均休戀你便有賽陸賈的機謀怎展你道有花星正照二十年單注著郎君每赤手空拳起𥘉時能推房內頑石磨間深裏賣了城南金谷園聽咱勸做虔婆的把千斤斧劈開腦袋做女娘的將九股索套住喉咽八煞我和他身如比目魚情同錦水鴛百年和美成姻眷間開東閣看歌舞悶向西樓列管絃貪歡宴受用些金叉十二紅粉三千七煞他那陷人坑埋伏的深迷魂陳擺布的圎他響玎璫放幾枝連珠箭他白奪鐵鷂三千引贏得青蚨十萬錢子弟每子索把降旗展輸的你有家難奔有口難言六煞同歸霧帳中雙欹月枕眠冰肌玉骨芙蓉面準備著金冠霞帔升三品寶馬香車直萬千怎比你身微賤慿著我一生壯志滿腹韋編五煞那一箇不聰明不十全不多財不有權下場頭少不得成哀怨送了些他鄊鹽客和茶客都只為每日花錢共酒錢我也親曽見送的人爻椎瓦罐只因是品竹調絃四煞有一箇王妙妙死哭秦少遊有一箇裴興奴重逢白樂天有一箇燕子樓許盻盻思張建他都曽芳心恨寄青鸞鏡抵多少淚血染成紅杜鵑你道是娼優賤怎生也夫妻情重節義心堅三煞他子待錢財鈔貫親怎肯將聰明文學憐如今那虔婆每不道的羊兒般善有錢呵管甚麼臭回回臊羅羅同衾睡無鈔也你便是俊子弟愰郎君獨自眠如今世態多更變他把那張三舍門前恰送李二哥後巷忙搧二煞只因咱風流情興多功名心較逺強爭春引惹的蜂蝶怨暫留月館風亭內醉倚紅裙翠袖邉看了這桃花面因為俺一時間恩愛成就了五百載姻緣尾聲老薄嫫心放寬俊嬌娥情索專你將箇志誠心永逺成姻眷直教你駟馬香車將姓名顯端正好學唱紫芝歌不復紅塵道早離了錦排場月夜花朝子我尋真誤入蓬萊島躲世事來西嶽滚繡毬看了這悠悠的白雲出翠岩隂隂的蒼松際碧霄盡都是淡氤氲紫霞籠罩怕甚麼冷清清秋意蕭條霜欺得一叢叢山果兒紅風吹得一堆堆樹葉兒凋近著這剗修得另巍巍華隂古廟響潺潺水縈回土洞石橋愛的是勢崢嶸九重天上仙人掌聲嘹喨五色雲間玉女簫靜悄悄端的是清髙倘秀才淺撇撇半間房權時借了齊整整衆仙長誰曾問著軟兀刺的圜床上坐幾宵添香燭參聖賢運漿水打勤勞便辛苦笑欣欣的受了滚繡毬將俺這油䯼髻梳洗通粉骷髏改換了將一箇縷金腔改做這步虛聲調打扮做出家兒丫髻環絛穿著的壯草鞋粗布𫀆也子是我心中所好但行時不離了木碗椰瓢子俺這黃精洞裏猿鶴友抵多少白玉樓中翡翠巢這一件難學呆古朵愛青山特地來修道看著你那些兒善與人交走將來火上又添油誰知他笑中又有刀欺負我年紀小賣㺯他通玄妙比似這做道姑的不氣長還強如粧旦色的恩義薄倘秀才也是我一時間千差萬錯送的我瘦形骸七顛八倒到𬒳他嘴揾地推翻這一交子聽的半空中風雨響山凹裏鬼神嗥耳根前閙炒醉太平我子見老神仙覷著傳法旨聲髙金冠鶴氅羽衣飄罩祥雲繚繞他道是玉女峯強似蓬萊島回心石自有靈丹藥蒼龍岩漸得宴蟠桃道了箇守靜姑記著脫布衫子我這頭直上香風縹眇眼前面秋景寂寥再不向心坎內堆積著懊惱再不聽耳朵邉格揪著聒噪小梁州搭伏定磐石過一宵怎當那襪冷衣薄見了些銀河清淺夜迢迢恰捱的鐘聲報將行李杖頭挑么聽荒村野店雞𥘉呌怕甚麼山路﨑嶢一回家腹內思心中料神仙指教平地上青霄二煞子見他揎拳將袖來尋閙唬的我低首躬身且告饒使他那舉止村沙聲音莽撞眼腦張狂心地鏖糟你子待欺􅝇天地搶奪錢財亂下風雹不是你望空禱告這的是人怨語聲髙尾聲子我這草鞋寬忒刺著金蓮小布裙大遮藏了玉笋嬌步窄難行獨木橋力弱難攀老樹稍頑石上停息四五邅苔徑上滑擦二十交閙吖吖猿猴竹外號惡狠狠豺狼路上跑碧蔭蔭松柏左右交磣可可妖精來往攪石砌就深岩入土壕鐵索做雲衢上九霄投直到玉女峯頭訪仙道便是箇慣打掙的身軀也走的困乏了端正好全昧了聖賢心空惹下妖邪氣剗地道秀才家經史曽習尚不知隂陽消長其中意枉了你鑽故𥿄十來歲滚繡毬他常是明滳溜出海天怎肯去黑答窟共枕席伴你的敢子是鬼精妖魅論常經日月交蝕他那清光即古是今循環有盈與虧子他那影山河是玉蟾丹桂共三光五嶽名齊常子是玄霜玉杵和仙藥他怎肯暮雨朝雲入繡幃枉費了你心機倘秀才看了他風風勢勢不由我傷情痛泣看了他拈起東來忘了西這的是名登龍虎榜抵多少身到鳳凰池著朋友每也笑你滚繡毬見如今瘦伶仃氣力疲病淹煎語話遲尚古自我根前做些回避常言道酒病是花醫自早晨到晚夕幾曾嘗半星兒滋味甚的是遇神仙法力扶持怕不你溫存暖𬒳三更夢空教你撥盡寒爐一夜灰悔後何及倘秀才都子為唐明皇藏頭露尾因此上葉靖師􅝇心昧巳送的他玉骨香肌踐馬嵬都子是霓裳歌好聽直令得蜀道輦難回下場頭落的滚繡毬我子道孫真人能救急王叔和知脈息却怎生請將來百般不會怎做的祖傳來三世行醫你見他瘦懨懨軟了身子黃淹淹的改了面皮又道是近新來感著些時氣休猜做乞兒每飽病難醫這秀才常懷秋月心千里到做了細看春風玉一圍須索參知倘秀才你道是柴胡湯加些枳實益元散調著蜜汁這的是退熱寬中進飲食敢不如桂花頭逢逺志天仙子共當歸子要點蟾酥半粒醉太平本是箇山精樹鬼錯認做越艷吳姬你道是芙蓉如面栁如眉尋思起就裏團圎夢裏添憔悴分明色上迷精細清光影外辨真實我子怕悔之晚矣叨叨令都子為月嬋姢消盡了風雲氣致令得性踈狂全忘了經書義因此上病淹煎錯認了妖精勢近新來口填涎淡薄了珍羞味兀的不誤了你也麼哥兀的不誤了你也麼哥怎生來􅎥酸梨倒把甜桃棄脫布衫我這裏意躊蹰傷感傷悲他那裏死臨侵如醉如癡嘴骨邦獨行獨立呆答孩不醒不醉小梁州好著我跌腳鎚胸告訴誰淚似扒推沈郎多病不勝衣添憔悴都做了風月此情知么乜斜著眼腦胡支對一會家意張狂腳步查梨你道是月宫中非人世都𬒳那雲情雨意沒揣地蔽光輝二煞常言道男婚女娉人常理鬼夢妖言總𬒳迷恰便似指山賣磨緣木求魚望梅止渴畫餅充飢那裏也聲聲相應事事相諧步步相隨誰著你攀髙折桂到做了愛月夜眠遲尾聲檢名方用藥難醫治論造化將言勸不回全無些肯懊悔癡著心昧天理看了他軟兀刺身體無絲力似隔著一𥿄兒陽間便是鬼端正好我將這祖燈傳佛光禮出三途八難災危靜中禪愛把機鋒對受萬法宗臨濟滚繡毬有時將公案題有時將棒喝馳我把這趙州茶略嘗滋味問門呵南北東西問路呵線迸似直問道呵從腳下起問靈臺呵一方之地赤緊的老婆心忒晒慈悲無臺無樹將何掃非色非空我不知冷笑微微倘秀才你將那兩片皮休著杖擊七箇竅休將氣吹收拾在腔兒裏暖肚皮直等的竅中春靉靆皮上汗淋灕那其間誰得似你滚繡毬我向那青山中獨步歸將一箇白牛兒自在騎調伏的他性兒純粹順西風一曲羌笛也不收丢了他我向那草坡前黑婁婁的鼾睡醒來時團㺯著一顆摩尼我不怕頓開鐵索蒼蛟走摔碎金籠彩鳳飛到大來便宜貨郎兒平康巷水甜人義夷山側韶光正美一川風色晚煙迷我子待改乞留曲吕蚰蜒道退稀溜合刺虼蜋皮自呷呷笑起黃梅雨後有一箇能明繼赤肉團上有一箇真人位紅爐𦦨裏有一點雪花飛我若是跳出這圈兒誰姓李叨叨令得吾師開發的多伶俐謝吾師警䇿的多詳細感吾師指示的殷勤意愛吾師逼拶的機鋒利兀的不醒了也麼哥兀的不悟了也麼哥與吾師都得赴龍華會貨郎兒積善的多存隂隲似靈芝生于糞堆常行好事福相隨聽了這不明不暗希竒事一會家指空畫空説玄機直恁地神通智慧直恁地佛力精微叮嚀説到兩三回教妙清記只他道俺久巳後脫離