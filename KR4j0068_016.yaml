惱惱怏怏歸來入繡幕想薄情鎮日魂消乍離別難棄捨縈惹的懨懨瘦怯金菊香多因他意重我情薄既不索可怎生鴈貼魚沉音信杳相別時話兒不甚好好著我恨鎖眉稍越凄涼越思想越添焦髙平調尾情懷驀驀越焦躁冷冷清清更漏迢盈盈夜眼不暫交畫燭熒熒他也學人那淚珠兒落暢道有幾箇鐵馬兒鐸丁璫的空聒噪嚮珊珊梆梆的寒砧搗呀呀的塞堆南飛更合著那促織兒叨叨的絮無了喜梧桐重九佳辰值晚秋人比黃花瘦處處登髙又早重陽候東籬畔有人來送酒塞雁呀呀過南樓紅葉黃花山色渾如繡冷颼颼風蕩波紋皺西河栁景物幽情意投龍山賞玩飲興酬戲馬臺前憶舊逰瓊漿捧玉甌烏紗却戀頭便做傷心競把茱茰嗅颯颯西風吹敗栁密匝匝的擺珍羞聽一泒仙音樂奏一封書香橙嫩旋剖喜今朝九月九同歡會莫愁蟹初肥酒正􅌻正好傳杯同宴樂迅速光隂不暫留莫剛求且忘憂問取來年誰健否皂羅袍隱隱江山依舊把香醪滿泛艷曲低謳眼前霜降水痕收狂歌痛飲休僝僽纖纖玉手銀箏欵搊長長彩箭銅壷慢投歸家拚取黃昏後尾聲宴良宵過白晝盛年佳節可追逰共享天長和地久定風波離情迤邐秋來到正露冷風寒微雨𥘉收涼風兒透裂襟袖自別來情萬感遣離愁不堪回首金菊香到秋來還有許多憂一寸心懷無限愁離情鎮日如病酒似這等懨懨終不肯斷了風流醋葫蘆人病久何日休思情欲待罷無由哎你箇冤家怎下的辜負子我知伊主意料應來倚仗著臉兒羞尾聲本待要棄捨了你箇多情別尋箇玉人兒重配偶強似你的模樣兒的呵便做道我不能勾勝似你的心腸兒的呵敢到處裡有梧葉兒太平民安樂軍袖手擊壤牧童謳詞頌簡王條正户口增丁數有田野闢四時收保社稷天長地久鳯鵉吟禾黍又收倉厫中米麥有把香醪自釀􅌻農事又周不耕耘間坐久訪知交謁故友與賔朋相趂逐飲一場醉酒今日醉明朝依舊謝天公雨露均感聖主恩寬厚俺農家無慮無憂四季花晚來漁父離灘頭樵子訪瀛洲偶然相遇楓林後携手笑相逐相逐一齊的長嘯海山秋鶯啼序風情孤幃一默殘燈見半滅猶明夜迢迢斗帳寒生盻雕鞍把歸期細數恨浪迹全無音信把前歡自省説來的話兒無憑黃鶯兒無語對圍屏正譙樓鼓二更梅花笑殺人孤另踈鍾幾聲殘角數聲薄衾單枕愁難聽影伶仃岩岩瘦骨離恨教我怎支撑集賢賓椰榆鬼病誰慣經但舉步難行翠袖金叉無心整好梳粧一日何曽自古道佳人薄命盻不到美滿前程閗雙雞芙蓉面芙蓉面淚珠暗傾楊花性楊花性別離太輕自是東君薄幸一樹紅芳誰管領浪蝶狂蜂休要閗爭簇玉林天涯路長短亭怨王孫芳草青晝長羞把闌干憑幾度把鱗鴻倩千言萬語猶自恐欠叮嚀琥珀貓兒野花村酒他那裡醉還醒冷落誰憐冬暮景奴耽寂寞你飄零難憑頓忘了神靈前海誓山盟尾風流惹下相思病也只索把情郎癡等他無有真情我辦著志誠黃鶯兒别况無語無語悶人怕到江天日暮大都來一種相思柔腸萬縷踏莎行嫩玉肌膚會調絃理管能歌妙舞從別後有誰拘束么求神問卜道須有團圓一處奈目下佳期未得相逢愁最苦正值著秋光暮天凄楚蓋天旗愁成陳更壓著宋玉便是鐵石人也今宵耽不去早是恓惶能對付難禁處凄涼景囪兒外眼撮聚隨煞起一陳菊花風下幾點芭蕉雨風送得菊花香雨打得芭蕉絮芭蕉雨敵庭梧菊花風戰檻竹黃鶯兒寓僧舍秋色秋色幾聲悲愴孤鴻出塞滿園林野火烘霞荷枯栁敗踏莎行水館煙中暮山雲外泊孤舟古渡側息風霾淨塵埃寶剎清涼境界僧相待借眠何礙垂絲鈎風清月白有感心酸不耐更觸目凄涼景物供將愁悶來月𬒳雲埋風鳴天籟蓋天旗僧舍窄蚊帳矮獨擁單衾一宵如半載舊恨新愁深似海情緣在人無奈幾般兒可怪隨煞促織絮惱情懷砧杵韻無聊賴簷馬奢殿鐸鳴踈雨滴西風殺能斷送楚雲臺會禁持異鄉客夜行船花底黃鸝聽聲聲一似喚人逰戲東凨裡玉勒雕鞍爭馳佳時日暖凨和偏稱對景尋芳拾翆遙指隱隱在杏花村深處酒旗搖曵本序迤邐曲徑芳堤競香塵不斷往來羅綺亭臺上急管繁絃聲催雙飛蝶舞花枝鶯囀上林魚逰春水芳菲點檢在萬花中昨夜海棠開未鬪寶蟬堪題緑栁隂中見鞦韆髙挂綵繩飛起是誰家士女雙蹴嬉戲相宜奇花映粉腮輕風蕩繡衣動情的正是逰人墻外笑聲墻裡么篇聽啓春色三分怕一分塵土二分流水向花前共樂莫負良時歌妓低低唱小詞雙雙舞柘枝可人意間竹桃花相映小橋流水錦衣香芳草池魚逰戲翆栁堤同逰戲我只見士女逰人幕天席地高挑一架閙竿兒深深步入杏䲧桃溪對良辰美景想蓬萊也只如是休把間愁繫且拚沉醉光隂迅速人生能幾漿水令正相同尋芳未已奈紅輪已覺墜西海棠枝上子規啼聲聲是他喚的春歸花隂下人似蟻花藤轎兒雕鞍騎相隨趂相隨趂凨流隊裡拚沉醉拚沉醉醉扶歸尾聲今宵共約同歡會先教從人歸去安排辦下筵席
