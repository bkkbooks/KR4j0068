body:
  text: 箇佳期重㑹早喜遇着神仙聚㑹風光好則碩的歲歲秋光閗乞巧粉蝶児走驃騎節遇端陽慶㽔賔萬民歡暢感吾皇聖夀無彊艾如旗蒲似劒靈符浩蕩户納千祥鎮妖氛􅍔除福降酔春風文共武御苑中武和文金殿上聖明天子重賢臣因此上享享射栁爭功龍舟競渡騎驃爭放酔高歌喊聲髙炒閙空蒼金鼓鳴春雷震響馬咆哮爭把門旗望百丈旗巍巍蕩蕩紅繡鞋鸞鈴響驊騮爭放比髙低各自斟量抖搜精神姓名揚一箇箇施巧藝一箇箇逞䏻強恰便似惡相持爭戦塲石榴花拖塵赶鏟急心忙蹬塵邁步脚慌張掲鞍換屜甚安詳攛梭在兩廂蹬裡把身蔵流星赶月如飄蕩剪刀股二足着忙肩庒起範登雲漾斜挿栁絶妙把名揚閗鵪鶉最險的是隔肚穿錢滚鬃過膛身軀倒仰彊板逹直挺身軀金錢豹緊追莫慌我則見那左右入鞍捨身落地乆占塲節節髙自忖量打虎的是存孝威風射鴈的是英雄李廣十二月一箇单獻靴雄威氣象二仙傳道神光虎牢關三戦吕布㫁宻澗四馬投唐五馬破曺操怎當六倒手意急心忙堯民歌呀七里灘垂鈎獨釣隠嚴光八仙慶壽過汪洋星辰九曜顯髙強十靣埋伏列刀鎗進履的張良關公斬蔡陽更有那取經的唐三藏耍孩兒騎鬃倒坐在烏騅上三馬觧来来往往金鷄獨立㝡難當有山門獻杵金剛鬼牽龍緊驟定狻猊豸射白猿深将竒藝蔵張天師驅虎神威降順風児側耳千里眼偷張二煞前跌塵二足慌後探鞦兩手忙鯉魚跌脊随波浪蛟龍出水巴山勢餓虎投崖撲下崗頷搭頦人誇奨三上馬心忙意急五方旗戊已中央一煞伍子胥鞭伏了栁盗跖薛仁貴飛刀起定緑江昆陽大戦驅兵将耿恭拜井天心應敬徳威風鎮四方三跳澗合興旺單雄信割袍㫁義浣沙女抱石投江尾聲寛尭舜過禹湯慶豐年蒙賜賞民安國泰邦威蕩四海来賔萬民仰粉蝶児憶情畫閣蕭踈那里也玉堂人物間别来音信全無拆鸞凰分鶯燕生離開比目病懨懨瘦損肌膚粉慵搽朱唇懶注酔春風這些時縷帶䟎了三分羅裙掩過半幅臨行曽說㡬時回我與你便數數去時節正遇春分回来也必然是夏至到如今又過了秋暮酔髙歌更䦨香冷金爐夜靜燈殘画燭今朝有梦歸何處那里也吹簫伴侣紅綉鞋愁寂寞縈牽腸肚病懨懨瘦損身軀鬂雲鬆意懶甚時梳茶飯上無些滋味針指上减了工夫塵蒙了七絃琴冷了鴈足普天樂意徘徊心猶豫知他在科塲應舉翰苑陞除崢嶸在画閤中顯耀在蘭堂住閃的我便冷冷清清捱朝暮想薄情負我何辜撲簌簌兩行淚珠悶懨懨九分病苦氣絲絲一口長吁上小樓也是我今生分福多管是前生合注那里也画眉張敞擲果潘安傅粉平叔不弱似待月張生偷香韓夀謁漿崔護我如今孤辰運正該天數么篇愁和悶眼倦開悶和愁眉怎舒愁的是離思懨懨神魂飄蕩鬼病揶揄悶便似華岳三峯巫山十二黄河九曲㸔㸔的骨崕崕命歸泉路十二月四時景光隂迅速更那堪秋景相逐踈刺刺風揺翠竹淅零零雨洒蒼梧画簷間玎玎璫璫鐡馬戍樓中滴滴點點銅壷堯民歌呀我恰纔望夫山上問箇實虚他可在竹林寺裡寄情書多管是秦樓謝館咲喧呼他敢在栁陌花街恣歡娛躊蹰薄情􅑯狠峯恨不的扯碎了姻縁簿耍孩兒赶蘇卿何處㕠通叔我到做了三不歸離魂倩女俺正是碧桃花下鳯鸞孤山和水阻隔着萬里程途山隠隠遶天涯怎覔青鸞信水茫茫遍海角難㝷錦鯉書兩般児總是無㝷路桃源洞磚填土塞武陵溪烟水糢糊一煞身如水上萍命似風中燭月華明忽𬒳隂雲布藍橋下水波濤萬丈通海島祅廟火烈熖千團接着太虚兩般児無情物玉簮折何時再接氷絃㫁甚日重續尾聲漢相如有日還故鄉卓文君多情親見汝一星星盡把衷腸訴我把這受過的凄凉慢慢的數粉蝶児贈羙妓咲臉含春粉脂融淡霞紅暈立東風無限精神寳釵横金鳳小緑鋪雲鬂眉月斜痕眼横波不禁春困酔春風歩錦襪蹙金蓮拭羅衫舒玉笋常言道明花觧語亦傾城這話児敢凖凖因此上鴈落魚沉花羞月慘玉嬌香嫩紅綉鞋歌扇掩胭脂紅褪舞衣飄蘭麝香温氷絲細織帕羅新翆裙鸚鵡緑綉帶鳳鸞紋玉鈿蝴蝶粉普天樂一見了引人魂再見了消人悶急追陪金盃錯落莫辜負翆䄂慇懃覷一覷萬種嬌咲一咲千金俊手撒紅牙歌清韻上青山遏住行雲腸㫁也蘇州刺史心堅也蒲東􅌒客情迷也洛浦行人上小樓説甚麽芳卿性純秋娘丰韻多應他懶住蟾宮私下仙瑎謫降凡塵翡翆屏錦綉裀包蔵春信涵養出嬌滴滴殢人身分么篇也不索鶯児探春賔鴻傳信慿着這綵筆題情羅帕留香索強如織錦廻紋酒半醺粉半匀把這情郎低問比着那海棠花更多淹潤耎孩兒錦筵開一派笙歌引簇擁着一箇娉婷玉人舞腰纎細不勝春羙孜孜淺咲輕顰也宜教画欄干遮護着瓊花蕋錦歩帳遮圍着玉樹春酒捧着金波醖受用殺銀箏象板風流殺翆袖紅裙尾聲輕聲度艶歌淺粧凝素粉東風滿地殘紅褪一刻千金意不肎粉蝶児憶别錦帳羅幃空留下這塲憔悴想人生㝡苦别離恨匆匆愁冗冗忘飡失寐困騰騰眼􅌒心迷元来是害相思恁般滋味酔春風這些時枕剰梦難成衾餘愁易得似這䓁衾餘枕剰捱長更好教我悔悔發付的你逺上陽關悶的人孤幃寂寞害的人一絲兩氣紅綉鞋黄甘甘胭憔粉悴病懨懨瘦損香肌急煎煎流泪數歸期閙攘攘心煩亂磣磕磕的苦分離這些時悶懨懨愁似痴普天樂意躊蹰心憂慮哀哀怨怨慘慘悽悽閃殺我年少人辜負了鸞凰配早是離人愁縈繫更那堪杜宇悲啼或時在銷金帳裡珊瑚枕畔将我這好夢驚回上小樓羙恩情眉南面北好姻縁鴛鴦拆離㡬時得携手星前並肩月下同入羅幃到如今寳鏡分釵㫁股簮折瓶墜正值着惱人腸物傷人意么篇画梁間燕語喧花栁間鶯囀啼我這里淚眼偷觀愁聞􅌒聴景物傷悲正遇着風雨催栁絮飛殘花滿地我則索掩重門紗囱深閉要孩兒山長水逺人千里月缺花殘春又歸多憂多慮怕黄昏掩重門簾幙低垂更䦨夜靜離人苦燭暗香消怨女悲捱不徹凄凉日打熬出悶懨懨日月憔悴了花朶児身軀煞尾不爭你撇了我數載餘淹留我三不歸若䏻勾重整佳期㑹則除是一枕南柯夢児裡粉蝶児歸隠褁㡌穿衫習儒風半醎不淡誦毛詩召南周南尚書經春秋傳子書通鑑樂府曾諳詩禪中畧通詩塹酔春風論吟和豈獨專説挐雲非自敢受寒囱辛苦止望待立箇成名陋巷中淹留殺俺俺㸔别人在雲霧裡昇騰市門里中踴躍輪到我在淤泥中着䧟石榴花想區區虚度五旬三赤緊的三十載事􅮡想從前事務總教叅便有那熊心豹膽誰敢跳虎窟龍潭題起那簮纓名爵其實慘鴻毫輕豈足為談我則待要守寒門養素心不惮我可也不束髪不簮冠閗鵪鶉我煉的金木間關一任教離官配坎我将這財利不貪慾情慾情退减但得些參粟鮮甜豆粥甘着麻衣有甚慚一心待樂道甘貧問甚麽傍人咲俺上小樓我則待粧痴作憨誰想道言多語濫不求聞逹不謁髙門不上書緘我則待隠扵農歸扵浦漁籃樵擔比恁那跳龍門不邅坑䧟么篇跨着箇耽耳驢乗一騎欵叚驂我則待挈榼携壷對月臨風翫水逰岩若是我興正酣飲正甘直吃的頭低身探問甚麽髪刀騷土埋塵暗十二月利名塲徑行見坎風月擔重負難擔漸漸的形容踈减㸔㸔的鬂髪髧鬖我将這古往今来事覧再誰敢逩逞貪婪堯民歌呀我則待樂簞瓢陋巷里靜巉巉一任教守清貧沿路語喃喃我将這帶脿脂猪肉旋煎爁帶蛆濁醪着瓢渰放浪醺也波酣今畨識破俺再誰拆朱雲檻耍孩兒避風波家住在山岩嵌盖一座不踈漏低低草庵麄衣糲食度流年樂耕鋤孳養些桒蠶常安排一樽醪酒滌塵慮多喂養㡬隻鷄豚欲解饞無驚恐心和淡機頭伴織梭荆拙燈前引戯綵児男五煞要清心呵與吾儕三五人對書齋燈一龕正夜靜銀海澄澄湛焚着那松花栢子雲烟偃撫着那焦尾氷絃神鬼叅琴弹罷相陪伴茶烹石䁀酒注磁罈四煞要釋悶呵松棚下同咲歌石床上共手談有漁夫樵子傍觀鑑未曾終黒白勝負碁一着迅指早紅日西沉山半含識進退知成䧟若論那其中就裡閗爭先機智相攙三煞要忘懐呵将端溪硯水添把烏犀手内攬輕拈斑管将霜毫蘸拂開玉板箋三幅寫出梨園書一緘問甚麽文理踈言詞淡大剛来情懐意散就中将名姓包含二煞要樂意呵㸔關仝海潮圖風聲􅐈水靣濤有王維輞川圗雲氣生山頂嵐有龍眠寒雪圗孟浩然覇陵橋驢背如銀糝有魏衍松風圗龍根雲幹龍盤偃有肅射梅竹圗雨意胭脂鳳尾擔此四景消昏旦惜性命粧些粗踈蠢倴誰敢弄殘生施逞那僥倖奸讒尾聲我将這人惡墻砌的髙把是非門閉的嚴一任教滿天雷震山揺撼便有那驟雨狂風也哨不着俺粉蝶児題羙人脚小他生的如月如花蕩湘裙一鈎羅襪寳釵横雲鬂堆鴉翆眉彎櫻唇小堪猫堪画閑近囱紗倚幃屏綉簾低下酔春風香細裊紫金爐酒頻斟白玉斚銀燈影裏殢人嬌他生的可喜殺殺他生的宜喜宜嗔便有他閑愁閑悶見了他且休且罷迎仙客傍芝蘭吸露花逰宇宙歩雲霞我則見窄弓弓藕芽兒剛半折踐香塵踏落花淺印下輕沙印一對相思卦紅綉鞋有他時一刻千金無價有他時一生興旺人家有他時村沙的化的不村沙臨風三勸酒對月一甌茶說蓬莱都是假普天樂信歩到海棠軒閑行至荼􅐘架引的些蜂喧蝶攘来往交加粉臉襯桃杏腮雲髻把花枝抹嬝嬝婷婷花隂下他若是不言語無處㝷他他比白花解語他比黄金足色他生的羙玉無瑕耍孩兒透春情說㡬句知心話則𬒳你迤逗殺我心猿意馬寒囱寂寞費琴書不由人暁夜思他傲風霜分不開連枝樹宜雨露栽培出並蒂花見一日買㡬遍龜児卦似這般短促促携雲握兩㡬時得穩便便立計成家三煞捧金杯勸醁醑按銀箏那玉馬似展開幅吳道子觀音画他那里倚鸞翆袖凝秋水暎日紅裙襯暁霞但見處人驚諕端的是沉魚落鴈他生的閉月羞花二煞咲一面不覺的春自生行一歩迱逗人眼􅌒花十分愛常墊着三分怕愛的是三分旖旎嬌千種怕的是間阻飄零那半霎天生下一虎口淩波襪堪與那俏子弟寒時煖手村郎君飽後挑牙煞尾要教咱稱了心則除是娶到家學知些柴米油塩價恁時節悶减愁消受用殺粉蝶児慶冬至節正值着冬至初交恰纔箇一陽生漸回天道我則見凍雲垂四野飄颻簌氊簾鋪綉榻寒侵幃幄更那堪景物蕭條四時中最宜歡樂酔春風你㸔這黎庶盡謳歌更那堪官清法正好似這般堯年舜日樂昇平端的是少少這的是聖主寛仁賢臣扶助輔安宗廟紅綉鞋見如今過舜帝堯王之道端的是用忠良宰輔臣僚况值着仲冬佳節景風飄見處處追歡賞家家可也設瓊餚端的是慶豐年享鳳閣石榴花托頼着吾皇仁智勝唐堯端的是四海盡風調則碩的八方無事罷兵刀宰臣毎智巧鼎鼐和調見如今巍巍聖徳如山岳重賢良文武英豪臣遇着嚴威凛冽寒天道真乃是富貴在今朝閗鵪鶉你㸔這寳殿瓊宫敢則是龍樓鳳閣我則見瑞靄靄祥雲九重九重霧遶更和這疊翆堆瓊景物髙端的是堪画描猛然見四野祥雲敢則是寒風亂掃快活三散天花瑞雪飄飛六出舞瓊瑶也宜在紅爐煖閣飲羊羔一任教瑞雪紛紛落鮑老兒你㸔這玉闕瓊宫新盖造更和這雕斗泥金罩是㸔這紫霧紅光籠罩着将萬載龍庭照見如今民安國泰年豐歲稔雨順風調托頼着巍巍聖徳乾坤道太平免差徭尾聲見如今四序和八方来進朝你㸔這千邦獻瑞依王道齊獻上冬令佳辰太平表粉蝶児楊妃舞翠盤天淡雲閑寫長空數行征鴈御園中夏景初殘菊添黄荷减緑秋蓮脫瓣坐近雕欄却原来噴清香玉簮初綻呌聲共婇女喜開筵等閑等