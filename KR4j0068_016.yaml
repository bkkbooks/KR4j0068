俺那少年人古江児水又早三秋至塞鴈飛牛星女宿重相㑹只聴得那搗砧聲透入在羅幃內最凄􅋽堦下寒蛩唧桂子香飄拂鼻葉落丹楓滿地黄花鋪地錦羅𫀆強把那花鈿重整㸔消魂無柰画角聲頻鶯紅燕緑鳯釵金似梨花帶雨一枝潤羊羔羙酒也不稱心輕裘肥馬也不稱心無言對着銀缸影尾聲四時中常樂意逢花遇酒且舒眉嘆取人生䏻有㡬香風俏臉児桃花巳亂零飄紅墜英楊花滚滚似雪浪傾燕忙鶯懶為傷情也一團丰韻分付與您你如何忘了設誓盟我為你便懨懨愁悶他却道我戀着别人思量他這俏臉児怎不教人動情東甌令花零亂栁成隂正是蝶困蜂迷鶯倦吟方纔眼静我這心児裡忘了想啾啾唧唧呢喃燕重将宿恨宿恨又題醒撲撲簌簌泪珠暗傾玉墧枝從執箕箒被禁持逆来順受竭力事親不落後奶娘何故搬閗調唆的俺母親百事有無故把奴厮僝僽致令的憎人易醜絳都春冬景寒風布野傲霜枝獨留金錢不謝橘緑橙黄隴樹凋零楓葉赭玉壷逓箭聲微瀉薄點綴新霜凝夜滌場納稼練兵習射梧葉児南㱕雁暮宿雅投樹落平沙覽景物堪圗画小陽春有歲華放㡬點碧桃花行處猶宜駐馬山坡羊帶岀隊子画閤朱簾初下逺山寒色相壓暖爐酌酒分香炙鼓摻撾氷絃雁柱斜金爐添火焚蘭麝凛凜寒威漸漸加流霞玉桃宴舘娃京華笙簫十萬家㡬處笙簫待月榭酒低斟詩緩寫薄寒無那又添些蹔垂簾幕半遮冬至迎長将近也北金菊香巳将六管動吹葭日晷初長一線加玉玲瓏曉霜鋪翠瓦白盈盈水貼氷花奉瓊斚酌流霞醋葫蘆寒蔬漸吐芽山梅欲放花霜庭按舞撥琵琶㸔園林歇芳歲事賖㡬處觀雲書罷遥空風急雁行斜東甌令玉交枝彤雲布晚風斜月影横空明雪花瓊瑶一色正皎皎迷曠野宻洒歌楼飄僧舍光揺銀海眩生花旋把数尺粉墙半遮閑登長榭晃珂珮更照曜白馬晚来江上景瀟洒一簑㱕去正堪画金闕玉宇疑素瓦拂囱度簾還飄下預作太平祥瑞也后庭花㸔江山景物佳喚􅌙箏賞歲華羙酒銷金帳清風鳯餅茶披鶴氅訪梅花放一棹山隂雪夜覇橋邊詩思誇望瑶䑓明月下是蓬莱天地家玉胞肚皁羅𫀆暗香飄麝占陽和早梅放花素姿清宜月臺風榭低壓短籬茅舍玉骨氷肌洗鉛華倚竹依松逸興加向日精神瀟灑更凝酥弄粉淺水平沙踈枝籠月影横斜前村雪裏開昨夜羅浮山下偏傍酒家清韻堪訝素粧麗雅月魂映燭何湏借青哥兒向紅爐排筵排筵𥘉罷舉金盃勸酌勸酌流霞掃雪敲氷煑細茶挿銀瓶㡬朶梅花節屇臘八黎庻歡華佛浴釋迦㑹建無遮歲将暮春来春風春光滿天涯聖人治萬國平天下鮑老兒迎霜漸覺寒去也㑹佳宴坐香車酴酥酒慢傾瀉燒暴竹臨除夜桃符換寫春到玉缸燈落也燃火明霜瓦驅儺鼓打分隊隊正歡華更取鍾馗掛分歲盃頻把椒盤進仍頌芲盍簮喧攊馬列炬散林雅餘音大明聖主安天下遍撫輯蠻夷華复正四海昇平人歡也絳都春月下聴琴團團皎皎見氷輪晃然初離海嶠仔細思量怎不教人長不老月過十五光明少怎負我青春年少滿懐心事一春怨恨有誰知道岀隊子我是幽幽居在古寺景荒凉人静悄怎禁那晝長無奈夜迢迢都只為這兩般兒教人心下轉焦怕的是鍾送黄昏雞報曉閙樊楼孤身先自添煩惱夜永凄凉眼前難熬見這老樹啼烏遶聴野寺哀猿呌鴛甃畔滴溜溜的敗葉兒飄響璫璫擊玎璫的風鈴兒閗合聒噪滴滴金囱前皓月偏来照便是銕石人也瘦了悶懨懨怎生眠一覺恨攸攸空懊惱離情悄悄病懨懨怎生捱到曉此生怎逃撲簌簌淚澆画眉序欲成範鳯鸞交甚物将人梦驚覺是誰家別院故把琴調方纔待絃續鸞膠誰想𬒳凨吹別調静聴句意十分妙光凨霽月逍遥啄木兒絃中正指下髙是餘音太古雅操拍托勾剔打抹挑泛聲清法度好輕如㸃水蜻蜓遶閙如夜宿烏鴉噪小澗㳙輪音吟猱似仙音鶴鳴九臯三叚子夜深静悄此曲中有才調指法更好此琴中果竒妙伊家怎曉髙山流水知音少怎訴與相如知道使文君春心蕩了双聲叠韻聴別院聴別院漏聲漸杳香凨靄香凨靄楚雲縹緲我只裏告天天還知道願逢氷上人月下老早教我一雙雙團圓到老上小樓駕車駕車嬌姿来到似嫦娥下九霄卑人福分怎生消閑把瑶琴一操異日湏㑹題橋耍鮑老夫人小玉都睡了莫辜負好良宵望天外月如洗聴砌畔花隂遶韶華易老雙徑小溪芲綉草楼閤侵雲表凨清露皎山隠隠水迢迢閑把湖山靠羅襪鞋弓小雲鬟亂金鳯翹慢行休羅皂只恐怕外人瞧尾聲潜踪躡足行来到且莫使夫人知道天與的榮華富貴到老二郎神秋夜懐情錦堂裡漸覺紗㡡似水凛凛寒風侵玉軆梧桐雨漏永更遅香盡燈殘人寂静促織兒唧唧啾啾訴聲不已憶君行萬里阻在江南塞北梧葉兒既上了青雲路因何無尺素回薄情子似王魁去約定三春至到如今半載期越思想越悲啼越悲啼多管是淹留在旅邸醋葫蘆他那裡思量他自思我這裡悲啼我自悲相逢夢裡㑹佳期一寸柔腸相牽着千萬里有信青鸞頻寄這的是好姻縁難厮守易别離么篇聴戌樓画角悽韵攸攸砧杵催竹稍揺風颯颯月輝輝寂寞憂愁看看的成病疾織女牛郎相㑹俺一似嫦娥獨自在廣寒棲金菊香從央蝶使再倩蜂媒寫成了一𥿄芲箋一字三行珠淚司馬青衫紅更濕寄與相知心如酔意似痴浪里来煞慵将紅葉題懶把佳音寄抵多少隴頭人寄一枝梅悞了我月皎花嬌人正羙你那幸喜蟾宫折桂豈不聞状元㱕去馬如飛二郎神秋恨景蕭索迤邐秋光漸老隠隠殘霞如黛掃暮雲凋烟水迢迢数簇黄花開爛熳敗葉兒浙零零亂飄無聊緑依依翠栁滿目荒蕪衰草梧葉兒凄凄凉凉淹煎病攸攸蕩蕩魂魄消失留踈刺金凨送竹頻摇漸漸的黄花瘦㸔㸔的紅葉老題起来好心焦恨只恨離多㑹少么記伊家幸短枉教人煩煩惱惱怏怏㱕来入綉幙想薄情鎮日魂消乍離別難棄捨縈惹的懨懨瘦怯金菊香多因他意重我情薄既不索可怎生鴈貼魚沉音信杳相別時話兒不甚好好着我恨鎻眉稍越凄凉越思想越添焦髙平調尾情懐驀驀越焦躁冷冷清清更漏迢盈盈夜眼不暫交畫燭熒熒他也學人那淚珠兒落暢道有㡬箇銕馬兒鐸丁璫的空聒噪嚮珊珊梆梆的寒砧搗呀呀的塞㕍南飛更合着那促織兒叨叨的絮無了喜梧桐重九佳辰值晚秋人比黃花瘦處處登髙又早重陽候東籬畔有人来送酒塞雁呀呀過南楼紅葉黄花山色渾如綉冷颼颼風蕩波紋皱西河栁景物幽情意投龍山賞翫飲興酧戯馬䑓前憶舊逰瓊漿捧玉甌烏紗却戀頭便做傷心競把茱茰嗅颯颯西風吹敗栁宻匝匝的擺珍羞聴一泒仙音樂奏一封書香橙嫰旋剖喜今朝九月九同歡㑹莫愁蠏初肥酒正􅌻正好傳杯同宴樂迅速光隂不暫留莫剛求且忘憂問取来年誰健否皂羅袍隠隠江山依舊把香醪滿泛艶曲低謳眼前霜降水痕収狂歌痛飲休僝僽繊繊玉手銀箏欵搊長長彩箭銅壷慢投㱕家拚取黄昏後尾聲宴良宵過白晝盛年佳節可追逰共享天長和地乆定風波離情迤邐秋来到正露冷風寒微雨𥘉収凉風兒透裂襟袖自別来情萬感遣離愁不堪回首金菊香到秋来還有許多憂一寸心懐無限愁離情鎮日如病酒似這等懨懨終不肯㫁了風流醋葫蘆人病乆何日休思情欲待罷無由哎你箇冤家怎下的辜負子我知伊主意料應来倚仗着臉兒羞尾聲本待要棄捨了你箇多情別尋箇玉人兒重配偶強似你的模様兒的呵便做道我不䏻勾勝似你的心腸兒的呵敢到處裡有梧葉兒太平民安樂軍䄂手擊壌牧童謳詞頌簡王條正户口增丁数有田野闢四時收保社稷天長地乆鳯鵉吟禾黍又收倉厫中米麥有把香醪自釀􅌻農事又周不耕耘閑坐乆訪知交謁故友與賔朋相趂逐飲一場酔酒今日酔明朝依舊謝天公雨露均感聖主恩寛厚俺農家無慮無憂四季花晚来漁父離灘頭樵子訪瀛洲偶然相遇楓林後携手咲相逐相逐一齊的長嘯海山秋鶯啼序風情孤幃一黙殘燈見半㓕猶明夜迢迢斗帳寒生盻雕鞍把㱕期細数恨浪迹全無音信把前歡自省說来的話兒無憑黄鶯兒無語對圍屏正譙楼鼓二更梅花咲殺人孤另踈鍾㡬聲殘角数聲薄衾单枕愁難聴影伶仃岩岩瘦骨離恨教我怎支撐集賢賓椰榆鬼病誰慣經但舉歩難行翠䄂金釵無心整好梳粧一日何曽自古道佳人薄命盻不到羙滿前程閗双雞芙蓉面芙蓉面淚珠暗傾楊花性楊花性別離太輕自是東君薄倖一樹紅芳誰管領浪蝶狂蜂休要閗爭簇玉林天涯路長短亭怨王孫芳草青晝長羞把闌干凭㡬度把鱗鴻倩千言萬語猶自恐欠叮嚀琥珀猫兒野花村酒他那裡酔還醒冷落誰憐冬暮景奴躭寂寞你飄零難憑頓忘了神靈前海誓山盟尾風流惹下相思病也只索把情郎痴等他無有真情我辦着志誠黄鶯兒别况無語無語悶人怕到江天日暮大都来一種相思柔腸萬缕踏莎行嫩玉肌膚㑹調絃理管䏻歌妙舞從別後有誰拘束么求神問卜道湏有團圓一處奈目下佳期未得相逢愁㝡苦正值着秋光暮天凄楚盖天旗愁成陣更壓着宋玉便是銕石人也今宵躭不去早是恓惶䏻對付難禁處凄凉景囪兒外眼撮聚随煞起一陣菊花風下㡬點芭蕉雨風送得菊花香雨打得芭蕉絮芭蕉雨敵庭梧菊花風戦檻竹黄鶯兒寓僧舍秋色秋色幾聲悲愴孤鴻出塞滿園林野火烘霞荷枯栁敗踏莎行水舘烟中暮山雲外泊孤舟古渡側息風霾净塵埃寳刹清凉境界僧相待借眠何碍垂絲鈎風清月白有感心酸不耐更觸目凄凉景物供将愁悶来月𬒳雲埋風鳴天籟盖天旗僧舍窄蚊帳矮獨擁单衾一宵如半載舊恨新愁深似海情縁在人無奈幾般兒可恠随煞促織絮惱情懐砧杵韵無聊賴簷馬奢殿鐸鳴踈雨滴西風殺䏻㫁送楚雲䑓㑹禁持異郷客夜行舡花底黄鸝聴聲聲一似喚人逰戯東凨裡玉勒雕鞍爭馳佳時日暖凨和偏称對景尋芳拾翆遥指隠隠在杏花村深䖏酒旗摇曵本序迤邐曲徑芳堤競香塵不㫁徃来羅綺亭䑓上急管繁絃声催双飛蝶舞芲枝鶯囀上林魚逰春水芳菲點檢在萬芲中昨夜海棠開未闘寳蝉堪題綠栁隂中見鞦韆髙掛綵繩飛起是誰家士女雙蹴嬉戯相宜奇花映粉腮輕風蕩綉衣動情的正是逰人墙外笑声墙裡么篇聴啓春色三分怕一分塵土二分流水向花前共樂莫負良時歌妓低低唱小詞雙雙舞柘枝可人意間竹桃芲相映小橋流水錦衣香芳草池魚逰戯翆栁堤同逰戯我只見士女逰人幕天席地高挑一架閙竿兒深深歩入杏䲧桃溪對良辰美景想蓬莱也只如是休把閑愁繫且拚沉酔光隂迅速人生䏻㡬漿水令正相同尋芳未已奈紅輪已覺墜西海棠枝上子䂓啼声声是他喚的春歸芲隂下人似蟻芲藤轎兒雕鞍騎相随趂相随趂凨流隊裡拚沉酔拚沉酔酔扶歸尾声今宵共約同歡㑹先教從人歸去安排辦下筵席
