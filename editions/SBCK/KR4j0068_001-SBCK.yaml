􅀅着這降妖物颺金輪到碧虚他尚然不怕懼揺着頭擺着尾林浪裏趨把天兵􅀅列宿撐倒在山坡水曲古水仙子呀呀呀他􅀅那黒霧吁向向向峯巒間刮刮匝匝烈熖吐見見見火燎天似紅騰騰騰焚燒了林􅀣踈刺刺起寒風遍八區急煎煎緊驟着胯下龍駒敗殘兵逺退到十里餘逢着這青獅子委實的難隄禦􅀅􅀅􅀅神􅀅每總教輸尾聲罷罷罷向佛㑹􅀙頭細分訴􅀃那箇青獅子猛力難伏少不得遣一位聖菩薩到来方􅂊容易􅂑醉花隂楊妃出浴膩水流清漲新緑洗盡胭凝粉聚斗障錦重圍只恐東君窺見濃匀聚淡白淺傅微抹䡖浮玉搓咽頸雪膩肌膚媚春風半露胷酥對鸞䑓恣意粧梳錦梔香宫額塗黄蘭麝烟娥眉掃緑玉蓮嬌香腮施朱巧􅀅􅁂鋪髙盤鳳髻堆雅羽七寳鈿盒取斜挿犀梳雲半吐風韻誰如三煞細㸔了妃子新粧束休說昭君舊􅀞圗襯銀錢黄串滿金爐香霧縈紆粧􅀧就銀屏金屋翠圍遶錦􅃒護舉止䡖盈那些濟楚天上應無二煞六宫粉黛生嫉妬五月榴花照眼􅀄語言恰似囀鶯雛翠女髙呼掲繡幙忙開朱户下瑶堦進蓮歩前殿上君王快報與半霎兒工夫尾聲沉香亭上歌金縷花蕚樓前擊翠梧按舞霓裳羽衣曲有嬪妃綵女有鳳簫羯鼓教那㑹受用君王㸔不􅁕醉花隂明皇告代楊妃死有句衷言細詳察是不是􅀅軍莫怒發先斬了􅀦忠則休莫待要踐了娘娘則勒死吾當呵罷興龍引重權獨覇乆飬威轉加致教主弱臣強内外忒差其間事節莫不也干連着鑾駕賜一條素練撅三尺黄沙么斟量口氣見得􅀅他難救㧞教娘娘速赴轅門早受刑罰非干易捨便告半霎嚴假枉與他廣増些怨望剰添些驚怕么鴛幃咫尺黄昏也陡㫁懐中不見他猛撮上心来則你道疼麽蘭魂蕙魄願早向皇宫托化又無甚六親又無甚根芽尾聲若􅀎勾地乆天長塟黄沙但有人奠酒澆茶情願向一箇套兒裏教恁􅀟勒殺醉花隂楊妃上馬嵬坡愁據雕鞍翠眉鎻一聲聲煎煎絮聒情淚落秋波瀟灑長途極目天涯闊出隊子離情坦坦聴征鼙愁越多西風白草陣雲合落日牛羊下逺坡烟水凄迷血淚多么篇玉容􅄫寞料今生愁越多一塲寵􅄑起干戈朝内君王没奈何閫外􅀅軍管甚麽尾聲拈甲紅裙也索言破翰林院學士行評䟦凌烟閤上只堪圖􅀞着我醉花隂禄山戯楊妃羡煞㝷花上陽路芳草斜風細雨随分到皇都恰正青春􅀄放入深宮去么宵夜鴛幃暗銀燭可軆紅圍翠簇酒力漸蹙繡枕温香錦􅀍裏偎紅玉出隊子朦朧􅀟目不勝媱態度唾秥涎緊貼口相嗚送甜津頻􅀅舌半吐胖肚子百忙的厮間阻么靈犀一􅀧嬌疑聚不由人眉暗蹙軟温潤香汗似溶酥旖旎留清花觧語正是風流羙愛䖏栁葉兒驀然有人發怒連珠兒呌道十句餘則教恁壓子嗣義為兒母誰教恁背君王做妻夫么唐明皇也不曽痛關腸肚也不曽似恁重牽情緒也不曽似恁鎮日追逐也不曽似恁連夜歡娛随煞一自明皇轉廊廡便不肯暫離了娘娘皮膚這厮也蠢則蠢到大如皇帝福醉花隂元宵憶舊凍雪􅂊消臘梅謝早擊碎泥牛應節栁眼吐些些時序相催閗把鰲山結喜遷鶯暢豪奢聴鼓吹喧天那歡恱好教我如刀切淚珠兒揾不迭哭的似癡呆自從别後這滿腹相思何䖏説流痛血瑶琴怎續玉簮難接出隊子想當􅀄時節那濃懽怎棄捨新愁装滿太平車舊恨常堆㡬萬疊􅀂􅀒徳辜恩天地折神仗兒這㱔時情詩倦寫和音書㫁絶斜月籠明殘燈半㓕恨簷馬玎璫怨塞鴻悽切猛然間想起多嬌那愁悶怎欄截掛金索業縁心腸那煩惱何時徹對景傷情怎捱如年夜燈火闌􅃢似萬朶金蓮謝車馬闐賽一夥鴛鴦社随尾見它人兩口兒携着手㸔燈夜教俺怎生不感嘆傷嗟尚想俺去年的那人何䖏也醉花隂􅀌另寳釧鬆金髻雲軃不似前濃梳艶褁寛繡帶掩香羅􅀑病懨懨除見他方痊可出隊子傷心無那遣離人愁悶多見銀臺絳蠟漸消磨寳􅂦無烟香燼火燭㓕烟消怎奈何么篇情郎去後添􅄫寞盻佳期無始末這一􅀟業眼歛秋波兩葉愁眉蹙翠蛾淚滴胭脂流玉顆尾聲着我倒枕垂床怎生臥到二三更煖不温和這沒人情的􅀍窩兒也傒落我南畫眉序燈詞元宵景堪題􅀞堂深沉勝瑶池奏笙歌一派韻羙聲齊􅀞燭映兩行神仙蘭麝靄一簇珠翠和翡翠簾捲香風細人在水晶宫􅂻􅀞眉序明月照庭除萬頃芙蕖映秋水夜迢迢一任􅀞角頻吹沉醉􅋹古􅂦龍涎歡㑹宴玉簮珠履和翡翠簾捲香風細人在水晶宮􅂻神仗兒元宵景好元宵景好點放花燈􅀟􅀟慢行牡丹燈琉璃燈弓鞋燈慳慳點着果然二寸頭上好箇木香棚良夜好賽蓬瀛么篇燈點頭上甚光景做的事直恁蠢敢恁無知耻我門庭㺯許多寒酸自相䡖怎不教人咲聲怎不教人咲聲閑樊樓晝堂深沉繡簾半掩瑞烟裊噴寳􅂐羅綺香風軟喧天樂奏聲清雅韻逺滴滴金通宵爛把銀燈點影交輝照華筵姢姢夜色如秋水更澄澄明月圓明月圓似氷輪輾出一洞天洞天一境移来世間雙閗雞我今日欣逢景當上元點花燈在頭上是人咲喧我燈粧得極妙不湏用蠟燭共􅁓撚似移下一天星毬萬􅀧􅀟聲疊韵多丰範多丰範座列神仙眷開玳筵開玳筵午夜難留戀擁翠鬟擁翠鬟拚醉眠拚醉眠任銅壷漏滴􅀞角聲傳餘音来宵廣設華筵宴午夜風光疾如箭准備踏青賽上元南􅀞眉序燈詞皇恩被華夷太平豊登四海咸集喜都城午夜月色輝輝碧落轉一輪清光黄道靄六合佳氣和萬􅀊閬苑羣仙㑹金闕逺攅羅綺􅀞眉序蓬莱勝瑶池玉􅀣銀花樂聲􅂻㸔神鰲鼓舞雷掣星馳光閃爍瑞鳳来逰影燦爛祥鸞飛戯和萬􅀊閬苑羣仙㑹金􅇅逺攅羅綺神仗兒天顔有喜萬像花燈森羅禁畿牡丹芙蓉荼䕷球燈開玲瓏翡翠泡燈琉璃蓮花巧簇衆芳菲環玉砌擁金堤么篇今乆天下最佳麗水晶宫不恁般美蝦蠏龍魚獻異呈竒吐瑞招揺映波漪有仙鶴鴛鴦綬鷄有虎鹿騶虞象犀閙樊樓寳爐内焚香􅂐雲穗飛進蠻夷夀星隊頌聲更齊越裳重譯慶賀四方合萬國盡㑹極普天下萬民同歡共喜􅀟聲疊韵天花墜天花墜遍滿乾坤内祥雲随祥雲随錦繡中華地品物宜品物宜多福齊多福齊更人人樂業賞翫良期餘音蒸民仰頼天恩力萬萬載太平時世風順雨調化日遲抛毬樂楊妃病酒雨雲新擾那更宿酒禁虐儘侍兒催促晨粧任鸞鏡空照手支頥枕並􅃢瑚衣襜軆衾擁鮫綃􅂴収零落花鈿寳髻籠鬆金􅁫嚲鳳翹􅀝春風不展眉尖一􅀧春心怕春愁多少睡思愈粉光縈損人間花月妖嬈紅愁緑慘粉悴胭焦么篇忽聞報羊車欲起玉鬟休别様嬌君王俏極困也休動勞剛啓鶯唇呼噪孜孜的覷着越添旖旎妖嬈龍情頓發荒婇㜮􅉡下鴛幃宫嬪盡去却向懐中欵欵温存只恐真妃厭寵心緒無聊未敢踈狂陪􅀏陪言耳畔焦君王悄喚玉鬟低諾尾聲顔容漸消弱不向枕衾偎抱着箇呆病酒臉兒都瘦了願成􅀟楊妃乞罪一壁廂屍猶􅉯血未乾休􅀅那􅂑次相㸔怯容顔強􅀅嬌滴滴忙􅄐綉鞍么仙衣欲枕難迭辦把不㝎膽􅀾心寒怕的是白練套頭拴剛打迭起愁眉淚眼出隊子驚慌無限啓朱唇噴麝蘭既教臣妾受摧殘必㝎阿環有破綻向陳􅀅軍乞罪犯么陳玄禮火速言公案㝎興亡頃刻間休嗔􅀅令不鬆閑見有親人来指攀敢把娘娘快証翻尾常言道九族􅇜誅為一人反許多軍撞過潼關説道為首的是恁兒安禄山􅂅成􅀟蘇卿香共撚誓共説羙姻縁永不􅄐别為功名兩字赴長安阻隔烟水雲山萬疊么辜恩一去成抛撇他無情俺到心呆悔當時恨不鎖雕鞍折倒的人香肌褪雪出隊子柔腸千結􅄸今畨愁又別長吁短嘆不寍貼淚眼愁眉怎打疊若見伊家親自説么玉簮折怎得鸞膠接見無由成間別你不来人道你心邪我先死天教我業徹欲􅀉平安怎生寫尾若把我双郎見時時節向三婆行訴不盡㗋舌則道是思量的小卿成病也􅂅成􅀟蘓卿鴛鴦對鸞鳯群恰㝷着羙滿前程摶香惜玉好恩情忽變做充飢画餅么撃玎的分破菱芲鏡撲鼕的井墜銀瓶􅃌山賣磨愛錢精送的我􅄐鄊背井出隊子佳人薄倖沒福消双縣令老娘無頓放過書生秀士多磨遇着栁青妾守着馮魁似頦下癭么到如今剗的無形影教奴家愁越増半江秋影月偏明滿腹愁懐心自硬一雁哀鳴水雲冷尾不是你双生多傒倖休埋怨這不得巳的蘓卿先向豫章城下等􅂅成􅀟好病弱似醉酣鬂鬅鬆髻弹金簮錦衣寛褪瘦嵓嵓殘粉淚香消玉减么恨東君不管人情似綻芳叢奪錦争􅍴舊逰園圃見停驂思往事離愁越感出隊子慵臨鸞鑑瘦容顔影自慘隣􅁎問我似痴憨欲語無言自懶似恁般熬煎可慣躭么㸔時節夢兒􅂻􅀅人賺閃的奴恨不甘山盟海擔我心貪􅀒徳辜恩他意敢悔恨當􅀄我自攬尾留戀恁三婆等時暫則這㡬行書和淚封緘寫着道意不過肯来相探俺
