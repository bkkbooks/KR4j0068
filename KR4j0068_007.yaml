front:
  text: 雍熙樂府卷之七
  hash: sha256:85020717648cafef63031e869dbd68ecdf5db848f48f85caf646bab53d294e94
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0068_SBCK_007-1a}
body:
  text: 中吕宫粉蝶兒祝太平錦繡封疆喜豐登太平景象托吾皇聖德汪洋輿情歡天心順萬方歸向四海來王撫華夷盡皆歡暢南好事近佳節欲回陽律應黃鍾迎祥南極昨夜夀星靄靄生光瑶池閬苑衆羣仙跨鳳齊臨降賀吾皇萬夀佳辰祝遐齡永逺無疆北普天樂天性孝慈全仁德寬洪量常依六德不失三綱恩威信義和禮樂恭謙讓治國齊家無偏向更施仁發政溫良洪福浩大皇基永固聖夀延長南好事近時當盛世喜非常黎民樂業安康賢臣良相攄忠燮理隂陽民安物阜荷皇恩天下全生飬喜孜孜四序和調笑吟吟萬邦瞻仰北上小樓你子看那金階殿傍瓊樓閣上一朵祥雲千條瑞氣五色毫光呈瑞祥表聖昌天垂佳貺都子為聖人德慶雲特降南撲燈蛾華筵開玳瑁金杯泛瓊漿美孜孜裊娜纎腰舞嬌滳滳玉鬟齊唱香馥馥膳排異品齊臻臻同和著新腔和普天下臣民進禮感吾皇聖恩廣大勝陶唐北上小樓笙歌韻聒耳鳴管絃聲不住響則聽的畫鼓聲喧玉笛音清錦箏攸揚繞畫梁滿玉堂仙音嘹喨更過如九重天上南撲燈蛾巍巍皇恩浩蕩攸攸聖德大廣撫治的學校興威懾的華夏寧皆賴聖君賢相四夷稽首萬萬里重譯梯航和普天下臣民進禮感吾皇聖恩廣大勝陶唐餘音黎民鼓腹咸擊壤惟碩皇圗帝業昌祝聖夀綿延天地長粉蝶兒太平訪道山勢崔嵬映紅霞縷金鋪翠作伴的茶藥琴碁春來到百花香夏值著荷花噴秋風擺梧桐飄墜冬景堪宜剪鵝毛亂飄祥瑞醉春風四季景堪題仙家參道理俺那裡延長益夀托皇基都來進禮禮聖主寬恩賢臣忠孝因此上黎民安治普天樂看一帶嶺雲飛在十二瑶池內俺那裡祥雲冉冉緑草萋萋採靈芝下玉梯朝金闕乘鸞背俺那裡四望雲山純鋪著翆勝蓬萊閬苑瑶池俺那裡山圍著緑水水流在澗溪香馥馥花繞踈籬十二月穿的是麻𫀆草履怎能勾著緑穿緋伴的是山猿野鶴更和這松竹寒梅採的是不老長生藥劑俺則待步步相隨堯民歌呀我則待引著鶴騎著鹿逍遙散袒乘興過去赴瑶池我則待靠著山臨著水小小低低蓋一座茅廬索清竒不強如亂紛紛急攘攘蜂衙蟻陳受驅馳則不如跟著貧道打簡子摑著愚鼓無憂無慮爭也波知仙家造化機我其實參透了玄中義耍孩兒玩白雲醉了重還醉直睡到紅日三竿未起學來時耳聽野猿啼悶來時笑出柴扉尋漁樵間客知心友共賞玩春光飲數杯正遇著升平世遍乾坤民安國泰齊祝聖夀天齊二煞鐵拐李顯神通口吐雲韓湘子勝仙花手內提藍彩和手執檀扳虛空裡吕洞賔白雲影裏懸真像曹國舅紫霧叢中挑著笟張四郎便把輪竿執張果老四蹄蹇衛有一箇能修行辦道鍾離尾聲有一箇騙東洋採靈芝朱鶴傍西湖靠灘頭金線龜老人星都赴在瑶池內有德行純陽度脫你粉蝶兒踏雪尋栂葭管飛灰看梅稍綰回春意這梅臘前開年後芳菲傍深山臨淺水暗香風細獨占花魁他子是洞天中一家清致醉春風他無那艷色出紅粧常子是素容明玉體氷霜標格鐵心腸端的是美美他子是一味孤髙十分清秀全無那半星兒柔媚紅繡鞋恰長至一陽天氣早踈林繁蕊芳菲他有那玉骨氷肌傲寒威雪中凝素魄風裡散金𬎼薦酸魁第一石榴花我見他玉容和月閗爭輝越素淡越合宜他不施鉛粉自清竒端詳了玉質堪詠堪題他比著玉天仙少一口元陽氣共髙人逹士相知與松竹曽結下深盟誓一任他風雪遍山溪閗鵪鶉他子有鐵石心腸改不了氷霜氣質雖種在庾嶺坡前飄落在含章殿裡不是我因他便著迷若將這草木比試數著百卉開花誰似他三冬綻蕊上小樓似飲了香醪數杯似服了丹砂一粒因此上引惹春風點染春霜照耀春暉非是他蕩漾春心旖旎春情包藏春意只因是賞花魁玉容沉醉么這花有千瓣堆百葉圍常子是絳蕚深攢銀縷重鎪金蕊難窺一任他雪片欺風力摧鱗鱗相砌凍不著護芳心一團和氣普天樂緑雲苞青敷蒂他比那尋常花木品類尤竒他在那蕊珠宫居翆樓却怎生幻玉質來人世素色清香春風細小窗前雪月偏宜傳神在輔之畫筆留情在師雄夢裡移恨在和靖齋西滿庭芳孤村小溪氷魂冷淡月魄凄迷東君一任先春意開落隨伊色不入朝陽艷質香從教凍雪離披這一假孤髙勢有誰人會記只除是風月此情知耍孩兒這梅山林苑囿皆標致不比那其他艷質百花頭上占春魁夀陽粧富室偏宜常子是清香滿院因風至瘦影橫窗𬒳月移論古今多竒迹修仙道有夀春梅福惜花人是天寶梅妃二煞這牡丹天香國色嬌這梅花氷姿玉骨美他兩箇得乾坤清秀中和氣牡丹占風光濃艷宜歡賞梅花有雪月精神好品題兩件兒皆佳麗牡丹呵獨榮春景梅花呵先占春魁尾聲我子待逞豪吟詩百篇賞梅花酒數杯品藻的神仙丰采花王貴紅紫鄊中占第一粉蝶兒村田樂白酒黃雞正是俺莊農每賞樂天氣那問他塵是塵非俺間時樂忙時做子管俺一年四季到春來下種耕犁到夏來五榖成穗到秋來收滿盈倉到冬來飽食榮貴醉春凨年年歲歲五榖豐只碩俺老莊家收成喜喜見如今雨順風調萬民樂業只喫的瓦盆邊如泥沉醉普天樂醉如泥豐年歲俺在家富貴新酒活魚忙時種巳畝田間時團圓會只喫的醺醺醉卧斜陽頭枕耕犂牧童弄笛村歌唱起衆田家喜樂太平日粉蝶兒不做周方埋怨殺法聰和尚借與我半間兒客舍僧房與我那可憎才居止處門兒相向雖不能勾竊玉偷香且將這盻行雲眼睛兒打當醉春風往常時見傅粉的委實羞畫眉的都是謊多情人一見有情娘著小生心兒裡癢癢迱逗的腸慌斷送的眼亂引惹的心忙迎仙客我子見頭似雪鬢如霜面如童少年得內飬貌堂堂聲朗朗頭直上只少箇圎光恰便似揑塑僧伽像石榴花大師一一問行藏小生仔細訴衷腸自來西洛是吾鄊宦逰在四方寄居在咸陽先人拜禮部尚書多名望五旬上因病身亡平生正直無偏向止留下四海一空囊閗鵪鶉俺先人甚的是渾俗和光衠一味風清月朗小生無意去求官有心來聽講量著俺窮秀才人情𥿄半張又沒甚七青八黃儘著你説短論長一任教掂斤播兩上小樓小生特來見訪大師何須謙讓這錢難買柴薪不勾齋糧且備茶湯你若是有主張對艷粧將言詞説上我將你衆和尚死生難忘么也不要香積厨枯木堂逺著南軒離著東墻靠著西廂近主廊過耳房都皆停當是必你再休題長老方丈脫布衫大人家舉止端詳全無那半點兒輕狂大師行深深拜了啓朱唇語言的當小梁州可喜娘龎兒淺淡粧穿一套縞素衣裳胡伶六老不尋常偷晴望眼挫裡抹張郎么若共他多情小姐同鴛帳怎捨的疊𬒳鋪床將小姐央夫人怏若不令許放我親自寫與從良快活三崔家女艷粧莫不是演撒上老潔郎既不沙却怎睃越恁頭上放毫光打扮的特來晃朝天子過的主廊引入洞房好事從天降好模好樣特莽撞煩惱怎麼唐三藏偌大箇宅司可怎別無一箇兒郎使得梅香來説勾當你在我行口強硬抵著頭皮兒撞四邊靜人間天上看鶯鶯強如做道場軟玉溫香休道是相侵傍若能勾湯他一湯到與人消災障哨篇聽説罷心懷悒怏把一天愁都撮在眉尖上説夫人潔操氷霜不招呼誰敢輒入中堂自思想比及你心兒裡畏懼老母親威嚴你不合臨去也回頭望待不揚教人怎揚赤緊的情粘肺腑意惹肝腸若今生難得有情人也是我前世裡燒了斷頭香我得時節手掌兒裡竒擎心坎兒上溫存眼皮兒上供飬耍孩兒當𥘉那巫山逺隔如天樣聽説罷又在巫山那廂業身軀雖是立在回廊魂靈兒巳在他行本待要安排心事傳幽客我子怕泄漏春光與乃堂夫人怕女孩春心蕩怪黃鶯作對怨粉蝶成雙五煞小姐年紀小性氣剛張郎倘得相侵傍乍相逢厭見何郎粉看邂逅偷將韓夀香才到得風流况成就了會溫存的嬌壻怕甚麼能拘束的親娘四煞夫人忒慮過小生空妄想郎才女貌合相訪休直待眉兒淡了思張敞春色飄零憶阮郎非是咱自誇奬小姐有德行容貌小生有恭儉溫良三煞想著他眉兒淺淺描臉兒淡淡粧粉香膩玉搽胭項翆裙鴛繡金蓮小紅袖鸞銷玉笋長不想呵其實強你撇下一天丰韻我拾得萬種思量二煞院宇深枕簟涼一燈孤影搖書幌縱然酬得今生志著甚支吾此夜長睡不著如翻掌少可有一萬聲長吁短嘆五千遍倒枕捶床尾聲嬌羞花解語溫柔玉有香我和他乍相逢記不得嬌模樣我子索手抵著牙兒慢慢的想粉蝶兒半萬賊兵捲浮雲片時掃盡俺一家兒死裡逃生舒心的列山靈陳水陸張君瑞合當欽敬當日箇所望無成誰承望一封書到為媒證醉春風今日箇東閣玳筵開索強如西廂和月等薄衾單枕有人溫早則不冷冷受用足寶鼎香濃繡簾風細緑囱人靜脫布衫幽僻處可有人行點蒼苔白露零零隔囱兒咳嗽了一聲他那裡啓朱唇急來答應小梁州則見他義手忙將禮數迎我這裡萬福先生烏紗小帽耀人明白襴淨角帶傲黃鞓么衣冠濟楚龎兒俊可知道引動俺鶯鶯據相貌慿才能我從來心硬一見了也留情上小樓請字兒不曽出聲去字兒連忙答應可早鶯鶯根前姐姐呼之喏喏連聲秀才每聞道請恰便聽將軍嚴令更和那五臟神碩隨鞭鐙么第一來為壓驚第二來因謝承不請街坊不會親鄰不受人情避衆僧請老兄和鶯鶯匹娉子見他歡天喜地謹依來命滿庭芳來回顧影文魔秀士風欠酸丁下工夫將額顱十分挣遲和疾擦倒蒼蠅光油油耀花人眼睛酸溜螫的人牙疼茶飯巳安排㝎淘下陳倉米數升煠下七八碗軟蔓菁快活三咱人一事精百事精一無成百無成世間草木本無情猶有相兼並朝天子休道是這生年紀兒後生恰學害相思病天生聰俊打扮的素淨奈夜夜成孤另才子多情佳人薄幸兀的不擔閣了人性命誰無一箇信行誰無一箇志誠恁兩箇今夜晚親折證四邊靜今宵歡慶軟弱鶯鶯可曽慣經欵欵輕輕燈下交鴛頸端詳了可憎好煞人無乾淨耍孩兒俺那裡落紅滿地胭脂冷休辜負了良辰美景夫人遣妾莫消停請先生勿得推稱俺那裡準備著鴛鴦夜月銷金帳孔雀春風軟玉屏樂奏著合歡令有鳳簫象板錦瑟鸞笙四煞聘財斷不爭婚姻事有成新婚燕尓安排定你明博得跨鳳乖鸞客我到晚來臥看牽牛織女星休傒幸不要你半絲兒紅線成就了一世前程三煞慿著你滅寇功舉將能兩般兒功效如紅㝎為甚俺鶯娘心下十分順都只為君瑞胸中百萬兵越顯的文風盛受用足珠圍翆繞結果了黃卷靑燈二煞夫人只一家老兄無伴等為嫌繁冗尋幽靜請你箇有恩有義間中客回避了無是無非囱下僧夫人命道足下莫教推托和賤妾即便隨行尾聲先生休作謙夫人專意等常言道恭敬不如從命休使得梅香再來請粉蝶兒風靜簾間透紗囱麝蘭香散啓朱扉搖嚮雙環絳臺髙金荷小銀缸猶燦比及將暖帳輕彈先揭起梅紅羅軟簾偷看醉春凨我見他叉軃玉斜橫髻偏雲亂挽日髙猶自不明眸暢好是懶懶半晌抬身幾回搔耳一聲長嘆普天樂晚粧殘烏雲軃輕勻了粉臉亂挽了雲鬟他將那緘帖兒拈把粧盒兒按折封皮孜孜看顛來倒去不害心煩厭的又早扢皺了黛眉忽的不低垂了粉頸氲的又早改變了朱顔快活三分明是你的過犯沒來由把俺催殘使卑人顛倒惡心煩你不慣誰曽慣朝天子張生近間面顔瘦得來實難看不思量茶飯怕待動憚曉夜將佳期盻廢寢忘餐黃昏淸旦每日家望東墻掩淚眼這病患要安則除是出幾點兒風流汗四邊靜怕人調犯早共晚夫人行見些兒破綻你我何安問甚遭危難攛斷的上杆掇了梯兒看脫布衫小孩兒家口無托攔一迷裡言語催殘比似你使性子休思量秀才做多少好人家風範小梁州他為你夢裡成雙