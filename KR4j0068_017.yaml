首詩成酒一觴嬴得箇雲林清賞喜的是雞肥酒􅌻愛的是瓦缶磁甌只教胸次寛管甚肌膚瘦樂陶陶自在攸攸松竹梅邊尋酒儔到大来無災無咎又隱居嘆張雲荘作愛蔬圃蓮池藥䦨喜石田茅屋柴關俺這裡花發疾他那裡溪流慢綽然亭別是人間萬頃凨烟四面山因此上功名意懶班㝎逺飄零玉關楚靈均憔悴江干李斯有黄大悲陸機有華亭嘆張柬之老来遭難蘇子瞻長流四五畨因此上功名意懶昨日顔如渥丹今朝鬂髪斑斑恰纔桃李春又早桒榆晚㫁送了今古人何限都只為天地無情樂事慳因此上功名意懶郭子儀功威吐蕃李太白書駭南蠻房玄齡經濟才尉敬徳英雄漢魏徴般敢言直諫不滿髙人一咲㸔因此上功名意懶苫茅屋白雲数間睡芸囱紅日三竿依稀逺近村﨑嶇高低澗把人我是非都遮㫁閬苑蓬萊在咫尺間因此上功名意懶萬言策長沙不還六韜書雲梦空歎因他進身疾只為収心晚終不免許多憂患這無下稍従前玉笋斑因此上功名意懶筆硯琴書座間松筠梅菊江干終朝歡有餘每日春無限綽然亭疑在天上似老儂萬事無心這一釣竿因此上功名意懶一維揚懐古錦忛落天涯那荅玉簫属江上誰家空楼月慘悽古殿凨蕭洒梦兒中一度繁華滿耳邊聲起暮笳再不見㸔花駐馬二姑蘇懐古長洲苑花明劍㦸舘娃宫栁暗旌旗顰眉不甚竒甞膽何為計等閑間麋􅎷奔馳留得荒䑓臥㫁碑再不見黄金范蠡三錢塘懐古錦爛燦六橋彩舟玉娉婷十里紅楼香浮碼碯塵泉迸珠璣溜説當年㡬度追逰一自蘇坡塟土丘再不見尋梅問栁四燕山懐古阿監泣清氷玉碗老臣思丹荔金盤穹廬蝶梦殘輦路佳音㫁望中天五雲零亂白草茫茫紫塞寛再不見秦楼謝舘五謝人恵画清氣壓王維舊譜幽懐勝潘岳閑居霜楓魚尾紅烟雨磯頭綠費丹青㡬様工夫試比宣和内院圖自一家超今越古六夜酌話舊三十年間故人一千里外閑身悠悠江海心點點星霜鬂對青燈片言難盡但願君若扳龍上紫宸容老夫丹山舊隠七梦後戯題七尺低低板床数椽窄窄書房踈踈葦子簾淡淡梅花帳抵多少画閤蘭堂恠的是西凨一夜凉醖醸出這眠思梦想八合歡牡丹呈國色雕闌露清散天香画閤凨輕一枝翠盖擎兩朶紅芳並永合歡同意同情感應妃賢福禄增樂百歲繁華勝境又秋晚湖邊行泛逺水衰蒲敗葦護村居瘦竹踈籬天寒沙鳥栖日晚漁舟繫望湖光萬頃玻璃山色濛朧夜雨竒堪寫入丹青画裡受皇家泥金鳯草展胸次虎畧龍韜七擒手段髙八陣機謀好掃烟塵凨捲波濤百萬人中第一豪堪寫入麒麟画閤列簮纓兵壇将老運機謀海内名髙東征西討功固國安邦勞染猩血花映征𫀆細栁營中膽氣豪堪寫入麒麟画閤說老子甲兵練曉嘆英雄謀勇兼髙屯雲變化竒撥亂功能効好聲名四海歌謡奏凱㱕来覲九霄堪寫入麒麟画閤又挽妓訃音至傷心萬端挽詞成離恨千般蝶愁花事空凨起簫聲㫁麗春園長夜漫漫懊惱閻羅不量寛偏怎把嬌娥命短鉛華樹春凨太早蒺䔧花暮雨難熬楼空燕子飛巷静雞兒呌問香魂何處㱕着恨殺閻羅不忖度偏怎把嬌娥命夭檀板歇聲沉鷓鴣舞盤空香冷氍毹鶯兒喚不回杜宇催将去錦排塲等間分付多管無常緊趂逐竟不由東君做主寳鏡缺青鸞影孤錦筝閑銀鴈行踈拜辭白面郎抛閃黒心母一靈兒帶将春去從此陽䑓梦也無更愁甚朝雲暮雨又村隱新篘酒時間送来感興詩眼㡳湏裁酒酬今日歡詩了當時債酒和詩次第安排酒喚蒼頭且緩釃詩不用閑錢去買芭蕉上瀟瀟雨聲池塘邊聒聒蛙鳴瀟瀟動客愁聒聒供詩興雨和蛙展轉難聴雨覺騷人梦不成蛙又把詩翁喚醒拂水面千條栁絲岀墙頭㡬朶花枝酔㸔雨後山醒入橋邊肆正江南燕子来時到處亭䑓好賦詩少㡬箇知音在此青天外蟾光漸低素囱前梅影頻移長存酒共詩問甚名和利喜圍爐談咲忘機三尺龍泉把試誰似這等人兒有㡬又文士勤志把詩書誦講勵心将經史推詳難入子路堂且守顔回巷将羙玉韞匵而蔵試㸔春圍第一塲那其間名標金榜有人才雖無衣錦論文章貴似黄金君親盡孝忠天地無遐近慿學問整理乾坤一管霜毫治萬民端的是君子務本心坦坦厚人薄已志冲冲發憤忘食那咲斗筲才難比瑚璉器跳龍門浪裡魚飛一舉登科天下知真乃是成人之羙開口時言談今古寛懐處量比江湖多能百事精廣記群書趣操瑶琴鬼哭神呼正是人間大丈夫問青年吾十有五一相棋兩下裡排開陣角小軍卒守定溝壕他那裡戦馬攻俺架起㐮陽砲有士相来往虚囂定策安機緊守着生把箇将軍困倒二琵琶愛你時懐中抱搂為你時費些春秋輕輕的手向前欵欵的聲兒輳這消息動轉音軸公子王孫酔玉楼幸盡也方纔罷手三杖鼓打扮的腔兒整齊慿肚皮覔些衣食黄昏時點上燈免不的郎君擂戀聲嬌誰肯休息粉碎胭消爛了皮那時節何人愛你四雙陸想當𥘉成雙並起到頭来不免分離動不動把了門走了呵難尋覔逃不出那怕精細家破人亡不放㱕好色的貪心落得五骨郎論軆面雜攅異骨全慿那墨染硃塗愛他在紫茜氊習他在粧花褥任牌君翻轉磨鋪㺯得人人手内無乆已後甘心受苦又詠妓他生的婷婷嬝嬝更那堪羙羙嬌嬌無半點塵俗凨有萬種天然俏巧丹青難画難描聊轉秋波謾一瞧引的人魂飛九霄西王母離了東島玉天仙飛落雲霄行路兒身子輕説話兒聲音妙乍時見魄散魂消空惹餘香到緼𫀆迤逗的心懐丧了檀口兒櫻桃些小粉鼻兒正倚瓊瑶湘裙依楊栁腰團花映芙蓉貌𥘉相逢百媚千嬌但得和他共一宵平生事從今滿了步芳堦金蓮様小撥銀筝玉笋尖苗捧一巵白玉盃唱一曲陽春調錦圍屏掩映妖嬈檀口香腮厮揾着一陣兒昏迷不了又相思這煩惱越添越有這憂愁無了無休這凄凉訴與誰這寂寞難禁