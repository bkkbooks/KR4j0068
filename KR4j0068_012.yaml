地面則要你把心兒行者你便哏常見石竹子則俺那山受馬姪兒是軟善求著他的休想肯可憐假若是那罪若當刑死而無怨赤緊的元帥令便蒙著帝王宣大拜門我可也不想今朝常記的那往年我便到處裏追陪下些親眷俺也曽吹彈著那管弦快活了萬千大拜門那撒敦家的筵宴山石榴往常我便打扮的別梳粧的善乾皂靴􅎷皮綿囊也似軟那一領夾襖子是藍腰線醉娘子那珍珠豌豆也似圎我尚兀自㨂擇著穿頭巾上砌得分花兒現我繫一條家玉兔鶻是金廂面相公愛我子那銀盆也似厖兒膩粉粧墨定也似髭髯著這絨繩兒纒對著那官貟親將那籌筯傳借的安筵盞兒巡遍不拜門子聽的這者刺古笛兒攸攸的聒耳喧那駝皮鼓兒鼕鼕的似春雷現我向這筵前我也曽舞四遍舞罷也呵實不把咱來誇羡也不羅對著這官貟諸親眷送路排筵宴道是去也去也難留戀甚日重相見喜人心今朝別後再相逢子除是看時節夢見便夢也不似這便不是我兄弟行傒落嬸子行熬煎向姪兒行埋怨好弱難分辨貴賤如何見醉也摩挲子為你拋閃殺業人也波天我無賣也那無典無喫也那無穿一年不如一年月兒彎我子那生憤五逆丑生有人中都曽見伴著些那潑男也那潑男也那潑女茶坊也那酒肆在這瓦市裡穿親哥哥口中得出踈言有句話舌尖上挑著我去那喉嚨裡咽凨流體我到春來時春來時和氣暄若到那夏時節夏時節薰凨遍我可便最怕秋暮天便休説臘月裡臘月裡飛雪片忽都白兄弟哎再得我那往日箇的家緣舊日箇的莊田如今折罰的我無那片瓦也那根椽無箇大針也那麻線渾身上則覷著我這家緣著甚做那細米也那白麵厚絹也那薄綿折罰也那燒煙看著我那一雙父母的顔面兄弟也怕有那冷時節有時沒那替換下的舊襖子你便與一領兒穿也波穿不是絮絮叨叨聒聒煎煎雨淚漣漣霍不了心頭怨趂不了平生願唐兀歹往常我幔幕紗厨在繡幃裡眠到如今我枕著一塊半頭磚土炕上土炕上彎著片破席薦暢好是恓惶也波天離亭宴煞雖然是罷了干戈絶了士馬無了征戰你索與他演鎗刀學劍戟你索與他習弓箭子要你心堅兒向前你去那寨柵內莫憂愁營帳內休歡樂陳面上休勞倦我可便強健殺者波活的到明年後年重相見面皮難兄弟咱兩箇便再團圎可兀的路兒逺五供飬十三換頭窮客程舊行裝我如今便衣錦還鄉恰離了這水雲窟早來到帝都鄊你與我去了長竿却了短棹又不比引起凨波千丈我這便凝眸望見旌旗颭颭擺列著文武卿相喬木查相別來間闊動止俱無恙這的是土長根生父母鄊身居天一方錦繡封疆一錠銀子聽的律管輕吹引鳯凰餘韻尚攸揚他將那阿忽腔兒合唱子聽的馱鼓嚮笙簧相公愛妙舞千行與萬行那一日不登樓髙望鎮常何曽道離故鄊那一日離了我心上真箇醉剛道不思量教人越思量對著這緑水青山滿目凨光如何著人不思量金字經早是秋寂寞更那堪更漏長冷落梧桐葉落黃則打疊起不斷腸頭直上見賔鴻成字行山石榴我子見捧瑶觴葡萄釀三百口老小添歡暢今日富貴還皆興旺么誰想這一場從天降想也不想誰承望今日箇到􅈦階上鴈兒落我子見拂綽了白象床整頓了銷金帳髙擎著鸚鵡杯滿捧著羊羔釀得勝令呀今日箇紅袖奏笙簧又見這銀燭轉回廊未得見真龍面先聞的寶篆香見紫霧紅光現瑞靄祥光降列錦隊成行齊動著仙音滿殿嚮凨流體子見那丹墀列丹墀列鴛鷺行擺三公擺三公和卿相玉路傍玉路傍金殿上金殿上􅏛蓋擎傘蓋擎雲霞晃忽都白碩陛下聖壽無疆頓首誠惶唬的我手兒腳兒慌也波慌托賴著吾皇德過虞唐聖恩寬量幸遇著盛丗升平象永坐蟠龍上倘兀歹萬萬載千秋聖夀帝主昌地久天長溥天下八方四海盡來降齊祝讃吾皇夜行船馬東籬作百歲光隂一夢蝶重回首往事堪嗟今日春來明朝花謝急罰盞夜闌燈滅喬木查想秦宫漢闕都做了衰草牛羊野一恁魚樵沒話説縱荒墳橫斷碑不辨龍蛇慶宣和投至得狐蹤與兔穴多少豪傑鼎足三分半腰裡折知他是魏耶晉耶落梅花天教富莫待奢無多時好天良夜看財奴硬將心似鐵休辜負錦堂凨月凨入松眼前紅日又西斜疾似下坡車曉來鏡裡添白雪上床與鞋履相別休笑巢鳩計拙葫蘆提一向粧呆撥不斷利名竭是非絶紅塵不向門前惹緑樹偏宜屋角遮青山正輔墻頭缺更那堪竹籬茅舍離亭宴煞蛩吟罷一覺才寧貼雞鳴時萬事無休歇爭名利何年是徹密匝匝蟻排兵亂紛紛蜂釀蜜急攘攘蠅爭血裴公緑野堂陶令白蓮社愛秋來那些和露摘黃花帶霜烹紫蟹煮酒燒紅葉想人生有限杯能幾箇登髙節分付頑童記者恐北海探吾來道東籬醉了也夜行船憶舊憶昔揚州草四橋玉人何處也吹簫絳燭燒春金船吞月良夜幾畨歡笑凨入松東凨楊栁舞長條猶似學纎腰牙檣錦覽無消耗繁華去也難招古渡漁歌隱隱行宫煙草蕭蕭喬牌兒悲時空懊惱撫景慢行樂江山凨物宜年少散千金常醉倒新水令別來雙鬢巳刁騷綺羅叢夢中頻到思前日值今宵絡緯芭蕉偏恁感懷抱甜水令世態浮沉年光迅速人情顛倒無計覔黃鶴有一日舊迹重尋蘭舟再買吳姬還約安排著十萬纏腰離亭宴煞珠簾十里春光早梁塵滿座歌聲繞形勝地須教玩飽斜日汴堤行暖凨花市飲細雨蕪城眺不拘束越錦𫀆無言責烏紗帽到處裏踈狂落魄知時務有誰如攬凨情似咱少夜行船送友歸吳驛路西凨冷繡鞍離情秋色相關鴻鴈啼寒楓林染淚攛斷旅情無限凨入松丈夫雙淚不輕彈都付酒杯間蘇臺景物非虛誕年前倚棹曽看野水鷗邊蕭寺亂雲馬首吳山新水令君行那與利名干縱踈狂栁羈花絆何曽畏道途難往日今畨江海上浪遊慣喬牌兒劍橫腰秋水寒𫀆奪目曉霞燦虹霓膽氣沖霄